// === MECHANICS ===
// Shim: normalize constructor arg to array
function _toEntityArray(arg) {
  if (Array.isArray(arg)) return arg;
  if (arg && typeof arg === 'object' && !Array.isArray(arg)) {
    // If it has a sprites/entities property, try that
    if (Array.isArray(arg.entities)) return arg.entities;
    if (Array.isArray(arg.sprites)) return arg.sprites;
    // Otherwise wrap in array
    return [arg];
  }
  return [];
}


// --- Mechanic: PlacementSystem ---
class PlacementSystem {
  constructor(entities) {
    this.entities = _toEntityArray(entities);
    this.placementMode = false;
    this.selectedType = null;
    this.ghostX = 0;
    this.ghostY = 0;
    this.ghostVisible = false;
    this.time = 0;
    this.pulseTimer = 0;
    this.gold = 200;
    this.placedCount = 0;
    this.recentlyPlaced = [];
    this.costs = {
      'sprayer-tower': 50,
      'insect-nest': 30,
      'flower-bush': 10,
      'grass-tile': 5,
      'dirt-path': 5,
      'ant-worker': 20,
      'beetle-brute': 40,
      'pesticide-drop': 15,
      'gold-coin': 0
    };
    this.occupiedCells = new Set();
    this._initOccupied();
  }

  _gs() { return 40 * S; }

  _cellKey(x, y) {
    const gs = this._gs();
    return Math.floor(x / gs) + ',' + Math.floor(y / gs);
  }

  _snapToGrid(x, y) {
    const gs = this._gs();
    return {
      x: Math.floor(x / gs) * gs + gs / 2,
      y: Math.floor(y / gs) * gs + gs / 2
    };
  }

  _initOccupied() {
    this.entities.forEach(e => this.occupiedCells.add(this._cellKey(e.x, e.y)));
  }

  _isValidPlacement(x, y) {
    if (x < 0 || x > W || y < 0 || y > H) return false;
    return !this.occupiedCells.has(this._cellKey(x, y));
  }

  update(dt) {
    const events = [];
    this.time += dt;
    this.pulseTimer = (this.pulseTimer + dt) % (Math.PI * 2);

    for (let i = this.recentlyPlaced.length - 1; i >= 0; i--) {
      this.recentlyPlaced[i].timer -= dt;
      if (this.recentlyPlaced[i].timer <= 0) this.recentlyPlaced.splice(i, 1);
    }

    // Gold coins drift toward nearest ant-worker and get collected
    const coins = this.entities.filter(e => e.type === 'gold-coin' && !e._collected);
    const workers = this.entities.filter(e => e.type === 'ant-worker');
    coins.forEach(coin => {
      if (workers.length === 0) return;
      let nearest = null, nearestDist = Infinity;
      workers.forEach(w => {
        const d = Math.hypot(w.x - coin.x, w.y - coin.y);
        if (d < nearestDist) { nearestDist = d; nearest = w; }
      });
      if (nearest && nearestDist < 110 * S) {
        const angle = Math.atan2(nearest.y - coin.y, nearest.x - coin.x);
        coin.x += Math.cos(angle) * 72 * S * dt;
        coin.y += Math.sin(angle) * 72 * S * dt;
      }
      if (nearest && nearestDist < 20 * S) {
        coin._collected = true;
        this.gold += 25;
        events.push({ type: 'score', value: 25 });
        events.push({ type: 'state', key: 'gold', value: this.gold });
      }
    });

    // Ant workers orbit nearest insect nest
    const nests = this.entities.filter(e => e.type === 'insect-nest');
    workers.forEach(worker => {
      if (worker._patrolAngle === undefined) worker._patrolAngle = Math.random() * Math.PI * 2;
      if (worker._patrolRadius === undefined) worker._patrolRadius = (28 + Math.random() * 38) * S;
      if (worker._patrolSpeed === undefined) worker._patrolSpeed = 0.55 + Math.random() * 0.55;
      if (worker._homeX === undefined) {
        const src = nests.length > 0 ? nests[Math.floor(Math.random() * nests.length)] : worker;
        worker._homeX = src.x;
        worker._homeY = src.y;
      }
      worker._patrolAngle += worker._patrolSpeed * dt;
      worker.x = worker._homeX + Math.cos(worker._patrolAngle) * worker._patrolRadius;
      worker.y = worker._homeY + Math.sin(worker._patrolAngle) * worker._patrolRadius;
    });

    // Beetle brutes advance toward nearest sprayer tower
    const towers = this.entities.filter(e => e.type === 'sprayer-tower');
    const beetles = this.entities.filter(e => e.type === 'beetle-brute' && !e._dead);
    beetles.forEach(beetle => {
      if (beetle._health === undefined) beetle._health = 100;
      if (towers.length > 0) {
        let nearest = null, nearestDist = Infinity;
        towers.forEach(t => {
          const d = Math.hypot(t.x - beetle.x, t.y - beetle.y);
          if (d < nearestDist) { nearestDist = d; nearest = t; }
        });
        if (nearest && nearestDist > 34 * S) {
          const angle = Math.atan2(nearest.y - beetle.y, nearest.x - beetle.x);
          beetle.x += Math.cos(angle) * 40 * S * dt;
          beetle.y += Math.sin(angle) * 40 * S * dt;
        }
      }
    });

    // Pesticide drops damage beetles in range
    const drops = this.entities.filter(e => e.type === 'pesticide-drop');
    drops.forEach(drop => {
      beetles.forEach(beetle => {
        if (Math.hypot(beetle.x - drop.x, beetle.y - drop.y) < 48 * S) {
          beetle._health = (beetle._health || 100) - 20 * dt;
          if (beetle._health <= 0 && !beetle._dead) {
            beetle._dead = true;
            events.push({ type: 'score', value: 100 });
            events.push({ type: 'state', key: 'beetleKilled', value: true });
          }
        }
      });
    });

    // Sprayer towers rotate; aim at nearest beetle when in range
    towers.forEach(tower => {
      if (tower._angle === undefined) tower._angle = 0;
      if (tower._range === undefined) tower._range = 120;
      let nearest = null, nearestDist = Infinity;
      beetles.forEach(b => {
        const d = Math.hypot(b.x - tower.x, b.y - tower.y);
        if (d < nearestDist) { nearestDist = d; nearest = b; }
      });
      if (nearest && nearestDist < tower._range * S) {
        tower._angle = Math.atan2(nearest.y - tower.y, nearest.x - tower.x);
        tower._targeting = true;
      } else {
        tower._angle += 0.55 * dt;
        tower._targeting = false;
      }
    });

    return events;
  }

  draw(ctx) {
    const gs = this._gs();

    // Grid overlay in placement mode
    if (this.placementMode) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.11)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x += gs) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y <= H; y += gs) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      ctx.restore();
    }

    // Ghost placement preview
    if (this.placementMode && this.ghostVisible && this.selectedType) {
      const sn = this._snapToGrid(this.ghostX, this.ghostY);
      const valid = this._isValidPlacement(sn.x, sn.y);
      const canAfford = this.gold >= (this.costs[this.selectedType] || 0);
      const ok = valid && canAfford;
      const pulse = 0.45 + 0.25 * Math.sin(this.pulseTimer * 4);
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = ok ? 'rgba(80,255,120,0.3)' : 'rgba(255,65,65,0.3)';
      ctx.strokeStyle = ok ? 'rgba(80,255,120,1)' : 'rgba(255,65,65,1)';
      ctx.lineWidth = 2 * S;
      ctx.beginPath();
      ctx.rect(sn.x - gs / 2, sn.y - gs / 2, gs, gs);
      ctx.fill();
      ctx.stroke();
      ctx.globalAlpha = 0.92;
      const label = this.selectedType.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold ' + Math.round(10 * S) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, sn.x, sn.y - gs * 0.17);
      ctx.font = Math.round(9 * S) + 'px monospace';
      ctx.fillStyle = canAfford ? '#ffd700' : '#ff5555';
      ctx.fillText('\u{1F4B0}' + (this.costs[this.selectedType] || 0), sn.x, sn.y + gs * 0.22);
      ctx.restore();
    }

    // Sprayer tower range rings + targeting beam
    this.entities.filter(e => e.type === 'sprayer-tower').forEach(tower => {
      const range = (tower._range || 120) * S;
      const pulse = 0.09 + 0.05 * Math.sin(this.pulseTimer * 2);
      ctx.save();
      ctx.fillStyle = 'rgba(0,200,255,' + pulse + ')';
      ctx.strokeStyle = 'rgba(0,200,255,0.65)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(tower.x, tower.y, range, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      if (tower._targeting && tower._angle !== undefined) {
        ctx.strokeStyle = 'rgba(255,235,0,0.75)';
        ctx.lineWidth = 2 * S;
        ctx.setLineDash([6 * S, 4 * S]);
        ctx.beginPath();
        ctx.moveTo(tower.x, tower.y);
        ctx.lineTo(tower.x + Math.cos(tower._angle) * range, tower.y + Math.sin(tower._angle) * range);
        ctx.stroke();
      }
      ctx.restore();
    });

    // Insect nest patrol radius
    this.entities.filter(e => e.type === 'insect-nest').forEach(nest => {
      const r = 80 * S;
      const pulse = 0.07 + 0.04 * Math.sin(this.pulseTimer * 1.4 + 1);
      ctx.save();
      ctx.fillStyle = 'rgba(180,80,255,' + pulse + ')';
      ctx.strokeStyle = 'rgba(180,80,255,0.45)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5 * S, 5 * S]);
      ctx.beginPath();
      ctx.arc(nest.x, nest.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    });

    // Pesticide drop radius indicator
    this.entities.filter(e => e.type === 'pesticide-drop').forEach(drop => {
      const r = 48 * S;
      const pulse = 0.06 + 0.04 * Math.sin(this.pulseTimer * 3 + 2);
      ctx.save();
      ctx.fillStyle = 'rgba(140,255,80,' + pulse + ')';
      ctx.strokeStyle = 'rgba(140,255,80,0.5)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4 * S, 4 * S]);
      ctx.beginPath();
      ctx.arc(drop.x, drop.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    });

    // Health bars for beetle brutes
    this.entities.filter(e => e.type === 'beetle-brute' && !e._dead).forEach(beetle => {
      const hp = Math.max(0, beetle._health !== undefined ? beetle._health : 100);
      const bw = beetle.width || 40 * S;
      const bh = 5 * S;
      const bx = beetle.x - bw / 2;
      const by = beetle.y - (beetle.height || 40 * S) / 2 - 10 * S;
      ctx.save();
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = hp > 60 ? '#4caf50' : hp > 30 ? '#ff9800' : '#f44336';
      ctx.fillRect(bx, by, bw * (hp / 100), bh);
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.restore();
    });

    // Ripple animations for freshly placed entities
    this.recentlyPlaced.forEach(p => {
      const progress = 1 - p.timer / p.maxTimer;
      const r = (18 + progress * 52) * S;
      const alpha = (1 - progress) * 0.85;
      ctx.save();
      ctx.strokeStyle = 'rgba(255,215,50,' + alpha + ')';
      ctx.lineWidth = (3 * S) * (1 - progress * 0.6);
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    });

    // HUD overlay
    ctx.save();
    const pad = 10 * S;
    const rowH = 28 * S;
    const fs = Math.round(12 * S);

    // Gold counter
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(pad, pad, 138 * S, rowH, 6 * S);
    else ctx.rect(pad, pad, 138 * S, rowH);
    ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold ' + fs + 'px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F4B0} Gold: ' + this.gold, pad + 8 * S, pad + rowH / 2);

    // Active mode label
    if (this.placementMode && this.selectedType) {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(pad, pad + rowH + 4 * S, 210 * S, rowH, 6 * S);
      else ctx.rect(pad, pad + rowH + 4 * S, 210 * S, rowH);
      ctx.fill();
      ctx.fillStyle = '#aaffaa';
      ctx.font = Math.round(10 * S) + 'px monospace';
      ctx.fillText('Placing: ' + this.selectedType, pad + 8 * S, pad + rowH * 1.5 + 4 * S);
    }

    // Hotkey legend top-right
    const legendLines = [
      '[1] Sprayer Tower  -50g',
      '[2] Insect Nest    -30g',
      '[3] Flower Bush    -10g',
      '[4] Grass Tile      -5g',
      '[5] Dirt Path       -5g',
      '[ESC] Cancel'
    ];
    const lfs = Math.round(9 * S);
    const lh = 14 * S;
    const lw = 168 * S;
    const lH = legendLines.length * lh + 8 * S;
    const lx = W - lw - pad;
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(lx, pad, lw, lH, 6 * S);
    else ctx.rect(lx, pad, lw, lH);
    ctx.fill();
    ctx.font = lfs + 'px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    legendLines.forEach((line, i) => {
      const highlight = this.selectedType && line.toLowerCase().includes(this.selectedType.split('-')[0]);
      ctx.fillStyle = highlight ? '#ffffaa' : '#bbbbbb';
      ctx.fillText(line, lx + 6 * S, pad + 4 * S + i * lh);
    });

    ctx.restore();
  }

  handleInput(type, data) {
    if (data && data.x !== undefined) {
      this.ghostX = data.x;
      this.ghostY = data.y;
      if (this.placementMode) this.ghostVisible = true;
    }

    if (type === 'keydown' && data) {
      const key = data.key || '';
      const typeMap = {
        '1': 'sprayer-tower',
        '2': 'insect-nest',
        '3': 'flower-bush',
        '4': 'grass-tile',
        '5': 'dirt-path'
      };
      if (key === 'Escape') {
        this.placementMode = false;
        this.selectedType = null;
        this.ghostVisible = false;
      } else if (typeMap[key]) {
        this.placementMode = true;
        this.selectedType = typeMap[key];
        this.ghostVisible = true;
      }
    }

    if ((type === 'click' || type === 'touchstart') && data) {
      if (this.placementMode && this.selectedType) {
        const sn = this._snapToGrid(data.x, data.y);
        const cost = this.costs[this.selectedType] || 0;
        if (this._isValidPlacement(sn.x, sn.y) && this.gold >= cost) {
          this.gold -= cost;
          this.occupiedCells.add(this._cellKey(sn.x, sn.y));
          const gs = this._gs();
          this.entities.push({
            name: this.selectedType,
            x: sn.x,
            y: sn.y,
            width: gs,
            height: gs,
            type: this.selectedType,
            sprite: this.selectedType,
            _health: 100,
            _range: 120,
            _angle: 0,
            _targeting: false
          });
          this.placedCount++;
          this.recentlyPlaced.push({ x: sn.x, y: sn.y, timer: 0.65, maxTimer: 0.65 });
        }
      } else {
        this.placementMode = false;
        this.selectedType = null;
        this.ghostVisible = false;
      }
    }
  }
}


// --- Mechanic: WaveSpawner ---
class WaveSpawner {
  constructor(entities) {
    this.entities = _toEntityArray(entities);
    const sc = typeof S !== 'undefined' ? S : 1;
    this.sc = sc;

    this.wave = 0;
    this.waveActive = false;
    this.waveCooldown = 6.0;
    this.waveTimer = 5.0;
    this.spawnInterval = 1.2;
    this.spawnTimer = 0;
    this.totalEnemiesThisWave = 0;
    this.spawnedCount = 0;
    this.announceTimer = 0;
    this.nextId = 0;
    this.paused = false;

    this.activeEnemies = [];
    this.activeProjectiles = [];
    this.coins = [];
    this.particles = [];

    this.towerState = new Map();
    entities.forEach(e => {
      if (e.type === 'sprayer-tower') {
        this.towerState.set(e, {
          hp: 100, maxHp: 100,
          fireTimer: Math.random() * 1.5,
          fireRate: 2.0,
          range: 180 * sc,
        });
      }
    });
  }

  _nests() {
    return this.entities.filter(e => e.type === 'insect-nest');
  }

  _towers() {
    return this.entities.filter(e => e.type === 'sprayer-tower');
  }

  _nearestTower(x, y) {
    let best = null, bestDist = Infinity;
    for (const t of this._towers()) {
      const tx = t.x + (t.width || 40 * this.sc) / 2;
      const ty = t.y + (t.height || 40 * this.sc) / 2;
      const d = Math.hypot(x - tx, y - ty);
      if (d < bestDist) { bestDist = d; best = { tower: t, dist: d }; }
    }
    return best;
  }

  _spawnEnemy() {
    const nests = this._nests();
    if (!nests.length) return;
    const nest = nests[Math.floor(Math.random() * nests.length)];
    const sc = this.sc;
    const isBrute = this.wave >= 2 && Math.random() < Math.min(0.1 + (this.wave - 2) * 0.08, 0.55);
    const w = (isBrute ? 28 : 18) * sc;
    const h = (isBrute ? 28 : 18) * sc;
    const cx = nest.x + (nest.width || 40 * sc) / 2;
    const cy = nest.y + (nest.height || 40 * sc) / 2;
    const maxHp = isBrute ? 60 + this.wave * 12 : 20 + this.wave * 6;
    const enemy = {
      name: isBrute ? 'Beetle Brute' : 'Ant Worker',
      x: cx - w / 2 + (Math.random() - 0.5) * 20 * sc,
      y: cy - h / 2 + (Math.random() - 0.5) * 20 * sc,
      width: w, height: h,
      type: isBrute ? 'beetle-brute' : 'ant-worker',
      sprite: null,
      _id: this.nextId++,
      _hp: maxHp, _maxHp: maxHp,
      _speed: (isBrute ? 35 : 70) * sc,
      _reward: isBrute ? 15 : 5,
      _damage: isBrute ? 20 : 8,
      _attackTimer: 0,
      _attackRate: isBrute ? 0.8 : 1.2,
      _active: true,
      _wanderAngle: Math.random() * Math.PI * 2,
    };
    this.entities.push(enemy);
    this.activeEnemies.push(enemy);
  }

  _spawnProjectile(fromX, fromY, toX, toY, damage) {
    const sc = this.sc;
    const dx = toX - fromX, dy = toY - fromY;
    const dist = Math.hypot(dx, dy) || 1;
    const speed = 260 * sc;
    const w = 8 * sc, h = 8 * sc;
    const proj = {
      name: 'Pesticide Drop',
      x: fromX - w / 2, y: fromY - h / 2,
      width: w, height: h,
      type: 'pesticide-drop', sprite: null,
      _vx: (dx / dist) * speed,
      _vy: (dy / dist) * speed,
      _damage: damage, _active: true,
      _id: this.nextId++,
    };
    this.entities.push(proj);
    this.activeProjectiles.push(proj);
  }

  _removeEntity(e) {
    const idx = this.entities.indexOf(e);
    if (idx !== -1) this.entities.splice(idx, 1);
  }

  _burst(x, y, color, count) {
    const sc = this.sc;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = (40 + Math.random() * 80) * sc;
      const life = 0.35 + Math.random() * 0.3;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 30 * sc,
        life, maxLife: life, color,
        r: (2 + Math.random() * 4) * sc,
      });
    }
  }

  update(dt) {
    if (this.paused) return [];
    const events = [];
    const sc = this.sc;
    const canvasW = typeof W !== 'undefined' ? W : 800;
    const canvasH = typeof H !== 'undefined' ? H : 600;

    // Particles
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 80 * sc * dt;
      p.life -= dt;
      if (p.life <= 0) this.particles.splice(i, 1);
    }

    // Coins
    for (let i = this.coins.length - 1; i >= 0; i--) {
      const c = this.coins[i];
      c.y += c.vy * dt;
      c.vy += 120 * sc * dt;
      c.life -= dt;
      if (c.life <= 0) this.coins.splice(i, 1);
    }

    if (this.announceTimer > 0) this.announceTimer -= dt;

    // Wave state machine
    if (!this.waveActive) {
      this.waveTimer -= dt;
      if (this.waveTimer <= 0) {
        this.wave++;
        this.waveActive = true;
        this.spawnTimer = 0;
        this.spawnedCount = 0;
        this.totalEnemiesThisWave = 5 + Math.floor(this.wave * 3.5);
        this.announceTimer = 2.5;
        events.push({ type: 'state', key: 'wave', value: this.wave });
      }
    } else {
      if (this.spawnedCount < this.totalEnemiesThisWave) {
        this.spawnTimer -= dt;
        if (this.spawnTimer <= 0) {
          this._spawnEnemy();
          this.spawnedCount++;
          this.spawnTimer = Math.max(0.4, this.spawnInterval - this.wave * 0.05);
        }
      }
      if (this.spawnedCount >= this.totalEnemiesThisWave && this.activeEnemies.length === 0) {
        this.waveActive = false;
        this.waveTimer = this.waveCooldown;
        events.push({ type: 'score', value: this.wave * 50 });
        events.push({ type: 'state', key: 'waveCleared', value: this.wave });
      }
    }

    // Enemy movement and attacking
    for (let i = this.activeEnemies.length - 1; i >= 0; i--) {
      const e = this.activeEnemies[i];
      if (!e._active) {
        this._removeEntity(e);
        this.activeEnemies.splice(i, 1);
        continue;
      }
      const cx = e.x + e.width / 2;
      const cy = e.y + e.height / 2;
      const nearest = this._nearestTower(cx, cy);
      if (nearest) {
        const { tower } = nearest;
        const tw = tower.width || 40 * sc;
        const th = tower.height || 40 * sc;
        const tx = tower.x + tw / 2;
        const ty = tower.y + th / 2;
        const dx = tx - cx, dy = ty - cy;
        const dist = Math.hypot(dx, dy) || 1;
        const attackRange = e.width / 2 + tw / 2 + 2 * sc;
        if (dist > attackRange) {
          e.x += (dx / dist) * e._speed * dt;
          e.y += (dy / dist) * e._speed * dt;
        } else {
          e._attackTimer -= dt;
          if (e._attackTimer <= 0) {
            const ts = this.towerState.get(tower);
            if (ts && ts.hp > 0) {
              ts.hp = Math.max(0, ts.hp - e._damage);
              this._burst(tx, ty, '#ff4444', 4);
              if (ts.hp <= 0) {
                events.push({ type: 'state', key: 'towerDestroyed', value: tower.name || tower.type });
                this._removeEntity(tower);
                this.towerState.delete(tower);
              }
            }
            e._attackTimer = 1.0 / e._attackRate;
          }
        }
      } else {
        e._wanderAngle += (Math.random() - 0.5) * 10 * dt;
        e.x += Math.cos(e._wanderAngle) * e._speed * 0.4 * dt;
        e.y += Math.sin(e._wanderAngle) * e._speed * 0.4 * dt;
        e.x = Math.max(0, Math.min(canvasW - e.width, e.x));
        e.y = Math.max(0, Math.min(canvasH - e.height, e.y));
      }
    }

    // Projectile movement and collision
    for (let i = this.activeProjectiles.length - 1; i >= 0; i--) {
      const p = this.activeProjectiles[i];
      if (!p._active) {
        this._removeEntity(p);
        this.activeProjectiles.splice(i, 1);
        continue;
      }
      p.x += p._vx * dt;
      p.y += p._vy * dt;
      if (p.x < -60 || p.x > canvasW + 60 || p.y < -60 || p.y > canvasH + 60) {
        p._active = false;
        this._removeEntity(p);
        this.activeProjectiles.splice(i, 1);
        continue;
      }
      const px = p.x + p.width / 2;
      const py = p.y + p.height / 2;
      const pr = p.width / 2;
      let hit = false;
      for (const enemy of this.activeEnemies) {
        if (!enemy._active) continue;
        const ex = enemy.x + enemy.width / 2;
        const ey = enemy.y + enemy.height / 2;
        if (Math.hypot(px - ex, py - ey) < pr + enemy.width / 2) {
          enemy._hp -= p._damage;
          this._burst(ex, ey, '#b0ff50', 3);
          if (enemy._hp <= 0) {
            enemy._active = false;
            this.coins.push({ x: ex, y: ey - 5 * sc, vy: -80 * sc, life: 1.0, maxLife: 1.0 });
            this._burst(ex, ey, '#ffd700', 7);
            events.push({ type: 'score', value: enemy._reward });
          }
          hit = true;
          break;
        }
      }
      if (hit) {
        p._active = false;
        this._removeEntity(p);
        this.activeProjectiles.splice(i, 1);
      }
    }

    // Tower firing
    const activeTowers = this._towers();
    for (const tower of activeTowers) {
      const ts = this.towerState.get(tower);
      if (!ts) continue;
      ts.fireTimer -= dt;
      if (ts.fireTimer <= 0) {
        const tx = tower.x + (tower.width || 40 * sc) / 2;
        const ty = tower.y + (tower.height || 40 * sc) / 2;
        let target = null, targetDist = ts.range;
        for (const enemy of this.activeEnemies) {
          if (!enemy._active) continue;
          const ex = enemy.x + enemy.width / 2;
          const ey = enemy.y + enemy.height / 2;
          const d = Math.hypot(tx - ex, ty - ey);
          if (d < targetDist) { targetDist = d; target = enemy; }
        }
        if (target) {
          this._spawnProjectile(tx, ty, target.x + target.width / 2, target.y + target.height / 2, 10 + this.wave * 2);
          ts.fireTimer = 1.0 / ts.fireRate;
        } else {
          ts.fireTimer = 0.25;
        }
      }
    }

    return events;
  }

  draw(ctx) {
    const sc = this.sc;
    const canvasW = typeof W !== 'undefined' ? W : 800;
    const canvasH = typeof H !== 'undefined' ? H : 600;

    ctx.save();

    // Tower range rings and HP bars
    for (const tower of this._towers()) {
      const ts = this.towerState.get(tower);
      if (!ts) continue;
      const tw = tower.width || 40 * sc;
      const th = tower.height || 40 * sc;
      const tx = tower.x + tw / 2;
      const ty = tower.y + th / 2;

      ctx.strokeStyle = 'rgba(80, 200, 80, 0.22)';
      ctx.lineWidth = 1.5 * sc;
      ctx.setLineDash([5 * sc, 5 * sc]);
      ctx.beginPath();
      ctx.arc(tx, ty, ts.range, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);

      const pct = ts.hp / ts.maxHp;
      const bx = tower.x, by = tower.y - 9 * sc;
      const bw = tw, bh = 5 * sc;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = pct > 0.5 ? '#44dd44' : pct > 0.25 ? '#ffaa22' : '#ff3333';
      ctx.fillRect(bx, by, bw * pct, bh);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 0.5 * sc;
      ctx.strokeRect(bx, by, bw, bh);
    }

    // Enemy HP bars and shapes
    for (const e of this.activeEnemies) {
      if (!e._active) continue;
      const pct = e._hp / e._maxHp;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(e.x, e.y - 7 * sc, e.width, 3.5 * sc);
      ctx.fillStyle = pct > 0.6 ? '#55ee55' : pct > 0.3 ? '#ffbb22' : '#ff3333';
      ctx.fillRect(e.x, e.y - 7 * sc, e.width * pct, 3.5 * sc);

      const cx = e.x + e.width / 2;
      const cy = e.y + e.height / 2;
      if (e.type === 'beetle-brute') {
        ctx.fillStyle = '#5a3a1a';
        ctx.beginPath();
        ctx.ellipse(cx, cy, e.width / 2, e.height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.ellipse(cx, cy - 2 * sc, e.width / 3, e.height / 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#3a2010';
        ctx.lineWidth = 1 * sc;
        ctx.beginPath();
        ctx.moveTo(cx - e.width / 2, cy);
        ctx.lineTo(cx - e.width / 2 - 5 * sc, cy - 4 * sc);
        ctx.moveTo(cx + e.width / 2, cy);
        ctx.lineTo(cx + e.width / 2 + 5 * sc, cy - 4 * sc);
        ctx.stroke();
      } else {
        ctx.fillStyle = '#cc3300';
        ctx.beginPath();
        ctx.ellipse(cx, cy, e.width / 2, e.height / 2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff5522';
        ctx.beginPath();
        ctx.ellipse(cx, cy - e.height * 0.15, e.width * 0.3, e.height * 0.25, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#aa2200';
        ctx.lineWidth = 1.5 * sc;
        ctx.beginPath();
        ctx.moveTo(cx - 3 * sc, e.y + 1 * sc);
        ctx.lineTo(cx - 7 * sc, e.y - 5 * sc);
        ctx.moveTo(cx + 3 * sc, e.y + 1 * sc);
        ctx.lineTo(cx + 7 * sc, e.y - 5 * sc);
        ctx.stroke();
      }
    }

    // Projectiles
    for (const p of this.activeProjectiles) {
      if (!p._active) continue;
      const px = p.x + p.width / 2;
      const py = p.y + p.height / 2;
      ctx.shadowColor = '#66ff00';
      ctx.shadowBlur = 6 * sc;
      ctx.fillStyle = '#aaff44';
      ctx.beginPath();
      ctx.arc(px, py, p.width / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Particles
    for (const p of this.particles) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.r * alpha), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Gold coins
    for (const c of this.coins) {
      ctx.globalAlpha = Math.min(1, c.life / c.maxLife);
      ctx.fillStyle = '#ffd700';
      ctx.strokeStyle = '#886600';
      ctx.lineWidth = 1.5 * sc;
      ctx.beginPath();
      ctx.arc(c.x, c.y, 5 * sc, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Wave announcement banner
    if (this.announceTimer > 0) {
      const t = this.announceTimer / 2.5;
      const alpha = t < 0.2 ? t / 0.2 : t > 0.8 ? (1 - t) / 0.2 : 1;
      ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
      ctx.font = `bold ${42 * sc}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 6 * sc;
      ctx.strokeStyle = '#000';
      ctx.strokeText(`Wave ${this.wave}`, canvasW / 2, canvasH * 0.22);
      ctx.fillStyle = '#ffee44';
      ctx.fillText(`Wave ${this.wave}`, canvasW / 2, canvasH * 0.22);
      ctx.font = `${18 * sc}px sans-serif`;
      ctx.lineWidth = 3 * sc;
      ctx.strokeText(`${this.totalEnemiesThisWave} enemies incoming!`, canvasW / 2, canvasH * 0.22 + 50 * sc);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(`${this.totalEnemiesThisWave} enemies incoming!`, canvasW / 2, canvasH * 0.22 + 50 * sc);
      ctx.globalAlpha = 1;
    }

    // HUD overlay
    ctx.font = `bold ${13 * sc}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    if (!this.waveActive) {
      const secs = Math.ceil(Math.max(0, this.waveTimer));
      ctx.fillStyle = 'rgba(255, 220, 50, 0.95)';
      ctx.fillText(`Next wave in: ${secs}s  [SPACE to skip]`, canvasW - 8 * sc, 8 * sc);
    } else {
      ctx.fillStyle = 'rgba(255, 90, 90, 0.95)';
      const incoming = this.totalEnemiesThisWave - this.spawnedCount;
      ctx.fillText(
        `Wave ${this.wave}  |  Active: ${this.activeEnemies.length}  |  Incoming: ${incoming}`,
        canvasW - 8 * sc, 8 * sc
      );
    }

    ctx.restore();
  }

  handleInput(type, data) {
    const sc = this.sc;
    if (type === 'click' || type === 'touchstart') {
      const { x, y } = data;
      for (const tower of this._towers()) {
        const ts = this.towerState.get(tower);
        if (!ts) continue;
        const tw = tower.width || 40 * sc;
        const th = tower.height || 40 * sc;
        const tx = tower.x + tw / 2;
        const ty = tower.y + th / 2;
        if (Math.hypot(x - tx, y - ty) < tw / 2 + 6 * sc) {
          ts.fireTimer = 0;
          return;
        }
      }
      if (!this.waveActive && this.activeEnemies.length === 0 && this.waveTimer > 1.5) {
        this.waveTimer = 1.0;
      }
    }
    if (type === 'keydown') {
      if (data.code === 'Space' && !this.waveActive && this.waveTimer > 0.5) {
        this.waveTimer = 0.5;
      }
      if (data.code === 'KeyP') {
        this.paused = !this.paused;
      }
    }
  }
}


// --- Mechanic: ResourceManager ---
class ResourceManager {
  constructor(entities) {
    this.entities = _toEntityArray(entities);
    this.health = new Map();
    this.towerCooldowns = new Map();
    this.nestSpawnTimers = new Map();
    this.dropTargets = new Map();
    this.workerTargets = new Map();
    this.bushTimers = new Map();
    this.velocities = new Map();
    this.globalTimer = 0;
    this.selectedTower = null;
    this.particles = [];

    for (const e of entities) {
      if (e.type === 'sprayer-tower') {
        this.health.set(e, 100);
        this.towerCooldowns.set(e, 0);
      } else if (e.type === 'beetle-brute') {
        this.health.set(e, 80);
        this.velocities.set(e, { vx: 0, vy: 0 });
      } else if (e.type === 'insect-nest') {
        this.health.set(e, 150);
        this.nestSpawnTimers.set(e, 5 + Math.random() * 3);
      } else if (e.type === 'ant-worker') {
        this.velocities.set(e, { vx: 0, vy: 0 });
      } else if (e.type === 'pesticide-drop') {
        this.velocities.set(e, { vx: 0, vy: 0 });
      }
    }
  }

  _byType(type) {
    return this.entities.filter(e => e.type === type);
  }

  _nearest(src, targets) {
    let best = null, bestDist = Infinity;
    for (const t of targets) {
      const d = Math.hypot(t.x - src.x, t.y - src.y);
      if (d < bestDist) { bestDist = d; best = t; }
    }
    return { entity: best, dist: bestDist };
  }

  _remove(entity) {
    const i = this.entities.indexOf(entity);
    if (i !== -1) this.entities.splice(i, 1);
    this.health.delete(entity);
    this.towerCooldowns.delete(entity);
    this.nestSpawnTimers.delete(entity);
    this.dropTargets.delete(entity);
    this.workerTargets.delete(entity);
    this.bushTimers.delete(entity);
    this.velocities.delete(entity);
  }

  _spawnParticle(x, y, color) {
    for (let i = 0; i < 6; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = (30 + Math.random() * 60) * S;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.6 + Math.random() * 0.4,
        maxLife: 1.0,
        radius: (3 + Math.random() * 4) * S,
        color
      });
    }
  }

  update(dt) {
    const evts = [];
    this.globalTimer += dt;

    const TOWER_RANGE    = 150 * S;
    const FIRE_RATE      = 1.8;
    const DROP_SPEED     = 130 * S;
    const WORKER_SPEED   = 55 * S;
    const BRUTE_SPEED    = 38 * S;
    const COLLECT_R      = 18 * S;
    const BRUTE_ATK_RATE = 8;
    const DROP_DMG       = 30;
    const NEST_INTERVAL  = 9;

    // --- Update particles ---
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.9;
      p.vy *= 0.9;
      p.life -= dt;
      if (p.life <= 0) this.particles.splice(i, 1);
    }

    // --- Nest spawning ---
    for (const nest of this._byType('insect-nest')) {
      let t = (this.nestSpawnTimers.get(nest) || NEST_INTERVAL) - dt;
      if (t <= 0) {
        t = NEST_INTERVAL + Math.random() * 4;
        const brute = {
          name: 'beetle-brute',
          x: nest.x + (Math.random() - 0.5) * 28 * S,
          y: nest.y + (Math.random() - 0.5) * 28 * S,
          width: 30 * S, height: 30 * S,
          type: 'beetle-brute', sprite: null
        };
        this.entities.push(brute);
        this.health.set(brute, 80);
        this.velocities.set(brute, { vx: 0, vy: 0 });
        evts.push({ type: 'state', key: 'brute_spawned', value: { x: brute.x, y: brute.y } });
      }
      this.nestSpawnTimers.set(nest, t);
    }

    // --- Sprayer towers fire at nearest beetle-brute in range ---
    const brutes = this._byType('beetle-brute');
    for (const tower of this._byType('sprayer-tower')) {
      let cd = (this.towerCooldowns.get(tower) || 0) - dt;
      const cx = tower.x + tower.width / 2;
      const cy = tower.y + tower.height / 2;
      const { entity: target, dist } = this._nearest({ x: cx, y: cy }, brutes);
      if (target && dist <= TOWER_RANGE && cd <= 0) {
        const drop = {
          name: 'pesticide-drop',
          x: cx, y: cy,
          width: 10 * S, height: 10 * S,
          type: 'pesticide-drop', sprite: null
        };
        this.entities.push(drop);
        this.dropTargets.set(drop, target);
        this.velocities.set(drop, { vx: 0, vy: 0 });
        cd = FIRE_RATE;
      }
      this.towerCooldowns.set(tower, cd);
    }

    // --- Move pesticide drops ---
    for (const drop of this._byType('pesticide-drop')) {
      const target = this.dropTargets.get(drop);
      if (!target || !this.entities.includes(target)) {
        this._remove(drop);
        continue;
      }
      const dx = (target.x + target.width / 2) - drop.x;
      const dy = (target.y + target.height / 2) - drop.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 10 * S) {
        // Hit brute
        let hp = (this.health.get(target) || 0) - DROP_DMG;
        this._spawnParticle(target.x + target.width / 2, target.y + target.height / 2, '#88ffaa');
        if (hp <= 0) {
          this._spawnParticle(target.x + target.width / 2, target.y + target.height / 2, '#ff6622');
          this._remove(target);
          evts.push({ type: 'score', value: 10 });
          evts.push({ type: 'state', key: 'brute_killed', value: { x: target.x, y: target.y } });
        } else {
          this.health.set(target, hp);
        }
        this._remove(drop);
      } else {
        drop.x += (dx / dist) * DROP_SPEED * dt;
        drop.y += (dy / dist) * DROP_SPEED * dt;
      }
    }

    // --- Move beetle-brutes toward nearest tower ---
    for (const brute of this._byType('beetle-brute')) {
      const towers = this._byType('sprayer-tower');
      const bcx = brute.x + brute.width / 2;
      const bcy = brute.y + brute.height / 2;
      const { entity: tower, dist } = this._nearest({ x: bcx, y: bcy }, towers);
      if (!tower) continue;
      const tcx = tower.x + tower.width / 2;
      const tcy = tower.y + tower.height / 2;
      const dx = tcx - bcx;
      const dy = tcy - bcy;
      if (dist > 6 * S) {
        brute.x += (dx / dist) * BRUTE_SPEED * dt;
        brute.y += (dy / dist) * BRUTE_SPEED * dt;
      } else {
        let hp = (this.health.get(tower) || 0) - BRUTE_ATK_RATE * dt;
        if (hp <= 0) {
          this._spawnParticle(tcx, tcy, '#00ccff');
          this._remove(tower);
          evts.push({ type: 'state', key: 'tower_destroyed', value: { x: tower.x, y: tower.y } });
          evts.push({ type: 'score', value: -20 });
        } else {
          this.health.set(tower, hp);
        }
      }
    }

    // --- Ant-workers collect gold coins and harvest flower-bushes ---
    const coins  = this._byType('gold-coin');
    const bushes = this._byType('flower-bush');
    for (const worker of this._byType('ant-worker')) {
      const wcx = worker.x + worker.width / 2;
      const wcy = worker.y + worker.height / 2;

      // Prefer coins, then bushes
      let tgt = null, tgtDist = Infinity;
      const { entity: coin, dist: cdist } = this._nearest({ x: wcx, y: wcy }, coins);
      if (coin) { tgt = coin; tgtDist = cdist; }
      if (!tgt) {
        const { entity: bush, dist: bdist } = this._nearest({ x: wcx, y: wcy }, bushes);
        if (bush) { tgt = bush; tgtDist = bdist; }
      }

      if (!tgt) continue;
      const tcx = tgt.x + tgt.width / 2;
      const tcy = tgt.y + tgt.height / 2;
      const dx = tcx - wcx;
      const dy = tcy - wcy;
      const dist = Math.hypot(dx, dy);

      if (dist > COLLECT_R) {
        worker.x += (dx / dist) * WORKER_SPEED * dt;
        worker.y += (dy / dist) * WORKER_SPEED * dt;
      } else {
        if (tgt.type === 'gold-coin') {
          this._spawnParticle(tcx, tcy, '#ffd700');
          this._remove(tgt);
          evts.push({ type: 'score', value: 25 });
          evts.push({ type: 'state', key: 'coin_collected', value: { x: tgt.x, y: tgt.y } });
        } else if (tgt.type === 'flower-bush') {
          let bt = (this.bushTimers.get(tgt) || 0) + dt;
          if (bt >= 3.0) {
            bt = 0;
            this._spawnParticle(tcx, tcy, '#66ff99');
            evts.push({ type: 'score', value: 5 });
            evts.push({ type: 'state', key: 'bush_harvested', value: { x: tgt.x, y: tgt.y } });
          }
          this.bushTimers.set(tgt, bt);
        }
      }
    }

    return evts;
  }

  _drawHealthBar(ctx, x, y, w, hp, maxHp) {
    const bh = 5 * S;
    const ratio = Math.max(0, Math.min(1, hp / maxHp));
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(x, y - bh - 2 * S, w, bh);
    ctx.fillStyle = ratio > 0.5 ? '#44ee44' : ratio > 0.25 ? '#ffaa22' : '#ff3333';
    ctx.fillRect(x, y - bh - 2 * S, w * ratio, bh);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 0.5 * S;
    ctx.strokeRect(x, y - bh - 2 * S, w, bh);
  }

  draw(ctx) {
    const TOWER_RANGE = 150 * S;
    ctx.save();

    // --- Tower range rings ---
    for (const tower of this._byType('sprayer-tower')) {
      const cx = tower.x + tower.width / 2;
      const cy = tower.y + tower.height / 2;
      const isSelected = this.selectedTower === tower;

      ctx.beginPath();
      ctx.arc(cx, cy, TOWER_RANGE, 0, Math.PI * 2);
      ctx.fillStyle = isSelected ? 'rgba(0,210,255,0.10)' : 'rgba(0,210,255,0.04)';
      ctx.fill();
      ctx.strokeStyle = isSelected ? 'rgba(0,210,255,0.70)' : 'rgba(0,210,255,0.25)';
      ctx.lineWidth = (isSelected ? 2 : 1) * S;
      ctx.setLineDash([6 * S, 4 * S]);
      ctx.stroke();
      ctx.setLineDash([]);

      const hp = this.health.get(tower) || 0;
      this._drawHealthBar(ctx, tower.x, tower.y, tower.width, hp, 100);
    }

    // --- Beetle-brute health bars ---
    for (const brute of this._byType('beetle-brute')) {
      const hp = this.health.get(brute) || 0;
      this._drawHealthBar(ctx, brute.x, brute.y, brute.width, hp, 80);
    }

    // --- Insect-nest health bars + spawn progress ring ---
    for (const nest of this._byType('insect-nest')) {
      const hp = this.health.get(nest) || 0;
      this._drawHealthBar(ctx, nest.x, nest.y, nest.width, hp, 150);

      const spawnT   = this.nestSpawnTimers.get(nest) || 9;
      const progress = 1 - Math.max(0, Math.min(1, spawnT / 9));
      const cx = nest.x + nest.width / 2;
      const cy = nest.y + nest.height / 2;
      const r  = nest.width * 0.55;

      ctx.beginPath();
      ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
      ctx.strokeStyle = `rgba(255,90,0,${0.4 + 0.5 * progress})`;
      ctx.lineWidth = 3 * S;
      ctx.stroke();
    }

    // --- Ant-worker collection aura ---
    for (const worker of this._byType('ant-worker')) {
      const pulse = 0.5 + 0.5 * Math.sin(this.globalTimer * 4);
      const cx = worker.x + worker.width / 2;
      const cy = worker.y + worker.height / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, (18 + 4 * pulse) * S, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,220,50,${0.35 + 0.25 * pulse})`;
      ctx.lineWidth = 1.5 * S;
      ctx.stroke();

      // Line to current target
      const coins  = this._byType('gold-coin');
      const bushes = this._byType('flower-bush');
      const { entity: coin }  = this._nearest({ x: cx, y: cy }, coins);
      const { entity: bush }  = this._nearest({ x: cx, y: cy }, bushes);
      const tgt = coin || bush;
      if (tgt) {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(tgt.x + tgt.width / 2, tgt.y + tgt.height / 2);
        ctx.strokeStyle = 'rgba(255,220,50,0.18)';
        ctx.lineWidth = 1 * S;
        ctx.setLineDash([4 * S, 4 * S]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // --- Flower-bush harvest progress arc ---
    for (const bush of this._byType('flower-bush')) {
      const t = this.bushTimers.get(bush) || 0;
      if (t > 0) {
        const prog = t / 3.0;
        const cx = bush.x + bush.width / 2;
        const cy = bush.y + bush.height / 2;
        ctx.beginPath();
        ctx.arc(cx, cy, bush.width * 0.6, -Math.PI / 2, -Math.PI / 2 + prog * Math.PI * 2);
        ctx.strokeStyle = 'rgba(80,255,120,0.85)';
        ctx.lineWidth = 3 * S;
        ctx.stroke();
      }
    }

    // --- Gold-coin glow pulse ---
    for (const coin of this._byType('gold-coin')) {
      const pulse = 0.5 + 0.5 * Math.sin(this.globalTimer * 3.5);
      const cx = coin.x + coin.width / 2;
      const cy = coin.y + coin.height / 2;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, (coin.width / 2 + 8 * S) * (1 + 0.2 * pulse));
      grad.addColorStop(0,   `rgba(255,230,50,${0.45 + 0.2 * pulse})`);
      grad.addColorStop(1,   'rgba(255,180,0,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, (coin.width / 2 + 10 * S) * (1 + 0.2 * pulse), 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // --- Pesticide drop visual ---
    for (const drop of this._byType('pesticide-drop')) {
      const cx = drop.x;
      const cy = drop.y;
      ctx.beginPath();
      ctx.arc(cx, cy, 6 * S, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(100,255,120,0.90)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy, 10 * S, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100,255,120,0.35)';
      ctx.lineWidth = 1.5 * S;
      ctx.stroke();
    }

    // --- Particles ---
    for (const p of this.particles) {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  handleInput(type, data) {
    if (type === 'click' || type === 'touchstart') {
      const { x, y } = data;
      let hit = false;
      for (const tower of this._byType('sprayer-tower')) {
        if (x >= tower.x && x <= tower.x + tower.width &&
            y >= tower.y && y <= tower.y + tower.height) {
          this.selectedTower = (this.selectedTower === tower) ? null : tower;
          hit = true;
          break;
        }
      }
      if (!hit) this.selectedTower = null;
    }

    if (type === 'keydown') {
      if (data.key === 'r' || data.code === 'KeyR') {
        // Reset all nest timers (emergency repel)
        for (const nest of this._byType('insect-nest')) {
          this.nestSpawnTimers.set(nest, 9);
        }
      }
      if (data.key === 'Escape') {
        this.selectedTower = null;
      }
    }
  }
}

// === GAME STATE & LAYOUT ===

// ── Entity arrays ───────────────────────────────────────────────────────────
const playerEntities = [];
const enemyEntities  = [];
const projectiles    = [];
const propEntities   = [];

// ── Winding enemy path (world-space, relative to W / H) ────────────────────
const path = [
  { x: -40,       y: H * 0.18 },
  { x: W * 0.22,  y: H * 0.18 },
  { x: W * 0.22,  y: H * 0.52 },
  { x: W * 0.58,  y: H * 0.52 },
  { x: W * 0.58,  y: H * 0.22 },
  { x: W * 0.82,  y: H * 0.22 },
  { x: W * 0.82,  y: H * 0.72 },
  { x: W + 40,    y: H * 0.72 },
];

// ── Core state ──────────────────────────────────────────────────────────────
let lives          = 20;
let level          = 1;
let resources      = 100;
let gameOver       = false;
let waveTimer      = 0;      // time accumulator for difficulty ramp
let spawnTimer     = 0;      // time accumulator for next enemy spawn
let spawnInterval  = 2.5;   // seconds between enemy spawns
let baseEnemySpeed = 55;    // base px/s (multiplied by S each frame)
let waveEnemyCount = 0;     // total enemies spawned so far
let _eid           = 0;
function _id() { return ++_eid; }

// ── Mechanic class instances ────────────────────────────────────────────────
const mechPlacement = new PlacementSystem(_toEntityArray({
  sprites: {
    'sprayer-tower':  sprite_sprayer_tower,
    'ant-worker':     sprite_ant_worker,
    'beetle-brute':   sprite_beetle_brute,
    'pesticide-drop': sprite_pesticide_drop,
    'insect-nest':    sprite_insect_nest,
    'gold-coin':      sprite_gold_coin,
    'grass-tile':     sprite_grass_tile,
    'dirt-path':      sprite_dirt_path,
    'flower-bush':    sprite_flower_bush,
  },
}));

const mechWave = new WaveSpawner(_toEntityArray({
  sprites: {
    'insect-nest':    sprite_insect_nest,
    'sprayer-tower':  sprite_sprayer_tower,
    'ant-worker':     sprite_ant_worker,
    'beetle-brute':   sprite_beetle_brute,
    'pesticide-drop': sprite_pesticide_drop,
    'gold-coin':      sprite_gold_coin,
  },
}));

const mechResource = new ResourceManager(_toEntityArray({
  sprites: {
    'sprayer-tower':  sprite_sprayer_tower,
    'ant-worker':     sprite_ant_worker,
    'beetle-brute':   sprite_beetle_brute,
    'pesticide-drop': sprite_pesticide_drop,
    'flower-bush':    sprite_flower_bush,
    'insect-nest':    sprite_insect_nest,
    'gold-coin':      sprite_gold_coin,
  },
}));

const mechanics = [mechPlacement, mechWave, mechResource];

// ── Initial prop entities ───────────────────────────────────────────────────
propEntities.push(
  { id: _id(), type: 'flower-bush', x: W * 0.06, y: H * 0.38, width: 32, height: 32 },
  { id: _id(), type: 'insect-nest', x: W * 0.87, y: H * 0.46, width: 48, height: 48 },
);


// === INPUT ===

// ── Turret placement cost ───────────────────────────────────────────────────
const TURRET_COST = 25;

// ── Helper: map a client-space point into canvas-space ──────────────────────
function _getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top)  * (H / rect.height),
  };
}

// ── Place a turret, or restart when game is over ─────────────────────────────
function _handlePlace(x, y) {
  if (gameOver) { location.reload(); return; }
  if (resources < TURRET_COST) return;
  resources -= TURRET_COST;
  playerEntities.push({
    id:        _id(),
    type:      'sprayer-tower',
    x,
    y,
    width:     32,
    height:    48,
    fireTimer: 0,
  });
}

// ── Mouse click ──────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', function(e) {
  const pos = _getCanvasPos(e.clientX, e.clientY);
  _handlePlace(pos.x, pos.y);
});

// ── Touch tap (also supports restart on game-over) ───────────────────────────
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const pos   = _getCanvasPos(touch.clientX, touch.clientY);
  _handlePlace(pos.x, pos.y);
}, { passive: false });

// ── Keyboard ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown', function(e) {
  // Restart with R when game is over
  if (gameOver) {
    if (e.key === 'r' || e.key === 'R') location.reload();
    return;
  }
  // Forward all other keys to every mechanic
  for (const mech of mechanics) {
    if (typeof mech.onKeyDown === 'function') mech.onKeyDown(e);
  }
});


// === GAME LOOP ===
let lastTime = 0;
if (typeof score === 'undefined') var score = 0;
const scoreEl = document.getElementById('score');

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  
// ── Accumulate timers ───────────────────────────────────────────────────────
waveTimer  += dt;
spawnTimer += dt;

// ── Difficulty ramp every 20 s ──────────────────────────────────────────────
if (waveTimer >= 20) {
  waveTimer      = 0;
  level++;
  spawnInterval  = Math.max(0.7,  spawnInterval  - 0.18);
  baseEnemySpeed = Math.min(130,  baseEnemySpeed + 7);
}

// ── Spawn enemy at path start ───────────────────────────────────────────────
if (spawnTimer >= spawnInterval) {
  spawnTimer = 0;
  waveEnemyCount++;
  const isBrute = level >= 2 && waveEnemyCount % 5 === 0;
  enemyEntities.push({
    id:        _id(),
    type:      isBrute ? 'beetle-brute' : 'ant-worker',
    x:         path[0].x,
    y:         path[0].y,
    width:     isBrute ? 48 : 32,
    height:    isBrute ? 56 : 48,
    pathIndex: 1,
    hp:        isBrute ? 3 : 1,
    maxHp:     isBrute ? 3 : 1,
    speed:     isBrute ? baseEnemySpeed * 0.65 : baseEnemySpeed,
  });
}

// ── Move enemies along waypoints ────────────────────────────────────────────
for (let i = enemyEntities.length - 1; i >= 0; i--) {
  const e  = enemyEntities[i];
  const wp = path[e.pathIndex];
  if (!wp) {
    // Enemy reached the end — penalise the player
    lives--;
    enemyEntities.splice(i, 1);
    if (lives <= 0) gameOver = true;
    continue;
  }
  const dx   = wp.x - e.x;
  const dy   = wp.y - e.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const step = e.speed * S * dt;
  if (dist <= step) {
    e.x = wp.x;
    e.y = wp.y;
    e.pathIndex++;
  } else {
    e.x += (dx / dist) * step;
    e.y += (dy / dist) * step;
  }
}

// ── Turret targeting and firing ─────────────────────────────────────────────
const FIRE_RATE    = 1.4;   // seconds between shots
const TURRET_RANGE = 160;   // unscaled px radius
for (const turret of playerEntities) {
  turret.fireTimer = (turret.fireTimer || 0) + dt;
  if (turret.fireTimer < FIRE_RATE) continue;

  let nearest = null, nearestDist = Infinity;
  for (const enemy of enemyEntities) {
    const dx = enemy.x - turret.x;
    const dy = enemy.y - turret.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (d < TURRET_RANGE * S && d < nearestDist) {
      nearestDist = d;
      nearest     = enemy;
    }
  }
  if (nearest) {
    turret.fireTimer = 0;
    const dx  = nearest.x - turret.x;
    const dy  = nearest.y - turret.y;
    const mag = Math.sqrt(dx * dx + dy * dy) || 1;
    const spd = 200 * S;
    projectiles.push({
      id:       _id(),
      x:        turret.x,
      y:        turret.y,
      width:    24,
      height:   24,
      vx:       (dx / mag) * spd,
      vy:       (dy / mag) * spd,
      targetId: nearest.id,
    });
  }
}

// ── Move projectiles and detect hits ────────────────────────────────────────
for (let p = projectiles.length - 1; p >= 0; p--) {
  const proj = projectiles[p];
  proj.x += proj.vx * dt;
  proj.y += proj.vy * dt;

  // Cull off-screen projectiles
  if (proj.x < -60 || proj.x > W + 60 || proj.y < -60 || proj.y > H + 60) {
    projectiles.splice(p, 1);
    continue;
  }

  let hit = false;
  for (let e = enemyEntities.length - 1; e >= 0; e--) {
    const enemy = enemyEntities[e];
    const dx = proj.x - enemy.x;
    const dy = proj.y - enemy.y;
    if (Math.sqrt(dx * dx + dy * dy) < 22 * S) {
      enemy.hp--;
      hit = true;
      if (enemy.hp <= 0) {
        score     += enemy.type === 'beetle-brute' ? 20 : 10;
        resources += enemy.type === 'beetle-brute' ? 15 : 8;
        enemyEntities.splice(e, 1);
      }
      break;
    }
  }
  if (hit) projectiles.splice(p, 1);
}

// ── Update mechanics and process emitted events ─────────────────────────────
for (const mech of mechanics) {
  if (typeof mech.update !== 'function') continue;
  const events = mech.update(dt);
  if (!Array.isArray(events)) continue;
  for (const ev of events) {
    if (!ev) continue;
    if (ev.type === 'score')                              score     += (ev.value || 0);
    if (ev.type === 'state' && ev.lives      != null)    lives      = ev.lives;
    if (ev.type === 'state' && ev.resources  != null)    resources  = ev.resources;
    if (ev.type === 'state' && ev.gameOver)               gameOver   = true;
  }
}

// Final gameOver guard (do NOT early-return; drawCode renders the overlay)
if (lives <= 0) gameOver = true;


  
// ── 1. Tile the entire canvas with grass ────────────────────────────────────
const tW   = 32 * S;
const tH   = 32 * S;
const cols = Math.ceil(W / tW) + 1;
const rows = Math.ceil(H / tH) + 1;
for (let r = 0; r < rows; r++) {
  for (let c = 0; c < cols; c++) {
    ctx.drawImage(sprite_grass_tile, c * tW, r * tH, tW, tH);
  }
}

// ── 2. Stamp dirt-path tiles along every path segment ──────────────────────
const ptSize = 38 * S;
const halfPt = ptSize / 2;
for (let seg = 0; seg < path.length - 1; seg++) {
  const a = path[seg], b = path[seg + 1];
  const dx  = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const steps = Math.ceil(len / (ptSize * 0.72));
  for (let s = 0; s <= steps; s++) {
    const t  = s / steps;
    const px = a.x + dx * t - halfPt;
    const py = a.y + dy * t - halfPt;
    ctx.drawImage(sprite_dirt_path, px, py, ptSize, ptSize);
  }
}

// ── 3. Prop entities (flower-bush / insect-nest) ────────────────────────────
for (const prop of propEntities) {
  const spr = prop.type === 'insect-nest' ? sprite_insect_nest : sprite_flower_bush;
  ctx.drawImage(spr, prop.x, prop.y, prop.width * S, prop.height * S);
}

// ── 4. Enemies (ant-worker / beetle-brute) ──────────────────────────────────
for (const enemy of enemyEntities) {
  const spr = enemy.type === 'beetle-brute' ? sprite_beetle_brute : sprite_ant_worker;
  const ew  = enemy.width  * S;
  const eh  = enemy.height * S;
  const ex  = enemy.x - ew / 2;
  const ey  = enemy.y - eh / 2;
  ctx.drawImage(spr, ex, ey, ew, eh);

  // HP bar for multi-hit enemies
  if (enemy.maxHp > 1) {
    const barW = ew * 0.82;
    const barX = enemy.x - barW / 2;
    const barY = ey - 8 * S;
    const barH = 5 * S;
    ctx.fillStyle = '#c00';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = '#3d3';
    ctx.fillRect(barX, barY, barW * (enemy.hp / enemy.maxHp), barH);
  }
}

// ── 5. Player turrets (sprayer-tower) ───────────────────────────────────────
for (const turret of playerEntities) {
  const tw = 32 * S, th = 48 * S;
  ctx.drawImage(sprite_sprayer_tower, turret.x - tw / 2, turret.y - th / 2, tw, th);
}

// ── 6. Projectiles (pesticide-drop) ─────────────────────────────────────────
for (const proj of projectiles) {
  const pw = 24 * S, ph = 24 * S;
  ctx.drawImage(sprite_pesticide_drop, proj.x - pw / 2, proj.y - ph / 2, pw, ph);
}

// ── 7. Mechanic visual overlays ──────────────────────────────────────────────
for (const mech of mechanics) {
  if (typeof mech.draw === 'function') mech.draw(ctx);
}

// ── 8. HUD ───────────────────────────────────────────────────────────────────
const fSize = Math.round(18 * S);
const hudY  = 28 * S;
ctx.save();
ctx.font         = `bold ${fSize}px monospace`;
ctx.fillStyle    = '#ffffff';
ctx.shadowColor  = '#000000';
ctx.shadowBlur   = 5;
ctx.textBaseline = 'middle';

ctx.fillText(`\u2665 ${lives}`,      12  * S, hudY);
ctx.fillText(`LVL ${level}`,         110 * S, hudY);
ctx.fillText(`\u2605 ${score}`,      210 * S, hudY);
// gold-coin icon + resource count
ctx.drawImage(sprite_gold_coin,      292 * S, hudY - 10 * S, 20 * S, 20 * S);
ctx.fillText(`${resources}`,         318 * S, hudY);

ctx.restore();

// ── 9. Game-Over overlay ─────────────────────────────────────────────────────
if (gameOver) {
  ctx.save();

  // Dim backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor  = '#000';
  ctx.shadowBlur   = 10;

  // "GAME OVER" heading
  ctx.font      = `bold ${Math.round(54 * S)}px monospace`;
  ctx.fillStyle = '#ff3a3a';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 44 * S);

  // Final score
  ctx.font      = `${Math.round(26 * S)}px monospace`;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 14 * S);

  // Restart hint
  ctx.font      = `${Math.round(18 * S)}px monospace`;
  ctx.fillStyle = '#ffd700';
  ctx.fillText('Tap / Click  \u2022  or press R  to restart', W / 2, H / 2 + 58 * S);

  ctx.restore();
}


  scoreEl.textContent = 'Score: ' + score;
  requestAnimationFrame(gameLoop);
}

// === BOOT ===

// ── Additional decorative props spread across the map ───────────────────────
propEntities.push(
  { id: _id(), type: 'flower-bush', x: W * 0.38, y: H * 0.63, width: 32, height: 32 },
  { id: _id(), type: 'flower-bush', x: W * 0.70, y: H * 0.40, width: 32, height: 32 },
  { id: _id(), type: 'insect-nest', x: W * 0.12, y: H * 0.58, width: 48, height: 48 },
);

// ── Sanity-check the enemy path ──────────────────────────────────────────────
if (path.length < 4) {
  console.error('[Boot] Path requires at least 4 waypoints — routing will be broken.');
} else {
  console.log(`[Boot] Path OK — ${path.length} waypoints defined.`);
}

console.log('Game initialized');

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
