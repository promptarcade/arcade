// --- Mechanic: PlacementSystem ---
class PlacementSystem {
  constructor(entities) {
    this.entities = entities;

    // --- placement ghost state ---
    this.selectedType = null;   // type string being placed, or null
    this.ghostX = 0;
    this.ghostY = 0;
    this.ghostVisible = false;

    // --- UI / feedback ---
    this.pulseTimer = 0;
    this.flashTimer = 0;
    this.flashValid = true;
    this.selectedEntity = null; // existing entity clicked for range display

    // --- internal counters ---
    this.placedCount = 0;

    // --- entity classification ---
    this.TOWER_TYPES   = ['acorn-launcher', 'sunflower-cannon'];
    this.UNIT_TYPES    = ['ant-marcher'];
    this.ENEMY_TYPES   = ['beetle-brute'];
    this.PROJ_TYPES    = ['acorn-shot'];
    this.TERRAIN_TYPES = ['dirt-path', 'grass-tile', 'log-barricade', 'giant-mushroom'];
    this.PLACEABLE     = [...this.TOWER_TYPES, ...this.UNIT_TYPES];

    // --- range map (baseline px, scaled by S at use-time) ---
    this.RANGE_MAP = {
      'acorn-launcher':  120,
      'sunflower-cannon': 160,
      'ant-marcher':      70
    };

    // --- per-entity private state stored directly on entity objects ---
    this._initEntities();
  }

  // ── helpers ────────────────────────────────────────────────────────────────

  _initEntities() {
    for (const e of this.entities) {
      if (this.ENEMY_TYPES.includes(e.type)) {
        if (e._hp === undefined) e._hp = 3;
        if (e._maxHp === undefined) e._maxHp = 3;
      }
      if (this.PROJ_TYPES.includes(e.type)) {
        if (e._active === undefined) e._active = false;
        if (e._vx === undefined) { e._vx = 0; e._vy = 0; }
      }
      if (this.TOWER_TYPES.includes(e.type)) {
        if (e._shootTimer === undefined) e._shootTimer = 0;
      }
      if (this.UNIT_TYPES.includes(e.type)) {
        if (e._pathTarget === undefined) e._pathTarget = null;
        if (e._patrolTimer === undefined) e._patrolTimer = 0;
      }
    }
  }

  _cellSize() { return 60 * S; }

  _snapToGrid(x, y) {
    const cs = this._cellSize();
    return {
      x: Math.floor(x / cs) * cs + cs / 2,
      y: Math.floor(y / cs) * cs + cs / 2
    };
  }

  _isValidPlacement(x, y) {
    if (x < 20 * S || x > W - 20 * S || y < 20 * S || y > H - 20 * S) return false;
    for (const e of this.entities) {
      if (e.type === 'dirt-path') {
        if (Math.hypot(e.x - x, e.y - y) < 48 * S) return false;
      }
      if (this.PLACEABLE.includes(e.type) && e.x > -500) {
        if (Math.hypot(e.x - x, e.y - y) < 52 * S) return false;
      }
      if (e.type === 'log-barricade' || e.type === 'giant-mushroom') {
        if (Math.hypot(e.x - x, e.y - y) < 40 * S) return false;
      }
    }
    return true;
  }

  _byType(type) { return this.entities.filter(e => e.type === type); }

  _byTypes(types) { return this.entities.filter(e => types.includes(e.type)); }

  _fireProjectile(fromX, fromY, target) {
    const pool = this._byType('acorn-shot');
    const acorn = pool.find(a => !a._active);
    if (!acorn) return;
    const dx = target.x - fromX;
    const dy = target.y - fromY;
    const dist = Math.hypot(dx, dy) || 1;
    const speed = 220 * S;
    acorn._active  = true;
    acorn.x        = fromX;
    acorn.y        = fromY;
    acorn._vx      = (dx / dist) * speed;
    acorn._vy      = (dy / dist) * speed;
    acorn._target  = target;
  }

  // ── update ─────────────────────────────────────────────────────────────────

  update(dt) {
    const events = [];
    this.pulseTimer += dt;
    if (this.flashTimer > 0) this.flashTimer = Math.max(0, this.flashTimer - dt);

    const paths    = this._byType('dirt-path');
    const marchers = this._byType('ant-marcher');
    const towers   = this._byTypes(this.TOWER_TYPES);
    const beetles  = this._byType('beetle-brute').filter(b => b.x > -900);
    const acorns   = this._byType('acorn-shot');

    // ── ant-marchers patrol between path nodes ──
    for (const m of marchers) {
      if (m.x < -500) continue;
      m._patrolTimer = (m._patrolTimer || 0) + dt;

      // pick a new path target every 3 s or when close enough
      if (!m._pathTarget || m._patrolTimer > 3 || Math.hypot(m._pathTarget.x - m.x, m._pathTarget.y - m.y) < 12 * S) {
        m._patrolTimer = 0;
        if (paths.length > 0) {
          m._pathTarget = paths[Math.floor(Math.random() * paths.length)];
        }
      }

      if (m._pathTarget) {
        const dx   = m._pathTarget.x - m.x;
        const dy   = m._pathTarget.y - m.y;
        const dist = Math.hypot(dx, dy) || 1;
        const speed = 45 * S;
        m.x += (dx / dist) * speed * dt;
        m.y += (dy / dist) * speed * dt;
      }
    }

    // ── towers shoot at nearest beetle in range ──
    for (const tower of towers) {
      if (tower.x < -500) continue;
      tower._shootTimer -= dt;
      const range    = (this.RANGE_MAP[tower.type] || 120) * S;
      const cooldown = tower.type === 'sunflower-cannon' ? 1.0 : 1.8;

      let nearest = null, nearestDist = Infinity;
      for (const b of beetles) {
        const d = Math.hypot(b.x - tower.x, b.y - tower.y);
        if (d < range && d < nearestDist) { nearestDist = d; nearest = b; }
      }

      if (nearest && tower._shootTimer <= 0) {
        tower._shootTimer = cooldown;
        this._fireProjectile(tower.x, tower.y, nearest);
      }
    }

    // ── move acorn-shots, check beetle hits ──
    for (const acorn of acorns) {
      if (!acorn._active) continue;
      acorn.x += acorn._vx * dt;
      acorn.y += acorn._vy * dt;

      // out of bounds
      if (acorn.x < -10 || acorn.x > W + 10 || acorn.y < -10 || acorn.y > H + 10) {
        acorn._active = false;
        acorn.x = -2000;
        continue;
      }

      // hit detection
      for (const b of beetles) {
        if (Math.hypot(b.x - acorn.x, b.y - acorn.y) < 18 * S) {
          acorn._active = false;
          acorn.x = -2000;
          b._hp = (b._hp || 1) - 1;
          if (b._hp <= 0) {
            b.x = -2000;
            b._hp = b._maxHp || 3;    // reset for pool reuse
            events.push({ type: 'score', value: 10 });
          }
          break;
        }
      }
    }

    // ── beetle-brutes march toward marchers / left edge ──
    for (const b of beetles) {
      if (!b._hp) b._hp = b._maxHp || 3;
      const speed = 28 * S;

      // look for closest ant-marcher
      let target = null, targetDist = Infinity;
      for (const m of marchers) {
        if (m.x < -500) continue;
        const d = Math.hypot(m.x - b.x, m.y - b.y);
        if (d < 180 * S && d < targetDist) { targetDist = d; target = m; }
      }

      if (target) {
        const dx = target.x - b.x;
        const dy = target.y - b.y;
        const dist = Math.hypot(dx, dy) || 1;
        b.x += (dx / dist) * speed * dt;
        b.y += (dy / dist) * speed * dt;

        // trample — push marcher back slightly
        if (targetDist < 22 * S) {
          target.x += (dx / dist) * 12 * S * dt;
          events.push({ type: 'state', key: 'beetleContact', value: true });
        }
      } else {
        b.x -= speed * dt;  // march left across screen
      }

      // breach
      if (b.x < -40 * S) {
        b.x = W + 60 * S;
        b._hp = b._maxHp || 3;
        events.push({ type: 'state', key: 'breach', value: true });
        events.push({ type: 'score', value: -5 });
      }
    }

    return events;
  }

  // ── draw ───────────────────────────────────────────────────────────────────

  draw(ctx) {
    const pulse = (Math.sin(this.pulseTimer * 3) + 1) / 2;
    const cs    = this._cellSize();

    // ── grid overlay while placing ──
    if (this.selectedType) {
      ctx.save();
      ctx.strokeStyle = 'rgba(200,230,200,0.18)';
      ctx.lineWidth   = 1;
      for (let gx = 0; gx <= W; gx += cs) {
        ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
      }
      for (let gy = 0; gy <= H; gy += cs) {
        ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
      }
      ctx.restore();

      // ghost preview
      if (this.ghostVisible) {
        const valid   = this._isValidPlacement(this.ghostX, this.ghostY);
        const alpha   = 0.45 + pulse * 0.25;
        const range   = (this.RANGE_MAP[this.selectedType] || 0) * S;
        const half    = cs * 0.45;

        ctx.save();
        ctx.globalAlpha = alpha;

        // cell fill
        ctx.fillStyle   = valid ? 'rgba(60,220,100,0.35)' : 'rgba(220,50,50,0.35)';
        ctx.strokeStyle = valid ? 'rgba(60,220,100,0.9)'  : 'rgba(220,50,50,0.9)';
        ctx.lineWidth   = 2 * S;
        ctx.fillRect(this.ghostX - half, this.ghostY - half, half * 2, half * 2);
        ctx.strokeRect(this.ghostX - half, this.ghostY - half, half * 2, half * 2);

        // range ring
        if (range > 0) {
          ctx.beginPath();
          ctx.arc(this.ghostX, this.ghostY, range, 0, Math.PI * 2);
          ctx.strokeStyle = valid ? 'rgba(60,220,100,0.55)' : 'rgba(220,50,50,0.4)';
          ctx.lineWidth   = 1.5 * S;
          ctx.setLineDash([6 * S, 5 * S]);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = alpha * 0.08;
          ctx.fillStyle   = valid ? '#40ff80' : '#ff4040';
          ctx.fill();
        }

        ctx.restore();
      }
    }

    // ── range ring for selected existing tower ──
    if (this.selectedEntity && this.selectedEntity.x > -500) {
      const range = (this.RANGE_MAP[this.selectedEntity.type] || 0) * S;
      if (range > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.selectedEntity.x, this.selectedEntity.y, range, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,210,40,${0.45 + pulse * 0.45})`;
        ctx.lineWidth   = 2 * S;
        ctx.setLineDash([7 * S, 5 * S]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle   = 'rgba(255,210,40,0.07)';
        ctx.fill();

        // selection ring on entity
        ctx.beginPath();
        ctx.arc(this.selectedEntity.x, this.selectedEntity.y, 22 * S + pulse * 4 * S, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,210,40,${0.5 + pulse * 0.4})`;
        ctx.lineWidth   = 2 * S;
        ctx.setLineDash([]);
        ctx.stroke();
        ctx.restore();
      }
    }

    // ── health bars for beetle-brutes ──
    for (const e of this.entities) {
      if (e.type !== 'beetle-brute' || e.x < -100) continue;
      const hp    = e._hp    !== undefined ? e._hp    : 3;
      const maxHp = e._maxHp !== undefined ? e._maxHp : 3;
      const bw    = 42 * S;
      const bh    = 6  * S;
      const bx    = e.x - bw / 2;
      const by    = e.y - (e.height || 44 * S) / 2 - 10 * S;
      const ratio = Math.max(0, hp / maxHp);

      ctx.save();
      // background
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
      // fill
      ctx.fillStyle = ratio > 0.55 ? '#44e844' : ratio > 0.25 ? '#f0c030' : '#e83030';
      ctx.fillRect(bx, by, bw * ratio, bh);
      // border
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth   = 1;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.restore();
    }

    // ── draw active acorn-shots (small acorn sprite) ──
    for (const e of this.entities) {
      if (e.type !== 'acorn-shot' || !e._active || e.x < -100) continue;
      ctx.save();
      ctx.translate(e.x, e.y);
      const r = 5 * S;
      // body
      ctx.fillStyle   = '#8B5E3C';
      ctx.beginPath();
      ctx.ellipse(0, r * 0.4, r * 0.75, r, 0, 0, Math.PI * 2);
      ctx.fill();
      // cap
      ctx.fillStyle   = '#5a3a1a';
      ctx.beginPath();
      ctx.ellipse(0, -r * 0.5, r * 0.9, r * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();
      // stem
      ctx.strokeStyle = '#2d5a1b';
      ctx.lineWidth   = 1.5 * S;
      ctx.beginPath();
      ctx.moveTo(0, -r);
      ctx.lineTo(2 * S, -r * 1.8);
      ctx.stroke();
      ctx.restore();
    }

    // ── placement flash feedback ──
    if (this.flashTimer > 0 && this.ghostVisible) {
      ctx.save();
      const alpha = (this.flashTimer / 0.35) * (this.flashValid ? 0.28 : 0.45);
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = this.flashValid ? '#40ff80' : '#ff3030';
      const half = cs * 0.45;
      ctx.fillRect(this.ghostX - half, this.ghostY - half, half * 2, half * 2);
      ctx.restore();
    }

    // ── HUD strip while placing ──
    if (this.selectedType) {
      const pad    = 8 * S;
      const fsize  = Math.max(11, 12 * S);
      const label  = `Placing: ${this.selectedType}   [Click] place   [Esc] cancel`;
      ctx.save();
      ctx.font        = `${fsize}px monospace`;
      const tw        = ctx.measureText(label).width;
      const bx2       = W / 2 - tw / 2 - pad;
      const by2       = H - 36 * S;
      const bw2       = tw + pad * 2;
      const bh2       = fsize + pad * 1.5;
      ctx.fillStyle   = 'rgba(0,0,0,0.65)';
      ctx.beginPath();
      ctx.roundRect(bx2, by2, bw2, bh2, 5 * S);
      ctx.fill();
      ctx.fillStyle   = '#d4f0c0';
      ctx.fillText(label, bx2 + pad, by2 + bh2 - pad * 0.85);
      ctx.restore();
    }
  }

  // ── handleInput ────────────────────────────────────────────────────────────

  handleInput(type, data) {
    if (type === 'keydown') {
      if (data.code === 'Escape') {
        this.selectedType    = null;
        this.ghostVisible    = false;
        this.selectedEntity  = null;
      }
      // number-key shortcuts to start placing
      const keyMap = {
        Digit1: 'acorn-launcher',
        Digit2: 'sunflower-cannon',
        Digit3: 'ant-marcher'
      };
      if (keyMap[data.code]) {
        this.selectedType   = keyMap[data.code];
        this.ghostVisible   = false;
        this.selectedEntity = null;
      }
    }

    if (type === 'mousemove') {
      if (this.selectedType && data.x !== undefined) {
        const snapped      = this._snapToGrid(data.x, data.y);
        this.ghostX        = snapped.x;
        this.ghostY        = snapped.y;
        this.ghostVisible  = true;
      }
    }

    if (type === 'click' || type === 'touchstart') {
      const px = data.x;
      const py = data.y;

      if (this.selectedType) {
        const snapped = this._snapToGrid(px, py);
        const valid   = this._isValidPlacement(snapped.x, snapped.y);

        // update ghost to click point regardless
        this.ghostX       = snapped.x;
        this.ghostY       = snapped.y;
        this.ghostVisible = true;

        if (valid) {
          // find a pooled (off-screen) entity of this type to activate
          const pool = this.entities.filter(e => e.type === this.selectedType && e.x < -500);
          if (pool.length > 0) {
            const e  = pool[0];
            e.x      = snapped.x;
            e.y      = snapped.y;
            // init runtime fields for fresh placement
            if (this.TOWER_TYPES.includes(e.type))  e._shootTimer  = 0;
            if (this.UNIT_TYPES.includes(e.type))   { e._pathTarget = null; e._patrolTimer = 0; }
            this.placedCount++;
          }
          this.flashValid   = true;
          this.flashTimer   = 0.35;
          this.selectedType = null;
          this.ghostVisible = false;
        } else {
          this.flashValid = false;
          this.flashTimer = 0.35;
        }

      } else {
        // deselect previous
        this.selectedEntity = null;

        // try to select an existing placeable entity
        for (const e of this.entities) {
          if (!this.PLACEABLE.includes(e.type) || e.x < -500) continue;
          if (Math.hypot(e.x - px, e.y - py) < 28 * S) {
            this.selectedEntity = e;
            break;
          }
        }
      }

      // keep ghost position synced on move-less devices
      if (this.selectedType) {
        const snapped     = this._snapToGrid(px, py);
        this.ghostX       = snapped.x;
        this.ghostY       = snapped.y;
        this.ghostVisible = true;
      }
    }
  }
}


// --- Mechanic: WaveSpawningSystem ---
class WaveSpawningSystem {
  constructor(entities) {
    this.entities = entities;
    this.wave = 0;
    this.waveTimer = 4;
    this.waveInterval = 22;
    this.waveInProgress = false;
    this.spawnQueue = [];
    this.spawnDelay = 0;
    this.spawnInterval = 1.4;
    this.enemiesAlive = 0;
    this.totalScore = 0;
    this._nextId = 1000;
    this._enemyHp = {};
    this._shootTimers = {};
    this._hoveredDefender = null;
    this._fastForward = false;
    this._flashMessages = [];
    this._waveBanner = null;
    this._shootInterval = 2.4;

    // Assign IDs and health to any pre-existing enemies
    this.entities.forEach(e => {
      if (!e._wsId) e._wsId = this._nextId++;
      if (e.type === 'ant-marcher') this._enemyHp[e._wsId] = 3;
      else if (e.type === 'beetle-brute') this._enemyHp[e._wsId] = 7;
    });
  }

  _id(e) {
    if (!e._wsId) e._wsId = this._nextId++;
    return e._wsId;
  }

  _enemies() {
    return this.entities.filter(e => e.type === 'ant-marcher' || e.type === 'beetle-brute');
  }

  _defenders() {
    return this.entities.filter(e => e.type === 'acorn-launcher' || e.type === 'sunflower-cannon');
  }

  _shots() {
    return this.entities.filter(e => e.type === 'acorn-shot');
  }

  _paths() {
    return this.entities.filter(e => e.type === 'dirt-path');
  }

  _spawnEnemy(type) {
    const paths = this._paths();
    let spawnY = H * 0.5;
    if (paths.length > 0) {
      const p = paths[Math.floor(Math.random() * paths.length)];
      spawnY = p.y + (Math.random() - 0.5) * (p.height || 40 * S) * 0.4;
    } else {
      spawnY = H * (0.3 + Math.random() * 0.4);
    }
    const sz = (type === 'beetle-brute' ? 46 : 30) * S;
    const e = {
      _wsId: this._nextId++,
      name: type + '-w' + this.wave + '-' + this._nextId,
      x: W + sz,
      y: spawnY,
      width: sz,
      height: sz,
      type: type,
      sprite: type,
      _speed: (type === 'beetle-brute' ? 28 : 52) * S,
    };
    this._enemyHp[e._wsId] = type === 'beetle-brute' ? 7 : 3;
    this.entities.push(e);
    this.enemiesAlive++;
    return e;
  }

  _spawnShot(shooter, target) {
    const sz = 10 * S;
    const dx = target.x - shooter.x;
    const dy = target.y - shooter.y;
    const len = Math.hypot(dx, dy) || 1;
    const spd = 190 * S;
    const proj = {
      _wsId: this._nextId++,
      name: 'acorn-shot-' + this._nextId,
      x: shooter.x,
      y: shooter.y,
      width: sz,
      height: sz,
      type: 'acorn-shot',
      sprite: 'acorn-shot',
      _vx: (dx / len) * spd,
      _vy: (dy / len) * spd,
      _damage: shooter.type === 'sunflower-cannon' ? 2 : 1,
    };
    this.entities.push(proj);
    return proj;
  }

  _buildWaveQueue() {
    const total = 3 + this.wave * 2;
    const q = [];
    for (let i = 0; i < total; i++) {
      const isBrute = this.wave >= 2 && i % Math.max(2, 5 - this.wave) === 0;
      q.push(isBrute ? 'beetle-brute' : 'ant-marcher');
    }
    return q;
  }

  update(dt) {
    if (this._fastForward) dt = Math.min(dt * 2, 0.1);
    const events = [];
    const toRemove = new Set();

    // Wave banner lifetime
    if (this._waveBanner) {
      this._waveBanner.life -= dt;
      if (this._waveBanner.life <= 0) this._waveBanner = null;
    }

    // Between-wave countdown or start
    if (!this.waveInProgress) {
      this.waveTimer -= dt;
      if (this.waveTimer <= 0) {
        this.wave++;
        this.waveInProgress = true;
        this.spawnDelay = 0;
        this.spawnQueue = this._buildWaveQueue();
        this.enemiesAlive = 0;
        this._waveBanner = { text: 'Wave ' + this.wave, life: 2.5, maxLife: 2.5 };
        events.push({ type: 'state', key: 'wave', value: this.wave });
        events.push({ type: 'state', key: 'waveStarted', value: true });
      }
    }

    // Drain spawn queue
    if (this.waveInProgress && this.spawnQueue.length > 0) {
      this.spawnDelay -= dt;
      if (this.spawnDelay <= 0) {
        this._spawnEnemy(this.spawnQueue.shift());
        this.spawnDelay = this.spawnInterval * (0.85 + Math.random() * 0.3);
      }
    }

    // Move enemies left
    const enemies = this._enemies();
    enemies.forEach(enemy => {
      const id = this._id(enemy);
      enemy.x -= (enemy._speed || 50 * S) * dt;
      if (enemy.x + enemy.width * 0.5 < 0) {
        toRemove.add(id);
        this.enemiesAlive = Math.max(0, this.enemiesAlive - 1);
        events.push({ type: 'state', key: 'enemyReached', value: 1 });
      }
    });

    // Defenders shoot
    const defenders = this._defenders();
    defenders.forEach(def => {
      const did = this._id(def);
      if (this._shootTimers[did] === undefined) this._shootTimers[did] = Math.random() * this._shootInterval;
      this._shootTimers[did] -= dt;
      if (this._shootTimers[did] <= 0) {
        const range = (def.type === 'sunflower-cannon' ? 230 : 175) * S;
        let nearest = null, nearestDist = Infinity;
        enemies.forEach(enemy => {
          if (toRemove.has(this._id(enemy))) return;
          const d = Math.hypot(def.x - enemy.x, def.y - enemy.y);
          if (d < range && d < nearestDist) { nearestDist = d; nearest = enemy; }
        });
        if (nearest) {
          this._spawnShot(def, nearest);
          const reload = this._shootInterval / (def.type === 'sunflower-cannon' ? 1.6 : 1.0);
          this._shootTimers[did] = reload * (0.9 + Math.random() * 0.2);
        } else {
          this._shootTimers[did] = 0.3;
        }
      }
    });

    // Move projectiles & check hits
    const shots = this._shots();
    shots.forEach(proj => {
      const pid = this._id(proj);
      if (toRemove.has(pid)) return;
      proj.x += (proj._vx || 0) * dt;
      proj.y += (proj._vy || 0) * dt;
      if (proj.x < -proj.width || proj.x > W + proj.width || proj.y < -proj.height || proj.y > H + proj.height) {
        toRemove.add(pid);
        return;
      }
      enemies.forEach(enemy => {
        const eid = this._id(enemy);
        if (toRemove.has(pid) || toRemove.has(eid)) return;
        const dist = Math.hypot(proj.x - enemy.x, proj.y - enemy.y);
        const hitRadius = (proj.width + enemy.width) * 0.45;
        if (dist < hitRadius) {
          toRemove.add(pid);
          const dmg = proj._damage || 1;
          this._enemyHp[eid] = (this._enemyHp[eid] || 1) - dmg;
          if (this._enemyHp[eid] <= 0) {
            toRemove.add(eid);
            this.enemiesAlive = Math.max(0, this.enemiesAlive - 1);
            const pts = enemy.type === 'beetle-brute' ? 20 : 10;
            this.totalScore += pts;
            events.push({ type: 'score', value: pts });
            this._flashMessages.push({ text: '+' + pts, x: enemy.x, y: enemy.y - 18 * S, life: 0.9, maxLife: 0.9, vy: -38 * S });
            delete this._enemyHp[eid];
          }
        }
      });
    });

    // Purge removed entities
    if (toRemove.size > 0) {
      for (let i = this.entities.length - 1; i >= 0; i--) {
        if (toRemove.has(this._id(this.entities[i]))) {
          this.entities.splice(i, 1);
        }
      }
    }

    // Wave complete check
    if (this.waveInProgress && this.spawnQueue.length === 0 && this.enemiesAlive <= 0 && this._enemies().length === 0) {
      this.waveInProgress = false;
      this.waveTimer = this.waveInterval;
      events.push({ type: 'state', key: 'waveComplete', value: this.wave });
      events.push({ type: 'state', key: 'nextWaveIn', value: this.waveInterval });
      this._flashMessages.push({ text: 'Wave ' + this.wave + ' Clear!', x: W * 0.5, y: H * 0.4, life: 2.0, maxLife: 2.0, vy: -12 * S, big: true });
    }

    // Age flash messages
    for (let i = this._flashMessages.length - 1; i >= 0; i--) {
      const m = this._flashMessages[i];
      m.life -= dt;
      m.y += (m.vy || 0) * dt;
      if (m.life <= 0) this._flashMessages.splice(i, 1);
    }

    return events;
  }

  draw(ctx) {
    const enemies = this._enemies();
    const defenders = this._defenders();
    const pad = 10 * S;

    // Range ring for selected defender
    if (this._hoveredDefender) {
      const def = this._hoveredDefender;
      const range = (def.type === 'sunflower-cannon' ? 230 : 175) * S;
      ctx.save();
      ctx.beginPath();
      ctx.arc(def.x, def.y, range, 0, Math.PI * 2);
      ctx.strokeStyle = def.type === 'sunflower-cannon' ? 'rgba(255,210,40,0.55)' : 'rgba(80,210,90,0.55)';
      ctx.lineWidth = 2 * S;
      ctx.setLineDash([7 * S, 5 * S]);
      ctx.stroke();
      ctx.fillStyle = def.type === 'sunflower-cannon' ? 'rgba(255,210,40,0.06)' : 'rgba(80,210,90,0.06)';
      ctx.fill();
      ctx.restore();
    }

    // Health bars over enemies
    enemies.forEach(enemy => {
      const id = this._id(enemy);
      const maxHp = enemy.type === 'beetle-brute' ? 7 : 3;
      const hp = this._enemyHp[id] !== undefined ? this._enemyHp[id] : maxHp;
      const ratio = Math.max(0, hp / maxHp);
      const bw = enemy.width * 1.1;
      const bh = 5 * S;
      const bx = enemy.x - bw * 0.5;
      const by = enemy.y - enemy.height * 0.5 - 9 * S;

      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bx, by, bw, bh);

      const col = ratio > 0.55 ? '#4cdf55' : ratio > 0.28 ? '#ff9b20' : '#f03030';
      ctx.fillStyle = col;
      ctx.fillRect(bx, by, bw * ratio, bh);

      ctx.strokeStyle = 'rgba(0,0,0,0.7)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, bh);
    });

    // HUD panel — top-right
    const panelW = 148 * S;
    const panelH = 44 * S;
    const panelX = W - panelW - pad;
    ctx.save();
    ctx.fillStyle = 'rgba(10,10,10,0.62)';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(panelX, pad, panelW, panelH, 6 * S) : ctx.rect(panelX, pad, panelW, panelH);
    ctx.fill();

    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    if (this.waveInProgress) {
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${14 * S}px sans-serif`;
      ctx.fillText('Wave ' + this.wave, panelX + panelW - 8 * S, pad + 5 * S);
      ctx.fillStyle = '#ffcc44';
      ctx.font = `${11 * S}px sans-serif`;
      const remaining = this.enemiesAlive + this.spawnQueue.length;
      ctx.fillText('Enemies left: ' + remaining, panelX + panelW - 8 * S, pad + 24 * S);
    } else if (this.wave > 0) {
      ctx.fillStyle = '#88ff99';
      ctx.font = `bold ${13 * S}px sans-serif`;
      ctx.fillText('Wave ' + this.wave + ' Clear!', panelX + panelW - 8 * S, pad + 5 * S);
      ctx.fillStyle = '#aaffbb';
      ctx.font = `${11 * S}px sans-serif`;
      ctx.fillText('Next wave: ' + Math.ceil(this.waveTimer) + 's', panelX + panelW - 8 * S, pad + 24 * S);
    } else {
      ctx.fillStyle = '#ffdd55';
      ctx.font = `bold ${13 * S}px sans-serif`;
      ctx.fillText('Wave 1 starting in:', panelX + panelW - 8 * S, pad + 5 * S);
      ctx.font = `bold ${16 * S}px sans-serif`;
      ctx.fillStyle = '#ffffff';
      ctx.fillText(Math.ceil(this.waveTimer) + 's', panelX + panelW - 8 * S, pad + 22 * S);
    }
    ctx.restore();

    // Score display — top-left
    ctx.save();
    ctx.fillStyle = 'rgba(10,10,10,0.62)';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(pad, pad, 110 * S, 30 * S, 6 * S) : ctx.rect(pad, pad, 110 * S, 30 * S);
    ctx.fill();
    ctx.fillStyle = '#ffe44d';
    ctx.font = `bold ${13 * S}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('Score: ' + this.totalScore, pad + 8 * S, pad + 15 * S);
    ctx.restore();

    // Fast-forward indicator
    if (this._fastForward) {
      ctx.save();
      ctx.fillStyle = 'rgba(255,200,0,0.85)';
      ctx.font = `bold ${13 * S}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('⏩ 2×', W * 0.5, pad);
      ctx.restore();
    }

    // Wave banner (big centre announcement)
    if (this._waveBanner) {
      const b = this._waveBanner;
      const alpha = Math.min(1, b.life / 0.4, (b.maxLife - b.life) / 0.3 * 2 + 0.1);
      const scale = 0.85 + 0.15 * Math.min(1, (b.maxLife - b.life) / 0.25);
      ctx.save();
      ctx.globalAlpha = Math.min(1, alpha);
      ctx.translate(W * 0.5, H * 0.28);
      ctx.scale(scale, scale);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `bold ${36 * S}px sans-serif`;
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillText(b.text, 2 * S, 2 * S);
      ctx.fillStyle = '#ffee55';
      ctx.fillText(b.text, 0, 0);
      ctx.restore();
    }

    // Score pop-ups
    ctx.save();
    this._flashMessages.forEach(m => {
      const alpha = Math.max(0, m.life / m.maxLife);
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (m.big) {
        ctx.font = `bold ${24 * S}px sans-serif`;
        ctx.fillStyle = '#aaffaa';
        ctx.fillText(m.text, m.x, m.y);
      } else {
        ctx.font = `bold ${16 * S}px sans-serif`;
        ctx.fillStyle = '#ffe44d';
        ctx.fillText(m.text, m.x, m.y);
      }
    });
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  handleInput(type, data) {
    if (type === 'click' || type === 'touchstart') {
      const { x, y } = data;
      const defenders = this._defenders();
      let hit = null;
      defenders.forEach(def => {
        const r = (def.width || 38 * S) * 0.6;
        if (Math.hypot(def.x - x, def.y - y) < r) hit = def;
      });
      this._hoveredDefender = (hit && hit === this._hoveredDefender) ? null : hit;
    }

    if (type === 'keydown') {
      const k = data.key || data.code || '';
      if (k === ' ' || k === 'Space') {
        this._fastForward = !this._fastForward;
      }
      if (k === 'Escape') {
        this._hoveredDefender = null;
      }
    }

    if (type === 'keyup') {
      // reserved for future bindings
    }
  }
}


// --- Mechanic: ResourceManagement ---
class ResourceManagement {
  constructor(entities) {
    this.entities = entities;

    // Economy
    this.acorns = 50;
    this.acornDisplay = 50;
    this.acornTimer = 0;

    // Score
    this.score = 0;

    // Per-entity runtime state
    this.states = new Map();
    for (const e of entities) {
      this.states.set(e, {
        hp: this._maxHp(e.type),
        maxHp: this._maxHp(e.type),
        shootTimer: Math.random() * 1.5,
        pulseTimer: Math.random() * 4,
        active: true,
      });
    }

    // Live projectiles (managed internally, not in entities array)
    this.projectiles = [];

    // Visual effects queue
    this.effects = [];

    // UI state
    this.selectedEntity = null;
  }

  /* ── helpers ─────────────────────────────────────────────────────── */

  _maxHp(type) {
    return { 'acorn-launcher': 100, 'sunflower-cannon': 80, 'ant-marcher': 60,
             'beetle-brute': 150, 'log-barricade': 200, 'giant-mushroom': 120,
             'acorn-shot': 1, 'dirt-path': 1e9, 'grass-tile': 1e9 }[type] ?? 100;
  }
  _isEnemy(t)    { return t === 'ant-marcher' || t === 'beetle-brute'; }
  _isDefender(t) { return t === 'acorn-launcher' || t === 'sunflower-cannon' ||
                          t === 'log-barricade'  || t === 'giant-mushroom'; }
  _range(t)      { return (t === 'giant-mushroom' ? 110 : 190) * S; }

  _addEffect(x, y, type, extra) {
    this.effects.push({ x, y, type, life: 1, ...extra });
  }

  _killEnemy(enemy, eState, events) {
    eState.active = false;
    const pts = enemy.type === 'beetle-brute' ? 30 : 15;
    this.score += pts;
    events.push({ type: 'score', value: pts });
    events.push({ type: 'state', key: 'enemyDefeated', value: enemy.type });
    this._addEffect(enemy.x, enemy.y, 'explode', {});
  }

  /* ── update ──────────────────────────────────────────────────────── */

  update(dt) {
    const events = [];

    // Smooth display counter
    this.acornDisplay += (this.acorns - this.acornDisplay) * Math.min(1, dt * 6);

    // Passive acorn trickle (1 per second baseline)
    this.acorns += dt * 1.5;

    // Sunflower-cannon burst every 5 s
    this.acornTimer += dt;
    if (this.acornTimer >= 5) {
      this.acornTimer = 0;
      let gained = 0;
      for (const e of this.entities) {
        if (e.type === 'sunflower-cannon' && this.states.get(e)?.active) {
          gained += 12;
          this._addEffect(e.x, e.y, 'resource', { text: '+12' });
        }
      }
      if (gained > 0) {
        this.acorns += gained;
        events.push({ type: 'state', key: 'acorns', value: Math.floor(this.acorns) });
      }
    }

    const enemies   = this.entities.filter(e => this._isEnemy(e.type));
    const defenders = this.entities.filter(e => this._isDefender(e.type));
    const launchers = this.entities.filter(e => e.type === 'acorn-launcher');
    const mushrooms = this.entities.filter(e => e.type === 'giant-mushroom');

    /* ── enemy movement & melee ─────────────────────────────────────── */
    for (const enemy of enemies) {
      const es = this.states.get(enemy);
      if (!es || !es.active) continue;

      const speed = (enemy.type === 'beetle-brute' ? 28 : 52) * S;

      // Find nearest active defender (or march to x=0 if none)
      let bestDef = null, bestDist = Infinity;
      for (const def of defenders) {
        const ds = this.states.get(def);
        if (!ds || !ds.active) continue;
        const d = Math.hypot(def.x - enemy.x, def.y - enemy.y);
        if (d < bestDist) { bestDist = d; bestDef = def; }
      }

      if (bestDef && bestDist < (bestDef.width || 40 * S) * 0.8) {
        // Melee attack
        const ds = this.states.get(bestDef);
        ds.hp -= (enemy.type === 'beetle-brute' ? 28 : 14) * dt;
        if (ds.hp <= 0) {
          ds.active = false;
          events.push({ type: 'state', key: 'defenderDestroyed', value: bestDef.type });
          this._addEffect(bestDef.x, bestDef.y, 'explode', {});
        }
      } else {
        // March toward target
        const tx = bestDef ? bestDef.x : -60 * S;
        const ty = bestDef ? bestDef.y : enemy.y;
        const dx = tx - enemy.x, dy = ty - enemy.y;
        const dist = Math.hypot(dx, dy) || 1;
        enemy.x += (dx / dist) * speed * dt;
        enemy.y += (dy / dist) * speed * dt;
      }

      // Escape check
      if (enemy.x < -80 * S) {
        es.active = false;
        events.push({ type: 'state', key: 'enemyEscaped', value: enemy.type });
        events.push({ type: 'score', value: -10 });
        this.score -= 10;
      }
    }

    /* ── acorn-launcher shooting ─────────────────────────────────────── */
    for (const launcher of launchers) {
      const ls = this.states.get(launcher);
      if (!ls || !ls.active) continue;

      ls.shootTimer += dt;
      if (ls.shootTimer < 1.6) continue;

      const range = this._range(launcher.type);
      let target = null, td = Infinity;
      for (const enemy of enemies) {
        const es = this.states.get(enemy);
        if (!es || !es.active) continue;
        const d = Math.hypot(enemy.x - launcher.x, enemy.y - launcher.y);
        if (d < range && d < td) { td = d; target = enemy; }
      }

      if (target) {
        ls.shootTimer = 0;
        this.projectiles.push({
          x: launcher.x, y: launcher.y,
          target,
          speed: 210 * S,
          damage: 22,
          r: 5 * S,
          active: true,
        });
      }
    }

    /* ── giant-mushroom spore pulse ────────────────────────────────── */
    for (const mush of mushrooms) {
      const ms = this.states.get(mush);
      if (!ms || !ms.active) continue;

      ms.pulseTimer += dt;
      if (ms.pulseTimer < 4) continue;
      ms.pulseTimer = 0;

      const range = this._range(mush.type);
      this._addEffect(mush.x, mush.y, 'mushroomPulse', { range });
      for (const enemy of enemies) {
        const es = this.states.get(enemy);
        if (!es || !es.active) continue;
        const d = Math.hypot(enemy.x - mush.x, enemy.y - mush.y);
        if (d < range) {
          es.hp -= 38;
          this._addEffect(enemy.x, enemy.y, 'spore', {});
          if (es.hp <= 0) this._killEnemy(enemy, es, events);
        }
      }
    }

    /* ── projectile movement & hit detection ─────────────────────────── */
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      const p = this.projectiles[i];
      if (!p.active) { this.projectiles.splice(i, 1); continue; }

      const ts = this.states.get(p.target);
      if (!ts || !ts.active) { p.active = false; this.projectiles.splice(i, 1); continue; }

      const dx = p.target.x - p.x, dy = p.target.y - p.y;
      const dist = Math.hypot(dx, dy) || 1;

      if (dist < p.r + 6 * S) {
        // Impact
        p.active = false;
        ts.hp -= p.damage;
        this._addEffect(p.target.x, p.target.y, 'hit', {});
        if (ts.hp <= 0) this._killEnemy(p.target, ts, events);
        this.projectiles.splice(i, 1);
      } else {
        p.x += (dx / dist) * p.speed * dt;
        p.y += (dy / dist) * p.speed * dt;
      }
    }

    /* ── age effects ─────────────────────────────────────────────────── */
    for (let i = this.effects.length - 1; i >= 0; i--) {
      this.effects[i].life -= dt / (this.effects[i].type === 'resource' ? 1.2 : 0.6);
      if (this.effects[i].life <= 0) this.effects.splice(i, 1);
    }

    return events;
  }

  /* ── draw ────────────────────────────────────────────────────────── */

  draw(ctx) {
    ctx.save();

    /* Range rings */
    for (const e of this.entities) {
      if (e.type !== 'acorn-launcher' && e.type !== 'giant-mushroom') continue;
      const es = this.states.get(e);
      if (!es || !es.active) continue;
      const selected = this.selectedEntity === e;
      const range = this._range(e.type);
      const isMush = e.type === 'giant-mushroom';
      ctx.beginPath();
      ctx.arc(e.x, e.y, range, 0, Math.PI * 2);
      ctx.setLineDash([6 * S, 6 * S]);
      ctx.lineWidth = selected ? 2 * S : 1 * S;
      ctx.strokeStyle = selected
        ? (isMush ? 'rgba(200,80,255,0.85)' : 'rgba(80,220,80,0.85)')
        : (isMush ? 'rgba(200,80,255,0.22)' : 'rgba(80,220,80,0.22)');
      ctx.stroke();
      ctx.setLineDash([]);
    }

    /* Health bars */
    for (const e of this.entities) {
      const es = this.states.get(e);
      if (!es || !es.active || es.maxHp >= 1e8 || es.hp >= es.maxHp) continue;
      const ew = (e.width  || 40 * S);
      const eh = (e.height || 40 * S);
      const bx = e.x - ew / 2;
      const by = e.y - eh / 2 - 10 * S;
      const bw = ew, bh = 5 * S;
      const pct = Math.max(0, es.hp / es.maxHp);
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = pct > 0.5 ? '#4caf50' : pct > 0.25 ? '#ff9800' : '#f44336';
      ctx.fillRect(bx, by, bw * pct, bh);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, bh);
    }

    /* Projectiles */
    for (const p of this.projectiles) {
      if (!p.active) continue;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = '#6B3A1F';
      ctx.fill();
      ctx.strokeStyle = '#C8844A';
      ctx.lineWidth = 1.5 * S;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(p.x - p.r * 0.3, p.y - p.r * 0.35, p.r * 0.32, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();
    }

    /* Visual effects */
    for (const fx of this.effects) {
      const a = Math.max(0, fx.life);
      ctx.globalAlpha = a;
      if (fx.type === 'hit') {
        const r = (1 - fx.life) * 18 * S + 4 * S;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 2.5 * S;
        ctx.stroke();
      } else if (fx.type === 'explode') {
        const r = (1 - fx.life) * 32 * S;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,100,0,${a * 0.55})`;
        ctx.fill();
        for (let k = 0; k < 8; k++) {
          const ang = (k / 8) * Math.PI * 2;
          const pr = (1 - fx.life) * 28 * S;
          ctx.beginPath();
          ctx.arc(fx.x + Math.cos(ang) * pr, fx.y + Math.sin(ang) * pr, 3 * S, 0, Math.PI * 2);
          ctx.fillStyle = '#FF6600';
          ctx.fill();
        }
      } else if (fx.type === 'spore') {
        const r = (1 - fx.life) * 14 * S + 3 * S;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(190,70,255,${a * 0.5})`;
        ctx.fill();
      } else if (fx.type === 'mushroomPulse') {
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, fx.range * (0.5 + (1 - fx.life) * 0.5), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(210,110,255,${a * 0.75})`;
        ctx.lineWidth = 3 * S;
        ctx.stroke();
      } else if (fx.type === 'resource') {
        ctx.globalAlpha = Math.min(1, a * 1.8);
        ctx.font = `bold ${15 * S}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#FFD700';
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = 3 * S;
        const floatY = fx.y - (1 - fx.life) * 36 * S;
        ctx.strokeText(fx.text, fx.x, floatY);
        ctx.fillText(fx.text, fx.x, floatY);
      }
      ctx.globalAlpha = 1;
    }

    /* HUD: Acorn counter */
    const hx = 12 * S, hy = 12 * S, hw = 148 * S, hh = 36 * S;
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(10,20,10,0.62)';
    ctx.beginPath();
    ctx.roundRect(hx, hy, hw, hh, 8 * S);
    ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${15 * S}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(`\uD83C\uDF30 ${Math.floor(this.acornDisplay)}`, hx + 10 * S, hy + hh / 2);

    /* HUD: Score */
    const sy = hy + hh + 6 * S;
    ctx.fillStyle = 'rgba(10,20,10,0.62)';
    ctx.beginPath();
    ctx.roundRect(hx, sy, hw, hh, 8 * S);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `bold ${14 * S}px sans-serif`;
    ctx.fillText(`Score: ${this.score}`, hx + 10 * S, sy + hh / 2);

    /* Selected entity tooltip */
    if (this.selectedEntity) {
      const e = this.selectedEntity;
      const es = this.states.get(e);
      if (es && es.active) {
        const tw = 165 * S, th = 52 * S;
        const tx = Math.min(W - tw - 4 * S, Math.max(4 * S, e.x - tw / 2));
        const ty = e.y - (e.height || 40 * S) / 2 - th - 12 * S;
        ctx.fillStyle = 'rgba(0,0,0,0.78)';
        ctx.beginPath();
        ctx.roundRect(tx, ty, tw, th, 7 * S);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1 * S;
        ctx.stroke();
        ctx.fillStyle = '#EAEAEA';
        ctx.font = `bold ${11 * S}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(e.type.toUpperCase(), tx + tw / 2, ty + 7 * S);
        if (es.maxHp < 1e8) {
          const pct = Math.max(0, es.hp / es.maxHp);
          ctx.fillStyle = pct > 0.5 ? '#4caf50' : pct > 0.25 ? '#ff9800' : '#f44336';
          ctx.fillText(`HP ${Math.ceil(es.hp)} / ${es.maxHp}`, tx + tw / 2, ty + 24 * S);
        } else {
          ctx.fillStyle = '#80cbc4';
          ctx.fillText('INDESTRUCTIBLE', tx + tw / 2, ty + 24 * S);
        }
        ctx.fillStyle = '#AAAAAA';
        ctx.font = `${10 * S}px sans-serif`;
        ctx.fillText('[B] Heal 30 HP (cost 20\uD83C\uDF30)', tx + tw / 2, ty + 38 * S);
      }
    }

    ctx.restore();
  }

  /* ── handleInput ─────────────────────────────────────────────────── */

  handleInput(type, data) {
    if (type === 'click' || type === 'touchstart') {
      const { x, y } = data;
      let hit = null;
      for (const e of this.entities) {
        const hw = (e.width  || 40 * S) / 2;
        const hh = (e.height || 40 * S) / 2;
        if (x >= e.x - hw && x <= e.x + hw && y >= e.y - hh && y <= e.y + hh) {
          hit = e;
          break;
        }
      }
      this.selectedEntity = (hit && hit !== this.selectedEntity) ? hit : null;
    }

    if (type === 'keydown') {
      const { code } = data;
      if (code === 'Escape') {
        this.selectedEntity = null;
      }
      if (code === 'KeyB' && this.selectedEntity) {
        const cost = 20;
        if (this.acorns >= cost) {
          const es = this.states.get(this.selectedEntity);
          if (es && es.active && es.maxHp < 1e8) {
            this.acorns -= cost;
            es.hp = Math.min(es.maxHp, es.hp + 30);
            this._addEffect(this.selectedEntity.x, this.selectedEntity.y, 'resource', { text: '+30 HP' });
          }
        }
      }
    }
  }
}

// === GAME STATE & LAYOUT ===

const playerEntities = [];
const enemyEntities  = [];
const projectiles    = [];
const propEntities   = [];

// Winding enemy path — 8 waypoints forming an S-curve across the map
const path = [
  { x: -32,      y: H * 0.25 },
  { x: W * 0.20, y: H * 0.25 },
  { x: W * 0.20, y: H * 0.65 },
  { x: W * 0.50, y: H * 0.65 },
  { x: W * 0.50, y: H * 0.18 },
  { x: W * 0.78, y: H * 0.18 },
  { x: W * 0.78, y: H * 0.72 },
  { x: W + 32,   y: H * 0.72 },
];

// Core state variables
let lives           = 20;
let level           = 1;
let resources       = 100;
let gameOver        = false;
let waveTimer       = 0;
let spawnTimer      = 0;
let difficultyTimer = 0;
let spawnInterval   = 2.5;   // seconds between enemy spawns
let enemySpeed      = 80;    // base px/sec before S scaling

// Shared constants
const TURRET_RANGE     = 120;
const TURRET_COOLDOWN  = 1.5;
const PROJECTILE_SPEED = 220;
const TURRET_COST      = 25;

// Instantiate every mechanic class
const mechPlacement = new PlacementSystem();
const mechWave      = new WaveSpawningSystem();
const mechResources = new ResourceManagement();
const mechanics     = [mechPlacement, mechWave, mechResources];

// Initial decorative props (more added in bootCode)
propEntities.push({
  sprite: sprite_log_barricade,
  type:   'log',
  x:      W * 0.08,
  y:      H * 0.48,
  width:  40,
  height: 36,
});
propEntities.push({
  sprite: sprite_giant_mushroom,
  type:   'mushroom',
  x:      W * 0.63,
  y:      H * 0.38,
  width:  40,
  height: 48,
});


// === INPUT ===

// ── Utility: convert client coords to canvas-space coords ──
function getCanvasPos(clientX, clientY) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY,
  };
}

// ── Place a turret or restart on game over ──
function handlePlace(x, y) {
  if (gameOver) {
    location.reload();
    return;
  }
  if (resources < TURRET_COST) return;
  resources -= TURRET_COST;
  // Alternate between acorn-launcher and sunflower-cannon
  const useAcorn = playerEntities.length % 2 === 0;
  playerEntities.push({
    sprite:   useAcorn ? sprite_acorn_launcher : sprite_sunflower_cannon,
    type:     useAcorn ? 'acorn' : 'sunflower',
    x:        x - (useAcorn ? 16 : 18) * S,
    y:        y - (useAcorn ? 28 : 30) * S,
    width:    useAcorn ? 32 : 36,
    height:   useAcorn ? 56 : 60,
    cooldown: 0,
  });
}

// ── Mouse / click ──
canvas.addEventListener('mousedown', (e) => {
  const pos = getCanvasPos(e.clientX, e.clientY);
  handlePlace(pos.x, pos.y);
});

// ── Touch (tap to place, pinch/drag forwarded to mechanics) ──
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const pos = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
  handlePlace(pos.x, pos.y);
  for (const mech of mechanics) {
    if (typeof mech.onTouch === 'function') mech.onTouch(e);
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const mech of mechanics) {
    if (typeof mech.onTouchMove === 'function') mech.onTouchMove(e);
  }
}, { passive: false });

// ── Keyboard ──
window.addEventListener('keydown', (e) => {
  // Game-over shortcuts
  if (gameOver) {
    if (e.key.toLowerCase() === 'r') location.reload();
    return;
  }

  // Forward all keydowns to every mechanic
  for (const mech of mechanics) {
    if (typeof mech.onKeyDown === 'function') mech.onKeyDown(e);
  }

  // Spacebar: award a small resource bonus so the player can keep placing
  if (e.key === ' ') {
    resources = Math.min(999, resources + 15);
    e.preventDefault();
  }

  // Arrow keys: forward as structured input
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    for (const mech of mechanics) {
      if (typeof mech.onInput === 'function') mech.onInput({ type: 'arrow', key: e.key });
    }
  }

  // Number keys 1–9: forward to mechanics for possible hotkey behaviour
  if (e.key >= '1' && e.key <= '9') {
    for (const mech of mechanics) {
      if (typeof mech.onInput === 'function') mech.onInput({ type: 'number', key: e.key });
    }
  }
});


// === GAME LOOP ===
let lastTime = 0;
if (typeof score === 'undefined') var score = 0;
const scoreEl = document.getElementById('score');

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  
spawnTimer      += dt;
difficultyTimer += dt;
waveTimer       += dt;

// ── Difficulty ramp: every 20 s increase level, speed, and spawn rate ──
if (difficultyTimer >= 20) {
  difficultyTimer = 0;
  level++;
  spawnInterval = Math.max(0.7,  spawnInterval - 0.2);
  enemySpeed    = Math.min(180,  enemySpeed    + 12);
}

// ── Spawn enemies ──
if (spawnTimer >= spawnInterval) {
  spawnTimer = 0;
  const isBeetle = level >= 3 && Math.random() < 0.40;
  enemyEntities.push({
    sprite:        isBeetle ? sprite_beetle_brute : sprite_ant_marcher,
    type:          isBeetle ? 'beetle' : 'ant',
    x:             path[0].x,
    y:             path[0].y,
    width:         isBeetle ? 44 : 32,
    height:        isBeetle ? 56 : 52,
    waypointIndex: 1,
    hp:            isBeetle ? 3 : 1,
    maxHp:         isBeetle ? 3 : 1,
    speed:         enemySpeed * (isBeetle ? 0.65 : 1.0),
  });
}

// ── Move enemies along path waypoints ──
for (let i = enemyEntities.length - 1; i >= 0; i--) {
  const e = enemyEntities[i];
  if (e.waypointIndex >= path.length) {
    enemyEntities.splice(i, 1);
    lives = Math.max(0, lives - 1);
    continue;
  }
  const wp   = path[e.waypointIndex];
  const dx   = wp.x - e.x;
  const dy   = wp.y - e.y;
  const dist = Math.hypot(dx, dy);
  const step = e.speed * S * dt;
  if (dist <= step) {
    e.x = wp.x;
    e.y = wp.y;
    e.waypointIndex++;
  } else {
    e.x += (dx / dist) * step;
    e.y += (dy / dist) * step;
  }
}

// ── Turrets: scan for nearest enemy in range, fire a projectile ──
for (const turret of playerEntities) {
  turret.cooldown = (turret.cooldown || 0) + dt;
  if (turret.cooldown < TURRET_COOLDOWN) continue;
  const range = TURRET_RANGE * S;
  let nearest  = null;
  let nearDist = Infinity;
  const tcx = turret.x + turret.width  * S * 0.5;
  const tcy = turret.y + turret.height * S * 0.5;
  for (const enemy of enemyEntities) {
    const d = Math.hypot(
      (enemy.x + enemy.width  * S * 0.5) - tcx,
      (enemy.y + enemy.height * S * 0.5) - tcy
    );
    if (d < range && d < nearDist) { nearDist = d; nearest = enemy; }
  }
  if (nearest) {
    turret.cooldown = 0;
    projectiles.push({
      sprite: sprite_acorn_shot,
      x:      tcx,
      y:      tcy,
      width:  24,
      height: 24,
      target: nearest,
      speed:  PROJECTILE_SPEED,
    });
  }
}

// ── Move projectiles, detect hits ──
for (let i = projectiles.length - 1; i >= 0; i--) {
  const p = projectiles[i];
  if (!enemyEntities.includes(p.target)) {
    projectiles.splice(i, 1);
    continue;
  }
  const tx   = p.target.x + p.target.width  * S * 0.5;
  const ty   = p.target.y + p.target.height * S * 0.5;
  const dx   = tx - p.x;
  const dy   = ty - p.y;
  const dist = Math.hypot(dx, dy);
  const step = p.speed * S * dt;
  if (dist <= step + 8 * S) {
    // Hit!
    p.target.hp--;
    if (p.target.hp <= 0) {
      const idx = enemyEntities.indexOf(p.target);
      if (idx !== -1) enemyEntities.splice(idx, 1);
      score     += 10 * level;
      resources  = Math.min(999, resources + 5);
    }
    projectiles.splice(i, 1);
    continue;
  }
  p.x += (dx / dist) * step;
  p.y += (dy / dist) * step;
}

// ── Update each mechanic and process emitted events ──
for (const mech of mechanics) {
  if (typeof mech.update !== 'function') continue;
  const events = mech.update(dt) || [];
  for (const ev of (Array.isArray(events) ? events : [])) {
    if (!ev) continue;
    if (ev.type === 'score')                          score += (ev.value || 10);
    if (ev.type === 'state' && ev.value === 'gameover') gameOver = true;
    if (ev.type === 'spawn') {
      const pos = ev.position || { x: path[0].x, y: path[0].y };
      enemyEntities.push({
        sprite:        sprite_ant_marcher,
        type:          'ant',
        x:             pos.x,
        y:             pos.y,
        width:         32,
        height:        52,
        waypointIndex: 1,
        hp:            1,
        maxHp:         1,
        speed:         enemySpeed,
      });
    }
  }
}

// ── Game-over check (no early return — drawCode handles the overlay) ──
if (lives <= 0 && !gameOver) gameOver = true;


  
// ── 1. Tile the full background with grass ──
const tW   = 32 * S;
const tH   = 32 * S;
const cols = Math.ceil(W / tW) + 1;
const rows = Math.ceil(H / tH) + 1;
for (let r = 0; r < rows; r++) {
  for (let c = 0; c < cols; c++) {
    ctx.drawImage(sprite_grass_tile, c * tW, r * tH, tW, tH);
  }
}

// ── 2. Draw dirt path tiles densely along every path segment ──
const dSz = 34 * S;
for (let seg = 0; seg < path.length - 1; seg++) {
  const a    = path[seg];
  const b    = path[seg + 1];
  const sdx  = b.x - a.x;
  const sdy  = b.y - a.y;
  const len  = Math.hypot(sdx, sdy);
  const steps = Math.max(1, Math.ceil(len / (dSz * 0.72)));
  for (let t = 0; t <= steps; t++) {
    const fx = a.x + (sdx * t) / steps;
    const fy = a.y + (sdy * t) / steps;
    ctx.drawImage(sprite_dirt_path, fx - dSz * 0.5, fy - dSz * 0.5, dSz, dSz);
  }
}

// ── 3. Draw props — sprite_log_barricade / sprite_giant_mushroom ──
for (const prop of propEntities) {
  const spr = prop.type === 'mushroom' ? sprite_giant_mushroom : sprite_log_barricade;
  ctx.drawImage(spr, prop.x, prop.y, prop.width * S, prop.height * S);
}

// ── 4. Draw enemies — sprite_ant_marcher / sprite_beetle_brute ──
for (const enemy of enemyEntities) {
  const spr = enemy.type === 'beetle' ? sprite_beetle_brute : sprite_ant_marcher;
  ctx.drawImage(spr, enemy.x, enemy.y, enemy.width * S, enemy.height * S);
  // HP bar above beetle-type enemies
  if (enemy.maxHp > 1) {
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(enemy.x, enemy.y - 7 * S, enemy.width * S, 4 * S);
    ctx.fillStyle = '#44ff44';
    ctx.fillRect(enemy.x, enemy.y - 7 * S, enemy.width * S * (enemy.hp / enemy.maxHp), 4 * S);
  }
}

// ── 5. Draw player turrets — sprite_acorn_launcher / sprite_sunflower_cannon ──
for (const turret of playerEntities) {
  const spr = turret.type === 'sunflower' ? sprite_sunflower_cannon : sprite_acorn_launcher;
  ctx.drawImage(spr, turret.x, turret.y, turret.width * S, turret.height * S);
}

// ── 6. Draw projectiles — sprite_acorn_shot ──
for (const proj of projectiles) {
  ctx.drawImage(
    sprite_acorn_shot,
    proj.x - proj.width  * S * 0.5,
    proj.y - proj.height * S * 0.5,
    proj.width  * S,
    proj.height * S
  );
}

// ── 7. Mechanic visual overlays ──
for (const mech of mechanics) {
  if (typeof mech.draw === 'function') mech.draw(ctx);
}

// ── 8. HUD (lives, level, resources, score) ──
const hudSize = Math.round(20 * S);
ctx.font         = `bold ${hudSize}px monospace`;
ctx.textBaseline = 'top';
ctx.shadowColor  = '#000000';
ctx.shadowBlur   = 5;
ctx.fillStyle    = '#ffffff';
ctx.fillText(`\u2665 ${lives}`,           12 * S,  8 * S);
ctx.fillText(`LVL ${level}`,              W * 0.36, 8 * S);
ctx.fillText(`\u25CE ${resources}`,       W * 0.55, 8 * S);
ctx.fillText(`\u2605 ${score}`,           W * 0.78, 8 * S);
ctx.shadowBlur   = 0;
ctx.textBaseline = 'alphabetic';

// ── 9. Game-over overlay ──
if (gameOver) {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.70)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor  = '#000000';
  ctx.shadowBlur   = 8;
  ctx.fillStyle    = '#ff4444';
  ctx.font         = `bold ${Math.round(52 * S)}px monospace`;
  ctx.fillText('GAME OVER', W * 0.5, H * 0.40);
  ctx.fillStyle = '#ffdd44';
  ctx.font      = `bold ${Math.round(26 * S)}px monospace`;
  ctx.fillText(`Final Score: ${score}`, W * 0.5, H * 0.52);
  ctx.fillStyle = '#ffffff';
  ctx.font      = `${Math.round(20 * S)}px monospace`;
  ctx.fillText('Tap / Click to restart  |  R to reload', W * 0.5, H * 0.62);
  ctx.shadowBlur   = 0;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'alphabetic';
}


  scoreEl.textContent = 'Score: ' + score;
  requestAnimationFrame(gameLoop);
}

// === BOOT ===

// ── Add two more decorative props at fixed positions ──
propEntities.push({
  sprite: sprite_giant_mushroom,
  type:   'mushroom',
  x:      W * 0.38,
  y:      H * 0.82,
  width:  40,
  height: 48,
});

propEntities.push({
  sprite: sprite_log_barricade,
  type:   'log',
  x:      W * 0.88,
  y:      H * 0.44,
  width:  40,
  height: 36,
});

// ── Verify path integrity ──
console.assert(
  path.length >= 4,
  '[TowerDefense] Path requires at least 4 waypoints — found: ' + path.length
);

// ── Place one free starter turret so the game is immediately playable ──
playerEntities.push({
  sprite:   sprite_acorn_launcher,
  type:     'acorn',
  x:        W * 0.12 - 16 * S,
  y:        H * 0.06 - 28 * S,
  width:    32,
  height:   56,
  cooldown: 0,
});

console.log(
  'Game initialized — Tower Defense ready.',
  '| Path waypoints:', path.length,
  '| Initial props:', propEntities.length,
  '| Mechanics:', mechanics.length
);

requestAnimationFrame(gameLoop);
</script>
