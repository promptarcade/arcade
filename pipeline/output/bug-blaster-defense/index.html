    const by  = 10  * S;
    const bw  = 136 * S;
    const bh  = 34  * S;
    const inBtn = x >= bx && x <= bx + bw && y >= by && y <= by + bh;

    // ── hover (mousemove / touchmove) ──
    if (type === 'mousemove' || type === 'touchmove') {
      this.hoverX     = x;
      this.hoverY     = y;
      this.hoveredTile = this.placementMode ? this._tileIdxAt(x, y) : -1;
      return;
    }

    // ── click / touchstart / touchend → action ──
    if (type === 'click' || type === 'touchend' || type === 'touchstart') {
      if (x < 0 || y < 0) return; // invalid coords
      // button hit
      if (inBtn) {
        this.placementMode = !this.placementMode;
        if (!this.placementMode) this.hoveredTile = -1;
        this._pendingEvents.push({ type: 'state', target: 'placementMode', value: this.placementMode });
        return;
      }
      // tile placement
      if (this.placementMode && !this.gameOver) {
        const idx = this._tileIdxAt(x, y);
        if (idx >= 0) {
          this._placeTurretOnTile(idx);
        }
      }
    }
  }
}



// --- Mechanic: ManageResources ---
class ManageResources {
  constructor(entities) {
    this.rawEntities = entities || [];
    this.resources = 50;
    this.score = 0;
    this.spawnTimer = 0;
    this.spawnInterval = 8;
    this.gemRespawnTimer = 0;
    this.gemRespawnInterval = 15;
    this.selectedAction = null;
    this.keys = {};
    this._gameOver = false;

    this.commandPost = null;
    this.turrets = [];
    this.ants = [];
    this.gems = [];
    this.enemies = [];
    this.bullets = [];
    this.paths = [];
    this.tiles = [];

    for (const e of this.rawEntities) {
      this._registerEntity(e);
    }

    if (!this.commandPost) {
      this.commandPost = {
        name: 'command-post-default',
        x: 40 * S,
        y: H / 2 - 30 * S,
        width: 60 * S,
        height: 60 * S,
        type: 'command-post',
        sprite: null,
        hp: 100,
        maxHp: 100
      };
    }

    if (this.gems.length === 0) {
      this._spawnInitialGems();
    }
  }

  _registerEntity(e) {
    const base = {
      name: e.name,
      x: e.x,
      y: e.y,
      width: e.width * S,
      height: e.height * S,
      type: e.type,
      sprite: e.sprite || null
    };
    switch (e.type) {
      case 'command-post':
        this.commandPost = { ...base, hp: 100, maxHp: 100 };
        break;
      case 'gun-turret':
        this.turrets.push({ ...base, target: null, shootTimer: 0, shootInterval: 1.5, range: 160 * S, angle: 0 });
        break;
      case 'soldier-ant':
        this.ants.push({ ...base, state: 'idle', targetGem: null, speed: 65 * S, carrying: false });
        break;
      case 'resource-gem':
        this.gems.push({ ...base, collected: false, value: 10, assignedAnt: null, pulse: 0 });
        break;
      case 'rhino-beetle':
        this.enemies.push({ ...base, speed: 40 * S, hp: 30, maxHp: 30, damage: 10, attackTimer: 0 });
        break;
      case 'mosquito':
        this.enemies.push({ ...base, speed: 75 * S, hp: 15, maxHp: 15, damage: 5, attackTimer: 0 });
        break;
      case 'dirt-path':
        this.paths.push({ ...base });
        break;
      case 'grass-tile':
        this.tiles.push({ ...base });
        break;
    }
  }

  _spawnInitialGems() {
    for (let i = 0; i < 6; i++) {
      this.gems.push({
        name: `gem-init-${i}`,
        x: W * 0.35 + Math.random() * W * 0.55,
        y: H * 0.08 + Math.random() * H * 0.84,
        width: 18 * S,
        height: 18 * S,
        type: 'resource-gem',
        sprite: null,
        collected: false,
        value: 10,
        assignedAnt: null,
        pulse: Math.random() * Math.PI * 2
      });
    }
  }

  _spawnGem(emitted) {
    const gem = {
      name: `gem-${Date.now()}-${Math.random().toString(36).slice(2)}`,
      x: W * 0.35 + Math.random() * W * 0.55,
      y: H * 0.08 + Math.random() * H * 0.84,
      width: 18 * S,
      height: 18 * S,
      type: 'resource-gem',
      sprite: null,
      collected: false,
      value: 10,
      assignedAnt: null,
      pulse: 0
    };
    this.gems.push(gem);
    if (emitted) emitted.push({ type: 'spawn', target: gem.name, value: { type: 'resource-gem', x: gem.x, y: gem.y } });
  }

  _spawnEnemy(emitted) {
    const fromRight = Math.random() < 0.5;
    const x = fromRight ? W + 32 * S : -32 * S;
    const y = H * 0.1 + Math.random() * H * 0.8;
    const isRhino = Math.random() < 0.5;
    const enemy = {
      name: `enemy-${Date.now()}-${Math.random().toString(36).slice(2)}`,
      x, y,
      width: isRhino ? 38 * S : 24 * S,
      height: isRhino ? 34 * S : 20 * S,
      type: isRhino ? 'rhino-beetle' : 'mosquito',
      sprite: null,
      speed: isRhino ? 40 * S : 75 * S,
      hp: isRhino ? 30 : 15,
      maxHp: isRhino ? 30 : 15,
      damage: isRhino ? 10 : 5,
      attackTimer: 0,
      wobble: 0
    };
    this.enemies.push(enemy);
    if (emitted) emitted.push({ type: 'spawn', target: enemy.name, value: { type: enemy.type, x: enemy.x, y: enemy.y } });
  }

  update(dt) {
    if (this._gameOver) return [];
    dt = Math.min(dt, 0.1);
    const emitted = [];

    // Enemy spawn timer
    this.spawnTimer += dt;
    if (this.spawnTimer >= this.spawnInterval) {
      this.spawnTimer = 0;
      this.spawnInterval = Math.max(4, this.spawnInterval - 0.1);
      this._spawnEnemy(emitted);
    }

    // Gem respawn timer
    this.gemRespawnTimer += dt;
    if (this.gemRespawnTimer >= this.gemRespawnInterval) {
      this.gemRespawnTimer = 0;
      const active = this.gems.filter(g => !g.collected).length;
      if (active < 6) this._spawnGem(emitted);
    }

    // Animate gems
    for (const gem of this.gems) {
      gem.pulse = (gem.pulse || 0) + dt * 3;
    }

    // Update ants
    for (const ant of this.ants) {
      this._updateAnt(ant, dt, emitted);
    }

    // Update turrets
    for (const turret of this.turrets) {
      this._updateTurret(turret, dt, emitted);
    }

    // Update enemies
    for (const enemy of this.enemies) {
      this._updateEnemy(enemy, dt, emitted);
    }

    // Update bullets
    for (const bullet of this.bullets) {
      this._updateBullet(bullet, dt, emitted);
    }

    // Cleanup dead enemies
    const dead = this.enemies.filter(e => e.hp <= 0);
    for (const d of dead) {
      const pts = d.type === 'rhino-beetle' ? 20 : 10;
      this.score += pts;
      emitted.push({ type: 'score', target: d.name, value: pts });
      emitted.push({ type: 'destroy', target: d.name, value: d.name });
    }
    this.enemies = this.enemies.filter(e => e.hp > 0);

    // Cleanup spent bullets
    this.bullets = this.bullets.filter(b => !b.spent && b.x > -60 && b.x < W + 60 && b.y > -60 && b.y < H + 60);

    // Cleanup collected gems
    this.gems = this.gems.filter(g => !g.collected);

    // Game over check
    if (this.commandPost && this.commandPost.hp <= 0) {
      this._gameOver = true;
      emitted.push({ type: 'state', target: 'command-post', value: 'destroyed' });
    }

    return emitted;
  }

  _updateAnt(ant, dt, emitted) {
    ant.x = Math.max(0, Math.min(W - ant.width, ant.x));
    ant.y = Math.max(0, Math.min(H - ant.height, ant.y));

    if (ant.state === 'idle') {
      const available = this.gems.filter(g => !g.collected && !g.assignedAnt);
      if (available.length === 0) return;
      let nearest = null, nearestDist = Infinity;
      for (const gem of available) {
        const dx = gem.x - ant.x, dy = gem.y - ant.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < nearestDist) { nearestDist = d; nearest = gem; }
      }
      if (nearest) {
        ant.targetGem = nearest;
        nearest.assignedAnt = ant.name;
        ant.state = 'moving-to-gem';
      }
    } else if (ant.state === 'moving-to-gem') {
      const gem = ant.targetGem;
      if (!gem || gem.collected) { ant.state = 'idle'; ant.targetGem = null; return; }
      const dx = (gem.x + gem.width / 2) - (ant.x + ant.width / 2);
      const dy = (gem.y + gem.height / 2) - (ant.y + ant.height / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 8 * S) {
        gem.collected = true;
        ant.carrying = true;
        ant.state = 'returning';
        ant.targetGem = null;
        this.resources += gem.value;
        this.score += gem.value;
        emitted.push({ type: 'score', target: ant.name, value: gem.value });
        emitted.push({ type: 'destroy', target: gem.name, value: gem.name });
      } else {
        ant.x += (dx / dist) * ant.speed * dt;
        ant.y += (dy / dist) * ant.speed * dt;
      }
    } else if (ant.state === 'returning') {
      if (!this.commandPost) { ant.state = 'idle'; ant.carrying = false; return; }
      const post = this.commandPost;
      const cx = post.x + post.width / 2, cy = post.y + post.height / 2;
      const dx = cx - (ant.x + ant.width / 2), dy = cy - (ant.y + ant.height / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 22 * S) {
        ant.carrying = false;
        ant.state = 'idle';
        emitted.push({ type: 'state', target: ant.name, value: 'deposited' });
      } else {
        ant.x += (dx / dist) * ant.speed * dt;
        ant.y += (dy / dist) * ant.speed * dt;
      }
    }
  }

  _updateTurret(turret, dt, emitted) {
    turret.shootTimer += dt;
    let nearest = null, nearestDist = turret.range;
    const tcx = turret.x + turret.width / 2, tcy = turret.y + turret.height / 2;
    for (const e of this.enemies) {
      const dx = (e.x + e.width / 2) - tcx, dy = (e.y + e.height / 2) - tcy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < nearestDist) { nearestDist = dist; nearest = e; }
    }
    turret.target = nearest;
    if (nearest) {
      const dx = (nearest.x + nearest.width / 2) - tcx;
      const dy = (nearest.y + nearest.height / 2) - tcy;
      turret.angle = Math.atan2(dy, dx);
    }
    if (nearest && turret.shootTimer >= turret.shootInterval) {
      turret.shootTimer = 0;
      const angle = turret.angle;
      const bullet = {
        name: `bullet-${Date.now()}-${Math.random().toString(36).slice(2)}`,
        x: tcx, y: tcy,
        width: 7 * S, height: 7 * S,
        type: 'bullet-pellet',
        sprite: null,
        vx: Math.cos(angle) * 310 * S,
        vy: Math.sin(angle) * 310 * S,
        damage: 10,
        spent: false
      };
      this.bullets.push(bullet);
      emitted.push({ type: 'spawn', target: bullet.name, value: { type: 'bullet-pellet', x: tcx, y: tcy } });
    }
  }

  _updateEnemy(enemy, dt, emitted) {
    if (!this.commandPost) return;
    enemy.wobble = (enemy.wobble || 0) + dt * 5;
    const post = this.commandPost;
    const cx = post.x + post.width / 2, cy = post.y + post.height / 2;
    const ex = enemy.x + enemy.width / 2, ey = enemy.y + enemy.height / 2;
    const dx = cx - ex, dy = cy - ey;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const threshold = post.width / 2 + enemy.width / 2;
    if (dist < threshold) {
      enemy.attackTimer += dt;
      if (enemy.attackTimer >= 1) {
        enemy.attackTimer = 0;
        post.hp = Math.max(0, post.hp - enemy.damage);
        emitted.push({ type: 'state', target: 'command-post', value: { hp: post.hp, maxHp: post.maxHp } });
      }
    } else {
      const wobbleAmt = enemy.type === 'mosquito' ? Math.sin(enemy.wobble) * 0.3 : 0;
      const perpX = -dy / dist, perpY = dx / dist;
      enemy.x += ((dx / dist) + perpX * wobbleAmt) * enemy.speed * dt;
      enemy.y += ((dy / dist) + perpY * wobbleAmt) * enemy.speed * dt;
    }
  }

  _updateBullet(bullet, dt, emitted) {
    bullet.x += bullet.vx * dt;
    bullet.y += bullet.vy * dt;
    for (const enemy of this.enemies) {
      if (bullet.spent) break;
      const dx = (enemy.x + enemy.width / 2) - bullet.x;
      const dy = (enemy.y + enemy.height / 2) - bullet.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < enemy.width / 2 + bullet.width / 2) {
        enemy.hp -= bullet.damage;
        bullet.spent = true;
      }
    }
  }

  handleInput(type, data) {
    if (type === 'keydown') {
      this.keys[data.key] = true;
      const k = data.key.toLowerCase();
      if (k === 'a') this.selectedAction = this.selectedAction === 'place-ant' ? null : 'place-ant';
      if (k === 't') this.selectedAction = this.selectedAction === 'place-turret' ? null : 'place-turret';
      if (k === 'escape') this.selectedAction = null;
    } else if (type === 'keyup') {
      this.keys[data.key] = false;
    } else if (type === 'touchstart') {
      const touch = data.touches && data.touches[0];
      if (touch) this._handlePlacement(touch.clientX, touch.clientY);
    } else if (type === 'touchend') {
      const touch = data.changedTouches && data.changedTouches[0];
      if (touch) this._handlePlacement(touch.clientX, touch.clientY);
    } else if (type === 'mousedown' || type === 'click') {
      this._handlePlacement(data.clientX, data.clientY);
    }
  }

  _handlePlacement(x, y) {
    if (!this.selectedAction) return;
    if (this.selectedAction === 'place-ant' && this.resources >= 20) {
      this.resources -= 20;
      this.ants.push({
        name: `ant-${Date.now()}`,
        x: x - 10 * S, y: y - 10 * S,
        width: 20 * S, height: 20 * S,
        type: 'soldier-ant', sprite: null,
        state: 'idle', targetGem: null,
        speed: 65 * S, carrying: false
      });
    } else if (this.selectedAction === 'place-turret' && this.resources >= 40) {
      this.resources -= 40;
      this.turrets.push({
        name: `turret-${Date.now()}`,
        x: x - 20 * S, y: y - 20 * S,
        width: 40 * S, height: 40 * S,
        type: 'gun-turret', sprite: null,
        target: null, shootTimer: 0,
        shootInterval: 1.5, range: 160 * S, angle: 0
      });
    }
  }

  draw(ctx) {
    // Background fill
    ctx.fillStyle = '#3a6b2a';
    ctx.fillRect(0, 0, W, H);

    // Draw grass tiles
    for (const tile of this.tiles) {
      if (tile.sprite) {
        ctx.drawImage(tile.sprite, tile.x, tile.y, tile.width, tile.height);
      } else {
        ctx.fillStyle = '#4a7c35';
        ctx.fillRect(tile.x, tile.y, tile.width, tile.height);
        ctx.fillStyle = 'rgba(80,130,50,0.4)';
        ctx.fillRect(tile.x + 2 * S, tile.y + 2 * S, tile.width - 4 * S, tile.height - 4 * S);
      }
    }

    // Draw dirt paths
    for (const path of this.paths) {
      if (path.sprite) {
        ctx.drawImage(path.sprite, path.x, path.y, path.width, path.height);
      } else {
        ctx.fillStyle = '#9b7b52';
        ctx.fillRect(path.x, path.y, path.width, path.height);
        ctx.fillStyle = 'rgba(120,90,55,0.5)';
        for (let i = 0; i < 4; i++) {
          ctx.fillRect(path.x + (i * 12) * S, path.y + 2 * S, 6 * S, 2 * S);
        }
      }
    }

    // Draw resource gems
    for (const gem of this.gems) {
      if (gem.sprite) {
        ctx.drawImage(gem.sprite, gem.x, gem.y, gem.width, gem.height);
      } else {
        const cx = gem.x + gem.width / 2, cy = gem.y + gem.height / 2;
        const r = gem.width / 2;
        const glow = 0.6 + 0.4 * Math.sin(gem.pulse);
        ctx.save();
        ctx.shadowColor = `rgba(0,255,140,${glow})`;
        ctx.shadowBlur = 10 * S;
        ctx.fillStyle = `rgba(0,230,120,${0.7 + 0.3 * glow})`;
        ctx.beginPath();
        ctx.moveTo(cx, cy - r);
        ctx.lineTo(cx + r * 0.75, cy - r * 0.2);
        ctx.lineTo(cx + r * 0.65, cy + r);
        ctx.lineTo(cx - r * 0.65, cy + r);
        ctx.lineTo(cx - r * 0.75, cy - r * 0.2);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 1.5 * S;
        ctx.stroke();
        // Shine facet
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.moveTo(cx - r * 0.15, cy - r * 0.7);
        ctx.lineTo(cx + r * 0.25, cy - r * 0.3);
        ctx.lineTo(cx - r * 0.05, cy - r * 0.1);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // Draw command post
    if (this.commandPost) {
      const p = this.commandPost;
      if (p.sprite) {
        ctx.drawImage(p.sprite, p.x, p.y, p.width, p.height);
      } else {
        ctx.save();
        ctx.fillStyle = p.hp > 0 ? '#1a3a8a' : '#3a1a1a';
        ctx.fillRect(p.x, p.y, p.width, p.height);
        // Walls detail
        ctx.fillStyle = '#2a4eb0';
        ctx.fillRect(p.x + 3 * S, p.y + 3 * S, p.width - 6 * S, p.height * 0.45);
        ctx.fillStyle = '#1a2a6a';
        ctx.fillRect(p.x + 3 * S, p.y + p.height * 0.45, p.width - 6 * S, p.height * 0.3);
        // Door
        ctx.fillStyle = '#0a1a4a';
        ctx.fillRect(p.x + p.width * 0.35, p.y + p.height * 0.55, p.width * 0.3, p.height * 0.45);
        // Flagpole
        ctx.strokeStyle = '#c0a000';
        ctx.lineWidth = 2.5 * S;
        ctx.beginPath();
        ctx.moveTo(p.x + p.width / 2, p.y);
        ctx.lineTo(p.x + p.width / 2, p.y - 18 * S);
        ctx.stroke();
        ctx.fillStyle = '#ff4400';
        ctx.beginPath();
        ctx.moveTo(p.x + p.width / 2, p.y - 18 * S);
        ctx.lineTo(p.x + p.width / 2 + 13 * S, p.y - 13 * S);
        ctx.lineTo(p.x + p.width / 2, p.y - 8 * S);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      // HP bar
      const barW = p.width, barH = 6 * S, barY = p.y - 14 * S;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(p.x - 1, barY - 1, barW + 2, barH + 2);
      ctx.fillStyle = '#222';
      ctx.fillRect(p.x, barY, barW, barH);
      const ratio = Math.max(0, p.hp / p.maxHp);
      ctx.fillStyle = ratio > 0.6 ? '#44ee44' : ratio > 0.3 ? '#ffaa00' : '#ff2222';
      ctx.fillRect(p.x, barY, barW * ratio, barH);
    }

    // Draw turrets
    for (const turret of this.turrets) {
      if (turret.sprite) {
        ctx.drawImage(turret.sprite, turret.x, turret.y, turret.width, turret.height);
      } else {
        const cx = turret.x + turret.width / 2, cy = turret.y + turret.height / 2;
        // Range ring
        ctx.save();
        ctx.strokeStyle = 'rgba(100,160,220,0.12)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4 * S, 6 * S]);
        ctx.beginPath();
        ctx.arc(cx, cy, turret.range, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
        // Base
        ctx.save();
        ctx.fillStyle = '#4a5f70';
        ctx.beginPath();
        ctx.arc(cx, cy, turret.width / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#2a3a48';
        ctx.lineWidth = 2 * S;
        ctx.stroke();
        // Inner ring
        ctx.fillStyle = '#5a7080';
        ctx.beginPath();
        ctx.arc(cx, cy, turret.width / 3.5, 0, Math.PI * 2);
        ctx.fill();
        // Barrel
        ctx.translate(cx, cy);
        ctx.rotate(turret.angle);
        ctx.fillStyle = '#7a9aaa';
        ctx.fillRect(2 * S, -4 * S, turret.width * 0.55, 8 * S);
        ctx.fillStyle = '#5a7888';
        ctx.fillRect(2 * S, -2 * S, turret.width * 0.55, 4 * S);
        ctx.restore();
      }
    }

    // Draw ants
    for (const ant of this.ants) {
      if (ant.sprite) {
        ctx.drawImage(ant.sprite, ant.x, ant.y, ant.width, ant.height);
      } else {
        const cx = ant.x + ant.width / 2, cy = ant.y + ant.height / 2;
        const r = ant.width / 2.5;
        ctx.save();
        const bodyColor = ant.carrying ? '#e06000' : '#aa3300';
        ctx.fillStyle = bodyColor;
        // Head
        ctx.beginPath();
        ctx.arc(cx, cy - r * 0.6, r * 0.55, 0, Math.PI * 2);
        ctx.fill();
        // Thorax
        ctx.beginPath();
        ctx.arc(cx, cy + r * 0.15, r * 0.45, 0, Math.PI * 2);
        ctx.fill();
        // Abdomen
        ctx.beginPath();
        ctx.ellipse(cx, cy + r, r * 0.55, r * 0.75, 0, 0, Math.PI * 2);
        ctx.fill();
        // Antennae
        ctx.strokeStyle = bodyColor;
        ctx.lineWidth = 1.2 * S;
        ctx.beginPath();
        ctx.moveTo(cx - 3 * S, cy - r * 0.9);
        ctx.lineTo(cx - 7 * S, cy - r * 1.6);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx + 3 * S, cy - r * 0.9);
        ctx.lineTo(cx + 7 * S, cy - r * 1.6);
        ctx.stroke();
        // Legs
        ctx.lineWidth = 1 * S;
        for (let i = -1; i <= 1; i++) {
          ctx.beginPath(); ctx.moveTo(cx - r * 0.4, cy + i * r * 0.3); ctx.lineTo(cx - r * 1.4, cy + i * r * 0.3 - r * 0.35); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx + r * 0.4, cy + i * r * 0.3); ctx.lineTo(cx + r * 1.4, cy + i * r * 0.3 - r * 0.35); ctx.stroke();
        }
        // Gem carried
        if (ant.carrying) {
          ctx.fillStyle = '#00ee88';
          ctx.shadowColor = '#00ff88';
          ctx.shadowBlur = 6 * S;
          ctx.beginPath();
          ctx.arc(cx, cy - r * 1.8, r * 0.45, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        ctx.restore();
      }
    }

    // Draw enemies
    for (const enemy of this.enemies) {
      if (enemy.sprite) {
        ctx.drawImage(enemy.sprite, enemy.x, enemy.y, enemy.width, enemy.height);
      } else {
        const cx = enemy.x + enemy.width / 2, cy = enemy.y + enemy.height / 2;
        ctx.save();
        if (enemy.type === 'rhino-beetle') {
          // Shell
          ctx.fillStyle = '#4a2800';
          ctx.beginPath();
          ctx.ellipse(cx, cy, enemy.width / 2, enemy.height / 2, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#6b3a00';
          ctx.beginPath();
          ctx.ellipse(cx, cy, enemy.width * 0.35, enemy.height * 0.35, 0, 0, Math.PI * 2);
          ctx.fill();
          // Horn
          ctx.fillStyle = '#2a1800';
          ctx.beginPath();
          ctx.moveTo(cx - 3 * S, cy - enemy.height / 2 + 2 * S);
          ctx.lineTo(cx, cy - enemy.height / 2 - 12 * S);
          ctx.lineTo(cx + 3 * S, cy - enemy.height / 2 + 2 * S);
          ctx.closePath();
          ctx.fill();
          // Legs
          ctx.strokeStyle = '#3a2000';
          ctx.lineWidth = 1.5 * S;
          for (let i = -1; i <= 1; i++) {
            ctx.beginPath(); ctx.moveTo(cx - enemy.width / 2, cy + i * enemy.height * 0.25); ctx.lineTo(cx - enemy.width / 2 - 7 * S, cy + i * enemy.height * 0.25 + 5 * S); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + enemy.width / 2, cy + i * enemy.height * 0.25); ctx.lineTo(cx + enemy.width / 2 + 7 * S, cy + i * enemy.height * 0.25 + 5 * S); ctx.stroke();
          }
        } else {
          // Mosquito body
          ctx.fillStyle = '#3a2200';
          ctx.beginPath();
          ctx.ellipse(cx, cy, enemy.width / 4, enemy.height / 2, 0, 0, Math.PI * 2);
          ctx.fill();
          // Wings
          ctx.fillStyle = 'rgba(180,210,255,0.55)';
          ctx.beginPath();
          ctx.ellipse(cx - enemy.width * 0.45, cy - 2 * S, enemy.width * 0.32, enemy.height * 0.28, -0.25, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx + enemy.width * 0.45, cy - 2 * S, enemy.width * 0.32, enemy.height * 0.28, 0.25, 0, Math.PI * 2);
          ctx.fill();
          // Proboscis
          ctx.strokeStyle = '#2a1400';
          ctx.lineWidth = 1.5 * S;
          ctx.beginPath();
          ctx.moveTo(cx, cy + enemy.height / 2);
          ctx.lineTo(cx, cy + enemy.height / 2 + 9 * S);
          ctx.stroke();
          // Legs
          ctx.lineWidth = 0.8 * S;
          ctx.strokeStyle = '#3a2200';
          for (let i = 0; i < 3; i++) {
            const ly = cy - enemy.height * 0.2 + i * enemy.height * 0.2;
            ctx.beginPath(); ctx.moveTo(cx - enemy.width / 4, ly); ctx.lineTo(cx - enemy.width * 0.85, ly + 4 * S); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + enemy.width / 4, ly); ctx.lineTo(cx + enemy.width * 0.85, ly + 4 * S); ctx.stroke();
          }
        }
        // HP bar
        const bw = enemy.width, bh = 4 * S;
        ctx.fillStyle = '#222';
        ctx.fillRect(enemy.x, enemy.y - 7 * S, bw, bh);
        ctx.fillStyle = '#ee2222';
        ctx.fillRect(enemy.x, enemy.y - 7 * S, bw * (enemy.hp / enemy.maxHp), bh);
        ctx.restore();
      }
    }

    // Draw bullets
    for (const bullet of this.bullets) {
      if (bullet.spent) continue;
      if (bullet.sprite) {
        ctx.drawImage(bullet.sprite, bullet.x - bullet.width / 2, bullet.y - bullet.height / 2, bullet.width, bullet.height);
      } else {
        ctx.save();
        ctx.fillStyle = '#ffe044';
        ctx.shadowColor = '#ffaa00';
        ctx.shadowBlur = 7 * S;
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.width / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // HUD
    this._drawHUD(ctx);
  }

  _drawHUD(ctx) {
    ctx.save();

    // Resource panel
    const panX = 8 * S, panY = 8 * S, panW = 210 * S, panH = 72 * S;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(panX, panY, panW, panH);
    ctx.strokeStyle = 'rgba(0,220,140,0.45)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(panX, panY, panW, panH);

    // Gem icon in HUD
    const gx = panX + 14 * S, gy = panY + 28 * S, gr = 9 * S;
    ctx.fillStyle = '#00ee88';
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 8 * S;
    ctx.beginPath();
    ctx.moveTo(gx, gy - gr);
    ctx.lineTo(gx + gr * 0.75, gy - gr * 0.2);
    ctx.lineTo(gx + gr * 0.65, gy + gr);
    ctx.lineTo(gx - gr * 0.65, gy + gr);
    ctx.lineTo(gx - gr * 0.75, gy - gr * 0.2);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${17 * S}px monospace`;
    ctx.fillText(`${Math.floor(this.resources)}`, panX + 28 * S, panY + 32 * S);

    ctx.fillStyle = '#ffcc44';
    ctx.font = `bold ${13 * S}px monospace`;
    ctx.fillText(`SCORE: ${this.score}`, panX + 10 * S, panY + 58 * S);

    // Ant/turret count
    ctx.fillStyle = 'rgba(200,230,255,0.75)';
    ctx.font = `${11 * S}px monospace`;
    ctx.fillText(`ANTS: ${this.ants.length}  TURRETS: ${this.turrets.length}`, panX + 10 * S, panY + 75 * S);

    // Control buttons
    const btnY = H - 52 * S;
    const antAfford = this.resources >= 20;
    const turAfford = this.resources >= 40;

    // Ant button
    ctx.fillStyle = this.selectedAction === 'place-ant' ? 'rgba(255,140,0,0.8)' : antAfford ? 'rgba(0,0,0,0.65)' : 'rgba(0,0,0,0.35)';
    ctx.fillRect(8 * S, btnY, 130 * S, 26 * S);
    ctx.strokeStyle = this.selectedAction === 'place-ant' ? '#ffaa00' : antAfford ? 'rgba(150,200,150,0.5)' : 'rgba(100,100,100,0.4)';
    ctx.lineWidth = 1.2;
    ctx.strokeRect(8 * S, btnY, 130 * S, 26 * S);
    ctx.fillStyle = antAfford ? '#eeffee' : '#666';
    ctx.font = `${11 * S}px monospace`;
    ctx.fillText('[A] Ant  (-20)', 14 * S, btnY + 17 * S);

    // Turret button
    ctx.fillStyle = this.selectedAction === 'place-turret' ? 'rgba(255,140,0,0.8)' : turAfford ? 'rgba(0,0,0,0.65)' : 'rgba(0,0,0,0.35)';
    ctx.fillRect(8 * S, btnY + 28 * S, 130 * S, 26 * S);
    ctx.strokeStyle = this.selectedAction === 'place-turret' ? '#ffaa00' : turAfford ? 'rgba(150,200,150,0.5)' : 'rgba(100,100,100,0.4)';
    ctx.strokeRect(8 * S, btnY + 28 * S, 130 * S, 26 * S);
    ctx.fillStyle = turAfford ? '#eeffee' : '#666';
    ctx.fillText('[T] Turret (-40)', 14 * S, btnY + 45 * S);

    // Active placement hint
    if (this.selectedAction) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(W / 2 - 115 * S, 6 * S, 230 * S, 24 * S);
      ctx.fillStyle = '#ffcc44';
      ctx.font = `bold ${12 * S}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(`Click to place: ${this.selectedAction}  [ESC] cancel`, W / 2, 22 * S);
      ctx.textAlign = 'left';
    }

    // Enemy count warning
    if (this.enemies.length > 0) {
      ctx.fillStyle = 'rgba(180,0,0,0.55)';
      ctx.fillRect(W - 130 * S, 8 * S, 122 * S, 24 * S);
      ctx.fillStyle = '#ffaaaa';
      ctx.font = `${12 * S}px monospace`;
      ctx.fillText(`ENEMIES: ${this.enemies.length}`, W - 122 * S, 24 * S);
    }

    // Game Over overlay
    if (this._gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ff3322';
      ctx.font = `bold ${Math.round(34 * S)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('COMMAND POST LOST', W / 2, H / 2 - 24 * S);
      ctx.fillStyle = '#ffdd44';
      ctx.font = `bold ${Math.round(22 * S)}px monospace`;
      ctx.fillText(`Final Score: ${this.score}`, W / 2, H / 2 + 18 * S);
      ctx.fillStyle = 'rgba(180,220,255,0.7)';
      ctx.font = `${Math.round(13 * S)}px monospace`;
      ctx.fillText('Resources collected: ' + Math.floor(this.resources), W / 2, H / 2 + 46 * S);
      ctx.textAlign = 'left';
    }

    ctx.restore();
  }
}


// --- Mechanic: DefendAgainstWaves ---
class DefendAgainstWaves {
  constructor(entities) {
    // ── Sprite / entity registry ──────────────────────────────────────────────
    this._spriteMap = {};
    for (const e of (entities || [])) {
      if (!this._spriteMap[e.type]) this._spriteMap[e.type] = {};
      this._spriteMap[e.type][e.name] = e;
    }

    // ── Path waypoints (dirt-path tiles, sorted by name) ──────────────────────
    this._pathEntities = (entities || [])
      .filter(e => e.type === 'dirt-path')
      .sort((a, b) => a.name.localeCompare(b.name));

    this._waypoints = this._pathEntities.map(e => ({
      x: e.x + e.width  / 2,
      y: e.y + e.height / 2,
    }));

    // Fallback: straight horizontal road across the canvas
    if (this._waypoints.length < 2) {
      const step = 60 * S;
      const cy   = H / 2;
      this._waypoints = [];
      for (let x = -step; x <= W + step; x += step) {
        this._waypoints.push({ x, y: cy });
      }
    }

    // ── Command post ──────────────────────────────────────────────────────────
    this._commandPostEntity = (entities || []).find(e => e.type === 'command-post') || null;
    this._commandPostHP    = 100;
    this._commandPostMaxHP = 100;

    // ── Turrets (pre-placed via entity list) ──────────────────────────────────
    this._turrets = (entities || [])
      .filter(e => e.type === 'gun-turret')
      .map(e => this._makeTurret(e));

    // ── Dynamic pools ────────────────────────────────────────────────────────
    this._enemies   = [];
    this._bullets   = [];
    this._gems      = [];
    this._particles = [];

    // ── Wave / phase state ────────────────────────────────────────────────────
    this._wave              = 0;
    this._totalWaves        = 5;
    this._phase             = 'prep';   // 'prep' | 'wave' | 'gameover' | 'victory'
    this._prepTimer         = 5.0;
    this._waveEnemyList     = [];
    this._waveEnemiesSpawned = 0;
    this._waveSpawnTimer    = 0;

    // ── Scoring ───────────────────────────────────────────────────────────────
    this._score        = 0;
    this._pendingEvents = [];

    // ── Input ─────────────────────────────────────────────────────────────────
    this._keys = {};
    this._nextId = 1;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  Factory helpers
  // ═══════════════════════════════════════════════════════════════════════════
  _makeTurret(entity) {
    return {
      entity,
      x: entity.x + entity.width  / 2,
      y: entity.y + entity.height / 2,
      range:       160 * S,
      fireRate:    1.2,
      fireCooldown: 0,
      damage:      28,
      angle:       0,
      target:      null,
    };
  }

  _makeEnemy(type, wave) {
    const id  = 'enemy_' + (this._nextId++);
    const cfg = {
      'soldier-ant':  { hp: 60  + wave * 15, speed: 80  * S, reward: 10, size: 32 * S },
      'rhino-beetle': { hp: 180 + wave * 40, speed: 45  * S, reward: 30, size: 42 * S },
      'mosquito':     { hp: 30  + wave *  8, speed: 145 * S, reward: 15, size: 26 * S },
    }[type] || { hp: 60, speed: 80 * S, reward: 10, size: 32 * S };

    const spriteEntry = this._spriteMap[type]
      ? Object.values(this._spriteMap[type])[0]
      : null;

    return {
      id, type,
      sprite: spriteEntry ? spriteEntry.sprite : null,
      x: this._waypoints[0].x,
      y: this._waypoints[0].y,
      waypointIndex: 0,
      hp: cfg.hp, maxHp: cfg.hp,
      speed: cfg.speed,
      reward: cfg.reward,
      size: cfg.size,
      alive: true,
      flashTimer: 0,
    };
  }

  _makeBullet(turret, target) {
    const spriteEntry = this._spriteMap['bullet-pellet']
      ? Object.values(this._spriteMap['bullet-pellet'])[0]
      : null;
    return {
      x: turret.x, y: turret.y,
      targetId: target.id,
      damage: turret.damage,
      speed: 420 * S,
      size:  7   * S,
      alive: true,
      sprite: spriteEntry ? spriteEntry.sprite : null,
    };
  }

  _makeGem(x, y) {
    const id = 'gem_' + (this._nextId++);
    const spriteEntry = this._spriteMap['resource-gem']
      ? Object.values(this._spriteMap['resource-gem'])[0]
      : null;
    return {
      id, x, y,
      size: 20 * S,
      collected: false,
      bobTimer: Math.random() * Math.PI * 2,
      sprite: spriteEntry ? spriteEntry.sprite : null,
    };
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  Event helper
  // ═══════════════════════════════════════════════════════════════════════════
  _emit(type, target, value) {
    this._pendingEvents.push({ type, target, value });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  Wave management
  // ═══════════════════════════════════════════════════════════════════════════
  _buildEnemyList(wave) {
    const list = [];
    const counts = {
      'soldier-ant':  2 + wave * 2,
      'rhino-beetle': Math.max(0, Math.floor(wave / 2)),
      'mosquito':     1 + wave,
    };
    for (const [type, count] of Object.entries(counts)) {
      for (let i = 0; i < count; i++) list.push(type);
    }
    // Fisher-Yates shuffle
    for (let i = list.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [list[i], list[j]] = [list[j], list[i]];
    }
    return list;
  }

  _startNextWave() {
    this._wave++;
    this._waveEnemyList      = this._buildEnemyList(this._wave);
    this._waveEnemiesSpawned = 0;
    this._waveSpawnTimer     = 0;
    this._phase              = 'wave';
    this._emit('state', 'game', `wave_${this._wave}`);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  update(dt) → events[]
  // ═══════════════════════════════════════════════════════════════════════════
  update(dt) {
    this._pendingEvents = [];

    if (this._phase === 'gameover' || this._phase === 'victory') {
      return this._pendingEvents;
    }

    // Particles
    for (const p of this._particles) {
      p.x  += p.vx * dt;
      p.y  += p.vy * dt;
      p.vy += 200 * S * dt;
      p.life -= dt;
    }
    this._particles = this._particles.filter(p => p.life > 0);

    // ── Prep phase countdown ──
    if (this._phase === 'prep') {
      this._prepTimer -= dt;
      if (this._prepTimer <= 0) this._startNextWave();
      return this._pendingEvents;
    }

    // ── Wave phase ──
    if (this._phase === 'wave') {
      // Spawn next enemy on interval
      if (this._waveEnemiesSpawned < this._waveEnemyList.length) {
        this._waveSpawnTimer -= dt;
        if (this._waveSpawnTimer <= 0) {
          const type  = this._waveEnemyList[this._waveEnemiesSpawned];
          const enemy = this._makeEnemy(type, this._wave);
          this._enemies.push(enemy);
          this._emit('spawn', enemy.id, {
            type, x: enemy.x, y: enemy.y, width: enemy.size, height: enemy.size,
          });
          this._waveEnemiesSpawned++;
          this._waveSpawnTimer = 0.85;
        }
      }

      // Move enemies
      for (const e of this._enemies) {
        if (!e.alive) continue;
        if (e.flashTimer > 0) e.flashTimer -= dt;
        this._stepEnemy(e, dt);
      }

      // Update turrets
      for (const t of this._turrets) this._stepTurret(t, dt);

      // Move bullets
      for (const b of this._bullets) {
        if (!b.alive) continue;
        this._stepBullet(b, dt);
      }

      // Gem bob animation
      for (const g of this._gems) {
        if (!g.collected) g.bobTimer += dt * 2.2;
      }

      // Cull dead objects
      this._enemies = this._enemies.filter(e => e.alive);
      this._bullets = this._bullets.filter(b => b.alive);
      this._gems    = this._gems.filter(g => !g.collected);

      // Check wave completion
      const allSpawned = this._waveEnemiesSpawned >= this._waveEnemyList.length;
      if (allSpawned && this._enemies.length === 0) {
        if (this._wave >= this._totalWaves) {
          this._phase = 'victory';
          this._emit('state', 'game', 'victory');
        } else {
          this._phase     = 'prep';
          this._prepTimer = 8.0;
          this._emit('state', 'game', 'prep');
        }
      }
    }

    return this._pendingEvents;
  }

  // ── Enemy movement along waypoints ──────────────────────────────────────────
  _stepEnemy(enemy, dt) {
    if (enemy.waypointIndex >= this._waypoints.length) {
      enemy.alive = false;
      this._commandPostHP -= 20;
      this._emit('destroy', enemy.id, 'reached_base');
      this._burst(enemy.x, enemy.y, '#ff4400');
      if (this._commandPostHP <= 0) {
        this._commandPostHP = 0;
        this._phase = 'gameover';
        this._emit('state', 'game', 'gameover');
      }
      return;
    }
    const wp = this._waypoints[enemy.waypointIndex];
    const dx = wp.x - enemy.x;
    const dy = wp.y - enemy.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (d < 4 * S) {
      enemy.waypointIndex++;
    } else {
      const spd = enemy.speed * dt;
      enemy.x += (dx / d) * spd;
      enemy.y += (dy / d) * spd;
    }
  }

  // ── Turret aiming & firing ───────────────────────────────────────────────────
  _stepTurret(turret, dt) {
    turret.fireCooldown = Math.max(0, turret.fireCooldown - dt);
    let best = null, bestDist = Infinity;
    for (const e of this._enemies) {
      if (!e.alive) continue;
      const dx = e.x - turret.x, dy = e.y - turret.y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < turret.range && d < bestDist) { bestDist = d; best = e; }
    }
    turret.target = best;
    if (best) {
      turret.angle = Math.atan2(best.y - turret.y, best.x - turret.x);
      if (turret.fireCooldown <= 0) {
        this._bullets.push(this._makeBullet(turret, best));
        turret.fireCooldown = 1 / turret.fireRate;
      }
    }
  }

  // ── Bullet tracking & hit detection ─────────────────────────────────────────
  _stepBullet(bullet, dt) {
    const target = this._enemies.find(e => e.id === bullet.targetId && e.alive);
    if (!target) { bullet.alive = false; return; }
    const dx = target.x - bullet.x, dy = target.y - bullet.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (d <= bullet.speed * dt + target.size * 0.4) {
      // Hit
      target.hp       -= bullet.damage;
      target.flashTimer = 0.1;
      bullet.alive      = false;
      if (target.hp <= 0) {
        target.alive = false;
        this._score += target.reward;
        this._emit('score',   target.id, target.reward);
        this._emit('destroy', target.id, 'killed');
        this._burst(target.x, target.y, '#ffaa00');
        const gem = this._makeGem(target.x, target.y);
        this._gems.push(gem);
        this._emit('spawn', gem.id, {
          type: 'resource-gem', x: gem.x, y: gem.y, width: gem.size, height: gem.size,
        });
      }
    } else {
      bullet.x += (dx / d) * bullet.speed * dt;
      bullet.y += (dy / d) * bullet.speed * dt;
    }
  }

  // ── Particle burst ───────────────────────────────────────────────────────────
  _burst(x, y, color) {
    for (let i = 0; i < 12; i++) {
      const ang  = Math.random() * Math.PI * 2;
      const spd  = (60 + Math.random() * 120) * S;
      const life = 0.35 + Math.random() * 0.35;
      this._particles.push({
        x, y,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        color, size: (3 + Math.random() * 4) * S,
        life, maxLife: life,
      });
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  draw(ctx)
  // ═══════════════════════════════════════════════════════════════════════════
  draw(ctx) {
    // ── Grass background tiles ────────────────────────────────────────────────
    const grassEntries = this._spriteMap['grass-tile']
      ? Object.values(this._spriteMap['grass-tile'])
      : [];
    for (const e of grassEntries) {
      if (e.sprite) {
        ctx.drawImage(e.sprite, e.x, e.y, e.width, e.height);
      } else {
        ctx.fillStyle = '#5a8a3c';
        ctx.fillRect(e.x, e.y, e.width, e.height);
      }
    }

    // ── Dirt-path tiles ───────────────────────────────────────────────────────
    for (const pe of this._pathEntities) {
      if (pe.sprite) {
        ctx.drawImage(pe.sprite, pe.x, pe.y, pe.width, pe.height);
      } else {
        ctx.fillStyle = '#c8a46e';
        ctx.fillRect(pe.x, pe.y, pe.width, pe.height);
      }
    }

    // ── Command post ──────────────────────────────────────────────────────────
    if (this._commandPostEntity) {
      const cp = this._commandPostEntity;
      if (cp.sprite) {
        ctx.drawImage(cp.sprite, cp.x, cp.y, cp.width, cp.height);
      } else {
        ctx.fillStyle = '#4488ff';
        ctx.fillRect(cp.x, cp.y, cp.width, cp.height);
        ctx.strokeStyle = '#aaccff';
        ctx.lineWidth   = 2 * S;
        ctx.strokeRect(cp.x, cp.y, cp.width, cp.height);
      }
      // HP bar
      const bw = cp.width, bh = 8 * S, by = cp.y - bh - 4 * S;
      ctx.fillStyle = '#333';
      ctx.fillRect(cp.x, by, bw, bh);
      ctx.fillStyle = this._commandPostHP > 40 ? '#44dd44' : '#dd2222';
      ctx.fillRect(cp.x, by, bw * (this._commandPostHP / this._commandPostMaxHP), bh);
      ctx.strokeStyle = '#000';
      ctx.lineWidth   = 1;
      ctx.strokeRect(cp.x, by, bw, bh);
    }

    // ── Resource gems ─────────────────────────────────────────────────────────
    for (const gem of this._gems) {
      const bob = Math.sin(gem.bobTimer) * 4 * S;
      if (gem.sprite) {
        ctx.drawImage(gem.sprite, gem.x - gem.size / 2, gem.y - gem.size / 2 + bob, gem.size, gem.size);
      } else {
        ctx.save();
        ctx.shadowColor = '#00eeff';
        ctx.shadowBlur  = 12;
        ctx.fillStyle   = '#00eeff';
        ctx.beginPath();
        // Diamond shape
        const gs = gem.size / 2;
        ctx.moveTo(gem.x,      gem.y + bob - gs);
        ctx.lineTo(gem.x + gs, gem.y + bob);
        ctx.lineTo(gem.x,      gem.y + bob + gs);
        ctx.lineTo(gem.x - gs, gem.y + bob);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      // Tap hint ring
      ctx.save();
      ctx.strokeStyle = 'rgba(0,238,255,0.4)';
      ctx.lineWidth   = 1.5 * S;
      ctx.beginPath();
      ctx.arc(gem.x, gem.y + Math.sin(gem.bobTimer) * 4 * S, gem.size * 0.8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // ── Enemies ───────────────────────────────────────────────────────────────
    for (const enemy of this._enemies) {
      if (!enemy.alive) continue;
      const s = enemy.size;

      ctx.save();
      if (enemy.flashTimer > 0) {
        ctx.filter       = 'brightness(3) saturate(0)';
        ctx.globalAlpha  = 0.85;
      }
      if (enemy.sprite) {
        ctx.drawImage(enemy.sprite, enemy.x - s / 2, enemy.y - s / 2, s, s);
      } else {
        const col = { 'soldier-ant': '#cc4400', 'rhino-beetle': '#557722', 'mosquito': '#774499' };
        ctx.fillStyle = col[enemy.type] || '#888888';
        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, s / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth   = 1.5 * S;
        ctx.stroke();
      }
      ctx.restore();

      // HP bar
      const bw = s * 1.2, bh = 5 * S, by = enemy.y - s / 2 - bh - 3 * S;
      ctx.fillStyle = '#333';
      ctx.fillRect(enemy.x - bw / 2, by, bw, bh);
      const hpFrac = Math.max(0, enemy.hp / enemy.maxHp);
      ctx.fillStyle = hpFrac > 0.5 ? '#44dd44' : hpFrac > 0.25 ? '#ddcc00' : '#dd2222';
      ctx.fillRect(enemy.x - bw / 2, by, bw * hpFrac, bh);
    }

    // ── Turrets ───────────────────────────────────────────────────────────────
    for (const turret of this._turrets) {
      const e = turret.entity;

      // Faint range ring when active
      if (turret.target) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,100,0.12)';
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.arc(turret.x, turret.y, turret.range, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      ctx.save();
      ctx.translate(turret.x, turret.y);
      ctx.rotate(turret.angle);
      if (e.sprite) {
        ctx.drawImage(e.sprite, -e.width / 2, -e.height / 2, e.width, e.height);
      } else {
        const ts = Math.min(e.width, e.height);
        ctx.fillStyle = '#99aabb';
        ctx.beginPath();
        ctx.arc(0, 0, ts / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#778899';
        ctx.lineWidth   = 2 * S;
        ctx.stroke();
        // Barrel
        ctx.fillStyle = '#556677';
        ctx.fillRect(0, -ts * 0.14, ts * 0.55, ts * 0.28);
      }
      ctx.restore();
    }

    // ── Bullets ───────────────────────────────────────────────────────────────
    for (const bullet of this._bullets) {
      if (!bullet.alive) continue;
      if (bullet.sprite) {
        ctx.drawImage(
          bullet.sprite,
          bullet.x - bullet.size / 2, bullet.y - bullet.size / 2,
          bullet.size, bullet.size
        );
      } else {
        ctx.save();
        ctx.shadowColor = '#ffff66';
        ctx.shadowBlur  = 10;
        ctx.fillStyle   = '#ffee00';
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, bullet.size / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ── Particles ─────────────────────────────────────────────────────────────
    for (const p of this._particles) {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, p.size * alpha), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // ── HUD ───────────────────────────────────────────────────────────────────
    this._drawHUD(ctx);
  }

  _drawHUD(ctx) {
    const pad  = 14 * S;
    const fs   = Math.max(10, Math.round(15 * S));

    ctx.save();
    ctx.font        = `bold ${fs}px monospace`;
    ctx.shadowColor = '#000';
    ctx.shadowBlur  = 5;
    ctx.fillStyle   = '#ffffff';

    // Score — top-left
    ctx.fillText(`Score: ${this._score}`, pad, pad + fs);

    // Wave label — top-centre
    let waveLabel;
    if      (this._phase === 'prep')    waveLabel = `Wave ${this._wave + 1} starts in ${Math.ceil(this._prepTimer)}s`;
    else if (this._phase === 'wave')    waveLabel = `Wave ${this._wave} / ${this._totalWaves}`;
    else if (this._phase === 'victory') waveLabel = '★  VICTORY  ★';
    else                                waveLabel = '✖  GAME OVER  ✖';
    const lw = ctx.measureText(waveLabel).width;
    ctx.fillText(waveLabel, W / 2 - lw / 2, pad + fs);

    // Enemy count — top-right
    if (this._phase === 'wave') {
      const ecnt = `Enemies: ${this._enemies.length}`;
      ctx.fillText(ecnt, W - pad - ctx.measureText(ecnt).width, pad + fs);
    }

    // Base HP bar — bottom-left
    const barW = 120 * S, barH = 12 * S;
    const barX = pad, barY = H - pad - barH;
    ctx.fillStyle = '#222';
    ctx.fillRect(barX, barY, barW, barH);
    const hpFrac = Math.max(0, this._commandPostHP / this._commandPostMaxHP);
    ctx.fillStyle = hpFrac > 0.5 ? '#44dd44' : hpFrac > 0.25 ? '#ddcc00' : '#dd2222';
    ctx.fillRect(barX, barY, barW * hpFrac, barH);
    ctx.strokeStyle = '#000';
    ctx.lineWidth   = 1;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.font      = `${Math.max(8, Math.round(11 * S))}px monospace`;
    ctx.fillStyle = '#fff';
    ctx.fillText('BASE HP', barX, barY - 3 * S);
    ctx.restore();

    // ── End-game overlay ──────────────────────────────────────────────────────
    if (this._phase === 'gameover' || this._phase === 'victory') {
      ctx.save();
      ctx.fillStyle = this._phase === 'gameover'
        ? 'rgba(160,0,0,0.65)'
        : 'rgba(0,120,0,0.65)';
      ctx.fillRect(0, 0, W, H);

      const bigFs = Math.max(24, Math.round(52 * S));
      ctx.font        = `bold ${bigFs}px monospace`;
      ctx.fillStyle   = '#ffffff';
      ctx.shadowColor = '#000';
      ctx.shadowBlur  = 10;
      const msg = this._phase === 'gameover' ? 'GAME OVER' : 'VICTORY!';
      ctx.fillText(msg, W / 2 - ctx.measureText(msg).width / 2, H / 2);

      const subFs = Math.max(12, Math.round(20 * S));
      ctx.font = `${subFs}px monospace`;
      const sub = `Final Score: ${this._score}`;
      ctx.fillText(sub, W / 2 - ctx.measureText(sub).width / 2, H / 2 + 55 * S);

      const hint = 'Tap / click to restart';
      ctx.font      = `${Math.max(10, Math.round(14 * S))}px monospace`;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText(hint, W / 2 - ctx.measureText(hint).width / 2, H / 2 + 90 * S);
      ctx.restore();
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  handleInput(type, data)
  // ═══════════════════════════════════════════════════════════════════════════
  handleInput(type, data) {
    if (!data) return;

    if (type === 'keydown') {
      this._keys[data.key] = true;
    } else if (type === 'keyup') {
      delete this._keys[data.key];
    } else if (type === 'touchstart' || type === 'mousedown') {
      const x = data.clientX  != null ? data.clientX
              : data.touches && data.touches[0] ? data.touches[0].clientX
              : 0;
      const y = data.clientY  != null ? data.clientY
              : data.touches && data.touches[0] ? data.touches[0].clientY
              : 0;
      this._onTap(x, y);
    } else if (type === 'touchend') {
      if (data.changedTouches && data.changedTouches[0]) {
        this._onTap(data.changedTouches[0].clientX, data.changedTouches[0].clientY);
      }
    }
  }

  _onTap(x, y) {
    // Restart on game-over / victory
    if (this._phase === 'gameover' || this._phase === 'victory') {
      this._restart();
      return;
    }

    // Collect nearby gems
    for (const gem of this._gems) {
      const dx = gem.x - x, dy = gem.y - y;
      if (!gem.collected && Math.sqrt(dx * dx + dy * dy) < gem.size * 1.4) {
        gem.collected = true;
        this._score  += 5;
        this._emit('score',   gem.id, 5);
        this._emit('destroy', gem.id, 'collected');
        return;
      }
    }
  }

  _restart() {
    this._enemies            = [];
    this._bullets            = [];
    this._gems               = [];
    this._particles          = [];
    this._wave               = 0;
    this._phase              = 'prep';
    this._prepTimer          = 5.0;
    this._waveEnemyList      = [];
    this._waveEnemiesSpawned = 0;
    this._waveSpawnTimer     = 0;
    this._score              = 0;
    this._commandPostHP      = this._commandPostMaxHP;
    for (const t of this._turrets) { t.fireCooldown = 0; t.target = null; t.angle = 0; }
    this._emit('state', 'game', 'restart');
  }
}


// --- Mechanic: StrategizePositions ---
class StrategizePositions {
  constructor(entities) {
    this.entities = entities || [];

    // ── Helpers ──────────────────────────────────────────────────
    this._sprite = (type) => {
      const e = this.entities.find(e => e.type === type);
      return e ? e.sprite : null;
    };

    // ── Layout ───────────────────────────────────────────────────
    this.CELL        = 60 * S;
    this.PALETTE_H   = 70 * S;
    this.FIELD_H     = H - this.PALETTE_H;
    this.COLS        = Math.max(1, Math.floor(W / this.CELL));
    this.ROWS        = Math.max(1, Math.floor(this.FIELD_H / this.CELL));

    // ── Game state ───────────────────────────────────────────────
    this.state       = 'active';   // 'active' | 'gameover'
    this.score       = 0;
    this.resources   = 120;
    this.wave        = 1;

    // ── Command post ─────────────────────────────────────────────
    this.post = {
      x: W - 50 * S, y: this.FIELD_H / 2,
      w: 56 * S,      h: 56 * S,
      hp: 10, maxHp: 10,
      sprite: this._sprite('command-post'),
    };

    // ── Lanes (3 horizontal paths) ───────────────────────────────
    this.lanes = [0.22, 0.50, 0.78].map(pct => {
      const y = this.FIELD_H * pct;
      return [
        { x: -24 * S,           y },
        { x: W * 0.28,          y },
        { x: W * 0.58,          y },
        { x: this.post.x,       y: this.post.y },
      ];
    });

    // ── Palette / defender catalogue ─────────────────────────────
    this.PALETTE = [
      { type: 'gun-turret',   cost: 30, fireRate: 1.4, damage: 2, range: 130 * S, color: '#4488ff' },
      { type: 'soldier-ant',  cost: 20, attackRate: 0.8,  damage: 1, range:  42 * S, color: '#ff8844' },
      { type: 'rhino-beetle', cost: 45, attackRate: 2.0,  damage: 6, range:  52 * S, color: '#9944cc' },
    ];
    this.SLOT_W  = 58 * S;
    this.SLOT_H  = 58 * S;
    this.SLOT_PAD = 10 * S;
    this.selectedIdx = -1;  // palette selection

    // ── Dynamic collections ───────────────────────────────────────
    this.defenders   = [];   // placed defenders
    this.enemies     = [];   // active mosquitoes
    this.projectiles = [];   // bullet-pellets in flight
    this.gems        = [];   // resource-gems
    this.particles   = [];   // visual fx
    this.occupied    = new Set();  // 'col,row' strings

    // ── Timers ────────────────────────────────────────────────────
    this.gemTimer   = 0;
    this.GEM_INTERVAL = 5.5;
    this.spawnQueue = [];  // { delay }
    this.waveTimer  = 0;
    this.WAVE_INTERVAL = 9;
    this.nextWaveAt = this.WAVE_INTERVAL;

    // ── Input state ───────────────────────────────────────────────
    this._cursor = null;
    this._events = [];
  }

  // ═══════════════════════════════════════════════════════════════
  //  UPDATE
  // ═══════════════════════════════════════════════════════════════
  update(dt) {
    this._events = [];
    if (this.state === 'gameover') return this._events;

    this._tickWaves(dt);
    this._tickGems(dt);
    this._tickEnemies(dt);
    this._tickDefenders(dt);
    this._tickProjectiles(dt);
    this._tickParticles(dt);

    return this._events;
  }

  _tickWaves(dt) {
    // Drain spawn queue
    for (let i = this.spawnQueue.length - 1; i >= 0; i--) {
      this.spawnQueue[i].delay -= dt;
      if (this.spawnQueue[i].delay <= 0) {
        this._spawnEnemy();
        this.spawnQueue.splice(i, 1);
      }
    }
    // Schedule next wave
    this.waveTimer += dt;
    if (this.waveTimer >= this.nextWaveAt) {
      this.nextWaveAt += this.WAVE_INTERVAL;
      const count = 1 + this.wave;
      for (let i = 0; i < count; i++) {
        this.spawnQueue.push({ delay: i * 1.3 });
      }
      this.wave++;
      this._emit('state', 'wave', this.wave);
    }
  }

  _spawnEnemy() {
    const lane = this.lanes[Math.floor(Math.random() * this.lanes.length)];
    const hp   = 3 + this.wave * 2;
    this.enemies.push({
      x: lane[0].x, y: lane[0].y,
      hp, maxHp: hp,
      speed:  (38 + this.wave * 4) * S,
      w: 30 * S, h: 30 * S,
      lane, wpIdx: 1,
      sprite: this._sprite('mosquito'),
      flash: 0,
    });
  }

  _tickGems(dt) {
    this.gemTimer += dt;
    if (this.gemTimer >= this.GEM_INTERVAL) {
      this.gemTimer = 0;
      this._spawnGem();
    }
    for (let i = this.gems.length - 1; i >= 0; i--) {
      const g = this.gems[i];
      g.life -= dt;
      g.pulse += dt * 4;
      if (g.life <= 0) this.gems.splice(i, 1);
    }
  }

  _spawnGem() {
    const margin = 80 * S;
    const maxX   = W - margin - 80 * S;
    const maxY   = this.FIELD_H - margin;
    if (maxX <= margin || maxY <= margin) return;
    this.gems.push({
      x: margin + Math.random() * (maxX - margin),
      y: margin + Math.random() * (maxY - margin),
      value: 15 + Math.floor(Math.random() * 20),
      life: 7,
      pulse: Math.random() * Math.PI * 2,
      w: 22 * S, h: 22 * S,
      sprite: this._sprite('resource-gem'),
    });
  }

  _tickEnemies(dt) {
    for (let i = this.enemies.length - 1; i >= 0; i--) {
      const e = this.enemies[i];
      e.flash = Math.max(0, e.flash - dt * 4);

      const target = e.lane[e.wpIdx];
      const dx = target.x - e.x;
      const dy = target.y - e.y;
      const dist = Math.hypot(dx, dy);

      if (dist < 4 * S) {
        if (e.wpIdx < e.lane.length - 1) {
          e.wpIdx++;
        } else {
          // Reached command post
          this.post.hp = Math.max(0, this.post.hp - 1);
          this._addParticles(this.post.x, this.post.y, '#ff4444', 8);
          this._emit('state', 'command-post', { hp: this.post.hp });
          this.enemies.splice(i, 1);
          if (this.post.hp <= 0) {
            this.state = 'gameover';
            this._emit('state', 'game', 'gameover');
          }
          continue;
        }
      } else {
        e.x += (dx / dist) * e.speed * dt;
        e.y += (dy / dist) * e.speed * dt;
      }
    }
  }

  _tickDefenders(dt) {
    for (const def of this.defenders) {
      if (def.type === 'gun-turret') {
        def.fireTimer += dt;
        if (def.fireTimer >= def.fireRate) {
          const target = this._nearestEnemy(def.x, def.y, def.range);
          if (target) {
            def.fireTimer = 0;
            const dx = target.x - def.x;
            const dy = target.y - def.y;
            const d  = Math.hypot(dx, dy);
            const sp = 210 * S;
            this.projectiles.push({
              x: def.x, y: def.y,
              vx: (dx / d) * sp,
              vy: (dy / d) * sp,
              damage: def.damage,
              w: 9 * S, h: 9 * S,
              sprite: this._sprite('bullet-pellet'),
            });
            this._emit('spawn', 'bullet-pellet', { x: def.x, y: def.y });
          }
        }
      } else {
        // Melee defenders: soldier-ant / rhino-beetle
        def.atkTimer += dt;
        if (def.atkTimer >= def.attackRate) {
          for (let i = this.enemies.length - 1; i >= 0; i--) {
            const e = this.enemies[i];
            if (Math.hypot(e.x - def.x, e.y - def.y) < def.range) {
              e.hp -= def.damage;
              e.flash = 1;
              if (e.hp <= 0) {
                this._killEnemy(i);
              }
              break;
            }
          }
          def.atkTimer = 0;
        }
      }
    }
  }

  _tickProjectiles(dt) {
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      const p = this.projectiles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      if (p.x < -20 * S || p.x > W + 20 * S || p.y < -20 * S || p.y > this.FIELD_H + 20 * S) {
        this.projectiles.splice(i, 1);
        continue;
      }

      let hit = false;
      for (let j = this.enemies.length - 1; j >= 0; j--) {
        const e = this.enemies[j];
        if (Math.hypot(p.x - e.x, p.y - e.y) < (e.w * 0.5 + p.w * 0.5)) {
          e.hp -= p.damage;
          e.flash = 1;
          hit = true;
          this._addParticles(p.x, p.y, '#ffee44', 4);
          if (e.hp <= 0) this._killEnemy(j);
          break;
        }
      }
      if (hit) this.projectiles.splice(i, 1);
    }
  }

  _killEnemy(idx) {
    const e = this.enemies[idx];
    this._addParticles(e.x, e.y, '#ff6633', 10);
    this.enemies.splice(idx, 1);
    const pts = 50;
    this.score += pts;
    this._emit('destroy', 'mosquito', { x: e.x, y: e.y });
    this._emit('score',   'player',   pts);
  }

  _tickParticles(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x  += p.vx * dt;
      p.y  += p.vy * dt;
      p.vy += 80 * S * dt;
      p.life -= dt;
      if (p.life <= 0) this.particles.splice(i, 1);
    }
  }

  _addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = (30 + Math.random() * 80) * S;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        color,
        r: (2 + Math.random() * 3) * S,
        life: 0.4 + Math.random() * 0.4,
        maxLife: 0.8,
      });
    }
  }

  _nearestEnemy(ox, oy, range) {
    let best = null, bestD = range;
    for (const e of this.enemies) {
      const d = Math.hypot(e.x - ox, e.y - oy);
      if (d < bestD) { bestD = d; best = e; }
    }
    return best;
  }

  _emit(type, target, value) {
    this._events.push({ type, target, value });
  }

  // ═══════════════════════════════════════════════════════════════
  //  DRAW
  // ═══════════════════════════════════════════════════════════════
  draw(ctx) {
    this._drawField(ctx);
    this._drawLanes(ctx);
    this._drawGems(ctx);
    this._drawDefenders(ctx);
    this._drawEnemies(ctx);
    this._drawProjectiles(ctx);
    this._drawParticles(ctx);
    this._drawCommandPost(ctx);
    this._drawPalette(ctx);
    this._drawHUD(ctx);
    if (this.selectedIdx >= 0 && this._cursor && this._cursor.y < this.FIELD_H) {
      this._drawPlacementGhost(ctx);
    }
    if (this.state === 'gameover') this._drawGameOver(ctx);
  }

  _drawField(ctx) {
    const grassSprite = this._sprite('grass-tile');
    if (grassSprite) {
      const cs = this.CELL;
      for (let r = 0; r < this.ROWS; r++) {
        for (let c = 0; c < this.COLS; c++) {
          ctx.drawImage(grassSprite, c * cs, r * cs, cs, cs);
        }
      }
    } else {
      ctx.fillStyle = '#2d6a38';
      ctx.fillRect(0, 0, W, this.FIELD_H);
      // subtle grid
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1;
      for (let r = 0; r <= this.ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * this.CELL);
        ctx.lineTo(W, r * this.CELL);
        ctx.stroke();
      }
      for (let c = 0; c <= this.COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * this.CELL, 0);
        ctx.lineTo(c * this.CELL, this.FIELD_H);
        ctx.stroke();
      }
    }
  }

  _drawLanes(ctx) {
    const pathSprite = this._sprite('dirt-path');
    const pw = 38 * S;
    for (const lane of this.lanes) {
      for (let i = 0; i < lane.length - 1; i++) {
        const a = lane[i], b = lane[i + 1];
        const dx = b.x - a.x, dy = b.y - a.y;
        const len = Math.hypot(dx, dy);
        const steps = Math.ceil(len / (this.CELL * 0.45));
        for (let s = 0; s <= steps; s++) {
          const t = s / steps;
          const px = a.x + dx * t;
          const py = a.y + dy * t;
          if (pathSprite) {
            ctx.drawImage(pathSprite, px - pw / 2, py - pw / 2, pw, pw);
          } else {
            ctx.fillStyle = '#c4a35a';
            ctx.beginPath();
            ctx.arc(px, py, pw / 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }
  }

  _drawGems(ctx) {
    const gemSprite = this._sprite('resource-gem');
    for (const g of this.gems) {
      const alpha  = Math.min(1, g.life * 0.5);
      const pulse  = 1 + Math.sin(g.pulse) * 0.12;
      const sz     = g.w * pulse;
      ctx.save();
      ctx.globalAlpha = alpha;
      if (gemSprite) {
        ctx.drawImage(gemSprite, g.x - sz / 2, g.y - sz / 2, sz, sz);
      } else {
        ctx.fillStyle = '#00ffcc';
        ctx.beginPath();
        // diamond shape
        ctx.moveTo(g.x,        g.y - sz * 0.6);
        ctx.lineTo(g.x + sz * 0.45, g.y);
        ctx.lineTo(g.x,        g.y + sz * 0.6);
        ctx.lineTo(g.x - sz * 0.45, g.y);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.moveTo(g.x - sz * 0.1, g.y - sz * 0.5);
        ctx.lineTo(g.x + sz * 0.25, g.y - sz * 0.05);
        ctx.lineTo(g.x,            g.y - sz * 0.05);
        ctx.closePath();
        ctx.fill();
      }
      // value label
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${9 * S}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`+${g.value}`, g.x, g.y + sz * 0.75);
      ctx.restore();
    }
  }

  _drawDefenders(ctx) {
    for (const def of this.defenders) {
      if (def.sprite) {
        ctx.drawImage(def.sprite, def.x - def.w / 2, def.y - def.h / 2, def.w, def.h);
      } else {
        ctx.fillStyle = def.color || '#88aaff';
        ctx.beginPath();
        ctx.arc(def.x, def.y, def.w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 2 * S;
        ctx.stroke();
      }
      // range ring (faint)
      if (def.type === 'gun-turret') {
        ctx.strokeStyle = 'rgba(100,160,255,0.18)';
        ctx.lineWidth = 1.5 * S;
        ctx.setLineDash([4 * S, 6 * S]);
        ctx.beginPath();
        ctx.arc(def.x, def.y, def.range, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  _drawEnemies(ctx) {
    for (const e of this.enemies) {
      ctx.save();
      if (e.flash > 0) {
        ctx.filter = `brightness(${1 + e.flash * 2})`;
      }
      if (e.sprite) {
        ctx.drawImage(e.sprite, e.x - e.w / 2, e.y - e.h / 2, e.w, e.h);
      } else {
        ctx.fillStyle = '#ff2244';
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.w / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      // HP bar
      const bw = e.w, bh = 5 * S;
      const by = e.y - e.h / 2 - bh - 2 * S;
      const ratio = Math.max(0, e.hp / e.maxHp);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(e.x - bw / 2, by, bw, bh);
      ctx.fillStyle = ratio > 0.5 ? '#44ff66' : ratio > 0.25 ? '#ffaa00' : '#ff3333';
      ctx.fillRect(e.x - bw / 2, by, bw * ratio, bh);
    }
  }

  _drawProjectiles(ctx) {
    const bSprite = this._sprite('bullet-pellet');
    for (const p of this.projectiles) {
      if (bSprite) {
        ctx.drawImage(bSprite, p.x - p.w / 2, p.y - p.h / 2, p.w, p.h);
      } else {
        ctx.fillStyle = '#ffe040';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,220,0,0.3)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.w, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  _drawParticles(ctx) {
    for (const p of this.particles) {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  _drawCommandPost(ctx) {
    const cp = this.post;
    if (cp.sprite) {
      ctx.drawImage(cp.sprite, cp.x - cp.w / 2, cp.y - cp.h / 2, cp.w, cp.h);
    } else {
      ctx.fillStyle = '#ffd700';
      ctx.strokeStyle = '#ff8800';
      ctx.lineWidth = 3 * S;
      ctx.beginPath();
      ctx.rect(cp.x - cp.w / 2, cp.y - cp.h / 2, cp.w, cp.h);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#7a4400';
      ctx.font = `bold ${11 * S}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('HQ', cp.x, cp.y);
    }
    // HP bar
    const bw = cp.w + 10 * S, bh = 8 * S;
    const by = cp.y - cp.h / 2 - bh - 4 * S;
    const ratio = Math.max(0, cp.hp / cp.maxHp);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cp.x - bw / 2, by, bw, bh);
    ctx.fillStyle = ratio > 0.5 ? '#44ff88' : ratio > 0.25 ? '#ffaa00' : '#ff3333';
    ctx.fillRect(cp.x - bw / 2, by, bw * ratio, bh);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1 * S;
    ctx.strokeRect(cp.x - bw / 2, by, bw, bh);
  }

  _drawPalette(ctx) {
    // Background strip
    ctx.fillStyle = 'rgba(15,15,30,0.92)';
    ctx.fillRect(0, this.FIELD_H, W, this.PALETTE_H);
    ctx.strokeStyle = 'rgba(100,140,255,0.4)';
    ctx.lineWidth = 1.5 * S;
    ctx.beginPath();
    ctx.moveTo(0, this.FIELD_H);
    ctx.lineTo(W, this.FIELD_H);
    ctx.stroke();

    const startX = 12 * S;
    const slotY  = this.FIELD_H + (this.PALETTE_H - this.SLOT_H) / 2;

    for (let i = 0; i < this.PALETTE.length; i++) {
      const item = this.PALETTE[i];
      const sx   = startX + i * (this.SLOT_W + this.SLOT_PAD);
      const isSelected = this.selectedIdx === i;
      const canAfford  = this.resources >= item.cost;

      // Slot background
      ctx.fillStyle = isSelected
        ? 'rgba(255,210,0,0.30)'
        : canAfford
          ? 'rgba(80,110,180,0.25)'
          : 'rgba(60,60,60,0.25)';
      ctx.fillRect(sx, slotY, this.SLOT_W, this.SLOT_H);

      // Slot border
      ctx.strokeStyle = isSelected ? '#ffd700' : canAfford ? '#5588cc' : '#444';
      ctx.lineWidth = isSelected ? 2.5 * S : 1.5 * S;
      ctx.strokeRect(sx, slotY, this.SLOT_W, this.SLOT_H);

      // Icon
      const sprite  = this._sprite(item.type);
      const iconSz  = this.SLOT_W * 0.58;
      const iconX   = sx + (this.SLOT_W - iconSz) / 2;
      const iconY   = slotY + 4 * S;
      ctx.save();
      if (!canAfford) ctx.globalAlpha = 0.35;
      if (sprite) {
        ctx.drawImage(sprite, iconX, iconY, iconSz, iconSz);
      } else {
        ctx.fillStyle = item.color;
        ctx.beginPath();
        ctx.arc(sx + this.SLOT_W / 2, slotY + this.SLOT_H * 0.42, iconSz / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      // Cost
      ctx.fillStyle = canAfford ? '#ffd700' : '#666';
      ctx.font = `bold ${9 * S}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(`💎${item.cost}`, sx + this.SLOT_W / 2, slotY + this.SLOT_H - 3 * S);

      // Key hint
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = `${8 * S}px sans-serif`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`[${i + 1}]`, sx + 3 * S, slotY + 3 * S);
    }
  }

  _drawHUD(ctx) {
    ctx.textBaseline = 'middle';
    // Resources
    const resourceX = 12 * S + this.PALETTE.length * (this.SLOT_W + this.SLOT_PAD) + 14 * S;
    const midY = this.FIELD_H + this.PALETTE_H / 2;
    ctx.fillStyle = '#00ffcc';
    ctx.font = `bold ${13 * S}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(`💎 ${this.resources}`, resourceX, midY - 8 * S);
    // Score
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${12 * S}px sans-serif`;
    ctx.fillText(`⭐ ${this.score}`, resourceX, midY + 8 * S);
    // Wave
    ctx.fillStyle = '#aaddff';
    ctx.font = `bold ${12 * S}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(`Wave ${Math.max(1, this.wave - 1)}`, W - 12 * S, midY - 8 * S);
    // Deselect hint
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = `${8 * S}px sans-serif`;
    ctx.fillText('[ESC] deselect', W - 12 * S, midY + 8 * S);
  }

  _drawPlacementGhost(ctx) {
    const pos  = this._cursor;
    const cell = this._snapToCell(pos.x, pos.y);
    const key  = `${cell.col},${cell.row}`;
    const canPlace = !this.occupied.has(key);
    const item = this.PALETTE[this.selectedIdx];
    const sprite = this._sprite(item.type);
    const sz = 40 * S;
    const cx = cell.col * this.CELL + this.CELL / 2;
    const cy = cell.row * this.CELL + this.CELL / 2;

    // Cell highlight
    ctx.fillStyle = canPlace ? 'rgba(0,255,100,0.18)' : 'rgba(255,50,50,0.22)';
    ctx.fillRect(cell.col * this.CELL, cell.row * this.CELL, this.CELL, this.CELL);
    ctx.strokeStyle = canPlace ? '#00ff88' : '#ff4444';
    ctx.lineWidth = 2 * S;
    ctx.strokeRect(cell.col * this.CELL, cell.row * this.CELL, this.CELL, this.CELL);

    ctx.save();
    ctx.globalAlpha = 0.65;
    if (sprite) {
      ctx.drawImage(sprite, cx - sz / 2, cy - sz / 2, sz, sz);
    } else {
      ctx.fillStyle = canPlace ? item.color : '#ff4444';
      ctx.beginPath();
      ctx.arc(cx, cy, sz / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  _drawGameOver(ctx) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#ff4444';
    ctx.font = `bold ${30 * S}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('COMMAND POST DESTROYED', W / 2, H / 2 - 22 * S);

    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${20 * S}px sans-serif`;
    ctx.fillText(`Final Score: ${this.score}`, W / 2, H / 2 + 10 * S);

    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = `${12 * S}px sans-serif`;
    ctx.fillText(`Waves survived: ${Math.max(0, this.wave - 1)}`, W / 2, H / 2 + 32 * S);
  }

  // ═══════════════════════════════════════════════════════════════
  //  INPUT
  // ═══════════════════════════════════════════════════════════════
  handleInput(type, data) {
    if (type === 'keydown') {
      this._onKey(data);
    } else if (type === 'mousedown') {
      const { x, y } = this._extractXY(data);
      this._cursor = { x, y };
      this._onClick(x, y);
    } else if (type === 'mousemove') {
      const { x, y } = this._extractXY(data);
      this._cursor = { x, y };
    } else if (type === 'touchstart') {
      const { x, y } = this._extractTouch(data);
      this._cursor = { x, y };
    } else if (type === 'touchmove') {
      const { x, y } = this._extractTouch(data);
      this._cursor = { x, y };
    } else if (type === 'touchend') {
      const { x, y } = this._extractTouch(data);
      this._cursor = { x, y };
      this._onClick(x, y);
    }
  }

  _onKey(data) {
    const k = data.key;
    if (k === 'Escape' || k === 'Esc') {
      this.selectedIdx = -1;
    } else if (k === '1') {
      this.selectedIdx = this.selectedIdx === 0 ? -1 : 0;
    } else if (k === '2') {
      this.selectedIdx = this.selectedIdx === 1 ? -1 : 1;
    } else if (k === '3') {
      this.selectedIdx = this.selectedIdx === 2 ? -1 : 2;
    }
  }

  _onClick(x, y) {
    if (this.state === 'gameover') return;

    // Palette click
    if (y >= this.FIELD_H) {
      const startX = 12 * S;
      const slotY  = this.FIELD_H + (this.PALETTE_H - this.SLOT_H) / 2;
      for (let i = 0; i < this.PALETTE.length; i++) {
        const sx = startX + i * (this.SLOT_W + this.SLOT_PAD);
        if (x >= sx && x <= sx + this.SLOT_W && y >= slotY && y <= slotY + this.SLOT_H) {
          this.selectedIdx = this.selectedIdx === i ? -1 : i;
          return;
        }
      }
      return;
    }

    // Gem click
    for (let i = this.gems.length - 1; i >= 0; i--) {
      const g = this.gems[i];
      if (Math.hypot(x - g.x, y - g.y) < g.w * 0.75) {
        this.score     += g.value;
        this.resources += g.value;
        this._addParticles(g.x, g.y, '#00ffcc', 8);
        this._emit('score', 'player', g.value);
        this.gems.splice(i, 1);
        return;
      }
    }

    // Place defender
    if (this.selectedIdx >= 0) {
      this._tryPlace(x, y);
    }
  }

  _tryPlace(x, y) {
    if (y >= this.FIELD_H) return;
    const item = this.PALETTE[this.selectedIdx];
    if (this.resources < item.cost) return;

    const cell = this._snapToCell(x, y);
    const key  = `${cell.col},${cell.row}`;
    if (this.occupied.has(key)) return;

    // Clamp to field
    if (cell.col < 0 || cell.col >= this.COLS || cell.row < 0 || cell.row >= this.ROWS) return;

    const cx = cell.col * this.CELL + this.CELL / 2;
    const cy = cell.row * this.CELL + this.CELL / 2;

    this.occupied.add(key);
    this.resources -= item.cost;

    const def = {
      type:   item.type,
      x: cx, y: cy,
      w: 40 * S, h: 40 * S,
      sprite: this._sprite(item.type),
      color:  item.color,
      range:  item.range,
      damage: item.damage,
    };
    if (item.type === 'gun-turret') {
      def.fireRate  = item.fireRate;
      def.fireTimer = item.fireRate * 0.5;
    } else {
      def.attackRate = item.attackRate;
      def.atkTimer   = 0;
    }

    this.defenders.push(def);
    this._addParticles(cx, cy, '#88aaff', 6);
    this._emit('spawn', item.type, { x: cx, y: cy });
  }

  _snapToCell(x, y) {
    return {
      col: Math.floor(x / this.CELL),
      row: Math.floor(y / this.CELL),
    };
  }

  _extractXY(data) {
    return {
      x: data.offsetX !== undefined ? data.offsetX : (data.clientX || 0),
      y: data.offsetY !== undefined ? data.offsetY : (data.clientY || 0),
    };
  }

  _extractTouch(data) {
    const touches = data.changedTouches || data.touches || [];
    const t = touches[0];
    if (!t) return { x: 0, y: 0 };
    const rect = (data.target && data.target.getBoundingClientRect)
      ? data.target.getBoundingClientRect()
      : { left: 0, top: 0 };
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
}


// --- Mechanic: EliminateBugs ---
class EliminateBugs {
  constructor(entities) {
    this._entities = entities || [];
    this._byType = {};
    for (const e of this._entities) {
      if (!this._byType[e.type]) this._byType[e.type] = [];
      this._byType[e.type].push(e);
    }

    // --- Turret ---
    const turretDef = (this._byType['gun-turret'] || [])[0] || null;
    this._turret = {
      def: turretDef,
      x: turretDef ? turretDef.x : W * 0.5,
      y: turretDef ? turretDef.y : H * 0.85,
      angle: -Math.PI / 2,
      fireRate: 0.35,
      fireCooldown: 0,
      w: turretDef ? turretDef.width  : 48 * S,
      h: turretDef ? turretDef.height : 48 * S,
    };

    // --- Command Post ---
    const postDef = (this._byType['command-post'] || [])[0] || null;
    this._commandPost = {
      def: postDef,
      x: postDef ? postDef.x : W * 0.5,
      y: postDef ? postDef.y : H * 0.1,
      w: postDef ? postDef.width  : 64 * S,
      h: postDef ? postDef.height : 64 * S,
      hp: 5,
      maxHp: 5,
    };

    // --- Waypoints from dirt-path tiles, else generate defaults ---
    const pathTiles = (this._byType['dirt-path'] || []).slice();
    if (pathTiles.length > 0) {
      this._waypoints = pathTiles.map(p => ({
        x: p.x + (p.width  || 32 * S) / 2,
        y: p.y + (p.height || 32 * S) / 2,
      }));
    } else {
      this._waypoints = [
        { x: W * 0.08, y: H * 0.92 },
        { x: W * 0.08, y: H * 0.55 },
        { x: W * 0.35, y: H * 0.55 },
        { x: W * 0.35, y: H * 0.28 },
        { x: W * 0.65, y: H * 0.28 },
        { x: W * 0.65, y: H * 0.55 },
        { x: W * 0.92, y: H * 0.55 },
        { x: W * 0.92, y: H * 0.92 },
      ];
    }
    // Always end at command post
    this._waypoints.push({ x: this._commandPost.x, y: this._commandPost.y });

    // --- Entity templates ---
    this._bulletDef = (this._byType['bullet-pellet'] || [])[0] || null;
    this._gemDef    = (this._byType['resource-gem']  || [])[0] || null;
    this._bugDefs   = {
      'soldier-ant':  (this._byType['soldier-ant']  || [])[0] || null,
      'rhino-beetle': (this._byType['rhino-beetle'] || [])[0] || null,
      'mosquito':     (this._byType['mosquito']     || [])[0] || null,
    };

    // --- Live objects ---
    this._bugs      = [];
    this._bullets   = [];
    this._gems      = [];
    this._particles = [];

    // --- Wave state ---
    this._wave               = 1;
    this._bugsSpawnedThisWave = 0;
    this._bugsPerWave        = 6;
    this._spawnInterval      = 2.2;
    this._spawnTimer         = 0;
    this._betweenWaves       = false;
    this._waveTimer          = 0;
    this._betweenWaveDelay   = 5;

    // --- Score / lives ---
    this._score  = 0;

    // --- Input ---
    this._mouseX = this._turret.x;
    this._mouseY = this._turret.y - 60 * S;
    this._firing = false;
    this._keys   = {};

    // --- Misc ---
    this._uid      = 0;
    this._gameOver = false;
    this._victory  = false;
  }
