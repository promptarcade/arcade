  // ─── Private helpers ───────────────────────────────────────────────────────

  _uid_next() { return 'e' + (++this._uid); }

  _spawnBug() {
    const r = Math.random();
    let type;
    if (this._wave <= 2)      type = r < 0.7  ? 'soldier-ant' : 'mosquito';
    else if (this._wave <= 4) type = r < 0.4  ? 'soldier-ant' : r < 0.75 ? 'rhino-beetle' : 'mosquito';
    else                      type = r < 0.25 ? 'soldier-ant' : r < 0.6  ? 'rhino-beetle' : 'mosquito';

    const configs = {
      'soldier-ant':  { hp: 2, spd: 80  * S, pts: 10, w: 32 * S, h: 32 * S },
      'rhino-beetle': { hp: 6, spd: 42  * S, pts: 30, w: 44 * S, h: 44 * S },
      'mosquito':     { hp: 1, spd: 145 * S, pts: 15, w: 28 * S, h: 28 * S },
    };
    const cfg = configs[type];
    const def = this._bugDefs[type];
    const sp  = this._waypoints[0];

    const bug = {
      id:     this._uid_next(),
      type,   def,
      x: sp.x, y: sp.y,
      w: def ? def.width  : cfg.w,
      h: def ? def.height : cfg.h,
      hp: cfg.hp, maxHp: cfg.hp,
      speed: cfg.spd,
      points: cfg.pts,
      waypointIndex: 1,
      wobble: Math.random() * Math.PI * 2,
    };
    this._bugs.push(bug);
    return bug;
  }

  _fireBullet() {
    const t = this._turret;
    const spd = 460 * S;
    const def = this._bulletDef;
    this._bullets.push({
      id:    this._uid_next(),
      def,
      x:     t.x + Math.cos(t.angle) * t.w * 0.5,
      y:     t.y + Math.sin(t.angle) * t.h * 0.5,
      vx:    Math.cos(t.angle) * spd,
      vy:    Math.sin(t.angle) * spd,
      w:     def ? def.width  : 10 * S,
      h:     def ? def.height : 10 * S,
      damage: 1,
      alive: true,
    });
  }

  _spawnGem(x, y) {
    const def = this._gemDef;
    this._gems.push({
      id: this._uid_next(), def,
      x, y,
      w: def ? def.width  : 20 * S,
      h: def ? def.height : 20 * S,
      vy:   -70 * S,
      life:  4,
      collected: false,
    });
  }

  _burst(x, y, color, count) {
    for (let i = 0; i < (count || 6); i++) {
      const a   = Math.random() * Math.PI * 2;
      const spd = (40 + Math.random() * 90) * S;
      this._particles.push({
        x, y,
        vx: Math.cos(a) * spd,
        vy: Math.sin(a) * spd,
        life: 0.35 + Math.random() * 0.4,
        maxLife: 0.75,
        color: color || '#ff8800',
        r: (2.5 + Math.random() * 4) * S,
      });
    }
  }

  // ─── update ────────────────────────────────────────────────────────────────

  update(dt) {
    if (this._gameOver || this._victory) return [];
    const events = [];

    // Aim turret
    const adx = this._mouseX - this._turret.x;
    const ady = this._mouseY - this._turret.y;
    this._turret.angle = Math.atan2(ady, adx);

    // Fire cooldown / auto-fire
    if (this._turret.fireCooldown > 0) this._turret.fireCooldown -= dt;
    if (this._firing && this._turret.fireCooldown <= 0) {
      this._fireBullet();
      this._turret.fireCooldown = this._turret.fireRate;
    }

    // ── Wave / spawn logic ───────────────────────────────────────────────────
    if (!this._betweenWaves) {
      this._spawnTimer -= dt;
      if (this._spawnTimer <= 0) {
        if (this._bugsSpawnedThisWave < this._bugsPerWave) {
          const bug = this._spawnBug();
          this._bugsSpawnedThisWave++;
          this._spawnTimer = this._spawnInterval;
          events.push({ type: 'spawn', target: bug.id, value: { type: bug.type, x: bug.x, y: bug.y } });
        } else if (this._bugs.length === 0) {
          // All bugs eliminated – wave over
          this._betweenWaves     = true;
          this._waveTimer        = this._betweenWaveDelay;
          const bonus = this._wave * 50;
          this._score += bonus;
          events.push({ type: 'score', target: 'player', value: bonus });
          events.push({ type: 'state', target: 'wave', value: { wave: this._wave, status: 'cleared' } });
        }
      }
    } else {
      this._waveTimer -= dt;
      if (this._waveTimer <= 0) {
        this._wave++;
        this._bugsSpawnedThisWave = 0;
        this._bugsPerWave         = 5 + this._wave * 2;
        this._spawnInterval       = Math.max(0.6, 2.2 - this._wave * 0.15);
        this._spawnTimer          = 0;
        this._betweenWaves        = false;
        events.push({ type: 'state', target: 'wave', value: { wave: this._wave, status: 'start' } });
        if (this._wave > 10) {
          this._victory = true;
          events.push({ type: 'state', target: 'game', value: 'victory' });
        }
      }
    }

    // ── Move bugs along waypoints ────────────────────────────────────────────
    for (const bug of this._bugs) {
      if (bug.hp <= 0) continue;
      if (bug.waypointIndex >= this._waypoints.length) continue;
      const wp  = this._waypoints[bug.waypointIndex];
      const bdx = wp.x - bug.x;
      const bdy = wp.y - bug.y;
      const dist = Math.sqrt(bdx * bdx + bdy * bdy);

      if (dist < 5 * S) {
        bug.waypointIndex++;
        if (bug.waypointIndex >= this._waypoints.length) {
          // Reached command post
          bug.hp = 0;
          this._commandPost.hp = Math.max(0, this._commandPost.hp - 1);
          this._burst(this._commandPost.x, this._commandPost.y, '#ff2200', 10);
          events.push({ type: 'destroy', target: bug.id, value: 'reached-post' });
          events.push({ type: 'state',   target: 'command-post', value: { hp: this._commandPost.hp } });
          if (this._commandPost.hp <= 0) {
            this._gameOver = true;
            events.push({ type: 'state', target: 'game', value: 'game-over' });
          }
        }
      } else {
        bug.wobble += dt * 9;
        bug.x += (bdx / dist) * bug.speed * dt;
        bug.y += (bdy / dist) * bug.speed * dt;
      }
    }

    // ── Move bullets ─────────────────────────────────────────────────────────
    for (const b of this._bullets) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.x < -60 || b.x > W + 60 || b.y < -60 || b.y > H + 60) b.alive = false;
    }

    // ── Bullet ↔ bug collisions ──────────────────────────────────────────────
    for (const bullet of this._bullets) {
      if (!bullet.alive) continue;
      for (const bug of this._bugs) {
        if (bug.hp <= 0) continue;
        const hx = bug.x - bug.w * 0.5;
        const hy = bug.y - bug.h * 0.5;
        if (bullet.x > hx && bullet.x < hx + bug.w && bullet.y > hy && bullet.y < hy + bug.h) {
          bug.hp    -= bullet.damage;
          bullet.alive = false;
          this._burst(bullet.x, bullet.y, '#ffaa00', 5);
          if (bug.hp <= 0) {
            this._burst(bug.x, bug.y, '#66ff44', 8);
            this._score += bug.points;
            events.push({ type: 'score',   target: 'player', value: bug.points });
            events.push({ type: 'destroy', target: bug.id,   value: 'killed' });
            if (Math.random() < 0.4) this._spawnGem(bug.x, bug.y);
          }
          break;
        }
      }
    }

    // ── Cleanup dead objects ─────────────────────────────────────────────────
    this._bugs    = this._bugs.filter(b => b.hp > 0);
    this._bullets = this._bullets.filter(b => b.alive);

    // ── Gems (gravity + auto-collect near turret) ────────────────────────────
    for (const gem of this._gems) {
      if (gem.collected) continue;
      gem.life -= dt;
      gem.vy   += 130 * S * dt;
      gem.y    += gem.vy * dt;
      const gdx = this._turret.x - gem.x;
      const gdy = this._turret.y - gem.y;
      if (Math.sqrt(gdx * gdx + gdy * gdy) < 45 * S) {
        gem.collected = true;
        const gp = 5;
        this._score += gp;
        events.push({ type: 'score',   target: 'player', value: gp });
        events.push({ type: 'destroy', target: gem.id,   value: 'collected' });
      }
      if (gem.life <= 0) gem.collected = true;
    }
    this._gems = this._gems.filter(g => !g.collected);

    // ── Particles ────────────────────────────────────────────────────────────
    for (const p of this._particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
    }
    this._particles = this._particles.filter(p => p.life > 0);

    return events;
  }

  // ─── draw ──────────────────────────────────────────────────────────────────

  draw(ctx) {
    // ── Background grass ─────────────────────────────────────────────────────
    const grass = this._byType['grass-tile'] || [];
    if (grass.length > 0) {
      for (const gt of grass) {
        if (gt.sprite) {
          ctx.drawImage(gt.sprite, gt.x, gt.y, gt.width, gt.height);
        } else {
          ctx.fillStyle = '#4a7a2e';
          ctx.fillRect(gt.x, gt.y, gt.width || 32 * S, gt.height || 32 * S);
        }
      }
    } else {
      ctx.fillStyle = '#3d6b28';
      ctx.fillRect(0, 0, W, H);
    }

    // ── Dirt path ─────────────────────────────────────────────────────────────
    const pathTiles = this._byType['dirt-path'] || [];
    if (pathTiles.length > 0) {
      for (const pt of pathTiles) {
        if (pt.sprite) {
          ctx.drawImage(pt.sprite, pt.x, pt.y, pt.width, pt.height);
        } else {
          ctx.fillStyle = '#c4a05a';
          ctx.fillRect(pt.x, pt.y, pt.width || 32 * S, pt.height || 32 * S);
        }
      }
    } else {
      ctx.save();
      ctx.strokeStyle = '#c4a05a';
      ctx.lineWidth   = 20 * S;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.beginPath();
      for (let i = 0; i < this._waypoints.length; i++) {
        const wp = this._waypoints[i];
        i === 0 ? ctx.moveTo(wp.x, wp.y) : ctx.lineTo(wp.x, wp.y);
      }
      ctx.stroke();
      ctx.strokeStyle = '#d4b070';
      ctx.lineWidth   = 12 * S;
      ctx.setLineDash([8 * S, 6 * S]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    // ── Command post ──────────────────────────────────────────────────────────
    const cp = this._commandPost;
    if (cp.def && cp.def.sprite) {
      ctx.drawImage(cp.def.sprite, cp.x - cp.w / 2, cp.y - cp.h / 2, cp.w, cp.h);
    } else {
      ctx.fillStyle   = '#2244bb';
      ctx.fillRect(cp.x - cp.w / 2, cp.y - cp.h / 2, cp.w, cp.h);
      ctx.strokeStyle = '#6688ff';
      ctx.lineWidth   = 3 * S;
      ctx.strokeRect(cp.x - cp.w / 2, cp.y - cp.h / 2, cp.w, cp.h);
      ctx.fillStyle = '#88aaff';
      ctx.font      = `bold ${14 * S}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('HQ', cp.x, cp.y);
    }
    // HP bar below command post
    const cpBarW = cp.w + 4 * S;
    const cpBarH = 8  * S;
    const cpBarX = cp.x - cpBarW / 2;
    const cpBarY = cp.y + cp.h / 2 + 5 * S;
    ctx.fillStyle = '#220000';
    ctx.fillRect(cpBarX, cpBarY, cpBarW, cpBarH);
    ctx.fillStyle = cp.hp > 2 ? '#44ff44' : '#ff4444';
    ctx.fillRect(cpBarX, cpBarY, cpBarW * (cp.hp / cp.maxHp), cpBarH);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 1;
    ctx.strokeRect(cpBarX, cpBarY, cpBarW, cpBarH);

    // ── Resource gems ─────────────────────────────────────────────────────────
    for (const gem of this._gems) {
      if (gem.def && gem.def.sprite) {
        ctx.drawImage(gem.def.sprite, gem.x - gem.w / 2, gem.y - gem.h / 2, gem.w, gem.h);
      } else {
        ctx.save();
        ctx.translate(gem.x, gem.y);
        const gs = gem.w * 0.5;
        ctx.fillStyle   = '#00ffcc';
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth   = 1.5 * S;
        ctx.beginPath();
        ctx.moveTo(0, -gs);
        ctx.lineTo(gs * 0.6, 0);
        ctx.lineTo(0, gs);
        ctx.lineTo(-gs * 0.6, 0);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    }

    // ── Bugs ─────────────────────────────────────────────────────────────────
    for (const bug of this._bugs) {
      ctx.save();
      ctx.translate(bug.x, bug.y);

      if (bug.def && bug.def.sprite) {
        ctx.drawImage(bug.def.sprite, -bug.w / 2, -bug.h / 2, bug.w, bug.h);
      } else {
        // Direction to next waypoint
        if (bug.waypointIndex < this._waypoints.length) {
          const wp  = this._waypoints[bug.waypointIndex];
          const ang = Math.atan2(wp.y - bug.y, wp.x - bug.x);
          ctx.rotate(ang + Math.PI / 2);
        }

        if (bug.type === 'mosquito') {
          // Elongated body
          ctx.fillStyle = '#777';
          ctx.beginPath();
          ctx.ellipse(0, 0, bug.w * 0.18, bug.h * 0.45, 0, 0, Math.PI * 2);
          ctx.fill();
          // Wings
          ctx.fillStyle = 'rgba(180,220,255,0.55)';
          ctx.beginPath();
          ctx.ellipse(-bug.w * 0.38, -bug.h * 0.05, bug.w * 0.32, bug.h * 0.12, -0.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse( bug.w * 0.38, -bug.h * 0.05, bug.w * 0.32, bug.h * 0.12,  0.4, 0, Math.PI * 2);
          ctx.fill();
          // Proboscis
          ctx.strokeStyle = '#555';
          ctx.lineWidth   = 1.5 * S;
          ctx.beginPath();
          ctx.moveTo(0, -bug.h * 0.45);
          ctx.lineTo(0, -bug.h * 0.7);
          ctx.stroke();

        } else if (bug.type === 'rhino-beetle') {
          // Shell
          ctx.fillStyle = '#4a2808';
          ctx.beginPath();
          ctx.ellipse(0, bug.h * 0.05, bug.w * 0.44, bug.h * 0.4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#2a1000';
          ctx.lineWidth   = 2 * S;
          ctx.stroke();
          // Shell shine
          ctx.fillStyle = 'rgba(200,140,80,0.3)';
          ctx.beginPath();
          ctx.ellipse(-bug.w * 0.1, -bug.h * 0.1, bug.w * 0.18, bug.h * 0.1, -0.6, 0, Math.PI * 2);
          ctx.fill();
          // Horn
          ctx.strokeStyle = '#7a4820';
          ctx.lineWidth   = 4 * S;
          ctx.beginPath();
          ctx.moveTo(0, -bug.h * 0.38);
          ctx.lineTo(bug.w * 0.12, -bug.h * 0.62);
          ctx.stroke();
          // Legs
          ctx.strokeStyle = '#3a1800';
          ctx.lineWidth   = 1.5 * S;
          for (let i = 0; i < 3; i++) {
            const ly = (i - 1) * bug.h * 0.22;
            ctx.beginPath(); ctx.moveTo(-bug.w * 0.44, ly); ctx.lineTo(-bug.w * 0.7, ly + bug.h * 0.1); ctx.stroke();
            ctx.beginPath(); ctx.moveTo( bug.w * 0.44, ly); ctx.lineTo( bug.w * 0.7, ly + bug.h * 0.1); ctx.stroke();
          }

        } else {
          // Soldier ant
          ctx.fillStyle = '#cc2200';
          // Head
          ctx.beginPath();
          ctx.arc(0, -bug.h * 0.3, bug.w * 0.18, 0, Math.PI * 2);
          ctx.fill();
          // Antennae
          ctx.strokeStyle = '#aa1100';
          ctx.lineWidth   = 1.5 * S;
          ctx.beginPath(); ctx.moveTo(-bug.w * 0.08, -bug.h * 0.42); ctx.lineTo(-bug.w * 0.22, -bug.h * 0.62); ctx.stroke();
          ctx.beginPath(); ctx.moveTo( bug.w * 0.08, -bug.h * 0.42); ctx.lineTo( bug.w * 0.22, -bug.h * 0.62); ctx.stroke();
          // Thorax
          ctx.fillStyle = '#cc2200';
          ctx.beginPath();
          ctx.ellipse(0, 0, bug.w * 0.14, bug.h * 0.18, 0, 0, Math.PI * 2);
          ctx.fill();
          // Abdomen
          ctx.beginPath();
          ctx.ellipse(0, bug.h * 0.3, bug.w * 0.19, bug.h * 0.22, 0, 0, Math.PI * 2);
          ctx.fill();
          // Legs
          ctx.strokeStyle = '#aa1100';
          ctx.lineWidth   = 1.2 * S;
          for (let i = 0; i < 3; i++) {
            const ly = (i - 1) * bug.h * 0.14;
            ctx.beginPath(); ctx.moveTo(-bug.w * 0.14, ly); ctx.lineTo(-bug.w * 0.38, ly + bug.h * 0.1); ctx.stroke();
            ctx.beginPath(); ctx.moveTo( bug.w * 0.14, ly); ctx.lineTo( bug.w * 0.38, ly + bug.h * 0.1); ctx.stroke();
          }
        }
      }
      ctx.restore();

      // HP bar (only when damaged)
      if (bug.hp < bug.maxHp) {
        const bw  = bug.w;
        const bh  = 5 * S;
        const bxb = bug.x - bw / 2;
        const byb = bug.y - bug.h / 2 - 9 * S;
        ctx.fillStyle = '#440000';
        ctx.fillRect(bxb, byb, bw, bh);
        ctx.fillStyle = '#44ff44';
        ctx.fillRect(bxb, byb, bw * (bug.hp / bug.maxHp), bh);
      }
    }

    // ── Bullets ───────────────────────────────────────────────────────────────
    for (const bullet of this._bullets) {
      if (bullet.def && bullet.def.sprite) {
        ctx.drawImage(bullet.def.sprite, bullet.x - bullet.w / 2, bullet.y - bullet.h / 2, bullet.w, bullet.h);
      } else {
        ctx.save();
        ctx.translate(bullet.x, bullet.y);
        ctx.rotate(Math.atan2(bullet.vy, bullet.vx));
        // Glow
        const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, bullet.w);
        grd.addColorStop(0, 'rgba(255,255,100,0.9)');
        grd.addColorStop(1, 'rgba(255,160,0,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(0, 0, bullet.w, 0, Math.PI * 2);
        ctx.fill();
        // Core
        ctx.fillStyle = '#ffee55';
        ctx.beginPath();
        ctx.ellipse(0, 0, bullet.w * 0.55, bullet.h * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ── Gun turret ────────────────────────────────────────────────────────────
    const t = this._turret;
    ctx.save();
    ctx.translate(t.x, t.y);
    if (t.def && t.def.sprite) {
      ctx.drawImage(t.def.sprite, -t.w / 2, -t.h / 2, t.w, t.h);
    } else {
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(3 * S, 5 * S, t.w * 0.46, t.h * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Base plate
      ctx.fillStyle = '#4a5566';
      ctx.beginPath();
      ctx.arc(0, 0, t.w * 0.46, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#6a7f99';
      ctx.lineWidth   = 3 * S;
      ctx.stroke();
      // Tread marks
      ctx.strokeStyle = '#333d4d';
      ctx.lineWidth   = 2 * S;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.arc(0, 0, (t.w * 0.3 + i * 3 * S), Math.PI * 0.7, Math.PI * 1.3);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, (t.w * 0.3 + i * 3 * S), -Math.PI * 0.3, Math.PI * 0.3);
        ctx.stroke();
      }
      // Barrel
      ctx.save();
      ctx.rotate(t.angle);
      ctx.fillStyle = '#667788';
      ctx.beginPath();
      ctx.roundRect(0, -5 * S, t.w * 0.58, 10 * S, 2 * S);
      ctx.fill();
      ctx.fillStyle = '#8899aa';
      ctx.beginPath();
      ctx.roundRect(t.w * 0.28, -4 * S, t.w * 0.3, 8 * S, 1.5 * S);
      ctx.fill();
      ctx.restore();
      // Turret dome
      ctx.fillStyle = '#556677';
      ctx.beginPath();
      ctx.arc(0, 0, t.w * 0.28, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#99aabb';
      ctx.lineWidth   = 2 * S;
      ctx.stroke();
      // Center pin
      ctx.fillStyle = '#ccdde8';
      ctx.beginPath();
      ctx.arc(0, 0, 4 * S, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // ── Particles ─────────────────────────────────────────────────────────────
    for (const p of this._particles) {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // ── HUD ───────────────────────────────────────────────────────────────────
    ctx.save();

    // Score pill
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath();
    ctx.roundRect(8 * S, 8 * S, 168 * S, 38 * S, 8 * S);
    ctx.fill();
    ctx.fillStyle    = '#ffdd00';
    ctx.font         = `bold ${19 * S}px monospace`;
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('★ ' + this._score, 18 * S, 27 * S);

    // Wave pill
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath();
    ctx.roundRect(W - 148 * S, 8 * S, 140 * S, 38 * S, 8 * S);
    ctx.fill();
    ctx.fillStyle = '#aaddff';
    ctx.textAlign = 'right';
    ctx.fillText('Wave ' + this._wave + '/10', W - 18 * S, 27 * S);

    // Between-wave notice
    if (this._betweenWaves) {
      const msg = 'Next wave in ' + Math.ceil(this._waveTimer) + 's';
      const mw  = ctx.measureText(msg).width + 40 * S;
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.beginPath();
      ctx.roundRect(W / 2 - mw / 2, H / 2 - 26 * S, mw, 52 * S, 10 * S);
      ctx.fill();
      ctx.fillStyle    = '#ffffff';
      ctx.font         = `bold ${19 * S}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(msg, W / 2, H / 2);
    }

    // Game-over screen
    if (this._gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle    = '#ff3333';
      ctx.font         = `bold ${Math.round(46 * S)}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 28 * S);
      ctx.fillStyle = '#ffdd00';
      ctx.font      = `bold ${Math.round(26 * S)}px monospace`;
      ctx.fillText('Score: ' + this._score, W / 2, H / 2 + 22 * S);
      ctx.fillStyle = '#aaaaaa';
      ctx.font      = `${Math.round(15 * S)}px monospace`;
      ctx.fillText('Command Post was overrun!', W / 2, H / 2 + 56 * S);
    }

    // Victory screen
    if (this._victory) {
      ctx.fillStyle = 'rgba(0,15,35,0.76)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle    = '#44ff88';
      ctx.font         = `bold ${Math.round(44 * S)}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('VICTORY!', W / 2, H / 2 - 28 * S);
      ctx.fillStyle = '#ffdd00';
      ctx.font      = `bold ${Math.round(24 * S)}px monospace`;
      ctx.fillText('Final Score: ' + this._score, W / 2, H / 2 + 22 * S);
      ctx.fillStyle = '#88ffcc';
      ctx.font      = `${Math.round(15 * S)}px monospace`;
      ctx.fillText('All 10 waves eliminated!', W / 2, H / 2 + 56 * S);
    }

    ctx.restore();
  }

  // ─── handleInput ───────────────────────────────────────────────────────────

  handleInput(type, data) {
    if (!data) return;
    if (this._gameOver || this._victory) return;

    if (type === 'mousemove') {
      this._mouseX = data.offsetX !== undefined ? data.offsetX : (data.clientX || 0);
      this._mouseY = data.offsetY !== undefined ? data.offsetY : (data.clientY || 0);
      return;
    }
    if (type === 'mousedown') {
      this._mouseX = data.offsetX !== undefined ? data.offsetX : (data.clientX || 0);
      this._mouseY = data.offsetY !== undefined ? data.offsetY : (data.clientY || 0);
      this._firing = true;
      return;
    }
    if (type === 'mouseup') {
      this._firing = false;
      return;
    }

    if (type === 'keydown') {
      const key = data.code || data.key || '';
      this._keys[key] = true;
      if (key === 'Space' || data.key === ' ') this._firing = true;
      // Arrow keys nudge the aim point
      const step = 12 * S;
      if (key === 'ArrowLeft')  { this._mouseX -= step; }
      if (key === 'ArrowRight') { this._mouseX += step; }
      if (key === 'ArrowUp')    { this._mouseY -= step; }
      if (key === 'ArrowDown')  { this._mouseY += step; }
      this._mouseX = Math.max(0, Math.min(W, this._mouseX));
      this._mouseY = Math.max(0, Math.min(H, this._mouseY));
      return;
    }
    if (type === 'keyup') {
      const key = data.code || data.key || '';
      this._keys[key] = false;
      if (key === 'Space' || data.key === ' ') this._firing = false;
      return;
    }

    if (type === 'touchstart') {
      const touches = data.touches;
      if (touches && touches.length > 0) {
        const rect = (data.target && data.target.getBoundingClientRect)
          ? data.target.getBoundingClientRect() : { left: 0, top: 0 };
        this._mouseX = touches[0].clientX - rect.left;
        this._mouseY = touches[0].clientY - rect.top;
        this._firing = true;
      }
      return;
    }
    if (type === 'touchmove') {
      const touches = data.touches;
      if (touches && touches.length > 0) {
        const rect = (data.target && data.target.getBoundingClientRect)
          ? data.target.getBoundingClientRect() : { left: 0, top: 0 };
        this._mouseX = touches[0].clientX - rect.left;
        this._mouseY = touches[0].clientY - rect.top;
      }
      return;
    }
    if (type === 'touchend') {
      this._firing = false;
      return;
    }
  }
}

// === GAME STATE & LAYOUT ===

// ─── State Variables ───────────────────────────────────────────────────────
let lives = 20;
let level = 1;
let gameOver = false;
let paused = false;
let cameraX = 0;
let cameraY = 0;
let selectedTurretType = 0;

// ─── Entity Definitions ────────────────────────────────────────────────────
// Player positioned in lower-center; enemies spread across upper screen;

// Flat, mutable entity list shared with all mechanics

// ─── Mechanic Instances ────────────────────────────────────────────────────
const mechPlaceTurrets    = new PlaceTurrets(allEntities);
const mechManageResources = new ManageResources(allEntities);
const mechDefendWaves     = new DefendAgainstWaves(allEntities);
const mechStrategize      = new StrategizePositions(allEntities);
const mechEliminateBugs   = new EliminateBugs(allEntities);

];


// === INPUT ===

// ─── Keyboard ─────────────────────────────────────────────────────────────
const keys = {};

window.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  // Spacebar: toggle pause
  if (e.code === 'Space') {
    e.preventDefault();
    paused = !paused;
    for (const mech of mechanics) {
      mech.handleInput('keydown', { code: e.code, key: e.key, paused });
    }
    return;
  }

  // R: restart on game-over
  if (e.code === 'KeyR' && gameOver) {
    location.reload();
    return;
  }

  // Digit keys 1–9: switch active turret type
  const dig = e.code.match(/^Digit(\d)$/);
  if (dig) selectedTurretType = parseInt(dig[1], 10) - 1;

  // Arrow key camera pan
  const panSpeed = 8 * S;
  if (e.code === 'ArrowLeft')  cameraX = Math.max(0, cameraX - panSpeed);
  if (e.code === 'ArrowRight') cameraX += panSpeed;
  if (e.code === 'ArrowUp')    cameraY = Math.max(0, cameraY - panSpeed);
  if (e.code === 'ArrowDown')  cameraY += panSpeed;

  for (const mech of mechanics) {
    mech.handleInput('keydown', {
      code: e.code,
      key: e.key,
      keys,
      selectedTurretType,
      cameraX,
      cameraY
    });
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
  for (const mech of mechanics) {
    mech.handleInput('keyup', { code: e.code, key: e.key, keys });
  }
});

// ─── Mouse Click (place / select) ─────────────────────────────────────────
canvas.addEventListener('click', (e) => {
  if (gameOver || paused) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX + cameraX;
  const my = (e.clientY - rect.top)  * scaleY + cameraY;
  for (const mech of mechanics) {
    mech.handleInput('click', { x: mx, y: my, selectedTurretType });
  }
});

// ─── Touch ────────────────────────────────────────────────────────────────
let touchStartX = 0;
let touchStartY = 0;
let touchLastX  = 0;
let touchLastY  = 0;
let isDragging  = false;

function canvasTouchCoords(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) * (W / rect.width),
    y: (touch.clientY - rect.top)  * (H / rect.height)
  };
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const { x, y } = canvasTouchCoords(e.touches[0]);
  touchStartX = touchLastX = x;
  touchStartY = touchLastY = y;
  isDragging = false;
  for (const mech of mechanics) {
    mech.handleInput('touchstart', {
      x: x + cameraX,
      y: y + cameraY,
      selectedTurretType
    });
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const { x, y } = canvasTouchCoords(e.touches[0]);
  const dx = x - touchLastX;
  const dy = y - touchLastY;

  // Threshold before committing to a drag/pan gesture
  if (Math.abs(x - touchStartX) > 8 * S || Math.abs(y - touchStartY) > 8 * S) {
    isDragging = true;
    cameraX = Math.max(0, cameraX - dx);
    cameraY = Math.max(0, cameraY - dy);
  }

  touchLastX = x;
  touchLastY = y;
  for (const mech of mechanics) {
    mech.handleInput('touchmove', {
      x: x + cameraX,
      y: y + cameraY,
      dx, dy,
      isDragging
    });
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const worldX = touchLastX + cameraX;
  const worldY = touchLastY + cameraY;
  const swipeDX   = touchLastX - touchStartX;
  const swipeDY   = touchLastY - touchStartY;
  const swipeDist = Math.hypot(swipeDX, swipeDY);

  if (!isDragging) {
    // Short tap → place or select turret
    for (const mech of mechanics) {
      mech.handleInput('tap', { x: worldX, y: worldY, selectedTurretType });
    }
  } else if (swipeDist > 60 * S) {
    // Long swipe → rotate view signal
    const angle = Math.atan2(swipeDY, swipeDX);
    for (const mech of mechanics) {
      mech.handleInput('swipe', {
        angle,
        dx: swipeDX,
        dy: swipeDY,
        distance: swipeDist
      });
    }
  }

  isDragging = false;
  for (const mech of mechanics) {
    mech.handleInput('touchend', { x: worldX, y: worldY });
  }
}, { passive: false });


// === GAME LOOP ===
let lastTime = 0;
let score = 0;
const scoreEl = document.getElementById('score');

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  
// Skip all updates while paused or after game-over
if (gameOver || paused) return;

// ─── Tick Each Mechanic & Process Returned Events ─────────────────────────
for (const mech of mechanics) {
  const events = mech.update(dt);
  if (!Array.isArray(events)) continue;

  for (const evt of events) {
    switch (evt.type) {

      // ── Score ─────────────────────────────────────────────────────────
      case 'score':
        score += (evt.value ?? 0);
        break;

      // ── Spawn a new entity instance ───────────────────────────────────
      case 'spawn': {
        const template = allEntities.find(e => e.name === evt.entity);
        if (template) {
          const spawned = {
            ...template,
            x:  (evt.x  ?? template.x),
            y:  (evt.y  ?? template.y),
            id: (evt.id ?? ('ent_' + Math.random().toString(36).slice(2)))
          };
          allEntities.push(spawned);
        }
        break;
      }

      // ── Destroy an entity by id or name ──────────────────────────────
      case 'destroy': {
        const idx = allEntities.findIndex(
          e => (evt.id && e.id === evt.id) || (evt.entity && e.name === evt.entity)
        );
        if (idx !== -1) allEntities.splice(idx, 1);
        break;
      }

      // ── Mutate global state fields ────────────────────────────────────
      case 'state':
        if (evt.key === 'lives') {
          lives = evt.value;
          if (lives <= 0) gameOver = true;
        }
        if (evt.key === 'level')    level    = evt.value;
        if (evt.key === 'gameOver') gameOver = evt.value;
        if (evt.key === 'paused')   paused   = evt.value;
        break;
    }
  }
}

    e.sprite,
    e.x - cameraX, e.y - cameraY,
    e.width * S, e.height * S
  );
}

// ─── Projectile Layer ─────────────────────────────────────────────────────
for (const e of allEntities.filter(e => e.type === 'projectile')) {
  ctx.drawImage(
    e.sprite,
    e.x - cameraX, e.y - cameraY,
    e.width * S, e.height * S
  );
}

// ─── Player Layer ─────────────────────────────────────────────────────────
for (const e of allEntities.filter(e => e.type === 'player')) {
  ctx.drawImage(
    e.sprite,
    e.x - cameraX, e.y - cameraY,
    e.width * S, e.height * S
  );
}

// ─── Mechanic Overlays (range rings, health bars, path arrows…) ───────────
for (const mech of mechanics) {
  mech.draw(ctx);
}

// ─── HUD ──────────────────────────────────────────────────────────────────
ctx.save();
ctx.font = `bold ${Math.round(16 * S)}px monospace`;
ctx.shadowColor = '#000';
ctx.shadowBlur = 3 * S;
ctx.fillStyle = '#ffffff';
ctx.fillText('Score: ' + score,  12 * S, 24 * S);
ctx.fillText('Lives: ' + lives,  12 * S, 48 * S);
ctx.fillText('Level: ' + level,  12 * S, 72 * S);
ctx.fillText('Turret: ' + (selectedTurretType + 1), 12 * S, 96 * S);

// ─── Pause Overlay ────────────────────────────────────────────────────────
if (paused && !gameOver) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${Math.round(36 * S)}px monospace`;
  ctx.textAlign = 'center';
  ctx.shadowBlur = 6 * S;
  ctx.fillText('PAUSED', W * 0.5, H * 0.5);
  ctx.font = `${Math.round(18 * S)}px monospace`;
  ctx.fillText('Press SPACE to resume', W * 0.5, H * 0.5 + 36 * S);
  ctx.textAlign = 'left';
}

// ─── Game-Over Screen ─────────────────────────────────────────────────────
if (gameOver) {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = `bold ${Math.round(48 * S)}px monospace`;
  ctx.shadowBlur = 8 * S;
  ctx.fillText('GAME OVER', W * 0.5, H * 0.40);
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${Math.round(24 * S)}px monospace`;
  ctx.fillText('Final Score: ' + score, W * 0.5, H * 0.52);
  ctx.font = `${Math.round(18 * S)}px monospace`;
  ctx.fillText('Press R to Restart', W * 0.5, H * 0.62);
  ctx.textAlign = 'left';
}

ctx.restore();


  scoreEl.textContent = 'Score: ' + score;
  requestAnimationFrame(gameLoop);
}

// === BOOT ===

// ─── Final Boot Initialization ────────────────────────────────────────────
// Reset camera to origin
cameraX = 0;
cameraY = 0;

// Push initial shared state into every mechanic
const bootState = { lives, level, score, paused, gameOver, selectedTurretType };
for (const mech of mechanics) {
  if (typeof mech.setState === 'function') {
    mech.setState(bootState);
  }
}

// Ensure canvas can receive keyboard focus for accessibility
canvas.setAttribute('tabindex', '0');
canvas.focus();

console.log(
  '[Boot] Tower-defense ready — Level:', level,
  '| Lives:', lives,
  '| Entities:', allEntities.length,
  '| Mechanics:', mechanics.length
);

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
