// === MECHANICS ===

// Entity array normalizer — contract enforcement
function _toEntityArray(arg) {
  if (Array.isArray(arg)) return arg;
  if (arg && typeof arg === 'object') {
    if (Array.isArray(arg.entities)) return arg.entities;
    if (Array.isArray(arg.sprites)) return arg.sprites;
    return [arg];
  }
  return [];
}
// --- Mechanic: BallPhysics ---
class BallPhysics {
  constructor(entities) {
    this.entities = entities;

    this.ball         = null;
    this.playerPaddle = null;
    this.aiPaddle     = null;
    this.net          = null;
    this.boundaries   = [];
    this.scoreDigits  = [];

    for (const e of entities) {
      if      (e.type === 'tennis-ball')   this.ball         = e;
      else if (e.type === 'player-paddle') this.playerPaddle = e;
      else if (e.type === 'ai-paddle')     this.aiPaddle     = e;
      else if (e.type === 'center-net')    this.net          = e;
      else if (e.type === 'boundary-line') this.boundaries.push(e);
      else if (e.type === 'score-digit')   this.scoreDigits.push(e);
    }

    // Ball velocity
    this.ballVX   = 220 * S;
    this.ballVY   = 130 * S;
    this.ballSpin = 0;

    // Scores
    this.playerScore = 0;
    this.aiScore     = 0;
    this.lastScorer  = 'ai';

    // Serve state
    this.serving    = true;
    this.serveTimer = 1.5;

    // Trail
    this.trail    = [];
    this.maxTrail = 14;

    // Input state
    this.keys   = {};
    this.mouseY = null;

    // Paddle previous Y for velocity calculation
    this.prevPlayerY = this.playerPaddle ? this.playerPaddle.y : H * 0.5;
    this.prevAiY     = this.aiPaddle     ? this.aiPaddle.y     : H * 0.5;

    // AI tracking
    this.aiTargetY      = H * 0.5;
    this.aiReactionTimer = 0;
    this.aiSpeed        = 185 * S;

    // Visual effect state
    this.hitEffect  = null;   // { x, y, timer, maxTimer }
    this.flashTimer = 0;

    this._resetBall(false);
  }

  // ─── private helpers ─────────────────────────────────────────────────────

  _resetBall(randomise) {
    if (!this.ball) return;
    this.ball.x = W * 0.5;
    this.ball.y = H * 0.5;
    const dir   = (this.lastScorer === 'player') ? -1 : 1;
    const angle = ((Math.random() * 50) - 25) * (Math.PI / 180);
    const spd   = 220 * S;
    this.ballVX   = Math.cos(angle) * spd * dir;
    this.ballVY   = Math.sin(angle) * spd;
    this.ballSpin = 0;
    this.trail    = [];
  }

  _startServe() {
    this.serving    = true;
    this.serveTimer = 1.5;
    this._resetBall(true);
  }

  _triggerHit(x, y) {
    this.hitEffect  = { x, y, timer: 0.28, maxTimer: 0.28 };
    this.flashTimer = 0.12;
  }

  _ballRadius() {
    return ((this.ball.width  || 14 * S) * 0.5);
  }

  _paddleRect(p) {
    const pw = p.width  || 12 * S;
    const ph = p.height || 72 * S;
    return { left: p.x - pw * 0.5, right: p.x + pw * 0.5,
             top:  p.y - ph * 0.5, bot:   p.y + ph * 0.5, pw, ph };
  }

  _collidePaddle(p, r) {
    const rc = this._paddleRect(p);
    return (
      this.ball.x + r > rc.left  &&
      this.ball.x - r < rc.right &&
      this.ball.y + r > rc.top   &&
      this.ball.y - r < rc.bot
    );
  }

  _updatePlayerPaddle(dt) {
    if (!this.playerPaddle) return;
    const ph    = this.playerPaddle.height || 72 * S;
    const speed = 290 * S;
    let   dy    = 0;

    if (this.keys['ArrowUp']   || this.keys['KeyW'] ||
        this.keys['w']         || this.keys['W'])  dy -= speed * dt;
    if (this.keys['ArrowDown'] || this.keys['KeyS'] ||
        this.keys['s']         || this.keys['S'])  dy += speed * dt;

    // Mouse / touch tracking overrides keyboard
    if (this.mouseY !== null) {
      const diff = this.mouseY - this.playerPaddle.y;
      dy = Math.sign(diff) * Math.min(Math.abs(diff), speed * dt * 2);
    }

    this.playerPaddle.y = Math.max(
      ph * 0.5,
      Math.min(H - ph * 0.5, this.playerPaddle.y + dy)
    );
  }

  _updateAIPaddle(dt) {
    if (!this.aiPaddle || !this.ball) return;
    const ph = this.aiPaddle.height || 72 * S;

    this.aiReactionTimer -= dt;
    if (this.aiReactionTimer <= 0) {
      this.aiReactionTimer = 0.07 + Math.random() * 0.11;

      if (this.ballVX > 0) {
        // Ball approaching AI — predict intercept Y
        const ttx = Math.abs((this.aiPaddle.x - this.ball.x) /
                              (this.ballVX + 0.001));
        let   predY = this.ball.y + this.ballVY * ttx * 0.88;
        // Reflect prediction off top/bottom walls
        const bounceH = H - 2;
        predY = predY % (2 * bounceH);
        if (predY < 0)       predY += 2 * bounceH;
        if (predY > bounceH) predY  = 2 * bounceH - predY;
        this.aiTargetY = predY + (Math.random() - 0.5) * 18 * S;
      } else {
        // Ball retreating — drift back to centre
        this.aiTargetY = H * 0.5 + (Math.random() - 0.5) * 24 * S;
      }
      this.aiTargetY = Math.max(ph * 0.5,
                                Math.min(H - ph * 0.5, this.aiTargetY));
    }

    const diff = this.aiTargetY - this.aiPaddle.y;
    this.aiPaddle.y += Math.sign(diff) *
                       Math.min(Math.abs(diff), this.aiSpeed * dt);
    this.aiPaddle.y = Math.max(ph * 0.5,
                               Math.min(H - ph * 0.5, this.aiPaddle.y));
  }

  // ─── public API ──────────────────────────────────────────────────────────

  update(dt) {
    const events = [];
    if (!this.ball) return events;

    dt = Math.min(dt, 0.05); // clamp to prevent tunneling

    // Serve countdown — paddles still move but ball waits
    if (this.serving) {
      this.serveTimer -= dt;
      this._updatePlayerPaddle(dt);
      this._updateAIPaddle(dt);
      if (this.serveTimer <= 0) {
        this.serving    = false;
        this.serveTimer = 0;
      }
      return events;
    }

    // Move paddles
    this._updatePlayerPaddle(dt);
    this._updateAIPaddle(dt);

    // Record trail
    this.trail.push({ x: this.ball.x, y: this.ball.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    // Integrate ball
    this.ball.x += this.ballVX * dt;
    this.ball.y += this.ballVY * dt;

    // Spin curves the ball
    this.ballVY   += this.ballSpin * 90 * S * dt;
    this.ballSpin *= Math.pow(0.93, dt * 60);

    const r = this._ballRadius();

    // ── Top / bottom wall bounces ────────────────────────────────────────
    // Use explicit boundary entities when present, else use canvas edges
    let topEdge = 0, botEdge = H;
    for (const b of this.boundaries) {
      if (b.y < H * 0.35)       topEdge = b.y + (b.height || 4 * S);
      else if (b.y > H * 0.65)  botEdge = b.y;
    }

    if (this.ball.y - r < topEdge) {
      this.ball.y = topEdge + r;
      this.ballVY = Math.abs(this.ballVY);
      this._triggerHit(this.ball.x, this.ball.y);
    }
    if (this.ball.y + r > botEdge) {
      this.ball.y = botEdge - r;
      this.ballVY = -Math.abs(this.ballVY);
      this._triggerHit(this.ball.x, this.ball.y);
    }

    // ── Net collision ────────────────────────────────────────────────────
    if (this.net) {
      const nw    = (this.net.width  || 10 * S) * 0.5;
      const netL  = this.net.x - nw;
      const netR  = this.net.x + nw;
      const netT  = this.net.y;
      const netB  = this.net.y + (this.net.height || H * 0.65);

      if (this.ball.x + r > netL && this.ball.x - r < netR &&
          this.ball.y + r > netT && this.ball.y - r < netB) {
        if (this.ballVX > 0) this.ball.x = netL - r;
        else                 this.ball.x = netR + r;
        this.ballVX  = -this.ballVX * 0.75;
        this.ballVY += (Math.random() - 0.5) * 55 * S;
        this._triggerHit(this.ball.x, this.ball.y);
      }
    }

    // ── Player paddle collision ──────────────────────────────────────────
    if (this.playerPaddle && this._collidePaddle(this.playerPaddle, r)) {
      const rc     = this._paddleRect(this.playerPaddle);
      const pvY    = dt > 0
                       ? (this.playerPaddle.y - this.prevPlayerY) / dt
                       : 0;
      const spd    = Math.hypot(this.ballVX, this.ballVY);
      const newSpd = Math.min(spd * 1.06, 560 * S);

      this.ball.x   = rc.right + r;
      this.ballVX   = Math.abs(newSpd * 0.75);
      this.ballVY   = this.ballVY * 0.25 + pvY * 0.75;
      this.ballSpin = pvY * 0.018;
      // Re-normalise to newSpd
      const actualSpd = Math.hypot(this.ballVX, this.ballVY) || 1;
      this.ballVX = (this.ballVX / actualSpd) * newSpd;
      this.ballVY = (this.ballVY / actualSpd) * newSpd;
      this._triggerHit(this.ball.x, this.ball.y);
    }

    // ── AI paddle collision ──────────────────────────────────────────────
    if (this.aiPaddle && this._collidePaddle(this.aiPaddle, r)) {
      const rc     = this._paddleRect(this.aiPaddle);
      const pvY    = dt > 0
                       ? (this.aiPaddle.y - this.prevAiY) / dt
                       : 0;
      const spd    = Math.hypot(this.ballVX, this.ballVY);
      const newSpd = Math.min(spd * 1.04, 560 * S);

      this.ball.x   = rc.left - r;
      this.ballVX   = -Math.abs(newSpd * 0.75);
      this.ballVY   = this.ballVY * 0.25 + pvY * 0.75;
      this.ballSpin = pvY * 0.018;
      const actualSpd = Math.hypot(this.ballVX, this.ballVY) || 1;
      this.ballVX = (this.ballVX / actualSpd) * newSpd;
      this.ballVY = (this.ballVY / actualSpd) * newSpd;
      this._triggerHit(this.ball.x, this.ball.y);
    }

    // Store previous paddle positions
    this.prevPlayerY = this.playerPaddle ? this.playerPaddle.y : this.prevPlayerY;
    this.prevAiY     = this.aiPaddle     ? this.aiPaddle.y     : this.prevAiY;

    // ── Scoring ──────────────────────────────────────────────────────────
    if (this.ball.x + r < 0) {
      this.aiScore++;
      this.lastScorer = 'ai';
      events.push({ type: 'score',  value: this.aiScore });
      events.push({ type: 'state',  key: 'aiScore',    value: this.aiScore });
      events.push({ type: 'state',  key: 'lastScorer', value: 'ai' });
      this._startServe();
    } else if (this.ball.x - r > W) {
      this.playerScore++;
      this.lastScorer = 'player';
      events.push({ type: 'score',  value: this.playerScore });
      events.push({ type: 'state',  key: 'playerScore', value: this.playerScore });
      events.push({ type: 'state',  key: 'lastScorer',  value: 'player' });
      this._startServe();
    }

    // Tick visual timers
    if (this.hitEffect) {
      this.hitEffect.timer -= dt;
      if (this.hitEffect.timer <= 0) this.hitEffect = null;
    }
    this.flashTimer = Math.max(0, this.flashTimer - dt);

    return events;
  }

  draw(ctx) {
    if (!this.ball) return;

    const r         = this._ballRadius();
    const speed     = Math.hypot(this.ballVX, this.ballVY);
    const maxSpeed  = 560 * S;
    const speedT    = Math.min(speed / maxSpeed, 1);
    const hue       = 90 - speedT * 90; // green→red

    // ── Ball trail ───────────────────────────────────────────────────────
    for (let i = 0; i < this.trail.length; i++) {
      const t   = (i + 1) / this.trail.length;
      const tr  = this.trail[i];
      ctx.save();
      ctx.globalAlpha = t * 0.45;
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, r * (0.25 + t * 0.75), 0, Math.PI * 2);
      ctx.fillStyle = `hsl(${hue + 20}, 100%, 72%)`;
      ctx.fill();
      ctx.restore();
    }

    // ── Ball glow ────────────────────────────────────────────────────────
    const glowR = r * (1.8 + speedT * 1.8);
    const grd   = ctx.createRadialGradient(
      this.ball.x, this.ball.y, 0,
      this.ball.x, this.ball.y, glowR
    );
    grd.addColorStop(0,   `hsla(${hue}, 100%, 75%, ${0.28 + speedT * 0.38})`);
    grd.addColorStop(1,   `hsla(${hue}, 100%, 75%, 0)`);
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.ball.x, this.ball.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.restore();

    // ── Speed sparks ─────────────────────────────────────────────────────
    if (speed > 160 * S) {
      const angle = Math.atan2(this.ballVY, this.ballVX) + Math.PI;
      ctx.save();
      ctx.globalAlpha = speedT * 0.65;
      ctx.lineWidth   = 1.5 * S;
      for (let i = 0; i < 5; i++) {
        const spread = (i - 2) * 0.22;
        const a      = angle + spread;
        const len    = (12 + i * 7) * S * speedT;
        const sx     = this.ball.x + Math.cos(a) * r;
        const sy     = this.ball.y + Math.sin(a) * r;
        ctx.strokeStyle = `hsl(${hue + 30}, 100%, 70%)`;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + Math.cos(a) * len, sy + Math.sin(a) * len);
        ctx.stroke();
      }
      ctx.restore();
    }

    // ── Hit-impact ring ──────────────────────────────────────────────────
    if (this.hitEffect) {
      const prog  = 1 - this.hitEffect.timer / this.hitEffect.maxTimer;
      const ringR = r * (1.2 + prog * 3.5);
      ctx.save();
      ctx.globalAlpha = (1 - prog) * 0.9;
      ctx.beginPath();
      ctx.arc(this.hitEffect.x, this.hitEffect.y, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth   = 2 * S;
      ctx.stroke();
      ctx.restore();
    }

    // ── Paddle hit flash ─────────────────────────────────────────────────
    if (this.flashTimer > 0 && this.playerPaddle) {
      const rc = this._paddleRect(this.playerPaddle);
      ctx.save();
      ctx.globalAlpha = (this.flashTimer / 0.12) * 0.45;
      ctx.fillStyle   = '#ffffff';
      ctx.fillRect(rc.left, rc.top, rc.pw, rc.ph);
      ctx.restore();
    }

    // ── Serve countdown ──────────────────────────────────────────────────
    if (this.serving && this.serveTimer > 0) {
      ctx.save();
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha  = 0.85;
      ctx.font         = `bold ${Math.round(32 * S)}px monospace`;
      ctx.fillStyle    = '#ffffff';
      ctx.fillText(Math.ceil(this.serveTimer).toString(),
                   W * 0.5, H * 0.5 - 44 * S);
      ctx.globalAlpha  = 0.55;
      ctx.font         = `${Math.round(13 * S)}px monospace`;
      ctx.fillText('SERVING…', W * 0.5, H * 0.5 - 18 * S);
      ctx.restore();
    }

    // ── Score overlay ────────────────────────────────────────────────────
    ctx.save();
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';
    ctx.globalAlpha  = 0.88;
    ctx.font         = `bold ${Math.round(26 * S)}px monospace`;
    ctx.fillStyle    = '#ffffff';
    ctx.fillText(String(this.playerScore), W * 0.25, 9 * S);
    ctx.fillText(String(this.aiScore),     W * 0.75, 9 * S);
    ctx.globalAlpha  = 0.45;
    ctx.font         = `${Math.round(10 * S)}px monospace`;
    ctx.fillText('YOU', W * 0.25, 37 * S);
    ctx.fillText('CPU', W * 0.75, 37 * S);
    ctx.restore();

    // ── Speed bar (bottom) ───────────────────────────────────────────────
    const bW  = 90 * S, bH = 6 * S;
    const bX  = W * 0.5 - bW * 0.5, bY = H - 16 * S;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle   = '#222';
    ctx.fillRect(bX, bY, bW, bH);
    ctx.globalAlpha = 0.80;
    ctx.fillStyle   = `hsl(${hue}, 100%, 52%)`;
    ctx.fillRect(bX, bY, bW * speedT, bH);
    ctx.restore();
  }

  handleInput(type, data) {
    if (type === 'keydown') {
      if (data.code) this.keys[data.code] = true;
      if (data.key)  this.keys[data.key]  = true;
      this.mouseY = null; // keyboard takes priority
    } else if (type === 'keyup') {
      if (data.code) this.keys[data.code] = false;
      if (data.key)  this.keys[data.key]  = false;
    } else if (type === 'click') {
      if (data.y !== undefined) this.mouseY = data.y;
    } else if (type === 'touchstart') {
      if (data.y !== undefined) this.mouseY = data.y;
    }
  }
}


// --- Mechanic: PaddleControl ---
class PaddleControl {
  constructor(entities) {
    this.entities = entities;

    this.playerPaddle = entities.find(e => e.type === 'player-paddle') || null;
    this.aiPaddle     = entities.find(e => e.type === 'ai-paddle')     || null;
    this.ball         = entities.find(e => e.type === 'tennis-ball')   || null;
    this.net          = entities.find(e => e.type === 'center-net')    || null;

    // Ensure paddle/ball have sane sizes
    if (this.playerPaddle) { this.playerPaddle.width  = this.playerPaddle.width  || 14 * S; this.playerPaddle.height = this.playerPaddle.height || 90 * S; }
    if (this.aiPaddle)     { this.aiPaddle.width      = this.aiPaddle.width      || 14 * S; this.aiPaddle.height     = this.aiPaddle.height     || 90 * S; }
    if (this.ball)         { this.ball.width           = this.ball.width           || 18 * S; this.ball.height          = this.ball.height          || 18 * S; }

    // Ball physics
    this.ballVX = 280 * S;
    this.ballVY = (Math.random() * 180 - 90) * S;
    this.ballTrail = [];

    // Scores
    this.playerScore = 0;
    this.aiScore     = 0;

    // Player input
    this.keys        = {};
    this.pointerTargetY = null; // set by click/touch

    // Player movement speed
    this.playerSpeed = 360 * S;

    // AI state
    this.aiTargetY       = H / 2;
    this.aiSpeed         = 230 * S;
    this.aiUpdateTimer   = 0;
    this.aiUpdateInterval = 0.06;

    // Visual flash timers
    this.playerHitFlash  = 0;
    this.aiHitFlash      = 0;

    // Score flash state
    this.scoreFlashTimer = 0;
    this.lastScorer      = null;

    // Ball reset
    this.ballResetting   = false;
    this.ballResetTimer  = 0;

    // Spin indicator ring decay
    this.spinRingAlpha   = 0;
    this.spinRingX       = 0;
    this.spinRingY       = 0;
  }

  /* ─── HELPERS ─────────────────────────────────────────── */

  _resetBall() {
    if (!this.ball) return;
    this.ball.x = W / 2;
    this.ball.y = H / 2;
    const dir = this.lastScorer === 'player' ? -1 : 1;
    this.ballVX = dir * 280 * S;
    this.ballVY = (Math.random() * 200 - 100) * S;
    this.ballTrail = [];
  }

  _checkPaddleCollision(paddle, isPlayer) {
    if (!paddle || !this.ball) return;
    const br = (this.ball.width)  / 2;
    const pw = (paddle.width)     / 2;
    const ph = (paddle.height)    / 2;
    const dx = this.ball.x - paddle.x;
    const dy = this.ball.y - paddle.y;

    if (Math.abs(dx) < pw + br && Math.abs(dy) < ph + br) {
      const relHit = Math.max(-1, Math.min(1, dy / ph));
      if (isPlayer) {
        this.ballVX  =  Math.abs(this.ballVX) * 1.06;
        this.ballVX  =  Math.min(this.ballVX, 620 * S);
        this.ballVY  =  relHit * 360 * S;
        this.ball.x  =  paddle.x + pw + br + 1;
        this.playerHitFlash = 1.0;
      } else {
        this.ballVX  = -Math.abs(this.ballVX) * 1.06;
        this.ballVX  =  Math.max(this.ballVX, -620 * S);
        this.ballVY  =  relHit * 360 * S;
        this.ball.x  =  paddle.x - pw - br - 1;
        this.aiHitFlash = 1.0;
      }
      // Spin ring visual marker
      this.spinRingAlpha = 1.0;
      this.spinRingX = this.ball.x;
      this.spinRingY = this.ball.y;
    }
  }

  _predictBallY(targetX) {
    if (!this.ball) return H / 2;
    let bx = this.ball.x, by = this.ball.y;
    let vx = this.ballVX,  vy = this.ballVY;
    const br = this.ball.width / 2;
    const maxIter = 200;
    let iter = 0;
    const step = 4 * S;
    while (iter++ < maxIter) {
      const dist = targetX - bx;
      if (Math.abs(dist) < step) break;
      const t = step / Math.abs(vx || 1);
      bx += vx * t;
      by += vy * t;
      if (by - br < 0)    { by = 2 * br - by;       vy = Math.abs(vy); }
      if (by + br > H)    { by = 2 * (H - br) - by; vy = -Math.abs(vy); }
    }
    return Math.max(br, Math.min(H - br, by));
  }

  /* ─── UPDATE ──────────────────────────────────────────── */

  update(dt) {
    const events = [];
    dt = Math.min(dt, 0.05);

    // Decay flash timers
    this.playerHitFlash  = Math.max(0, this.playerHitFlash  - dt * 3.5);
    this.aiHitFlash      = Math.max(0, this.aiHitFlash      - dt * 3.5);
    this.scoreFlashTimer = Math.max(0, this.scoreFlashTimer  - dt);
    this.spinRingAlpha   = Math.max(0, this.spinRingAlpha    - dt * 2.5);

    // Ball reset pause
    if (this.ballResetting) {
      this.ballResetTimer -= dt;
      if (this.ballResetTimer <= 0) {
        this._resetBall();
        this.ballResetting = false;
      }
      return events;
    }

    if (!this.ball || !this.playerPaddle || !this.aiPaddle) return events;

    /* ── Player paddle ── */
    const pp   = this.playerPaddle;
    const ppHH = pp.height / 2;
    if (this.pointerTargetY !== null) {
      const target   = Math.max(ppHH, Math.min(H - ppHH, this.pointerTargetY));
      const diff     = target - pp.y;
      const maxMove  = this.playerSpeed * dt;
      pp.y += Math.abs(diff) <= maxMove ? diff : Math.sign(diff) * maxMove;
    } else {
      const up   = this.keys['ArrowUp']   || this.keys['KeyW'] || this.keys['w'];
      const down = this.keys['ArrowDown'] || this.keys['KeyS'] || this.keys['s'];
      if (up)   pp.y -= this.playerSpeed * dt;
      if (down) pp.y += this.playerSpeed * dt;
      pp.y = Math.max(ppHH, Math.min(H - ppHH, pp.y));
    }

    /* ── AI paddle ── */
    const ap   = this.aiPaddle;
    const apHH = ap.height / 2;
    this.aiUpdateTimer += dt;
    if (this.aiUpdateTimer >= this.aiUpdateInterval) {
      this.aiUpdateTimer = 0;
      if (this.ballVX > 0) {
        this.aiTargetY = this._predictBallY(ap.x);
      } else {
        this.aiTargetY = H / 2 + (Math.random() - 0.5) * 20 * S;
      }
    }
    const aiDiff = this.aiTargetY - ap.y;
    ap.y += Math.sign(aiDiff) * Math.min(Math.abs(aiDiff), this.aiSpeed * dt);
    ap.y  = Math.max(apHH, Math.min(H - apHH, ap.y));

    /* ── Ball movement ── */
    this.ball.x += this.ballVX * dt;
    this.ball.y += this.ballVY * dt;

    /* ── Trail ── */
    this.ballTrail.push({ x: this.ball.x, y: this.ball.y, a: 1.0 });
    if (this.ballTrail.length > 14) this.ballTrail.shift();
    for (const p of this.ballTrail) p.a = Math.max(0, p.a - dt * 5);
    this.ballTrail = this.ballTrail.filter(p => p.a > 0);

    /* ── Top / bottom wall bounce ── */
    const br = this.ball.width / 2;
    if (this.ball.y - br < 0)  { this.ball.y = br;       this.ballVY =  Math.abs(this.ballVY); }
    if (this.ball.y + br > H)  { this.ball.y = H - br;   this.ballVY = -Math.abs(this.ballVY); }

    /* ── Paddle collisions ── */
    this._checkPaddleCollision(this.playerPaddle, true);
    this._checkPaddleCollision(this.aiPaddle,     false);

    /* ── Scoring ── */
    if (this.ball.x < -br) {
      this.aiScore++;
      events.push({ type: 'score', value: this.aiScore });
      events.push({ type: 'state', key: 'aiScore',     value: this.aiScore });
      events.push({ type: 'state', key: 'lastScorer',  value: 'ai' });
      this.lastScorer      = 'ai';
      this.scoreFlashTimer = 1.8;
      this.ballResetting   = true;
      this.ballResetTimer  = 1.0;
    } else if (this.ball.x > W + br) {
      this.playerScore++;
      events.push({ type: 'score', value: this.playerScore });
      events.push({ type: 'state', key: 'playerScore', value: this.playerScore });
      events.push({ type: 'state', key: 'lastScorer',  value: 'player' });
      this.lastScorer      = 'player';
      this.scoreFlashTimer = 1.8;
      this.ballResetting   = true;
      this.ballResetTimer  = 1.0;
    }

    return events;
  }

  /* ─── DRAW ────────────────────────────────────────────── */

  draw(ctx) {
    if (!this.ball) return;

    /* Ball trail */
    for (let i = 0; i < this.ballTrail.length; i++) {
      const p      = this.ballTrail[i];
      const frac   = i / this.ballTrail.length;
      const radius = Math.max(1, (this.ball.width / 2) * frac * 0.85);
      ctx.save();
      ctx.globalAlpha = p.a * 0.55 * frac;
      ctx.fillStyle   = '#c8f542';
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    /* Ball velocity vector */
    if (!this.ballResetting) {
      const speed  = Math.hypot(this.ballVX, this.ballVY);
      const vLen   = Math.min(speed * 0.055, 44 * S);
      const vNX    = this.ballVX / (speed || 1);
      const vNY    = this.ballVY / (speed || 1);
      ctx.save();
      ctx.strokeStyle = 'rgba(200,245,66,0.45)';
      ctx.lineWidth   = 2 * S;
      ctx.beginPath();
      ctx.moveTo(this.ball.x, this.ball.y);
      ctx.lineTo(this.ball.x + vNX * vLen, this.ball.y + vNY * vLen);
      ctx.stroke();
      ctx.restore();
    }

    /* Spin / hit ring */
    if (this.spinRingAlpha > 0) {
      const ringR = this.ball.width * (2 - this.spinRingAlpha);
      ctx.save();
      ctx.globalAlpha  = this.spinRingAlpha * 0.8;
      ctx.strokeStyle  = '#ffffff';
      ctx.lineWidth    = 2 * S;
      ctx.shadowColor  = '#ffffff';
      ctx.shadowBlur   = 12 * S;
      ctx.beginPath();
      ctx.arc(this.spinRingX, this.spinRingY, ringR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    /* Player paddle hit glow */
    if (this.playerHitFlash > 0 && this.playerPaddle) {
      const p  = this.playerPaddle;
      const pw = p.width / 2; const ph = p.height / 2;
      ctx.save();
      ctx.globalAlpha = this.playerHitFlash * 0.55;
      ctx.fillStyle   = '#00ffff';
      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur  = 22 * S;
      ctx.fillRect(p.x - pw - 5 * S, p.y - ph - 5 * S, (pw + 5 * S) * 2, (ph + 5 * S) * 2);
      ctx.restore();
    }

    /* AI paddle hit glow */
    if (this.aiHitFlash > 0 && this.aiPaddle) {
      const p  = this.aiPaddle;
      const pw = p.width / 2; const ph = p.height / 2;
      ctx.save();
      ctx.globalAlpha = this.aiHitFlash * 0.55;
      ctx.fillStyle   = '#ff4444';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur  = 22 * S;
      ctx.fillRect(p.x - pw - 5 * S, p.y - ph - 5 * S, (pw + 5 * S) * 2, (ph + 5 * S) * 2);
      ctx.restore();
    }

    /* AI targeting dashed guide */
    if (this.aiPaddle && this.ballVX > 0 && !this.ballResetting) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,80,80,0.22)';
      ctx.lineWidth   = 1.5 * S;
      ctx.setLineDash([5 * S, 6 * S]);
      ctx.beginPath();
      ctx.moveTo(this.aiPaddle.x, this.aiPaddle.y);
      ctx.lineTo(this.aiPaddle.x, this.aiTargetY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 0.45;
      ctx.fillStyle   = '#ff4444';
      ctx.beginPath();
      ctx.arc(this.aiPaddle.x, this.aiTargetY, 5 * S, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    /* Pointer target guide for player */
    if (this.playerPaddle && this.pointerTargetY !== null && !this.ballResetting) {
      ctx.save();
      ctx.strokeStyle = 'rgba(0,255,220,0.28)';
      ctx.lineWidth   = 1.5 * S;
      ctx.setLineDash([4 * S, 5 * S]);
      ctx.beginPath();
      ctx.moveTo(this.playerPaddle.x, this.playerPaddle.y);
      ctx.lineTo(this.playerPaddle.x, this.pointerTargetY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 0.45;
      ctx.fillStyle   = '#00ffcc';
      ctx.beginPath();
      ctx.arc(this.playerPaddle.x, this.pointerTargetY, 5 * S, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    /* Score HUD */
    ctx.save();
    ctx.font          = `bold ${30 * S}px monospace`;
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'top';
    ctx.fillStyle     = 'rgba(255,255,255,0.85)';
    ctx.shadowColor   = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur    = 6 * S;
    ctx.fillText(`${this.playerScore}`, W * 0.25, 8 * S);
    ctx.fillText(`${this.aiScore}`,     W * 0.75, 8 * S);
    ctx.restore();

    /* Score flash overlay */
    if (this.scoreFlashTimer > 0 && this.ballResetting) {
      const alpha = Math.min(1, this.scoreFlashTimer / 1.8);
      const isPlayer = this.lastScorer === 'player';
      ctx.save();
      ctx.globalAlpha = alpha * 0.28;
      ctx.fillStyle   = isPlayer ? '#00ff88' : '#ff3333';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = isPlayer ? '#00ff88' : '#ff4444';
      ctx.font        = `bold ${52 * S}px monospace`;
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur  = 24 * S;
      ctx.fillText(isPlayer ? 'POINT!' : 'AI SCORES!', W / 2, H / 2);
      ctx.restore();
    }
  }

  /* ─── INPUT ───────────────────────────────────────────── */

  handleInput(type, data) {
    if (type === 'keydown') {
      if (data.code) this.keys[data.code] = true;
      if (data.key)  this.keys[data.key]  = true;
      // Keyboard overrides pointer targeting
      this.pointerTargetY = null;
    } else if (type === 'keyup') {
      if (data.code) this.keys[data.code] = false;
      if (data.key)  this.keys[data.key]  = false;
    } else if (type === 'click') {
      if (data.y !== undefined) {
        this.pointerTargetY = data.y;
        // Clear keyboard state so pointer takes over
        this.keys = {};
      }
    } else if (type === 'touchstart') {
      if (data.y !== undefined) {
        this.pointerTargetY = data.y;
        this.keys = {};
      }
    }
  }
}


// --- Mechanic: ScoreCompetition ---
class ScoreCompetition {
  constructor(entities) {
    this.entities = entities;

    this.playerPaddle = entities.find(e => e.type === 'player-paddle');
    this.aiPaddle     = entities.find(e => e.type === 'ai-paddle');
    this.ball         = entities.find(e => e.type === 'tennis-ball');
    this.centerNet    = entities.find(e => e.type === 'center-net');
    this.scoreDigits  = entities.filter(e => e.type === 'score-digit');

    this.playerScore = 0;
    this.aiScore     = 0;
    this.winScore    = 7;

    this.ballSpeedBase = 300 * S;
    this.maxBallSpeed  = 720 * S;
    this.ballSpeed     = this.ballSpeedBase;
    this.ballVX        = this.ballSpeedBase * (Math.random() > 0.5 ? 1 : -1);
    this.ballVY        = this.ballSpeedBase * 0.65 * (Math.random() > 0.5 ? 1 : -1);

    this.playerSpeed = 420 * S;
    this.aiSpeed     = 230 * S;
    this.keysDown    = {};

    this.aiTargetY      = H / 2;
    this.aiReactionTime = 0.09;
    this.aiTimer        = 0;

    this.trail          = [];
    this.trailMaxLength = 14;
    this.particles      = [];

    this.gameState     = 'playing';
    this.scoredTimer   = 0;
    this.scoredDuration = 1.6;
    this.winner        = null;
    this.flashTimer    = 0;
    this.flashDuration = 0.35;
    this.flashSide     = null;

    this.pulseTimer = 0;

    if (this.playerPaddle) {
      this.playerPaddle.x = 38 * S;
      this.playerPaddle.y = H / 2 - (this.playerPaddle.height || 80 * S) / 2;
    }
    if (this.aiPaddle) {
      this.aiPaddle.x = W - 38 * S - (this.aiPaddle.width || 12 * S);
      this.aiPaddle.y = H / 2 - (this.aiPaddle.height || 80 * S) / 2;
    }
    if (this.ball) {
      this.ball.x = W / 2;
      this.ball.y = H / 2;
    }
    this._updateScoreDigits();
  }

  _ballRadius() {
    if (!this.ball) return 7 * S;
    return Math.min(this.ball.width || 14 * S, this.ball.height || 14 * S) / 2;
  }

  _resetBall(scoredBy) {
    if (!this.ball) return;
    this.ball.x = W / 2;
    this.ball.y = H / 2;
    this.trail  = [];
    this.ballSpeed = this.ballSpeedBase;
    const dirX = scoredBy === 'player' ? 1 : scoredBy === 'ai' ? -1 : (Math.random() > 0.5 ? 1 : -1);
    this.ballVX = this.ballSpeedBase * dirX;
    this.ballVY = this.ballSpeedBase * 0.65 * (Math.random() > 0.5 ? 1 : -1);
  }

  _spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = (60 + Math.random() * 160) * S;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 0.4 + Math.random() * 0.5,
        maxLife: 1.0,
        color,
        radius: (2 + Math.random() * 4) * S,
      });
    }
  }

  _updateScoreDigits() {
    if (!this.scoreDigits.length) return;
    const half = Math.floor(this.scoreDigits.length / 2);
    const playerDigits = this.scoreDigits.slice(0, half || 1);
    const aiDigits     = this.scoreDigits.slice(half || 1);
    playerDigits.forEach((d, i) => { d._score = this.playerScore; d._digitIndex = i; });
    aiDigits.forEach((d, i)     => { d._score = this.aiScore;     d._digitIndex = i; });
  }

  _restart() {
    this.playerScore = 0;
    this.aiScore     = 0;
    this.gameState   = 'playing';
    this.winner      = null;
    this.particles   = [];
    this.trail       = [];
    this.flashTimer  = 0;
    this._resetBall(null);
    this._updateScoreDigits();
    if (this.playerPaddle) this.playerPaddle.y = H / 2 - (this.playerPaddle.height || 80 * S) / 2;
    if (this.aiPaddle)     this.aiPaddle.y     = H / 2 - (this.aiPaddle.height    || 80 * S) / 2;
  }

  update(dt) {
    const events = [];

    // Always tick particles and flash
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x  += p.vx * dt;
      p.y  += p.vy * dt;
      p.vx *= 0.93;
      p.vy *= 0.93;
      p.life -= dt;
      if (p.life <= 0) this.particles.splice(i, 1);
    }
    if (this.flashTimer > 0) this.flashTimer -= dt;
    this.pulseTimer += dt;

    if (this.gameState === 'gameover') return events;

    if (this.gameState === 'scored') {
      this.scoredTimer -= dt;
      if (this.scoredTimer <= 0) this.gameState = 'playing';
      return events;
    }

    // ── Player paddle ──
    if (this.playerPaddle) {
      const ph = this.playerPaddle.height || 80 * S;
      if (this.keysDown['ArrowUp']   || this.keysDown['KeyW']) this.playerPaddle.y -= this.playerSpeed * dt;
      if (this.keysDown['ArrowDown'] || this.keysDown['KeyS']) this.playerPaddle.y += this.playerSpeed * dt;
      this.playerPaddle.y = Math.max(0, Math.min(H - ph, this.playerPaddle.y));
    }

    // ── AI paddle ──
    if (this.aiPaddle && this.ball) {
      this.aiTimer -= dt;
      if (this.aiTimer <= 0) {
        this.aiTimer    = this.aiReactionTime;
        const ph        = this.aiPaddle.height || 80 * S;
        this.aiTargetY  = this.ball.y - ph / 2 + (Math.random() - 0.5) * 28 * S;
        // Scale AI difficulty with score gap
        const gap = this.aiScore - this.playerScore;
        this.aiSpeed = Math.min((210 + gap * 8) * S, 340 * S);
      }
      const ph   = this.aiPaddle.height || 80 * S;
      const diff = this.aiTargetY - this.aiPaddle.y;
      const move = this.aiSpeed * dt;
      this.aiPaddle.y += Math.abs(diff) < move ? diff : Math.sign(diff) * move;
      this.aiPaddle.y  = Math.max(0, Math.min(H - ph, this.aiPaddle.y));
    }

    // ── Ball ──
    if (this.ball) {
      this.trail.push({ x: this.ball.x, y: this.ball.y });
      if (this.trail.length > this.trailMaxLength) this.trail.shift();

      this.ball.x += this.ballVX * dt;
      this.ball.y += this.ballVY * dt;

      const br = this._ballRadius();

      // Wall bounce top/bottom
      if (this.ball.y - br <= 0) {
        this.ball.y  = br;
        this.ballVY  = Math.abs(this.ballVY);
        this._spawnParticles(this.ball.x, br, '#aaffaa', 4);
      }
      if (this.ball.y + br >= H) {
        this.ball.y  = H - br;
        this.ballVY  = -Math.abs(this.ballVY);
        this._spawnParticles(this.ball.x, H - br, '#aaffaa', 4);
      }

      // Paddle collision helper
      const hitPaddle = (paddle, isPlayer) => {
        if (!paddle) return;
        const pw = paddle.width  || 12 * S;
        const ph = paddle.height || 80 * S;
        const overlapX = this.ball.x + br > paddle.x && this.ball.x - br < paddle.x + pw;
        const overlapY = this.ball.y + br > paddle.y && this.ball.y - br < paddle.y + ph;
        if (!overlapX || !overlapY) return;

        if (isPlayer) {
          this.ballVX  = Math.abs(this.ballVX);
          this.ball.x  = paddle.x + pw + br;
        } else {
          this.ballVX  = -Math.abs(this.ballVX);
          this.ball.x  = paddle.x - br;
        }

        const padCY   = paddle.y + ph / 2;
        const hitOff  = (this.ball.y - padCY) / (ph / 2);
        this.ballVY   = hitOff * this.ballSpeedBase * 1.3;

        this.ballSpeed   = Math.min(this.ballSpeed * 1.07, this.maxBallSpeed);
        const angle      = Math.atan2(this.ballVY, this.ballVX);
        this.ballVX      = Math.cos(angle) * this.ballSpeed;
        this.ballVY      = Math.sin(angle) * this.ballSpeed;
        this._spawnParticles(this.ball.x, this.ball.y, '#ffee44', 9);
      };

      hitPaddle(this.playerPaddle, true);
      hitPaddle(this.aiPaddle, false);

      // ── Score: ball exits left ── AI scores
      if (this.ball.x + br < 0) {
        this.aiScore++;
        this.flashSide  = 'ai';
        this.flashTimer = this.flashDuration;
        this._spawnParticles(0, this.ball.y, '#ff5555', 22);
        this._updateScoreDigits();
        events.push({ type: 'score', value: this.aiScore });
        events.push({ type: 'state', key: 'aiScore', value: this.aiScore });
        if (this.aiScore >= this.winScore) {
          this.gameState = 'gameover';
          this.winner    = 'ai';
          events.push({ type: 'state', key: 'winner', value: 'ai' });
        } else {
          this.gameState   = 'scored';
          this.scoredTimer = this.scoredDuration;
          this._resetBall('ai');
        }
      }

      // ── Score: ball exits right ── Player scores
      if (this.ball.x - br > W) {
        this.playerScore++;
        this.flashSide  = 'player';
        this.flashTimer = this.flashDuration;
        this._spawnParticles(W, this.ball.y, '#55aaff', 22);
        this._updateScoreDigits();
        events.push({ type: 'score', value: this.playerScore });
        events.push({ type: 'state', key: 'playerScore', value: this.playerScore });
        if (this.playerScore >= this.winScore) {
          this.gameState = 'gameover';
          this.winner    = 'player';
          events.push({ type: 'state', key: 'winner', value: 'player' });
        } else {
          this.gameState   = 'scored';
          this.scoredTimer = this.scoredDuration;
          this._resetBall('player');
        }
      }
    }

    return events;
  }

  draw(ctx) {
    const br = this._ballRadius();

    // ── Ball trail ──
    for (let i = 0; i < this.trail.length; i++) {
      const t     = this.trail[i];
      const frac  = i / this.trail.length;
      const alpha = frac * 0.55;
      const r     = br * frac * 0.85;
      ctx.beginPath();
      ctx.arc(t.x, t.y, Math.max(1, r), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 210, 60, ${alpha})`;
      ctx.fill();
    }

    // ── Particles ──
    for (const p of this.particles) {
      const alpha = Math.max(0, p.life / (p.maxLife || 1));
      const hex   = Math.floor(alpha * 255).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.radius * alpha), 0, Math.PI * 2);
      ctx.fillStyle = p.color + hex;
      ctx.fill();
    }

    // ── Flash overlay on score ──
    if (this.flashTimer > 0 && this.flashSide) {
      const a = (this.flashTimer / this.flashDuration) * 0.28;
      ctx.fillStyle = this.flashSide === 'player'
        ? `rgba(68,170,255,${a})`
        : `rgba(255,68,68,${a})`;
      ctx.fillRect(0, 0, W, H);
    }

    // ── Scores ──
    const scoreFontSize = 52 * S;
    ctx.textBaseline = 'top';
    ctx.textAlign    = 'center';

    ctx.font        = `bold ${scoreFontSize}px monospace`;
    ctx.shadowBlur  = 18 * S;
    ctx.shadowColor = '#55aaff';
    ctx.fillStyle   = 'rgba(255,255,255,0.92)';
    ctx.fillText(String(this.playerScore), W * 0.25, 16 * S);

    ctx.shadowColor = '#ff5555';
    ctx.fillStyle   = 'rgba(255,255,255,0.92)';
    ctx.fillText(String(this.aiScore), W * 0.75, 16 * S);
    ctx.shadowBlur  = 0;

    // ── Win-to label ──
    ctx.font      = `${12 * S}px monospace`;
    ctx.fillStyle = 'rgba(200,200,200,0.55)';
    ctx.fillText(`first to ${this.winScore}`, W / 2, 26 * S);

    // ── Player / AI labels ──
    ctx.font      = `${11 * S}px monospace`;
    ctx.fillStyle = 'rgba(100,180,255,0.65)';
    ctx.fillText('YOU', W * 0.25, 70 * S);
    ctx.fillStyle = 'rgba(255,100,100,0.65)';
    ctx.fillText('AI', W * 0.75, 70 * S);

    // ── Scored pause message ──
    if (this.gameState === 'scored') {
      const prog  = 1 - this.scoredTimer / this.scoredDuration;
      const alpha = Math.sin(prog * Math.PI) * 0.95;
      ctx.font         = `bold ${30 * S}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor  = this.flashSide === 'player' ? '#55aaff' : '#ff5555';
      ctx.shadowBlur   = 14 * S;
      ctx.fillStyle    = `rgba(255,255,255,${alpha})`;
      ctx.fillText(
        this.flashSide === 'player' ? 'POINT — YOU!' : 'POINT — AI!',
        W / 2, H / 2
      );
      ctx.shadowBlur = 0;
    }

    // ── Ball speed indicator ──
    if (this.gameState === 'playing' && this.ball) {
      const pct  = Math.min((this.ballSpeed - this.ballSpeedBase) / (this.maxBallSpeed - this.ballSpeedBase), 1);
      if (pct > 0.01) {
        const bw = 90 * S, bh = 6 * S;
        const bx = W / 2 - bw / 2, by = H - 22 * S;
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(bx, by, bw, bh);
        const hue = 120 - pct * 120;
        ctx.fillStyle = `hsl(${hue},100%,55%)`;
        ctx.fillRect(bx, by, bw * pct, bh);
        ctx.font         = `${9 * S}px monospace`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle    = 'rgba(255,255,255,0.45)';
        ctx.fillText('RALLY SPEED', W / 2, by - 2 * S);
      }
    }

    // ── Proximity bars (player & AI distance to ball) ──
    if (this.ball && this.playerPaddle && this.aiPaddle && this.gameState !== 'gameover') {
      const pdist = Math.hypot(
        this.ball.x - (this.playerPaddle.x + (this.playerPaddle.width || 12 * S) / 2),
        this.ball.y - (this.playerPaddle.y + (this.playerPaddle.height || 80 * S) / 2)
      );
      const adist = Math.hypot(
        this.ball.x - (this.aiPaddle.x + (this.aiPaddle.width || 12 * S) / 2),
        this.ball.y - (this.aiPaddle.y + (this.aiPaddle.height || 80 * S) / 2)
      );
      const maxDist = W;
      const bw = 55 * S, bh = 4 * S, mg = 10 * S;
      const by  = H - 10 * S;

      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(mg, by, bw, bh);
      ctx.fillStyle = 'rgba(68,170,255,0.8)';
      ctx.fillRect(mg, by, bw * (1 - Math.min(pdist / maxDist, 1)), bh);

      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(W - mg - bw, by, bw, bh);
      ctx.fillStyle = 'rgba(255,80,80,0.8)';
      ctx.fillRect(W - mg - bw, by, bw * (1 - Math.min(adist / maxDist, 1)), bh);
    }

    // ── Game over overlay ──
    if (this.gameState === 'gameover') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, W, H);

      const pulse = 0.88 + 0.12 * Math.sin(this.pulseTimer * 3.5);
      ctx.save();
      ctx.translate(W / 2, H / 2 - 28 * S);
      ctx.scale(pulse, pulse);
      ctx.font         = `bold ${54 * S}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      if (this.winner === 'player') {
        ctx.shadowColor = '#55aaff';
        ctx.shadowBlur  = 24 * S;
        ctx.fillStyle   = '#88ccff';
        ctx.fillText('YOU WIN!', 0, 0);
      } else {
        ctx.shadowColor = '#ff5555';
        ctx.shadowBlur  = 24 * S;
        ctx.fillStyle   = '#ff8888';
        ctx.fillText('AI WINS!', 0, 0);
      }
      ctx.shadowBlur = 0;
      ctx.restore();

      ctx.font         = `${20 * S}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = 'rgba(255,255,255,0.8)';
      ctx.fillText(`${this.playerScore}  —  ${this.aiScore}`, W / 2, H / 2 + 28 * S);

      ctx.font      = `${13 * S}px monospace`;
      ctx.fillStyle = 'rgba(200,200,200,0.65)';
      ctx.fillText('SPACE or tap to restart', W / 2, H / 2 + 60 * S);
    }
  }

  handleInput(type, data) {
    if (type === 'keydown') {
      if (data && data.code) this.keysDown[data.code] = true;
      if (data && data.code === 'Space' && this.gameState === 'gameover') this._restart();
    } else if (type === 'keyup') {
      if (data && data.code) this.keysDown[data.code] = false;
    } else if (type === 'click' || type === 'touchstart') {
      if (this.gameState === 'gameover') {
        this._restart();
      } else if (data && data.y !== undefined && this.playerPaddle) {
        const ph = this.playerPaddle.height || 80 * S;
        this.playerPaddle.y = Math.max(0, Math.min(H - ph, data.y - ph / 2));
      }
    }
  }
}

// --- Entity Definitions ---
const playerPaddle = {

  height: 48,

};

const aiPaddle = {
  name: 'ai-paddle',
  x: W / 2 - 16 * S,
  y: 30 * S,
  width: 32,

  type: 'enemy',
  sprite: sprite_ai_paddle
};

const tennisBall = {
  name: 'tennis-ball',
  x: W / 2 - 12 * S,
  y: H / 2 - 12 * S,
  width: 24,
  height: 24,
  type: 'projectile',
  sprite: sprite_tennis_ball,
  vx: (Math.random() > 0.5 ? 1 : -1) * 160 * S,

};

const courtSurface = {

  width: 32,

};

const centerNet = {

};

const boundaryLine = {
  name: 'boundary-line',
  x: 0,
  y: 0,
  width: 32,
  height: 24,
  type: 'prop',
  sprite: sprite_boundary_line
};

const scoreDigit = {

// --- Mechanic Instantiation ---
const mechBallPhysics     = new BallPhysics(_toEntityArray([tennisBall, playerPaddle, aiPaddle, centerNet, boundaryLine]));
const mechPaddleControl   = new PaddleControl(_toEntityArray([playerPaddle, aiPaddle, tennisBall, courtSurface, centerNet, boundaryLine, scoreDigit]));
const mechScoreCompetition = new ScoreCompetition(_toEntityArray([playerPaddle, aiPaddle, tennisBall, centerNet, scoreDigit]));

const mechanics = [mechBallPhysics, mechPaddleControl, mechScoreCompetition];

// --- State Variables ---
score        = 0;
let gameOver     = false;
let playerScore  = 0;
let aiScore      = 0;
const WIN_SCORE    = 7;
const PLAYER_SPEED = 220 * S;
const AI_SPEED     = 145 * S;

// Input state
const keys       = {};
let touchLastX   = null;
let touchLastY   = null;


// === INPUT ===

// --- Keyboard Input ---
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  // Prevent page scroll on arrow keys
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();

  for (const mech of mechanics) {
    if (typeof mech.handleInput === 'function') {
      mech.handleInput('keydown', { code: e.code, key: e.key });
    }
  }
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;

  for (const mech of mechanics) {
    if (typeof mech.handleInput === 'function') {
      mech.handleInput('keyup', { code: e.code, key: e.key });
    }
  }
});

// --- Touch Input ---
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameOver) { location.reload(); return; }
  const t    = e.touches[0];
  touchLastX = t.clientX;
  touchLastY = t.clientY;

  for (const mech of mechanics) {
    if (typeof mech.handleInput === 'function') {
      mech.handleInput('touchstart', { x: t.clientX, y: t.clientY });
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];

  if (touchLastX !== null && touchLastY !== null) {
    const dx = t.clientX - touchLastX;
    const dy = t.clientY - touchLastY;

    // Horizontal axis
    keys['ArrowLeft']  = dx < -2;
    keys['ArrowRight'] = dx >  2;
    // Vertical axis
    keys['KeyW']       = dy < -2;
    keys['KeyS']       = dy >  2;

    touchLastX = t.clientX;
    touchLastY = t.clientY;
  }

  for (const mech of mechanics) {
    if (typeof mech.handleInput === 'function') {
      mech.handleInput('touchmove', { x: t.clientX, y: t.clientY });
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  keys['ArrowLeft']  = false;
  keys['ArrowRight'] = false;
  keys['KeyW']       = false;
  keys['KeyS']       = false;
  touchLastX = null;
  touchLastY = null;

  for (const mech of mechanics) {
    if (typeof mech.handleInput === 'function') {
      mech.handleInput('touchend', {});
    }
  }
}, { passive: false });

// --- Click to Restart (game over) ---
canvas.addEventListener('click', () => {
  if (gameOver) location.reload();
});


// === GAME LOOP ===
let lastTime = 0;
if (typeof score === 'undefined') var score = 0;
const scoreEl = document.getElementById('score');

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  
// --- Player Paddle Movement (arrow keys + W/S) ---
if (keys['ArrowLeft']  || keys['KeyA']) playerPaddle.x -= PLAYER_SPEED * dt;
if (keys['ArrowRight'] || keys['KeyD']) playerPaddle.x += PLAYER_SPEED * dt;
if (keys['KeyW']       || keys['ArrowUp'])   playerPaddle.y -= PLAYER_SPEED * dt;
if (keys['KeyS']       || keys['ArrowDown'])  playerPaddle.y += PLAYER_SPEED * dt;

// Clamp player to bottom half of court
playerPaddle.x = Math.max(0, Math.min(W - playerPaddle.width * S, playerPaddle.x));
playerPaddle.y = Math.max(H / 2 + 4 * S, Math.min(H - playerPaddle.height * S - 4 * S, playerPaddle.y));

// --- AI Paddle Movement (tracks ball horizontally, stays in top half) ---
const ballCX  = tennisBall.x + (tennisBall.width  * S) / 2;
const aiCX    = aiPaddle.x   + (aiPaddle.width    * S) / 2;
const aiDiffX = ballCX - aiCX;
const aiStep  = AI_SPEED * dt;
aiPaddle.x   += Math.sign(aiDiffX) * Math.min(Math.abs(aiDiffX), aiStep);
aiPaddle.x    = Math.max(0, Math.min(W - aiPaddle.width * S, aiPaddle.x));
aiPaddle.y    = Math.max(4 * S, Math.min(H / 2 - aiPaddle.height * S - 4 * S, aiPaddle.y));

// --- Update Mechanics & Handle Events ---
for (const mech of mechanics) {
  const events = mech.update(dt) || [];
  for (const evt of events) {

    if (evt.type === 'score') {
      score += 1;
      const scoredByPlayer = (evt.scorer === 'player' || evt.team === 'player' || evt.side === 'player');
      if (scoredByPlayer) playerScore++;
      else                aiScore++;

      if (playerScore >= WIN_SCORE || aiScore >= WIN_SCORE) {
        gameOver = true;
      }

      // Reset ball to centre after each point
      tennisBall.x  = W / 2 - (tennisBall.width  * S) / 2;
      tennisBall.y  = H / 2 - (tennisBall.height * S) / 2;
      tennisBall.vx = (Math.random() > 0.5 ? 1 : -1) * 160 * S;
      tennisBall.vy = (scoredByPlayer ? -1 : 1) * 210 * S;
    }

    if (evt.type === 'state' && (evt.state === 'gameover' || evt.state === 'game_over')) {
      gameOver = true;
    }
  }
}


  
// --- 1. Tile Court Surface (background terrain) ---
const csTileW = courtSurface.width  * S;
const csTileH = courtSurface.height * S;
for (let ty = 0; ty < H; ty += csTileH) {
  for (let tx = 0; tx < W; tx += csTileW) {
    ctx.drawImage(sprite_court_surface, tx, ty, csTileW, csTileH);
  }
}

// --- 2. Tile Boundary Lines (top & bottom edges) ---
const blW = boundaryLine.width  * S;
const blH = boundaryLine.height * S;
for (let tx = 0; tx < W; tx += blW) {
  ctx.drawImage(sprite_boundary_line, tx, 0,      blW, blH);
  ctx.drawImage(sprite_boundary_line, tx, H - blH, blW, blH);
}

// --- 3. Tile Center Net (horizontal strip at mid-court) ---
const netW  = centerNet.width  * S;
const netH  = centerNet.height * S;
const netY  = H / 2 - netH / 2;
for (let tx = 0; tx < W; tx += netW) {
  ctx.drawImage(sprite_center_net, tx, netY, netW, netH);
}

// --- 4. Score-Digit Sprite (HUD decoration, left side) ---
ctx.drawImage(sprite_score_digit, scoreDigit.x, scoreDigit.y, scoreDigit.width * S, scoreDigit.height * S);

// --- 5. AI Paddle ---
ctx.drawImage(sprite_ai_paddle, aiPaddle.x, aiPaddle.y, aiPaddle.width * S, aiPaddle.height * S);

// --- 6. Player Paddle ---
ctx.drawImage(sprite_player_paddle, playerPaddle.x, playerPaddle.y, playerPaddle.width * S, playerPaddle.height * S);

// --- 7. Tennis Ball ---
ctx.drawImage(sprite_tennis_ball, tennisBall.x, tennisBall.y, tennisBall.width * S, tennisBall.height * S);

// --- 8. Mechanic Draw Passes ---
for (const mech of mechanics) {
  if (typeof mech.draw === 'function') mech.draw(ctx);
}

// --- 9. HUD Score Text ---
ctx.save();
ctx.fillStyle    = '#ffffff';
ctx.font         = `bold ${Math.round(22 * S)}px monospace`;
ctx.textAlign    = 'center';
ctx.shadowColor  = '#000';
ctx.shadowBlur   = 6;
ctx.fillText(`${playerScore}  :  ${aiScore}`, W / 2, Math.round(30 * S));
ctx.restore();

// --- 10. Game-Over Overlay ---
if (gameOver) {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.68)';
  ctx.fillRect(0, 0, W, H);

  const winnerLabel = playerScore >= WIN_SCORE ? '🏆  You Win!' : '🤖  AI Wins!';

  ctx.save();
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4444';
  ctx.font      = `bold ${Math.round(44 * S)}px monospace`;
  ctx.fillText('GAME OVER', W / 2, H / 2 - 30 * S);

  ctx.fillStyle = '#ffffff';
  ctx.font      = `bold ${Math.round(26 * S)}px monospace`;
  ctx.fillText(winnerLabel, W / 2, H / 2 + 10 * S);

  ctx.fillStyle = '#aaaaaa';
  ctx.font      = `${Math.round(16 * S)}px monospace`;
  ctx.fillText('Click or Tap to Restart', W / 2, H / 2 + 46 * S);
  ctx.restore();
}


  scoreEl.textContent = 'Score: ' + score;
  requestAnimationFrame(gameLoop);
}

// === BOOT ===

// --- Final Entity Positioning (centre-correct after S is known) ---
playerPaddle.x = W / 2 - (playerPaddle.width  * S) / 2;
playerPaddle.y = H - 80 * S;

aiPaddle.x = W / 2 - (aiPaddle.width  * S) / 2;
aiPaddle.y = 30 * S;

tennisBall.x = W / 2 - (tennisBall.width  * S) / 2;
tennisBall.y = H / 2 - (tennisBall.height * S) / 2;

centerNet.y  = H / 2 - (centerNet.height * S) / 2;

scoreDigit.x = 20 * S;
scoreDigit.y = 10 * S;

console.log('Game initialized — Tennis Court | Player vs AI | First to', WIN_SCORE, 'wins');

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
