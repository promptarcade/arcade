// === MECHANICS ===

// Entity array normalizer — contract enforcement
function _toEntityArray(arg) {
  if (Array.isArray(arg)) return arg;
  if (arg && typeof arg === 'object') {
    if (Array.isArray(arg.entities)) return arg.entities;
    if (Array.isArray(arg.sprites)) return arg.sprites;
    return [arg];
  }
  return [];
}
// --- Mechanic: BallPhysics ---
class BallPhysics {
  constructor(entities) {
    this.entities = entities;

    this.ball         = entities.find(e => e.type === 'game-ball');
    this.playerPaddle = entities.find(e => e.type === 'player-paddle');
    this.opponentPaddle = entities.find(e => e.type === 'opponent-paddle');
    this.walls        = entities.filter(e => e.type === 'boundary-wall');
    this.divider      = entities.find(e => e.type === 'center-divider');
    this.scorePanel   = entities.find(e => e.type === 'score-panel');

    /* ── Ball velocity ─────────────────────────────────────────── */
    const startAngle  = (Math.random() * 40 - 20) * Math.PI / 180;
    const startDir    = Math.random() < 0.5 ? 1 : -1;
    this.ballVX       = Math.cos(startAngle) * 280 * S * startDir;
    this.ballVY       = Math.sin(startAngle) * 280 * S;

    /* ── Scores ────────────────────────────────────────────────── */
    this.playerScore   = 0;
    this.opponentScore = 0;

    /* ── Ball trail ────────────────────────────────────────────── */
    this.trail    = [];
    this.maxTrail = 14;

    /* ── Speed escalation ──────────────────────────────────────── */
    this.hitCount        = 0;
    this.speedMultiplier = 1.0;
    this.baseSpeed       = 280 * S;

    /* ── Reset state ───────────────────────────────────────────── */
    this.isResetting = false;
    this.resetTimer  = 0;

    /* ── Visual feedback ───────────────────────────────────────── */
    this.flashTimer  = 0;
    this.flashSide   = null;      // 'player' | 'opponent' | 'wall'
    this.scoreFlash  = { timer: 0, side: null };
    this.particles   = [];

    /* ── Input ─────────────────────────────────────────────────── */
    this.keys    = {};
    this.targetY = null;          // mouse/touch Y for player paddle

    /* ── AI tuning ─────────────────────────────────────────────── */
    this.aiSpeed     = 260 * S;
    this.paddleSpeed = 340 * S;

    /* ── Place ball at centre ──────────────────────────────────── */
    if (this.ball) {
      this.ball.x = W / 2;
      this.ball.y = H / 2;
    }
  }

  /* ── Helpers ─────────────────────────────────────────────────── */
  _resetBall() {
    if (!this.ball) return;
    this.ball.x = W / 2;
    this.ball.y = H / 2;
    this.trail       = [];
    this.hitCount    = 0;
    this.speedMultiplier = 1.0;
    const angle = (Math.random() * 40 - 20) * Math.PI / 180;
    const dir   = Math.random() < 0.5 ? 1 : -1;
    this.ballVX = Math.cos(angle) * this.baseSpeed * dir;
    this.ballVY = Math.sin(angle) * this.baseSpeed;
  }

  _applySpeedMultiplier() {
    const spd = Math.hypot(this.ballVX, this.ballVY);
    if (spd === 0) return;
    const target = this.baseSpeed * this.speedMultiplier;
    this.ballVX = (this.ballVX / spd) * target;
    this.ballVY = (this.ballVY / spd) * target;
  }

  _emitParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = (60 + Math.random() * 120) * S;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.4 + Math.random() * 0.3,
        maxLife: 0.4 + Math.random() * 0.3,
        r: (3 + Math.random() * 4) * S,
        color
      });
    }
  }

  _rectContainsCircle(cx, cy, cr, rx, ry, rw, rh) {
    const nearX = Math.max(rx, Math.min(cx, rx + rw));
    const nearY = Math.max(ry, Math.min(cy, ry + rh));
    return Math.hypot(cx - nearX, cy - nearY) < cr;
  }

  /* ── Update ──────────────────────────────────────────────────── */
  update(dt) {
    const events = [];
    if (!this.ball) return events;

    /* Score flash decay */
    if (this.scoreFlash.timer > 0) this.scoreFlash.timer -= dt;
    if (this.flashTimer > 0)        this.flashTimer       -= dt;

    /* Particle update */
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x    += p.vx * dt;
      p.y    += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) this.particles.splice(i, 1);
    }

    /* Reset countdown */
    if (this.isResetting) {
      this.resetTimer -= dt;
      if (this.resetTimer <= 0) {
        this.isResetting = false;
        this._resetBall();
      }
      return events;
    }

    /* ── Player paddle movement ──────────────────────────────── */
    const pp = this.playerPaddle;
    if (pp) {
      const halfH = (pp.height || 80 * S) / 2;
      const up    = this.keys['ArrowUp']   || this.keys['KeyW'] || this.keys['w'];
      const down  = this.keys['ArrowDown'] || this.keys['KeyS'] || this.keys['s'];
      if (up)   pp.y -= this.paddleSpeed * dt;
      if (down) pp.y += this.paddleSpeed * dt;

      if (this.targetY !== null && !up && !down) {
        const diff = this.targetY - pp.y;
        const step = this.paddleSpeed * dt;
        pp.y += Math.abs(diff) < step ? diff : Math.sign(diff) * step;
      }
      pp.y = Math.max(halfH, Math.min(H - halfH, pp.y));
    }

    /* ── Opponent AI ─────────────────────────────────────────── */
    const op = this.opponentPaddle;
    if (op) {
      const halfH = (op.height || 80 * S) / 2;
      /* Predict: track ball only when heading toward opponent */
      const targetY = this.ballVX > 0
        ? this.ball.y + (this.ballVY / (this.ballVX || 1)) * (op.x - this.ball.x) * 0.85
        : H / 2;
      const diff    = targetY - op.y;
      const step    = Math.min(Math.abs(diff), this.aiSpeed * dt);
      op.y         += Math.sign(diff) * step;
      op.y          = Math.max(halfH, Math.min(H - halfH, op.y));
    }

    /* ── Move ball ───────────────────────────────────────────── */
    this.ball.x += this.ballVX * dt;
    this.ball.y += this.ballVY * dt;

    /* Trail */
    this.trail.push({ x: this.ball.x, y: this.ball.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    const ballR  = (this.ball.width  || 16 * S) / 2;
    const bx     = this.ball.x;
    const by     = this.ball.y;

    /* ── Wall bounds ──────────────────────────────────────────── */
    let topBound    = ballR;
    let bottomBound = H - ballR;

    for (const w of this.walls) {
      const wh = w.height || 10 * S;
      if (w.y < H / 2) topBound    = Math.max(topBound,    w.y + wh + ballR);
      else              bottomBound = Math.min(bottomBound, w.y        - ballR);
    }

    if (this.ball.y <= topBound) {
      this.ball.y    = topBound;
      this.ballVY    = Math.abs(this.ballVY);
      this.flashTimer = 0.12;
      this.flashSide  = 'wall';
      this._emitParticles(this.ball.x, topBound, '#88ddff', 6);
      events.push({ type: 'state', key: 'ballBounce', value: 'top' });
    }
    if (this.ball.y >= bottomBound) {
      this.ball.y    = bottomBound;
      this.ballVY    = -Math.abs(this.ballVY);
      this.flashTimer = 0.12;
      this.flashSide  = 'wall';
      this._emitParticles(this.ball.x, bottomBound, '#88ddff', 6);
      events.push({ type: 'state', key: 'ballBounce', value: 'bottom' });
    }

    /* ── Paddle collisions ───────────────────────────────────── */
    if (pp && this.ballVX < 0) {
      const pw = pp.width  || 14 * S;
      const ph = pp.height || 80 * S;
      const rx = pp.x - pw / 2;
      const ry = pp.y - ph / 2;
      if (this._rectContainsCircle(this.ball.x, this.ball.y, ballR, rx, ry, pw, ph)) {
        this.ball.x   = rx + pw + ballR + 1;
        const rel     = Math.max(-1, Math.min(1, (this.ball.y - pp.y) / (ph / 2)));
        this.ballVX   =  Math.abs(this.ballVX);
        this.ballVY   = rel * 320 * S;
        this.hitCount++;
        this.speedMultiplier = Math.min(2.4, 1.0 + this.hitCount * 0.08);
        this._applySpeedMultiplier();
        this.flashTimer = 0.22;
        this.flashSide  = 'player';
        this._emitParticles(this.ball.x, this.ball.y, '#44ffcc', 10);
        events.push({ type: 'state', key: 'ballHit', value: 'player' });
      }
    }

    if (op && this.ballVX > 0) {
      const ow = op.width  || 14 * S;
      const oh = op.height || 80 * S;
      const rx = op.x - ow / 2;
      const ry = op.y - oh / 2;
      if (this._rectContainsCircle(this.ball.x, this.ball.y, ballR, rx, ry, ow, oh)) {
        this.ball.x   = rx - ballR - 1;
        const rel     = Math.max(-1, Math.min(1, (this.ball.y - op.y) / (oh / 2)));
        this.ballVX   = -Math.abs(this.ballVX);
        this.ballVY   = rel * 320 * S;
        this.hitCount++;
        this.speedMultiplier = Math.min(2.4, 1.0 + this.hitCount * 0.08);
        this._applySpeedMultiplier();
        this.flashTimer = 0.22;
        this.flashSide  = 'opponent';
        this._emitParticles(this.ball.x, this.ball.y, '#ff8844', 10);
        events.push({ type: 'state', key: 'ballHit', value: 'opponent' });
      }
    }

    /* ── Scoring ─────────────────────────────────────────────── */
    if (this.ball.x + ballR < 0) {
      this.opponentScore++;
      this.scoreFlash = { timer: 1.8, side: 'opponent' };
      this._emitParticles(W * 0.25, H / 2, '#ff4455', 20);
      events.push({ type: 'score',  value: this.opponentScore });
      events.push({ type: 'state',  key: 'scorer',        value: 'opponent' });
      events.push({ type: 'state',  key: 'opponentScore', value: this.opponentScore });
      this.isResetting = true;
      this.resetTimer  = 1.8;
    } else if (this.ball.x - ballR > W) {
      this.playerScore++;
      this.scoreFlash = { timer: 1.8, side: 'player' };
      this._emitParticles(W * 0.75, H / 2, '#44ff88', 20);
      events.push({ type: 'score',  value: this.playerScore });
      events.push({ type: 'state',  key: 'scorer',      value: 'player' });
      events.push({ type: 'state',  key: 'playerScore', value: this.playerScore });
      this.isResetting = true;
      this.resetTimer  = 1.8;
    }

    return events;
  }

  /* ── Draw ────────────────────────────────────────────────────── */
  draw(ctx) {
    /* ── Center divider dashes ─────────────────────────────────── */
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth   = 3 * S;
    ctx.setLineDash([18 * S, 14 * S]);
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    /* ── Ball trail ────────────────────────────────────────────── */
    if (this.ball && this.trail.length > 1 && !this.isResetting) {
      const ballR = (this.ball.width || 16 * S) / 2;
      for (let i = 1; i < this.trail.length; i++) {
        const frac  = i / this.trail.length;
        const alpha = frac * 0.55;
        const r     = ballR * frac * 0.75;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = '#00d4ff';
        ctx.beginPath();
        ctx.arc(this.trail[i].x, this.trail[i].y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    /* ── Ball glow ─────────────────────────────────────────────── */
    if (this.ball && !this.isResetting) {
      const ballR = (this.ball.width || 16 * S) / 2;
      const spd   = Math.hypot(this.ballVX, this.ballVY);
      const max   = this.baseSpeed * 2.4;
      const t     = Math.min(spd / max, 1);
      const glowR = ballR + 12 * S * t;
      const grad  = ctx.createRadialGradient(
        this.ball.x, this.ball.y, ballR * 0.5,
        this.ball.x, this.ball.y, glowR
      );
      grad.addColorStop(0, `rgba(0,220,255,${0.55 * t})`);
      grad.addColorStop(1, 'rgba(0,220,255,0)');
      ctx.save();
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.ball.x, this.ball.y, glowR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      /* Speed arc indicator */
      ctx.save();
      ctx.strokeStyle = `hsl(${(1 - t) * 120},100%,62%)`;
      ctx.lineWidth   = 2.5 * S;
      ctx.globalAlpha = 0.75;
      ctx.beginPath();
      ctx.arc(this.ball.x, this.ball.y, ballR + 6 * S, -Math.PI / 2,
              -Math.PI / 2 + Math.PI * 2 * t);
      ctx.stroke();
      ctx.restore();
    }

    /* ── Paddle collision flash / glow ─────────────────────────── */
    if (this.flashTimer > 0) {
      const a    = (this.flashTimer / 0.22) * 0.7;
      const pads = this.flashSide === 'player'   ? [this.playerPaddle]   :
                   this.flashSide === 'opponent' ? [this.opponentPaddle] : [];
      for (const pad of pads) {
        if (!pad) continue;
        const pw   = pad.width  || 14 * S;
        const ph   = pad.height || 80 * S;
        const color = this.flashSide === 'player' ? '#44ffcc' : '#ff8844';
        const grad  = ctx.createRadialGradient(pad.x, pad.y, 0, pad.x, pad.y, pw * 5);
        grad.addColorStop(0, color.replace(')', `,${a})`).replace('rgb', 'rgba'));
        grad.addColorStop(0, `rgba(255,255,255,${a})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.save();
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(pad.x, pad.y, pw * 4, ph * 1.1, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    /* ── Particles ─────────────────────────────────────────────── */
    for (const p of this.particles) {
      const a = p.life / p.maxLife;
      ctx.save();
      ctx.globalAlpha = a * 0.9;
      ctx.fillStyle   = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    /* ── Score display ─────────────────────────────────────────── */
    const fontSize = Math.round(52 * S);
    ctx.save();
    ctx.font         = `bold ${fontSize}px 'Courier New', monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur   = 12 * S;

    /* Player score */
    const pflash  = this.scoreFlash.side === 'player'   && this.scoreFlash.timer > 0;
    const oflash  = this.scoreFlash.side === 'opponent' && this.scoreFlash.timer > 0;
    ctx.shadowColor = pflash ? '#44ff88' : 'transparent';
    ctx.fillStyle   = pflash
      ? `rgba(100,255,150,${Math.min(1, this.scoreFlash.timer)})`
      : 'rgba(255,255,255,0.28)';
    ctx.fillText(this.playerScore, W * 0.25, 58 * S);

    /* Opponent score */
    ctx.shadowColor = oflash ? '#ff4455' : 'transparent';
    ctx.fillStyle   = oflash
      ? `rgba(255,100,110,${Math.min(1, this.scoreFlash.timer)})`
      : 'rgba(255,255,255,0.28)';
    ctx.fillText(this.opponentScore, W * 0.75, 58 * S);
    ctx.restore();

    /* ── Speed multiplier badge ────────────────────────────────── */
    if (!this.isResetting && this.speedMultiplier > 1.15) {
      const t   = (this.speedMultiplier - 1.0) / 1.4;
      const hue = (1 - t) * 120;
      ctx.save();
      ctx.font         = `bold ${13 * S}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle    = `hsl(${hue},100%,65%)`;
      ctx.globalAlpha  = 0.88;
      ctx.fillText(`${this.speedMultiplier.toFixed(1)}×`, W / 2, 18 * S);
      ctx.restore();
    }

    /* ── Reset / countdown overlay ─────────────────────────────── */
    if (this.isResetting) {
      const t      = Math.ceil(this.resetTimer);
      const pulse  = 0.5 + 0.5 * Math.sin(this.resetTimer * Math.PI * 2);
      const label  = this.resetTimer < 0.6 ? 'GO!' : String(t);
      ctx.save();
      ctx.font         = `bold ${72 * S}px 'Courier New', monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = `rgba(255,255,255,${0.35 + 0.55 * pulse})`;
      ctx.shadowColor  = 'rgba(0,200,255,0.6)';
      ctx.shadowBlur   = 20 * S;
      ctx.fillText(label, W / 2, H / 2);
      ctx.restore();
    }
  }

  /* ── handleInput ─────────────────────────────────────────────── */
  handleInput(type, data) {
    if (type === 'keydown') {
      if (data.code) this.keys[data.code] = true;
      if (data.key)  this.keys[data.key]  = true;
    } else if (type === 'keyup') {
      if (data.code) this.keys[data.code] = false;
      if (data.key)  this.keys[data.key]  = false;
    } else if (type === 'click' || type === 'touchstart') {
      if (data.y !== undefined) this.targetY = data.y;
    }
  }
}


// --- Mechanic: PaddleControl ---
class PaddleControl {
  constructor(entities) {
    this.entities = entities;

    this.playerPaddle   = entities.find(e => e.type === 'player-paddle')   || null;
    this.opponentPaddle = entities.find(e => e.type === 'opponent-paddle') || null;
    this.ball           = entities.find(e => e.type === 'game-ball')        || null;
    this.divider        = entities.find(e => e.type === 'center-divider')   || null;
    this.scorePanel     = entities.find(e => e.type === 'score-panel')      || null;
    this.walls          = entities.filter(e => e.type === 'boundary-wall');

    // Scores
    this.playerScore   = 0;
    this.opponentScore = 0;

    // Ball velocity
    this.baseSpeedX = 300 * S;
    this.ballVX     = 300 * S;
    this.ballVY     = 200 * S;

    // AI opponent tracking speed
    this.aiSpeed     = 280 * S;
    this.paddleSpeed = 420 * S;

    // Keyboard state
    this.keysDown = {};

    // Mouse / touch target Y for player paddle
    this.targetY = this.playerPaddle ? this.playerPaddle.y : H / 2;

    // Ball trail ring-buffer
    this.trail    = [];
    this.maxTrail = 14;

    // Post-score reset state
    this.resetTimer = 0;
    this.resetDelay = 1.2;

    // Flash overlay after scoring
    this.flashTimer = 0;
    this.flashSide  = null; // 'player' | 'opponent'

    // Rally counter (drives speed ramp)
    this.rallyCount = 0;

    // Pulse animation for paddles
    this.pulseTime = 0;
  }

  // ── Private helpers ──────────────────────────────────────────────────────────

  _resetBall(dirSign) {
    if (!this.ball) return;
    this.ball.x  = W / 2;
    this.ball.y  = H / 2;
    this.ballVX  = this.baseSpeedX * dirSign;
    this.ballVY  = (Math.random() * 180 * S + 80 * S) * (Math.random() < 0.5 ? 1 : -1);
    this.rallyCount = 0;
    this.trail   = [];
  }

  _rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // ── Public API ───────────────────────────────────────────────────────────────

  update(dt) {
    const events = [];
    if (!this.ball || !this.playerPaddle || !this.opponentPaddle) return events;

    this.pulseTime += dt;

    // ── Reset cooldown after a point ──────────────────────────────────────────
    if (this.resetTimer > 0) {
      this.resetTimer -= dt;
      if (this.flashTimer > 0) this.flashTimer -= dt;
      if (this.resetTimer <= 0) {
        this.resetTimer = 0;
        // Ball launches toward the side that just conceded
        const dir = this.flashSide === 'player' ? 1 : -1;
        this._resetBall(dir);
      }
      return events;
    }

    if (this.flashTimer > 0) this.flashTimer -= dt;

    const b  = this.ball;
    const pp = this.playerPaddle;
    const op = this.opponentPaddle;

    const bHW = b.width  / 2;
    const bHH = b.height / 2;

    // ── Player paddle – keyboard ──────────────────────────────────────────────
    if (this.keysDown['ArrowUp']   || this.keysDown['KeyW']) this.targetY -= this.paddleSpeed * dt;
    if (this.keysDown['ArrowDown'] || this.keysDown['KeyS']) this.targetY += this.paddleSpeed * dt;
    this.targetY = Math.max(pp.height / 2, Math.min(H - pp.height / 2, this.targetY));

    // Lerp toward targetY
    const ppDy = this.targetY - pp.y;
    pp.y += Math.sign(ppDy) * Math.min(Math.abs(ppDy), this.paddleSpeed * dt);
    pp.y  = Math.max(pp.height / 2, Math.min(H - pp.height / 2, pp.y));

    // ── Opponent paddle – AI tracks ball ─────────────────────────────────────
    const aiDy = b.y - op.y;
    op.y += Math.sign(aiDy) * Math.min(Math.abs(aiDy), this.aiSpeed * dt);
    op.y  = Math.max(op.height / 2, Math.min(H - op.height / 2, op.y));

    // ── Ball movement ─────────────────────────────────────────────────────────
    b.x += this.ballVX * dt;
    b.y += this.ballVY * dt;

    // Trail
    this.trail.push({ x: b.x, y: b.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    // ── Top / bottom wall bounce ──────────────────────────────────────────────
    if (b.y - bHH <= 0) {
      b.y      = bHH;
      this.ballVY = Math.abs(this.ballVY);
    } else if (b.y + bHH >= H) {
      b.y      = H - bHH;
      this.ballVY = -Math.abs(this.ballVY);
    }

    // ── Player paddle collision ───────────────────────────────────────────────
    const ppL = pp.x - pp.width / 2;
    const ppR = pp.x + pp.width / 2;
    const ppT = pp.y - pp.height / 2;
    const ppB = pp.y + pp.height / 2;

    if (this.ballVX < 0 &&
        this._rectOverlap(b.x - bHW, b.y - bHH, b.width, b.height,
                          ppL, ppT, pp.width, pp.height)) {
      b.x = ppR + bHW;
      const speedMult = 1.04 + Math.min(this.rallyCount * 0.005, 0.15);
      this.ballVX  = Math.abs(this.ballVX) * speedMult;
      const offset = (b.y - pp.y) / (pp.height / 2);
      this.ballVY  = offset * 360 * S;
      this.rallyCount++;
      events.push({ type: 'state', key: 'rally', value: this.rallyCount });
    }

    // ── Opponent paddle collision ─────────────────────────────────────────────
    const opL = op.x - op.width / 2;
    const opR = op.x + op.width / 2;
    const opT = op.y - op.height / 2;
    const opB = op.y + op.height / 2;

    if (this.ballVX > 0 &&
        this._rectOverlap(b.x - bHW, b.y - bHH, b.width, b.height,
                          opL, opT, op.width, op.height)) {
      b.x = opL - bHW;
      const speedMult = 1.04 + Math.min(this.rallyCount * 0.005, 0.15);
      this.ballVX  = -Math.abs(this.ballVX) * speedMult;
      const offset = (b.y - op.y) / (op.height / 2);
      this.ballVY  = offset * 360 * S;
      this.rallyCount++;
      events.push({ type: 'state', key: 'rally', value: this.rallyCount });
    }

    // Cap ball speed
    const maxSpd = 820 * S;
    if (Math.abs(this.ballVX) > maxSpd) this.ballVX = Math.sign(this.ballVX) * maxSpd;
    if (Math.abs(this.ballVY) > maxSpd) this.ballVY = Math.sign(this.ballVY) * maxSpd;

    // ── Scoring ───────────────────────────────────────────────────────────────
    if (b.x + bHW < 0) {
      // Ball exited left → opponent scores
      this.opponentScore++;
      this.flashSide  = 'opponent';
      this.flashTimer = 0.6;
      this.resetTimer = this.resetDelay;
      events.push({ type: 'score', value: this.opponentScore });
      events.push({ type: 'state', key: 'opponentScore', value: this.opponentScore });
    } else if (b.x - bHW > W) {
      // Ball exited right → player scores
      this.playerScore++;
      this.flashSide  = 'player';
      this.flashTimer = 0.6;
      this.resetTimer = this.resetDelay;
      events.push({ type: 'score', value: this.playerScore });
      events.push({ type: 'state', key: 'playerScore', value: this.playerScore });
    }

    return events;
  }

  draw(ctx) {
    if (!this.ball || !this.playerPaddle || !this.opponentPaddle) return;

    const b  = this.ball;
    const pp = this.playerPaddle;
    const op = this.opponentPaddle;

    // ── Ball trail ────────────────────────────────────────────────────────────
    for (let i = 0; i < this.trail.length; i++) {
      const t      = this.trail[i];
      const frac   = (i + 1) / this.trail.length;
      const radius = Math.max(1, (b.width / 2) * frac * 0.85);
      ctx.save();
      ctx.globalAlpha = frac * 0.45;
      ctx.fillStyle   = `hsl(${185 + (1 - frac) * 60}, 100%, 65%)`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // ── Paddle glows ──────────────────────────────────────────────────────────
    const pulse = 0.7 + 0.3 * Math.sin(this.pulseTime * 4);

    ctx.save();
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur  = 22 * S * pulse;
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth   = 2.5 * S;
    ctx.strokeRect(pp.x - pp.width / 2, pp.y - pp.height / 2, pp.width, pp.height);
    ctx.restore();

    ctx.save();
    ctx.shadowColor = '#ff4081';
    ctx.shadowBlur  = 22 * S * pulse;
    ctx.strokeStyle = '#ff4081';
    ctx.lineWidth   = 2.5 * S;
    ctx.strokeRect(op.x - op.width / 2, op.y - op.height / 2, op.width, op.height);
    ctx.restore();

    // ── Ball glow ─────────────────────────────────────────────────────────────
    ctx.save();
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur  = 16 * S;
    ctx.fillStyle   = '#00e5ff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.width / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // ── Center divider dashes ─────────────────────────────────────────────────
    const dashLen = 12 * S;
    const dashGap = 10 * S;
    ctx.save();
    ctx.setLineDash([dashLen, dashGap]);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth   = 3 * S;
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // ── Score display ─────────────────────────────────────────────────────────
    ctx.save();
    ctx.font         = `bold ${52 * S}px monospace`;
    ctx.textBaseline = 'top';
    ctx.textAlign    = 'center';
    ctx.fillStyle    = 'rgba(0,229,255,0.88)';
    ctx.fillText(String(this.playerScore),   W * 0.25, 16 * S);
    ctx.fillStyle    = 'rgba(255,64,129,0.88)';
    ctx.fillText(String(this.opponentScore), W * 0.75, 16 * S);
    ctx.restore();

    // ── Ball-speed bar ────────────────────────────────────────────────────────
    const speed  = Math.hypot(this.ballVX, this.ballVY);
    const maxSpd = 820 * S;
    const fill   = Math.min(speed / maxSpd, 1);
    const barW   = 130 * S;
    const barH   = 6  * S;
    const barX   = W / 2 - barW / 2;
    const barY   = H - 16 * S;

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 3 * S);
    ctx.fill();

    const grad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
    grad.addColorStop(0, '#00e5ff');
    grad.addColorStop(1, '#ff4081');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * fill, barH, 3 * S);
    ctx.fill();
    ctx.restore();

    // ── Flash overlay on score ────────────────────────────────────────────────
    if (this.flashTimer > 0) {
      const alpha = (this.flashTimer / 0.6) * 0.28;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = this.flashSide === 'player' ? '#00e5ff' : '#ff4081';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    // ── Reset countdown label ─────────────────────────────────────────────────
    if (this.resetTimer > 0) {
      const label = this.resetTimer > 0.6 ? 'POINT!' : 'Ready…';
      ctx.save();
      ctx.globalAlpha  = Math.min(1, this.resetTimer / 0.4);
      ctx.font         = `bold ${32 * S}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ffffff';
      ctx.shadowColor  = '#000000';
      ctx.shadowBlur   = 8 * S;
      ctx.fillText(label, W / 2, H / 2);
      ctx.restore();
    }

    // ── Rally indicator (top-center) ─────────────────────────────────────────
    if (this.rallyCount > 2) {
      ctx.save();
      ctx.font         = `${13 * S}px monospace`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle    = `rgba(255,255,255,${0.4 + 0.3 * Math.sin(this.pulseTime * 6)})`;
      ctx.fillText(`RALLY ×${this.rallyCount}`, W / 2, 78 * S);
      ctx.restore();
    }
  }

  handleInput(type, data) {
    const { x, y, code, key } = data || {};

    if (type === 'keydown') {
      if (code) this.keysDown[code] = true;
      if (key)  this.keysDown[key]  = true;
    }

    if (type === 'keyup') {
      if (code) this.keysDown[code] = false;
      if (key)  this.keysDown[key]  = false;
    }

    if ((type === 'click' || type === 'touchstart') && typeof y === 'number') {
      this.targetY = y;
    }
  }
}

// === INPUT ===

// ── Mouse click — place turret or restart ──
canvas.addEventListener('mousedown', function(e) {
  if (gameOver) { location.reload(); return; }
  const TURRET_COST = 25;
  if (resources < TURRET_COST) return;
  const rect   = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top)  * scaleY;
  resources -= TURRET_COST;
  playerEntities.push({
    id:          entityIdCounter++,
    sprite:      sprite_player_paddle,
    x:           x - 12 * S,
    y:           y - 32 * S,
    width:       24,
    height:      64,
    shootTimer:  0,
    type:        'turret'
  });
});

// ── Touch — place turret or restart ──
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (gameOver) { location.reload(); return; }
  const TURRET_COST = 25;
  if (resources < TURRET_COST) return;
  const rect   = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const touch  = e.touches[0];
  const x = (touch.clientX - rect.left) * scaleX;
  const y = (touch.clientY - rect.top)  * scaleY;
  resources -= TURRET_COST;
  playerEntities.push({
    id:         entityIdCounter++,
    sprite:     sprite_player_paddle,
    x:          x - 12 * S,
    y:          y - 32 * S,
    width:      24,
    height:     64,
    shootTimer: 0,
    type:       'turret'
  });
}, { passive: false });

// ── Touch move — forward swipe to mechanics ──
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (const mech of mechanics) {
    if (typeof mech.onTouchMove === 'function') mech.onTouchMove(e);
    if (typeof mech.handleInput === 'function') mech.handleInput({ type: 'touchmove', event: e });
  }
}, { passive: false });

// ── Touch end — forward tap-end to mechanics ──
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (const mech of mechanics) {
    if (typeof mech.onTouchEnd  === 'function') mech.onTouchEnd(e);
    if (typeof mech.handleInput === 'function') mech.handleInput({ type: 'touchend', event: e });
  }
}, { passive: false });

// ── Keyboard — arrow keys / space forwarded to mechanics; R restarts ──
window.addEventListener('keydown', function(e) {
  if (gameOver) {
    if (e.key === 'r' || e.key === 'R') location.reload();
    return;
  }
  for (const mech of mechanics) {
    if (typeof mech.onKeyDown   === 'function') mech.onKeyDown(e);
    if (typeof mech.handleInput === 'function') mech.handleInput(e);
  }
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
    e.preventDefault();
  }
});


// === GAME LOOP ===
let lastTime = 0;
if (typeof score === 'undefined') var score = 0;
const scoreEl = document.getElementById('score');

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  
// Accumulate timers every frame regardless of gameOver
waveTimer       += dt;
spawnTimer      += dt;
difficultyTimer += dt;

// ── Ramp difficulty every 30 seconds ──
if (!gameOver && difficultyTimer >= 30) {
  difficultyTimer = 0;
  level++;
  spawnInterval  = Math.max(0.8,  spawnInterval  - 0.2);
  enemyBaseSpeed = Math.min(200,  enemyBaseSpeed + 12);
}

// ── Spawn enemy at path start ──
if (!gameOver && spawnTimer >= spawnInterval) {
  spawnTimer = 0;
  const maxHp = 1 + Math.floor(level * 0.5);
  enemyEntities.push({
    id:            entityIdCounter++,
    sprite:        sprite_opponent_paddle,
    x:             path[0].x - 12 * S,
    y:             path[0].y - 32 * S,
    width:         24,
    height:        64,
    waypointIndex: 1,
    speed:         enemyBaseSpeed * S,
    hp:            maxHp,
    maxHp:         maxHp
  });
}

// ── Move enemies along path waypoints ──
if (!gameOver) {
  for (let i = enemyEntities.length - 1; i >= 0; i--) {
    const enemy = enemyEntities[i];
    if (enemy.waypointIndex >= path.length) {
      enemyEntities.splice(i, 1);
      lives = Math.max(0, lives - 1);
      if (lives <= 0) gameOver = true;
      continue;
    }
    const wp   = path[enemy.waypointIndex];
    const cx   = enemy.x + 12 * S;
    const cy   = enemy.y + 32 * S;
    const dx   = wp.x - cx;
    const dy   = wp.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 4 * S) {
      enemy.waypointIndex++;
    } else {
      const step = enemy.speed * dt;
      enemy.x += (dx / dist) * step;
      enemy.y += (dy / dist) * step;
    }
  }
}

// ── Turret targeting and firing ──
const shootCooldown = Math.max(0.35, 1.2 - level * 0.05);
const turretRange   = 160 * S;
const projSpeed     = 220 * S;

if (!gameOver) {
  for (const turret of playerEntities) {
    turret.shootTimer = (turret.shootTimer || 0) + dt;
    if (turret.shootTimer < shootCooldown) continue;

    let nearest     = null;
    let nearestDist = Infinity;
    for (const enemy of enemyEntities) {
      const dx = (enemy.x + 12 * S) - (turret.x + 12 * S);
      const dy = (enemy.y + 32 * S) - (turret.y + 32 * S);
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < turretRange && d < nearestDist) {
        nearestDist = d;
        nearest     = enemy;
      }
    }

    if (nearest) {
      turret.shootTimer = 0;
      const dx = (nearest.x + 12 * S) - (turret.x + 12 * S);
      const dy = (nearest.y + 32 * S) - (turret.y + 32 * S);
      const d  = Math.sqrt(dx * dx + dy * dy);
      projectiles.push({
        id:     entityIdCounter++,
        sprite: sprite_game_ball,
        x:      turret.x + 6 * S,
        y:      turret.y + 26 * S,
        width:  24,
        height: 24,
        vx:     (dx / d) * projSpeed,
        vy:     (dy / d) * projSpeed
      });
    }
  }
}

// ── Move projectiles and resolve enemy hits ──
for (let i = projectiles.length - 1; i >= 0; i--) {
  const proj = projectiles[i];
  proj.x += proj.vx * dt;
  proj.y += proj.vy * dt;

  let hit = false;
  for (let j = enemyEntities.length - 1; j >= 0; j--) {
    const enemy = enemyEntities[j];
    const dx = (proj.x + 12 * S) - (enemy.x + 12 * S);
    const dy = (proj.y + 12 * S) - (enemy.y + 32 * S);
    if (Math.abs(dx) < 18 * S && Math.abs(dy) < 32 * S) {
      enemy.hp--;
      hit = true;
      if (enemy.hp <= 0) {
        score     += 10 * level;
        resources += 5;
        enemyEntities.splice(j, 1);
      }
      break;
    }
  }

  if (hit || proj.x < -60 || proj.x > W + 60 || proj.y < -60 || proj.y > H + 60) {
    projectiles.splice(i, 1);
  }
}

// ── Update each mechanic and drain its event queue ──
for (const mech of mechanics) {
  if (typeof mech.update === 'function') mech.update(dt);
  if (Array.isArray(mech.events) && mech.events.length > 0) {
    for (const evt of mech.events) {
      if (evt.type === 'score')                              score += (evt.value || 10);
      if (evt.type === 'state' && evt.value === 'gameover') gameOver = true;
    }
    mech.events.length = 0;
  }
}


  
// ── Clear canvas ──
ctx.fillStyle = '#111';
ctx.fillRect(0, 0, W, H);

// ── Terrain tile background (sprite_player_paddle) ──
const tileW = 24 * S;
const tileH = 64 * S;
ctx.globalAlpha = 0.10;
for (let row = 0; row * tileH < H + tileH; row++) {
  for (let col = 0; col * tileW < W + tileW; col++) {
    ctx.drawImage(sprite_player_paddle, col * tileW, row * tileH, tileW, tileH);
  }
}
ctx.globalAlpha = 1;

// ── Path (dirt road, two-pass for depth) ──
ctx.save();
ctx.lineCap    = 'round';
ctx.lineJoin   = 'round';
ctx.strokeStyle = '#4a2f0a';
ctx.lineWidth   = 34 * S;
ctx.beginPath();
ctx.moveTo(path[0].x, path[0].y);
for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
ctx.stroke();
ctx.strokeStyle = '#8B5A2B';
ctx.lineWidth   = 22 * S;
ctx.beginPath();
ctx.moveTo(path[0].x, path[0].y);
for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
ctx.stroke();
ctx.restore();

// ── Boundary wall corner decorations (sprite_boundary_wall) ──
const bwSize = 32 * S;
ctx.drawImage(sprite_boundary_wall, 0,          50 * S,     bwSize, bwSize);
ctx.drawImage(sprite_boundary_wall, W - bwSize, 50 * S,     bwSize, bwSize);
ctx.drawImage(sprite_boundary_wall, 0,          H - bwSize, bwSize, bwSize);
ctx.drawImage(sprite_boundary_wall, W - bwSize, H - bwSize, bwSize, bwSize);

// ── Center divider marker (sprite_center_divider) ──
ctx.drawImage(sprite_center_divider, W * 0.5 - 16 * S, H * 0.5 - 16 * S, 32 * S, 32 * S);

// ── Score panel in HUD strip (sprite_score_panel) ──
ctx.drawImage(sprite_score_panel, W * 0.5 - 24 * S, 5 * S, 48 * S, 32 * S);

// ── Prop entities ──
for (const prop of propEntities) {
  ctx.drawImage(prop.sprite, prop.x, prop.y, prop.width * S, prop.height * S);
}

// ── Enemy entities (sprite_opponent_paddle) ──
for (const enemy of enemyEntities) {
  ctx.drawImage(sprite_opponent_paddle, enemy.x, enemy.y, 24 * S, 64 * S);
  // HP bar
  const barW    = 24 * S;
  const hpRatio = enemy.hp / enemy.maxHp;
  ctx.fillStyle = '#222';
  ctx.fillRect(enemy.x, enemy.y - 8 * S, barW, 5 * S);
  ctx.fillStyle = hpRatio > 0.5 ? '#44ee44' : hpRatio > 0.25 ? '#ffaa00' : '#ff3333';
  ctx.fillRect(enemy.x, enemy.y - 8 * S, barW * hpRatio, 5 * S);
}

// ── Player turrets (sprite_player_paddle) ──
for (const turret of playerEntities) {
  ctx.drawImage(sprite_player_paddle, turret.x, turret.y, 24 * S, 64 * S);
  ctx.save();
  ctx.strokeStyle = 'rgba(80, 200, 255, 0.22)';
  ctx.lineWidth   = 1.5 * S;
  ctx.beginPath();
  ctx.arc(turret.x + 12 * S, turret.y + 32 * S, 160 * S, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// ── Projectiles (sprite_game_ball) ──
for (const proj of projectiles) {
  ctx.drawImage(sprite_game_ball, proj.x, proj.y, 24 * S, 24 * S);
}

// ── Mechanic visual overlays ──
for (const mech of mechanics) {
  if (typeof mech.draw === 'function') mech.draw(ctx);
}

// ── HUD bar ──
ctx.fillStyle = 'rgba(0,0,0,0.65)';
ctx.fillRect(0, 0, W, 42 * S);
ctx.font         = `bold ${Math.round(18 * S)}px monospace`;
ctx.textBaseline = 'middle';
ctx.fillStyle    = '#ff6b6b';
ctx.textAlign    = 'left';
ctx.fillText(`\u2665 ${lives}`, 10 * S, 21 * S);
ctx.fillStyle    = '#ffffff';
ctx.textAlign    = 'center';
ctx.fillText(`LVL ${level}  \u2502  Score: ${score}`, W * 0.5, 21 * S);
ctx.fillStyle    = '#ffd700';
ctx.textAlign    = 'right';
ctx.fillText(`\u2605 ${resources}`, W - 10 * S, 21 * S);
ctx.textBaseline = 'alphabetic';
ctx.textAlign    = 'left';

// ── Game Over overlay ──
if (gameOver) {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.78)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4444';
  ctx.font      = `bold ${Math.round(54 * S)}px monospace`;
  ctx.fillText('GAME OVER', W * 0.5, H * 0.40);

  ctx.fillStyle = '#ffd700';
  ctx.font      = `${Math.round(26 * S)}px monospace`;
  ctx.fillText(`Final Score: ${score}`, W * 0.5, H * 0.52);

  ctx.fillStyle = '#cccccc';
  ctx.font      = `${Math.round(18 * S)}px monospace`;
  ctx.fillText('Tap / Click to Restart  \u2022  Press R to Reload', W * 0.5, H * 0.63);

  ctx.textAlign = 'left';
}


  scoreEl.textContent = 'Score: ' + score;
  requestAnimationFrame(gameLoop);
}

// === BOOT ===

// ── Place 3 additional initial prop / terrain entities ──
propEntities.push({
  sprite: sprite_boundary_wall,
  x:      W * 0.05,
  y:      H * 0.30,
  width:  32,
  height: 32,
  type:   'boundary-wall'
});

propEntities.push({
  sprite: sprite_center_divider,
  x:      W * 0.88,
  y:      H * 0.46,
  width:  32,
  height: 32,
  type:   'center-divider'
});

propEntities.push({
  sprite: sprite_score_panel,
  x:      W * 0.08,
  y:      H * 0.78,
  width:  48,
  height: 32,
  type:   'score-panel'
});

// ── Verify path integrity ──
console.assert(
  path.length >= 4,
  '[TowerDefense] Path must have at least 4 waypoints, found: ' + path.length
);

// ── Confirm boot ──
console.log('Game initialized');
console.log('Canvas size:', W, 'x', H, '| Scale factor S:', S);
console.log('Path waypoints:', path.length);
console.log('Mechanics loaded:', mechanics.length, mechanics.map(m => m.constructor ? m.constructor.name : String(m)));
console.log('Starting state — Lives:', lives, '| Level:', level, '| Resources:', resources);

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
