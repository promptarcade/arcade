// === MECHANICS ===

// Entity array normalizer — contract enforcement
function _toEntityArray(arg) {
  if (arg === undefined || arg === null) return [];
  if (Array.isArray(arg)) return arg;
  if (arg && typeof arg === 'object') {
    if (Array.isArray(arg.entities)) return arg.entities;
    if (Array.isArray(arg.sprites)) return arg.sprites;
    return [arg];
  }
  return [];
}
// --- Mechanic: TurretPlacement ---
class TurretPlacement {
  constructor(entities) {
    this.entities = entities;

    // Placement UI state
    this.placementMode = false;
    this.ghostX = W / 2;
    this.ghostY = H / 2;
    this.selectedTurret = null;    // turret entity highlighted for range ring
    this.placementFlash = 0;       // success flash timer
    this.errorFlash    = 0;        // invalid-placement flash timer

    // Resources (placement tokens)
    this.resources = 10;
    this.TURRET_COST = 1;

    // Turret constants (baseline px, multiplied by S at use-time)
    this.TURRET_RANGE      = 120;   // px
    this.TURRET_FIRE_RATE  = 1.5;   // shots / second
    this.TURRET_DAMAGE     = 25;
    this.PROJECTILE_SPEED  = 220;   // px/s

    // Enemy baseline HP
    this.ENEMY_HP_BASE = { 'ant-grunt': 100, 'mosquito-flyer': 60 };

    // Per-entity state maps
    this.turretCooldowns = new Map();   // entity  -> seconds until next shot
    this.enemyHealth     = new Map();   // entity  -> current hp
    this.enemyMaxHealth  = new Map();   // entity  -> max hp

    // Active projectiles
    this.projectiles = [];
    // { x, y, vx, vy, target (entity ref), damage, life }

    // Seed state for entities already present
    this._initEntity(entities);
  }

  /* ─── helpers ─────────────────────────────────────── */

  _initEntity(list) {
    for (const e of list) {
      if (e.type === 'beetle-turret' && !this.turretCooldowns.has(e)) {
        this.turretCooldowns.set(e, 0);
      }
      if ((e.type === 'ant-grunt' || e.type === 'mosquito-flyer') && !this.enemyHealth.has(e)) {
        const hp = this.ENEMY_HP_BASE[e.type] || 80;
        this.enemyHealth.set(e, hp);
        this.enemyMaxHealth.set(e, hp);
      }
    }
  }

  _turrets()  { return this.entities.filter(e => e.type === 'beetle-turret'); }
  _enemies()  { return this.entities.filter(e => e.type === 'ant-grunt' || e.type === 'mosquito-flyer'); }
  _paths()    { return this.entities.filter(e => e.type === 'leaf-path'); }
  _walls()    { return this.entities.filter(e => e.type === 'bark-wall'); }
  _mounds()   { return this.entities.filter(e => e.type === 'dirt-mound'); }

  _ew(e) { return e.width  || 32 * S; }
  _eh(e) { return e.height || 32 * S; }

  _overlapsRect(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  _canPlace(cx, cy) {
    const tw = 32 * S, th = 32 * S;
    const hx = cx - tw / 2, hy = cy - th / 2;
    if (hx < 0 || hy < 0 || hx + tw > W || hy + th > H) return false;
    for (const b of [...this._walls(), ...this._paths(), ...this._mounds(), ...this._turrets()]) {
      if (this._overlapsRect(hx, hy, tw, th, b.x - this._ew(b) / 2, b.y - this._eh(b) / 2, this._ew(b), this._eh(b))) return false;
    }
    return true;
  }

  _roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  /* ─── update ──────────────────────────────────────── */

  update(dt) {
    const events = [];
    const safeDt = Math.min(dt, 0.1);

    // Sync any newly-spawned entities
    this._initEntity(this.entities);

    /* ── 1. Move enemies toward nearest leaf-path node then dirt-mound ── */
    const paths  = this._paths();
    const mounds = this._mounds();
    const SPEED  = { 'ant-grunt': 40 * S, 'mosquito-flyer': 65 * S };

    for (const enemy of this._enemies()) {
      const hp = this.enemyHealth.get(enemy) || 0;
      if (hp <= 0 || enemy.x < -100) continue;

      const speed = SPEED[enemy.type] || 40 * S;

      // Build a simple waypoint list: path nodes sorted by distance, then mound
      let target  = null;
      let minDist = Infinity;

      // Prefer the closest unvisited path segment ahead
      for (const p of paths) {
        const d = Math.hypot(p.x - enemy.x, p.y - enemy.y);
        if (d > 6 * S && d < minDist) { minDist = d; target = p; }
      }
      // Fall back to nearest mound
      for (const m of mounds) {
        const d = Math.hypot(m.x - enemy.x, m.y - enemy.y);
        if (d < minDist) { minDist = d; target = m; }
      }

      if (target) {
        const dx = target.x - enemy.x, dy = target.y - enemy.y;
        const dist = Math.hypot(dx, dy) || 1;
        if (dist > 2 * S) {
          enemy.x += (dx / dist) * speed * safeDt;
          enemy.y += (dy / dist) * speed * safeDt;
        }
      }
    }

    /* ── 2. Turret fire logic ── */
    for (const turret of this._turrets()) {
      let cd = (this.turretCooldowns.get(turret) || 0) - safeDt;
      if (cd < 0) cd = 0;

      if (cd <= 0) {
        const range = this.TURRET_RANGE * S;
        let nearest = null, nearestDist = Infinity;

        for (const enemy of this._enemies()) {
          const hp = this.enemyHealth.get(enemy) || 0;
          if (hp <= 0 || enemy.x < -100) continue;
          const d = Math.hypot(turret.x - enemy.x, turret.y - enemy.y);
          if (d <= range && d < nearestDist) { nearestDist = d; nearest = enemy; }
        }

        if (nearest) {
          const dx = nearest.x - turret.x, dy = nearest.y - turret.y;
          const dist = Math.hypot(dx, dy) || 1;
          const spd  = this.PROJECTILE_SPEED * S;
          this.projectiles.push({
            x: turret.x, y: turret.y,
            vx: (dx / dist) * spd,
            vy: (dy / dist) * spd,
            target: nearest,
            damage: this.TURRET_DAMAGE,
            life: 2.5
          });
          cd = 1 / this.TURRET_FIRE_RATE;
        }
      }

      this.turretCooldowns.set(turret, cd);
    }

    /* ── 3. Advance & resolve projectiles ── */
    const alive = [];
    for (const proj of this.projectiles) {
      proj.x    += proj.vx * safeDt;
      proj.y    += proj.vy * safeDt;
      proj.life -= safeDt;

      if (proj.life <= 0) continue;

      const tgt = proj.target;
      const tgtHp = this.enemyHealth.get(tgt);
      if (tgtHp === undefined || tgtHp <= 0 || tgt.x < -100) continue;

      const hitDist = Math.hypot(proj.x - tgt.x, proj.y - tgt.y);
      if (hitDist < 10 * S) {
        // Impact
        const newHp = Math.max(0, tgtHp - proj.damage);
        this.enemyHealth.set(tgt, newHp);

        if (newHp <= 0) {
          const score = tgt.type === 'mosquito-flyer' ? 15 : 10;
          events.push({ type: 'score', value: score });
          events.push({ type: 'state', key: 'enemyKilled', value: tgt.type });
          tgt.x = -9999; tgt.y = -9999;   // banish off-canvas
        }
        continue;   // projectile consumed
      }

      alive.push(proj);
    }
    this.projectiles = alive;

    /* ── 4. Tick flash timers ── */
    if (this.placementFlash > 0) this.placementFlash -= safeDt;
    if (this.errorFlash    > 0) this.errorFlash    -= safeDt;

    return events;
  }

  /* ─── draw ────────────────────────────────────────── */

  draw(ctx) {
    const tw = 32 * S;

    /* ── dim range rings for every turret ── */
    for (const turret of this._turrets()) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(turret.x, turret.y, this.TURRET_RANGE * S, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100,210,100,0.16)';
      ctx.lineWidth   = 1.5 * S;
      ctx.setLineDash([4 * S, 4 * S]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    /* ── bright range ring for selected / hovered turret ── */
    if (this.selectedTurret) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(this.selectedTurret.x, this.selectedTurret.y, this.TURRET_RANGE * S, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(80,240,100,0.75)';
      ctx.lineWidth   = 2 * S;
      ctx.stroke();
      // HP label
      ctx.fillStyle   = '#cfffcc';
      ctx.font        = `bold ${10 * S}px sans-serif`;
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('Range: ' + Math.round(this.TURRET_RANGE) + 'px',
        this.selectedTurret.x, this.selectedTurret.y - tw / 2 - 4 * S);
      ctx.restore();
    }

    /* ── ghost turret preview ── */
    if (this.placementMode) {
      const valid = this._canPlace(this.ghostX, this.ghostY);
      const hx = this.ghostX - tw / 2, hy = this.ghostY - tw / 2;
      const col = valid ? [60, 220, 80] : [220, 60, 60];

      ctx.save();
      // Range circle
      ctx.beginPath();
      ctx.arc(this.ghostX, this.ghostY, this.TURRET_RANGE * S, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},0.38)`;
      ctx.lineWidth   = 1.5 * S;
      ctx.setLineDash([5 * S, 4 * S]);
      ctx.stroke();
      ctx.setLineDash([]);
      // Ghost body
      this._roundRect(ctx, hx, hy, tw, tw, 5 * S);
      ctx.fillStyle   = `rgba(${col[0]},${col[1]},${col[2]},0.28)`;
      ctx.fill();
      ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},0.85)`;
      ctx.lineWidth   = 2 * S;
      ctx.stroke();
      // Label
      ctx.fillStyle    = valid ? '#82ff9a' : '#ff8282';
      ctx.font         = `bold ${11 * S}px sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(valid ? `Place (-${this.TURRET_COST} token)` : 'Invalid spot',
        this.ghostX, hy - 5 * S);
      ctx.restore();
    }

    /* ── enemy health bars ── */
    for (const enemy of this._enemies()) {
      if (enemy.x < -100) continue;
      const hp    = this.enemyHealth.get(enemy);
      const maxHp = this.enemyMaxHealth.get(enemy);
      if (!hp || !maxHp || hp <= 0) continue;

      const bw = this._ew(enemy);
      const bh = 5 * S;
      const bx = enemy.x - bw / 2;
      const by = enemy.y - this._eh(enemy) / 2 - 9 * S;
      const ratio = Math.max(0, hp / maxHp);

      ctx.save();
      ctx.fillStyle = '#222';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = ratio > 0.5 ? '#44ef60' : ratio > 0.25 ? '#f0c040' : '#ef4444';
      ctx.fillRect(bx, by, bw * ratio, bh);
      ctx.strokeStyle = '#000';
      ctx.lineWidth   = 1;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.restore();
    }

    /* ── projectiles ── */
    for (const proj of this.projectiles) {
      ctx.save();
      // Outer glow
      ctx.beginPath();
      ctx.arc(proj.x, proj.y, 5 * S, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,160,20,0.45)';
      ctx.fill();
      // Core
      ctx.beginPath();
      ctx.arc(proj.x, proj.y, 3.5 * S, 0, Math.PI * 2);
      ctx.fillStyle = '#c8a020';
      ctx.fill();
      // Highlight
      ctx.beginPath();
      ctx.arc(proj.x - 1 * S, proj.y - 1 * S, 1.5 * S, 0, Math.PI * 2);
      ctx.fillStyle = '#fff5a0';
      ctx.fill();
      ctx.restore();
    }

    /* ── HUD: token counter ── */
    ctx.save();
    const hudX = 8 * S, hudY = 8 * S, hudW = 118 * S, hudH = 28 * S;
    this._roundRect(ctx, hudX, hudY, hudW, hudH, 6 * S);
    ctx.fillStyle = 'rgba(15,25,10,0.75)';
    ctx.fill();
    ctx.strokeStyle = '#3a6a3a';
    ctx.lineWidth   = 1.5 * S;
    ctx.stroke();
    ctx.fillStyle    = '#cfffb0';
    ctx.font         = `bold ${12 * S}px sans-serif`;
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('\uD83E\uDEB2 Tokens: ' + this.resources, hudX + 8 * S, hudY + 14 * S);
    ctx.restore();

    /* ── HUD: placement toggle button ── */
    ctx.save();
    const btnW = 100 * S, btnH = 28 * S;
    const btnX = W - btnW - 8 * S, btnY = 8 * S;
    this._roundRect(ctx, btnX, btnY, btnW, btnH, 6 * S);
    ctx.fillStyle   = this.placementMode ? 'rgba(40,160,50,0.88)' : 'rgba(25,55,25,0.78)';
    ctx.fill();
    ctx.strokeStyle = this.placementMode ? '#7eff8a' : '#3a6a3a';
    ctx.lineWidth   = 1.5 * S;
    ctx.stroke();
    ctx.fillStyle    = '#e8ffcc';
    ctx.font         = `bold ${11 * S}px sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.placementMode ? '\u2715 Cancel  [P]' : '\uFF0B Place  [P]',
      btnX + btnW / 2, btnY + btnH / 2);
    ctx.restore();

    /* ── full-screen flash overlays ── */
    if (this.placementFlash > 0) {
      const a = Math.min(1, this.placementFlash / 0.35) * 0.2;
      ctx.save();
      ctx.fillStyle = `rgba(60,230,80,${a})`;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
    if (this.errorFlash > 0) {
      const a = Math.min(1, this.errorFlash / 0.25) * 0.2;
      ctx.save();
      ctx.fillStyle = `rgba(230,50,50,${a})`;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }

  /* ─── handleInput ─────────────────────────────────── */

  handleInput(type, data) {
    /* ── pointer tracking for ghost preview ── */
    if (type === 'mousemove' || type === 'pointermove') {
      this.ghostX = data.x;
      this.ghostY = data.y;
      // Hover-select nearest turret
      this.selectedTurret = null;
      for (const t of this._turrets()) {
        if (Math.hypot(t.x - data.x, t.y - data.y) < this._ew(t) / 2 + 5 * S) {
          this.selectedTurret = t;
          break;
        }
      }
      return;
    }

    /* ── keyboard: P toggles placement mode ── */
    if (type === 'keydown') {
      const k = (data.key || '').toLowerCase();
      if (k === 'p' || data.code === 'KeyP') {
        this.placementMode = !this.placementMode;
      }
      return;
    }

    /* ── click / touch ── */
    if (type === 'click' || type === 'touchstart') {
      const x = data.x, y = data.y;

      // Update ghost position from touch/click coordinates
      this.ghostX = x;
      this.ghostY = y;

      // Hit-test the placement toggle button
      const btnW = 100 * S, btnH = 28 * S;
      const btnX = W - btnW - 8 * S, btnY = 8 * S;
      if (x >= btnX && x <= btnX + btnW && y >= btnY && y <= btnY + btnH) {
        this.placementMode = !this.placementMode;
        return;
      }

      if (this.placementMode) {
        /* ─ Try to place a turret ─ */
        if (this.resources >= this.TURRET_COST && this._canPlace(x, y)) {
          const tw = 32 * S;
          const newTurret = {
            name:   'beetle-turret-' + Date.now(),
            type:   'beetle-turret',
            x, y,
            width:  tw,
            height: tw,
            sprite: null
          };
          this.entities.push(newTurret);
          this.turretCooldowns.set(newTurret, 0);
          this.resources -= this.TURRET_COST;
          this.placementFlash = 0.45;
          if (this.resources <= 0) this.placementMode = false;
        } else {
          this.errorFlash = 0.3;
        }
      } else {
        /* ─ Select turret for range display ─ */
        this.selectedTurret = null;
        for (const t of this._turrets()) {
          if (Math.hypot(t.x - x, t.y - y) < this._ew(t) / 2 + 6 * S) {
            this.selectedTurret = t;
            break;
          }
        }
      }
    }
  }
}


// --- Mechanic: WaveSpawner ---
class WaveSpawner {
  constructor(entities) {
    this.entities = entities;

    this.waveNumber = 0;
    this.waveTimer = 5;
    this.betweenWaves = true;
    this.lives = 20;

    this.spawnQueue = [];
    this.spawnTimer = 0;
    this.spawnInterval = 1.2;

    this.enemies = [];
    this.projectiles = [];
    this.turretCooldowns = new Map();
    this.turrets = [];
    this.particles = [];
    this.waypoints = [];

    this.selectedEntity = null;
    this.announceTimer = 0;
    this.announceText = '';

    this._initialize();
  }

  _initialize() {
    this.waypoints = this.entities
      .filter(e => e.type === 'flower-node')
      .sort((a, b) => a.x - b.x)
      .map(e => ({ x: e.x + (e.width || 32 * S) / 2, y: e.y + (e.height || 32 * S) / 2 }));

    if (this.waypoints.length === 0) {
      this.waypoints = [
        { x: 0,        y: H * 0.5 },
        { x: W * 0.2,  y: H * 0.5 },
        { x: W * 0.4,  y: H * 0.3 },
        { x: W * 0.6,  y: H * 0.65 },
        { x: W * 0.8,  y: H * 0.4 },
        { x: W,        y: H * 0.5 }
      ];
    }

    const beetles = this.entities.filter(e => e.type === 'beetle-turret');
    const stools  = this.entities.filter(e => e.type === 'mushroom-stool');

    for (const t of beetles) {
      t._range    = 130 * S;
      t._damage   = 18;
      t._fireRate = 1.5;
      this.turrets.push(t);
      this.turretCooldowns.set(t, Math.random());
    }
    for (const t of stools) {
      t._range    = 95 * S;
      t._damage   = 9;
      t._fireRate = 0.75;
      this.turrets.push(t);
      this.turretCooldowns.set(t, Math.random());
    }
  }

  _buildWave(waveNum) {
    const queue = [];
    const antCount = 3 + waveNum * 2;
    const flyCount = Math.max(0, waveNum - 1);
    for (let i = 0; i < antCount; i++)
      queue.push({ type: 'ant-grunt',      hp: 40 + waveNum * 15, speed: (38 + waveNum * 5) * S });
    for (let i = 0; i < flyCount; i++)
      queue.push({ type: 'mosquito-flyer', hp: 25 + waveNum * 10, speed: (62 + waveNum * 8) * S });
    for (let i = queue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [queue[i], queue[j]] = [queue[j], queue[i]];
    }
    return queue;
  }

  _spawnEnemy(spec) {
    const start   = this.waypoints[0];
    const isFlyer = spec.type === 'mosquito-flyer';
    const w       = (isFlyer ? 24 : 28) * S;
    const h       = (isFlyer ? 20 : 26) * S;

    let entity = this.entities.find(
      e => e.type === spec.type && !this.enemies.some(en => en.entity === e)
    );

    if (!entity) {
      entity = {
        name: spec.type + '_virt_' + Date.now() + Math.random(),
        x: start.x, y: start.y,
        width: w, height: h,
        type: spec.type, sprite: null, _virtual: true
      };
      this.entities.push(entity);
    }

    entity.x = start.x;
    entity.y = isFlyer ? start.y - 28 * S : start.y;

    this.enemies.push({
      entity, hp: spec.hp, maxHp: spec.hp,
      speed: spec.speed, waypointIdx: 1,
      type: spec.type, dead: false,
      isFlyer, wobble: Math.random() * Math.PI * 2
    });
  }

  _fireProjectile(turret, target) {
    const cx = turret.x + (turret.width  || 32 * S) / 2;
    const cy = turret.y + (turret.height || 32 * S) / 2;
    this.projectiles.push({
      x: cx, y: cy, target,
      speed: 210 * S,
      damage: turret._damage || 15,
      life: 3.5, trail: []
    });
  }

  _spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = (25 + Math.random() * 65) * S;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 0.35 + Math.random() * 0.45,
        maxLife: 0.8, color,
        r: (2.5 + Math.random() * 4) * S
      });
    }
  }

  _removeVirtual(entity) {
    if (entity._virtual) {
      const idx = this.entities.indexOf(entity);
      if (idx !== -1) this.entities.splice(idx, 1);
    }
  }

  update(dt) {
    const events = [];
    dt = Math.min(dt, 0.1);

    // ── Wave countdown ──────────────────────────────────────────────────────
    if (this.betweenWaves) {
      this.waveTimer -= dt;
      if (this.waveTimer <= 0) {
        this.waveNumber++;
        this.spawnQueue    = this._buildWave(this.waveNumber);
        this.spawnTimer    = 0;
        this.betweenWaves  = false;
        this.announceText  = `Wave ${this.waveNumber}!`;
        this.announceTimer = 2.2;
        events.push({ type: 'state', key: 'wave', value: this.waveNumber });
      }
    }

    // ── Spawn from queue ────────────────────────────────────────────────────
    if (!this.betweenWaves && this.spawnQueue.length > 0) {
      this.spawnTimer -= dt;
      if (this.spawnTimer <= 0) {
        this._spawnEnemy(this.spawnQueue.shift());
        this.spawnTimer = this.spawnInterval;
      }
    }

    // ── Wave complete check ─────────────────────────────────────────────────
    if (!this.betweenWaves && this.spawnQueue.length === 0 && this.enemies.length === 0) {
      this.betweenWaves = true;
      this.waveTimer    = 8;
      events.push({ type: 'state', key: 'waveComplete', value: this.waveNumber });
      events.push({ type: 'score', value: 50 + this.waveNumber * 25 });
    }

    // ── Move enemies along waypoints ────────────────────────────────────────
    for (let i = this.enemies.length - 1; i >= 0; i--) {
      const en = this.enemies[i];
      if (en.dead) { this.enemies.splice(i, 1); continue; }

      if (en.waypointIdx >= this.waypoints.length) {
        this.lives = Math.max(0, this.lives - 1);
        en.dead = true;
        this._spawnParticles(en.entity.x, en.entity.y, '#ff4455', 8);
        this._removeVirtual(en.entity);
        this.enemies.splice(i, 1);
        events.push({ type: 'state', key: 'lives', value: this.lives });
        events.push({ type: 'score', value: -10 });
        if (this.lives <= 0) events.push({ type: 'state', key: 'gameOver', value: true });
        continue;
      }

      const wp = this.waypoints[en.waypointIdx];
      en.wobble += dt * 3.2;
      const wobbleY = en.isFlyer ? Math.sin(en.wobble) * 6 * S : 0;
      const targetY = en.isFlyer ? wp.y - 28 * S : wp.y;
      const dx   = wp.x - en.entity.x;
      const dy   = (targetY + wobbleY) - en.entity.y;
      const dist = Math.hypot(dx, dy);

      if (dist < 5 * S) {
        en.waypointIdx++;
      } else {
        en.entity.x += (dx / dist) * en.speed * dt;
        en.entity.y += (dy / dist) * en.speed * dt;
      }
    }

    // ── Turret targeting ────────────────────────────────────────────────────
    for (const turret of this.turrets) {
      if (!this.turretCooldowns.has(turret)) {
        turret._range = 120 * S; turret._damage = 15; turret._fireRate = 1.2;
        this.turretCooldowns.set(turret, 0);
      }
      const cd = (this.turretCooldowns.get(turret) || 0) - dt;
      this.turretCooldowns.set(turret, cd);
      if (cd > 0) continue;

      const tx = turret.x + (turret.width  || 32 * S) / 2;
      const ty = turret.y + (turret.height || 32 * S) / 2;
      let closest = null, closestDist = Infinity;

      for (const en of this.enemies) {
        if (en.dead) continue;
        const ex = en.entity.x + (en.entity.width  || 28 * S) / 2;
        const ey = en.entity.y + (en.entity.height || 26 * S) / 2;
        const d  = Math.hypot(tx - ex, ty - ey);
        if (d <= turret._range && d < closestDist) { closestDist = d; closest = en; }
      }

      if (closest) {
        this._fireProjectile(turret, closest);
        this.turretCooldowns.set(turret, 1 / (turret._fireRate || 1.2));
      }
    }

    // ── Move projectiles ────────────────────────────────────────────────────
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      const p = this.projectiles[i];
      p.life -= dt;
      if (p.life <= 0 || !p.target || p.target.dead) { this.projectiles.splice(i, 1); continue; }

      const ex   = p.target.entity.x + (p.target.entity.width  || 28 * S) / 2;
      const ey   = p.target.entity.y + (p.target.entity.height || 26 * S) / 2;
      const dx   = ex - p.x;
      const dy   = ey - p.y;
      const dist = Math.hypot(dx, dy);

      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 6) p.trail.shift();

      if (dist < 7 * S) {
        p.target.hp -= p.damage;
        this._spawnParticles(ex, ey, '#aada55', 4);
        if (p.target.hp <= 0) {
          p.target.dead = true;
          this._spawnParticles(ex, ey, '#ffaa22', 12);
          this._removeVirtual(p.target.entity);
          events.push({ type: 'score', value: 10 + this.waveNumber * 5 });
        }
        this.projectiles.splice(i, 1);
        continue;
      }

      const mv = p.speed * dt / dist;
      p.x += dx * mv;
      p.y += dy * mv;
    }

    // ── Particles ───────────────────────────────────────────────────────────
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const pt = this.particles[i];
      pt.life -= dt;
      if (pt.life <= 0) { this.particles.splice(i, 1); continue; }
      pt.x  += pt.vx * dt;
      pt.y  += pt.vy * dt;
      pt.vy += 90 * S * dt;
    }

    if (this.announceTimer > 0) this.announceTimer -= dt;

    return events;
  }

  draw(ctx) {
    // ── Waypoint path ───────────────────────────────────────────────────────
    if (this.waypoints.length >= 2) {
      ctx.save();
      ctx.setLineDash([7 * S, 9 * S]);
      ctx.strokeStyle = 'rgba(139,90,43,0.32)';
      ctx.lineWidth   = 3 * S;
      ctx.beginPath();
      ctx.moveTo(this.waypoints[0].x, this.waypoints[0].y);
      for (let i = 1; i < this.waypoints.length; i++)
        ctx.lineTo(this.waypoints[i].x, this.waypoints[i].y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      // Waypoint dots
      ctx.save();
      for (const wp of this.waypoints) {
        ctx.beginPath();
        ctx.arc(wp.x, wp.y, 5 * S, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,220,80,0.45)';
        ctx.fill();
      }
      ctx.restore();
    }

    // ── Turret range rings (selected) ───────────────────────────────────────
    for (const turret of this.turrets) {
      if (turret !== this.selectedEntity) continue;
      const tx = turret.x + (turret.width  || 32 * S) / 2;
      const ty = turret.y + (turret.height || 32 * S) / 2;
      ctx.save();
      ctx.beginPath();
      ctx.arc(tx, ty, turret._range || 120 * S, 0, Math.PI * 2);
      ctx.setLineDash([5 * S, 5 * S]);
      ctx.strokeStyle = 'rgba(80,220,130,0.75)';
      ctx.lineWidth   = 2 * S;
      ctx.stroke();
      ctx.fillStyle   = 'rgba(80,220,130,0.07)';
      ctx.fill();
      ctx.setLineDash([]);
      ctx.restore();
    }

    // ── Projectile trails & bodies ──────────────────────────────────────────
    for (const p of this.projectiles) {
      ctx.save();
      if (p.trail.length >= 2) {
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let i = 1; i < p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = 'rgba(180,110,35,0.5)';
        ctx.lineWidth   = 2 * S;
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5 * S, 0, Math.PI * 2);
      ctx.fillStyle = '#7B3A10';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x - 1.5 * S, p.y - 1.5 * S, 2 * S, 0, Math.PI * 2);
      ctx.fillStyle = '#c8763a';
      ctx.fill();
      ctx.restore();
    }

    // ── Enemy health bars ───────────────────────────────────────────────────
    for (const en of this.enemies) {
      if (en.dead) continue;
      const ex      = en.entity.x;
      const ey      = en.entity.y;
      const ew      = en.entity.width  || 28 * S;
      const hpRatio = Math.max(0, en.hp / en.maxHp);
      const barH    = 5 * S;
      const barY    = ey - 11 * S;

      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(ex, barY, ew, barH);

      const hpColor = hpRatio > 0.6 ? '#44dd55' : hpRatio > 0.3 ? '#ddcc00' : '#ee3333';
      ctx.fillStyle = hpColor;
      ctx.fillRect(ex, barY, ew * hpRatio, barH);

      ctx.strokeStyle = 'rgba(0,0,0,0.7)';
      ctx.lineWidth   = 1;
      ctx.strokeRect(ex, barY, ew, barH);

      // Waypoint progress pip
      const progress = (en.waypointIdx - 1) / Math.max(1, this.waypoints.length - 1);
      ctx.save();
      ctx.font      = `${8 * S}px sans-serif`;
      ctx.fillStyle = en.isFlyer ? '#aaeeff' : '#ffd08a';
      ctx.textAlign = 'center';
      ctx.fillText(en.isFlyer ? '✈' : '🐜', ex + ew / 2, ey - 14 * S);
      ctx.restore();

      // Thin progress bar below hp bar
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(ex, barY + barH + 1, ew, 2 * S);
      ctx.fillStyle = 'rgba(255,200,80,0.6)';
      ctx.fillRect(ex, barY + barH + 1, ew * progress, 2 * S);
    }

    // ── Particles ───────────────────────────────────────────────────────────
    for (const pt of this.particles) {
      const alpha = Math.max(0, pt.life / pt.maxLife);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r * (0.4 + alpha * 0.6), 0, Math.PI * 2);
      ctx.fillStyle = pt.color;
      ctx.fill();
      ctx.restore();
    }

    // ── HUD panel ───────────────────────────────────────────────────────────
    ctx.save();
    ctx.fillStyle = 'rgba(10,20,10,0.6)';
    ctx.beginPath();
    ctx.roundRect(8 * S, 8 * S, 162 * S, 52 * S, 6 * S);
    ctx.fill();

    ctx.font      = `bold ${13 * S}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffe066';
    ctx.fillText(`Wave: ${this.waveNumber}`, 16 * S, 28 * S);
    ctx.fillStyle = this.lives > 5 ? '#88ff88' : '#ff6666';
    ctx.fillText(`Lives: ${'♥'.repeat(Math.min(this.lives, 10))}${this.lives > 10 ? ` (${this.lives})` : ''}`, 16 * S, 48 * S);
    ctx.restore();

    // ── Spawn progress bar ──────────────────────────────────────────────────
    if (!this.betweenWaves && this.spawnQueue.length > 0) {
      const total    = (3 + this.waveNumber * 2) + Math.max(0, this.waveNumber - 1);
      const spawned  = total - this.spawnQueue.length;
      const progress = spawned / total;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(W - 92 * S, 10 * S, 82 * S, 13 * S);
      ctx.fillStyle = '#5599ff';
      ctx.fillRect(W - 92 * S, 10 * S, 82 * S * progress, 13 * S);
      ctx.strokeStyle = 'rgba(200,220,255,0.4)';
      ctx.lineWidth   = 1;
      ctx.strokeRect(W - 92 * S, 10 * S, 82 * S, 13 * S);
      ctx.fillStyle   = '#ffffff';
      ctx.font        = `${9 * S}px sans-serif`;
      ctx.textAlign   = 'center';
      ctx.fillText(`Spawning ${spawned}/${total}`, W - 51 * S, 30 * S);
      ctx.restore();
    }

    // ── Between-wave countdown ──────────────────────────────────────────────
    if (this.betweenWaves && this.waveTimer > 0) {
      const secs = Math.ceil(this.waveTimer);
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath();
      ctx.roundRect(W / 2 - 95 * S, H - 44 * S, 190 * S, 30 * S, 6 * S);
      ctx.fill();
      ctx.font      = `bold ${12 * S}px sans-serif`;
      ctx.fillStyle = '#aaffaa';
      ctx.textAlign = 'center';
      ctx.fillText(`Next wave in: ${secs}s  (press N to rush)`, W / 2, H - 24 * S);
      ctx.restore();
    }

    // ── Wave announcement banner ────────────────────────────────────────────
    if (this.announceTimer > 0) {
      const alpha   = Math.min(1, this.announceTimer);
      const eased   = 1 - Math.min(1, this.announceTimer / 1.8);
      const scale   = 1 + eased * 0.25;
      const fontSize = Math.round(38 * S * scale);
      ctx.save();
      ctx.globalAlpha    = alpha;
      ctx.textAlign      = 'center';
      ctx.textBaseline   = 'middle';
      ctx.font           = `bold ${fontSize}px sans-serif`;
      ctx.fillStyle      = 'rgba(0,0,0,0.55)';
      ctx.fillText(this.announceText, W / 2 + 3 * S, H / 2 + 3 * S);
      const grad = ctx.createLinearGradient(W / 2 - 100 * S, 0, W / 2 + 100 * S, 0);
      grad.addColorStop(0, '#ffee44');
      grad.addColorStop(1, '#ff8800');
      ctx.fillStyle = grad;
      ctx.fillText(this.announceText, W / 2, H / 2);
      ctx.restore();
    }
  }

  handleInput(type, data) {
    if (type === 'click' || type === 'touchstart') {
      const { x, y } = data;
      let hit = null;
      for (const turret of this.turrets) {
        const cx = turret.x + (turret.width  || 32 * S) / 2;
        const cy = turret.y + (turret.height || 32 * S) / 2;
        const hw = (turret.width  || 32 * S) / 2 + 5 * S;
        const hh = (turret.height || 32 * S) / 2 + 5 * S;
        if (Math.abs(x - cx) < hw && Math.abs(y - cy) < hh) { hit = turret; break; }
      }
      this.selectedEntity = (hit && hit !== this.selectedEntity) ? hit : null;
    }

    if (type === 'keydown') {
      if ((data.key === 'n' || data.key === 'N') && this.betweenWaves && this.waveTimer > 1)
        this.waveTimer = 0.8;
      if (data.code === 'Escape')
        this.selectedEntity = null;
    }
  }
}


// --- Mechanic: ResourceManagement ---
class ResourceManagement {
  constructor(entities) {
    this.entities = entities;
    this.resources = 50;
    this.resourceCap = 999;
    this.selectedEntity = null;
    this.projectiles = [];
    this.floatingTexts = [];
    this.resourceFlash = 0;
    this._entityState = new Map();
    for (const e of entities) this._initEntity(e);
  }

  _initEntity(e) {
    const s = { alive: true };
    switch (e.type) {
      case 'flower-node':
        s.hp = 60; s.maxHp = 60; s.genRate = 8; s.genTimer = 0; s.pulsePhase = Math.random() * Math.PI * 2; break;
      case 'dirt-mound':
        s.hp = 100; s.maxHp = 100; s.genRate = 4; s.genTimer = 0; break;
      case 'beetle-turret':
        s.hp = 80; s.maxHp = 80; s.range = 130 * S; s.attackTimer = 0; s.attackRate = 1.5; s.damage = 20; s.angle = 0; break;
      case 'ant-grunt':
        s.hp = 40; s.maxHp = 40; s.speed = 60 * S; s.state = 'seeking'; s.carrying = 0; s.carryMax = 10; s.moveTimer = 0; s.wanderAngle = Math.random() * Math.PI * 2; break;
      case 'mosquito-flyer':
        s.hp = 30; s.maxHp = 30; s.speed = 80 * S; s.attackTimer = 0; s.damage = 10; s.angle = Math.random() * Math.PI * 2; s.wobble = Math.random() * Math.PI * 2; break;
      case 'bark-wall':
        s.hp = 150; s.maxHp = 150; break;
      case 'mushroom-stool':
        s.hp = 50; s.maxHp = 50; s.healRate = 5; s.healRange = 110 * S; s.healTimer = 0; s.pulsePhase = Math.random() * Math.PI * 2; break;
      case 'leaf-path':
        s.throughput = 0; break;
      case 'acorn-shot':
        s.speed = 200 * S; s.damage = 20; break;
    }
    this._entityState.set(e, s);
  }

  _gs(e) {
    if (!this._entityState.has(e)) this._initEntity(e);
    return this._entityState.get(e);
  }

  _float(x, y, text, life, color) {
    this.floatingTexts.push({ x, y, text, life, maxLife: life, color });
  }

  update(dt) {
    const emitted = [];
    this.resourceFlash = Math.max(0, this.resourceFlash - dt);
    this.floatingTexts.forEach(t => { t.life -= dt; });
    this.floatingTexts = this.floatingTexts.filter(t => t.life > 0);

    const byType = (type) => this.entities.filter(e => e.type === type);
    const flowerNodes  = byType('flower-node');
    const dirtMounds   = byType('dirt-mound');
    const beetles      = byType('beetle-turret');
    const ants         = byType('ant-grunt');
    const mosquitoes   = byType('mosquito-flyer');
    const walls        = byType('bark-wall');
    const mushrooms    = byType('mushroom-stool');

    // 1. Flower-nodes generate resources quickly
    for (const fn of flowerNodes) {
      const s = this._gs(fn);
      if (!s.alive) continue;
      s.pulsePhase += dt * 2.2;
      s.genTimer += dt;
      if (s.genTimer >= 1) {
        const gained = Math.floor(s.genRate * s.genTimer);
        this.resources = Math.min(this.resourceCap, this.resources + gained);
        s.genTimer = 0;
        this._float(fn.x, fn.y - (fn.height || 32 * S) / 2, `+${gained}`, 1.2, '#ffe066');
        this.resourceFlash = 0.3;
        emitted.push({ type: 'state', key: 'resources', value: this.resources });
      }
    }

    // 2. Dirt-mounds generate resources slowly
    for (const dm of dirtMounds) {
      const s = this._gs(dm);
      if (!s.alive) continue;
      s.genTimer += dt;
      if (s.genTimer >= 2) {
        const gained = Math.floor(s.genRate * s.genTimer);
        this.resources = Math.min(this.resourceCap, this.resources + gained);
        s.genTimer = 0;
        this._float(dm.x, dm.y - (dm.height || 32 * S) / 2, `+${gained}`, 1.2, '#c8a870');
        emitted.push({ type: 'state', key: 'resources', value: this.resources });
      }
    }

    // 3. Ant-grunts seek dirt-mounds, harvest, then return to nearest mushroom-stool
    for (const ant of ants) {
      const s = this._gs(ant);
      if (!s.alive) continue;
      const hw = (ant.width  || 24 * S) / 2;
      const hh = (ant.height || 24 * S) / 2;

      if (s.state === 'seeking') {
        const targets = dirtMounds.filter(d => this._gs(d).alive);
        if (targets.length > 0) {
          const nearest = targets.reduce((a, b) =>
            Math.hypot(ant.x - a.x, ant.y - a.y) <= Math.hypot(ant.x - b.x, ant.y - b.y) ? a : b);
          const dist = Math.hypot(nearest.x - ant.x, nearest.y - ant.y);
          if (dist < 18 * S) {
            s.carrying = s.carryMax;
            s.state = 'returning';
            this._float(ant.x, ant.y - hh - 4 * S, 'Harvested!', 0.9, '#a0d080');
          } else {
            ant.x += ((nearest.x - ant.x) / dist) * s.speed * dt;
            ant.y += ((nearest.y - ant.y) / dist) * s.speed * dt;
          }
        } else {
          s.moveTimer -= dt;
          if (s.moveTimer <= 0) {
            s.wanderAngle += (Math.random() - 0.5) * Math.PI;
            s.moveTimer = 1 + Math.random();
          }
          ant.x += Math.cos(s.wanderAngle) * s.speed * 0.3 * dt;
          ant.y += Math.sin(s.wanderAngle) * s.speed * 0.3 * dt;
          ant.x = Math.max(hw, Math.min(W - hw, ant.x));
          ant.y = Math.max(hh, Math.min(H - hh, ant.y));
        }
      } else if (s.state === 'returning') {
        const base = mushrooms.filter(m => this._gs(m).alive)[0] || { x: W / 2, y: H / 2 };
        const dist = Math.hypot(base.x - ant.x, base.y - ant.y);
        if (dist < 18 * S) {
          const bonus = s.carrying * 2;
          this.resources = Math.min(this.resourceCap, this.resources + bonus);
          s.carrying = 0;
          s.state = 'seeking';
          this.resourceFlash = 0.5;
          this._float(ant.x, ant.y - hh - 4 * S, `+${bonus}`, 1.3, '#ffffff');
          emitted.push({ type: 'score', value: bonus });
          emitted.push({ type: 'state', key: 'resources', value: this.resources });
        } else {
          ant.x += ((base.x - ant.x) / dist) * s.speed * dt;
          ant.y += ((base.y - ant.y) / dist) * s.speed * dt;
        }
      }
    }

    // 4. Mosquito-flyers move toward and attack bark-walls or beetle-turrets
    for (const mosq of mosquitoes) {
      const s = this._gs(mosq);
      if (!s.alive) continue;
      s.wobble += dt * 3;

      const potTargets = [...walls, ...beetles].filter(t => this._gs(t).alive);
      if (potTargets.length > 0) {
        const nearest = potTargets.reduce((a, b) =>
          Math.hypot(mosq.x - a.x, mosq.y - a.y) <= Math.hypot(mosq.x - b.x, mosq.y - b.y) ? a : b);
        const dist = Math.hypot(nearest.x - mosq.x, nearest.y - mosq.y);
        s.angle = Math.atan2(nearest.y - mosq.y, nearest.x - mosq.x);
        if (dist < 18 * S) {
          s.attackTimer += dt;
          if (s.attackTimer >= 1) {
            s.attackTimer = 0;
            const ts = this._gs(nearest);
            ts.hp = Math.max(0, ts.hp - s.damage);
            this._float(nearest.x, nearest.y - (nearest.height || 32 * S) / 2, `-${s.damage}`, 0.8, '#ff4444');
            if (ts.hp <= 0) {
              ts.alive = false;
              emitted.push({ type: 'state', key: 'structureDestroyed', value: nearest.type });
            }
          }
        } else {
          const wx = Math.cos(s.wobble) * 12 * S;
          const wy = Math.sin(s.wobble * 1.4) * 8 * S;
          mosq.x += (Math.cos(s.angle) * s.speed + wx * 0.4) * dt;
          mosq.y += (Math.sin(s.angle) * s.speed + wy * 0.4) * dt;
        }
      } else {
        mosq.x += Math.cos(s.angle + Math.cos(s.wobble) * 0.5) * s.speed * 0.4 * dt;
        mosq.y += Math.sin(s.angle + Math.sin(s.wobble * 0.9) * 0.5) * s.speed * 0.4 * dt;
        if (mosq.x < 0 || mosq.x > W) s.angle = Math.PI - s.angle;
        if (mosq.y < 0 || mosq.y > H) s.angle = -s.angle;
        mosq.x = Math.max(0, Math.min(W, mosq.x));
        mosq.y = Math.max(0, Math.min(H, mosq.y));
      }
    }

    // 5. Beetle-turrets aim at and fire acorn-shots at mosquito-flyers in range
    const liveMosqs = mosquitoes.filter(m => this._gs(m).alive);
    for (const beetle of beetles) {
      const s = this._gs(beetle);
      if (!s.alive) continue;
      s.attackTimer += dt;
      const inRange = liveMosqs.filter(m => Math.hypot(beetle.x - m.x, beetle.y - m.y) <= s.range);
      if (inRange.length > 0) {
        const tgt = inRange.reduce((a, b) =>
          Math.hypot(beetle.x - a.x, beetle.y - a.y) <= Math.hypot(beetle.x - b.x, beetle.y - b.y) ? a : b);
        s.angle = Math.atan2(tgt.y - beetle.y, tgt.x - beetle.x);
        if (s.attackTimer >= 1 / s.attackRate) {
          s.attackTimer = 0;
          this.projectiles.push({ x: beetle.x, y: beetle.y, target: tgt, speed: 220 * S, damage: s.damage, life: 3 });
        }
      }
    }

    // 6. Move projectiles, resolve hits
    this.projectiles = this.projectiles.filter(p => {
      p.life -= dt;
      if (p.life <= 0) return false;
      const ts = this._gs(p.target);
      if (!ts || !ts.alive) return false;
      const dist = Math.hypot(p.target.x - p.x, p.target.y - p.y);
      if (dist < 8 * S) {
        ts.hp = Math.max(0, ts.hp - p.damage);
        this._float(p.target.x, p.target.y - (p.target.height || 32 * S) / 2, `-${p.damage}`, 0.7, '#ff8800');
        if (ts.hp <= 0) {
          ts.alive = false;
          this.resources = Math.min(this.resourceCap, this.resources + 15);
          this.resourceFlash = 0.5;
          this._float(p.target.x, p.target.y, '+25 🏆', 1.6, '#ffff44');
          emitted.push({ type: 'score', value: 25 });
          emitted.push({ type: 'state', key: 'resources', value: this.resources });
        }
        return false;
      }
      p.x += ((p.target.x - p.x) / dist) * p.speed * dt;
      p.y += ((p.target.y - p.y) / dist) * p.speed * dt;
      return true;
    });

    // 7. Mushroom-stools heal nearby bark-walls and beetle-turrets
    for (const mush of mushrooms) {
      const s = this._gs(mush);
      if (!s.alive) continue;
      s.pulsePhase += dt * 1.6;
      s.healTimer += dt;
      if (s.healTimer >= 1) {
        s.healTimer = 0;
        const healTargets = [...walls, ...beetles].filter(t => {
          const ts = this._gs(t);
          return ts.alive && ts.hp < ts.maxHp && Math.hypot(mush.x - t.x, mush.y - t.y) <= s.healRange;
        });
        for (const ht of healTargets) {
          const ts = this._gs(ht);
          const healed = Math.min(s.healRate, ts.maxHp - ts.hp);
          if (healed > 0) {
            ts.hp += healed;
            this._float(ht.x, ht.y - (ht.height || 32 * S) / 2, `+${healed}`, 0.8, '#80ff80');
          }
        }
      }
    }

    return emitted;
  }

  draw(ctx) {
    const now = performance.now() / 1000;

    // --- Resource HUD ---
    const barX = 12 * S, barY = 12 * S, barW = 170 * S, barH = 30 * S, r = 7 * S;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, r); ctx.fill();
    if (this.resourceFlash > 0) {
      const fa = this.resourceFlash * Math.abs(Math.sin(now * 18));
      ctx.fillStyle = `rgba(255,220,50,${fa * 0.45})`;
      ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, r); ctx.fill();
    }
    ctx.fillStyle = '#ffe066';
    ctx.font = `bold ${Math.round(14 * S)}px monospace`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(`\uD83C\uDF30 ${Math.floor(this.resources)} / ${this.resourceCap}`, barX + 9 * S, barY + barH / 2);
    ctx.restore();

    // --- Health bars ---
    for (const [e, s] of this._entityState) {
      if (!s.alive || s.maxHp === undefined) continue;
      const bw = (e.width  || 32 * S) * 0.9;
      const bh = 5 * S;
      const bx = e.x - bw / 2;
      const by = e.y - (e.height || 32 * S) / 2 - 9 * S;
      const pct = Math.max(0, s.hp / s.maxHp);
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = pct > 0.6 ? '#44ee44' : pct > 0.3 ? '#ffaa00' : '#ff3333';
      ctx.fillRect(bx, by, bw * pct, bh);
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.restore();
    }

    // --- Selected beetle-turret range ring ---
    if (this.selectedEntity && this.selectedEntity.type === 'beetle-turret') {
      const e = this.selectedEntity;
      const s = this._gs(e);
      ctx.save();
      ctx.beginPath();
      ctx.arc(e.x, e.y, s.range, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100,200,255,0.55)';
      ctx.lineWidth = 2 * S;
      ctx.setLineDash([7 * S, 5 * S]);
      ctx.stroke();
      ctx.fillStyle = 'rgba(100,200,255,0.06)';
      ctx.fill();
      ctx.restore();
    }

    // --- Beetle-turret aim lines when enemies are in range ---
    for (const [e, s] of this._entityState) {
      if (e.type !== 'beetle-turret' || !s.alive) continue;
      const liveMosqs = this.entities.filter(m => m.type === 'mosquito-flyer' && this._gs(m).alive);
      const inRange = liveMosqs.some(m => Math.hypot(e.x - m.x, e.y - m.y) <= s.range);
      if (inRange) {
        ctx.save();
        const pulse = 0.5 + 0.5 * Math.sin(now * 8);
        ctx.strokeStyle = `rgba(255,140,40,${0.35 + 0.3 * pulse})`;
        ctx.lineWidth = 1.5 * S;
        ctx.beginPath();
        ctx.moveTo(e.x, e.y);
        ctx.lineTo(e.x + Math.cos(s.angle) * s.range * 0.85, e.y + Math.sin(s.angle) * s.range * 0.85);
        ctx.stroke();
        ctx.restore();
      }
    }

    // --- Mushroom-stool heal aura ---
    for (const [e, s] of this._entityState) {
      if (e.type !== 'mushroom-stool' || !s.alive) continue;
      const pulse = 0.5 + 0.5 * Math.sin(s.pulsePhase);
      ctx.save();
      ctx.beginPath();
      ctx.arc(e.x, e.y, s.healRange, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(100,255,150,${0.12 + 0.18 * pulse})`;
      ctx.lineWidth = 2 * S;
      ctx.stroke();
      ctx.fillStyle = `rgba(100,255,150,${0.03 + 0.05 * pulse})`;
      ctx.fill();
      ctx.restore();
    }

    // --- Flower-node resource pulse ring ---
    for (const [e, s] of this._entityState) {
      if (e.type !== 'flower-node' || !s.alive) continue;
      const pulse = 0.5 + 0.5 * Math.sin(s.pulsePhase);
      const radius = (e.width || 32 * S) * 0.5 * (1.15 + 0.45 * pulse);
      ctx.save();
      ctx.beginPath();
      ctx.arc(e.x, e.y, radius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,220,50,${0.35 * pulse})`;
      ctx.lineWidth = 2.5 * S;
      ctx.stroke();
      ctx.restore();
    }

    // --- Projectiles (acorn-shots) ---
    for (const p of this.projectiles) {
      const angle = Math.atan2(p.target.y - p.y, p.target.x - p.x);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      // Trail
      ctx.fillStyle = 'rgba(139,69,19,0.28)';
      ctx.beginPath();
      ctx.ellipse(-10 * S, 0, 9 * S, 3 * S, 0, 0, Math.PI * 2);
      ctx.fill();
      // Body
      ctx.fillStyle = '#7B4A1E';
      ctx.beginPath();
      ctx.ellipse(0, 0, 7 * S, 5 * S, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#4a2c0a';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Cap highlight
      ctx.fillStyle = 'rgba(255,200,100,0.4)';
      ctx.beginPath();
      ctx.ellipse(-1 * S, -1.5 * S, 3 * S, 2 * S, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // --- Ant carry indicator ---
    for (const [e, s] of this._entityState) {
      if (e.type !== 'ant-grunt' || !s.alive || s.carrying <= 0) continue;
      ctx.save();
      ctx.fillStyle = '#c8a870';
      ctx.beginPath();
      ctx.arc(e.x + 9 * S, e.y - 9 * S, 5 * S, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#7a5c14';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    // --- Dead entity markers ---
    for (const [e, s] of this._entityState) {
      if (s.alive || s.maxHp === undefined) continue;
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = '#ff2222';
      ctx.font = `${Math.round(22 * S)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('\u2717', e.x, e.y);
      ctx.restore();
    }

    // --- Floating damage / gain texts ---
    for (const ft of this.floatingTexts) {
      const alpha = ft.life / ft.maxLife;
      const rise = (1 - alpha) * 32 * S;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = `bold ${Math.round(12 * S)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(0,0,0,0.7)';
      ctx.lineWidth = 3;
      ctx.strokeText(ft.text, ft.x, ft.y - rise);
      ctx.fillStyle = ft.color;
      ctx.fillText(ft.text, ft.x, ft.y - rise);
      ctx.restore();
    }

    // --- Selection highlight ---
    if (this.selectedEntity) {
      const e = this.selectedEntity;
      const hw = (e.width  || 32 * S) / 2 + 4 * S;
      const hh = (e.height || 32 * S) / 2 + 4 * S;
      const pulse = 0.5 + 0.5 * Math.sin(now * 5);
      ctx.save();
      ctx.strokeStyle = `rgba(255,255,255,${0.5 + 0.4 * pulse})`;
      ctx.lineWidth = 2 * S;
      ctx.setLineDash([5 * S, 3 * S]);
      ctx.strokeRect(e.x - hw, e.y - hh, hw * 2, hh * 2);
      ctx.restore();

      // Tooltip
      const s = this._gs(e);
      if (s.maxHp !== undefined) {
        const label = `${e.type}  HP:${Math.ceil(s.hp)}/${s.maxHp}  [R] Repair(20)`;
        const tx = Math.min(e.x, W - 200 * S);
        const ty = e.y + (e.height || 32 * S) / 2 + 14 * S;
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.beginPath(); ctx.roundRect(tx - 4 * S, ty - 9 * S, (label.length * 6.2 + 8) * S, 18 * S, 4 * S); ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.font = `${Math.round(10 * S)}px monospace`;
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(label, tx, ty);
        ctx.restore();
      }
    }
  }

  handleInput(type, data) {
    if (type === 'click' || type === 'touchstart') {
      const { x, y } = data;
      let hit = null;
      for (const e of this.entities) {
        const hw = (e.width  || 32 * S) / 2;
        const hh = (e.height || 32 * S) / 2;
        if (x >= e.x - hw && x <= e.x + hw && y >= e.y - hh && y <= e.y + hh) { hit = e; break; }
      }
      this.selectedEntity = (hit && hit !== this.selectedEntity) ? hit : null;
    }

    if (type === 'keydown') {
      const { code } = data;
      if (code === 'Escape') {
        this.selectedEntity = null;
        return;
      }
      if (code === 'KeyR' && this.selectedEntity) {
        const e = this.selectedEntity;
        const s = this._gs(e);
        const cost = 20;
        if (s.maxHp !== undefined && s.alive && s.hp < s.maxHp && this.resources >= cost) {
          this.resources -= cost;
          const healed = Math.min(30, s.maxHp - s.hp);
          s.hp += healed;
          this._float(e.x, e.y - (e.height || 32 * S) / 2 - 6 * S, `Repaired +${healed}`, 1.5, '#80ff80');
        } else if (this.resources < cost) {
          this._float(e.x, e.y - (e.height || 32 * S) / 2 - 6 * S, 'Not enough!', 1.0, '#ff6666');
        }
      }
      if (code === 'KeyU' && this.selectedEntity) {
        const e = this.selectedEntity;
        const s = this._gs(e);
        const cost = 30;
        if (e.type === 'beetle-turret' && s.alive && this.resources >= cost) {
          this.resources -= cost;
          s.range  = Math.min(s.range  + 20 * S, 220 * S);
          s.damage = Math.min(s.damage + 5,       50);
          this._float(e.x, e.y - (e.height || 32 * S) / 2 - 6 * S, 'Upgraded!', 1.5, '#44ccff');
        } else if (this.resources < cost) {
          this._float(e.x, e.y - (e.height || 32 * S) / 2 - 6 * S, 'Not enough!', 1.0, '#ff6666');
        }
      }
    }
  }
}

// === GAME STATE & LAYOUT ===

// ── Entity arrays ─────────────────────────────────────────────────
const playerEntities = [];   // beetle-turrets placed by player
const enemyEntities  = [];   // ant-grunts and mosquito-flyers
const projectiles    = [];   // acorn-shots
const propEntities   = [];   // mushroom-stools, flower-nodes

// ── Winding enemy path: 8 waypoints, coords relative to W / H ────
const path = [
  { x: 0,        y: H * 0.18 },
  { x: W * 0.22, y: H * 0.18 },
  { x: W * 0.22, y: H * 0.55 },
  { x: W * 0.50, y: H * 0.55 },
  { x: W * 0.50, y: H * 0.28 },
  { x: W * 0.78, y: H * 0.28 },
  { x: W * 0.78, y: H * 0.72 },
  { x: W + 48,   y: H * 0.72 }
];

// ── Core game-state variables ─────────────────────────────────────
let lives         = 20;
let level         = 1;
let resources     = 100;
let gameOver      = false;
let waveTimer     = 0;      // general tick counter (available for mechanics)
let spawnTimer    = 0;      // counts toward next enemy spawn
let diffTimer     = 0;      // drives difficulty ramp
let spawnInterval = 2.5;    // seconds between enemy spawns
let baseSpeed     = 70;     // enemy speed px/s at S=1
let flyerRatio    = 0.25;   // probability a new spawn is a mosquito-flyer

// Unique-ID counter & per-turret fire-cooldown registry
let _nextId = 0;
const turretCooldowns = new Map(); // turret.id → remaining seconds

// ── Mechanic instances ────────────────────────────────────────────
const mechTurretPlacement    = new TurretPlacement([]);
const mechWaveSpawner        = new WaveSpawner([]);
const mechResourceManagement = new ResourceManagement([]);
const mechanics = [mechTurretPlacement, mechWaveSpawner, mechResourceManagement];


// === INPUT ===

// ── Shared turret-placement helper ────────────────────────────────
const TURRET_COST = 25;

function _canvasCoords(clientX, clientY) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY
  };
}

function _placeTurret(cx, cy) {
  if (resources < TURRET_COST) return; // not enough resources
  resources -= TURRET_COST;
  playerEntities.push({
    id:     _nextId++,
    type:   'beetle-turret',
    sprite: sprite_beetle_turret,
    width:  40,
    height: 56,
    x:      cx - 20 * S,
    y:      cy - 28 * S
  });
}

// ── Mouse click ───────────────────────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
  if (gameOver) { location.reload(); return; }
  const { x, y } = _canvasCoords(e.clientX, e.clientY);
  _placeTurret(x, y);
});

// ── Touch tap ─────────────────────────────────────────────────────
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameOver) { location.reload(); return; }
  const touch    = e.touches[0];
  const { x, y } = _canvasCoords(touch.clientX, touch.clientY);
  _placeTurret(x, y);
}, { passive: false });

// Prevent accidental scrolling during drag / pinch on canvas
canvas.addEventListener('touchmove',  (e) => e.preventDefault(), { passive: false });
canvas.addEventListener('touchend',   (e) => e.preventDefault(), { passive: false });

// ── Keyboard ──────────────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
  // Restart on R when game is over
  if (gameOver) {
    if (e.key === 'r' || e.key === 'R') location.reload();
    return;
  }

  // Prevent spacebar / arrow scroll on the page
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }

  // Forward ALL key events to every mechanic that supports it
  for (const mech of mechanics) {
    if (typeof mech.onKeyDown === 'function') mech.onKeyDown(e);
  }

  // Numeric shortcut: key "1" selects/confirms turret placement mode
  if (e.key === '1') {
    // Placeholder hook for mechanic-driven selection
    if (typeof mechTurretPlacement.selectEntity === 'function') {
      mechTurretPlacement.selectEntity('beetle-turret');
    }
  }
});


// === GAME LOOP ===
let lastTime = 0;
if (typeof score === 'undefined') var score = 0;
const scoreEl = document.getElementById('score');

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  
// ── Difficulty ramp (every 30 s, regardless of gameOver) ──────────
diffTimer += dt;
if (diffTimer >= 30) {
  diffTimer    -= 30;
  level         = Math.min(level + 1, 10);
  spawnInterval = Math.max(0.7, spawnInterval - 0.18);
  baseSpeed     = Math.min(220, baseSpeed + 12);
  flyerRatio    = Math.min(0.65, flyerRatio + 0.05);
}

if (!gameOver) {
  waveTimer += dt;

  // ── Spawn enemies periodically ──────────────────────────────────
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval) {
    spawnTimer -= spawnInterval;
    const isFlyer = Math.random() < flyerRatio;
    const ew = isFlyer ? 36 : 36;
    const eh = isFlyer ? 48 : 52;
    enemyEntities.push({
      id:        _nextId++,
      type:      isFlyer ? 'mosquito-flyer' : 'ant-grunt',
      sprite:    isFlyer ? sprite_mosquito_flyer : sprite_ant_grunt,
      width:     ew,
      height:    eh,
      x:         path[0].x - (ew * S) / 2,
      y:         path[0].y - (eh * S) / 2,
      pathIndex: 1,
      speed:     baseSpeed * (1 + (level - 1) * 0.08),
      hp:        1 + Math.floor((level - 1) * 0.6)
    });
  }

  // ── Move each enemy along path waypoints ───────────────────────
  for (let i = enemyEntities.length - 1; i >= 0; i--) {
    const e = enemyEntities[i];
    if (e.pathIndex >= path.length) {
      enemyEntities.splice(i, 1);
      lives--;
      if (lives <= 0) { lives = 0; gameOver = true; }
      continue;
    }
    const wp   = path[e.pathIndex];
    const cx   = e.x + (e.width  * S) / 2;
    const cy   = e.y + (e.height * S) / 2;
    const dx   = wp.x - cx;
    const dy   = wp.y - cy;
    const dist = Math.hypot(dx, dy);
    const step = e.speed * S * dt;
    if (dist <= step) {
      e.x = wp.x - (e.width  * S) / 2;
      e.y = wp.y - (e.height * S) / 2;
      e.pathIndex++;
    } else {
      e.x += (dx / dist) * step;
      e.y += (dy / dist) * step;
    }
  }

  // ── Turret targeting & projectile spawning ─────────────────────
  const RANGE    = 150;  // turret range px at S=1
  const COOLDOWN = 1.1;  // seconds between shots per turret
  const PSPEED   = 230;  // projectile speed px/s at S=1

  for (const turret of playerEntities) {
    let cd = turretCooldowns.get(turret.id) || 0;
    cd -= dt;
    if (cd <= 0 && enemyEntities.length > 0) {
      const tx = turret.x + (turret.width  * S) / 2;
      const ty = turret.y + (turret.height * S) / 2;
      let nearest = null, nearDist = Infinity;
      for (const e of enemyEntities) {
        const ex = e.x + (e.width  * S) / 2;
        const ey = e.y + (e.height * S) / 2;
        const d  = Math.hypot(ex - tx, ey - ty);
        if (d < nearDist && d <= RANGE * S) { nearDist = d; nearest = e; }
      }
      if (nearest) {
        const ex  = nearest.x + (nearest.width  * S) / 2;
        const ey  = nearest.y + (nearest.height * S) / 2;
        const ang = Math.atan2(ey - ty, ex - tx);
        projectiles.push({
          id:     _nextId++,
          sprite: sprite_acorn_shot,
          width:  24,
          height: 24,
          x:      tx - 12 * S,
          y:      ty - 12 * S,
          vx:     Math.cos(ang) * PSPEED * S,
          vy:     Math.sin(ang) * PSPEED * S
        });
        cd = COOLDOWN;
      }
    }
    turretCooldowns.set(turret.id, Math.max(cd, 0));
  }

  // ── Move projectiles & detect hits ────────────────────────────
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.x < -60 || p.x > W + 60 || p.y < -60 || p.y > H + 60) {
      projectiles.splice(i, 1); continue;
    }
    const pcx = p.x + 12 * S, pcy = p.y + 12 * S;
    let hit = false;
    for (let j = enemyEntities.length - 1; j >= 0; j--) {
      const e   = enemyEntities[j];
      const ecx = e.x + (e.width  * S) / 2;
      const ecy = e.y + (e.height * S) / 2;
      if (Math.hypot(pcx - ecx, pcy - ecy) < 18 * S) {
        e.hp--;
        if (e.hp <= 0) {
          enemyEntities.splice(j, 1);
          score     += 10 * level;
          resources += 5;
        }
        hit = true;
        break;
      }
    }
    if (hit) projectiles.splice(i, 1);
  }

  // ── Update mechanics & drain their event queues ────────────────
  for (const mech of mechanics) {
    if (typeof mech.update === 'function') mech.update(dt);
    if (Array.isArray(mech.events) && mech.events.length > 0) {
      for (const evt of mech.events) {
        if (evt.type === 'score') {
          score += (evt.value ?? 10);
        }
        if (evt.type === 'state') {
          if (evt.key === 'lives')     lives     = evt.value;
          if (evt.key === 'resources') resources = evt.value;
          if (evt.key === 'gameOver')  gameOver  = true;
        }
      }
      mech.events.length = 0;
    }
  }
}


  
// ── 1. Tile entire background with dirt-mound ─────────────────────
const tileW = 32 * S, tileH = 32 * S;
const cols = Math.ceil(W / tileW) + 1;
const rows = Math.ceil(H / tileH) + 1;
for (let r = 0; r < rows; r++) {
  for (let c = 0; c < cols; c++) {
    ctx.drawImage(sprite_dirt_mound, c * tileW, r * tileH, tileW, tileH);
  }
}

// ── 2. Draw leaf-path tiles along every path segment ──────────────
const leafSize = 32 * S;
for (let seg = 0; seg < path.length - 1; seg++) {
  const a = path[seg], b = path[seg + 1];
  const sdx = b.x - a.x, sdy = b.y - a.y;
  const segLen = Math.hypot(sdx, sdy);
  const steps  = Math.ceil(segLen / leafSize) + 2;
  for (let t = 0; t <= steps; t++) {
    const f  = t / steps;
    const lx = a.x + sdx * f - leafSize / 2;
    const ly = a.y + sdy * f - leafSize / 2;
    ctx.drawImage(sprite_leaf_path, lx, ly, leafSize, leafSize);
  }
}

// ── 3. Draw bark-wall decorations at interior path corners ────────
const wallSz = 32 * S;
for (let i = 1; i < path.length - 1; i++) {
  ctx.drawImage(sprite_bark_wall,
    path[i].x - wallSz,       path[i].y - wallSz,       wallSz, wallSz);
  ctx.drawImage(sprite_bark_wall,
    path[i].x + wallSz * 0.5, path[i].y - wallSz,       wallSz, wallSz);
  ctx.drawImage(sprite_bark_wall,
    path[i].x - wallSz,       path[i].y + wallSz * 0.5, wallSz, wallSz);
}

// ── 4. Draw prop entities (mushroom-stool & flower-node) ──────────
for (const prop of propEntities) {
  if (prop.type === 'mushroom-stool') {
    ctx.drawImage(sprite_mushroom_stool,
      prop.x, prop.y, prop.width * S, prop.height * S);
  } else if (prop.type === 'flower-node') {
    ctx.drawImage(sprite_flower_node,
      prop.x, prop.y, prop.width * S, prop.height * S);
  }
}

// ── 5. Draw enemies ───────────────────────────────────────────────
for (const e of enemyEntities) {
  if (e.type === 'ant-grunt') {
    ctx.drawImage(sprite_ant_grunt, e.x, e.y, e.width * S, e.height * S);
  } else if (e.type === 'mosquito-flyer') {
    ctx.drawImage(sprite_mosquito_flyer, e.x, e.y, e.width * S, e.height * S);
  }
  // HP bar (only when damaged)
  if (e.hp > 1) {
    const bw = e.width * S;
    ctx.fillStyle = '#300';
    ctx.fillRect(e.x, e.y - 6 * S, bw, 4 * S);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(e.x, e.y - 6 * S, bw * (e.hp / (1 + Math.floor((level - 1) * 0.6))), 4 * S);
  }
}

// ── 6. Draw player turrets ────────────────────────────────────────
for (const t of playerEntities) {
  ctx.drawImage(sprite_beetle_turret, t.x, t.y, t.width * S, t.height * S);
  // Range ring on hover (always subtle)
  ctx.save();
  ctx.strokeStyle = 'rgba(255,220,80,0.18)';
  ctx.lineWidth   = 1.5 * S;
  ctx.beginPath();
  ctx.arc(t.x + (t.width * S) / 2, t.y + (t.height * S) / 2, 150 * S, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// ── 7. Draw projectiles ───────────────────────────────────────────
for (const p of projectiles) {
  ctx.drawImage(sprite_acorn_shot, p.x, p.y, p.width * S, p.height * S);
}

// ── 8. Mechanic visual overlays ───────────────────────────────────
for (const mech of mechanics) {
  if (typeof mech.draw === 'function') mech.draw(ctx);
}

// ── 9. HUD ────────────────────────────────────────────────────────
ctx.save();
ctx.font         = `bold ${Math.round(18 * S)}px sans-serif`;
ctx.textBaseline = 'top';
ctx.textAlign    = 'left';
// shadow for legibility
ctx.fillStyle = 'rgba(0,0,0,0.55)';
ctx.fillRect(0, 0, W, 34 * S);
ctx.fillStyle = '#fff';
ctx.fillText(`\u2665 ${lives}`,          10 * S,  8 * S);
ctx.fillText(`Lv ${level}`,             110 * S,  8 * S);
ctx.fillText(`\uD83E\uDE99 ${resources}`, 175 * S,  8 * S);
ctx.fillText(`Score: ${score}`,         300 * S,  8 * S);
ctx.restore();

// ── 10. Game-over overlay ─────────────────────────────────────────
if (gameOver) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle    = '#ff3a3a';
  ctx.font         = `bold ${Math.round(56 * S)}px sans-serif`;
  ctx.fillText('GAME OVER', W / 2, H / 2 - 34 * S);
  ctx.fillStyle = '#ffffff';
  ctx.font      = `${Math.round(24 * S)}px sans-serif`;
  ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 4 * S);
  ctx.fillStyle = '#aaddff';
  ctx.font      = `${Math.round(20 * S)}px sans-serif`;
  ctx.fillText('Tap / Click to restart  \u2014  R to restart', W / 2, H / 2 + 38 * S);
  ctx.restore();
}


  scoreEl.textContent = 'Score: ' + score;
  requestAnimationFrame(gameLoop);
}

// === BOOT ===

// ── Verify path integrity ─────────────────────────────────────────
console.assert(path.length >= 4,
  `Path needs at least 4 waypoints, found ${path.length}`);

// ── Place initial prop entities at scenic positions ───────────────
propEntities.push(
  {
    id:     _nextId++,
    type:   'mushroom-stool',
    sprite: sprite_mushroom_stool,
    width:  32,
    height: 40,
    x:      W * 0.08,
    y:      H * 0.45
  },
  {
    id:     _nextId++,
    type:   'flower-node',
    sprite: sprite_flower_node,
    width:  28,
    height: 36,
    x:      W * 0.60,
    y:      H * 0.68
  },
  {
    id:     _nextId++,
    type:   'mushroom-stool',
    sprite: sprite_mushroom_stool,
    width:  32,
    height: 40,
    x:      W * 0.87,
    y:      H * 0.10
  },
  {
    id:     _nextId++,
    type:   'flower-node',
    sprite: sprite_flower_node,
    width:  28,
    height: 36,
    x:      W * 0.38,
    y:      H * 0.82
  }
);

// ── Confirm mechanics are alive ───────────────────────────────────
console.assert(mechanics.length === 3, 'Expected 3 mechanic instances');

// ── Ready ─────────────────────────────────────────────────────────
console.log('Game initialized');

requestAnimationFrame(gameLoop);
</script>
