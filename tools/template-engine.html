<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #040410; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
canvas { display: block; touch-action: none; width: 100vw; height: 100vh; background: #040410; }
#touch-controls {
  display: none; position: fixed; bottom: 10px; left: 0; right: 0;
  justify-content: space-around; align-items: flex-end; padding: 0 20px; pointer-events: none; z-index: 100;
}
@media (pointer: coarse) { #touch-controls { display: flex; } }
.dpad { display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: auto; }
.dpad-mid { display: flex; gap: 4px; }
.dpad-btn {
  width: 52px; height: 52px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px; color: #fff; font-size: 20px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none; display: flex; align-items: center; justify-content: center; pointer-events: auto;
}
.dpad-btn:active { background: rgba(255,255,255,0.35); }
.action-btns { display: flex; gap: 6px; pointer-events: auto; flex-wrap: wrap; max-width: 200px; }
.action-btn {
  height: 44px; padding: 4px 10px; background: rgba(100,100,255,0.2); border: 1px solid rgba(100,100,255,0.4);
  border-radius: 8px; color: #aaf; font-size: 11px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none; pointer-events: auto; display: flex; align-items: center; justify-content: center;
}
.action-btn:active { background: rgba(100,100,255,0.4); }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="640"></canvas>
<div id="touch-controls">
  <div class="dpad">
    <button class="dpad-btn" data-key="ArrowUp">&#9650;</button>
    <div class="dpad-mid">
      <button class="dpad-btn" data-key="ArrowLeft">&#9664;</button>
      <button class="dpad-btn" data-key=" ">&#x23F8;</button>
      <button class="dpad-btn" data-key="ArrowRight">&#9654;</button>
    </div>
    <button class="dpad-btn" data-key="ArrowDown">&#9660;</button>
  </div>
  <div class="action-btns">
    <button class="action-btn" data-key="Enter" style="background:rgba(255,200,50,0.25);border-color:rgba(255,200,50,0.5);color:#fc4;">YES</button>
    <button class="action-btn" data-key="Escape" style="background:rgba(255,80,80,0.2);border-color:rgba(255,80,80,0.4);color:#f66;">NO</button>
    <button class="action-btn" data-key="e">Act</button>
    <button class="action-btn" data-key="1">1</button>
    <button class="action-btn" data-key="2">2</button>
    <button class="action-btn" data-key="3">3</button>
    <button class="action-btn" data-key="4">4</button>
  </div>
</div>

// Touch controls
document.querySelectorAll('.dpad-btn').forEach(function(btn){
  btn.addEventListener('touchstart',function(e){e.preventDefault();document.dispatchEvent(new KeyboardEvent('keydown',{key:btn.dataset.key}));});
  btn.addEventListener('touchend',function(e){document.dispatchEvent(new KeyboardEvent('keyup',{key:btn.dataset.key}));});
});
document.querySelectorAll('.action-btn').forEach(function(btn){
  btn.addEventListener('touchstart',function(e){e.preventDefault();document.dispatchEvent(new KeyboardEvent('keydown',{key:btn.dataset.key}));});
});

// Utility
function shadeHex(hex, amt) {
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}
