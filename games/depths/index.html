Game.prototype.resetPlayer=function(){
  var p=this.player;p.x=0;p.y=0;p.hp=CONFIG.START_HP;p.maxHp=CONFIG.START_HP;
  p.atk=CONFIG.START_ATK;p.visionRadius=CONFIG.VISION_RADIUS;p.floor=0;
  p.abilities=[];p.shieldTurns=0;p.shieldAmount=0;p.hitFlash=0;
  p.wet=false;p.kills=0;p.lastDir={x:0,y:1};p.animFrame=0;p.animTimer=0;p.walkTimer=0;
  p.weapon=null;p.armor=null;p.weaponType='sword';p.potions=2;
  p.body='broad';p.height='average';p.frame='average';
};

Game.prototype.setupInput=function(){
  var self=this;
  document.addEventListener('keydown',function(e){
    // CHARACTER CREATOR on title screen
    if(self.state==='title'){
      var c=self.customization;
      var optionCounts=[self.BODY_COLORS.length,self.HAIR_COLORS.length,self.HAIR_STYLES.length,self.SKIN_COLORS.length,self.EYE_COLORS.length,self.BODIES.length,self.HEIGHTS.length,self.FRAMES.length,self.START_WEAPONS.length];
      var numOpts=optionCounts.length;
      if(e.key==='ArrowUp'||e.key==='w'){c.cursor=(c.cursor-1+numOpts)%numOpts;return;}
      if(e.key==='ArrowDown'||e.key==='s'){c.cursor=(c.cursor+1)%numOpts;return;}
      var keys=['bodyIdx','hairIdx','hairStyleIdx','skinIdx','eyeIdx','bodyIdx','heightIdx','frameIdx','startWpnIdx'];
      if(e.key==='ArrowLeft'||e.key==='a'){
        c[keys[c.cursor]]=(c[keys[c.cursor]]-1+optionCounts[c.cursor])%optionCounts[c.cursor];
        return;
      }
      if(e.key==='ArrowRight'||e.key==='d'){
        c[keys[c.cursor]]=(c[keys[c.cursor]]+1)%optionCounts[c.cursor];
        return;
      }
      if(e.key==='Enter'||e.key===' '){self.startGame();return;}
      return;
    }
    if(self.state==='dead'){self.state='title';return;}
    if(self.state==='loot_prompt'){
      var lk=e.key.toLowerCase();
      if(lk==='y'||lk==='enter'||lk===' '){
        var lp=self._pendingLootPos;
        delete self.dungeon.loot[self._pendingLootKey];
        self.dungeon.map[lp.y][lp.x]=T.FLOOR;
        self.equipLoot(self._pendingLoot,lp.x,lp.y);
        self._pendingLoot=null;self.state='playing';self.endTurn();
      } else if(lk==='n'||lk==='escape'){
        self.addLog('Left '+self._pendingLoot.name+' on ground.','#888');
        self._pendingLoot=null;self.state='playing';self.endTurn();
      }
      return;
    }
    if(self.state==='shrine'){self.handleShrineKey(e);return;}
    if(self.state==='replace') return;
    if(self.state!=='playing'||!self.turnReady) return;
    if(e.key==='Tab'){e.preventDefault();self.showMinimap=!self.showMinimap;return;}
    if(e.key==='p'||e.key==='P'){
      if(self.player.potions>0&&self.player.hp<self.player.maxHp){
        self.player.potions--;
        var heal=Math.round(self.player.maxHp*0.35);
        self.player.hp=Math.min(self.player.hp+heal,self.player.maxHp);
        SFX.heal();self.addLog('Potion! +'+heal+' HP ('+self.player.potions+' left)','#ff44aa');
        self.addFloating(self.player.x,self.player.y,'+'+heal,'#ff44aa');
        self.vfx.heal(self.player.x*CONFIG.TILE+CONFIG.TILE/2,self.player.y*CONFIG.TILE+CONFIG.TILE/2,{color:'#ff44aa'});
        self.endTurn();
      } else if(self.player.potions<=0){ self.addLog('No potions!','#888'); }
      else { self.addLog('Already at full HP.','#888'); }
      return;
    }
    if(e.key>='1'&&e.key<='4'){
      var idx=parseInt(e.key)-1;
      // Cancel if same ability pressed again
      if(self.abilityTargetMode&&self.selectedAbility===idx){self.abilityTargetMode=false;self.selectedAbility=-1;self.addLog('Cancelled.','#888');return;}
      if(idx<self.player.abilities.length){
        var ab=self.player.abilities[idx];
        if(ab.currentCooldown>0){self.addLog(ab.name+' on cooldown ('+ab.currentCooldown+')',ab.color);return;}
        if(ab.verb==='dash'){self.abilityTargetMode=true;self.selectedAbility=idx;self.addLog('Direction for '+ab.name+'?',ab.color);}
        else if(ab.shape==='self'||ab.shape==='ring'){self.useAbility(idx,self.player.lastDir.x,self.player.lastDir.y);}
        else{self.abilityTargetMode=true;self.selectedAbility=idx;self.addLog('Direction for '+ab.name+'?',ab.color);}
      }return;
    }
    if(e.key==='Escape'){if(self.abilityTargetMode){self.abilityTargetMode=false;self.selectedAbility=-1;}return;}
    var dx=0,dy=0;
    if(e.key==='ArrowUp'||e.key==='w')dy=-1;
    else if(e.key==='ArrowDown'||e.key==='s')dy=1;
    else if(e.key==='ArrowLeft'||e.key==='a')dx=-1;
    else if(e.key==='ArrowRight'||e.key==='d')dx=1;
    else if(e.key==='5'||e.key==='.'||e.key===' '){self.endTurn();return;}
    else return;
    e.preventDefault();
    if(self.abilityTargetMode){self.useAbility(self.selectedAbility,dx,dy);self.abilityTargetMode=false;self.selectedAbility=-1;return;}
    if(dx!==0||dy!==0) self.player.lastDir={x:dx,y:dy};
    self.doPlayerMove(dx,dy);
  });
  document.querySelectorAll('.dpad-btn').forEach(function(btn){btn.addEventListener('touchstart',function(e){e.preventDefault();document.dispatchEvent(new KeyboardEvent('keydown',{key:btn.dataset.key}));});});
  document.querySelectorAll('.ability-btn').forEach(function(btn){btn.addEventListener('touchstart',function(e){e.preventDefault();document.dispatchEvent(new KeyboardEvent('keydown',{key:btn.dataset.key}));});});
  this.canvas.addEventListener('click',function(ev){
    if(self.state==='dead'){self.state='title';return;}
    if(self.state==='title'){
      // Only start if tapping the bottom 15% (where the prompt is)
      var rect=self.canvas.getBoundingClientRect();
      var tapY=(ev.clientY-rect.top)/rect.height;
      if(tapY>0.85) self.startGame();
    }
  });
};

Game.prototype.startGame=function(){
  this.state='playing'; this.resetPlayer();
  this.meta.totalRuns++; saveMeta(this.meta);
  this.log=[]; this.floatingTexts=[]; this.vfx.clear();
  _spriteCache={}; // clear sprite cache for fresh biome sprites
  this.playerSprite=getPlayerSprite();
  this.itemSprites=getItemSprites();

  // Apply customization
  var c=this.customization;
  this.player.bodyColor=this.BODY_COLORS[c.bodyIdx];
  this.player.hairColor=this.HAIR_COLORS[c.hairIdx];
  this.player.hairStyle=this.HAIR_STYLES[c.hairStyleIdx];
  this.player.skinColor=this.SKIN_COLORS[c.skinIdx];
  this.player.eyeColor=this.EYE_COLORS[c.eyeIdx];
  this.player.body=this.BODIES[c.bodyIdx];
  this.player.height=this.HEIGHTS[c.heightIdx];
  this.player.frame=this.FRAMES[c.frameIdx];

  // Starting weapon determines slot 1 ability
  var wpnChoice=this.START_WEAPONS[c.startWpnIdx];
  this.player.weaponType=wpnChoice.key;
  var wt=WEAPON_TYPES[wpnChoice.key];
  this.player.weapon={name:wt.name,range:wt.range,damage:wt.baseDmg,cd:wt.cd,type:wpnChoice.key};
  if(wpnChoice.key==='sword'){
    this.player.abilities.push({verb:'strike',element:'physical',shape:'single',name:'Sword Strike',damage:wt.baseDmg,cooldown:0,currentCooldown:0,color:'#ddaa44',isWeapon:true});
  } else if(wpnChoice.key==='wand'){
    this.player.abilities.push({verb:'launch',element:'fire',shape:'line',name:'Wand Shot',damage:wt.baseDmg,cooldown:1,currentCooldown:0,color:'#6688ff',isWeapon:true,maxRange:2});
  } else if(wpnChoice.key==='staff'){
    this.player.abilities.push({verb:'shield',element:'physical',shape:'self',name:'Heal',damage:0,cooldown:5,currentCooldown:0,color:'#44ff88',isWeapon:true,isHeal:true});
  }
  if(this.meta.depthRecord>=10) this.player.abilities.push(generateAbility(1));

  this.addLog('You descend into the depths...','#aaa');
  this.generateFloor();
};

Game.prototype.generateFloor=function(){
  this.player.floor++;
  this.dungeon=generateDungeon(this.player.floor);
  this.player.x=this.dungeon.spawnX; this.player.y=this.dungeon.spawnY;
  this.enemies=[];
  this.terrainSprites=getTerrainSprites(this.dungeon.biome);

  var bIdx=getBiomeIndex(this.player.floor);
  var archList=Object.keys(ARCHETYPES);
  for(var i=0;i<this.dungeon.rooms.length;i++){
    var room=this.dungeon.rooms[i];
    if(room.type==='spawn'||room.type==='shrine'||room.type==='rest') continue;
    if(room.type==='boss'){this.enemies.push(createBoss(Math.floor(room.x+room.w/2),Math.floor(room.y+room.h/2),this.player.floor,bIdx));continue;}
    var count=2+Math.floor(Math.random()*(1+this.player.floor*0.3));
    for(var j=0;j<count;j++){
      var ex=room.x+1+Math.floor(Math.random()*Math.max(1,room.w-2));
      var ey=room.y+1+Math.floor(Math.random()*Math.max(1,room.h-2));
      if(ex>=room.x&&ex<room.x+room.w&&ey>=room.y&&ey<room.y+room.h){
        var tile=this.dungeon.map[ey][ex];
        if(tile===T.FLOOR||tile===T.WATER||tile===T.FUNGAL||tile===T.OIL){
          var arch,roll=Math.random();
          if(this.player.floor<3){arch=roll<0.4?'swarm':roll<0.7?'stalker':'shambler';}
          else if(this.player.floor<8){arch=roll<0.2?'swarm':roll<0.4?'stalker':roll<0.6?'shambler':roll<0.85?'caster':'brute';}
          else{arch=archList[Math.floor(Math.random()*archList.length)];}
          this.enemies.push(new Enemy(ex,ey,arch,this.player.floor,bIdx));
        }
      }
    }
  }
  for(var i=0;i<this.enemies.length;i++){var e=this.enemies[i];if(!this.meta.bestiary[e.name])this.meta.bestiary[e.name]={seen:true,archetype:e.archetype,color:e.color};}
  saveMeta(this.meta);
  this.revealAround(this.player.x,this.player.y,this.player.visionRadius);
  this.addLog('Floor '+this.player.floor+' \u2014 '+this.dungeon.biome.name,this.dungeon.biome.accent);
  if(this.dungeon.isBossFloor) this.addLog('A powerful presence lurks here...','#ff4444');
  this.pipeline._ambientColor=this.dungeon.biome.ambientColor;
  this.pipeline._ambientIntensity=this.dungeon.biome.ambientIntensity;
};

Game.prototype.isPassable=function(x,y){if(x<0||x>=CONFIG.MAP_W||y<0||y>=CONFIG.MAP_H)return false;var t=this.dungeon.map[y][x];return t!==T.VOID&&t!==T.WALL;};

Game.prototype.revealAround=function(cx,cy,radius){
  for(var dy=-radius;dy<=radius;dy++)for(var dx=-radius;dx<=radius;dx++){
    if(dx*dx+dy*dy>radius*radius) continue;
    var nx=cx+dx,ny=cy+dy;
    if(nx<0||nx>=CONFIG.MAP_W||ny<0||ny>=CONFIG.MAP_H) continue;
    var blocked=false,steps=Math.max(Math.abs(dx),Math.abs(dy));
    if(steps>1){for(var s=1;s<steps;s++){var t=s/steps,mx=Math.round(cx+dx*t),my=Math.round(cy+dy*t);if(mx>=0&&mx<CONFIG.MAP_W&&my>=0&&my<CONFIG.MAP_H&&this.dungeon.map[my][mx]===T.WALL){blocked=true;break;}}}
    if(!blocked) this.dungeon.revealed[ny][nx]=true;
  }
};

Game.prototype.isVisible=function(tx,ty){
  var dx=tx-this.player.x,dy=ty-this.player.y;
  if(dx*dx+dy*dy>this.player.visionRadius*this.player.visionRadius) return false;
  var steps=Math.max(Math.abs(dx),Math.abs(dy));
  if(steps<=1) return true;
  for(var s=1;s<steps;s++){var t=s/steps,mx=Math.round(this.player.x+dx*t),my=Math.round(this.player.y+dy*t);if(mx>=0&&mx<CONFIG.MAP_W&&my>=0&&my<CONFIG.MAP_H&&this.dungeon.map[my][mx]===T.WALL)return false;}
  return true;
};

Game.prototype.doPlayerMove=function(dx,dy){
  var nx=this.player.x+dx,ny=this.player.y+dy;
  var enemy=null;for(var i=0;i<this.enemies.length;i++){if(this.enemies[i].alive&&this.enemies[i].x===nx&&this.enemies[i].y===ny){enemy=this.enemies[i];break;}}
  if(enemy){this.meleeAttack(enemy);this.endTurn();return;}
  if(!this.isPassable(nx,ny)) return;
  this.player.x=nx;this.player.y=ny;this.player.walkTimer=0.35;SFX.step();
  this.revealAround(nx,ny,this.player.visionRadius);
  var tile=this.dungeon.map[ny][nx];
  this.player.wet=tile===T.WATER;
  if(tile===T.LAVA){
    var lavaDmg=5+this.player.floor*2;
    this.player.hp-=lavaDmg;this.player.hitFlash=0.2;
    this.addLog('Burning in lava! -'+lavaDmg,'#ff4422');
    this.addFloating(this.player.x,this.player.y,'-'+lavaDmg,'#ff4422');
    this.pipeline.camera.shake(3,0.15);
    if(this.player.hp<=0){this.player.hp=0;this.die();return;}
  }
  if(tile===T.LOOT){
    var key=nx+','+ny;var loot=this.dungeon.loot[key];
    if(loot){
      SFX.shrine();
      this._pendingLoot=loot;this._pendingLootKey=key;this._pendingLootPos={x:nx,y:ny};
      this.state='loot_prompt';
      return; // don't end turn yet
    }
  }
  if(tile===T.STAIRS){SFX.stairs();this.generateFloor();return;}
  if(tile===T.SHRINE){SFX.shrine();this.openShrine();return;}
  if(tile===T.REST){SFX.heal();var heal=Math.round(this.player.maxHp*0.3);this.player.hp=Math.min(this.player.hp+heal,this.player.maxHp);this.addLog('Resting... +'+heal+' HP','#44ff88');this.addFloating(this.player.x,this.player.y,'+'+heal,'#44ff88');this.vfx.heal(this.player.x*CONFIG.TILE+CONFIG.TILE/2,this.player.y*CONFIG.TILE+CONFIG.TILE/2,{color:'#44ff88'});this.dungeon.map[ny][nx]=T.FLOOR;}
  if(tile===T.FUNGAL){var dmg=1+Math.floor(this.player.floor*0.3);this.player.hp-=dmg;this.addFloating(this.player.x,this.player.y,'-'+dmg,'#44ff44');}
  var eff=this.dungeon.effects[ny][nx];
  if(eff&&eff.turnsLeft>0){
    if(eff.element==='fire'){var d=Math.round(eff.damage*0.5);this.player.hp-=d;this.addFloating(this.player.x,this.player.y,'-'+d,'#ff6622');}
    if(eff.element==='poison'){var d=Math.round(eff.damage*0.3);this.player.hp-=d;this.addFloating(this.player.x,this.player.y,'-'+d,'#44ff44');}
  }
  if(this.player.hp<=0){this.player.hp=0;this.die();return;}
  this.endTurn();
};

Game.prototype.meleeAttack=function(enemy){
  SFX.hit();
  // Unarmed if using healing staff (1 damage)
  var dmg=this.player.weaponType==='staff'?1:Math.max(1,this.player.atk);
  enemy.hp-=dmg;enemy.hitFlash=0.2;
  this.addLog('Hit '+enemy.name+' -'+dmg,'#ff8844');
  this.addFloating(enemy.x,enemy.y,'-'+dmg,'#ff8844');
  this.vfx.sparks(enemy.x*CONFIG.TILE+CONFIG.TILE/2,enemy.y*CONFIG.TILE+CONFIG.TILE/2,{color:['#ff8844','#ffcc00'],count:6,direction:Math.PI,spread:1});
  this.pipeline.camera.shake(3,0.1);
  if(enemy.hp<=0){enemy.hp=0;enemy.alive=false;this.onKill(enemy);}
};

Game.prototype.useAbility=function(idx,dx,dy){
  var ab=this.player.abilities[idx];if(!ab||ab.currentCooldown>0)return;
  if(dx===0&&dy===0){dx=this.player.lastDir.x;dy=this.player.lastDir.y;}
  if(dx===0&&dy===0)dy=1;
  var sfx=ELEMENT_SFX[ab.element];if(SFX[sfx])SFX[sfx]();
  var targets=getAbilityTargets(ab,this.player.x,this.player.y,dx,dy);

  if(ab.verb==='dash'){
    var lx=this.player.x,ly=this.player.y;
    for(var i=1;i<=3;i++){var nx=this.player.x+dx*i,ny=this.player.y+dy*i;if(!this.isPassable(nx,ny))break;var blocked=false;for(var j=0;j<this.enemies.length;j++)if(this.enemies[j].alive&&this.enemies[j].x===nx&&this.enemies[j].y===ny){blocked=true;break;}if(blocked)break;lx=nx;ly=ny;}
    if(lx!==this.player.x||ly!==this.player.y){this.player.x=lx;this.player.y=ly;this.player.walkTimer=0.35;this.revealAround(lx,ly,this.player.visionRadius);this.addLog('Dashed!',ab.color);
      for(var adx=-1;adx<=1;adx++)for(var ady=-1;ady<=1;ady++){if(adx===0&&ady===0)continue;for(var j=0;j<this.enemies.length;j++){var e=this.enemies[j];if(e.alive&&e.x===lx+adx&&e.y===ly+ady)this.applyAbilityDmg(e,ab,Math.round(ab.damage*0.5));}}
      // Check tile at landing position
      var landTile=this.dungeon.map[ly][lx];
      if(landTile===T.STAIRS){SFX.stairs();this.generateFloor();return;}
      if(landTile===T.SHRINE){SFX.shrine();this.openShrine();return;}
      if(landTile===T.LOOT){var lk2=lx+','+ly;var lt2=this.dungeon.loot[lk2];if(lt2){SFX.shrine();this._pendingLoot=lt2;this._pendingLootKey=lk2;this._pendingLootPos={x:lx,y:ly};this.state='loot_prompt';return;}}
      if(landTile===T.REST){SFX.heal();var h2=Math.round(this.player.maxHp*0.3);this.player.hp=Math.min(this.player.hp+h2,this.player.maxHp);this.addLog('Resting... +'+h2+' HP','#44ff88');this.addFloating(lx,ly,'+'+h2,'#44ff88');this.dungeon.map[ly][lx]=T.FLOOR;}
      if(landTile===T.LAVA){var ld=5+this.player.floor*2;this.player.hp-=ld;this.player.hitFlash=0.2;this.addLog('Lava! -'+ld,'#ff4422');this.addFloating(lx,ly,'-'+ld,'#ff4422');if(this.player.hp<=0){this.player.hp=0;this.die();return;}}
      if(landTile===T.FUNGAL){var fd=1+Math.floor(this.player.floor*0.3);this.player.hp-=fd;this.addFloating(lx,ly,'-'+fd,'#44ff44');}
    }
    this.vfx.trail(lx*CONFIG.TILE+CONFIG.TILE/2,ly*CONFIG.TILE+CONFIG.TILE/2,{color:[ab.color,'#ffffff'],count:8,speed:60});
  } else if(ab.isHeal){
    // Healing staff heal
    var heal=Math.round(this.player.maxHp*0.25);
    this.player.hp=Math.min(this.player.hp+heal,this.player.maxHp);
    this.addLog('Healed +'+heal+' HP','#44ff88');
    this.addFloating(this.player.x,this.player.y,'+'+heal,'#44ff88');
    this.vfx.heal(this.player.x*CONFIG.TILE+CONFIG.TILE/2,this.player.y*CONFIG.TILE+CONFIG.TILE/2,{color:'#44ff88'});
  } else if(ab.verb==='shield'){
    this.player.shieldTurns=3+Math.floor(ab.damage/5);this.player.shieldAmount=Math.round(ab.damage*0.5);
    this.addLog(ab.name+'! DEF+'+this.player.shieldAmount+' '+this.player.shieldTurns+'t',ab.color);
    this.vfx.heal(this.player.x*CONFIG.TILE+CONFIG.TILE/2,this.player.y*CONFIG.TILE+CONFIG.TILE/2,{color:ab.color});
  } else if(ab.verb==='drain'){
    for(var i=0;i<targets.length;i++){var t=targets[i];for(var j=0;j<this.enemies.length;j++){var e=this.enemies[j];if(e.alive&&e.x===t.x&&e.y===t.y){var dmg=this.applyAbilityDmg(e,ab,ab.damage);var heal=Math.round(dmg*0.5);this.player.hp=Math.min(this.player.hp+heal,this.player.maxHp);this.addFloating(this.player.x,this.player.y,'+'+heal,'#44ff88');}}}
  } else {
    for(var i=0;i<targets.length;i++){var t=targets[i];if(t.x<0||t.x>=CONFIG.MAP_W||t.y<0||t.y>=CONFIG.MAP_H)continue;if(ab.shape==='line'&&this.dungeon.map[t.y][t.x]===T.WALL)break;
      for(var j=0;j<this.enemies.length;j++){var e=this.enemies[j];if(e.alive&&e.x===t.x&&e.y===t.y)this.applyAbilityDmg(e,ab,ab.damage);}
      if(ab.verb==='place'||(ab.element!=='physical'&&Math.random()<0.4))this.placeEffect(t.x,t.y,ab);
      this.vfx.sparks(t.x*CONFIG.TILE+CONFIG.TILE/2,t.y*CONFIG.TILE+CONFIG.TILE/2,{color:[ab.color,'#ffffff'],count:3,speed:50});
    }
  }
  ab.currentCooldown=ab.cooldown; this.endTurn();
};

Game.prototype.applyAbilityDmg=function(enemy,ab,damage){
  var d=damage;
  if(ab.element==='lightning'&&enemy.wet){d=Math.round(d*1.5);this.addLog('Conducts!','#ffff44');}
  if(ab.element==='fire'&&enemy.frozen>0){d=Math.round(d*1.3);enemy.frozen=0;}
  enemy.hp-=d;enemy.hitFlash=0.2;
  if(ab.element==='fire')enemy.burning=3;if(ab.element==='ice')enemy.frozen=2;if(ab.element==='poison')enemy.poisoned=4;
  if(ab.element==='lightning'&&this.dungeon.map[enemy.y][enemy.x]===T.WATER){for(var i=0;i<this.enemies.length;i++){var o=this.enemies[i];if(o===enemy||!o.alive)continue;if(this.dungeon.map[o.y][o.x]===T.WATER){var cd=Math.round(d*0.5);o.hp-=cd;o.hitFlash=0.2;this.addFloating(o.x,o.y,'-'+cd,'#ffff44');if(o.hp<=0){o.hp=0;o.alive=false;this.onKill(o);}}}}
  this.addLog(ab.name+' \u2192 '+enemy.name+' -'+d,ab.color);
  this.addFloating(enemy.x,enemy.y,'-'+d,ab.color);
  var epx=enemy.x*CONFIG.TILE+CONFIG.TILE/2, epy=enemy.y*CONFIG.TILE+CONFIG.TILE/2;
  // Element-specific VFX
  if(ab.element==='fire'){
    this.pipeline.camera.shake(3,0.12);
    this.vfx.explosion(epx,epy,{color:['#ff6622','#ff2200','#ffcc00'],count:12,speed:60});
    this.pipeline.flash('#ff220008',0.1);
  } else if(ab.element==='ice'){
    this.pipeline.camera.shake(2,0.08);
    this.vfx.sparks(epx,epy,{color:['#66ccff','#aaeeff','#ffffff'],count:10,speed:40});
  } else if(ab.element==='lightning'){
    this.pipeline.camera.shake(4,0.06);
    this.vfx.sparks(epx,epy,{color:['#ffff44','#ffffff','#ffff88'],count:15,speed:120});
    this.pipeline.flash('#ffff4410',0.05);
  } else if(ab.element==='poison'){
    this.pipeline.camera.shake(1,0.1);
    this.vfx.trail(epx,epy,{color:['#44ff44','#22aa22'],count:8,speed:30});
  } else if(ab.element==='void'){
    this.pipeline.camera.shake(3,0.15);
    this.vfx.explosion(epx,epy,{color:['#aa44ff','#6622cc','#000000'],count:10,speed:50});
  } else {
    this.pipeline.camera.shake(2,0.08);
    this.vfx.sparks(epx,epy,{color:[ab.color,'#ffffff'],count:8,speed:80});
  }
  if(enemy.hp<=0){enemy.hp=0;enemy.alive=false;this.onKill(enemy);}
  return d;
};

Game.prototype.placeEffect=function(x,y,ab){
  if(x<0||x>=CONFIG.MAP_W||y<0||y>=CONFIG.MAP_H)return;var tile=this.dungeon.map[y][x];if(tile===T.WALL||tile===T.VOID)return;
  if(ab.element==='fire'&&tile===T.WATER){this.dungeon.map[y][x]=T.FLOOR;return;}
  if(ab.element==='fire'&&tile===T.OIL){this.dungeon.map[y][x]=T.FLOOR;for(var i=0;i<this.enemies.length;i++){var e=this.enemies[i];if(!e.alive)continue;if(Math.abs(e.x-x)<=1&&Math.abs(e.y-y)<=1){var d=Math.round(ab.damage*1.5);e.hp-=d;e.hitFlash=0.3;e.burning=3;this.addFloating(e.x,e.y,'-'+d+' BOOM','#ff4422');if(e.hp<=0){e.hp=0;e.alive=false;this.onKill(e);}}}this.vfx.explosion(x*CONFIG.TILE+CONFIG.TILE/2,y*CONFIG.TILE+CONFIG.TILE/2,{color:['#ff6622','#ffcc00'],count:20,speed:120});this.pipeline.camera.shake(6,0.3);this.pipeline.flash('#ff4400',0.15);return;}
  if(ab.element==='ice'&&tile===T.WATER){this.dungeon.map[y][x]=T.ICE;return;}
  if(ab.element==='fire'&&tile===T.ICE){this.dungeon.map[y][x]=T.WATER;return;}
  this.dungeon.effects[y][x]={element:ab.element,damage:ab.damage,turnsLeft:ab.verb==='place'?5:2,color:ab.color};
};

Game.prototype.onKill=function(enemy){
  SFX.kill();this.player.kills++;this.meta.totalKills++;
  var heal=Math.round(enemy.maxHp*0.1);if(heal>0){this.player.hp=Math.min(this.player.hp+heal,this.player.maxHp);this.addFloating(this.player.x,this.player.y,'+'+heal,'#44ff88');}
  this.addLog(enemy.name+' defeated!','#ffcc44');
  this.vfx.explosion(enemy.x*CONFIG.TILE+CONFIG.TILE/2,enemy.y*CONFIG.TILE+CONFIG.TILE/2,{color:[enemy.color,'#ffffff'],count:15,speed:80});
  // Potion drop: 25% chance
  if(Math.random()<0.25){this.player.potions++;this.addLog('+1 Potion! ('+this.player.potions+')','#ff44aa');this.addFloating(enemy.x,enemy.y,'+Potion','#ff44aa');}
  // Loot drop chance
  var dropChance=enemy.isBoss?1.0:0.35;
  if(Math.random()<dropChance&&this.dungeon.map[enemy.y][enemy.x]!==T.WATER&&this.dungeon.map[enemy.y][enemy.x]!==T.LAVA){
    var loot=generateLoot(this.player.floor);
    this.dungeon.map[enemy.y][enemy.x]=T.LOOT;
    if(!this.dungeon.loot) this.dungeon.loot={};
    this.dungeon.loot[enemy.x+','+enemy.y]=loot;
    this.addLog('Something dropped!','#ffcc44');
  }
  if(enemy.isBoss){SFX.boss();this.addLog('BOSS DEFEATED!','#ff0');this.pipeline.flash('#ffcc00',0.3);this.pipeline.camera.shake(8,0.5);this.player.hp=this.player.maxHp;this.player.atk+=2;this.player.maxHp+=10;this.addLog('+2 ATK, +10 HP','#ffcc44');}
  if(this.player.kills%10===0){this.player.atk+=1;this.player.maxHp+=5;this.player.hp=Math.min(this.player.hp+5,this.player.maxHp);this.addLog('Stronger! +1 ATK +5 HP','#ffcc44');}
  saveMeta(this.meta);
};

Game.prototype.endTurn=function(){
  this.turnReady=false;this.turnCooldown=0.07;
  for(var i=0;i<this.player.abilities.length;i++)if(this.player.abilities[i].currentCooldown>0)this.player.abilities[i].currentCooldown--;
  if(this.player.shieldTurns>0)this.player.shieldTurns--;
  this.doEnemyTurns();this.tickEffects();this.tickEnemyStatus();
  this.enemies=this.enemies.filter(function(e){return e.alive;});
};

Game.prototype.doEnemyTurns=function(){
  for(var i=0;i<this.enemies.length;i++){
    var enemy=this.enemies[i];if(!enemy.alive)continue;if(enemy.frozen>0){enemy.frozen--;continue;}
    enemy.moveAccum+=enemy.speed;if(enemy.moveAccum<1)continue;enemy.moveAccum-=1;
    var dx=this.player.x-enemy.x,dy=this.player.y-enemy.y,dist=Math.abs(dx)+Math.abs(dy);
    if(dist>this.player.visionRadius+4)continue;
    if(enemy.behavior==='telegraph'){if(enemy.telegraphing){enemy.telegraphing=false;if(enemy.telegraphDir){var tx=enemy.x+enemy.telegraphDir.x,ty=enemy.y+enemy.telegraphDir.y;if(tx===this.player.x&&ty===this.player.y)this.enemyAttack(enemy,2.0);enemy.telegraphDir=null;}continue;}if(dist===1){enemy.telegraphing=true;enemy.telegraphDir={x:Math.sign(dx),y:Math.sign(dy)};this.addLog(enemy.name+' winds up!','#ff8844');continue;}}
    if(enemy.behavior==='ranged'&&dist<=(enemy.range||4)&&dist>1){var los=true,steps=Math.max(Math.abs(dx),Math.abs(dy));for(var s=1;s<steps;s++){var t=s/steps;if(this.dungeon.map[Math.round(enemy.y+dy*t)][Math.round(enemy.x+dx*t)]===T.WALL){los=false;break;}}if(los){this.enemyAttack(enemy,0.8);continue;}}
    if(dist===1){this.enemyAttack(enemy,1.0);continue;}
    var mx=dx!==0?Math.sign(dx):0,my=dy!==0?Math.sign(dy):0;
    var tries;
    if(enemy.behavior==='flank'&&dist>2){var tmpX=my,tmpY=-mx;if(Math.random()<0.5){tmpX=-tmpX;tmpY=-tmpY;}tries=[{x:tmpX,y:tmpY},{x:mx,y:0},{x:0,y:my}];}
    else{tries=Math.abs(dx)>=Math.abs(dy)?[{x:mx,y:0},{x:0,y:my}]:[{x:0,y:my},{x:mx,y:0}];if(enemy.behavior==='swarm')tries.push({x:mx,y:my});}
    for(var ti=0;ti<tries.length;ti++){var tr=tries[ti];if(tr.x===0&&tr.y===0)continue;var nx=enemy.x+tr.x,ny=enemy.y+tr.y;if(!this.isPassable(nx,ny)||nx===this.player.x&&ny===this.player.y)continue;var occ=false;for(var j=0;j<this.enemies.length;j++)if(this.enemies[j].alive&&this.enemies[j]!==enemy&&this.enemies[j].x===nx&&this.enemies[j].y===ny){occ=true;break;}if(!occ){enemy.x=nx;enemy.y=ny;break;}}
  }
};

Game.prototype.enemyAttack=function(enemy,mult){
  var def=this.player.shieldTurns>0?this.player.shieldAmount:0;
  var armorDef=this.player.armor?this.player.armor.defense:0;
  var dmg=Math.max(1,Math.round(enemy.atk*mult)-def-armorDef);
  this.player.hp-=dmg;this.player.hitFlash=0.15;SFX.hurt();
  this.addLog(enemy.name+' -'+dmg,'#ff4444');this.addFloating(this.player.x,this.player.y,'-'+dmg,'#ff4444');
  this.pipeline.camera.shake(2+(mult>1?3:0),0.1);
  if(this.player.hp<=0){this.player.hp=0;this.die();}
};

Game.prototype.tickEffects=function(){for(var y=0;y<CONFIG.MAP_H;y++)for(var x=0;x<CONFIG.MAP_W;x++){var eff=this.dungeon.effects[y][x];if(eff&&eff.turnsLeft>0){eff.turnsLeft--;for(var i=0;i<this.enemies.length;i++){var e=this.enemies[i];if(e.alive&&e.x===x&&e.y===y){var d=Math.round(eff.damage*0.3);e.hp-=d;e.hitFlash=0.1;if(e.hp<=0){e.hp=0;e.alive=false;this.onKill(e);}}}if(eff.turnsLeft<=0)this.dungeon.effects[y][x]=null;}}};

Game.prototype.tickEnemyStatus=function(){for(var i=0;i<this.enemies.length;i++){var e=this.enemies[i];if(!e.alive)continue;if(e.burning>0){var d=2+Math.floor(this.player.floor*0.3);e.hp-=d;e.burning--;this.addFloating(e.x,e.y,'-'+d,'#ff6622');if(e.hp<=0){e.hp=0;e.alive=false;this.onKill(e);}}if(e.poisoned>0){var d=1+Math.floor(this.player.floor*0.2);e.hp-=d;e.poisoned--;this.addFloating(e.x,e.y,'-'+d,'#44ff44');if(e.hp<=0){e.hp=0;e.alive=false;this.onKill(e);}}e.wet=this.dungeon.map[e.y][e.x]===T.WATER;}};

Game.prototype.equipLoot=function(loot,lootX,lootY){
  var old=null;
  if(loot.type==='weapon'){
    old=this.player.weapon;
    this.player.weapon=loot;
    this.player.weaponType=loot.range>1?'wand':'sword';
    if(this.player.abilities.length>0&&this.player.abilities[0].isWeapon){
      var a=this.player.abilities[0];
      a.name=loot.name;a.damage=loot.damage;a.cooldown=loot.cd||0;a.color=loot.color;
      if(loot.range>1){a.verb='launch';a.shape='line';a.maxRange=loot.range;}
      else{a.verb='strike';a.shape='single';delete a.maxRange;}
      a.isHeal=false;
    }
    this.addLog('Equipped '+loot.name,'#ddaa44');
  } else if(loot.type==='armor'){
    old=this.player.armor;
    this.player.armor=loot;
    this.addLog('Equipped '+loot.name,'#88aacc');
  }
  // Drop old equipment on the floor
  if(old&&old.name&&lootX!=null&&lootY!=null){
    this.dungeon.map[lootY][lootX]=T.LOOT;
    this.dungeon.loot[lootX+','+lootY]=old;
    this.addLog('Dropped '+old.name,'#888');
  }
};

Game.prototype.openShrine=function(){this.state='shrine';this.shrineChoices=[generateAbility(this.player.floor),generateAbility(this.player.floor),generateAbility(this.player.floor)];};

Game.prototype.handleShrineKey=function(e){
  var idx=parseInt(e.key)-1;
  if(idx>=0&&idx<3&&this.shrineChoices){
    var chosen=this.shrineChoices[idx];
    if(this.player.abilities.length<4){this.player.abilities.push(chosen);this.addLog('Gained: '+chosen.name+'!',chosen.color);this.shrineChoices=null;this.dungeon.map[this.player.y][this.player.x]=T.FLOOR;this.state='playing';}
    else{this._pendingAbility=chosen;this.state='replace';this.shrineChoices=null;var self=this;
      this._replaceHandler=function(ev){var ri=parseInt(ev.key)-1;if(ri>=0&&ri<self.player.abilities.length&&self._pendingAbility){self.addLog('Replaced '+self.player.abilities[ri].name+' with '+self._pendingAbility.name,self._pendingAbility.color);self.player.abilities[ri]=self._pendingAbility;self._pendingAbility=null;self.dungeon.map[self.player.y][self.player.x]=T.FLOOR;self.state='playing';document.removeEventListener('keydown',self._replaceHandler);self._replaceHandler=null;}if(ev.key==='Escape'){self._pendingAbility=null;self.state='playing';document.removeEventListener('keydown',self._replaceHandler);self._replaceHandler=null;}};
      document.addEventListener('keydown',this._replaceHandler);}return;}
  if(e.key==='Escape'){this.shrineChoices=null;this.state='playing';}
};

Game.prototype.die=function(){
  SFX.gameOver();this.state='dead';
  if(this.player.floor>this.meta.depthRecord){this.meta.depthRecord=this.player.floor;this.addLog('NEW RECORD: Floor '+this.player.floor+'!','#ff0');submitScore('depths',this.player.floor);}
  saveMeta(this.meta);
  this.pipeline.camera.shake(10,0.6);this.pipeline.flash('#ff0000',0.4);
  this.vfx.explosion(this.player.x*CONFIG.TILE+CONFIG.TILE/2,this.player.y*CONFIG.TILE+CONFIG.TILE/2,{color:['#ff4444','#ffcc00'],count:25,speed:120});
};

Game.prototype.addLog=function(t,c){this.log.push({text:t,color:c||'#ccc'});if(this.log.length>7)this.log.shift();};
Game.prototype.addFloating=function(tx,ty,t,c){this.floatingTexts.push({x:tx*CONFIG.TILE+CONFIG.TILE/2,y:ty*CONFIG.TILE,text:t,color:c,life:1.0});};

Game.prototype.update=function(dt){
  this.animTimer+=dt;
  if(this.turnCooldown>0){this.turnCooldown-=dt;if(this.turnCooldown<=0)this.turnReady=true;}
  for(var i=0;i<this.enemies.length;i++){if(this.enemies[i].hitFlash>0)this.enemies[i].hitFlash-=dt;this.enemies[i].animTimer+=dt;}
  if(this.player.hitFlash>0)this.player.hitFlash-=dt;
  if(this.player.walkTimer>0)this.player.walkTimer-=dt;
  this.player.animTimer+=dt;
  for(var i=this.floatingTexts.length-1;i>=0;i--){this.floatingTexts[i].y-=40*dt;this.floatingTexts[i].life-=dt;if(this.floatingTexts[i].life<=0)this.floatingTexts.splice(i,1);}
};

// ============================================================
// DRAWING
// ============================================================
Game.prototype.draw=function(){
  var p=this.pipeline;p.begin();
  if(this.state==='title'){p.setLayer('ui');this.drawTitle(p.getCtx());p.end();return;}
  var cx=this.player.x*CONFIG.TILE+CONFIG.TILE/2,cy=this.player.y*CONFIG.TILE+CONFIG.TILE/2;
  p.camera.x=cx;p.camera.y=cy;
  p.setLayer('dungeon');var dc=p.getCtx();p.camera.applyTransform(dc);this.drawDungeon(dc);
  p.setLayer('entities');var ec=p.getCtx();p.camera.applyTransform(ec);this.drawEntities(ec);
  p.addLight(cx,cy,{color:this.dungeon.biome.lightColor,radius:this.player.visionRadius*CONFIG.TILE*1.5,intensity:1.0,flicker:0.03,falloff:'quadratic'});
  p.setLayer('fx');var fc=p.getCtx();p.camera.applyTransform(fc);this.vfx.draw(fc);
  var fs=Math.max(11,Math.round(CONFIG.TILE*0.4));
  for(var i=0;i<this.floatingTexts.length;i++){var ft=this.floatingTexts[i];fc.globalAlpha=Math.max(0,ft.life);fc.font='bold '+fs+'px Segoe UI';fc.fillStyle=ft.color;fc.textAlign='center';fc.fillText(ft.text,ft.x,ft.y);fc.globalAlpha=1;}
  p.setLayer('ui');var uc=p.getCtx();this.drawHUD(uc);
  if(this.state==='shrine')this.drawShrineOverlay(uc);
  if(this.state==='replace')this.drawReplaceOverlay(uc);
  if(this.state==='loot_prompt')this.drawLootPrompt(uc);
  if(this.state==='dead')this.drawDeathOverlay(uc);
  if(this.showMinimap)this.drawMinimap(uc);
  p.end();
};

Game.prototype.drawDungeon=function(ctx){
  var ts=CONFIG.TILE,px=this.player.x,py=this.player.y;
  var halfW=CONFIG.VIEW_W+1,halfH=CONFIG.VIEW_H+1;
  var terrain=this.terrainSprites;

  // Fill entire visible area with solid black so light can't bleed into void
  ctx.fillStyle='#000000';
  ctx.fillRect((px-halfW)*ts,(py-halfH)*ts,(halfW*2+1)*ts,(halfH*2+1)*ts);

  for(var dy=-halfH;dy<=halfH;dy++){for(var dx=-halfW;dx<=halfW;dx++){
    var tx=px+dx,ty=py+dy;
    if(tx<0||tx>=CONFIG.MAP_W||ty<0||ty>=CONFIG.MAP_H)continue;
    if(!this.dungeon.revealed[ty][tx])continue;
    var tile=this.dungeon.map[ty][tx], sx=tx*ts, sy=ty*ts;
    if(tile===T.VOID)continue; // already black from fill
    var visible=this.isVisible(tx,ty);
    ctx.globalAlpha=visible?1:0.35;

    if(tile===T.WALL){
      var wc=this.dungeon.biome.wallColor;
      var ac=this.dungeon.biome.accent;
      var wh=((tx*137+ty*269)&0xffff);
      var bIdx=getBiomeIndex(this.player.floor);
      // 2x3 stone block grid — each block gets its own color
      var bw=ts/2, bh=ts/3;
      for(var by=0;by<3;by++){
        for(var bx=0;bx<2;bx++){
          // Offset alternate rows
          var ox=(by%2===0)?0:bw*0.5;
          var rx=sx+bx*bw+ox, ry=sy+by*bh;
          // Per-block color from hash
          var blockHash=((tx*41+ty*67+bx*137+by*269)&0xffff);
          var shade=(blockHash%25)-12;
          ctx.fillStyle=shadeHex(wc,shade);
          ctx.fillRect(rx,ry,bw,bh);
          // Mortar gap
          ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=Math.max(0.5,ts/40);
          ctx.strokeRect(rx+0.5,ry+0.5,bw-1,bh-1);
        }
      }
      // Exposed face depth shading
      var aboveOpen=ty>0&&this.dungeon.map[ty-1][tx]!==T.WALL;
      var belowOpen=ty<CONFIG.MAP_H-1&&this.dungeon.map[ty+1][tx]!==T.WALL;
      if(aboveOpen){
        ctx.fillStyle=shadeHex(wc,40);ctx.fillRect(sx,sy,ts,Math.round(ts*0.25));
        ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(sx,sy,ts,Math.max(1,ts*0.06));
      }
      if(belowOpen){ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(sx,sy+ts-Math.round(ts*0.12),ts,Math.round(ts*0.12));}
      // Biome colour accents on ~30% of wall tiles
      var decor=(wh*31)%100;
      if(bIdx===0&&decor<30){ // Catacombs: green-brown moss
        ctx.fillStyle='rgba(50,80,30,'+(0.15+(wh%3)*0.08).toFixed(2)+')';
        var my=aboveOpen?0:ts*(0.3+(wh%4)*0.15);
        ctx.fillRect(sx+(wh*7%(ts>>1)),sy+my,ts*(0.25+(wh%3)*0.15),ts*(0.15+(wh%3)*0.1));
      } else if(bIdx===1&&decor<35){ // Flooded: damp blue stains
        ctx.fillStyle='rgba(30,60,140,0.18)';
        ctx.fillRect(sx+(wh%Math.round(ts*0.5)),sy+ts*0.3,ts*0.35,ts*0.5);
      } else if(bIdx===2&&decor<40){ // Fungal: green-purple growth
        ctx.fillStyle='rgba(40,120,50,0.25)';

    } else if(tile===T.ICE){

};

// Darken/lighten a hex color
function shadeHex(hex, amt) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amt)); g = Math.max(0, Math.min(255, g + amt)); b = Math.max(0, Math.min(255, b + amt));
  return '#' + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

// Draw humanoid character with walk cycle
// walkPhase: 0 = idle, >0 = walk cycle progress (0-1 repeating)
// opts: { hairStyle, hairColor } — optional extended options
function drawCharPixel(ctx, sx, sy, ts, bodyColor, eyeColor, headColor, weaponColor, walkPhase, opts) {
  var m = ts / 16;
  var walking = walkPhase > 0;
  var cycle = walking ? Math.sin(walkPhase * Math.PI * 6) : 0;
  var headBob = walking ? Math.abs(Math.sin(walkPhase * Math.PI * 6)) * m * 0.8 : 0;
  var bodyDark = shadeHex(bodyColor, -40);
  var headDark = shadeHex(headColor || bodyColor, -30);
  var hairStyle = (opts && opts.hairStyle) || 'short';
  var hairColor = (opts && opts.hairColor) || shadeHex(bodyColor, 30);
  var hairDark = shadeHex(hairColor, -30);
  var bodyType = (opts && opts.body) || 'broad';
  var height = (opts && opts.height) || 'average';
  var frame = (opts && opts.frame) || 'average';

  // Base proportions
  var legW=2.5, legX1=5, legX2=8.5, bodyW=8, bodyX=4, armW=2.5, armX1=2, armX2=11.5;
  var hipY=5, hipH=2.5, chestY=2, chestH=5.5, legY=7, legH=3.5;
  var vertOff=0, isNarrow=bodyType==='narrow';

  // Frame: stocky vs slim
  if(frame==='stocky'){
    bodyW=9; bodyX=3.5; legW=3; legX1=4; legX2=9; legH=Math.max(legH-0.5,3);
    armW=3; armX1=1; armX2=12;
  } else if(frame==='slim'){
    bodyW=7; bodyX=4.5; legW=2; legX1=5.5; legX2=9; legH=legH+0.5;
    armW=2; armX1=2.5; armX2=11.5;
  }
  // Height: tall vs short
  if(height==='tall'){ vertOff=-2; legH+=1; chestH+=0.5; chestY-=1; }
  else if(height==='short'){ vertOff=2; legH=Math.max(legH-1,2); chestH=Math.max(chestH-1,4); hipH=Math.max(hipH-0.5,1.5); }
  // Narrow: narrower waist, wider hips
  if(isNarrow){
    armW=Math.min(armW,2.2); armX1=Math.max(armX1,2.5); armX2=Math.min(armX2,11.5);
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(sx+8*m, sy+11*m, 4*m, 1.2*m, 0, 0, Math.PI*2); ctx.fill();

  var vo=vertOff*m; // vertical offset for tall/short

  // Left leg
  var lLeg = walking ? cycle * 2 * m : 0;
  ctx.fillStyle = bodyDark;
  ctx.fillRect(sx+legX1*m, sy+(legY+vertOff)*m+lLeg, legW*m, legH*m-Math.abs(lLeg)*0.3);
  ctx.fillStyle = '#443322';
  ctx.fillRect(sx+(legX1-0.5)*m, sy+(legY+vertOff+legH-1)*m+lLeg, (legW+1)*m, 1.5*m);

  // Right leg
  var rLeg = walking ? -cycle * 2 * m : 0;
  ctx.fillStyle = bodyDark;
  ctx.fillRect(sx+legX2*m, sy+(legY+vertOff)*m+rLeg, legW*m, legH*m-Math.abs(rLeg)*0.3);
  ctx.fillStyle = '#443322';
  ctx.fillRect(sx+(legX2-0.5)*m, sy+(legY+vertOff+legH-1)*m+rLeg, (legW+1)*m, 1.5*m);

  // Body — torso
  ctx.fillStyle = bodyColor;
  ctx.fillRect(sx+bodyX*m, sy+(chestY+vertOff)*m-headBob, bodyW*m, chestH*m);
  // Lower body / hips
  ctx.fillStyle = bodyDark;
  if(isNarrow){
    // Wider hips flaring out from waist
    var hipW=bodyW+2;
    ctx.fillRect(sx+(bodyX-1)*m, sy+(hipY+vertOff)*m-headBob, hipW*m, hipH*m);
    // Waist taper — dark insets on sides to create hourglass
    ctx.fillStyle = shadeHex(bodyColor, -25);
    ctx.fillRect(sx+bodyX*m, sy+(chestY+vertOff+1.5)*m-headBob, 1.2*m, 2*m);
    ctx.fillRect(sx+(bodyX+bodyW-1.2)*m, sy+(chestY+vertOff+1.5)*m-headBob, 1.2*m, 2*m);
    // Chest — slight forward curve using lighter band
    ctx.fillStyle = shadeHex(bodyColor, 12);
    ctx.fillRect(sx+(bodyX+0.5)*m, sy+(chestY+vertOff+0.3)*m-headBob, (bodyW-1)*m, 1.8*m);
    // Subtle shadow line under chest for depth
    ctx.fillStyle = shadeHex(bodyColor, -10);
    ctx.fillRect(sx+(bodyX+1)*m, sy+(chestY+vertOff+2.1)*m-headBob, (bodyW-2)*m, 0.6*m);
  } else {
    ctx.fillRect(sx+bodyX*m, sy+(hipY+vertOff)*m-headBob, bodyW*m, hipH*m);
  }

  // Arms
  var armSwing = walking ? cycle * 1.5 * m : 0;
  ctx.fillStyle = headColor || bodyColor;
  ctx.fillRect(sx+armX1*m, sy+(chestY+0.5+vertOff)*m-headBob-armSwing, armW*m, 4*m);
  ctx.fillRect(sx+armX2*m, sy+(chestY+0.5+vertOff)*m-headBob+armSwing, armW*m, 4*m);

  // Weapon in right hand — style based on weapon type
  var wpnType = (opts && opts.weaponType) || (weaponColor ? 'sword' : null);
  if (weaponColor && wpnType) {
    var wy = sy+(chestY-3+vertOff)*m-headBob+armSwing;
    if (wpnType === 'sword') {
      ctx.fillStyle = weaponColor;
      ctx.fillRect(sx+12.5*m, wy, 1.5*m, 5*m);
      ctx.fillStyle = '#886633';
      ctx.fillRect(sx+12*m, wy+4.5*m, 2.5*m, 1.5*m);
    } else if (wpnType === 'wand') {
      ctx.fillStyle = '#886644';
      ctx.fillRect(sx+13*m, wy+1*m, 1*m, 6*m);
      ctx.fillStyle = weaponColor;
      ctx.fillRect(sx+12.5*m, wy, 2*m, 2*m);
    } else if (wpnType === 'staff') {
      ctx.fillStyle = '#886644';
      ctx.fillRect(sx+13*m, wy-1*m, 1.2*m, 8*m);
      ctx.fillStyle = weaponColor;
      ctx.beginPath(); ctx.arc(sx+13.5*m, wy-1*m, 1.5*m, 0, Math.PI*2); ctx.fill();
    }
  }

  // Head — offset by vo for tall/short
  var hy=sy+vo-4*m; // head base y shifted up with body
  ctx.fillStyle = headColor || bodyColor;
  ctx.fillRect(sx+5*m, hy+1.5*m-headBob, 6*m, 5*m);
  // Jaw shadow — broad body only
  if(!isNarrow){
    ctx.fillStyle = headDark;
    ctx.fillRect(sx+5*m, hy+5.5*m-headBob, 6*m, 1*m);
  }

  // Hair by style
  ctx.fillStyle = hairColor;
  if (hairStyle === 'short') {
    ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 2.5*m);
    ctx.fillStyle = hairDark;
    ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 1*m);
  } else if (hairStyle === 'long') {
    ctx.fillRect(sx+4*m, hy+0.5*m-headBob, 8*m, 2.5*m);
    ctx.fillRect(sx+4*m, hy+3*m-headBob, 2*m, 5*m);
    ctx.fillRect(sx+10*m, hy+3*m-headBob, 2*m, 5*m);
    ctx.fillStyle = hairDark;
    ctx.fillRect(sx+4*m, hy+0.5*m-headBob, 8*m, 1*m);
  } else if (hairStyle === 'spiky') {
    ctx.fillRect(sx+4.5*m, hy+1*m-headBob, 7*m, 2*m);
    ctx.beginPath();
    ctx.moveTo(sx+5*m, hy+1*m-headBob); ctx.lineTo(sx+4*m, hy-1.5*m-headBob); ctx.lineTo(sx+6.5*m, hy+0.5*m-headBob);
    ctx.moveTo(sx+7*m, hy+0.5*m-headBob); ctx.lineTo(sx+7.5*m, hy-2*m-headBob); ctx.lineTo(sx+9*m, hy+0.5*m-headBob);
    ctx.moveTo(sx+9.5*m, hy+1*m-headBob); ctx.lineTo(sx+11.5*m, hy-1*m-headBob); ctx.lineTo(sx+11*m, hy+1*m-headBob);
    ctx.fill();
  } else if (hairStyle === 'bald') {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(sx+6*m, hy+1.5*m-headBob, 3*m, 1.5*m);
  } else if (hairStyle === 'ponytail') {
    ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 2.5*m);
    ctx.fillRect(sx+9*m, hy+2*m-headBob, 2*m, 2*m);
    ctx.fillRect(sx+10*m, hy+3.5*m-headBob, 2*m, 4*m);
    ctx.fillStyle = hairDark;
    ctx.fillRect(sx+10.5*m, hy+5*m-headBob, 1.5*m, 3*m);
  } else if (hairStyle === 'mohawk') {
    ctx.fillRect(sx+6.5*m, hy-1*m-headBob, 3*m, 3.5*m);
    ctx.fillStyle = hairDark;
    ctx.fillRect(sx+7*m, hy-1.5*m-headBob, 2*m, 1.5*m);
  }

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(sx+6*m, hy+3.5*m-headBob, 2*m, 1.5*m);
  ctx.fillRect(sx+9*m, hy+3.5*m-headBob, 2*m, 1.5*m);
  ctx.fillStyle = eyeColor || '#222222';
  ctx.fillRect(sx+6.5*m, hy+3.8*m-headBob, 1.2*m, 1.2*m);
  ctx.fillRect(sx+9.5*m, hy+3.8*m-headBob, 1.2*m, 1.2*m);
}

// Draw creature with walk cycle
function drawCreaturePixel(ctx, sx, sy, ts, color, archetype, walkPhase) {
  var m = ts / 16;
  var walking = walkPhase > 0;
  var cycle = walking ? Math.sin(walkPhase * Math.PI * 6) : 0;
  var bob = walking ? Math.abs(Math.sin(walkPhase * Math.PI * 6)) * m * 0.5 : 0;
  var dark = shadeHex(color, -50);
  var light = shadeHex(color, 50);

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(sx+8*m, sy+15*m, 5*m, 1.2*m, 0, 0, Math.PI*2); ctx.fill();

  if (archetype === 'swarm') {
    var wingFlap = Math.sin((walkPhase||0.5)*Math.PI*10) * 2 * m;
    ctx.fillStyle = dark;
    ctx.fillRect(sx+6*m, sy+7*m-bob, 4*m, 4*m);
    ctx.fillStyle = color;
    ctx.fillRect(sx+6.5*m, sy+6.5*m-bob, 3*m, 3.5*m);
    // Wings
    ctx.fillStyle = light;
    ctx.fillRect(sx+2*m, sy+(5+wingFlap)*m-bob, 4*m, 2*m);
    ctx.fillRect(sx+10*m, sy+(5-wingFlap)*m-bob, 4*m, 2*m);
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(sx+7*m, sy+7.5*m-bob, 1*m, 1*m);
    ctx.fillRect(sx+9*m, sy+7.5*m-bob, 1*m, 1*m);
  } else if (archetype === 'shambler') {
    var legSwing = cycle * 1.5 * m;
    ctx.fillStyle = dark;
    ctx.fillRect(sx+3*m, sy+12*m+legSwing, 4*m, 3*m);
    ctx.fillRect(sx+9*m, sy+12*m-legSwing, 4*m, 3*m);
    ctx.fillStyle = color;
    ctx.fillRect(sx+2*m, sy+4*m-bob, 12*m, 8*m);
    ctx.fillStyle = light;
    ctx.fillRect(sx+4*m, sy+2*m-bob, 8*m, 3*m);
    // Rib detail
    ctx.fillStyle = dark;
    ctx.fillRect(sx+3*m, sy+7*m-bob, 10*m, 1*m);
    ctx.fillRect(sx+3*m, sy+9*m-bob, 10*m, 1*m);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(sx+5*m, sy+3*m-bob, 2*m, 2*m);
    ctx.fillRect(sx+9*m, sy+3*m-bob, 2*m, 2*m);
  } else if (archetype === 'stalker') {
    var legSwing = cycle * 2 * m;
    ctx.fillStyle = dark;
    ctx.fillRect(sx+4*m, sy+11*m+legSwing, 2*m, 3*m);
    ctx.fillRect(sx+10*m, sy+11*m-legSwing, 2*m, 3*m);
    ctx.fillStyle = color;
    ctx.fillRect(sx+3*m, sy+7*m-bob, 10*m, 4*m);
    ctx.fillStyle = light;
    ctx.fillRect(sx+10*m, sy+5*m-bob, 4*m, 3*m);
    ctx.fillStyle = dark;
    ctx.fillRect(sx+1*m, sy+8*m-bob, 3*m, 2*m); // tail
    ctx.fillStyle = '#ffff44';
    ctx.fillRect(sx+12*m, sy+6*m-bob, 1.5*m, 1.5*m);
  } else if (archetype === 'brute') {
    var legSwing = cycle * 1 * m;
    ctx.fillStyle = dark;
    ctx.fillRect(sx+2*m, sy+12*m+legSwing, 5*m, 3*m);
    ctx.fillRect(sx+9*m, sy+12*m-legSwing, 5*m, 3*m);
    ctx.fillStyle = color;
    ctx.fillRect(sx+1*m, sy+3*m-bob, 14*m, 9*m);
    ctx.fillStyle = light;
    ctx.fillRect(sx+4*m, sy+1*m-bob, 8*m, 3*m);
    // Shoulder pads
    ctx.fillStyle = dark;
    ctx.fillRect(sx+0*m, sy+4*m-bob, 3*m, 4*m);
    ctx.fillRect(sx+13*m, sy+4*m-bob, 3*m, 4*m);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(sx+5*m, sy+2*m-bob, 2*m, 2*m);
    ctx.fillRect(sx+9*m, sy+2*m-bob, 2*m, 2*m);
    ctx.fillStyle = '#ccaa88';
    ctx.fillRect(sx+3*m, sy+(-0.5)*m-bob, 2*m, 2.5*m);
    ctx.fillRect(sx+11*m, sy+(-0.5)*m-bob, 2*m, 2.5*m);
  } else {
    // caster or default: robed humanoid
    var armSwing = cycle * 1 * m;
    ctx.fillStyle = dark;
    ctx.fillRect(sx+5*m, sy+12*m, 2*m, 2.5*m);
    ctx.fillRect(sx+9*m, sy+12*m, 2*m, 2.5*m);
    ctx.fillStyle = color;
    ctx.fillRect(sx+4*m, sy+5*m-bob, 8*m, 7*m); // robe
    ctx.fillStyle = light;
    ctx.fillRect(sx+5*m, sy+2*m-bob, 6*m, 4*m); // head
    ctx.fillStyle = '#ff66ff';
    ctx.fillRect(sx+6*m, sy+3.5*m-bob, 1.5*m, 1.5*m);
    ctx.fillRect(sx+9*m, sy+3.5*m-bob, 1.5*m, 1.5*m);
    // Staff
    ctx.fillStyle = '#aa8844';
    ctx.fillRect(sx+13*m, sy+2*m-bob+armSwing, 1.5*m, 10*m);
    ctx.fillStyle = '#aa44ff';
    ctx.fillRect(sx+12.5*m, sy+1*m-bob+armSwing, 2.5*m, 2.5*m);
  }
}

Game.prototype.drawEntities=function(ctx){
  var ts=CONFIG.TILE;
  var bobTime = this.animTimer;

  // Enemies
  for(var i=0;i<this.enemies.length;i++){
    var e=this.enemies[i];if(!e.alive||!this.isVisible(e.x,e.y))continue;
    var sx=e.x*ts,sy=e.y*ts;
    // Enemies walk continuously when within detection range
    var eDist = Math.abs(e.x-this.player.x)+Math.abs(e.y-this.player.y);
    var eWalk = eDist <= this.player.visionRadius + 2 ? (bobTime * 0.8 + i * 0.3) % 1 : 0;
    if(e.hitFlash>0) ctx.globalAlpha=0.4+Math.sin(e.hitFlash*30)*0.6;

    drawCreaturePixel(ctx, sx, sy, ts, e.color, e.archetype, eWalk);

    ctx.globalAlpha=1;

    if(e.isBoss){
      ctx.strokeStyle='#ff2222';ctx.lineWidth=2;ctx.strokeRect(sx,sy,ts,ts);
      ctx.strokeRect(sx-1,sy-1,ts+2,ts+2);
      this.pipeline.addLight(sx+ts/2,sy+ts/2,{color:'#ff2200',radius:ts*3,intensity:0.4,flicker:0.1});
    }
    if(e.hp<e.maxHp){var barW=ts-4,hpR=e.hp/e.maxHp;ctx.fillStyle='#222';ctx.fillRect(sx+2,sy-5,barW,4);ctx.fillStyle=hpR>0.5?'#44ff44':hpR>0.25?'#ffcc00':'#ff4444';ctx.fillRect(sx+2,sy-5,barW*hpR,4);}
    var statusY=sy-10;ctx.font=Math.max(8,Math.round(ts*0.22))+'px monospace';ctx.textAlign='center';
    if(e.frozen>0){ctx.fillStyle='#66ccff';ctx.fillText('ICE',sx+ts/2,statusY);statusY-=10;}
    if(e.burning>0){ctx.fillStyle='#ff6622';ctx.fillText('FIRE',sx+ts/2,statusY);statusY-=10;}
    if(e.poisoned>0){ctx.fillStyle='#44ff44';ctx.fillText('PSN',sx+ts/2,statusY);statusY-=10;}
    if(e.telegraphing){ctx.fillStyle='#ff4444';ctx.font='bold '+Math.max(10,Math.round(ts*0.3))+'px monospace';ctx.fillText('!!',sx+ts/2,statusY);}
  }

  // Player character with customization
  var psx=this.player.x*ts,psy=this.player.y*ts;
  var pWalk = this.player.walkTimer > 0 ? (bobTime * 1.2) % 1 : 0;
  if(this.player.hitFlash>0) ctx.globalAlpha=0.4+Math.sin(this.player.hitFlash*30)*0.6;
  var wpnColor=null;
  if(this.player.weaponType==='sword') wpnColor='#aaccff';
  else if(this.player.weaponType==='wand') wpnColor='#6688ff';
  else if(this.player.weaponType==='staff') wpnColor='#44ff88';
  var bodyCol=this.player.bodyColor||'#2266cc';
  // Armor tints the body color
  if(this.player.armor) bodyCol=this.player.armor.color;
  drawCharPixel(ctx, psx, psy, ts,
    bodyCol, this.player.eyeColor||'#443322',
    this.player.skinColor||'#ffcc88', wpnColor, pWalk,
    {hairStyle:this.player.hairStyle||'short', hairColor:this.player.hairColor||'#443322',
     weaponType:this.player.weaponType, body:this.player.body, height:this.player.height, frame:this.player.frame});
  ctx.globalAlpha=1;


  if(this.player.shieldTurns>0){ctx.strokeStyle='rgba(100,200,255,0.7)';ctx.lineWidth=2;ctx.strokeRect(psx-1,psy-1,ts+2,ts+2);}

  // Ability targeting
  if(this.abilityTargetMode&&this.selectedAbility>=0){
    var ab=this.player.abilities[this.selectedAbility];
    ctx.globalAlpha=0.3+Math.sin(this.animTimer*5)*0.15;ctx.fillStyle=ab.color;
    var dirs=[{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
    for(var di=0;di<dirs.length;di++){var dir=dirs[di];var targets=getAbilityTargets(ab,this.player.x,this.player.y,dir.x,dir.y);
      for(var ti=0;ti<targets.length;ti++){var t=targets[ti];if(t.x>=0&&t.x<CONFIG.MAP_W&&t.y>=0&&t.y<CONFIG.MAP_H){if(ab.shape==='line'&&this.dungeon.map[t.y][t.x]===T.WALL)break;if(this.dungeon.map[t.y][t.x]!==T.WALL)ctx.fillRect(t.x*ts,t.y*ts,ts,ts);}}}
    ctx.globalAlpha=1;
  }
};

Game.prototype.drawHUD=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,p=this.player;
  var fs=Math.max(12,Math.min(16,Math.round(w*0.012))),pad=10;

  // Floor level badge — top center, prominent
  var floorText='FLOOR '+p.floor;
  var biomeName=this.dungeon?this.dungeon.biome.name:'';
  var biomeAccent=this.dungeon?this.dungeon.biome.accent:'#888';
  var badgeW=Math.max(120,ctx.measureText?80:120);
  ctx.font='bold '+Math.round(fs*1.3)+'px Segoe UI';ctx.textAlign='center';
  badgeW=Math.max(badgeW,(ctx.measureText(floorText).width||100)+40);
  var badgeX=(w-badgeW)/2, badgeY=4;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(badgeX,badgeY,badgeW,Math.round(fs*2.8));
  ctx.strokeStyle=biomeAccent;ctx.lineWidth=1;ctx.strokeRect(badgeX,badgeY,badgeW,Math.round(fs*2.8));
  ctx.fillStyle='#fff';ctx.fillText(floorText,w/2,badgeY+fs*1.2);
  ctx.fillStyle=biomeAccent;ctx.font=Math.round(fs*0.7)+'px Segoe UI';
  ctx.fillText(biomeName,w/2,badgeY+fs*2.2);

  // Stats panel — top left
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,Math.min(220,w*0.25),55);
  ctx.fillStyle='#aaa';ctx.font=fs+'px Segoe UI';ctx.textAlign='left';
  ctx.fillText('ATK:'+p.atk+(p.shieldTurns>0?' DEF:'+p.shieldAmount:''),pad,pad+fs);
  var barX=pad,barY=pad+fs+4,barW=Math.min(190,w*0.22),barH=14,hpR=p.hp/p.maxHp;
  ctx.fillStyle='#222';ctx.fillRect(barX,barY,barW,barH);
  ctx.fillStyle=hpR>0.5?'#44dd44':hpR>0.25?'#ddcc00':'#dd3333';
  ctx.fillRect(barX,barY,barW*hpR,barH);
  ctx.fillStyle='#fff';ctx.font='bold '+Math.round(fs*0.8)+'px Segoe UI';ctx.fillText(p.hp+'/'+p.maxHp,barX+4,barY+barH-3);
  ctx.fillStyle='#666';ctx.font=Math.round(fs*0.7)+'px Segoe UI';ctx.fillText('Kills:'+p.kills,pad,barY+barH+Math.round(fs*0.9));

  // Equipment + potions display — top right
  var eqW=Math.min(180,w*0.2);
  var eqX=w-eqW-pad,eqY=4;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(eqX,eqY,eqW,fs*4.2);
  var ety=eqY+fs*0.9;
  ctx.fillStyle='#aaa';ctx.font=Math.round(fs*0.7)+'px Segoe UI';ctx.textAlign='left';
  ctx.fillText(p.weapon?p.weapon.name:'Unarmed',eqX+5,ety);ety+=fs*1.1;
  ctx.fillStyle='#88aacc';
  ctx.fillText(p.armor?p.armor.name:'No Armor',eqX+5,ety);ety+=fs*1.1;
  ctx.fillStyle=p.potions>0?'#ff44aa':'#553344';
  ctx.fillText('Potions: '+p.potions+'  [P] to use',eqX+5,ety);
  ctx.textAlign='left';

  var abY=h-75;ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,abY-5,Math.min(400,w*0.45),80);
  for(var i=0;i<4;i++){
    var ab=p.abilities[i],abx=pad+i*(Math.min(90,w*0.1)+4),abw=Math.min(90,w*0.1),abh=52;
    if(ab){var onCD=ab.currentCooldown>0,sel=this.abilityTargetMode&&this.selectedAbility===i;
      ctx.fillStyle=sel?'rgba(255,255,255,0.2)':onCD?'rgba(50,50,50,0.8)':'rgba(30,30,50,0.8)';ctx.fillRect(abx,abY,abw,abh);
      ctx.strokeStyle=sel?'#fff':onCD?'#444':ab.color;ctx.lineWidth=sel?2:1;ctx.strokeRect(abx,abY,abw,abh);
      ctx.fillStyle=onCD?'#666':ab.color;ctx.font='bold '+Math.round(fs*0.7)+'px Segoe UI';ctx.textAlign='center';
      ctx.fillText('['+( i+1)+']',abx+abw/2,abY+12);ctx.font=Math.round(fs*0.6)+'px Segoe UI';
      var words=ab.name.split(' ');if(words.length>1&&ab.name.length>10){ctx.fillText(words[0],abx+abw/2,abY+25);ctx.fillText(words.slice(1).join(' '),abx+abw/2,abY+36);}else{ctx.fillText(ab.name,abx+abw/2,abY+30);}
      if(onCD){ctx.fillStyle='#ff6644';ctx.font='bold '+Math.round(fs*0.8)+'px Segoe UI';ctx.fillText(ab.currentCooldown+'t',abx+abw/2,abY+abh-4);}
    } else {ctx.fillStyle='rgba(20,20,30,0.5)';ctx.fillRect(abx,abY,abw,abh);ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(abx,abY,abw,abh);ctx.fillStyle='#444';ctx.font=fs*0.8+'px Segoe UI';ctx.textAlign='center';ctx.fillText('['+(i+1)+']',abx+abw/2,abY+28);}
  }

  var logX=w-Math.min(350,w*0.4)-pad,logY=h-10;ctx.textAlign='left';
  for(var i=this.log.length-1;i>=0;i--){var entry=this.log[i];ctx.globalAlpha=0.5+(i/this.log.length)*0.5;ctx.fillStyle=entry.color;ctx.font=Math.round(fs*0.8)+'px Segoe UI';ctx.fillText(entry.text,logX,logY-(this.log.length-1-i)*(fs+2));}
  ctx.globalAlpha=1;
  if(this.abilityTargetMode){ctx.fillStyle='#ffcc44';ctx.font='bold '+fs+'px Segoe UI';ctx.textAlign='center';ctx.fillText('Arrow/WASD to aim, ESC cancel',w/2,pad+fs);}
};

Game.prototype.drawMinimap=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,sz=Math.min(200,w*0.25,h*0.3);
  var mx=w-sz-10,my=10,cw=sz/CONFIG.MAP_W,ch=sz/CONFIG.MAP_H;
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(mx-2,my-2,sz+4,sz+4);
  for(var y=0;y<CONFIG.MAP_H;y++)for(var x=0;x<CONFIG.MAP_W;x++){
    if(!this.dungeon.revealed[y][x])continue;var tile=this.dungeon.map[y][x];if(tile===T.VOID)continue;
    if(tile===T.WALL)ctx.fillStyle='#333';
    else if(tile===T.WATER)ctx.fillStyle='#224488';
    else if(tile===T.LAVA)ctx.fillStyle='#882200';
    else if(tile===T.FUNGAL)ctx.fillStyle='#226622';
    else if(tile===T.STAIRS)ctx.fillStyle='#ffcc44';
    else if(tile===T.SHRINE)ctx.fillStyle='#aa44ff';
    else if(tile===T.REST)ctx.fillStyle='#44ff88';
    else ctx.fillStyle='#555';
    ctx.fillRect(mx+x*cw,my+y*ch,Math.ceil(cw),Math.ceil(ch));
  }
  for(var i=0;i<this.enemies.length;i++){var e=this.enemies[i];if(!e.alive||!this.dungeon.revealed[e.y][e.x])continue;ctx.fillStyle=e.isBoss?'#ff0000':'#ff4444';ctx.fillRect(mx+e.x*cw-1,my+e.y*ch-1,3,3);}
  ctx.fillStyle='#44aaff';ctx.fillRect(mx+this.player.x*cw-2,my+this.player.y*ch-2,4,4);

  // Inventory below minimap
  var fs2=Math.max(10,Math.round(w*0.01));
  var iy=my+sz+8;
  var iw=sz+4;
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(mx-2,iy,iw,fs2*8.5);
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.strokeRect(mx-2,iy,iw,fs2*8.5);
  var ity=iy+fs2*1.2;
  ctx.fillStyle='#aaa';ctx.font='bold '+fs2+'px Segoe UI';ctx.textAlign='left';
  ctx.fillText('EQUIPMENT',mx+2,ity);ity+=fs2*1.5;
  // Weapon
  ctx.fillStyle='#776';ctx.font=fs2+'px Segoe UI';ctx.fillText('Weapon:',mx+2,ity);ity+=fs2*1.2;
  var p=this.player;
  ctx.fillStyle=p.weapon?'#ddaa44':'#555';ctx.font='bold '+fs2+'px Segoe UI';
  ctx.fillText(p.weapon?p.weapon.name:'Unarmed',mx+6,ity);ity+=fs2*1.5;
  // Armor
  ctx.fillStyle='#776';ctx.font=fs2+'px Segoe UI';ctx.fillText('Armor:',mx+2,ity);ity+=fs2*1.2;
  ctx.fillStyle=p.armor?'#88aacc':'#555';ctx.font='bold '+fs2+'px Segoe UI';
  ctx.fillText(p.armor?p.armor.name:'None',mx+6,ity);ity+=fs2*1.5;
  // Potions
  ctx.fillStyle=p.potions>0?'#ff44aa':'#553344';ctx.font='bold '+fs2+'px Segoe UI';
  ctx.fillText('Potions: '+p.potions,mx+2,ity);
};

Game.prototype.drawShrineOverlay=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(13,Math.round(w*0.013));
  // Dark overlay with purple tint
  ctx.fillStyle='rgba(10,5,20,0.85)';ctx.fillRect(0,0,w,h);
  // Glow behind title
  var grd=ctx.createRadialGradient(w/2,h*0.12,0,w/2,h*0.12,w*0.25);
  grd.addColorStop(0,'rgba(120,50,200,0.15)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,h*0.25);
  // Title
  ctx.fillStyle='#cc66ff';ctx.font='bold '+Math.round(fs*2)+'px Segoe UI';ctx.textAlign='center';
  ctx.fillText('SHRINE OF POWER',w/2,h*0.12);
  ctx.fillStyle='#998';ctx.font=Math.round(fs*0.9)+'px Segoe UI';
  ctx.fillText('Choose an ability (1-3) or ESC to leave',w/2,h*0.18);
  if(!this.shrineChoices)return;
  // Cards — calculate height from content using accumulated Y
  var cardW=Math.min(w*0.26,240);
  var gap=Math.min(w*0.03,30);
  var totalW=cardW*3+gap*2;
  var startX=(w-totalW)/2;
  var cardY=h*0.24;
  // Pre-calculate card height: badge + name + divider + element + shape + dmg/cd blocks + desc + accent + padding
  // Card height: badge row + icon + element label + dmg/cd + desc + padding
  var iconS=Math.min(Math.min(w*0.26,240)*0.4,fs*4);
  var cardH=Math.round(fs*1.3+fs*0.6+iconS+fs*0.6+fs*1.3+fs*1.8+fs*0.8+fs*1.0+fs*1.5);

  for(var i=0;i<3;i++){
    var ab=this.shrineChoices[i];
    var cx=startX+i*(cardW+gap), cy=cardY;
    // Card background with glow
    var pulse=0.6+Math.sin(this.animTimer*2+i*2)*0.2;
    ctx.shadowColor=ab.color;ctx.shadowBlur=15*pulse;
    ctx.fillStyle='rgba(15,10,30,0.95)';
    ctx.fillRect(cx,cy,cardW,cardH);
    ctx.shadowBlur=0;
    ctx.strokeStyle=ab.color;ctx.lineWidth=2;
    ctx.strokeRect(cx+1,cy+1,cardW-2,cardH-2);
    // Card content — accumulated ty, every item advances it
    var pad=fs*0.6;
    var ty=cy+pad;
    var ccx=cx+cardW/2; // card center x
    // Number badge — small, top-left corner
    var badgeS=Math.round(fs*1.3);
    ctx.fillStyle=ab.color;ctx.fillRect(cx+pad,ty,badgeS,badgeS);
    ctx.fillStyle='#000';ctx.font='bold '+fs+'px Segoe UI';ctx.textAlign='center';
    ctx.fillText(i+1,cx+pad+badgeS/2,ty+fs*0.9);
    // Name — right of badge, same row
    ctx.fillStyle='#fff';ctx.font='bold '+Math.round(fs*1.05)+'px Segoe UI';ctx.textAlign='left';
    ctx.fillText(ab.name,cx+pad+badgeS+pad,ty+fs*0.9);
    ty+=badgeS+pad;

    // Ability icon — drawn in a square area
    var iconS=Math.min(cardW*0.4,fs*4);
    var iconX=ccx-iconS/2, iconY=ty;
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(iconX,iconY,iconS,iconS);
    // Draw icon based on element + shape
    var ic=iconX+iconS/2, iy=iconY+iconS/2, ir=iconS*0.35;
    ctx.globalAlpha=0.8;
    if(ab.shape==='single'){
      // Single target: crosshair
      ctx.strokeStyle=ab.color;ctx.lineWidth=Math.max(1.5,fs/8);
      ctx.beginPath();ctx.arc(ic,iy,ir,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ic-ir*1.3,iy);ctx.lineTo(ic+ir*1.3,iy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ic,iy-ir*1.3);ctx.lineTo(ic,iy+ir*1.3);ctx.stroke();
    } else if(ab.shape==='line'){
      // Line: arrow pointing right
      ctx.fillStyle=ab.color;
      ctx.fillRect(ic-ir,iy-ir*0.2,ir*2,ir*0.4);
      ctx.beginPath();ctx.moveTo(ic+ir,iy-ir*0.5);ctx.lineTo(ic+ir*1.4,iy);ctx.lineTo(ic+ir,iy+ir*0.5);ctx.fill();
      // Trail dots
      ctx.globalAlpha=0.3;
      ctx.beginPath();ctx.arc(ic-ir*1.2,iy,ir*0.15,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ic-ir*1.5,iy,ir*0.1,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.8;
    } else if(ab.shape==='cone'){
      // Cone: fan shape
      ctx.fillStyle=ab.color;
      ctx.beginPath();ctx.moveTo(ic-ir,iy);ctx.lineTo(ic+ir,iy-ir*0.8);ctx.lineTo(ic+ir,iy+ir*0.8);ctx.closePath();ctx.fill();
    } else if(ab.shape==='ring'){
      // Ring: expanding circle
      ctx.strokeStyle=ab.color;ctx.lineWidth=Math.max(2,fs/6);
      ctx.beginPath();ctx.arc(ic,iy,ir*0.5,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=0.4;ctx.beginPath();ctx.arc(ic,iy,ir,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=0.8;
    } else if(ab.shape==='area'){
      // Area: filled square zone
      ctx.fillStyle=ab.color;ctx.globalAlpha=0.3;
      ctx.fillRect(ic-ir,iy-ir,ir*2,ir*2);
      ctx.globalAlpha=0.8;ctx.strokeStyle=ab.color;ctx.lineWidth=Math.max(1,fs/10);
      ctx.strokeRect(ic-ir,iy-ir,ir*2,ir*2);
    } else if(ab.shape==='self'){
      // Self: shield/aura around center dot
      ctx.fillStyle=ab.color;
      ctx.beginPath();ctx.arc(ic,iy,ir*0.3,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=ab.color;ctx.lineWidth=Math.max(1.5,fs/7);
      ctx.beginPath();ctx.arc(ic,iy,ir*0.7,Math.PI*0.8,Math.PI*2.2);ctx.stroke();
      ctx.beginPath();ctx.arc(ic,iy,ir*0.7,Math.PI*0.3,Math.PI*0.7);ctx.stroke();
    }
    // Element particles around icon
    ctx.fillStyle=ab.color;ctx.globalAlpha=0.5;
    for(var pi=0;pi<4;pi++){
      var pa=pi*Math.PI/2+this.animTimer*1.5;
      var ppx=ic+Math.cos(pa)*ir*1.1, ppy=iy+Math.sin(pa)*ir*1.1;
      ctx.beginPath();ctx.arc(ppx,ppy,Math.max(1,fs*0.12),0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    ty+=iconS+pad;

    // Element / shape label
    ctx.fillStyle='#aaa';ctx.font=Math.round(fs*0.8)+'px Segoe UI';ctx.textAlign='center';
    ctx.fillText(ab.element.toUpperCase()+' / '+ab.shape,ccx,ty);
    ty+=fs*1.3;

    // DMG and CD inline
    var bw2=cardW*0.38, blockH=fs*2.2;
    ctx.fillStyle='rgba(255,100,50,0.15)';ctx.fillRect(cx+cardW*0.06,ty,bw2,blockH);
    ctx.fillStyle='#ff8855';ctx.font='bold '+Math.round(fs*0.7)+'px Segoe UI';
    ctx.fillText('DMG',cx+cardW*0.06+bw2/2,ty+fs*0.7);
    ctx.fillStyle='#fff';ctx.font='bold '+Math.round(fs*0.95)+'px Segoe UI';
    ctx.fillText(ab.damage,cx+cardW*0.06+bw2/2,ty+fs*1.7);
    ctx.fillStyle='rgba(80,150,255,0.15)';ctx.fillRect(cx+cardW*0.56,ty,bw2,blockH);
    ctx.fillStyle='#6699ff';ctx.font='bold '+Math.round(fs*0.7)+'px Segoe UI';
    ctx.fillText('CD',cx+cardW*0.56+bw2/2,ty+fs*0.7);
    ctx.fillStyle='#fff';ctx.font='bold '+Math.round(fs*0.95)+'px Segoe UI';
    ctx.fillText(ab.cooldown,cx+cardW*0.56+bw2/2,ty+fs*1.7);
    ty+=blockH+fs*0.8;

    // Description
    var desc=ab.verb==='strike'?'Direct attack':ab.verb==='launch'?'Ranged projectile':ab.verb==='place'?'Lingering zone':ab.verb==='dash'?'Dash + damage':ab.verb==='shield'?'Defense buff':'Drain life';
    ctx.fillStyle='#778';ctx.font=Math.round(fs*0.75)+'px Segoe UI';ctx.textAlign='center';
    ctx.fillText(desc,ccx,ty);

    // Bottom accent bar
    ctx.fillStyle=ab.color;
    ctx.fillRect(cx+8,cy+cardH-6,cardW-16,3);
  }
};

Game.prototype.drawReplaceOverlay=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(13,Math.round(w*0.013));
  ctx.fillStyle='rgba(10,8,5,0.88)';ctx.fillRect(0,0,w,h);
  // Glow
  var grd=ctx.createRadialGradient(w/2,h*0.12,0,w/2,h*0.12,w*0.2);
  grd.addColorStop(0,'rgba(200,150,40,0.1)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,h*0.25);
  ctx.fillStyle='#ffcc44';ctx.font='bold '+Math.round(fs*1.8)+'px Segoe UI';ctx.textAlign='center';

  // New ability card at top
  if(this._pendingAbility){
    var ab=this._pendingAbility;
    var nw=Math.min(w*0.5,350),nh=Math.round(fs*4.5);

  var startY=h*0.41;
  for(var i=0;i<this.player.abilities.length;i++){
    var ab=this.player.abilities[i];

    ctx.strokeStyle=ab.color;ctx.lineWidth=1;ctx.strokeRect(cx,cy,cardW,cardH);

    ctx.fillText(i+1,cx+6+Math.round(fs*0.8),cy+cardH/2+fs*0.35);
    // Name
    ctx.fillStyle='#fff';ctx.font='bold '+fs+'px Segoe UI';ctx.textAlign='left';
    ctx.fillText(ab.name,cx+Math.round(fs*2.2),cy+fs*1.3);
    // Stats on right side
    ctx.fillStyle='#999';ctx.font=Math.round(fs*0.8)+'px Segoe UI';ctx.textAlign='right';
    ctx.fillText(ab.element+' \u2022 '+ab.shape,cx+cardW-10,cy+fs*1.0);
    ctx.fillText('DMG:'+ab.damage+'  CD:'+ab.cooldown,cx+cardW-10,cy+fs*2.2);
    ctx.textAlign='center';
  }
};

Game.prototype.drawLootPrompt=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(14,Math.round(w*0.015));
  var loot=this._pendingLoot;if(!loot)return;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,w,h);
  var boxW=Math.min(380,w*0.45),boxH=0;
  var bx=(w-boxW)/2;
  // Calculate height first using accumulated approach
  var lines=[];
  lines.push({text:'ITEM FOUND',font:'bold '+Math.round(fs*1.5)+'px Segoe UI',color:'#ffcc44',h:fs*2.0});
  lines.push({text:loot.name,font:'bold '+Math.round(fs*1.3)+'px Segoe UI',color:loot.color,h:fs*1.8});
  lines.push({text:loot.desc,font:Math.round(fs*0.9)+'px Segoe UI',color:'#aaa',h:fs*1.4});
  if(loot.type==='weapon') lines.push({text:'DMG: '+loot.damage+(loot.range>1?'  Range: '+loot.range:'  Melee')+'  CD: '+(loot.cd||0),font:Math.round(fs*0.85)+'px Segoe UI',color:'#ccc',h:fs*1.4});
  if(loot.type==='armor') lines.push({text:'Defense: +'+loot.defense,font:Math.round(fs*0.85)+'px Segoe UI',color:'#ccc',h:fs*1.4});
  // Current equipment comparison with stats
  lines.push({h:fs*0.4}); // spacer
  var current=loot.type==='weapon'?this.player.weapon:this.player.armor;
  if(current){
    lines.push({text:'Currently equipped:',font:Math.round(fs*0.8)+'px Segoe UI',color:'#777',h:fs*1.2});
    lines.push({text:current.name,font:'bold '+Math.round(fs*0.95)+'px Segoe UI',color:'#aaa',h:fs*1.3});
    if(loot.type==='weapon'&&current.damage!=null){
      var diff=loot.damage-current.damage;
      var diffCol=diff>0?'#44ff44':diff<0?'#ff4444':'#888';
      lines.push({text:'DMG: '+current.damage+' \u2192 '+loot.damage+' ('+(diff>0?'+':'')+diff+')',font:Math.round(fs*0.85)+'px Segoe UI',color:diffCol,h:fs*1.3});
    }
    if(loot.type==='armor'&&current.defense!=null){
      var diff=loot.defense-current.defense;
      var diffCol=diff>0?'#44ff44':diff<0?'#ff4444':'#888';
      lines.push({text:'DEF: '+current.defense+' \u2192 '+loot.defense+' ('+(diff>0?'+':'')+diff+')',font:Math.round(fs*0.85)+'px Segoe UI',color:diffCol,h:fs*1.3});
    }
  } else {
    lines.push({text:'Nothing equipped',font:Math.round(fs*0.8)+'px Segoe UI',color:'#666',h:fs*1.3});
  }
  lines.push({h:fs*0.5}); // spacer
  lines.push({text:'[Y] Equip    [N] Leave',font:'bold '+fs+'px Segoe UI',color:'#aab',h:fs*1.6});
  for(var i=0;i<lines.length;i++) boxH+=lines[i].h;
  boxH+=fs*2; // padding
  var by=(h-boxH)/2;
  // Draw box
  ctx.fillStyle='rgba(15,10,25,0.95)';ctx.fillRect(bx,by,boxW,boxH);
  ctx.strokeStyle=loot.color;ctx.lineWidth=2;ctx.strokeRect(bx,by,boxW,boxH);
  // Draw lines with accumulated Y
  var ty=by+fs*1.2;
  ctx.textAlign='center';
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(line.text){ctx.fillStyle=line.color;ctx.font=line.font;ctx.fillText(line.text,w/2,ty);}
    ty+=line.h;
  }
};

Game.prototype.drawDeathOverlay=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(16,Math.round(w*0.02));
  ctx.fillStyle='rgba(30,0,0,0.8)';ctx.fillRect(0,0,w,h);
  var grd=ctx.createRadialGradient(w/2,h*0.35,h*0.05,w/2,h*0.35,h*0.5);
  grd.addColorStop(0,'rgba(80,0,0,0.3)');grd.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
  // Title
  ctx.fillStyle='#220000';ctx.font='bold '+Math.round(fs*3)+'px Segoe UI';ctx.textAlign='center';
  ctx.fillText('YOU DIED',w/2+3,h*0.22+3);
  ctx.fillStyle='#ff3333';
  ctx.fillText('YOU DIED',w/2,h*0.22);
  // Stats box — size from content
  var boxW=Math.min(360,w*0.4),lineH=fs*1.8;
  var pad2=fs*1.0;
  var boxH=pad2+lineH*4+pad2; // top pad + 4 lines + bottom pad
  var bx=(w-boxW)/2,by=h*0.3;
  ctx.fillStyle='rgba(20,5,5,0.7)';ctx.fillRect(bx,by,boxW,boxH);
  ctx.strokeStyle='rgba(255,50,50,0.3)';ctx.lineWidth=1;ctx.strokeRect(bx,by,boxW,boxH);
  var ty=by+pad2+fs*0.3; // start inside top padding
  ctx.fillStyle='#ccc';ctx.font=fs+'px Segoe UI';
  ctx.fillText('Reached Floor '+this.player.floor,w/2,ty);ty+=lineH;
  ctx.fillText('Kills: '+this.player.kills,w/2,ty);ty+=lineH;
  ctx.fillStyle='#ffcc44';
  ctx.fillText('Best: Floor '+this.meta.depthRecord,w/2,ty);ty+=lineH;
  ctx.fillStyle='#888';ctx.font=Math.round(fs*0.85)+'px Segoe UI';
  ctx.fillText('Runs: '+this.meta.totalRuns+'  Total Kills: '+this.meta.totalKills,w/2,ty);
  // Continue prompt — always below the box with clear gap
  var promptY=by+boxH+fs*3;
  ctx.fillStyle='#998';ctx.font=Math.round(fs*0.95)+'px Segoe UI';
  var pulse=0.4+Math.sin(this.animTimer*2)*0.3;
  ctx.globalAlpha=pulse+0.3;
  ctx.fillText('Press any key to continue',w/2,promptY);
  ctx.globalAlpha=1;
};

Game.prototype.drawTitle=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(14,Math.round(w*0.015));
  var c=this.customization;
  ctx.fillStyle='#040410';ctx.fillRect(0,0,w,h);

  // Title
  ctx.fillStyle='#4466aa';ctx.font='bold '+Math.round(fs*2.8)+'px Segoe UI';ctx.textAlign='center';
  ctx.fillText('DEPTHS',w/2,h*0.1);
  ctx.fillStyle='#556';ctx.font=Math.round(fs*1)+'px Segoe UI';
  ctx.fillText('How deep can you go?',w/2,h*0.15);

  if(this.meta.depthRecord>0){
    ctx.fillStyle='#666';ctx.font=Math.round(fs*0.85)+'px Segoe UI';
    ctx.fillText('Best: Floor '+this.meta.depthRecord+'  Runs: '+this.meta.totalRuns+'  Kills: '+this.meta.totalKills,w/2,h*0.19);
  }

  // Character preview — draw large in center-left
  var previewSize=Math.min(160,w*0.18,h*0.25);
  var px=w*0.28-previewSize/2, py=h*0.32;
  // Background circle
  ctx.fillStyle='rgba(30,30,60,0.6)';
  ctx.beginPath();ctx.arc(px+previewSize/2,py+previewSize/2,previewSize*0.6,0,Math.PI*2);ctx.fill();
  // Draw character at preview size with selected weapon
  var pWalk=(this.animTimer*0.8)%1;
  var selWpn=this.START_WEAPONS[c.startWpnIdx];
  drawCharPixel(ctx, px, py, previewSize,
    this.BODY_COLORS[c.bodyIdx], this.EYE_COLORS[c.eyeIdx],
    this.SKIN_COLORS[c.skinIdx], selWpn.color, pWalk,
    {hairStyle:this.HAIR_STYLES[c.hairStyleIdx], hairColor:this.HAIR_COLORS[c.hairIdx],
     weaponType:selWpn.key, body:this.BODIES[c.bodyIdx], height:this.HEIGHTS[c.heightIdx], frame:this.FRAMES[c.frameIdx]});

  // Options panel — right side, accumulated Y
  var optX=w*0.5, valX=optX+w*0.1;
  var labels=['Outfit','Hair Color','Hair Style','Skin','Eyes','Body','Height','Frame','Weapon'];
  var numRows=labels.length;
  // Calculate row height to fit between top content and bottom prompts
  var topY=h*0.22;
  var botY=h*0.76; // where options must end, leaving room for prompts
  var weaponExtra=fs*1.0; // extra space for weapon desc
  var availH=botY-topY-weaponExtra;
  var rowH=Math.min(Math.round(fs*2.4),Math.floor(availH/numRows));
  var ty=topY;

  for(var i=0;i<numRows;i++){
    var selected=c.cursor===i;
    var thisRowH=(i===numRows-1)?rowH+weaponExtra:rowH; // weapon row taller for desc
    // Highlight
    if(selected){
      ctx.fillStyle='rgba(60,60,120,0.4)';
      ctx.fillRect(optX-w*0.15,ty,w*0.4,thisRowH);
      ctx.fillStyle='#aaccff';
    } else { ctx.fillStyle='#667'; }
    // Label
    ctx.font=(selected?'bold ':'')+fs+'px Segoe UI';ctx.textAlign='left';
    ctx.fillText(labels[i]+':',optX-w*0.14,ty+fs*1.1);
    // Value
    ctx.textAlign='center';
    if(i===2||i===5||i===6||i===7){
      // Text toggle options
      var txt;
      if(i===2) txt=this.HAIR_STYLES[c.hairStyleIdx];
      else if(i===5) txt=this.BODIES[c.bodyIdx];
      else if(i===6) txt=this.HEIGHTS[c.heightIdx];
      else txt=this.FRAMES[c.frameIdx];
      ctx.fillStyle=selected?'#fff':'#aaa';ctx.font=fs+'px Segoe UI';
      ctx.fillText(txt,valX,ty+fs*1.1);
    } else if(i===numRows-1){
      // Weapon: name on first line, desc on second
      var wpn=this.START_WEAPONS[c.startWpnIdx];
      ctx.fillStyle=wpn.color;ctx.font=(selected?'bold ':'')+fs+'px Segoe UI';
      ctx.fillText(wpn.name,valX,ty+fs*1.0);
      ctx.fillStyle='#888';ctx.font=Math.round(fs*0.75)+'px Segoe UI';
      ctx.fillText(wpn.desc,valX,ty+fs*2.2);
    } else {
      // Color swatch (rows 0=outfit, 1=hair color, 3=skin, 4=eyes)
      var sc=i===0?this.BODY_COLORS[c.bodyIdx]:i===1?this.HAIR_COLORS[c.hairIdx]:i===4?this.EYE_COLORS[c.eyeIdx]:this.SKIN_COLORS[c.skinIdx];
      ctx.fillStyle=sc;
      ctx.fillRect(valX-fs*1.5,ty+fs*0.3,fs*3,fs*1.2);
      ctx.strokeStyle=selected?'#fff':'#555';ctx.lineWidth=selected?2:1;
      ctx.strokeRect(valX-fs*1.5,ty+fs*0.3,fs*3,fs*1.2);
    }
    // Arrows
    if(selected){
      ctx.fillStyle='#ffcc44';ctx.font='bold '+Math.round(fs*1.2)+'px Segoe UI';ctx.textAlign='center';
      var arrowW=(i===numRows-1)?fs*5:(i===2||i>=5)?fs*3:fs*2.5;
      ctx.fillText('\u25C0',valX-arrowW,ty+fs*1.1);
      ctx.fillText('\u25B6',valX+arrowW,ty+fs*1.1);
    }
    ty+=thisRowH; // accumulate Y
  }

  // Controls hint
  ctx.fillStyle='#556';ctx.font=Math.round(fs*0.8)+'px Segoe UI';ctx.textAlign='center';
  var cy=h*0.82;
  var isMobile=matchMedia('(pointer: coarse)').matches;
  ctx.fillText(isMobile?'D-pad to customise    START to begin':'\u2191\u2193 Select    \u2190\u2192 Change    ENTER to begin',w/2,cy);
  ctx.fillStyle='#445';ctx.font=Math.round(fs*0.7)+'px Segoe UI';
  ctx.fillText('WASD move \u2022 1-4 abilities \u2022 P potion \u2022 Space wait \u2022 Tab map \u2022 M mute',w/2,cy+fs*1.3);

  // Pulsing start prompt
  ctx.fillStyle='#aab';ctx.font='bold '+Math.round(fs*1.1)+'px Segoe UI';
  ctx.globalAlpha=0.5+Math.sin(this.animTimer*3)*0.3+0.2;
  ctx.fillText(isMobile?'Press START below':'Press ENTER to begin',w/2,h*0.94);ctx.globalAlpha=1;
};

new Game();
</script>
