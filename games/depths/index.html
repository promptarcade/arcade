    const h = this._canvas ? this._canvas.height : ctx.canvas.height;
    this._screen.drawFlashes(ctx, w, h);
  }

  /**
   * Remove all active effects.
   */
  clear() {
    for (let i = 0; i < this._emitters.length; i++) {
      this._emitters[i].destroy();
    }
    this._emitters.length = 0;
    for (let i = 0; i < this._trails.length; i++) {
      this._trails[i].destroy();
    }
    this._trails.length = 0;
    this._shockwaves.length = 0;
    this._specialEffects.length = 0;
    this._pool.clear();
    this._screen.clear();
  }

  // ----------------------------------------------------------
  // Emitter management
  // ----------------------------------------------------------

  /**
   * Create and register an emitter.
   * @param {object} config - Emitter configuration
   * @returns {Emitter}
   */
  createEmitter(config) {
    const e = new Emitter(config, this._pool);
    this._emitters.push(e);
    return e;
  }

  /**
   * Remove a specific emitter.
   * @param {Emitter} emitter
   */
  removeEmitter(emitter) {
    const idx = this._emitters.indexOf(emitter);
    if (idx !== -1) {
      emitter.destroy();
      this._emitters.splice(idx, 1);
    }
  }

  // ----------------------------------------------------------
  // Trail management
  // ----------------------------------------------------------

  /**
   * Create and register a trail.
   * @param {object} target - Entity with x, y
   * @param {object} config - Trail configuration
   * @returns {Trail}
   */
  createTrail(target, config) {
    const t = new Trail(target, config);
    this._trails.push(t);
    return t;
  }

  /**
   * Remove a specific trail.
   * @param {Trail} trail
   */
  removeTrail(trail) {
    const idx = this._trails.indexOf(trail);
    if (idx !== -1) {
      trail.destroy();
      this._trails.splice(idx, 1);
    }
  }

  // ----------------------------------------------------------
  // Shockwave
  // ----------------------------------------------------------

  /**
   * Create an expanding shockwave ring.
   * @param {number} x
   * @param {number} y
   * @param {object} [config]
   * @returns {Shockwave}
   */
  shockwave(x, y, config) {
    const s = new Shockwave(x, y, config);
    this._shockwaves.push(s);
    return s;
  }

  // ----------------------------------------------------------
  // Screen effects
  // ----------------------------------------------------------

  /**
   * Screen shake effect.
   * @param {number} intensity - Max pixel offset
   * @param {number} duration - Duration in seconds
   * @param {object} [opts]
   * @param {string} [opts.decay='exp'] - 'linear' or 'exp'
   * @param {number} [opts.directionX=1] - X multiplier
   * @param {number} [opts.directionY=1] - Y multiplier
   */
  shake(intensity, duration, opts) {
    this._screen.shake(intensity, duration, opts);
  }

  /**
   * Full-screen color flash overlay.
   * @param {string} color - Hex color
   * @param {number} duration - Duration in seconds
   */
  flash(color, duration) {
    this._screen.flash(color, duration);
  }

  /**
   * Hit stop / freeze frame. timeScale returns 0 for the duration.
   * @param {number} duration - Freeze duration in seconds
   */
  hitStop(duration) {
    this._screen.hitStop(duration);
  }

  /**
   * Slow motion with recovery back to normal speed.
   * @param {number} scale - Time scale (e.g. 0.3)
   * @param {number} recovery - Duration to recover to 1.0, in seconds
   */
  slowMotion(scale, recovery) {
    this._screen.slowMotion(scale, recovery);
  }

  /**
   * Sustained low-intensity shake.
   * @param {number} intensity - Pixel offset
   * @param {number} duration - Duration in seconds
   */
  rumble(intensity, duration) {
    this._screen.rumble(intensity, duration);
  }

  // ----------------------------------------------------------
  // Presets
  // ----------------------------------------------------------

  /**
   * Explosion — burst of fragments with a brief flash.
   * @param {number} x
   * @param {number} y
   * @param {object} [opts]
   * @param {string|string[]} [opts.color] - Particle colors
   * @param {number} [opts.count=40] - Number of particles
   * @param {number} [opts.spread=Math.PI*2] - Angle spread
   * @param {number} [opts.speed=200] - Particle speed
   * @returns {Emitter}
   */
  explosion(x, y, opts = {}) {
    const color = opts.color || ['#ffcc33', '#ff6600', '#ff3300', '#882200'];
    const count = opts.count || 40;
    const spread = opts.spread != null ? opts.spread : TWO_PI;
    const speed = opts.speed || 200;

    // Main burst
    const e = this.createEmitter({
      position: { x, y },
      emitRate: 0,
      burstCount: count,
      particle: {
        life: [0.3, 0.8],
        speed: [speed * 0.3, speed],
        angle: [-Math.PI + spread / 2, -Math.PI + spread / 2 + spread],
        size: [3, 8],
        sizeOverLife: [8, 0],
        color: Array.isArray(color) ? color : [color],
        alpha: 1,
        alphaOverLife: [1, 0],
        gravity: 150,
        drag: 0.96,
        shape: 'circle',
      },
      blendMode: 'lighter',
    });

    // Flash particles (bright white core)
    this.createEmitter({
      position: { x, y },
      emitRate: 0,
      burstCount: Math.max(5, count / 4) | 0,
      particle: {
        life: [0.1, 0.25],
        speed: [speed * 0.1, speed * 0.4],
        angle: [0, TWO_PI],
        size: [6, 14],
        sizeOverLife: [14, 0],
        color: ['#ffffff', '#ffffaa'],
        alpha: 1,
        alphaOverLife: [1, 0],
        drag: 0.9,
        shape: 'circle',
      },
      blendMode: 'lighter',
    });

    // Screen effects
    this.flash('#ff8800', 0.15);
    this.shake(6, 0.3);

    return e;
  }

  /**
   * Fire — continuous upward stream.
   * @param {number} x
   * @param {number} y
   * @param {object} [opts]
   * @param {string|string[]} [opts.color]
   * @param {number} [opts.intensity=40] - Emit rate
   * @param {number} [opts.width=20] - Emitter width
   * @returns {Emitter}
   */
  fire(x, y, opts = {}) {
    const color = opts.color || ['#ffee66', '#ffaa00', '#ff4400', '#441100'];
    const intensity = opts.intensity || 40;
    const width = opts.width || 20;

    return this.createEmitter({
      position: { x, y },
      emitRate: intensity,
      emitShape: 'rect',
      emitWidth: width,
      emitHeight: 4,
      duration: Infinity,
      particle: {
        life: [0.4, 0.9],
        speed: [30, 80],
        angle: [-Math.PI / 2 - 0.3, -Math.PI / 2 + 0.3],
        size: [4, 10],
        sizeOverLife: [10, 0],
        color: Array.isArray(color) ? color : [color],
        alpha: 0.9,
        alphaOverLife: [0.9, 0],
        gravity: -40,
        drag: 0.97,
        shape: 'circle',
      },
      blendMode: 'lighter',
    });
  }

  /**
   * Smoke — gray particles drifting upward, expanding, fading.
   * @param {number} x
   * @param {number} y
   * @param {object} [opts]
   * @param {string|string[]} [opts.color]
   * @param {number} [opts.density=15] - Emit rate
   * @param {number} [opts.rise=40] - Upward speed
   * @returns {Emitter}
   */
  smoke(x, y, opts = {}) {
    const color = opts.color || ['#888888', '#666666', '#444444'];
    const density = opts.density || 15;
    const rise = opts.rise || 40;

    return this.createEmitter({
      position: { x, y },
      emitRate: density,
      emitShape: 'circle',
      emitRadius: 8,
      duration: Infinity,
      particle: {
        life: [1.0, 2.5],
        speed: [rise * 0.5, rise],
        angle: [-Math.PI / 2 - 0.5, -Math.PI / 2 + 0.5],
        size: [6, 14],
        sizeOverLife: [8, 30],
        color: Array.isArray(color) ? color : [color],
        alpha: 0.5,
        alphaOverLife: [0.5, 0],
        gravity: -10,
        drag: 0.98,
        shape: 'circle',
      },
      blendMode: 'source-over',
    });
  }

  /**
   * Sparks — small bright particles in a direction.
   * @param {number} x
   * @param {number} y
   * @param {object} [opts]
   * @param {string|string[]} [opts.color]
   * @param {number} [opts.count=15]
   * @param {number} [opts.direction=(-PI/4)] - Center angle
   * @param {number} [opts.spread=0.8] - Angle spread
   * @returns {Emitter}
   */
  sparks(x, y, opts = {}) {
    const color = opts.color || ['#ffffff', '#ffff66', '#ffaa00'];
    const count = opts.count || 15;
    const dir = opts.direction != null ? opts.direction : -Math.PI / 4;
    const spread = opts.spread != null ? opts.spread : 0.8;

    return this.createEmitter({
      position: { x, y },
      emitRate: 0,
      burstCount: count,
      particle: {

// ========== SPRITE FORGE ==========

/**
 * Sprite Forge - Procedural Sprite Generation & Animation System
 * Generates sprite sheets at runtime from templates and parameters.
 * Zero dependencies, pure ES module, canvas 2D primitives only.
 * @module sprite-forge
 */

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------

/**
 * Create a canvas of given dimensions, preferring OffscreenCanvas.
 * @param {number} w
 * @param {number} h
 * @returns {HTMLCanvasElement|OffscreenCanvas}
 */
function sf_makeCanvas(w, h) {
  if (typeof OffscreenCanvas !== 'undefined') {
    return new OffscreenCanvas(w, h);
  }
  const c = document.createElement('canvas');
  c.width = w;
  c.height = h;
  return c;
}

/** Simple seeded PRNG (mulberry32) */
function seededRNG(seed) {
  let s = seed | 0;
  return () => {
    s = (s + 0x6d2b79f5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/** Hash a string to a 32-bit int */
function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return h;
}

/** Parse any CSS color string to {r,g,b,a} */
function sf_parseColor(c) {
  if (typeof c === 'object' && 'r' in c) return c;
  const cv = sf_makeCanvas(1, 1);
  const cx = cv.getContext('2d');
  cx.fillStyle = c;
  cx.fillRect(0, 0, 1, 1);
  const d = cx.getImageData(0, 0, 1, 1).data;
  return { r: d[0], g: d[1], b: d[2], a: d[3] / 255 };
}

/** Convert {r,g,b} to CSS string */
function rgbStr(c) {
  return `rgb(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)})`;
}

function rgbaStr(c, a) {
  return `rgba(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)},${a})`;
}



/** Darken a parsed color by amount (0-1) */
function darkenRGB(c, amt) {
  return { r: c.r * (1 - amt), g: c.g * (1 - amt), b: c.b * (1 - amt), a: c.a ?? 1 };
}

/** Lighten a parsed color by amount (0-1) */
function lightenRGB(c, amt) {
  return {
    r: c.r + (255 - c.r) * amt,
    g: c.g + (255 - c.g) * amt,
    b: c.b + (255 - c.b) * amt,
    a: c.a ?? 1,
  };
}

/** Mix two parsed colors */
function mixRGB(a, b, t) {
  return { r: lerp(a.r, b.r, t), g: lerp(a.g, b.g, t), b: lerp(a.b, b.b, t), a: lerp(a.a ?? 1, b.a ?? 1, t) };
}

/** HSL to RGB (h in degrees, s,l 0-1) → {r,g,b} 0-255 */
function hslToRGB(h, s, l) {
  h = ((h % 360) + 360) % 360;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60) { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else { r = c; g = 0; b = x; }
  return { r: (r + m) * 255, g: (g + m) * 255, b: (b + m) * 255 };
}

/** Draw a 1px outlined shape helpers */
/**
 * Bottom-align sprite content within a frame.
 * Scans for the lowest non-transparent row and shifts content down so it
 * touches the bottom of the frame. Call after drawing a frame.
 * @param {CanvasRenderingContext2D} ctx - context of the sprite sheet canvas
 * @param {number} fx - frame x offset on the sheet
 * @param {number} fy - frame y offset on the sheet
 * @param {number} fw - frame width
 * @param {number} fh - frame height
 */
function bottomAlignFrame(ctx, fx, fy, fw, fh) {
  const imgData = ctx.getImageData(fx, fy, fw, fh);
  const d = imgData.data;
  // Find lowest row with any non-transparent pixel
  let bottomRow = -1;
  for (let row = fh - 1; row >= 0; row--) {
    for (let col = 0; col < fw; col++) {
      if (d[(row * fw + col) * 4 + 3] > 10) { // alpha > 10
        bottomRow = row;
        break;
      }
    }
    if (bottomRow >= 0) break;
  }
  if (bottomRow < 0 || bottomRow >= fh - 2) return; // empty or already at bottom
  const shift = fh - 1 - bottomRow;
  if (shift < 1) return;
  // Copy frame, clear, redraw shifted down
  const copy = ctx.getImageData(fx, fy, fw, fh);
  ctx.clearRect(fx, fy, fw, fh);
  ctx.putImageData(copy, fx, fy + shift, 0, 0, fw, fh - shift);
}

function outlinedRect(ctx, x, y, w, h, fill, outlineColor = '#000') {
  ctx.fillStyle = outlineColor;
  ctx.fillRect(Math.floor(x - 1), Math.floor(y - 1), Math.ceil(w + 2), Math.ceil(h + 2));
  ctx.fillStyle = fill;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(w), Math.ceil(h));
}

function outlinedCircle(ctx, cx, cy, r, fill, outlineColor = '#000') {
  ctx.beginPath();
  ctx.arc(Math.floor(cx), Math.floor(cy), r + 1, 0, Math.PI * 2);
  ctx.fillStyle = outlineColor;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(Math.floor(cx), Math.floor(cy), r, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
}

function outlinedEllipse(ctx, cx, cy, rx, ry, fill, outlineColor = '#000') {
  ctx.beginPath();
  ctx.ellipse(Math.floor(cx), Math.floor(cy), rx + 1, ry + 1, 0, 0, Math.PI * 2);
  ctx.fillStyle = outlineColor;
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(Math.floor(cx), Math.floor(cy), rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
}

function outlinedPoly(ctx, points, fill, outlineColor = '#000') {
  // outline
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  ctx.closePath();
  ctx.lineWidth = 2;
  ctx.strokeStyle = outlineColor;
  ctx.stroke();
  ctx.fillStyle = fill;
  ctx.fill();
}

function shade3(baseColor, darkenAmt = 0.3, lightenAmt = 0.3) {
  const base = sf_parseColor(baseColor);
  return {
    base: rgbStr(base),
    shadow: rgbStr(darkenRGB(base, darkenAmt)),
    highlight: rgbStr(lightenRGB(base, lightenAmt)),
  };
}

/**
 * Grid-based sprite sheet backed by a single canvas.
 */
class SpriteSheet {
  /**
   * @param {HTMLCanvasElement|OffscreenCanvas} canvas - The backing canvas
   * @param {number} frameWidth - Width of each frame in pixels
   * @param {number} frameHeight - Height of each frame in pixels
   * @param {number} cols - Number of columns in the grid
   * @param {number} rows - Number of rows in the grid
   */
  constructor(canvas, frameWidth, frameHeight, cols, rows) {
    this.canvas = canvas;
    this.frameWidth = frameWidth;
    this.frameHeight = frameHeight;
    this.cols = cols;
    this.rows = rows;
    this.totalFrames = cols * rows;
    /** @type {Map<string, number>} */
    this._names = new Map();
  }

  /**
   * Get frame rectangle by index.
   * @param {number} index
   * @returns {{ x: number, y: number, w: number, h: number, canvas: HTMLCanvasElement|OffscreenCanvas }}
   */
  getFrame(index) {
    const col = index % this.cols;
    const row = Math.floor(index / this.cols);
    return {
      x: col * this.frameWidth,
      y: row * this.frameHeight,
      w: this.frameWidth,
      h: this.frameHeight,
      canvas: this.canvas,
    };
  }

  /**
   * Get frame by name.
   * @param {string} name
   * @returns {{ x: number, y: number, w: number, h: number, canvas: HTMLCanvasElement|OffscreenCanvas }|null}
   */
  getFrameByName(name) {
    const idx = this._names.get(name);
    return idx !== undefined ? this.getFrame(idx) : null;
  }

  /**
   * Set a name for a frame index.
   * @param {string} name
   * @param {number} index
   */
  nameFrame(name, index) {
    this._names.set(name, index);
  }

  /**
   * Draw a single frame onto a target context with transforms.
   * @param {CanvasRenderingContext2D} ctx
   * @param {number} index
   * @param {number} x
   * @param {number} y
   * @param {object} [opts]
   * @param {boolean} [opts.flipX=false]
   * @param {boolean} [opts.flipY=false]
   * @param {number} [opts.scale=1]
   * @param {number} [opts.rotation=0] - Radians
   * @param {number} [opts.alpha=1]
   * @param {string} [opts.tint] - CSS color to tint the sprite
   */
  drawFrame(ctx, index, x, y, opts = {}) {
    const { flipX = false, flipY = false, scale = 1, rotation = 0, alpha = 1, tint } = opts;
    const frame = this.getFrame(index);
    const w = frame.w * scale;
    const h = frame.h * scale;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x + w / 2, y + h / 2);
    if (rotation) ctx.rotate(rotation);
    ctx.scale(flipX ? -1 : 1, flipY ? -1 : 1);

    if (tint) {
      // Draw to temp canvas, apply tint via composite
      const tmp = sf_makeCanvas(frame.w, frame.h);
      const tc = tmp.getContext('2d');
      tc.drawImage(frame.canvas, frame.x, frame.y, frame.w, frame.h, 0, 0, frame.w, frame.h);
      tc.globalCompositeOperation = 'source-atop';
      tc.fillStyle = tint;
      tc.fillRect(0, 0, frame.w, frame.h);
      tc.globalCompositeOperation = 'destination-in';
      tc.drawImage(frame.canvas, frame.x, frame.y, frame.w, frame.h, 0, 0, frame.w, frame.h);
      ctx.drawImage(tmp, -w / 2, -h / 2, w, h);
    } else {
      ctx.drawImage(frame.canvas, frame.x, frame.y, frame.w, frame.h, -w / 2, -h / 2, w, h);
    }
    ctx.restore();
  }
}

// ---------------------------------------------------------------------------
// SpriteAnimator
// ---------------------------------------------------------------------------

/**
 * Frame-based sprite animation controller.
 */
class SpriteAnimator {
  /**
   * @param {SpriteSheet} sheet
   * @param {Object<string, {frames: number[], speed: number, loop?: boolean, pingpong?: boolean, onComplete?: Function}>} animations
   */
  constructor(sheet, animations) {
    this.sheet = sheet;
    this.animations = animations;
    this._current = null;
    this._frameIdx = 0;
    this._timer = 0;
    this._playing = false;
    this._paused = false;
    this._direction = 1; // for pingpong
    this._onComplete = null;
    this._loop = true;
  }

  /**
   * Play a named animation.
   * @param {string} name
   * @param {object} [opts]
   * @param {boolean} [opts.loop]
   * @param {Function} [opts.onComplete]
   */
  play(name, opts = {}) {
    const anim = this.animations[name];
    if (!anim) return;
    this._current = name;
    this._frameIdx = 0;
    this._timer = 0;
    this._playing = true;
    this._paused = false;
    this._direction = 1;
    this._loop = opts.loop !== undefined ? opts.loop : (anim.loop !== undefined ? anim.loop : true);
    this._onComplete = opts.onComplete || anim.onComplete || null;
  }

  /** Stop and reset animation. */
  stop() {
    this._playing = false;
    this._paused = false;
    this._frameIdx = 0;
    this._timer = 0;
  }

  /** Pause the current animation. */
  pause() {
    if (this._playing) this._paused = true;
  }

  /** Resume a paused animation. */
  resume() {
    if (this._paused) this._paused = false;
  }

  /**
   * Advance animation by delta time (seconds).
   * @param {number} dt
   */
  update(dt) {
    if (!this._playing || this._paused || !this._current) return;
    const anim = this.animations[this._current];
    if (!anim) return;

    this._timer += dt;
    if (this._timer >= anim.speed) {
      this._timer -= anim.speed;
      if (anim.pingpong) {
        this._frameIdx += this._direction;
        if (this._frameIdx >= anim.frames.length - 1) {
          this._frameIdx = anim.frames.length - 1;
          this._direction = -1;
        } else if (this._frameIdx <= 0) {
          this._frameIdx = 0;
          this._direction = 1;
          if (!this._loop) {
            this._playing = false;
            if (this._onComplete) this._onComplete();
          }
        }
      } else {
        this._frameIdx++;
        if (this._frameIdx >= anim.frames.length) {
          if (this._loop) {
            this._frameIdx = 0;
          } else {
            this._frameIdx = anim.frames.length - 1;
            this._playing = false;
            if (this._onComplete) this._onComplete();
          }
        }
      }
    }
  }

  /**
   * Draw the current animation frame.
   * @param {CanvasRenderingContext2D} ctx
   * @param {number} x
   * @param {number} y
   * @param {object} [opts] - Same as SpriteSheet.drawFrame opts
   */
  draw(ctx, x, y, opts = {}) {
    if (!this._current) return;
    const anim = this.animations[this._current];
    if (!anim) return;
    const frameIndex = anim.frames[this._frameIdx];
    this.sheet.drawFrame(ctx, frameIndex, x, y, opts);
  }

  /** @returns {string|null} Current animation name */
  get currentAnim() { return this._current; }

  /** @returns {boolean} Whether animation is currently playing */
  get isPlaying() { return this._playing && !this._paused; }

  /** @returns {number} Current frame index within animation */
  get frameIndex() { return this._frameIdx; }
}

/**
 * Color palette management and generation.
 */
class Palette {
  /** Named palettes for common game aesthetics */
  static PALETTES = {
    retro: ['#000000', '#1a1c2c', '#5d275d', '#b13e53', '#ef7d57', '#ffcd75', '#a7f070', '#38b764', '#257179', '#29366f', '#3b5dc9', '#41a6f6', '#73eff7', '#f4f4f4', '#94b0c2', '#566c86'],
    fantasy: ['#2b0f54', '#ab1f65', '#ff4f69', '#fff7f8', '#ff8142', '#ffda45', '#3368dc', '#49e7ec', '#36c64f', '#8ace3c', '#6b3e75', '#c47be0', '#f4cca1', '#b6854d', '#563226', '#1e1014'],
    neon: ['#000000', '#0d0d0d', '#ff00ff', '#ff0080', '#ff0000', '#ff8000', '#ffff00', '#80ff00', '#00ff00', '#00ff80', '#00ffff', '#0080ff', '#0000ff', '#8000ff', '#ffffff', '#808080'],
    pastel: ['#f8e8d4', '#ffc2c2', '#ffb3de', '#dbb3ff', '#b3c7ff', '#b3e8ff', '#b3ffd9', '#d4ffb3', '#ffffb3', '#ffe0b3', '#c9b3a1', '#e8ddd3', '#ffd6e0', '#d6f0ff', '#e0ffd6', '#fff0d6'],
    earth: ['#1a0f00', '#3d2b1f', '#5c4033', '#7b5544', '#a0522d', '#c68642', '#deb887', '#f5deb3', '#2d5016', '#4a7023', '#6b8e23', '#8fbc3c', '#556b2f', '#8b7355', '#c4a882', '#fffacd'],
    ice: ['#0a0a2e', '#0f1b4c', '#1a3a6a', '#2e6b9e', '#4a9dc4', '#7ecfe0', '#a8e6f0', '#d4f5ff', '#e8faff', '#ffffff', '#c0d8e8', '#8fb8d4', '#5f98c0', '#3078ac', '#005898', '#003060'],
    fire: ['#1a0000', '#330000', '#660000', '#990000', '#cc0000', '#ff0000', '#ff3300', '#ff6600', '#ff9900', '#ffcc00', '#ffdd44', '#ffee88', '#fff4cc', '#ffffee', '#ff4400', '#cc3300'],
    ocean: ['#000033', '#000066', '#000099', '#0033cc', '#0066ff', '#3399ff', '#66ccff', '#99eeff', '#ccffff', '#005577', '#007799', '#009988', '#00bb77', '#33dd66', '#1a4466', '#2a6688'],
    forest: ['#0a1e0a', '#143314', '#1e4d1e', '#286628', '#328032', '#3c993c', '#50b350', '#70cc70', '#90dd90', '#b0eeb0', '#556b2f', '#6b8e23', '#8b7355', '#4a3728', '#2d1f14', '#c4a882'],
    metal: ['#1a1a2e', '#2a2a3e', '#3a3a4e', '#4a4a5e', '#5a5a6e', '#6a6a7e', '#7a7a8e', '#8a8a9e', '#9a9aae', '#aaaabe', '#babace', '#cacacc', '#dadade', '#eaeaee', '#fafafe', '#c0c8d8'],
  };

  /**
   * Generate a palette from a base hue and color scheme.
   * @param {number} baseHue - Hue in degrees (0-360)
   * @param {'complementary'|'analogous'|'triadic'|'monochrome'} scheme
   * @returns {string[]} Array of CSS color strings
   */
  static generate(baseHue, scheme = 'analogous') {
    const colors = [];
    const hues = [];
    switch (scheme) {
      case 'complementary':
        hues.push(baseHue, (baseHue + 180) % 360);
        break;
      case 'analogous':
        hues.push((baseHue - 30 + 360) % 360, baseHue, (baseHue + 30) % 360);
        break;
      case 'triadic':
        hues.push(baseHue, (baseHue + 120) % 360, (baseHue + 240) % 360);
        break;
      case 'monochrome':
        hues.push(baseHue);
        break;
      default:
        hues.push(baseHue);
    }
    for (const h of hues) {
      for (let l = 0.15; l <= 0.85; l += 0.7 / (Math.max(1, 16 / hues.length - 1))) {
        const s = 0.5 + 0.3 * Math.sin(l * Math.PI);
        const rgb = hslToRGB(h, s, l);
        colors.push(rgbStr(rgb));
        if (colors.length >= 16) break;
      }
      if (colors.length >= 16) break;
    }
    while (colors.length < 8) colors.push('#808080');
    return colors.slice(0, 16);
  }

  /**
   * Create a palette-swapped copy of a sprite sheet.
   * @param {SpriteSheet} sheet
   * @param {string[]} fromColors
   * @param {string[]} toColors
   * @returns {SpriteSheet}
   */
  static recolor(sheet, fromColors, toColors) {
    const src = sheet.canvas;
    const w = src.width;
    const h = src.height;
    const dst = sf_makeCanvas(w, h);
    const dctx = dst.getContext('2d');
    dctx.drawImage(src, 0, 0);
    const imgData = dctx.getImageData(0, 0, w, h);
    const data = imgData.data;

    const from = fromColors.map(parseColor);
    const to = toColors.map(parseColor);
    const len = Math.min(from.length, to.length);

    for (let i = 0; i < data.length; i += 4) {
      for (let j = 0; j < len; j++) {
        if (Math.abs(data[i] - from[j].r) < 8 &&
            Math.abs(data[i + 1] - from[j].g) < 8 &&
            Math.abs(data[i + 2] - from[j].b) < 8) {
          data[i] = to[j].r;
          data[i + 1] = to[j].g;
          data[i + 2] = to[j].b;
          break;
        }
      }
    }
    dctx.putImageData(imgData, 0, 0);
    return new SpriteSheet(dst, sheet.frameWidth, sheet.frameHeight, sheet.cols, sheet.rows);
  }

  /**
   * Darken a CSS color string.
   * @param {string} color
   * @param {number} amount - 0 to 1
   * @returns {string}
   */
  static darken(color, amount) {
    return rgbStr(darkenRGB(sf_parseColor(color), amount));
  }

  /**
   * Lighten a CSS color string.
   * @param {string} color
   * @param {number} amount - 0 to 1
   * @returns {string}
   */
  static lighten(color, amount) {
    return rgbStr(lightenRGB(sf_parseColor(color), amount));
  }

  /**
   * Mix two CSS color strings.
   * @param {string} color1
   * @param {string} color2
   * @param {number} t - 0 to 1, 0 = color1, 1 = color2
   * @returns {string}
   */
  static mix(color1, color2, t) {
    return rgbStr(mixRGB(sf_parseColor(color1), sf_parseColor(color2), t));
  }
}

// SpriteCache
// ---------------------------------------------------------------------------

/**
 * LRU cache for generated sprite sheets.
 */
class SpriteCache {
  /**
   * @param {number} [maxEntries=128]
   */
  constructor(maxEntries = 128) {
    this.maxEntries = maxEntries;
    /** @type {Map<string, {sheet: SpriteSheet, time: number}>} */
    this._map = new Map();
  }

  /**
   * Get a cached entry.
   * @param {string} key
   * @returns {SpriteSheet|null}
   */
  get(key) {
    const entry = this._map.get(key);
    if (!entry) return null;
    entry.time = Date.now();
    return entry.sheet;
  }

  /**
   * Cache a sprite sheet.
   * @param {string} key
   * @param {SpriteSheet} sheet
   */
  set(key, sheet) {
    if (this._map.size >= this.maxEntries) {
      let oldest = null;
      let oldestTime = Infinity;
      for (const [k, v] of this._map) {
        if (v.time < oldestTime) { oldest = k; oldestTime = v.time; }
      }
      if (oldest) this._map.delete(oldest);
    }
    this._map.set(key, { sheet, time: Date.now() });
  }

  /**
   * Check if key exists in cache.
   * @param {string} key
   * @returns {boolean}
   */
  has(key) { return this._map.has(key); }

  /** Clear all cached entries. */
  clear() { this._map.clear(); }
}

// ---------------------------------------------------------------------------
// Internal drawing helpers
// ---------------------------------------------------------------------------

/** Get colors for a character based on palette or config */
function resolveCharColors(config) {
  const pal = typeof config.palette === 'string'
    ? (Palette.PALETTES[config.palette] || Palette.PALETTES.fantasy)
    : (config.palette || Palette.PALETTES.fantasy);
  const bodyColor = config.body?.color || pal[7] || '#ffcc99';
  const hairColor = config.head?.hairColor || pal[3] || '#553322';
  const eyeColor = config.eyes?.color || pal[10] || '#4488ff';
  const outfitPrimary = config.outfit?.colors?.primary || pal[4] || '#3355aa';
  const outfitSecondary = config.outfit?.colors?.secondary || pal[6] || '#aa8833';
  const outfitAccent = config.outfit?.colors?.accent || pal[13] || '#ffffff';
  return { bodyColor, hairColor, eyeColor, outfitPrimary, outfitSecondary, outfitAccent, pal };
}

// --- Humanoid drawing ---

function drawHumanoidFrame(ctx, config, size, frameType, frameNum, totalFrames) {
  const colors = resolveCharColors(config);
  const s = size;
  const cx = s / 2;
  const build = config.body?.build || 'medium';
  const headShape = config.head?.shape || 'round';
  const headSize = config.head?.size || 'normal';
  const hair = config.head?.hair || 'none';
  const eyeStyle = config.eyes?.style || 'dot';
  const torso = config.outfit?.torso || 'none';
  const legs = config.outfit?.legs || 'none';
  const weapon = config.equipment?.weapon || 'none';
  const hat = config.equipment?.hat || 'none';

  const bc = shade3(colors.bodyColor);
  const hc = shade3(colors.hairColor);
  const oc = shade3(colors.outfitPrimary);
  const oc2 = shade3(colors.outfitSecondary);

  // Proportions
  const chibi = headSize === 'chibi';
  const headR = chibi ? s * 0.28 : s * 0.18;
  const bodyW = build === 'slim' ? s * 0.22 : build === 'large' ? s * 0.34 : s * 0.28;
  const bodyH = chibi ? s * 0.2 : s * 0.26;
  const legLen = chibi ? s * 0.16 : s * 0.22;
  const legW = build === 'slim' ? s * 0.07 : build === 'large' ? s * 0.11 : s * 0.09;
  const armW = s * 0.06;
  const armLen = chibi ? s * 0.18 : s * 0.22;

  // Animation offsets
  let headBob = 0, bodyShift = 0, legAngleL = 0, legAngleR = 0, armAngleL = 0, armAngleR = 0;
  let weaponAngle = 0, hurtFlash = false, deathProgress = 0;
  const t = totalFrames > 1 ? frameNum / (totalFrames - 1) : 0;

  switch (frameType) {
    case 'idle':
      headBob = Math.sin(t * Math.PI * 2) * s * 0.01;
      bodyShift = Math.sin(t * Math.PI * 2) * s * 0.005;
      armAngleL = Math.sin(t * Math.PI * 2) * 0.05;
      armAngleR = -Math.sin(t * Math.PI * 2) * 0.05;
      break;
    case 'walk':
      headBob = Math.abs(Math.sin(t * Math.PI * 2)) * s * 0.02;
      legAngleL = Math.sin(t * Math.PI * 2) * 0.5;
      legAngleR = -Math.sin(t * Math.PI * 2) * 0.5;
      armAngleL = -Math.sin(t * Math.PI * 2) * 0.4;
      armAngleR = Math.sin(t * Math.PI * 2) * 0.4;
      bodyShift = Math.sin(t * Math.PI * 4) * s * 0.01;
      break;
    case 'attack':
      if (t < 0.3) {
        weaponAngle = -t / 0.3 * 1.2;
        armAngleR = -t / 0.3 * 0.8;
      } else if (t < 0.6) {
        const at = (t - 0.3) / 0.3;
        weaponAngle = -1.2 + at * 2.8;
        armAngleR = -0.8 + at * 1.8;
      } else {
        const at = (t - 0.6) / 0.4;
        weaponAngle = 1.6 - at * 1.6;
        armAngleR = 1.0 - at * 1.0;
      }
      bodyShift = t < 0.5 ? -t * s * 0.03 : (1 - t) * s * 0.03;
      break;
    case 'hurt':
      hurtFlash = frameNum % 2 === 0;
      bodyShift = Math.sin(t * Math.PI) * s * 0.06;
      headBob = -s * 0.02;
      break;
    case 'death':
      deathProgress = t;
      bodyShift = t * s * 0.04;
      headBob = t * s * 0.1;
      break;
  }

  ctx.save();
  if (deathProgress > 0) {
    ctx.globalAlpha = 1 - deathProgress * 0.7;
    ctx.translate(cx, s * 0.9);
    ctx.rotate(deathProgress * Math.PI * 0.4);
    ctx.translate(-cx, -s * 0.9);
  }
  if (hurtFlash) {
    ctx.globalAlpha = 0.7;
  }

  const baseY = s * 0.45 + bodyShift;
  const headY = baseY - bodyH / 2 - headR + headBob;
  const legY = baseY + bodyH / 2;

  // Legs
  const legStartX1 = cx - bodyW * 0.25;
  const legStartX2 = cx + bodyW * 0.25;
  ctx.save();
  ctx.translate(legStartX1, legY);
  ctx.rotate(legAngleL);
  const legColor = legs !== 'none' ? oc2.base : bc.base;
  const legShadow = legs !== 'none' ? oc2.shadow : bc.shadow;
  outlinedRect(ctx, -legW / 2, 0, legW, legLen, legColor);
  ctx.fillStyle = legShadow;
  ctx.fillRect(Math.floor(-legW / 2), Math.floor(legLen * 0.6), Math.ceil(legW), Math.ceil(legLen * 0.4));
  // Foot
  outlinedRect(ctx, -legW / 2 - 1, legLen, legW + 3, s * 0.04, bc.shadow);
  ctx.restore();

  ctx.save();
  ctx.translate(legStartX2, legY);
  ctx.rotate(legAngleR);
  outlinedRect(ctx, -legW / 2, 0, legW, legLen, legColor);
  ctx.fillStyle = legShadow;
  ctx.fillRect(Math.floor(-legW / 2), Math.floor(legLen * 0.6), Math.ceil(legW), Math.ceil(legLen * 0.4));
  outlinedRect(ctx, -legW / 2 - 1, legLen, legW + 3, s * 0.04, bc.shadow);
  ctx.restore();

  // Body / torso
  const torsoX = cx - bodyW / 2;
  if (torso === 'none') {
    outlinedRect(ctx, torsoX, baseY - bodyH / 2, bodyW, bodyH, bc.base);
    ctx.fillStyle = bc.shadow;
    ctx.fillRect(Math.floor(torsoX), Math.floor(baseY), Math.ceil(bodyW), Math.ceil(bodyH / 2));
    ctx.fillStyle = bc.highlight;
    ctx.fillRect(Math.floor(torsoX + bodyW * 0.3), Math.floor(baseY - bodyH / 2), Math.ceil(bodyW * 0.15), Math.ceil(bodyH * 0.3));
  } else {
    outlinedRect(ctx, torsoX, baseY - bodyH / 2, bodyW, bodyH, oc.base);
    ctx.fillStyle = oc.shadow;
    ctx.fillRect(Math.floor(torsoX), Math.floor(baseY), Math.ceil(bodyW), Math.ceil(bodyH / 2));
    ctx.fillStyle = oc.highlight;
    ctx.fillRect(Math.floor(torsoX + bodyW * 0.25), Math.floor(baseY - bodyH / 2 + 1), Math.ceil(bodyW * 0.15), Math.ceil(bodyH * 0.25));
    if (torso === 'armor') {
      ctx.fillStyle = oc2.base;
      ctx.fillRect(Math.floor(cx - bodyW * 0.15), Math.floor(baseY - bodyH * 0.3), Math.ceil(bodyW * 0.3), Math.ceil(bodyH * 0.35));
    } else if (torso === 'robe') {
      outlinedRect(ctx, torsoX - 2, baseY + bodyH * 0.3, bodyW + 4, bodyH * 0.5, oc.base);
    }
    // Belt
    outlinedRect(ctx, torsoX, baseY + bodyH * 0.3, bodyW, s * 0.03, oc2.base);
  }

  // Arms
  ctx.save();
  ctx.translate(torsoX, baseY - bodyH * 0.3);
  ctx.rotate(armAngleL);
  const armColor = torso !== 'none' ? oc.base : bc.base;
  outlinedRect(ctx, -armW, 0, armW, armLen, armColor);
  // Hand
  outlinedCircle(ctx, -armW / 2, armLen, armW * 0.4, bc.base);
  ctx.restore();

  ctx.save();
  ctx.translate(torsoX + bodyW, baseY - bodyH * 0.3);
  ctx.rotate(armAngleR);
  outlinedRect(ctx, 0, 0, armW, armLen, armColor);
  outlinedCircle(ctx, armW / 2, armLen, armW * 0.4, bc.base);
  // Weapon in right hand
  if (weapon !== 'none') {
    ctx.save();
    ctx.translate(armW / 2, armLen);
    ctx.rotate(weaponAngle);
    drawWeaponSmall(ctx, weapon, s, colors);
    ctx.restore();
  }
  ctx.restore();

  // Head
  if (headShape === 'round') {
    outlinedCircle(ctx, cx, headY, headR, bc.base);
    ctx.fillStyle = bc.highlight;
    ctx.beginPath();
    ctx.arc(cx - headR * 0.2, headY - headR * 0.2, headR * 0.4, 0, Math.PI * 2);
    ctx.fill();
  } else if (headShape === 'square') {
    outlinedRect(ctx, cx - headR, headY - headR, headR * 2, headR * 2, bc.base);
    ctx.fillStyle = bc.highlight;
    ctx.fillRect(Math.floor(cx - headR * 0.6), Math.floor(headY - headR * 0.6), Math.ceil(headR * 0.5), Math.ceil(headR * 0.5));
  } else {
    // pointed
    outlinedPoly(ctx, [
      [cx, headY - headR * 1.1],
      [cx + headR, headY + headR * 0.6],
      [cx - headR, headY + headR * 0.6],
    ], bc.base);
  }

  // Eyes
  const eyeY = headY + (headShape === 'pointed' ? -headR * 0.1 : -headR * 0.1);
  const eyeSpacing = headR * 0.45;
  if (size >= 32) {
    if (eyeStyle === 'dot') {
      ctx.fillStyle = '#000';
      ctx.fillRect(Math.floor(cx - eyeSpacing - 1), Math.floor(eyeY - 1), 2, 2);
      ctx.fillRect(Math.floor(cx + eyeSpacing - 1), Math.floor(eyeY - 1), 2, 2);
    } else if (eyeStyle === 'round') {
      outlinedCircle(ctx, cx - eyeSpacing, eyeY, headR * 0.15, '#fff');
      ctx.fillStyle = colors.eyeColor;
      ctx.beginPath();
      ctx.arc(cx - eyeSpacing, eyeY, headR * 0.08, 0, Math.PI * 2);
      ctx.fill();
      outlinedCircle(ctx, cx + eyeSpacing, eyeY, headR * 0.15, '#fff');
      ctx.fillStyle = colors.eyeColor;
      ctx.beginPath();
      ctx.arc(cx + eyeSpacing, eyeY, headR * 0.08, 0, Math.PI * 2);
      ctx.fill();
    } else if (eyeStyle === 'angry') {
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.floor(cx - eyeSpacing - 2), Math.floor(eyeY - 1), 4, 3);
      ctx.fillRect(Math.floor(cx + eyeSpacing - 2), Math.floor(eyeY - 1), 4, 3);
      ctx.fillStyle = colors.eyeColor;
      ctx.fillRect(Math.floor(cx - eyeSpacing - 1), Math.floor(eyeY), 2, 2);
      ctx.fillRect(Math.floor(cx + eyeSpacing - 1), Math.floor(eyeY), 2, 2);
      ctx.fillStyle = '#000';
      ctx.fillRect(Math.floor(cx - eyeSpacing - 2), Math.floor(eyeY - 2), 4, 1);
      ctx.fillRect(Math.floor(cx + eyeSpacing - 2), Math.floor(eyeY - 2), 4, 1);
    } else if (eyeStyle === 'friendly') {
      outlinedCircle(ctx, cx - eyeSpacing, eyeY, headR * 0.17, '#fff');
      ctx.fillStyle = colors.eyeColor;
      ctx.beginPath();
      ctx.arc(cx - eyeSpacing + 0.5, eyeY + 0.5, headR * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.floor(cx - eyeSpacing - headR * 0.05), Math.floor(eyeY - headR * 0.1), 1, 1);
      outlinedCircle(ctx, cx + eyeSpacing, eyeY, headR * 0.17, '#fff');
      ctx.fillStyle = colors.eyeColor;
      ctx.beginPath();
      ctx.arc(cx + eyeSpacing + 0.5, eyeY + 0.5, headR * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.floor(cx + eyeSpacing - headR * 0.05), Math.floor(eyeY - headR * 0.1), 1, 1);
    } else if (eyeStyle === 'glowing') {
      ctx.shadowColor = colors.eyeColor;
      ctx.shadowBlur = 3;
      outlinedCircle(ctx, cx - eyeSpacing, eyeY, headR * 0.13, colors.eyeColor);
      outlinedCircle(ctx, cx + eyeSpacing, eyeY, headR * 0.13, colors.eyeColor);
      ctx.shadowBlur = 0;
    }
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(Math.floor(cx - eyeSpacing), Math.floor(eyeY), 1, 1);
    ctx.fillRect(Math.floor(cx + eyeSpacing), Math.floor(eyeY), 1, 1);
  }

  // Hair
  if (hair !== 'none') {
    const hTop = headY - headR;
    if (hair === 'short') {
      outlinedRect(ctx, cx - headR * 1.05, hTop - 1, headR * 2.1, headR * 0.7, hc.base);
      ctx.fillStyle = hc.highlight;
      ctx.fillRect(Math.floor(cx - headR * 0.5), Math.floor(hTop), Math.ceil(headR * 0.4), Math.ceil(headR * 0.3));
    } else if (hair === 'spiky') {
      for (let i = -2; i <= 2; i++) {
        const sx = cx + i * headR * 0.35;
        const sh = headR * (0.5 + Math.abs(i) * 0.15);
        outlinedPoly(ctx, [
          [sx - headR * 0.2, hTop + 2],
          [sx, hTop - sh],
          [sx + headR * 0.2, hTop + 2],
        ], i % 2 === 0 ? hc.base : hc.highlight);
      }
    } else if (hair === 'long') {
      outlinedRect(ctx, cx - headR * 1.1, hTop - 2, headR * 2.2, headR * 0.6, hc.base);
      outlinedRect(ctx, cx - headR * 1.15, headY, headR * 0.4, headR * 1.5, hc.base);
      outlinedRect(ctx, cx + headR * 0.75, headY, headR * 0.4, headR * 1.5, hc.base);
      ctx.fillStyle = hc.shadow;
      ctx.fillRect(Math.floor(cx - headR * 1.15), Math.floor(headY + headR * 0.8), Math.ceil(headR * 0.4), Math.ceil(headR * 0.7));
      ctx.fillRect(Math.floor(cx + headR * 0.75), Math.floor(headY + headR * 0.8), Math.ceil(headR * 0.4), Math.ceil(headR * 0.7));
    } else if (hair === 'mohawk') {
      for (let i = 0; i < 4; i++) {
        const mx = cx - headR * 0.3 + i * headR * 0.2;
        outlinedRect(ctx, mx, hTop - headR * 0.6 - i * 0.5, headR * 0.15, headR * 0.7, i % 2 === 0 ? hc.base : hc.highlight);
      }
    }
  }

  // Hat
  if (hat !== 'none') {
    const hTop = headY - headR;
    if (hat === 'helmet') {
      outlinedRect(ctx, cx - headR * 1.1, hTop - 2, headR * 2.2, headR * 1.1, oc2.base);
      ctx.fillStyle = oc2.highlight;
      ctx.fillRect(Math.floor(cx - headR * 0.3), Math.floor(hTop - 1), Math.ceil(headR * 0.6), Math.ceil(headR * 0.3));
      outlinedRect(ctx, cx - headR * 1.2, headY - headR * 0.1, headR * 2.4, headR * 0.15, oc2.shadow);
    } else if (hat === 'hood') {
      outlinedCircle(ctx, cx, headY - headR * 0.2, headR * 1.25, oc.shadow);
      ctx.fillStyle = oc.base;
      ctx.beginPath();
      ctx.arc(cx, headY - headR * 0.2, headR * 1.15, 0, Math.PI * 2);
      ctx.fill();
    } else if (hat === 'crown') {
      outlinedRect(ctx, cx - headR * 0.8, hTop - headR * 0.1, headR * 1.6, headR * 0.3, '#ffd700');
      const crownPts = [[-0.7, -0.1], [-0.5, -0.45], [-0.2, -0.15], [0, -0.55], [0.2, -0.15], [0.5, -0.45], [0.7, -0.1]];
      outlinedPoly(ctx, crownPts.map(p => [cx + p[0] * headR, hTop + p[1] * headR]), '#ffd700');
      // Gems on crown
      outlinedCircle(ctx, cx, hTop - headR * 0.35, headR * 0.08, '#ff0044');
    } else if (hat === 'wizard') {
      outlinedPoly(ctx, [
        [cx - headR * 1.0, hTop + 2],
        [cx + headR * 0.3, hTop - headR * 1.5],
        [cx + headR * 1.0, hTop + 2],
      ], oc.base);
      ctx.fillStyle = oc.highlight;
      outlinedCircle(ctx, cx + headR * 0.3, hTop - headR * 1.35, headR * 0.12, oc2.base);
      outlinedRect(ctx, cx - headR * 1.2, hTop + 1, headR * 2.4, headR * 0.12, oc.shadow);
    }
  }

  // Hurt flash overlay
  if (hurtFlash) {
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(0, 0, s, s);
    ctx.globalCompositeOperation = 'source-over';
  }

  ctx.restore();
}

function drawWeaponSmall(ctx, weapon, size, colors) {
  const s = size * 0.4;
  const wc = shade3(colors.outfitSecondary || '#888888');
  switch (weapon) {
    case 'sword':
      outlinedRect(ctx, -1, -s, 2, s, '#cccccc');
      ctx.fillStyle = '#eeeeee';
      ctx.fillRect(0, Math.floor(-s), 1, Math.ceil(s * 0.4));
      outlinedRect(ctx, -3, 0, 6, 2, '#8b6914');
      outlinedRect(ctx, -1, 2, 2, s * 0.15, '#8b6914');
      break;
    case 'bow':
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(-2, -s * 0.5, s * 0.45, -Math.PI * 0.4, Math.PI * 0.4);
      ctx.stroke();
      ctx.strokeStyle = '#8b6914';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(-2, -s * 0.5, s * 0.4, -Math.PI * 0.35, Math.PI * 0.35);
      ctx.stroke();
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(-2 + Math.cos(-Math.PI * 0.35) * s * 0.4, -s * 0.5 + Math.sin(-Math.PI * 0.35) * s * 0.4);
      ctx.lineTo(-2 + Math.cos(Math.PI * 0.35) * s * 0.4, -s * 0.5 + Math.sin(Math.PI * 0.35) * s * 0.4);
      ctx.stroke();
      break;
    case 'staff':
      outlinedRect(ctx, -1, -s * 1.1, 2, s * 1.2, '#8b6914');
      outlinedCircle(ctx, 0, -s * 1.1, s * 0.1, colors.eyeColor || '#8800ff');
      ctx.shadowColor = colors.eyeColor || '#8800ff';
      ctx.shadowBlur = 3;
      ctx.beginPath();
      ctx.arc(0, -s * 1.1, s * 0.06, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.shadowBlur = 0;
      break;
    case 'axe':
      outlinedRect(ctx, -1, -s * 0.8, 2, s * 0.9, '#8b6914');
      outlinedPoly(ctx, [
        [1, -s * 0.8],
        [s * 0.3, -s * 0.9],
        [s * 0.35, -s * 0.5],
        [1, -s * 0.45],
      ], '#aaaaaa');
      ctx.fillStyle = '#cccccc';
      ctx.fillRect(Math.floor(s * 0.1), Math.floor(-s * 0.85), 2, Math.ceil(s * 0.15));
      break;
    case 'gun':
      outlinedRect(ctx, -1, -s * 0.35, s * 0.25, s * 0.12, '#555');
      outlinedRect(ctx, s * 0.05, -s * 0.35, 2, s * 0.2, '#444');
      ctx.fillStyle = '#777';
      ctx.fillRect(Math.floor(-1), Math.floor(-s * 0.33), Math.ceil(s * 0.08), Math.ceil(s * 0.04));
      break;
    case 'shield':
      outlinedEllipse(ctx, -s * 0.2, -s * 0.3, s * 0.2, s * 0.25, wc.base);
      ctx.fillStyle = wc.highlight;
      ctx.beginPath();
      ctx.ellipse(-s * 0.2, -s * 0.35, s * 0.08, s * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = wc.shadow;
      ctx.fillRect(Math.floor(-s * 0.22), Math.floor(-s * 0.32), Math.ceil(s * 0.04), Math.ceil(s * 0.2));
      break;
  }
}

// --- Creature drawing ---

function drawCreatureFrame(ctx, config, size, frameType, frameNum, totalFrames) {
  const s = size;
  const cx = s / 2;
  const cy = s * 0.55;
  const cr = config.creature || {};
  const bodyShape = cr.bodyShape || 'blob';
  const color = cr.color || '#88ff44';
  const eyeCount = cr.eyeCount || 2;
  const eyeStyle = cr.eyeStyle || 'round';
  const features = cr.features || [];
  const pattern = cr.pattern || 'none';

  const bc = shade3(color);
  const t = totalFrames > 1 ? frameNum / (totalFrames - 1) : 0;

  let squish = 0, shiftX = 0, shiftY = 0, hurtFlash = false, deathProgress = 0;
  switch (frameType) {
    case 'idle':
      squish = Math.sin(t * Math.PI * 2) * 0.05;
      shiftY = Math.sin(t * Math.PI * 2) * s * 0.01;
      break;
    case 'walk':
      shiftX = Math.sin(t * Math.PI * 2) * s * 0.04;
      squish = Math.sin(t * Math.PI * 4) * 0.08;
      shiftY = Math.abs(Math.sin(t * Math.PI * 2)) * -s * 0.03;
      break;
    case 'attack':
      if (t < 0.4) {
        shiftX = -t / 0.4 * s * 0.06;
        squish = t / 0.4 * 0.15;
      } else {
        shiftX = (t - 0.4) / 0.6 * s * 0.12 - s * 0.06;
        squish = 0.15 - (t - 0.4) / 0.6 * 0.15;
      }
      break;
    case 'hurt':
      hurtFlash = frameNum % 2 === 0;
      shiftX = Math.sin(t * Math.PI) * s * 0.06;
      break;
    case 'death':
      deathProgress = t;
      squish = t * 0.4;
      break;
  }

  ctx.save();
  if (deathProgress > 0) ctx.globalAlpha = 1 - deathProgress * 0.8;
  ctx.translate(shiftX, shiftY);

  const bw = s * 0.4 * (1 + squish);
  const bh = s * 0.35 * (1 - squish);

  if (bodyShape === 'blob') {
    outlinedEllipse(ctx, cx, cy, bw, bh, bc.base);
    ctx.fillStyle = bc.shadow;
    ctx.beginPath();
    ctx.ellipse(cx, cy + bh * 0.3, bw * 0.8, bh * 0.5, 0, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = bc.highlight;
    ctx.beginPath();
    ctx.ellipse(cx - bw * 0.2, cy - bh * 0.3, bw * 0.25, bh * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (bodyShape === 'serpent') {
    for (let i = 3; i >= 0; i--) {
      const sx = cx + i * s * 0.08 + Math.sin((t * Math.PI * 2) + i) * s * 0.03;
      const sy = cy + i * s * 0.03;
      const sr = (bw - i * s * 0.04) * 0.6;
      outlinedCircle(ctx, sx, sy, sr, i === 0 ? bc.base : bc.shadow);
    }
    ctx.fillStyle = bc.highlight;
    ctx.beginPath();
    ctx.arc(cx - bw * 0.1, cy - bh * 0.3, bw * 0.12, 0, Math.PI * 2);
    ctx.fill();
  } else if (bodyShape === 'quadruped') {
    outlinedEllipse(ctx, cx, cy - bh * 0.1, bw, bh * 0.7, bc.base);
    // Head (front)
    outlinedCircle(ctx, cx + bw * 0.6, cy - bh * 0.4, bh * 0.45, bc.base);
    // Legs
    const legPhase = frameType === 'walk' ? t * Math.PI * 2 : 0;
    for (let i = 0; i < 4; i++) {
      const lx = cx + (i < 2 ? -bw * 0.4 : bw * 0.3) + (i % 2 ? bw * 0.15 : 0);
      const ly = cy + bh * 0.5;
      const lOff = Math.sin(legPhase + i * Math.PI * 0.5) * s * 0.03;
      outlinedRect(ctx, lx - s * 0.03, ly, s * 0.06, s * 0.12 + lOff, bc.shadow);
    }
  } else if (bodyShape === 'flying') {
    outlinedEllipse(ctx, cx, cy, bw * 0.6, bh * 0.6, bc.base);
    // Wings
    const wingFlap = Math.sin(t * Math.PI * 4) * 0.3;
    ctx.save();
    ctx.translate(cx - bw * 0.3, cy - bh * 0.2);
    ctx.rotate(-0.5 + wingFlap);
    outlinedEllipse(ctx, -bw * 0.4, 0, bw * 0.5, bh * 0.2, bc.highlight);
    ctx.restore();
    ctx.save();
    ctx.translate(cx + bw * 0.3, cy - bh * 0.2);
    ctx.rotate(0.5 - wingFlap);
    outlinedEllipse(ctx, bw * 0.4, 0, bw * 0.5, bh * 0.2, bc.highlight);
    ctx.restore();
  } else if (bodyShape === 'spider') {
    outlinedEllipse(ctx, cx, cy, bw * 0.5, bh * 0.5, bc.base);
    outlinedCircle(ctx, cx + bw * 0.35, cy - bh * 0.2, bh * 0.35, bc.base);
    // 8 legs
    const legPhase = frameType === 'walk' ? t * Math.PI * 2 : 0;
    for (let i = 0; i < 8; i++) {
      const side = i < 4 ? -1 : 1;
      const li = i % 4;
      const angle = -0.8 + li * 0.4 + Math.sin(legPhase + i) * 0.15;
      ctx.save();
      ctx.translate(cx + side * bw * 0.3, cy);
      ctx.rotate(side * angle);
      outlinedRect(ctx, 0, 0, 1.5, s * 0.18, bc.shadow);
      ctx.translate(0, s * 0.18);
      ctx.rotate(side * 0.6);
      outlinedRect(ctx, 0, 0, 1.5, s * 0.12, bc.shadow);
      ctx.restore();
    }
  }

  // Pattern
  if (pattern === 'spots') {
    const rng = seededRNG(42);
    ctx.fillStyle = bc.shadow;
    for (let i = 0; i < 5; i++) {
      const px = cx + (rng() - 0.5) * bw;
      const py = cy + (rng() - 0.5) * bh * 0.6;
      ctx.beginPath();
      ctx.arc(px, py, s * 0.02, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (pattern === 'stripes') {
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = bc.shadow;
    for (let i = -2; i <= 2; i++) {
      ctx.fillRect(Math.floor(cx + i * s * 0.06 - 1), Math.floor(cy - bh * 0.4), 2, Math.ceil(bh * 0.8));
    }
    ctx.restore();
  } else if (pattern === 'scales') {
    ctx.save();
    ctx.globalAlpha = 0.25;
    for (let row = 0; row < 3; row++) {
      for (let col = -2; col <= 2; col++) {
        const px = cx + col * s * 0.05 + (row % 2 ? s * 0.025 : 0);
        const py = cy - bh * 0.2 + row * s * 0.06;
        ctx.beginPath();
        ctx.arc(px, py, s * 0.025, 0, Math.PI, false);
        ctx.fillStyle = bc.highlight;
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // Eyes
  const eyeBase = bodyShape === 'quadruped' ? { x: cx + bw * 0.6, y: cy - bh * 0.45 } : { x: cx, y: cy - bh * 0.15 };
  for (let i = 0; i < eyeCount; i++) {
    const ex = eyeBase.x + (i - (eyeCount - 1) / 2) * s * 0.08;
    const ey = eyeBase.y + (eyeCount === 3 && i === 1 ? -s * 0.04 : 0);
    const er = s * 0.035;
    if (eyeStyle === 'round') {
      outlinedCircle(ctx, ex, ey, er, '#fff');
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(ex + 0.5, ey + 0.5, er * 0.5, 0, Math.PI * 2);
      ctx.fill();
    } else if (eyeStyle === 'slit') {
      outlinedEllipse(ctx, ex, ey, er, er * 0.6, '#aaff00');
      ctx.fillStyle = '#000';
      ctx.fillRect(Math.floor(ex - 0.5), Math.floor(ey - er * 0.5), 1, Math.ceil(er));
    } else {
      ctx.shadowColor = color;
      ctx.shadowBlur = 3;
      outlinedCircle(ctx, ex, ey, er, color);
      ctx.shadowBlur = 0;
    }
  }

  // Features
  if (features.includes('horns')) {
    const hy = bodyShape === 'quadruped' ? cy - bh * 0.7 : cy - bh * 0.6;
    outlinedPoly(ctx, [[cx - s * 0.08, hy], [cx - s * 0.04, hy - s * 0.12], [cx - s * 0.02, hy]], bc.shadow);
    outlinedPoly(ctx, [[cx + s * 0.08, hy], [cx + s * 0.04, hy - s * 0.12], [cx + s * 0.02, hy]], bc.shadow);
  }
  if (features.includes('fangs')) {
    const fy = bodyShape === 'quadruped' ? cy - bh * 0.1 : cy + bh * 0.15;
    ctx.fillStyle = '#fff';
    outlinedPoly(ctx, [[cx - s * 0.04, fy], [cx - s * 0.03, fy + s * 0.05], [cx - s * 0.02, fy]], '#fff');
    outlinedPoly(ctx, [[cx + s * 0.02, fy], [cx + s * 0.03, fy + s * 0.05], [cx + s * 0.04, fy]], '#fff');
  }
  if (features.includes('tail') && bodyShape !== 'serpent') {
    const tailWag = Math.sin(t * Math.PI * 2) * 0.2;
    ctx.save();
    ctx.translate(cx - bw * 0.7, cy + bh * 0.1);
    ctx.rotate(-0.5 + tailWag);
    outlinedRect(ctx, -s * 0.15, -2, s * 0.15, 3, bc.base);
    ctx.restore();
  }
  if (features.includes('wings') && bodyShape !== 'flying') {
    const wingFlap = Math.sin(t * Math.PI * 3) * 0.25;
    ctx.save();
    ctx.translate(cx, cy - bh * 0.3);
    ctx.rotate(-0.6 + wingFlap);
    outlinedEllipse(ctx, -s * 0.15, 0, s * 0.12, s * 0.06, bc.highlight);
    ctx.restore();
    ctx.save();
    ctx.translate(cx, cy - bh * 0.3);
    ctx.rotate(0.6 - wingFlap);
    outlinedEllipse(ctx, s * 0.15, 0, s * 0.12, s * 0.06, bc.highlight);
    ctx.restore();
  }
  if (features.includes('spikes')) {
    for (let i = -2; i <= 2; i++) {
      const sx = cx + i * bw * 0.3;
      const sy = cy - bh * 0.5;
      outlinedPoly(ctx, [[sx - 2, sy + 2], [sx, sy - s * 0.06], [sx + 2, sy + 2]], bc.shadow);
    }
  }
  if (features.includes('shell')) {
    outlinedEllipse(ctx, cx, cy + bh * 0.1, bw * 0.9, bh * 0.8, bc.shadow);
    ctx.fillStyle = bc.base;
    ctx.beginPath();
    ctx.ellipse(cx, cy, bw * 0.7, bh * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  if (features.includes('tentacles')) {
    for (let i = -1; i <= 1; i++) {
      const tx = cx + i * bw * 0.3;
      const wave = Math.sin(t * Math.PI * 2 + i) * s * 0.02;
      ctx.save();
      ctx.translate(tx, cy + bh * 0.5);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(wave, s * 0.06, wave * 2, s * 0.12);
      ctx.stroke();
      ctx.strokeStyle = bc.base;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(wave, s * 0.06, wave * 2, s * 0.12);
      ctx.stroke();
      ctx.restore();
    }
  }

  if (hurtFlash) {
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(0, 0, s, s);
    ctx.globalCompositeOperation = 'source-over';
  }

  ctx.restore();
}

// --- Robot drawing ---

function drawRobotFrame(ctx, config, size, frameType, frameNum, totalFrames) {
  const s = size;
  const cx = s / 2;
  const rb = config.robot || {};
  const bodyShape = rb.bodyShape || 'humanoid';
  const color = rb.color || '#8899aa';
  const glowColor = rb.glowColor || '#00ffff';
  const features = rb.features || [];

  const bc = shade3(color);
  const gc = shade3(glowColor);
  const t = totalFrames > 1 ? frameNum / (totalFrames - 1) : 0;

  let shiftX = 0, shiftY = 0, headTilt = 0, armAngle = 0, hurtFlash = false, deathProgress = 0;
  let trackOffset = 0, cannonAngle = 0;

  switch (frameType) {
    case 'idle':
      shiftY = Math.sin(t * Math.PI * 2) * s * 0.01;
      headTilt = Math.sin(t * Math.PI * 2) * 0.03;
      break;
    case 'walk':
      shiftY = Math.abs(Math.sin(t * Math.PI * 2)) * -s * 0.02;
      trackOffset = t * s * 0.1;
      armAngle = Math.sin(t * Math.PI * 2) * 0.3;
      break;
    case 'attack':
      cannonAngle = t < 0.5 ? -t * 0.4 : -(1 - t) * 0.4;
      if (t > 0.3 && t < 0.5) {
        shiftX = (Math.random() - 0.5) * s * 0.02;
      }
      break;
    case 'hurt':
      hurtFlash = frameNum % 2 === 0;
      shiftX = Math.sin(t * Math.PI * 3) * s * 0.04;
      break;
    case 'death':
      deathProgress = t;
      break;
  }

  ctx.save();
  if (deathProgress > 0) {
    ctx.globalAlpha = 1 - deathProgress * 0.7;
    if (deathProgress > 0.5) {
      // Explosion particles
      const rng = seededRNG(frameNum * 17);
      for (let i = 0; i < 5; i++) {
        const px = cx + (rng() - 0.5) * s * deathProgress;
        const py = s * 0.5 + (rng() - 0.5) * s * deathProgress;
        outlinedCircle(ctx, px, py, s * 0.03, gc.base);
      }
    }
  }
  ctx.translate(shiftX, shiftY);

  const baseY = s * 0.48;

  if (bodyShape === 'humanoid') {
    // Legs
    const legW = s * 0.08;
    const legH = s * 0.2;
    const legAngle1 = frameType === 'walk' ? Math.sin(t * Math.PI * 2) * 0.35 : 0;
    const legAngle2 = -legAngle1;
    ctx.save();
    ctx.translate(cx - s * 0.08, baseY + s * 0.12);
    ctx.rotate(legAngle1);
    outlinedRect(ctx, -legW / 2, 0, legW, legH, bc.shadow);
    outlinedRect(ctx, -legW / 2 - 1, legH, legW + 2, s * 0.04, bc.base);
    ctx.restore();
    ctx.save();
    ctx.translate(cx + s * 0.08, baseY + s * 0.12);
    ctx.rotate(legAngle2);
    outlinedRect(ctx, -legW / 2, 0, legW, legH, bc.shadow);
    outlinedRect(ctx, -legW / 2 - 1, legH, legW + 2, s * 0.04, bc.base);
    ctx.restore();

    // Torso
    outlinedRect(ctx, cx - s * 0.14, baseY - s * 0.08, s * 0.28, s * 0.22, bc.base);
    ctx.fillStyle = bc.shadow;
    ctx.fillRect(Math.floor(cx - s * 0.14), Math.floor(baseY + s * 0.04), Math.ceil(s * 0.28), Math.ceil(s * 0.1));
    // Chest glow
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 4;
    outlinedCircle(ctx, cx, baseY, s * 0.04, gc.base);
    ctx.shadowBlur = 0;

    // Arms
    ctx.save();
    ctx.translate(cx - s * 0.16, baseY - s * 0.05);
    ctx.rotate(-0.1 + armAngle);
    outlinedRect(ctx, -s * 0.04, 0, s * 0.06, s * 0.18, bc.shadow);
    if (features.includes('claws')) {
      for (let i = -1; i <= 1; i++) {
        outlinedRect(ctx, -s * 0.02 + i * s * 0.02, s * 0.18, s * 0.015, s * 0.04, bc.highlight);
      }
    }
    ctx.restore();
    ctx.save();
    ctx.translate(cx + s * 0.16, baseY - s * 0.05);
    ctx.rotate(0.1 - armAngle + cannonAngle);
    outlinedRect(ctx, -s * 0.02, 0, s * 0.06, s * 0.18, bc.shadow);
    if (features.includes('cannon')) {
      outlinedRect(ctx, -s * 0.03, s * 0.14, s * 0.08, s * 0.1, bc.shadow);
      ctx.fillStyle = gc.base;
      ctx.fillRect(Math.floor(s * 0.0), Math.floor(s * 0.22), 2, 2);
    }
    ctx.restore();

    // Head
    ctx.save();
    ctx.translate(cx, baseY - s * 0.14);
    ctx.rotate(headTilt);
    outlinedRect(ctx, -s * 0.1, -s * 0.12, s * 0.2, s * 0.14, bc.base);
    ctx.fillStyle = bc.highlight;
    ctx.fillRect(Math.floor(-s * 0.06), Math.floor(-s * 0.1), Math.ceil(s * 0.04), Math.ceil(s * 0.03));
    // Visor / Eyes
    if (features.includes('visor')) {
      outlinedRect(ctx, -s * 0.08, -s * 0.08, s * 0.16, s * 0.04, gc.base);
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 3;
      ctx.fillStyle = gc.highlight;
      ctx.fillRect(Math.floor(-s * 0.07), Math.floor(-s * 0.07), Math.ceil(s * 0.14), Math.ceil(s * 0.02));
      ctx.shadowBlur = 0;
    } else {
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 2;
      outlinedCircle(ctx, -s * 0.04, -s * 0.06, s * 0.02, gc.base);
      outlinedCircle(ctx, s * 0.04, -s * 0.06, s * 0.02, gc.base);
      ctx.shadowBlur = 0;
    }
    if (features.includes('antenna')) {
      outlinedRect(ctx, -1, -s * 0.17, 2, s * 0.06, bc.shadow);
      outlinedCircle(ctx, 0, -s * 0.17, s * 0.02, gc.base);
    }
    ctx.restore();
  } else if (bodyShape === 'tank') {
    // Treads
    const treadY = baseY + s * 0.12;
    outlinedRect(ctx, cx - s * 0.22, treadY, s * 0.44, s * 0.1, bc.shadow);
    // Tread detail
    for (let i = 0; i < 5; i++) {
      const tx = cx - s * 0.18 + ((i * s * 0.09 + trackOffset) % (s * 0.36));
      ctx.fillStyle = bc.base;
      ctx.fillRect(Math.floor(tx), Math.floor(treadY + 1), 2, Math.ceil(s * 0.08));
    }
    // Body
    outlinedRect(ctx, cx - s * 0.18, baseY - s * 0.06, s * 0.36, s * 0.2, bc.base);
    ctx.fillStyle = bc.highlight;
    ctx.fillRect(Math.floor(cx - s * 0.14), Math.floor(baseY - s * 0.04), Math.ceil(s * 0.06), Math.ceil(s * 0.04));
    // Turret
    outlinedRect(ctx, cx - s * 0.1, baseY - s * 0.16, s * 0.2, s * 0.12, bc.base);
    ctx.save();
    ctx.translate(cx + s * 0.1, baseY - s * 0.12);
    ctx.rotate(cannonAngle);
    outlinedRect(ctx, 0, -s * 0.02, s * 0.18, s * 0.04, bc.shadow);
    ctx.restore();
    // Eye
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 3;
    outlinedCircle(ctx, cx, baseY - s * 0.11, s * 0.03, gc.base);
    ctx.shadowBlur = 0;
  } else if (bodyShape === 'drone') {
    // Central body
    outlinedCircle(ctx, cx, baseY, s * 0.12, bc.base);
    ctx.fillStyle = bc.highlight;
    ctx.beginPath();
    ctx.arc(cx - s * 0.03, baseY - s * 0.04, s * 0.04, 0, Math.PI * 2);
    ctx.fill();
    // Propellers
    const spin = t * Math.PI * 8;
    for (let i = 0; i < 2; i++) {
      const px = cx + (i === 0 ? -1 : 1) * s * 0.2;
      outlinedRect(ctx, px - 1, baseY - s * 0.04, 2, s * 0.08, bc.shadow);
      ctx.save();
      ctx.translate(px, baseY - s * 0.04);
      ctx.rotate(spin + i * Math.PI / 2);
      outlinedRect(ctx, -s * 0.08, -1, s * 0.16, 2, bc.highlight);
      ctx.restore();
    }
    // Eye
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 3;
    outlinedCircle(ctx, cx, baseY + s * 0.02, s * 0.04, gc.base);
    ctx.shadowBlur = 0;
    if (features.includes('cannon')) {
      outlinedRect(ctx, cx - s * 0.02, baseY + s * 0.1, s * 0.04, s * 0.06, bc.shadow);
    }
  } else if (bodyShape === 'spider') {
    // Robot spider body
    outlinedEllipse(ctx, cx, baseY, s * 0.16, s * 0.1, bc.base);
    outlinedCircle(ctx, cx + s * 0.1, baseY - s * 0.06, s * 0.08, bc.base);
    // 6 legs
    const legPhase = frameType === 'walk' ? t * Math.PI * 2 : 0;
    for (let i = 0; i < 6; i++) {
      const side = i < 3 ? -1 : 1;
      const li = i % 3;
      const angle = -0.6 + li * 0.4 + Math.sin(legPhase + i * 0.8) * 0.2;
      ctx.save();
      ctx.translate(cx + side * s * 0.1, baseY + s * 0.02);
      ctx.rotate(side * angle);
      outlinedRect(ctx, 0, 0, 2, s * 0.14, bc.shadow);
      ctx.translate(0, s * 0.14);
      ctx.rotate(side * 0.5);
      outlinedRect(ctx, 0, 0, 2, s * 0.1, bc.shadow);
      ctx.restore();
    }
    // Eye
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 3;
    outlinedCircle(ctx, cx + s * 0.1, baseY - s * 0.08, s * 0.03, gc.base);
    ctx.shadowBlur = 0;
  }

  // Features
  if (features.includes('jetpack') && bodyShape === 'humanoid') {
    outlinedRect(ctx, cx - s * 0.05, baseY - s * 0.04, s * 0.1, s * 0.14, bc.shadow);
    if (frameType === 'walk' || frameType === 'idle') {
      const flicker = Math.sin(t * Math.PI * 6) * 0.3;
      ctx.save();
      ctx.globalAlpha = 0.6 + flicker;
      outlinedPoly(ctx, [
        [cx - s * 0.03, baseY + s * 0.1],
        [cx, baseY + s * 0.18 + flicker * s * 0.03],
        [cx + s * 0.03, baseY + s * 0.1],
      ], '#ff8800');
      ctx.restore();
    }
  }

  if (hurtFlash) {
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = 'rgba(255,100,100,0.5)';
    ctx.fillRect(0, 0, s, s);
    ctx.globalCompositeOperation = 'source-over';
  }

  ctx.restore();
}

// ---------------------------------------------------------------------------
// Prop Drawing
// ---------------------------------------------------------------------------

function drawProp(ctx, name, size, palette, variant, frame, totalFrames) {
  const s = size;
  const cx = s / 2;
  const cy = s / 2;
  const pal = typeof palette === 'string'
    ? (Palette.PALETTES[palette] || Palette.PALETTES.fantasy) : (palette || Palette.PALETTES.fantasy);
  const rng = seededRNG(variant || 0);
  const t = totalFrames > 1 ? frame / (totalFrames - 1) : 0;

  switch (name) {
    case 'sword': {
      const bc = shade3(pal[9] || '#cccccc');
      const hc = shade3(pal[7] || '#8b6914');
      // Blade
      outlinedPoly(ctx, [
        [cx - s * 0.06, cy + s * 0.15],
        [cx, cy - s * 0.38],
        [cx + s * 0.06, cy + s * 0.15],
      ], bc.base);
      ctx.fillStyle = bc.highlight;
      ctx.fillRect(Math.floor(cx - 1), Math.floor(cy - s * 0.3), 2, Math.ceil(s * 0.35));
      // Guard
      outlinedRect(ctx, cx - s * 0.12, cy + s * 0.13, s * 0.24, s * 0.04, hc.base);
      // Handle
      outlinedRect(ctx, cx - s * 0.03, cy + s * 0.17, s * 0.06, s * 0.15, hc.shadow);
      // Pommel
      outlinedCircle(ctx, cx, cy + s * 0.34, s * 0.04, hc.base);
      break;
    }
    case 'bow': {
      const wc = shade3('#8b6914');
      ctx.save();
      ctx.translate(cx, cy);
      // Bow body
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.3, -Math.PI * 0.65, Math.PI * 0.65);
      ctx.stroke();
      ctx.strokeStyle = wc.base;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.3, -Math.PI * 0.65, Math.PI * 0.65);
      ctx.stroke();
      // String
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 1;
      ctx.beginPath();
      const y1 = -Math.sin(Math.PI * 0.65) * s * 0.3;
      const x1 = Math.cos(Math.PI * 0.65) * s * 0.3;
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1, -y1);
      ctx.stroke();
      ctx.restore();
      break;
    }
    case 'staff': {
      const wc = shade3('#6b4226');
      const gc = shade3(pal[10] || '#8800ff');
      outlinedRect(ctx, cx - s * 0.03, cy - s * 0.3, s * 0.06, s * 0.65, wc.base);
      ctx.fillStyle = wc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.01), Math.floor(cy - s * 0.25), 2, Math.ceil(s * 0.5));
      // Orb
      const orbGlow = 0.5 + Math.sin(t * Math.PI * 2) * 0.3;
      ctx.shadowColor = gc.base;
      ctx.shadowBlur = 5 * orbGlow;
      outlinedCircle(ctx, cx, cy - s * 0.32, s * 0.08, gc.base);
      ctx.fillStyle = gc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.02, cy - s * 0.34, s * 0.03, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      break;
    }
    case 'axe': {
      const mc = shade3('#aaaaaa');
      const hc = shade3('#8b6914');
      // Handle
      outlinedRect(ctx, cx - s * 0.03, cy - s * 0.1, s * 0.06, s * 0.45, hc.base);
      // Head
      outlinedPoly(ctx, [
        [cx + s * 0.03, cy - s * 0.1],
        [cx + s * 0.2, cy - s * 0.25],
        [cx + s * 0.22, cy + s * 0.05],
        [cx + s * 0.03, cy + s * 0.05],
      ], mc.base);
      ctx.fillStyle = mc.highlight;
      ctx.fillRect(Math.floor(cx + s * 0.08), Math.floor(cy - s * 0.18), 2, Math.ceil(s * 0.12));
      break;
    }
    case 'gun': {
      const mc = shade3('#555555');
      const hc = shade3('#333333');
      outlinedRect(ctx, cx - s * 0.2, cy - s * 0.05, s * 0.4, s * 0.1, mc.base);
      ctx.fillStyle = mc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.15), Math.floor(cy - s * 0.03), Math.ceil(s * 0.12), Math.ceil(s * 0.02));
      outlinedRect(ctx, cx + s * 0.18, cy - s * 0.08, s * 0.04, s * 0.06, mc.shadow);
      outlinedRect(ctx, cx - s * 0.05, cy + s * 0.03, s * 0.08, s * 0.15, hc.base);
      outlinedCircle(ctx, cx + s * 0.22, cy, s * 0.02, mc.shadow);
      break;
    }
    case 'potion': {
      const lc = shade3(pal[5 + Math.floor(rng() * 5)] || '#ff4488');
      const gc2 = shade3('#aaddaa');
      // Bottle neck
      outlinedRect(ctx, cx - s * 0.04, cy - s * 0.25, s * 0.08, s * 0.1, gc2.base);
      // Cork
      outlinedRect(ctx, cx - s * 0.05, cy - s * 0.28, s * 0.1, s * 0.04, '#a0724a');
      // Body
      outlinedEllipse(ctx, cx, cy + s * 0.05, s * 0.14, s * 0.18, gc2.base);
      // Liquid
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(cx, cy + s * 0.05, s * 0.12, s * 0.16, 0, 0, Math.PI * 2);
      ctx.clip();
      const liquidH = s * 0.22 * (0.7 + Math.sin(t * Math.PI * 2) * 0.05);
      ctx.fillStyle = lc.base;
      ctx.fillRect(Math.floor(cx - s * 0.14), Math.floor(cy + s * 0.23 - liquidH), Math.ceil(s * 0.28), Math.ceil(liquidH));
      ctx.fillStyle = lc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.05), Math.floor(cy + s * 0.23 - liquidH), Math.ceil(s * 0.04), Math.ceil(liquidH * 0.3));
      ctx.restore();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(Math.floor(cx + s * 0.04), Math.floor(cy - s * 0.08), 2, Math.ceil(s * 0.12));
      break;
    }
    case 'coin': {
      const gc2 = shade3('#ffd700');
      const angle = t * Math.PI * 2;
      const w = Math.abs(Math.cos(angle)) * s * 0.15;
      outlinedEllipse(ctx, cx, cy, Math.max(w, 2), s * 0.15, gc2.base);
      if (w > s * 0.05) {
        ctx.fillStyle = gc2.shadow;
        ctx.beginPath();
        ctx.ellipse(cx, cy, w * 0.5, s * 0.08, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = gc2.highlight;
        ctx.fillRect(Math.floor(cx - w * 0.2), Math.floor(cy - s * 0.06), Math.max(1, Math.ceil(w * 0.15)), Math.ceil(s * 0.04));
      }
      break;
    }
    case 'key': {
      const kc = shade3('#daa520');
      // Shaft
      outlinedRect(ctx, cx - s * 0.03, cy - s * 0.05, s * 0.06, s * 0.3, kc.base);
      // Head ring
      outlinedCircle(ctx, cx, cy - s * 0.15, s * 0.1, kc.base);
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx, cy - s * 0.15, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      // Teeth
      outlinedRect(ctx, cx + s * 0.01, cy + s * 0.15, s * 0.06, s * 0.03, kc.shadow);
      outlinedRect(ctx, cx + s * 0.01, cy + s * 0.22, s * 0.04, s * 0.03, kc.shadow);
      ctx.fillStyle = kc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.01), Math.floor(cy - s * 0.1), 1, Math.ceil(s * 0.2));
      break;
    }
    case 'gem': {
      const colors = [pal[3], pal[5], pal[10], pal[8]];
      const gc2 = shade3(colors[variant % colors.length] || '#ff0066');
      // Diamond shape
      outlinedPoly(ctx, [
        [cx, cy - s * 0.2],
        [cx + s * 0.15, cy],
        [cx, cy + s * 0.2],
        [cx - s * 0.15, cy],
      ], gc2.base);
      // Facets
      ctx.fillStyle = gc2.shadow;
      outlinedPoly(ctx, [
        [cx, cy - s * 0.2],
        [cx + s * 0.15, cy],
        [cx, cy + s * 0.05],
      ], gc2.shadow);
      ctx.fillStyle = gc2.highlight;
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.05, cy - s * 0.1);
      ctx.lineTo(cx + s * 0.02, cy - s * 0.05);
      ctx.lineTo(cx - s * 0.03, cy + s * 0.02);
      ctx.fill();
      // Sparkle
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillRect(Math.floor(cx - s * 0.06), Math.floor(cy - s * 0.1), 2, 2);
      break;
    }
    case 'heart': {
      const hrc = shade3('#ff2255');
      const pulse = 1 + Math.sin(t * Math.PI * 2) * 0.08;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(pulse, pulse);
      // Heart shape from two arcs + triangle
      ctx.beginPath();
      ctx.moveTo(0, s * 0.08);
      ctx.bezierCurveTo(-s * 0.18, -s * 0.1, -s * 0.18, -s * 0.22, 0, -s * 0.12);
      ctx.bezierCurveTo(s * 0.18, -s * 0.22, s * 0.18, -s * 0.1, 0, s * 0.08);
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#000';
      ctx.stroke();
      ctx.fillStyle = hrc.base;
      ctx.fill();
      // Highlight
      ctx.fillStyle = hrc.highlight;
      ctx.beginPath();
      ctx.arc(-s * 0.06, -s * 0.1, s * 0.035, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      break;
    }
    case 'chest': {
      const wc = shade3('#8b6914');
      const mc = shade3('#daa520');
      // Body
      outlinedRect(ctx, cx - s * 0.2, cy - s * 0.05, s * 0.4, s * 0.25, wc.base);
      ctx.fillStyle = wc.shadow;
      ctx.fillRect(Math.floor(cx - s * 0.2), Math.floor(cy + s * 0.1), Math.ceil(s * 0.4), Math.ceil(s * 0.1));
      // Lid
      outlinedRect(ctx, cx - s * 0.22, cy - s * 0.18, s * 0.44, s * 0.14, wc.highlight);
      ctx.fillStyle = wc.base;
      ctx.fillRect(Math.floor(cx - s * 0.22), Math.floor(cy - s * 0.1), Math.ceil(s * 0.44), Math.ceil(s * 0.05));
      // Lock
      outlinedRect(ctx, cx - s * 0.04, cy - s * 0.02, s * 0.08, s * 0.08, mc.base);
      outlinedCircle(ctx, cx, cy + s * 0.03, s * 0.02, mc.shadow);
      // Metal bands
      outlinedRect(ctx, cx - s * 0.22, cy - s * 0.18, s * 0.03, s * 0.38, mc.shadow);
      outlinedRect(ctx, cx + s * 0.19, cy - s * 0.18, s * 0.03, s * 0.38, mc.shadow);
      break;
    }
    case 'tree': {
      const tc = shade3('#5a3a1a');
      const lc = shade3('#2d7a2d');
      // Trunk
      outlinedRect(ctx, cx - s * 0.06, cy + s * 0.05, s * 0.12, s * 0.3, tc.base);
      ctx.fillStyle = tc.shadow;
      ctx.fillRect(Math.floor(cx + s * 0.02), Math.floor(cy + s * 0.08), Math.ceil(s * 0.04), Math.ceil(s * 0.25));
      // Foliage (3 circles)
      outlinedCircle(ctx, cx, cy - s * 0.1, s * 0.2, lc.base);
      outlinedCircle(ctx, cx - s * 0.12, cy, s * 0.14, lc.shadow);
      outlinedCircle(ctx, cx + s * 0.12, cy, s * 0.14, lc.shadow);
      ctx.fillStyle = lc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.05, cy - s * 0.18, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'rock': {
      const rc = shade3('#888888');
      outlinedPoly(ctx, [
        [cx - s * 0.2, cy + s * 0.15],
        [cx - s * 0.22, cy - s * 0.05],
        [cx - s * 0.08, cy - s * 0.18],
        [cx + s * 0.1, cy - s * 0.15],
        [cx + s * 0.2, cy - s * 0.02],
        [cx + s * 0.18, cy + s * 0.15],
      ], rc.base);
      // Shadow side
      ctx.fillStyle = rc.shadow;
      ctx.beginPath();
      ctx.moveTo(cx + s * 0.1, cy - s * 0.15);
      ctx.lineTo(cx + s * 0.2, cy - s * 0.02);
      ctx.lineTo(cx + s * 0.18, cy + s * 0.15);
      ctx.lineTo(cx, cy + s * 0.15);
      ctx.fill();
      ctx.fillStyle = rc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.12), Math.floor(cy - s * 0.12), Math.ceil(s * 0.06), Math.ceil(s * 0.06));
      break;
    }
    case 'crate': {
      const wc = shade3('#b8860b');
      outlinedRect(ctx, cx - s * 0.2, cy - s * 0.2, s * 0.4, s * 0.4, wc.base);
      ctx.fillStyle = wc.shadow;
      ctx.fillRect(Math.floor(cx - s * 0.2), Math.floor(cy), Math.ceil(s * 0.4), Math.ceil(s * 0.2));
      // Cross braces
      ctx.strokeStyle = wc.shadow;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.18, cy - s * 0.18);
      ctx.lineTo(cx + s * 0.18, cy + s * 0.18);
      ctx.moveTo(cx + s * 0.18, cy - s * 0.18);
      ctx.lineTo(cx - s * 0.18, cy + s * 0.18);
      ctx.stroke();
      // Metal corners
      outlinedRect(ctx, cx - s * 0.2, cy - s * 0.2, s * 0.06, s * 0.06, '#888');
      outlinedRect(ctx, cx + s * 0.14, cy - s * 0.2, s * 0.06, s * 0.06, '#888');
      outlinedRect(ctx, cx - s * 0.2, cy + s * 0.14, s * 0.06, s * 0.06, '#888');
      outlinedRect(ctx, cx + s * 0.14, cy + s * 0.14, s * 0.06, s * 0.06, '#888');
      break;
    }
    case 'door': {
      const wc = shade3('#6b3a1a');
      outlinedRect(ctx, cx - s * 0.18, cy - s * 0.3, s * 0.36, s * 0.55, wc.base);
      ctx.fillStyle = wc.shadow;
      ctx.fillRect(Math.floor(cx), Math.floor(cy - s * 0.28), Math.ceil(s * 0.16), Math.ceil(s * 0.51));
      // Planks
      ctx.strokeStyle = wc.shadow;
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const dx = cx - s * 0.16 + i * s * 0.12;
        ctx.beginPath();
        ctx.moveTo(dx, cy - s * 0.28);
        ctx.lineTo(dx, cy + s * 0.23);
        ctx.stroke();
      }
      // Cross brace
      outlinedRect(ctx, cx - s * 0.17, cy - s * 0.1, s * 0.34, s * 0.04, wc.shadow);
      // Handle
      outlinedCircle(ctx, cx + s * 0.1, cy, s * 0.03, '#daa520');
      // Frame
      outlinedRect(ctx, cx - s * 0.22, cy - s * 0.33, s * 0.04, s * 0.62, '#555');
      outlinedRect(ctx, cx + s * 0.18, cy - s * 0.33, s * 0.04, s * 0.62, '#555');
      outlinedRect(ctx, cx - s * 0.22, cy - s * 0.33, s * 0.44, s * 0.04, '#555');
      break;
    }
    case 'torch': {
      const wc = shade3('#6b3a1a');
      const fc = shade3('#ff6600');
      // Handle
      outlinedRect(ctx, cx - s * 0.03, cy - s * 0.05, s * 0.06, s * 0.35, wc.base);
      // Flame
      const flicker = Math.sin(t * Math.PI * 4) * s * 0.02;
      const fSize = 1 + Math.sin(t * Math.PI * 2) * 0.15;
      ctx.save();
      ctx.translate(cx, cy - s * 0.1);
      ctx.scale(fSize, fSize);
      // Outer flame
      ctx.beginPath();
      ctx.moveTo(-s * 0.06 + flicker, 0);
      ctx.quadraticCurveTo(-s * 0.04, -s * 0.12, flicker * 0.5, -s * 0.2);
      ctx.quadraticCurveTo(s * 0.04, -s * 0.12, s * 0.06 + flicker, 0);
      ctx.fillStyle = fc.base;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fill();
      // Inner flame
      ctx.beginPath();
      ctx.moveTo(-s * 0.03, 0);
      ctx.quadraticCurveTo(-s * 0.02, -s * 0.08, flicker * 0.3, -s * 0.14);
      ctx.quadraticCurveTo(s * 0.02, -s * 0.08, s * 0.03, 0);
      ctx.fillStyle = '#ffdd44';
      ctx.fill();
      ctx.restore();
      break;
    }
    case 'barrel': {
      const wc = shade3('#8b6914');
      const mc = shade3('#888888');
      outlinedEllipse(ctx, cx, cy, s * 0.18, s * 0.22, wc.base);
      ctx.fillStyle = wc.shadow;
      ctx.beginPath();
      ctx.ellipse(cx + s * 0.05, cy, s * 0.1, s * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Bands
      outlinedRect(ctx, cx - s * 0.19, cy - s * 0.12, s * 0.38, s * 0.03, mc.base);
      outlinedRect(ctx, cx - s * 0.19, cy + s * 0.09, s * 0.38, s * 0.03, mc.base);
      // Top ellipse
      outlinedEllipse(ctx, cx, cy - s * 0.2, s * 0.16, s * 0.06, wc.highlight);
      ctx.fillStyle = wc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.08), Math.floor(cy - s * 0.18), Math.ceil(s * 0.04), Math.ceil(s * 0.04));
      break;
    }
    case 'sign': {
      const wc = shade3('#8b6914');
      // Post
      outlinedRect(ctx, cx - s * 0.03, cy - s * 0.05, s * 0.06, s * 0.4, wc.shadow);
      // Sign board
      outlinedRect(ctx, cx - s * 0.2, cy - s * 0.25, s * 0.4, s * 0.22, wc.base);
      ctx.fillStyle = wc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.16), Math.floor(cy - s * 0.21), Math.ceil(s * 0.32), Math.ceil(s * 0.02));
      // Text lines (decorative)
      ctx.fillStyle = wc.shadow;
      ctx.fillRect(Math.floor(cx - s * 0.12), Math.floor(cy - s * 0.17), Math.ceil(s * 0.24), Math.ceil(s * 0.02));
      ctx.fillRect(Math.floor(cx - s * 0.1), Math.floor(cy - s * 0.12), Math.ceil(s * 0.2), Math.ceil(s * 0.02));
      break;
    }
    case 'gravestone': {
      const sc = shade3('#777788');
      // Base
      outlinedRect(ctx, cx - s * 0.15, cy + s * 0.1, s * 0.3, s * 0.06, sc.shadow);
      // Stone
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.12, cy + s * 0.12);
      ctx.lineTo(cx - s * 0.12, cy - s * 0.1);
      ctx.arc(cx, cy - s * 0.1, s * 0.12, Math.PI, 0);
      ctx.lineTo(cx + s * 0.12, cy + s * 0.12);
      ctx.closePath();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = sc.base;
      ctx.fill();
      // RIP text
      ctx.fillStyle = sc.shadow;
      ctx.fillRect(Math.floor(cx - s * 0.06), Math.floor(cy - s * 0.05), Math.ceil(s * 0.12), Math.ceil(s * 0.02));
      ctx.fillRect(Math.floor(cx - s * 0.04), Math.floor(cy), Math.ceil(s * 0.08), Math.ceil(s * 0.02));
      // Crack
      ctx.strokeStyle = sc.shadow;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(cx + s * 0.02, cy - s * 0.08);
      ctx.lineTo(cx + s * 0.04, cy + s * 0.04);
      ctx.stroke();
      break;
    }
    case 'crystal': {
      const cc = shade3(pal[10] || '#aa44ff');
      const glow = 0.5 + Math.sin(t * Math.PI * 2) * 0.3;
      ctx.save();
      ctx.shadowColor = cc.base;
      ctx.shadowBlur = 4 * glow;
      // Main crystal
      outlinedPoly(ctx, [
        [cx, cy - s * 0.3],
        [cx + s * 0.1, cy + s * 0.02],
        [cx + s * 0.06, cy + s * 0.18],
        [cx - s * 0.06, cy + s * 0.18],
        [cx - s * 0.1, cy + s * 0.02],
      ], cc.base);
      ctx.fillStyle = cc.highlight;
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.04, cy - s * 0.2);
      ctx.lineTo(cx, cy - s * 0.28);
      ctx.lineTo(cx + s * 0.02, cy);
      ctx.lineTo(cx - s * 0.04, cy + s * 0.05);
      ctx.fill();
      // Small crystals
      outlinedPoly(ctx, [
        [cx - s * 0.12, cy + s * 0.18],
        [cx - s * 0.14, cy - s * 0.05],
        [cx - s * 0.08, cy + s * 0.18],
      ], cc.shadow);
      outlinedPoly(ctx, [
        [cx + s * 0.08, cy + s * 0.18],
        [cx + s * 0.12, cy],
        [cx + s * 0.14, cy + s * 0.18],
      ], cc.shadow);
      ctx.shadowBlur = 0;
      ctx.restore();
      break;
    }
    default:
      outlinedRect(ctx, cx - s * 0.2, cy - s * 0.2, s * 0.4, s * 0.4, '#ff00ff');
      break;
  }
}
