function drawPanel9Slice(ctx, style, w, h, cornerRadius, borderWidth) {
  let bg, border, highlight, shadow;
  switch (style) {
    case 'stone': bg = '#555566'; border = '#333344'; highlight = '#777788'; shadow = '#222233'; break;
    case 'wood': bg = '#8b6914'; border = '#5a3a0a'; highlight = '#aa8833'; shadow = '#4a2a05'; break;
    case 'metal': bg = '#6a6a7e'; border = '#3a3a4e'; highlight = '#8a8a9e'; shadow = '#2a2a3e'; break;
    case 'dark': bg = '#222233'; border = '#111122'; highlight = '#333344'; shadow = '#000011'; break;
    case 'light':
    default: bg = '#e8e0d0'; border = '#a09080'; highlight = '#fff8f0'; shadow = '#887766'; break;
  }

  const cr = cornerRadius || Math.min(w, h) * 0.1;
  const bw = borderWidth || 2;

  // Outer border
  ctx.fillStyle = border;
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, cr);
  ctx.fill();

  // Inner fill
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(bw, bw, w - bw * 2, h - bw * 2, Math.max(0, cr - bw));
  ctx.fill();

  // Top highlight
  ctx.fillStyle = highlight;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(bw + 2, bw + 1, w - bw * 2 - 4, Math.max(1, bw));
  ctx.globalAlpha = 1;

  // Bottom shadow
  ctx.fillStyle = shadow;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(bw + 2, h - bw * 2, w - bw * 2 - 4, Math.max(1, bw));
  ctx.globalAlpha = 1;
}

function drawButton(ctx, style, w, h, state) {
  let bg, border, text;
  switch (style) {
    case 'stone': bg = '#667788'; border = '#445566'; break;
    case 'wood': bg = '#aa8833'; border = '#775500'; break;
    case 'metal': bg = '#8888aa'; border = '#555577'; break;
    default: bg = '#5577bb'; border = '#334488'; break;
  }

  const pressed = state === 'pressed';
  const hover = state === 'hover';
  const disabled = state === 'disabled';

  if (disabled) { bg = Palette.darken(bg, 0.3); border = Palette.darken(border, 0.3); }
  if (hover) { bg = Palette.lighten(bg, 0.15); }

  const yOff = pressed ? 1 : 0;
  const shadowH = pressed ? 1 : 3;

  // Shadow
  ctx.fillStyle = Palette.darken(border, 0.3);
  ctx.beginPath();
  ctx.roundRect(0, shadowH, w, h, 4);
  ctx.fill();

  // Button body
  ctx.fillStyle = border;
  ctx.beginPath();
  ctx.roundRect(0, yOff, w, h - 2, 4);
  ctx.fill();

  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(1, yOff + 1, w - 2, h - 4, 3);
  ctx.fill();

  // Top highlight
  if (!pressed) {
    ctx.fillStyle = Palette.lighten(bg, 0.3);
    ctx.globalAlpha = 0.4;
    ctx.fillRect(3, yOff + 2, w - 6, Math.max(1, Math.floor(h * 0.15)));
    ctx.globalAlpha = 1;
  }
}

function drawBar(ctx, w, h, style, fillColor, bgColor, borderColor, fillPercent) {
  const bc = borderColor || '#333';
  const bg = bgColor || '#222';
  const fc = fillColor || '#44cc44';
  const fp = clamp(fillPercent || 1, 0, 1);

  // Border
  ctx.fillStyle = bc;
  if (style === 'rounded') {
    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, h / 2);
    ctx.fill();
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.roundRect(1, 1, w - 2, h - 2, (h - 2) / 2);
    ctx.fill();
    if (fp > 0) {
      ctx.fillStyle = fc;
      ctx.beginPath();
      ctx.roundRect(2, 2, (w - 4) * fp, h - 4, (h - 4) / 2);
      ctx.fill();
      // Shine
      ctx.fillStyle = Palette.lighten(fc, 0.4);
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.roundRect(3, 3, (w - 4) * fp - 2, Math.max(1, (h - 4) * 0.35), 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  } else if (style === 'segmented') {
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = bg;
    ctx.fillRect(1, 1, w - 2, h - 2);
    const segCount = Math.floor(w / (h * 0.8));
    const segW = (w - 4) / segCount;
    const filled = Math.floor(segCount * fp);
    for (let i = 0; i < segCount; i++) {
      ctx.fillStyle = i < filled ? fc : Palette.darken(bg, 0.2);
      ctx.fillRect(2 + i * segW + 1, 2, segW - 2, h - 4);
    }
  } else {
    // smooth
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = bg;
    ctx.fillRect(1, 1, w - 2, h - 2);
    if (fp > 0) {
      ctx.fillStyle = fc;
      ctx.fillRect(2, 2, (w - 4) * fp, h - 4);
      ctx.fillStyle = Palette.lighten(fc, 0.3);
      ctx.globalAlpha = 0.4;
      ctx.fillRect(2, 2, (w - 4) * fp, Math.max(1, (h - 4) * 0.35));
      ctx.globalAlpha = 1;
    }
  }
}

function drawIcon(ctx, name, size, color) {
  const s = size;
  const cx = s / 2;
  const cy = s / 2;
  const c = color || '#ffffff';
  const sc = shade3(c);

  switch (name) {
    case 'heart': {
      ctx.beginPath();
      ctx.moveTo(cx, cy + s * 0.15);
      ctx.bezierCurveTo(cx - s * 0.3, cy - s * 0.05, cx - s * 0.3, cy - s * 0.28, cx, cy - s * 0.12);
      ctx.bezierCurveTo(cx + s * 0.3, cy - s * 0.28, cx + s * 0.3, cy - s * 0.05, cx, cy + s * 0.15);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = sc.base;
      ctx.fill();
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.1, cy - s * 0.12, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'star': {
      const pts = [];
      for (let i = 0; i < 10; i++) {
        const a = (i * Math.PI * 2 / 10) - Math.PI / 2;
        const r = i % 2 === 0 ? s * 0.35 : s * 0.15;
        pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
      }
      outlinedPoly(ctx, pts, sc.base);
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.05, cy - s * 0.08, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'coin': {
      outlinedCircle(ctx, cx, cy, s * 0.3, sc.base);
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.06, cy - s * 0.06, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'gem': {
      outlinedPoly(ctx, [
        [cx, cy - s * 0.3],
        [cx + s * 0.25, cy],
        [cx, cy + s * 0.3],
        [cx - s * 0.25, cy],
      ], sc.base);
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.3);
      ctx.lineTo(cx + s * 0.25, cy);
      ctx.lineTo(cx, cy + s * 0.08);
      ctx.fill();
      ctx.fillStyle = sc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.08), Math.floor(cy - s * 0.15), 2, Math.ceil(s * 0.1));
      break;
    }
    case 'sword': {
      // Blade
      outlinedPoly(ctx, [
        [cx, cy - s * 0.35],
        [cx + s * 0.06, cy + s * 0.05],
        [cx - s * 0.06, cy + s * 0.05],
      ], '#ccc');
      ctx.fillStyle = '#eee';
      ctx.fillRect(Math.floor(cx - 1), Math.floor(cy - s * 0.3), 1, Math.ceil(s * 0.3));
      outlinedRect(ctx, cx - s * 0.15, cy + s * 0.03, s * 0.3, s * 0.04, '#8b6914');
      outlinedRect(ctx, cx - s * 0.04, cy + s * 0.07, s * 0.08, s * 0.18, '#6b4e10');
      break;
    }
    case 'shield': {
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.3);
      ctx.lineTo(cx + s * 0.25, cy - s * 0.15);
      ctx.lineTo(cx + s * 0.2, cy + s * 0.15);
      ctx.lineTo(cx, cy + s * 0.3);
      ctx.lineTo(cx - s * 0.2, cy + s * 0.15);
      ctx.lineTo(cx - s * 0.25, cy - s * 0.15);
      ctx.closePath();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = sc.base;
      ctx.fill();
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.15);
      ctx.lineTo(cx + s * 0.12, cy);
      ctx.lineTo(cx, cy + s * 0.18);
      ctx.lineTo(cx - s * 0.12, cy);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'potion': {
      outlinedRect(ctx, cx - s * 0.06, cy - s * 0.25, s * 0.12, s * 0.1, '#aaddaa');
      outlinedRect(ctx, cx - s * 0.08, cy - s * 0.28, s * 0.16, s * 0.04, '#a0724a');
      outlinedEllipse(ctx, cx, cy + s * 0.08, s * 0.18, s * 0.22, '#aaddaa');
      ctx.fillStyle = sc.base;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.ellipse(cx, cy + s * 0.08, s * 0.14, s * 0.16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    }
    case 'key': {
      outlinedCircle(ctx, cx - s * 0.08, cy - s * 0.1, s * 0.12, sc.base);
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx - s * 0.08, cy - s * 0.1, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      outlinedRect(ctx, cx - s * 0.02, cy - s * 0.12, s * 0.28, s * 0.04, sc.base);
      outlinedRect(ctx, cx + s * 0.18, cy - s * 0.1, s * 0.04, s * 0.08, sc.shadow);
      outlinedRect(ctx, cx + s * 0.1, cy - s * 0.1, s * 0.04, s * 0.06, sc.shadow);
      break;
    }
    case 'gear': {
      const teeth = 8;
      const outerR = s * 0.3;
      const innerR = s * 0.2;
      const pts = [];
      for (let i = 0; i < teeth * 2; i++) {
        const a = (i * Math.PI / teeth) - Math.PI / 2;
        const r = i % 2 === 0 ? outerR : innerR;
        pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
      }
      outlinedPoly(ctx, pts, sc.base);
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'arrow': {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-Math.PI / 4);
      // Shaft
      outlinedRect(ctx, -1, -s * 0.25, 2, s * 0.5, '#8b6914');
      // Head
      outlinedPoly(ctx, [
        [0, -s * 0.32],
        [-s * 0.08, -s * 0.2],
        [s * 0.08, -s * 0.2],
      ], '#aaa');
      // Fletching
      outlinedPoly(ctx, [
        [-1, s * 0.2],
        [-s * 0.06, s * 0.28],
        [-1, s * 0.25],
      ], '#cc4444');
      outlinedPoly(ctx, [
        [1, s * 0.2],
        [s * 0.06, s * 0.28],
        [1, s * 0.25],
      ], '#cc4444');
      ctx.restore();
      break;
    }
    case 'fire': {
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.15, cy + s * 0.2);
      ctx.quadraticCurveTo(cx - s * 0.2, cy - s * 0.1, cx - s * 0.05, cy - s * 0.15);
      ctx.quadraticCurveTo(cx - s * 0.08, cy - s * 0.25, cx, cy - s * 0.32);
      ctx.quadraticCurveTo(cx + s * 0.08, cy - s * 0.25, cx + s * 0.05, cy - s * 0.15);
      ctx.quadraticCurveTo(cx + s * 0.2, cy - s * 0.1, cx + s * 0.15, cy + s * 0.2);
      ctx.closePath();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#ff6600';
      ctx.fill();
      // Inner
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.06, cy + s * 0.15);
      ctx.quadraticCurveTo(cx - s * 0.08, cy, cx, cy - s * 0.15);
      ctx.quadraticCurveTo(cx + s * 0.08, cy, cx + s * 0.06, cy + s * 0.15);
      ctx.fillStyle = '#ffcc00';
      ctx.fill();
      break;
    }
    case 'ice': {
      // Snowflake
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const a = i * Math.PI / 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * s * 0.28, cy + Math.sin(a) * s * 0.28);
        ctx.lineTo(cx - Math.cos(a) * s * 0.28, cy - Math.sin(a) * s * 0.28);
        ctx.stroke();
      }
      ctx.strokeStyle = sc.base;
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 3; i++) {
        const a = i * Math.PI / 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * s * 0.26, cy + Math.sin(a) * s * 0.26);
        ctx.lineTo(cx - Math.cos(a) * s * 0.26, cy - Math.sin(a) * s * 0.26);
        ctx.stroke();
        // Branches
        for (let d = -1; d <= 1; d += 2) {
          const bx = cx + Math.cos(a) * s * 0.15;
          const by = cy + Math.sin(a) * s * 0.15;
          const ba = a + d * Math.PI / 4;
          ctx.beginPath();
          ctx.moveTo(bx, by);
          ctx.lineTo(bx + Math.cos(ba) * s * 0.08, by + Math.sin(ba) * s * 0.08);
          ctx.stroke();
        }
      }
      outlinedCircle(ctx, cx, cy, s * 0.04, sc.highlight);
      break;
    }
    case 'lightning': {
      outlinedPoly(ctx, [
        [cx + s * 0.05, cy - s * 0.35],
        [cx - s * 0.08, cy - s * 0.02],
        [cx + s * 0.06, cy - s * 0.02],
        [cx - s * 0.05, cy + s * 0.35],
        [cx + s * 0.08, cy + s * 0.02],
        [cx - s * 0.06, cy + s * 0.02],
      ], sc.base);
      ctx.fillStyle = sc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.02), Math.floor(cy - s * 0.2), 2, Math.ceil(s * 0.15));
      break;
    }
    case 'skull': {
      outlinedCircle(ctx, cx, cy - s * 0.05, s * 0.22, '#eee');
      // Eye sockets
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(cx - s * 0.08, cy - s * 0.08, s * 0.06, s * 0.07, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + s * 0.08, cy - s * 0.08, s * 0.06, s * 0.07, 0, 0, Math.PI * 2);
      ctx.fill();
      // Nose
      ctx.fillStyle = '#000';
      outlinedPoly(ctx, [[cx - s * 0.03, cy + s * 0.02], [cx, cy + s * 0.08], [cx + s * 0.03, cy + s * 0.02]], '#333');
      // Jaw
      outlinedRect(ctx, cx - s * 0.15, cy + s * 0.1, s * 0.3, s * 0.1, '#ddd');
      // Teeth
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = '#000';
        ctx.fillRect(Math.floor(cx - s * 0.1 + i * s * 0.07), Math.floor(cy + s * 0.1), 1, Math.ceil(s * 0.04));
      }
      break;
    }
    case 'crown': {
      outlinedRect(ctx, cx - s * 0.25, cy, s * 0.5, s * 0.18, sc.base);
      outlinedPoly(ctx, [
        [cx - s * 0.25, cy],
        [cx - s * 0.2, cy - s * 0.22],
        [cx - s * 0.1, cy - s * 0.08],
        [cx, cy - s * 0.28],
        [cx + s * 0.1, cy - s * 0.08],
        [cx + s * 0.2, cy - s * 0.22],
        [cx + s * 0.25, cy],
      ], sc.base);
      // Gems
      outlinedCircle(ctx, cx, cy - s * 0.18, s * 0.035, '#ff0044');
      outlinedCircle(ctx, cx - s * 0.18, cy - s * 0.14, s * 0.025, '#4488ff');
      outlinedCircle(ctx, cx + s * 0.18, cy - s * 0.14, s * 0.025, '#4488ff');
      ctx.fillStyle = sc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.2), Math.floor(cy + s * 0.02), Math.ceil(s * 0.4), Math.ceil(s * 0.03));
      break;
    }
    case 'music': {
      // Notes
      outlinedCircle(ctx, cx - s * 0.1, cy + s * 0.1, s * 0.08, sc.base);
      outlinedCircle(ctx, cx + s * 0.1, cy + s * 0.02, s * 0.08, sc.base);
      // Stems
      outlinedRect(ctx, cx - s * 0.04, cy - s * 0.25, 2, s * 0.37, sc.base);
      outlinedRect(ctx, cx + s * 0.16, cy - s * 0.33, 2, s * 0.37, sc.base);
      // Beam
      outlinedRect(ctx, cx - s * 0.04, cy - s * 0.27, s * 0.22, s * 0.04, sc.base);
      break;
    }
    case 'pause': {
      outlinedRect(ctx, cx - s * 0.18, cy - s * 0.22, s * 0.12, s * 0.44, sc.base);
      outlinedRect(ctx, cx + s * 0.06, cy - s * 0.22, s * 0.12, s * 0.44, sc.base);
      break;
    }
    case 'play': {
      outlinedPoly(ctx, [
        [cx - s * 0.15, cy - s * 0.25],
        [cx + s * 0.22, cy],
        [cx - s * 0.15, cy + s * 0.25],
      ], sc.base);
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.08, cy - s * 0.12);
      ctx.lineTo(cx + s * 0.05, cy - s * 0.02);
      ctx.lineTo(cx - s * 0.08, cy + s * 0.08);
      ctx.fill();
      break;
    }
    default:
      outlinedRect(ctx, cx - s * 0.2, cy - s * 0.2, s * 0.4, s * 0.4, '#ff00ff');
      break;
  }
}

// ---------------------------------------------------------------------------
// Effect Drawing
// ---------------------------------------------------------------------------

function drawEffect(ctx, type, size, color, frame, totalFrames) {
  const s = size;
  const cx = s / 2;
  const cy = s / 2;
  const t = totalFrames > 1 ? frame / (totalFrames - 1) : 0;
  const ec = shade3(color || '#ff8800');
  const rng = seededRNG(frame * 31 + 7);

  switch (type) {
    case 'explosion': {
      const radius = s * 0.1 + t * s * 0.35;
      const alpha = 1 - t * 0.8;
      ctx.globalAlpha = alpha;
      // Outer glow
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = s * 0.1;
      outlinedCircle(ctx, cx, cy, radius, ec.base);
      ctx.shadowBlur = 0;
      // Inner
      outlinedCircle(ctx, cx, cy, radius * 0.6, ec.highlight);
      // Core
      if (t < 0.5) {
        outlinedCircle(ctx, cx, cy, radius * 0.25, '#fff');
      }
      // Particles
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + rng() * 0.3;
        const d = radius * (0.8 + rng() * 0.5);
        const px = cx + Math.cos(a) * d;
        const py = cy + Math.sin(a) * d;
        const pr = s * 0.02 * (1 - t);
        if (pr > 0.5) {
          ctx.fillStyle = rng() > 0.5 ? ec.base : ec.highlight;
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'muzzleFlash': {
      const alpha = 1 - t;
      ctx.globalAlpha = alpha;
      const len = s * 0.3 * (1 - t * 0.5);
      const w = s * 0.08 * (1 - t * 0.7);
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = s * 0.08;
      // Main flash
      outlinedEllipse(ctx, cx + len * 0.3, cy, len, w, ec.highlight);
      // Core
      outlinedEllipse(ctx, cx, cy, len * 0.3, w * 0.5, '#fff');
      // Side flashes
      for (let i = 0; i < 3; i++) {
        const a = (i - 1) * 0.6;
        const fl = len * (0.3 + rng() * 0.3);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(a);
        outlinedEllipse(ctx, fl * 0.4, 0, fl, w * 0.4, ec.base);
        ctx.restore();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      break;
    }
    case 'magicCircle': {
      const alpha = 0.5 + Math.sin(t * Math.PI) * 0.5;
      const rot = t * Math.PI * 2;
      ctx.globalAlpha = alpha;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      // Outer ring
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = ec.base;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
      ctx.stroke();
      // Inner ring
      ctx.strokeStyle = ec.highlight;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.22, 0, Math.PI * 2);
      ctx.stroke();
      // Runes (small circles)
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const rx = Math.cos(a) * s * 0.28;
        const ry = Math.sin(a) * s * 0.28;
        ctx.fillStyle = ec.highlight;
        ctx.beginPath();
        ctx.arc(rx, ry, s * 0.03, 0, Math.PI * 2);
        ctx.fill();
      }
      // Inner star
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const x = Math.cos(a) * s * 0.2;
        const y = Math.sin(a) * s * 0.2;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = ec.base;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
      // Center glow
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = 6;
      ctx.fillStyle = ec.highlight;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      break;
    }
    case 'slash': {
      const alpha = 1 - t * 0.7;
      ctx.globalAlpha = alpha;
      const sweep = t * Math.PI * 1.2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-Math.PI * 0.6 + sweep * 0.3);
      // Slash arc
      const startAngle = -Math.PI * 0.3;
      const endAngle = startAngle + sweep;
      const thickness = s * 0.06 * (1 - t * 0.5);
      for (let r = s * 0.15; r < s * 0.4; r += thickness) {
        ctx.beginPath();
        ctx.arc(0, 0, r, startAngle, endAngle);
        ctx.lineWidth = thickness;
        ctx.strokeStyle = r < s * 0.25 ? '#fff' : ec.base;
        ctx.stroke();
      }
      // Trail particles
      for (let i = 0; i < 5; i++) {
        const a = startAngle + (endAngle - startAngle) * rng();
        const d = s * 0.2 + rng() * s * 0.2;
        ctx.fillStyle = ec.highlight;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * d, Math.sin(a) * d, s * 0.015 * (1 - t), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
      break;
    }
    case 'impact': {
      const alpha = 1 - t;
      ctx.globalAlpha = alpha;
      const spread = t * s * 0.35;
      // Central flash
      if (t < 0.3) {
        outlinedCircle(ctx, cx, cy, s * 0.08 * (1 - t), '#fff');
      }
      // Radial lines
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + rng() * 0.3;
        const innerR = spread * 0.3;
        const outerR = spread + rng() * s * 0.05;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
        ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
        ctx.stroke();
        ctx.strokeStyle = i % 2 === 0 ? ec.base : ec.highlight;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
        ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
        ctx.stroke();
      }
      // Debris
      for (let i = 0; i < 6; i++) {
        const a = rng() * Math.PI * 2;
        const d = spread * (0.5 + rng() * 0.5);
        const sz = s * 0.02 * (1 - t);
        if (sz > 0.5) {
          ctx.fillStyle = ec.base;
          ctx.fillRect(Math.floor(cx + Math.cos(a) * d), Math.floor(cy + Math.sin(a) * d), Math.ceil(sz), Math.ceil(sz));
        }
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'aura': {
      const pulse = 0.7 + Math.sin(t * Math.PI * 2) * 0.3;
      const radius = s * 0.3 * pulse;
      // Outer glow
      ctx.globalAlpha = 0.2 + pulse * 0.15;
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = s * 0.15;
      ctx.beginPath();
      ctx.arc(cx, cy, radius + s * 0.05, 0, Math.PI * 2);
      ctx.fillStyle = ec.base;
      ctx.fill();
      ctx.shadowBlur = 0;
      // Main aura
      ctx.globalAlpha = 0.3 + pulse * 0.2;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fillStyle = ec.base;
      ctx.fill();
      // Inner glow
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = ec.highlight;
      ctx.fill();
      // Rising particles
      ctx.globalAlpha = 0.8;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + t * Math.PI;
        const d = radius * (0.5 + Math.sin(t * Math.PI * 2 + i) * 0.3);
        const py = cy + Math.sin(t * Math.PI * 2 + i * 2) * s * 0.05;
        ctx.fillStyle = ec.highlight;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * d, py + Math.sin(a) * d * 0.3, s * 0.02, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    }
    default:
      outlinedCircle(ctx, cx, cy, s * 0.3, ec.base);
      break;
  }
}

// ---------------------------------------------------------------------------
// SpriteForge - Main API
// ---------------------------------------------------------------------------

const _cache = new SpriteCache(256);

/**
 * Main procedural sprite generation API.
 * All methods cache results automatically.
 */
class SpriteForge {
  /**
   * Generate a complete animated character sprite sheet.
   * @param {object} config - Character configuration
   * @returns {{ sheet: SpriteSheet, animator: SpriteAnimator, animations: object }}
   */
  static character(config) {
    const key = JSON.stringify({ _type: 'character', ...config });
    const cached = _cache.get(key);
    if (cached) {
      const anims = buildCharAnimDefs(config, cached);
      return { sheet: cached, animator: new SpriteAnimator(cached, anims), animations: anims };
    }

    const style = config.style || 'humanoid';
    const size = config.size || 32;
    const animConfig = config.animations || {
      idle: { frames: 4, speed: 0.2 },
      walk: { frames: 6, speed: 0.1 },
      attack: { frames: 4, speed: 0.08 },
      hurt: { frames: 2, speed: 0.1 },
      death: { frames: 4, speed: 0.15 },
    };

    // Count total frames
    let totalFrames = 0;
    const animNames = Object.keys(animConfig);
    for (const name of animNames) totalFrames += animConfig[name].frames;

    // Compute grid
    const cols = Math.ceil(Math.sqrt(totalFrames));
    const rows = Math.ceil(totalFrames / cols);
    const canvas = sf_makeCanvas(cols * size, rows * size);
    const ctx = canvas.getContext('2d');

    let frameIdx = 0;
    for (const animName of animNames) {
      const ac = animConfig[animName];
      for (let f = 0; f < ac.frames; f++) {
        const col = frameIdx % cols;
        const row = Math.floor(frameIdx / cols);
        {
          // Draw to a temp canvas with extra headroom so tall features (hair, hats) aren't clipped.
          // Then bottom-align and copy the bottom size×size pixels into the real frame.
          const headroom = Math.ceil(size * 0.4);
          const tmpCvs = sf_makeCanvas(size, size + headroom);
          const tmpCtx = tmpCvs.getContext('2d');
          tmpCtx.translate(0, headroom); // draw origin offset down by headroom

          if (style === 'humanoid') {
            drawHumanoidFrame(tmpCtx, config, size, animName, f, ac.frames);
          } else if (style === 'creature') {
            drawCreatureFrame(tmpCtx, config, size, animName, f, ac.frames);
          } else if (style === 'robot') {
            drawRobotFrame(tmpCtx, config, size, animName, f, ac.frames);
          }

          bottomAlignFrame(tmpCtx, 0, 0, size, size + headroom);
          // Copy bottom size rows into the real sheet frame
          ctx.drawImage(tmpCvs, 0, headroom, size, size, col * size, row * size, size, size);
        }
        frameIdx++;
      }
    }

    const sheet = new SpriteSheet(canvas, size, size, cols, rows);

    // Name frames
    let idx = 0;
    for (const animName of animNames) {
      const ac = animConfig[animName];
      for (let f = 0; f < ac.frames; f++) {
        sheet.nameFrame(`${animName}_${f}`, idx);
        idx++;
      }
    }

    _cache.set(key, sheet);
    const anims = buildCharAnimDefs(config, sheet);
    return { sheet, animator: new SpriteAnimator(sheet, anims), animations: anims };
  }

  /**
   * Generate a prop sprite (weapon, item, structure).
   * @param {object} config - Prop configuration
   * @returns {{ sheet: SpriteSheet, animator?: SpriteAnimator }}
   */
  static prop(config) {
    const key = JSON.stringify({ _type: 'prop', ...config });
    const cached = _cache.get(key);
    if (cached) {
      const result = { sheet: cached };
      if (config.animated) {
        const frames = config.animFrames || 4;
        const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed: config.animSpeed || 0.15, loop: true } };
        result.animator = new SpriteAnimator(cached, anims);
      }
      return result;
    }

    const size = config.size || 32;
    const name = config.name || 'sword';
    const animated = config.animated || false;
    const frames = animated ? (config.animFrames || 4) : 1;
    const cols = frames;
    const rows = 1;

    const canvas = sf_makeCanvas(cols * size, rows * size);
    const ctx = canvas.getContext('2d');

    for (let f = 0; f < frames; f++) {
      ctx.save();
      ctx.translate(f * size, 0);
      ctx.clearRect(0, 0, size, size);
      drawProp(ctx, name, size, config.palette, config.variant || 0, f, frames);
      ctx.restore();
      bottomAlignFrame(ctx, f * size, 0, size, size);
    }

    const sheet = new SpriteSheet(canvas, size, size, cols, rows);
    for (let f = 0; f < frames; f++) {
      sheet.nameFrame(`${name}_${f}`, f);
    }
    _cache.set(key, sheet);

    const result = { sheet };
    if (animated) {
      const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed: config.animSpeed || 0.15, loop: true } };
      result.animator = new SpriteAnimator(sheet, anims);
    }
    return result;
  }

  /**
   * Generate terrain tiles.
   * @param {object} config - Terrain configuration
   * @returns {{ sheet: SpriteSheet, getTile: Function }}
   */
  static terrain(config) {
    const key = JSON.stringify({ _type: 'terrain', ...config });
    const cached = _cache.get(key);
    if (cached) {
      return { sheet: cached, getTile: (neighbors) => autoTileLookup(neighbors) };
    }

    const type = config.type || 'grass';
    const tileSize = config.tileSize || 32;
    const variation = config.variation || 1;
    const autoTile = config.autoTile || false;
    const decorations = config.decorations || [];
    const decorationDensity = config.decorationDensity || 0.3;
    const animated = config.animated || false;
    const animFrames = animated ? (config.animFrames || 4) : 1;

    let totalTiles;
    if (autoTile) {
      totalTiles = 16 * animFrames; // 16 autotile variants per frame
    } else {
      totalTiles = variation * animFrames;
    }

    const cols = Math.ceil(Math.sqrt(totalTiles));
    const rows = Math.ceil(totalTiles / cols);
    const canvas = sf_makeCanvas(cols * tileSize, rows * tileSize);
    const ctx = canvas.getContext('2d');

    let idx = 0;
    if (autoTile) {
      for (let af = 0; af < animFrames; af++) {
        for (let mask = 0; mask < 16; mask++) {
          const col = idx % cols;
          const row = Math.floor(idx / cols);
          ctx.save();
          ctx.translate(col * tileSize, row * tileSize);
          ctx.clearRect(0, 0, tileSize, tileSize);
          const rng = seededRNG(mask * 1000 + af * 100 + type.charCodeAt(0));
          drawAutoTile(ctx, type, tileSize, config.palette, mask, rng);
          // Animated variation (slight shift for water/lava)
          if (animated && af > 0) {
            const shift = af * 2;
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = af % 2 === 0 ? Palette.lighten(config.palette?.base || '#4488cc', 0.2) : Palette.darken(config.palette?.base || '#4488cc', 0.2);
            ctx.fillRect(shift, shift, tileSize - shift * 2, tileSize - shift * 2);
            ctx.globalAlpha = 1;
          }
          ctx.restore();
          idx++;
        }
      }
    } else {
      for (let af = 0; af < animFrames; af++) {
        for (let v = 0; v < variation; v++) {
          const col = idx % cols;
          const row = Math.floor(idx / cols);
          ctx.save();
          ctx.translate(col * tileSize, row * tileSize);
          ctx.clearRect(0, 0, tileSize, tileSize);
          const rng = seededRNG(v * 1000 + af * 100 + type.charCodeAt(0));
          drawTerrainTile(ctx, type, tileSize, config.palette, rng, decorations, decorationDensity);
          if (animated && af > 0) {
            const rng2 = seededRNG(af * 31 + v);
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = af % 2 === 0 ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            for (let i = 0; i < 3; i++) {
              const wx = rng2() * tileSize;
              const wy = rng2() * tileSize;
              ctx.beginPath();
              ctx.ellipse(wx, wy, tileSize * 0.15, tileSize * 0.04, rng2() * Math.PI, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
          }
          ctx.restore();
          idx++;
        }
      }
    }

    const sheet = new SpriteSheet(canvas, tileSize, tileSize, cols, rows);
    _cache.set(key, sheet);

    /**
     * Get tile index from neighbor bitmask.
     * @param {{ up: boolean, right: boolean, down: boolean, left: boolean }} neighbors
     * @param {number} [animFrame=0]
     * @returns {number}
     */
    function getTile(neighbors, animFrame = 0) {
      if (!autoTile) {
        return (animFrame * variation) + Math.floor(Math.random() * variation);
      }
      let mask = 0;
      if (neighbors.up) mask |= 1;
      if (neighbors.right) mask |= 2;
      if (neighbors.down) mask |= 4;
      if (neighbors.left) mask |= 8;
      return animFrame * 16 + mask;
    }

    return { sheet, getTile };
  }

  /**
   * Generate UI elements (panels, buttons, bars, icons).
   * @param {object} config - UI configuration
   * @returns {{ sheet: SpriteSheet }}
   */
  static ui(config) {
    const key = JSON.stringify({ _type: 'ui', ...config });
    const cached = _cache.get(key);
    if (cached) return { sheet: cached };

    const type = config.type || 'icon';

    if (type === 'panel') {
      const panel = config.panel || {};
      const w = panel.width || 64;
      const h = panel.height || 64;
      const canvas = sf_makeCanvas(w, h);
      const ctx = canvas.getContext('2d');
      drawPanel9Slice(ctx, panel.style || 'light', w, h, panel.cornerRadius, panel.borderWidth);
      const sheet = new SpriteSheet(canvas, w, h, 1, 1);
      sheet.nameFrame('panel', 0);
      _cache.set(key, sheet);
      return { sheet };
    }

    if (type === 'button') {
      const btn = config.button || {};
      const w = btn.width || 80;
      const h = btn.height || 28;
      const states = btn.states || ['normal', 'hover', 'pressed', 'disabled'];
      const canvas = sf_makeCanvas(w * states.length, h);
      const ctx = canvas.getContext('2d');
      for (let i = 0; i < states.length; i++) {
        ctx.save();
        ctx.translate(i * w, 0);
        drawButton(ctx, btn.style || 'default', w, h, states[i]);
        ctx.restore();
      }
      const sheet = new SpriteSheet(canvas, w, h, states.length, 1);
      states.forEach((s, i) => sheet.nameFrame(s, i));
      _cache.set(key, sheet);
      return { sheet };
    }

    if (type === 'bar') {
      const bar = config.bar || {};
      const w = bar.width || 80;
      const h = bar.height || 12;
      const steps = 11; // 0% to 100% in 10% increments
      const canvas = sf_makeCanvas(w * steps, h);
      const ctx = canvas.getContext('2d');
      for (let i = 0; i < steps; i++) {
        ctx.save();
        ctx.translate(i * w, 0);
        drawBar(ctx, w, h, bar.style || 'smooth', bar.colors?.fill, bar.colors?.bg, bar.colors?.border, i / (steps - 1));
        ctx.restore();
      }
      const sheet = new SpriteSheet(canvas, w, h, steps, 1);
      for (let i = 0; i < steps; i++) sheet.nameFrame(`fill_${i * 10}`, i);
      _cache.set(key, sheet);
      return { sheet };
    }

    if (type === 'icon') {
      const icon = config.icon || {};
      const s = icon.size || 24;
      const iconName = icon.name || 'heart';
      const canvas = sf_makeCanvas(s, s);
      const ctx = canvas.getContext('2d');
      drawIcon(ctx, iconName, s, icon.color || '#ffffff');
      const sheet = new SpriteSheet(canvas, s, s, 1, 1);
      sheet.nameFrame(iconName, 0);
      _cache.set(key, sheet);
      return { sheet };
    }

    // Fallback
    const canvas = sf_makeCanvas(32, 32);
    const sheet = new SpriteSheet(canvas, 32, 32, 1, 1);
    return { sheet };
  }

  /**
   * Generate animated visual effect sprites.
   * @param {object} config - Effect configuration
   * @returns {{ sheet: SpriteSheet, animator: SpriteAnimator }}
   */
  static effect(config) {
    const key = JSON.stringify({ _type: 'effect', ...config });
    const cached = _cache.get(key);
    if (cached) {
      const frames = config.frames || 6;
      const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed: config.speed || 0.08, loop: false } };
      return { sheet: cached, animator: new SpriteAnimator(cached, anims) };
    }

    const type = config.type || 'explosion';
    const size = config.size || 48;
    const color = config.color || '#ff8800';
    const frames = config.frames || 6;
    const speed = config.speed || 0.08;

    const cols = frames;
    const rows = 1;
    const canvas = sf_makeCanvas(cols * size, rows * size);
    const ctx = canvas.getContext('2d');

    for (let f = 0; f < frames; f++) {
      ctx.save();
      ctx.translate(f * size, 0);
      ctx.clearRect(0, 0, size, size);
      drawEffect(ctx, type, size, color, f, frames);
      ctx.restore();
    }

    const sheet = new SpriteSheet(canvas, size, size, cols, rows);
    for (let f = 0; f < frames; f++) {
      sheet.nameFrame(`${type}_${f}`, f);
    }
    _cache.set(key, sheet);

    const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed, loop: false } };
    return { sheet, animator: new SpriteAnimator(sheet, anims) };
  }

  /** Clear the global sprite cache. */
  static clearCache() {
    _cache.clear();
  }
}

function buildCharAnimDefs(config, sheet) {
  const animConfig = config.animations || {
    idle: { frames: 4, speed: 0.2 },
    walk: { frames: 6, speed: 0.1 },
    attack: { frames: 4, speed: 0.08 },
    hurt: { frames: 2, speed: 0.1 },
    death: { frames: 4, speed: 0.15 },
  };
  const anims = {};
  let idx = 0;
  for (const [name, ac] of Object.entries(animConfig)) {
    const indices = [];
    for (let f = 0; f < ac.frames; f++) indices.push(idx++);
    anims[name] = {
      frames: indices,
      speed: ac.speed || 0.1,
      loop: name !== 'death' && name !== 'hurt',
      pingpong: name === 'idle',
    };
  }
  return anims;
}

function autoTileLookup(neighbors) {
  let mask = 0;
  if (neighbors.up) mask |= 1;
  if (neighbors.right) mask |= 2;
  if (neighbors.down) mask |= 4;
  if (neighbors.left) mask |= 8;
  return mask;
}

class Robot {
  constructor(x, y, facing, color, controls, name) {
    this.x = x;
    this.y = y;
    this.facing = facing; // 1 = right, -1 = left
    this.color = color;
    this.name = name;
    this.controls = controls;
    this.hp = CONFIG.MAX_HP;
    this.kos = 0;
    this.vx = 0;
    this.vy = 0;
    this.punching = null; // null or { type, timer, hit }
    this.punchCooldown = 0;
    this.blocking = false;
    this.stunTimer = 0;
    this.headPopped = false;
    this.headPopTimer = 0;
    this.headPopY = 0;
    this.lastHitTime = 0;
    this.timeSinceHit = 10;
    this.hitFlash = 0;
    // Sprite
    const spriteData = robotSprites[color === '#cc3333' ? 'red' : 'blue'];
    this.animator = new SpriteAnimator(spriteData.sheet, spriteData.animations);
    this.animator.play('idle');
    this.spriteSize = spriteData.sheet.frameWidth;
  }

  reset(x, y) {
    this.x = x;
    this.y = y;
    this.hp = CONFIG.MAX_HP;
    this.punching = null;
    this.punchCooldown = 0;
    this.blocking = false;
    this.stunTimer = 0;
    this.headPopped = false;
    this.headPopTimer = 0;
    this.headPopY = 0;
    this.hitFlash = 0;
    this.timeSinceHit = 10;
    this.animator.play('idle');
  }

  get punchBox() {
    if (!this.punching || this.punching.timer < this.punching.startup) return null;
    const p = CONFIG.PUNCHES[this.punching.type];
    const px = this.x + this.facing * (CONFIG.ROBOT_WIDTH / 2 + p.range / 2);
    const py = this.punching.type === 'uppercut' ? this.y - 30 : this.y - 10;
    return { x: px - p.range / 2, y: py - 15, w: p.range, h: 30 };
  }

  get hurtBox() {
    return {
      x: this.x - CONFIG.ROBOT_WIDTH / 2 + 10,
      y: this.y - CONFIG.ROBOT_HEIGHT / 2,
      w: CONFIG.ROBOT_WIDTH - 20,
      h: CONFIG.ROBOT_HEIGHT
    };
  }

  get headBox() {
    return {
      x: this.x - 15,
      y: this.y - CONFIG.ROBOT_HEIGHT / 2 - 5,
      w: 30,
      h: 30
    };
  }

  startPunch(type) {
    if (this.punching || this.punchCooldown > 0 || this.stunTimer > 0 || this.blocking || this.headPopped) return;
    SFX.punch();
    const p = CONFIG.PUNCHES[type];
    this.punching = { type, timer: 0, duration: p.startup + CONFIG.PUNCH_DURATION, startup: p.startup, hit: false };
    this.animator.play('attack', { loop: false, onComplete: () => this.animator.play('idle') });
  }

  takeHit(punchType, game) {
    const p = CONFIG.PUNCHES[punchType];
    let damage = p.damage;
    let headHit = false;

    if (this.blocking) {
      SFX.click();
      damage = Math.round(damage * CONFIG.BLOCK_DAMAGE_MULT);
      game.vfx.sparks(this.x, this.y - 20, { color: '#aaaaaa', count: 5, direction: -this.facing * Math.PI / 2, spread: 0.5 });
    } else {
      SFX.hit();
      // Check head hit
      if (Math.random() < p.headChance) {
        headHit = true;
      }
      this.stunTimer = p.hitstun;
      this.animator.play('hurt', { loop: false, onComplete: () => this.animator.play('idle') });
      // Impact VFX
      game.vfx.sparks(this.x + this.facing * -20, this.y - 20, {
        color: ['#ffaa00', '#ffffff', '#ff4400'],
        count: 12,
        direction: -this.facing * Math.PI / 4,
        spread: 0.6,
      });
      game.vfx.impactRing(this.x, this.y - 10, { color: '#ffffff', radius: 30, duration: 0.15 });
      game.pipeline.camera.shake(punchType === 'uppercut' ? 10 : punchType === 'hook' ? 6 : 3, 0.2);
      if (punchType === 'uppercut') {
        game.pipeline.chromaticAberration(3, 0.15);
      }
    }

    this.hp -= damage;
    this.hitFlash = 0.1;
    this.timeSinceHit = 0;

    if (headHit || this.hp <= 0) {
      SFX.ko(); SFX.explosion();
      this.headPopped = true;
      this.headPopTimer = CONFIG.HEAD_POP_DURATION;
      this.headPopY = 0;
      this.hp = 0;
      this.kos++;
      game.pipeline.camera.shake(15, 0.6);
      game.pipeline.flash('#ffffff', 0.3);
      game.pipeline.chromaticAberration(5, 0.4);
      game.vfx.explosion(this.x, this.y - CONFIG.ROBOT_HEIGHT / 2, {
        color: [this.color, '#ffffff', '#ffcc00'],
        count: 30,
        speed: 200,
      });
      game.vfx.confetti(this.x, this.y - 40, { count: 25 });
      return true; // KO
    }
    return false;
  }

  update(dt, keys, opponent, game) {
    this.timeSinceHit += dt;
    if (this.hitFlash > 0) this.hitFlash -= dt;

    // Head pop animation
    if (this.headPopped) {
      this.headPopTimer -= dt;
      this.headPopY = Math.min(this.headPopY + 300 * dt, 60);
      if (this.headPopY > 30) {
        this.headPopY = 30 + Math.sin((CONFIG.HEAD_POP_DURATION - this.headPopTimer) * 8) * 5;
      }
      return;
    }

    // Stun
    if (this.stunTimer > 0) {
      this.stunTimer -= dt;
      this.animator.update(dt);
      return;
    }

    // HP regen
    if (this.timeSinceHit > CONFIG.REGEN_DELAY && this.hp < CONFIG.MAX_HP) {
      this.hp = Math.min(CONFIG.MAX_HP, this.hp + CONFIG.HP_REGEN * dt);
    }

    // Blocking
    this.blocking = keys[this.controls.block] || false;

    // Movement
    this.vx = 0;
    this.vy = 0;
    if (!this.punching && !this.blocking) {
      if (keys[this.controls.left]) this.vx = -CONFIG.MOVE_SPEED;
      if (keys[this.controls.right]) this.vx = CONFIG.MOVE_SPEED;
      if (keys[this.controls.up]) this.vy = -CONFIG.MOVE_SPEED;
      if (keys[this.controls.down]) this.vy = CONFIG.MOVE_SPEED;
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Clamp to ring
    this.x = clamp(this.x, CONFIG.RING_LEFT + CONFIG.ROBOT_WIDTH / 2, CONFIG.RING_RIGHT - CONFIG.ROBOT_WIDTH / 2);
    this.y = clamp(this.y, CONFIG.RING_TOP + CONFIG.ROBOT_HEIGHT / 2, CONFIG.RING_BOTTOM - CONFIG.ROBOT_HEIGHT / 2);

    // Push apart from opponent
    const dx = this.x - opponent.x;
    const dy = this.y - opponent.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = CONFIG.ROBOT_WIDTH * 0.8;
    if (dist < minDist && dist > 0) {
      const push = (minDist - dist) / 2;
      this.x += (dx / dist) * push;
      opponent.x -= (dx / dist) * push;
    }

    // Face opponent
    this.facing = opponent.x > this.x ? 1 : -1;

    // Punching
    if (this.punching) {
      this.punching.timer += dt;
      if (this.punching.timer >= this.punching.duration) {
        this.punching = null;
        this.punchCooldown = CONFIG.PUNCH_COOLDOWN;
      }
    }
    if (this.punchCooldown > 0) this.punchCooldown -= dt;

    // Punch input
    if (keys[this.controls.jab]) this.startPunch('jab');
    if (keys[this.controls.hook]) this.startPunch('hook');
    if (keys[this.controls.uppercut]) this.startPunch('uppercut');

    // Animator
    if (this.vx !== 0 || this.vy !== 0) {
      if (this.animator.currentAnim !== 'walk' && !this.punching) this.animator.play('walk');
    } else if (!this.punching && this.animator.currentAnim !== 'idle' && this.stunTimer <= 0) {
      this.animator.play('idle');
    }
    this.animator.update(dt);
  }

  draw(ctx, pipeline) {
    const drawScale = CONFIG.ROBOT_HEIGHT / this.spriteSize;
    const drawW = this.spriteSize * drawScale;
    const drawH = this.spriteSize * drawScale;

    // Body
    ctx.save();
    if (this.hitFlash > 0) {
      ctx.globalAlpha = 0.6 + Math.sin(this.hitFlash * 60) * 0.4;
    }
    this.animator.draw(ctx, this.x - drawW / 2, this.y - drawH / 2 + 10, {
      scale: drawScale,
      flipX: this.facing < 0,
    });
    ctx.restore();

    // Head pop animation
    if (this.headPopped) {
      ctx.save();
      ctx.fillStyle = this.color;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      const headX = this.x;
      const headY = this.y - CONFIG.ROBOT_HEIGHT / 2 - this.headPopY;
      ctx.beginPath();
      ctx.arc(headX, headY, 14, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Visor
      ctx.fillStyle = '#222';
      ctx.fillRect(headX - 10, headY - 4, 20, 8);
      ctx.fillStyle = this.color === '#cc3333' ? '#ff4444' : '#4488ff';
      ctx.fillRect(headX - 8, headY - 2, 16, 4);
      // Spring
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const sy = this.y - CONFIG.ROBOT_HEIGHT / 2 - (this.headPopY / 8) * i;
        const sx = headX + Math.sin(i * 1.5) * 4;
        if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
      }
      ctx.stroke();
      ctx.restore();
    }

    // Punch arm extension
    if (this.punching && this.punching.timer >= this.punching.startup) {
      const p = CONFIG.PUNCHES[this.punching.type];
      const progress = (this.punching.timer - this.punching.startup) / CONFIG.PUNCH_DURATION;
      const extend = Math.sin(progress * Math.PI) * p.range;
      const armY = this.punching.type === 'uppercut' ? this.y - 30 - extend * 0.3 : this.y - 10;
      const armX = this.x + this.facing * (20 + extend);

      ctx.save();
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(this.x + this.facing * 20, this.y - 10);
      ctx.lineTo(armX, armY);
      ctx.stroke();
      // Fist
      ctx.fillStyle = this.color;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(armX, armY, 10, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Fist glow
      ctx.shadowColor = this.color === '#cc3333' ? '#ff4444' : '#4488ff';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(armX, armY, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();

      // Fist light
      pipeline.addLight(armX, armY, {
        color: this.color === '#cc3333' ? '#ff4444' : '#4488ff',
        radius: 50,
        intensity: 0.6,
        falloff: 'quadratic',
      });
    }

    // Block shield
    if (this.blocking) {
      ctx.save();
      ctx.strokeStyle = '#88ccff';
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.5 + Math.sin(performance.now() / 100) * 0.2;
      ctx.beginPath();
      ctx.arc(this.x + this.facing * 25, this.y - 15, 25, -Math.PI / 2, Math.PI / 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Robot glow light
    pipeline.addLight(this.x, this.y - 20, {
      color: this.color === '#cc3333' ? '#ff4444' : '#4488ff',
      radius: 80,
      intensity: 0.25,
      pulseSpeed: 2,
      pulseAmt: 0.08,
      falloff: 'quadratic',
    });
  }
}

// ============================================================
// GAME CLASS
// ============================================================
class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    robotSprites = generateRobotSprites();

    this.pipeline = new RenderPipeline(this.canvas, {
      layers: [
        { name: 'bg', worldSpace: true },
        { name: 'ring', worldSpace: true },
        { name: 'entities', worldSpace: true },
        { name: 'fx', worldSpace: true },
        { name: 'ui', worldSpace: false },
      ],
      lighting: {
        enabled: true,
        ambient: { color: '#0a0a1e', intensity: 0.4 },
        applyAfterLayer: 'fx',
      },
      postfx: {
        bloom: { enabled: true, threshold: 0.3, intensity: 0.6, radius: 12 },
        vignette: { enabled: true, radius: 0.75, softness: 0.5, color: '#000000', intensity: 0.4 },
        screenFlash: { enabled: true },
      },
    });
    this.pipeline.camera.x = CONFIG.WIDTH / 2;
    this.pipeline.camera.y = CONFIG.HEIGHT / 2;

    this.vfx = new VFXManager({ canvas: this.canvas, maxParticles: 2000 });

    this.keys = {};
    this.aiKeys = {}; // virtual keys for AI opponent
    this.singlePlayer = false;
    this.state = 'modeSelect'; // modeSelect, title, countdown, fighting, ko, matchOver
    this.stateTimer = 0;
    this.round = 0;
    this.countdownNum = 3;
    this.winner = null;
    this.koText = '';

    // Players
    this.p1 = new Robot(250, 350, 1, '#cc3333', {
      left: 'a', right: 'd', up: 'w', down: 's',
      jab: 'f', hook: 'g', uppercut: 'r', block: 'e'
    }, 'RED');
    this.p2 = new Robot(550, 350, -1, '#3344cc', {
      left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown',
      jab: ';', hook: "'", uppercut: '.', block: ','
    }, 'BLUE');

    this.setupInput();
    this.lastTime = performance.now();
    this.loop();
  }

  setupInput() {
    // Keyboard input
    document.addEventListener('keydown', e => {
      this.keys[e.key] = true;
      if (this.state === 'modeSelect') {
        if (e.key === '1') { this.singlePlayer = true; this.state = 'title'; }
        else if (e.key === '2') { this.singlePlayer = false; this.state = 'title'; }
        e.preventDefault(); return;
      }
      if (this.state === 'title') { this.startMatch(); e.preventDefault(); }
      if (this.state === 'matchOver') { this.state = 'modeSelect'; e.preventDefault(); }
    });
    document.addEventListener('keyup', e => { this.keys[e.key] = false; });

    // Click/tap for menus
    this.canvas.addEventListener('click', (ev) => {
      var rect = this.canvas.getBoundingClientRect();
      var cy = (ev.clientY - rect.top) / rect.height;
      if (this.state === 'modeSelect') {
        if (cy < 0.55) { this.singlePlayer = true; this.state = 'title'; }
        else { this.singlePlayer = false; this.state = 'title'; }
        return;
      }
      if (this.state === 'title') this.startMatch();
      if (this.state === 'matchOver') this.state = 'modeSelect';
    });

    // Canvas touch controls — virtual joystick + buttons
    this.touchState = { stick: null, stickX: 0, stickY: 0, buttons: {} };
    this.touchIds = {}; // track which touch controls which element

    var self = this;
    var canvas = this.canvas;

    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (self.state === 'modeSelect' || self.state === 'title' || self.state === 'matchOver') return;
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        var pt = self.canvasPoint(t);
        self.handleTouchDown(t.identifier, pt.x, pt.y);
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', function(e) {
      e.preventDefault();
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        var pt = self.canvasPoint(t);
        self.handleTouchMove(t.identifier, pt.x, pt.y);
      }
    }, { passive: false });

    canvas.addEventListener('touchend', function(e) {
      e.preventDefault();
      // Menu taps
      if (e.changedTouches.length > 0) {
        var t = e.changedTouches[0];
        var rect = canvas.getBoundingClientRect();
        var cy = (t.clientY - rect.top) / rect.height;
        if (self.state === 'modeSelect') {
          if (cy < 0.55) { self.singlePlayer = true; self.state = 'title'; }
          else { self.singlePlayer = false; self.state = 'title'; }
          return;
        }
        if (self.state === 'title') { self.startMatch(); return; }
        if (self.state === 'matchOver') { self.state = 'modeSelect'; return; }
      }
      for (var i = 0; i < e.changedTouches.length; i++) {
        self.handleTouchUp(e.changedTouches[i].identifier);
      }
    }, { passive: false });

    canvas.addEventListener('touchcancel', function(e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        self.handleTouchUp(e.changedTouches[i].identifier);
      }
    }, { passive: false });
  }

  canvasPoint(touch) {
    var rect = this.canvas.getBoundingClientRect();
    return {
      x: (touch.clientX - rect.left) / rect.width * CONFIG.WIDTH,
      y: (touch.clientY - rect.top) / rect.height * CONFIG.HEIGHT
    };
  }

  // Touch control layout (in canvas coords 800x600)
  getTouchLayout() {
    var stickCX = 110, stickCY = 480, stickR = 60;
    var btnR = 32, btnGap = 10;
    var btnBaseX = CONFIG.WIDTH - 120, btnBaseY = 440;
    return {
      stick: { cx: stickCX, cy: stickCY, r: stickR },
      buttons: [
        { key: 'f', label: 'JAB', cx: btnBaseX - btnR - btnGap, cy: btnBaseY, r: btnR, color: '#ff4444' },
        { key: 'g', label: 'HOOK', cx: btnBaseX + btnR + btnGap, cy: btnBaseY, r: btnR, color: '#ffaa22' },
        { key: 'r', label: 'UPPER', cx: btnBaseX, cy: btnBaseY - btnR*2 - btnGap, r: btnR, color: '#ffff44' },
        { key: 'e', label: 'BLK', cx: btnBaseX, cy: btnBaseY + btnR*2 + btnGap, r: btnR * 0.85, color: '#4488ff' },
      ]
    };
  }

  handleTouchDown(id, x, y) {
    if (!isTouchDevice || !this.singlePlayer) return;
    var layout = this.getTouchLayout();
    // Check stick area
    var sdx = x - layout.stick.cx, sdy = y - layout.stick.cy;
    if (Math.sqrt(sdx*sdx + sdy*sdy) < layout.stick.r * 1.8) {
      this.touchIds[id] = 'stick';
      this.touchState.stick = id;
      this.updateStick(x, y);
      return;
    }
    // Check buttons
    for (var i = 0; i < layout.buttons.length; i++) {
      var b = layout.buttons[i];
      var bdx = x - b.cx, bdy = y - b.cy;
      if (Math.sqrt(bdx*bdx + bdy*bdy) < b.r * 1.4) {
        this.touchIds[id] = b.key;
        this.keys[b.key] = true;
        return;
      }
    }
  }

  handleTouchMove(id, x, y) {
    if (this.touchIds[id] === 'stick') {
      this.updateStick(x, y);
    }
  }

  handleTouchUp(id) {
    var what = this.touchIds[id];
    if (what === 'stick') {
      this.touchState.stick = null;
      this.touchState.stickX = 0;
      this.touchState.stickY = 0;
      this.keys['w'] = false; this.keys['a'] = false;
      this.keys['s'] = false; this.keys['d'] = false;
    } else if (what) {
      this.keys[what] = false;
    }
    delete this.touchIds[id];
  }

  updateStick(x, y) {
    var layout = this.getTouchLayout();
    var dx = x - layout.stick.cx, dy = y - layout.stick.cy;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var maxR = layout.stick.r;
    if (dist > maxR) { dx = dx/dist*maxR; dy = dy/dist*maxR; }
    this.touchState.stickX = dx / maxR;
    this.touchState.stickY = dy / maxR;
    var deadzone = 0.3;
    this.keys['a'] = this.touchState.stickX < -deadzone;
    this.keys['d'] = this.touchState.stickX > deadzone;
    this.keys['w'] = this.touchState.stickY < -deadzone;
    this.keys['s'] = this.touchState.stickY > deadzone;
  }

  drawTouchControls(ctx) {
    if (!isTouchDevice || !this.singlePlayer) return;
    if (this.state !== 'fighting' && this.state !== 'countdown') return;
    var layout = this.getTouchLayout();
    var st = layout.stick;

    // Joystick base
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(st.cx, st.cy, st.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(st.cx, st.cy, st.r, 0, Math.PI*2); ctx.stroke();

    // Joystick thumb
    ctx.globalAlpha = 0.5;
    var thumbX = st.cx + this.touchState.stickX * st.r;
    var thumbY = st.cy + this.touchState.stickY * st.r;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(thumbX, thumbY, st.r * 0.4, 0, Math.PI*2); ctx.fill();

    // Buttons
    for (var i = 0; i < layout.buttons.length; i++) {
      var b = layout.buttons[i];
      var pressed = this.keys[b.key];
      ctx.globalAlpha = pressed ? 0.6 : 0.3;
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = b.color;
      ctx.globalAlpha = pressed ? 0.9 : 0.5;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = pressed ? 1 : 0.7;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Segoe UI';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(b.label, b.cx, b.cy);
    }
    ctx.restore();
  }

  startMatch() {
    this.p1.kos = 0;
    this.p2.kos = 0;
    this.round = 0;
    this.startRound();
  }

  startRound() {
    this.round++;
    this.p1.reset(250, 350);
    this.p2.reset(550, 350);
    this.state = 'countdown';
    this.stateTimer = 0;
    this.countdownNum = 3;
    this.vfx.clear();
  }

  checkHit(attacker, defender) {
    if (!attacker.punching || attacker.punching.hit) return;
    const pb = attacker.punchBox;
    if (!pb) return;
    const hb = defender.hurtBox;
    // AABB overlap
    if (pb.x < hb.x + hb.w && pb.x + pb.w > hb.x && pb.y < hb.y + hb.h && pb.y + pb.h > hb.y) {
      attacker.punching.hit = true;
      const ko = defender.takeHit(attacker.punching.type, this);
      if (ko) {
        this.state = 'ko';
        this.stateTimer = 0;
        this.koText = `${attacker.name} scores a KO!`;
      }
    }
  }

  update(dt) {
    if (this.state === 'title' || this.state === 'matchOver') return;

    if (this.state === 'countdown') {
      this.stateTimer += dt;
      this.countdownNum = 3 - Math.floor(this.stateTimer);
      if (this.stateTimer >= 3) {
        this.state = 'fighting';
        this.stateTimer = 0;
      }
      return;
    }

    if (this.state === 'ko') {
      this.stateTimer += dt;
      this.p1.update(dt, {}, this.p2, this);
      this.p2.update(dt, {}, this.p1, this);
      if (this.stateTimer >= CONFIG.HEAD_POP_DURATION + 0.5) {
        // Check match over
        if (this.p1.kos >= CONFIG.KOS_TO_WIN) {
          SFX.gameOver(); SFX.levelUp();
          this.state = 'matchOver';
          this.winner = 'BLUE';
          this.pipeline.flash('#4488ff', 0.5);
          if (this.p1.kos > 0) submitScore('mech-brawl', this.p1.kos);
        } else if (this.p2.kos >= CONFIG.KOS_TO_WIN) {
          SFX.gameOver(); SFX.levelUp();
          this.state = 'matchOver';
          this.winner = 'RED';
          this.pipeline.flash('#ff4444', 0.5);
          if (this.p2.kos > 0) submitScore('mech-brawl', this.p2.kos);
        } else {
          this.startRound();
        }
      }
      return;
    }

    // Fighting
    this.p1.update(dt, this.keys, this.p2, this);
    // AI controls P2 in single player
    if (this.singlePlayer) {
      this.updateAI(dt);
      this.p2.update(dt, this.aiKeys, this.p1, this);
    } else {
      this.p2.update(dt, this.keys, this.p1, this);
    }

    // Check hits
    this.checkHit(this.p1, this.p2);
    this.checkHit(this.p2, this.p1);
  }

  draw() {
    const pipeline = this.pipeline;
    pipeline.begin();

    // Background
    pipeline.setLayer('bg');
    const bgCtx = pipeline.getCtx();
    const grad = bgCtx.createLinearGradient(0, 0, 0, CONFIG.HEIGHT);
    grad.addColorStop(0, '#050510');
    grad.addColorStop(0.3, '#0c0c24');
    grad.addColorStop(0.6, '#121230');
    grad.addColorStop(1, '#080818');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // Spotlights from ceiling
    var spotGrad = bgCtx.createRadialGradient(CONFIG.WIDTH/2, 0, 10, CONFIG.WIDTH/2, 200, 350);
    spotGrad.addColorStop(0, 'rgba(255,255,255,0.06)');
    spotGrad.addColorStop(1, 'transparent');
    bgCtx.fillStyle = spotGrad;
    bgCtx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    // Red spot left
    var redSpot = bgCtx.createRadialGradient(150, 0, 5, 200, 250, 200);
    redSpot.addColorStop(0, 'rgba(255,50,50,0.04)');
    redSpot.addColorStop(1, 'transparent');
    bgCtx.fillStyle = redSpot;
    bgCtx.fillRect(0, 0, CONFIG.WIDTH/2, CONFIG.HEIGHT);
    // Blue spot right
    var blueSpot = bgCtx.createRadialGradient(650, 0, 5, 600, 250, 200);
    blueSpot.addColorStop(0, 'rgba(50,50,255,0.04)');
    blueSpot.addColorStop(1, 'transparent');
    bgCtx.fillStyle = blueSpot;
    bgCtx.fillRect(CONFIG.WIDTH/2, 0, CONFIG.WIDTH/2, CONFIG.HEIGHT);

    // Crowd — 3 rows with animated bobbing
    var crowdT = performance.now() / 1000;
    for (var row = 0; row < 3; row++) {
      var baseY = 100 + row * 28;
      var shade = 0x08 + row * 3;
      var crowdColor = 'rgb(' + shade + ',' + shade + ',' + (shade + 10) + ')';
      for (var i = 0; i < 45; i++) {
        var cx = i * 19 + 3 + row * 7;
        var bob = Math.sin(crowdT * 2 + i * 0.9 + row) * (row === 0 ? 3 : 2);
        var cy = baseY + Math.sin(i * 0.7 + row) * 8 + bob;
        var headR = 6 + Math.sin(i * 1.3 + row) * 2;
        bgCtx.fillStyle = crowdColor;
        bgCtx.beginPath(); bgCtx.arc(cx, cy, headR, 0, Math.PI * 2); bgCtx.fill();
        bgCtx.fillRect(cx - 4, cy + headR - 1, 8, 10);
        // Occasional colored shirt
        if ((i + row) % 5 === 0) {
          var shirtColors = ['#331111', '#111133', '#113311', '#332211'];
          bgCtx.fillStyle = shirtColors[(i + row) % shirtColors.length];
          bgCtx.fillRect(cx - 3, cy + headR + 1, 6, 6);
        }
      }
    }

    // Ring
    pipeline.setLayer('ring');
    const rctx = pipeline.getCtx();
    var RL = CONFIG.RING_LEFT, RR = CONFIG.RING_RIGHT, RT = CONFIG.RING_TOP, RB = CONFIG.RING_BOTTOM;
    var RW = RR - RL, RH = RB - RT;

    // Ring apron (elevated platform)
    rctx.fillStyle = '#1a1a30';
    rctx.fillRect(RL - 30, RT - 30, RW + 60, RH + 60);
    // Platform edge shadow
    rctx.fillStyle = '#0e0e20';
    rctx.fillRect(RL - 30, RB + 20, RW + 60, 15);

    // Ring mat with subtle pattern
    var matGrad = rctx.createRadialGradient(CONFIG.WIDTH/2, (RT+RB)/2, 20, CONFIG.WIDTH/2, (RT+RB)/2, RW*0.7);
    matGrad.addColorStop(0, '#1e3258');
    matGrad.addColorStop(0.6, '#1a2a4a');
    matGrad.addColorStop(1, '#141e38');
    rctx.fillStyle = matGrad;
    rctx.fillRect(RL, RT, RW, RH);

    // Mat texture lines
    rctx.strokeStyle = 'rgba(255,255,255,0.02)';
    rctx.lineWidth = 1;
    for (var my = RT; my < RB; my += 12) {
      rctx.beginPath(); rctx.moveTo(RL, my); rctx.lineTo(RR, my); rctx.stroke();
    }

    // Center circle
    rctx.strokeStyle = 'rgba(255,255,255,0.06)';
    rctx.lineWidth = 3;
    rctx.beginPath(); rctx.arc(CONFIG.WIDTH/2, (RT+RB)/2, 65, 0, Math.PI*2); rctx.stroke();
    // Center X
    rctx.strokeStyle = 'rgba(255,255,255,0.04)';
    rctx.lineWidth = 2;
    rctx.beginPath(); rctx.moveTo(CONFIG.WIDTH/2-20, (RT+RB)/2-20); rctx.lineTo(CONFIG.WIDTH/2+20, (RT+RB)/2+20); rctx.stroke();
    rctx.beginPath(); rctx.moveTo(CONFIG.WIDTH/2+20, (RT+RB)/2-20); rctx.lineTo(CONFIG.WIDTH/2-20, (RT+RB)/2+20); rctx.stroke();

    // Red corner & blue corner colored mat areas
    rctx.fillStyle = 'rgba(200,30,30,0.08)';
    rctx.fillRect(RL, RT, RW*0.15, RH*0.15);
    rctx.fillStyle = 'rgba(30,30,200,0.08)';
    rctx.fillRect(RR - RW*0.15, RB - RH*0.15, RW*0.15, RH*0.15);

    // Corner posts (metallic cylinders)
    var posts = [[RL-15,RT-15],[RR+15,RT-15],[RL-15,RB+15],[RR+15,RB+15]];
    for (var pi = 0; pi < posts.length; pi++) {
      var px = posts[pi][0], py = posts[pi][1];
      // Post shadow
      rctx.fillStyle = 'rgba(0,0,0,0.3)';
      rctx.beginPath(); rctx.ellipse(px+2, py+8, 8, 4, 0, 0, Math.PI*2); rctx.fill();
      // Post body
      var postGrad = rctx.createLinearGradient(px-6, py, px+6, py);
      postGrad.addColorStop(0, '#666');
      postGrad.addColorStop(0.3, '#bbb');
      postGrad.addColorStop(0.7, '#999');
      postGrad.addColorStop(1, '#555');
      rctx.fillStyle = postGrad;
      rctx.beginPath();
      rctx.moveTo(px-7, py-8); rctx.lineTo(px+7, py-8);
      rctx.lineTo(px+7, py+8); rctx.lineTo(px-7, py+8);
      rctx.fill();
      // Post cap
      rctx.fillStyle = pi < 2 ? '#cc3333' : '#3344cc';
      rctx.beginPath(); rctx.arc(px, py-8, 7, Math.PI, Math.PI*2); rctx.fill();
    }

    // Ropes (3 rows) with slight sag
    var ropeColors = ['#dd2222', '#cc1111', '#bb0000'];
    for (var ri = 0; ri < 3; ri++) {
      var ry = RT + 15 + ri * 45;
      rctx.strokeStyle = ropeColors[ri];
      rctx.lineWidth = 5 - ri * 0.5;
      rctx.lineCap = 'round';
      // Slight sag curve
      rctx.beginPath();
      rctx.moveTo(RL - 15, ry);
      rctx.quadraticCurveTo(CONFIG.WIDTH/2, ry + 4 + ri, RR + 15, ry);
      rctx.stroke();
      // Rope highlight
      rctx.strokeStyle = 'rgba(255,150,150,0.2)';
      rctx.lineWidth = 1.5;
      rctx.beginPath();
      rctx.moveTo(RL - 15, ry - 1.5);
      rctx.quadraticCurveTo(CONFIG.WIDTH/2, ry + 2.5 + ri, RR + 15, ry - 1.5);
      rctx.stroke();
    }

    // Ring lights — brighter, more dramatic
    pipeline.addLight(CONFIG.WIDTH/2, RT - 60, { color: '#ffffff', radius: 400, intensity: 0.5, falloff: 'linear' });
    pipeline.addLight(RL + 30, RT + 30, { color: '#ff4444', radius: 120, intensity: 0.2, falloff: 'quadratic' });
    pipeline.addLight(RR - 30, RT + 30, { color: '#4444ff', radius: 120, intensity: 0.2, falloff: 'quadratic' });
    // Floor reflection glow
    pipeline.addLight(CONFIG.WIDTH/2, (RT+RB)/2, { color: '#ffffff', radius: 200, intensity: 0.1, falloff: 'quadratic' });

    // Entities
    pipeline.setLayer('entities');
    const ectx = pipeline.getCtx();
    if (this.state !== 'title' && this.state !== 'matchOver') {
      this.p1.draw(ectx, pipeline);
      this.p2.draw(ectx, pipeline);
    }

    // FX
    pipeline.setLayer('fx');
    const fctx = pipeline.getCtx();
    this.vfx.draw(fctx);

    // UI
    pipeline.setLayer('ui');
    const uctx = pipeline.getCtx();

    if (this.state === 'modeSelect') {
      this.drawModeSelect(uctx);
    } else if (this.state === 'title') {
      this.drawTitle(uctx);
    } else if (this.state === 'matchOver') {
      this.drawMatchOver(uctx);
    } else {
      this.drawHUD(uctx);
      if (this.state === 'countdown') {
        this.drawCountdown(uctx);
      }
      if (this.state === 'ko') {
        this.drawKO(uctx);
      }
      this.drawTouchControls(uctx);
    }

    pipeline.end();
  }

  drawHUD(ctx) {
    // HP bars — sleek angled style
    const barW = 220;
    const barH = 22;
    const barY = 20;

    // HUD background strip
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, CONFIG.WIDTH, 60);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fillRect(0, 58, CONFIG.WIDTH, 2);

    // P1 HP bar
    ctx.save();
    // Bar background
    ctx.fillStyle = '#1a0000';
    ctx.fillRect(48, barY, barW + 4, barH);
    // HP fill with gradient
    const p1Frac = this.p1.hp / CONFIG.MAX_HP;
    var p1Grad = ctx.createLinearGradient(50, barY, 50 + barW, barY);
    if (p1Frac > 0.5) { p1Grad.addColorStop(0, '#dd3333'); p1Grad.addColorStop(1, '#ff5555'); }
    else if (p1Frac > 0.25) { p1Grad.addColorStop(0, '#cc5522'); p1Grad.addColorStop(1, '#ee7733'); }
    else { p1Grad.addColorStop(0, '#cc0000'); p1Grad.addColorStop(1, '#ff2200'); }
    ctx.fillStyle = p1Grad;
    ctx.fillRect(50, barY + 1, barW * p1Frac, barH - 2);
    // Shine line
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(50, barY + 1, barW * p1Frac, barH / 3);
    // Border
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(48, barY, barW + 4, barH);
    ctx.restore();

    // P2 HP bar
    ctx.save();
    var p2X = CONFIG.WIDTH - 50 - barW - 4;
    ctx.fillStyle = '#00001a';
    ctx.fillRect(p2X, barY, barW + 4, barH);
    const p2Frac = this.p2.hp / CONFIG.MAX_HP;
    var p2Grad = ctx.createLinearGradient(p2X, barY, p2X + barW, barY);
    if (p2Frac > 0.5) { p2Grad.addColorStop(0, '#5555ff'); p2Grad.addColorStop(1, '#3344cc'); }
    else if (p2Frac > 0.25) { p2Grad.addColorStop(0, '#5566ee'); p2Grad.addColorStop(1, '#3355bb'); }
    else { p2Grad.addColorStop(0, '#2222ff'); p2Grad.addColorStop(1, '#0000cc'); }
    ctx.fillStyle = p2Grad;
    // P2 bar fills from right
    ctx.fillRect(p2X + 2 + barW * (1 - p2Frac), barY + 1, barW * p2Frac, barH - 2);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(p2X + 2 + barW * (1 - p2Frac), barY + 1, barW * p2Frac, barH / 3);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(p2X, barY, barW + 4, barH);
    ctx.restore();

    // Names with glow
    ctx.save();
    ctx.font = 'bold 16px Segoe UI';
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#ff4444';
    ctx.fillStyle = '#ff6666';
    ctx.textAlign = 'left';
    ctx.fillText('RED', 50, barY - 5);
    ctx.shadowColor = '#4488ff';
    ctx.fillStyle = '#6699ff';
    ctx.textAlign = 'right';
    ctx.fillText('BLUE', CONFIG.WIDTH - 50, barY - 5);
    ctx.shadowBlur = 0;
    ctx.restore();

    // KO dots with glow
    ctx.textAlign = 'center';
    const koY = barY + barH / 2;
    for (let i = 0; i < CONFIG.KOS_TO_WIN; i++) {
      var lit = i < this.p2.kos;
      ctx.fillStyle = lit ? '#ff4444' : '#222';
      ctx.beginPath(); ctx.arc(280 + i * 20, koY, 7, 0, Math.PI * 2); ctx.fill();
      if (lit) {
        ctx.save(); ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 8;
        ctx.fillStyle = '#ff6666';
        ctx.beginPath(); ctx.arc(280 + i * 20, koY, 4, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(280 + i * 20, koY, 7, 0, Math.PI * 2); ctx.stroke();
    }
    for (let i = 0; i < CONFIG.KOS_TO_WIN; i++) {
      var lit2 = i < this.p1.kos;
      ctx.fillStyle = lit2 ? '#4488ff' : '#222';
      ctx.beginPath(); ctx.arc(CONFIG.WIDTH - 280 - i * 20, koY, 7, 0, Math.PI * 2); ctx.fill();
      if (lit2) {
        ctx.save(); ctx.shadowColor = '#4488ff'; ctx.shadowBlur = 8;
        ctx.fillStyle = '#66aaff';
        ctx.beginPath(); ctx.arc(CONFIG.WIDTH - 280 - i * 20, koY, 4, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(CONFIG.WIDTH - 280 - i * 20, koY, 7, 0, Math.PI * 2); ctx.stroke();
    }

    // Round — centered with decorative frame
    ctx.save();
    ctx.font = 'bold 18px Segoe UI';
    ctx.fillStyle = '#ddd';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 4;
    ctx.fillText(`ROUND ${this.round}`, CONFIG.WIDTH / 2, barY + 16);
    ctx.shadowBlur = 0;
    // Decorative lines flanking round text
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(CONFIG.WIDTH/2 - 60, barY + 12); ctx.lineTo(CONFIG.WIDTH/2 - 30, barY + 12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(CONFIG.WIDTH/2 + 30, barY + 12); ctx.lineTo(CONFIG.WIDTH/2 + 60, barY + 12); ctx.stroke();
    ctx.restore();

    // Controls reminder (keyboard only)
    if (!isTouchDevice) {
      ctx.font = '10px Segoe UI';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'left';
      ctx.fillText('P1: WASD move | F jab | G hook | R uppercut | E block', 50, CONFIG.HEIGHT - 12);
      ctx.textAlign = 'right';
      ctx.fillText("P2: Arrows move | ; jab | ' hook | . uppercut | , block", CONFIG.WIDTH - 50, CONFIG.HEIGHT - 12);
    }
  }

  drawCountdown(ctx) {
    ctx.save();
    const num = Math.max(1, this.countdownNum);
    const text = num > 0 ? `${num}` : 'FIGHT!';
    const scale = 1 + (this.stateTimer % 1) * 0.3;
    ctx.font = `bold ${60 * scale | 0}px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 20;
    ctx.fillText(this.stateTimer >= 2.5 ? 'FIGHT!' : text, CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 - 20);
    ctx.restore();
  }

  drawKO(ctx) {
    ctx.save();
    const a = Math.min(1, this.stateTimer * 3);
    ctx.globalAlpha = a;
    ctx.font = 'bold 56px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 20;
    ctx.fillText('KO!', CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 - 60);
    ctx.shadowBlur = 0;
    ctx.font = 'bold 24px Segoe UI';
    ctx.fillStyle = '#fff';
    ctx.fillText(this.koText, CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 - 20);
    ctx.restore();
  }

  // AI opponent for single player
  updateAI(dt) {
    var ai = this.aiKeys;
    var me = this.p2, opp = this.p1;
    // Clear all keys
    for (var k in ai) ai[k] = false;
    var dx = opp.x - me.x, dy = opp.y - me.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var punchRange = 75;
    // Move toward opponent
    if (dist > punchRange * 1.2) {
      if (dx < -10) ai[me.controls.left] = true;
      else if (dx > 10) ai[me.controls.right] = true;
      if (dy < -10) ai[me.controls.up] = true;
      else if (dy > 10) ai[me.controls.down] = true;
    }
    // Attack when in range
    if (dist < punchRange && me.punchCooldown <= 0 && !me.punching) {
      var roll = Math.random();
      if (roll < 0.5) ai[me.controls.jab] = true;
      else if (roll < 0.8) ai[me.controls.hook] = true;
      else ai[me.controls.uppercut] = true;
    }
    // Block when opponent is punching and close
    if (opp.punching && dist < punchRange * 1.5 && Math.random() < 0.4) {
      ai[me.controls.block] = true;
    }
    // Dodge if stunned recently — move away
    if (me.stunTimer > 0 || (me.hp < me.maxHp * 0.3 && dist < punchRange)) {
      ai[me.controls.left] = dx > 0;
      ai[me.controls.right] = dx < 0;
    }
  }

  drawModeSelect(ctx) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 56px Segoe UI';
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff4444'; ctx.fillText('MECH', CONFIG.WIDTH/2 - 5, 180);
    ctx.shadowColor = '#4488ff'; ctx.fillStyle = '#4488ff';
    ctx.fillText('BRAWL', CONFIG.WIDTH/2 + 5, 240);
    ctx.shadowBlur = 0;
    ctx.font = '18px Segoe UI'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText("Rock 'Em Sock 'Em Robots", CONFIG.WIDTH/2, 280);

    ctx.font = 'bold 28px Segoe UI';
    var pulse = 0.7 + Math.sin(performance.now()/400) * 0.3;
    ctx.fillStyle = 'rgba(255,100,100,' + pulse + ')';
    ctx.fillText(isTouchDevice ? 'Single Player (vs AI)' : '[1] Single Player', CONFIG.WIDTH/2, 360);
    ctx.fillStyle = 'rgba(100,100,255,' + pulse + ')';
    ctx.fillText(isTouchDevice ? 'Two Players (same device)' : '[2] Two Players', CONFIG.WIDTH/2, 410);
    ctx.font = '14px Segoe UI'; ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText(isTouchDevice ? 'Tap top for 1P, bottom for 2P' : 'Press 1 or 2, or tap to select', CONFIG.WIDTH/2, 460);
    ctx.restore();
  }

  drawTitle(ctx) {
    ctx.save();
    ctx.textAlign = 'center';
    const pulse = 0.8 + 0.2 * Math.sin(performance.now() / 300);
    ctx.font = 'bold 56px Segoe UI';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 20 * pulse;
    ctx.fillStyle = '#ff4444';
    ctx.fillText('MECH', CONFIG.WIDTH / 2 - 5, 220);
    ctx.shadowColor = '#4488ff';
    ctx.fillStyle = '#4488ff';
    ctx.fillText('BRAWL', CONFIG.WIDTH / 2 + 5, 280);
    ctx.shadowBlur = 0;
    ctx.font = '18px Segoe UI';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText("Rock 'Em Sock 'Em Robots", CONFIG.WIDTH / 2, 320);

    ctx.font = '14px Segoe UI';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    if (this.singlePlayer) {
      if (isTouchDevice) {
        ctx.fillText('YOU (RED): Virtual joystick + buttons', CONFIG.WIDTH / 2, 380);
        ctx.fillText('Opponent: AI', CONFIG.WIDTH / 2, 405);
      } else {
        ctx.fillText('YOU (RED): WASD move | F jab | G hook | R uppercut | E block', CONFIG.WIDTH / 2, 380);
        ctx.fillText('Opponent: AI', CONFIG.WIDTH / 2, 405);
      }
    } else {
      ctx.fillText('Player 1 (RED): WASD move | F jab | G hook | R uppercut | E block', CONFIG.WIDTH / 2, 380);
      ctx.fillText("Player 2 (BLUE): Arrows move | ; jab | ' hook | . uppercut | , block", CONFIG.WIDTH / 2, 405);
    }
    ctx.fillText(`First to ${CONFIG.KOS_TO_WIN} KOs wins! Land hits to the head to pop it!`, CONFIG.WIDTH / 2, 440);

    const blink = Math.sin(performance.now() / 400) > 0;
    if (blink) {
      ctx.font = 'bold 24px Segoe UI';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fillText(isTouchDevice ? 'Tap to Start' : 'Press Any Key to Start', CONFIG.WIDTH / 2, 500);
    }
    ctx.restore();
  }

  drawMatchOver(ctx) {
    ctx.save();
    ctx.textAlign = 'center';
    const winColor = this.winner === 'RED' ? '#ff4444' : '#4488ff';
    ctx.font = 'bold 52px Segoe UI';
    ctx.fillStyle = winColor;
    ctx.shadowColor = winColor;
    ctx.shadowBlur = 25;
    ctx.fillText(`${this.winner} WINS!`, CONFIG.WIDTH / 2, 260);
    ctx.shadowBlur = 0;
    ctx.font = '24px Segoe UI';
    ctx.fillStyle = '#ccc';
    ctx.fillText(`Final Score: RED ${this.p2.kos} - ${this.p1.kos} BLUE`, CONFIG.WIDTH / 2, 320);
    ctx.fillText(`Rounds played: ${this.round}`, CONFIG.WIDTH / 2, 355);
    const blink = Math.sin(performance.now() / 400) > 0;
    if (blink) {
      ctx.font = 'bold 22px Segoe UI';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fillText(isTouchDevice ? 'Tap to Play Again' : 'Press Any Key to Play Again', CONFIG.WIDTH / 2, 430);
    }
    ctx.restore();
  }

  loop() {
    const now = performance.now();
    let dt = Math.min((now - this.lastTime) / 1000, 0.05);
    this.lastTime = now;
    this.pipeline.update(dt);
    this.vfx.update(dt);
    this.update(dt);
    this.draw();
    requestAnimationFrame(() => this.loop());
  }
}
