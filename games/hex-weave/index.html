// ============================================================
// SFX
// ============================================================
var SFX = (function() {
  var actx = null, muted = false;
  function getCtx() {
    if (!actx) try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
    if (actx.state === 'suspended') actx.resume();
    return actx;
  }
  function play(fn) { if (muted) return; var c = getCtx(); if (c) fn(c); }
  function osc(c, type, freq, freq2, dur, vol) {
    var o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
    if (freq2) o.frequency.linearRampToValueAtTime(freq2, c.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.08, c.currentTime);
    g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + dur);
  }
  return {
    get muted() { return muted; }, set muted(v) { muted = v; },
    place()    { play(c => { osc(c,'sine',400,800,0.15,0.08); osc(c,'sine',600,1000,0.12,0.06); }); },
    rotate()   { play(c => { osc(c,'sine',500,550,0.06,0.04); }); },
    extend()   { play(c => { osc(c,'sine',600,900,0.1,0.06); }); },
    score()    { play(c => { for(var i=0;i<3;i++) setTimeout(()=>osc(c,'sine',600+i*200,700+i*200,0.1,0.06),i*80); }); },
    gameOver() { play(c => { for(var i=0;i<4;i++) setTimeout(()=>osc(c,'sawtooth',400-i*60,200-i*40,0.3,0.06),i*180); }); },
    click()    { play(c => osc(c,'sine',700,500,0.05,0.03)); },
  };
})();

// ============================================================
// HEX MATH
// ============================================================
// Flat-top hex. Each hex has 6 edges numbered 0-5 clockwise from top-right.
// Actually we use 12 connection points: each edge has 2 endpoints.
// Points 0-11 around the hex, 2 per edge.
// Edge 0 (top-right): points 0,1
// Edge 1 (right): points 2,3
// Edge 2 (bottom-right): points 4,5
// Edge 3 (bottom-left): points 6,7
// Edge 4 (left): points 8,9
// Edge 5 (top-left): points 10,11

// Axial coordinates (q, r) for hex grid
var W, H, HEX_SIZE, CX, CY;

function recalc() {
  W = canvas.width; H = canvas.height;
  HEX_SIZE = Math.floor(Math.min(W, H) / 14);
  CX = Math.floor(W / 2);
  CY = Math.floor(H / 2);
}
recalc();
window.addEventListener('resize', () => { resize(); recalc(); });

// Flat-top hex pixel position from axial (q, r)
function hexToPixel(q, r) {
  var x = HEX_SIZE * (3/2 * q);
  var y = HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r);
  return { x: CX + x, y: CY + y };
}

// Pixel to axial (for click detection)
function pixelToHex(px, py) {
  var x = px - CX, y = py - CY;
  var q = (2/3 * x) / HEX_SIZE;
  var r = (-1/3 * x + Math.sqrt(3)/3 * y) / HEX_SIZE;
  return hexRound(q, r);
}

function hexRound(q, r) {
  var s = -q - r;
  var rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  var dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return { q: rq, r: rr };
}

function hexKey(q, r) { return q + ',' + r; }

// 6 neighbor directions for flat-top hex
var HEX_DIRS = [
  { q: 1, r: 0 },   // edge 0: right
  { q: 0, r: 1 },   // edge 1: bottom-right
  { q: -1, r: 1 },  // edge 2: bottom-left
  { q: -1, r: 0 },  // edge 3: left
  { q: 0, r: -1 },  // edge 4: top-left
  { q: 1, r: -1 },  // edge 5: top-right
];

function hexNeighbor(q, r, dir) {
  return { q: q + HEX_DIRS[dir].q, r: r + HEX_DIRS[dir].r };
}

// Opposite edge: edge i connects to edge (i+3)%6 of neighbor
function oppositeEdge(e) { return (e + 3) % 6; }

// ============================================================
// TILE PATHS
// ============================================================
// Each hex tile has internal paths connecting its 6 edges.
// A tile has 3 paths, each connecting 2 different edges.
// Represented as array of [edgeA, edgeB] pairs.

function generateTilePaths() {
  // Generate a random set of 3 non-overlapping edge pairs
  var edges = [0, 1, 2, 3, 4, 5];
  shuffle(edges);
  return [
    [edges[0], edges[1]],
    [edges[2], edges[3]],
    [edges[4], edges[5]],
  ];
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
}

function rotatePaths(paths, steps) {
  // Rotate all edges by steps (each step = 60 degrees clockwise)
  return paths.map(function(p) {
    return [(p[0] + steps) % 6, (p[1] + steps) % 6];
  });
}

// ============================================================
// GAME STATE
// ============================================================
var BOARD_RADIUS = 4; // rings around center
var board = {};       // key -> { q, r, paths, isCenter, isPath, isBorder }
var playerPath = [];  // array of { q, r, entryEdge, exitEdge } — the continuous path
var currentTile = null; // { paths, rotation } — tile being placed
var currentPos = null;  // { q, r } — where current tile will go
var state = 'menu';     // menu, playing, gameOver
var score = 0;
var highScore = parseInt(localStorage.getItem('hexweave_hi') || '0');
var pathLength = 0;
var animProgress = 0;  // for path drawing animation
var nextTile = null;    // preview of next tile

function initBoard() {
  board = {};
  // Create hex grid
  for (var q = -BOARD_RADIUS; q <= BOARD_RADIUS; q++) {
    for (var r = -BOARD_RADIUS; r <= BOARD_RADIUS; r++) {
      if (Math.abs(q + r) > BOARD_RADIUS) continue;
      var dist = hexDist(q, r, 0, 0);
      var isBorder = dist === BOARD_RADIUS;
      board[hexKey(q, r)] = {
        q: q, r: r,
        paths: null,     // null = empty, waiting for placement
        isCenter: q === 0 && r === 0,
        isPath: false,    // true if player's path goes through here
        isBorder: isBorder,
        placed: false,
      };
    }
  }
  // Center tile gets a special path setup — all edges connect through center
  var center = board[hexKey(0, 0)];
  center.paths = [[0, 3], [1, 4], [2, 5]]; // straight-through paths
  center.placed = true;
}

function hexDist(q1, r1, q2, r2) {
  return (Math.abs(q1 - q2) + Math.abs(q1 + r1 - q2 - r2) + Math.abs(r1 - r2)) / 2;
}

function startGame() {
  initBoard();
  playerPath = [];
  score = 0;
  pathLength = 0;
  animProgress = 0;

  // Start path from center, exiting a random edge
  var startEdge = Math.floor(Math.random() * 6);
  playerPath.push({ q: 0, r: 0, entryEdge: -1, exitEdge: startEdge });
  board[hexKey(0, 0)].isPath = true;

  // Find where path enters next
  advancePath(startEdge);

  // Generate first tile
  currentTile = { paths: generateTilePaths(), rotation: 0 };
  nextTile = { paths: generateTilePaths(), rotation: 0 };
  state = 'playing';
}

function advancePath(exitEdge) {
  // From the last path segment, find the next hex
  var last = playerPath[playerPath.length - 1];
  var nb = hexNeighbor(last.q, last.r, exitEdge);
  var key = hexKey(nb.q, nb.r);
  var cell = board[key];

  if (!cell) {
    // Off the board — game over
    endGame();
    return;
  }

  currentPos = { q: nb.q, r: nb.r };
  var entryEdge = oppositeEdge(exitEdge);

  // If this cell already has paths placed, auto-traverse
  if (cell.placed) {
    var path = findPathFromEdge(cell.paths, entryEdge);
    if (path !== null) {
      var exit = path[0] === entryEdge ? path[1] : path[0];
      playerPath.push({ q: nb.q, r: nb.r, entryEdge: entryEdge, exitEdge: exit });
      cell.isPath = true;
      pathLength++;
      score += 1;
      SFX.extend();
      // Continue
      advancePath(exit);
    } else {
      // No matching path — dead end, shouldn't happen with proper tiles
      endGame();
    }
    return;
  }

  // Cell is empty — player needs to place a tile here
  currentPos = { q: nb.q, r: nb.r };
  currentPos.entryEdge = entryEdge;
}

function findPathFromEdge(paths, edge) {
  for (var i = 0; i < paths.length; i++) {
    if (paths[i][0] === edge || paths[i][1] === edge) return paths[i];
  }
  return null;
}

function placeTile() {
  if (!currentPos || !currentTile) return;
  var key = hexKey(currentPos.q, currentPos.r);
  var cell = board[key];
  if (!cell || cell.placed) return;

  // Apply rotation and place
  var rotated = rotatePaths(currentTile.paths, currentTile.rotation);
  cell.paths = rotated;
  cell.placed = true;

  SFX.place();

  // Trace path through this tile
  var entryEdge = currentPos.entryEdge;
  var path = findPathFromEdge(rotated, entryEdge);
  if (path) {
    var exit = path[0] === entryEdge ? path[1] : path[0];
    playerPath.push({ q: currentPos.q, r: currentPos.r, entryEdge: entryEdge, exitEdge: exit });
    cell.isPath = true;
    pathLength++;
    score += 1;

    // Check if exit leads to border or off-board
    var nb = hexNeighbor(currentPos.q, currentPos.r, exit);
    var nbKey = hexKey(nb.q, nb.r);
    var nbCell = board[nbKey];

    if (!nbCell) {
      endGame();
      return;
    }

    if (nbCell.isBorder && !nbCell.placed) {
      // Approaching border — still playable
    }

    // Advance current tile
    currentTile = nextTile;
    nextTile = { paths: generateTilePaths(), rotation: 0 };

    // Continue path (may auto-traverse placed tiles)
    advancePath(exit);
  } else {
    endGame();
  }
}

function rotateCurrent(dir) {
  if (!currentTile || state !== 'playing') return;
  currentTile.rotation = ((currentTile.rotation + dir) % 6 + 6) % 6;
  SFX.rotate();
}

function endGame() {
  state = 'gameOver';
  score = pathLength;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('hexweave_hi', String(highScore));
  }
  SFX.gameOver();
}

// ============================================================
// INPUT
// ============================================================
function getPointerPos(e) {
  var r = canvas.getBoundingClientRect();
  var t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) * (canvas.width / r.width), y: (t.clientY - r.top) * (canvas.height / r.height) };
}

canvas.addEventListener('mousedown', function(e) {
  var p = getPointerPos(e);
  handleTap(p.x, p.y);
});
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var p = getPointerPos(e);
  handleTap(p.x, p.y);
}, { passive: false });

function handleTap(px, py) {
  // Mute button
  if (px >= W - 44 && px <= W - 8 && py >= 8 && py <= 44) {
    SFX.muted = !SFX.muted;
    return;
  }

  if (state === 'menu') {
    startGame();
    SFX.click();
    return;
  }

  if (state === 'gameOver') {
    submitScore('hex-weave', score);
    startGame();
    SFX.click();
    return;
  }

  if (state !== 'playing' || !currentPos) return;

  // Check if tapping the current placement hex or nearby
  var hex = pixelToHex(px, py);
  if (hex.q === currentPos.q && hex.r === currentPos.r) {
    placeTile();
    return;
  }

  // Check rotate buttons
  var cp = hexToPixel(currentPos.q, currentPos.r);
  var leftBtn = { x: cp.x - HEX_SIZE * 1.8, y: cp.y + HEX_SIZE * 0.8 };
  var rightBtn = { x: cp.x + HEX_SIZE * 1.8, y: cp.y + HEX_SIZE * 0.8 };
  var btnR = HEX_SIZE * 0.5;

  if (Math.hypot(px - leftBtn.x, py - leftBtn.y) < btnR) {
    rotateCurrent(-1);
    return;
  }
  if (Math.hypot(px - rightBtn.x, py - rightBtn.y) < btnR) {
    rotateCurrent(1);
    return;
  }

  // Tap anywhere else on the hex = place
  placeTile();
}

window.addEventListener('keydown', function(e) {
  if (state === 'menu') { startGame(); SFX.click(); return; }
  if (state === 'gameOver') { submitScore('hex-weave', score); startGame(); SFX.click(); return; }
  if (state !== 'playing') return;

  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A' || e.key === 'q' || e.key === 'Q') {
    rotateCurrent(-1);
  } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D' || e.key === 'e' || e.key === 'E') {
    rotateCurrent(1);
  } else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    placeTile();
  }
});

// Mouse wheel to rotate
canvas.addEventListener('wheel', function(e) {
  if (state !== 'playing') return;
  e.preventDefault();
  rotateCurrent(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

// ============================================================
// DRAWING
// ============================================================
var time = 0;

function drawHex(cx, cy, size, fill, stroke, lw) {
  ctx.beginPath();
  for (var i = 0; i < 6; i++) {
    var angle = Math.PI / 180 * (60 * i - 30);
    var x = cx + size * Math.cos(angle);
    var y = cy + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
}

function getEdgePoint(cx, cy, size, edge) {
  // Returns the midpoint of an edge
  var a1 = Math.PI / 180 * (60 * edge - 30);
  var a2 = Math.PI / 180 * (60 * ((edge + 1) % 6) - 30);
  return {
    x: cx + size * (Math.cos(a1) + Math.cos(a2)) / 2,
    y: cy + size * (Math.sin(a1) + Math.sin(a2)) / 2,
  };
}

function drawTilePaths(cx, cy, size, paths, isActive, isPlayerPath) {
  if (!paths) return;
  var pathColors = isPlayerPath
    ? ['#ff6644', '#ff8866', '#ffaa88']
    : isActive
    ? ['#44ddff', '#66eeff', '#88ffff']
    : ['#334455', '#445566', '#556677'];

  paths.forEach(function(p, i) {
    var p1 = getEdgePoint(cx, cy, size, p[0]);
    var p2 = getEdgePoint(cx, cy, size, p[1]);

    // Draw curved path through center-ish area
    var midX = cx + (p1.x + p2.x - 2 * cx) * 0.15;
    var midY = cy + (p1.y + p2.y - 2 * cy) * 0.15;

    // Glow
    if (isPlayerPath || isActive) {
      ctx.strokeStyle = isPlayerPath ? 'rgba(255,100,50,0.3)' : 'rgba(50,200,255,0.3)';
      ctx.lineWidth = size * 0.18;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.quadraticCurveTo(midX, midY, p2.x, p2.y);
      ctx.stroke();
    }

    // Main line
    ctx.strokeStyle = pathColors[i % 3];
    ctx.lineWidth = size * 0.08;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.quadraticCurveTo(midX, midY, p2.x, p2.y);
    ctx.stroke();

    // Inner bright line
    if (isPlayerPath) {
      ctx.strokeStyle = 'rgba(255,220,180,0.6)';
      ctx.lineWidth = size * 0.03;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.quadraticCurveTo(midX, midY, p2.x, p2.y);
      ctx.stroke();
    }
  });
}

function draw() {
  time += 1/60;
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(0, 0, W, H);

  if (state === 'menu') { drawMenu(); return; }

  drawBoard();
  drawPlayerPath();
  if (state === 'playing') drawCurrentTile();
  drawHUD();
  if (state === 'gameOver') drawGameOver();
}

function drawMenu() {
  // Background hex pattern
  ctx.globalAlpha = 0.15;
  for (var q = -3; q <= 3; q++) {
    for (var r = -3; r <= 3; r++) {
      if (Math.abs(q + r) > 3) continue;
      var p = hexToPixel(q, r);
      drawHex(p.x, p.y, HEX_SIZE * 0.95, null, '#335', 1);
    }
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';

  // Title
  var grad = ctx.createLinearGradient(W/2 - 200, 0, W/2 + 200, 0);
  grad.addColorStop(0, '#ff6644');
  grad.addColorStop(0.5, '#ffcc44');
  grad.addColorStop(1, '#44ddff');
  ctx.fillStyle = grad;
  ctx.font = 'bold ' + Math.floor(HEX_SIZE * 1.8) + 'px "Segoe UI", Arial';
  ctx.fillText('Hex Weave', W/2, H * 0.25);

  ctx.fillStyle = '#8899aa';
  ctx.font = Math.floor(HEX_SIZE * 0.55) + 'px "Segoe UI", Arial';
  ctx.fillText('Create the longest path through the hex grid', W/2, H * 0.33);

  var y = H * 0.44;
  var lh = HEX_SIZE * 0.9;
  ctx.fillStyle = '#aabbcc';
  ctx.font = Math.floor(HEX_SIZE * 0.45) + 'px "Segoe UI", Arial';
  ctx.fillText('Rotate tile: A/D, Arrows, or Scroll', W/2, y); y += lh;
  ctx.fillText('Place tile: Space, Enter, or Tap the hex', W/2, y); y += lh;
  ctx.fillText('Path hits the border = Game Over', W/2, y); y += lh * 1.5;

  if (highScore > 0) {
    ctx.fillStyle = '#ffcc44';
    ctx.font = Math.floor(HEX_SIZE * 0.5) + 'px "Segoe UI", Arial';
    ctx.fillText('Best: ' + highScore, W/2, y);
    y += lh * 1.2;
  }

  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold ' + Math.floor(HEX_SIZE * 0.55) + 'px "Segoe UI", Arial';
  var pulse = 0.7 + Math.sin(Date.now() * 0.004) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillText('TAP OR PRESS ANY KEY TO START', W/2, y);
  ctx.globalAlpha = 1;
}

function drawBoard() {
  // Draw all hexes
  var keys = Object.keys(board);
  for (var i = 0; i < keys.length; i++) {
    var cell = board[keys[i]];
    var p = hexToPixel(cell.q, cell.r);

    // Background fill
    var fill;
    if (cell.isCenter) {
      fill = '#1a2a3a';
    } else if (cell.isBorder) {
      fill = '#0d0d18';
    } else if (cell.placed) {
      fill = cell.isPath ? '#1a1520' : '#111118';
    } else {
      fill = '#0f0f1a';
    }

    drawHex(p.x, p.y, HEX_SIZE * 0.96, fill, cell.isBorder ? '#221828' : '#1a1a30', 1);

    // Draw tile paths
    if (cell.placed && cell.paths) {
      drawTilePaths(p.x, p.y, HEX_SIZE * 0.96, cell.paths, false, cell.isPath);
    }
  }
}

function drawPlayerPath() {
  if (playerPath.length < 2) return;

  // Draw glowing path connecting all segments
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (var i = 0; i < playerPath.length; i++) {
    var seg = playerPath[i];
    var p = hexToPixel(seg.q, seg.r);
    var size = HEX_SIZE * 0.96;

    if (seg.entryEdge >= 0 && seg.exitEdge >= 0) {
      var p1 = getEdgePoint(p.x, p.y, size, seg.entryEdge);
      var p2 = getEdgePoint(p.x, p.y, size, seg.exitEdge);
      var midX = p.x + (p1.x + p2.x - 2 * p.x) * 0.15;
      var midY = p.y + (p1.y + p2.y - 2 * p.y) * 0.15;

      // Outer glow
      var t = (time * 0.5 + i * 0.1) % 1;
      ctx.strokeStyle = 'rgba(255,120,60,' + (0.15 + Math.sin(t * Math.PI * 2) * 0.05) + ')';
      ctx.lineWidth = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.quadraticCurveTo(midX, midY, p2.x, p2.y);
      ctx.stroke();
    }
  }
}

function drawCurrentTile() {
  if (!currentPos || !currentTile) return;
  var p = hexToPixel(currentPos.q, currentPos.r);
  var size = HEX_SIZE * 0.96;

  // Highlight hex
  var pulse = 0.4 + Math.sin(time * 4) * 0.15;
  drawHex(p.x, p.y, size, 'rgba(50,200,255,' + pulse * 0.15 + ')', 'rgba(50,200,255,' + pulse + ')', 2);

  // Draw the tile paths with current rotation
  var rotated = rotatePaths(currentTile.paths, currentTile.rotation);
  drawTilePaths(p.x, p.y, size, rotated, true, false);

  // Highlight entry edge
  if (currentPos.entryEdge >= 0) {
    var ep = getEdgePoint(p.x, p.y, size, currentPos.entryEdge);
    ctx.fillStyle = '#ff6644';
    ctx.beginPath();
    ctx.arc(ep.x, ep.y, size * 0.08, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.fillStyle = 'rgba(255,100,50,0.3)';
    ctx.beginPath();
    ctx.arc(ep.x, ep.y, size * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }

  // Rotate buttons (mobile friendly)
  var btnSize = HEX_SIZE * 0.4;
  var leftBtn = { x: p.x - HEX_SIZE * 1.8, y: p.y + HEX_SIZE * 0.8 };
  var rightBtn = { x: p.x + HEX_SIZE * 1.8, y: p.y + HEX_SIZE * 0.8 };

  // Left rotate
  ctx.fillStyle = 'rgba(50,200,255,0.2)';
  ctx.beginPath(); ctx.arc(leftBtn.x, leftBtn.y, btnSize, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(50,200,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#44ddff';
  ctx.font = Math.floor(btnSize * 1.2) + 'px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('<', leftBtn.x, leftBtn.y);

  // Right rotate
  ctx.fillStyle = 'rgba(50,200,255,0.2)';
  ctx.beginPath(); ctx.arc(rightBtn.x, rightBtn.y, btnSize, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(50,200,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#44ddff';
  ctx.fillText('>', rightBtn.x, rightBtn.y);
  ctx.textBaseline = 'alphabetic';

  // Draw next tile preview
  drawNextPreview();
}

function drawNextPreview() {
  if (!nextTile) return;
  var previewX = W - HEX_SIZE * 2;
  var previewY = HEX_SIZE * 3;
  var previewSize = HEX_SIZE * 0.6;

  ctx.fillStyle = '#aabbcc';
  ctx.font = Math.floor(HEX_SIZE * 0.3) + 'px "Segoe UI", Arial';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', previewX, previewY - previewSize * 1.4);

  drawHex(previewX, previewY, previewSize, '#111118', '#2a2a40', 1);
  drawTilePaths(previewX, previewY, previewSize, nextTile.paths, false, false);
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold ' + Math.floor(HEX_SIZE * 0.55) + 'px "Segoe UI", Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Path: ' + pathLength, HEX_SIZE * 0.5, HEX_SIZE * 0.7);

  if (highScore > 0) {
    ctx.fillStyle = '#667788';
    ctx.font = Math.floor(HEX_SIZE * 0.35) + 'px "Segoe UI", Arial';
    ctx.fillText('Best: ' + highScore, HEX_SIZE * 0.5, HEX_SIZE * 1.15);
  }

  // Mute
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(W - 42, 10, 32, 32);
  ctx.fillStyle = '#aaa';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(SFX.muted ? 'X' : String.fromCharCode(9835), W - 26, 31);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff6644';
  ctx.font = 'bold ' + Math.floor(HEX_SIZE * 1.5) + 'px "Segoe UI", Arial';
  ctx.fillText('Path Complete!', W/2, H * 0.3);

  ctx.fillStyle = '#ddd';
  ctx.font = Math.floor(HEX_SIZE * 0.6) + 'px "Segoe UI", Arial';
  ctx.fillText('Your path reached ' + pathLength + ' tiles', W/2, H * 0.42);

  if (pathLength >= highScore && pathLength > 0) {
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold ' + Math.floor(HEX_SIZE * 0.5) + 'px "Segoe UI", Arial';
    ctx.fillText('NEW BEST!', W/2, H * 0.52);
  }

  ctx.fillStyle = '#667788';
  ctx.font = Math.floor(HEX_SIZE * 0.45) + 'px "Segoe UI", Arial';
  ctx.fillText('Previous best: ' + highScore, W/2, H * 0.6);

  ctx.fillStyle = '#44ffaa';
  ctx.font = Math.floor(HEX_SIZE * 0.45) + 'px "Segoe UI", Arial';
  var pulse = 0.7 + Math.sin(Date.now() * 0.004) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillText('Tap to Submit Score & Play Again', W/2, H * 0.73);
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop() {
  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

</script>
