// STATE: Build Mode — categorised blueprint selection
// ============================================================
var BUILD_CATEGORIES = [
  { id: 'paths', name: 'Paths', ids: ['path','cobblestone'] },
  { id: 'homes', name: 'Homes', ids: ['small_home','large_home'] },
  { id: 'commerce', name: 'Commerce', ids: ['market_stall','food_store','craft_store'] },
  { id: 'production', name: 'Production', ids: ['workshop','campfire','farm_plot','stable','mine_entrance'] },
  { id: 'decoration', name: 'Decoration', ids: ['fence','well','lantern'] },
  { id: 'special', name: 'Special', ids: ['tavern','town_hall','obelisk'] },
];

var BuildModeState = {
  name: 'build_mode',
  drawBelow: true,
  _catIdx: 0,
  _itemIdx: 0,

  onEnter: function(game) {
    this._catIdx = 0;
    this._itemIdx = 0;
  },

  _getItems: function() {
    var cat = BUILD_CATEGORIES[this._catIdx];
    var items = [];
    for (var i = 0; i < cat.ids.length; i++) {
      var bp = BlueprintRegistry.get(cat.ids[i]);
      if (bp) items.push(bp);
    }
    return items;
  },

  onKey: function(game, key) {
    var lk = key.toLowerCase();
    if (lk === 'escape' || lk === 'b') { StateStack.pop(); return true; }

    // Tab / Shift+Tab or Q/E for category switching
    if (key === 'Tab' || lk === 'q') {
      this._catIdx = (this._catIdx + 1) % BUILD_CATEGORIES.length;
      this._itemIdx = 0;
      return true;
    }

    var items = this._getItems();
    if (items.length === 0) return true;

    // Up/Down to change category
    if (key === 'ArrowUp' || lk === 'w') {
      this._catIdx = (this._catIdx - 1 + BUILD_CATEGORIES.length) % BUILD_CATEGORIES.length;
      this._itemIdx = 0;
      return true;
    }
    if (key === 'ArrowDown' || lk === 's') {
      this._catIdx = (this._catIdx + 1) % BUILD_CATEGORIES.length;
      this._itemIdx = 0;
      return true;
    }

    // Left/Right to change item within category
    if (key === 'ArrowLeft' || lk === 'a') {
      this._itemIdx = (this._itemIdx - 1 + items.length) % items.length;
      return true;
    }
    if (key === 'ArrowRight' || lk === 'd') {
      this._itemIdx = (this._itemIdx + 1) % items.length;
      return true;
    }

    if (key === 'Enter' || key === ' ' || lk === 'e') {
      var bp = items[this._itemIdx];
      if (bp) this._tryPlace(game, bp);
      return true;
    }
    return true;
  },

  _tryPlace: function(game, bp) {
    var p = game.player;
    var px = p.x + p.lastDir.x;
    var py = p.y + p.lastDir.y;

    if (!Bag.hasAll(p.bag, bp.cost)) {
      GameUtils.addLog('Not enough resources for ' + bp.name + '.', '#cc4444');
      return;
    }

    for (var i = 0; i < bp.tiles.length; i++) {
      var tx = px + bp.tiles[i].dx, ty = py + bp.tiles[i].dy;
      if (!Overworld.isPassable(tx, ty)) {
        GameUtils.addLog('Can\'t build here — space is blocked.', '#cc4444');
        return;
      }
      if (BuildingManager.getAt(tx, ty)) {
        GameUtils.addLog('There\'s already a building here.', '#cc4444');
        return;
      }
    }

    Bag.removeAll(p.bag, bp.cost);
    var building = BuildingManager.add(px, py, bp);
    for (var i = 0; i < bp.tiles.length; i++) {
      Overworld.setTile(px + bp.tiles[i].dx, py + bp.tiles[i].dy, bp.tiles[i].type);
    }

    SFX.shrine();
    GameUtils.addLog('Built ' + bp.name + '!', '#ddaa44');
    GameEvents.fire('buildingPlaced', game, building);
    StateStack.pop();
  },

  onDraw: function(game, ctx) {
    var w = CONFIG.WIDTH, h = CONFIG.HEIGHT;
    var fs = Math.max(12, Math.round(w * 0.013));
    var items = this._getItems();
    var bp = items[this._itemIdx] || null;

    // World-space placement preview
    if (bp) {
      var p = game.player;
      var px = Math.round(p.x) + p.lastDir.x;
      var py = Math.round(p.y) + p.lastDir.y;
      var ts = CONFIG.TILE;
      var canAfford = Bag.hasAll(p.bag, bp.cost);
      var pulse = 0.3 + Math.sin(game.animTimer * 4) * 0.15;
      var blocked = false;

      game.pipeline.camera.applyTransform(ctx);

      for (var i = 0; i < bp.tiles.length; i++) {
        var tx = px + bp.tiles[i].dx, ty = py + bp.tiles[i].dy;
        var tileBlocked = !Overworld.isPassable(tx, ty) || BuildingManager.getAt(tx, ty);
        if (tileBlocked) blocked = true;
        var valid = canAfford && !tileBlocked;

        ctx.strokeStyle = valid ? 'rgba(100,255,100,0.7)' : 'rgba(255,80,80,0.7)';
        ctx.lineWidth = 2;
        ctx.strokeRect(tx * ts + 1, ty * ts + 1, ts - 2, ts - 2);
        ctx.fillStyle = valid
          ? 'rgba(100,255,100,' + pulse.toFixed(2) + ')'
          : 'rgba(255,80,80,' + (pulse * 0.6).toFixed(2) + ')';
        ctx.fillRect(tx * ts + 2, ty * ts + 2, ts - 4, ts - 4);
      }

      var labelX = px * ts + (bp.size.w * ts) / 2;
      var labelY = py * ts - 8;
      ctx.fillStyle = (canAfford && !blocked) ? '#aaffaa' : '#ff8888';
      ctx.font = 'bold ' + Math.max(10, Math.round(ts * 0.35)) + 'px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(bp.name, labelX, labelY);

      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    // --- UI PANEL ---
    // Top bar
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, w, fs * 3.5);

    ctx.fillStyle = '#ddaa44';
    ctx.font = 'bold ' + Math.round(fs * 1.3) + 'px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('BUILD MODE', w / 2, fs * 1.3);
    ctx.fillStyle = '#888';
    ctx.font = Math.round(fs * 0.75) + 'px Segoe UI';
    ctx.fillText('\u2191\u2193 Category    \u2190\u2192 Item    ENTER place    B/ESC cancel', w / 2, fs * 2.5);

    // Category tabs
    var tabW = w / BUILD_CATEGORIES.length;
    var tabY = fs * 3.5;
    var tabH = fs * 2;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, tabY, w, tabH);

    for (var ci = 0; ci < BUILD_CATEGORIES.length; ci++) {
      var cat = BUILD_CATEGORIES[ci];
      var selected = ci === this._catIdx;
      var tx = ci * tabW;

      if (selected) {
        ctx.fillStyle = 'rgba(60,50,20,0.9)';
        ctx.fillRect(tx, tabY, tabW, tabH);
        ctx.strokeStyle = '#ddaa44';
        ctx.lineWidth = 2;
        ctx.strokeRect(tx, tabY, tabW, tabH);
      }

      ctx.fillStyle = selected ? '#fff' : '#777';
      ctx.font = (selected ? 'bold ' : '') + Math.round(fs * 0.85) + 'px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(cat.name, tx + tabW / 2, tabY + tabH * 0.65);
    }

    // Item cards for selected category
    if (items.length === 0) {
      ctx.fillStyle = '#666';
      ctx.font = fs + 'px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('No items in this category', w / 2, tabY + tabH + fs * 3);
      return;
    }

    var cardW = Math.min(w * 0.28, 220);
    var totalCardW = cardW * items.length + (items.length - 1) * 10;
    var startX = (w - totalCardW) / 2;
    var cardY = tabY + tabH + fs * 0.5;

    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var cx = startX + i * (cardW + 10);
      var isSel = i === this._itemIdx;
      var canAfford = Bag.hasAll(game.player.bag, item.cost);

      ctx.fillStyle = isSel ? 'rgba(40,35,20,0.95)' : 'rgba(15,12,8,0.85)';
      ctx.fillRect(cx, cardY, cardW, fs * 8);
      ctx.strokeStyle = isSel ? '#ddaa44' : '#444';
      ctx.lineWidth = isSel ? 2 : 1;
      ctx.strokeRect(cx, cardY, cardW, fs * 8);

      // Name
      var ty = cardY + fs * 1.3;
      ctx.fillStyle = isSel ? '#fff' : '#aaa';
      ctx.font = 'bold ' + fs + 'px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(item.name, cx + cardW / 2, ty); ty += fs * 1.4;

      // Description
      ctx.fillStyle = '#888';
      ctx.font = Math.round(fs * 0.75) + 'px Segoe UI';
      ctx.fillText(item.desc, cx + cardW / 2, ty); ty += fs * 1.5;

      // Cost
      ctx.font = Math.round(fs * 0.8) + 'px Segoe UI';
      ctx.textAlign = 'left';
      for (var resId in item.cost) {
        var have = game.player.bag[resId] || 0;
        var need = item.cost[resId];
        var resDef = ResourceRegistry.get(resId);
        var resName = resDef ? resDef.name : resId;
        ctx.fillStyle = have >= need ? '#88aa88' : '#cc6666';
        ctx.fillText(resName + ': ' + have + '/' + need, cx + 8, ty);
        ty += fs * 1.1;
      }
      ctx.textAlign = 'center';
    }
  },
};

// ============================================================
// STATE: Crafting — turn resources into items
// ============================================================
var CraftingState = {
  name: 'crafting',
  drawBelow: true,
  _cursor: 0,
  _recipes: [],
  _message: '',
  _messageTimer: 0,

  onEnter: function(game) {
    // Get all recipes the player has skill access to and prerequisites met
    this._recipes = [];
    var all = RecipeRegistry.all();
    var crafted = game.player.craftedRecipes || {};
    for (var i = 0; i < all.length; i++) {
      var r = all[i];
      // Check skill level requirement
      if (r.skill && r.level) {
        var lvl = PlayerSkills.getLevel(game.player.skills, r.skill);
        if (lvl < r.level) continue;
      }
      // Check prerequisites
      if (!RecipeRegistry.checkPrereqs(r, crafted)) continue;
      this._recipes.push(r);
    }
    this._cursor = 0;
    this._message = '';
    this._messageTimer = 0;
  },

  onKey: function(game, key) {
    var lk = key.toLowerCase();
    if (lk === 'escape' || lk === 'c') { StateStack.pop(); return true; }
    if (key === 'ArrowUp' || lk === 'w') {
      this._cursor = (this._cursor - 1 + Math.max(1, this._recipes.length)) % Math.max(1, this._recipes.length);
      return true;
    }
    if (key === 'ArrowDown' || lk === 's') {
      this._cursor = (this._cursor + 1) % Math.max(1, this._recipes.length);
      return true;
    }
    if (lk === 'enter' || lk === ' ' || lk === 'e') {
      this._craft(game);
      return true;
    }
    return true;
  },

  _craft: function(game) {
    if (this._recipes.length === 0) return;
    var r = this._recipes[this._cursor];
    var p = game.player;
    if (!Bag.hasAll(p.bag, r.input)) {
      this._message = 'Not enough resources';
      this._messageTimer = 1.5;
      return;
    }
    Bag.removeAll(p.bag, r.input);
    Bag.addAll(p.bag, r.output);
    // Track crafted recipe for prerequisite tree
    if (r.name) {
      if (!p.craftedRecipes) p.craftedRecipes = {};
      p.craftedRecipes[r.name] = true;
    }
    // XP for the skill
    if (r.skill) {
      var result = PlayerSkills.addXp(p.skills, r.skill, 8);
      if (result.leveled) {
        GameUtils.addLog(r.skill + ' level ' + result.level + '!', '#ffcc44');
        // Refresh recipe list — new level may unlock new recipes
        this.onEnter(game);
      }
    }
    SFX.shrine();
    // Build output description
    var outputDesc = [];
    for (var id in r.output) {
      var def = ResourceRegistry.get(id);
      outputDesc.push(r.output[id] + 'x ' + (def ? def.name : id));
    }
    this._message = 'Crafted ' + outputDesc.join(', ');
    this._messageTimer = 2.0;
    GameUtils.addLog('Crafted: ' + outputDesc.join(', '), '#ddaa44');
  },

  onDraw: function(game, ctx) {
    var w = CONFIG.WIDTH, h = CONFIG.HEIGHT;
    var fs = Math.max(12, Math.round(w * 0.013));
    var p = game.player;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, w, h);

    // Title
    ctx.fillStyle = '#ddaa44';
    ctx.font = 'bold ' + Math.round(fs * 1.8) + 'px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('CRAFTING', w / 2, fs * 2.5);
    ctx.fillStyle = '#888';
    ctx.font = Math.round(fs * 0.8) + 'px Segoe UI';
    ctx.fillText('[C] or [ESC] to close    [ENTER] to craft', w / 2, fs * 4);

    if (this._recipes.length === 0) {
      ctx.fillStyle = '#666';
      ctx.font = fs + 'px Segoe UI';
      ctx.fillText('No recipes available. Level up your skills!', w / 2, h * 0.4);
      return;
    }

    // Recipe list — left side
    var listX = w * 0.05, listW = w * 0.4;
    var ty = fs * 6;
    var rowH = fs * 2.8;
    var visibleRows = Math.floor((h - ty - fs * 4) / rowH);
    var scrollOffset = Math.max(0, this._cursor - visibleRows + 2);

    ctx.textAlign = 'left';
    for (var i = scrollOffset; i < Math.min(this._recipes.length, scrollOffset + visibleRows); i++) {
      var r = this._recipes[i];
      var selected = i === this._cursor;
      var canAfford = Bag.hasAll(p.bag, r.input);
      var ry = ty + (i - scrollOffset) * rowH;

      // Highlight
      if (selected) {
        ctx.fillStyle = 'rgba(60, 50, 20, 0.6)';
        ctx.fillRect(listX - 4, ry - fs * 0.3, listW, rowH - 4);
        ctx.strokeStyle = '#ddaa44';
        ctx.lineWidth = 1;
        ctx.strokeRect(listX - 4, ry - fs * 0.3, listW, rowH - 4);
      }

      // Recipe name
      var skillDef = r.skill ? SkillRegistry.get(r.skill) : null;
      ctx.fillStyle = canAfford ? '#fff' : '#666';
      ctx.font = (selected ? 'bold ' : '') + fs + 'px Segoe UI';
      ctx.fillText(r.name || 'Recipe', listX, ry + fs * 0.7);

      // Skill tag
      if (skillDef) {
        ctx.fillStyle = canAfford ? skillDef.color : '#444';
        ctx.font = Math.round(fs * 0.7) + 'px Segoe UI';
        ctx.fillText(skillDef.name + ' Lv.' + r.level, listX, ry + fs * 1.7);
      }
    }

    // Selected recipe detail — right side
    var detailX = w * 0.52, detailW = w * 0.43;
    var r = this._recipes[this._cursor];
    if (r) {
      var dty = fs * 6;

      // Box — height calculated from content
      // Count: name(1) + prereqs(req.length+1) + requires header(1) + inputs(n) + gap + produces header(1) + outputs(n) + gap + button(2)
      var inputCount = 0; for (var _ci in r.input) inputCount++;
      var outputCount = 0; for (var _co in r.output) outputCount++;
      var prereqCount = (r.requires && r.requires.length) || 0;
      var detailLines = 2 + (prereqCount > 0 ? prereqCount + 2 : 0) + 1 + inputCount + 1 + 1 + outputCount + 2;
      var detailBoxH = Math.min(h - dty, detailLines * fs * 1.3 + fs * 2);
      ctx.fillStyle = 'rgba(30, 25, 15, 0.8)';
      ctx.fillRect(detailX - 8, dty - fs, detailW + 16, detailBoxH);
      ctx.strokeStyle = '#554422';
      ctx.lineWidth = 1;
      ctx.strokeRect(detailX - 8, dty - fs, detailW + 16, detailBoxH);

      // Name
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.round(fs * 1.2) + 'px Segoe UI';
      ctx.textAlign = 'left';
      ctx.fillText(r.name || 'Recipe', detailX, dty + fs * 0.5);
      dty += fs * 2.2;

      // Prerequisites (if any)
      if (r.requires && r.requires.length > 0) {
        ctx.fillStyle = '#aa7788';
        ctx.font = 'bold ' + Math.round(fs * 0.85) + 'px Segoe UI';
        ctx.fillText('PREREQUISITE:', detailX, dty);
        dty += fs * 1.3;
        ctx.font = Math.round(fs * 0.8) + 'px Segoe UI';
        for (var ri = 0; ri < r.requires.length; ri++) {
          var met = p.craftedRecipes && p.craftedRecipes[r.requires[ri]];
          ctx.fillStyle = met ? '#88aa88' : '#cc6666';
          ctx.fillText((met ? '\u2713 ' : '\u2717 ') + r.requires[ri], detailX + 8, dty);
          dty += fs * 1.1;
        }
        dty += fs * 0.3;
      }

      // Requires
      ctx.fillStyle = '#aa8866';
      ctx.font = 'bold ' + Math.round(fs * 0.85) + 'px Segoe UI';
      ctx.fillText('REQUIRES:', detailX, dty);
      dty += fs * 1.4;

      ctx.font = fs + 'px Segoe UI';
      for (var id in r.input) {
        var need = r.input[id];
        var have = p.bag[id] || 0;
        var def = ResourceRegistry.get(id);
        var enough = have >= need;
        ctx.fillStyle = enough ? '#88aa88' : '#cc6666';
        ctx.fillText((def ? def.name : id) + ': ' + have + ' / ' + need, detailX + 8, dty);
        dty += fs * 1.3;
      }

      dty += fs * 0.5;

      // Produces
      ctx.fillStyle = '#88aa66';
      ctx.font = 'bold ' + Math.round(fs * 0.85) + 'px Segoe UI';
      ctx.fillText('PRODUCES:', detailX, dty);
      dty += fs * 1.4;

      ctx.font = fs + 'px Segoe UI';
      for (var id in r.output) {
        var def = ResourceRegistry.get(id);
        ctx.fillStyle = def ? def.color : '#aaa';
        ctx.fillText(r.output[id] + 'x ' + (def ? def.name : id), detailX + 8, dty);
        dty += fs * 1.3;
      }

      // Craft button
      var canAfford = Bag.hasAll(p.bag, r.input);
      dty += fs * 1.0;
      ctx.fillStyle = canAfford ? 'rgba(80,120,40,0.6)' : 'rgba(60,40,40,0.4)';
      ctx.fillRect(detailX, dty - fs * 0.3, detailW * 0.5, fs * 1.8);
      ctx.strokeStyle = canAfford ? '#88aa44' : '#554444';
      ctx.lineWidth = 1;
      ctx.strokeRect(detailX, dty - fs * 0.3, detailW * 0.5, fs * 1.8);
      ctx.fillStyle = canAfford ? '#ccddaa' : '#666';
      ctx.font = 'bold ' + fs + 'px Segoe UI';
      ctx.fillText('[ENTER] Craft', detailX + 8, dty + fs * 0.8);
    }

    // Status message
    if (this._messageTimer > 0) {
      this._messageTimer -= 1/60;
      ctx.fillStyle = '#ffcc44';
      ctx.font = 'bold ' + Math.round(fs * 1.1) + 'px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(this._message, w / 2, h - fs * 3);
    }
  },
};

// STATE: Dialogue — conversation with choices
// ============================================================

// Build dialogue for an NPC based on their state and context
function buildNpcDialogue(npc, game) {
  var lines = [];
  var choices = [];

  lines.push({ text: npc.name, color: '#ffcc88', bold: true });

  // Merchant NPC — trade dialogue
  if (npc.isMerchant) {
    lines.push({ text: npc.townName + ' ' + npc.townType, color: '#aa9966' });
    lines.push({ text: '"What have you got for me?"', color: '#ccc' });

    // Show what they buy
    var buyPrices = typeof TOWN_BUY_PRICES !== 'undefined' ? TOWN_BUY_PRICES[npc.townType] : null;
    if (buyPrices) {
      var hasSellable = false;
      for (var id in buyPrices) {
        if ((game.player.bag[id] || 0) > 0) { hasSellable = true; break; }
      }
      // Also check caravan
      if (!hasSellable && typeof CaravanManager !== 'undefined' && CaravanManager.caravan &&
          CaravanManager.caravan.deployed && CaravanManager.caravan.hitched) {
        for (var id in buyPrices) {
          if ((CaravanManager.caravan.cargo[id] || 0) > 0) { hasSellable = true; break; }
        }
      }
      if (hasSellable) {
        choices.push({ text: 'Sell my goods', key: 'y', action: 'merchant_sell' });
      } else {
        lines.push({ text: '"Nothing I want to buy today."', color: '#888' });
      }
    }

    // Show what they sell
    var sellItems = typeof TOWN_SELL_ITEMS !== 'undefined' ? TOWN_SELL_ITEMS[npc.townType] : null;
    if (sellItems && sellItems.length > 0) {
      var gold = game.player.bag.gold_coin || 0;
      for (var si = 0; si < sellItems.length; si++) {
        var sItem = sellItems[si];
        var affordable = gold >= sItem.price;
        choices.push({
          text: 'Buy ' + sItem.name + ' (' + sItem.price + 'g)' + (affordable ? '' : ' - need more gold'),
          key: '' + (si + 1),
          action: 'merchant_buy_' + si,
        });
      }
      lines.push({ text: 'Your gold: ' + gold + 'g', color: '#ffcc22' });
    }

    choices.push({ text: 'Goodbye.', key: 'n', action: 'close' });
    return { lines: lines, choices: choices };
  }

  if (!npc.resident) {
    // Traveller dialogue
    var greetings = [
      "I've been walking for days. Know any place to rest?",
      "The road is long and my feet are tired.",
      "Interesting place you've found here.",
      "I'm a traveller. Seen many lands, I have.",
      "Got any work? I'm handy with my hands.",
    ];
    lines.push({ text: greetings[Math.floor(Math.random() * greetings.length)], color: '#ccc' });

    // Show skills — one per line to avoid overflow
    var hasSkills = false;
    for (var s in npc.skills) {
      if (npc.skills[s] > 0) {
        if (!hasSkills) { lines.push({ text: 'Skills:', color: '#999' }); hasSkills = true; }
        var dots = '';
        for (var d = 0; d < npc.skills[s]; d++) dots += '\u2605';
        lines.push({ text: '  ' + s + ' ' + dots, color: '#aaa' });
      }
    }

    // Offer to hire if there's a vacant home
    var vacantHomes = BuildingManager.getVacantHomes();
    if (vacantHomes.length > 0) {
      choices.push({ text: 'Would you like to live here?', key: 'y', action: 'hire' });
    }
    choices.push({ text: 'Safe travels.', key: 'n', action: 'close' });
  } else {
    // Resident dialogue
    var homeLines = [
      "Good day! The village is coming along nicely.",
      "I feel at home here. Thank you.",
      "Need anything? I'm happy to help.",
      "Another fine day in our little settlement.",
    ];
    lines.push({ text: homeLines[Math.floor(Math.random() * homeLines.length)], color: '#ccc' });

    if (npc.job) {
      lines.push({ text: "I'm working as a " + npc.job + ".", color: '#aaa' });
    }

    choices.push({ text: 'Carry on.', key: 'n', action: 'close' });
  }

  return { lines: lines, choices: choices };
}

var DialogueState = {
  name: 'dialogue',
  drawBelow: true,
  _dialogue: null,

  onEnter: function(game) {
    var npc = game._talkingNpc;
    if (!npc) { StateStack.pop(); return; }
    this._dialogue = buildNpcDialogue(npc, game);
  },

  onKey: function(game, key) {
    var d = this._dialogue;
    if (!d) { StateStack.pop(); return true; }
    var lk = key.toLowerCase();

    // Check choices
    for (var i = 0; i < d.choices.length; i++) {
      var choice = d.choices[i];
      // Match by key letter or by number (1,2,3...)
      if (lk === choice.key || lk === '' + (i + 1)) {
        if (choice.action === 'hire') {
          this._hireNpc(game, game._talkingNpc);
        } else if (choice.action === 'merchant_sell') {
          this._merchantSell(game, game._talkingNpc);
          // Refresh dialogue to update gold/inventory
          this._dialogue = buildNpcDialogue(game._talkingNpc, game);
          return true; // don't close — let them buy too
        } else if (choice.action.indexOf('merchant_buy_') === 0) {
          var buyIdx = parseInt(choice.action.replace('merchant_buy_', ''), 10);
          this._merchantBuy(game, game._talkingNpc, buyIdx);
          this._dialogue = buildNpcDialogue(game._talkingNpc, game);
          return true; // don't close
        } else if (choice.action !== 'close') {
          // Dispatch to event system — any system can handle custom actions
          GameEvents.fire('dialogueAction', game, choice.action, game._talkingNpc);
        }
        this._close(game);
        return true;
      }
    }

    // Enter triggers the first choice (for mobile YES button)
    if (lk === 'enter' || lk === ' ') {
      if (d.choices.length > 0) {
        var first = d.choices[0];
        if (first.action === 'hire') {
          this._hireNpc(game, game._talkingNpc);
        } else if (first.action === 'merchant_sell') {
          this._merchantSell(game, game._talkingNpc);
          this._dialogue = buildNpcDialogue(game._talkingNpc, game);
          return true;
        } else if (first.action.indexOf('merchant_buy_') === 0) {
          var buyIdx = parseInt(first.action.replace('merchant_buy_', ''), 10);
          this._merchantBuy(game, game._talkingNpc, buyIdx);
          this._dialogue = buildNpcDialogue(game._talkingNpc, game);
          return true;
        } else if (first.action !== 'close') {
          GameEvents.fire('dialogueAction', game, first.action, game._talkingNpc);
        }
      }
      this._close(game);
      return true;
    }
    // Escape always closes
    if (lk === 'escape') {
      this._close(game);
      return true;
    }
    return true;
  },

  _hireNpc: function(game, npc) {
    var homes = BuildingManager.getVacantHomes();
    if (homes.length === 0) {
      GameUtils.addLog('No vacant homes available.', '#cc4444');
      return;
    }
    var home = homes[0];
    npc.resident = true;
    npc.home = { x: home.x + 1, y: home.y + 2 }; // stand at door
    home.occupant = npc.name;
    npc.speed = 0.2; // residents move slower

    // Assign job based on best skill
    var bestSkill = '', bestLevel = 0;
    for (var s in npc.skills) {
      if (npc.skills[s] > bestLevel) { bestLevel = npc.skills[s]; bestSkill = s; }
    }
    if (bestLevel > 0) npc.job = bestSkill;

    SFX.shrine();
    GameUtils.addLog(npc.name + ' has moved in!', '#44dd88');
    GameUtils.addLog('Assigned to home at ' + home.x + ',' + home.y, '#888');
    GameEvents.fire('npcHired', game, npc, home);
  },

  _merchantSell: function(game, npc) {
    if (!npc || !npc.isMerchant) return;
    var prices = typeof TOWN_BUY_PRICES !== 'undefined' ? TOWN_BUY_PRICES[npc.townType] : null;
    if (!prices) return;
    var p = game.player;
    var totalGold = 0;

    // Sell from player bag and hitched caravan
    var bags = [p.bag];
    if (typeof CaravanManager !== 'undefined' && CaravanManager.caravan &&
        CaravanManager.caravan.deployed && CaravanManager.caravan.hitched) {
      bags.push(CaravanManager.caravan.cargo);
    }

    for (var b = 0; b < bags.length; b++) {
      var bag = bags[b];
      for (var itemId in prices) {
        var count = bag[itemId] || 0;
        if (count > 0) {
          Bag.remove(bag, itemId, count);
          totalGold += count * prices[itemId];
        }
      }
    }

    if (totalGold > 0) {
      Bag.add(p.bag, 'gold_coin', totalGold);
      SFX.shrine();
      GameUtils.addLog('Sold ' + totalGold + 'g worth of goods!', '#ffcc22');
    }
  },

  _merchantBuy: function(game, npc, itemIdx) {
    if (!npc || !npc.isMerchant) return;
    var sells = typeof TOWN_SELL_ITEMS !== 'undefined' ? TOWN_SELL_ITEMS[npc.townType] : null;
    if (!sells || !sells[itemIdx]) return;
    var item = sells[itemIdx];
    var p = game.player;
    var gold = p.bag.gold_coin || 0;

    if (gold < item.price) {
      GameUtils.addLog('Not enough gold! Need ' + item.price + 'g.', '#cc4444');
      return;
    }

    Bag.remove(p.bag, 'gold_coin', item.price);
    Bag.add(p.bag, item.id, 1);
    SFX.shrine();
    GameUtils.addLog('Bought ' + item.name + ' for ' + item.price + 'g!', '#88ffaa');
  },

  _close: function(game) {
    game._talkingNpc = null;
    this._dialogue = null;
    StateStack.pop();
  },

  onDraw: function(game, ctx) {
    var npc = game._talkingNpc;
    var d = this._dialogue;
    if (!npc || !d) return;
    var w = CONFIG.WIDTH, h = CONFIG.HEIGHT;
    var fs = Math.max(11, Math.round(w * 0.013));

    // Count total content lines to size box properly
    var totalLines = d.lines.length + d.choices.length + 1; // +1 for divider gap
    var maxH = h * 0.6; // box uses at most 60% of screen
    var lineH = Math.min(fs * 1.4, maxH / totalLines);
    var contentFs = Math.min(fs, lineH * 0.85);

    var portSize = Math.min(50, h * 0.08);
    var boxW = Math.min(w * 0.75, 560);
    var boxH = totalLines * lineH + fs * 2;
    if (boxH > maxH) boxH = maxH;
    var bx = (w - boxW) / 2, by = h - boxH - 15;

    // Box
    ctx.fillStyle = 'rgba(10,8,15,0.95)';
    ctx.fillRect(bx, by, boxW, boxH);
    ctx.strokeStyle = '#665544';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, boxW, boxH);

    // Portrait
    var portX = bx + 8, portY = by + 8;
    ctx.fillStyle = 'rgba(20,18,25,0.8)';
    ctx.fillRect(portX, portY, portSize, portSize);
    drawCharPixel(ctx, portX, portY, portSize, npc.bodyColor, '#443322', npc.skinColor, null, 0,
      { hairStyle: npc.hairStyle, hairColor: npc.hairColor, body: npc.body,
        height: npc.height, frame: npc.frame });

    // Text — all within box bounds
    var textX = bx + portSize + 20;
    var maxTextW = boxW - portSize - 30;
    var ty = by + lineH;
    var boxBottom = by + boxH - fs * 0.5;
    ctx.textAlign = 'left';

    for (var i = 0; i < d.lines.length; i++) {
      if (ty > boxBottom) break;
      var line = d.lines[i];
      ctx.fillStyle = line.color || '#ccc';
      ctx.font = (line.bold ? 'bold ' : '') + contentFs + 'px Segoe UI';
      var lineText = line.text;
      while (lineText.length > 3 && ctx.measureText(lineText).width > maxTextW) {
        lineText = lineText.slice(0, -4) + '...';
      }
      ctx.fillText(lineText, textX, ty);
      ty += lineH;
    }

    // Divider
    ty += lineH * 0.2;
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(textX, ty); ctx.lineTo(textX + maxTextW, ty); ctx.stroke();
    ty += lineH * 0.5;

    // Choices
    for (var i = 0; i < d.choices.length; i++) {
      if (ty > boxBottom) break;
      ctx.fillStyle = '#ddaa44';
      ctx.font = 'bold ' + contentFs + 'px Segoe UI';
      var keyLabel = '[' + d.choices[i].key.toUpperCase() + '] ';
      ctx.fillText(keyLabel, textX, ty);
      ctx.fillStyle = '#ccccaa';
      ctx.font = contentFs + 'px Segoe UI';
      var choiceText = d.choices[i].text;
      var choiceX = textX + contentFs * 2;
      while (choiceText.length > 3 && ctx.measureText(choiceText).width > maxTextW - contentFs * 2) {
        choiceText = choiceText.slice(0, -4) + '...';
      }
      ctx.fillText(choiceText, choiceX, ty);
      ty += lineH;
    }
  },
};

  onEnter: function(game) { this._page = 0; },

  onKey: function(game, key) {
    var lk = key.toLowerCase();
    if (lk === 'escape' || lk === 'h') { StateStack.pop(); return true; }
    if (key === 'ArrowRight' || lk === 'd' || lk === 'enter' || lk === ' ') {
      this._page = (this._page + 1) % this._pages.length;
      return true;
    }
    if (key === 'ArrowLeft' || lk === 'a') {
      this._page = (this._page - 1 + this._pages.length) % this._pages.length;
      return true;
    }
    return true;
  },

  onDraw: function(game, ctx) {
    var w = CONFIG.WIDTH, h = CONFIG.HEIGHT;
    var fs = Math.max(12, Math.round(w * 0.013));
    var page = this._pages[this._page];

    ctx.fillStyle = 'rgba(0,0,0,0.9)';
    ctx.fillRect(0, 0, w, h);

    // Title bar
    ctx.fillStyle = '#ddaa44';
    ctx.font = 'bold ' + Math.round(fs * 1.6) + 'px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('HELP — ' + page.title, w / 2, fs * 2.5);

    // Page indicator
    ctx.fillStyle = '#666';
    ctx.font = Math.round(fs * 0.8) + 'px Segoe UI';
    ctx.fillText('Page ' + (this._page + 1) + ' / ' + this._pages.length + '    \u2190\u2192 to browse    [H] or [ESC] to close', w / 2, fs * 4);

    // Content — accumulated Y, left-aligned with margin
    // Dynamically scale line height to fit all content on screen
    var topY = fs * 6;
    var bottomY = h - fs * 3;
    var availH = bottomY - topY;
    var lineCount = 0, blankCount = 0;
    for (var li = 0; li < page.lines.length; li++) {
      if (page.lines[li].text) lineCount++; else blankCount++;
    }
    var naturalLineH = fs * 1.45;
    var neededH = lineCount * naturalLineH + blankCount * naturalLineH * 0.4;
    var lineH = naturalLineH;
    var contentFs = fs;
    if (neededH > availH) {
      // Scale down to fit
      var scale = availH / neededH;
      lineH = naturalLineH * scale;
      if (scale < 0.8) contentFs = Math.round(fs * Math.max(0.75, scale));
    }
    var ty = topY;
    var margin = w * 0.1;
    ctx.textAlign = 'left';

    for (var i = 0; i < page.lines.length; i++) {
      var line = page.lines[i];
      if (!line.text) { ty += lineH * 0.4; continue; }
      ctx.fillStyle = line.color || '#ccc';
      ctx.font = (line.bold ? 'bold ' : '') + contentFs + 'px Segoe UI';
      ctx.fillText(line.text, margin, ty);
      ty += lineH;
    }

    // Page dots at bottom
    var dotY = h - fs * 2;
    ctx.textAlign = 'center';
    for (var i = 0; i < this._pages.length; i++) {
      ctx.fillStyle = i === this._page ? '#ddaa44' : '#444';
      ctx.beginPath();
      ctx.arc(w / 2 + (i - this._pages.length / 2 + 0.5) * (fs * 1.2), dotY, fs * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
  },
};

var InventoryState = {
  name: 'inventory',
  drawBelow: true,
  _cursor: 0,       // 0=weapon, 1=armor, 2=wardrobe
  _stashIdx: 0,     // index into filtered stash for current slot
  _message: '',
  _messageTimer: 0,

  onEnter: function(game) {
    this._cursor = 0;
    this._stashIdx = 0;
    this._message = '';
    this._messageTimer = 0;
    _invTab = 0;
    _invScroll = 0;
  },

  _getStashForSlot: function(player, slotType) {
    if (!player.stash || player.stash.length === 0) return [];
    return player.stash.filter(function(item) {
      if (slotType === 'weapon') return item.type === 'weapon' || item.type === 'sword' || item.type === 'wand' || item.type === 'staff';
      if (slotType === 'armor') return item.type === 'armor';
      return false;
    });
  },

  onKey: function(game, key) {
    var lk = key.toLowerCase();
    if (lk === 'i' || lk === 'escape') {
      StateStack.pop();
      return true;
    }
    // Tab switching
    if (key === 'Tab' || lk === 'q') {
      _invTab = (_invTab + 1) % INV_TABS.length;
      this._cursor = 0;
      this._stashIdx = 0;
      return true;
    }
    // Bag/Skills tabs: up/down scrolls content
    if (_invTab !== 0) {
      if (key === 'ArrowUp' || lk === 'w') { _invScroll = Math.max(0, _invScroll - 1); return true; }
      if (key === 'ArrowDown' || lk === 's') { _invScroll++; return true; }
      return true;
    }

    if (key === 'ArrowUp' || lk === 'w') {
      this._cursor = (this._cursor - 1 + 3) % 3;
      this._stashIdx = 0;
      return true;
    }
    if (key === 'ArrowDown' || lk === 's') {
      this._cursor = (this._cursor + 1) % 3;
      this._stashIdx = 0;
      return true;
    }

    var p = game.player;

    // Left/Right to browse stash when slot is empty
    if ((key === 'ArrowLeft' || lk === 'a' || key === 'ArrowRight' || lk === 'd') && this._cursor < 2) {
      var slotType = this._cursor === 0 ? 'weapon' : 'armor';
      var equipped = this._cursor === 0 ? p.weapon : p.armor;
      if (!equipped) {
        var stashItems = this._getStashForSlot(p, slotType);
        if (stashItems.length > 1) {
          if (key === 'ArrowRight' || lk === 'd') this._stashIdx = (this._stashIdx + 1) % stashItems.length;
          else this._stashIdx = (this._stashIdx - 1 + stashItems.length) % stashItems.length;
        }
      }
      return true;
    }

    // [D] Drop stashed item (destroy permanently)
    if (lk === 'd' && this._cursor < 2) {
      var slotType = this._cursor === 0 ? 'weapon' : 'armor';
      var equipped = this._cursor === 0 ? p.weapon : p.armor;
      if (!equipped) {
        var items = this._getStashForSlot(p, slotType);
        if (items.length > 0) {
          var idx = this._stashIdx % items.length;
          var item = items[idx];
          var realIdx = p.stash.indexOf(item);
          if (realIdx >= 0) p.stash.splice(realIdx, 1);
          this._message = 'Dropped ' + item.name;
          this._messageTimer = 2.0;
          this._stashIdx = 0;
          SFX.step();
        }
      }
      return true;
    }

    // [X] Salvage stashed item (reclaim materials, needs skill)
    if (lk === 'x' && this._cursor < 2) {
      var slotType = this._cursor === 0 ? 'weapon' : 'armor';
      var equipped = this._cursor === 0 ? p.weapon : p.armor;
      if (!equipped) {
        var items = this._getStashForSlot(p, slotType);
        if (items.length > 0) {
          var idx = this._stashIdx % items.length;
          var item = items[idx];
          // Skill requirement depends on item type
          var isWeaponItem = (item.type === 'weapon' || item.type === 'sword' || item.type === 'wand' || item.type === 'staff');
          var reqSkill, reqLevel, reqName;
          if (isWeaponItem) {
            // Metal weapons need mining (blacksmithing) to break down
            reqSkill = 'mining'; reqLevel = 2; reqName = 'Mining Lv.2 (blacksmith)';
          } else {
            // Armor needs gathering (leatherwork/tailoring) to break down
            reqSkill = 'gathering'; reqLevel = 2; reqName = 'Gathering Lv.2';
          }
          var skillLvl = PlayerSkills.getLevel(p.skills, reqSkill);
          if (skillLvl < reqLevel) {
            this._message = 'Need ' + reqName + ' to salvage';
            this._messageTimer = 2.0;
            return true;
          }
          var realIdx = p.stash.indexOf(item);
          if (realIdx >= 0) p.stash.splice(realIdx, 1);
          // Yield materials based on item power
          var power = (item.atk || 0) + (item.defense || 0);
          var yields = [];
          if (item.type === 'weapon' || item.type === 'sword' || item.type === 'wand' || item.type === 'staff') {
            Bag.add(p.bag, 'iron_ore', 1 + Math.floor(power / 4));
            yields.push((1 + Math.floor(power / 4)) + ' Iron Ore');
            if (power >= 5) { Bag.add(p.bag, 'branch', 2); yields.push('2 Branch'); }
          } else if (item.type === 'armor') {
            Bag.add(p.bag, 'leather', 1 + Math.floor(power / 3));
            yields.push((1 + Math.floor(power / 3)) + ' Leather');
            if (power >= 4) { Bag.add(p.bag, 'stone', 2); yields.push('2 Stone'); }
          }
          this._message = 'Salvaged ' + item.name + ': ' + yields.join(', ');
          this._messageTimer = 3.0;
          this._stashIdx = 0;
          SFX.shrine();
          PlayerSkills.addXp(p.skills, reqSkill, 3);
        }
      }
      return true;
    }

    if (lk === 'enter' || lk === ' ' || lk === 'e') {
      if (this._cursor === 0) {
        if (p.weapon) {
          // Stash current weapon
          if (!p.stash) p.stash = [];
          p.stash.push(p.weapon);
          this._message = p.weapon.name + ' \u2192 stash';
          this._messageTimer = 2.0;
          p.atk = Math.max(1, p.atk - (p.weapon.atk || 0));
          for (var ai = p.abilities.length - 1; ai >= 0; ai--) {
            if (p.abilities[ai].isWeapon) { p.abilities.splice(ai, 1); break; }
          }
          p.weapon = null;
          p.weaponType = 'fist';
          this._stashIdx = 0;
          SFX.step();
        } else {
          // Equip from stash at selected index
          var weapons = this._getStashForSlot(p, 'weapon');
          if (weapons.length > 0) {
            var idx = this._stashIdx % weapons.length;
            var w = weapons[idx];
            // Remove from stash
            var realIdx = p.stash.indexOf(w);
            if (realIdx >= 0) p.stash.splice(realIdx, 1);
            p.weapon = w;
            p.weaponType = (w.range && w.range > 1) ? 'wand' : 'sword';
            p.atk += w.atk || 0;
            var isRanged = w.range && w.range > 1;
            var abilityName = isRanged ? (w.name.indexOf('Wand') >= 0 ? 'Wand Shot' : 'Ranged Shot') : (w.name.indexOf('Sword') >= 0 ? 'Sword Strike' : 'Melee Strike');
            var wpnAbility = {
              verb: isRanged ? 'launch' : 'strike',
              element: 'physical',
              shape: isRanged ? 'line' : 'single',
              name: abilityName, damage: w.damage, cooldown: w.cd || 0,
              currentCooldown: 0, color: w.color, isWeapon: true,
            };
            if (w.range && w.range > 1) wpnAbility.maxRange = w.range;
            p.abilities.unshift(wpnAbility);
            this._message = 'Equipped ' + w.name;
            this._messageTimer = 2.0;
            this._stashIdx = 0;
            SFX.step();
          } else {
            this._message = 'Stash empty';
            this._messageTimer = 1.0;
          }
        }
      } else if (this._cursor === 1) {
        if (p.armor) {
          // Stash current armor
          if (!p.stash) p.stash = [];
          p.stash.push(p.armor);
          this._message = p.armor.name + ' \u2192 stash';
          this._messageTimer = 2.0;
          p.maxHp = Math.max(10, p.maxHp - (p.armor.hp || 0));
          p.hp = Math.min(p.hp, p.maxHp);
          p.armor = null;
          this._stashIdx = 0;
          SFX.step();
        } else {
          // Equip from stash at selected index
          var armors = this._getStashForSlot(p, 'armor');
          if (armors.length > 0) {
            var idx = this._stashIdx % armors.length;
            var a = armors[idx];
            var realIdx = p.stash.indexOf(a);
            if (realIdx >= 0) p.stash.splice(realIdx, 1);
            p.armor = a;
            p.maxHp += a.hp || 0;
            this._message = 'Equipped ' + a.name;
            this._messageTimer = 2.0;
            this._stashIdx = 0;
            SFX.step();
          } else {
            this._message = 'Stash empty';
            this._messageTimer = 1.0;
          }
        }
      } else if (this._cursor === 2) {
        StateStack.push(WardrobeState);
      }
      return true;
    }
    return true;
  },

  onDraw: function(game, ctx) {
    game.drawInventory(ctx, this._cursor, this._message, this._messageTimer, this._stashIdx, this._getStashForSlot);
    if (this._messageTimer > 0) this._messageTimer -= 1/60;
  },
};

// ============================================================
// STATE: Loot Prompt — Y/N to equip found item
// ============================================================
var LootPromptState = {
  name: 'loot_prompt',
  drawBelow: true,

  onKey: function(game, key) {
    var lk = key.toLowerCase();
    // [Y/Enter] Equip immediately
    if (lk === 'y' || lk === 'enter' || lk === ' ') {
      var lp = game._pendingLootPos;
      if (game.dungeon && game._pendingLootKey) {
        delete game.dungeon.loot[game._pendingLootKey];
        game.dungeon.map[lp.y][lp.x] = T.FLOOR;
      }
      game.equipLoot(game._pendingLoot, lp ? lp.x : null, lp ? lp.y : null);
      game._pendingLoot = null;
      StateStack.pop();
      game.endTurn();
      return true;
    }
    // [S] Stash for later
    if (lk === 's') {
      var loot = game._pendingLoot;
      if (!game.player.stash) game.player.stash = [];
      game.player.stash.push(loot);
      var lp = game._pendingLootPos;
      if (game.dungeon && game._pendingLootKey) {
        delete game.dungeon.loot[game._pendingLootKey];
        game.dungeon.map[lp.y][lp.x] = T.FLOOR;
      }
      GameUtils.addLog(loot.name + ' \u2192 stash', '#ddaa44');
      SFX.step();
      game._pendingLoot = null;
      StateStack.pop();
      game.endTurn();
      return true;
    }
    // [N/Escape] Leave on ground — mark as seen so it doesn't nag again
    if (lk === 'n' || lk === 'escape') {
      GameUtils.addLog('Left ' + game._pendingLoot.name + '. Press [E] to pick up later.', '#888');
      if (game._pendingLootKey) {
        if (!game._seenLoot) game._seenLoot = {};
        game._seenLoot[game._pendingLootKey] = true;
      }
      game._pendingLoot = null;
      StateStack.pop();
      game.endTurn();
      return true;
    }
    return true;
  },

  onDraw: function(game, ctx) {
    game.drawLootPrompt(ctx);
  },
};

// ============================================================
// STATE: Playing (overworld + dungeon)
// ============================================================
var PlayingState = {
  name: 'playing',
  drawBelow: false,

  onKey: function(game, key) {
    if (!game.turnReady) return true;

    if (key === 'Tab') { game.showMinimap = !game.showMinimap; return true; }
    if (key === 'e' || key === 'E') { game.interactAdjacent(); return true; }
    if (key === 'i' || key === 'I') { StateStack.push(InventoryState); return true; }
    if (key === 'p' || key === 'P') {
      var p = game.player;
      if (p.hp >= p.maxHp) { GameUtils.addLog('Already at full HP.', '#888'); return true; }
      // Priority: health_potion > potions > food items
      var consumed = false;
      // Consumable items: id -> { heal (flat or % of maxHp), name, color }
      var consumables = [
        { id: 'health_potion', healPct: 0.5,  name: 'Health Potion', color: '#ff4488' },
        { id: 'feast',         healFlat: 50,   name: 'Grand Feast',   color: '#ffcc44' },
        { id: 'healing_salve', healFlat: 15,   name: 'Healing Salve', color: '#44dd88' },
        { id: 'antidote',      healFlat: 10,   name: 'Antidote',      color: '#88ddaa' },
        { id: 'sushi',         healFlat: 30,   name: 'Sushi',         color: '#f0e8c8' },
        { id: 'berry_pie',     healFlat: 18,   name: 'Berry Pie',     color: '#aa44aa' },
        { id: 'fish_stew',     healFlat: 20,   name: 'Fish Stew',     color: '#cc6633' },
        { id: 'veggie_stew',   healFlat: 15,   name: 'Veggie Stew',   color: '#88aa44' },
        { id: 'carrot_stew',  healFlat: 14,   name: 'Carrot Stew',   color: '#dd7722' },
        { id: 'mushroom_soup', healFlat: 12,   name: 'Mushroom Soup', color: '#887744' },
        { id: 'roast_meat',    healFlat: 10,   name: 'Roast Meat',    color: '#cc6633' },
        { id: 'bread',         healFlat: 8,    name: 'Bread',         color: '#ddaa55' },
        { id: 'dried_fish',    healFlat: 8,    name: 'Dried Fish',    color: '#aa8855' },
        { id: 'carrot',        healFlat: 5,    name: 'Carrot',        color: '#ee8833' },
        { id: 'wild_berry',    healFlat: 3,    name: 'Wild Berry',    color: '#8833aa' },
        { id: 'wheat',         healFlat: 2,    name: 'Wheat',         color: '#ddcc55' },
      ];
      // Try old potion system first (legacy dungeon potions)
      if (p.potions > 0) {
        p.potions--;
        var heal = Math.round(p.maxHp * 0.35);
        p.hp = Math.min(p.hp + heal, p.maxHp);
        SFX.heal();
        GameUtils.addLog('Potion! +' + heal + ' HP (' + p.potions + ' left)', '#ff44aa');
        GameUtils.addFloating(p.x, p.y, '+' + heal, '#ff44aa');
        game.vfx.heal(p.x * CONFIG.TILE + CONFIG.TILE / 2, p.y * CONFIG.TILE + CONFIG.TILE / 2, { color: '#ff44aa' });
        consumed = true;
      } else {
        // Try consumable items from bag (best first)
        for (var ci = 0; ci < consumables.length; ci++) {
          var c = consumables[ci];
          if (Bag.has(p.bag, c.id)) {
            Bag.remove(p.bag, c.id, 1);
            var heal = c.healPct ? Math.round(p.maxHp * c.healPct) : c.healFlat;
            p.hp = Math.min(p.hp + heal, p.maxHp);
            SFX.heal();
            GameUtils.addLog('Ate ' + c.name + '! +' + heal + ' HP', c.color);
            GameUtils.addFloating(p.x, p.y, '+' + heal, c.color);
            game.vfx.heal(p.x * CONFIG.TILE + CONFIG.TILE / 2, p.y * CONFIG.TILE + CONFIG.TILE / 2, { color: c.color });
            consumed = true;
            break;
          }
        }
      }
      if (consumed) { game.endTurn(); }
      else { GameUtils.addLog('Nothing to eat or drink!', '#888'); }
      return true;
    }
    if (key >= '1' && key <= '4') {
      var idx = parseInt(key) - 1;
      if (game.abilityTargetMode && game.selectedAbility === idx) {
        game.abilityTargetMode = false; game.selectedAbility = -1;
        GameUtils.addLog('Cancelled.', '#888'); return true;
      }
      if (idx < game.player.abilities.length) {
        var ab = game.player.abilities[idx];
        if (ab.currentCooldown > 0) { GameUtils.addLog(ab.name + ' on cooldown (' + ab.currentCooldown + ')', ab.color); return true; }
        if (ab.verb === 'dash') { game.abilityTargetMode = true; game.selectedAbility = idx; GameUtils.addLog('Direction for ' + ab.name + '?', ab.color); }
        else if (ab.shape === 'self' || ab.shape === 'ring') { game.useAbility(idx, game.player.lastDir.x, game.player.lastDir.y); }
        else { game.abilityTargetMode = true; game.selectedAbility = idx; GameUtils.addLog('Direction for ' + ab.name + '?', ab.color); }
      }
      return true;
    }
    if (key === 'Escape') {
      if (game.abilityTargetMode) { game.abilityTargetMode = false; game.selectedAbility = -1; }
      return true;
    }
    if (GameEvents.fire('keyDown', game, key)) return true;

    var dx = 0, dy = 0;
    if (key === 'ArrowUp' || key === 'w') dy = -1;
    else if (key === 'ArrowDown' || key === 's') dy = 1;
    else if (key === 'ArrowLeft' || key === 'a') dx = -1;
    else if (key === 'ArrowRight' || key === 'd') dx = 1;
    else if (key === '5' || key === '.' || key === ' ') { game.endTurn(); return true; }
    else return false;

    if (game.abilityTargetMode) {
      game.useAbility(game.selectedAbility, dx, dy);
      game.abilityTargetMode = false; game.selectedAbility = -1;
      return true;
    }
    if (dx !== 0 || dy !== 0) game.player.lastDir = { x: dx, y: dy };
    if (game.player.mode === 'overworld' || game.player.mode === 'underground') game.doOverworldMove(dx, dy);
    else game.doPlayerMove(dx, dy);
    return true;
  },
};

// ============================================================
// STATE: Shrine — choose an ability
// ============================================================
var ShrineState = {
  name: 'shrine',
  drawBelow: true,

  onKey: function(game, key) {
    var idx = parseInt(key) - 1;
    if (idx >= 0 && idx < 3 && game.shrineChoices) {
      var chosen = game.shrineChoices[idx];
      if (game.player.abilities.length < 4) {
        game.player.abilities.push(chosen);
        GameUtils.addLog('Gained: ' + chosen.name + '!', chosen.color);
        game.shrineChoices = null;
        game.dungeon.map[game.player.y][game.player.x] = T.FLOOR;
        StateStack.pop();
      } else {
        game._pendingAbility = chosen;
        game.shrineChoices = null;
        StateStack.swap(ReplaceAbilityState);
      }
      return true;
    }
    if (key === 'Escape') {
      game.shrineChoices = null;
      StateStack.pop();
      return true;
    }
    return true;
  },

  onDraw: function(game, ctx) {
    game.drawShrineOverlay(ctx);
  },
};

// ============================================================
// STATE: Title / Character Creator with Continue
// ============================================================
var TitleState = {
  name: 'title',
  drawBelow: false,
  _hasSave: false,
  _mode: 'menu', // 'menu' or 'create'

  onEnter: function(game) {
    this._hasSave = SaveSystem.hasSave();
    this._mode = this._hasSave ? 'menu' : 'create';
    this._menuCursor = 0; // 0=continue, 1=new game
  },

  onKey: function(game, key) {
    if (this._mode === 'menu') {
      // Menu: Continue / New Game / Reset World
      var menuCount = 3;
      if (key === 'ArrowUp' || key === 'w') { this._menuCursor = (this._menuCursor - 1 + menuCount) % menuCount; return true; }
      if (key === 'ArrowDown' || key === 's') { this._menuCursor = (this._menuCursor + 1) % menuCount; return true; }
      if (key === 'Enter' || key === ' ') {
        if (this._menuCursor === 0) {
          game.continueGame();
        } else if (this._menuCursor === 1) {
          SaveSystem.deleteSave();
          this._mode = 'create';
        } else if (this._menuCursor === 2) {
          // Full reset — wipe save, legacy, meta, world seed
          SaveSystem.deleteSave();
          try { localStorage.removeItem('wanderlust_legacy'); } catch(e) {}
          try { localStorage.removeItem('wanderlust_meta'); } catch(e) {}
          game.meta = loadMeta(); // reload fresh meta (no world seed)
          this._mode = 'create';
        }
        return true;
      }
      return true;
    }

    // Character creator mode
    var c = game.customization;
    var optionCounts = [game.BODY_COLORS.length, game.HAIR_COLORS.length, game.HAIR_STYLES.length,
      game.SKIN_COLORS.length, game.EYE_COLORS.length, game.BODIES.length, game.HEIGHTS.length,
      game.FRAMES.length, game.START_WEAPONS.length];
    var numOpts = optionCounts.length;
    var keys = ['bodyColorIdx','hairIdx','hairStyleIdx','skinIdx','eyeIdx','bodyIdx','heightIdx','frameIdx','startWpnIdx'];

    if (key === 'ArrowUp' || key === 'w') { c.cursor = (c.cursor - 1 + numOpts) % numOpts; return true; }
    if (key === 'ArrowDown' || key === 's') { c.cursor = (c.cursor + 1) % numOpts; return true; }
    if (key === 'ArrowLeft' || key === 'a') {
      c[keys[c.cursor]] = (c[keys[c.cursor]] - 1 + optionCounts[c.cursor]) % optionCounts[c.cursor];
      return true;
    }
    if (key === 'ArrowRight' || key === 'd') {
      c[keys[c.cursor]] = (c[keys[c.cursor]] + 1) % optionCounts[c.cursor];
      return true;
    }
    if (key === 'Enter' || key === ' ') { game.startGame(); return true; }
    return true; // consume all keys on title screen
  },

  onDraw: function(game, ctx) {
    if (this._mode === 'menu') {
      this._drawMenu(game, ctx);
    } else {
      game.drawTitle(ctx);
    }
  },

  _drawMenu: function(game, ctx) {
    var w = CONFIG.WIDTH, h = CONFIG.HEIGHT;
    var fs = Math.max(14, Math.round(w * 0.015));

    ctx.fillStyle = '#040410';
    ctx.fillRect(0, 0, w, h);

    // Title
    ctx.fillStyle = '#4466aa';
    ctx.font = 'bold ' + Math.round(fs * 2.8) + 'px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('REMNANTS', w / 2, h * 0.2);
    ctx.fillStyle = '#556';
    ctx.font = Math.round(fs * 1) + 'px Segoe UI';
    ctx.fillText('The world remembers', w / 2, h * 0.26);

    // Stats
    if (game.meta.depthRecord > 0) {
      ctx.fillStyle = '#666';
      ctx.font = Math.round(fs * 0.85) + 'px Segoe UI';
      ctx.fillText('Best: Floor ' + game.meta.depthRecord + '  Runs: ' + game.meta.totalRuns + '  Kills: ' + game.meta.totalKills, w / 2, h * 0.32);
    }

    // Menu options — rowH calculated to fit between menu start and controls
    var menuTop = h * 0.38;
    var controlsY = h * 0.82;
    var menuCount = 3;
    var rowH = Math.min(fs * 3.5, (controlsY - menuTop) / menuCount);
    var menuY = menuTop;

    // Continue
    var sel0 = this._menuCursor === 0;
    if (sel0) {
      ctx.fillStyle = 'rgba(40,60,100,0.5)';
      ctx.fillRect(w * 0.3, menuY - fs * 0.5, w * 0.4, rowH - fs * 0.5);
      ctx.strokeStyle = '#4488cc';
      ctx.lineWidth = 2;
      ctx.strokeRect(w * 0.3, menuY - fs * 0.5, w * 0.4, rowH - fs * 0.5);
    }
    ctx.fillStyle = sel0 ? '#ffffff' : '#8899aa';
    ctx.font = (sel0 ? 'bold ' : '') + Math.round(fs * 1.5) + 'px Segoe UI';
    ctx.fillText('CONTINUE', w / 2, menuY + fs * 1.0);
    ctx.fillStyle = '#556';
    ctx.font = Math.round(fs * 0.7) + 'px Segoe UI';
    ctx.fillText('Resume your adventure', w / 2, menuY + fs * 2.0);

    // New Game
    menuY += rowH;
    var sel1 = this._menuCursor === 1;
    if (sel1) {
      ctx.fillStyle = 'rgba(60,40,40,0.5)';
      ctx.fillRect(w * 0.3, menuY - fs * 0.5, w * 0.4, rowH - fs * 0.5);
      ctx.strokeStyle = '#cc6644';
      ctx.lineWidth = 2;
      ctx.strokeRect(w * 0.3, menuY - fs * 0.5, w * 0.4, rowH - fs * 0.5);
    }
    ctx.fillStyle = sel1 ? '#ffffff' : '#8899aa';
    ctx.font = (sel1 ? 'bold ' : '') + Math.round(fs * 1.5) + 'px Segoe UI';
    ctx.fillText('NEW GAME', w / 2, menuY + fs * 1.0);
    ctx.fillStyle = '#664';
    ctx.font = Math.round(fs * 0.7) + 'px Segoe UI';
    ctx.fillText('Start fresh (keeps legacy)', w / 2, menuY + fs * 2.0);

    // Reset World
    menuY += rowH;
    var sel2 = this._menuCursor === 2;
    if (sel2) {
      ctx.fillStyle = 'rgba(60,20,20,0.5)';
      ctx.fillRect(w * 0.3, menuY - fs * 0.5, w * 0.4, rowH - fs * 0.5);
      ctx.strokeStyle = '#aa2222';
      ctx.lineWidth = 2;
      ctx.strokeRect(w * 0.3, menuY - fs * 0.5, w * 0.4, rowH - fs * 0.5);
    }
    ctx.fillStyle = sel2 ? '#ffffff' : '#776666';
    ctx.font = (sel2 ? 'bold ' : '') + Math.round(fs * 1.2) + 'px Segoe UI';
    ctx.fillText('RESET WORLD', w / 2, menuY + fs * 1.0);
    ctx.fillStyle = '#644';
    ctx.font = Math.round(fs * 0.7) + 'px Segoe UI';
    ctx.fillText('Erase everything — new world seed, no legacy', w / 2, menuY + fs * 2.0);

    // Controls — positioned after menu content
    ctx.fillStyle = '#445';
    ctx.font = Math.round(fs * 0.8) + 'px Segoe UI';
    ctx.fillText('\u2191\u2193 Select    ENTER to choose', w / 2, controlsY + fs);

    // Pulsing prompt
    var prompts = ['ENTER to continue', 'ENTER to start new', 'ENTER to reset world'];
    ctx.fillStyle = '#aab';
    ctx.font = 'bold ' + Math.round(fs * 1.1) + 'px Segoe UI';
    ctx.globalAlpha = 0.5 + Math.sin(game.animTimer * 3) * 0.3 + 0.2;
    ctx.fillText(prompts[this._menuCursor], w / 2, h * 0.93);
    ctx.globalAlpha = 1;
  },
};

// ============================================================
// STATE: Wardrobe — change appearance mid-game
// ============================================================
var WardrobeState = {
  name: 'wardrobe',
  drawBelow: false,
  _cursor: 0,
  _options: ['bodyColor','hairColor','hairStyle','skinColor','eyeColor','body','height','frame'],
  _labels: ['Outfit','Hair Color','Hair Style','Skin','Eyes','Build Type','Height','Frame'],

  onEnter: function(game) {
    this._cursor = 0;
  },

  _getArray: function(game, opt) {
    switch(opt) {
      case 'bodyColor': return game.BODY_COLORS;
      case 'hairColor': return game.HAIR_COLORS;
      case 'hairStyle': return game.HAIR_STYLES;
      case 'skinColor': return game.SKIN_COLORS;
      case 'eyeColor': return game.EYE_COLORS;
      case 'body': return game.BODIES;
      case 'height': return game.HEIGHTS;
      case 'frame': return game.FRAMES;
    }
    return [];
  },

  _getIdx: function(game, opt) {
    var arr = this._getArray(game, opt);
    var val = game.player[opt];
    var idx = arr.indexOf(val);
    return idx >= 0 ? idx : 0;
  },

  onKey: function(game, key) {
    var lk = key.toLowerCase();
    if (lk === 'escape' || lk === 'i') {
      StateStack.pop();
      return true;
    }
    if (key === 'ArrowUp' || lk === 'w') {
      this._cursor = (this._cursor - 1 + this._options.length) % this._options.length;
      return true;
    }
    if (key === 'ArrowDown' || lk === 's') {
      this._cursor = (this._cursor + 1) % this._options.length;
      return true;
    }
    if (key === 'ArrowLeft' || lk === 'a') {
      var opt = this._options[this._cursor];
      var arr = this._getArray(game, opt);
      var idx = (this._getIdx(game, opt) - 1 + arr.length) % arr.length;
      game.player[opt] = arr[idx];
      return true;
    }
    if (key === 'ArrowRight' || lk === 'd') {
      var opt = this._options[this._cursor];
      var arr = this._getArray(game, opt);
      var idx = (this._getIdx(game, opt) + 1) % arr.length;
      game.player[opt] = arr[idx];
      return true;
    }
    return true;
  },

  onDraw: function(game, ctx) {
    var w = CONFIG.WIDTH, h = CONFIG.HEIGHT;
    var fs = Math.max(12, Math.round(w * 0.013));
    var p = game.player;

    ctx.fillStyle = 'rgba(0,0,0,0.9)';
    ctx.fillRect(0, 0, w, h);

    // Title
    ctx.fillStyle = '#aa88cc';
    ctx.font = 'bold ' + Math.round(fs * 1.6) + 'px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('WARDROBE', w / 2, fs * 2.5);
    ctx.fillStyle = '#888';
    ctx.font = Math.round(fs * 0.8) + 'px Segoe UI';
    ctx.fillText('\u2190\u2192 change    \u2191\u2193 select    [ESC] back', w / 2, fs * 4);

    // Character preview — right side, extra headroom for tall/hair
    var previewTs = Math.min(w * 0.18, 140);
    var boxPW = previewTs * 1.6, boxPH = previewTs * 2.0;
    var boxPX = w * 0.63, boxPY = h * 0.2;
    ctx.fillStyle = 'rgba(30,25,35,0.8)';
    ctx.fillRect(boxPX, boxPY, boxPW, boxPH);
    ctx.strokeStyle = '#554466';
    ctx.lineWidth = 1;
    ctx.strokeRect(boxPX, boxPY, boxPW, boxPH);

    // Draw character — offset downward so hair/tall heads don't clip top
    var charX = boxPX + (boxPW - previewTs) / 2;
    var charY = boxPY + boxPH - previewTs - previewTs * 0.15;
    var walkPhase = (game.animTimer * 0.5) % 1;
    drawCharPixel(ctx, charX, charY, previewTs,
      p.bodyColor, p.eyeColor, p.skinColor, p.weapon ? p.weapon.color || '#aaa' : null,
      walkPhase, {
        hairStyle: p.hairStyle, hairColor: p.hairColor,
        body: p.body, height: p.height, frame: p.frame,
        weaponType: p.weaponType
      });

    // Options list — left side
    var listX = w * 0.08;
    var ty = fs * 6;
    var rowH = fs * 2.5;

    ctx.textAlign = 'left';
    for (var i = 0; i < this._options.length; i++) {
      var opt = this._options[i];
      var arr = this._getArray(game, opt);
      var idx = this._getIdx(game, opt);
      var selected = i === this._cursor;
      var val = p[opt] || (opt === 'body' ? 'broad' : opt === 'height' ? 'average' : opt === 'frame' ? 'average' : opt === 'hairStyle' ? 'short' : '');

      // Highlight
      if (selected) {
        ctx.fillStyle = 'rgba(60, 40, 60, 0.6)';
        ctx.fillRect(listX - 4, ty - fs * 0.8, w * 0.45, rowH - 4);
        ctx.strokeStyle = '#aa88cc';
        ctx.lineWidth = 1;
        ctx.strokeRect(listX - 4, ty - fs * 0.8, w * 0.45, rowH - 4);
      }

      // Label
      ctx.fillStyle = selected ? '#fff' : '#888';
      ctx.font = (selected ? 'bold ' : '') + fs + 'px Segoe UI';
      ctx.fillText(this._labels[i], listX, ty + fs * 0.2);

      // Value with arrows
      var valX = listX + fs * 10;
      if (selected) {
        ctx.fillStyle = '#aa88cc';
        ctx.font = fs + 'px Segoe UI';
        ctx.fillText('\u25C0', valX - fs * 1.5, ty + fs * 0.2);
        ctx.fillText('\u25B6', valX + fs * 10, ty + fs * 0.2);
      }

      // Display value
      if (opt === 'bodyColor' || opt === 'hairColor' || opt === 'skinColor' || opt === 'eyeColor') {
        // Color swatch
        ctx.fillStyle = val;
        ctx.fillRect(valX, ty - fs * 0.5, fs * 2, fs * 1.2);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(valX, ty - fs * 0.5, fs * 2, fs * 1.2);
        ctx.fillStyle = '#aaa';
        ctx.font = Math.round(fs * 0.7) + 'px Segoe UI';
        ctx.fillText((idx + 1) + '/' + arr.length, valX + fs * 2.5, ty + fs * 0.2);
      } else {
        ctx.fillStyle = selected ? '#cc99ee' : '#aaa';
        ctx.font = fs + 'px Segoe UI';
        ctx.fillText(val.charAt(0).toUpperCase() + val.slice(1), valX, ty + fs * 0.2);
      }

      ty += rowH;
    }
  },
};
new Game();
</script>
