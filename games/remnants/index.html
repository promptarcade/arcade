function drawPanel9Slice(ctx, style, w, h, cornerRadius, borderWidth) {
  let bg, border, highlight, shadow;
  switch (style) {
    case 'stone': bg = '#555566'; border = '#333344'; highlight = '#777788'; shadow = '#222233'; break;
    case 'wood': bg = '#8b6914'; border = '#5a3a0a'; highlight = '#aa8833'; shadow = '#4a2a05'; break;
    case 'metal': bg = '#6a6a7e'; border = '#3a3a4e'; highlight = '#8a8a9e'; shadow = '#2a2a3e'; break;
    case 'dark': bg = '#222233'; border = '#111122'; highlight = '#333344'; shadow = '#000011'; break;
    case 'light':
    default: bg = '#e8e0d0'; border = '#a09080'; highlight = '#fff8f0'; shadow = '#887766'; break;
  }

  const cr = cornerRadius || Math.min(w, h) * 0.1;
  const bw = borderWidth || 2;

  // Outer border
  ctx.fillStyle = border;
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, cr);
  ctx.fill();

  // Inner fill
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(bw, bw, w - bw * 2, h - bw * 2, Math.max(0, cr - bw));
  ctx.fill();

  // Top highlight
  ctx.fillStyle = highlight;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(bw + 2, bw + 1, w - bw * 2 - 4, Math.max(1, bw));
  ctx.globalAlpha = 1;

  // Bottom shadow
  ctx.fillStyle = shadow;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(bw + 2, h - bw * 2, w - bw * 2 - 4, Math.max(1, bw));
  ctx.globalAlpha = 1;
}

function drawButton(ctx, style, w, h, state) {
  let bg, border, text;
  switch (style) {
    case 'stone': bg = '#667788'; border = '#445566'; break;
    case 'wood': bg = '#aa8833'; border = '#775500'; break;
    case 'metal': bg = '#8888aa'; border = '#555577'; break;
    default: bg = '#5577bb'; border = '#334488'; break;
  }

  const pressed = state === 'pressed';
  const hover = state === 'hover';
  const disabled = state === 'disabled';

  if (disabled) { bg = Palette.darken(bg, 0.3); border = Palette.darken(border, 0.3); }
  if (hover) { bg = Palette.lighten(bg, 0.15); }

  const yOff = pressed ? 1 : 0;
  const shadowH = pressed ? 1 : 3;

  // Shadow
  ctx.fillStyle = Palette.darken(border, 0.3);
  ctx.beginPath();
  ctx.roundRect(0, shadowH, w, h, 4);
  ctx.fill();

  // Button body
  ctx.fillStyle = border;
  ctx.beginPath();
  ctx.roundRect(0, yOff, w, h - 2, 4);
  ctx.fill();

  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(1, yOff + 1, w - 2, h - 4, 3);
  ctx.fill();

  // Top highlight
  if (!pressed) {
    ctx.fillStyle = Palette.lighten(bg, 0.3);
    ctx.globalAlpha = 0.4;
    ctx.fillRect(3, yOff + 2, w - 6, Math.max(1, Math.floor(h * 0.15)));
    ctx.globalAlpha = 1;
  }
}

function drawBar(ctx, w, h, style, fillColor, bgColor, borderColor, fillPercent) {
  const bc = borderColor || '#333';
  const bg = bgColor || '#222';
  const fc = fillColor || '#44cc44';
  const fp = clamp(fillPercent || 1, 0, 1);

  // Border
  ctx.fillStyle = bc;
  if (style === 'rounded') {
    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, h / 2);
    ctx.fill();
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.roundRect(1, 1, w - 2, h - 2, (h - 2) / 2);
    ctx.fill();
    if (fp > 0) {
      ctx.fillStyle = fc;
      ctx.beginPath();
      ctx.roundRect(2, 2, (w - 4) * fp, h - 4, (h - 4) / 2);
      ctx.fill();
      // Shine
      ctx.fillStyle = Palette.lighten(fc, 0.4);
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.roundRect(3, 3, (w - 4) * fp - 2, Math.max(1, (h - 4) * 0.35), 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  } else if (style === 'segmented') {
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = bg;
    ctx.fillRect(1, 1, w - 2, h - 2);
    const segCount = Math.floor(w / (h * 0.8));
    const segW = (w - 4) / segCount;
    const filled = Math.floor(segCount * fp);
    for (let i = 0; i < segCount; i++) {
      ctx.fillStyle = i < filled ? fc : Palette.darken(bg, 0.2);
      ctx.fillRect(2 + i * segW + 1, 2, segW - 2, h - 4);
    }
  } else {
    // smooth
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = bg;
    ctx.fillRect(1, 1, w - 2, h - 2);
    if (fp > 0) {
      ctx.fillStyle = fc;
      ctx.fillRect(2, 2, (w - 4) * fp, h - 4);
      ctx.fillStyle = Palette.lighten(fc, 0.3);
      ctx.globalAlpha = 0.4;
      ctx.fillRect(2, 2, (w - 4) * fp, Math.max(1, (h - 4) * 0.35));
      ctx.globalAlpha = 1;
    }
  }
}

function drawIcon(ctx, name, size, color) {
  const s = size;
  const cx = s / 2;
  const cy = s / 2;
  const c = color || '#ffffff';
  const sc = shade3(c);

  switch (name) {
    case 'heart': {
      ctx.beginPath();
      ctx.moveTo(cx, cy + s * 0.15);
      ctx.bezierCurveTo(cx - s * 0.3, cy - s * 0.05, cx - s * 0.3, cy - s * 0.28, cx, cy - s * 0.12);
      ctx.bezierCurveTo(cx + s * 0.3, cy - s * 0.28, cx + s * 0.3, cy - s * 0.05, cx, cy + s * 0.15);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = sc.base;
      ctx.fill();
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.1, cy - s * 0.12, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'star': {
      const pts = [];
      for (let i = 0; i < 10; i++) {
        const a = (i * Math.PI * 2 / 10) - Math.PI / 2;
        const r = i % 2 === 0 ? s * 0.35 : s * 0.15;
        pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
      }
      outlinedPoly(ctx, pts, sc.base);
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.05, cy - s * 0.08, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'coin': {
      outlinedCircle(ctx, cx, cy, s * 0.3, sc.base);
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.06, cy - s * 0.06, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'gem': {
      outlinedPoly(ctx, [
        [cx, cy - s * 0.3],
        [cx + s * 0.25, cy],
        [cx, cy + s * 0.3],
        [cx - s * 0.25, cy],
      ], sc.base);
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.3);
      ctx.lineTo(cx + s * 0.25, cy);
      ctx.lineTo(cx, cy + s * 0.08);
      ctx.fill();
      ctx.fillStyle = sc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.08), Math.floor(cy - s * 0.15), 2, Math.ceil(s * 0.1));
      break;
    }
    case 'sword': {
      // Blade
      outlinedPoly(ctx, [
        [cx, cy - s * 0.35],
        [cx + s * 0.06, cy + s * 0.05],
        [cx - s * 0.06, cy + s * 0.05],
      ], '#ccc');
      ctx.fillStyle = '#eee';
      ctx.fillRect(Math.floor(cx - 1), Math.floor(cy - s * 0.3), 1, Math.ceil(s * 0.3));
      outlinedRect(ctx, cx - s * 0.15, cy + s * 0.03, s * 0.3, s * 0.04, '#8b6914');
      outlinedRect(ctx, cx - s * 0.04, cy + s * 0.07, s * 0.08, s * 0.18, '#6b4e10');
      break;
    }
    case 'shield': {
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.3);
      ctx.lineTo(cx + s * 0.25, cy - s * 0.15);
      ctx.lineTo(cx + s * 0.2, cy + s * 0.15);
      ctx.lineTo(cx, cy + s * 0.3);
      ctx.lineTo(cx - s * 0.2, cy + s * 0.15);
      ctx.lineTo(cx - s * 0.25, cy - s * 0.15);
      ctx.closePath();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = sc.base;
      ctx.fill();
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.15);
      ctx.lineTo(cx + s * 0.12, cy);
      ctx.lineTo(cx, cy + s * 0.18);
      ctx.lineTo(cx - s * 0.12, cy);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'potion': {
      outlinedRect(ctx, cx - s * 0.06, cy - s * 0.25, s * 0.12, s * 0.1, '#aaddaa');
      outlinedRect(ctx, cx - s * 0.08, cy - s * 0.28, s * 0.16, s * 0.04, '#a0724a');
      outlinedEllipse(ctx, cx, cy + s * 0.08, s * 0.18, s * 0.22, '#aaddaa');
      ctx.fillStyle = sc.base;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.ellipse(cx, cy + s * 0.08, s * 0.14, s * 0.16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    }
    case 'key': {
      outlinedCircle(ctx, cx - s * 0.08, cy - s * 0.1, s * 0.12, sc.base);
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx - s * 0.08, cy - s * 0.1, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      outlinedRect(ctx, cx - s * 0.02, cy - s * 0.12, s * 0.28, s * 0.04, sc.base);
      outlinedRect(ctx, cx + s * 0.18, cy - s * 0.1, s * 0.04, s * 0.08, sc.shadow);
      outlinedRect(ctx, cx + s * 0.1, cy - s * 0.1, s * 0.04, s * 0.06, sc.shadow);
      break;
    }
    case 'gear': {
      const teeth = 8;
      const outerR = s * 0.3;
      const innerR = s * 0.2;
      const pts = [];
      for (let i = 0; i < teeth * 2; i++) {
        const a = (i * Math.PI / teeth) - Math.PI / 2;
        const r = i % 2 === 0 ? outerR : innerR;
        pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
      }
      outlinedPoly(ctx, pts, sc.base);
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'arrow': {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-Math.PI / 4);
      // Shaft
      outlinedRect(ctx, -1, -s * 0.25, 2, s * 0.5, '#8b6914');
      // Head
      outlinedPoly(ctx, [
        [0, -s * 0.32],
        [-s * 0.08, -s * 0.2],
        [s * 0.08, -s * 0.2],
      ], '#aaa');
      // Fletching
      outlinedPoly(ctx, [
        [-1, s * 0.2],
        [-s * 0.06, s * 0.28],
        [-1, s * 0.25],
      ], '#cc4444');
      outlinedPoly(ctx, [
        [1, s * 0.2],
        [s * 0.06, s * 0.28],
        [1, s * 0.25],
      ], '#cc4444');
      ctx.restore();
      break;
    }
    case 'fire': {
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.15, cy + s * 0.2);
      ctx.quadraticCurveTo(cx - s * 0.2, cy - s * 0.1, cx - s * 0.05, cy - s * 0.15);
      ctx.quadraticCurveTo(cx - s * 0.08, cy - s * 0.25, cx, cy - s * 0.32);
      ctx.quadraticCurveTo(cx + s * 0.08, cy - s * 0.25, cx + s * 0.05, cy - s * 0.15);
      ctx.quadraticCurveTo(cx + s * 0.2, cy - s * 0.1, cx + s * 0.15, cy + s * 0.2);
      ctx.closePath();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#ff6600';
      ctx.fill();
      // Inner
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.06, cy + s * 0.15);
      ctx.quadraticCurveTo(cx - s * 0.08, cy, cx, cy - s * 0.15);
      ctx.quadraticCurveTo(cx + s * 0.08, cy, cx + s * 0.06, cy + s * 0.15);
      ctx.fillStyle = '#ffcc00';
      ctx.fill();
      break;
    }
    case 'ice': {
      // Snowflake
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const a = i * Math.PI / 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * s * 0.28, cy + Math.sin(a) * s * 0.28);
        ctx.lineTo(cx - Math.cos(a) * s * 0.28, cy - Math.sin(a) * s * 0.28);
        ctx.stroke();
      }
      ctx.strokeStyle = sc.base;
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 3; i++) {
        const a = i * Math.PI / 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * s * 0.26, cy + Math.sin(a) * s * 0.26);
        ctx.lineTo(cx - Math.cos(a) * s * 0.26, cy - Math.sin(a) * s * 0.26);
        ctx.stroke();
        // Branches
        for (let d = -1; d <= 1; d += 2) {
          const bx = cx + Math.cos(a) * s * 0.15;
          const by = cy + Math.sin(a) * s * 0.15;
          const ba = a + d * Math.PI / 4;
          ctx.beginPath();
          ctx.moveTo(bx, by);
          ctx.lineTo(bx + Math.cos(ba) * s * 0.08, by + Math.sin(ba) * s * 0.08);
          ctx.stroke();
        }
      }
      outlinedCircle(ctx, cx, cy, s * 0.04, sc.highlight);
      break;
    }
    case 'lightning': {
      outlinedPoly(ctx, [
        [cx + s * 0.05, cy - s * 0.35],
        [cx - s * 0.08, cy - s * 0.02],
        [cx + s * 0.06, cy - s * 0.02],
        [cx - s * 0.05, cy + s * 0.35],
        [cx + s * 0.08, cy + s * 0.02],
        [cx - s * 0.06, cy + s * 0.02],
      ], sc.base);
      ctx.fillStyle = sc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.02), Math.floor(cy - s * 0.2), 2, Math.ceil(s * 0.15));
      break;
    }
    case 'skull': {
      outlinedCircle(ctx, cx, cy - s * 0.05, s * 0.22, '#eee');
      // Eye sockets
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(cx - s * 0.08, cy - s * 0.08, s * 0.06, s * 0.07, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + s * 0.08, cy - s * 0.08, s * 0.06, s * 0.07, 0, 0, Math.PI * 2);
      ctx.fill();
      // Nose
      ctx.fillStyle = '#000';
      outlinedPoly(ctx, [[cx - s * 0.03, cy + s * 0.02], [cx, cy + s * 0.08], [cx + s * 0.03, cy + s * 0.02]], '#333');
      // Jaw
      outlinedRect(ctx, cx - s * 0.15, cy + s * 0.1, s * 0.3, s * 0.1, '#ddd');
      // Teeth
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = '#000';
        ctx.fillRect(Math.floor(cx - s * 0.1 + i * s * 0.07), Math.floor(cy + s * 0.1), 1, Math.ceil(s * 0.04));
      }
      break;
    }
    case 'crown': {
      outlinedRect(ctx, cx - s * 0.25, cy, s * 0.5, s * 0.18, sc.base);
      outlinedPoly(ctx, [
        [cx - s * 0.25, cy],
        [cx - s * 0.2, cy - s * 0.22],
        [cx - s * 0.1, cy - s * 0.08],
        [cx, cy - s * 0.28],
        [cx + s * 0.1, cy - s * 0.08],
        [cx + s * 0.2, cy - s * 0.22],
        [cx + s * 0.25, cy],
      ], sc.base);
      // Gems
      outlinedCircle(ctx, cx, cy - s * 0.18, s * 0.035, '#ff0044');
      outlinedCircle(ctx, cx - s * 0.18, cy - s * 0.14, s * 0.025, '#4488ff');
      outlinedCircle(ctx, cx + s * 0.18, cy - s * 0.14, s * 0.025, '#4488ff');
      ctx.fillStyle = sc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.2), Math.floor(cy + s * 0.02), Math.ceil(s * 0.4), Math.ceil(s * 0.03));
      break;
    }
    case 'music': {
      // Notes
      outlinedCircle(ctx, cx - s * 0.1, cy + s * 0.1, s * 0.08, sc.base);
      outlinedCircle(ctx, cx + s * 0.1, cy + s * 0.02, s * 0.08, sc.base);
      // Stems
      outlinedRect(ctx, cx - s * 0.04, cy - s * 0.25, 2, s * 0.37, sc.base);
      outlinedRect(ctx, cx + s * 0.16, cy - s * 0.33, 2, s * 0.37, sc.base);
      // Beam
      outlinedRect(ctx, cx - s * 0.04, cy - s * 0.27, s * 0.22, s * 0.04, sc.base);
      break;
    }
    case 'pause': {
      outlinedRect(ctx, cx - s * 0.18, cy - s * 0.22, s * 0.12, s * 0.44, sc.base);
      outlinedRect(ctx, cx + s * 0.06, cy - s * 0.22, s * 0.12, s * 0.44, sc.base);
      break;
    }
    case 'play': {
      outlinedPoly(ctx, [
        [cx - s * 0.15, cy - s * 0.25],
        [cx + s * 0.22, cy],
        [cx - s * 0.15, cy + s * 0.25],
      ], sc.base);
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.08, cy - s * 0.12);
      ctx.lineTo(cx + s * 0.05, cy - s * 0.02);
      ctx.lineTo(cx - s * 0.08, cy + s * 0.08);
      ctx.fill();
      break;
    }
    default:
      outlinedRect(ctx, cx - s * 0.2, cy - s * 0.2, s * 0.4, s * 0.4, '#ff00ff');
      break;
  }
}

// ---------------------------------------------------------------------------
// Effect Drawing
// ---------------------------------------------------------------------------

function drawEffect(ctx, type, size, color, frame, totalFrames) {
  const s = size;
  const cx = s / 2;
  const cy = s / 2;
  const t = totalFrames > 1 ? frame / (totalFrames - 1) : 0;
  const ec = shade3(color || '#ff8800');
  const rng = seededRNG(frame * 31 + 7);

  switch (type) {
    case 'explosion': {
      const radius = s * 0.1 + t * s * 0.35;
      const alpha = 1 - t * 0.8;
      ctx.globalAlpha = alpha;
      // Outer glow
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = s * 0.1;
      outlinedCircle(ctx, cx, cy, radius, ec.base);
      ctx.shadowBlur = 0;
      // Inner
      outlinedCircle(ctx, cx, cy, radius * 0.6, ec.highlight);
      // Core
      if (t < 0.5) {
        outlinedCircle(ctx, cx, cy, radius * 0.25, '#fff');
      }
      // Particles
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + rng() * 0.3;
        const d = radius * (0.8 + rng() * 0.5);
        const px = cx + Math.cos(a) * d;
        const py = cy + Math.sin(a) * d;
        const pr = s * 0.02 * (1 - t);
        if (pr > 0.5) {
          ctx.fillStyle = rng() > 0.5 ? ec.base : ec.highlight;
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'muzzleFlash': {
      const alpha = 1 - t;
      ctx.globalAlpha = alpha;
      const len = s * 0.3 * (1 - t * 0.5);
      const w = s * 0.08 * (1 - t * 0.7);
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = s * 0.08;
      // Main flash
      outlinedEllipse(ctx, cx + len * 0.3, cy, len, w, ec.highlight);
      // Core
      outlinedEllipse(ctx, cx, cy, len * 0.3, w * 0.5, '#fff');
      // Side flashes
      for (let i = 0; i < 3; i++) {
        const a = (i - 1) * 0.6;
        const fl = len * (0.3 + rng() * 0.3);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(a);
        outlinedEllipse(ctx, fl * 0.4, 0, fl, w * 0.4, ec.base);
        ctx.restore();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      break;
    }
    case 'magicCircle': {
      const alpha = 0.5 + Math.sin(t * Math.PI) * 0.5;
      const rot = t * Math.PI * 2;
      ctx.globalAlpha = alpha;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      // Outer ring
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = ec.base;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
      ctx.stroke();
      // Inner ring
      ctx.strokeStyle = ec.highlight;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.22, 0, Math.PI * 2);
      ctx.stroke();
      // Runes (small circles)
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const rx = Math.cos(a) * s * 0.28;
        const ry = Math.sin(a) * s * 0.28;
        ctx.fillStyle = ec.highlight;
        ctx.beginPath();
        ctx.arc(rx, ry, s * 0.03, 0, Math.PI * 2);
        ctx.fill();
      }
      // Inner star
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const x = Math.cos(a) * s * 0.2;
        const y = Math.sin(a) * s * 0.2;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = ec.base;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
      // Center glow
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = 6;
      ctx.fillStyle = ec.highlight;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      break;
    }
    case 'slash': {
      const alpha = 1 - t * 0.7;
      ctx.globalAlpha = alpha;
      const sweep = t * Math.PI * 1.2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-Math.PI * 0.6 + sweep * 0.3);
      // Slash arc
      const startAngle = -Math.PI * 0.3;
      const endAngle = startAngle + sweep;
      const thickness = s * 0.06 * (1 - t * 0.5);
      for (let r = s * 0.15; r < s * 0.4; r += thickness) {
        ctx.beginPath();
        ctx.arc(0, 0, r, startAngle, endAngle);
        ctx.lineWidth = thickness;
        ctx.strokeStyle = r < s * 0.25 ? '#fff' : ec.base;
        ctx.stroke();
      }
      // Trail particles
      for (let i = 0; i < 5; i++) {
        const a = startAngle + (endAngle - startAngle) * rng();
        const d = s * 0.2 + rng() * s * 0.2;
        ctx.fillStyle = ec.highlight;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * d, Math.sin(a) * d, s * 0.015 * (1 - t), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
      break;
    }
    case 'impact': {
      const alpha = 1 - t;
      ctx.globalAlpha = alpha;
      const spread = t * s * 0.35;
      // Central flash
      if (t < 0.3) {
        outlinedCircle(ctx, cx, cy, s * 0.08 * (1 - t), '#fff');
      }
      // Radial lines
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + rng() * 0.3;
        const innerR = spread * 0.3;
        const outerR = spread + rng() * s * 0.05;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
        ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
        ctx.stroke();
        ctx.strokeStyle = i % 2 === 0 ? ec.base : ec.highlight;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
        ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
        ctx.stroke();
      }
      // Debris
      for (let i = 0; i < 6; i++) {
        const a = rng() * Math.PI * 2;
        const d = spread * (0.5 + rng() * 0.5);
        const sz = s * 0.02 * (1 - t);
        if (sz > 0.5) {
          ctx.fillStyle = ec.base;
          ctx.fillRect(Math.floor(cx + Math.cos(a) * d), Math.floor(cy + Math.sin(a) * d), Math.ceil(sz), Math.ceil(sz));
        }
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'aura': {
      const pulse = 0.7 + Math.sin(t * Math.PI * 2) * 0.3;
      const radius = s * 0.3 * pulse;
      // Outer glow
      ctx.globalAlpha = 0.2 + pulse * 0.15;
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = s * 0.15;
      ctx.beginPath();
      ctx.arc(cx, cy, radius + s * 0.05, 0, Math.PI * 2);
      ctx.fillStyle = ec.base;
      ctx.fill();
      ctx.shadowBlur = 0;
      // Main aura
      ctx.globalAlpha = 0.3 + pulse * 0.2;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fillStyle = ec.base;
      ctx.fill();
      // Inner glow
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = ec.highlight;
      ctx.fill();
      // Rising particles
      ctx.globalAlpha = 0.8;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + t * Math.PI;
        const d = radius * (0.5 + Math.sin(t * Math.PI * 2 + i) * 0.3);
        const py = cy + Math.sin(t * Math.PI * 2 + i * 2) * s * 0.05;
        ctx.fillStyle = ec.highlight;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * d, py + Math.sin(a) * d * 0.3, s * 0.02, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    }
    default:
      outlinedCircle(ctx, cx, cy, s * 0.3, ec.base);
      break;
  }
}

// ---------------------------------------------------------------------------
// SpriteForge - Main API
// ---------------------------------------------------------------------------

const _cache = new SpriteCache(256);

/**
 * Main procedural sprite generation API.
 * All methods cache results automatically.
 */
class SpriteForge {
  /**
   * Generate a complete animated character sprite sheet.
   * @param {object} config - Character configuration
   * @returns {{ sheet: SpriteSheet, animator: SpriteAnimator, animations: object }}
   */
  static character(config) {
    const key = JSON.stringify({ _type: 'character', ...config });
    const cached = _cache.get(key);
    if (cached) {
      const anims = buildCharAnimDefs(config, cached);
      return { sheet: cached, animator: new SpriteAnimator(cached, anims), animations: anims };
    }

    const style = config.style || 'humanoid';
    const size = config.size || 32;
    const animConfig = config.animations || {
      idle: { frames: 4, speed: 0.2 },
      walk: { frames: 6, speed: 0.1 },
      attack: { frames: 4, speed: 0.08 },
      hurt: { frames: 2, speed: 0.1 },
      death: { frames: 4, speed: 0.15 },
    };

    // Count total frames
    let totalFrames = 0;
    const animNames = Object.keys(animConfig);
    for (const name of animNames) totalFrames += animConfig[name].frames;

    // Compute grid
    const cols = Math.ceil(Math.sqrt(totalFrames));
    const rows = Math.ceil(totalFrames / cols);
    const canvas = sf_makeCanvas(cols * size, rows * size);
    const ctx = canvas.getContext('2d');

    let frameIdx = 0;
    for (const animName of animNames) {
      const ac = animConfig[animName];
      for (let f = 0; f < ac.frames; f++) {
        const col = frameIdx % cols;
        const row = Math.floor(frameIdx / cols);
        {
          // Draw to a temp canvas with extra headroom so tall features (hair, hats) aren't clipped.
          // Then bottom-align and copy the bottom size×size pixels into the real frame.
          const headroom = Math.ceil(size * 0.4);
          const tmpCvs = sf_makeCanvas(size, size + headroom);
          const tmpCtx = tmpCvs.getContext('2d', {willReadFrequently: true});
          tmpCtx.translate(0, headroom); // draw origin offset down by headroom

          if (style === 'humanoid') {
            drawHumanoidFrame(tmpCtx, config, size, animName, f, ac.frames);
          } else if (style === 'creature') {
            drawCreatureFrame(tmpCtx, config, size, animName, f, ac.frames);
          } else if (style === 'robot') {
            drawRobotFrame(tmpCtx, config, size, animName, f, ac.frames);
          }

          bottomAlignFrame(tmpCtx, 0, 0, size, size + headroom);
          // Copy bottom size rows into the real sheet frame
          ctx.drawImage(tmpCvs, 0, headroom, size, size, col * size, row * size, size, size);
        }
        frameIdx++;
      }
    }

    const sheet = new SpriteSheet(canvas, size, size, cols, rows);

    // Name frames
    let idx = 0;
    for (const animName of animNames) {
      const ac = animConfig[animName];
      for (let f = 0; f < ac.frames; f++) {
        sheet.nameFrame(`${animName}_${f}`, idx);
        idx++;
      }
    }

    _cache.set(key, sheet);
    const anims = buildCharAnimDefs(config, sheet);
    return { sheet, animator: new SpriteAnimator(sheet, anims), animations: anims };
  }

  /**
   * Generate a prop sprite (weapon, item, structure).
   * @param {object} config - Prop configuration
   * @returns {{ sheet: SpriteSheet, animator?: SpriteAnimator }}
   */
  static prop(config) {
    const key = JSON.stringify({ _type: 'prop', ...config });
    const cached = _cache.get(key);
    if (cached) {
      const result = { sheet: cached };
      if (config.animated) {
        const frames = config.animFrames || 4;
        const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed: config.animSpeed || 0.15, loop: true } };
        result.animator = new SpriteAnimator(cached, anims);
      }
      return result;
    }

    const size = config.size || 32;
    const name = config.name || 'sword';
    const animated = config.animated || false;
    const frames = animated ? (config.animFrames || 4) : 1;
    const cols = frames;
    const rows = 1;

    const canvas = sf_makeCanvas(cols * size, rows * size);
    const ctx = canvas.getContext('2d', {willReadFrequently: true});

    for (let f = 0; f < frames; f++) {
      ctx.save();
      ctx.translate(f * size, 0);
      ctx.clearRect(0, 0, size, size);
      drawProp(ctx, name, size, config.palette, config.variant || 0, f, frames);
      ctx.restore();
      bottomAlignFrame(ctx, f * size, 0, size, size);
    }

    const sheet = new SpriteSheet(canvas, size, size, cols, rows);
    for (let f = 0; f < frames; f++) {
      sheet.nameFrame(`${name}_${f}`, f);
    }
    _cache.set(key, sheet);

    const result = { sheet };
    if (animated) {
      const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed: config.animSpeed || 0.15, loop: true } };
      result.animator = new SpriteAnimator(sheet, anims);
    }
    return result;
  }

  /**
   * Generate terrain tiles.
   * @param {object} config - Terrain configuration
   * @returns {{ sheet: SpriteSheet, getTile: Function }}
   */
  static terrain(config) {
    const key = JSON.stringify({ _type: 'terrain', ...config });
    const cached = _cache.get(key);
    if (cached) {
      return { sheet: cached, getTile: (neighbors) => autoTileLookup(neighbors) };
    }

    const type = config.type || 'grass';
    const tileSize = config.tileSize || 32;
    const variation = config.variation || 1;
    const autoTile = config.autoTile || false;
    const decorations = config.decorations || [];
    const decorationDensity = config.decorationDensity || 0.3;
    const animated = config.animated || false;
    const animFrames = animated ? (config.animFrames || 4) : 1;

    let totalTiles;
    if (autoTile) {
      totalTiles = 16 * animFrames; // 16 autotile variants per frame
    } else {
      totalTiles = variation * animFrames;
    }

    const cols = Math.ceil(Math.sqrt(totalTiles));
    const rows = Math.ceil(totalTiles / cols);
    const canvas = sf_makeCanvas(cols * tileSize, rows * tileSize);
    const ctx = canvas.getContext('2d');

    let idx = 0;
    if (autoTile) {
      for (let af = 0; af < animFrames; af++) {
        for (let mask = 0; mask < 16; mask++) {
          const col = idx % cols;
          const row = Math.floor(idx / cols);
          ctx.save();
          ctx.translate(col * tileSize, row * tileSize);
          ctx.clearRect(0, 0, tileSize, tileSize);
          const rng = seededRNG(mask * 1000 + af * 100 + type.charCodeAt(0));
          drawAutoTile(ctx, type, tileSize, config.palette, mask, rng);
          // Animated variation (slight shift for water/lava)
          if (animated && af > 0) {
            const shift = af * 2;
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = af % 2 === 0 ? Palette.lighten(config.palette?.base || '#4488cc', 0.2) : Palette.darken(config.palette?.base || '#4488cc', 0.2);
            ctx.fillRect(shift, shift, tileSize - shift * 2, tileSize - shift * 2);
            ctx.globalAlpha = 1;
          }
          ctx.restore();
          idx++;
        }
      }
    } else {
      for (let af = 0; af < animFrames; af++) {
        for (let v = 0; v < variation; v++) {
          const col = idx % cols;
          const row = Math.floor(idx / cols);
          ctx.save();
          ctx.translate(col * tileSize, row * tileSize);
          ctx.clearRect(0, 0, tileSize, tileSize);
          const rng = seededRNG(v * 1000 + af * 100 + type.charCodeAt(0));
          drawTerrainTile(ctx, type, tileSize, config.palette, rng, decorations, decorationDensity);
          if (animated && af > 0) {
            const rng2 = seededRNG(af * 31 + v);
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = af % 2 === 0 ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            for (let i = 0; i < 3; i++) {
              const wx = rng2() * tileSize;
              const wy = rng2() * tileSize;
              ctx.beginPath();
              ctx.ellipse(wx, wy, tileSize * 0.15, tileSize * 0.04, rng2() * Math.PI, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
          }
          ctx.restore();
          idx++;
        }
      }
    }

    const sheet = new SpriteSheet(canvas, tileSize, tileSize, cols, rows);
    _cache.set(key, sheet);

    /**
     * Get tile index from neighbor bitmask.
     * @param {{ up: boolean, right: boolean, down: boolean, left: boolean }} neighbors
     * @param {number} [animFrame=0]
     * @returns {number}
     */
    function getTile(neighbors, animFrame = 0) {
      if (!autoTile) {
        return (animFrame * variation) + Math.floor(Math.random() * variation);
      }
      let mask = 0;
      if (neighbors.up) mask |= 1;
      if (neighbors.right) mask |= 2;
      if (neighbors.down) mask |= 4;
      if (neighbors.left) mask |= 8;
      return animFrame * 16 + mask;
    }

    return { sheet, getTile };
  }

  /**
   * Generate UI elements (panels, buttons, bars, icons).
   * @param {object} config - UI configuration
   * @returns {{ sheet: SpriteSheet }}
   */
  static ui(config) {
    const key = JSON.stringify({ _type: 'ui', ...config });
    const cached = _cache.get(key);
    if (cached) return { sheet: cached };

    const type = config.type || 'icon';

    if (type === 'panel') {
      const panel = config.panel || {};
      const w = panel.width || 64;
      const h = panel.height || 64;
      const canvas = sf_makeCanvas(w, h);
      const ctx = canvas.getContext('2d');
      drawPanel9Slice(ctx, panel.style || 'light', w, h, panel.cornerRadius, panel.borderWidth);
      const sheet = new SpriteSheet(canvas, w, h, 1, 1);
      sheet.nameFrame('panel', 0);
      _cache.set(key, sheet);
      return { sheet };
    }

    if (type === 'button') {
      const btn = config.button || {};
      const w = btn.width || 80;
      const h = btn.height || 28;
      const states = btn.states || ['normal', 'hover', 'pressed', 'disabled'];
      const canvas = sf_makeCanvas(w * states.length, h);
      const ctx = canvas.getContext('2d');
      for (let i = 0; i < states.length; i++) {
        ctx.save();
        ctx.translate(i * w, 0);
        drawButton(ctx, btn.style || 'default', w, h, states[i]);
        ctx.restore();
      }
      const sheet = new SpriteSheet(canvas, w, h, states.length, 1);
      states.forEach((s, i) => sheet.nameFrame(s, i));
      _cache.set(key, sheet);
      return { sheet };
    }

    if (type === 'bar') {
      const bar = config.bar || {};
      const w = bar.width || 80;
      const h = bar.height || 12;
      const steps = 11; // 0% to 100% in 10% increments
      const canvas = sf_makeCanvas(w * steps, h);
      const ctx = canvas.getContext('2d');
      for (let i = 0; i < steps; i++) {
        ctx.save();
        ctx.translate(i * w, 0);
        drawBar(ctx, w, h, bar.style || 'smooth', bar.colors?.fill, bar.colors?.bg, bar.colors?.border, i / (steps - 1));
        ctx.restore();
      }
      const sheet = new SpriteSheet(canvas, w, h, steps, 1);
      for (let i = 0; i < steps; i++) sheet.nameFrame(`fill_${i * 10}`, i);
      _cache.set(key, sheet);
      return { sheet };
    }

    if (type === 'icon') {
      const icon = config.icon || {};
      const s = icon.size || 24;
      const iconName = icon.name || 'heart';
      const canvas = sf_makeCanvas(s, s);
      const ctx = canvas.getContext('2d');
      drawIcon(ctx, iconName, s, icon.color || '#ffffff');
      const sheet = new SpriteSheet(canvas, s, s, 1, 1);
      sheet.nameFrame(iconName, 0);
      _cache.set(key, sheet);
      return { sheet };
    }

    // Fallback
    const canvas = sf_makeCanvas(32, 32);
    const sheet = new SpriteSheet(canvas, 32, 32, 1, 1);
    return { sheet };
  }

  /**
   * Generate animated visual effect sprites.
   * @param {object} config - Effect configuration
   * @returns {{ sheet: SpriteSheet, animator: SpriteAnimator }}
   */
  static effect(config) {
    const key = JSON.stringify({ _type: 'effect', ...config });
    const cached = _cache.get(key);
    if (cached) {
      const frames = config.frames || 6;
      const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed: config.speed || 0.08, loop: false } };
      return { sheet: cached, animator: new SpriteAnimator(cached, anims) };
    }

    const type = config.type || 'explosion';
    const size = config.size || 48;
    const color = config.color || '#ff8800';
    const frames = config.frames || 6;
    const speed = config.speed || 0.08;

    const cols = frames;
    const rows = 1;
    const canvas = sf_makeCanvas(cols * size, rows * size);
    const ctx = canvas.getContext('2d');

    for (let f = 0; f < frames; f++) {
      ctx.save();
      ctx.translate(f * size, 0);
      ctx.clearRect(0, 0, size, size);
      drawEffect(ctx, type, size, color, f, frames);
      ctx.restore();
    }

    const sheet = new SpriteSheet(canvas, size, size, cols, rows);
    for (let f = 0; f < frames; f++) {
      sheet.nameFrame(`${type}_${f}`, f);
    }
    _cache.set(key, sheet);

    const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed, loop: false } };
    return { sheet, animator: new SpriteAnimator(sheet, anims) };
  }

  /** Clear the global sprite cache. */
  static clearCache() {
    _cache.clear();
  }
}

// ---------------------------------------------------------------------------
// Internal helpers
// ---------------------------------------------------------------------------

function buildCharAnimDefs(config, sheet) {
  const animConfig = config.animations || {
    idle: { frames: 4, speed: 0.2 },
    walk: { frames: 6, speed: 0.1 },
    attack: { frames: 4, speed: 0.08 },
    hurt: { frames: 2, speed: 0.1 },
    death: { frames: 4, speed: 0.15 },
  };
  const anims = {};
  let idx = 0;
  for (const [name, ac] of Object.entries(animConfig)) {
    const indices = [];
    for (let f = 0; f < ac.frames; f++) indices.push(idx++);
    anims[name] = {
      frames: indices,
      speed: ac.speed || 0.1,
      loop: name !== 'death' && name !== 'hurt',
      pingpong: name === 'idle',
    };
  }
  return anims;
}

function autoTileLookup(neighbors) {
  let mask = 0;
  if (neighbors.up) mask |= 1;
  if (neighbors.right) mask |= 2;
  if (neighbors.down) mask |= 4;
  if (neighbors.left) mask |= 8;
  return mask;
}

function shadeHex(hex, amt) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amt)); g = Math.max(0, Math.min(255, g + amt)); b = Math.max(0, Math.min(255, b + amt));
  return '#' + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

// ============================================================
// EVENT BUS — Pub/sub for decoupled system communication
// ============================================================
// New features subscribe to events instead of editing core files.
//
// Usage:
//   GameEvents.on('turnEnd', function(game) { ... });
//   GameEvents.on('playerMove', function(game, wx, wy) { ... });
//   GameEvents.on('draw:entities', function(game, ctx) { ... });
//
// Events fired by core:
//   turnEnd(game)              — after any turn ends (overworld or dungeon)
//   playerMove(game, x, y)    — after player moves to new tile
//   update(game, dt)           — every frame
//   draw:world(game, ctx)      — after world tiles drawn, before entities
//   draw:entities(game, ctx)   — after entities drawn
//   draw:ui(game, ctx)         — after HUD drawn, for custom UI panels
//   enterDungeon(game)         — when transitioning to dungeon
//   exitDungeon(game)          — when returning to overworld
//   kill(game, enemy)          — when an enemy is killed
//   damage(game, target, amount, source) — when damage is dealt
//   modeChange(game, newMode)  — when mode switches
//   keyDown(game, key)         — raw keypress, return true to consume
//   interact(game, tileType, wx, wy) — before skill handlers run

var GameEvents = (function() {
  var listeners = {};

  return {
    // Subscribe to an event. Returns unsubscribe function.
    on: function(event, handler, priority) {
      if (!listeners[event]) listeners[event] = [];
      var entry = { handler: handler, priority: priority || 0 };
      listeners[event].push(entry);
      listeners[event].sort(function(a, b) { return b.priority - a.priority; });
      return function() {
        var idx = listeners[event].indexOf(entry);
        if (idx >= 0) listeners[event].splice(idx, 1);
      };
    },

    // Fire an event. Args are passed to all handlers.
    // If any handler returns true, stops propagation and returns true.
    fire: function(event) {
      var handlers = listeners[event];
      if (!handlers) return false;
      var args = Array.prototype.slice.call(arguments, 1);
      for (var i = 0; i < handlers.length; i++) {
        if (handlers[i].handler.apply(null, args) === true) return true;
      }
      return false;
    },

    // Remove all listeners (useful for game restart)
    clear: function(event) {
      if (event) delete listeners[event];
      else listeners = {};
    },

    // List registered events (debug)
    list: function() {
      var result = {};
      for (var e in listeners) result[e] = listeners[e].length;
      return result;
    },
  };
})();

// ============================================================
// GAME STATE STACK — Each state owns its input and draw
// ============================================================
// States push/pop. Top state receives input and draws.
// Lower states can still draw (for background) if they opt in.
//
// A state is an object:
// {
//   name: 'playing',
//   onEnter: function(game) {},       // called when state becomes active
//   onExit: function(game) {},        // called when state is popped or covered
//   onKey: function(game, key) {},    // return true to consume key
//   onDraw: function(game, ctx) {},   // draw UI for this state
//   drawBelow: false,                 // if true, state below also draws
// }

var StateStack = {
  _stack: [],
  _game: null,

  init: function(game) {
    this._game = game;
    this._stack = [];
  },

  // Push a new state on top
  push: function(state) {
    var current = this.current();
    if (current && current.onPause) current.onPause(this._game);
    this._stack.push(state);
    if (state.onEnter) state.onEnter(this._game);
  },

  // Pop the top state, return to previous
  pop: function() {
    var old = this._stack.pop();
    if (old && old.onExit) old.onExit(this._game);
    var current = this.current();
    if (current && current.onResume) current.onResume(this._game);
    return old;
  },

  // Replace top state
  swap: function(state) {
    var old = this._stack.pop();
    if (old && old.onExit) old.onExit(this._game);
    this._stack.push(state);
    if (state.onEnter) state.onEnter(this._game);
  },

  // Get current (top) state
  current: function() {
    return this._stack.length > 0 ? this._stack[this._stack.length - 1] : null;
  },

  // Get state name
  name: function() {
    var c = this.current();
    return c ? c.name : '';
  },

  // Check if a state is anywhere in the stack
  has: function(name) {
    for (var i = 0; i < this._stack.length; i++)
      if (this._stack[i].name === name) return true;
    return false;
  },

  // Route key input to top state
  handleKey: function(key) {
    // Debug toggle always passes through regardless of state
    if (key === '`' || key === '~') {
      GameEvents.fire('keyDown', this._game, key);
      return true;
    }
    var c = this.current();
    if (c && c.onKey) return c.onKey(this._game, key);
    return false;
  },

  // Draw states (bottom-up if drawBelow is set)
  draw: function(ctx) {
    // Find lowest state that needs drawing
    var start = this._stack.length - 1;
    while (start > 0 && this._stack[start].drawBelow) start--;
    for (var i = start; i < this._stack.length; i++) {
      if (this._stack[i].onDraw) this._stack[i].onDraw(this._game, ctx);
    }
  },

  // Clear entire stack
  clear: function() {
    while (this._stack.length > 0) this.pop();
  },

  depth: function() { return this._stack.length; },
};

};

// ============================================================
// SAVE / LOAD — Event-driven persistence
// ============================================================
// Systems register save/load handlers. On save, each handler
// returns its data. On load, each handler receives its data back.
//
// Usage:
//   SaveSystem.register('woodcutting', {
//     save: function() { return { stumps: [...] }; },
//     load: function(data) { /* restore stumps */ },
//   });

var SaveSystem = (function() {
  var handlers = {};     // id -> { save: fn, load: fn }
  var STORAGE_KEY = 'wanderlust_save';

  return {
    register: function(id, handler) {
      handlers[id] = handler;
    },

    // Collect data from all handlers and write to localStorage
    save: function() {
      var data = { _version: 1, _timestamp: Date.now() };
      for (var id in handlers) {
        if (handlers[id].save) {
          try { data[id] = handlers[id].save(); }
          catch (e) { console.warn('Save failed for ' + id, e); }
        }
      }
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
      catch (e) { console.warn('Save to localStorage failed', e); }
      GameEvents.fire('saved', data);
    },

    // Read from localStorage and distribute to handlers
    load: function() {
      var raw;
      try { raw = localStorage.getItem(STORAGE_KEY); }
      catch (e) { return false; }
      if (!raw) return false;
      var data;
      try { data = JSON.parse(raw); } catch (e) { return false; }
      for (var id in handlers) {
        if (handlers[id].load && data[id] !== undefined) {
          try { handlers[id].load(data[id]); }
          catch (e) { console.warn('Load failed for ' + id, e); }
        }
      }
      GameEvents.fire('loaded', data);
      return true;
    },

    // Check if a save exists
    hasSave: function() {
      try { return !!localStorage.getItem(STORAGE_KEY); }
      catch (e) { return false; }
    },

    // Delete save
    deleteSave: function() {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    },

    // Get raw save data (for export)
    exportSave: function() {
      try { return localStorage.getItem(STORAGE_KEY); }
      catch (e) { return null; }
    },

    // Import raw save data
    importSave: function(jsonStr) {
      try {
        JSON.parse(jsonStr); // validate
        localStorage.setItem(STORAGE_KEY, jsonStr);
        return true;
      } catch (e) { return false; }
    },
  };
})();

// Tile Registry — maps tile IDs to definitions
var TileRegistry = (function() {
  var nextId = 100; // custom tiles start at 100, below 100 reserved for core
  var tiles = {};   // id -> { name, solid, interact, draw, light, damage, ... }
  return {
    // Register a tile type, returns its numeric ID
    add: function(def) {
      var id = def.id || nextId++;
      tiles[id] = def;
      return id;
    },
    get: function(id) { return tiles[id] || null; },
    isSolid: function(id) { var t = tiles[id]; return t ? !!t.solid : false; },
    getDrawer: function(id) { var t = tiles[id]; return t ? t.draw : null; },
    getInteraction: function(id) { var t = tiles[id]; return t ? t.onInteract : null; },
    getLight: function(id) { var t = tiles[id]; return t ? t.light : null; },
    getDamage: function(id) { var t = tiles[id]; return t ? t.damage : null; },
    all: function() { return tiles; },
  };
})();

// Resource Registry — defines all resource types
var ResourceRegistry = (function() {
  var resources = {}; // id -> { name, icon, color, stackMax, category }
  return {
    add: function(def) { resources[def.id] = def; },
    get: function(id) { return resources[id] || null; },
    all: function() { return resources; },
    getByCategory: function(cat) {
      var result = [];
      for (var id in resources) if (resources[id].category === cat) result.push(resources[id]);
      return result;
    },
  };
})();

// Biome Registry — defines overworld biome types
var BiomeRegistry = (function() {
  var biomes = {}; // id -> { name, palette, groundTile, density, enemies, ... }
  return {
    add: function(def) { biomes[def.id] = def; },
    get: function(id) { return biomes[id] || null; },
    all: function() { return biomes; },
    list: function() { var r = []; for (var id in biomes) r.push(biomes[id]); return r; },
  };
})();

// Skill Registry — defines skill systems
var SkillRegistry = (function() {
  var skills = {}; // id -> { name, onInteract, populate, drawTile, recipes, ... }
  return {
    add: function(def) { skills[def.id] = def; },
    get: function(id) { return skills[id] || null; },
    all: function() { return skills; },
    list: function() { var r = []; for (var id in skills) r.push(skills[id]); return r; },
    // Find all skills that handle a given tile type
    getHandlersForTile: function(tileId) {
      var handlers = [];
      for (var id in skills) {
        var s = skills[id];
        if (s.tileIds && s.tileIds.indexOf(tileId) >= 0 && s.onInteract) {
          handlers.push({ skill: s, handler: s.onInteract });
        }
      }
      return handlers;
    },
  };
})();

// Recipe Registry — crafting recipes from all systems
var RecipeRegistry = (function() {
  var recipes = []; // { input: {id:count,...}, output: {id:count,...}, skill: id, level: n, name: '' }
  return {
    add: function(recipe) { recipes.push(recipe); },
    addAll: function(arr) { for (var i = 0; i < arr.length; i++) recipes.push(arr[i]); },
    getForSkill: function(skillId) {
      return recipes.filter(function(r) { return r.skill === skillId; });
    },
    getAvailable: function(bag, playerSkills) {
      return recipes.filter(function(r) {
        // Check skill level
        if (r.skill && r.level) {
          var sl = playerSkills[r.skill];
          if (!sl || sl.level < r.level) return false;
        }
        // Check resources
        for (var id in r.input) {
          if ((bag[id] || 0) < r.input[id]) return false;
        }
        return true;
      });
    },
    // Check if a recipe's prerequisites are met
    checkPrereqs: function(recipe, craftedSet) {
      if (!recipe.requires || recipe.requires.length === 0) return true;
      for (var i = 0; i < recipe.requires.length; i++) {
        if (!craftedSet[recipe.requires[i]]) return false;
      }
      return true;
    },
    all: function() { return recipes; },
  };
})();

// RESOURCES — Bag/inventory system
// ============================================================

// Bag: simple resource stack storage
// bag is a plain object: { resource_id: count, ... }
// Separate from equipment (weapons/armor which have unique stats)

var Bag = {
  create: function() { return {}; },

  add: function(bag, resourceId, count) {
    count = count || 1;
    var def = ResourceRegistry.get(resourceId);
    var max = (def && def.stackMax) || 999;
    bag[resourceId] = Math.min((bag[resourceId] || 0) + count, max);
  },

  remove: function(bag, resourceId, count) {
    count = count || 1;
    if ((bag[resourceId] || 0) < count) return false;
    bag[resourceId] -= count;
    if (bag[resourceId] <= 0) delete bag[resourceId];
    return true;
  },

  has: function(bag, resourceId, count) {
    count = count || 1;
    return (bag[resourceId] || 0) >= count;
  },

  // Check if bag has all resources in a requirements object {id: count, ...}
  hasAll: function(bag, requirements) {
    for (var id in requirements) {
      if ((bag[id] || 0) < requirements[id]) return false;
    }
    return true;
  },

  // Remove all resources in a requirements object, returns false if insufficient
  removeAll: function(bag, requirements) {
    if (!Bag.hasAll(bag, requirements)) return false;
    for (var id in requirements) {
      bag[id] -= requirements[id];
      if (bag[id] <= 0) delete bag[id];
    }
    return true;
  },

  // Add all resources in an object {id: count, ...}
  addAll: function(bag, resources) {
    for (var id in resources) Bag.add(bag, id, resources[id]);
  },

  // Get non-empty entries as sorted array [{id, count, def}, ...]
  contents: function(bag) {
    var result = [];
    for (var id in bag) {
      if (bag[id] > 0) result.push({ id: id, count: bag[id], def: ResourceRegistry.get(id) });
    }
    result.sort(function(a, b) {
      var ca = a.def ? a.def.category || '' : '';
      var cb = b.def ? b.def.category || '' : '';
      return ca < cb ? -1 : ca > cb ? 1 : a.id < b.id ? -1 : 1;
    });
    return result;
  },

  count: function(bag) {
    var n = 0;
    for (var id in bag) n += bag[id];
    return n;
  },

  types: function(bag) {
    var n = 0;
    for (var id in bag) if (bag[id] > 0) n++;
    return n;
  },
};

// SKILLS — Generic XP / leveling for all skill systems
// ============================================================

// PlayerSkills: tracks XP and levels per skill
// Stored as: { skillId: { xp: n, level: n }, ... }

var PlayerSkills = {
  create: function() { return {}; },

  // Add XP to a skill, returns { leveled: bool, level: n } if level up
  addXp: function(skills, skillId, amount) {
    if (!skills[skillId]) skills[skillId] = { xp: 0, level: 1 };
    var s = skills[skillId];
    s.xp += amount;
    var needed = PlayerSkills.xpForLevel(s.level + 1);
    var leveled = false;
    while (s.xp >= needed) {
      s.xp -= needed;
      s.level++;
      leveled = true;
      needed = PlayerSkills.xpForLevel(s.level + 1);
    }
    return { leveled: leveled, level: s.level };
  },

  getLevel: function(skills, skillId) {
    return skills[skillId] ? skills[skillId].level : 0;
  },

  getXp: function(skills, skillId) {
    return skills[skillId] ? skills[skillId].xp : 0;
  },

  // XP needed to reach a given level
  xpForLevel: function(level) {
    return Math.round(10 * Math.pow(1.4, level - 1));
  },

  // Progress to next level as 0-1
  progress: function(skills, skillId) {
    if (!skills[skillId]) return 0;
    var s = skills[skillId];
    var needed = PlayerSkills.xpForLevel(s.level + 1);
    return needed > 0 ? s.xp / needed : 0;
  },

  // Get all skills as sorted array [{id, level, xp, def}, ...]
  list: function(skills) {
    var result = [];
    for (var id in skills) {
      result.push({ id: id, level: skills[id].level, xp: skills[id].xp, def: SkillRegistry.get(id) });
    }
    result.sort(function(a, b) { return a.id < b.id ? -1 : 1; });
    return result;
  },
};

function generateLoot(floor) {
  // Filter table by floor, then weighted random pick
  var available = [];
  var totalWeight = 0;
  for (var i = 0; i < LOOT_TABLE.length; i++) {
    if (floor >= LOOT_TABLE[i].minFloor) {
      available.push(LOOT_TABLE[i]);
      totalWeight += LOOT_TABLE[i].weight;
    }
  }
  if (available.length === 0) return null;
  var roll = Math.random() * totalWeight;
  var cumulative = 0;
  for (var i = 0; i < available.length; i++) {
    cumulative += available[i].weight;
    if (roll < cumulative) return available[i].generate(floor);
  }
  return available[available.length - 1].generate(floor);
}

function abilityName(v,e,s) {

  };

  return n[k]||(e.charAt(0).toUpperCase()+e.slice(1)+' '+v.charAt(0).toUpperCase()+v.slice(1));
}

function generateAbility(floor) {
  var verb=VERBS[Math.floor(Math.random()*VERBS.length)];
  var element=ELEMENTS[Math.floor(Math.random()*ELEMENTS.length)];
  var shape;
  if(verb==='strike') shape=['single','ring','cone'][Math.floor(Math.random()*3)];
  else if(verb==='launch') shape=['line','cone','area'][Math.floor(Math.random()*3)];
  else if(verb==='place') shape=['area','line','ring'][Math.floor(Math.random()*3)];
  else if(verb==='dash') shape='self';
  else if(verb==='shield') shape='self';
  else shape='single';
  var baseDmg=5+Math.floor(floor*1.5);
  var cd=1;
  if(verb==='launch'&&shape==='area') cd=4;
  else if(verb==='place') cd=3;
  else if(verb==='shield') cd=4;
  else if(verb==='drain') cd=3;
  else if(verb==='dash') cd=3;
  else if(shape==='ring') cd=3;
  else if(shape==='cone') cd=2;
  return { verb:verb, element:element, shape:shape, name:abilityName(verb,element,shape),
    damage:baseDmg+Math.floor(Math.random()*4)-1, cooldown:cd, currentCooldown:0, color:ELEMENT_COLORS[element] };
}

function getAbilityTargets(ab, px, py, dx, dy) {
  var t=[];
  if(ab.shape==='single') { t.push({x:px+dx,y:py+dy}); }
  else if(ab.shape==='line') { var maxR=ab.maxRange||5; for(var i=1;i<=maxR;i++) t.push({x:px+dx*i,y:py+dy*i}); }
  else if(ab.shape==='cone') {
    for(var i=1;i<=3;i++) { t.push({x:px+dx*i,y:py+dy*i});
      if(dx===0){t.push({x:px-1,y:py+dy*i});t.push({x:px+1,y:py+dy*i});}
      else{t.push({x:px+dx*i,y:py-1});t.push({x:px+dx*i,y:py+1});}
    }
  } else if(ab.shape==='ring') {
    for(var ddx=-2;ddx<=2;ddx++) for(var ddy=-2;ddy<=2;ddy++) {
      if(ddx===0&&ddy===0) continue;
      if(Math.abs(ddx)+Math.abs(ddy)<=2) t.push({x:px+ddx,y:py+ddy});
    }
  } else if(ab.shape==='area') {
    var cx=px+dx*3,cy=py+dy*3;
    for(var ddx=-1;ddx<=1;ddx++) for(var ddy=-1;ddy<=1;ddy++) t.push({x:cx+ddx,y:cy+ddy});
  } else if(ab.shape==='self') { t.push({x:px,y:py}); }
  return t;
}

// ============================================================
// DUNGEON GENERATOR
// ============================================================
function generateDungeon(floor, seed) {
  // Seeded RNG so same cave + floor = same layout
  var _ds = (seed || 12345) + floor * 99991;
  function dRng() { _ds = (_ds * 1103515245 + 12345) & 0x7fffffff; return (_ds >>> 0) / 0x7fffffff; }

  var w=CONFIG.MAP_W, h=CONFIG.MAP_H;
  var map=Array.from({length:h},function(){return new Array(w).fill(T.VOID);});
  var rooms=[], revealed=Array.from({length:h},function(){return new Array(w).fill(false);});
  var biome=getBiome(floor), isBossFloor=floor%5===0;
  var roomTarget=isBossFloor?8:(6+Math.min(6,Math.floor(floor*0.5)));

  for(var attempt=0;attempt<CONFIG.ROOM_ATTEMPTS+floor*3&&rooms.length<roomTarget;attempt++) {
    var rw=CONFIG.ROOM_MIN+Math.floor(dRng()*(CONFIG.ROOM_MAX-CONFIG.ROOM_MIN));
    var rh=CONFIG.ROOM_MIN+Math.floor(dRng()*(CONFIG.ROOM_MAX-CONFIG.ROOM_MIN));
    var rx=2+Math.floor(dRng()*(w-rw-4)), ry=2+Math.floor(dRng()*(h-rh-4));
    var overlap=false;
    for(var ri=0;ri<rooms.length;ri++){var r=rooms[ri];if(rx-1<r.x+r.w&&rx+rw+1>r.x&&ry-1<r.y+r.h&&ry+rh+1>r.y){overlap=true;break;}}
    if(overlap) continue;
    rooms.push({x:rx,y:ry,w:rw,h:rh,type:'combat'});
    for(var y=ry;y<ry+rh;y++) for(var x=rx;x<rx+rw;x++) map[y][x]=T.FLOOR;
    for(var y=ry-1;y<=ry+rh;y++) for(var x=rx-1;x<=rx+rw;x++) if(y>=0&&y<h&&x>=0&&x<w&&map[y][x]===T.VOID) map[y][x]=T.WALL;
  }
  while(rooms.length<3){var i=rooms.length,rx=5+i*15,ry=5+i*12;rooms.push({x:rx,y:ry,w:6,h:6,type:'combat'});for(var y=ry;y<ry+6;y++)for(var x=rx;x<rx+6;x++)map[y][x]=T.FLOOR;for(var y=ry-1;y<=ry+6;y++)for(var x=rx-1;x<=rx+6;x++)if(y>=0&&y<h&&x>=0&&x<w&&map[y][x]===T.VOID)map[y][x]=T.WALL;}

  function carve(ax,ay,bx,by){var cx=ax,cy=ay;while(cx!==bx){if(cy>=0&&cy<h&&cx>=0&&cx<w){if(map[cy][cx]===T.VOID||map[cy][cx]===T.WALL)map[cy][cx]=T.CORRIDOR;for(var d=-1;d<=1;d++){var ny=cy+d;if(ny>=0&&ny<h&&map[ny][cx]===T.VOID)map[ny][cx]=T.WALL;}}cx+=cx<bx?1:-1;}while(cy!==by){if(cy>=0&&cy<h&&cx>=0&&cx<w){if(map[cy][cx]===T.VOID||map[cy][cx]===T.WALL)map[cy][cx]=T.CORRIDOR;for(var d=-1;d<=1;d++){var nx=cx+d;if(nx>=0&&nx<w&&map[cy][nx]===T.VOID)map[cy][nx]=T.WALL;}}cy+=cy<by?1:-1;}}
  for(var i=1;i<rooms.length;i++){var a=rooms[i-1],b=rooms[i];carve(Math.floor(a.x+a.w/2),Math.floor(a.y+a.h/2),Math.floor(b.x+b.w/2),Math.floor(b.y+b.h/2));}
  if(rooms.length>3){var a=rooms[rooms.length-1],b=rooms[0];carve(Math.floor(a.x+a.w/2),Math.floor(a.y+a.h/2),Math.floor(b.x+b.w/2),Math.floor(b.y+b.h/2));}

  // Seal all gaps: any VOID tile adjacent (including diagonals) to a walkable tile becomes WALL
  for(var sy=1;sy<h-1;sy++){for(var sx=1;sx<w-1;sx++){
    if(map[sy][sx]!==T.VOID) continue;
    var needsWall=false;
    for(var ddy=-1;ddy<=1&&!needsWall;ddy++){for(var ddx=-1;ddx<=1&&!needsWall;ddx++){
      if(ddx===0&&ddy===0) continue;
      var nt=map[sy+ddy][sx+ddx];
      if(nt===T.FLOOR||nt===T.CORRIDOR||nt===T.DOOR) needsWall=true;
    }}
    if(needsWall) map[sy][sx]=T.WALL;
  }}

  rooms[0].type='spawn';
  var maxDist=0,stairRoom=rooms.length-1;
  for(var i=1;i<rooms.length;i++){var dx=rooms[i].x-rooms[0].x,dy=rooms[i].y-rooms[0].y;if(dx*dx+dy*dy>maxDist){maxDist=dx*dx+dy*dy;stairRoom=i;}}
  rooms[stairRoom].type='stairs';
  var mid=[];for(var i=1;i<rooms.length;i++)if(i!==stairRoom)mid.push(i);
  for(var i=mid.length-1;i>0;i--){var j=Math.floor(dRng()*(i+1)),tmp=mid[i];mid[i]=mid[j];mid[j]=tmp;}
  if(mid.length>0) rooms[mid[0]].type='shrine';
  if(mid.length>1) rooms[mid[1]].type='rest';
  if(isBossFloor&&mid.length>2) rooms[mid[2]].type='boss';

  var sr=rooms[stairRoom],sx=Math.floor(sr.x+sr.w/2),sy=Math.floor(sr.y+sr.h/2);
  map[sy][sx]=T.STAIRS;
  for(var i=0;i<rooms.length;i++){
    if(rooms[i].type==='shrine') map[Math.floor(rooms[i].y+rooms[i].h/2)][Math.floor(rooms[i].x+rooms[i].w/2)]=T.SHRINE;
    if(rooms[i].type==='rest') map[Math.floor(rooms[i].y+rooms[i].h/2)][Math.floor(rooms[i].x+rooms[i].w/2)]=T.REST;
  }

  if(biome.hazardTiles.length>0){for(var y=0;y<h;y++)for(var x=0;x<w;x++){
    if(map[y][x]===T.FLOOR&&dRng()<biome.hazardChance){
      var room=null;for(var ri=0;ri<rooms.length;ri++){var r=rooms[ri];if(x>=r.x&&x<r.x+r.w&&y>=r.y&&y<r.y+r.h){room=r;break;}}
      if(room&&(room.type==='shrine'||room.type==='rest'||room.type==='spawn')) continue;
      map[y][x]=biome.hazardTiles[Math.floor(dRng()*biome.hazardTiles.length)];
    }
  }}

  for(var ri=0;ri<rooms.length;ri++){var room=rooms[ri];
    for(var x=room.x;x<room.x+room.w;x++){if(room.y>0&&map[room.y-1][x]===T.CORRIDOR)map[room.y][x]=T.DOOR;if(room.y+room.h<h&&map[room.y+room.h][x]===T.CORRIDOR)map[room.y+room.h-1][x]=T.DOOR;}
    for(var y=room.y;y<room.y+room.h;y++){if(room.x>0&&map[y][room.x-1]===T.CORRIDOR)map[y][room.x]=T.DOOR;if(room.x+room.w<w&&map[y][room.x+room.w]===T.CORRIDOR)map[y][room.x+room.w-1]=T.DOOR;}
  }

  // Place loot — more at deeper floors
  var lootMap={};
  var combatRooms=[];for(var i=0;i<rooms.length;i++)if(rooms[i].type==='combat')combatRooms.push(rooms[i]);
  // Guaranteed loot scales: 1 on floor 1, up to 4 by floor 12+
  var lootCount=Math.min(combatRooms.length, 1 + Math.floor(floor / 3));
  for(var li=0;li<lootCount&&li<combatRooms.length;li++){
    var lr=combatRooms[li];
    var lx=lr.x+1+Math.floor(dRng()*Math.max(1,lr.w-2));
    var ly=lr.y+1+Math.floor(dRng()*Math.max(1,lr.h-2));
    if(map[ly][lx]===T.FLOOR){map[ly][lx]=T.LOOT;lootMap[lx+','+ly]=generateLoot(floor);}
  }
  // Bonus loot in corridors on deeper floors (scattered finds from fallen explorers)
  if(floor >= 4){
    var bonusCount = Math.floor(floor / 4);
    var placed = 0;
    for(var by=1;by<h-1&&placed<bonusCount;by++){
      for(var bx=1;bx<w-1&&placed<bonusCount;bx++){
        if(map[by][bx]===T.CORRIDOR && dRng()<0.02){
          map[by][bx]=T.LOOT; lootMap[bx+','+by]=generateLoot(floor); placed++;
        }
      }
    }
  }

  var firstRoom=rooms[0];
  return{map:map,rooms:rooms,revealed:revealed,
    effects:Array.from({length:h},function(){return new Array(w).fill(null);}),
    spawnX:Math.floor(firstRoom.x+firstRoom.w/2),spawnY:Math.floor(firstRoom.y+firstRoom.h/2),
    stairsX:sx,stairsY:sy,biome:biome,isBossFloor:isBossFloor,loot:lootMap};
}

// OVERWORLD — Seeded procedural world generator
// ============================================================

// Simple seeded PRNG for deterministic world gen
function overworldRng(seed) {
  var s = seed || 12345;
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return (s >>> 0) / 0x7fffffff;
  };
}

// Simple 2D value noise for terrain shape
function overworldNoise(x, y, seed, scale) {
  scale = scale || 0.05;
  var ix = Math.floor(x * scale), iy = Math.floor(y * scale);
  var fx = x * scale - ix, fy = y * scale - iy;
  // Smoothstep
  fx = fx * fx * (3 - 2 * fx);
  fy = fy * fy * (3 - 2 * fy);
  function hash(px, py) {
    var h = (px * 374761393 + py * 668265263 + seed * 1013904223) & 0x7fffffff;
    h = ((h >> 13) ^ h) * 1274126177;
    return ((h >> 16) ^ h) / 0x7fffffff;
  }
  var a = hash(ix, iy), b = hash(ix + 1, iy);
  var c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
  var top = a + (b - a) * fx;
  var bot = c + (d - c) * fx;
  return top + (bot - top) * fy;
}

// Multi-octave noise for richer terrain
function overworldFbm(x, y, seed, octaves, scale) {
  octaves = octaves || 4;
  scale = scale || 0.04;
  var val = 0, amp = 1, freq = scale, totalAmp = 0;
  for (var i = 0; i < octaves; i++) {
    val += overworldNoise(x, y, seed + i * 9999, freq) * amp;
    totalAmp += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return val / totalAmp;
}

// Overworld map: generates tile data for a region around the player
// The world is infinite — we generate chunks on demand and cache them
var Overworld = {
  CHUNK_SIZE: 16,
  chunks: {},       // 'cx,cy' -> { tiles: 2d array, generated: true }
  tileChanges: {},  // 'wx,wy' -> newTileType — tracks player modifications
  seed: 1,

  init: function(seed) {
    this.seed = seed || Math.floor(Math.random() * 999999);
    this.chunks = {};
    // Don't clear tileChanges here — they persist across init calls
  },

  // Record a tile change for persistence — chunked by region
  setTile: function(wx, wy, newType) {
    var tile = this.getTile(wx, wy);
    tile.type = newType;
    var cs = this.CHUNK_SIZE;
    var ck = Math.floor(wx/cs) + ',' + Math.floor(wy/cs);
    if (!this.tileChanges[ck]) this.tileChanges[ck] = {};
    this.tileChanges[ck][wx + ',' + wy] = newType;
  },

  // Get tile change for a position
  getTileChange: function(wx, wy) {
    var cs = this.CHUNK_SIZE;
    var ck = Math.floor(wx/cs) + ',' + Math.floor(wy/cs);
    return this.tileChanges[ck] ? this.tileChanges[ck][wx + ',' + wy] : undefined;
  },

  // Get or generate a chunk
  getChunk: function(cx, cy) {
    var key = cx + ',' + cy;
    if (this.chunks[key]) return this.chunks[key];
    var chunk = this.generateChunk(cx, cy);
    this.chunks[key] = chunk;
    return chunk;
  },

  generateChunk: function(cx, cy) {
    var cs = this.CHUNK_SIZE;
    var tiles = [];
    var baseX = cx * cs, baseY = cy * cs;
    var rng = overworldRng(this.seed + cx * 7919 + cy * 6271);

    for (var ly = 0; ly < cs; ly++) {
      tiles[ly] = [];
      for (var lx = 0; lx < cs; lx++) {
        var wx = baseX + lx, wy = baseY + ly;
        // Determine biome from large-scale noise
        var biomeNoise = overworldFbm(wx, wy, this.seed, 3, 0.02);
        var heightNoise = overworldFbm(wx, wy, this.seed + 5000, 4, 0.03);
        var moistureNoise = overworldFbm(wx, wy, this.seed + 10000, 3, 0.015);

        var biome = this.selectBiome(biomeNoise, heightNoise, moistureNoise);
        var tileType = biome.groundTile || T.FLOOR;

        // Natural geography layers — water, shore, land, foothills, mountains
        var waterNoise = overworldFbm(wx, wy, this.seed + 5000, 2, 0.015);

        if (waterNoise < 0.12) {
          // Deep water
          tileType = T.WATER;
        } else if (waterNoise < 0.16) {
          // Shallows — visible water near shore
          tileType = T.SHALLOWS;
        } else if (waterNoise < 0.20) {
          // Beach/shore — sand strip between water and land
          tileType = T.BEACH;
        } else if (heightNoise > 0.78) {
          // Mountain peak — impassable
          tileType = T.WALL;
        } else if (heightNoise > 0.70) {
          // Foothills — rocky ground, passable but sparse vegetation
          // Use biome ground tile but mark as elevated
          tileType = biome.groundTile || T.FLOOR;
        }
        // else: normal biome ground tile (already set)

        tiles[ly][lx] = {
          type: tileType,
          biome: biome.id,
          height: heightNoise,
          moisture: moistureNoise,
        };

        // Let registered skills populate tiles (trees, ores, herbs, etc.)
        var skillList = SkillRegistry.list();
        for (var si = 0; si < skillList.length; si++) {
          var skill = skillList[si];
          if (skill.populate) {
            var result = skill.populate(tiles[ly][lx], biome, wx, wy, rng);
            if (result) tiles[ly][lx].type = result;
          }
        }
        // Apply persistent tile changes (chopped trees, etc.)
        var changed = this.getTileChange(wx, wy);
        if (changed !== undefined) {
          tiles[ly][lx].type = changed;
        }
      }
    }
    return { tiles: tiles, generated: true };
  },

  selectBiome: function(biomeN, heightN, moistureN) {
    var biomes = BiomeRegistry.list();
    if (biomes.length === 0) return { id: 'void', groundTile: T.FLOOR };
    // Score each biome by how well conditions match
    var best = biomes[0], bestScore = -999;
    for (var i = 0; i < biomes.length; i++) {
      var b = biomes[i];
      var score = 0;
      if (b.heightRange) {
        if (heightN >= b.heightRange[0] && heightN <= b.heightRange[1]) score += 2;
        else score -= 3;
      }
      if (b.moistureRange) {
        if (moistureN >= b.moistureRange[0] && moistureN <= b.moistureRange[1]) score += 2;
        else score -= 3;
      }
      if (b.biomeNoiseRange) {
        if (biomeN >= b.biomeNoiseRange[0] && biomeN <= b.biomeNoiseRange[1]) score += 1;
      }
      if (b.isDefault) score += 0.5; // slight preference for default
      if (score > bestScore) { bestScore = score; best = b; }
    }
    return best;
  },

  // Get tile at world coordinates
  getTile: function(wx, wy) {
    var cs = this.CHUNK_SIZE;
    var cx = Math.floor(wx / cs), cy = Math.floor(wy / cs);
    var lx = ((wx % cs) + cs) % cs, ly = ((wy % cs) + cs) % cs;
    var chunk = this.getChunk(cx, cy);
    return chunk.tiles[ly][lx];
  },

  // Check if world tile is passable
  isPassable: function(wx, wy) {
    var tile = this.getTile(wx, wy);
    if (tile.type === T.WALL || tile.type === T.WATER || tile.type === T.SHALLOWS) return false;
    if (TileRegistry.isSolid(tile.type)) return false;
    return true;
  },
};

// Register save/load for overworld tile changes
SaveSystem.register('overworld', {
  save: function() {
    return { seed: Overworld.seed, tileChanges: Overworld.tileChanges };
  },
  load: function(data) {
    if (data.seed) Overworld.seed = data.seed;
    if (data.tileChanges) Overworld.tileChanges = data.tileChanges;
    Overworld.chunks = {}; // force regeneration with changes applied
  },
});

function Game(){
  this.canvas=document.getElementById('gameCanvas');
  this.pipeline=new RenderPipeline(this.canvas,{
    layers:[{name:'dungeon',worldSpace:true},{name:'entities',worldSpace:true},{name:'fx',worldSpace:true},{name:'ui',worldSpace:false}],
    lighting:{enabled:true,ambient:{color:'#020204',intensity:0.05},applyAfterLayer:'fx'},
