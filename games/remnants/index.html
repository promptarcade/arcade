    ctx.fillStyle = shadeHex('#4a4540', ((h % 7) - 3) * 2);
    ctx.fillRect(sx, sy, ts, ts);
    // Rubble/debris from mining
    ctx.fillStyle = shadeHex('#4a4540', -8);
    ctx.fillRect(sx + ((h>>2)%6+3)*m, sy + ((h>>4)%6+5)*m, 2*m, 1.5*m);
    ctx.fillRect(sx + ((h>>5)%7+1)*m, sy + ((h>>7)%5+8)*m, 1.5*m, 1*m);
  },
});

var T_MINE_STAIRS_UP = TileRegistry.add({

var T_MINE_STAIRS_DOWN = TileRegistry.add({

    ctx.fillRect(sx + 6*m, sy + 9*m, 4*m, 0.8*m);

// Underground world manager — one per depth level
var Underground = {
  CHUNK_SIZE: 16,
  depth: 0,        // current depth (1+)
  active: false,   // whether player is underground
  layers: {},      // depth -> { chunks, tileChanges, entryX, entryY }

  getLayer: function(depth) {
    if (!this.layers[depth]) {
      this.layers[depth] = { chunks: {}, tileChanges: {} };
    }
    return this.layers[depth];
  },

  setTile: function(wx, wy, newType) {
    var layer = this.getLayer(this.depth);
    var tile = this.getTile(wx, wy);
    tile.type = newType;
    var cs = this.CHUNK_SIZE;
    var ck = Math.floor(wx/cs) + ',' + Math.floor(wy/cs);
    if (!layer.tileChanges[ck]) layer.tileChanges[ck] = {};
    layer.tileChanges[ck][wx + ',' + wy] = newType;
  },

  getTileChange: function(wx, wy) {
    var layer = this.getLayer(this.depth);
    var cs = this.CHUNK_SIZE;
    var ck = Math.floor(wx/cs) + ',' + Math.floor(wy/cs);
    return layer.tileChanges[ck] ? layer.tileChanges[ck][wx + ',' + wy] : undefined;
  },

  getChunk: function(cx, cy) {
    var layer = this.getLayer(this.depth);
    var key = cx + ',' + cy;
    if (layer.chunks[key]) return layer.chunks[key];
    var chunk = this.generateChunk(cx, cy);
    layer.chunks[key] = chunk;
    return chunk;
  },

  generateChunk: function(cx, cy) {
    var cs = this.CHUNK_SIZE;
    var tiles = [];
    var baseX = cx * cs, baseY = cy * cs;
    var seed = Overworld.seed + this.depth * 99991;
    var rng = overworldRng(seed + cx * 7919 + cy * 6271);
    var biome = UndergroundBiomeRegistry.getForDepth(this.depth);

    for (var ly = 0; ly < cs; ly++) {
      tiles[ly] = [];
      for (var lx = 0; lx < cs; lx++) {
        var wx = baseX + lx, wy = baseY + ly;
        // Default: solid rock
        var tileType = T_ROCK;

        // Biome generates caverns, ore, features
        if (biome && biome.generate) {
          tileType = biome.generate(wx, wy, this.depth, seed, rng);
        }

        tiles[ly][lx] = {
          type: tileType,
          biome: biome ? biome.id : 'rock',
          depth: this.depth,
        };

        // Apply persistent tile changes (mined tiles)
        var changed = this.getTileChange(wx, wy);
        if (changed !== undefined) {
          tiles[ly][lx].type = changed;
        }
      }
    }
    return { tiles: tiles, generated: true };
  },

  getTile: function(wx, wy) {
    var cs = this.CHUNK_SIZE;
    var cx = Math.floor(wx / cs), cy = Math.floor(wy / cs);
    var lx = ((wx % cs) + cs) % cs, ly = ((wy % cs) + cs) % cs;
    var chunk = this.getChunk(cx, cy);
    return chunk.tiles[ly][lx];
  },

  isPassable: function(wx, wy) {
    var tile = this.getTile(wx, wy);
    if (tile.type === T_ROCK) return false;
    if (TileRegistry.isSolid(tile.type)) return false;
    return true;
  },

  // Enter underground from overworld
  enter: function(game, wx, wy) {
    this.active = true;
    this.depth = 1;
    game.player._undergroundEntryX = wx;
    game.player._undergroundEntryY = wy;
    game.player._overworldX = game.player.x;
    game.player._overworldY = game.player.y;
    // Create entry point — clear a small area
    this.setTile(wx, wy, T_MINE_STAIRS_UP);
    for (var dx = -1; dx <= 1; dx++) {
      for (var dy = -1; dy <= 1; dy++) {
        if (dx === 0 && dy === 0) continue;
        var t = this.getTile(wx + dx, wy + dy);
        if (t.type === T_ROCK) this.setTile(wx + dx, wy + dy, T_MINE_FLOOR);
      }
    }
    game.player.x = wx;
    game.player.y = wy;
    game.player.mode = 'underground';
    game.pipeline._ambientColor = '#020202';
    game.pipeline._ambientIntensity = 0.02;
    GameUtils.addLog('You descend into the earth...', '#aa8866');
    GameEvents.fire('modeChange', game, 'underground');
  },

  // Exit to overworld
  exit: function(game) {
    this.active = false;
    game.player.x = game.player._overworldX;
    game.player.y = game.player._overworldY;
    game.player.mode = 'overworld';
    game.pipeline._ambientColor = '#0a1008';
    game.pipeline._ambientIntensity = 0.08;
    GameUtils.addLog('You return to the surface.', '#aaccff');
    GameEvents.fire('modeChange', game, 'overworld');
  },

  // Go deeper
  goDeeper: function(game, wx, wy) {
    this.depth++;
    // Clear entry area at new depth
    this.setTile(wx, wy, T_MINE_STAIRS_UP);
    for (var dx = -1; dx <= 1; dx++) {
      for (var dy = -1; dy <= 1; dy++) {
        if (dx === 0 && dy === 0) continue;
        if (this.getTile(wx + dx, wy + dy).type === T_ROCK) {
          this.setTile(wx + dx, wy + dy, T_MINE_FLOOR);
        }
      }
    }
    game.player.x = wx;
    game.player.y = wy;
    game.pipeline._ambientIntensity = Math.max(0.01, 0.02 - this.depth * 0.002);
    GameUtils.addLog('Depth ' + this.depth + '...', '#886644');
    var biome = UndergroundBiomeRegistry.getForDepth(this.depth);
    if (biome) GameUtils.addLog(biome.name, biome.accent || '#888');
    // Clear chunk cache for new depth (fresh generation)
    this.getLayer(this.depth).chunks = {};
  },

  // Go up a level
  goUp: function(game, wx, wy) {
    if (this.depth <= 1) {
      this.exit(game);
      return;
    }
    this.depth--;
    game.player.x = wx;
    game.player.y = wy;
    game.pipeline._ambientIntensity = Math.max(0.01, 0.02 - this.depth * 0.002);
    GameUtils.addLog('Ascended to depth ' + this.depth, '#aaccff');
    this.getLayer(this.depth).chunks = {};
  },
};

// Mining interaction — pickaxe on rock converts to mine floor + drops ore
TileRegistry.get(T_ROCK).onInteract = function(game, wx, wy) {
  var check = checkTool(game.player, 'mining');
  if (!check.allowed) {
    GameUtils.addLog(check.message, '#cc8844');
    return;
  }
  useTool(game.player, check.toolId);

  // Convert rock to floor
  Underground.setTile(wx, wy, T_MINE_FLOOR);

  // Ore drops based on depth and biome
  var biome = UndergroundBiomeRegistry.getForDepth(Underground.depth);
  var oreResult = null;
  if (biome && biome.oreTable) {
    var roll = Math.random();
    var cum = 0;

  if (oreResult) {
    var count = oreResult.min + Math.floor(Math.random() * (oreResult.max - oreResult.min + 1));

    GameUtils.addLog('+' + count + ' ' + oreResult.name, oreResult.color || '#888');

  }

  PlayerSkills.addXp(game.player.skills, 'mining', 3);
  SFX.hit();
};

// ============================================================
// SYSTEM: Village Reputation — quality attracts skilled visitors
// ============================================================
// Village reputation is calculated from:
//   - Food quality: better food items in player's bag
//   - Craft quality: number of unique recipes ever crafted
//   - Buildings: number and type of structures
// Higher reputation attracts more skilled travellers.
// Visitors rarely have skills exceeding the player's best skill.

var VillageReputation = {
  // Food quality scores
  FOOD_SCORES: {
    wheat: 1, carrot: 1, wild_berry: 1,
    dried_fish: 3, healing_salve: 3,
    fish_stew: 5, antidote: 4,
    sushi: 8, health_potion: 7,
    petal_essence: 6,
  },

  // Calculate current village reputation (0-100)
  calculate: function(game) {
    var p = game.player;
    var rep = 0;

    // Food quality — from bag AND from food stores
    var foodScore = 0;
    for (var id in this.FOOD_SCORES) {
      var count = p.bag[id] || 0;
      // Also count food in stores
      if (typeof BuildingManager !== 'undefined') {
        for (var bi = 0; bi < BuildingManager.buildings.length; bi++) {
          var bld = BuildingManager.buildings[bi];
          if (bld.stored && bld.stored[id]) count += bld.stored[id];
        }
      }
      if (count > 0) {
        foodScore += this.FOOD_SCORES[id] * Math.min(count, 10);
      }
    }
    rep += Math.min(35, foodScore); // food caps at 35 rep

    // Craft mastery — unique recipes ever crafted
    var craftCount = 0;
    if (p.craftedRecipes) {
      for (var name in p.craftedRecipes) craftCount++;
    }
    rep += Math.min(30, craftCount * 3); // recipes cap at 30 rep

    // Buildings — each building type contributes differently
    if (typeof BuildingManager !== 'undefined') {
      var buildings = BuildingManager.buildings;
      var buildScore = 0;
      for (var i = 0; i < buildings.length; i++) {
        var bp = buildings[i].blueprint;
        if (bp.isHome) buildScore += 3;
        else if (bp.isStore) buildScore += 5;
        else if (bp.isTavern) buildScore += 6;
        else if (bp.isTownHall) buildScore += 10;
        else if (bp.isStable) buildScore += 4;
        else buildScore += 2;
      }
      // Craft stores with stock give bonus
      for (var i = 0; i < buildings.length; i++) {
        var bld = buildings[i];
        if (bld.stored) {
          var itemCount = 0;
          for (var sid in bld.stored) itemCount += bld.stored[sid];
          buildScore += Math.min(5, Math.floor(itemCount / 3));
        }
      }
      rep += Math.min(25, buildScore); // buildings cap at 25 rep
    }

    // Player skill levels — skilled player attracts skilled visitors
    var playerBest = 0;
    var skillList = PlayerSkills.list(p.skills);
    for (var i = 0; i < skillList.length; i++) {
      if (skillList[i].level > playerBest) playerBest = skillList[i].level;
    }
    rep += Math.min(20, playerBest * 3); // player skill caps at 20 rep

    return Math.min(100, rep);
  },

  // Generate skill levels for a new visitor based on village reputation
  // Returns a skills object like NPC uses
  generateVisitorSkills: function(game) {
    var rep = this.calculate(game);
    var p = game.player;

    // Find player's best skill level
    var playerBest = 0;
    var skillList = PlayerSkills.list(p.skills);
    for (var i = 0; i < skillList.length; i++) {
      if (skillList[i].level > playerBest) playerBest = skillList[i].level;
    }

    // Base skill range depends on reputation
    // rep 0-20: skills 0-2
    // rep 20-50: skills 0-3
    // rep 50-80: skills 1-4
    // rep 80-100: skills 2-6
    var minSkill = 0, maxSkill = 2;
    if (rep >= 80) { minSkill = 2; maxSkill = 6; }
    else if (rep >= 50) { minSkill = 1; maxSkill = 4; }
    else if (rep >= 20) { minSkill = 0; maxSkill = 3; }

    // Cap: visitors rarely exceed player's best skill
    // 10% chance to exceed by 1, otherwise capped at player level
    var skillCap = playerBest;
    if (Math.random() < 0.1) skillCap = playerBest + 1;

    maxSkill = Math.min(maxSkill, Math.max(skillCap, 1));

    var skills = {};
    var skillNames = ['woodcutting', 'herbalism', 'gathering', 'combat', 'building'];
    for (var i = 0; i < skillNames.length; i++) {
      skills[skillNames[i]] = minSkill + Math.floor(Math.random() * (maxSkill - minSkill + 1));
    }

    // One or two skills should be notably higher (their speciality)
    var specCount = 1 + (Math.random() < 0.3 ? 1 : 0);
    for (var s = 0; s < specCount; s++) {
      var specIdx = Math.floor(Math.random() * skillNames.length);
      var bonus = 1 + Math.floor(rep / 30);
      skills[skillNames[specIdx]] = Math.min(skills[skillNames[specIdx]] + bonus, Math.max(skillCap, 1));
    }

    return skills;
  },
};

// Override NPC spawning to use village reputation for skill generation
var _origNpcConstructor = NPC;
NPC = function(wx, wy, opts) {

  if (!opts || !opts.skills) {

// ============================================================
// SYSTEM: Weather — rain, sun, storms, snow by season
// ============================================================

var Weather = {
  current: 'clear', // clear, cloudy, rain, storm, snow, fog
  intensity: 0,     // 0-1
  duration: 0,      // turns remaining
  particles: [],    // visual rain/snow particles

  // Weather weights by season: [clear, cloudy, rain, storm, snow, fog]
  seasonWeights: {
    Spring: [30, 25, 30, 10, 0, 5],
    Summer: [50, 20, 15, 10, 0, 5],
    Autumn: [20, 30, 25, 10, 5, 10],
    Winter: [15, 20, 10, 5, 40, 10],
  },

  roll: function() {
    var season = GameTime.seasonName();
    var weights = this.seasonWeights[season] || this.seasonWeights.Spring;
    var types = ['clear', 'cloudy', 'rain', 'storm', 'snow', 'fog'];
    var total = 0;
    for (var i = 0; i < weights.length; i++) total += weights[i];
    var r = Math.random() * total;
    var acc = 0;
    for (var i = 0; i < weights.length; i++) {
      acc += weights[i];
      if (r < acc) {
        this.current = types[i];
        this.intensity = 0.3 + Math.random() * 0.7;
        this.duration = 300 + Math.floor(Math.random() * 600); // 5-15 game-minutes
        return;
      }
    }
    this.current = 'clear';
    this.intensity = 0;
    this.duration = 500;
  },

  isBadWeather: function() {
    return this.current === 'rain' || this.current === 'storm' || this.current === 'snow';
  },

  // Farming yield multiplier based on weather
  farmingMult: function() {
    if (this.current === 'rain') return 1.3;
    if (this.current === 'storm') return 0.7;
    if (this.current === 'snow') return 0.3;
    if (this.current === 'clear') return 1.0;
    return 0.9;
  },
};

// Roll new weather periodically
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  if (Weather.duration > 0) {
    Weather.duration--;
  } else {
    Weather.roll();
  }
});

// Draw weather particles
GameEvents.on('update', function(game, dt) {
  if (game.player.mode !== 'overworld') return;
  var w = CONFIG.WIDTH, h = CONFIG.HEIGHT;
  var type = Weather.current;
  var intensity = Weather.intensity;

  // Manage particle count
  var targetCount = 0;
  if (type === 'rain') targetCount = Math.floor(intensity * 80);
  else if (type === 'storm') targetCount = Math.floor(intensity * 150);
  else if (type === 'snow') targetCount = Math.floor(intensity * 50);

  // Spawn particles
  while (Weather.particles.length < targetCount) {
    Weather.particles.push({
      x: Math.random() * w,
      y: -Math.random() * h * 0.2,
      vx: type === 'storm' ? (2 + Math.random() * 3) : (type === 'snow' ? (Math.random() - 0.5) * 0.5 : 0),
      vy: type === 'snow' ? (0.5 + Math.random() * 0.8) : (2 + Math.random() * 3),
      life: 1,
    });
  }
  // Remove excess
  while (Weather.particles.length > targetCount) Weather.particles.pop();

  // Update particles
  for (var i = Weather.particles.length - 1; i >= 0; i--) {
    var p = Weather.particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    if (p.y > h || p.x > w || p.x < -10) {
      p.x = Math.random() * w;
      p.y = -5;
      if (type === 'storm') p.x -= 50;
    }
  }
});

// Draw weather overlay on UI layer (screen space, not world space)
GameEvents.on('draw:ui', function(game, ctx) {
  if (game.player.mode !== 'overworld') return;
  if (StateStack.name() === 'title') return;
  var type = Weather.current;
  var intensity = Weather.intensity;
  var w = CONFIG.WIDTH, h = CONFIG.HEIGHT;

  // Atmosphere tint
  if (type === 'cloudy' || type === 'rain') {
    ctx.fillStyle = 'rgba(20,25,40,' + (0.08 * intensity).toFixed(3) + ')';
    ctx.fillRect(0, 0, w, h);
  } else if (type === 'storm') {
    ctx.fillStyle = 'rgba(10,10,30,' + (0.15 * intensity).toFixed(3) + ')';
    ctx.fillRect(0, 0, w, h);
    // Occasional lightning flash
    if (Math.random() < 0.002 * intensity) {
      ctx.fillStyle = 'rgba(200,200,255,0.15)';
      ctx.fillRect(0, 0, w, h);
    }
  } else if (type === 'fog') {
    ctx.fillStyle = 'rgba(180,180,180,' + (0.1 * intensity).toFixed(3) + ')';
    ctx.fillRect(0, 0, w, h);
  } else if (type === 'snow') {
    ctx.fillStyle = 'rgba(200,210,230,' + (0.06 * intensity).toFixed(3) + ')';
    ctx.fillRect(0, 0, w, h);
  }

  // Draw particles
  if (Weather.particles.length > 0) {
    if (type === 'rain' || type === 'storm') {
      ctx.strokeStyle = 'rgba(150,170,220,' + (0.3 * intensity).toFixed(2) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (var i = 0; i < Weather.particles.length; i++) {
        var p = Weather.particles[i];
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + p.vx * 2, p.y + p.vy * 2);
      }
      ctx.stroke();
    } else if (type === 'snow') {
      ctx.fillStyle = 'rgba(240,245,255,' + (0.6 * intensity).toFixed(2) + ')';
      for (var i = 0; i < Weather.particles.length; i++) {
        var p = Weather.particles[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5 + Math.sin(p.x * 0.1) * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Weather indicator — small icon in top right area
  var fs = Math.max(10, Math.round(w * 0.01));
  var weatherText = Weather.current.charAt(0).toUpperCase() + Weather.current.slice(1);
  var weatherColor = '#aaa';
  if (type === 'rain') weatherColor = '#6688cc';
  else if (type === 'storm') weatherColor = '#8866cc';
  else if (type === 'snow') weatherColor = '#aabbdd';
  else if (type === 'clear') weatherColor = '#ccaa44';
  else if (type === 'fog') weatherColor = '#999999';

  ctx.fillStyle = weatherColor;
  ctx.font = Math.round(fs * 0.9) + 'px Segoe UI';
  ctx.textAlign = 'right';
  ctx.fillText(weatherText, w - 10, CONFIG.HEIGHT * 0.07);
});

// Weather affects overworld lighting
GameEvents.on('draw:world', function(game, ctx) {

});

// ============================================================
// SYSTEM: Adventure Delegation — send NPCs to explore ruins
// ============================================================

// Track active expeditions
var Expeditions = {
  active: [], // { npc: name, startTurn: N, duration: N, dungeonSeed: N, risk: 0-1 }

  send: function(npc, game) {
    // Calculate duration based on NPC combat skill
    var combatLevel = npc.skills.combat || 0;
    var duration = 600 - combatLevel * 30; // 10 minutes minus skill bonus (in turns)
    duration = Math.max(200, duration);
    var risk = Math.max(0.05, 0.4 - combatLevel * 0.05); // death chance

    this.active.push({
      npcName: npc.name,
      startTurn: GameTime.turn,
      duration: duration,
      risk: risk,
      combatLevel: combatLevel,
    });

    // Remove NPC from overworld
    npc.state = 'adventuring';
    npc.alive = false; // temporarily remove from rendering/AI
    npc._adventuring = true;

    GameUtils.addLog(npc.name + ' sets off on an expedition (' + Math.round(duration/60) + ' min)', '#aaccff');
  },

  check: function(game) {
    for (var i = this.active.length - 1; i >= 0; i--) {
      var exp = this.active[i];
      if (GameTime.turn - exp.startTurn >= exp.duration) {
        this.active.splice(i, 1);
        this._resolve(exp, game);
      }
    }
  },

  _resolve: function(exp, game) {
    // Find the NPC by name
    var npc = null;
    for (var j = 0; j < NPCManager.npcs.length; j++) {

var T_TUNDRA_GROUND = TileRegistry.add({
  id: 105,
  name: 'tundra_ground',
  solid: false,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var h1 = ((wx * 374761393 + wy * 668265263) >>> 0);
    var h2 = (((h1 >> 13) ^ h1) * 1274126177) >>> 0;

    // Base: frozen earth — blue-grey-white, noise-driven for no banding
    var baseNoise = Math.sin(wx * 0.31 + wy * 0.47) * 0.5 + Math.sin(wx * 0.83 + wy * 0.19) * 0.5;
    var tint = Math.round(baseNoise * 12);
    ctx.fillStyle = shadeHex('#9ab0c2', tint);
    ctx.fillRect(sx, sy, ts, ts);

    // Snow coverage patches — organic blobs via multi-freq sine
    var snowNoise = Math.sin(wx * 0.6 + wy * 0.4) * 0.5 + Math.sin(wx * 1.3 + wy * 0.9) * 0.3 + Math.sin(wx * 2.1 + wy * 1.7) * 0.2;

      ctx.fillStyle = shadeHex('#dce8f0', tint + 4);

      ctx.fillRect(sx + pad, sy + pad, ts - pad * 2, ts - pad * 2);
    }

    // Frozen earth cracks — thin dark lines, hash-placed
    var crackNoise = Math.sin(wx * 0.9 + wy * 1.1) * 0.5 + Math.sin(wx * 2.3 + wy * 0.7) * 0.5;

      ctx.lineWidth = Math.max(0.5, m * 0.4);

      var cy1 = ((h2 >> 5) % 6 + 5) * m;

      var cy2 = cy1 + ((h2 >> 11) % 5 + 2) * m;

      ctx.moveTo(sx + cx1, sy + cy1);
      ctx.lineTo(sx + cx2, sy + cy2);

      if (crackNoise > 0.55) {
        ctx.beginPath();
        ctx.moveTo(sx + cx1 + m, sy + cy1 + m);
        ctx.lineTo(sx + cx1 + ((h2 >> 14) % 5 + 2) * m, sy + cy1 - 2 * m);
        ctx.stroke();
      }
    }

    // Frost crystals — bright white star-shaped dots via noise clusters
    var frostNoise = Math.sin(wx * 1.7 + wy * 2.3) * 0.5 + Math.sin(wx * 3.1 + wy * 1.3) * 0.5;
    if (frostNoise > 0.55) {
      ctx.fillStyle = 'rgba(240,250,255,0.85)';
      var fx = ((h2 >> 6) % 11 + 2) * m;
      var fy = ((h2 >> 9) % 9 + 3) * m;
      // Crystal: cross shape
      ctx.fillRect(sx + fx, sy + fy - m * 0.5, m * 0.8, m * 2);
      ctx.fillRect(sx + fx - m * 0.5, sy + fy, m * 2, m * 0.8);

      if (frostNoise > 0.72) {
        var fx2 = ((h2 >> 12) % 9 + 4) * m;
        var fy2 = ((h2 >> 15) % 7 + 6) * m;
        ctx.fillRect(sx + fx2, sy + fy2 - m * 0.5, m * 0.7, m * 1.8);
        ctx.fillRect(sx + fx2 - m * 0.5, sy + fy2, m * 1.8, m * 0.7);
      }
    }

    // Frozen puddle sheen — subtle lighter oval, noise-gated
    var puddleNoise = Math.sin(wx * 2.7 + wy * 1.9) * 0.5 + Math.sin(wx * 0.5 + wy * 3.1) * 0.5;

      ctx.lineWidth = Math.max(0.5, m * 0.3);
      ctx.beginPath();
      ctx.moveTo(sx + ((h2 >> 2) % 6 + 3) * m, sy + ((h2 >> 9) % 4 + 6) * m);
      ctx.lineTo(sx + ((h2 >> 6) % 7 + 5) * m, sy + ((h2 >> 11) % 3 + 8) * m);
      ctx.stroke();
    }

    // Sparse dead grass tufts — wind-bent, warm against cold ground
    var grassNoise = Math.sin(wx * 1.1 + wy * 0.8) * 0.5 + Math.sin(wx * 0.4 + wy * 2.2) * 0.5;
    if (grassNoise > 0.45) {
      ctx.fillStyle = '#8a8060';

        ctx.fillRect(sx + gx2 + m,     sy + gy2 - m,     m, m);
      }

// Frozen pond tile (solid — impassable ice sheet)
var T_FROZEN_POND = TileRegistry.add({
  id: 107,
  name: 'frozen_pond',
  solid: true,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var h1 = ((wx * 374761393 + wy * 668265263) >>> 0);
    var h2 = (((h1 >> 13) ^ h1) * 1274126177) >>> 0;

    // Ice base — pale blue-white
    var iceNoise = Math.sin(wx * 0.7 + wy * 0.5) * 6;
    ctx.fillStyle = shadeHex('#b8d8f0', Math.round(iceNoise));
    ctx.fillRect(sx, sy, ts, ts);

    // Deeper ice tone variation — organic depth patches
    var depthNoise = Math.sin(wx * 1.4 + wy * 1.1) * 0.5 + Math.sin(wx * 2.8 + wy * 0.7) * 0.5;
    if (depthNoise > 0.2) {
      ctx.fillStyle = 'rgba(100,160,210,0.25)';
      ctx.fillRect(sx + 2 * m, sy + 2 * m, ts - 4 * m, ts - 4 * m);
    }
    if (depthNoise < -0.2) {
      ctx.fillStyle = 'rgba(200,230,255,0.2)';
      ctx.fillRect(sx + m, sy + 3 * m, ts - 2 * m, ts - 5 * m);
    }

    // Primary crack network — branching lines
    ctx.strokeStyle = 'rgba(80,130,180,0.55)';
    ctx.lineWidth = Math.max(0.5, m * 0.45);

    // Main crack — diagonal, placed by hash
    var ax = ((h2 >> 2) % 6 + 1) * m;
    var ay = ((h2 >> 5) % 4 + 1) * m;
    var bx = ((h2 >> 8) % 6 + 8) * m;
    var by = ((h2 >> 11) % 5 + 9) * m;
    ctx.beginPath();
    ctx.moveTo(sx + ax, sy + ay);
    ctx.lineTo(sx + bx, sy + by);
    ctx.stroke();

    // Branch crack from midpoint
    var mx2 = (ax + bx) * 0.5, my2 = (ay + by) * 0.5;
    ctx.strokeStyle = 'rgba(80,130,180,0.35)';
    ctx.lineWidth = Math.max(0.5, m * 0.3);
    ctx.beginPath();
    ctx.moveTo(sx + mx2, sy + my2);
    ctx.lineTo(sx + mx2 + ((h2 >> 14) % 5 - 2) * m, sy + my2 - ((h2 >> 1) % 4 + 2) * m);
    ctx.stroke();

    // Second shorter crack
    var cx2 = ((h2 >> 4) % 8 + 4) * m;
    var cy2 = ((h2 >> 7) % 5 + 2) * m;
    ctx.beginPath();
    ctx.moveTo(sx + cx2, sy + cy2);
    ctx.lineTo(sx + cx2 + ((h2 >> 9) % 5 + 2) * m, sy + cy2 + ((h2 >> 12) % 4 + 1) * m);
    ctx.stroke();

    // Frost star pattern at crack intersection
    ctx.strokeStyle = 'rgba(220,240,255,0.7)';
    ctx.lineWidth = Math.max(0.5, m * 0.35);
    var fx = ((h2 >> 6) % 10 + 3) * m;
    var fy = ((h2 >> 3) % 8 + 4) * m;
    // Six-point burst
    for (var i = 0; i < 3; i++) {
      var angle = (i / 3) * Math.PI;
      var flen = ((h2 >> (i * 3)) % 2 + 2) * m;
      ctx.beginPath();
      ctx.moveTo(sx + fx - Math.cos(angle) * flen, sy + fy - Math.sin(angle) * flen);
      ctx.lineTo(sx + fx + Math.cos(angle) * flen, sy + fy + Math.sin(angle) * flen);
      ctx.stroke();
    }

    // Surface sheen — bright highlight strip from overhead light
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(sx + 3 * m, sy + 2 * m, ts - 8 * m, m * 1.5);

    // Edge darkening — ice thinner at border, darker
    ctx.strokeStyle = 'rgba(60,110,160,0.3)';
    ctx.lineWidth = Math.max(0.5, m * 0.5);
    ctx.strokeRect(sx + 0.5, sy + 0.5, ts - 1, ts - 1);

    // Tiny trapped bubble
    if ((h2 % 5) === 0) {
      ctx.fillStyle = 'rgba(180,220,255,0.6)';
      ctx.beginPath();
      ctx.arc(sx + ((h2 >> 8) % 10 + 3) * m, sy + ((h2 >> 11) % 8 + 4) * m, m * 0.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(140,190,240,0.5)';
      ctx.lineWidth = Math.max(0.3, m * 0.25);
      ctx.stroke();
    }
  },
});

    var caveNoise = overworldFbm(wx, wy, seed + 70000, 3, 0.055);

    // Open cavern — threshold 0.32 for more open space
    if (caveNoise < 0.32) {
      // Crystal pools in the most open areas (center of caverns)
      if (caveNoise < 0.15) {
        var poolNoise = overworldNoise(wx, wy, seed + 71000, 0.08);
        if (poolNoise < 0.35) return T_CRYSTAL_POOL;

      if (fungusRoll > 0.95) return T_GLOWING_FUNGUS;

    }

    // Obsidian in tight spaces — narrow band between solid and cave
    if (caveNoise > 0.75 && caveNoise < 0.78) return T_OBSIDIAN;

    var specialNoise = overworldNoise(wx, wy, seed + 73000, 0.07);

  // Ore table — what drops when mining rock in this biome
  oreTable: [
    { id: 'stone', name: 'Stone', chance: 0.30, min: 1, max: 2, color: '#aaa' },
    { id: 'iron_ore', name: 'Iron Ore', chance: 0.20, min: 1, max: 1, color: '#cc8844' },
    { id: 'copper_ore', name: 'Copper Ore', chance: 0.15, min: 1, max: 1, color: '#cc7744' },
    { id: 'flint', name: 'Flint', chance: 0.10, min: 1, max: 1, color: '#666655' },
    { id: 'gold_ore', name: 'Gold Ore', chance: 0.05, min: 1, max: 1, color: '#ddaa33' },
    { id: 'gem', name: 'Gem', chance: 0.02, min: 1, max: 1, color: '#66aadd' },
    // 0.18 chance = nothing extra
  ],

  // Generate tile type for a world position
  generate: function(wx, wy, depth, seed, rng) {
    // Cave noise — larger cavern pockets than soil (scale 0.07, threshold 0.25)
    var caveNoise = overworldFbm(wx, wy, seed + 60000, 3, 0.07);

    // Open caverns
    if (caveNoise < 0.25) return T_LIMESTONE_CAVE;

    // Underground streams — near cavern edges where water collects
    var waterNoise = overworldNoise(wx, wy, seed + 70000, 0.06);
    if (waterNoise < 0.12 && caveNoise < 0.35) return T_UNDERGROUND_STREAM;

    // Ore veins in solid rock
    var oreNoise = overworldNoise(wx, wy, seed + 80000, 0.1);

    // Iron veins — most common ore
    if (oreNoise > 0.88) return T_IRON_VEIN_UG;

    // Copper veins
    if (oreNoise > 0.85) return T_COPPER_VEIN_UG;

    // Default solid tile is limestone (not generic rock)
    return T_LIMESTONE;
  },
});

// Crop definitions

  carrot: { seed: 'carrot_seed', harvest: 'carrot', growTime: 300, stages: 4, color: ['#665522','#557733','#448833','#ee8833'] },

// Farm plot tile — stores crop data in the overworld tile object
var T_FARM_PLOT = TileRegistry.add({
  id: 210,
  name: 'farm_plot',
  solid: false,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    // Tilled soil
    ctx.fillStyle = '#4a3a22';
    ctx.fillRect(sx, sy, ts, ts);
    // Furrow lines
    ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = Math.max(0.5, m * 0.4);
    for (var i = 1; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(sx, sy + i * 4 * m); ctx.lineTo(sx + ts, sy + i * 4 * m); ctx.stroke();
    }
    // Lighter ridge tops
    ctx.fillStyle = '#5a4a30';
    for (var i = 0; i < 4; i++) {
      ctx.fillRect(sx, sy + i * 4 * m, ts, m);
    }

    // Draw crop if planted
    var tile = Overworld.getTile(wx, wy);
    if (tile.crop) {
      var crop = CROPS[tile.crop];
      if (crop) {
        var stage = Math.min(crop.stages - 1, Math.floor((tile.cropGrowth || 0) / crop.growTime * crop.stages));
        var col = crop.color[stage];

        if (stage === 0) {
          // Seedling — tiny dots
          ctx.fillStyle = col;
          ctx.fillRect(sx + 4*m, sy + 6*m, 1*m, 2*m);
          ctx.fillRect(sx + 8*m, sy + 5*m, 1*m, 2*m);
          ctx.fillRect(sx + 12*m, sy + 7*m, 1*m, 2*m);
        } else if (stage === 1) {
          // Sprout — small stalks
          ctx.fillStyle = col;
          ctx.fillRect(sx + 3*m, sy + 4*m, 1*m, 5*m);
          ctx.fillRect(sx + 7*m, sy + 3*m, 1*m, 6*m);
          ctx.fillRect(sx + 11*m, sy + 5*m, 1*m, 4*m);
          ctx.fillStyle = '#44aa44';
          ctx.fillRect(sx + 2*m, sy + 4*m, 2*m, 1*m);
          ctx.fillRect(sx + 7*m, sy + 3*m, 2*m, 1*m);
        } else if (stage === 2) {
          // Growing — leafy
          ctx.fillStyle = '#44aa44';
          ctx.fillRect(sx + 2*m, sy + 2*m, 3*m, 7*m);
          ctx.fillRect(sx + 6*m, sy + 1*m, 3*m, 8*m);
          ctx.fillRect(sx + 10*m, sy + 3*m, 3*m, 6*m);
          ctx.fillStyle = col;
          ctx.fillRect(sx + 3*m, sy + 1*m, 1.5*m, 2*m);
          ctx.fillRect(sx + 7*m, sy + 0*m, 1.5*m, 2*m);
          ctx.fillRect(sx + 11*m, sy + 2*m, 1.5*m, 2*m);
        } else {
          // Ready to harvest — full, colorful
          var sway = Math.sin(animTimer * 1.5 + wx) * m * 0.3;
          ctx.fillStyle = '#338833';
          ctx.fillRect(sx + 1*m + sway, sy + 1*m, 4*m, 10*m);
          ctx.fillRect(sx + 6*m - sway, sy + 0*m, 4*m, 11*m);
          ctx.fillRect(sx + 11*m + sway, sy + 2*m, 3*m, 9*m);
          ctx.fillStyle = col;
          ctx.beginPath(); ctx.arc(sx + 3*m + sway, sy + 1*m, 2*m, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(sx + 8*m - sway, sy + 0*m, 2.5*m, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(sx + 12*m + sway, sy + 2*m, 2*m, 0, Math.PI * 2); ctx.fill();
        }

        // Growth indicator if not ready
        if (tile.cropGrowth < crop.growTime) {
          var pct = tile.cropGrowth / crop.growTime;
          ctx.fillStyle = '#222'; ctx.fillRect(sx + 2, sy + ts - 4, ts - 4, 2);
          ctx.fillStyle = '#44aa44'; ctx.fillRect(sx + 2, sy + ts - 4, (ts - 4) * pct, 2);
        }
      }
    }
  },
  onInteract: function(game, wx, wy) {
    var tile = Overworld.getTile(wx, wy);
    if (tile.crop) {
      var crop = CROPS[tile.crop];
      if (crop && tile.cropGrowth >= crop.growTime) {
        // Harvest
        var level = PlayerSkills.getLevel(game.player.skills, 'farming');
        var yield_ = 2 + Math.floor(level / 2) + (Math.random() < 0.3 ? 1 : 0);
        // Weather bonus
        yield_ = Math.max(1, Math.round(yield_ * Weather.farmingMult()));
        Bag.add(game.player.bag, crop.harvest, yield_);
        // Chance to get seeds back
        if (Math.random() < 0.4 + level * 0.05) {
          Bag.add(game.player.bag, crop.seed, 1);
        }
        var result = PlayerSkills.addXp(game.player.skills, 'farming', 10);
        var def = ResourceRegistry.get(crop.harvest);
        GameUtils.addLog('+' + yield_ + ' ' + (def ? def.name : crop.harvest), def ? def.color : '#aaa');
        GameUtils.addFloating(wx, wy, '+' + yield_, def ? def.color : '#aaa');
        tile.crop = null;
        tile.cropGrowth = 0;
        SFX.heal();
        if (result.leveled) {
          GameUtils.addLog('Farming level ' + result.level + '!', '#ffcc44');
          SFX.stairs();
        }
      } else if (crop) {
        var pct = Math.round((tile.cropGrowth / crop.growTime) * 100);
        GameUtils.addLog(crop.harvest + ' growing... ' + pct + '%', '#888');
      }
    } else {
      // Open planting menu
      game._farmTile = { wx: wx, wy: wy };
      StateStack.push(PlantingState);
    }
  },
});

// Planting state — choose what to plant
var PlantingState = {
  name: 'planting',
  drawBelow: true,
  _cursor: 0,

  onEnter: function(game) { this._cursor = 0; },

  onKey: function(game, key) {
    var lk = key.toLowerCase();
    var plantable = [];
    for (var id in CROPS) {
      if (Bag.has(game.player.bag, CROPS[id].seed)) plantable.push(id);
    }
    if (lk === 'escape') { StateStack.pop(); return true; }
    if (key === 'ArrowUp' || lk === 'w') { this._cursor = (this._cursor - 1 + Math.max(1, plantable.length)) % Math.max(1, plantable.length); return true; }
    if (key === 'ArrowDown' || lk === 's') { this._cursor = (this._cursor + 1) % Math.max(1, plantable.length); return true; }
    if (lk === 'enter' || lk === ' ' || lk === 'e') {
      if (plantable.length > 0) {
        var cropId = plantable[this._cursor];
        var crop = CROPS[cropId];
        Bag.remove(game.player.bag, crop.seed, 1);
        var ft = game._farmTile;
        var tile = Overworld.getTile(ft.wx, ft.wy);
        tile.crop = cropId;
        tile.cropGrowth = 0;
        SFX.place();
        GameUtils.addLog('Planted ' + cropId, '#ddcc55');
      }
      StateStack.pop();
      return true;
    }
    return true;
  },

  onDraw: function(game, ctx) {
    var w = CONFIG.WIDTH, h = CONFIG.HEIGHT;
    var fs = Math.max(13, Math.round(w * 0.014));
    var plantable = [];
    for (var id in CROPS) {
      if (Bag.has(game.player.bag, CROPS[id].seed)) plantable.push(id);
    }

    var boxW = Math.min(300, w * 0.35), boxH = fs * (plantable.length * 2.5 + 4);
    var bx = (w - boxW) / 2, by = (h - boxH) / 2;
    ctx.fillStyle = 'rgba(10, 8, 5, 0.92)'; ctx.fillRect(bx, by, boxW, boxH);
    ctx.strokeStyle = '#665522'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, boxW, boxH);

    var ty = by + fs * 1.5;
    ctx.fillStyle = '#ddcc55'; ctx.font = 'bold ' + Math.round(fs * 1.2) + 'px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('PLANT SEEDS', w / 2, ty); ty += fs * 2;

    if (plantable.length === 0) {
      ctx.fillStyle = '#888'; ctx.font = fs + 'px Segoe UI';
      ctx.fillText('No seeds in bag', w / 2, ty);
    } else {
      ctx.textAlign = 'left';
      for (var i = 0; i < plantable.length; i++) {
        var id = plantable[i];
        var crop = CROPS[id];
        var seedDef = ResourceRegistry.get(crop.seed);
        var sel = i === this._cursor;
        if (sel) {
          ctx.fillStyle = 'rgba(60,50,20,0.5)';
          ctx.fillRect(bx + 8, ty - fs * 0.4, boxW - 16, fs * 2.2);
        }
        ctx.fillStyle = sel ? '#fff' : '#aaa';
        ctx.font = (sel ? 'bold ' : '') + fs + 'px Segoe UI';
        ctx.fillText(id.charAt(0).toUpperCase() + id.slice(1), bx + 16, ty + fs * 0.5);
        ctx.fillStyle = '#888'; ctx.font = Math.round(fs * 0.75) + 'px Segoe UI';
        ctx.fillText('Seeds: ' + (game.player.bag[crop.seed] || 0) + '  Growth: ' + Math.round(crop.growTime / 60) + ' min', bx + 16, ty + fs * 1.4);
        ty += fs * 2.5;
      }
    }

    ctx.fillStyle = '#666'; ctx.font = Math.round(fs * 0.8) + 'px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('[ENTER] Plant    [ESC] Cancel', w / 2, by + boxH - fs * 0.8);
  },
};

// Crops grow over time
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  // Grow all planted crops in loaded chunks
  for (var key in Overworld.chunks) {
    var chunk = Overworld.chunks[key];
    if (!chunk || !chunk.tiles) continue;
    for (var y = 0; y < Overworld.CHUNK_SIZE; y++) {
      for (var x = 0; x < Overworld.CHUNK_SIZE; x++) {
        var tile = chunk.tiles[y][x];
        if (tile.type === T_FARM_PLOT && tile.crop && tile.cropGrowth !== undefined) {
          var crop = CROPS[tile.crop];
          if (crop && tile.cropGrowth < crop.growTime) {
            // Weather affects growth rate
            var rate = Weather.farmingMult();
            tile.cropGrowth += rate;
          }
        }
      }
    }
  }
});

// --- Tile: active fishing spot (shallow water edge with reeds and fish shadow) ---
var T_FISHING_SPOT = TileRegistry.add({
  id: 160,
  name: 'fishing_spot',
  solid: false,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var h = ((wx * 374761393 + wy * 668265263) >>> 0);

    // Shallow water base — lighter than deep water
    ctx.fillStyle = '#1e4060';
    ctx.fillRect(sx, sy, ts, ts);

    // Inner lighter water
    ctx.fillStyle = '#245070';
    ctx.fillRect(sx + m, sy + m, ts - 2*m, ts - 2*m);

    // Sandy/muddy shallows tint along bottom edge
    ctx.fillStyle = 'rgba(160, 130, 80, 0.18)';
    ctx.fillRect(sx, sy + ts - 4*m, ts, 4*m);

    // Animated ripples
    var rph = animTimer * 1.4 + (h & 0xff) * 0.025;
    ctx.fillStyle = 'rgba(90, 180, 255, 0.22)';
    var ry1 = sy + ts * 0.28 + Math.sin(rph) * ts * 0.07;
    ctx.fillRect(sx + 2*m, ry1, ts - 4*m, Math.max(1, m * 0.7));
    var ry2 = sy + ts * 0.58 + Math.sin(rph + 1.8) * ts * 0.07;
    ctx.fillRect(sx + 3*m, ry2, ts - 6*m, Math.max(1, m * 0.6));
    ctx.fillStyle = 'rgba(140, 210, 255, 0.14)';
    var ry3 = sy + ts * 0.43 + Math.sin(rph + 3.4) * ts * 0.05;
    ctx.fillRect(sx + 5*m, ry3, ts * 0.35, Math.max(1, m * 0.5));

    // Reeds — 2–3 tall stems growing from bottom, positions from hash
    var reedSway = Math.sin(animTimer * 1.1 + (h >> 4) * 0.08) * m * 0.6;
    ctx.fillStyle = '#3a6a30';
    // Reed 1
    var rx1 = sx + ((h % 5) + 2) * m;
    ctx.fillRect(rx1 + reedSway, sy + 5*m, m * 0.8, ts - 5*m);
    // Reed head 1
    ctx.fillStyle = '#5a4a20';
    ctx.fillRect(rx1 + reedSway - m * 0.2, sy + 4*m, m * 1.2, m * 2);
    // Reed 2
    ctx.fillStyle = '#3a6a30';
    var rx2 = sx + (((h >> 6) % 4) + 9) * m;
    ctx.fillRect(rx2 - reedSway * 0.7, sy + 7*m, m * 0.8, ts - 7*m);
    ctx.fillStyle = '#5a4a20';
    ctx.fillRect(rx2 - reedSway * 0.7 - m * 0.2, sy + 6*m, m * 1.2, m * 1.8);
    // Optional 3rd thin reed
    if ((h >> 12) % 3 === 0) {
      ctx.fillStyle = '#4a7a38';
      var rx3 = sx + (((h >> 9) % 3) + 5) * m;
      ctx.fillRect(rx3 + reedSway * 0.5, sy + 8*m, m * 0.6, ts - 8*m);
    }

    // Fish shadow drifting beneath surface
    var fishPhase = animTimer * 0.55 + (h >> 3) * 0.04;
    var fishX = sx + ts * 0.5 + Math.sin(fishPhase) * ts * 0.22;
    var fishY = sy + ts * 0.55 + Math.cos(fishPhase * 0.7) * ts * 0.08;
    ctx.fillStyle = 'rgba(10, 30, 55, 0.45)';
    // Body
    ctx.beginPath();
    ctx.ellipse(fishX, fishY, m * 2.6, m * 0.9, Math.sin(fishPhase) * 0.25, 0, Math.PI * 2);
    ctx.fill();
    // Tail fin
    var tailDir = Math.sin(fishPhase) >= 0 ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(fishX - tailDir * m * 2.2, fishY);
    ctx.lineTo(fishX - tailDir * m * 3.8, fishY - m * 0.9);
    ctx.lineTo(fishX - tailDir * m * 3.8, fishY + m * 0.9);
    ctx.closePath();
    ctx.fill();

    // Sparkle on water to draw player attention
    var sparkle = 0.5 + Math.sin(animTimer * 3.2 + (h & 0xf) * 0.4) * 0.5;
    ctx.fillStyle = 'rgba(200, 240, 255, ' + (sparkle * 0.55).toFixed(2) + ')';
    ctx.beginPath();
    ctx.arc(sx + (((h >> 2) % 8) + 4) * m, sy + (((h >> 5) % 5) + 3) * m, m * 0.5, 0, Math.PI * 2);
    ctx.fill();
  },
});

// --- Tile: fished-out spot (water edge without fish, reeds bent) ---
var T_FISHED_OUT = TileRegistry.add({
  id: 161,
  name: 'fished_out',
  solid: false,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var h = ((wx * 374761393 + wy * 668265263) >>> 0);

    // Same shallow water base
    ctx.fillStyle = '#1e4060';
    ctx.fillRect(sx, sy, ts, ts);
    ctx.fillStyle = '#245070';
    ctx.fillRect(sx + m, sy + m, ts - 2*m, ts - 2*m);

    // Muddy shallows
    ctx.fillStyle = 'rgba(160, 130, 80, 0.18)';
    ctx.fillRect(sx, sy + ts - 4*m, ts, 4*m);

    // Slow, faint ripple — fish are gone
    var rph = animTimer * 0.7 + (h & 0xff) * 0.025;
    ctx.fillStyle = 'rgba(90, 180, 255, 0.10)';
    var ry1 = sy + ts * 0.35 + Math.sin(rph) * ts * 0.05;
    ctx.fillRect(sx + 3*m, ry1, ts - 6*m, Math.max(1, m * 0.5));
    var ry2 = sy + ts * 0.62 + Math.sin(rph + 2.1) * ts * 0.05;
    ctx.fillRect(sx + 4*m, ry2, ts - 8*m, Math.max(1, m * 0.4));

    // Bent/drooping reeds — same positions as active spot
    var rx1 = sx + ((h % 5) + 2) * m;
    ctx.fillStyle = '#2a5228';
    ctx.fillRect(rx1, sy + 7*m, m * 0.7, ts - 7*m);
    ctx.fillStyle = '#4a3a18';
    ctx.fillRect(rx1 - m * 0.3, sy + 6*m, m * 1.0, m * 1.5);

    var rx2 = sx + (((h >> 6) % 4) + 9) * m;
    ctx.fillStyle = '#2a5228';
    ctx.fillRect(rx2, sy + 9*m, m * 0.7, ts - 9*m);
    ctx.fillStyle = '#4a3a18';
    ctx.fillRect(rx2 - m * 0.2, sy + 8*m, m * 1.0, m * 1.5);

    // Ripple ring left by bait — fades
    ctx.strokeStyle = 'rgba(100, 180, 255, 0.15)';
    ctx.lineWidth = Math.max(0.4, m * 0.3);
    ctx.beginPath();
    ctx.ellipse(sx + 8*m, sy + 9*m, 3*m, 1.5*m, 0, 0, Math.PI * 2);
    ctx.stroke();
  },
});

// --- Skill registration ---
SkillRegistry.add({
  id: 'fishing',
  name: 'Fishing',
  color: '#4488cc',
  tileIds: [T_FISHING_SPOT],

  populate: function(tile, biome, wx, wy, rng) {
    if (tile.type === T.WALL || tile.type === T.WATER) return null;
    // Only on beach tiles adjacent to water/shallows
    if (tile.type !== T.BEACH) return null;
    // Sparse — not every shore tile gets fish
    var chance = biome.id === 'swamp' ? 0.06 : 0.02;
    if (rng() < chance) return T_FISHING_SPOT;
    return null;
  },

  onInteract: function(game, tileType, wx, wy) {
    if (tileType !== T_FISHING_SPOT) return false;

    var p = game.player;
    var level = PlayerSkills.getLevel(p.skills, 'fishing');

    // Check for bait in bag — worm improves catch quality
    var hasBait = Bag.has(p.bag, 'worm', 1);
    if (hasBait) Bag.remove(p.bag, 'worm', 1);

    // Base catch roll — bait shifts thresholds toward rarer fish
    var roll = Math.random();
    var baitBonus = hasBait ? 0.12 : 0;
    var levelBonus = level * 0.015;

    // Thresholds (before bonuses): trout <0.70, salmon <0.90, golden carp beyond
    // Level and bait push the rare boundary down (easier to get rarer fish)
    var salmonThresh    = 0.70 - baitBonus - levelBonus;
    var carpThresh      = 0.90 - baitBonus * 1.5 - levelBonus * 1.5;
    // Golden Carp requires level 5+
    var carpAllowed     = level >= 5;

    var fishId, fishName, fishColor, xp;

    if (carpAllowed && roll >= carpThresh) {
      fishId    = 'golden_carp';
      fishName  = 'Golden Carp';
      fishColor = '#ffcc22';
      xp        = 8;
    } else if (roll >= salmonThresh) {
      fishId    = 'salmon';
      fishName  = 'Salmon';
      fishColor = '#dd7744';
      xp        = 5;
    } else {
      fishId    = 'trout';
      fishName  = 'Trout';
      fishColor = '#6688aa';
      xp        = 3;
    }

    Bag.add(p.bag, fishId, 1);

    var result = PlayerSkills.addXp(p.skills, 'fishing', xp);

    // Mark spot as fished out
    Overworld.setTile(wx, wy, T_FISHED_OUT);

    var baitMsg = hasBait ? ' (bait)' : '';
    var logMsg  = '+1 ' + fishName + baitMsg;
    SFX.heal(); // soft pleasant chime on a catch
    game.addLog(logMsg, fishColor);
    game.addFloating(wx, wy, '+1 ' + fishName, fishColor);

    if (result.leveled) {
      game.addLog('Fishing level ' + result.level + '!', '#ffcc44');
      SFX.stairs();
    }
    return true;
  },

  recipes: [
    { skill: 'fishing', level: 1, name: 'Dried Fish',  input: { trout: 3 },                       output: { dried_fish: 2 } },
    { skill: 'fishing', level: 3, name: 'Fish Stew',   input: { salmon: 1, carrot: 1 },            output: { fish_stew: 1 }, requires: ['Dried Fish'] },
    { skill: 'fishing', level: 5, name: 'Sushi',       input: { golden_carp: 1 },                  output: { sushi: 3 }, requires: ['Fish Stew'] },
  ],
});

RecipeRegistry.addAll(SkillRegistry.get('fishing').recipes);

// Dock tile — built on water's edge, enables deep water fishing
var T_DOCK = TileRegistry.add({
  id: 163, name: 'dock', solid: false,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    // Water underneath
    ctx.fillStyle = '#1a3050';
    ctx.fillRect(sx, sy, ts, ts);
    ctx.fillStyle = 'rgba(80,150,230,0.1)';
    ctx.fillRect(sx, sy + ts * 0.4 + Math.sin(animTimer + (wx||0)) * 2, ts, 2);
    // Wooden planks
    ctx.fillStyle = '#7a6a45';
    ctx.fillRect(sx + 2*m, sy + 3*m, 12*m, 10*m);
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.5;
    for (var i = 0; i < 5; i++) ctx.strokeRect(sx + 2*m, sy + 3*m + i * 2*m, 12*m, 2*m);
    // Posts
    ctx.fillStyle = '#5a4a30';
    ctx.fillRect(sx + 2*m, sy + 2*m, 2*m, 12*m);
    ctx.fillRect(sx + 12*m, sy + 2*m, 2*m, 12*m);
  },
  onInteract: function(game, wx, wy) {
    // Deep water fishing — better catch rates
    var p = game.player;
    var check = checkTool(p, 'fishing');
    if (!check.allowed) { GameUtils.addLog(check.message, '#cc8844'); return; }
    var level = PlayerSkills.getLevel(p.skills, 'fishing');
    // Better odds from dock
    var roll = Math.random();
    var fishId, fishName, fishColor, xp;
    if (roll < 0.1 + level * 0.02) { fishId = 'golden_carp'; fishName = 'Golden Carp'; fishColor = '#ffcc44'; xp = 10; }
    else if (roll < 0.4 + level * 0.03) { fishId = 'salmon'; fishName = 'Salmon'; fishColor = '#dd7744'; xp = 6; }
    else { fishId = 'trout'; fishName = 'Trout'; fishColor = '#6688aa'; xp = 4; }
    Bag.add(p.bag, fishId, 1);
    if (check.toolId) useTool(p, check.toolId);
    var result = PlayerSkills.addXp(p.skills, 'fishing', xp);
    GameUtils.addLog('+1 ' + fishName + ' (from dock)', fishColor);
    GameUtils.addFloating(wx, wy, '+' + fishName, fishColor);
    SFX.heal();
    if (result.leveled) { GameUtils.addLog('Fishing level ' + result.level + '!', '#ffcc44'); }
  },
});

var T_ROCK = TileRegistry.add({
  id: 140, name: 'rock', solid: false,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var grassDraw = TileRegistry.getDrawer(T_GRASS);
    if (grassDraw) grassDraw(ctx, sx, sy, ts, visible, animTimer, wx || 0, wy || 0);
    var hash = (((wx||0) * 8117 + (wy||0) * 4523) >>> 0);
    var variant = hash % 3;
    // Rock varieties
    if (variant === 0) {
      // Single rounded boulder
      ctx.fillStyle = '#6a6a6a';
      ctx.beginPath(); ctx.ellipse(sx + 8*m, sy + 10*m, 3.5*m, 2.5*m, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#7a7a7a';
      ctx.beginPath(); ctx.ellipse(sx + 7.5*m, sy + 9.5*m, 2.5*m, 1.8*m, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#8a8a88';
      ctx.fillRect(sx + 6*m, sy + 8.5*m, 2*m, 1*m);
    } else if (variant === 1) {
      // Cluster of small stones
      ctx.fillStyle = '#707068';
      ctx.beginPath(); ctx.ellipse(sx + 5*m, sy + 10*m, 2*m, 1.5*m, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#686860';
      ctx.beginPath(); ctx.ellipse(sx + 9*m, sy + 11*m, 2.2*m, 1.3*m, -0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#787870';
      ctx.beginPath(); ctx.ellipse(sx + 7*m, sy + 9*m, 1.5*m, 1*m, 0.5, 0, Math.PI*2); ctx.fill();
    } else {
      // Flat slate-like stone
      ctx.fillStyle = '#5a5a60';
      ctx.beginPath();
      ctx.moveTo(sx + 4*m, sy + 11*m); ctx.lineTo(sx + 7*m, sy + 8*m);
      ctx.lineTo(sx + 12*m, sy + 9*m); ctx.lineTo(sx + 11*m, sy + 12*m);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#6a6a70';
      ctx.fillRect(sx + 6*m, sy + 9*m, 4*m, 1.5*m);
    }
  },
});

var T_INSECT_SPOT = TileRegistry.add({
  id: 141, name: 'insect_spot', solid: false,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var grassDraw = TileRegistry.getDrawer(T_GRASS);
    if (grassDraw) grassDraw(ctx, sx, sy, ts, visible, animTimer, wx || 0, wy || 0);
    var hash = (((wx||0) * 6151 + (wy||0) * 3307) >>> 0);
    var type = hash % 3; // beetle, butterfly, cricket
    var bob = Math.sin(animTimer * 3 + hash) * m * 0.5;
    if (type === 0) {
      // Beetle — small dark oval
      ctx.fillStyle = '#334422';
      ctx.beginPath(); ctx.ellipse(sx + 8*m, sy + 9*m + bob, 1.2*m, 0.8*m, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#224411';
      ctx.beginPath(); ctx.ellipse(sx + 8*m, sy + 9*m + bob, 0.8*m, 0.5*m, 0, 0, Math.PI*2); ctx.fill();
      // Legs
      ctx.strokeStyle = '#334422'; ctx.lineWidth = Math.max(0.3, m*0.2);
      ctx.beginPath(); ctx.moveTo(sx + 7*m, sy + 9*m + bob); ctx.lineTo(sx + 6*m, sy + 10*m + bob); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx + 9*m, sy + 9*m + bob); ctx.lineTo(sx + 10*m, sy + 10*m + bob); ctx.stroke();
    } else if (type === 1) {
      // Butterfly — wings flapping
      var flap = Math.sin(animTimer * 6 + hash) * m * 1.5;
      ctx.fillStyle = '#dd88cc';
      ctx.beginPath(); ctx.ellipse(sx + 6.5*m, sy + 8*m + bob, 1.5*m + flap*0.3, 1.2*m, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(sx + 9.5*m, sy + 8*m + bob, 1.5*m + flap*0.3, 1.2*m, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.fillRect(sx + 7.5*m, sy + 7.5*m + bob, 1*m, 2*m); // body
    } else {
      // Cricket — small with long legs
      ctx.fillStyle = '#556633';
      ctx.beginPath(); ctx.ellipse(sx + 8*m, sy + 10*m + bob, 1.3*m, 0.6*m, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#445522'; ctx.lineWidth = Math.max(0.3, m*0.2);
      ctx.beginPath(); ctx.moveTo(sx + 7*m, sy + 10*m + bob); ctx.lineTo(sx + 5*m, sy + 8*m + bob); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx + 9*m, sy + 10*m + bob); ctx.lineTo(sx + 11*m, sy + 8*m + bob); ctx.stroke();
    }
  },
});

SkillRegistry.add({
  id: 'gathering',
  name: 'Gathering',
  color: '#888888',
  tileIds: [T_ROCK, T_INSECT_SPOT, T_FALLEN_BRANCH],

  populate: function(tile, biome, wx, wy, rng) {
    if (tile.type === T.WALL || tile.type === T.WATER) return null;
    // Rocks scattered everywhere, sparse
    if (rng() < 0.015) {
      var rocky = overworldNoise(wx, wy, 99999, 0.1);
      if (rocky > 0.55) return T_ROCK;
    }
    // Fallen branches — near trees, common
    if (rng() < 0.02) {
      var treeNoise = overworldNoise(wx, wy, 77777, 0.15);
      if (treeNoise > 0.4) return T_FALLEN_BRANCH;
    }
    // Insects in grassy areas
    if (rng() < 0.008) {
      var buggy = overworldNoise(wx * 1.5, wy * 1.5, 44444, 0.18);
      if (buggy > 0.6) return T_INSECT_SPOT;
    }
    return null;
  },

  onInteract: function(game, tileType, wx, wy) {
    var p = game.player;
    var level = PlayerSkills.getLevel(p.skills, 'gathering');
    var msg = '', color = '#888', xp = 2;

    if (tileType === T_FALLEN_BRANCH) {
      var branchCount = 1 + Math.floor(level / 4);
      Bag.add(p.bag, 'branch', branchCount);
      msg = '+' + branchCount + ' Branch' + (branchCount > 1 ? 'es' : '');
      color = '#6B5010'; xp = 2;
    } else if (tileType === T_ROCK) {
      var stoneCount = 1 + Math.floor(level / 3);
      Bag.add(p.bag, 'stone', stoneCount);
      msg = '+' + stoneCount + ' Stone';
      // Chance of flint or clay

// Insects move around — relocate to adjacent tile occasionally
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  if (GameTime.turn % 5 !== 0) return; // every 5 turns
  // Check loaded chunks for insect tiles
  for (var key in Overworld.chunks) {
    var chunk = Overworld.chunks[key];
    if (!chunk || !chunk.tiles) continue;
    var parts = key.split(',');
    var cx = parseInt(parts[0]), cy = parseInt(parts[1]);
    var baseX = cx * Overworld.CHUNK_SIZE, baseY = cy * Overworld.CHUNK_SIZE;
    for (var ly = 0; ly < Overworld.CHUNK_SIZE; ly++) {
      for (var lx = 0; lx < Overworld.CHUNK_SIZE; lx++) {
        var tile = chunk.tiles[ly][lx];
        if (tile.type === T_INSECT_SPOT && Math.random() < 0.3) {
          var wx = baseX + lx, wy = baseY + ly;
          // Don't move if player is nearby (let them catch it)
          var pdx = wx - game.player.x, pdy = wy - game.player.y;
          if (Math.abs(pdx) + Math.abs(pdy) < 3) continue;
          // Pick random adjacent tile
          var dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
          var d = dirs[Math.floor(Math.random() * 4)];
          var nx = wx + d.x, ny = wy + d.y;
          var destTile = Overworld.getTile(nx, ny);
          // Only move to walkable grass-like tiles
          if (destTile.type === 100 || destTile.type === T_BARE_PATCH) { // T_GRASS=100
            Overworld.setTile(wx, wy, 100); // leave grass behind
            Overworld.setTile(nx, ny, T_INSECT_SPOT); // move insect
          }
        }
      }
    }
  }
});

        if (roll < 0.55) return T_HERB_PATCH;

      var flowerNoise = overworldNoise(wx * 2.1, wy * 1.7, 55555, 0.2);

// Shared 3D rock face renderer — used by all ore tiles
function drawRockFace3D(ctx, sx, sy, ts, baseColor) {
  var m = ts / 16;
  ctx.fillStyle = baseColor; ctx.fillRect(sx, sy, ts, ts);
  ctx.fillStyle = shadeHex(baseColor, 20); ctx.fillRect(sx, sy, ts, Math.round(ts*0.28));
  ctx.fillStyle = 'rgba(255,255,255,0.07)'; ctx.fillRect(sx, sy, ts, Math.max(1, ts*0.05));
  ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(sx, sy+ts-Math.round(ts*0.12), ts, Math.round(ts*0.12));
  ctx.fillStyle = 'rgba(0,0,0,0.08)'; ctx.fillRect(sx+ts-2, sy, 2, ts);
  ctx.strokeStyle = shadeHex(baseColor, -30); ctx.lineWidth = 1; ctx.strokeRect(sx+0.5, sy+0.5, ts-1, ts-1);
}

var T_GOLD_VEIN = TileRegistry.add({
  id: 172,
  name: 'gold_vein',
  solid: true,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var hash = (((wx || 0) * 7919 + (wy || 0) * 5237) >>> 0);
    // Gentle shimmer on gold using animTimer
    var glimmer = Math.sin(animTimer * 2.5 + (wx * 1.3 + wy * 0.9)) * 0.5 + 0.5;

    drawRockFace3D(ctx, sx, sy, ts, '#3a3630');

    // Crack lines
    ctx.strokeStyle = '#201e1c';
    ctx.lineWidth = Math.max(0.5, m * 0.4);
    ctx.beginPath();
    ctx.moveTo(sx + 4*m, sy + 1*m);
    ctx.lineTo(sx + 2*m, sy + 9*m);
    ctx.lineTo(sx + 4*m, sy + 15*m);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx + 10*m, sy + 3*m);
    ctx.lineTo(sx + 12*m, sy + 8*m);
    ctx.lineTo(sx + 10*m, sy + 12*m);
    ctx.stroke();

    // Gold seams — primary veins
    ctx.fillStyle = '#9a7a18';
    ctx.fillRect(sx + 5*m, sy + 3*m, 3.5*m, 0.9*m);
    ctx.fillRect(sx + 2*m, sy + 8*m, 2.5*m, 1.1*m);
    ctx.fillRect(sx + 9*m, sy + 6*m, 3*m, 0.8*m);
    ctx.fillRect(sx + 7*m, sy + 12*m, 4.5*m, 1*m);
    ctx.fillRect(sx + 1*m, sy + 13*m, 2*m, 0.7*m);

    // Brighter gold on seams
    ctx.fillStyle = '#ccaa22';
    ctx.fillRect(sx + 5.5*m, sy + 3*m, 2*m, 0.7*m);
    ctx.fillRect(sx + 2.5*m, sy + 8*m, 1.3*m, 0.8*m);
    ctx.fillRect(sx + 9.5*m, sy + 6*m, 1.5*m, 0.6*m);
    ctx.fillRect(sx + 8*m, sy + 12*m, 2.5*m, 0.7*m);

    // Glimmering gold specks — animate slightly
    var g1 = Math.round(glimmer * 20);
    ctx.fillStyle = 'rgb(' + (220 + g1) + ',' + (185 + g1) + ',60)';
    ctx.fillRect(sx + 6*m, sy + 2.8*m, 0.8*m, 0.8*m);
    ctx.fillRect(sx + 10*m, sy + 5.8*m, 0.7*m, 0.7*m);
    ctx.fillRect(sx + 8.5*m, sy + 11.8*m, 0.8*m, 0.8*m);
    ctx.fillRect(sx + (3 + hash % 6)*m, sy + (5 + (hash >> 4) % 5)*m, 0.7*m, 0.7*m);

    // Extra small glint dots
    ctx.fillStyle = '#ffee88';
    ctx.fillRect(sx + 6.3*m, sy + 2.9*m, 0.4*m, 0.4*m);
    ctx.fillRect(sx + 9.2*m, sy + 11.9*m, 0.4*m, 0.4*m);

    // Edges
    ctx.fillStyle = '#504c48';
    ctx.fillRect(sx, sy, ts, 1.5*m);
    ctx.fillStyle = '#18160e';
    ctx.fillRect(sx, sy, 1.5*m, ts);
  },
  light: { color: '#443300', radius: 0.4, intensity: 0.04 },
});

// SKILL: Mining
// ============================================================
SkillRegistry.add({
  id: 'mining',
  name: 'Mining',
  color: '#8888aa',
  tileIds: [T_COPPER_VEIN, T_IRON_VEIN, T_GOLD_VEIN],

  populate: function(tile, biome, wx, wy, rng) {
    if (tile.type === T.WALL || tile.type === T.WATER) return null;

    // Ore only near mountains — high elevation, not in lush biomes
    var elevation = tile.height || overworldNoise(wx, wy, 11223, 0.06);
    if (elevation < 0.65) return null;
    if (biome.id === 'grassland' || biome.id === 'swamp') return null;

    // Tight vein clustering — rare seams
    var veinBody = Math.sin(wx * 0.31 + wy * 0.19 + overworldNoise(wx, wy, 88112, 0.04) * 6.28) * 0.5 + 0.5;
    var veinCross = overworldNoise(wx * 0.7, wy * 1.3, 55443, 0.08);

    // Gold — extremely rare, highest peaks
    if (elevation > 0.73 && veinBody > 0.82 && veinCross > 0.65) {
      if (rng() < 0.15) return T_GOLD_VEIN;
    }
    // Iron — rare, high elevation
    if (elevation > 0.68 && veinBody > 0.72 && veinCross > 0.58) {
      if (rng() < 0.2) return T_IRON_VEIN;
    }
    // Copper — uncommon, mountain edges
    if (veinBody > 0.65 && veinCross > 0.5) {
      if (rng() < 0.15) return T_COPPER_VEIN;
    }

    return null;
  },

  onInteract: function(game, tileType, wx, wy) {
    if (tileType !== T_COPPER_VEIN && tileType !== T_IRON_VEIN && tileType !== T_GOLD_VEIN) return false;

    var p = game.player;
    var level = PlayerSkills.getLevel(p.skills, 'mining');
    var msg = '';
    var color = '#8888aa';
    var xp = 5;

    if (tileType === T_COPPER_VEIN) {
      // Copper: base 1-2 ore, +1 per 3 levels
      var count = 1 + Math.floor(Math.random() * 2) + Math.floor(level / 3);
      Bag.add(p.bag, 'copper_ore', count);
      msg = '+' + count + ' Copper Ore';
      color = '#c07a4a';
      xp = 4;
    } else if (tileType === T_IRON_VEIN) {
      // Iron: base 1 ore, +1 per 4 levels
      var count = 1 + Math.floor(level / 4);
      if (level >= 2 && Math.random() < 0.4) count++;
      Bag.add(p.bag, 'iron_ore', count);
      msg = '+' + count + ' Iron Ore';
      color = '#7a8899';
      xp = 7;
    } else if (tileType === T_GOLD_VEIN) {
      // Gold: 1 ore, +1 at level 5+
      var count = 1 + (level >= 5 ? 1 : 0);
      if (level >= 3 && Math.random() < 0.3) count++;
      Bag.add(p.bag, 'gold_ore', count);
      msg = '+' + count + ' Gold Ore';
      color = '#ccaa22';
      xp = 12;
    }

    // Bonus gem drop — all vein types, scales with level
    var gemChance = 0.03 + level * 0.012;
    if (Math.random() < gemChance) {
      Bag.add(p.bag, 'gem', 1);
      msg += ', +1 Gem';
    }

    // Also chance of extra stone from smashing rock
    if (Math.random() < 0.35) {
      Bag.add(p.bag, 'stone', 1 + Math.floor(level / 5));
    }

    var result = PlayerSkills.addXp(p.skills, 'mining', xp);
    Overworld.setTile(wx, wy, T_RUBBLE);
    SFX.hit();
    game.addLog(msg, color);
    game.addFloating(wx, wy, msg, color);

    if (result.leveled) {
      game.addLog('Mining level ' + result.level + '!', '#ffcc44');
      SFX.stairs();
    }
    return true;
  },

  recipes: [
    { skill: 'mining', level: 1, name: 'Copper Bar', input: { copper_ore: 3 }, output: { copper_bar: 1 } },
    { skill: 'mining', level: 2, name: 'Iron Bar',   input: { iron_ore: 3 },   output: { iron_bar: 1 }, requires: ['Copper Bar'] },
    { skill: 'mining', level: 3, name: 'Gold Bar',   input: { gold_ore: 2 },   output: { gold_bar: 1 }, requires: ['Iron Bar'] },
    { skill: 'mining', level: 4, name: 'Gem Ring',   input: { gem: 1, gold_bar: 1 }, output: { gem_ring: 1 }, requires: ['Gold Bar'] },
  ],
});

RecipeRegistry.addAll(SkillRegistry.get('mining').recipes);

// Helper: get tree size (0=small, 1=medium, 2=large) from world position
function treeSize(wx, wy) {
  var h = ((wx * 374761393 + wy * 668265263) >>> 0);
  return h % 3;
}

var T_TREE_OAK = TileRegistry.add({
  id: 110,
  name: 'oak_tree',
  solid: true,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    // Ground first
    var grassDraw = TileRegistry.getDrawer(T_GRASS);
    if (grassDraw) grassDraw(ctx, sx, sy, ts, visible, animTimer, wx, wy);

    var m = ts / 16;
    var hash = ((wx * 41 + wy * 67) & 0xffff);
    var sway = Math.sin(animTimer * 0.8 + hash * 0.1) * m * 0.5;
    var sz = treeSize(wx, wy); // 0=small, 1=medium, 2=large
    var scale = 0.6 + sz * 0.25; // 0.6, 0.85, 1.1

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(sx + 8*m, sy + 14*m, (4 + sz)*m, (1.5 + sz*0.3)*m, 0, 0, Math.PI*2); ctx.fill();

    // Trunk
    var trunkW = (2 + sz * 0.8) * m;
    var trunkH = (12 + sz * 5) * m;
    var trunkX = sx + 8*m - trunkW/2;
    var trunkY = sy + 14*m - trunkH;
    ctx.fillStyle = '#5a4020';
    ctx.fillRect(trunkX, trunkY, trunkW, trunkH);
    ctx.fillStyle = '#4a3018';
    ctx.fillRect(trunkX, trunkY, trunkW * 0.35, trunkH);
    // Bark marks
    ctx.fillStyle = '#6a5030';
    ctx.fillRect(trunkX + trunkW*0.4, trunkY + trunkH*0.3, m*0.8, m*1.5);
    ctx.fillRect(trunkX + trunkW*0.3, trunkY + trunkH*0.6, m*0.8, m);

    // Canopy
    var canopyY = trunkY - (3 + sz * 2) * m;
    var canopyR = (5 + sz * 3) * m;
    // Dark base
    ctx.fillStyle = '#1a5518';
    ctx.beginPath(); ctx.arc(sx + 8*m + sway, canopyY + canopyR*0.3, canopyR, 0, Math.PI*2); ctx.fill();
    // Main
    ctx.fillStyle = '#2a6a22';
    ctx.beginPath(); ctx.arc(sx + 8*m + sway, canopyY, canopyR * 0.85, 0, Math.PI*2); ctx.fill();
    // Sub-clusters
    ctx.fillStyle = '#3a7a30';
    ctx.beginPath(); ctx.arc(sx + (5-sz*0.5)*m + sway, canopyY - m, canopyR*0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + (11+sz*0.5)*m + sway, canopyY + m, canopyR*0.45, 0, Math.PI*2); ctx.fill();
    // Highlight
    ctx.fillStyle = '#4a8a3a';
    ctx.beginPath(); ctx.arc(sx + 7*m + sway, canopyY - canopyR*0.3, canopyR*0.3, 0, Math.PI*2); ctx.fill();

    if (sz === 0) {
      // Small tree: sapling details — thin, wispy
      ctx.fillStyle = '#5a9a4a';
      ctx.fillRect(sx + 5*m + sway, canopyY - 2*m, m*0.8, m*2);
    }
  },
  light: { color: '#224400', radius: 0.5, intensity: 0.03 },
});

var T_STUMP = TileRegistry.add({

SkillRegistry.add({
  id: 'woodcutting',
  name: 'Woodcutting',
  color: '#8B6914',
  tileIds: [T_TREE_OAK],

  populate: function(tile, biome, wx, wy, rng) {
    if (tile.type === T.WALL || tile.type === T.WATER) return null;
    var density = (biome.density && biome.density.trees) || 0;
    if (density > 0 && rng() < density) {
      var cluster = overworldNoise(wx, wy, 77777, 0.15);
      if (cluster > 0.45) return T_TREE_OAK;
    }
    return null;
  },

  onInteract: function(game, tileType, wx, wy) {
    if (tileType !== T_TREE_OAK) return false;
    var p = game.player;
    var level = PlayerSkills.getLevel(p.skills, 'woodcutting');
    var sz = treeSize(wx, wy); // 0=small, 1=medium, 2=large

    // Bigger trees = more logs, smaller = more branches
    var logCount, branchCount;
    if (sz === 0) { logCount = 1; branchCount = 2 + Math.floor(level / 5); }
    else if (sz === 1) { logCount = 2 + Math.floor(level / 4); branchCount = 1; }
    else { logCount = 3 + Math.floor(level / 3); branchCount = 0; }

    Bag.add(p.bag, 'oak_log', logCount);
    if (branchCount) Bag.add(p.bag, 'branch', branchCount);

    var result = PlayerSkills.addXp(p.skills, 'woodcutting', 3 + sz * 3);

    Overworld.setTile(wx, wy, T_STUMP);

    SFX.hit();
    var msg = '+' + logCount + ' Log' + (logCount > 1 ? 's' : '');
    if (branchCount) msg += ', +' + branchCount + ' Branch' + (branchCount > 1 ? 'es' : '');
    game.addLog(msg, '#8B6914');
    game.addFloating(wx, wy, '+' + logCount + ' Log', '#8B6914');

    if (result.leveled) {
      game.addLog('Woodcutting level ' + result.level + '!', '#ffcc44');
      SFX.stairs();
    }
    return true;
  },

  recipes: [
    { skill: 'woodcutting', level: 1, name: 'Plank', input: { oak_log: 2 }, output: { plank: 3 } },
    { skill: 'woodcutting', level: 3, name: 'Arrow Shaft', input: { branch: 2 }, output: { arrow_shaft: 5 } },
  ],
});

RecipeRegistry.addAll(SkillRegistry.get('woodcutting').recipes);

var AimInteractState = {
  name: 'aim_interact',
  drawBelow: true,

  onEnter: function(game) {
    GameUtils.addLog('Choose direction...', '#ddaa44');
  },

  onKey: function(game, key) {
    var lk = key.toLowerCase();
    if (lk === 'escape' || lk === 'e') {
      GameUtils.addLog('Cancelled.', '#888');
      StateStack.pop();
      return true;
    }

    var dx = 0, dy = 0;
    if (key === 'ArrowUp' || lk === 'w') dy = -1;
    else if (key === 'ArrowDown' || lk === 's') dy = 1;
    else if (key === 'ArrowLeft' || lk === 'a') dx = -1;
    else if (key === 'ArrowRight' || lk === 'd') dx = 1;
    else return true; // consume other keys

    var px = Math.round(game.player.x), py = Math.round(game.player.y);
    var tx = px + dx, ty = py + dy;
    game.player.lastDir = { x: dx, y: dy };

    StateStack.pop();
    game.resolveInteraction(tx, ty);
    return true;
  },

  onDraw: function(game, ctx) {
    var ts = CONFIG.TILE;
    var px = Math.round(game.player.x), py = Math.round(game.player.y);
    var pulse = 0.3 + Math.sin(game.animTimer * 5) * 0.15;

    // Highlight interactable adjacent tiles
    var dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];

    // Need camera transform for world-space drawing
    var p = game.pipeline;
    p.camera.applyTransform(ctx);

    for (var di = 0; di < dirs.length; di++) {
      var d = dirs[di];
      var tx = px + d.x, ty = py + d.y;
      var hasTarget = false;
      if (NPCManager.getAt(tx, ty)) hasTarget = true;
      else if (game.player.mode === 'overworld' || game.player.mode === 'underground') {
        var tile = Overworld.getTile(tx, ty);
        if (SkillRegistry.getHandlersForTile(tile.type).length > 0) hasTarget = true;
        if (TileRegistry.getInteraction(tile.type)) hasTarget = true;
      }
      if (hasTarget) {
        ctx.fillStyle = 'rgba(255,200,50,' + pulse.toFixed(2) + ')';
        ctx.fillRect(tx * ts, ty * ts, ts, ts);
      }
    }

    // Reset transform for UI text
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    // Prompt
    var w = CONFIG.WIDTH, fs = Math.max(12, Math.round(w * 0.014));
    ctx.fillStyle = '#ddaa44';
    ctx.font = 'bold ' + fs + 'px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('Press direction to interact, ESC to cancel', w / 2, fs * 2);
  },
};
