// Riding modifies player movement — 2 tiles per turn
var _origDoOverworldMove = Game.prototype.doOverworldMove;
Game.prototype.doOverworldMove = function(dx, dy) {
  var mount = AnimalManager.getMount();
  if (mount) {
    // Move 2 tiles in the same direction
    for (var step = 0; step < 2; step++) {
      var nx = this.player.x + dx, ny = this.player.y + dy;
      if (!Overworld.isPassable(nx, ny)) break;
      this.player.x = nx;
      this.player.y = ny;
      mount.x = nx;
      mount.y = ny;
    }
    this.player.walkTimer = 0.35;
    this.player.lastDir = { x: dx, y: dy };
    mount.lastDir = { x: dx, y: dy };
    mount.walkTimer = 0.35;
    SFX.step();
    GameEvents.fire('playerMove', this, this.player.x, this.player.y);
    if (this.handleOverworldTile(this.player.x, this.player.y)) return;
    this.endOverworldTurn();
  } else {
    _origDoOverworldMove.call(this, dx, dy);
  }
};

};

// Animals show as interactable in aim mode
var _origInteractAdjacent = Game.prototype.interactAdjacent;
Game.prototype.interactAdjacent = function() {
  // Check if any adjacent animal before falling through
  if (this.player.mode === 'overworld') {
    var px = Math.round(this.player.x), py = Math.round(this.player.y);
    var dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
    for (var di = 0; di < dirs.length; di++) {
      var d = dirs[di];
      if (AnimalManager.getAt(px + d.x, py + d.y)) {
        StateStack.push(AimInteractState);
        return true;
      }
    }
  }
  return _origInteractAdjacent.call(this);
};

// When player crafts a bow, auto-add weapon to stash
var _bowCraftPatched = false;
GameEvents.on('turnEnd', function(game) {
  if (_bowCraftPatched) return;
  var cs = window['Crafting' + 'State'];
  if (!cs || !cs._craft) return;
  _bowCraftPatched = true;
  var _origCraft = cs._craft;
  cs._craft = function(game) {
    var prevBag = {};
    for (var id in game.player.bag) prevBag[id] = game.player.bag[id];
    _origCraft.call(this, game);
    var bows = ['bow', 'reinforced_bow'];
    for (var i = 0; i < bows.length; i++) {
      var bid = bows[i];
      if ((game.player.bag[bid] || 0) > (prevBag[bid] || 0)) {
        var bw = BOW_WEAPONS[bid];
        if (!game.player.stash) game.player.stash = [];
        game.player.stash.push({
          type: 'weapon', name: bw.name, range: bw.range, damage: bw.atk + 2,
          cd: 0, atk: bw.atk, color: bw.color, desc: bw.desc, isBow: true
        });
        GameUtils.addLog(bw.name + ' added to equipment stash.', bw.color);
      }
    }
  };
});

// Bow ability — "Shoot Arrow" replaces the weapon's default ability when a bow is equipped
// This hooks into the ability system: when weapon has isBow, the weapon ability consumes arrows
GameEvents.on('turnEnd', function(game) {
  if (!game.player || !game.player.weapon) return;
  // Ensure bow weapon has the shoot ability
  if (game.player.weapon.isBow && game.player.abilities.length > 0) {
    var ab = game.player.abilities[0];
    if (!ab._isBowShot) {
      // Replace slot 0 with Shoot Arrow
      game.player.abilities[0] = {
        verb: 'launch', element: 'physical', shape: 'line',
        name: 'Shoot Arrow', damage: game.player.weapon.atk || 5,
        cooldown: 0, currentCooldown: 0, color: '#ccaa66',
        maxRange: game.player.weapon.range || 5,
        _isBowShot: true, _consumesArrow: true,
      };
    }
  }
});

// Hook into useAbility to consume arrows
var _bowAbilityPatched = false;
GameEvents.on('modeChange', function() {
  if (_bowAbilityPatched) return;
  var g = globalThis.game;
  if (!g || !g.useAbility) return;
  _bowAbilityPatched = true;
  var _origUseAbility = g.useAbility.bind(g);
  g.useAbility = function(idx, dx, dy) {
    var ab = this.player.abilities[idx];
    if (ab && ab._consumesArrow) {
      if (!Bag.has(this.player.bag, 'arrow')) {
        GameUtils.addLog('No arrows!', '#cc6644');
        return;
      }
      Bag.remove(this.player.bag, 'arrow', 1);
      var remaining = this.player.bag.arrow || 0;
      GameUtils.addLog('Arrow! (' + remaining + ' left)', '#ccaa66');
    }
    _origUseAbility(idx, dx, dy);
  };
});

// Track placed buildings for village management
var BuildingManager = {
  buildings: [], // { id, x, y, blueprint, occupant }

  add: function(x, y, blueprint) {
    var b = { id: blueprint.id + '_' + x + '_' + y, x: x, y: y, blueprint: blueprint, occupant: null };
    this.buildings.push(b);
    return b;
  },

  getAt: function(wx, wy) {
    for (var i = 0; i < this.buildings.length; i++) {
      var b = this.buildings[i];
      if (wx >= b.x && wx < b.x + b.blueprint.size.w && wy >= b.y && wy < b.y + b.blueprint.size.h) return b;
    }
    return null;
  },

  getHomes: function() {
    return this.buildings.filter(function(b) { return b.blueprint.isHome; });
  },

  getVacantHomes: function() {
    return this.buildings.filter(function(b) { return b.blueprint.isHome && !b.occupant; });
  },

  clear: function() { this.buildings = []; },
};

// Save/load buildings
SaveSystem.register('buildings', {
  save: function() {
    return BuildingManager.buildings.map(function(b) {
      return { x: b.x, y: b.y, bpId: b.blueprint.id, occupant: b.occupant, stored: b.stored || null };
    });
  },
  load: function(data) {
    if (!data) return;
    BuildingManager.clear();
    for (var i = 0; i < data.length; i++) {
      var d = data[i];
      var bp = BlueprintRegistry.get(d.bpId);
      if (bp) {
        var b = BuildingManager.add(d.x, d.y, bp);
        b.occupant = d.occupant || null;
        b.stored = d.stored || null;
        // Re-place tiles
        for (var t = 0; t < bp.tiles.length; t++) {
          Overworld.setTile(d.x + bp.tiles[t].dx, d.y + bp.tiles[t].dy, bp.tiles[t].type);
        }
      }
    }
  },
});

// Caravan Manager
var CaravanManager = {
  caravan: null, // { x, y, cargo, deployed, hitched, _loadMode, _prevX, _prevY }

  deploy: function(x, y) {
    this.caravan = {
      x: x, y: y,
      cargo: Bag.create(),
      deployed: true,
      hitched: false,
      _loadMode: true,
      _prevX: x, _prevY: y,
      animTimer: 0,
    };
  },

  isAt: function(wx, wy) {
    var c = this.caravan;
    return c && c.deployed && c.x === wx && c.y === wy;
  },
};

// Deploy caravan from inventory — interact with caravan_kit in bag
// Player presses E while holding caravan_kit and a tamed horse is adjacent
function _findAdjacentTamedHorse(px, py) {
  if (typeof AnimalManager === 'undefined') return null;
  var dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
  for (var i = 0; i < dirs.length; i++) {
    var a = AnimalManager.getAt(px + dirs[i].x, py + dirs[i].y);
    if (a && a.tamed && a.type === 'horse') return a;
  }
  // Also check if player is mounted on a horse
  var mount = AnimalManager.getMount();
  if (mount && mount.type === 'horse') return mount;
  return null;
}

// Caravan interaction via resolveInteraction
var _origResolveCaravan = Game.prototype.resolveInteraction;
Game.prototype.resolveInteraction = function(tx, ty) {
  // Check if caravan is at target
  if (CaravanManager.isAt(tx, ty)) {
    var c = CaravanManager.caravan;
    var p = this.player;

    if (!c.hitched) {
      // Try to hitch
      if (!_findAdjacentTamedHorse(p.x, p.y)) {
        GameUtils.addLog('Need a tamed horse nearby to hitch the caravan.', '#cc4444');
        return true;
      }
      c.hitched = true;
      c._prevX = p.x;
      c._prevY = p.y;
      SFX.shrine();
      GameUtils.addLog('Caravan hitched! It will follow you.', '#88cc44');
      return true;
    }

    // Hitched — cycle: load → unload → unhitch
    if (c._loadMode) {
      // Load food/craft/material items from player bag
      var loaded = 0;
      var contents = Bag.contents(p.bag);
      for (var i = 0; i < contents.length; i++) {
        var item = contents[i];
        var cat = item.def ? item.def.category : '';
        if (cat === 'food' || cat === 'material' || cat === 'mineral' || cat === 'fish' ||
            cat === 'herb' || cat === 'wood' || cat === 'ore' || cat === 'refined') {
          Bag.add(c.cargo, item.id, item.count);
          Bag.remove(p.bag, item.id, item.count);
          loaded += item.count;
        }
      }
      if (loaded > 0) {
        GameUtils.addLog('Loaded ' + loaded + ' items into caravan.', '#88aa44');
      } else {
        GameUtils.addLog('Nothing to load.', '#888');
      }
      c._loadMode = false;
    } else {
      // Unload cargo back to player
      var cargoItems = Bag.contents(c.cargo);
      var unloaded = 0;
      for (var i = 0; i < cargoItems.length; i++) {
        Bag.add(p.bag, cargoItems[i].id, cargoItems[i].count);
        unloaded += cargoItems[i].count;
      }
      if (unloaded > 0) {
        c.cargo = Bag.create();
        GameUtils.addLog('Unloaded ' + unloaded + ' items from caravan.', '#88aa44');
      } else {
        // Nothing to unload — unhitch
        c.hitched = false;
        GameUtils.addLog('Caravan unhitched.', '#ccaa44');
      }
      c._loadMode = true;
    }
    return true;
  }

  return _origResolveCaravan.call(this, tx, ty);
};

// Also let player deploy caravan_kit by interacting with empty ground while holding one
var _origInteractCaravan = Game.prototype.interactAdjacent;
Game.prototype.interactAdjacent = function() {
  if (this.player.mode === 'overworld' && !CaravanManager.caravan &&
      Bag.has(this.player.bag, 'caravan_kit')) {
    var horse = _findAdjacentTamedHorse(this.player.x, this.player.y);
    if (horse) {
      // Check if any adjacent tile has the caravan — if not, offer deploy
      var dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
      var hasTarget = false;
      var px = Math.round(this.player.x), py = Math.round(this.player.y);
      for (var i = 0; i < dirs.length; i++) {
        var tx = px + dirs[i].x, ty = py + dirs[i].y;
        if (NPCManager.getAt(tx, ty) || AnimalManager.getAt(tx, ty)) { hasTarget = true; break; }
        var tile = Overworld.getTile(tx, ty);
        if (SkillRegistry.getHandlersForTile(tile.type).length > 0 || TileRegistry.getInteraction(tile.type)) { hasTarget = true; break; }
      }
      if (!hasTarget) {
        Bag.remove(this.player.bag, 'caravan_kit', 1);
        CaravanManager.deploy(this.player.x, this.player.y);
        SFX.shrine();
        GameUtils.addLog('Caravan deployed! Press [E] toward it to hitch.', '#88cc44');
        return true;
      }
    }
  }
  return _origInteractCaravan.call(this);
};

// Caravan follows player (1 tile behind)
GameEvents.on('playerMove', function(game, nx, ny) {
  var c = CaravanManager.caravan;
  if (!c || !c.deployed || !c.hitched) return;
  if (game.player.mode !== 'overworld') return;

  // Move caravan to player's previous position
  var oldX = c._prevX, oldY = c._prevY;
  c.x = oldX;
  c.y = oldY;
  c._prevX = nx;
  c._prevY = ny;

  // Fire trail event
  GameEvents.fire('caravanMove', game, c.x, c.y);
});

// Track player position even when unhitched
GameEvents.on('playerMove', function(game, nx, ny) {
  var c = CaravanManager.caravan;
  if (!c || !c.deployed || c.hitched) return;
  c._prevX = nx;
  c._prevY = ny;
});

// Update animation timer
GameEvents.on('update', function(game, dt) {
  var c = CaravanManager.caravan;
  if (c) c.animTimer = (c.animTimer || 0) + dt;
});

// Draw caravan — draw:entities already has camera transform applied
GameEvents.on('draw:entities', function(game, ctx) {
  var c = CaravanManager.caravan;
  if (!c || !c.deployed) return;
  if (game.player.mode !== 'overworld') return;

  var ts = CONFIG.TILE;
  var m = ts / 16;
  var sx = c.x * ts, sy = c.y * ts;

  // Hitch line to player
  if (c.hitched) {
    var px = game.player.x * ts + ts / 2;
    var py = game.player.y * ts + ts / 2;
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = Math.max(1, m);
    ctx.setLineDash([m * 2, m * 2]);
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(sx + ts / 2, sy + ts / 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(sx + 8 * m, sy + 14 * m, 6 * m, 1.5 * m, 0, 0, Math.PI * 2);
  ctx.fill();

  // Cart body
  var bx = sx + 3 * m, by = sy + 4 * m, bw = 10 * m, bh = 6 * m;
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#6B4F0E';
  ctx.lineWidth = Math.max(0.5, m * 0.4);
  ctx.strokeRect(bx, by, bw, bh);
  // Plank lines
  ctx.beginPath();
  ctx.moveTo(bx, by + bh * 0.33); ctx.lineTo(bx + bw, by + bh * 0.33);
  ctx.moveTo(bx, by + bh * 0.66); ctx.lineTo(bx + bw, by + bh * 0.66);
  ctx.stroke();

  // Wheels
  ctx.fillStyle = '#5C3A0A';
  ctx.beginPath(); ctx.arc(bx + 2 * m, by + bh, 2.5 * m, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + bw - 2 * m, by + bh, 2.5 * m, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#8B6914';
  ctx.beginPath(); ctx.arc(bx + 2 * m, by + bh, m, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + bw - 2 * m, by + bh, m, 0, Math.PI * 2); ctx.fill();

  // Cargo pile
  var cargoCount = 0;
  for (var id in c.cargo) if (c.cargo[id] > 0) cargoCount += c.cargo[id];
  if (cargoCount > 0) {
    var pileH = Math.min(4 * m, m + (cargoCount / 10) * 3 * m);
    ctx.fillStyle = '#AA8833';
    ctx.fillRect(bx + m, by - pileH, bw - 2 * m, pileH);
    ctx.strokeStyle = '#886622';
    ctx.lineWidth = Math.max(0.5, m * 0.3);
    ctx.strokeRect(bx + m, by - pileH, bw - 2 * m, pileH);
  }

  // Hitch pole
  ctx.strokeStyle = '#6B4F0E';
  ctx.lineWidth = Math.max(1, m);
  ctx.beginPath();
  ctx.moveTo(bx, by + bh / 2);
  ctx.lineTo(bx - 3 * m, by + bh / 2);
  ctx.stroke();

  // Label
  ctx.fillStyle = '#ccaa66';
  ctx.font = Math.max(7, Math.round(ts * 0.22)) + 'px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText('Caravan', sx + ts / 2, sy - 2);
});

// Block caravan tile
var _origIsPassableCaravan = Overworld.isPassable;
Overworld.isPassable = function(wx, wy) {
  if (!_origIsPassableCaravan.call(Overworld, wx, wy)) return false;
  if (CaravanManager.isAt(wx, wy)) return false;
  return true;
};

// Make caravan interactable via aim mode
var _origInteractAdjacentCaravan = Game.prototype.interactAdjacent;
Game.prototype.interactAdjacent = function() {
  if (this.player.mode === 'overworld' && CaravanManager.caravan && CaravanManager.caravan.deployed) {
    var px = Math.round(this.player.x), py = Math.round(this.player.y);
    var dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];

// ============================================================
// SYSTEM: Void Corruption — dark energy spreads from uncleared dungeons
// ============================================================
// Corrupted tiles spread outward from uncleared dungeon entrances.
// Clearing the dungeon stops spread; corruption slowly recedes.

var T_CORRUPTED = TileRegistry.add({
  id: 216,
  name: 'corrupted_ground',
  solid: false,
  damage: 1,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var h = ((wx * 374761393 + wy * 668265263) >>> 0);
    var hf = (h & 0xffff) / 65535;

    // Dark purple-black base with hash-driven variation
    var tint = Math.round((hf - 0.5) * 8);
    ctx.fillStyle = shadeHex('#1a0a20', tint);
    ctx.fillRect(sx, sy, ts, ts);

    // Slightly lighter patches for texture
    var h2 = (((h >> 13) ^ h) * 1274126177) >>> 0;
    var pf = (h2 & 0xffff) / 65535;
    if (pf > 0.5) {
      ctx.fillStyle = shadeHex('#221030', tint + 3);
      ctx.fillRect(sx + 3 * m, sy + 2 * m, 10 * m, 12 * m);
    }

    // Pulsing void veins — 3-4 lines in deep purple
    var phase = animTimer * 0.8 + hf * 6.28;
    var veinAlpha = 0.4 + Math.sin(phase) * 0.2;
    ctx.strokeStyle = 'rgba(68,34,170,' + veinAlpha.toFixed(3) + ')';
    ctx.lineWidth = Math.max(0.8, m * 0.6);

    // Vein 1 — diagonal
    var v1x = ((h >> 2) % 6 + 2) * m;
    var v1y = ((h >> 5) % 4 + 1) * m;
    ctx.beginPath();
    ctx.moveTo(sx + v1x, sy + v1y);
    ctx.lineTo(sx + v1x + 5 * m, sy + v1y + 7 * m);
    ctx.lineTo(sx + v1x + 3 * m, sy + v1y + 11 * m);
    ctx.stroke();

    // Vein 2 — curving opposite
    var v2x = ((h >> 8) % 5 + 7) * m;
    var v2y = ((h >> 11) % 4 + 2) * m;
    ctx.beginPath();
    ctx.moveTo(sx + v2x, sy + v2y);
    ctx.lineTo(sx + v2x - 3 * m, sy + v2y + 6 * m);
    ctx.lineTo(sx + v2x - 1 * m, sy + v2y + 10 * m);
    ctx.stroke();

    // Vein 3 — short branch
    var v3x = ((h >> 14) % 8 + 3) * m;
    var v3y = ((h >> 17) % 6 + 5) * m;
    ctx.beginPath();
    ctx.moveTo(sx + v3x, sy + v3y);
    ctx.lineTo(sx + v3x + 4 * m, sy + v3y + 3 * m);
    ctx.stroke();

    // Vein 4 (only some tiles)
    if (hf > 0.4) {
      var v4x = ((h >> 20) % 7 + 1) * m;
      var v4y = ((h >> 23) % 5 + 8) * m;
      ctx.beginPath();
      ctx.moveTo(sx + v4x, sy + v4y);
      ctx.lineTo(sx + v4x + 6 * m, sy + v4y - 2 * m);
      ctx.stroke();
    }

    // Void energy particles — purple dots that shift with animation
    var particlePhase = animTimer * 1.2 + hf * 3.14;
    ctx.fillStyle = 'rgba(120,60,200,' + (0.5 + Math.sin(particlePhase) * 0.3).toFixed(3) + ')';
    var p1x = ((h >> 3) % 10 + 2) * m + Math.sin(particlePhase * 0.7) * m;
    var p1y = ((h >> 6) % 10 + 2) * m + Math.cos(particlePhase * 0.9) * m;
    ctx.fillRect(sx + p1x, sy + p1y, m, m);

    ctx.fillStyle = 'rgba(160,80,255,' + (0.4 + Math.sin(particlePhase + 2) * 0.25).toFixed(3) + ')';
    var p2x = ((h >> 9) % 8 + 4) * m + Math.sin(particlePhase * 1.1 + 1) * m;
    var p2y = ((h >> 12) % 8 + 4) * m + Math.cos(particlePhase * 0.8 + 2) * m;
    ctx.fillRect(sx + p2x, sy + p2y, m, m);

    // Third particle only on some tiles
    if (hf > 0.3) {
      ctx.fillStyle = 'rgba(90,40,180,' + (0.3 + Math.sin(particlePhase + 4) * 0.2).toFixed(3) + ')';
      var p3x = ((h >> 15) % 10 + 1) * m + Math.sin(particlePhase * 0.6 + 3) * m * 0.8;
      var p3y = ((h >> 18) % 10 + 1) * m + Math.cos(particlePhase * 1.3 + 1) * m * 0.8;
      ctx.fillRect(sx + p3x, sy + p3y, m * 0.8, m * 0.8);
    }
  },
  light: { color: '#6622aa', radius: 1.5, intensity: 0.15 },
});

// ---- Corruption Manager ----

var CorruptionManager = {
  // 'wx,wy' -> { source: 'ex,ey', turn: N }
  corrupted: {},
};

// ---- Protected tile types (never corrupt these) ----

function _isCorruptionProtected(tileType) {
  // Water/swamp tiles (150-153), fishing tiles (160-163), frozen pond (107)
  if (tileType >= 150 && tileType <= 153) return true;
  if (tileType >= 160 && tileType <= 163) return true;
  if (tileType === 107) return true;
  // Cave entrance
  if (tileType === 120) return true;
  // Cobblestone and building tiles (200-216)
  if (tileType >= 200 && tileType <= 216) return true;
  // Solid tiles (walls, trees, rocks, etc)
  if (TileRegistry.isSolid(tileType)) return true;
  return false;
}

// ---- Corruption Spread ----

GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  if (GameTime.turn % 50 !== 0) return;

  var p = game.player;
  var searchR = CONFIG.VIEW_W + 10;
  var MAX_RADIUS = 12;

  // Find nearby cave entrances
  var entrances = [];
  for (var dy = -searchR; dy <= searchR; dy++) {
    for (var dx = -searchR; dx <= searchR; dx++) {
      var wx = Math.round(p.x) + dx, wy = Math.round(p.y) + dy;
      var tile = Overworld.getTile(wx, wy);
      if (tile.type === 120) { // T_CAVE_ENTRANCE
        if (!DungeonSpawnManager.isClear(wx, wy)) {
          entrances.push({ x: wx, y: wy, key: wx + ',' + wy });
        }
      }
    }
  }

  // Spread from each uncleared entrance
  for (var ei = 0; ei < entrances.length; ei++) {
    var ent = entrances[ei];

    // Spread 1 tile outward from the entrance itself
    _spreadCorruptionFrom(ent.x, ent.y, ent.key, MAX_RADIUS, ent);

    // Spread 1 tile outward from existing corrupted tiles near this entrance
    for (var ckey in CorruptionManager.corrupted) {
      var c = CorruptionManager.corrupted[ckey];
      if (c.source !== ent.key) continue;
      var parts = ckey.split(',');
      var cx = parseInt(parts[0]), cy = parseInt(parts[1]);
      // Only spread from tiles within max radius
      var dist = Math.abs(cx - ent.x) + Math.abs(cy - ent.y);
      if (dist >= MAX_RADIUS) continue;
      _spreadCorruptionFrom(cx, cy, ent.key, MAX_RADIUS, ent);
    }
  }
});

function _spreadCorruptionFrom(fx, fy, sourceKey, maxRadius, ent) {
  var dirs = [
    { x: 0, y: 1 }, { x: 1, y: 0 }, { x: 0, y: -1 }, { x: -1, y: 0 },
  ];
  for (var di = 0; di < dirs.length; di++) {
    var nx = fx + dirs[di].x, ny = fy + dirs[di].y;
    var nkey = nx + ',' + ny;

    // Already corrupted?
    if (CorruptionManager.corrupted[nkey]) continue;

    // Check distance from source entrance
    var dist = Math.abs(nx - ent.x) + Math.abs(ny - ent.y);
    if (dist > maxRadius) continue;

    var tile = Overworld.getTile(nx, ny);
    if (_isCorruptionProtected(tile.type)) continue;

    // Corrupt this tile
    CorruptionManager.corrupted[nkey] = {
      source: sourceKey,
      turn: GameTime.turn,
      originalType: tile.type,
    };
    Overworld.setTile(nx, ny, 216); // T_CORRUPTED

    // Kill crops on farm plots
    if (tile.type === 210) { // T_FARM_PLOT
      tile.cropGrowth = 0;
      tile.crop = null;
    }
  }
}

// ---- Corruption Receding (cleared dungeons) ----

GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  if (GameTime.turn % 30 !== 0) return;

  var toRemove = [];

  for (var ckey in CorruptionManager.corrupted) {
    var c = CorruptionManager.corrupted[ckey];
    // Check if source entrance has been cleared
    var srcParts = c.source.split(',');
    var sx = parseInt(srcParts[0]), sy = parseInt(srcParts[1]);
    if (!DungeonSpawnManager.isClear(sx, sy)) continue;

    // 10% chance to revert per tick
    if (Math.random() < 0.1) {
      toRemove.push(ckey);
    }
  }

  for (var i = 0; i < toRemove.length; i++) {
    var key = toRemove[i];
    var parts = key.split(',');
    var wx = parseInt(parts[0]), wy = parseInt(parts[1]);
    var entry = CorruptionManager.corrupted[key];

    // Revert to original type if we stored it, otherwise grass
    var revertType = (entry && entry.originalType) ? entry.originalType : 100;
    Overworld.setTile(wx, wy, revertType);
    delete CorruptionManager.corrupted[key];

    // Subtle visual feedback
    if (typeof GameUtils !== 'undefined' && GameUtils.addFloating) {
      var p = game.player;
      if (Math.abs(wx - p.x) < CONFIG.VIEW_W && Math.abs(wy - p.y) < CONFIG.VIEW_H) {
        GameUtils.addFloating(wx, wy, 'Purified', '#88cc88');
      }
    }
  }
});

// ---- Visual Overlay: purple tint on tiles adjacent to corruption ----

GameEvents.on('draw:world', function(game, ctx) {
  if (game.player.mode !== 'overworld') return;
  var ts = CONFIG.TILE;
  var p = game.player;
  var viewR = CONFIG.VIEW_W + 2;

  for (var dy = -viewR; dy <= viewR; dy++) {
    for (var dx = -viewR; dx <= viewR; dx++) {
      var wx = Math.round(p.x) + dx, wy = Math.round(p.y) + dy;
      var key = wx + ',' + wy;

      // Skip tiles that are themselves corrupted
      if (CorruptionManager.corrupted[key]) continue;

      // Check if any neighbor is corrupted
      var hasCorruptedNeighbor = false;
      if (CorruptionManager.corrupted[(wx - 1) + ',' + wy] ||
          CorruptionManager.corrupted[(wx + 1) + ',' + wy] ||
          CorruptionManager.corrupted[wx + ',' + (wy - 1)] ||
          CorruptionManager.corrupted[wx + ',' + (wy + 1)]) {
        hasCorruptedNeighbor = true;
      }

      if (hasCorruptedNeighbor) {
        ctx.fillStyle = 'rgba(30,10,50,0.15)';
        ctx.fillRect(wx * ts, wy * ts, ts, ts);
      }
    }
  }
});

// Save current floor state to cache
function _saveDungeonFloor(game) {
  if (game.dungeon && game.dungeonSeed) {
    var key = game.dungeonSeed + '_' + game.player.floor;
    _revealedCache[key] = game.dungeon.revealed;
    _floorMapCache[key] = { map: game.dungeon.map, loot: game.dungeon.loot };
  }
}

// Restore cached floor state (returns true if cache existed)
function _restoreDungeonFloor(game) {
  var key = (game.dungeonSeed || 0) + '_' + game.player.floor;
  if (_revealedCache[key]) game.dungeon.revealed = _revealedCache[key];
  if (_floorMapCache[key]) {

    game.dungeon.loot = _floorMapCache[key].loot;

  return false;

// Transition: overworld -> dungeon

  this.player.worldY = this.player.y;

  this.player.floor = 0;

// Transition: dungeon -> overworld

  this.player.y = this.player.worldY;

  this.pipeline._ambientColor = '#0a1008';

// Go up one floor within the dungeon
Game.prototype.goUpFloor = function() {
  _saveDungeonFloor(this);
  this.player.floor--;
  this.dungeon = generateDungeon(this.player.floor, this.dungeonSeed || 0);
  var revisited = _restoreDungeonFloor(this);
  this.player.x = this.dungeon.stairsX;
  this.player.y = this.dungeon.stairsY;
  this.dungeon.map[this.dungeon.spawnY][this.dungeon.spawnX] = T.STAIRS_UP;
  // Enemies respawn but fewer on revisited floors
  this.enemies = [];
  var bIdx = getBiomeIndex(this.player.floor);
  var archList = Object.keys(ARCHETYPES);
  for (var i = 0; i < this.dungeon.rooms.length; i++) {
    var room = this.dungeon.rooms[i];
    if (room.type === 'spawn' || room.type === 'shrine' || room.type === 'rest') continue;
    if (room.type === 'boss') {
      if (!revisited) this.enemies.push(createBoss(Math.floor(room.x + room.w / 2), Math.floor(room.y + room.h / 2), this.player.floor, bIdx));
      continue;
    }
    var count = 2 + Math.floor(Math.random() * (1 + this.player.floor * 0.3));
    if (revisited) count = Math.max(1, Math.floor(count * 0.3));
    for (var j = 0; j < count; j++) {
      var ex = room.x + 1 + Math.floor(Math.random() * Math.max(1, room.w - 2));
      var ey = room.y + 1 + Math.floor(Math.random() * Math.max(1, room.h - 2));
      if (ex >= room.x && ex < room.x + room.w && ey >= room.y && ey < room.y + room.h) {
        var tile = this.dungeon.map[ey][ex];
        if (tile === T.FLOOR || tile === T.WATER || tile === T.FUNGAL || tile === T.OIL) {
          var arch, roll = Math.random();
          if (this.player.floor < 3) { arch = roll < 0.4 ? 'swarm' : roll < 0.7 ? 'stalker' : 'shambler'; }
          else if (this.player.floor < 7) { arch = roll < 0.2 ? 'swarm' : roll < 0.4 ? 'stalker' : roll < 0.6 ? 'shambler' : roll < 0.85 ? 'caster' : 'brute'; }
          else if (this.player.floor < 13) { arch = roll < 0.15 ? 'swarm' : roll < 0.3 ? 'stalker' : roll < 0.5 ? 'shambler' : roll < 0.7 ? 'caster' : roll < 0.95 ? 'brute' : 'dragon'; }
          else { arch = roll < 0.1 ? 'swarm' : roll < 0.25 ? 'stalker' : roll < 0.4 ? 'shambler' : roll < 0.6 ? 'caster' : roll < 0.85 ? 'brute' : 'dragon'; }
          this.enemies.push(new Enemy(ex, ey, arch, this.player.floor, bIdx));
        }
      }
    }
  }
  this.revealAround(this.player.x, this.player.y, this.player.visionRadius);
  this.addLog('Ascended to floor ' + this.player.floor, '#aaccff');
  this.pipeline._ambientColor = this.dungeon.biome.ambientColor;
  this.pipeline._ambientIntensity = this.dungeon.biome.ambientIntensity;
};

// Equip loot — handles weapon, armor, resource, scroll types
// Old equipment auto-stashes. Called from loot prompt and legacy markers.
Game.prototype.equipLoot = function(loot, lootX, lootY) {
  var old = null;
  if (loot.type === 'weapon') {
    old = this.player.weapon;
    this.player.weapon = loot;
    this.player.weaponType = loot.range > 1 ? 'wand' : 'sword';
    if (this.player.abilities.length > 0 && this.player.abilities[0].isWeapon) {
      var a = this.player.abilities[0];
      a.damage = loot.damage; a.cooldown = loot.cd || 0; a.color = loot.color;
      if (loot.range > 1) { a.verb = 'launch'; a.shape = 'line'; a.maxRange = loot.range; a.name = loot.name.indexOf('Wand') >= 0 ? 'Wand Shot' : 'Ranged Shot'; }
      else { a.verb = 'strike'; a.shape = 'single'; delete a.maxRange; a.name = loot.name.indexOf('Sword') >= 0 ? 'Sword Strike' : 'Melee Strike'; }
      a.isHeal = false;
    }
    this.addLog('Equipped ' + loot.name, '#ddaa44');
  } else if (loot.type === 'armor') {
    old = this.player.armor;
    this.player.armor = loot;
    this.addLog('Equipped ' + loot.name, '#88aacc');
  } else if (loot.type === 'resource') {
    Bag.add(this.player.bag, loot.id, loot.count || 1);
    this.addLog('Found ' + loot.name, '#ddaa44');
  } else if (loot.type === 'scroll') {
    if (this.player.abilities.length < 4) {
      this.player.abilities.push(loot.ability);
      this.addLog('Learned ' + loot.ability.name + '!', '#cc66ff');
    } else {
      this._pendingAbility = loot.ability;
      StateStack.push(ReplaceAbilityState);
      return;
    }
  }
  // Old equipment auto-stashes
  if (old && old.name) {
    if (!this.player.stash) this.player.stash = [];
    this.player.stash.push(old);
    this.addLog(old.name + ' \u2192 stash', '#888');
  }
};
// Friend Donations System
// NPCs with high relationship occasionally leave resource gifts for the player.

(function registerFriendDonations() {

  var COMMON = ['oak_log', 'stone', 'branch', 'meadow_herb', 'flint'];
  var UNCOMMON = ['iron_ore', 'copper_ore', 'wild_berry', 'healing_salve'];
  var RARE = ['gem', 'health_potion', 'dried_fish'];

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function rollDonation(npc) {
    var rel = npc.relationship;
    if (rel < 50) return null;

    var chance, maxCount, pool;

    if (rel >= 100) {
      chance = 0.4;
      maxCount = 3;
      pool = COMMON.concat(UNCOMMON).concat(RARE);
    } else if (rel >= 75) {
      chance = 0.3;
      maxCount = 2;
      pool = COMMON.concat(UNCOMMON);
    } else {
      chance = 0.2;
      maxCount = 1;
      pool = COMMON;
    }

    if (Math.random() >= chance) return null;

    var count = 1 + Math.floor(Math.random() * maxCount);
    var resourceId = pickRandom(pool);

    return { id: resourceId, count: count };
  }

  function getResourceName(id) {
    var entry = ResourceRegistry.get(id);
    if (entry && entry.name) return entry.name;
    // Fallback: turn snake_case id into readable name
    return id.replace(/_/g, ' ');
  }

  GameEvents.on('turnEnd', function(game) {
    if (game.player.mode !== 'overworld') return;
    if (GameTime.turn % 100 !== 0) return;

    var logged = 0;
    var npcs = NPCManager.npcs;

    for (var i = 0; i < npcs.length; i++) {
      var npc = npcs[i];
      if (!npc.alive || !npc.resident) continue;
      if (npc.relationship < 50) continue;

      var donation = rollDonation(npc);
      if (!donation) continue;

      Bag.add(game.player.bag, donation.id, donation.count);

      if (logged < 2) {
        var name = getResourceName(donation.id);
        GameUtils.addLog(npc.name + ' left you a gift: ' + donation.count + 'x ' + name, '#88ccaa');
        logged++;
      }
    }
  });

})();

// ============================================================
// SYSTEM: Legacy — the world remembers your deaths
// ============================================================
// On death, a snapshot of your life is saved to meta.
// On new game (same world seed), legacy data is stamped onto
// the world: ghost villages as ruins, death markers with gear,
// ghost NPCs with memories, worn trails persist.

// Ruin tile for legacy buildings (reuses T_RUIN_FLOOR=121, T_RUIN_RUBBLE=123)
var LEGACY_STORAGE_KEY = 'wanderlust_legacy';

var LegacyManager = {
  ghosts: [],     // ghost NPCs spawned this run
  markers: [],    // death markers placed this run

  // Save a legacy snapshot on death
  captureOnDeath: function(game) {
    var p = game.player;
    var snapshot = {
      run: game.meta.totalRuns,
      name: p.hairStyle + ' ' + p.body, // crude identifier
      floor: p.floor,
      kills: p.kills,
      deathX: Math.round(p.x),
      deathY: Math.round(p.y),
      deathMode: p.mode,
      bestWeapon: p.weapon ? { name: p.weapon.name, color: p.weapon.color, damage: p.weapon.damage, range: p.weapon.range || 1, cd: p.weapon.cd || 0, atk: p.weapon.atk || 0 } : null,
      bestArmor: p.armor ? { name: p.armor.name, color: p.armor.color, defense: p.armor.defense, hp: p.armor.hp || 0 } : null,
      dungeonHearts: p.bag.dungeon_heart || 0,
      obeliskTier: (typeof ObeliskManager !== 'undefined' && ObeliskManager.placed) ? ObeliskManager.tier : 0,
      buildings: [],
      npcNames: [],
      trails: [],
      villageCenterX: 0,
      villageCenterY: 0,
      daysSurvived: typeof GameTime !== 'undefined' ? GameTime.day() : 0,
    };

    // Capture buildings
    if (typeof BuildingManager !== 'undefined') {
      for (var i = 0; i < BuildingManager.buildings.length; i++) {
        var b = BuildingManager.buildings[i];
        snapshot.buildings.push({ x: b.x, y: b.y, w: b.blueprint.size.w, h: b.blueprint.size.h, name: b.blueprint.name });
      }
      // Village center = average of building positions
      if (snapshot.buildings.length > 0) {
        var sx = 0, sy = 0;
        for (var i = 0; i < snapshot.buildings.length; i++) { sx += snapshot.buildings[i].x; sy += snapshot.buildings[i].y; }
        snapshot.villageCenterX = Math.round(sx / snapshot.buildings.length);
        snapshot.villageCenterY = Math.round(sy / snapshot.buildings.length);
      }
    }

    // Capture NPC names
    if (typeof NPCManager !== 'undefined') {
      for (var i = 0; i < NPCManager.npcs.length; i++) {
        var npc = NPCManager.npcs[i];
        if (npc.resident && npc.alive) {
          snapshot.npcNames.push({ name: npc.name, job: npc.job, x: npc.x, y: npc.y });
        }
      }
    }

    // Capture permanent trails (wear >= 6)
    if (typeof TrailManager !== 'undefined') {
      for (var key in TrailManager.trails) {
        if (TrailManager.trails[key] >= 6) { // only permanent paths
          snapshot.trails.push(key);
        }
      }
    }

    // Save to legacy array in localStorage
    var legacies = this._load();
    legacies.push(snapshot);
    // Keep last 10 legacies max
    if (legacies.length > 10) legacies = legacies.slice(-10);
    this._save(legacies);
  },

  // Stamp legacy data onto a new world
  applyLegacies: function(game) {
    var legacies = this._load();
    if (legacies.length === 0) return;

    this.ghosts = [];
    this.markers = [];

    for (var li = 0; li < legacies.length; li++) {
      var leg = legacies[li];

      // 1. Convert old buildings to ruins
      for (var bi = 0; bi < leg.buildings.length; bi++) {
        var b = leg.buildings[bi];
        for (var dy = 0; dy < b.h; dy++) {
          for (var dx = 0; dx < b.w; dx++) {
            var wx = b.x + dx, wy = b.y + dy;
            // Don't overwrite buildings from a later legacy
            var existing = Overworld.getTileChange(wx, wy);
            if (existing !== undefined) continue;
            // Random: some tiles become ruin floor, some rubble, some just gone
            var r = Math.random();
            if (r < 0.4) Overworld.setTile(wx, wy, 121); // T_RUIN_FLOOR
            else if (r < 0.7) Overworld.setTile(wx, wy, 123); // T_RUIN_RUBBLE
            // else: tile reverts to natural terrain (building collapsed completely)
          }
        }
      }

      // 2. Death marker — skeleton with equipment AND dungeon hearts
      if (leg.deathMode === 'overworld') {
        var mx = leg.deathX, my = leg.deathY;
        this.markers.push({
          x: mx, y: my,
          weapon: leg.bestWeapon,
          armor: leg.bestArmor,
          hearts: leg.dungeonHearts || 0,
          run: leg.run,
          kills: leg.kills,
          floor: leg.floor,
          days: leg.daysSurvived,
        });
      }

      // 3. Ghost NPCs at the old village center
      if (leg.npcNames.length > 0 && typeof NPCManager !== 'undefined') {
        // Spawn 1-2 ghosts from this legacy
        var ghostCount = Math.min(2, leg.npcNames.length);
        for (var gi = 0; gi < ghostCount; gi++) {
          var npcData = leg.npcNames[gi];
          var gx = leg.villageCenterX + (gi === 0 ? 0 : 1);
          var gy = leg.villageCenterY;
          this.ghosts.push({
            x: gx, y: gy,
            name: npcData.name,
            job: npcData.job,
            run: leg.run,
            kills: leg.kills,
            floor: leg.floor,
            days: leg.daysSurvived,
          });
        }
      }

      // 4. Restore permanent trails
      if (typeof TrailManager !== 'undefined') {
        for (var ti = 0; ti < leg.trails.length; ti++) {
          var key = leg.trails[ti];
          // Only set if not already a path
          if (!TrailManager.trails[key]) {
            TrailManager.trails[key] = 4; // partially worn — not fully permanent, but visible
            var parts = key.split(',');
            var wx = parseInt(parts[0], 10), wy = parseInt(parts[1], 10);
            Overworld.setTile(wx, wy, 215); // T_WORN_TRAIL
          }
        }
      }
    }
  },

  _load: function() {
    try {
      var raw = localStorage.getItem(LEGACY_STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  },

  _save: function(legacies) {
    try { localStorage.setItem(LEGACY_STORAGE_KEY, JSON.stringify(legacies)); } catch(e) {}
  },
};

// On death — capture legacy BEFORE save is deleted
var _origDie = Game.prototype.die;

// Shared consequences when an NPC is killed
Game.prototype._npcKillConsequences = function(npc) {
  var p = this.player;
  // All other NPCs lose relationship
  for (var ni = 0; ni < NPCManager.npcs.length; ni++) {
    var other = NPCManager.npcs[ni];
    if (other !== npc && other.alive) {
      other.relationship = Math.max(-100, (other.relationship || 0) - 30);
      if (other.relationship <= -50 && other.resident) {
        other.resident = false;
        other.home = null;
        other.job = null;
        other.state = 'walking';
        GameUtils.addLog(other.name + ' flees in terror!', '#cc6644');
      }
    }
  }
  // Loot based on job/type
  var loot = [];
  if (npc.job === 'woodcutting') loot.push({ id: 'oak_log', count: 2 + Math.floor(Math.random() * 3), name: 'Oak Log' });
  else if (npc.job === 'herbalism') loot.push({ id: 'meadow_herb', count: 2 + Math.floor(Math.random() * 2), name: 'Herb' });
  else if (npc.job === 'gathering') loot.push({ id: 'stone', count: 3 + Math.floor(Math.random() * 3), name: 'Stone' });
  else if (npc.job === 'mining') loot.push({ id: 'iron_ore', count: 1 + Math.floor(Math.random() * 2), name: 'Iron Ore' });
  else if (npc.job === 'fishing') loot.push({ id: 'trout', count: 2 + Math.floor(Math.random() * 2), name: 'Trout' });
  if (npc._travellerType) {
    var tt = npc._travellerType.title;
    if (tt === 'Hunter') loot.push({ id: 'leather', count: 2 + Math.floor(Math.random() * 3), name: 'Leather' });
    else if (tt === 'Trader') loot.push({ id: 'gold_coin', count: 5 + Math.floor(Math.random() * 10), name: 'Gold' });
    else if (tt === 'Adventurer') loot.push({ id: 'healing_salve', count: 1 + Math.floor(Math.random() * 2), name: 'Healing Salve' });
    else if (tt === 'Prospector') loot.push({ id: 'copper_ore', count: 2 + Math.floor(Math.random() * 3), name: 'Copper Ore' });
  }
  if (npc.isMerchant) {
    loot.push({ id: 'gold_coin', count: 15 + Math.floor(Math.random() * 20), name: 'Gold' });
  }
  if (loot.length === 0) {
    var scraps = [
      { id: 'branch', count: 1 + Math.floor(Math.random() * 3), name: 'Branch' },
      { id: 'flint', count: 1, name: 'Flint' },
      { id: 'wheat', count: 1 + Math.floor(Math.random() * 2), name: 'Wheat' },
    ];
    loot.push(scraps[Math.floor(Math.random() * scraps.length)]);
  }
  for (var li = 0; li < loot.length; li++) {
    Bag.add(p.bag, loot[li].id, loot[li].count);
    GameUtils.addLog('+' + loot[li].count + ' ' + loot[li].name, '#aa8866');
  }
  p.kills++;
};

// NPC name generation
var NPC_FIRST_NAMES = ['Aela','Bjorn','Cora','Dain','Elara','Finn','Greta','Haldor','Iris','Jaska',
  'Kael','Lyra','Milo','Nessa','Orin','Petra','Quinn','Runa','Soren','Talia',

var NPC_TITLES = ['the Wanderer','the Bold','the Quiet','the Keen','the Weary','the Brave',
  'the Lost','the Curious','the Steady','the Swift','the Old','the Young'];

function randomNpcName(rng) {
  var r = rng || Math.random;
  var name = NPC_FIRST_NAMES[Math.floor(r() * NPC_FIRST_NAMES.length)];
  if (r() < 0.3) name += ' ' + NPC_TITLES[Math.floor(r() * NPC_TITLES.length)];
  return name;
}

// NPC constructor
function NPC(wx, wy, opts) {
  opts = opts || {};
  this.x = wx;
  this.y = wy;
  this.name = opts.name || randomNpcName();
  this.body = opts.body || (Math.random() < 0.5 ? 'broad' : 'narrow');
  this.bodyColor = opts.bodyColor || ['#aa4422','#2244aa','#228844','#886622','#664488','#448888'][Math.floor(Math.random() * 6)];
  this.hairColor = opts.hairColor || ['#443322','#221100','#ccaa44','#aa3311','#eeeeee'][Math.floor(Math.random() * 5)];
  this.hairStyle = opts.hairStyle || ['short','long','spiky','bald','ponytail'][Math.floor(Math.random() * 5)];
  this.skinColor = opts.skinColor || ['#ffcc88','#eebb77','#cc9966','#aa7744','#886633'][Math.floor(Math.random() * 5)];
  this.height = opts.height || 'average';
  this.frame = opts.frame || ['average','stocky','slim'][Math.floor(Math.random() * 3)];

  // Skills — NPCs have skill levels too
  this.skills = {};
  var skillList = ['woodcutting','herbalism','gathering','combat','building'];
  for (var i = 0; i < skillList.length; i++) {
    this.skills[skillList[i]] = Math.floor(Math.random() * 5); // 0-4 starting level
  }

  // State
  this.alive = true;
  this.animTimer = Math.random() * 10;
  this.walkTimer = 0;
  this.lastDir = { x: 0, y: 1 };
  this.moveAccum = 0;
  this.speed = 0.3; // moves every ~3 turns
  this.home = null;  // {x,y} of assigned home
  this.job = null;   // 'woodcutter', 'herbalist', etc.
  this.path = null;  // [{x,y},...] current movement path
  this.pathIdx = 0;
  this.state = 'idle'; // idle, walking, working
  this.talkable = true;
  this.relationship = 0; // -100 to 100 with player
  this.resident = false; // true if lives in village

  // What they say when talked to
  this.dialogue = opts.dialogue || null;
}

// Simple pathfinding toward a target — greedy, avoids walls
NPC.prototype.moveToward = function(tx, ty) {
  var dx = tx - this.x, dy = ty - this.y;
  if (dx === 0 && dy === 0) return false;
  var mdx = dx !== 0 ? Math.sign(dx) : 0;
  var mdy = dy !== 0 ? Math.sign(dy) : 0;
  // Try primary direction, then secondary
  var tries = Math.abs(dx) >= Math.abs(dy)
    ? [{x:mdx,y:0},{x:0,y:mdy},{x:mdx,y:mdy}]
    : [{x:0,y:mdy},{x:mdx,y:0},{x:mdx,y:mdy}];
  for (var i = 0; i < tries.length; i++) {
    var nx = this.x + tries[i].x, ny = this.y + tries[i].y;
    if (!Overworld.isPassable(nx, ny)) continue;
    // Don't walk onto player
    var p = GameUtils.player();
    if (p && nx === p.x && ny === p.y) continue;
    // Don't walk onto other NPCs
    var blocked = false;
    for (var j = 0; j < NPCManager.npcs.length; j++) {
      var other = NPCManager.npcs[j];
      if (other !== this && other.alive && other.x === nx && other.y === ny) { blocked = true; break; }
    }
    if (blocked) continue;
    this.lastDir = tries[i];
    this.x = nx; this.y = ny;
    this.walkTimer = 0.35;
    return true;
  }
  return false;
};

// NPC Manager — global list, tick, render
var NPCManager = {
  npcs: [],

  add: function(npc) { this.npcs.push(npc); return npc; },

  remove: function(npc) {
    var idx = this.npcs.indexOf(npc);
    if (idx >= 0) this.npcs.splice(idx, 1);
  },

  // Get NPC at world position
  getAt: function(wx, wy) {
    for (var i = 0; i < this.npcs.length; i++) {
      if (this.npcs[i].alive && this.npcs[i].x === wx && this.npcs[i].y === wy) return this.npcs[i];
    }
    return null;
  },

  clear: function() { this.npcs = []; },
};

// Tick NPC AI every turn — daily routines for residents
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  var hour = GameTime.hour();

  for (var i = 0; i < NPCManager.npcs.length; i++) {
    var npc = NPCManager.npcs[i];
    if (!npc.alive) continue;

    npc.moveAccum += npc.speed;
    if (npc.moveAccum < 1) continue;
    npc.moveAccum -= 1;

    if (npc.resident && npc.home) {
      // Daily schedule for residents
      if (hour >= 21 || hour < 6) {
        // Night: go home and stay
        npc.state = 'sleeping';
        if (npc.x !== npc.home.x || npc.y !== npc.home.y) {
          npc.moveToward(npc.home.x, npc.home.y);
        }
      } else if (hour >= 6 && hour < 8) {
        // Morning: wander near home
        npc.state = 'idle';
        if (Math.random() < 0.3) {
          var d = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random()*4)];
          var nx = npc.home.x + d.x, ny = npc.home.y + d.y;
          npc.moveToward(nx, ny);
        }
      } else if (hour >= 8 && hour < 17) {
        // Work hours: gather resources near home based on job skill
        npc.state = 'working';
        // Wander within work radius looking for resources
        if (Math.random() < 0.5) {
          var d = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random()*4)];
          var nx = npc.x + d.x, ny = npc.y + d.y;
          // Stay within 8 tiles of home
          if (Math.abs(nx - npc.home.x) <= 8 && Math.abs(ny - npc.home.y) <= 8) {
            npc.moveToward(nx, ny);
          } else {
            npc.moveToward(npc.home.x, npc.home.y);
          }
        }
        // NPC gathers resources passively (every ~30 turns)
        if (GameTime.turn % 30 === 0 && npc.job) {
          var skill = npc.skills[npc.job] || 0;
          if (skill > 0 && Math.random() < 0.3 + skill * 0.05) {
            // Add a small amount of relevant resource to player bag
            var gathered = null;
            if (npc.job === 'woodcutting') gathered = { id: 'oak_log', name: 'Oak Log' };
            else if (npc.job === 'herbalism') gathered = { id: 'meadow_herb', name: 'Herb' };
            else if (npc.job === 'gathering') gathered = { id: 'stone', name: 'Stone' };
            if (gathered) {
              Bag.add(game.player.bag, gathered.id, 1);
              GameUtils.addLog(npc.name + ' gathered ' + gathered.name, '#888');
            }
          }
        }
      } else {
        // Evening: wander freely
        npc.state = 'idle';
        if (Math.random() < 0.3) {
          var d = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random()*4)];
          npc.moveToward(npc.x + d.x, npc.y + d.y);
        }
        // Head home as it gets late
        if (hour >= 19) {
          if (Math.random() < 0.4) npc.moveToward(npc.home.x, npc.home.y);
        }
      }
    } else {
      // Non-residents: wander randomly
      if (npc.state === 'idle') {
        if (Math.random() < 0.3) {
          var d = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random()*4)];
          npc.moveToward(npc.x + d.x, npc.y + d.y);
        }
      }
    }
  }
});

// Rare traveller spawning — frequency scales with village reputation
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  if (typeof BuildingManager === 'undefined') return;

  // Base check frequency: every 500 turns (~8 hours game time)
  // With buildings: every 300 turns
  // With high reputation: every 150 turns
  var rep = (typeof VillageReputation !== 'undefined') ? VillageReputation.calculate(game) : 0;
  var buildingCount = BuildingManager.buildings.length;
  var checkInterval = 500;
  if (buildingCount > 0) checkInterval = 300;
  if (rep >= 50) checkInterval = 150;
  if (rep >= 80) checkInterval = 100;

  if (GameTime.turn % checkInterval !== 0) return;

  // Spawn chance also scales: 20% base, up to 60% with high rep
  var spawnChance = 0.2 + Math.min(0.4, rep / 200);
  if (Math.random() > spawnChance) return;

  // Cap wanderers: 1 without buildings, vacant homes count with buildings
  var nonResidents = 0;
  for (var i = 0; i < NPCManager.npcs.length; i++) {
    if (!NPCManager.npcs[i].resident && NPCManager.npcs[i].alive && !NPCManager.npcs[i]._isGhost && !NPCManager.npcs[i].isMerchant) nonResidents++;
  }
  var maxWanderers = buildingCount > 0 ? Math.max(1, BuildingManager.getVacantHomes().length) : 1;
  if (nonResidents >= maxWanderers) return;

  // Spawn at edge of view
  var p = game.player;
  var edge = CONFIG.VIEW_W + 3;
  var dirs = [{x:edge,y:0},{x:-edge,y:0},{x:0,y:edge},{x:0,y:-edge}];
  var d = dirs[Math.floor(Math.random() * 4)];
  var sx = p.x + d.x + Math.floor(Math.random() * 5) - 2;
  var sy = p.y + d.y + Math.floor(Math.random() * 5) - 2;
  if (_origIsPassable.call(Overworld, sx, sy)) {
    var type = TRAVELLER_TYPES[Math.floor(Math.random() * TRAVELLER_TYPES.length)];
    var npc = new NPC(sx, sy);
    npc.state = 'walking';
    npc._travellerType = type;
    npc.dialogue = type.greeting;
    // Boost their specialty skill
    if (type.bestSkill && npc.skills[type.bestSkill] !== undefined) {
      npc.skills[type.bestSkill] = Math.max(npc.skills[type.bestSkill], 2 + Math.floor(Math.random() * 3));
    }
    NPCManager.add(npc);
    var direction = d.x > 0 ? 'east' : d.x < 0 ? 'west' : d.y > 0 ? 'south' : 'north';
    GameUtils.addLog('A ' + type.title.toLowerCase() + ' approaches from the ' + direction + '.', '#aaccaa');
  }
});

// Walking travellers move toward player area
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  for (var i = 0; i < NPCManager.npcs.length; i++) {
    var npc = NPCManager.npcs[i];
    if (!npc.alive || npc.resident || npc.state !== 'walking') continue;
    var dx = game.player.x - npc.x, dy = game.player.y - npc.y;
    var dist = Math.abs(dx) + Math.abs(dy);
    // Stop walking when close to player
    if (dist < 8) { npc.state = 'idle'; continue; }
    // Move toward player slowly
    npc.moveAccum += 0.15;
    if (npc.moveAccum >= 1) { npc.moveAccum -= 1; npc.moveToward(game.player.x, game.player.y); }
    // Despawn if too far away (wandered off or player moved)
    if (dist > 60) { npc.alive = false; }
  }
  // Clean dead NPCs
  NPCManager.npcs = NPCManager.npcs.filter(function(n) { return n.alive; });
});

// --- Obelisk Manager ---
var ObeliskManager = {

  TIER_COSTS: [

// --- Obelisk Tile ---
var T_OBELISK = TileRegistry.add({
  id: 217,
  name: 'obelisk',
  solid: true,
  light: { color: '#8866ff', radius: 3, intensity: 0.4 },
  onInteract: function(game, wx, wy) {
    ObeliskManager.interact(game);
  },
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var tier = ObeliskManager.tier;
    var color = ObeliskManager.TIER_COLORS[tier];

    // Ground under pedestal — dark stone
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(sx, sy, ts, ts);

    // Stone pedestal base
    ctx.fillStyle = '#555555';
    ctx.fillRect(sx + 2 * m, sy + 10 * m, 12 * m, 6 * m);
    ctx.fillStyle = '#666666';
    ctx.fillRect(sx + 3 * m, sy + 10 * m, 10 * m, 2 * m);

    // Main shaft — extends upward beyond tile
    var shaftW = 4 * m;
    var shaftX = sx + 6 * m;
    var shaftTop = sy - 10 * m - tier * 2 * m; // grows taller with tier
    var shaftBot = sy + 10 * m;

    // Shaft shadow (left side darker)
    ctx.fillStyle = shadeHex(color, -40);
    ctx.fillRect(shaftX, shaftTop, shaftW, shaftBot - shaftTop);

    // Shaft main body
    ctx.fillStyle = color;
    ctx.fillRect(shaftX + 1 * m, shaftTop, (shaftW - 1 * m), shaftBot - shaftTop);

    // Shaft highlight (right edge)
    ctx.fillStyle = shadeHex(color, 30);
    ctx.fillRect(shaftX + shaftW - 1 * m, shaftTop + 2 * m, 1 * m, (shaftBot - shaftTop) - 4 * m);

    // Pointed tip
    ctx.beginPath();
    ctx.moveTo(shaftX, shaftTop);
    ctx.lineTo(shaftX + shaftW / 2, shaftTop - 4 * m);
    ctx.lineTo(shaftX + shaftW, shaftTop);
    ctx.closePath();
    ctx.fillStyle = shadeHex(color, 20);
    ctx.fill();

    // Tier markings — horizontal lines on shaft
    for (var i = 0; i < tier; i++) {
      var markY = shaftBot - 3 * m - i * 4 * m;
      if (markY > shaftTop) {
        ctx.fillStyle = shadeHex(color, 50);
        ctx.fillRect(shaftX + 1 * m, markY, shaftW - 2 * m, 1 * m);
      }
    }

    // Tier 3+: glowing particles
    if (tier >= 3 && animTimer !== undefined) {
      var pulse = Math.sin(animTimer * 3) * 0.3 + 0.5;
      var particleCount = tier >= 5 ? 8 : (tier >= 4 ? 6 : 4);
      for (var pi = 0; pi < particleCount; pi++) {
        var angle = (animTimer * 0.8 + pi * (Math.PI * 2 / particleCount));
        var radius = (3 + Math.sin(animTimer * 2 + pi) * 1.5) * m;
        var px = shaftX + shaftW / 2 + Math.cos(angle) * radius;
        var py = (shaftTop + shaftBot) / 2 + Math.sin(angle) * radius * 1.5;
        var pSize = (0.5 + pulse * 0.5) * m;
        ctx.globalAlpha = 0.4 + pulse * 0.3;
        ctx.fillStyle = tier >= 5 ? '#ffffff' : color;
        ctx.fillRect(px - pSize / 2, py - pSize / 2, pSize, pSize);
      }
      ctx.globalAlpha = 1.0;
    }

    // Tier 5: brilliant white glow
    if (tier === 5 && animTimer !== undefined) {
      var glowPulse = Math.sin(animTimer * 2) * 0.15 + 0.25;
      var cx = shaftX + shaftW / 2;
      var cy = (shaftTop + shaftBot) / 2;
      for (var gi = 3; gi >= 1; gi--) {
        var gr = gi * 4 * m;
        ctx.globalAlpha = glowPulse / gi;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(cx, cy, gr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;
    }
  },
});

  // Pulsing aura — concentric circles
  var pulse = Math.sin(t * 2) * 0.1 + 0.2;
  var rings = tier >= 5 ? 5 : (tier >= 4 ? 4 : 3);
  for (var i = rings; i >= 1; i--) {
    var r = (i * 1.5 + Math.sin(t * 1.5 + i) * 0.5) * ts;
    ctx.globalAlpha = pulse / (i * 0.7);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Tier 5: golden rays
  if (tier === 5) {
    var rayCount = 8;
    var rayLen = 3 * ts;
    ctx.lineWidth = 1.5;
    for (var ri = 0; ri < rayCount; ri++) {

      var rayPulse = Math.sin(t * 3 + ri * 0.7) * 0.15 + 0.25;
      ctx.globalAlpha = rayPulse;
      ctx.strokeStyle = '#ffcc44';
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * rayLen, cy + Math.sin(angle) * rayLen);
      ctx.stroke();
    }
  }

  ctx.globalAlpha = 1.0;
});

// ============================================================
// SYSTEM: Relationships — affinity, romance, families
// ============================================================

// Relationship data stored on NPCs: npc.relationships = { 'OtherName': score }
// Score: -100 (hostile) to 100 (soulmate)
// 0-20: acquaintance, 20-50: friend, 50-75: close friend, 75+: romantic (if compatible)

var Relationships = {
  // Get relationship score between two NPCs
  get: function(npc, otherName) {
    if (!npc.relationships) npc.relationships = {};
    return npc.relationships[otherName] || 0;
  },

  // Adjust relationship
  adjust: function(npc, otherName, amount) {
    if (!npc.relationships) npc.relationships = {};
    var old = npc.relationships[otherName] || 0;
    npc.relationships[otherName] = Math.max(-100, Math.min(100, old + amount));
    return npc.relationships[otherName];
  },

  // Get relationship label
  label: function(score) {
    if (score >= 75) return 'romantic';
    if (score >= 50) return 'close friend';
    if (score >= 20) return 'friend';
    if (score > -20) return 'acquaintance';
    if (score > -50) return 'disliked';
    return 'hostile';
  },

  // Check if two NPCs can become romantic
  canRomance: function(a, b) {
    var scoreA = this.get(a, b.name);
    var scoreB = this.get(b, a.name);
    return scoreA >= 75 && scoreB >= 75 && a.resident && b.resident;
  },
};

// NPCs who are near each other build affinity over time
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  // Only check every 20 turns to avoid performance cost
  if (GameTime.turn % 20 !== 0) return;

  var npcs = NPCManager.npcs;
  for (var i = 0; i < npcs.length; i++) {
    var a = npcs[i];
    if (!a.alive || !a.resident) continue;

    for (var j = i + 1; j < npcs.length; j++) {
      var b = npcs[j];
      if (!b.alive || !b.resident) continue;

      var dx = a.x - b.x, dy = a.y - b.y;
      var dist = Math.abs(dx) + Math.abs(dy);

      // Proximity builds affinity
      if (dist <= 3) {
        Relationships.adjust(a, b.name, 0.3);
        Relationships.adjust(b, a.name, 0.3);
      }

      // Same job builds affinity faster
      if (a.job && a.job === b.job && dist <= 6) {
        Relationships.adjust(a, b.name, 0.2);
        Relationships.adjust(b, a.name, 0.2);
      }

      // Neighbours (homes within 5 tiles) build affinity
      if (a.home && b.home) {
        var homeDist = Math.abs(a.home.x - b.home.x) + Math.abs(a.home.y - b.home.y);
        if (homeDist <= 5) {
          Relationships.adjust(a, b.name, 0.1);
          Relationships.adjust(b, a.name, 0.1);
        }
      }

      // Romance check — if both at 75+, chance of child
      if (Relationships.canRomance(a, b)) {
        // Only one child per pair, check every ~500 turns
        if (GameTime.turn % 500 === 0 && Math.random() < 0.15) {
          var pairKey = a.name < b.name ? a.name + '+' + b.name : b.name + '+' + a.name;
          if (!Relationships._children) Relationships._children = {};
          if (!Relationships._children[pairKey]) {
            Relationships._children[pairKey] = true;
            spawnChild(a, b, game);
          }
        }
      }
    }
  }
});

function spawnChild(parentA, parentB, game) {
  // Child spawns near parents' home
  var home = parentA.home || parentB.home;
  if (!home) return;

  var child = new NPC(home.x, home.y, {
    name: randomNpcName(),
    body: Math.random() < 0.5 ? 'broad' : 'narrow',
    // Mix parent appearance
    bodyColor: Math.random() < 0.5 ? parentA.bodyColor : parentB.bodyColor,
    hairColor: Math.random() < 0.5 ? parentA.hairColor : parentB.hairColor,
    skinColor: Math.random() < 0.5 ? parentA.skinColor : parentB.skinColor,
    hairStyle: ['short', 'long', 'spiky'][Math.floor(Math.random() * 3)],
  });

  // Child starts with lower skills but inherits talent
  child.skills = {};
  for (var s in parentA.skills) {
    child.skills[s] = Math.floor(Math.max(parentA.skills[s] || 0, parentB.skills[s] || 0) * 0.3);
  }

  child.resident = true;
  child.home = home;
  child.speed = 0.15; // children move slowly
  child.isChild = true;
  child.birthTurn = GameTime.turn;

  NPCManager.add(child);
  GameUtils.addLog(parentA.name + ' and ' + parentB.name + ' had a child: ' + child.name + '!', '#ff88aa');
  GameEvents.fire('childBorn', game, child, parentA, parentB);
}

// Children grow up over time — after 2000 turns they become full adults
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  if (GameTime.turn % 100 !== 0) return;

  for (var i = 0; i < NPCManager.npcs.length; i++) {
    var npc = NPCManager.npcs[i];
    if (!npc.isChild || !npc.alive) continue;
    var age = GameTime.turn - (npc.birthTurn || 0);
    if (age >= 2000) {
      npc.isChild = false;
      npc.speed = 0.2;
      // Boost skills on growing up
      for (var s in npc.skills) npc.skills[s] = Math.min(5, (npc.skills[s] || 0) + 1);
      GameUtils.addLog(npc.name + ' has grown up!', '#ffcc88');
    }
  }
});

// Show relationships in NPC dialogue
var _origBuildDialogue2 = typeof buildNpcDialogue === 'function' ? buildNpcDialogue : null;
if (_origBuildDialogue2) {
  var _prevBuilder = buildNpcDialogue;
  buildNpcDialogue = function(npc, game) {
    var result = _prevBuilder(npc, game);
    // Add relationship info for residents
    if (npc.resident && npc.relationships) {
      var rels = [];
      for (var name in npc.relationships) {
        var score = npc.relationships[name];
        if (score >= 20) {
          rels.push(name + ' (' + Relationships.label(score) + ')');
        }
      }
      if (rels.length > 0) {
        result.lines.push({ text: 'Close to: ' + rels.join(', '), color: '#aa88aa' });
      }
    }
    if (npc.isChild) {
      result.lines.push({ text: '(Child — still growing)', color: '#ffaacc' });
    }
    return result;
  };
}

  save: function() {

// SYSTEM: Swimming — player can enter water tiles, moves slowly
// ============================================================
// Water and shallows are normally impassable. With swimming:
// - Shallows: always walkable (slow)
// - Water: walkable but drains 1 HP per turn
// - Deep water (T.WALL type ocean): still impassable
// Player moves at half speed in water (extra turn cooldown)

// Override isPassable to allow water/shallows
var _origIsPassableSwim = Overworld.isPassable;
Overworld.isPassable = function(wx, wy) {
  var tile = this.getTile(wx, wy);
  // Allow shallows and water (but not walls/solid)
  if (tile.type === T.SHALLOWS) return true;
  if (tile.type === T.WATER) return true;
  return _origIsPassableSwim.call(Overworld, wx, wy);
};

// Slow movement in water — extra turn cooldown
GameEvents.on('playerMove', function(game, nx, ny) {
  if (game.player.mode !== 'overworld') return;
  var tile = Overworld.getTile(nx, ny);
  if (tile.type === T.WATER || tile.type === T.SHALLOWS || tile.type === 162 || tile.type === 160 || tile.type === 161) {
    game.turnCooldown += 0.08; // slower movement
    game.player.walkTimer = 0.5; // longer walk animation
  }
});

// Water damage — 1 HP per turn in deep overworld water
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  var px = Math.round(game.player.x), py = Math.round(game.player.y);
  var tile = Overworld.getTile(px, py);
  if (tile.type === T.WATER) {
    game.player.hp -= 1;
    if (GameTime.turn % 3 === 0) {
      GameUtils.addLog('Swimming... -1 HP', '#4488cc');
    }
    GameUtils.addFloating(px, py, '-1', '#4488cc');
    if (game.player.hp <= 0) { game.player.hp = 0; game.die(); }
  }
});

// Cold damage — standing in any water (overworld or dungeon) chills
GameEvents.on('turnEnd', function(game) {
  var px = Math.round(game.player.x), py = Math.round(game.player.y);
  var inWater = false;
  if (game.player.mode === 'overworld' && typeof Overworld !== 'undefined') {
    var tile = Overworld.getTile(px, py);
    inWater = (tile.type === T.WATER || tile.type === T.SHALLOWS);
  } else if (game.player.mode === 'dungeon' && game.dungeon) {
    if (px >= 0 && px < CONFIG.MAP_W && py >= 0 && py < CONFIG.MAP_H) {
      inWater = (game.dungeon.map[py][px] === T.WATER);
    }
  }
  if (!inWater) { game.player._coldTurns = 0; return; }
  // Cold builds up over time
  if (!game.player._coldTurns) game.player._coldTurns = 0;
  game.player._coldTurns++;
  // After 3 turns in water, start taking cold damage
  if (game.player._coldTurns > 3 && game.player._coldTurns % 2 === 0) {
    game.player.hp -= 1;
    GameUtils.addFloating(px, py, 'Cold', '#66ccff');
    if (game.player._coldTurns === 4) {
      GameUtils.addLog('The cold water saps your strength...', '#66aacc');
    }
    if (game.player.hp <= 0) { game.player.hp = 0; game.die(); }
  }
});

// ============================================================
// SYSTEM: Time — day/night cycle, seasons, turn-based clock
// ============================================================
// Each turn = ~1 minute game time
// 60 turns = 1 hour, 1440 turns = 1 day
// 30 days = 1 season, 4 seasons = 1 year

var GameTime = {
  turn: 0,           // total turns since game start
  minutesPerTurn: 1,
  hoursPerDay: 24,
  daysPerSeason: 30,
  seasonsPerYear: 4,
  seasonNames: ['Spring', 'Summer', 'Autumn', 'Winter'],

  // Derived values — recalculated for convenience
  turnsPerHour: 60,
  turnsPerDay: 1440,
  turnsPerSeason: 43200,
  turnsPerYear: 172800,

  init: function() {
    this.turn = 0;
  },

  tick: function() {
    this.turn++;
  },

  // Current time of day (0-23)
  hour: function() {
    return Math.floor((this.turn % this.turnsPerDay) / this.turnsPerHour);
  },

  // Current minute (0-59)
  minute: function() {
    return this.turn % this.turnsPerHour;
  },

  // Time as fraction of day (0.0 = midnight, 0.5 = noon)
  dayProgress: function() {
    return (this.turn % this.turnsPerDay) / this.turnsPerDay;
  },

  // Current day number (0-based)
  day: function() {
    return Math.floor(this.turn / this.turnsPerDay);
  },

  // Day within current season (0-29)
  dayOfSeason: function() {
    return this.day() % this.daysPerSeason;
  },

  // Current season index (0-3)
  season: function() {
    return Math.floor(this.day() / this.daysPerSeason) % this.seasonsPerYear;
  },

  seasonName: function() {
    return this.seasonNames[this.season()];
  },

  // Current year (0-based)
  year: function() {
    return Math.floor(this.turn / this.turnsPerYear);
  },

  // Is it daytime? (6am - 8pm)
  isDaytime: function() {
    var h = this.hour();
    return h >= 6 && h < 20;
  },

  // Is it night? (9pm - 5am)
  isNight: function() {
    var h = this.hour();
    return h >= 21 || h < 5;
  },

  // Dawn/dusk transition (5-6am, 8-9pm)
  isTransition: function() {
    return !this.isDaytime() && !this.isNight();
  },

  // Light level 0-1 based on time of day (smooth curve)
  lightLevel: function() {
    var p = this.dayProgress();
    // Midnight = 0, noon = 1, smooth sine curve
    // Offset so 0.25 (6am) starts rising, 0.75 (6pm) starts falling
    var raw = Math.sin((p - 0.25) * Math.PI);
    return Math.max(0.05, Math.min(1.0, raw * 0.6 + 0.4));
  },

  // Formatted time string "Day 3, Spring — 14:30"
  formatted: function() {
    var h = this.hour();
    var m = this.minute();
    return 'Day ' + (this.dayOfSeason() + 1) + ', ' + this.seasonName() +
      ' \u2014 ' + (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
  },

  // Short format "14:30"
  timeString: function() {
    var h = this.hour();
    var m = this.minute();
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
  },
};

// Tick time every turn
GameEvents.on('turnEnd', function(game) {
  GameTime.tick();
});

// Check if player has the required tool for a skill
// Returns: { allowed: bool, toolId: string|null, message: string }
function checkTool(player, skillId) {
  var req = TOOL_REQUIREMENTS[skillId];
  if (!req || !req.required) return { allowed: true, toolId: null, message: '' };

  // Find the best tool for this skill in player's bag
  var bestTool = null, bestTier = 0;
  for (var tid in TOOLS) {
    var t = TOOLS[tid];
    if (t.skill === skillId && Bag.has(player.bag, tid)) {
      if (t.tier > bestTier) { bestTier = t.tier; bestTool = tid; }
    }
  }

  if (!bestTool) {
    // Tell the player what they need
    var needed = req.tierNames[1] || 'a tool';
    return { allowed: false, toolId: null, message: 'Need ' + needed + ' (craft with [C])' };
  }

  return { allowed: true, toolId: bestTool, message: '' };
}

// Consume durability on a tool — removes it from bag when broken
function useTool(player, toolId) {
  if (!toolId) return;
  // Track durability in a separate map on the player
  if (!player.toolDurability) player.toolDurability = {};
  if (player.toolDurability[toolId] === undefined) {
    player.toolDurability[toolId] = TOOLS[toolId].durability;
  }
  player.toolDurability[toolId]--;
  if (player.toolDurability[toolId] <= 0) {
    Bag.remove(player.bag, toolId, 1);
    delete player.toolDurability[toolId];
    var def = TOOLS[toolId];
    GameUtils.addLog(def.name + ' broke!', '#cc6644');
    // If there's another of the same tool, start fresh durability
  }
}

// Get durability display for a tool
function getToolDurability(player, toolId) {
  if (!player.toolDurability || player.toolDurability[toolId] === undefined) {
    return TOOLS[toolId] ? TOOLS[toolId].durability : 0;
  }
  return player.toolDurability[toolId];
}

// Hook into skill interactions — intercept before the skill handler runs
// We wrap the SkillRegistry.getHandlersForTile to add tool checks
var _origGetHandlers = SkillRegistry.getHandlersForTile;
SkillRegistry.getHandlersForTile = function(tileId) {
  var handlers = _origGetHandlers.call(SkillRegistry, tileId);
  if (handlers.length === 0) return handlers;

  // Wrap each handler with a tool check
  return handlers.map(function(h) {
    return {
      skill: h.skill,
      handler: function(game, tileType, wx, wy) {
        var skillId = h.skill.id;
        var check = checkTool(game.player, skillId);
        if (!check.allowed) {
          GameUtils.addLog(check.message, '#cc8844');
          return true; // consumed the interaction, but didn't gather
        }
        var result = h.handler(game, tileType, wx, wy);
        if (result && check.toolId) {
          useTool(game.player, check.toolId);
        }
        return result;
      }
    };
  });
};

// Show equipped tool in HUD via event

  // Tool display — below equipment panel on top right
  var eqX = w - Math.min(180, w * 0.2) - 10;
  var ty = fs * 5.5; // below the existing equipment display

  // Find active tools
  var toolLines = [];
  for (var tid in TOOLS) {
    if (Bag.has(p.bag, tid)) {
      var t = TOOLS[tid];
      var dur = getToolDurability(p, tid);
      var maxDur = t.durability;
      var pct = Math.round(dur / maxDur * 100);
      toolLines.push({ name: t.name, dur: dur, max: maxDur, pct: pct, color: t.color });
    }
  }

  if (toolLines.length > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(eqX, ty, Math.min(180, w * 0.2), fs * (toolLines.length + 0.8));
    var tty = ty + fs * 0.8;
    ctx.textAlign = 'left';
    for (var i = 0; i < toolLines.length; i++) {
      var tl = toolLines[i];

});

function _townRng(seed, offset) {

var TradingTownManager = {
  generated: {},   // 'x,y' -> true

  _locations: null,

  getTownLocations: function() {
    if (this._locations) return this._locations;
    var seed = Overworld.seed || 42;
    var dirs = [{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0}];
    var locs = [];
    for (var i = 0; i < 4; i++) {

      var jitter = Math.floor(_townRng(seed, i * 23 + 5) * 17) - 8;
      var tx = d.dx === 0 ? jitter : d.dx * dist;
      var ty = d.dy === 0 ? jitter : d.dy * dist;
      var prefix = TOWN_PREFIXES[Math.floor(_townRng(seed, i * 31) * TOWN_PREFIXES.length)];
      var suffix = TOWN_SUFFIXES[Math.floor(_townRng(seed, i * 47) * TOWN_SUFFIXES.length)];
      locs.push({ x: tx, y: ty, name: prefix + suffix, type: TOWN_TYPES[i] });
    }
    this._locations = locs;
    return locs;
  },

  generateTown: function(town) {
    var key = town.x + ',' + town.y;
    if (this.generated[key]) return;
    this.generated[key] = true;

    var cx = town.x, cy = town.y;
    // 5x5 layout: stone walls around edge, cobblestone inside, doors at midpoints
    for (var dy = -2; dy <= 2; dy++) {
      for (var dx = -2; dx <= 2; dx++) {
        var wx = cx + dx, wy = cy + dy;
        var isEdge = (Math.abs(dx) === 2 || Math.abs(dy) === 2);
        if (isEdge) {
          var isDoor = (dx === 0 && Math.abs(dy) === 2) || (dy === 0 && Math.abs(dx) === 2);
          Overworld.setTile(wx, wy, isDoor ? 202 : 204); // door or stone wall
        } else {
          Overworld.setTile(wx, wy, 206); // cobblestone
        }
      }
    }
    // Market stall at center
    Overworld.setTile(cx, cy, 209);

    // Spawn merchant NPCs
    var seed = Overworld.seed || 42;
    var count = 1 + Math.floor(_townRng(seed, town.x * 7 + town.y * 13 + 11));
    if (count > 2) count = 2;
    var names = MERCHANT_NAMES[town.type] || MERCHANT_NAMES.market;

    for (var i = 0; i < count; i++) {
      var mx = cx + (i === 0 ? 1 : -1), my = cy;
      var nameIdx = Math.floor(_townRng(seed, town.x + i * 37 + 19) * names.length);
      var npc = new NPC(mx, my, { name: names[nameIdx], bodyColor: '#e8c840' });
      npc.isMerchant = true;
      npc.townType = town.type;
      npc.townName = town.name;
      npc.resident = true;
      npc.home = { x: mx, y: my };
      npc.talkable = true;
      NPCManager.add(npc);
    }

    GameUtils.addLog(town.name + ' discovered!', '#ddcc88');
  },
};

// Proximity check — generate towns as player approaches
GameEvents.on('playerMove', function(game, nx, ny) {
  if (game.player.mode !== 'overworld') return;
  var towns = TradingTownManager.getTownLocations();
  for (var i = 0; i < towns.length; i++) {

    if (dist <= 30 && !TradingTownManager.generated[key]) {

});

// ============================================================
// SYSTEM: Trails — walking wears paths into the ground
// ============================================================
// Walk over tiles repeatedly to create trails:
//   1-2 passes: faint cosmetic darkening
//   3-5 passes: worn trail tile (T_WORN_TRAIL)
//   6+ passes: permanent dirt path (T_DIRT_PATH id 101)
// Trails below 6 wear decay by 1 every 200 turns.

var TRAIL_WORN_THRESHOLD = 3;
var TRAIL_PERMANENT_THRESHOLD = 6;
var TRAIL_DECAY_INTERVAL = 200;

var TrailManager = {
  trails: {},      // 'wx,wy' -> wearCount
  lastWalked: {},  // 'wx,wy' -> turn number when last walked on

  increment: function(wx, wy, amount) {
    amount = amount || 1;
    var key = wx + ',' + wy;
    var prev = this.trails[key] || 0;
    var next = prev + amount;
    this.trails[key] = next;
    this.lastWalked[key] = GameTime.turn;

    // Upgrade tile at thresholds
    if (prev < TRAIL_PERMANENT_THRESHOLD && next >= TRAIL_PERMANENT_THRESHOLD) {
      Overworld.setTile(wx, wy, 101); // T_DIRT_PATH
    } else if (prev < TRAIL_WORN_THRESHOLD && next >= TRAIL_WORN_THRESHOLD) {
      Overworld.setTile(wx, wy, T_WORN_TRAIL);
    }
  },

  getWear: function(wx, wy) {
    return this.trails[wx + ',' + wy] || 0;
  },

  decay: function() {
    var now = GameTime.turn;
    for (var key in this.trails) {
      var wear = this.trails[key];
      if (wear >= TRAIL_PERMANENT_THRESHOLD) continue; // permanent, no decay
      // Don't decay trails walked on in the last 100 turns
      var lastUsed = this.lastWalked[key] || 0;
      if (now - lastUsed < 100) continue;
      wear--;
      if (wear <= 0) {
        delete this.trails[key];
        delete this.lastWalked[key];
        // Revert worn trail tiles to grass
        var parts = key.split(',');
        var wx = parseInt(parts[0], 10), wy = parseInt(parts[1], 10);
        var tile = Overworld.getTile(wx, wy);
        if (tile.type === T_WORN_TRAIL) {
          Overworld.setTile(wx, wy, 100); // revert to grassland
        }
      } else {
        this.trails[key] = wear;
        if (wear < TRAIL_WORN_THRESHOLD) {
          var parts2 = key.split(',');
          var wx2 = parseInt(parts2[0], 10), wy2 = parseInt(parts2[1], 10);
          var tile2 = Overworld.getTile(wx2, wy2);
          if (tile2.type === T_WORN_TRAIL) {
            Overworld.setTile(wx2, wy2, T_GRASS);
          }
        }
      }
    }
  },

  clear: function() { this.trails = {}; },
};

// Worn trail tile
var T_WORN_TRAIL = TileRegistry.add({
  id: 215, name: 'worn_trail', solid: false,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var h = (((wx||0) * 73856093 + (wy||0) * 19349669) >>> 0);
    // Base — lighter brown
    ctx.fillStyle = shadeHex('#9a8a6a', ((h % 7) - 3) * 3);
    ctx.fillRect(sx, sy, ts, ts);
    // Footprint impressions
    ctx.fillStyle = shadeHex('#9a8a6a', -25);
    var fx1 = (3 + (h % 4)) * m, fy1 = (3 + ((h >> 3) % 3)) * m;
    ctx.fillRect(sx + fx1, sy + fy1, 2 * m, 3 * m);
    ctx.fillRect(sx + fx1, sy + fy1 - m, 2 * m, m);
    var fx2 = (8 + ((h >> 5) % 3)) * m, fy2 = (8 + ((h >> 7) % 3)) * m;
    ctx.fillRect(sx + fx2, sy + fy2, 2 * m, 3 * m);
    ctx.fillRect(sx + fx2, sy + fy2 - m, 2 * m, m);
    // Grass tufts at edges
    var grassCols = ['#5a7a3a', '#4e6e32', '#6a8a42'];
    for (var t = 0; t < 3; t++) {
      var gh = (h * (t + 7) * 41) >>> 0;
      var edge = gh % 4;
      var gx = edge < 2 ? ((gh >> 4) % 12) * m : (edge === 2 ? 0 : 14 * m);
      var gy = edge >= 2 ? ((gh >> 4) % 12) * m : (edge === 0 ? 0 : 14 * m);
      ctx.fillStyle = grassCols[t];
      ctx.fillRect(sx + gx, sy + gy, m, 2 * m);
    }
  },
});

// Track player's previous position for trail marking
var _trailPrevX, _trailPrevY;

// On player move, mark trail at the position they LEFT
GameEvents.on('playerMove', function(game, nx, ny) {
  if (game.player.mode !== 'overworld') return;
  if (_trailPrevX !== undefined) {
    var tile = Overworld.getTile(_trailPrevX, _trailPrevY);
    // Only trail on natural ground — not buildings, roads, paths, or special tiles
    var tt = tile.type;
    var isBuilding = (tt >= 200 && tt <= 217); // building tiles, stores, obelisk
    var isPath = (tt === 101 || tt === 206 || tt === 215); // dirt path, cobblestone, worn trail
    var isSpecial = (tt >= 120 && tt <= 123) || (tt >= 160 && tt <= 163) || tt === 210; // ruins, fishing, farm
    var isWater = (tt === T.WATER || tt === T.SHALLOWS || tt === T.BEACH);
    if (!TileRegistry.isSolid(tt) && !isBuilding && !isPath && !isSpecial && !isWater) {
      TrailManager.increment(_trailPrevX, _trailPrevY);
    }
  }
  _trailPrevX = nx;
  _trailPrevY = ny;
});

// Caravan movement leaves heavier trails (2x wear)
GameEvents.on('caravanMove', function(game, cx, cy) {
  var tile = Overworld.getTile(cx, cy);
  var ct = tile.type;
  var isBuilding = (ct >= 200 && ct <= 217);
  var isPath = (ct === 101 || ct === 206 || ct === 215);
  var isSpecial = (ct >= 120 && ct <= 123) || (ct >= 160 && ct <= 163) || ct === 210;
  var isWater = (ct === T.WATER || ct === T.SHALLOWS || ct === T.BEACH);
  if (!TileRegistry.isSolid(ct) && !isBuilding && !isPath && !isSpecial && !isWater) {
    TrailManager.increment(cx, cy, 2);
  }
});

GameEvents.on('draw:world', function(game, ctx) {

// ============================================================
// SYSTEM: Underground — infinite chunked mine layers below the overworld
// ============================================================
// Dig down from overworld to enter underground depth layers.
// Each depth is an infinite chunked map (like Overworld) starting
// as solid rock. Mine tile by tile to carve tunnels and find ore.
// Underground biomes register via UndergroundBiomeRegistry.

// Underground biome registry — same pattern as BiomeRegistry
var UndergroundBiomeRegistry = {
  _biomes: [],
  add: function(def) { this._biomes.push(def); },
  all: function() { return this._biomes; },
  getForDepth: function(depth) {
    for (var i = this._biomes.length - 1; i >= 0; i--) {
      if (depth >= this._biomes[i].minDepth) return this._biomes[i];
    }
    return this._biomes[0] || null;
  },
};

// Core underground tile types
var T_ROCK = TileRegistry.add({
  id: 300, name: 'rock', solid: true,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
    var m = ts / 16;
    var h = (((wx||0) * 4919 + (wy||0) * 7823) >>> 0);
    ctx.fillStyle = shadeHex('#555550', ((h % 9) - 4) * 2);
    ctx.fillRect(sx, sy, ts, ts);
    // Stone texture
    ctx.fillStyle = shadeHex('#555550', -10);
    ctx.fillRect(sx + ((h>>2)%8+2)*m, sy + ((h>>5)%8+2)*m, 3*m, 2*m);
    ctx.fillRect(sx + ((h>>4)%7+5)*m, sy + ((h>>7)%7+6)*m, 2*m, 3*m);
    // Cracks
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = Math.max(0.3, m * 0.3);
    if ((h % 3) === 0) {
      ctx.beginPath();
      ctx.moveTo(sx + ((h>>3)%10+2)*m, sy + 2*m);
      ctx.lineTo(sx + ((h>>6)%10+3)*m, sy + 14*m);
      ctx.stroke();
    }
  },
});

var T_MINE_FLOOR = TileRegistry.add({
  id: 301, name: 'mine_floor', solid: false,
  draw: function(ctx, sx, sy, ts, visible, animTimer, wx, wy) {
