  var lLeg = walking ? cycle * 2 * m : 0;
  ctx.fillStyle = bodyDark;
  ctx.fillRect(sx+legX1*m, sy+(legY+vertOff)*m+lLeg, legW*m, legH*m-Math.abs(lLeg)*0.3);
  ctx.fillStyle = '#443322';
  ctx.fillRect(sx+(legX1-0.5)*m, sy+(legY+vertOff+legH-1)*m+lLeg, (legW+1)*m, 1.5*m);

  // Right leg
  var rLeg = walking ? -cycle * 2 * m : 0;
  ctx.fillStyle = bodyDark;
  ctx.fillRect(sx+legX2*m, sy+(legY+vertOff)*m+rLeg, legW*m, legH*m-Math.abs(rLeg)*0.3);
  ctx.fillStyle = '#443322';
  ctx.fillRect(sx+(legX2-0.5)*m, sy+(legY+vertOff+legH-1)*m+rLeg, (legW+1)*m, 1.5*m);

  // Body — torso
  ctx.fillStyle = bodyColor;
  ctx.fillRect(sx+bodyX*m, sy+(chestY+vertOff)*m-headBob, bodyW*m, chestH*m);
  // Lower body / hips
  ctx.fillStyle = bodyDark;
  if(isNarrow){
    // Wider hips flaring out from waist
    var hipW=bodyW+2;
    ctx.fillRect(sx+(bodyX-1)*m, sy+(hipY+vertOff)*m-headBob, hipW*m, hipH*m);
    // Waist taper — dark insets on sides to create hourglass
    ctx.fillStyle = shadeHex(bodyColor, -25);
    ctx.fillRect(sx+bodyX*m, sy+(chestY+vertOff+1.5)*m-headBob, 1.2*m, 2*m);
    ctx.fillRect(sx+(bodyX+bodyW-1.2)*m, sy+(chestY+vertOff+1.5)*m-headBob, 1.2*m, 2*m);
    // Chest — slight forward curve using lighter band
    ctx.fillStyle = shadeHex(bodyColor, 12);
    ctx.fillRect(sx+(bodyX+0.5)*m, sy+(chestY+vertOff+0.3)*m-headBob, (bodyW-1)*m, 1.8*m);
    // Subtle shadow line under chest for depth
    ctx.fillStyle = shadeHex(bodyColor, -10);
    ctx.fillRect(sx+(bodyX+1)*m, sy+(chestY+vertOff+2.1)*m-headBob, (bodyW-2)*m, 0.6*m);
  } else {
    ctx.fillRect(sx+bodyX*m, sy+(hipY+vertOff)*m-headBob, bodyW*m, hipH*m);
  }

  // Arms
  var armSwing = walking ? cycle * 1.5 * m : 0;
  ctx.fillStyle = headColor || bodyColor;
  ctx.fillRect(sx+armX1*m, sy+(chestY+0.5+vertOff)*m-headBob-armSwing, armW*m, 4*m);
  ctx.fillRect(sx+armX2*m, sy+(chestY+0.5+vertOff)*m-headBob+armSwing, armW*m, 4*m);

  // Weapon in right hand — style based on weapon type
  var wpnType = (opts && opts.weaponType) || (weaponColor ? 'sword' : null);
  if (weaponColor && wpnType) {
    var wy = sy+(chestY-3+vertOff)*m-headBob+armSwing;
    if (wpnType === 'sword') {
      ctx.fillStyle = weaponColor;
      ctx.fillRect(sx+12.5*m, wy, 1.5*m, 5*m);
      ctx.fillStyle = '#886633';
      ctx.fillRect(sx+12*m, wy+4.5*m, 2.5*m, 1.5*m);
    } else if (wpnType === 'wand') {
      ctx.fillStyle = '#886644';
      ctx.fillRect(sx+13*m, wy+1*m, 1*m, 6*m);
      ctx.fillStyle = weaponColor;
      ctx.fillRect(sx+12.5*m, wy, 2*m, 2*m);
    } else if (wpnType === 'staff') {
      ctx.fillStyle = '#886644';
      ctx.fillRect(sx+13*m, wy-1*m, 1.2*m, 8*m);
      ctx.fillStyle = weaponColor;
      ctx.beginPath(); ctx.arc(sx+13.5*m, wy-1*m, 1.5*m, 0, Math.PI*2); ctx.fill();
    }
  }

  // Head — offset by vo for tall/short
  var hy=sy+vo-4*m; // head base y shifted up with body
  ctx.fillStyle = headColor || bodyColor;
  ctx.fillRect(sx+5*m, hy+1.5*m-headBob, 6*m, 5*m);
  // Jaw shadow — broad body only
  if(!isNarrow){
    ctx.fillStyle = headDark;
    ctx.fillRect(sx+5*m, hy+5.5*m-headBob, 6*m, 1*m);
  }

  // Hair and face — depends on facing direction
  if (facing === 'back') {
    // Back of head — hair covers everything, no eyes visible
    ctx.fillStyle = hairColor;
    if (hairStyle === 'short') {
      ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 5*m);
      ctx.fillStyle = hairDark;
      ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 1*m);
      // Nape of neck visible below hair
      ctx.fillStyle = headColor || bodyColor;
      ctx.fillRect(sx+6*m, hy+5*m-headBob, 4*m, 1.5*m);
    } else if (hairStyle === 'long') {
      ctx.fillRect(sx+4*m, hy+0.5*m-headBob, 8*m, 5.5*m);
      ctx.fillRect(sx+4*m, hy+3*m-headBob, 2*m, 6*m);
      ctx.fillRect(sx+10*m, hy+3*m-headBob, 2*m, 6*m);
      // Hair cascades down the back
      ctx.fillRect(sx+5*m, hy+5*m-headBob, 6*m, 4*m);
      ctx.fillStyle = hairDark;
      ctx.fillRect(sx+4*m, hy+0.5*m-headBob, 8*m, 1*m);
      ctx.fillRect(sx+5.5*m, hy+6*m-headBob, 5*m, 1*m);
    } else if (hairStyle === 'spiky') {
      ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 5*m);
      ctx.beginPath();
      ctx.moveTo(sx+5*m, hy+1*m-headBob); ctx.lineTo(sx+4*m, hy-1.5*m-headBob); ctx.lineTo(sx+6.5*m, hy+0.5*m-headBob);
      ctx.moveTo(sx+7*m, hy+0.5*m-headBob); ctx.lineTo(sx+7.5*m, hy-2*m-headBob); ctx.lineTo(sx+9*m, hy+0.5*m-headBob);
      ctx.moveTo(sx+9.5*m, hy+1*m-headBob); ctx.lineTo(sx+11.5*m, hy-1*m-headBob); ctx.lineTo(sx+11*m, hy+1*m-headBob);
      ctx.fill();
      ctx.fillStyle = headColor || bodyColor;
      ctx.fillRect(sx+6*m, hy+5*m-headBob, 4*m, 1.5*m);
    } else if (hairStyle === 'bald') {
      // Back of bald head — just skin with slight shading
      ctx.fillStyle = headDark;
      ctx.fillRect(sx+5.5*m, hy+2*m-headBob, 5*m, 3*m);
      ctx.fillStyle = headColor || bodyColor;
      ctx.fillRect(sx+6*m, hy+5*m-headBob, 4*m, 1.5*m);
    } else if (hairStyle === 'ponytail') {
      ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 5*m);
      // Ponytail hangs down the back center
      ctx.fillRect(sx+6.5*m, hy+4*m-headBob, 3*m, 2*m);
      ctx.fillRect(sx+7*m, hy+5.5*m-headBob, 2*m, 4*m);
      ctx.fillStyle = hairDark;
      ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 1*m);
      ctx.fillRect(sx+7.2*m, hy+7*m-headBob, 1.6*m, 2.5*m);
    } else if (hairStyle === 'mohawk') {
      // Back of head with mohawk strip
      ctx.fillStyle = headDark;
      ctx.fillRect(sx+5*m, hy+1*m-headBob, 6*m, 5*m);
      ctx.fillStyle = hairColor;
      ctx.fillRect(sx+6.5*m, hy-1*m-headBob, 3*m, 7*m);
      ctx.fillStyle = hairDark;
      ctx.fillRect(sx+7*m, hy-1.5*m-headBob, 2*m, 1.5*m);
    } else {
      // Fallback
      ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 5*m);
    }
  } else {
    // Front-facing — original hair and eyes
    ctx.fillStyle = hairColor;
    if (hairStyle === 'short') {
      ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 2.5*m);
      ctx.fillStyle = hairDark;
      ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 1*m);
    } else if (hairStyle === 'long') {
      ctx.fillRect(sx+4*m, hy+0.5*m-headBob, 8*m, 2.5*m);
      ctx.fillRect(sx+4*m, hy+3*m-headBob, 2*m, 5*m);
      ctx.fillRect(sx+10*m, hy+3*m-headBob, 2*m, 5*m);
      ctx.fillStyle = hairDark;
      ctx.fillRect(sx+4*m, hy+0.5*m-headBob, 8*m, 1*m);
    } else if (hairStyle === 'spiky') {
      ctx.fillRect(sx+4.5*m, hy+1*m-headBob, 7*m, 2*m);
      ctx.beginPath();
      ctx.moveTo(sx+5*m, hy+1*m-headBob); ctx.lineTo(sx+4*m, hy-1.5*m-headBob); ctx.lineTo(sx+6.5*m, hy+0.5*m-headBob);
      ctx.moveTo(sx+7*m, hy+0.5*m-headBob); ctx.lineTo(sx+7.5*m, hy-2*m-headBob); ctx.lineTo(sx+9*m, hy+0.5*m-headBob);
      ctx.moveTo(sx+9.5*m, hy+1*m-headBob); ctx.lineTo(sx+11.5*m, hy-1*m-headBob); ctx.lineTo(sx+11*m, hy+1*m-headBob);
      ctx.fill();
    } else if (hairStyle === 'bald') {
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fillRect(sx+6*m, hy+1.5*m-headBob, 3*m, 1.5*m);
    } else if (hairStyle === 'ponytail') {
      ctx.fillRect(sx+4.5*m, hy+0.5*m-headBob, 7*m, 2.5*m);
      ctx.fillRect(sx+9*m, hy+2*m-headBob, 2*m, 2*m);
      ctx.fillRect(sx+10*m, hy+3.5*m-headBob, 2*m, 4*m);
      ctx.fillStyle = hairDark;
      ctx.fillRect(sx+10.5*m, hy+5*m-headBob, 1.5*m, 3*m);
    } else if (hairStyle === 'mohawk') {
      ctx.fillRect(sx+6.5*m, hy-1*m-headBob, 3*m, 3.5*m);
      ctx.fillStyle = hairDark;
      ctx.fillRect(sx+7*m, hy-1.5*m-headBob, 2*m, 1.5*m);
    }

    // Eyes
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(sx+6*m, hy+3.5*m-headBob, 2*m, 1.5*m);
    ctx.fillRect(sx+9*m, hy+3.5*m-headBob, 2*m, 1.5*m);
    ctx.fillStyle = eyeColor || '#222222';
    ctx.fillRect(sx+6.5*m, hy+3.8*m-headBob, 1.2*m, 1.2*m);
    ctx.fillRect(sx+9.5*m, hy+3.8*m-headBob, 1.2*m, 1.2*m);
  }
}

// Draw creature with walk cycle
function drawCreaturePixel(ctx, sx, sy, ts, color, archetype, walkPhase) {
  var m = ts / 16;
  var walking = walkPhase > 0;
  var cycle = walking ? Math.sin(walkPhase * Math.PI * 6) : 0;
  var bob = walking ? Math.abs(Math.sin(walkPhase * Math.PI * 6)) * m * 0.5 : 0;
  var dark = shadeHex(color, -50);
  var light = shadeHex(color, 50);

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(sx+8*m, sy+15*m, 5*m, 1.2*m, 0, 0, Math.PI*2); ctx.fill();

  if (archetype === 'swarm') {
    var wingFlap = Math.sin((walkPhase||0.5)*Math.PI*10) * 2 * m;
    ctx.fillStyle = dark;
    ctx.fillRect(sx+6*m, sy+7*m-bob, 4*m, 4*m);
    ctx.fillStyle = color;
    ctx.fillRect(sx+6.5*m, sy+6.5*m-bob, 3*m, 3.5*m);
    // Wings
    ctx.fillStyle = light;
    ctx.fillRect(sx+2*m, sy+(5+wingFlap)*m-bob, 4*m, 2*m);
    ctx.fillRect(sx+10*m, sy+(5-wingFlap)*m-bob, 4*m, 2*m);
    ctx.fillStyle = '#ff3333';
    ctx.fillRect(sx+7*m, sy+7.5*m-bob, 1*m, 1*m);
    ctx.fillRect(sx+9*m, sy+7.5*m-bob, 1*m, 1*m);
  } else if (archetype === 'shambler') {
    var legSwing = cycle * 1.2 * m;
    // Thin bony legs
    ctx.fillStyle = dark;
    ctx.fillRect(sx+5*m, sy+12*m+legSwing, 2*m, 3.5*m);
    ctx.fillRect(sx+9*m, sy+12*m-legSwing, 2*m, 3.5*m);
    // Narrow torso — ribcage
    ctx.fillStyle = color;
    ctx.fillRect(sx+5*m, sy+5*m-bob, 6*m, 7*m);
    // Spine line
    ctx.fillStyle = dark;
    ctx.fillRect(sx+7.5*m, sy+5*m-bob, 1*m, 7*m);
    // Individual ribs (thin horizontal bars)
    ctx.fillStyle = light;
    ctx.fillRect(sx+5*m, sy+6*m-bob, 6*m, 0.7*m);
    ctx.fillRect(sx+5.5*m, sy+7.5*m-bob, 5*m, 0.7*m);
    ctx.fillRect(sx+6*m, sy+9*m-bob, 4*m, 0.7*m);
    // Thin arms hanging
    ctx.fillStyle = color;
    ctx.fillRect(sx+3*m, sy+5.5*m-bob, 2*m, 1.5*m);
    ctx.fillRect(sx+3*m, sy+7*m-bob, 1.5*m, 4*m);
    ctx.fillRect(sx+11*m, sy+5.5*m-bob, 2*m, 1.5*m);
    ctx.fillRect(sx+12*m, sy+7*m-bob, 1.5*m, 4*m);
    // Skull — round with hollow eyes
    ctx.fillStyle = light;
    ctx.fillRect(sx+5*m, sy+1.5*m-bob, 6*m, 4*m);
    ctx.fillStyle = color;
    ctx.fillRect(sx+5.5*m, sy+2*m-bob, 5*m, 3*m);
    // Eye sockets (dark holes)
    ctx.fillStyle = '#111';
    ctx.fillRect(sx+6*m, sy+2.5*m-bob, 1.5*m, 1.5*m);
    ctx.fillRect(sx+9*m, sy+2.5*m-bob, 1.5*m, 1.5*m);
    // Red glow in eyes
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(sx+6.3*m, sy+3*m-bob, 0.8*m, 0.8*m);
    ctx.fillRect(sx+9.3*m, sy+3*m-bob, 0.8*m, 0.8*m);
    // Jaw line
    ctx.fillStyle = light;
    ctx.fillRect(sx+6*m, sy+4.5*m-bob, 4*m, 1*m);
  } else if (archetype === 'stalker') {
    // Spider/crawler — 4 legs each side, low body, multiple eyes
    var legSwing = cycle * 2 * m;
    // Legs — 4 pairs, alternating swing
    ctx.fillStyle = dark;
    ctx.fillRect(sx+1*m, sy+10*m+legSwing, 1.5*m, 4*m);
    ctx.fillRect(sx+4*m, sy+10*m-legSwing, 1.5*m, 4*m);
    ctx.fillRect(sx+10*m, sy+10*m+legSwing, 1.5*m, 4*m);
    ctx.fillRect(sx+13*m, sy+10*m-legSwing, 1.5*m, 4*m);
    // Leg joints (angular)
    ctx.fillRect(sx+0*m, sy+9*m+legSwing, 2*m, 1.5*m);
    ctx.fillRect(sx+5*m, sy+9*m-legSwing, 2*m, 1.5*m);
    ctx.fillRect(sx+9*m, sy+9*m+legSwing, 2*m, 1.5*m);
    ctx.fillRect(sx+14*m, sy+9*m-legSwing, 2*m, 1.5*m);
    // Body — low oval
    ctx.fillStyle = color;
    ctx.fillRect(sx+3*m, sy+6*m-bob, 10*m, 5*m);
    ctx.fillStyle = dark;
    ctx.fillRect(sx+4*m, sy+9*m-bob, 8*m, 2*m); // abdomen stripe
    // Head — front
    ctx.fillStyle = light;
    ctx.fillRect(sx+5*m, sy+4*m-bob, 6*m, 3*m);
    // Multiple eyes (4 glowing dots)
    ctx.fillStyle = '#ff2222';
    ctx.fillRect(sx+6*m, sy+4.5*m-bob, 1*m, 1*m);
    ctx.fillRect(sx+8*m, sy+4.5*m-bob, 1*m, 1*m);
    ctx.fillRect(sx+9.5*m, sy+5*m-bob, 0.8*m, 0.8*m);
    ctx.fillRect(sx+5*m, sy+5*m-bob, 0.8*m, 0.8*m);
    // Fangs
    ctx.fillStyle = '#eeeecc';
    ctx.fillRect(sx+6.5*m, sy+7*m-bob, 0.8*m, 1.5*m);
    ctx.fillRect(sx+8.5*m, sy+7*m-bob, 0.8*m, 1.5*m);
  } else if (archetype === 'brute') {
    // Demon/golem — massive, horned, menacing
    var legSwing = cycle * 1 * m;
    ctx.fillStyle = dark;
    ctx.fillRect(sx+2*m, sy+12*m+legSwing, 5*m, 3.5*m);
    ctx.fillRect(sx+9*m, sy+12*m-legSwing, 5*m, 3.5*m);
    // Massive body
    ctx.fillStyle = color;
    ctx.fillRect(sx+1*m, sy+3*m-bob, 14*m, 9*m);
    // Chest scar/marking
    ctx.fillStyle = shadeHex(color, -30);
    ctx.fillRect(sx+5*m, sy+5*m-bob, 1*m, 5*m);
    ctx.fillRect(sx+3*m, sy+7*m-bob, 5*m, 1*m);
    // Head
    ctx.fillStyle = light;
    ctx.fillRect(sx+4*m, sy+1*m-bob, 8*m, 3*m);
    // Horns — curved upward
    ctx.fillStyle = '#443322';
    ctx.fillRect(sx+3*m, sy-2*m-bob, 2*m, 3.5*m);
    ctx.fillRect(sx+2*m, sy-2.5*m-bob, 2*m, 1.5*m);
    ctx.fillRect(sx+11*m, sy-2*m-bob, 2*m, 3.5*m);
    ctx.fillRect(sx+12*m, sy-2.5*m-bob, 2*m, 1.5*m);
    // Glowing eyes
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(sx+5*m, sy+2*m-bob, 2*m, 1.5*m);
    ctx.fillRect(sx+9*m, sy+2*m-bob, 2*m, 1.5*m);
    // Clawed hands
    ctx.fillStyle = dark;
    ctx.fillRect(sx+0*m, sy+5*m-bob, 2*m, 3*m);
    ctx.fillRect(sx+14*m, sy+5*m-bob, 2*m, 3*m);
    ctx.fillStyle = '#443322';
    ctx.fillRect(sx+(-1)*m, sy+7*m-bob, 1*m, 2*m);
    ctx.fillRect(sx+0*m, sy+7.5*m-bob, 1*m, 2*m);
    ctx.fillRect(sx+15*m, sy+7*m-bob, 1*m, 2*m);
    ctx.fillRect(sx+16*m, sy+7.5*m-bob, 1*m, 2*m);
  } else if (archetype === 'dragon') {
    // Dragon — serpentine body, wings, fiery maw
    var legSwing = cycle * 1.5 * m;
    var wingFlap = Math.sin((walkPhase||0.3)*Math.PI*4) * 2 * m;
    // Tail — curves behind
    ctx.fillStyle = dark;
    ctx.fillRect(sx+0*m, sy+8*m-bob, 3*m, 2*m);
    ctx.fillRect(sx+(-1)*m, sy+7*m-bob, 2*m, 2*m);
    // Hind legs
    ctx.fillStyle = dark;
    ctx.fillRect(sx+3*m, sy+12*m+legSwing, 3*m, 3.5*m);
    ctx.fillRect(sx+9*m, sy+12*m-legSwing, 3*m, 3.5*m);
    // Claws
    ctx.fillStyle = '#332211';
    ctx.fillRect(sx+3*m, sy+15*m+legSwing, 1*m, 1*m);
    ctx.fillRect(sx+5*m, sy+15*m+legSwing, 1*m, 1*m);
    ctx.fillRect(sx+9*m, sy+15*m-legSwing, 1*m, 1*m);
    ctx.fillRect(sx+11*m, sy+15*m-legSwing, 1*m, 1*m);
    // Body — long, muscular
    ctx.fillStyle = color;
    ctx.fillRect(sx+2*m, sy+5*m-bob, 12*m, 8*m);
    // Belly — lighter
    ctx.fillStyle = shadeHex(color, 30);
    ctx.fillRect(sx+4*m, sy+10*m-bob, 8*m, 3*m);
    // Scales texture
    ctx.fillStyle = shadeHex(color, -20);
    ctx.fillRect(sx+3*m, sy+6*m-bob, 2*m, 1*m);
    ctx.fillRect(sx+6*m, sy+5.5*m-bob, 2*m, 1*m);
    ctx.fillRect(sx+10*m, sy+6*m-bob, 2*m, 1*m);
    ctx.fillRect(sx+4*m, sy+8*m-bob, 2*m, 1*m);
    ctx.fillRect(sx+8*m, sy+7.5*m-bob, 2*m, 1*m);
    // Wings
    ctx.fillStyle = shadeHex(color, -15);
    ctx.fillRect(sx+1*m, sy+(2+wingFlap)*m-bob, 4*m, 4*m);
    ctx.fillRect(sx+(-1)*m, sy+(1+wingFlap)*m-bob, 3*m, 3*m);
    ctx.fillRect(sx+11*m, sy+(2-wingFlap)*m-bob, 4*m, 4*m);
    ctx.fillRect(sx+15*m, sy+(1-wingFlap)*m-bob, 3*m, 3*m);
    // Wing membrane
    ctx.fillStyle = shadeHex(color, 15);
    ctx.globalAlpha = 0.5;
    ctx.fillRect(sx+0*m, sy+(2+wingFlap)*m-bob, 3*m, 3*m);
    ctx.fillRect(sx+13*m, sy+(2-wingFlap)*m-bob, 3*m, 3*m);
    ctx.globalAlpha = 1;
    // Neck
    ctx.fillStyle = color;
    ctx.fillRect(sx+11*m, sy+2*m-bob, 3*m, 5*m);
    // Head — angular, predatory
    ctx.fillStyle = light;
    ctx.fillRect(sx+12*m, sy+0*m-bob, 4*m, 3*m);
    ctx.fillStyle = color;
    ctx.fillRect(sx+13*m, sy+(-1)*m-bob, 3*m, 2*m); // snout ridge
    // Horns
    ctx.fillStyle = '#332211';
    ctx.fillRect(sx+12*m, sy+(-2)*m-bob, 1.5*m, 2.5*m);
    ctx.fillRect(sx+15*m, sy+(-1.5)*m-bob, 1.5*m, 2*m);
    // Eyes — fierce
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(sx+14*m, sy+0.5*m-bob, 1.5*m, 1*m);
    // Fire breath glow
    var fireAlpha = 0.3 + Math.sin((walkPhase||0)*Math.PI*8) * 0.2;
    ctx.fillStyle = 'rgba(255,100,0,' + fireAlpha.toFixed(2) + ')';
    ctx.fillRect(sx+15*m, sy+2*m-bob, 2*m, 1.5*m);
    // Spinal ridge
    ctx.fillStyle = shadeHex(color, -40);
    ctx.fillRect(sx+5*m, sy+4*m-bob, 1.5*m, 1.5*m);
    ctx.fillRect(sx+7.5*m, sy+3.5*m-bob, 1.5*m, 1.5*m);
    ctx.fillRect(sx+10*m, sy+3*m-bob, 1.5*m, 1.5*m);
  } else {
    // caster or default: robed humanoid
    var armSwing = cycle * 1 * m;
    ctx.fillStyle = dark;
    ctx.fillRect(sx+5*m, sy+12*m, 2*m, 2.5*m);
    ctx.fillRect(sx+9*m, sy+12*m, 2*m, 2.5*m);
    ctx.fillStyle = color;
    ctx.fillRect(sx+4*m, sy+5*m-bob, 8*m, 7*m); // robe
    ctx.fillStyle = light;
    ctx.fillRect(sx+5*m, sy+2*m-bob, 6*m, 4*m); // head
    ctx.fillStyle = '#ff66ff';
    ctx.fillRect(sx+6*m, sy+3.5*m-bob, 1.5*m, 1.5*m);
    ctx.fillRect(sx+9*m, sy+3.5*m-bob, 1.5*m, 1.5*m);
    // Staff
    ctx.fillStyle = '#aa8844';
    ctx.fillRect(sx+13*m, sy+2*m-bob+armSwing, 1.5*m, 10*m);
    ctx.fillStyle = '#aa44ff';
    ctx.fillRect(sx+12.5*m, sy+1*m-bob+armSwing, 2.5*m, 2.5*m);
  }
}

Game.prototype.drawEntities=function(ctx){
  var ts=CONFIG.TILE;
  var bobTime = this.animTimer;

  // Enemies
  for(var i=0;i<this.enemies.length;i++){
    var e=this.enemies[i];if(!e.alive||!this.isVisible(e.x,e.y))continue;
    var sx=e.x*ts,sy=e.y*ts;
    // Enemies walk continuously when within detection range
    var eDist = Math.abs(e.x-this.player.x)+Math.abs(e.y-this.player.y);
    var eWalk = eDist <= this.player.visionRadius + 2 ? (bobTime * 0.8 + i * 0.3) % 1 : 0;
    if(e.hitFlash>0) ctx.globalAlpha=0.4+Math.sin(e.hitFlash*30)*0.6;

    drawCreaturePixel(ctx, sx, sy, ts, e.color, e.archetype, eWalk);

    ctx.globalAlpha=1;

    if(e.isBoss){
      ctx.strokeStyle='#ff2222';ctx.lineWidth=2;ctx.strokeRect(sx,sy,ts,ts);
      ctx.strokeRect(sx-1,sy-1,ts+2,ts+2);
      this.pipeline.addLight(sx+ts/2,sy+ts/2,{color:'#ff2200',radius:ts*3,intensity:0.4,flicker:0.1});
    }
    if(e.hp<e.maxHp){var barW=ts-4,hpR=e.hp/e.maxHp;ctx.fillStyle='#222';ctx.fillRect(sx+2,sy-5,barW,4);ctx.fillStyle=hpR>0.5?'#44ff44':hpR>0.25?'#ffcc00':'#ff4444';ctx.fillRect(sx+2,sy-5,barW*hpR,4);}
    var statusY=sy-10;ctx.font=Math.max(8,Math.round(ts*0.22))+'px monospace';ctx.textAlign='center';
    if(e.frozen>0){ctx.fillStyle='#66ccff';ctx.fillText('ICE',sx+ts/2,statusY);statusY-=10;}
    if(e.burning>0){ctx.fillStyle='#ff6622';ctx.fillText('FIRE',sx+ts/2,statusY);statusY-=10;}
    if(e.poisoned>0){ctx.fillStyle='#44ff44';ctx.fillText('PSN',sx+ts/2,statusY);statusY-=10;}
    if(e.telegraphing){ctx.fillStyle='#ff4444';ctx.font='bold '+Math.max(10,Math.round(ts*0.3))+'px monospace';ctx.fillText('!!',sx+ts/2,statusY);}
  }

  // Player character with customization
  var psx=this.player.x*ts,psy=this.player.y*ts;
  var pWalk = this.player.walkTimer > 0 ? (bobTime * 1.2) % 1 : 0;
  if(this.player.hitFlash>0) ctx.globalAlpha=0.4+Math.sin(this.player.hitFlash*30)*0.6;
  var wpnColor=null;
  if(this.player.weapon && this.player.weapon.color) wpnColor=this.player.weapon.color;
  else if(this.player.weaponType==='sword') wpnColor='#aaccff';
  else if(this.player.weaponType==='wand') wpnColor='#6688ff';
  else if(this.player.weaponType==='staff') wpnColor='#44ff88';
  var bodyCol=this.player.bodyColor||'#2266cc';
  if(this.player.armor) bodyCol=this.player.armor.color;
  // Rotate character when in water — check tile directly (overworld AND dungeon)
  var isSwim = false;
  var swimTile = null;
  if (this.player.mode === 'overworld' && typeof Overworld !== 'undefined') {
    swimTile = Overworld.getTile(Math.round(this.player.x), Math.round(this.player.y));
    isSwim = (swimTile.type === T.WATER || swimTile.type === T.SHALLOWS || swimTile.type === 162 || swimTile.type === 160 || swimTile.type === 161 || swimTile.type === 163);
  } else if (this.player.mode === 'dungeon' && this.dungeon) {
    var dpx = Math.round(this.player.x), dpy = Math.round(this.player.y);
    if (dpx >= 0 && dpx < CONFIG.MAP_W && dpy >= 0 && dpy < CONFIG.MAP_H) {
      var dungTile = this.dungeon.map[dpy][dpx];
      if (dungTile === T.WATER || dungTile === T.ICE) {
        swimTile = { type: dungTile };
        isSwim = (dungTile === T.WATER); // wade in water, not ice
      }
    }
  }
  var isDeepSwim = false; // dungeon water is always shallow (wading)
  if (this.player.mode === 'overworld') isDeepSwim = isSwim && swimTile && swimTile.type === T.WATER;
  var isShallowSwim = isSwim && !isDeepSwim;
  var _swimDrawn = false;
  if (isDeepSwim) {
    ctx.save();
    var ld = this.player.lastDir;
    ctx.beginPath();
    if (ld.x === 0) {
      // Up/down: clip at 80% so head at bottom is visible
      ctx.rect(psx - ts, psy - ts, ts * 3, ts * 1.8);
    } else {
      // Left/right: clip at 50% — bottom half submerged
      ctx.rect(psx - ts, psy - ts, ts * 3, ts * 1.5);
    }
    ctx.clip();
    if (ld.x === 0) {
      // Up/down: top-down bird's eye swimming sprite
      // Up = head at top of tile, feet at bottom
      // Down = head at bottom, feet at top
      // Clip shows upper portion, so body is always visible
      var m = ts / 16;
      var headUp = ld.y < 0;
      var kick = Math.sin(bobTime * Math.PI * 6) * 1.5 * m;
      var stroke = Math.sin(bobTime * Math.PI * 4) * 2 * m;
      var cx = psx + 8 * m; // center x

      // Draw order: feet(far) → legs → torso → arms → head(near)
      // "Near" end is always at top of tile (visible above water)

      if (headUp) {
        // Swimming UP: head at top, feet at bottom (feet get clipped)
        // Feet
        ctx.fillStyle = this.player.skinColor || '#ffcc88';
        ctx.fillRect(cx - 3 * m, psy + 13 * m + kick, 1.5 * m, 1 * m);
        ctx.fillRect(cx + 1.5 * m, psy + 13 * m - kick, 1.5 * m, 1 * m);
        // Legs
        ctx.fillStyle = shadeHex(bodyCol, -20);
        ctx.fillRect(cx - 3 * m, psy + 10 * m + kick, 2 * m, 3 * m);
        ctx.fillRect(cx + 1 * m, psy + 10 * m - kick, 2 * m, 3 * m);
        // Torso
        ctx.fillStyle = bodyCol;
        ctx.fillRect(cx - 3.5 * m, psy + 4 * m, 7 * m, 6 * m);
        // Arms
        ctx.fillStyle = this.player.skinColor || '#ffcc88';
        ctx.fillRect(cx - 7 * m + stroke, psy + 5 * m, 3 * m, 1.5 * m);
        ctx.fillRect(cx + 4 * m - stroke, psy + 5 * m, 3 * m, 1.5 * m);
        // Head — back of head (swimming away), hairstyle from above
        _drawTopDownHair(ctx, cx, psy + 2.5 * m, m, this.player.hairStyle, this.player.hairColor, this.player.skinColor);
      } else {
        // Swimming DOWN: head at bottom, feet at top (feet visible, head clipped)
        // Feet
        ctx.fillStyle = this.player.skinColor || '#ffcc88';
        ctx.fillRect(cx - 3 * m, psy + 1 * m + kick, 1.5 * m, 1 * m);
        ctx.fillRect(cx + 1.5 * m, psy + 1 * m - kick, 1.5 * m, 1 * m);
        // Legs
        ctx.fillStyle = shadeHex(bodyCol, -20);
        ctx.fillRect(cx - 3 * m, psy + 2 * m + kick, 2 * m, 3 * m);
        ctx.fillRect(cx + 1 * m, psy + 2 * m - kick, 2 * m, 3 * m);
        // Torso
        ctx.fillStyle = bodyCol;
        ctx.fillRect(cx - 3.5 * m, psy + 5 * m, 7 * m, 6 * m);
        // Arms
        ctx.fillStyle = this.player.skinColor || '#ffcc88';
        ctx.fillRect(cx - 7 * m + stroke, psy + 7 * m, 3 * m, 1.5 * m);
        ctx.fillRect(cx + 4 * m - stroke, psy + 7 * m, 3 * m, 1.5 * m);
        // Head — back of head (swimming away downward), hairstyle from above
        _drawTopDownHair(ctx, cx, psy + 11.5 * m, m, this.player.hairStyle, this.player.hairColor, this.player.skinColor);
      }
      ctx.restore();
      ctx.globalAlpha = 1;
      _swimDrawn = true;
    } else {
      // Left/right: rotate 90 degrees
      var scx = psx + ts / 2, scy = psy + ts / 2;
      ctx.translate(scx, scy);
      ctx.rotate(ld.x > 0 ? Math.PI / 2 : -Math.PI / 2);
      ctx.translate(-scx, -scy);
    }
  } else if (isShallowSwim) {
    ctx.save();
    // Clip bottom 40% — character wades with legs hidden
    ctx.beginPath();
    ctx.rect(psx - ts, psy - ts, ts * 3, ts * 1.6);
    ctx.clip();
  }
  if (!_swimDrawn) {
    var drawWalk = isSwim ? (bobTime * 0.8) % 1 : pWalk;
    // Direction-aware character drawing
    var ld = this.player.lastDir || {x:0,y:1};
    var facingLeft = !isSwim && ld.x < 0;
    var facingBack = !isSwim && ld.y < 0 && ld.x === 0;
    var charOpts = {hairStyle:this.player.hairStyle||'short', hairColor:this.player.hairColor||'#443322',
       weaponType:isSwim ? 'fist' : this.player.weaponType, body:this.player.body, height:this.player.height, frame:this.player.frame,
       facing: facingBack ? 'back' : 'front'};
    if (facingLeft) {
      ctx.save();
      ctx.translate(psx + ts, 0);
      ctx.scale(-1, 1);
      drawCharPixel(ctx, 0, psy, ts,
        bodyCol, this.player.eyeColor||'#443322',
        this.player.skinColor||'#ffcc88', isSwim ? null : wpnColor, drawWalk, charOpts);
      ctx.restore();
    } else {
      drawCharPixel(ctx, psx, psy, ts,
        bodyCol, this.player.eyeColor||'#443322',
        this.player.skinColor||'#ffcc88', isSwim ? null : wpnColor, drawWalk, charOpts);
    }
    if (isDeepSwim || isShallowSwim) ctx.restore();
  }
  ctx.globalAlpha=1;

  // Gear glow — scales with weapon/armor power
  var _glowPower = 0;
  if (this.player.weapon && this.player.weapon.atk) _glowPower += this.player.weapon.atk;
  if (this.player.armor && this.player.armor.defense) _glowPower += this.player.armor.defense;
  if (_glowPower >= 3) {
    var _gcx = psx + ts / 2, _gcy = psy + ts / 2;
    var _gIntensity = Math.min(0.5, _glowPower * 0.03);
    var _gRadius = ts * (0.8 + _glowPower * 0.1);
    var _gPulse = 0.7 + Math.sin(bobTime * 3) * 0.3;
    // Glow colour blends weapon and armor
    var _gColor = (this.player.weapon && this.player.weapon.color) ? this.player.weapon.color : '#ffcc44';
    if (this.player.armor && this.player.armor.color && _glowPower >= 8) {
      // High power: use armor colour for outer glow
      this.pipeline.addLight(_gcx, _gcy, { color: this.player.armor.color, radius: _gRadius * 0.6, intensity: _gIntensity * 0.4 * _gPulse, flicker: 0 });
    }
    this.pipeline.addLight(_gcx, _gcy, { color: _gColor, radius: _gRadius * _gPulse, intensity: _gIntensity * _gPulse, flicker: 0.02 });
  }

  if(this.player.shieldTurns>0){ctx.strokeStyle='rgba(100,200,255,0.7)';ctx.lineWidth=2;ctx.strokeRect(psx-1,psy-1,ts+2,ts+2);}

  // Ability targeting overlay — works in both dungeon and overworld
  if(this.abilityTargetMode&&this.selectedAbility>=0){
    var ab=this.player.abilities[this.selectedAbility];
    ctx.globalAlpha=0.3+Math.sin(this.animTimer*5)*0.15;ctx.fillStyle=ab.color;
    var dirs=[{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
    for(var di=0;di<dirs.length;di++){var dir=dirs[di];var targets=getAbilityTargets(ab,this.player.x,this.player.y,dir.x,dir.y);
      for(var ti=0;ti<targets.length;ti++){var t=targets[ti];
        if(this.dungeon){if(t.x<0||t.x>=CONFIG.MAP_W||t.y<0||t.y>=CONFIG.MAP_H)continue;if(ab.shape==='line'&&this.dungeon.map[t.y][t.x]===T.WALL)break;if(this.dungeon.map[t.y][t.x]!==T.WALL)ctx.fillRect(t.x*ts,t.y*ts,ts,ts);}
        else{ctx.fillRect(t.x*ts,t.y*ts,ts,ts);}}}
    ctx.globalAlpha=1;
  }
};

Game.prototype.drawHUD=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,p=this.player;
  var fs=Math.max(12,Math.min(16,Math.round(w*0.012))),pad=10;

  // Floor level badge — dungeon only
  if (p.mode === 'dungeon' && this.dungeon) {
    var floorText='FLOOR '+p.floor;
    var biomeName=this.dungeon.biome.name;
    var biomeAccent=this.dungeon.biome.accent;
    var badgeW=Math.max(120,80);
    ctx.font='bold '+Math.round(fs*1.3)+'px Segoe UI';ctx.textAlign='center';
    badgeW=Math.max(badgeW,(ctx.measureText(floorText).width||100)+40);
    var badgeX=(w-badgeW)/2, badgeY=4;
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(badgeX,badgeY,badgeW,Math.round(fs*2.8));
    ctx.strokeStyle=biomeAccent;ctx.lineWidth=1;ctx.strokeRect(badgeX,badgeY,badgeW,Math.round(fs*2.8));
    ctx.fillStyle='#fff';ctx.fillText(floorText,w/2,badgeY+fs*1.2);
    ctx.fillStyle=biomeAccent;ctx.font=Math.round(fs*0.7)+'px Segoe UI';
    ctx.fillText(biomeName,w/2,badgeY+fs*2.2);
  }

  // Stats panel — top left
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,Math.min(220,w*0.25),55);
  ctx.fillStyle='#aaa';ctx.font=fs+'px Segoe UI';ctx.textAlign='left';
  ctx.fillText('ATK:'+p.atk+(p.shieldTurns>0?' DEF:'+p.shieldAmount:''),pad,pad+fs);
  var barX=pad,barY=pad+fs+4,barW=Math.min(190,w*0.22),barH=14,hpR=p.hp/p.maxHp;
  ctx.fillStyle='#222';ctx.fillRect(barX,barY,barW,barH);
  ctx.fillStyle=hpR>0.5?'#44dd44':hpR>0.25?'#ddcc00':'#dd3333';
  ctx.fillRect(barX,barY,barW*hpR,barH);
  ctx.fillStyle='#fff';ctx.font='bold '+Math.round(fs*0.8)+'px Segoe UI';ctx.fillText(p.hp+'/'+p.maxHp,barX+4,barY+barH-3);
  ctx.fillStyle='#666';ctx.font=Math.round(fs*0.7)+'px Segoe UI';
  ctx.fillText('Kills:'+p.kills,pad,barY+barH+Math.round(fs*0.9));
  // Controls hint
  ctx.fillStyle='#555';ctx.fillText('[E] Act  [I] Inv  [C] Craft  [B] Build  [P] Pot  [H] Help',pad,barY+barH+Math.round(fs*1.9));

  // Equipment + potions display — top right
  var eqW=Math.min(180,w*0.2);
  var eqX=w-eqW-pad,eqY=4;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(eqX,eqY,eqW,fs*4.2);
  var ety=eqY+fs*0.9;
  ctx.fillStyle='#aaa';ctx.font=Math.round(fs*0.7)+'px Segoe UI';ctx.textAlign='left';
  ctx.fillText(p.weapon?p.weapon.name:'Unarmed',eqX+5,ety);ety+=fs*1.1;
  ctx.fillStyle='#88aacc';
  ctx.fillText(p.armor?p.armor.name:'No Armor',eqX+5,ety);ety+=fs*1.1;
  // Show what [P] will consume next
  var _nextHeal = null;
  var _healList = [
    {id:'health_potion',name:'Health Pot',color:'#ff4488'},
    {id:'feast',name:'Feast',color:'#ffcc44'},
    {id:'healing_salve',name:'Salve',color:'#44dd88'},
    {id:'sushi',name:'Sushi',color:'#f0e8c8'},
    {id:'berry_pie',name:'Berry Pie',color:'#aa44aa'},
    {id:'fish_stew',name:'Fish Stew',color:'#cc6633'},
    {id:'veggie_stew',name:'Veggie Stew',color:'#88aa44'},
    {id:'mushroom_soup',name:'Mush Soup',color:'#887744'},
    {id:'roast_meat',name:'Roast Meat',color:'#cc6633'},
    {id:'bread',name:'Bread',color:'#ddaa55'},
    {id:'dried_fish',name:'Dried Fish',color:'#aa8855'},
    {id:'carrot',name:'Carrot',color:'#ee8833'},
    {id:'wild_berry',name:'Berry',color:'#8833aa'},
  ];
  if (p.potions > 0) { _nextHeal = {name:'Potion ('+p.potions+')',color:'#ff44aa'}; }
  else { for (var hi=0;hi<_healList.length;hi++) { if (p.bag[_healList[hi].id]>0) { _nextHeal=_healList[hi]; break; } } }
  ctx.fillStyle=_nextHeal?_nextHeal.color:'#553344';
  ctx.fillText(_nextHeal?'[P] '+_nextHeal.name:'[P] No food',eqX+5,ety);
  ctx.textAlign='left';

  var abY=h-75;ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,abY-5,Math.min(400,w*0.45),80);
  for(var i=0;i<4;i++){
    var ab=p.abilities[i],abx=pad+i*(Math.min(90,w*0.1)+4),abw=Math.min(90,w*0.1),abh=52;
    if(ab){var onCD=ab.currentCooldown>0,sel=this.abilityTargetMode&&this.selectedAbility===i;
      ctx.fillStyle=sel?'rgba(255,255,255,0.2)':onCD?'rgba(50,50,50,0.8)':'rgba(30,30,50,0.8)';ctx.fillRect(abx,abY,abw,abh);
      ctx.strokeStyle=sel?'#fff':onCD?'#444':ab.color;ctx.lineWidth=sel?2:1;ctx.strokeRect(abx,abY,abw,abh);
      ctx.fillStyle=onCD?'#666':ab.color;ctx.font='bold '+Math.round(fs*0.7)+'px Segoe UI';ctx.textAlign='center';
      ctx.fillText('['+( i+1)+']',abx+abw/2,abY+12);ctx.font=Math.round(fs*0.6)+'px Segoe UI';
      var words=ab.name.split(' ');if(words.length>1&&ab.name.length>10){ctx.fillText(words[0],abx+abw/2,abY+25);ctx.fillText(words.slice(1).join(' '),abx+abw/2,abY+36);}else{ctx.fillText(ab.name,abx+abw/2,abY+30);}
      if(onCD){ctx.fillStyle='#ff6644';ctx.font='bold '+Math.round(fs*0.8)+'px Segoe UI';ctx.fillText(ab.currentCooldown+'t',abx+abw/2,abY+abh-4);}
    } else {ctx.fillStyle='rgba(20,20,30,0.5)';ctx.fillRect(abx,abY,abw,abh);ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(abx,abY,abw,abh);ctx.fillStyle='#444';ctx.font=fs*0.8+'px Segoe UI';ctx.textAlign='center';ctx.fillText('['+(i+1)+']',abx+abw/2,abY+28);}
  }

  var logX=w-Math.min(350,w*0.4)-pad,logY=h-10;ctx.textAlign='left';
  for(var i=this.log.length-1;i>=0;i--){var entry=this.log[i];ctx.globalAlpha=0.5+(i/this.log.length)*0.5;ctx.fillStyle=entry.color;ctx.font=Math.round(fs*0.8)+'px Segoe UI';ctx.fillText(entry.text,logX,logY-(this.log.length-1-i)*(fs+2));}
  ctx.globalAlpha=1;
  if(this.abilityTargetMode){ctx.fillStyle='#ffcc44';ctx.font='bold '+fs+'px Segoe UI';ctx.textAlign='center';ctx.fillText('Arrow/WASD to aim, ESC cancel',w/2,pad+fs);}
};

Game.prototype.drawMinimap=function(ctx){
  if(!this.dungeon) return; // no minimap in overworld mode
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,sz=Math.min(200,w*0.25,h*0.3);
  var mx=w-sz-10,my=10,cw=sz/CONFIG.MAP_W,ch=sz/CONFIG.MAP_H;
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(mx-2,my-2,sz+4,sz+4);
  for(var y=0;y<CONFIG.MAP_H;y++)for(var x=0;x<CONFIG.MAP_W;x++){
    if(!this.dungeon.revealed[y][x])continue;var tile=this.dungeon.map[y][x];if(tile===T.VOID)continue;
    if(tile===T.WALL)ctx.fillStyle='#333';
    else if(tile===T.WATER)ctx.fillStyle='#224488';
    else if(tile===T.LAVA)ctx.fillStyle='#882200';
    else if(tile===T.FUNGAL)ctx.fillStyle='#226622';
    else if(tile===T.STAIRS)ctx.fillStyle='#ffcc44';
    else if(tile===T.STAIRS_UP)ctx.fillStyle='#44aaff';
    else if(tile===T.LOOT)ctx.fillStyle='#ddaa44';
    else if(tile===T.SHRINE)ctx.fillStyle='#aa44ff';
    else if(tile===T.REST)ctx.fillStyle='#44ff88';
    else ctx.fillStyle='#555';
    ctx.fillRect(mx+x*cw,my+y*ch,Math.ceil(cw),Math.ceil(ch));
  }
  for(var i=0;i<this.enemies.length;i++){var e=this.enemies[i];if(!e.alive||!this.dungeon.revealed[e.y][e.x])continue;ctx.fillStyle=e.isBoss?'#ff0000':'#ff4444';ctx.fillRect(mx+e.x*cw-1,my+e.y*ch-1,3,3);}
  ctx.fillStyle='#44aaff';ctx.fillRect(mx+this.player.x*cw-2,my+this.player.y*ch-2,4,4);

  // Inventory below minimap
  var fs2=Math.max(10,Math.round(w*0.01));
  var iy=my+sz+8;
  var iw=sz+4;
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(mx-2,iy,iw,fs2*8.5);
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.strokeRect(mx-2,iy,iw,fs2*8.5);
  var ity=iy+fs2*1.2;
  ctx.fillStyle='#aaa';ctx.font='bold '+fs2+'px Segoe UI';ctx.textAlign='left';
  ctx.fillText('EQUIPMENT',mx+2,ity);ity+=fs2*1.5;
  // Weapon
  ctx.fillStyle='#776';ctx.font=fs2+'px Segoe UI';ctx.fillText('Weapon:',mx+2,ity);ity+=fs2*1.2;
  var p=this.player;
  ctx.fillStyle=p.weapon?'#ddaa44':'#555';ctx.font='bold '+fs2+'px Segoe UI';
  ctx.fillText(p.weapon?p.weapon.name:'Unarmed',mx+6,ity);ity+=fs2*1.5;
  // Armor
  ctx.fillStyle='#776';ctx.font=fs2+'px Segoe UI';ctx.fillText('Armor:',mx+2,ity);ity+=fs2*1.2;
  ctx.fillStyle=p.armor?'#88aacc':'#555';ctx.font='bold '+fs2+'px Segoe UI';
  ctx.fillText(p.armor?p.armor.name:'None',mx+6,ity);ity+=fs2*1.5;
  // Potions
  ctx.fillStyle=p.potions>0?'#ff44aa':'#553344';ctx.font='bold '+fs2+'px Segoe UI';
  ctx.fillText('Potions: '+p.potions,mx+2,ity);
};

Game.prototype.drawShrineOverlay=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(13,Math.round(w*0.013));
  // Dark overlay with purple tint
  ctx.fillStyle='rgba(10,5,20,0.85)';ctx.fillRect(0,0,w,h);
  // Glow behind title
  var grd=ctx.createRadialGradient(w/2,h*0.12,0,w/2,h*0.12,w*0.25);
  grd.addColorStop(0,'rgba(120,50,200,0.15)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,h*0.25);
  // Title
  ctx.fillStyle='#cc66ff';ctx.font='bold '+Math.round(fs*2)+'px Segoe UI';ctx.textAlign='center';
  ctx.fillText('SHRINE OF POWER',w/2,h*0.12);
  ctx.fillStyle='#998';ctx.font=Math.round(fs*0.9)+'px Segoe UI';
  ctx.fillText('Choose an ability (1-3) or ESC to leave',w/2,h*0.18);
  if(!this.shrineChoices)return;
  // Cards — calculate height from content using accumulated Y
  var cardW=Math.min(w*0.26,240);
  var gap=Math.min(w*0.03,30);
  var totalW=cardW*3+gap*2;
  var startX=(w-totalW)/2;
  var cardY=h*0.24;
  // Pre-calculate card height: badge + name + divider + element + shape + dmg/cd blocks + desc + accent + padding
  // Card height: badge row + icon + element label + dmg/cd + desc + padding
  var iconS=Math.min(Math.min(w*0.26,240)*0.4,fs*4);
  var cardH=Math.round(fs*1.3+fs*0.6+iconS+fs*0.6+fs*1.3+fs*1.8+fs*0.8+fs*1.0+fs*1.5);

  for(var i=0;i<3;i++){
    var ab=this.shrineChoices[i];
    var cx=startX+i*(cardW+gap), cy=cardY;
    // Card background with glow
    var pulse=0.6+Math.sin(this.animTimer*2+i*2)*0.2;
    ctx.shadowColor=ab.color;ctx.shadowBlur=15*pulse;
    ctx.fillStyle='rgba(15,10,30,0.95)';
    ctx.fillRect(cx,cy,cardW,cardH);
    ctx.shadowBlur=0;
    ctx.strokeStyle=ab.color;ctx.lineWidth=2;
    ctx.strokeRect(cx+1,cy+1,cardW-2,cardH-2);
    // Card content — accumulated ty, every item advances it
    var pad=fs*0.6;
    var ty=cy+pad;
    var ccx=cx+cardW/2; // card center x
    // Number badge — small, top-left corner
    var badgeS=Math.round(fs*1.3);
    ctx.fillStyle=ab.color;ctx.fillRect(cx+pad,ty,badgeS,badgeS);
    ctx.fillStyle='#000';ctx.font='bold '+fs+'px Segoe UI';ctx.textAlign='center';
    ctx.fillText(i+1,cx+pad+badgeS/2,ty+fs*0.9);
    // Name — right of badge, same row
    ctx.fillStyle='#fff';ctx.font='bold '+Math.round(fs*1.05)+'px Segoe UI';ctx.textAlign='left';
    ctx.fillText(ab.name,cx+pad+badgeS+pad,ty+fs*0.9);
    ty+=badgeS+pad;

    // Ability icon — drawn in a square area
    var iconS=Math.min(cardW*0.4,fs*4);
    var iconX=ccx-iconS/2, iconY=ty;
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(iconX,iconY,iconS,iconS);
    // Draw icon based on element + shape
    var ic=iconX+iconS/2, iy=iconY+iconS/2, ir=iconS*0.35;
    ctx.globalAlpha=0.8;
    if(ab.shape==='single'){
      // Single target: crosshair
      ctx.strokeStyle=ab.color;ctx.lineWidth=Math.max(1.5,fs/8);
      ctx.beginPath();ctx.arc(ic,iy,ir,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ic-ir*1.3,iy);ctx.lineTo(ic+ir*1.3,iy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ic,iy-ir*1.3);ctx.lineTo(ic,iy+ir*1.3);ctx.stroke();
    } else if(ab.shape==='line'){
      // Line: arrow pointing right
      ctx.fillStyle=ab.color;
      ctx.fillRect(ic-ir,iy-ir*0.2,ir*2,ir*0.4);
      ctx.beginPath();ctx.moveTo(ic+ir,iy-ir*0.5);ctx.lineTo(ic+ir*1.4,iy);ctx.lineTo(ic+ir,iy+ir*0.5);ctx.fill();
      // Trail dots
      ctx.globalAlpha=0.3;
      ctx.beginPath();ctx.arc(ic-ir*1.2,iy,ir*0.15,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ic-ir*1.5,iy,ir*0.1,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.8;
    } else if(ab.shape==='cone'){
      // Cone: fan shape
      ctx.fillStyle=ab.color;
      ctx.beginPath();ctx.moveTo(ic-ir,iy);ctx.lineTo(ic+ir,iy-ir*0.8);ctx.lineTo(ic+ir,iy+ir*0.8);ctx.closePath();ctx.fill();
    } else if(ab.shape==='ring'){
      // Ring: expanding circle
      ctx.strokeStyle=ab.color;ctx.lineWidth=Math.max(2,fs/6);
      ctx.beginPath();ctx.arc(ic,iy,ir*0.5,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=0.4;ctx.beginPath();ctx.arc(ic,iy,ir,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=0.8;
    } else if(ab.shape==='area'){
      // Area: filled square zone
      ctx.fillStyle=ab.color;ctx.globalAlpha=0.3;
      ctx.fillRect(ic-ir,iy-ir,ir*2,ir*2);
      ctx.globalAlpha=0.8;ctx.strokeStyle=ab.color;ctx.lineWidth=Math.max(1,fs/10);
      ctx.strokeRect(ic-ir,iy-ir,ir*2,ir*2);
    } else if(ab.shape==='self'){
      // Self: shield/aura around center dot
      ctx.fillStyle=ab.color;
      ctx.beginPath();ctx.arc(ic,iy,ir*0.3,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=ab.color;ctx.lineWidth=Math.max(1.5,fs/7);
      ctx.beginPath();ctx.arc(ic,iy,ir*0.7,Math.PI*0.8,Math.PI*2.2);ctx.stroke();
      ctx.beginPath();ctx.arc(ic,iy,ir*0.7,Math.PI*0.3,Math.PI*0.7);ctx.stroke();
    }
    // Element particles around icon
    ctx.fillStyle=ab.color;ctx.globalAlpha=0.5;
    for(var pi=0;pi<4;pi++){
      var pa=pi*Math.PI/2+this.animTimer*1.5;
      var ppx=ic+Math.cos(pa)*ir*1.1, ppy=iy+Math.sin(pa)*ir*1.1;
      ctx.beginPath();ctx.arc(ppx,ppy,Math.max(1,fs*0.12),0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    ty+=iconS+pad;

    // Element / shape label
    ctx.fillStyle='#aaa';ctx.font=Math.round(fs*0.8)+'px Segoe UI';ctx.textAlign='center';
    ctx.fillText(ab.element.toUpperCase()+' / '+ab.shape,ccx,ty);
    ty+=fs*1.3;

    // DMG and CD inline
    var bw2=cardW*0.38, blockH=fs*2.2;
    ctx.fillStyle='rgba(255,100,50,0.15)';ctx.fillRect(cx+cardW*0.06,ty,bw2,blockH);
    ctx.fillStyle='#ff8855';ctx.font='bold '+Math.round(fs*0.7)+'px Segoe UI';
    ctx.fillText('DMG',cx+cardW*0.06+bw2/2,ty+fs*0.7);
    ctx.fillStyle='#fff';ctx.font='bold '+Math.round(fs*0.95)+'px Segoe UI';
    ctx.fillText(ab.damage,cx+cardW*0.06+bw2/2,ty+fs*1.7);
    ctx.fillStyle='rgba(80,150,255,0.15)';ctx.fillRect(cx+cardW*0.56,ty,bw2,blockH);
    ctx.fillStyle='#6699ff';ctx.font='bold '+Math.round(fs*0.7)+'px Segoe UI';
    ctx.fillText('CD',cx+cardW*0.56+bw2/2,ty+fs*0.7);
    ctx.fillStyle='#fff';ctx.font='bold '+Math.round(fs*0.95)+'px Segoe UI';
    ctx.fillText(ab.cooldown,cx+cardW*0.56+bw2/2,ty+fs*1.7);
    ty+=blockH+fs*0.8;

    // Description
    var desc=ab.verb==='strike'?'Direct attack':ab.verb==='launch'?'Ranged projectile':ab.verb==='place'?'Lingering zone':ab.verb==='dash'?'Dash + damage':ab.verb==='shield'?'Defense buff':'Drain life';
    ctx.fillStyle='#778';ctx.font=Math.round(fs*0.75)+'px Segoe UI';ctx.textAlign='center';
    ctx.fillText(desc,ccx,ty);

    // Bottom accent bar
    ctx.fillStyle=ab.color;
    ctx.fillRect(cx+8,cy+cardH-6,cardW-16,3);
  }
};

Game.prototype.drawReplaceOverlay=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(13,Math.round(w*0.013));
  ctx.fillStyle='rgba(10,8,5,0.88)';ctx.fillRect(0,0,w,h);
  // Glow
  var grd=ctx.createRadialGradient(w/2,h*0.12,0,w/2,h*0.12,w*0.2);
  grd.addColorStop(0,'rgba(200,150,40,0.1)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,h*0.25);
  ctx.fillStyle='#ffcc44';ctx.font='bold '+Math.round(fs*1.8)+'px Segoe UI';ctx.textAlign='center';

  // New ability card at top
  if(this._pendingAbility){
    var ab=this._pendingAbility;

  for(var i=0;i<this.player.abilities.length;i++){
    var ab=this.player.abilities[i];

    ctx.strokeStyle=ab.color;ctx.lineWidth=1;ctx.strokeRect(cx,cy,cardW,cardH);
    // Number badge
    ctx.fillStyle=ab.color;ctx.fillRect(cx+6,cy+6,Math.round(fs*1.6),cardH-12);
    ctx.fillStyle='#000';ctx.font='bold '+Math.round(fs*1.0)+'px Segoe UI';ctx.textAlign='center';
    ctx.fillText(i+1,cx+6+Math.round(fs*0.8),cy+cardH/2+fs*0.35);
    // Name
    ctx.fillStyle='#fff';ctx.font='bold '+fs+'px Segoe UI';ctx.textAlign='left';
    ctx.fillText(ab.name,cx+Math.round(fs*2.2),cy+fs*1.3);
    // Stats on right side
    ctx.fillStyle='#999';ctx.font=Math.round(fs*0.8)+'px Segoe UI';ctx.textAlign='right';
    ctx.fillText(ab.element+' \u2022 '+ab.shape,cx+cardW-10,cy+fs*1.0);
    ctx.fillText('DMG:'+ab.damage+'  CD:'+ab.cooldown,cx+cardW-10,cy+fs*2.2);
    ctx.textAlign='center';
  }
};

Game.prototype.drawLootPrompt=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(14,Math.round(w*0.015));
  var loot=this._pendingLoot;if(!loot)return;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,w,h);
  var boxW=Math.min(380,w*0.45),boxH=0;
  var bx=(w-boxW)/2;
  // Calculate height first using accumulated approach
  var lines=[];
  lines.push({text:'ITEM FOUND',font:'bold '+Math.round(fs*1.5)+'px Segoe UI',color:'#ffcc44',h:fs*2.0});
  lines.push({text:loot.name,font:'bold '+Math.round(fs*1.3)+'px Segoe UI',color:loot.color,h:fs*1.8});
  lines.push({text:loot.desc,font:Math.round(fs*0.9)+'px Segoe UI',color:'#aaa',h:fs*1.4});
  if(loot.type==='weapon') lines.push({text:'DMG: '+loot.damage+(loot.range>1?'  Range: '+loot.range:'  Melee')+'  CD: '+(loot.cd||0),font:Math.round(fs*0.85)+'px Segoe UI',color:'#ccc',h:fs*1.4});
  if(loot.type==='armor') lines.push({text:'Defense: +'+loot.defense,font:Math.round(fs*0.85)+'px Segoe UI',color:'#ccc',h:fs*1.4});
  // Current equipment comparison with stats
  lines.push({h:fs*0.4}); // spacer
  var current=loot.type==='weapon'?this.player.weapon:this.player.armor;
  if(current){
    lines.push({text:'Currently equipped:',font:Math.round(fs*0.8)+'px Segoe UI',color:'#777',h:fs*1.2});
    lines.push({text:current.name,font:'bold '+Math.round(fs*0.95)+'px Segoe UI',color:'#aaa',h:fs*1.3});
    if(loot.type==='weapon'&&current.damage!=null){
      var diff=loot.damage-current.damage;
      var diffCol=diff>0?'#44ff44':diff<0?'#ff4444':'#888';
      lines.push({text:'DMG: '+current.damage+' \u2192 '+loot.damage+' ('+(diff>0?'+':'')+diff+')',font:Math.round(fs*0.85)+'px Segoe UI',color:diffCol,h:fs*1.3});
    }
    if(loot.type==='armor'&&current.defense!=null){
      var diff=loot.defense-current.defense;
      var diffCol=diff>0?'#44ff44':diff<0?'#ff4444':'#888';
      lines.push({text:'DEF: '+current.defense+' \u2192 '+loot.defense+' ('+(diff>0?'+':'')+diff+')',font:Math.round(fs*0.85)+'px Segoe UI',color:diffCol,h:fs*1.3});
    }
  } else {
    lines.push({text:'Nothing equipped',font:Math.round(fs*0.8)+'px Segoe UI',color:'#666',h:fs*1.3});
  }
  lines.push({h:fs*0.5}); // spacer
  lines.push({text:'[Y] Equip    [S] Stash    [N] Leave',font:'bold '+fs+'px Segoe UI',color:'#aab',h:fs*1.6});
  for(var i=0;i<lines.length;i++) boxH+=lines[i].h;
  boxH+=fs*2; // padding
  var by=(h-boxH)/2;
  // Draw box
  ctx.fillStyle='rgba(15,10,25,0.95)';ctx.fillRect(bx,by,boxW,boxH);
  ctx.strokeStyle=loot.color;ctx.lineWidth=2;ctx.strokeRect(bx,by,boxW,boxH);
  // Draw lines with accumulated Y
  var ty=by+fs*1.2;
  ctx.textAlign='center';
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(line.text){ctx.fillStyle=line.color;ctx.font=line.font;ctx.fillText(line.text,w/2,ty);}
    ty+=line.h;
  }
};

Game.prototype.drawDeathOverlay=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(14,Math.round(w*0.016));
  ctx.fillStyle='rgba(30,0,0,0.85)';ctx.fillRect(0,0,w,h);
  var grd=ctx.createRadialGradient(w/2,h*0.3,h*0.05,w/2,h*0.3,h*0.5);
  grd.addColorStop(0,'rgba(80,0,0,0.3)');grd.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
  // Title
  ctx.fillStyle='#220000';ctx.font='bold '+Math.round(fs*2.8)+'px Segoe UI';ctx.textAlign='center';
  ctx.fillText('YOU DIED',w/2+3,h*0.15+3);
  ctx.fillStyle='#ff3333';
  ctx.fillText('YOU DIED',w/2,h*0.15);
  ctx.fillStyle='#884444';ctx.font=Math.round(fs*1.0)+'px Segoe UI';
  ctx.fillText('Everything is lost.',w/2,h*0.21);

  // What was lost — accumulated Y
  var boxW=Math.min(420,w*0.5),pad=fs*1.0;
  var lines=[];
  var p=this.player;
  var days=GameTime?GameTime.day():0;
  var residents=0,npcCount=0;
  if(NPCManager){npcCount=NPCManager.npcs.length;for(var i=0;i<NPCManager.npcs.length;i++)if(NPCManager.npcs[i].resident)residents++;}
  var resourceCount=Bag.count(p.bag);
  var resourceTypes=Bag.types(p.bag);
  var skillList=PlayerSkills.list(p.skills);
  var tileChanges=Overworld.tileChanges?Object.keys(Overworld.tileChanges).length:0;

  lines.push({text:'LOST FOREVER',color:'#cc6666',bold:true});
  lines.push({text:''});
  lines.push({text:(days+1)+' day'+(days!==0?'s':'')+' survived',color:'#ccaa88'});
  if(residents>0) lines.push({text:residents+' villager'+(residents>1?'s':'')+' left homeless',color:'#ddaa66'});
  if(npcCount>residents&&npcCount>0) lines.push({text:(npcCount-residents)+' traveller'+(npcCount-residents>1?'s':'')+' forgotten',color:'#aa9977'});
  lines.push({text:p.kills+' creature'+(p.kills!==1?'s':'')+' slain',color:'#cc8888'});
  if(p.floor>0) lines.push({text:'Reached dungeon floor '+p.floor,color:'#aaaacc'});
  if(resourceCount>0) lines.push({text:resourceCount+' resource'+(resourceCount!==1?'s':'')+' ('+resourceTypes+' type'+(resourceTypes!==1?'s':'')+') abandoned',color:'#88aa88'});
  if(skillList.length>0){
    lines.push({text:'Skills lost:',color:'#8888aa'});
    // Show skills in rows of 3 to fit the box
    for(var i=0;i<skillList.length;i+=3){
      var row='  ';
      for(var j=i;j<Math.min(i+3,skillList.length);j++){
        if(j>i) row+='   ';
        row+=skillList[j].id+' Lv.'+skillList[j].level;
      }
      lines.push({text:row,color:'#777799'});
    }
  }
  if(tileChanges>0) lines.push({text:tileChanges+' mark'+(tileChanges!==1?'s':'')+' on the world erased',color:'#888888'});
  if(p.weapon) lines.push({text:p.weapon.name+' rusts away',color:'#aa8866'});
  if(p.armor) lines.push({text:p.armor.name+' crumbles to dust',color:'#8888aa'});

  // Calculate box height from content
  var lineH=fs*1.5;
  var boxH=pad+lines.length*lineH+pad;
  var bx=(w-boxW)/2,by=h*0.25;
  ctx.fillStyle='rgba(20,5,5,0.7)';ctx.fillRect(bx,by,boxW,boxH);
  ctx.strokeStyle='rgba(255,50,50,0.2)';ctx.lineWidth=1;ctx.strokeRect(bx,by,boxW,boxH);

  // Draw lines with accumulated Y
  var ty=by+pad+fs*0.3;
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(!line.text){ty+=lineH*0.3;continue;}
    ctx.fillStyle=line.color||'#ccc';
    ctx.font=(line.bold?'bold ':'')+fs+'px Segoe UI';
    ctx.fillText(line.text,w/2,ty);
    ty+=lineH;
  }

  // Legacy stats — cumulative across all lives
  var legY = by + boxH + fs * 1.0;
  var meta = this.meta;
  var oTier = (typeof ObeliskManager !== 'undefined') ? ObeliskManager.tier : 0;
  var buildings = (typeof BuildingManager !== 'undefined') ? BuildingManager.buildings.length : 0;
  var cleared = 0;
  if (typeof DungeonSpawnManager !== 'undefined') { for (var ck in DungeonSpawnManager.cleared) cleared++; }

  ctx.fillStyle = '#8899cc';
  ctx.font = 'bold ' + Math.round(fs * 0.9) + 'px Segoe UI';
  ctx.fillText('YOUR LEGACY', w / 2, legY);
  legY += fs * 1.3;

  var legLines = [
    { label: 'Lives Lived', value: meta.totalRuns, color: '#aabbcc' },
    { label: 'Best Depth', value: 'Floor ' + meta.depthRecord, color: '#aaaacc' },
    { label: 'Total Kills', value: meta.totalKills, color: '#cc8888' },
    { label: 'Obelisk Tier', value: oTier + '/5', color: oTier >= 5 ? '#ffffff' : '#ddaa44' },
    { label: 'Dungeons Cleared', value: cleared + '/8', color: '#88cc88' },
  ];
  // Calculate available space
  var legAvail = h * 0.9 - legY;
  var legLH = Math.min(fs * 1.3, legAvail / (legLines.length + 1));
  ctx.font = Math.round(Math.min(fs * 0.85, legLH * 0.8)) + 'px Segoe UI';
  for (var li = 0; li < legLines.length; li++) {
    var ll = legLines[li];
    ctx.fillStyle = '#777';
    ctx.textAlign = 'right';
    ctx.fillText(ll.label + ':', w / 2 - fs * 0.5, legY);
    ctx.fillStyle = ll.color;
    ctx.textAlign = 'left';
    ctx.fillText('' + ll.value, w / 2 + fs * 0.5, legY);
    legY += legLH;
  }
  ctx.textAlign = 'center';

  // Continue prompt
  var promptY = h * 0.92;
  ctx.fillStyle='#776';ctx.font=Math.round(fs*0.9)+'px Segoe UI';
  var pulse=0.4+Math.sin(this.animTimer*2)*0.3;
  ctx.globalAlpha=pulse+0.3;
  ctx.fillText('Press any key to start over',w/2,promptY);
  ctx.globalAlpha=1;
};

Game.prototype.drawTitle=function(ctx){
  var w=CONFIG.WIDTH,h=CONFIG.HEIGHT,fs=Math.max(14,Math.round(w*0.015));
  var c=this.customization;
  ctx.fillStyle='#040410';ctx.fillRect(0,0,w,h);

  // Title
  ctx.fillStyle='#4466aa';ctx.font='bold '+Math.round(fs*2.8)+'px Segoe UI';ctx.textAlign='center';
  ctx.fillText('REMNANTS',w/2,h*0.1);
  ctx.fillStyle='#556';ctx.font=Math.round(fs*1)+'px Segoe UI';
  ctx.fillText('The world remembers',w/2,h*0.15);

  if(this.meta.depthRecord>0){
    ctx.fillStyle='#666';ctx.font=Math.round(fs*0.85)+'px Segoe UI';
    ctx.fillText('Best: Floor '+this.meta.depthRecord+'  Runs: '+this.meta.totalRuns+'  Kills: '+this.meta.totalKills,w/2,h*0.19);
  }

  // Character preview — draw large in center-left
  var previewSize=Math.min(160,w*0.18,h*0.25);
  var px=w*0.28-previewSize/2, py=h*0.32;
  // Background circle
  ctx.fillStyle='rgba(30,30,60,0.6)';
  ctx.beginPath();ctx.arc(px+previewSize/2,py+previewSize/2,previewSize*0.6,0,Math.PI*2);ctx.fill();
  // Draw character at preview size with selected weapon
  var pWalk=(this.animTimer*0.8)%1;
  var selWpn=this.START_WEAPONS[c.startWpnIdx];
  drawCharPixel(ctx, px, py, previewSize,
    this.BODY_COLORS[c.bodyColorIdx], this.EYE_COLORS[c.eyeIdx],
    this.SKIN_COLORS[c.skinIdx], selWpn.color, pWalk,
    {hairStyle:this.HAIR_STYLES[c.hairStyleIdx], hairColor:this.HAIR_COLORS[c.hairIdx],
     weaponType:selWpn.key, body:this.BODIES[c.bodyIdx], height:this.HEIGHTS[c.heightIdx], frame:this.FRAMES[c.frameIdx]});

  // Options panel — right side, accumulated Y
  var optX=w*0.5, valX=optX+w*0.1;
  var labels=['Outfit','Hair Color','Hair Style','Skin','Eyes','Body','Height','Frame','Weapon'];
  var numRows=labels.length;
  // Calculate row height to fit between top content and bottom prompts
  var topY=h*0.22;
  var botY=h*0.76; // where options must end, leaving room for prompts
  var weaponExtra=fs*1.0; // extra space for weapon desc
  var availH=botY-topY-weaponExtra;
  var rowH=Math.min(Math.round(fs*2.4),Math.floor(availH/numRows));
  var ty=topY;

  for(var i=0;i<numRows;i++){
    var selected=c.cursor===i;
    var thisRowH=(i===numRows-1)?rowH+weaponExtra:rowH; // weapon row taller for desc
    // Highlight
    if(selected){
      ctx.fillStyle='rgba(60,60,120,0.4)';
      ctx.fillRect(optX-w*0.15,ty,w*0.4,thisRowH);
      ctx.fillStyle='#aaccff';
    } else { ctx.fillStyle='#667'; }
    // Label
    ctx.font=(selected?'bold ':'')+fs+'px Segoe UI';ctx.textAlign='left';
    ctx.fillText(labels[i]+':',optX-w*0.14,ty+fs*1.1);
    // Value
    ctx.textAlign='center';
    if(i===2||i===5||i===6||i===7){
      // Text toggle options
      var txt;
      if(i===2) txt=this.HAIR_STYLES[c.hairStyleIdx];
      else if(i===5) txt=this.BODIES[c.bodyIdx];
      else if(i===6) txt=this.HEIGHTS[c.heightIdx];
      else txt=this.FRAMES[c.frameIdx];
      ctx.fillStyle=selected?'#fff':'#aaa';ctx.font=fs+'px Segoe UI';
      ctx.fillText(txt,valX,ty+fs*1.1);
    } else if(i===numRows-1){
      // Weapon: name on first line, desc on second
      var wpn=this.START_WEAPONS[c.startWpnIdx];
      ctx.fillStyle=wpn.color;ctx.font=(selected?'bold ':'')+fs+'px Segoe UI';
      ctx.fillText(wpn.name,valX,ty+fs*1.0);
      ctx.fillStyle='#888';ctx.font=Math.round(fs*0.75)+'px Segoe UI';
      ctx.fillText(wpn.desc,valX,ty+fs*2.2);
    } else {
      // Color swatch (rows 0=outfit, 1=hair color, 3=skin, 4=eyes)
      var sc=i===0?this.BODY_COLORS[c.bodyColorIdx]:i===1?this.HAIR_COLORS[c.hairIdx]:i===4?this.EYE_COLORS[c.eyeIdx]:this.SKIN_COLORS[c.skinIdx];
      ctx.fillStyle=sc;
      ctx.fillRect(valX-fs*1.5,ty+fs*0.3,fs*3,fs*1.2);
      ctx.strokeStyle=selected?'#fff':'#555';ctx.lineWidth=selected?2:1;
      ctx.strokeRect(valX-fs*1.5,ty+fs*0.3,fs*3,fs*1.2);
    }
    // Arrows
    if(selected){
      ctx.fillStyle='#ffcc44';ctx.font='bold '+Math.round(fs*1.2)+'px Segoe UI';ctx.textAlign='center';
      var arrowW=(i===numRows-1)?fs*5:(i===2||i>=5)?fs*3:fs*2.5;
      ctx.fillText('\u25C0',valX-arrowW,ty+fs*1.1);
      ctx.fillText('\u25B6',valX+arrowW,ty+fs*1.1);
    }
    ty+=thisRowH; // accumulate Y
  }

  // Controls hint
  ctx.fillStyle='#556';ctx.font=Math.round(fs*0.8)+'px Segoe UI';ctx.textAlign='center';
  var cy=h*0.82;
  ctx.fillText('\u2191\u2193 Select option    \u2190\u2192 Change    ENTER to begin',w/2,cy);
  ctx.fillStyle='#445';ctx.font=Math.round(fs*0.7)+'px Segoe UI';
  ctx.fillText('WASD move \u2022 1-4 abilities \u2022 P potion \u2022 Space wait \u2022 Tab map \u2022 M mute',w/2,cy+fs*1.3);

  // Pulsing start prompt
  ctx.fillStyle='#aab';ctx.font='bold '+Math.round(fs*1.1)+'px Segoe UI';
  ctx.globalAlpha=0.5+Math.sin(this.animTimer*3)*0.3+0.2;
  ctx.fillText('ENTER to begin',w/2,h*0.94);ctx.globalAlpha=1;
};

// ============================================================
// INVENTORY OVERLAY — tabbed layout
// ============================================================
var INV_TABS = ['Equip','Skills','Bag'];
var _invTab = 0;
var _invScroll = 0;

Game.prototype.drawInventory=function(ctx, cursor, message, messageTimer, stashIdx, getStashFn){
  var w=CONFIG.WIDTH, h=CONFIG.HEIGHT, fs=Math.max(11,Math.round(w*0.012));
  var p=this.player;
  cursor = cursor || 0;

  // Background
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,w,h);

  // Title
  ctx.fillStyle='#ddcc88';ctx.font='bold '+Math.round(fs*1.4)+'px Segoe UI';ctx.textAlign='center';
  ctx.fillText('INVENTORY',w/2,fs*2);
  ctx.fillStyle='#666';ctx.font=Math.round(fs*0.7)+'px Segoe UI';
  ctx.fillText('[I] close    [Q]/[Tab] switch tab    \u2191\u2193 select    [E] action',w/2,fs*3.2);

  // Tabs
  var tabW = w / INV_TABS.length;
  var tabY = fs * 4;
  var tabH = fs * 1.8;
  for (var ti = 0; ti < INV_TABS.length; ti++) {
    var tx = ti * tabW;
    var sel = ti === _invTab;
    ctx.fillStyle = sel ? 'rgba(50,40,20,0.9)' : 'rgba(20,18,15,0.6)';
    ctx.fillRect(tx, tabY, tabW, tabH);
    if (sel) { ctx.strokeStyle = '#ddaa44'; ctx.lineWidth = 2; ctx.strokeRect(tx, tabY, tabW, tabH); }
    ctx.fillStyle = sel ? '#fff' : '#777';
    ctx.font = (sel ? 'bold ' : '') + fs + 'px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(INV_TABS[ti], tx + tabW / 2, tabY + tabH * 0.7);
  }

  var contentY = tabY + tabH + fs * 1.0;
  var contentH = h - contentY - fs * 4;
  var margin = w * 0.06;
  ctx.textAlign = 'left';

  if (_invTab === 0) {
    // ===== EQUIP TAB =====
    var ty = contentY;
    var rowH = fs * 1.6;
    var boxL = margin - 4;
    var boxW = w - margin * 2;
    var boxR = boxL + boxW - 8; // right edge for text alignment

    // Weapon
    if(cursor===0){ctx.fillStyle='rgba(60,50,20,0.5)';ctx.fillRect(boxL,ty-fs*0.5,boxW,rowH);ctx.strokeStyle='#ddaa44';ctx.lineWidth=1;ctx.strokeRect(boxL,ty-fs*0.5,boxW,rowH);}
    ctx.fillStyle='#888';ctx.font=fs+'px Segoe UI';
    ctx.fillText('Weapon:',margin,ty+fs*0.5);
    var wpnStash=getStashFn?getStashFn(p,'weapon'):[];
    if(p.weapon){
      ctx.fillStyle='#ddaa44';ctx.fillText(p.weapon.name,margin+fs*6,ty+fs*0.5);
      if(cursor===0){ctx.fillStyle='#aa8844';ctx.font=Math.round(fs*0.7)+'px Segoe UI';ctx.textAlign='right';ctx.fillText('[E] Stash',boxR,ty+fs*0.5);ctx.textAlign='left';}
    } else if(wpnStash.length>0&&cursor===0){
      var si=stashIdx%wpnStash.length;
      ctx.fillStyle='#997744';ctx.fillText(wpnStash[si].name,margin+fs*6,ty+fs*0.5);
      ctx.fillStyle='#aa8844';ctx.font=Math.round(fs*0.7)+'px Segoe UI';ctx.textAlign='right';
      ctx.fillText((wpnStash.length>1?'\u25C0\u25B6 ':'')+'[E] Equip  [X] Salvage  [D] Drop',boxR,ty+fs*0.5);
      ctx.textAlign='left';
    } else { ctx.fillStyle='#555';ctx.fillText('Unarmed',margin+fs*6,ty+fs*0.5); }
    ty+=rowH;

    // Armor
    if(cursor===1){ctx.fillStyle='rgba(60,50,20,0.5)';ctx.fillRect(boxL,ty-fs*0.5,boxW,rowH);ctx.strokeStyle='#ddaa44';ctx.lineWidth=1;ctx.strokeRect(boxL,ty-fs*0.5,boxW,rowH);}
    ctx.fillStyle='#888';ctx.font=fs+'px Segoe UI';
    ctx.fillText('Armor:',margin,ty+fs*0.5);
    var armStash=getStashFn?getStashFn(p,'armor'):[];
    if(p.armor){
      ctx.fillStyle='#88aacc';ctx.fillText(p.armor.name,margin+fs*6,ty+fs*0.5);
      if(cursor===1){ctx.fillStyle='#aa8844';ctx.font=Math.round(fs*0.7)+'px Segoe UI';ctx.textAlign='right';ctx.fillText('[E] Stash',boxR,ty+fs*0.5);ctx.textAlign='left';}
    } else if(armStash.length>0&&cursor===1){
      var ai=stashIdx%armStash.length;
      ctx.fillStyle='#667788';ctx.fillText(armStash[ai].name,margin+fs*6,ty+fs*0.5);
      ctx.fillStyle='#aa8844';ctx.font=Math.round(fs*0.7)+'px Segoe UI';ctx.textAlign='right';
      ctx.fillText((armStash.length>1?'\u25C0\u25B6 ':'')+'[E] Equip  [X] Salvage  [D] Drop',boxR,ty+fs*0.5);
      ctx.textAlign='left';
    } else { ctx.fillStyle='#555';ctx.fillText('None',margin+fs*6,ty+fs*0.5); }
    ty+=rowH;

    // Potions
    ctx.fillStyle='#888';ctx.font=fs+'px Segoe UI';
    ctx.fillText('Potions:',margin,ty+fs*0.5);
    ctx.fillStyle=p.potions>0?'#ff44aa':'#555';ctx.fillText(''+p.potions,margin+fs*6,ty+fs*0.5);
    ty+=rowH;

    // Wardrobe
    ty+=fs*0.5;
    if(cursor===2){ctx.fillStyle='rgba(60,40,60,0.5)';ctx.fillRect(boxL,ty-fs*0.5,boxW,rowH);ctx.strokeStyle='#aa88cc';ctx.lineWidth=1;ctx.strokeRect(boxL,ty-fs*0.5,boxW,rowH);}
    ctx.fillStyle='#aa88cc';ctx.font=fs+'px Segoe UI';
    ctx.fillText('Wardrobe — change appearance',margin,ty+fs*0.5);
    if(cursor===2){ctx.fillStyle='#aa8844';ctx.font=Math.round(fs*0.7)+'px Segoe UI';ctx.textAlign='right';ctx.fillText('[E] Open',boxR,ty+fs*0.5);ctx.textAlign='left';}

    // Stats summary at bottom
    ty = contentY + contentH - fs * 2;
    ctx.fillStyle='#555';ctx.font=Math.round(fs*0.8)+'px Segoe UI';
    ctx.fillText('ATK: '+p.atk+'   HP: '+p.hp+'/'+p.maxHp+'   Kills: '+p.kills,margin,ty);

  } else if (_invTab === 1) {
    // ===== SKILLS TAB =====
    var skillList = PlayerSkills.list(p.skills);
    var ty = contentY;

    if (skillList.length === 0) {
      ctx.fillStyle='#555';ctx.font=fs+'px Segoe UI';ctx.fillText('No skills yet. Gather, chop, mine, fish, or fight!',margin,ty+fs);
    } else {
      // Two-column layout for skills
      var colW = (w - margin * 3) / 2;
      var rowH = fs * 2.8;

      for (var i = 0; i < skillList.length; i++) {
        var sk = skillList[i];
        var def = sk.def;
        var col = i % 2;
        var row = Math.floor(i / 2);
        var sx = margin + col * (colW + margin);
        var sy = ty + row * rowH;
        var sxR = sx + colW; // right edge of this column

        if (sy + rowH > contentY + contentH) break;

        // Skill name — left aligned, truncated to fit
        ctx.fillStyle = def ? def.color : '#aaa';
        ctx.font = 'bold ' + fs + 'px Segoe UI';
        var skName = def ? def.name : sk.id;
        var maxNameW = colW * 0.7;
        while (skName.length > 3 && ctx.measureText(skName).width > maxNameW) skName = skName.slice(0, -2) + '.';
        ctx.fillText(skName, sx, sy + fs * 0.8);

        // Level — right aligned to column edge
        ctx.fillStyle = '#aaa';
        ctx.font = Math.round(fs * 0.8) + 'px Segoe UI';
        ctx.textAlign = 'right';
        ctx.fillText('Lv.' + sk.level, sxR, sy + fs * 0.8);
        ctx.textAlign = 'left';

        // XP bar — fits within column
        var barX = sx, barW = colW, barH = fs * 0.5;
        var barY = sy + fs * 1.3;
        var prog = PlayerSkills.progress(p.skills, sk.id);
        ctx.fillStyle = '#222';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = def ? def.color : '#888';
        ctx.fillRect(barX, barY, barW * prog, barH);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(barX, barY, barW, barH);
      }
    }

  } else if (_invTab === 2) {
    // ===== BAG TAB =====
    var contents = Bag.contents(p.bag);
    var ty = contentY;

    ctx.fillStyle='#aaa';ctx.font='bold '+fs+'px Segoe UI';
    ctx.fillText(Bag.types(p.bag)+' item types, '+Bag.count(p.bag)+' total',margin,ty+fs*0.5);
    ty += fs * 2;

    if (contents.length === 0) {
      ctx.fillStyle='#555';ctx.font=fs+'px Segoe UI';ctx.fillText('Empty',margin,ty);
    } else {
      // Fixed readable line height — scroll if content exceeds screen
      var lineH = fs * 1.5;
      var colW = (w - margin * 3) / 2;

      // Build flat list of renderable lines: {type:'cat'|'item', ...}
      var lines = [];
      var lastCat = '';
      for (var i = 0; i < contents.length; i++) {
        var item = contents[i];
        var cat = item.def ? item.def.category : 'misc';
        if (cat !== lastCat) { lastCat = cat; lines.push({ type: 'cat', text: cat.toUpperCase() }); }
        lines.push({ type: 'item', text: item.count + 'x ' + (item.def ? item.def.name : item.id), color: item.def ? item.def.color : '#aaa' });
      }

      // Scroll bounds
      var visibleLines = Math.floor(contentH / lineH);
      var maxScroll = Math.max(0, lines.length - visibleLines);
      if (_invScroll > maxScroll) _invScroll = maxScroll;
      var startLine = _invScroll;

      // Scroll indicator
      if (lines.length > visibleLines) {
        ctx.fillStyle = '#555';
        ctx.font = Math.round(fs * 0.7) + 'px Segoe UI';
        ctx.textAlign = 'right';
        ctx.fillText('\u2191\u2193 scroll (' + (startLine + 1) + '-' + Math.min(startLine + visibleLines, lines.length) + ' of ' + lines.length + ')', w - margin, contentY + fs * 0.5);
        ctx.textAlign = 'left';
      }

      for (var li = startLine; li < Math.min(lines.length, startLine + visibleLines); li++) {
        var line = lines[li];
        if (line.type === 'cat') {
          ctx.fillStyle = '#777';
          ctx.font = 'bold ' + Math.round(fs * 0.8) + 'px Segoe UI';
          ctx.fillText(line.text, margin, ty);
        } else {
          ctx.fillStyle = line.color;
          ctx.font = fs + 'px Segoe UI';
          var itemText = line.text;
          while (itemText.length > 3 && ctx.measureText(itemText).width > w - margin * 2) itemText = itemText.slice(0, -4) + '..';
          ctx.fillText(itemText, margin + fs * 1, ty);
        }
        ty += lineH;
      }
    }
  }

  // Status message
  if (message && messageTimer > 0) {
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold ' + Math.round(fs * 1.1) + 'px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(message, w / 2, h - fs * 2);
  }
};


// ============================================================
// SYSTEM: Animals — wildlife that moves faster than the player
// ============================================================

// Animal types — each has behaviour, speed, biome preference
// Only quadrupeds move faster than humans (speed 2 = 2 tiles per player turn)
var ANIMAL_TYPES = {
  rabbit:  { name: 'Rabbit',  color: '#bbaa88', speed: 2, hp: 3,  hostile: false, tameable: true,  food: 'carrot',      rideable: false, biomes: ['grassland','forest'] },
  deer:    { name: 'Deer',    color: '#aa8855', speed: 2, hp: 8,  hostile: false, tameable: false, food: null,          rideable: false, biomes: ['grassland','forest'] },
  wolf:    { name: 'Wolf',    color: '#666666', speed: 2, hp: 12, hostile: true,  tameable: true,  food: 'dried_fish',  rideable: false, biomes: ['forest','tundra'] },
  horse:   { name: 'Horse',   color: '#886644', speed: 2, hp: 20, hostile: false, tameable: true,  food: 'wheat',       rideable: true,  biomes: ['grassland'] },
  boar:    { name: 'Boar',    color: '#665544', speed: 1, hp: 15, hostile: true,  tameable: false, food: null,          rideable: false, biomes: ['forest','swamp'] },
  fox:     { name: 'Fox',     color: '#cc6633', speed: 2, hp: 6,  hostile: false, tameable: true,  food: 'berry',       rideable: false, biomes: ['grassland','forest'] },
  bear:    { name: 'Bear',    color: '#554433', speed: 1, hp: 30, hostile: true,  tameable: false, food: null,          rideable: false, biomes: ['forest','tundra'] },
};

// Animal constructor
function Animal(wx, wy, type) {
  var def = ANIMAL_TYPES[type];
  this.x = wx;
  this.y = wy;
  this.type = type;
  this.name = def.name;
  this.color = def.color;
  this.speed = def.speed;     // tiles per player turn
  this.hp = def.hp;
  this.maxHp = def.hp;
  this.hostile = def.hostile;
  this.tameable = def.tameable;
  this.rideable = def.rideable;
  this.alive = true;
  this.tamed = false;
  this.petName = null;        // custom name when tamed
  this.following = false;     // follows player as pet
  this.mounted = false;       // player is riding this animal
  this.animTimer = Math.random() * 10;
  this.walkTimer = 0;
  this.lastDir = { x: 0, y: 1 };
  this.moveAccum = 0;
  this.fleeTimer = 0;        // turns to flee after being spooked
  this.aggroRange = def.hostile ? 6 : 0;
}

// Move animal — same wall-avoidance as NPCs but respects animals+NPCs+player
Animal.prototype.moveToward = function(tx, ty) {
  var dx = tx - this.x, dy = ty - this.y;
  if (dx === 0 && dy === 0) return false;
  var mdx = dx !== 0 ? Math.sign(dx) : 0;
  var mdy = dy !== 0 ? Math.sign(dy) : 0;
  var tries = Math.abs(dx) >= Math.abs(dy)
    ? [{x:mdx,y:0},{x:0,y:mdy},{x:mdx,y:mdy}]
    : [{x:0,y:mdy},{x:mdx,y:0},{x:mdx,y:mdy}];
  for (var i = 0; i < tries.length; i++) {
    var nx = this.x + tries[i].x, ny = this.y + tries[i].y;
    if (!Overworld.isPassable(nx, ny)) continue;
    if (AnimalManager.getAt(nx, ny)) continue;
    // Don't walk onto the player
    var pl = GameUtils.player();
    if (pl && nx === Math.round(pl.x) && ny === Math.round(pl.y)) continue;
    this.lastDir = tries[i];
    this.x = nx; this.y = ny;
    this.walkTimer = 0.25;
    return true;
  }
  return false;
};

Animal.prototype.moveAway = function(fx, fy) {
  var dx = this.x - fx, dy = this.y - fy;
  if (dx === 0 && dy === 0) dx = Math.random() < 0.5 ? 1 : -1;
  return this.moveToward(this.x + Math.sign(dx), this.y + Math.sign(dy));
};

// Animal Manager
var AnimalManager = {
  animals: [],

  add: function(animal) { this.animals.push(animal); return animal; },

  remove: function(animal) {
    var idx = this.animals.indexOf(animal);
    if (idx >= 0) this.animals.splice(idx, 1);
  },

  getAt: function(wx, wy) {
    for (var i = 0; i < this.animals.length; i++) {
      if (this.animals[i].alive && this.animals[i].x === wx && this.animals[i].y === wy) return this.animals[i];
    }
    return null;
  },

  clear: function() { this.animals = []; },

  // Get tamed pets that are following
  getPets: function() {
    return this.animals.filter(function(a) { return a.alive && a.tamed && a.following; });
  },

  // Get the animal player is currently riding
  getMount: function() {
    for (var i = 0; i < this.animals.length; i++) {
      if (this.animals[i].alive && this.animals[i].mounted) return this.animals[i];
    }
    return null;
  },
};

// Draw animals — quadruped pixel art
function drawAnimalPixel(ctx, sx, sy, ts, animal) {
  var m = ts / 16;
  var walking = animal.walkTimer > 0;
  var cycle = walking ? Math.sin(animal.animTimer * Math.PI * 6) : 0;
  var bob = walking ? Math.abs(Math.sin(animal.animTimer * Math.PI * 6)) * m * 0.5 : 0;
  var col = animal.color;
  var dark = shadeHex(col, -40);
  var light = shadeHex(col, 40);
  var type = animal.type;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(sx + 8 * m, sy + 15 * m, 5 * m, 1.2 * m, 0, 0, Math.PI * 2); ctx.fill();

  if (type === 'rabbit') {
    var legOff = cycle * m;
    // Body
    ctx.fillStyle = col;
    ctx.fillRect(sx + 5 * m, sy + 8 * m - bob, 6 * m, 5 * m);
    // Head
    ctx.fillStyle = light;
    ctx.fillRect(sx + 9 * m, sy + 6 * m - bob, 4 * m, 4 * m);
    // Ears
    ctx.fillStyle = col;
    ctx.fillRect(sx + 10 * m, sy + 2 * m - bob, 1.5 * m, 4 * m);
    ctx.fillRect(sx + 12 * m, sy + 3 * m - bob, 1.5 * m, 3.5 * m);
    // Eye
    ctx.fillStyle = '#111';
    ctx.fillRect(sx + 12 * m, sy + 7 * m - bob, 1 * m, 1 * m);
    // Legs
    ctx.fillStyle = dark;
    ctx.fillRect(sx + 5 * m, sy + 12 * m + legOff, 2 * m, 3 * m);
    ctx.fillRect(sx + 9 * m, sy + 12 * m - legOff, 2 * m, 3 * m);
    // Tail
    ctx.fillStyle = '#eee';
    ctx.fillRect(sx + 4 * m, sy + 9 * m - bob, 2 * m, 2 * m);

  } else if (type === 'deer') {
    var legOff = cycle * 1.5 * m;
    // Legs (back pair)
    ctx.fillStyle = dark;

// AI tick — animals move 'speed' tiles per player turn
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  var p = game.player;

  for (var i = AnimalManager.animals.length - 1; i >= 0; i--) {
    var a = AnimalManager.animals[i];
    if (!a.alive) continue;

    // Despawn if too far from player
    var dist = Math.abs(a.x - p.x) + Math.abs(a.y - p.y);
    if (dist > 50 && !a.tamed) {
      a.alive = false;
      continue;
    }

    // Mounted animals don't act independently
    if (a.mounted) continue;

    // Move 'speed' times per turn
    for (var step = 0; step < a.speed; step++) {
      if (a.tamed && a.following) {
        // Pets follow the player, stay 1-2 tiles away
        if (dist > 2) {
          a.moveToward(p.x, p.y);
        } else if (dist <= 1 && Math.random() < 0.3) {
          // Wander adjacent to player
          var d = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random() * 4)];
          var nx = a.x + d.x, ny = a.y + d.y;
          if (Math.abs(nx - p.x) + Math.abs(ny - p.y) <= 3) {
            a.moveToward(nx, ny);
          }
        }
      } else if (a.hostile && dist <= a.aggroRange) {
        // Hostile: chase player
        a.moveToward(p.x, p.y);
      } else if (a.fleeTimer > 0) {
        // Fleeing from player
        a.moveAway(p.x, p.y);
        a.fleeTimer--;
      } else if (!a.hostile && dist < 4) {
        // Skittish: flee from player
        a.fleeTimer = 3;
        a.moveAway(p.x, p.y);
      } else {
        // Wander randomly
        if (Math.random() < 0.3) {
          var d = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random() * 4)];
          a.moveToward(a.x + d.x, a.y + d.y);
        }
      }
    }

    // Hostile animals adjacent to player deal damage
    if (a.hostile && !a.tamed && Math.abs(a.x - p.x) + Math.abs(a.y - p.y) <= 1) {
      var dmg = Math.ceil(a.hp * 0.3);
      p.hp -= dmg;
      p.hitFlash = 0.2;
      GameUtils.addFloating(p.x, p.y, '-' + dmg, '#ff4422');
      GameUtils.addLog(a.name + ' attacks! -' + dmg + ' HP', '#ff6644');
      if (p.hp <= 0) { p.hp = 0; game.die(); return; }
    }
  }

  // Clean dead animals
  AnimalManager.animals = AnimalManager.animals.filter(function(a) { return a.alive; });
});

// Spawn animals periodically based on biome
GameEvents.on('turnEnd', function(game) {
  if (game.player.mode !== 'overworld') return;
  if (GameTime.turn % 20 !== 0) return; // every ~20 turns

  // Cap animals near player
  var nearby = 0;
  var p = game.player;
  for (var i = 0; i < AnimalManager.animals.length; i++) {
    var a = AnimalManager.animals[i];
    if (a.alive && !a.tamed && Math.abs(a.x - p.x) + Math.abs(a.y - p.y) < 30) nearby++;
  }
  if (nearby >= 6) return;

  // Pick a random spot at edge of view
  var edge = CONFIG.VIEW_W + 2;
  var angle = Math.random() * Math.PI * 2;
  var sx = Math.round(p.x + Math.cos(angle) * edge);
  var sy = Math.round(p.y + Math.sin(angle) * edge);
  if (!Overworld.isPassable(sx, sy)) return;

  // Get biome at spawn point
  var tile = Overworld.getTile(sx, sy);
  var biome = tile.biome || 'grassland';

  // Pick a valid animal type for this biome
  var candidates = [];
  for (var type in ANIMAL_TYPES) {
    if (ANIMAL_TYPES[type].biomes.indexOf(biome) >= 0) candidates.push(type);
  }
  if (candidates.length === 0) return;

  // Night spawns more hostile animals
  var isNight = GameTime.isNight();
  if (isNight) {
    var hostileCandidates = candidates.filter(function(t) { return ANIMAL_TYPES[t].hostile; });
    if (hostileCandidates.length > 0 && Math.random() < 0.6) candidates = hostileCandidates;
  }

  var type = candidates[Math.floor(Math.random() * candidates.length)];
  AnimalManager.add(new Animal(sx, sy, type));
});

// Update animation timers
GameEvents.on('update', function(game, dt) {
  for (var i = 0; i < AnimalManager.animals.length; i++) {
    var a = AnimalManager.animals[i];
    a.animTimer += dt;
    if (a.walkTimer > 0) a.walkTimer -= dt;
  }
});

// Draw animals on entity layer
GameEvents.on('draw:entities', function(game, ctx) {
  if (game.player.mode !== 'overworld') return;
  var ts = CONFIG.TILE;
  for (var i = 0; i < AnimalManager.animals.length; i++) {
    var a = AnimalManager.animals[i];
    if (!a.alive || a.mounted) continue;
    // Only draw if on screen
    var dx = a.x - game.player.x, dy = a.y - game.player.y;
    if (Math.abs(dx) > CONFIG.VIEW_W + 2 || Math.abs(dy) > CONFIG.VIEW_H + 2) continue;

    var sx = a.x * ts, sy = a.y * ts;
    drawAnimalPixel(ctx, sx, sy, ts, a);

    // Name label — always show type when nearby, pet name if tamed
    var adist = Math.abs(dx) + Math.abs(dy);
    if (adist <= 5) {
      var label = (a.tamed && a.petName) ? a.petName : a.name;
      ctx.fillStyle = a.hostile ? '#ff8866' : a.tamed ? '#ffccaa' : '#aaaaaa';
      ctx.font = Math.max(7, Math.round(ts * 0.22)) + 'px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(label, sx + ts / 2, sy - ts * 0.15);
    }

    // HP bar for hostile animals
    if (a.hostile && a.hp < a.maxHp) {
      var barW = ts - 4, hpR = a.hp / a.maxHp;
      ctx.fillStyle = '#222';
      ctx.fillRect(sx + 2, sy - 5, barW, 3);
      ctx.fillStyle = hpR > 0.5 ? '#44dd44' : hpR > 0.25 ? '#ddcc00' : '#dd3333';
      ctx.fillRect(sx + 2, sy - 5, barW * hpR, 3);
    }
  }
});

// Block walking onto animals (except mounted ones)
var _origIsPassableAnimals = Overworld.isPassable;
Overworld.isPassable = function(wx, wy) {
  if (!_origIsPassableAnimals.call(Overworld, wx, wy)) return false;
  var a = AnimalManager.getAt(wx, wy);
  if (a && !a.mounted) return false;
  return true;
};

// Player can interact with animals via E key — tame, mount, attack
// Uses the resolveInteraction path via the aim state
var _origResolveInteraction = Game.prototype.resolveInteraction;
Game.prototype.resolveInteraction = function(tx, ty) {
  var animal = AnimalManager.getAt(tx, ty);
  if (animal && animal.alive) {
    var p = this.player;
    if (animal.tamed) {
      if (animal.rideable && !animal.mounted) {
        // Mount it
        animal.mounted = true;
        animal.following = false;
        animal.x = p.x;
        animal.y = p.y;
        GameUtils.addLog('Mounted ' + (animal.petName || animal.name) + '!', '#ddaa44');
        SFX.shrine();
        this.endOverworldTurn();
        return true;
      } else if (animal.mounted) {
        // Dismount
        animal.mounted = false;
        animal.following = true;
        // Place animal adjacent
        var dirs = [{x:0,y:1},{x:1,y:0},{x:0,y:-1},{x:-1,y:0}];
        for (var i = 0; i < dirs.length; i++) {
          var nx = p.x + dirs[i].x, ny = p.y + dirs[i].y;
          if (_origIsPassableAnimals.call(Overworld, nx, ny) && !AnimalManager.getAt(nx, ny)) {
            animal.x = nx; animal.y = ny; break;
          }
        }
        GameUtils.addLog('Dismounted ' + (animal.petName || animal.name) + '.', '#aaa');
        this.endOverworldTurn();
        return true;
      } else {
        // Toggle follow
        animal.following = !animal.following;
        GameUtils.addLog((animal.petName || animal.name) + (animal.following ? ' is following you.' : ' stays put.'), '#aaccaa');
        this.endOverworldTurn();
        return true;
      }
    } else if (animal.tameable) {
      // Try to tame with food
      var foodId = ANIMAL_TYPES[animal.type].food;
      if (foodId && Bag.has(p.bag, foodId)) {
        Bag.remove(p.bag, foodId, 1);
        if (Math.random() < 0.5) {
          animal.tamed = true;
          animal.following = true;
          animal.hostile = false;
          animal.petName = animal.name;
          SFX.shrine();
          GameUtils.addLog(animal.name + ' has been tamed!', '#ffcc44');
        } else {
          GameUtils.addLog(animal.name + ' ate the food but wasn\'t impressed.', '#cc8844');
        }
        this.endOverworldTurn();
        return true;
      } else {
        var resDef = foodId ? ResourceRegistry.get(foodId) : null;
        var foodName = resDef ? resDef.name : (foodId || 'food');
        GameUtils.addLog('Need ' + foodName + ' to tame ' + animal.name + '.', '#cc8844');
        return true;
      }
    } else if (animal.hostile) {
      // Attack hostile animal
      var dmg = p.atk + (p.weapon ? p.weapon.atk || 0 : 0);
      animal.hp -= dmg;
      GameUtils.addFloating(tx, ty, '-' + dmg, '#ffcc44');
      SFX.hit();
      if (animal.hp <= 0) {
        animal.alive = false;
        GameUtils.addLog('Defeated ' + animal.name + '!', '#ddaa44');
        // Drop loot
        if (animal.type === 'wolf' || animal.type === 'boar' || animal.type === 'bear') {
          Bag.add(p.bag, 'leather', 1 + Math.floor(Math.random() * 2));
          GameUtils.addLog('+Leather', '#aa8866');
        }
      }
      this.endOverworldTurn();
      return true;
    }
  }
  return _origResolveInteraction.call(this, tx, ty);
};
