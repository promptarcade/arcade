<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="data:,">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Starlight Rescue</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: linear-gradient(180deg, #0a0a2e 0%, #1a1040 50%, #0d0d28 100%);
  color: #e8e0d0;
  font-family: Georgia, 'Times New Roman', serif;
  display: flex;
  flex-direction: column;
}

/* Twinkling stars background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(1px 1px at 10% 20%, rgba(255,255,200,0.4), transparent),
              radial-gradient(1px 1px at 30% 10%, rgba(255,255,200,0.3), transparent),
              radial-gradient(1px 1px at 50% 30%, rgba(255,255,200,0.2), transparent),
              radial-gradient(1px 1px at 70% 15%, rgba(255,255,200,0.4), transparent),
              radial-gradient(1px 1px at 90% 25%, rgba(255,255,200,0.3), transparent),
              radial-gradient(1px 1px at 15% 45%, rgba(255,255,200,0.2), transparent),
              radial-gradient(1px 1px at 85% 50%, rgba(255,255,200,0.3), transparent),
              radial-gradient(1px 1px at 40% 60%, rgba(255,255,200,0.2), transparent);
  pointer-events: none;
  z-index: 0;
  animation: twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle { 0% { opacity: 0.5; } 100% { opacity: 1; } }

/* Star bar */
#star-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 12px;
  z-index: 1;
  flex-shrink: 0;
}
.star {
  font-size: 24px;
  transition: all 0.5s;
  filter: grayscale(1) brightness(0.3);
}
.star.found {
  filter: none;
  animation: starPop 0.5s ease;
  text-shadow: 0 0 10px #ffcc44;
}
@keyframes starPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.8); }
  100% { transform: scale(1); }
}

/* Story area */
#story {
  flex: 1;
  overflow-y: auto;
  padding: 8px 20px 12px;
  z-index: 1;
  scroll-behavior: smooth;
}
.msg {
  margin-bottom: 14px;
  line-height: 1.6;
  font-size: 17px;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
.msg.room-title { color: #ccaaff; font-weight: bold; font-size: 19px; }
.msg.action { color: #aabbcc; font-style: italic; }
.msg.funny { color: #ffcc88; }
.msg.celebrate { color: #ffdd66; font-weight: bold; text-shadow: 0 0 8px rgba(255,200,50,0.4); }
.msg.animal { color: #aaddaa; }
.msg.hint { color: #99aacc; }

/* Status bar */
#status {
  display: flex;
  gap: 12px;
  padding: 8px 16px;
  background: rgba(20,15,40,0.8);
  border-top: 1px solid rgba(100,80,140,0.3);
  font-size: 13px;
  color: #998caa;
  flex-wrap: wrap;
  z-index: 1;
  flex-shrink: 0;
}
#status span { white-space: nowrap; }
.inv-label { color: #bbaadd; }
.animal-label { color: #aaddaa; }

/* Button area */
#buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  padding: 12px 16px 20px;
  min-height: 70px;
  background: rgba(10,10,30,0.9);
  border-top: 1px solid rgba(100,80,140,0.3);
  z-index: 1;
  flex-shrink: 0;
}
.btn {
  padding: 10px 18px;
  border: 1px solid rgba(140,120,180,0.4);
  border-radius: 20px;
  background: rgba(40,30,70,0.8);
  color: #ddccee;
  font-family: Georgia, serif;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s;
  animation: btnIn 0.25s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
@keyframes btnIn {
  0% { opacity: 0; transform: scale(0.8) translateY(10px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.btn:hover, .btn:active {
  background: rgba(80,60,130,0.8);
  border-color: rgba(180,150,220,0.6);
  transform: scale(1.05);
}
.btn.silly {
  font-style: italic;
  border-color: rgba(180,160,100,0.3);
  color: #ccbb99;
}
.btn.silly:hover { border-color: rgba(220,200,120,0.5); }

/* Flash effect for star restoration */
.flash {
  position: fixed; inset: 0;
  background: radial-gradient(circle, rgba(255,220,100,0.4), transparent 70%);
  pointer-events: none;
  z-index: 10;
  animation: flashAnim 1s ease forwards;
}
@keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

/* Mute */
#mute {
  position: fixed; top: 8px; right: 8px;
  background: rgba(0,0,0,0.3); border: none;
  color: #889; font-size: 18px; padding: 6px 10px;
  border-radius: 6px; cursor: pointer; z-index: 5;
}
</style>
</head>

var SFX = (function() {
  var actx = null, muted = false;
  function getCtx() {
    if (!actx) try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
    if (actx.state === 'suspended') actx.resume(); return actx;
  }
  function play(fn) { if (muted) return; var c = getCtx(); if (c) fn(c); }
  function osc(c,t,f,f2,d,v) {
    var o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.setValueAtTime(f,c.currentTime);
    if(f2)o.frequency.linearRampToValueAtTime(f2,c.currentTime+d);
    g.gain.setValueAtTime(v||0.06,c.currentTime);g.gain.linearRampToValueAtTime(0,c.currentTime+d);
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);
  }
  return {
    get muted(){return muted;}, set muted(v){muted=v;},
    click()  { play(function(c){osc(c,'sine',600,800,0.06,0.04);}); },
    action() { play(function(c){osc(c,'sine',400,600,0.1,0.04);}); },
    funny()  { play(function(c){osc(c,'triangle',300,200,0.15,0.04);osc(c,'triangle',250,350,0.1,0.03);}); },
    rescue() { play(function(c){for(var i=0;i<3;i++)setTimeout(function(i){return function(){osc(c,'sine',500+i*150,600+i*150,0.12,0.05);};}(i),i*100);}); },
    star()   { play(function(c){for(var i=0;i<4;i++)setTimeout(function(i){return function(){osc(c,'sine',600+i*200,700+i*200,0.15,0.06);};}(i),i*120);}); },
    step()   { play(function(c){osc(c,'sine',200,250,0.05,0.02);}); },
  };
})();

// ============================================================

  cottage: {

    desc: function() { return "Your cosy little cottage glows with warm candlelight. A patchwork quilt covers your bed, and star charts paper every wall. Your starkeeper's lantern sits on the table by the door, its light flickering gently."; },
    exits: { south: 'meadow' },

    onUse: { lantern: function(target) { if (target === 'bush' && G.animals.indexOf('bunny') < 0) { G.animals.push('bunny'); G.following.push('bunny'); SFX.rescue(); return { cls: 'animal', text: "You hold the lantern close to the bush. Warm golden light spills over the trembling leaves. A tiny nose pokes out\u2026 then two big dark eyes\u2026 then a small brown bunny hops cautiously into the light. She sniffs your hand, decides you're safe, and nestles against your ankle.\n\nThe bunny is following you now!" }; } return null; } },

// ============================================================
// UI FUNCTIONS
// ============================================================
var storyEl = document.getElementById('story');
var buttonsEl = document.getElementById('buttons');
var statusEl = document.getElementById('status');
var starBarEl = document.getElementById('star-bar');

function addMessage(text, cls) {
  var div = document.createElement('div');
  div.className = 'msg' + (cls ? ' ' + cls : '');
  div.textContent = text;
  storyEl.appendChild(div);
  storyEl.scrollTop = storyEl.scrollHeight;
}

function clearButtons() { buttonsEl.innerHTML = ''; }

function addButton(text, callback, silly) {
  var btn = document.createElement('button');
  btn.className = 'btn' + (silly ? ' silly' : '');
  btn.textContent = text;
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    callback();
  });
  buttonsEl.appendChild(btn);
}

function updateStatus() {
  var parts = [];
  if (G.inventory.length > 0) parts.push('<span class="inv-label">Carrying:</span> ' + G.inventory.join(', '));
  if (G.animals.length > 0) parts.push('<span class="animal-label">Friends:</span> ' + G.animals.join(', '));
  statusEl.innerHTML = parts.join(' &nbsp;|&nbsp; ');
}

function updateStarBar() {
  var html = '';
  for (var i = 0; i < 8; i++) {
    html += '<span class="star' + (i < G.stars ? ' found' : '') + '">\u2605</span>';
  }
  starBarEl.innerHTML = html;
}

function flash() {
  var div = document.createElement('div');
  div.className = 'flash';
  document.body.appendChild(div);
  setTimeout(function() { div.remove(); }, 1100);
}

// ============================================================
// GAME ENGINE
// ============================================================
function getRoom() { return ROOMS[G.room]; }

function getExits() {
  var room = getRoom();
  return typeof room.exits === 'function' ? room.exits() : room.exits;
}

function getRoomItems() {
  var room = getRoom();
  var items = room.items ? room.items() : [];
  if (room.extraItems) items = items.concat(room.extraItems());
  return items;
}

function enterRoom(roomId) {
  G.room = roomId;
  var room = getRoom();
  SFX.step();
  addMessage(room.title, 'room-title');
  addMessage(room.desc(), '');
  updateStatus();
  updateStarBar();
  save();
  // Sky Garden = game complete
  if (roomId === 'skyGarden') {
    flash();
    var score = G.stars * 100 + G.animals.length * 50;
    clearButtons();
    addButton('Submit Score (' + score + ')', function() {
      submitScore('starlight-rescue', score);
      showMainMenu();
    });
    addButton('Just enjoy the view', function() { showMainMenu(); });
    return;
  }
  showMainMenu();
}

function showMainMenu() {
  clearButtons();
  var room = getRoom();
  var exits = getExits();

  addButton('Look around', function() { showLookMenu(); });

  var exitKeys = Object.keys(exits);
  if (exitKeys.length > 0) {
    addButton('Go', function() { showGoMenu(exits); });
  }

  var roomItems = getRoomItems();
  if (roomItems.length > 0) {
    addButton('Take', function() { showTakeMenu(roomItems); });
  }

  if (G.inventory.length > 0 || G.following.length > 0) {
    addButton('Use', function() { showUseMenu(); });
  }

  // Talk — if there are animals to talk to
  var talkTargets = getTalkTargets();
  if (talkTargets.length > 0) {
    addButton('Talk', function() { showTalkMenu(talkTargets); });
  }

  // Echo chamber special — "Say" button
  if (G.room === 'echoChamber' && !G.flags.echoSolved) {
    addButton('Say something', function() { showSayMenu(); });
  }

  // Stars button
  addButton('Stars (' + G.stars + '/8)', function() {
    addMessage("You've found " + G.stars + " of 8 star fragments. " + (G.stars < 8 ? "Keep exploring!" : "You have them all! Find the Star Pool!"), 'hint');
    showMainMenu();
  });

  // 1-2 silly options
  var sillies = shuffle(SILLY_ACTIONS.slice()).slice(0, 1 + Math.floor(Math.random() * 2));
  sillies.forEach(function(s) {
    addButton(s.text, function() {
      SFX.funny();
      addMessage(s.response, 'funny');
      showMainMenu();
    }, true);
  });
}

function showLookMenu() {
  clearButtons();
  var room = getRoom();
  var targets = [];

  // Add room-specific look targets
  if (room.onLook) {
    Object.keys(room.onLook).forEach(function(key) {
      targets.push(key);
    });
  }
  if (room.onLook2) {
    Object.keys(room.onLook2).forEach(function(key) {
      if (targets.indexOf(key) < 0) targets.push(key);
    });
  }

  targets.forEach(function(target) {
    addButton(target, function() {
      var result = null;
      if (room.onLook && room.onLook[target]) {
        result = typeof room.onLook[target] === 'function' ? room.onLook[target]() : room.onLook[target];
      }
      if (!result && room.onLook2 && room.onLook2[target]) {
        result = typeof room.onLook2[target] === 'function' ? room.onLook2[target]() : room.onLook2[target];
      }
      if (result) {
        SFX.action();
        addMessage(typeof result === 'string' ? result : result.text, typeof result === 'object' ? result.cls : '');
      }
      showMainMenu();
    });
  });

  addButton('Everything', function() {
    SFX.action();
    addMessage(room.desc(), '');
    showMainMenu();
  });

  // Silly look options
  addButton('Your own reflection', function() {
    SFX.funny();
    addMessage("You try to see your reflection. " + (G.room === 'pond' || G.room === 'starPool' ? "The water shows a brave young starkeeper staring back. Not bad." : "There's nothing reflective here. You imagine yourself looking heroic. That counts."), 'funny');
    showMainMenu();
  }, true);
}

function showGoMenu(exits) {
  clearButtons();
  var dirNames = { north: 'North', south: 'South', east: 'East', west: 'West' };
  Object.keys(exits).forEach(function(dir) {
    addButton(dirNames[dir] || dir, function() {
      enterRoom(exits[dir]);
    });
  });

  // Silly go options
  var sillies = shuffle(SILLY_GO.slice()).slice(0, 1 + Math.floor(Math.random()));
  sillies.forEach(function(s) {
    addButton(s.text, function() {
      SFX.funny();
      addMessage(s.response, 'funny');
      showMainMenu();
    }, true);
  });

  addButton('Stay here', function() { showMainMenu(); });
}

function showTakeMenu(items) {
  clearButtons();
  items.forEach(function(item) {
    addButton(item, function() {
      var room = getRoom();
      if (room.onTake && room.onTake[item]) {
        var result = room.onTake[item]();
        if (result) {
          if (item === 'star fragment') { flash(); }
          addMessage(result.text, result.cls);
        }
      } else {
        G.inventory.push(item);
        SFX.action();
        addMessage("You pick up the " + item + ".", 'action');
      }
      updateStatus();
      updateStarBar();
      save();
      showMainMenu();
    });
  });

  addButton('A handful of air', function() {
    SFX.funny();
    addMessage("You grab a handful of air. You now have air. You had air before too, but now you have it ON PURPOSE.", 'funny');
    showMainMenu();
  }, true);
}

function showUseMenu() {
  clearButtons();

  // Inventory items
  G.inventory.forEach(function(item) {
    addButton(item, function() { showUseTargetMenu(item); });
  });

  // Following animals as usable
  G.following.forEach(function(animal) {
    addButton(animal, function() { tryUseAnimal(animal); });
  });

  // Silly use
  var sillies = shuffle(SILLY_USE.slice()).slice(0, 1);
  sillies.forEach(function(s) {
    addButton(s.text, function() {
      SFX.funny();
      addMessage(s.response, 'funny');
      showMainMenu();
    }, true);
  });

  addButton('Never mind', function() { showMainMenu(); });
}

function showUseTargetMenu(item) {
  clearButtons();
  var room = getRoom();

  // Room-specific targets
  if (room.onLook) {
    Object.keys(room.onLook).forEach(function(target) {
      addButton('on ' + target, function() {
        var result = null;
        if (room.onUse && room.onUse[item]) {
          result = room.onUse[item](target);
        }
        if (result) {
          if (typeof result === 'object' && result.cls === 'celebrate') flash();
          addMessage(result.text, typeof result === 'object' ? result.cls : '');
          updateStatus();
          updateStarBar();
          save();
        } else {
          addMessage("You try to use the " + item + " on the " + target + ". Nothing interesting happens.", 'action');
        }
        showMainMenu();
      });
    });
  }

  // Generic use (no target)
  addButton('just use it', function() {
    var result = null;
    if (room.onUse && room.onUse[item]) {
      result = room.onUse[item]();
    }
    if (result) {
      if (typeof result === 'object' && result.cls === 'celebrate') flash();
      addMessage(result.text, typeof result === 'object' ? result.cls : '');
      updateStatus(); updateStarBar(); save();
    } else {
      addMessage("You wave the " + item + " around purposefully. Nothing happens, but you looked very determined.", 'funny');
    }
    showMainMenu();
  });

  addButton('On your nose', function() {
    SFX.funny();
    addMessage("You balance the " + item + " on your nose. It falls off. You are not a trained seal.", 'funny');
    showMainMenu();
  }, true);
}

function tryUseAnimal(animal) {
  var room = getRoom();
  var result = null;
  if (room.onUse && room.onUse[animal]) {
    result = room.onUse[animal]();
  }
  if (result) {
    if (typeof result === 'object' && result.cls === 'celebrate') flash();
    addMessage(result.text, typeof result === 'object' ? result.cls : '');
    updateStatus(); updateStarBar(); save();
  } else {
    var responses = {
      bunny: "The bunny wiggles its nose at you. Cute, but not helpful right now.",
      frog: "The frog croaks. \"What? I'm on break.\"",
      owl: "The owl blinks slowly. \"Not everything requires my intervention, you know.\"",
      hedgehog: "The hedgehog grunts from inside its blanket. \"Not now. Cosy.\"",
      kitten: "The kitten purrs and bats at your ear. Adorable, but unhelpful.",
    };
    addMessage(responses[animal] || "Your " + animal + " looks at you blankly.", 'funny');
  }
  showMainMenu();
}

function getTalkTargets() {
  var targets = [];
  var room = getRoom();
  // Animals in the room (based on room descriptions mentioning them)
  if (room.onLook) {
    ['bunny','frog','owl','hedgehog','kitten','fish'].forEach(function(a) {
      if (room.onLook[a]) targets.push(a);
    });
  }
  // Following animals
  G.following.forEach(function(a) {
    if (targets.indexOf(a) < 0) targets.push(a);
  });
  return targets;
}

function showTalkMenu(targets) {
  clearButtons();
  targets.forEach(function(target) {
    addButton(target, function() {
      SFX.action();
      addMessage(getAnimalDialogue(target), 'animal');
      showMainMenu();
    });
  });

  addButton('Yourself', function() {
    SFX.funny();
    addMessage("\"Come on, Luna, you've got this,\" you tell yourself. It's surprisingly motivating. Self-pep-talks: underrated.", 'funny');
    showMainMenu();
  }, true);
}

function getAnimalDialogue(animal) {
  switch(animal) {
    case 'bunny':
      if (G.animals.indexOf('bunny') < 0) return "The bush trembles. A tiny voice squeaks: \"Is\u2026 is the dark going to eat me?\" Poor thing. Maybe some light would help.";
      if (G.room === 'cloudTerrace' && G.animals.indexOf('kitten') < 0) return "The bunny looks at the kitten on the ledge and wiggles her nose thoughtfully. She could probably coax it up\u2026";
      return "The bunny nuzzles your ankle. She doesn't say much, but her nose wiggling speaks volumes.";
    case 'frog':
      if (G.animals.indexOf('frog') < 0) return "\"Oi!\" the frog croaks from its lily pad. \"Don't just stand there! I've been stuck here for ages. Get me a stick or a pole or\u2026 I dunno, a very long sandwich. Just GET ME OFF THIS PAD.\"";
      if (G.room === 'gate' && !G.flags.gateOpen) return "The frog eyes the gate. \"I've seen this from the pond. The flowers go purple, gold, silver. Left to right. You're welcome. I accept payment in flies.\"";
      if (G.room === 'crystalHall' && !G.flags.crystalFragment) return "The frog eyes the crystal. \"I could spit-blast that open. Just say the word. I've been practicing.\"";
      return "\"Did I mention I saved everyone with my incredible spitting skills?\" the frog says. For the fourteenth time.";
    case 'owl':
      if (G.animals.indexOf('owl') < 0) return "The owl stares at you with unblinking golden eyes. It clicks its beak once. It's not going to talk until you've earned its trust. Something shiny might help.";
      if (G.room === 'echoChamber' && !G.flags.echoSolved) return "The owl leans in and whispers: \"The word is 'starlight'. Don't tell the frog I helped. It'll never let me hear the end of it.\"";
      if (G.room === 'summit' && !G.flags.summitFragment) return "The owl looks up at the star fragment on the peak. \"I could get that for you,\" it says casually. \"Just ask.\"";
      return "The owl hoots wisely. Or at least it SOUNDS wise. It might just be thinking about mice.";
    case 'hedgehog':
      if (G.animals.indexOf('hedgehog') < 0) return "The hedgehog shivers. \"C-c-cold,\" it chatters. \"N-not that hedgehogs GET cold. We d-don't. This is\u2026 a choice. A lifestyle ch-choice.\" It's clearly freezing.";
      if (G.room === 'mountainPath') return "\"I know a shortcut up the mountain,\" the hedgehog says, pointing with one tiny paw. \"Discovered it myself. Very brave. Don't ask about the part where I rolled down accidentally.\"";
      return "The hedgehog adjusts its blanket and grunts: \"We're not lost, are we? Because I refuse to be lost. I have a reputation.\"";
    case 'kitten':
      if (G.animals.indexOf('kitten') < 0) return "\"Mew! Mew mew mew!\" Translation: \"I'm stuck and this is undignified and I demand assistance immediately!\"";
      return "The kitten purrs and headbutts your chin. \"Mew,\" it says. Translation: \"You're mine now. I have claimed you. This is non-negotiable.\"";
    case 'fish':
      if (G.animals.indexOf('fish') < 0) return "The fish swims in frantic circles in its shrinking pool. It blows a stream of desperate bubbles at you. Fish can't talk, but its eyes say \"HELP.\"";
      return "The fish leaps out of the water and does a flip. It can't talk, but the flip clearly means \"thanks.\"";
    default: return "It looks at you.";
  }
}

function showSayMenu() {
  clearButtons();
  var words = shuffle(['starlight', 'moonbeam', 'darkness', 'crystal', 'help', 'please', 'abracadabra']);
  words.forEach(function(word) {
    addButton('"' + word + '!"', function() {
      var room = getRoom();
      var result = room.onUse.say(word);
      if (result) {
        if (result.cls === 'celebrate') flash();
        addMessage(result.text, result.cls);
        save();
      }
      showMainMenu();
    });
  });
  addButton('"SAUSAGES!"', function() {
    SFX.funny();
    addMessage("\"SAUSAGES!\" you yell. \"Sausages\u2026 sausages\u2026 sausages\u2026\" the echo repeats. The wall does nothing. But somewhere, a hedgehog perks up.", 'funny');
    showMainMenu();
  }, true);
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

// ============================================================
// SAVE / LOAD
// ============================================================
function save() {
  try { localStorage.setItem('starlight_save', JSON.stringify(G)); } catch(e) {}
}

function load() {
  try {
    var s = localStorage.getItem('starlight_save');
    if (s) { G = JSON.parse(s); return true; }
  } catch(e) {}
  return false;
}

// ============================================================
// START
// ============================================================
function startGame(fresh) {
  storyEl.innerHTML = '';
  if (!fresh && load()) {
    addMessage("Welcome back, Luna. The stars still need you.", 'celebrate');
    enterRoom(G.room);
  } else {
    G = { room: 'cottage', inventory: [], stars: 0, animals: [], following: [], flags: {} };
    addMessage("The stars have gone out.", 'room-title');
    addMessage("One by one, they flickered and faded. The sky is dark. The woodland creatures are scared. The meadow is cold without starlight.", '');
    addMessage("But you are Luna, apprentice starkeeper. And you have a lantern, a pair of sturdy boots, and absolutely no intention of letting the dark win.", '');
    addMessage("Find the eight lost star fragments. Rescue the animals lost in the darkness. Bring back the light.", 'celebrate');
    enterRoom('cottage');
  }
}

// Show title screen
addMessage("~ STARLIGHT RESCUE ~", 'celebrate');
addMessage("A text adventure about stars, bravery, and being kind to hedgehogs.", '');
clearButtons();
addButton('New Adventure', function() { startGame(true); });
if (localStorage.getItem('starlight_save')) {
  addButton('Continue', function() { startGame(false); });
}
updateStarBar();

</script>
