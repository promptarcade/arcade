<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="data:,">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flowerpot Hangman</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2a1a; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
'use strict';

// ============================================================
// WORDS — categorised for hints
// ============================================================
const WORD_LISTS = {
  animals: ['elephant','giraffe','penguin','dolphin','butterfly','crocodile','kangaroo','octopus','chameleon','flamingo','hedgehog','squirrel','tortoise','parrot','lobster','jellyfish','scorpion','antelope','armadillo','platypus'],
  food: ['broccoli','chocolate','spaghetti','pineapple','mushroom','avocado','cinnamon','pancakes','sandwich','tomatoes','blueberry','cucumber','doughnut','noodles','popcorn','biscuit','coconut','lettuce','pretzel','burrito'],
  places: ['mountain','volcano','library','hospital','airport','stadium','pyramid','waterfall','castle','village','island','canyon','bridge','harbour','museum','jungle','glacier','forest','temple','theatre'],
  nature: ['sunshine','rainbow','thunder','blossom','crystal','feather','meadow','pebble','sunrise','tornado','glacier','monsoon','eclipse','tsunami','harvest','orchard','boulder','canyon','horizon','tropics'],
  things: ['umbrella','keyboard','telescope','backpack','lantern','compass','blanket','treasure','diamond','hammock','candle','journal','perfume','whistle','balloon','curtain','picture','chimney','stairway','toolbox'],
};
const CATEGORIES = Object.keys(WORD_LISTS);

function pickWord() {
  const cat = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  const words = WORD_LISTS[cat];
  return { word: words[Math.floor(Math.random() * words.length)].toUpperCase(), category: cat };
}

// ============================================================
// SOUND
// ============================================================
const SFX = {
  _ctx: null,
  _get() { if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this._ctx.state === 'suspended') this._ctx.resume(); return this._ctx; },
  _tone(f, type, dur, vol) { try { const c = this._get(), o = c.createOscillator(), g = c.createGain(); o.type = type; o.frequency.value = f; g.gain.setValueAtTime(vol, c.currentTime); g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + dur); } catch(e) {} },
  correct() { this._tone(600, 'sine', 0.08, 0.12); this._tone(800, 'sine', 0.06, 0.1); },
  wrong() { this._tone(200, 'triangle', 0.15, 0.12); this._tone(150, 'triangle', 0.2, 0.08); },
  crack() { this._tone(80, 'square', 0.06, 0.15); this._tone(60, 'square', 0.08, 0.1); },
  win() { this._tone(523, 'sine', 0.12, 0.1); setTimeout(() => this._tone(659, 'sine', 0.12, 0.08), 100); setTimeout(() => this._tone(784, 'sine', 0.2, 0.08), 200); },
  lose() { this._tone(300, 'sine', 0.2, 0.1); setTimeout(() => this._tone(200, 'sine', 0.3, 0.08), 150); setTimeout(() => this._tone(100, 'sine', 0.5, 0.06), 300); },
};

// ============================================================
// SCORE SUBMISSION
// ============================================================
const _SU = 'https://ivhpqkqnfqcgrfrsvszf.supabase.co';
const _SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2aHBxa3FuZnFjZ3JmcnN2c3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTg1NjYsImV4cCI6MjA4OTM5NDU2Nn0.x3X_0dbhw3Qz7sgQAgpSoSu382ckB2uYxCJGe7_vDCM';
async function submitScore(score) {
  const n = prompt('Streak: ' + score + '! Enter your name (max 5 chars):');
  if (!n) return; const name = n.trim().slice(0, 5).toUpperCase(); if (!name) return;
  let hash = '';
  try { const d = navigator.userAgent + screen.width + screen.height + new Date().getTimezoneOffset(); const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(d)); hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,32); } catch(e) {}
  try { await fetch(_SU + '/rest/v1/high_scores', { method: 'POST', headers: { 'apikey': _SK, 'Authorization': 'Bearer ' + _SK, 'Content-Type': 'application/json' }, body: JSON.stringify({ game: 'flowerpot-hangman', initials: name, score: score, player_hash: hash }) }); } catch(e) {}
}

// ============================================================
// CANVAS
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ============================================================
// GAME STATE
// ============================================================
const MAX_WRONG = 7;
let state = 'title'; // title, playing, won, lost
let currentWord = '';
let category = '';
let guessed = new Set();
let wrongCount = 0;
let streak = 0;
let bestStreak = parseInt(localStorage.getItem('flowerpot-hs') || '0');
let animTimer = 0;
let shakeTimer = 0;
let particles = [];
// Letter button rects stored during draw
let letterBtns = []; // [{x,y,w,h,letter}]
let actionBtn = null; // {x,y,w,h}

function newRound() {
  const pick = pickWord();
  currentWord = pick.word;
  category = pick.category;
  guessed = new Set();
  wrongCount = 0;
  state = 'playing';
  particles = [];
  shakeTimer = 0;
}

function guessLetter(letter) {
  if (state !== 'playing' || guessed.has(letter)) return;
  guessed.add(letter);
  if (currentWord.includes(letter)) {
    SFX.correct();
    // Check win
    if (currentWord.split('').every(c => guessed.has(c))) {
      state = 'won';
      streak++;
      if (streak > bestStreak) { bestStreak = streak; localStorage.setItem('flowerpot-hs', bestStreak); }
      SFX.win();
      // Bloom particles
      for (let i = 0; i < 20; i++) {
        particles.push({ x: W/2, y: H*0.32, vx: (Math.random()-0.5)*120, vy: -40-Math.random()*80, life: 1+Math.random(), maxLife: 2, size: 4+Math.random()*4, color: ['#ff6688','#ffaa44','#44dd88','#ff44aa','#ffdd44'][Math.floor(Math.random()*5)], type: 'petal' });
      }
    }
  } else {
    wrongCount++;
    SFX.wrong();
    SFX.crack();
    shakeTimer = 0.3;
    // Crack particles
    for (let i = 0; i < 5; i++) {
      particles.push({ x: W/2 + (Math.random()-0.5)*40, y: H*0.42, vx: (Math.random()-0.5)*30, vy: 10+Math.random()*20, life: 0.6+Math.random()*0.4, maxLife: 1, size: 2+Math.random()*2, color: '#a0785a', type: 'soil' });
    }
    if (wrongCount >= MAX_WRONG) {
      state = 'lost';
      if (streak > 0) submitScore(streak);
      streak = 0;
      SFX.lose();
      // Shatter particles
      for (let i = 0; i < 30; i++) {
        particles.push({ x: W/2 + (Math.random()-0.5)*60, y: H*0.4, vx: (Math.random()-0.5)*100, vy: -20+Math.random()*60, life: 1+Math.random(), maxLife: 2, size: 3+Math.random()*5, color: Math.random() < 0.5 ? '#c4703a' : '#8a5a30', type: 'shard' });
      }
    }
  }
}

// ============================================================
// DRAWING
// ============================================================
function drawFlowerpot(cx, cy, scale, damage) {
  // damage: 0-7 (0 = perfect, 7 = destroyed)
  const s = scale;
  const d = damage / MAX_WRONG; // 0-1
  const shake = shakeTimer > 0 ? Math.sin(shakeTimer * 40) * 3 * shakeTimer : 0;
  ctx.save();
  ctx.translate(cx + shake, cy);

  // Windowsill
  ctx.fillStyle = '#8a7a6a';
  ctx.fillRect(-70*s, 50*s, 140*s, 12*s);
  ctx.fillStyle = '#9a8a7a';
  ctx.fillRect(-65*s, 50*s, 130*s, 4*s);

  // Pot saucer
  ctx.fillStyle = '#a0785a';
  ctx.beginPath();
  ctx.ellipse(0, 50*s, 42*s, 8*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Pot body
  if (damage < MAX_WRONG) {
    ctx.fillStyle = '#c4703a';
    ctx.beginPath();
    ctx.moveTo(-32*s, 0);
    ctx.lineTo(-38*s, 48*s);
    ctx.lineTo(38*s, 48*s);
    ctx.lineTo(32*s, 0);
    ctx.closePath();
    ctx.fill();

    // Pot rim
    ctx.fillStyle = '#d4804a';
    ctx.beginPath();
    ctx.moveTo(-35*s, -2*s);
    ctx.lineTo(-32*s, 6*s);
    ctx.lineTo(32*s, 6*s);
    ctx.lineTo(35*s, -2*s);
    ctx.closePath();
    ctx.fill();

    // Pot highlight
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(-20*s, 8*s, 12*s, 30*s);

    // Cracks based on damage
    ctx.strokeStyle = '#8a5020';
    ctx.lineWidth = 2 * s;
    if (damage >= 1) { ctx.beginPath(); ctx.moveTo(-10*s, 8*s); ctx.lineTo(-18*s, 28*s); ctx.lineTo(-12*s, 40*s); ctx.stroke(); }
    if (damage >= 2) { ctx.beginPath(); ctx.moveTo(8*s, 10*s); ctx.lineTo(15*s, 22*s); ctx.stroke(); }
    if (damage >= 3) { ctx.beginPath(); ctx.moveTo(5*s, 25*s); ctx.lineTo(20*s, 42*s); ctx.stroke(); }
    if (damage >= 4) { ctx.beginPath(); ctx.moveTo(-25*s, 15*s); ctx.lineTo(-15*s, 20*s); ctx.stroke(); }
    if (damage >= 5) {
      // Chunk missing from rim
      ctx.fillStyle = '#1a2a1a';
      ctx.beginPath(); ctx.arc(20*s, 2*s, 8*s, 0, Math.PI*2); ctx.fill();
    }
    if (damage >= 6) {
      // Soil spilling from crack
      ctx.fillStyle = '#5a4030';
      ctx.beginPath();
      ctx.moveTo(15*s, 30*s); ctx.lineTo(25*s, 45*s); ctx.lineTo(40*s, 50*s);
      ctx.lineTo(30*s, 48*s); ctx.lineTo(20*s, 35*s);
      ctx.closePath(); ctx.fill();
    }

    // Soil surface
    ctx.fillStyle = '#5a4030';
    ctx.beginPath();
    ctx.ellipse(0, 2*s, 28*s, 6*s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#6a5040';
    ctx.beginPath();
    ctx.ellipse(0, 1*s, 24*s, 4*s, 0, 0, Math.PI*2);
    ctx.fill();

    // Plant stem
    const stemH = (1 - d * 0.6) * 60;
    const stemCurve = d * 20; // wilts sideways as damage increases
    ctx.strokeStyle = '#2a7a2a';
    ctx.lineWidth = 3 * s;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(stemCurve*s, -stemH*0.5*s, stemCurve*1.5*s, -stemH*s);
    ctx.stroke();

    // Leaves — droop more with damage
    const leafCount = Math.max(1, 5 - Math.floor(damage * 0.6));
    for (let i = 0; i < leafCount; i++) {
      const ly = -stemH * (0.3 + i * 0.15) * s;
      const lx = stemCurve * (0.3 + i * 0.15) * s;
      const droop = d * 0.8;
      const side = i % 2 === 0 ? -1 : 1;
      ctx.fillStyle = damage >= 5 ? '#6a7a30' : '#2a8a2a';
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(side * (0.5 + droop));
      ctx.beginPath();
      ctx.ellipse(side * 12*s, 4*s * droop, 12*s, 5*s, side * 0.3, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // Flower on top (shrinks/browns with damage)
    const flowerY = -stemH * s;
    const flowerX = stemCurve * 1.5 * s;
    const flowerSize = (1 - d * 0.7) * 14;
    if (flowerSize > 3) {
      const flowerColor = d < 0.4 ? '#ff6688' : d < 0.7 ? '#cc8866' : '#8a7a60';
      const centerColor = d < 0.4 ? '#ffdd44' : '#aa8844';
      // Petals
      for (let p = 0; p < 6; p++) {
        const angle = (p / 6) * Math.PI * 2 + animTimer * 0.2;
        ctx.fillStyle = flowerColor;
        ctx.beginPath();
        ctx.ellipse(
          flowerX + Math.cos(angle) * flowerSize * 0.6 * s,
          flowerY + Math.sin(angle) * flowerSize * 0.6 * s,
          flowerSize * 0.5 * s, flowerSize * 0.35 * s,
          angle, 0, Math.PI * 2
        );
        ctx.fill();
      }
      // Center
      ctx.fillStyle = centerColor;
      ctx.beginPath();
      ctx.arc(flowerX, flowerY, flowerSize * 0.35 * s, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    // Fully destroyed — broken pot shards
    ctx.fillStyle = '#c4703a';
    ctx.save(); ctx.translate(-15*s, 30*s); ctx.rotate(-0.3);
    ctx.fillRect(0, 0, 20*s, 25*s); ctx.restore();
    ctx.save(); ctx.translate(8*s, 25*s); ctx.rotate(0.4);
    ctx.fillRect(0, 0, 22*s, 20*s); ctx.restore();
    ctx.save(); ctx.translate(-5*s, 35*s); ctx.rotate(0.1);
    ctx.fillRect(0, 0, 15*s, 12*s); ctx.restore();
    // Spilled soil
    ctx.fillStyle = '#5a4030';
    ctx.beginPath();
    ctx.ellipse(0, 45*s, 40*s, 8*s, 0, 0, Math.PI*2);
    ctx.fill();
    // Dead plant
    ctx.strokeStyle = '#5a6a30';
    ctx.lineWidth = 2*s;
    ctx.beginPath();
    ctx.moveTo(0, 40*s); ctx.quadraticCurveTo(20*s, 20*s, 30*s, 35*s);
    ctx.stroke();
  }

  ctx.restore();
}

function drawWord() {
  const wordY = H * 0.62;
  const letterW = Math.min(36, (W - 40) / currentWord.length);
  const totalW = currentWord.length * letterW;
  const startX = (W - totalW) / 2;
  const fontSize = Math.min(28, letterW * 0.8);

  ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let i = 0; i < currentWord.length; i++) {
    const x = startX + i * letterW + letterW / 2;
    const revealed = guessed.has(currentWord[i]);

    // Underscore
    ctx.fillStyle = '#556';
    ctx.fillRect(x - letterW * 0.35, wordY + fontSize * 0.5, letterW * 0.7, 3);

    // Letter
    if (revealed || state === 'lost') {
      ctx.fillStyle = revealed ? '#fff' : '#ff6644';
      ctx.fillText(currentWord[i], x, wordY);
    }
  }

  // Category hint
  ctx.font = `${Math.min(14, W * 0.02)}px Segoe UI`;
  ctx.fillStyle = '#668';
  ctx.textAlign = 'center';
  ctx.fillText('Category: ' + category.charAt(0).toUpperCase() + category.slice(1), W / 2, wordY + fontSize + 16);
}

function drawKeyboard() {
  letterBtns = [];
  const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
  const btnH = Math.min(44, H * 0.055);
  const gap = Math.min(5, W * 0.005);
  const startY = H * 0.73;

  for (let r = 0; r < rows.length; r++) {
    const row = rows[r];
    const btnW = Math.min(38, (W - gap * (row.length + 1)) / row.length);
    const totalRowW = row.length * (btnW + gap) - gap;
    const rowX = (W - totalRowW) / 2;
    const rowY = startY + r * (btnH + gap);

    for (let i = 0; i < row.length; i++) {
      const letter = row[i];
      const x = rowX + i * (btnW + gap);
      const used = guessed.has(letter);
      const correct = used && currentWord.includes(letter);
      const wrong = used && !currentWord.includes(letter);

      // Button background
      if (wrong) ctx.fillStyle = 'rgba(200,60,60,0.3)';
      else if (correct) ctx.fillStyle = 'rgba(60,180,60,0.3)';
      else ctx.fillStyle = 'rgba(255,255,255,0.08)';

      ctx.beginPath();
      ctx.roundRect(x, rowY, btnW, btnH, 6);
      ctx.fill();

      // Border
      if (wrong) ctx.strokeStyle = '#a33';
      else if (correct) ctx.strokeStyle = '#3a3';
      else ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, rowY, btnW, btnH, 6);
      ctx.stroke();

      // Letter
      ctx.fillStyle = used ? (correct ? '#6c6' : '#a66') : '#ccc';
      ctx.font = `bold ${Math.min(18, btnW * 0.5)}px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(letter, x + btnW / 2, rowY + btnH / 2);

      if (!used && state === 'playing') {
        letterBtns.push({ x, y: rowY, w: btnW, h: btnH, letter });
      }
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = a;
    if (p.type === 'petal') {
      ctx.fillStyle = p.color;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(animTimer * 3 + p.vx);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  ctx.font = `${Math.min(16, W * 0.022)}px Segoe UI`;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Streak: ' + streak, 12, 24);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#886';
  ctx.fillText('Best: ' + bestStreak, W - 12, 24);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#866';
  ctx.fillText('Wrong: ' + wrongCount + '/' + MAX_WRONG, W / 2, 24);
}

function drawTitle() {
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 0, W, H);

  // Draw a healthy pot as decoration
  drawFlowerpot(W / 2, H * 0.35, Math.min(1.2, W / 500), 0);

  ctx.font = `bold ${Math.min(42, W * 0.07)}px Segoe UI`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff8866';
  ctx.fillText('FLOWERPOT', W / 2, H * 0.08);
  ctx.fillStyle = '#88cc66';
  ctx.fillText('HANGMAN', W / 2, H * 0.08 + Math.min(44, W * 0.07));

  ctx.font = `${Math.min(16, W * 0.025)}px Segoe UI`;
  ctx.fillStyle = '#aaa';
  ctx.fillText('Guess the word before the pot breaks!', W / 2, H * 0.6);
  ctx.fillText('7 wrong guesses and it shatters.', W / 2, H * 0.65);

  const pulse = 0.6 + Math.sin(animTimer * 3) * 0.4;
  ctx.globalAlpha = pulse;
  ctx.font = `bold ${Math.min(24, W * 0.035)}px Segoe UI`;
  ctx.fillStyle = '#7f7';

  // Action button
  const btnW = Math.min(260, W * 0.5);
  const btnH = 50;
  const btnX = W / 2 - btnW / 2;
  const btnY = H * 0.75;
  actionBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  ctx.fillText('Tap to Start', W / 2, btnY + btnH / 2);
  ctx.globalAlpha = 1;
}

function drawEndScreen() {
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, H);

  const isWin = state === 'won';
  ctx.font = `bold ${Math.min(36, W * 0.06)}px Segoe UI`;
  ctx.textAlign = 'center';
  ctx.fillStyle = isWin ? '#88ff88' : '#ff6644';
  ctx.fillText(isWin ? 'SAVED!' : 'SMASHED!', W / 2, H * 0.15);

  if (!isWin) {
    ctx.font = `${Math.min(18, W * 0.03)}px Segoe UI`;
    ctx.fillStyle = '#ccc';
    ctx.fillText('The word was: ' + currentWord, W / 2, H * 0.22);
    if (streak > 0) {
      ctx.fillStyle = '#ff8';
      ctx.fillText('Final streak: ' + streak, W / 2, H * 0.27);
    }
  } else {
    ctx.font = `${Math.min(18, W * 0.03)}px Segoe UI`;
    ctx.fillStyle = '#aaa';
    ctx.fillText('Streak: ' + streak, W / 2, H * 0.22);
  }

  const pulse = 0.6 + Math.sin(animTimer * 3) * 0.4;
  ctx.globalAlpha = pulse;
  ctx.font = `bold ${Math.min(22, W * 0.032)}px Segoe UI`;
  ctx.fillStyle = '#7f7';
  const btnW = Math.min(260, W * 0.5);
  const btnH = 50;
  const btnX = W / 2 - btnW / 2;
  const btnY = H * 0.88;
  actionBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  ctx.fillText(isWin ? 'Next Word' : 'Try Again', W / 2, btnY + btnH / 2);
  ctx.globalAlpha = 1;
}

// ============================================================
// INPUT
// ============================================================
function handleTap(x, y) {
  SFX._get();
  if (state === 'title') { newRound(); return; }
  if (state === 'won' || state === 'lost') {
    if (actionBtn && x >= actionBtn.x && x <= actionBtn.x + actionBtn.w && y >= actionBtn.y && y <= actionBtn.y + actionBtn.h) {
      newRound();
    }
    return;
  }
  // Check letter buttons
  for (const btn of letterBtns) {
    if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
      guessLetter(btn.letter);
      return;
    }
  }
}

canvas.addEventListener('click', e => {
  handleTap(e.offsetX * W / canvas.clientWidth, e.offsetY * H / canvas.clientHeight);
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const r = canvas.getBoundingClientRect();
  handleTap((t.clientX - r.left) / r.width * W, (t.clientY - r.top) / r.height * H);
}, { passive: false });
canvas.addEventListener('touchstart', e => { e.preventDefault(); SFX._get(); }, { passive: false });

// Keyboard
window.addEventListener('keydown', e => {
  if (state === 'title') { newRound(); return; }
  if (state === 'won' || state === 'lost') {
    if (e.key === 'Enter' || e.key === ' ') newRound();
    return;
  }
  const k = e.key.toUpperCase();
  if (k.length === 1 && k >= 'A' && k <= 'Z') guessLetter(k);
});

// ============================================================
// LOOP
// ============================================================
let lastTime = performance.now();

function update(dt) {
  animTimer += dt;
  if (shakeTimer > 0) shakeTimer -= dt;

  // Particles
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 60 * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 0, W, H);

  if (state === 'title') { drawTitle(); return; }

  // Flowerpot
  const potScale = Math.min(1, W / 500, H / 700);
  drawFlowerpot(W / 2, H * 0.36, potScale, wrongCount);

  // Word
  drawWord();

  // Keyboard
  drawKeyboard();

  // Particles
  drawParticles();

  // HUD
  drawHUD();

  // Win/lose overlay
  if (state === 'won' || state === 'lost') drawEndScreen();
}

function loop() {
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
loop();

})();
</script>
