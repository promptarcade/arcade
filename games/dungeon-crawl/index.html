<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dungeon Crawl</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ============================================================
// DUNGEON CRAWL — Roguelike built from Grok-generated sprites
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// SPRITE SHEETS
// ============================================================

const sheets = {};
const sheetSources = {
  heroes: 'sprites/heroes.jpg',
  slimes: 'sprites/slimes.jpg',
  items: 'sprites/items.jpg',
  props: 'sprites/props.jpg',
  monsters: 'sprites/monsters.jpg',
};

let loadedCount = 0;
const totalSheets = Object.keys(sheetSources).length;

for (const [name, src] of Object.entries(sheetSources)) {
  const img = new Image();
  img.onload = () => { loadedCount++; if (loadedCount >= totalSheets) init(); };
  img.onerror = () => { loadedCount++; console.warn('Failed to load:', src); if (loadedCount >= totalSheets) init(); };
  img.src = src;
  sheets[name] = img;
}

// Sprite region definitions (x, y, w, h in source image)
// These are approximate — Grok images aren't perfectly gridded
const HERO_REGIONS = [
  // Row 1 — 8 characters across, roughly 160px wide each, ~80px tall
  { name: 'Knight', sx: 0, sy: 8, sw: 135, sh: 80 },
  { name: 'Mage', sx: 140, sy: 8, sw: 135, sh: 80 },
  { name: 'Rogue', sx: 280, sy: 8, sw: 135, sh: 80 },
  { name: 'Warrior', sx: 415, sy: 8, sw: 135, sh: 80 },
  { name: 'Ranger', sx: 555, sy: 8, sw: 135, sh: 80 },
  { name: 'Archer', sx: 695, sy: 8, sw: 135, sh: 80 },
];

// Props — trees, rocks, barrels, crates, chests from the props sheet
const PROP_REGIONS = {
  // Row 1: characters (skip), Row 2-3: props
  tree1: { sx: 640, sy: 0, sw: 100, sh: 120 },
  tree2: { sx: 750, sy: 0, sw: 100, sh: 120 },
  tree3: { sx: 860, sy: 0, sw: 120, sh: 120 },
  chest1: { sx: 0, sy: 125, sw: 100, sh: 75 },
  chest2: { sx: 110, sy: 125, sw: 100, sh: 75 },
  chest3: { sx: 220, sy: 125, sw: 100, sh: 75 },
  barrel: { sx: 850, sy: 125, sw: 75, sh: 85 },
  crate: { sx: 740, sy: 125, sw: 85, sh: 85 },
  rock1: { sx: 520, sy: 145, sw: 80, sh: 65 },
  rock2: { sx: 620, sy: 145, sw: 80, sh: 65 },
  bush: { sx: 950, sy: 135, sw: 90, sh: 75 },
};

// Slime regions — 4 rows x 5 columns
const SLIME_COLORS = [];
for (let row = 0; row < 4; row++) {
  for (let col = 0; col < 5; col++) {
    SLIME_COLORS.push({
      sx: col * 256 + 20,
      sy: row * 180 + 10,
      sw: 220,
      sh: 160,
    });
  }
}

// Item regions from items sheet — grid of icons
const ITEM_REGIONS = {
  shield: { sx: 0, sy: 0, sw: 80, sh: 80 },
  heart: { sx: 80, sy: 0, sw: 80, sh: 80 },
  potionG: { sx: 160, sy: 0, sw: 80, sh: 80 },
  potionB: { sx: 240, sy: 0, sw: 80, sh: 80 },
  potionR: { sx: 320, sy: 0, sw: 80, sh: 80 },
  gemR: { sx: 400, sy: 0, sw: 65, sh: 80 },
  gemG: { sx: 470, sy: 0, sw: 65, sh: 80 },
  gemY: { sx: 540, sy: 0, sw: 65, sh: 80 },
  sword1: { sx: 0, sy: 90, sw: 65, sh: 80 },
  sword2: { sx: 70, sy: 90, sw: 65, sh: 80 },
  sword3: { sx: 140, sy: 90, sw: 65, sh: 80 },
  sword4: { sx: 215, sy: 90, sw: 65, sh: 80 },
  key: { sx: 0, sy: 180, sw: 65, sh: 65 },
  coin: { sx: 70, sy: 180, sw: 65, sh: 65 },
  chestSmall: { sx: 530, sy: 90, sw: 90, sh: 80 },
};

// ============================================================
// GAME STATE
// ============================================================

const TILE = 48;
const ROOM_W = 13;
const ROOM_H = 9;

let state = 'select'; // 'select', 'play', 'dead', 'win'
let selectedHero = 0;
let player = { x: 1, y: 1, hp: 10, maxHp: 10, atk: 2, keys: 0, potions: 0, gold: 0, level: 1 };
let entities = []; // { type, x, y, hp, ... }
let rooms = [];
let currentRoom = 0;
let messages = [];
let animTimer = 0;

function addMessage(msg) {
  messages.unshift(msg);
  if (messages.length > 4) messages.pop();
}

// ============================================================
// DUNGEON GENERATION
// ============================================================

function generateDungeon() {
  rooms = [];
  for (let r = 0; r < 8; r++) {
    const room = {
      tiles: [],
      entities: [],
      cleared: false,
      exits: {},
    };

    // Create room layout — walls around edges, floor inside
    for (let y = 0; y < ROOM_H; y++) {
      room.tiles[y] = [];
      for (let x = 0; x < ROOM_W; x++) {
        if (x === 0 || x === ROOM_W - 1 || y === 0 || y === ROOM_H - 1) {
          room.tiles[y][x] = 'wall';
        } else {
          room.tiles[y][x] = 'floor';
        }
      }
    }

    // Add random obstacles
    const obstacles = 2 + Math.floor(Math.random() * 4);
    for (let i = 0; i < obstacles; i++) {
      const ox = 2 + Math.floor(Math.random() * (ROOM_W - 4));
      const oy = 2 + Math.floor(Math.random() * (ROOM_H - 4));
      room.tiles[oy][ox] = 'wall';
    }

    // Exits — door on right wall to next room (except last)
    if (r < 7) {
      room.tiles[Math.floor(ROOM_H / 2)][ROOM_W - 1] = 'door_right';
      room.exits.right = r + 1;
    }
    // Door on left wall from previous room (except first)
    if (r > 0) {
      room.tiles[Math.floor(ROOM_H / 2)][0] = 'door_left';
      room.exits.left = r - 1;
    }

    // Enemies — slimes
    if (r > 0) {
      const enemyCount = 1 + Math.floor(Math.random() * 3) + Math.floor(r / 2);
      for (let i = 0; i < enemyCount; i++) {
        let ex, ey;
        do {
          ex = 2 + Math.floor(Math.random() * (ROOM_W - 4));
          ey = 2 + Math.floor(Math.random() * (ROOM_H - 4));
        } while (room.tiles[ey][ex] !== 'floor' || room.entities.some(e => e.x === ex && e.y === ey));

        const slimeIdx = Math.floor(Math.random() * SLIME_COLORS.length);
        room.entities.push({
          type: 'slime',
          x: ex, y: ey,
          hp: 2 + r,
          maxHp: 2 + r,
          atk: 1 + Math.floor(r / 2),
          slimeIdx,
        });
      }
    }

    // Loot — chests and items
    if (r > 0 && Math.random() < 0.7) {
      let lx, ly;
      do {
        lx = 2 + Math.floor(Math.random() * (ROOM_W - 4));
        ly = 2 + Math.floor(Math.random() * (ROOM_H - 4));
      } while (room.tiles[ly][lx] !== 'floor' || room.entities.some(e => e.x === lx && e.y === ly));

      const lootTypes = ['potion', 'gold', 'key'];
      room.entities.push({
        type: 'chest',
        x: lx, y: ly,
        loot: lootTypes[Math.floor(Math.random() * lootTypes.length)],
        opened: false,
      });
    }

    // Boss in last room
    if (r === 7) {
      room.entities.push({
        type: 'boss',
        x: Math.floor(ROOM_W / 2),
        y: Math.floor(ROOM_H / 2),
        hp: 20,
        maxHp: 20,
        atk: 4,
        slimeIdx: 0, // big slime
      });
    }

    rooms.push(room);
  }
}

// ============================================================
// INPUT
// ============================================================

const keys = {};
let lastMove = 0;
const MOVE_DELAY = 150;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === 'select') {
    if (e.key === 'ArrowLeft') selectedHero = Math.max(0, selectedHero - 1);
    if (e.key === 'ArrowRight') selectedHero = Math.min(HERO_REGIONS.length - 1, selectedHero + 1);
    if (e.key === 'Enter' || e.key === ' ') startGame();
  }
  if (state === 'dead' || state === 'win') {
    if (e.key === 'Enter' || e.key === ' ') { state = 'select'; }
  }
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
  if (state === 'select') startGame();
  if (state === 'dead' || state === 'win') state = 'select';
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchStart || state !== 'play') return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    tryMove(dx > 0 ? 1 : -1, 0);
  } else {
    tryMove(0, dy > 0 ? 1 : -1);
  }
  touchStart = null;
});

// ============================================================
// GAME LOGIC
// ============================================================

function startGame() {
  state = 'play';
  player = { x: 1, y: 1, hp: 10, maxHp: 10, atk: 2, keys: 0, potions: 0, gold: 0, level: 1 };
  messages = [];
  currentRoom = 0;
  generateDungeon();
  addMessage('Enter the dungeon...');
}

function tryMove(dx, dy) {
  const nx = player.x + dx;
  const ny = player.y + dy;
  const room = rooms[currentRoom];

  if (nx < 0 || nx >= ROOM_W || ny < 0 || ny >= ROOM_H) return;

  const tile = room.tiles[ny][nx];
  if (tile === 'wall') return;

  // Check for door
  if (tile === 'door_right' && room.exits.right !== undefined) {
    currentRoom = room.exits.right;
    player.x = 1;
    player.y = Math.floor(ROOM_H / 2);
    addMessage('Entered room ' + (currentRoom + 1));
    return;
  }
  if (tile === 'door_left' && room.exits.left !== undefined) {
    currentRoom = room.exits.left;
    player.x = ROOM_W - 2;
    player.y = Math.floor(ROOM_H / 2);
    return;
  }

  // Check for entity collision
  const entity = room.entities.find(e => e.x === nx && e.y === ny);
  if (entity) {
    if (entity.type === 'slime' || entity.type === 'boss') {
      // Combat
      entity.hp -= player.atk;
      addMessage('Hit ' + (entity.type === 'boss' ? 'BOSS' : 'slime') + ' for ' + player.atk + '!');
      if (entity.hp <= 0) {
        room.entities = room.entities.filter(e => e !== entity);
        addMessage('Defeated!');
        player.gold += entity.type === 'boss' ? 50 : 5;
        if (entity.type === 'boss') {
          state = 'win';
          addMessage('YOU WIN!');
        }
      } else {
        // Enemy attacks back
        const dmg = entity.atk;
        player.hp -= dmg;
        addMessage('Took ' + dmg + ' damage!');
        if (player.hp <= 0) {
          state = 'dead';
          addMessage('You died...');
        }
      }
      return;
    }
    if (entity.type === 'chest' && !entity.opened) {
      entity.opened = true;
      if (entity.loot === 'potion') { player.potions++; addMessage('Found a potion!'); }
      if (entity.loot === 'gold') { player.gold += 10; addMessage('Found 10 gold!'); }
      if (entity.loot === 'key') { player.keys++; addMessage('Found a key!'); }
      // Don't block movement — walk onto chest
    }
  }

  player.x = nx;
  player.y = ny;
}

function usePotion() {
  if (player.potions > 0 && player.hp < player.maxHp) {
    player.potions--;
    player.hp = Math.min(player.maxHp, player.hp + 5);
    addMessage('Healed! HP: ' + player.hp);
  }
}

// ============================================================
// RENDERING
// ============================================================

function drawSprite(sheet, region, dx, dy, dw, dh) {
  if (!sheets[sheet] || !sheets[sheet].complete) return;
  ctx.drawImage(sheets[sheet], region.sx, region.sy, region.sw, region.sh, dx, dy, dw || region.sw, dh || region.sh);
}

function render() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  if (state === 'select') {
    renderSelect(W, H);
  } else if (state === 'play' || state === 'dead' || state === 'win') {
    renderGame(W, H);
  }
}

function renderSelect(W, H) {
  ctx.fillStyle = '#dda';
  ctx.font = '32px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DUNGEON CRAWL', W / 2, 60);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#998';
  ctx.fillText('Choose your hero (← → then Enter)', W / 2, 90);

  // Draw hero options
  const heroW = 100, heroH = 80;
  const startX = W / 2 - (HERO_REGIONS.length * (heroW + 20)) / 2;

  for (let i = 0; i < HERO_REGIONS.length; i++) {
    const hx = startX + i * (heroW + 20);
    const hy = H / 2 - heroH / 2;

    // Selection highlight
    if (i === selectedHero) {
      ctx.strokeStyle = '#ffa';
      ctx.lineWidth = 3;
      ctx.strokeRect(hx - 5, hy - 5, heroW + 10, heroH + 30);
    }

    drawSprite('heroes', HERO_REGIONS[i], hx, hy, heroW, heroH);

    ctx.fillStyle = i === selectedHero ? '#ffa' : '#888';
    ctx.font = '12px monospace';
    ctx.fillText(HERO_REGIONS[i].name, hx + heroW / 2, hy + heroH + 16);
  }

  ctx.fillStyle = '#666';
  ctx.font = '14px monospace';
  ctx.fillText('Swipe or use Arrow Keys to move. Bump into enemies to attack.', W / 2, H - 40);
}

function renderGame(W, H) {
  const room = rooms[currentRoom];
  if (!room) return;

  // Centre the room on screen
  const roomPxW = ROOM_W * TILE;
  const roomPxH = ROOM_H * TILE;
  const scale = Math.min((W - 40) / roomPxW, (H - 120) / roomPxH, 2);
  const ox = (W - roomPxW * scale) / 2;
  const oy = 50;

  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);

  // Draw tiles
  for (let y = 0; y < ROOM_H; y++) {
    for (let x = 0; x < ROOM_W; x++) {
      const tile = room.tiles[y][x];
      const tx = x * TILE, ty = y * TILE;

      if (tile === 'wall') {
        ctx.fillStyle = '#443';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = '#332';
        ctx.fillRect(tx + 2, ty + 2, TILE - 4, TILE - 4);
        // Brick pattern
        ctx.fillStyle = '#554';
        ctx.fillRect(tx + 4, ty + 4, TILE / 2 - 5, TILE / 2 - 5);
        ctx.fillRect(tx + TILE / 2 + 1, ty + TILE / 2 + 1, TILE / 2 - 5, TILE / 2 - 5);
      } else if (tile === 'floor') {
        ctx.fillStyle = '#665';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = '#776';
        ctx.fillRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
      } else if (tile === 'door_right' || tile === 'door_left') {
        ctx.fillStyle = '#665';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = '#a84';
        ctx.fillRect(tx + 8, ty + 4, TILE - 16, TILE - 8);
        ctx.fillStyle = '#c96';
        ctx.fillRect(tx + 10, ty + 6, TILE - 20, TILE - 12);
        // Door handle
        ctx.fillStyle = '#fda';
        ctx.fillRect(tx + TILE - 18, ty + TILE / 2 - 2, 4, 4);
      }
    }
  }

  // Draw entities
  for (const e of room.entities) {
    const ex = e.x * TILE, ey = e.y * TILE;

    if (e.type === 'slime') {
      const slime = SLIME_COLORS[e.slimeIdx % SLIME_COLORS.length];
      drawSprite('slimes', slime, ex - 4, ey - 8, TILE + 8, TILE + 8);
      // HP bar
      if (e.hp < e.maxHp) {
        ctx.fillStyle = '#400';
        ctx.fillRect(ex + 4, ey - 6, TILE - 8, 4);
        ctx.fillStyle = '#f44';
        ctx.fillRect(ex + 4, ey - 6, (TILE - 8) * (e.hp / e.maxHp), 4);
      }
    } else if (e.type === 'boss') {
      const slime = SLIME_COLORS[0];
      drawSprite('slimes', slime, ex - 12, ey - 16, TILE + 24, TILE + 16);
      // Boss HP bar
      ctx.fillStyle = '#400';
      ctx.fillRect(ex - 8, ey - 10, TILE + 16, 5);
      ctx.fillStyle = '#f44';
      ctx.fillRect(ex - 8, ey - 10, (TILE + 16) * (e.hp / e.maxHp), 5);
      ctx.fillStyle = '#faa';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS', ex + TILE / 2, ey - 14);
    } else if (e.type === 'chest') {
      if (!e.opened) {
        drawSprite('items', ITEM_REGIONS.chestSmall, ex + 4, ey + 4, TILE - 8, TILE - 8);
      }
    }
  }

  // Draw player
  const px = player.x * TILE, py = player.y * TILE;
  const heroRegion = HERO_REGIONS[selectedHero];
  // Bobbing animation
  const bob = Math.sin(animTimer * 3) * 2;
  drawSprite('heroes', heroRegion, px - 8, py - 16 + bob, TILE + 16, TILE + 16);

  ctx.restore();

  // HUD
  ctx.fillStyle = '#dda';
  ctx.font = '16px monospace';
  ctx.textAlign = 'left';

  const hudY = oy + roomPxH * scale + 20;
  ctx.fillText('HP: ' + player.hp + '/' + player.maxHp, ox, hudY);
  ctx.fillText('ATK: ' + player.atk, ox + 150, hudY);
  ctx.fillText('Gold: ' + player.gold, ox + 280, hudY);
  ctx.fillText('Potions: ' + player.potions + ' (P to use)', ox + 410, hudY);
  ctx.fillText('Keys: ' + player.keys, ox + 650, hudY);
  ctx.fillText('Room: ' + (currentRoom + 1) + '/8', ox + 780, hudY);

  // HP bar
  ctx.fillStyle = '#400';
  ctx.fillRect(ox, hudY + 8, 130, 8);
  ctx.fillStyle = player.hp > player.maxHp * 0.3 ? '#4a4' : '#f44';
  ctx.fillRect(ox, hudY + 8, 130 * (player.hp / player.maxHp), 8);

  // Messages
  ctx.textAlign = 'left';
  ctx.font = '13px monospace';
  for (let i = 0; i < messages.length; i++) {
    ctx.fillStyle = `rgba(200,200,180,${1 - i * 0.25})`;
    ctx.fillText(messages[i], ox, hudY + 30 + i * 16);
  }

  // Death/Win overlay
  if (state === 'dead') {
    ctx.fillStyle = 'rgba(80,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#faa';
    ctx.font = '48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('YOU DIED', W / 2, H / 2);
    ctx.font = '18px monospace';
    ctx.fillText('Press Enter to try again', W / 2, H / 2 + 40);
  }
  if (state === 'win') {
    ctx.fillStyle = 'rgba(0,60,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#afa';
    ctx.font = '48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('VICTORY!', W / 2, H / 2);
    ctx.font = '18px monospace';
    ctx.fillText('Gold collected: ' + player.gold, W / 2, H / 2 + 40);
    ctx.fillText('Press Enter to play again', W / 2, H / 2 + 70);
  }
}

// ============================================================
// GAME LOOP
// ============================================================

function init() {
  // Potion key
  document.addEventListener('keydown', e => {
    if (e.key === 'p' || e.key === 'P') usePotion();
  });

  function loop(t) {
    animTimer = t / 1000;

    // Movement with delay
    if (state === 'play' && t - lastMove > MOVE_DELAY) {
      if (keys['ArrowLeft']) { tryMove(-1, 0); lastMove = t; }
      else if (keys['ArrowRight']) { tryMove(1, 0); lastMove = t; }
      else if (keys['ArrowUp']) { tryMove(0, -1); lastMove = t; }
      else if (keys['ArrowDown']) { tryMove(0, 1); lastMove = t; }
    }

    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
