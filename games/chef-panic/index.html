<canvas id="C"></canvas>
<script>
'use strict';
// ═══════════════════════════════════════════════════════
// CHEF PANIC — Game & Watch "Chef" LCD Recreation
// ═══════════════════════════════════════════════════════

var _SU='https://ivhpqkqnfqcgrfrsvszf.supabase.co',_SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2aHBxa3FuZnFjZ3JmcnN2c3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTg1NjYsImV4cCI6MjA4OTM5NDU2Nn0.x3X_0dbhw3Qz7sgQAgpSoSu382ckB2uYxCJGe7_vDCM';
async function submitScore(g,s){var n=prompt('Score: '+s+'! Enter initials (max 5):');if(!n)return;n=n.trim().slice(0,5).toUpperCase();if(!n)return;try{await fetch(_SU+'/rest/v1/high_scores',{method:'POST',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json'},body:JSON.stringify({game:g,initials:n,score:s})})}catch(e){}}

var canvas = document.getElementById('C'), ctx = canvas.getContext('2d');

// ── AUDIO ──
var audioCtx = null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function beep(f,d,v){if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.value=f;g.gain.value=v||0.1;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sfxFlip(){beep(600,0.05,0.1);setTimeout(function(){beep(800,0.04,0.08)},40)}
function sfxDrop(){beep(150,0.15,0.15);setTimeout(function(){beep(80,0.2,0.12)},80)}
function sfxGameOver(){[300,250,200,150,100].forEach(function(f,i){setTimeout(function(){beep(f,0.2,0.12)},i*180)})}

// ── COLOURS ──
var LCD_BG='#9aad86',LCD_GHOST='#889a75',LCD_ON='#1a2a12',LCD_STRUCT='#708060';

// ── LAYOUT ──
var D={},S={},btnL,btnR;
function calcLayout(){
  var vw=window.innerWidth,vh=window.innerHeight;
  canvas.width=vw;canvas.height=vh;
  var asp=5/3;D.w=vw*0.94;D.h=D.w/asp;
  if(D.h>vh*0.94){D.h=vh*0.94;D.w=D.h*asp}
  D.x=(vw-D.w)/2;D.y=(vh-D.h)/2;
  S.w=D.w*0.85;S.h=D.h*0.68;
  S.x=D.x+(D.w-S.w)/2;S.y=D.y+D.h*0.08;
}

// ── STATE ──
// 3 stations (0=left, 1=center, 2=right)
// Each station has food at 3 heights: 0=low(near pan), 1=mid, 2=high
// Food goes: high→mid→low. If chef is at that station when food reaches low, it flips back up (low→mid→high)
// If chef is NOT there, food drops below (miss)
var score,hiScore,misses,chefPos;
var foods; // [{station, height, goingUp, type}] type: 0=sausage, 1=fish, 2=steak
var tickRate,accumulator,spawnTimer,spawnInterval;
var state,scoreSubmitted;

function loadHi(){try{hiScore=parseInt(localStorage.getItem('chef_hi'))||0}catch(e){hiScore=0}}
function saveHi(){try{localStorage.setItem('chef_hi',score)}catch(e){}}

function initGame(){
  score=0;misses=0;chefPos=1;
  foods=[];tickRate=600;accumulator=0;
  spawnTimer=0;spawnInterval=4;
  state='title';scoreSubmitted=false;
}
function startGame(){initGame();state='play';
  // Start with one food item
  foods.push({station:Math.floor(Math.random()*3),height:2,goingUp:false,type:Math.floor(Math.random()*3)});
}

// ── GAME LOGIC ──
function gameTick(){
  if(state!=='play')return;

  // Process each food item
  for(var i=foods.length-1;i>=0;i--){
    var f=foods[i];
    if(f.goingUp){
      f.height++;
      if(f.height>=2){f.goingUp=false} // reached top, starts falling again
    } else {
      f.height--;
      if(f.height<0){
        // Food reached bottom — check if chef is here
        if(chefPos===f.station){
          // Flip it back up!
          f.height=0;f.goingUp=true;
          score++;sfxFlip();
          updateDifficulty();
        } else {
          // Dropped! Miss!
          misses++;foods.splice(i,1);sfxDrop();
          if(misses>=3){
            state='over';
            if(score>hiScore){hiScore=score;saveHi()}
            if(score>0&&!scoreSubmitted){scoreSubmitted=true;submitScore('chef-panic',score)}
            sfxGameOver();return;
          }
        }
      }
    }
  }

  // Spawn new food
  spawnTimer++;
  if(spawnTimer>=spawnInterval){
    spawnTimer=0;
    // Pick a station, prefer one without food already at top
    var st=Math.floor(Math.random()*3);
    var att=0;
    while(att<5&&foods.some(function(f){return f.station===st&&f.height===2})){st=Math.floor(Math.random()*3);att++}
    // Don't exceed max active food count
    var maxFood=1+Math.floor(score/8);
    if(maxFood>3)maxFood=3;
    if(foods.length<maxFood){
      foods.push({station:st,height:2,goingUp:false,type:Math.floor(Math.random()*3)});
    }
  }
}

function updateDifficulty(){
  if(score>=30){tickRate=250;spawnInterval=2}
  else if(score>=20){tickRate=320;spawnInterval=2}
  else if(score>=12){tickRate=400;spawnInterval=3}
  else if(score>=6){tickRate=500;spawnInterval=3}
}

// ── INPUT ──
function moveLeft(){if(state==='play'&&chefPos>0)chefPos--}
function moveRight(){if(state==='play'&&chefPos<2)chefPos++}
function doStart(){initAudio();if(state!=='play')startGame()}

window.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();moveLeft()}
  if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();moveRight()}
  if(e.key===' '||e.key==='Enter'){e.preventDefault();doStart()}
});
function hitTest(x,y){
  if(state!=='play'){doStart();return}
  if(btnL&&x>=btnL.x&&x<=btnL.x+btnL.w&&y>=btnL.y&&y<=btnL.y+btnL.h){moveLeft();return}
  if(btnR&&x>=btnR.x&&x<=btnR.x+btnR.w&&y>=btnR.y&&y<=btnR.y+btnR.h){moveRight();return}
  if(x<canvas.width/2)moveLeft();else moveRight();
}
canvas.addEventListener('mousedown',function(e){hitTest(e.clientX,e.clientY)});
canvas.addEventListener('touchstart',function(e){e.preventDefault();for(var i=0;i<e.touches.length;i++)hitTest(e.touches[i].clientX,e.touches[i].clientY)},{passive:false});

// ═══════════════════════════════════════════════════════
// DRAWING — filled LCD silhouettes
// ═══════════════════════════════════════════════════════

var SEGS=[0x7E,0x30,0x6D,0x79,0x33,0x5B,0x5F,0x70,0x7F,0x7B];
function draw7Seg(cx,cy,h,val,col){
  var w=h*0.55,t=h*0.09,g=h*0.04;ctx.fillStyle=col;var s=SEGS[val]||0;
  if(s&0x40)ctx.fillRect(cx-w/2+g,cy-h/2,w-g*2,t);
  if(s&0x20)ctx.fillRect(cx+w/2-t,cy-h/2+g,t,h/2-g*2);
  if(s&0x10)ctx.fillRect(cx+w/2-t,cy+g,t,h/2-g*2);
  if(s&0x08)ctx.fillRect(cx-w/2+g,cy+h/2-t,w-g*2,t);
  if(s&0x04)ctx.fillRect(cx-w/2,cy+g,t,h/2-g*2);
  if(s&0x02)ctx.fillRect(cx-w/2,cy-h/2+g,t,h/2-g*2);
  if(s&0x01)ctx.fillRect(cx-w/2+g,cy-t/2,w-g*2,t);
}
function drawScore(x,y,h,val){
  var ds=[Math.floor(val/100)%10,Math.floor(val/10)%10,val%10],dw=h*0.7;
  for(var i=0;i<3;i++){draw7Seg(x+i*dw,y,h,8,LCD_GHOST);draw7Seg(x+i*dw,y,h,ds[i],LCD_ON)}
}
function drawMissMarks(x,y,sz){
  for(var i=0;i<3;i++){
    var mx=x+i*sz*1.5,col=(i<misses&&state!=='title')?LCD_ON:LCD_GHOST;
    ctx.fillStyle=col;
    ctx.save();ctx.translate(mx,y);ctx.rotate(Math.PI/4);ctx.fillRect(-sz*0.4,-sz*0.08,sz*0.8,sz*0.16);ctx.restore();
    ctx.save();ctx.translate(mx,y);ctx.rotate(-Math.PI/4);ctx.fillRect(-sz*0.4,-sz*0.08,sz*0.8,sz*0.16);ctx.restore();
  }
}

// ── CHEF silhouette — tall hat, apron, holding frying pan ──
function drawChef(cx,cy,w,h,col){
  ctx.fillStyle=col;
  // Chef hat (toque) — compact, doesn't overlap food
  ctx.beginPath();
  ctx.moveTo(cx-w*0.15,cy-h*0.22);
  ctx.lineTo(cx-w*0.17,cy-h*0.45);
  ctx.quadraticCurveTo(cx-w*0.14,cy-h*0.55,cx,cy-h*0.56);
  ctx.quadraticCurveTo(cx+w*0.14,cy-h*0.55,cx+w*0.17,cy-h*0.45);
  ctx.lineTo(cx+w*0.15,cy-h*0.22);
  ctx.fill();
  // Hat brim
  ctx.fillRect(cx-w*0.2,cy-h*0.24,w*0.4,h*0.04);
  // Head
  ctx.beginPath();ctx.arc(cx,cy-h*0.12,w*0.12,0,Math.PI*2);ctx.fill();
  // Body/apron — wider rectangle
  ctx.beginPath();
  ctx.moveTo(cx-w*0.18,cy-h*0.02);
  ctx.lineTo(cx-w*0.2,cy+h*0.25);
  ctx.lineTo(cx+w*0.2,cy+h*0.25);
  ctx.lineTo(cx+w*0.18,cy-h*0.02);
  ctx.fill();
  // Apron front (slightly lighter — use cutout trick)
  ctx.fillStyle=LCD_BG;
  ctx.fillRect(cx-w*0.1,cy+h*0.02,w*0.2,h*0.02); // apron string
  ctx.fillStyle=col;
  // Left arm holding pan
  ctx.beginPath();
  ctx.moveTo(cx-w*0.18,cy);
  ctx.lineTo(cx-w*0.35,cy-h*0.05);
  ctx.lineTo(cx-w*0.38,cy+h*0.02);
  ctx.lineTo(cx-w*0.2,cy+h*0.06);
  ctx.fill();
  // Frying pan in left hand
  ctx.beginPath();
  ctx.moveTo(cx-w*0.38,cy-h*0.02);
  ctx.lineTo(cx-w*0.52,cy-h*0.02);
  ctx.lineTo(cx-w*0.52,cy+h*0.02);
  ctx.lineTo(cx-w*0.38,cy+h*0.02);
  ctx.fill();
  // Pan head (circle)
  ctx.beginPath();ctx.arc(cx-w*0.52,cy,w*0.1,0,Math.PI*2);ctx.fill();
  // Pan interior cutout
  ctx.fillStyle=LCD_BG;
  ctx.beginPath();ctx.arc(cx-w*0.52,cy,w*0.06,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=col;
  // Right arm
  ctx.beginPath();
  ctx.moveTo(cx+w*0.18,cy);
  ctx.lineTo(cx+w*0.3,cy+h*0.08);
  ctx.lineTo(cx+w*0.27,cy+h*0.14);
  ctx.lineTo(cx+w*0.16,cy+h*0.06);
  ctx.fill();
  // Legs
  ctx.fillRect(cx-w*0.14,cy+h*0.25,w*0.1,h*0.18);
  ctx.fillRect(cx+w*0.04,cy+h*0.25,w*0.1,h*0.18);
  // Shoes
  ctx.fillRect(cx-w*0.17,cy+h*0.42,w*0.15,h*0.06);
  ctx.fillRect(cx+w*0.02,cy+h*0.42,w*0.15,h*0.06);
}

// ── FOOD silhouettes ──
function drawSausage(cx,cy,w,h,col){
  ctx.fillStyle=col;
  // Curved cylinder shape
  ctx.beginPath();
  ctx.moveTo(cx-w*0.4,cy);
  ctx.quadraticCurveTo(cx-w*0.4,cy-h*0.35,cx-w*0.2,cy-h*0.35);
  ctx.lineTo(cx+w*0.2,cy-h*0.35);
  ctx.quadraticCurveTo(cx+w*0.4,cy-h*0.35,cx+w*0.4,cy);
  ctx.quadraticCurveTo(cx+w*0.4,cy+h*0.35,cx+w*0.2,cy+h*0.35);
  ctx.lineTo(cx-w*0.2,cy+h*0.35);
  ctx.quadraticCurveTo(cx-w*0.4,cy+h*0.35,cx-w*0.4,cy);
  ctx.fill();
  // Link marks
  ctx.fillStyle=LCD_BG;
  ctx.fillRect(cx-w*0.05,cy-h*0.35,w*0.04,h*0.7);
}

function drawFish(cx,cy,w,h,col){
  ctx.fillStyle=col;
  // Fish body — oval with pointed tail
  ctx.beginPath();
  ctx.moveTo(cx-w*0.4,cy);
  ctx.quadraticCurveTo(cx-w*0.3,cy-h*0.4,cx,cy-h*0.35);
  ctx.quadraticCurveTo(cx+w*0.2,cy-h*0.3,cx+w*0.25,cy);
  // Tail fork
  ctx.lineTo(cx+w*0.45,cy-h*0.3);
  ctx.lineTo(cx+w*0.35,cy);
  ctx.lineTo(cx+w*0.45,cy+h*0.3);
  ctx.lineTo(cx+w*0.25,cy);
  ctx.quadraticCurveTo(cx+w*0.2,cy+h*0.3,cx,cy+h*0.35);
  ctx.quadraticCurveTo(cx-w*0.3,cy+h*0.4,cx-w*0.4,cy);
  ctx.fill();
  // Eye cutout
  ctx.fillStyle=LCD_BG;
  ctx.beginPath();ctx.arc(cx-w*0.2,cy-h*0.1,w*0.05,0,Math.PI*2);ctx.fill();
  // Dorsal fin
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(cx-w*0.05,cy-h*0.35);ctx.lineTo(cx+w*0.05,cy-h*0.5);ctx.lineTo(cx+w*0.15,cy-h*0.3);ctx.fill();
}

function drawSteak(cx,cy,w,h,col){
  ctx.fillStyle=col;
  // Thick irregular cut shape
  ctx.beginPath();
  ctx.moveTo(cx-w*0.35,cy-h*0.25);
  ctx.lineTo(cx+w*0.25,cy-h*0.3);
  ctx.quadraticCurveTo(cx+w*0.4,cy-h*0.2,cx+w*0.38,cy+h*0.1);
  ctx.lineTo(cx+w*0.3,cy+h*0.3);
  ctx.lineTo(cx-w*0.3,cy+h*0.25);
  ctx.quadraticCurveTo(cx-w*0.4,cy+h*0.1,cx-w*0.35,cy-h*0.25);
  ctx.fill();
  // Bone shape cutout
  ctx.fillStyle=LCD_BG;
  ctx.beginPath();ctx.arc(cx+w*0.15,cy-h*0.1,w*0.06,0,Math.PI*2);ctx.fill();
  ctx.fillRect(cx+w*0.12,cy-h*0.08,w*0.15,h*0.08);
  ctx.beginPath();ctx.arc(cx+w*0.28,cy-h*0.05,w*0.05,0,Math.PI*2);ctx.fill();
}

var drawFoodFns=[drawSausage,drawFish,drawSteak];

// ── CAT silhouette ──
function drawCat(cx,cy,w,h,col){
  ctx.fillStyle=col;
  // Body — sitting oval
  ctx.beginPath();
  ctx.ellipse(cx,cy+h*0.1,w*0.25,h*0.25,0,0,Math.PI*2);
  ctx.fill();
  // Head
  ctx.beginPath();ctx.arc(cx-w*0.05,cy-h*0.2,w*0.15,0,Math.PI*2);ctx.fill();
  // Ears — pointed triangles
  ctx.beginPath();ctx.moveTo(cx-w*0.18,cy-h*0.28);ctx.lineTo(cx-w*0.22,cy-h*0.48);ctx.lineTo(cx-w*0.08,cy-h*0.32);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+w*0.05,cy-h*0.3);ctx.lineTo(cx+w*0.02,cy-h*0.48);ctx.lineTo(cx+w*0.12,cy-h*0.3);ctx.fill();
  // Tail — thick curved
  ctx.beginPath();
  ctx.moveTo(cx+w*0.2,cy+h*0.15);
  ctx.quadraticCurveTo(cx+w*0.45,cy-h*0.1,cx+w*0.4,cy-h*0.25);
  ctx.quadraticCurveTo(cx+w*0.5,cy-h*0.1,cx+w*0.25,cy+h*0.2);
  ctx.fill();
  // Eyes cutout
  ctx.fillStyle=LCD_BG;
  ctx.beginPath();ctx.arc(cx-w*0.1,cy-h*0.22,w*0.03,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+w*0.02,cy-h*0.22,w*0.03,0,Math.PI*2);ctx.fill();
}

// ── HELPERS ──
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function drawButton(r,label){
  ctx.fillStyle='#5a4830';roundRect(r.x,r.y+2,r.w,r.h,r.h*0.3);ctx.fill();
  ctx.fillStyle='#7a6848';roundRect(r.x,r.y,r.w,r.h,r.h*0.3);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.08)';roundRect(r.x+r.w*0.1,r.y+1,r.w*0.8,r.h*0.35,r.h*0.2);ctx.fill();
  ctx.fillStyle='#c0a880';ctx.font='bold '+(r.h*0.5)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText(label,r.x+r.w/2,r.y+r.h*0.65);
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(){
  var vw=canvas.width,vh=canvas.height;
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,vw,vh);

  // Device casing — cream/white
  var grad=ctx.createLinearGradient(D.x,D.y,D.x,D.y+D.h);
  grad.addColorStop(0,'#e8e0d0');grad.addColorStop(0.4,'#d8d0c0');grad.addColorStop(1,'#c8c0b0');
  ctx.fillStyle=grad;roundRect(D.x,D.y,D.w,D.h,D.w*0.025);ctx.fill();
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.15)';roundRect(D.x,D.y,D.w,D.h*0.015,D.w*0.025);ctx.fill();
  // Screws
  var sr=D.w*0.01,si=D.w*0.035;
  [[D.x+si,D.y+si],[D.x+D.w-si,D.y+si],[D.x+si,D.y+D.h-si],[D.x+D.w-si,D.y+D.h-si]].forEach(function(p){
    ctx.fillStyle='#a09080';ctx.beginPath();ctx.arc(p[0],p[1],sr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#807060';ctx.fillRect(p[0]-sr*0.6,p[1]-sr*0.15,sr*1.2,sr*0.3);
  });
  // Title
  ctx.fillStyle='#8a3020';ctx.font='bold '+(D.w*0.032)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('CHEF PANIC',D.x+D.w/2,D.y+D.h*0.055);

  // Screen bezel
  ctx.fillStyle='#2a2018';roundRect(S.x-4,S.y-4,S.w+8,S.h+8,3);ctx.fill();
  ctx.fillStyle=LCD_BG;ctx.fillRect(S.x,S.y,S.w,S.h);

  // ── Screen layout ──
  var stX=[S.x+S.w*0.2, S.x+S.w*0.5, S.x+S.w*0.8]; // 3 station X positions
  var foodY=[S.y+S.h*0.55, S.y+S.h*0.37, S.y+S.h*0.19]; // height 0(low), 1(mid), 2(high)
  var foodW=S.w*0.12, foodH=S.h*0.12;
  var chefW=S.w*0.12, chefH=S.h*0.3;
  var chefY=S.y+S.h*0.78;
  var panY=S.y+S.h*0.85; // pan/grill surface line

  // Score
  drawScore(S.x+S.w*0.04,S.y+S.h*0.08,S.h*0.1,score);
  // Misses
  drawMissMarks(S.x+S.w*0.78,S.y+S.h*0.08,S.h*0.1*0.4);

  // Pan/grill surfaces at each station
  ctx.fillStyle=LCD_STRUCT;
  for(var i=0;i<3;i++){
    ctx.fillRect(stX[i]-S.w*0.08,panY,S.w*0.16,S.h*0.015);
  }

  // ── GHOST SEGMENTS ──
  // All 9 food positions (3 stations × 3 heights)
  for(var gc=0;gc<3;gc++){
    for(var gr=0;gr<3;gr++){
      drawSausage(stX[gc],foodY[gr],foodW,foodH,LCD_GHOST); // show sausage shape for all ghosts
    }
  }
  // All 3 chef positions
  for(var gch=0;gch<3;gch++){
    drawChef(stX[gch],chefY,chefW,chefH,LCD_GHOST);
  }

  // Cat (always visible, structural, bottom center)
  drawCat(S.x+S.w*0.5,S.y+S.h*0.92,S.w*0.08,S.h*0.12,LCD_STRUCT);

  // ── ACTIVE ELEMENTS ──
  if(state==='play'||state==='over'){
    // Active chef
    drawChef(stX[chefPos],chefY,chefW,chefH,LCD_ON);

    // Active food items — draw with correct type
    for(var fi=0;fi<foods.length;fi++){
      var f=foods[fi];
      if(f.height>=0&&f.height<=2){
        drawFoodFns[f.type](stX[f.station],foodY[f.height],foodW,foodH,LCD_ON);
      }
    }
  }

  // ── BUTTONS ──
  var btnW=D.w*0.12,btnH=D.h*0.12;
  var btnCY=S.y+S.h+D.h*0.04+btnH*0.4;
  btnL={x:D.x+D.w*0.22-btnW/2,y:btnCY-btnH*0.3,w:btnW,h:btnH*0.6};
  btnR={x:D.x+D.w*0.78-btnW/2,y:btnCY-btnH*0.3,w:btnW,h:btnH*0.6};
  drawButton(btnL,'◀');drawButton(btnR,'▶');

  // ── TITLE / GAME OVER ──
  if(state==='title'){
    ctx.fillStyle=LCD_ON;ctx.font='bold '+(S.h*0.08)+'px sans-serif';ctx.textAlign='center';
    ctx.fillText('CHEF PANIC',S.x+S.w/2,S.y+S.h*0.35);
    ctx.font=(S.h*0.04)+'px sans-serif';
    ctx.fillText('← → to move chef',S.x+S.w/2,S.y+S.h*0.47);
    ctx.fillText('Keep flipping food — each flip = 1 point!',S.x+S.w/2,S.y+S.h*0.53);
    ctx.fillText('Tap or SPACE to start',S.x+S.w/2,S.y+S.h*0.63);
    if(hiScore>0)ctx.fillText('Hi Score: '+hiScore,S.x+S.w/2,S.y+S.h*0.73);
  }
  if(state==='over'){
    ctx.fillStyle='rgba(154,173,134,0.88)';ctx.fillRect(S.x+S.w*0.15,S.y+S.h*0.28,S.w*0.7,S.h*0.44);
    ctx.fillStyle=LCD_ON;ctx.font='bold '+(S.h*0.07)+'px sans-serif';ctx.textAlign='center';
    ctx.fillText('GAME OVER',S.x+S.w/2,S.y+S.h*0.43);
    ctx.font=(S.h*0.05)+'px sans-serif';
    ctx.fillText('Score: '+score,S.x+S.w/2,S.y+S.h*0.54);
    if(score>=hiScore&&score>0)ctx.fillText('NEW HIGH SCORE!',S.x+S.w/2,S.y+S.h*0.62);
    ctx.font=(S.h*0.035)+'px sans-serif';
    ctx.fillText('Tap or SPACE to restart',S.x+S.w/2,S.y+S.h*0.7);
  }
}

// ── MAIN LOOP ──
var lastTime=0;
function loop(now){
  if(!lastTime)lastTime=now;
  var dt=now-lastTime;lastTime=now;
  if(state==='play'){accumulator+=dt;while(accumulator>=tickRate){accumulator-=tickRate;gameTick()}}
  render();requestAnimationFrame(loop);
}

loadHi();initGame();calcLayout();
window.addEventListener('resize',calcLayout);
requestAnimationFrame(loop);
</script>
