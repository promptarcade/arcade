// ============================================================
// SFX
// ============================================================
var SFX = (function() {
  var actx = null, muted = false;
  function getCtx() {
    if (!actx) try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
    if (actx.state === 'suspended') actx.resume();
    return actx;
  }
  function play(fn) { if (muted) return; var c = getCtx(); if (c) fn(c); }
  function osc(c, type, freq, freq2, dur, vol) {
    var o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
    if (freq2) o.frequency.linearRampToValueAtTime(freq2, c.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.08, c.currentTime);
    g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + dur);
  }
  function noise(c, dur, vol) {
    var buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    var n = c.createBufferSource(); n.buffer = buf;
    var g = c.createGain(); g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
    n.connect(g); g.connect(c.destination); n.start();
  }
  return {
    get muted() { return muted; }, set muted(v) { muted = v; },
    stretch()   { play(c => osc(c,'sine',150,400,0.3,0.06)); },
    launch()    { play(c => { osc(c,'sine',300,600,0.15,0.08); noise(c,0.1,0.04); }); },
    ceramicBreak() { play(c => { noise(c,0.12,0.08); osc(c,'square',800,200,0.08,0.04); }); },
    metalClang() { play(c => { osc(c,'triangle',600,200,0.2,0.06); osc(c,'sine',1200,400,0.1,0.04); }); },
    woodThud()  { play(c => { osc(c,'sine',120,60,0.15,0.08); noise(c,0.06,0.03); }); },
    glassShatter() { play(c => { noise(c,0.15,0.06); osc(c,'square',2000,500,0.08,0.03); }); },
    ratSqueak() { play(c => { osc(c,'sine',800,1200,0.1,0.06); osc(c,'sine',1000,1400,0.08,0.04); }); },
    splat()     { play(c => { noise(c,0.1,0.06); osc(c,'sine',200,100,0.1,0.04); }); },
    starChime() { play(c => { for(var i=0;i<3;i++) setTimeout(()=>osc(c,'sine',800+i*200,900+i*200,0.12,0.06),i*100); }); },
    click()     { play(c => osc(c,'sine',600,400,0.05,0.03)); },
    fail()      { play(c => { osc(c,'sawtooth',300,150,0.3,0.06); osc(c,'sawtooth',250,120,0.3,0.04); }); },
  };
})();

// ============================================================
// PHYSICS ENGINE — simple 2D rigid bodies
// ============================================================
var bodies = [];
var particles = [];

function Body(x, y, w, h, type, material) {
  this.x = x; this.y = y; this.w = w; this.h = h;
  this.vx = 0; this.vy = 0;
  this.angle = 0; this.va = 0; // angular velocity
  this.type = type; // 'projectile', 'block', 'rat'
  this.material = material; // 'plate','bowl','pot','cuttingBoard','tinCan','rat'
  this.mass = type === 'projectile' ? 2 : this.getMass();
  this.hp = this.getHP();
  this.alive = true;
  this.grounded = false;
  this.settled = 0; // time spent nearly stationary
  this.scored = false;
}

Body.prototype.getMass = function() {
  switch(this.material) {
    case 'plate': return 1;
    case 'bowl': return 2;
    case 'pot': return 4;
    case 'cuttingBoard': return 3;
    case 'tinCan': return 1.5;
    case 'rat': return 2;
    default: return 2;
  }
};

Body.prototype.getHP = function() {
  switch(this.material) {
    case 'plate': return 15;
    case 'bowl': return 30;
    case 'pot': return 60;
    case 'cuttingBoard': return 40;
    case 'tinCan': return 20;
    case 'rat': return 25;
    default: return 30;
  }
};

Body.prototype.getSprite = function() {
  return spriteCanvases[this.material] || spriteCanvases.tinCan;
};

function updatePhysics(dt) {
  for (var i = 0; i < bodies.length; i++) {
    var b = bodies[i];
    if (!b.alive) continue;

    // Static blocks check if they still have support underneath
    if (b.isStatic) {
      var hasSupport = b.y + b.h/2 >= GROUND_Y - 2; // on the ground
      if (!hasSupport) {
        // Check if any alive body is directly below and overlapping horizontally
        for (var j = 0; j < bodies.length; j++) {
          if (j === i || !bodies[j].alive) continue;
          var other = bodies[j];
          var hOverlap = Math.abs(b.x - other.x) < (b.w + other.w) / 2 * 0.7;
          var below = other.y > b.y && other.y - b.y < b.h/2 + other.h/2 + 5;
          if (hOverlap && below) { hasSupport = true; break; }
        }
      }
      if (!hasSupport) { b.isStatic = false; b.settled = 0; }
      else continue; // still static, skip physics
    }

    // Gravity
    b.vy += GRAVITY * dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.angle += b.va * dt;

    // Damping
    b.vx *= 0.998;
    b.vy *= 0.998;
    b.va *= 0.97;

    // Ground collision
    if (b.y + b.h / 2 > GROUND_Y) {
      var impactSpeed = Math.abs(b.vy); // capture BEFORE reversing
      b.y = GROUND_Y - b.h / 2;
      b.vy = -impactSpeed * 0.3;
      b.vx *= 0.8;
      b.va *= 0.7;
      if (impactSpeed < 15) { b.vy = 0; b.grounded = true; }
      // Only damage from real impacts (high speed, not settling)
      if (impactSpeed > 100 && b.type !== 'block') {
        b.hp -= impactSpeed * 0.08;
        spawnImpactParticles(b.x, GROUND_Y, '#aa9988');
      }
    }

    // Wall bounds
    if (b.x - b.w/2 < 0) { b.x = b.w/2; b.vx = Math.abs(b.vx) * 0.5; }
    if (b.x + b.w/2 > WORLD_W) { b.x = WORLD_W - b.w/2; b.vx = -Math.abs(b.vx) * 0.5; }

    // Settle detection
    if (Math.abs(b.vx) < 2 && Math.abs(b.vy) < 2) {
      b.settled += dt;
    } else {
      b.settled = 0;
    }

    // Death check
    if (b.hp <= 0) {
      b.alive = false;
      spawnBreakParticles(b);
      if (b.type === 'rat') {
        SFX.ratSqueak();
        levelScore += 500;
        ratsHit++;
      } else if (b.type === 'block') {
        levelScore += 50;
        var mat = b.material;
        if (mat === 'plate' || mat === 'bowl') SFX.ceramicBreak();
        else if (mat === 'pot') SFX.metalClang();
        else if (mat === 'cuttingBoard') SFX.woodThud();
        else SFX.metalClang();
      }
    }
  }

  // Body-body collisions
  for (var i = 0; i < bodies.length; i++) {
    for (var j = i + 1; j < bodies.length; j++) {
      var a = bodies[i], b2 = bodies[j];
      if (!a.alive || !b2.alive) continue;
      resolveCollision(a, b2);
    }
  }

  // Remove dead bodies (keep for a frame for particles)
  bodies = bodies.filter(function(b) { return b.alive; });

  // Update particles
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function resolveCollision(a, b) {
  var dx = b.x - a.x, dy = b.y - a.y;
  var overlapX = (a.w + b.w) / 2 - Math.abs(dx);
  var overlapY = (a.h + b.h) / 2 - Math.abs(dy);
  if (overlapX <= 0 || overlapY <= 0) return;

  // Separate along smallest overlap axis
  var relVel = Math.sqrt((a.vx-b.vx)*(a.vx-b.vx) + (a.vy-b.vy)*(a.vy-b.vy));
  var totalMass = a.mass + b.mass;

  if (overlapX < overlapY) {
    var sign = dx > 0 ? 1 : -1;
    a.x -= sign * overlapX * (b.mass / totalMass);
    b.x += sign * overlapX * (a.mass / totalMass);
    var impulse = relVel * 0.5;
    a.vx -= sign * impulse * (b.mass / totalMass);
    b.vx += sign * impulse * (a.mass / totalMass);
  } else {
    var sign = dy > 0 ? 1 : -1;
    a.y -= sign * overlapY * (b.mass / totalMass);
    b.y += sign * overlapY * (a.mass / totalMass);
    var impulse = relVel * 0.5;
    a.vy -= sign * impulse * (b.mass / totalMass);
    b.vy += sign * impulse * (a.mass / totalMass);
  }

  // Wake up static blocks on collision with moving objects
  if (a.isStatic && !b.isStatic && relVel > 20) { a.isStatic = false; a.settled = 0; }
  if (b.isStatic && !a.isStatic && relVel > 20) { b.isStatic = false; b.settled = 0; }

  // Damage based on relative velocity — only from real impacts
  if (relVel > 80) {
    var dmg = (relVel - 80) * 0.3;
    a.hp -= dmg * (b.mass / totalMass);
    b.hp -= dmg * (a.mass / totalMass);
    a.va += (Math.random() - 0.5) * 3;
    b.va += (Math.random() - 0.5) * 3;
    // Wake both on hard impact
    if (a.isStatic) { a.isStatic = false; a.settled = 0; }
    if (b.isStatic) { b.isStatic = false; b.settled = 0; }
  }
}

function spawnImpactParticles(x, y, col) {
  for (var i = 0; i < 4; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 80,
      vy: -Math.random() * 60 - 20,
      life: 0.3 + Math.random() * 0.2,
      col: col, size: 2 + Math.random() * 2,
    });
  }
}

function spawnBreakParticles(body) {
  var cols = {
    plate: ['#eee','#ddd','#7788aa'],
    bowl: ['#dde4ee','#4466aa','#bbc'],
    pot: ['#886644','#aa8855','#554433'],
    cuttingBoard: ['#bb9966','#997744','#aa8855'],
    tinCan: ['#aab0b8','#cc4444','#888890'],
    rat: ['#887766','#ccbbaa','#ddcc66'],
  };
  var palette = cols[body.material] || ['#888','#aaa','#666'];
  for (var i = 0; i < 8; i++) {
    particles.push({
      x: body.x + (Math.random()-0.5) * body.w,
      y: body.y + (Math.random()-0.5) * body.h,
      vx: (Math.random()-0.5) * 120,
      vy: -Math.random() * 80 - 30,
      life: 0.4 + Math.random() * 0.3,
      col: palette[i % palette.length],
      size: 2 + Math.random() * 3,
    });
  }
}

// ============================================================
// SLINGSHOT MECHANICS
// ============================================================
var slingX = 100, slingY = GROUND_Y - 80;
var dragging = false;
var dragX = 0, dragY = 0;
var projectile = null;
var projectileType = 0; // index into ammo array
var ammo = []; // array of food type strings
var launched = false;
var abilityUsed = false;
var shotsFired = 0;

var FOOD_TYPES = ['tomato', 'egg', 'onion', 'chilli'];
// Real proportions: 430px = ~120cm, 1cm ≈ 3.6px
var FOOD_SIZES = { tomato: {w:25,h:25}, egg: {w:16,h:20}, onion: {w:29,h:29}, chilli: {w:14,h:43} };

function loadProjectile() {
  if (ammo.length === 0) return;
  var type = ammo[0];
  var sz = FOOD_SIZES[type];
  projectile = {
    type: type,
    x: slingX, y: slingY,
    w: sz.w, h: sz.h,
  };
  launched = false;
  abilityUsed = false;
}

function launchProjectile(vx, vy) {
  if (!projectile) return;
  var b = new Body(projectile.x, projectile.y, projectile.w, projectile.h, 'projectile', projectile.type);
  b.vx = vx;
  b.vy = vy;
  bodies.push(b);
  launched = true;
  ammo.shift();
  shotsFired++;
  SFX.launch();

  // Track active projectile for ability activation
  activeProjectile = b;
}

var activeProjectile = null;

function activateAbility() {
  if (!activeProjectile || !activeProjectile.alive || abilityUsed) return;
  abilityUsed = true;

  switch (activeProjectile.material) {
    case 'egg':
      // Split into 3 fragments
      for (var i = -1; i <= 1; i++) {
        var frag = new Body(activeProjectile.x, activeProjectile.y, 8, 8, 'projectile', 'egg');
        frag.vx = activeProjectile.vx + i * 80;
        frag.vy = activeProjectile.vy - 30;
        frag.mass = 1;
        bodies.push(frag);
      }
      activeProjectile.alive = false;
      SFX.ceramicBreak();
      break;

    case 'onion':
      // Shockwave — push nearby bodies
      for (var i = 0; i < bodies.length; i++) {
        var b = bodies[i];
        if (b === activeProjectile) continue;
        var dx = b.x - activeProjectile.x;
        var dy = b.y - activeProjectile.y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120 && dist > 0) {
          var force = (120 - dist) * 3;
          b.vx += (dx / dist) * force;
          b.vy += (dy / dist) * force;
          b.hp -= 5;
        }
      }
      // Visual burst
      for (var i = 0; i < 12; i++) {
        var angle = (i/12) * Math.PI * 2;
        particles.push({
          x: activeProjectile.x, y: activeProjectile.y,
          vx: Math.cos(angle) * 100, vy: Math.sin(angle) * 100,
          life: 0.4, col: '#ddbbdd', size: 3,
        });
      }
      SFX.splat();
      break;

    case 'chilli':
      // Speed boost forward
      activeProjectile.vx *= 2;
      activeProjectile.vy *= 0.5;
      activeProjectile.mass = 5; // heavier = more damage
      // Fire trail particles
      for (var i = 0; i < 6; i++) {
        particles.push({
          x: activeProjectile.x - i * 3, y: activeProjectile.y,
          vx: -30, vy: (Math.random()-0.5) * 20,
          life: 0.3, col: i % 2 ? '#ff6622' : '#ffaa22', size: 3 + Math.random()*2,
        });
      }
      SFX.launch();
      break;
  }
}

// ============================================================
// INPUT
// ============================================================
function worldPos(px, py) {
  var sx = (W - WORLD_W * SCALE) / 2;
  var sy = (H - WORLD_H * SCALE) / 2;
  return { x: (px - sx) / SCALE, y: (py - sy) / SCALE };
}

function getPointerPos(e) {
  var r = canvas.getBoundingClientRect();
  var t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) * (canvas.width / r.width), y: (t.clientY - r.top) * (canvas.height / r.height) };
}

canvas.addEventListener('mousedown', function(e) {
  var p = getPointerPos(e);
  handleDown(p.x, p.y);
});
canvas.addEventListener('mousemove', function(e) {
  if (!dragging) return;
  var p = getPointerPos(e);
  handleMove(p.x, p.y);
});
canvas.addEventListener('mouseup', function(e) { handleUp(); });

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var p = getPointerPos(e);
  handleDown(p.x, p.y);
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!dragging) return;
  var p = getPointerPos(e);
  handleMove(p.x, p.y);
}, { passive: false });
canvas.addEventListener('touchend', function(e) { e.preventDefault(); handleUp(); }, { passive: false });

window.addEventListener('keydown', function(e) {
  if (e.key === 'r' || e.key === 'R') {
    if (state === 'playing') { buildLevel(currentLevel); }
  }
  if (e.key === ' ') {
    e.preventDefault();
    if (state === 'menu') { state = 'playing'; currentLevel = 0; stars = []; buildLevel(0); }
    else if (state === 'levelComplete') { nextLevel(); }
    else if (state === 'gameComplete') { state = 'menu'; }
    else if (state === 'playing' && levelState === 'flying') { activateAbility(); }
  }
});

// Mute
canvas.addEventListener('click', function(e) {
  var p = getPointerPos(e);
  if (p.x >= W - 44 && p.x <= W - 8 && p.y >= 8 && p.y <= 44) {
    SFX.muted = !SFX.muted;
  }
});

function handleDown(px, py) {
  if (state === 'menu') { state = 'playing'; currentLevel = 0; stars = []; buildLevel(0); SFX.click(); return; }
  if (state === 'levelComplete') { nextLevel(); SFX.click(); return; }
  if (state === 'gameComplete') { submitScore('fling-fury', getTotalScore()); state = 'menu'; SFX.click(); return; }

  // Mute check
  if (px >= W - 44 && px <= W - 8 && py >= 8 && py <= 44) return;

  if (state !== 'playing') return;

  if (levelState === 'flying') {
    activateAbility();
    return;
  }

  if (levelState === 'complete') return;
  if (levelState === 'failed') { buildLevel(currentLevel); SFX.click(); return; }

  if (levelState !== 'aiming' || !projectile) return;

  var wp = worldPos(px, py);
  var dist = Math.sqrt((wp.x - slingX) * (wp.x - slingX) + (wp.y - slingY) * (wp.y - slingY));
  if (dist < 80) {
    dragging = true;
    dragX = wp.x;
    dragY = wp.y;
    SFX.stretch();
  }
}

function handleMove(px, py) {
  var wp = worldPos(px, py);
  dragX = wp.x;
  dragY = wp.y;

  // Clamp drag distance
  var dx = dragX - slingX, dy = dragY - slingY;
  var dist = Math.sqrt(dx*dx + dy*dy);
  var maxDrag = 80;
  if (dist > maxDrag) {
    dragX = slingX + (dx/dist) * maxDrag;
    dragY = slingY + (dy/dist) * maxDrag;
    dx = dragX - slingX; dy = dragY - slingY;
  }

  // Restrict to left-and-below quadrant only (can't shoot backwards/upward)
  // Drag must be to the left of sling (dx < 0) or below (dy > 0)
  if (dx > 0) { dragX = slingX; dx = 0; }
  if (dy < -10) { dragY = slingY - 10; dy = -10; } // slight upward allowed for low arc

  projectile.x = dragX;
  projectile.y = dragY;
}

function handleUp() {
  if (!dragging || !projectile) { dragging = false; return; }
  dragging = false;
  var dx = slingX - dragX, dy = slingY - dragY;
  var power = 8;
  launchProjectile(dx * power, dy * power);
  levelState = 'flying';
}

function nextLevel() {
  currentLevel++;
  if (currentLevel >= LEVELS.length) {
    state = 'gameComplete';
  } else {
    buildLevel(currentLevel);
    state = 'playing';
  }
}

function getTotalScore() {
  var total = 0;
  for (var i = 0; i < stars.length; i++) total += stars[i];
  return total;
}

// ============================================================
// UPDATE
// ============================================================
var state = 'menu'; // menu, playing, levelComplete, gameComplete
var lastTime = 0;

function update(dt) {
  if (state !== 'playing') return;

  updatePhysics(dt);

  // Check level state
  if (levelState === 'flying') {
    // Check if all projectiles have settled or left the screen
    var anyMoving = false;
    for (var i = 0; i < bodies.length; i++) {
      if (bodies[i].type === 'projectile' && bodies[i].alive) {
        if (bodies[i].settled < 1.5 && bodies[i].y < GROUND_Y + 50) {
          anyMoving = true;
        }
      }
    }
    if (!anyMoving) {
      levelState = 'settling';
      settleTimer = 0;
    }
  }

  if (levelState === 'settling') {
    settleTimer += dt;
    // Wait for everything to settle
    var allSettled = true;
    for (var i = 0; i < bodies.length; i++) {
      if (bodies[i].alive && bodies[i].settled < 0.5) {
        allSettled = false;
        break;
      }
    }
    if (allSettled || settleTimer > 3) {
      // Check if all rats are dead
      var ratsAlive = 0;
      for (var i = 0; i < bodies.length; i++) {
        if (bodies[i].type === 'rat' && bodies[i].alive) ratsAlive++;
      }

      if (ratsAlive === 0) {
        // Level complete
        levelState = 'complete';
        var shotsLeft = ammo.length;
        levelScore += shotsLeft * 200;
        var levelStars = shotsLeft >= 2 ? 3 : shotsLeft >= 1 ? 2 : 1;
        stars[currentLevel] = Math.max(stars[currentLevel] || 0, levelStars);
        SFX.starChime();
        state = 'levelComplete';
      } else if (ammo.length === 0) {
        // No ammo left, rats still alive
        levelState = 'failed';
        stars[currentLevel] = Math.max(stars[currentLevel] || 0, 0);
        SFX.fail();
      } else {
        // Load next projectile
        levelState = 'aiming';
        loadProjectile();
      }
    }
  }
}

// ============================================================
// DRAWING
// ============================================================
function screenX(wx) { return (W - WORLD_W * SCALE) / 2 + wx * SCALE; }
function screenY(wy) { return (H - WORLD_H * SCALE) / 2 + wy * SCALE; }

function draw() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  if (state === 'menu') { drawMenu(); return; }

  drawBackground();
  drawBodies();
  drawSlingshot();
  drawParticles();
  drawHUD();

  if (state === 'levelComplete') drawLevelComplete();
  if (state === 'gameComplete') drawGameComplete();
  if (levelState === 'failed') drawFailed();
}

function drawBackground() {
  var wl = screenX(0), wr = screenX(WORLD_W);
  var ww = WORLD_W * SCALE;
  var gy = screenY(GROUND_Y);

  // === KITCHEN WALL — full height, cream subway tiles ===
  ctx.fillStyle = '#e8e4d8';
  ctx.fillRect(wl, screenY(0), ww, GROUND_Y * SCALE);

  // Grout lines — subway tile pattern
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  var tileW = 30 * SCALE, tileH = 14 * SCALE;
  for (var y = screenY(0); y < gy; y += tileH) {
    var rowIdx = Math.floor((y - screenY(0)) / tileH);
    var offset = (rowIdx % 2) * tileW / 2;
    for (var x = wl - tileW + offset; x < wr; x += tileW) {
      ctx.strokeRect(x, y, tileW, tileH);
    }
  }

  // === BACKGROUND DECORATIONS — pre-rendered pixel art sprites ===
  // Disable smoothing so pixel art stays crisp when scaled
  ctx.imageSmoothingEnabled = false;

  // Wall decorations (positioned on wall above counter)
  // Pot rack — top center
  if (spriteCanvases.bgPotRack) {
    ctx.drawImage(spriteCanvases.bgPotRack, screenX(240), screenY(5), 180 * SCALE, 90 * SCALE);
  }
  // Window — upper right
  if (spriteCanvases.bgWindow) {
    ctx.drawImage(spriteCanvases.bgWindow, screenX(580), screenY(40), 130 * SCALE, 110 * SCALE);
  }
  // Spice shelf — left wall
  if (spriteCanvases.bgShelf) {
    ctx.drawImage(spriteCanvases.bgShelf, screenX(15), screenY(80), 130 * SCALE, 65 * SCALE);
  }

  // Counter-top items — bottom edge must align with GROUND_Y
  var gy = GROUND_Y;
  // Knife block (25w x 85h) — sits on counter
  if (spriteCanvases.bgKnifeBlock) {
    var kbH = 85;
    ctx.drawImage(spriteCanvases.bgKnifeBlock, screenX(160), screenY(gy - kbH), 25 * SCALE, kbH * SCALE);
  }
  // Dirty dishes (80w x 55h) — sits on counter
  if (spriteCanvases.bgDirtyDishes) {
    var ddH = 55;
    ctx.drawImage(spriteCanvases.bgDirtyDishes, screenX(620), screenY(gy - ddH), 80 * SCALE, ddH * SCALE);
  }
  // Stove with pot (140w x 110h) — sits on counter
  if (spriteCanvases.bgStove) {
    var stH = 110;
    ctx.drawImage(spriteCanvases.bgStove, screenX(350), screenY(gy - stH), 140 * SCALE, stH * SCALE);
  }
  // Sink (90w x 65h) — sits on counter
  if (spriteCanvases.bgSink) {
    var snH = 65;
    ctx.drawImage(spriteCanvases.bgSink, screenX(700), screenY(gy - snH), 90 * SCALE, snH * SCALE);
  }

  ctx.imageSmoothingEnabled = true;

  // === COUNTER SURFACE ===
  ctx.fillStyle = '#d0ccc4';
  ctx.fillRect(wl, gy, ww, (WORLD_H - GROUND_Y) * SCALE);
  // Counter front edge — dark bevel
  ctx.fillStyle = '#aaa8a0';
  ctx.fillRect(wl, gy, ww, 4 * SCALE);
  ctx.fillStyle = '#999890';
  ctx.fillRect(wl, gy + 4 * SCALE, ww, 2 * SCALE);
  // Marble speckle (fixed positions, not random per frame)
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (var i = 0; i < 30; i++) {
    var sx = wl + ((i * 137 + 50) % 800) * SCALE;
    var sy = gy + 8 * SCALE + ((i * 89 + 20) % 50) * SCALE;
    ctx.fillRect(sx, sy, 3 * SCALE, 1 * SCALE);
  }
}

function drawSlingshot() {
  ctx.imageSmoothingEnabled = false;
  var lx = screenX(slingX), ly = screenY(slingY);
  var ladleSprite = spriteCanvases.ladle;
  // Calculate sling sprite dimensions and position
  var sw = 48 * SCALE * 0.8, sh = 64 * SCALE * 0.8;
  var groundScreen = screenY(GROUND_Y);
  var slingTop = groundScreen - sh;
  // Fork tips are at ~6px and ~36px across the 48px sprite, ~4px from top of 64px sprite
  var forkLeftX = lx - sw/2 + (8/48) * sw;
  var forkRightX = lx - sw/2 + (40/48) * sw;
  var forkY = slingTop + (6/64) * sh;

  if (ladleSprite) {
    ctx.drawImage(ladleSprite, lx - sw/2, slingTop, sw, sh);
  }

  // Draw rubber bands when dragging
  if (dragging && projectile) {
    var px = screenX(projectile.x), py = screenY(projectile.y);
    ctx.strokeStyle = '#cc4444';
    ctx.lineWidth = 3 * SCALE;
    ctx.beginPath(); ctx.moveTo(forkLeftX, forkY); ctx.lineTo(px, py); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(forkRightX, forkY); ctx.lineTo(px, py); ctx.stroke();

    // Draw trajectory dots — must match actual launch physics
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    var launchVX = (slingX - projectile.x) * 8; // same power as launch
    var launchVY = (slingY - projectile.y) * 8;
    for (var i = 1; i <= 12; i++) {
      var t = i * 0.04;
      var tx = projectile.x + launchVX * t;
      var ty = projectile.y + launchVY * t + 0.5 * GRAVITY * t * t;
      if (ty > GROUND_Y || tx > WORLD_W) break;
      ctx.globalAlpha = 0.4 - i * 0.025;
      ctx.beginPath(); ctx.arc(screenX(tx), screenY(ty), 2 * SCALE, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Draw projectile on slingshot
  if (projectile && !launched) {
    drawFoodSprite(projectile.type, projectile.x, projectile.y, projectile.w, projectile.h);
  }
  ctx.imageSmoothingEnabled = true;
}

function drawFoodSprite(type, x, y, w, h) {
  var sprite = spriteCanvases[type];
  if (sprite) {
    var sw = w * SCALE, sh = h * SCALE;
    ctx.drawImage(sprite, 0, 0, sprite.width, sprite.height, screenX(x) - sw/2, screenY(y) - sh/2, sw, sh);
  }
}

function drawBodies() {
  ctx.imageSmoothingEnabled = false;
  for (var i = 0; i < bodies.length; i++) {
    var b = bodies[i];
    if (!b.alive) continue;
    var sprite = b.getSprite();
    if (!sprite) continue;
    var sx = screenX(b.x), sy = screenY(b.y);
    var sw = b.w * SCALE, sh = b.h * SCALE;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(b.angle);
    ctx.drawImage(sprite, 0, 0, sprite.width, sprite.height, -sw/2, -sh/2, sw, sh);

    // Damage indicator — subtle crack lines, not a red box
    if (b.hp < b.getHP() * 0.5 && b.type !== 'projectile') {
      var dmgAlpha = 0.4 * (1 - b.hp / b.getHP());
      ctx.strokeStyle = 'rgba(80,30,10,' + dmgAlpha + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-sw*0.3, -sh*0.2);
      ctx.lineTo(sw*0.1, sh*0.1);
      ctx.lineTo(-sw*0.1, sh*0.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(sw*0.2, -sh*0.3);
      ctx.lineTo(0, 0);
      ctx.stroke();
    }

    ctx.restore();
  }
  ctx.imageSmoothingEnabled = true;
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life * 2);
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(screenX(p.x), screenY(p.y), p.size * SCALE, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  var pad = 12;

  // Level number
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.floor(18 * SCALE) + 'px "Segoe UI", Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Level ' + (currentLevel + 1), pad, pad + 18 * SCALE);

  // Zone name
  var zone = currentLevel < 5 ? 'Countertop' : currentLevel < 10 ? 'Stovetop' : 'Pantry';
  ctx.fillStyle = '#aabbcc';
  ctx.font = Math.floor(12 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText(zone, pad, pad + 34 * SCALE);

  // Score
  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold ' + Math.floor(16 * SCALE) + 'px "Segoe UI", Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Score: ' + levelScore, W/2, pad + 18 * SCALE);

  // Rats remaining
  var ratsAlive = 0;
  for (var i = 0; i < bodies.length; i++) {
    if (bodies[i].type === 'rat' && bodies[i].alive) ratsAlive++;
  }
  ctx.fillStyle = '#ff8866';
  ctx.textAlign = 'right';
  ctx.fillText('Rats: ' + ratsAlive + '/' + totalRats, W - pad - 40, pad + 18 * SCALE);

  // Ammo display
  ctx.textAlign = 'left';
  var ammoX = pad;
  var ammoY = H - pad - 24 * SCALE;
  ctx.fillStyle = '#ddd';
  ctx.font = Math.floor(11 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Ammo:', ammoX, ammoY - 4 * SCALE);
  for (var i = 0; i < ammo.length; i++) {
    var sprite = spriteCanvases[ammo[i]];
    if (sprite) {
      var aSize = 20 * SCALE;
      ctx.drawImage(sprite, 0, 0, sprite.width, sprite.height, ammoX + i * (aSize + 4*SCALE), ammoY, aSize, aSize);
    }
  }

  // Ability hint
  if (levelState === 'flying' && activeProjectile && activeProjectile.alive && !abilityUsed) {
    var abilityText = '';
    switch(activeProjectile.material) {
      case 'egg': abilityText = 'TAP to split!'; break;
      case 'onion': abilityText = 'TAP for shockwave!'; break;
      case 'chilli': abilityText = 'TAP to boost!'; break;
    }
    if (abilityText) {
      ctx.fillStyle = 'rgba(255,255,100,0.8)';
      ctx.font = 'bold ' + Math.floor(14 * SCALE) + 'px "Segoe UI", Arial';
      ctx.textAlign = 'center';
      ctx.fillText(abilityText, W/2, H - pad - 50 * SCALE);
    }
  }

  // Retry hint
  if (levelState === 'aiming' || levelState === 'failed') {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = Math.floor(10 * SCALE) + 'px "Segoe UI", Arial';
    ctx.textAlign = 'right';
    ctx.fillText('Tap / R = Retry', W - pad - 40, H - pad);
  }

  // Mute
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(W - 42, 10, 32, 32);
  ctx.fillStyle = '#aaa';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(SFX.muted ? 'X' : String.fromCharCode(9835), W - 26, 31);
}

function drawMenu() {
  // Background
  var skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#88bbee');
  skyGrad.addColorStop(1, '#ccddee');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#dd4411';
  ctx.font = 'bold ' + Math.floor(48 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('FLING FURY', W/2, H * 0.25);

  ctx.fillStyle = '#886644';
  ctx.font = Math.floor(18 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Kitchen Chaos — Launch food at rat-infested dish forts!', W/2, H * 0.34);

  // Draw food sprites as preview
  var foods = ['tomato', 'egg', 'onion', 'chilli'];
  var previewY = H * 0.48;
  foods.forEach(function(type, i) {
    var sprite = spriteCanvases[type];
    if (sprite) {
      var sz = 40 * SCALE;
      var x = W/2 + (i - 1.5) * sz * 1.5;
      ctx.drawImage(sprite, 0, 0, sprite.width, sprite.height, x - sz/2, previewY - sz/2, sz, sz);
    }
  });

  ctx.fillStyle = '#555';
  ctx.font = Math.floor(14 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Drag to aim, release to fire. Tap mid-flight for special abilities!', W/2, H * 0.62);

  ctx.fillStyle = '#448833';
  ctx.font = 'bold ' + Math.floor(20 * SCALE) + 'px "Segoe UI", Arial';
  var pulse = 0.7 + Math.sin(Date.now() * 0.004) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillText('TAP TO START', W/2, H * 0.78);
  ctx.globalAlpha = 1;
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold ' + Math.floor(36 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Level Complete!', W/2, H * 0.3);

  ctx.fillStyle = '#fff';
  ctx.font = Math.floor(18 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Score: ' + levelScore, W/2, H * 0.42);

  // Stars
  var starSize = 30 * SCALE;
  var levelStars = stars[currentLevel] || 0;
  for (var i = 0; i < 3; i++) {
    ctx.fillStyle = i < levelStars ? '#ffcc22' : '#444';
    ctx.font = Math.floor(starSize) + 'px Arial';
    ctx.fillText(i < levelStars ? '\u2605' : '\u2606', W/2 + (i - 1) * starSize * 1.2, H * 0.55);
  }

  ctx.fillStyle = '#88ff88';
  ctx.font = Math.floor(16 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Tap to continue', W/2, H * 0.72);
}

function drawFailed() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff6644';
  ctx.font = 'bold ' + Math.floor(30 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Out of ammo!', W/2, H * 0.35);

  ctx.fillStyle = '#ccc';
  ctx.font = Math.floor(16 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Tap to retry', W/2, H * 0.5);
}

function drawGameComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold ' + Math.floor(40 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Kitchen Cleared!', W/2, H * 0.25);

  ctx.fillStyle = '#fff';
  ctx.font = Math.floor(20 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('All rats evicted!', W/2, H * 0.37);

  // Total stars
  var total = getTotalScore();
  ctx.fillStyle = '#ffcc22';
  ctx.font = 'bold ' + Math.floor(24 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Total Stars: ' + total + ' / ' + (LEVELS.length * 3), W/2, H * 0.5);

  ctx.fillStyle = '#88ff88';
  ctx.font = Math.floor(16 * SCALE) + 'px "Segoe UI", Arial';
  ctx.fillText('Tap to submit score & return to menu', W/2, H * 0.7);
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(ts) {
  var dt = Math.min(0.033, (ts - lastTime) / 1000);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

initSprites();
requestAnimationFrame(function(ts) { lastTime = ts; gameLoop(ts); });

</script>
