function drawTerrainTile(ctx, type, tileSize, palConfig, rng, decorations, decorationDensity) {
  const s = tileSize;
  const pal = palConfig || {};
  let base, dark, light, detail;

  switch (type) {
    case 'grass':
      base = pal.base || '#4a8c3f'; dark = pal.dark || '#2d6b24'; light = pal.light || '#6baa5e'; detail = pal.detail || '#3d7a33';
      break;
    case 'dirt':
      base = pal.base || '#8b6914'; dark = pal.dark || '#6b4e10'; light = pal.light || '#aa8433'; detail = pal.detail || '#7a5c12';
      break;
    case 'stone':
      base = pal.base || '#888888'; dark = pal.dark || '#666666'; light = pal.light || '#aaaaaa'; detail = pal.detail || '#777777';
      break;
    case 'water':
      base = pal.base || '#2266aa'; dark = pal.dark || '#1a4488'; light = pal.light || '#4499cc'; detail = pal.detail || '#3388bb';
      break;
    case 'sand':
      base = pal.base || '#deb887'; dark = pal.dark || '#c4a06a'; light = pal.light || '#f0d8a8'; detail = pal.detail || '#d4b880';
      break;
    case 'snow':
      base = pal.base || '#e8e8f0'; dark = pal.dark || '#c8c8d8'; light = pal.light || '#ffffff'; detail = pal.detail || '#d8d8e8';
      break;
    case 'lava':
      base = pal.base || '#cc3300'; dark = pal.dark || '#991100'; light = pal.light || '#ff6600'; detail = pal.detail || '#ff4400';
      break;
    case 'wood':
      base = pal.base || '#8b6914'; dark = pal.dark || '#6b4e10'; light = pal.light || '#aa8433'; detail = pal.detail || '#7a5c12';
      break;
    default:
      base = '#ff00ff'; dark = '#aa00aa'; light = '#ff66ff'; detail = '#cc33cc';
  }

  // Base fill
  ctx.fillStyle = base;
  ctx.fillRect(0, 0, s, s);

  // Texture noise
  for (let i = 0; i < s * s * 0.1; i++) {
    const x = Math.floor(rng() * s);
    const y = Math.floor(rng() * s);
    ctx.fillStyle = rng() > 0.5 ? dark : light;
    ctx.fillRect(x, y, 1, 1);
  }

  // Type-specific texture
  if (type === 'grass') {
    for (let i = 0; i < 8; i++) {
      const gx = rng() * s;
      const gy = rng() * s;
      ctx.strokeStyle = rng() > 0.5 ? light : detail;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(gx, gy);
      ctx.lineTo(gx + (rng() - 0.5) * 3, gy - 2 - rng() * 3);
      ctx.stroke();
    }
  } else if (type === 'stone') {
    ctx.strokeStyle = dark;
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 3; i++) {
      const sx = rng() * s;
      const sy = rng() * s;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + (rng() - 0.5) * s * 0.4, sy + (rng() - 0.5) * s * 0.2);
      ctx.stroke();
    }
  } else if (type === 'water') {
    ctx.fillStyle = light;
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < 3; i++) {
      const wx = rng() * s;
      const wy = rng() * s;
      ctx.beginPath();
      ctx.ellipse(wx, wy, s * 0.12, s * 0.03, rng() * Math.PI, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (type === 'lava') {
    ctx.fillStyle = light;
    ctx.globalAlpha = 0.4;
    for (let i = 0; i < 2; i++) {
      const lx = rng() * s;
      const ly = rng() * s;
      ctx.beginPath();
      ctx.arc(lx, ly, s * 0.08, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (type === 'wood') {
    ctx.strokeStyle = dark;
    ctx.lineWidth = 0.5;
    for (let i = 0; i < s; i += Math.floor(s / 5)) {
      ctx.beginPath();
      ctx.moveTo(0, i + rng() * 2);
      ctx.lineTo(s, i + rng() * 2);
      ctx.stroke();
    }
    // Wood grain
    ctx.strokeStyle = light;
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 2; i++) {
      const y = rng() * s;
      ctx.beginPath();
      ctx.arc(rng() * s, y, s * 0.15, 0, Math.PI);
      ctx.stroke();
    }
  } else if (type === 'sand') {
    for (let i = 0; i < 12; i++) {
      ctx.fillStyle = rng() > 0.5 ? light : detail;
      ctx.fillRect(Math.floor(rng() * s), Math.floor(rng() * s), 1, 1);
    }
  } else if (type === 'snow') {
    ctx.fillStyle = light;
    ctx.globalAlpha = 0.5;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(rng() * s, rng() * s, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Decorations
  if (decorations && decorations.length > 0) {
    for (const deco of decorations) {
      if (rng() > decorationDensity) continue;
      const dx = rng() * s;
      const dy = rng() * s;
      switch (deco) {
        case 'flowers':
          ctx.fillStyle = ['#ff4466', '#ffaa33', '#ff66aa', '#aaddff'][Math.floor(rng() * 4)];
          ctx.beginPath();
          ctx.arc(dx, dy, 1.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ffff44';
          ctx.fillRect(Math.floor(dx), Math.floor(dy), 1, 1);
          break;
        case 'pebbles':
          ctx.fillStyle = rng() > 0.5 ? '#999' : '#777';
          ctx.beginPath();
          ctx.ellipse(dx, dy, 2, 1.5, rng() * Math.PI, 0, Math.PI * 2);
          ctx.fill();
          break;
        case 'cracks':
          ctx.strokeStyle = dark;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(dx, dy);
          ctx.lineTo(dx + (rng() - 0.5) * 8, dy + (rng() - 0.5) * 8);
          ctx.lineTo(dx + (rng() - 0.5) * 12, dy + (rng() - 0.5) * 12);
          ctx.stroke();
          break;
        case 'moss':
          ctx.fillStyle = '#4a8a3a';
          ctx.globalAlpha = 0.5;
          ctx.beginPath();
          ctx.arc(dx, dy, 2 + rng() * 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          break;
        case 'grass_tufts':
          ctx.strokeStyle = '#3a7a2a';
          ctx.lineWidth = 0.7;
          for (let g = 0; g < 3; g++) {
            ctx.beginPath();
            ctx.moveTo(dx + g * 1.5, dy);
            ctx.lineTo(dx + g * 1.5 + (rng() - 0.5) * 2, dy - 3 - rng() * 3);
            ctx.stroke();
          }
          break;
      }
    }
  }
}

function drawAutoTile(ctx, type, tileSize, palConfig, mask, rng) {
  const s = tileSize;
  const pal = palConfig || {};

  // Get colors for this terrain type
  let base, dark, light;
  switch (type) {
    case 'grass': base = pal.base || '#4a8c3f'; dark = pal.dark || '#2d6b24'; light = pal.light || '#6baa5e'; break;
    case 'dirt': base = pal.base || '#8b6914'; dark = pal.dark || '#6b4e10'; light = pal.light || '#aa8433'; break;
    case 'stone': base = pal.base || '#888888'; dark = pal.dark || '#666666'; light = pal.light || '#aaaaaa'; break;
    case 'water': base = pal.base || '#2266aa'; dark = pal.dark || '#1a4488'; light = pal.light || '#4499cc'; break;
    case 'sand': base = pal.base || '#deb887'; dark = pal.dark || '#c4a06a'; light = pal.light || '#f0d8a8'; break;
    case 'snow': base = pal.base || '#e8e8f0'; dark = pal.dark || '#c8c8d8'; light = pal.light || '#ffffff'; break;
    case 'lava': base = pal.base || '#cc3300'; dark = pal.dark || '#991100'; light = pal.light || '#ff6600'; break;
    case 'wood': base = pal.base || '#8b6914'; dark = pal.dark || '#6b4e10'; light = pal.light || '#aa8433'; break;
    default: base = '#ff00ff'; dark = '#aa00aa'; light = '#ff66ff';
  }

  const edgeColor = Palette.darken(base, 0.5);
  const half = s / 2;

  // Fill base
  ctx.fillStyle = base;
  ctx.fillRect(0, 0, s, s);

  // Add some noise
  for (let i = 0; i < s * s * 0.05; i++) {
    ctx.fillStyle = rng() > 0.5 ? dark : light;
    ctx.fillRect(Math.floor(rng() * s), Math.floor(rng() * s), 1, 1);
  }

  // 4-bit: up=1, right=2, down=4, left=8
  const hasUp = !!(mask & 1);
  const hasRight = !!(mask & 2);
  const hasDown = !!(mask & 4);
  const hasLeft = !!(mask & 8);

  const edgeW = Math.max(2, Math.floor(s * 0.12));

  // Draw edges where neighbor is absent
  if (!hasUp) {
    ctx.fillStyle = dark;
    ctx.fillRect(0, 0, s, edgeW);
    ctx.fillStyle = edgeColor;
    ctx.fillRect(0, 0, s, 1);
  }
  if (!hasDown) {
    ctx.fillStyle = dark;
    ctx.fillRect(0, s - edgeW, s, edgeW);
    ctx.fillStyle = edgeColor;
    ctx.fillRect(0, s - 1, s, 1);
  }
  if (!hasLeft) {
    ctx.fillStyle = dark;
    ctx.fillRect(0, 0, edgeW, s);
    ctx.fillStyle = edgeColor;
    ctx.fillRect(0, 0, 1, s);
  }
  if (!hasRight) {
    ctx.fillStyle = dark;
    ctx.fillRect(s - edgeW, 0, edgeW, s);
    ctx.fillStyle = edgeColor;
    ctx.fillRect(s - 1, 0, 1, s);
  }

  // Inner highlights for present neighbors
  if (hasUp) {
    ctx.fillStyle = light;
    ctx.globalAlpha = 0.3;
    ctx.fillRect(0, 0, s, 1);
    ctx.globalAlpha = 1;
  }
  if (hasLeft) {
    ctx.fillStyle = light;
    ctx.globalAlpha = 0.3;
    ctx.fillRect(0, 0, 1, s);
    ctx.globalAlpha = 1;
  }
}

function drawPanel9Slice(ctx, style, w, h, cornerRadius, borderWidth) {
  let bg, border, highlight, shadow;
  switch (style) {
    case 'stone': bg = '#555566'; border = '#333344'; highlight = '#777788'; shadow = '#222233'; break;
    case 'wood': bg = '#8b6914'; border = '#5a3a0a'; highlight = '#aa8833'; shadow = '#4a2a05'; break;
    case 'metal': bg = '#6a6a7e'; border = '#3a3a4e'; highlight = '#8a8a9e'; shadow = '#2a2a3e'; break;
    case 'dark': bg = '#222233'; border = '#111122'; highlight = '#333344'; shadow = '#000011'; break;
    case 'light':
    default: bg = '#e8e0d0'; border = '#a09080'; highlight = '#fff8f0'; shadow = '#887766'; break;
  }

  const cr = cornerRadius || Math.min(w, h) * 0.1;
  const bw = borderWidth || 2;

  // Outer border
  ctx.fillStyle = border;
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, cr);
  ctx.fill();

  // Inner fill
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(bw, bw, w - bw * 2, h - bw * 2, Math.max(0, cr - bw));
  ctx.fill();

  // Top highlight
  ctx.fillStyle = highlight;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(bw + 2, bw + 1, w - bw * 2 - 4, Math.max(1, bw));
  ctx.globalAlpha = 1;

  // Bottom shadow
  ctx.fillStyle = shadow;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(bw + 2, h - bw * 2, w - bw * 2 - 4, Math.max(1, bw));
  ctx.globalAlpha = 1;
}

function drawButton(ctx, style, w, h, state) {
  let bg, border, text;
  switch (style) {
    case 'stone': bg = '#667788'; border = '#445566'; break;
    case 'wood': bg = '#aa8833'; border = '#775500'; break;
    case 'metal': bg = '#8888aa'; border = '#555577'; break;
    default: bg = '#5577bb'; border = '#334488'; break;
  }

  const pressed = state === 'pressed';
  const hover = state === 'hover';
  const disabled = state === 'disabled';

  if (disabled) { bg = Palette.darken(bg, 0.3); border = Palette.darken(border, 0.3); }
  if (hover) { bg = Palette.lighten(bg, 0.15); }

  const yOff = pressed ? 1 : 0;
  const shadowH = pressed ? 1 : 3;

  // Shadow
  ctx.fillStyle = Palette.darken(border, 0.3);
  ctx.beginPath();
  ctx.roundRect(0, shadowH, w, h, 4);
  ctx.fill();

  // Button body
  ctx.fillStyle = border;
  ctx.beginPath();
  ctx.roundRect(0, yOff, w, h - 2, 4);
  ctx.fill();

  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(1, yOff + 1, w - 2, h - 4, 3);
  ctx.fill();

  // Top highlight
  if (!pressed) {
    ctx.fillStyle = Palette.lighten(bg, 0.3);
    ctx.globalAlpha = 0.4;
    ctx.fillRect(3, yOff + 2, w - 6, Math.max(1, Math.floor(h * 0.15)));
    ctx.globalAlpha = 1;
  }
}

function drawBar(ctx, w, h, style, fillColor, bgColor, borderColor, fillPercent) {
  const bc = borderColor || '#333';
  const bg = bgColor || '#222';
  const fc = fillColor || '#44cc44';
  const fp = clamp(fillPercent || 1, 0, 1);

  // Border
  ctx.fillStyle = bc;
  if (style === 'rounded') {
    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, h / 2);
    ctx.fill();
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.roundRect(1, 1, w - 2, h - 2, (h - 2) / 2);
    ctx.fill();
    if (fp > 0) {
      ctx.fillStyle = fc;
      ctx.beginPath();
      ctx.roundRect(2, 2, (w - 4) * fp, h - 4, (h - 4) / 2);
      ctx.fill();
      // Shine
      ctx.fillStyle = Palette.lighten(fc, 0.4);
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.roundRect(3, 3, (w - 4) * fp - 2, Math.max(1, (h - 4) * 0.35), 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  } else if (style === 'segmented') {
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = bg;
    ctx.fillRect(1, 1, w - 2, h - 2);
    const segCount = Math.floor(w / (h * 0.8));
    const segW = (w - 4) / segCount;
    const filled = Math.floor(segCount * fp);
    for (let i = 0; i < segCount; i++) {
      ctx.fillStyle = i < filled ? fc : Palette.darken(bg, 0.2);
      ctx.fillRect(2 + i * segW + 1, 2, segW - 2, h - 4);
    }
  } else {
    // smooth
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = bg;
    ctx.fillRect(1, 1, w - 2, h - 2);
    if (fp > 0) {
      ctx.fillStyle = fc;
      ctx.fillRect(2, 2, (w - 4) * fp, h - 4);
      ctx.fillStyle = Palette.lighten(fc, 0.3);
      ctx.globalAlpha = 0.4;
      ctx.fillRect(2, 2, (w - 4) * fp, Math.max(1, (h - 4) * 0.35));
      ctx.globalAlpha = 1;
    }
  }
}

function drawIcon(ctx, name, size, color) {
  const s = size;
  const cx = s / 2;
  const cy = s / 2;
  const c = color || '#ffffff';
  const sc = shade3(c);

  switch (name) {
    case 'heart': {
      ctx.beginPath();
      ctx.moveTo(cx, cy + s * 0.15);
      ctx.bezierCurveTo(cx - s * 0.3, cy - s * 0.05, cx - s * 0.3, cy - s * 0.28, cx, cy - s * 0.12);
      ctx.bezierCurveTo(cx + s * 0.3, cy - s * 0.28, cx + s * 0.3, cy - s * 0.05, cx, cy + s * 0.15);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = sc.base;
      ctx.fill();
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.1, cy - s * 0.12, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'star': {
      const pts = [];
      for (let i = 0; i < 10; i++) {
        const a = (i * Math.PI * 2 / 10) - Math.PI / 2;
        const r = i % 2 === 0 ? s * 0.35 : s * 0.15;
        pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
      }
      outlinedPoly(ctx, pts, sc.base);
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.05, cy - s * 0.08, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'coin': {
      outlinedCircle(ctx, cx, cy, s * 0.3, sc.base);
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.arc(cx - s * 0.06, cy - s * 0.06, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'gem': {
      outlinedPoly(ctx, [
        [cx, cy - s * 0.3],
        [cx + s * 0.25, cy],
        [cx, cy + s * 0.3],
        [cx - s * 0.25, cy],
      ], sc.base);
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.3);
      ctx.lineTo(cx + s * 0.25, cy);
      ctx.lineTo(cx, cy + s * 0.08);
      ctx.fill();
      ctx.fillStyle = sc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.08), Math.floor(cy - s * 0.15), 2, Math.ceil(s * 0.1));
      break;
    }
    case 'sword': {
      // Blade
      outlinedPoly(ctx, [
        [cx, cy - s * 0.35],
        [cx + s * 0.06, cy + s * 0.05],
        [cx - s * 0.06, cy + s * 0.05],
      ], '#ccc');
      ctx.fillStyle = '#eee';
      ctx.fillRect(Math.floor(cx - 1), Math.floor(cy - s * 0.3), 1, Math.ceil(s * 0.3));
      outlinedRect(ctx, cx - s * 0.15, cy + s * 0.03, s * 0.3, s * 0.04, '#8b6914');
      outlinedRect(ctx, cx - s * 0.04, cy + s * 0.07, s * 0.08, s * 0.18, '#6b4e10');
      break;
    }
    case 'shield': {
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.3);
      ctx.lineTo(cx + s * 0.25, cy - s * 0.15);
      ctx.lineTo(cx + s * 0.2, cy + s * 0.15);
      ctx.lineTo(cx, cy + s * 0.3);
      ctx.lineTo(cx - s * 0.2, cy + s * 0.15);
      ctx.lineTo(cx - s * 0.25, cy - s * 0.15);
      ctx.closePath();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = sc.base;
      ctx.fill();
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s * 0.15);
      ctx.lineTo(cx + s * 0.12, cy);
      ctx.lineTo(cx, cy + s * 0.18);
      ctx.lineTo(cx - s * 0.12, cy);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'potion': {
      outlinedRect(ctx, cx - s * 0.06, cy - s * 0.25, s * 0.12, s * 0.1, '#aaddaa');
      outlinedRect(ctx, cx - s * 0.08, cy - s * 0.28, s * 0.16, s * 0.04, '#a0724a');
      outlinedEllipse(ctx, cx, cy + s * 0.08, s * 0.18, s * 0.22, '#aaddaa');
      ctx.fillStyle = sc.base;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.ellipse(cx, cy + s * 0.08, s * 0.14, s * 0.16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    }
    case 'key': {
      outlinedCircle(ctx, cx - s * 0.08, cy - s * 0.1, s * 0.12, sc.base);
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx - s * 0.08, cy - s * 0.1, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      outlinedRect(ctx, cx - s * 0.02, cy - s * 0.12, s * 0.28, s * 0.04, sc.base);
      outlinedRect(ctx, cx + s * 0.18, cy - s * 0.1, s * 0.04, s * 0.08, sc.shadow);
      outlinedRect(ctx, cx + s * 0.1, cy - s * 0.1, s * 0.04, s * 0.06, sc.shadow);
      break;
    }
    case 'gear': {
      const teeth = 8;
      const outerR = s * 0.3;
      const innerR = s * 0.2;
      const pts = [];
      for (let i = 0; i < teeth * 2; i++) {
        const a = (i * Math.PI / teeth) - Math.PI / 2;
        const r = i % 2 === 0 ? outerR : innerR;
        pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
      }
      outlinedPoly(ctx, pts, sc.base);
      ctx.fillStyle = sc.shadow;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.05, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'arrow': {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-Math.PI / 4);
      // Shaft
      outlinedRect(ctx, -1, -s * 0.25, 2, s * 0.5, '#8b6914');
      // Head
      outlinedPoly(ctx, [
        [0, -s * 0.32],
        [-s * 0.08, -s * 0.2],
        [s * 0.08, -s * 0.2],
      ], '#aaa');
      // Fletching
      outlinedPoly(ctx, [
        [-1, s * 0.2],
        [-s * 0.06, s * 0.28],
        [-1, s * 0.25],
      ], '#cc4444');
      outlinedPoly(ctx, [
        [1, s * 0.2],
        [s * 0.06, s * 0.28],
        [1, s * 0.25],
      ], '#cc4444');
      ctx.restore();
      break;
    }
    case 'fire': {
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.15, cy + s * 0.2);
      ctx.quadraticCurveTo(cx - s * 0.2, cy - s * 0.1, cx - s * 0.05, cy - s * 0.15);
      ctx.quadraticCurveTo(cx - s * 0.08, cy - s * 0.25, cx, cy - s * 0.32);
      ctx.quadraticCurveTo(cx + s * 0.08, cy - s * 0.25, cx + s * 0.05, cy - s * 0.15);
      ctx.quadraticCurveTo(cx + s * 0.2, cy - s * 0.1, cx + s * 0.15, cy + s * 0.2);
      ctx.closePath();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#ff6600';
      ctx.fill();
      // Inner
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.06, cy + s * 0.15);
      ctx.quadraticCurveTo(cx - s * 0.08, cy, cx, cy - s * 0.15);
      ctx.quadraticCurveTo(cx + s * 0.08, cy, cx + s * 0.06, cy + s * 0.15);
      ctx.fillStyle = '#ffcc00';
      ctx.fill();
      break;
    }
    case 'ice': {
      // Snowflake
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const a = i * Math.PI / 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * s * 0.28, cy + Math.sin(a) * s * 0.28);
        ctx.lineTo(cx - Math.cos(a) * s * 0.28, cy - Math.sin(a) * s * 0.28);
        ctx.stroke();
      }
      ctx.strokeStyle = sc.base;
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 3; i++) {
        const a = i * Math.PI / 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * s * 0.26, cy + Math.sin(a) * s * 0.26);
        ctx.lineTo(cx - Math.cos(a) * s * 0.26, cy - Math.sin(a) * s * 0.26);
        ctx.stroke();
        // Branches
        for (let d = -1; d <= 1; d += 2) {
          const bx = cx + Math.cos(a) * s * 0.15;
          const by = cy + Math.sin(a) * s * 0.15;
          const ba = a + d * Math.PI / 4;
          ctx.beginPath();
          ctx.moveTo(bx, by);
          ctx.lineTo(bx + Math.cos(ba) * s * 0.08, by + Math.sin(ba) * s * 0.08);
          ctx.stroke();
        }
      }
      outlinedCircle(ctx, cx, cy, s * 0.04, sc.highlight);
      break;
    }
    case 'lightning': {
      outlinedPoly(ctx, [
        [cx + s * 0.05, cy - s * 0.35],
        [cx - s * 0.08, cy - s * 0.02],
        [cx + s * 0.06, cy - s * 0.02],
        [cx - s * 0.05, cy + s * 0.35],
        [cx + s * 0.08, cy + s * 0.02],
        [cx - s * 0.06, cy + s * 0.02],
      ], sc.base);
      ctx.fillStyle = sc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.02), Math.floor(cy - s * 0.2), 2, Math.ceil(s * 0.15));
      break;
    }
    case 'skull': {
      outlinedCircle(ctx, cx, cy - s * 0.05, s * 0.22, '#eee');
      // Eye sockets
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(cx - s * 0.08, cy - s * 0.08, s * 0.06, s * 0.07, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + s * 0.08, cy - s * 0.08, s * 0.06, s * 0.07, 0, 0, Math.PI * 2);
      ctx.fill();
      // Nose
      ctx.fillStyle = '#000';
      outlinedPoly(ctx, [[cx - s * 0.03, cy + s * 0.02], [cx, cy + s * 0.08], [cx + s * 0.03, cy + s * 0.02]], '#333');
      // Jaw
      outlinedRect(ctx, cx - s * 0.15, cy + s * 0.1, s * 0.3, s * 0.1, '#ddd');
      // Teeth
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = '#000';
        ctx.fillRect(Math.floor(cx - s * 0.1 + i * s * 0.07), Math.floor(cy + s * 0.1), 1, Math.ceil(s * 0.04));
      }
      break;
    }
    case 'crown': {
      outlinedRect(ctx, cx - s * 0.25, cy, s * 0.5, s * 0.18, sc.base);
      outlinedPoly(ctx, [
        [cx - s * 0.25, cy],
        [cx - s * 0.2, cy - s * 0.22],
        [cx - s * 0.1, cy - s * 0.08],
        [cx, cy - s * 0.28],
        [cx + s * 0.1, cy - s * 0.08],
        [cx + s * 0.2, cy - s * 0.22],
        [cx + s * 0.25, cy],
      ], sc.base);
      // Gems
      outlinedCircle(ctx, cx, cy - s * 0.18, s * 0.035, '#ff0044');
      outlinedCircle(ctx, cx - s * 0.18, cy - s * 0.14, s * 0.025, '#4488ff');
      outlinedCircle(ctx, cx + s * 0.18, cy - s * 0.14, s * 0.025, '#4488ff');
      ctx.fillStyle = sc.highlight;
      ctx.fillRect(Math.floor(cx - s * 0.2), Math.floor(cy + s * 0.02), Math.ceil(s * 0.4), Math.ceil(s * 0.03));
      break;
    }
    case 'music': {
      // Notes
      outlinedCircle(ctx, cx - s * 0.1, cy + s * 0.1, s * 0.08, sc.base);
      outlinedCircle(ctx, cx + s * 0.1, cy + s * 0.02, s * 0.08, sc.base);
      // Stems
      outlinedRect(ctx, cx - s * 0.04, cy - s * 0.25, 2, s * 0.37, sc.base);
      outlinedRect(ctx, cx + s * 0.16, cy - s * 0.33, 2, s * 0.37, sc.base);
      // Beam
      outlinedRect(ctx, cx - s * 0.04, cy - s * 0.27, s * 0.22, s * 0.04, sc.base);
      break;
    }
    case 'pause': {
      outlinedRect(ctx, cx - s * 0.18, cy - s * 0.22, s * 0.12, s * 0.44, sc.base);
      outlinedRect(ctx, cx + s * 0.06, cy - s * 0.22, s * 0.12, s * 0.44, sc.base);
      break;
    }
    case 'play': {
      outlinedPoly(ctx, [
        [cx - s * 0.15, cy - s * 0.25],
        [cx + s * 0.22, cy],
        [cx - s * 0.15, cy + s * 0.25],
      ], sc.base);
      ctx.fillStyle = sc.highlight;
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.08, cy - s * 0.12);
      ctx.lineTo(cx + s * 0.05, cy - s * 0.02);
      ctx.lineTo(cx - s * 0.08, cy + s * 0.08);
      ctx.fill();
      break;
    }
    default:
      outlinedRect(ctx, cx - s * 0.2, cy - s * 0.2, s * 0.4, s * 0.4, '#ff00ff');
      break;
  }
}

// ---------------------------------------------------------------------------
// Effect Drawing
// ---------------------------------------------------------------------------

function drawEffect(ctx, type, size, color, frame, totalFrames) {
  const s = size;
  const cx = s / 2;
  const cy = s / 2;
  const t = totalFrames > 1 ? frame / (totalFrames - 1) : 0;
  const ec = shade3(color || '#ff8800');
  const rng = seededRNG(frame * 31 + 7);

  switch (type) {
    case 'explosion': {
      const radius = s * 0.1 + t * s * 0.35;
      const alpha = 1 - t * 0.8;
      ctx.globalAlpha = alpha;
      // Outer glow
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = s * 0.1;
      outlinedCircle(ctx, cx, cy, radius, ec.base);
      ctx.shadowBlur = 0;
      // Inner
      outlinedCircle(ctx, cx, cy, radius * 0.6, ec.highlight);
      // Core
      if (t < 0.5) {
        outlinedCircle(ctx, cx, cy, radius * 0.25, '#fff');
      }
      // Particles
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + rng() * 0.3;
        const d = radius * (0.8 + rng() * 0.5);
        const px = cx + Math.cos(a) * d;
        const py = cy + Math.sin(a) * d;
        const pr = s * 0.02 * (1 - t);
        if (pr > 0.5) {
          ctx.fillStyle = rng() > 0.5 ? ec.base : ec.highlight;
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'muzzleFlash': {
      const alpha = 1 - t;
      ctx.globalAlpha = alpha;
      const len = s * 0.3 * (1 - t * 0.5);
      const w = s * 0.08 * (1 - t * 0.7);
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = s * 0.08;
      // Main flash
      outlinedEllipse(ctx, cx + len * 0.3, cy, len, w, ec.highlight);
      // Core
      outlinedEllipse(ctx, cx, cy, len * 0.3, w * 0.5, '#fff');
      // Side flashes
      for (let i = 0; i < 3; i++) {
        const a = (i - 1) * 0.6;
        const fl = len * (0.3 + rng() * 0.3);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(a);
        outlinedEllipse(ctx, fl * 0.4, 0, fl, w * 0.4, ec.base);
        ctx.restore();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      break;
    }
    case 'magicCircle': {
      const alpha = 0.5 + Math.sin(t * Math.PI) * 0.5;
      const rot = t * Math.PI * 2;
      ctx.globalAlpha = alpha;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      // Outer ring
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = ec.base;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
      ctx.stroke();
      // Inner ring
      ctx.strokeStyle = ec.highlight;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.22, 0, Math.PI * 2);
      ctx.stroke();
      // Runes (small circles)
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const rx = Math.cos(a) * s * 0.28;
        const ry = Math.sin(a) * s * 0.28;
        ctx.fillStyle = ec.highlight;
        ctx.beginPath();
        ctx.arc(rx, ry, s * 0.03, 0, Math.PI * 2);
        ctx.fill();
      }
      // Inner star
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const x = Math.cos(a) * s * 0.2;
        const y = Math.sin(a) * s * 0.2;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.strokeStyle = ec.base;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
      // Center glow
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = 6;
      ctx.fillStyle = ec.highlight;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      break;
    }
    case 'slash': {
      const alpha = 1 - t * 0.7;
      ctx.globalAlpha = alpha;
      const sweep = t * Math.PI * 1.2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(-Math.PI * 0.6 + sweep * 0.3);
      // Slash arc
      const startAngle = -Math.PI * 0.3;
      const endAngle = startAngle + sweep;
      const thickness = s * 0.06 * (1 - t * 0.5);
      for (let r = s * 0.15; r < s * 0.4; r += thickness) {
        ctx.beginPath();
        ctx.arc(0, 0, r, startAngle, endAngle);
        ctx.lineWidth = thickness;
        ctx.strokeStyle = r < s * 0.25 ? '#fff' : ec.base;
        ctx.stroke();
      }
      // Trail particles
      for (let i = 0; i < 5; i++) {
        const a = startAngle + (endAngle - startAngle) * rng();
        const d = s * 0.2 + rng() * s * 0.2;
        ctx.fillStyle = ec.highlight;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * d, Math.sin(a) * d, s * 0.015 * (1 - t), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha = 1;
      break;
    }
    case 'impact': {
      const alpha = 1 - t;
      ctx.globalAlpha = alpha;
      const spread = t * s * 0.35;
      // Central flash
      if (t < 0.3) {
        outlinedCircle(ctx, cx, cy, s * 0.08 * (1 - t), '#fff');
      }
      // Radial lines
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + rng() * 0.3;
        const innerR = spread * 0.3;
        const outerR = spread + rng() * s * 0.05;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
        ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
        ctx.stroke();
        ctx.strokeStyle = i % 2 === 0 ? ec.base : ec.highlight;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * innerR, cy + Math.sin(a) * innerR);
        ctx.lineTo(cx + Math.cos(a) * outerR, cy + Math.sin(a) * outerR);
        ctx.stroke();
      }
      // Debris
      for (let i = 0; i < 6; i++) {
        const a = rng() * Math.PI * 2;
        const d = spread * (0.5 + rng() * 0.5);
        const sz = s * 0.02 * (1 - t);
        if (sz > 0.5) {
          ctx.fillStyle = ec.base;
          ctx.fillRect(Math.floor(cx + Math.cos(a) * d), Math.floor(cy + Math.sin(a) * d), Math.ceil(sz), Math.ceil(sz));
        }
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'aura': {
      const pulse = 0.7 + Math.sin(t * Math.PI * 2) * 0.3;
      const radius = s * 0.3 * pulse;
      // Outer glow
      ctx.globalAlpha = 0.2 + pulse * 0.15;
      ctx.shadowColor = ec.base;
      ctx.shadowBlur = s * 0.15;
      ctx.beginPath();
      ctx.arc(cx, cy, radius + s * 0.05, 0, Math.PI * 2);
      ctx.fillStyle = ec.base;
      ctx.fill();
      ctx.shadowBlur = 0;
      // Main aura
      ctx.globalAlpha = 0.3 + pulse * 0.2;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fillStyle = ec.base;
      ctx.fill();
      // Inner glow
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = ec.highlight;
      ctx.fill();
      // Rising particles
      ctx.globalAlpha = 0.8;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + t * Math.PI;
        const d = radius * (0.5 + Math.sin(t * Math.PI * 2 + i) * 0.3);
        const py = cy + Math.sin(t * Math.PI * 2 + i * 2) * s * 0.05;
        ctx.fillStyle = ec.highlight;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * d, py + Math.sin(a) * d * 0.3, s * 0.02, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    }
    default:
      outlinedCircle(ctx, cx, cy, s * 0.3, ec.base);
      break;
  }
}

// ---------------------------------------------------------------------------
// SpriteForge - Main API
// ---------------------------------------------------------------------------

const _cache = new SpriteCache(256);

/**
 * Main procedural sprite generation API.
 * All methods cache results automatically.
 */
class SpriteForge {
  /**
   * Generate a complete animated character sprite sheet.
   * @param {object} config - Character configuration
   * @returns {{ sheet: SpriteSheet, animator: SpriteAnimator, animations: object }}
   */
  static character(config) {
    const key = JSON.stringify({ _type: 'character', ...config });
    const cached = _cache.get(key);
    if (cached) {
      const anims = buildCharAnimDefs(config, cached);
      return { sheet: cached, animator: new SpriteAnimator(cached, anims), animations: anims };
    }

    const style = config.style || 'humanoid';
    const size = config.size || 32;
    const animConfig = config.animations || {
      idle: { frames: 4, speed: 0.2 },
      walk: { frames: 6, speed: 0.1 },
      attack: { frames: 4, speed: 0.08 },
      hurt: { frames: 2, speed: 0.1 },
      death: { frames: 4, speed: 0.15 },
    };

    // Count total frames
    let totalFrames = 0;
    const animNames = Object.keys(animConfig);
    for (const name of animNames) totalFrames += animConfig[name].frames;

    // Compute grid
    const cols = Math.ceil(Math.sqrt(totalFrames));
    const rows = Math.ceil(totalFrames / cols);
    const canvas = sf_makeCanvas(cols * size, rows * size);
    const ctx = canvas.getContext('2d');

    let frameIdx = 0;
    for (const animName of animNames) {
      const ac = animConfig[animName];
      for (let f = 0; f < ac.frames; f++) {
        const col = frameIdx % cols;
        const row = Math.floor(frameIdx / cols);
        {
          // Draw to a temp canvas with extra headroom so tall features (hair, hats) aren't clipped.
          // Then bottom-align and copy the bottom size×size pixels into the real frame.
          const headroom = Math.ceil(size * 0.4);
          const tmpCvs = sf_makeCanvas(size, size + headroom);
          const tmpCtx = tmpCvs.getContext('2d');
          tmpCtx.translate(0, headroom); // draw origin offset down by headroom

          if (style === 'humanoid') {
            drawHumanoidFrame(tmpCtx, config, size, animName, f, ac.frames);
          } else if (style === 'creature') {
            drawCreatureFrame(tmpCtx, config, size, animName, f, ac.frames);
          } else if (style === 'robot') {
            drawRobotFrame(tmpCtx, config, size, animName, f, ac.frames);
          }

          bottomAlignFrame(tmpCtx, 0, 0, size, size + headroom);
          // Copy bottom size rows into the real sheet frame
          ctx.drawImage(tmpCvs, 0, headroom, size, size, col * size, row * size, size, size);
        }
        frameIdx++;
      }
    }

    const sheet = new SpriteSheet(canvas, size, size, cols, rows);

    // Name frames
    let idx = 0;
    for (const animName of animNames) {
      const ac = animConfig[animName];
      for (let f = 0; f < ac.frames; f++) {
        sheet.nameFrame(`${animName}_${f}`, idx);
        idx++;
      }
    }

    _cache.set(key, sheet);
    const anims = buildCharAnimDefs(config, sheet);
    return { sheet, animator: new SpriteAnimator(sheet, anims), animations: anims };
  }

  /**
   * Generate a prop sprite (weapon, item, structure).
   * @param {object} config - Prop configuration
   * @returns {{ sheet: SpriteSheet, animator?: SpriteAnimator }}
   */
  static prop(config) {
    const key = JSON.stringify({ _type: 'prop', ...config });
    const cached = _cache.get(key);
    if (cached) {
      const result = { sheet: cached };
      if (config.animated) {
        const frames = config.animFrames || 4;
        const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed: config.animSpeed || 0.15, loop: true } };
        result.animator = new SpriteAnimator(cached, anims);
      }
      return result;
    }

    const size = config.size || 32;
    const name = config.name || 'sword';
    const animated = config.animated || false;
    const frames = animated ? (config.animFrames || 4) : 1;
    const cols = frames;
    const rows = 1;

    const canvas = sf_makeCanvas(cols * size, rows * size);
    const ctx = canvas.getContext('2d');

    for (let f = 0; f < frames; f++) {
      ctx.save();
      ctx.translate(f * size, 0);
      ctx.clearRect(0, 0, size, size);
      drawProp(ctx, name, size, config.palette, config.variant || 0, f, frames);
      ctx.restore();
      bottomAlignFrame(ctx, f * size, 0, size, size);
    }

    const sheet = new SpriteSheet(canvas, size, size, cols, rows);
    for (let f = 0; f < frames; f++) {
      sheet.nameFrame(`${name}_${f}`, f);
    }
    _cache.set(key, sheet);

    const result = { sheet };
    if (animated) {
      const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed: config.animSpeed || 0.15, loop: true } };
      result.animator = new SpriteAnimator(sheet, anims);
    }
    return result;
  }

  /**
   * Generate terrain tiles.
   * @param {object} config - Terrain configuration
   * @returns {{ sheet: SpriteSheet, getTile: Function }}
   */
  static terrain(config) {
    const key = JSON.stringify({ _type: 'terrain', ...config });
    const cached = _cache.get(key);
    if (cached) {
      return { sheet: cached, getTile: (neighbors) => autoTileLookup(neighbors) };
    }

    const type = config.type || 'grass';
    const tileSize = config.tileSize || 32;
    const variation = config.variation || 1;
    const autoTile = config.autoTile || false;
    const decorations = config.decorations || [];
    const decorationDensity = config.decorationDensity || 0.3;
    const animated = config.animated || false;
    const animFrames = animated ? (config.animFrames || 4) : 1;

    let totalTiles;
    if (autoTile) {
      totalTiles = 16 * animFrames; // 16 autotile variants per frame
    } else {
      totalTiles = variation * animFrames;
    }

    const cols = Math.ceil(Math.sqrt(totalTiles));
    const rows = Math.ceil(totalTiles / cols);
    const canvas = sf_makeCanvas(cols * tileSize, rows * tileSize);
    const ctx = canvas.getContext('2d');

    let idx = 0;
    if (autoTile) {
      for (let af = 0; af < animFrames; af++) {
        for (let mask = 0; mask < 16; mask++) {
          const col = idx % cols;
          const row = Math.floor(idx / cols);
          ctx.save();
          ctx.translate(col * tileSize, row * tileSize);
          ctx.clearRect(0, 0, tileSize, tileSize);
          const rng = seededRNG(mask * 1000 + af * 100 + type.charCodeAt(0));
          drawAutoTile(ctx, type, tileSize, config.palette, mask, rng);
          // Animated variation (slight shift for water/lava)
          if (animated && af > 0) {
            const shift = af * 2;
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = af % 2 === 0 ? Palette.lighten(config.palette?.base || '#4488cc', 0.2) : Palette.darken(config.palette?.base || '#4488cc', 0.2);
            ctx.fillRect(shift, shift, tileSize - shift * 2, tileSize - shift * 2);
            ctx.globalAlpha = 1;
          }
          ctx.restore();
          idx++;
        }
      }
    } else {
      for (let af = 0; af < animFrames; af++) {
        for (let v = 0; v < variation; v++) {
          const col = idx % cols;
          const row = Math.floor(idx / cols);
          ctx.save();
          ctx.translate(col * tileSize, row * tileSize);
          ctx.clearRect(0, 0, tileSize, tileSize);
          const rng = seededRNG(v * 1000 + af * 100 + type.charCodeAt(0));
          drawTerrainTile(ctx, type, tileSize, config.palette, rng, decorations, decorationDensity);
          if (animated && af > 0) {
            const rng2 = seededRNG(af * 31 + v);
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = af % 2 === 0 ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            for (let i = 0; i < 3; i++) {
              const wx = rng2() * tileSize;
              const wy = rng2() * tileSize;
              ctx.beginPath();
              ctx.ellipse(wx, wy, tileSize * 0.15, tileSize * 0.04, rng2() * Math.PI, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
          }
          ctx.restore();
          idx++;
        }
      }
    }

    const sheet = new SpriteSheet(canvas, tileSize, tileSize, cols, rows);
    _cache.set(key, sheet);

    /**
     * Get tile index from neighbor bitmask.
     * @param {{ up: boolean, right: boolean, down: boolean, left: boolean }} neighbors
     * @param {number} [animFrame=0]
     * @returns {number}
     */
    function getTile(neighbors, animFrame = 0) {
      if (!autoTile) {
        return (animFrame * variation) + Math.floor(Math.random() * variation);
      }
      let mask = 0;
      if (neighbors.up) mask |= 1;
      if (neighbors.right) mask |= 2;
      if (neighbors.down) mask |= 4;
      if (neighbors.left) mask |= 8;
      return animFrame * 16 + mask;
    }

    return { sheet, getTile };
  }

  /**
   * Generate UI elements (panels, buttons, bars, icons).
   * @param {object} config - UI configuration
   * @returns {{ sheet: SpriteSheet }}
   */
  static ui(config) {
    const key = JSON.stringify({ _type: 'ui', ...config });
    const cached = _cache.get(key);
    if (cached) return { sheet: cached };

    const type = config.type || 'icon';

    if (type === 'panel') {
      const panel = config.panel || {};
      const w = panel.width || 64;
      const h = panel.height || 64;
      const canvas = sf_makeCanvas(w, h);
      const ctx = canvas.getContext('2d');
      drawPanel9Slice(ctx, panel.style || 'light', w, h, panel.cornerRadius, panel.borderWidth);
      const sheet = new SpriteSheet(canvas, w, h, 1, 1);
      sheet.nameFrame('panel', 0);
      _cache.set(key, sheet);
      return { sheet };
    }

    if (type === 'button') {
      const btn = config.button || {};
      const w = btn.width || 80;
      const h = btn.height || 28;
      const states = btn.states || ['normal', 'hover', 'pressed', 'disabled'];
      const canvas = sf_makeCanvas(w * states.length, h);
      const ctx = canvas.getContext('2d');
      for (let i = 0; i < states.length; i++) {
        ctx.save();
        ctx.translate(i * w, 0);
        drawButton(ctx, btn.style || 'default', w, h, states[i]);
        ctx.restore();
      }
      const sheet = new SpriteSheet(canvas, w, h, states.length, 1);
      states.forEach((s, i) => sheet.nameFrame(s, i));
      _cache.set(key, sheet);
      return { sheet };
    }

    if (type === 'bar') {
      const bar = config.bar || {};
      const w = bar.width || 80;
      const h = bar.height || 12;
      const steps = 11; // 0% to 100% in 10% increments
      const canvas = sf_makeCanvas(w * steps, h);
      const ctx = canvas.getContext('2d');
      for (let i = 0; i < steps; i++) {
        ctx.save();
        ctx.translate(i * w, 0);
        drawBar(ctx, w, h, bar.style || 'smooth', bar.colors?.fill, bar.colors?.bg, bar.colors?.border, i / (steps - 1));
        ctx.restore();
      }
      const sheet = new SpriteSheet(canvas, w, h, steps, 1);
      for (let i = 0; i < steps; i++) sheet.nameFrame(`fill_${i * 10}`, i);
      _cache.set(key, sheet);
      return { sheet };
    }

    if (type === 'icon') {
      const icon = config.icon || {};
      const s = icon.size || 24;
      const iconName = icon.name || 'heart';
      const canvas = sf_makeCanvas(s, s);
      const ctx = canvas.getContext('2d');
      drawIcon(ctx, iconName, s, icon.color || '#ffffff');
      const sheet = new SpriteSheet(canvas, s, s, 1, 1);
      sheet.nameFrame(iconName, 0);
      _cache.set(key, sheet);
      return { sheet };
    }

    // Fallback
    const canvas = sf_makeCanvas(32, 32);
    const sheet = new SpriteSheet(canvas, 32, 32, 1, 1);
    return { sheet };
  }

  /**
   * Generate animated visual effect sprites.
   * @param {object} config - Effect configuration
   * @returns {{ sheet: SpriteSheet, animator: SpriteAnimator }}
   */
  static effect(config) {
    const key = JSON.stringify({ _type: 'effect', ...config });
    const cached = _cache.get(key);
    if (cached) {
      const frames = config.frames || 6;
      const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed: config.speed || 0.08, loop: false } };
      return { sheet: cached, animator: new SpriteAnimator(cached, anims) };
    }

    const type = config.type || 'explosion';
    const size = config.size || 48;
    const color = config.color || '#ff8800';
    const frames = config.frames || 6;
    const speed = config.speed || 0.08;

    const cols = frames;
    const rows = 1;
    const canvas = sf_makeCanvas(cols * size, rows * size);
    const ctx = canvas.getContext('2d');

    for (let f = 0; f < frames; f++) {
      ctx.save();
      ctx.translate(f * size, 0);
      ctx.clearRect(0, 0, size, size);
      drawEffect(ctx, type, size, color, f, frames);
      ctx.restore();
    }

    const sheet = new SpriteSheet(canvas, size, size, cols, rows);
    for (let f = 0; f < frames; f++) {
      sheet.nameFrame(`${type}_${f}`, f);
    }
    _cache.set(key, sheet);

    const anims = { default: { frames: Array.from({ length: frames }, (_, i) => i), speed, loop: false } };
    return { sheet, animator: new SpriteAnimator(sheet, anims) };
  }

  /** Clear the global sprite cache. */
  static clearCache() {
    _cache.clear();
  }
}

// ---------------------------------------------------------------------------
// Internal helpers
// ---------------------------------------------------------------------------

function buildCharAnimDefs(config, sheet) {
  const animConfig = config.animations || {
    idle: { frames: 4, speed: 0.2 },
    walk: { frames: 6, speed: 0.1 },
    attack: { frames: 4, speed: 0.08 },
    hurt: { frames: 2, speed: 0.1 },
    death: { frames: 4, speed: 0.15 },
  };
  const anims = {};
  let idx = 0;
  for (const [name, ac] of Object.entries(animConfig)) {
    const indices = [];
    for (let f = 0; f < ac.frames; f++) indices.push(idx++);
    anims[name] = {
      frames: indices,
      speed: ac.speed || 0.1,
      loop: name !== 'death' && name !== 'hurt',
      pingpong: name === 'idle',
    };
  }
  return anims;
}

function autoTileLookup(neighbors) {
  let mask = 0;
  if (neighbors.up) mask |= 1;
  if (neighbors.right) mask |= 2;
  if (neighbors.down) mask |= 4;
  if (neighbors.left) mask |= 8;
  return mask;
}

function initMap() {
  map = [];
  for (var y = 0; y < MH; y++) {
    map[y] = [];
    for (var x = 0; x < MW; x++) map[y][x] = 0;
  }
  // Castle in center (3x3)
  for (var dy = -1; dy <= 1; dy++)
    for (var dx = -1; dx <= 1; dx++)
      map[CY+dy][CX+dx] = 2;
  // Paths from 4 edges to castle
  var paths = [
    {sx:0,sy:CY,ex:CX-2,ey:CY},    // west
    {sx:MW-1,sy:CY,ex:CX+2,ey:CY},  // east
    {sx:CX,sy:0,ex:CX,ey:CY-2},     // north
    {sx:CX,sy:MH-1,ex:CX,ey:CY+2},  // south
  ];
  for (var i = 0; i < paths.length; i++) {
    var p = paths[i];
    var x = p.sx, y = p.sy;
    while (x !== p.ex || y !== p.ey) {
      if (map[y][x] === 0) map[y][x] = 3;
      if (x < p.ex) x++; else if (x > p.ex) x--;
      if (y < p.ey) y++; else if (y > p.ey) y--;
    }
  }
}

function canPlace(tx, ty) {
  if (tx < 0 || tx >= MW || ty < 0 || ty >= MH) return false;
  if (map[ty][tx] !== 0) return false; // only on grass
  // Not on player position
  if (Math.abs(tx - player.x) < 0.5 && Math.abs(ty - player.y) < 0.5) return false;
  return true;
}
