<script>
// ========================================================================
// BUNDLED VISUAL ENGINE DEMO
// All engine code inlined for file:// protocol compatibility.
// No external dependencies or imports.
// ========================================================================

// ========================================================================
// SHARED UTILITIES
// ========================================================================

// clamp: defined in shared utilities above

// lerp: defined in shared utilities above

// ========== RENDER PIPELINE ==========

/**
 * Render Pipeline — 2D canvas rendering pipeline with layers, camera,
 * lighting, shadows, tinting, and post-processing effects.
 *
 * Pure ES module. Zero dependencies.
 *
 * @module render-pipeline
 */

// ---------------------------------------------------------------------------
// Default configuration
// ---------------------------------------------------------------------------

const DEFAULT_CONFIG = {
  layers: [
    { name: 'bg',          worldSpace: true },
    { name: 'terrain',     worldSpace: true },
    { name: 'shadows',     worldSpace: true },
    { name: 'entities',    worldSpace: true },
    { name: 'projectiles', worldSpace: true },
    { name: 'fx',          worldSpace: true },
    { name: 'ui',          worldSpace: false },
  ],
  lighting: {
    enabled: true,
    ambient: { color: '#111122', intensity: 0.3 },
    applyAfterLayer: 'fx',
  },
  shadowMode: 'blob',
  postfx: {
    bloom:               { enabled: false, threshold: 0.7, intensity: 0.4, radius: 8 },
    vignette:            { enabled: false, radius: 0.75, softness: 0.45, color: '#000000', intensity: 0.5 },
    chromaticAberration: { enabled: false, offset: 2 },
    crt:                 { enabled: false, scanlineAlpha: 0.08, curvature: 0.02 },
    colorGrade:          { enabled: false, hue: 0, saturation: 1, contrast: 1, brightness: 1, temperature: 0 },
    screenFlash:         { enabled: true },
  },
  pixelPerfect: false,
};

// ---------------------------------------------------------------------------
// Easing helpers
// ---------------------------------------------------------------------------

const Easing = {
  /** @param {number} t 0..1 */
  linear(t)        { return t; },
  easeInQuad(t)    { return t * t; },
  easeOutQuad(t)   { return t * (2 - t); },
  easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; },
  easeOutElastic(t) {
    if (t === 0 || t === 1) return t;
    return Math.pow(2, -10 * t) * Math.sin((t - 0.075) * (2 * Math.PI) / 0.3) + 1;
  },
  easeOutBounce(t) {
    if (t < 1 / 2.75)      return 7.5625 * t * t;
    if (t < 2 / 2.75)      { t -= 1.5 / 2.75;   return 7.5625 * t * t + 0.75; }
    if (t < 2.5 / 2.75)    { t -= 2.25 / 2.75;  return 7.5625 * t * t + 0.9375; }
    t -= 2.625 / 2.75;     return 7.5625 * t * t + 0.984375;
  },
  easeOutBack(t) {
    const s = 1.70158;
    return 1 + (--t) * t * ((s + 1) * t + s);
  },
};

/**
 * Resolve an easing function from a string name or function reference.
 * @param {string|Function} e
 * @returns {Function}
 */
function resolveEasing(e) {
  if (typeof e === 'function') return e;
  return Easing[e] || Easing.linear;
}

// ---------------------------------------------------------------------------
// Utility: create an offscreen canvas
// ---------------------------------------------------------------------------

/**
 * Create an offscreen canvas of the given dimensions.
 * Uses OffscreenCanvas when available, otherwise creates a regular canvas.
 * @param {number} w
 * @param {number} h
 * @returns {{ canvas: HTMLCanvasElement|OffscreenCanvas, ctx: CanvasRenderingContext2D }}
 */
function rp_makeCanvas(w, h) {
  let canvas, ctx;
  try {
    canvas = new OffscreenCanvas(w, h);
    ctx = canvas.getContext('2d');
  } catch (_) {
    canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    ctx = canvas.getContext('2d');
  }
  return { canvas, ctx };
}

/**
 * Parse a CSS colour string into {r, g, b} 0-255.
 * @param {string} color
 * @returns {{ r: number, g: number, b: number }}
 */
function rp_parseColor(color) {
  if (color.startsWith('#')) {
    let hex = color.slice(1);
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    return {
      r: parseInt(hex.slice(0, 2), 16),
      g: parseInt(hex.slice(2, 4), 16),
      b: parseInt(hex.slice(4, 6), 16),
    };
  }
  // Fallback: try rgba() / rgb()
  const m = color.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
  if (m) return { r: +m[1], g: +m[2], b: +m[3] };
  return { r: 0, g: 0, b: 0 };
}

/**
 * Clamp a number.
 * @param {number} v
 * @param {number} lo
 * @param {number} hi
 * @returns {number}
 */
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

/**
 * Linear interpolation.
 * @param {number} a
 * @param {number} b
 * @param {number} t
 * @returns {number}
 */
function lerp(a, b, t) { return a + (b - a) * t; }

// ---------------------------------------------------------------------------
// Camera
// ---------------------------------------------------------------------------

/**
 * Camera with smooth follow, zoom, and screen-shake.
 */
class Camera {
  /**
   * @param {number} width  — viewport width in pixels
   * @param {number} height — viewport height in pixels
   */
  constructor(width, height) {
    /** Current world-space centre X. */
    this.x = 0;
    /** Current world-space centre Y. */
    this.y = 0;
    /** Viewport width. */
    this.width = width;
    /** Viewport height. */
    this.height = height;
    /** Current zoom level (1 = no zoom). */
    this.zoom = 1;

    // -- follow state --
    this._followTarget = null;
    this._followOpts = { lerp: 0.1, offsetX: 0, offsetY: 0, deadzone: null };

    // -- shake state --
    this._shakeIntensity = 0;
    this._shakeDuration = 0;
    this._shakeElapsed = 0;
    this._shakeDecay = 'linear';
    this._shakeDirection = null; // null = both axes
    this._shakeOffsetX = 0;
    this._shakeOffsetY = 0;

    // -- zoom animation --
    this._zoomFrom = 1;
    this._zoomTo = 1;
    this._zoomDuration = 0;
    this._zoomElapsed = 0;
    this._zoomEasing = Easing.easeOutQuad;
  }

  /**
   * Begin smooth-follow of a target object (must have .x, .y).
   * @param {{ x: number, y: number }} target
   * @param {{ lerp?: number, offsetX?: number, offsetY?: number, deadzone?: { x: number, y: number, w: number, h: number }|null }} [opts]
   */
  follow(target, opts = {}) {
    this._followTarget = target;
    this._followOpts = {
      lerp: opts.lerp ?? 0.1,
      offsetX: opts.offsetX ?? 0,
      offsetY: opts.offsetY ?? 0,
      deadzone: opts.deadzone ?? null,
    };
  }

  /**
   * Trigger screen shake.
   * @param {number} intensity — max pixel offset
   * @param {number} duration  — seconds
   * @param {{ decay?: string, direction?: 'x'|'y'|null }} [opts]
   */
  shake(intensity, duration, opts = {}) {
    this._shakeIntensity = intensity;
    this._shakeDuration = duration;
    this._shakeElapsed = 0;
    this._shakeDecay = opts.decay || 'linear';
    this._shakeDirection = opts.direction || null;
  }

  /**
   * Animate zoom to a new level.
   * @param {number} level
   * @param {{ duration?: number, easing?: string|Function }} [opts]
   */
  setZoom(level, opts = {}) {
    this._zoomFrom = this.zoom;
    this._zoomTo = level;
    this._zoomDuration = opts.duration ?? 0;
    this._zoomElapsed = 0;
    this._zoomEasing = resolveEasing(opts.easing || 'easeOutQuad');
    if (this._zoomDuration <= 0) this.zoom = level;
  }

  /**
   * Convert world coordinates to screen (canvas pixel) coordinates.
   * @param {number} wx
   * @param {number} wy
   * @returns {{ x: number, y: number }}
   */
  worldToScreen(wx, wy) {
    const sx = (wx - this.x) * this.zoom + this.width / 2 + this._shakeOffsetX;
    const sy = (wy - this.y) * this.zoom + this.height / 2 + this._shakeOffsetY;
    return { x: sx, y: sy };
  }

  /**
   * Convert screen coordinates to world coordinates.
   * @param {number} sx
   * @param {number} sy
   * @returns {{ x: number, y: number }}
   */
  screenToWorld(sx, sy) {
    const wx = (sx - this.width / 2 - this._shakeOffsetX) / this.zoom + this.x;
    const wy = (sy - this.height / 2 - this._shakeOffsetY) / this.zoom + this.y;
    return { x: wx, y: wy };
  }

  /**
   * Get the visible world-space rectangle (for culling).
   * @returns {{ x: number, y: number, w: number, h: number }}
   */
  getBounds() {
    const hw = (this.width / 2) / this.zoom;
    const hh = (this.height / 2) / this.zoom;
    return {
      x: this.x - hw,
      y: this.y - hh,
      w: hw * 2,
      h: hh * 2,
    };
  }

  /**
   * Apply the camera transform to a 2D context.
   * @param {CanvasRenderingContext2D} ctx
   */
  applyTransform(ctx) {
    ctx.setTransform(
      this.zoom, 0,
      0, this.zoom,
      this.width / 2 - this.x * this.zoom + this._shakeOffsetX,
      this.height / 2 - this.y * this.zoom + this._shakeOffsetY,
    );
  }

  /**
   * Advance camera state.
   * @param {number} dt — delta time in seconds
   */
  update(dt) {
    // -- follow --
    if (this._followTarget) {
      const t = this._followTarget;
      const o = this._followOpts;
      let tx = t.x + o.offsetX;
      let ty = t.y + o.offsetY;

      if (o.deadzone) {
        const dz = o.deadzone;
        const left  = this.x - dz.w / 2 + (dz.x || 0);
        const right = this.x + dz.w / 2 + (dz.x || 0);
        const top   = this.y - dz.h / 2 + (dz.y || 0);
        const bot   = this.y + dz.h / 2 + (dz.y || 0);
        if (tx < left)  tx = left + (tx - left);
        else if (tx > right) tx = right + (tx - right);
        else tx = this.x;
        if (ty < top) ty = top + (ty - top);
        else if (ty > bot) ty = bot + (ty - bot);
        else ty = this.y;
      }

      const lerpFactor = 1 - Math.pow(1 - o.lerp, dt * 60);
      this.x = lerp(this.x, tx, lerpFactor);
      this.y = lerp(this.y, ty, lerpFactor);
    }

    // -- zoom animation --
    if (this._zoomDuration > 0 && this._zoomElapsed < this._zoomDuration) {
      this._zoomElapsed += dt;
      const t = clamp(this._zoomElapsed / this._zoomDuration, 0, 1);
      this.zoom = lerp(this._zoomFrom, this._zoomTo, this._zoomEasing(t));
      if (t >= 1) this._zoomDuration = 0;
    }

    // -- shake --
    if (this._shakeDuration > 0 && this._shakeElapsed < this._shakeDuration) {
      this._shakeElapsed += dt;
      let progress = clamp(this._shakeElapsed / this._shakeDuration, 0, 1);
      let factor;
      if (this._shakeDecay === 'quadratic') {
        factor = 1 - progress * progress;
      } else {
        factor = 1 - progress;
      }
      const mag = this._shakeIntensity * factor;
      if (this._shakeDirection === 'x') {
        this._shakeOffsetX = (Math.random() * 2 - 1) * mag;
        this._shakeOffsetY = 0;
      } else if (this._shakeDirection === 'y') {
        this._shakeOffsetX = 0;
        this._shakeOffsetY = (Math.random() * 2 - 1) * mag;
      } else {
        this._shakeOffsetX = (Math.random() * 2 - 1) * mag;
        this._shakeOffsetY = (Math.random() * 2 - 1) * mag;
      }
      if (progress >= 1) {
        this._shakeOffsetX = 0;
        this._shakeOffsetY = 0;
        this._shakeDuration = 0;
      }
    } else {
      this._shakeOffsetX = 0;
      this._shakeOffsetY = 0;
    }
  }
}

// ---------------------------------------------------------------------------
// RenderPipeline
// ---------------------------------------------------------------------------

/**
 * Full-featured 2D canvas rendering pipeline with layers, camera, lighting,
 * shadows, tinting, and post-processing effects.
 */
class RenderPipeline {
  /**
   * @param {HTMLCanvasElement} canvas — the visible on-screen canvas
   * @param {{
   *   layers?: Array<{ name: string, worldSpace?: boolean }>,
   *   lighting?: { enabled?: boolean, ambient?: { color?: string, intensity?: number }, applyAfterLayer?: string },
   *   shadowMode?: 'drop'|'blob',
   *   postfx?: object,
   *   pixelPerfect?: boolean
   * }} [config]
   */
  constructor(canvas, config = {}) {
    /** @type {HTMLCanvasElement} */
    this.canvas = canvas;
    /** @type {CanvasRenderingContext2D} */
    this.ctx = canvas.getContext('2d');
    /** @type {number} */
    this.width = canvas.width;
    /** @type {number} */
    this.height = canvas.height;

    // Merge config with defaults (shallow per section)
    const cfg = {
      ...DEFAULT_CONFIG,
      ...config,
      lighting: { ...DEFAULT_CONFIG.lighting, ...(config.lighting || {}) },
      postfx:   { ...DEFAULT_CONFIG.postfx,   ...(config.postfx || {}) },
    };
    if (cfg.lighting.ambient) {
      cfg.lighting.ambient = { ...DEFAULT_CONFIG.lighting.ambient, ...(config.lighting?.ambient || {}) };
    }
    for (const key of Object.keys(DEFAULT_CONFIG.postfx)) {
      cfg.postfx[key] = { ...DEFAULT_CONFIG.postfx[key], ...(config.postfx?.[key] || {}) };
    }

    this._config = cfg;
    this._pixelPerfect = cfg.pixelPerfect;

    // -- layers --
    const layerDefs = cfg.layers || DEFAULT_CONFIG.layers;
    /** @type {Map<string, { canvas, ctx, worldSpace: boolean, index: number }>} */
    this._layers = new Map();
    layerDefs.forEach((def, i) => {
      const { canvas: c, ctx: cx } = rp_makeCanvas(this.width, this.height);
      this._layers.set(def.name, {
        canvas: c,
        ctx: cx,
        worldSpace: def.worldSpace !== false,
        index: i,
      });
    });
    /** @type {string[]} */
    this._layerOrder = layerDefs.map(d => d.name);
    /** @type {string} */
    this._activeLayer = this._layerOrder[0];

    // -- camera --
    /** @type {Camera} */
    this._camera = new Camera(this.width, this.height);

    // -- lighting --
    this._lightingEnabled = cfg.lighting.enabled;
    this._ambientColor = cfg.lighting.ambient.color;
    this._ambientIntensity = cfg.lighting.ambient.intensity;
    this._applyLightingAfter = cfg.lighting.applyAfterLayer;
    /** @type {Array<{ x: number, y: number, color: string, radius: number, intensity: number, flicker: number, pulseSpeed: number, pulseAmt: number, falloff: string }>} */
    this._frameLights = [];
    /** @type {Map<string, { x: number, y: number, color: string, radius: number, intensity: number, flicker: number, pulseSpeed: number, pulseAmt: number, falloff: string }>} */
    this._persistentLights = new Map();
    this._lightTime = 0;
    const { canvas: lc, ctx: lctx } = rp_makeCanvas(this.width, this.height);
    this._lightCanvas = lc;
    this._lightCtx = lctx;

    // -- shadow config --
    this._shadowMode = cfg.shadowMode || 'blob';

    // -- tint cache --
    /** @type {Map<string, { canvas, ctx }>} */
    this._tintCache = new Map();
    // Temp canvas for tinting
    const { canvas: tc, ctx: tctx } = rp_makeCanvas(this.width, this.height);
    this._tintTempCanvas = tc;
    this._tintTempCtx = tctx;

    // -- post-fx state --
    this._bloom    = { ...cfg.postfx.bloom };
    this._vignette = { ...cfg.postfx.vignette };
    this._chromatic = { ...cfg.postfx.chromaticAberration, _triggerOffset: 0, _triggerDuration: 0, _triggerElapsed: 0 };
    this._crt       = { ...cfg.postfx.crt };
    this._colorGrade = { ...cfg.postfx.colorGrade };
    this._flash = { active: false, color: '#fff', duration: 0, elapsed: 0 };

    // Post-fx scratch canvases (created lazily)
    this._compositeCanvas = null;
    this._compositeCtx = null;
    this._bloomDownCanvas = null;
    this._bloomDownCtx = null;
    this._bloomBlurCanvas = null;
    this._bloomBlurCtx = null;
  }

  // =========================================================================
  // Public getters
  // =========================================================================

  /**
   * The camera instance. Use to set position, follow targets, shake, etc.
   * @returns {Camera}
   */
  get camera() {
    return this._camera;
  }

  // =========================================================================
  // Frame lifecycle
  // =========================================================================

  /**
   * Begin a new frame: clear all layer canvases and reset per-frame state.
   */
  begin() {
    for (const layer of this._layers.values()) {
      layer.ctx.setTransform(1, 0, 0, 1, 0, 0);
      layer.ctx.clearRect(0, 0, this.width, this.height);
    }
    this._frameLights.length = 0;
    this._activeLayer = this._layerOrder[0];
  }

  /**
   * Switch the currently active drawing layer.
   * @param {string} name — must match a layer name from config
   */
  setLayer(name) {
    if (!this._layers.has(name)) {
      throw new Error(`RenderPipeline: unknown layer "${name}"`);
    }
    this._activeLayer = name;
  }

  /**
   * Get the raw CanvasRenderingContext2D for the current active layer.
   * This is an escape hatch for custom drawing.
   * @returns {CanvasRenderingContext2D}
   */
  getCtx() {
    return this._layers.get(this._activeLayer).ctx;
  }

  // =========================================================================
  // Drawing — primitives
  // =========================================================================

  /**
   * Draw a source onto the current layer.
   * Source can be an Image/Canvas or a renderable object { width, height, draw(ctx) }.
   * @param {HTMLImageElement|HTMLCanvasElement|OffscreenCanvas|{ width: number, height: number, draw: Function }} source
   * @param {number} x — world-space x
   * @param {number} y — world-space y
   * @param {{
   *   shadow?: boolean|object,
   *   lit?: boolean,
   *   scale?: number,
   *   scaleX?: number,
   *   scaleY?: number,
   *   rotation?: number,
   *   alpha?: number,
   *   tint?: string|null,
   *   flipX?: boolean,
   *   flipY?: boolean,
   *   anchorX?: number,
   *   anchorY?: number
   * }} [opts]
   */
  draw(source, x, y, opts = {}) {
    const layer = this._layers.get(this._activeLayer);
    const ctx = layer.ctx;
    this._applyLayerTransform(layer);

    // Resolve source dimensions
    const sw = source.width || 0;
    const sh = source.height || 0;

    // Shadow?
    if (opts.shadow) {
      this._drawShadow(source, x, y, sw, sh, opts);
    }

    // Tinting
    let renderSource = source;
    if (opts.tint) {
      renderSource = this._getTinted(source, opts.tint, sw, sh);
    }

    this._drawTransformed(ctx, renderSource, x, y, sw, sh, opts);
  }

  /**
   * Draw a filled/stroked rectangle.
   * @param {number} x
   * @param {number} y
   * @param {number} w
   * @param {number} h
   * @param {{ fill?: string, stroke?: string, lineWidth?: number, alpha?: number, rotation?: number }} [opts]
   */
  drawRect(x, y, w, h, opts = {}) {
    const layer = this._layers.get(this._activeLayer);
    const ctx = layer.ctx;
    this._applyLayerTransform(layer);

    ctx.save();
    if (opts.alpha !== undefined) ctx.globalAlpha = opts.alpha;
    if (opts.rotation) {
      ctx.translate(x + w / 2, y + h / 2);
      ctx.rotate(opts.rotation);
      ctx.translate(-(x + w / 2), -(y + h / 2));
    }
    if (opts.fill) {
      ctx.fillStyle = opts.fill;
      ctx.fillRect(x, y, w, h);
    }
    if (opts.stroke) {
      ctx.strokeStyle = opts.stroke;
      ctx.lineWidth = opts.lineWidth || 1;
      ctx.strokeRect(x, y, w, h);
    }
    ctx.restore();
  }

  /**
   * Draw a filled/stroked circle.
   * @param {number} x — centre x
   * @param {number} y — centre y
   * @param {number} r — radius
   * @param {{ fill?: string, stroke?: string, lineWidth?: number, alpha?: number }} [opts]
   */
  drawCircle(x, y, r, opts = {}) {
    const layer = this._layers.get(this._activeLayer);
    const ctx = layer.ctx;
    this._applyLayerTransform(layer);

    ctx.save();
    if (opts.alpha !== undefined) ctx.globalAlpha = opts.alpha;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    if (opts.fill) {
      ctx.fillStyle = opts.fill;
      ctx.fill();
    }
    if (opts.stroke) {
      ctx.strokeStyle = opts.stroke;
      ctx.lineWidth = opts.lineWidth || 1;
      ctx.stroke();
    }
    ctx.restore();
  }

  /**
   * Draw text.
   * @param {string} text
   * @param {number} x
   * @param {number} y
   * @param {{ font?: string, fill?: string, stroke?: string, lineWidth?: number, alpha?: number, align?: string, baseline?: string }} [opts]
   */
  drawText(text, x, y, opts = {}) {
    const layer = this._layers.get(this._activeLayer);
    const ctx = layer.ctx;
    this._applyLayerTransform(layer);

    ctx.save();
    if (opts.alpha !== undefined) ctx.globalAlpha = opts.alpha;
    if (opts.font) ctx.font = opts.font;
    if (opts.align) ctx.textAlign = opts.align;
    if (opts.baseline) ctx.textBaseline = opts.baseline;
    if (opts.fill) {
      ctx.fillStyle = opts.fill;
      ctx.fillText(text, x, y);
    }
    if (opts.stroke) {
      ctx.strokeStyle = opts.stroke;
      ctx.lineWidth = opts.lineWidth || 1;
      ctx.strokeText(text, x, y);
    }
    ctx.restore();
  }

  /**
   * Draw an entity plus its auto-generated shadow.
   * Equivalent to calling draw() with shadow: true, but allows explicit shadow config.
   * @param {*} source
   * @param {number} x
   * @param {number} y
   * @param {{ mode?: 'drop'|'blob', offsetX?: number, offsetY?: number, blur?: number, color?: string, alpha?: number, scaleX?: number, scaleY?: number } & object} [opts]
   */
  drawWithShadow(source, x, y, opts = {}) {
    this.draw(source, x, y, { ...opts, shadow: opts.shadow || true });
  }

  // =========================================================================
  // Lighting
  // =========================================================================

  /**
   * Set the ambient (global) light colour and intensity.
   * @param {string} color — CSS colour
   * @param {number} intensity — 0 (full dark) to 1 (full bright)
   */
  setAmbient(color, intensity) {
    this._ambientColor = color;
    this._ambientIntensity = clamp(intensity, 0, 1);
  }

  /**
   * Add a per-frame point light. Must be called every frame.
   * @param {number} x — world x
   * @param {number} y — world y
   * @param {{
   *   color?: string,
   *   radius?: number,
   *   intensity?: number,
   *   flicker?: number,
   *   pulseSpeed?: number,
   *   pulseAmt?: number,
   *   falloff?: 'linear'|'quadratic'
   * }} [opts]
   */
  addLight(x, y, opts = {}) {
    this._frameLights.push({
      x, y,
      color:      opts.color      || '#ffffff',
      radius:     opts.radius     || 150,
      intensity:  opts.intensity  ?? 1,
      flicker:    opts.flicker    || 0,
      pulseSpeed: opts.pulseSpeed || 0,
      pulseAmt:   opts.pulseAmt   || 0,
      falloff:    opts.falloff    || 'linear',
    });
  }

  /**
   * Add or update a persistent (static) point light by id.
   * @param {string} id
   * @param {number} x
   * @param {number} y
   * @param {object} [opts] — same opts as addLight
   */
  addPersistentLight(id, x, y, opts = {}) {
    this._persistentLights.set(id, {
      x, y,
      color:      opts.color      || '#ffffff',
      radius:     opts.radius     || 150,
      intensity:  opts.intensity  ?? 1,
      flicker:    opts.flicker    || 0,
      pulseSpeed: opts.pulseSpeed || 0,
      pulseAmt:   opts.pulseAmt   || 0,
      falloff:    opts.falloff    || 'linear',
    });
  }

  /**
   * Remove a persistent light.
   * @param {string} id
   */
  removePersistentLight(id) {
    this._persistentLights.delete(id);
  }

  // =========================================================================
  // Post-FX triggers
  // =========================================================================

  /**
   * Trigger a full-screen colour flash that fades out.
   * @param {string} color — CSS colour
   * @param {number} duration — seconds
   */
  flash(color, duration) {
    this._flash.active = true;
    this._flash.color = color;
    this._flash.duration = duration;
    this._flash.elapsed = 0;
  }

  /**
   * Trigger a temporary chromatic aberration effect.
   * @param {number} offset — pixel offset for R/B channels
   * @param {number} duration — seconds
   */
  chromaticAberration(offset, duration) {
    this._chromatic._triggerOffset = offset;
    this._chromatic._triggerDuration = duration;
    this._chromatic._triggerElapsed = 0;
    this._chromatic.enabled = true;
  }

  /**
   * Update colour-grading parameters.
   * @param {{ hue?: number, saturation?: number, contrast?: number, brightness?: number, temperature?: number, enabled?: boolean }} opts
   */
  setColorGrade(opts) {
    Object.assign(this._colorGrade, opts);
  }

  /**
   * Update bloom parameters.
   * @param {{ threshold?: number, intensity?: number, radius?: number, enabled?: boolean }} opts
   */
  setBloom(opts) {
    Object.assign(this._bloom, opts);
  }

  /**
   * Update vignette parameters.
   * @param {{ radius?: number, softness?: number, color?: string, intensity?: number, enabled?: boolean }} opts
   */
  setVignette(opts) {
    Object.assign(this._vignette, opts);
  }

  /**
   * Update CRT parameters.
   * @param {{ scanlineAlpha?: number, curvature?: number, enabled?: boolean }} opts
   */
  setCRT(opts) {
    Object.assign(this._crt, opts);
  }

  // =========================================================================
  // Frame end — compositing
  // =========================================================================

  /**
   * End the frame: composite all layers, apply lighting, run post-FX,
   * and draw the final image to the screen canvas.
   */
  end() {
    // Reset transforms on all layer contexts
    for (const layer of this._layers.values()) {
      layer.ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    // Build the composite canvas
    this._ensureComposite();
    const cCtx = this._compositeCtx;
    cCtx.setTransform(1, 0, 0, 1, 0, 0);
    cCtx.clearRect(0, 0, this.width, this.height);

    const lightingAfterIdx = this._layerOrder.indexOf(this._applyLightingAfter);

    for (let i = 0; i < this._layerOrder.length; i++) {
      const name = this._layerOrder[i];
      const layer = this._layers.get(name);

      // Draw the layer
      cCtx.globalCompositeOperation = 'source-over';
      cCtx.globalAlpha = 1;
      cCtx.drawImage(layer.canvas, 0, 0);

      // Apply lighting after the designated layer
      if (this._lightingEnabled && i === lightingAfterIdx) {
        this._renderLightMap();
        cCtx.globalCompositeOperation = 'multiply';
        cCtx.globalAlpha = 1;
        cCtx.drawImage(this._lightCanvas, 0, 0);
        cCtx.globalCompositeOperation = 'source-over';
      }
    }

    // -- Post-processing pipeline --
    let output = this._compositeCanvas;

    if (this._bloom.enabled)    output = this._applyBloom(output);
    if (this._colorGrade.enabled) output = this._applyColorGrade(output);
    if (this._chromatic.enabled)  output = this._applyChromaticAberration(output);
    if (this._crt.enabled)        output = this._applyCRT(output);
    if (this._vignette.enabled)   output = this._applyVignette(output);

    // Draw final to screen
    this.ctx.setTransform(1, 0, 0, 1, 0, 0);
    if (this._pixelPerfect) {
      this.ctx.imageSmoothingEnabled = false;
    }
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    this.ctx.drawImage(output, 0, 0, this.canvas.width, this.canvas.height);

    // Screen flash overlay (on top of everything)
    if (this._flash.active) {
      const t = clamp(this._flash.elapsed / this._flash.duration, 0, 1);
      const alpha = 1 - t;
      if (alpha > 0) {
        this.ctx.globalAlpha = alpha;
        this.ctx.fillStyle = this._flash.color;
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.globalAlpha = 1;
      }
    }
  }

  /**
   * Update time-dependent systems: camera, effect timers.
   * Call once per game tick with the delta time in seconds.
   * @param {number} dt — delta time in seconds
   */
  update(dt) {
    this._camera.update(dt);
    this._lightTime += dt;

    // Flash timer
    if (this._flash.active) {
      this._flash.elapsed += dt;
      if (this._flash.elapsed >= this._flash.duration) {
        this._flash.active = false;
      }
    }

    // Chromatic aberration trigger timer
    if (this._chromatic._triggerDuration > 0) {
      this._chromatic._triggerElapsed += dt;
      if (this._chromatic._triggerElapsed >= this._chromatic._triggerDuration) {
        this._chromatic._triggerDuration = 0;
        this._chromatic._triggerOffset = 0;
        // Disable if the base config was disabled
        if (!this._config.postfx.chromaticAberration.enabled) {
          this._chromatic.enabled = false;
        }
      }
    }
  }

  // =========================================================================
  // Internal: layer transform
  // =========================================================================

  /**
   * Apply the correct transform (camera or identity) to a layer's context.
   * @param {{ ctx: CanvasRenderingContext2D, worldSpace: boolean }} layer
   * @private
   */
  _applyLayerTransform(layer) {
    if (layer.worldSpace) {
      this._camera.applyTransform(layer.ctx);
    } else {
      layer.ctx.setTransform(1, 0, 0, 1, 0, 0);
    }
  }

  // =========================================================================
  // Internal: drawing helpers
  // =========================================================================

  /**
   * Draw a source with full transform options onto a context.
   * @private
   */
  _drawTransformed(ctx, source, x, y, sw, sh, opts) {
    const scaleX = (opts.scaleX ?? opts.scale ?? 1) * (opts.flipX ? -1 : 1);
    const scaleY = (opts.scaleY ?? opts.scale ?? 1) * (opts.flipY ? -1 : 1);
    const anchorX = opts.anchorX ?? 0.5;
    const anchorY = opts.anchorY ?? 0.5;
    const rotation = opts.rotation || 0;
    const alpha = opts.alpha ?? 1;

    const px = x - sw * anchorX * Math.abs(scaleX);
    const py = y - sh * anchorY * Math.abs(scaleY);

    ctx.save();
    if (alpha !== 1) ctx.globalAlpha = alpha;

    if (rotation !== 0 || scaleX !== 1 || scaleY !== 1) {
      const cx = x + sw * (0.5 - anchorX) * Math.abs(scaleX);
      const cy = y + sh * (0.5 - anchorY) * Math.abs(scaleY);
      ctx.translate(cx, cy);
      if (rotation) ctx.rotate(rotation);
      ctx.scale(scaleX, scaleY);
      ctx.translate(-cx, -cy);
    }

    if (typeof source.draw === 'function' && !(source instanceof HTMLImageElement || source instanceof HTMLCanvasElement)) {
      // Renderable object
      ctx.save();
      ctx.translate(px, py);
      source.draw(ctx);
      ctx.restore();
    } else {
      ctx.drawImage(source, px, py, sw * Math.abs(scaleX), sh * Math.abs(scaleY));
    }
    ctx.restore();
  }

  // =========================================================================
  // Internal: shadows
  // =========================================================================

  /**
   * Draw a shadow for the given source onto the 'shadows' layer.
   * @private
   */
  _drawShadow(source, x, y, sw, sh, opts) {
    const shadowLayer = this._layers.get('shadows');
    if (!shadowLayer) return;

    const scfg = typeof opts.shadow === 'object' ? opts.shadow : {};
    const mode = scfg.mode || this._shadowMode;
    const sctx = shadowLayer.ctx;
    this._applyLayerTransform(shadowLayer);

    const baseScaleX = opts.scaleX ?? opts.scale ?? 1;
    const baseScaleY = opts.scaleY ?? opts.scale ?? 1;

    if (mode === 'drop') {
      const offsetX = scfg.offsetX ?? 4;
      const offsetY = scfg.offsetY ?? 8;
      const blur    = scfg.blur    ?? 4;
      const color   = scfg.color   || 'rgba(0,0,0,0.5)';
      const alpha   = scfg.alpha   ?? 0.5;

      sctx.save();
      sctx.globalAlpha = alpha;
      sctx.filter = `blur(${blur}px)`;

      // Draw a dark silhouette at offset
      const dx = x + offsetX;
      const dy = y + offsetY;
      const anchorX = opts.anchorX ?? 0.5;
      const anchorY = opts.anchorY ?? 0.5;
      const px = dx - sw * anchorX * baseScaleX;
      const py = dy - sh * anchorY * baseScaleY;

      // Use temp canvas to create silhouette
      this._tintTempCtx.setTransform(1, 0, 0, 1, 0, 0);
      this._tintTempCtx.clearRect(0, 0, sw * baseScaleX + 2, sh * baseScaleY + 2);
      if (typeof source.draw === 'function' && !(source instanceof HTMLImageElement || source instanceof HTMLCanvasElement)) {
        source.draw(this._tintTempCtx);
      } else {
        this._tintTempCtx.drawImage(source, 0, 0, sw * baseScaleX, sh * baseScaleY);
      }
      this._tintTempCtx.globalCompositeOperation = 'source-atop';
      this._tintTempCtx.fillStyle = color;
      this._tintTempCtx.fillRect(0, 0, sw * baseScaleX, sh * baseScaleY);
      this._tintTempCtx.globalCompositeOperation = 'source-over';

      sctx.drawImage(this._tintTempCanvas, 0, 0, sw * baseScaleX, sh * baseScaleY, px, py, sw * baseScaleX, sh * baseScaleY);
      sctx.filter = 'none';
      sctx.restore();

    } else {
      // blob shadow
      const sScaleX = scfg.scaleX ?? 0.8;
      const sScaleY = scfg.scaleY ?? 0.3;
      const alpha   = scfg.alpha ?? 0.35;
      const color   = scfg.color || 'rgba(0,0,0,1)';
      const offsetY = scfg.offsetY ?? (sh * baseScaleY * 0.45);

      const ellipseW = sw * baseScaleX * sScaleX;
      const ellipseH = sh * baseScaleY * sScaleY;
      const anchorX = opts.anchorX ?? 0.5;
      const cx = x + sw * (0.5 - anchorX) * baseScaleX;
      const cy = y + offsetY;

      sctx.save();
      sctx.globalAlpha = alpha;
      sctx.fillStyle = color;
      sctx.beginPath();
      sctx.ellipse(cx, cy, ellipseW / 2, ellipseH / 2, 0, 0, Math.PI * 2);
      sctx.fill();
      sctx.restore();
    }
  }

  // =========================================================================
  // Internal: tinting
  // =========================================================================

  /**
   * Return a tinted version of the given source.
   * Caches the result keyed by source + tint colour.
   * @param {*} source
   * @param {string} tint
   * @param {number} sw
   * @param {number} sh
   * @returns {HTMLCanvasElement|OffscreenCanvas}
   * @private
   */
  _getTinted(source, tint, sw, sh) {
    // Build a cache key — use src for images, or reference identity
    const srcKey = source.src || source._tintId || (source._tintId = 'tid_' + Math.random().toString(36).slice(2));
    const cacheKey = srcKey + '|' + tint;

    if (this._tintCache.has(cacheKey)) {
      return this._tintCache.get(cacheKey).canvas;
    }

    const { canvas: tc, ctx: tctx } = rp_makeCanvas(sw, sh);
    if (typeof source.draw === 'function' && !(source instanceof HTMLImageElement || source instanceof HTMLCanvasElement)) {
      source.draw(tctx);
    } else {
      tctx.drawImage(source, 0, 0, sw, sh);
    }
    tctx.globalCompositeOperation = 'source-atop';
    tctx.fillStyle = tint;
    tctx.fillRect(0, 0, sw, sh);
    tctx.globalCompositeOperation = 'source-over';

    this._tintCache.set(cacheKey, { canvas: tc, ctx: tctx });
    // Limit cache size
    if (this._tintCache.size > 256) {
      const first = this._tintCache.keys().next().value;
      this._tintCache.delete(first);
    }
    return tc;
  }

  // =========================================================================
  // Internal: lighting
  // =========================================================================

  /**
   * Render the light map onto _lightCanvas.
   * @private
   */
  _renderLightMap() {
    const ctx = this._lightCtx;
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    // Fill with ambient colour modulated by intensity
    const amb = rp_parseColor(this._ambientColor);
    const ai = this._ambientIntensity;
    // Ambient intensity: 1 = fully lit (white), 0 = ambient colour at full strength
    // The light map is multiplied with the scene, so white = no change.
    // Ambient: lerp from ambientColor to white based on intensity.
    const ar = Math.round(lerp(amb.r, 255, ai));
    const ag = Math.round(lerp(amb.g, 255, ai));
    const ab = Math.round(lerp(amb.b, 255, ai));
    ctx.fillStyle = `rgb(${ar},${ag},${ab})`;
    ctx.fillRect(0, 0, this.width, this.height);

    // Collect all lights
    const allLights = [...this._frameLights, ...this._persistentLights.values()];

    if (allLights.length === 0) return;

    ctx.globalCompositeOperation = 'lighter';

    for (const light of allLights) {
      let intensity = light.intensity;

      // Flicker
      if (light.flicker > 0) {
        intensity += (Math.random() * 2 - 1) * light.flicker;
      }
      // Pulse
      if (light.pulseSpeed > 0) {
        intensity += Math.sin(this._lightTime * light.pulseSpeed * Math.PI * 2) * light.pulseAmt;
      }
      intensity = clamp(intensity, 0, 2);

      // Convert light world position to screen
      const screen = this._camera.worldToScreen(light.x, light.y);
      const screenRadius = light.radius * this._camera.zoom;

      const lc = rp_parseColor(light.color);

      // Create radial gradient
      const grad = ctx.createRadialGradient(screen.x, screen.y, 0, screen.x, screen.y, screenRadius);
      const cr = Math.min(255, Math.round(lc.r * intensity));
      const cg = Math.min(255, Math.round(lc.g * intensity));
      const cb = Math.min(255, Math.round(lc.b * intensity));

      if (light.falloff === 'quadratic') {
        grad.addColorStop(0, `rgb(${cr},${cg},${cb})`);
        grad.addColorStop(0.5, `rgba(${cr},${cg},${cb},0.25)`);
        grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      } else {
        // linear
        grad.addColorStop(0, `rgb(${cr},${cg},${cb})`);
        grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      }

      ctx.fillStyle = grad;
      ctx.fillRect(
        screen.x - screenRadius,
        screen.y - screenRadius,
        screenRadius * 2,
        screenRadius * 2,
      );
    }

    ctx.globalCompositeOperation = 'source-over';
  }

  // =========================================================================
  // Internal: ensure scratch canvases
  // =========================================================================

  /** @private */
  _ensureComposite() {
    if (!this._compositeCanvas) {
      const { canvas, ctx } = rp_makeCanvas(this.width, this.height);
      this._compositeCanvas = canvas;
      this._compositeCtx = ctx;
    }
  }

  /** @private */
  _ensureBloom() {
    const dw = Math.ceil(this.width / 4);
    const dh = Math.ceil(this.height / 4);
    if (!this._bloomDownCanvas) {
      const a = rp_makeCanvas(dw, dh);
      this._bloomDownCanvas = a.canvas;
      this._bloomDownCtx = a.ctx;
      const b = rp_makeCanvas(dw, dh);
      this._bloomBlurCanvas = b.canvas;
      this._bloomBlurCtx = b.ctx;
    }
  }

  // =========================================================================
  // Post-FX implementations
  // =========================================================================

  /**
   * Bloom: extract brights, blur, additive blend.
   * @param {HTMLCanvasElement|OffscreenCanvas} input
   * @returns {HTMLCanvasElement|OffscreenCanvas}
   * @private
   */
  _applyBloom(input) {
    this._ensureBloom();
    const dw = Math.ceil(this.width / 4);
    const dh = Math.ceil(this.height / 4);
    const dCtx = this._bloomDownCtx;
    const bCtx = this._bloomBlurCtx;

    // Downscale
    dCtx.clearRect(0, 0, dw, dh);
    dCtx.drawImage(input, 0, 0, dw, dh);

    // Threshold: darken pixels below threshold via pixel manipulation
    const imgData = dCtx.getImageData(0, 0, dw, dh);
    const d = imgData.data;
    const thresh = this._bloom.threshold * 255;
    for (let i = 0; i < d.length; i += 4) {
      const brightness = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
      if (brightness < thresh) {
        d[i] = d[i+1] = d[i+2] = 0;
      }
    }
    dCtx.putImageData(imgData, 0, 0);

    // Blur using CSS filter
    bCtx.clearRect(0, 0, dw, dh);
    bCtx.filter = `blur(${Math.round(this._bloom.radius / 4)}px)`;
    bCtx.drawImage(this._bloomDownCanvas, 0, 0);
    bCtx.filter = 'none';

    // Additive blend onto composite
    this._compositeCtx.save();
    this._compositeCtx.globalCompositeOperation = 'lighter';
    this._compositeCtx.globalAlpha = this._bloom.intensity;
    this._compositeCtx.drawImage(this._bloomBlurCanvas, 0, 0, this.width, this.height);
    this._compositeCtx.globalAlpha = 1;
    this._compositeCtx.globalCompositeOperation = 'source-over';
    this._compositeCtx.restore();

    return this._compositeCanvas;
  }

  /**
   * Vignette: radial gradient overlay to darken edges.
   * @param {HTMLCanvasElement|OffscreenCanvas} input
   * @returns {HTMLCanvasElement|OffscreenCanvas}
   * @private
   */
  _applyVignette(input) {
    const ctx = this._compositeCtx;
    const cx = this.width / 2;
    const cy = this.height / 2;
    const maxR = Math.sqrt(cx * cx + cy * cy);
    const innerR = maxR * this._vignette.radius;
    const outerR = maxR * (this._vignette.radius + this._vignette.softness);

    const vc = rp_parseColor(this._vignette.color || '#000000');
    const grad = ctx.createRadialGradient(cx, cy, innerR, cx, cy, outerR);
    grad.addColorStop(0, `rgba(${vc.r},${vc.g},${vc.b},0)`);
    grad.addColorStop(1, `rgba(${vc.r},${vc.g},${vc.b},${this._vignette.intensity})`);

    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, this.width, this.height);
    ctx.restore();

    return this._compositeCanvas;
  }

  /**
   * Chromatic aberration: offset R and B channels.
   * @param {HTMLCanvasElement|OffscreenCanvas} input
   * @returns {HTMLCanvasElement|OffscreenCanvas}
   * @private
   */
  _applyChromaticAberration(input) {
    let offset = this._chromatic.offset || 2;
    if (this._chromatic._triggerDuration > 0) {
      const t = clamp(this._chromatic._triggerElapsed / this._chromatic._triggerDuration, 0, 1);
      offset = lerp(this._chromatic._triggerOffset, 0, t);
    }
    if (Math.abs(offset) < 0.5) return input;

    const ctx = this._compositeCtx;
    const w = this.width;
    const h = this.height;

    // Read pixels
    const src = ctx.getImageData(0, 0, w, h);
    const dst = ctx.createImageData(w, h);
    const sd = src.data;
    const dd = dst.data;
    const off = Math.round(offset);

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const idx = (y * w + x) * 4;

        // Red channel — shift left
        const rx = clamp(x - off, 0, w - 1);
        const ri = (y * w + rx) * 4;
        dd[idx]     = sd[ri];

        // Green channel — no shift
        dd[idx + 1] = sd[idx + 1];

        // Blue channel — shift right
        const bx = clamp(x + off, 0, w - 1);
        const bi = (y * w + bx) * 4;
        dd[idx + 2] = sd[bi + 2];

        // Alpha — keep original
        dd[idx + 3] = sd[idx + 3];
      }
    }

    ctx.putImageData(dst, 0, 0);
    return this._compositeCanvas;
  }

  /**
   * CRT: scanlines + barrel distortion.
   * @param {HTMLCanvasElement|OffscreenCanvas} input
   * @returns {HTMLCanvasElement|OffscreenCanvas}
   * @private
   */
  _applyCRT(input) {
    const ctx = this._compositeCtx;
    const w = this.width;
    const h = this.height;
    const curvature = this._crt.curvature;

    if (curvature > 0) {
      // Barrel distortion via pixel remapping
      const src = ctx.getImageData(0, 0, w, h);
      const dst = ctx.createImageData(w, h);
      const sd = src.data;
      const dd = dst.data;
      const cx = w / 2;
      const cy = h / 2;
      const maxR = Math.sqrt(cx * cx + cy * cy);

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          // Normalise to -1..1
          const nx = (x - cx) / cx;
          const ny = (y - cy) / cy;
          const r2 = nx * nx + ny * ny;
          const factor = 1 + curvature * r2;
          const sx = Math.round(nx * factor * cx + cx);
          const sy = Math.round(ny * factor * cy + cy);

          const di = (y * w + x) * 4;
          if (sx >= 0 && sx < w && sy >= 0 && sy < h) {
            const si = (sy * w + sx) * 4;
            dd[di]     = sd[si];
            dd[di + 1] = sd[si + 1];
            dd[di + 2] = sd[si + 2];
            dd[di + 3] = sd[si + 3];
          }
          // else stays black / transparent
        }
      }
      ctx.putImageData(dst, 0, 0);
    }

    // Scanlines — draw alternating dark lines
    const sAlpha = this._crt.scanlineAlpha;
    if (sAlpha > 0) {
      ctx.save();
      ctx.fillStyle = `rgba(0,0,0,${sAlpha})`;
      for (let y = 0; y < h; y += 2) {
        ctx.fillRect(0, y, w, 1);
      }
      ctx.restore();
    }

    return this._compositeCanvas;
  }

  /**
   * Colour grading via overlay fills and blend modes for performance.
   * @param {HTMLCanvasElement|OffscreenCanvas} input
   * @returns {HTMLCanvasElement|OffscreenCanvas}
   * @private
   */
  _applyColorGrade(input) {
    const cg = this._colorGrade;
    const ctx = this._compositeCtx;
    const w = this.width;
    const h = this.height;

    // Brightness — overlay white (lighten) or black (darken)
    if (cg.brightness !== undefined && cg.brightness !== 1) {
      ctx.save();
      if (cg.brightness > 1) {
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = clamp(cg.brightness - 1, 0, 1);
        ctx.fillStyle = '#ffffff';
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = clamp(1 - cg.brightness, 0, 1);
        ctx.fillStyle = '#000000';
      }
      ctx.fillRect(0, 0, w, h);
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      ctx.restore();
    }

    // Contrast — via pixel manipulation on a downscaled copy
    if (cg.contrast !== undefined && cg.contrast !== 1) {
      ctx.save();
      ctx.filter = `contrast(${cg.contrast})`;
      ctx.drawImage(this._compositeCanvas, 0, 0);
      ctx.filter = 'none';
      ctx.restore();
    }

    // Saturation
    if (cg.saturation !== undefined && cg.saturation !== 1) {
      ctx.save();
      ctx.filter = `saturate(${cg.saturation})`;
      ctx.drawImage(this._compositeCanvas, 0, 0);
      ctx.filter = 'none';
      ctx.restore();
    }

    // Hue rotation
    if (cg.hue !== undefined && cg.hue !== 0) {
      ctx.save();
      ctx.filter = `hue-rotate(${cg.hue}deg)`;
      ctx.drawImage(this._compositeCanvas, 0, 0);
      ctx.filter = 'none';
      ctx.restore();
    }

    // Temperature — warm (orange overlay) or cool (blue overlay)
    if (cg.temperature !== undefined && cg.temperature !== 0) {
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = Math.abs(cg.temperature) * 0.15;
      ctx.fillStyle = cg.temperature > 0 ? '#ff8800' : '#0044ff';
      ctx.fillRect(0, 0, w, h);
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      ctx.restore();
    }

    return this._compositeCanvas;
  }
}


// ========== VFX ==========

/**
 * Visual Effects System — Advanced particle system and screen effects manager
 * for 2D canvas games. Zero dependencies, pure ES module.
 *
 * @module vfx
 */

// ============================================================
// Default Configuration
// ============================================================

const DEFAULT_MAX_PARTICLES = 2000;

const DEFAULT_PARTICLE = {
  x: 0, y: 0, vx: 0, vy: 0, ax: 0, ay: 0,
  life: 0, maxLife: 1,
  size: 4, startSize: 4, endSize: 0,
  color: '#ffffff', colors: null,
  alpha: 1, alphaStart: 1, alphaEnd: 0,
  rotation: 0, rotationSpeed: 0,
  shape: 'circle',
  gravity: 0, drag: 1,
  active: false,
};

// ============================================================
// Utility Functions
// ============================================================

/**
 * Resolve a value that may be a number or [min, max] range.
 * @param {number|number[]} v
 * @returns {number}
 */
function resolve(v) {
  if (v == null) return 0;
  if (Array.isArray(v)) return v[0] + Math.random() * (v[1] - v[0]);
  return v;
}

/** Random float in [a, b). */
function randRange(a, b) { return a + Math.random() * (b - a); }



/**
 * Parse a hex color string to {r, g, b}.
 * Supports #RGB, #RRGGBB, #RRGGBBAA.
 * @param {string} hex
 * @returns {{r:number, g:number, b:number, a:number}}
 */
function parseHex(hex) {
  let h = hex.replace('#', '');
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  const a = h.length >= 8 ? parseInt(h.substring(6, 8), 16) / 255 : 1;
  return { r, g, b, a };
}

/**
 * Convert {r, g, b} to a CSS rgba string.
 * @param {{r:number, g:number, b:number}} c
 * @param {number} alpha
 * @returns {string}
 */
function toRGBA(c, alpha) {
  return `rgba(${c.r|0},${c.g|0},${c.b|0},${alpha})`;
}

/**
 * Interpolate through an array of hex colors based on t in [0,1].
 * @param {string[]} colors
 * @param {number} t
 * @returns {{r:number, g:number, b:number}}
 */
function lerpColorArray(colors, t) {
  if (colors.length === 1) return parseHex(colors[0]);
  const idx = t * (colors.length - 1);
  const lo = Math.floor(idx);
  const hi = Math.min(lo + 1, colors.length - 1);
  const f = idx - lo;
  const a = parseHex(colors[lo]);
  const b = parseHex(colors[hi]);
  return { r: lerp(a.r, b.r, f), g: lerp(a.g, b.g, f), b: lerp(a.b, b.b, f) };
}

/**
 * Rotate a 2D vector by angle (radians).
 * @param {number} x
 * @param {number} y
 * @param {number} angle
 * @returns {{x:number, y:number}}
 */
function rotateVec(x, y, angle) {
  const c = Math.cos(angle);
  const s = Math.sin(angle);
  return { x: x * c - y * s, y: x * s + y * c };
}

const TWO_PI = Math.PI * 2;

// ============================================================
// Particle Pool
// ============================================================

/**
 * Pre-allocated particle pool using swap-with-last-active for O(1) acquire/release.
 */
class ParticlePool {
  /**
   * @param {number} size - Maximum pool capacity
   */
  constructor(size) {
    this.particles = new Array(size);
    this.activeCount = 0;
    this.capacity = size;
    for (let i = 0; i < size; i++) {
      this.particles[i] = {
        x: 0, y: 0, vx: 0, vy: 0, ax: 0, ay: 0,
        life: 0, maxLife: 1,
        size: 4, startSize: 4, endSize: 0,
        color: '#ffffff', colors: null,
        alpha: 1, alphaStart: 1, alphaEnd: 0,
        rotation: 0, rotationSpeed: 0,
        shape: 'circle',
        gravity: 0, drag: 1,
        active: false,
        emitterBlend: 'source-over',
        _poolIndex: i,
      };
    }
  }

  /**
   * Acquire a particle from the pool.
   * @returns {object|null} particle object, or null if pool exhausted.
   */
  acquire() {
    if (this.activeCount >= this.capacity) return null;
    const p = this.particles[this.activeCount];
    p.active = true;
    p._poolIndex = this.activeCount;
    this.activeCount++;
    return p;
  }

  /**
   * Release a particle back to the pool (swap-with-last-active).
   * @param {object} p
   */
  release(p) {
    if (!p.active) return;
    p.active = false;
    this.activeCount--;
    const lastActive = this.particles[this.activeCount];
    if (p !== lastActive) {
      const idx = p._poolIndex;
      this.particles[idx] = lastActive;
      lastActive._poolIndex = idx;
      this.particles[this.activeCount] = p;
      p._poolIndex = this.activeCount;
    }
  }

  /** Release all particles. */
  clear() {
    for (let i = 0; i < this.activeCount; i++) {
      this.particles[i].active = false;
    }
    this.activeCount = 0;
  }
}

// ============================================================
// Emitter
// ============================================================

/**
 * Particle emitter — spawns and manages particles with configurable behavior.
 */
class Emitter {
  /**
   * @param {object} config
   * @param {object|function} config.position - {x,y} or function returning {x,y}
   * @param {number} [config.emitRate=0] - Particles per second (0 = burst mode)
   * @param {number} [config.burstCount=10] - Particles per burst
   * @param {string} [config.emitShape='point'] - 'point'|'circle'|'ring'|'rect'|'line'
   * @param {number} [config.emitRadius=0] - Radius for circle/ring emit shapes
   * @param {number} [config.emitWidth=0] - Width for rect emit shape
   * @param {number} [config.emitHeight=0] - Height for rect emit shape
   * @param {number} [config.emitAngle=0] - Angle for line emit shape
   * @param {object} [config.particle] - Particle template (values can be [min,max])
   * @param {number} [config.duration=Infinity] - Emitter lifetime in seconds
   * @param {number} [config.maxParticles=Infinity] - Cap for this emitter
   * @param {boolean} [config.worldSpace=true] - If true, particles use world coords
   * @param {string} [config.blendMode='source-over'] - Canvas composite operation
   * @param {ParticlePool} _pool - Internal pool reference
   */
  constructor(config, _pool) {
    this._pool = _pool;
    this.position = config.position || { x: 0, y: 0 };
    this.emitRate = config.emitRate != null ? config.emitRate : 0;
    this.burstCount = config.burstCount || 10;
    this.emitShape = config.emitShape || 'point';
    this.emitRadius = config.emitRadius || 0;
    this.emitWidth = config.emitWidth || 0;
    this.emitHeight = config.emitHeight || 0;
    this.emitAngle = config.emitAngle || 0;
    this.particleConfig = config.particle || {};
    this.duration = config.duration != null ? config.duration : Infinity;
    this.maxParticles = config.maxParticles != null ? config.maxParticles : Infinity;
    this.worldSpace = config.worldSpace != null ? config.worldSpace : true;
    this.blendMode = config.blendMode || 'source-over';

    this._elapsed = 0;
    this._emitAccum = 0;
    this._alive = true;
    this._particles = [];
    this._hasBurst = false;
  }

  /** Whether this emitter is still alive. */
  get alive() { return this._alive; }

  /** Get the current emitter position. */
  _getPos() {
    if (typeof this.position === 'function') return this.position();
    return this.position;
  }

  /**
   * Compute spawn offset based on emit shape.
   * @returns {{x:number, y:number}}
   */
  _spawnOffset() {
    switch (this.emitShape) {
      case 'circle': {
        const a = Math.random() * TWO_PI;
        const r = Math.random() * (this.emitRadius || 0);
        return { x: Math.cos(a) * r, y: Math.sin(a) * r };
      }
      case 'ring': {
        const a = Math.random() * TWO_PI;
        const r = this.emitRadius || 0;
        return { x: Math.cos(a) * r, y: Math.sin(a) * r };
      }
      case 'rect': {
        const hw = (this.emitWidth || 0) / 2;
        const hh = (this.emitHeight || 0) / 2;
        return { x: randRange(-hw, hw), y: randRange(-hh, hh) };
      }
      case 'line': {
        const len = this.emitRadius || 50;
        const t = randRange(-0.5, 0.5);
        const a = this.emitAngle || 0;
        return { x: Math.cos(a) * len * t, y: Math.sin(a) * len * t };
      }
      default: return { x: 0, y: 0 };
    }
  }

  /**
   * Spawn a single particle.
   * @returns {object|null}
   */
  _spawn() {
    if (this._particles.length >= this.maxParticles) return null;
    const p = this._pool.acquire();
    if (!p) return null;

    const cfg = this.particleConfig;
    const pos = this._getPos();
    const off = this._spawnOffset();

    const speed = resolve(cfg.speed != null ? cfg.speed : 50);
    const angle = resolve(cfg.angle != null ? cfg.angle : [0, TWO_PI]);

    p.x = pos.x + off.x;
    p.y = pos.y + off.y;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.ax = resolve(cfg.ax);
    p.ay = resolve(cfg.ay);
    p.life = 0;
    p.maxLife = resolve(cfg.life != null ? cfg.life : 1);
    if (p.maxLife <= 0) p.maxLife = 0.01;

    const sz = resolve(cfg.size != null ? cfg.size : 4);
    p.startSize = sz;
    if (cfg.sizeOverLife != null) {
      if (Array.isArray(cfg.sizeOverLife)) {
        p.startSize = resolve(cfg.sizeOverLife[0]);
        p.endSize = resolve(cfg.sizeOverLife[1]);
      } else {
        p.startSize = sz;
        p.endSize = resolve(cfg.sizeOverLife);
      }
    } else {
      p.endSize = 0;
    }
    p.size = p.startSize;

    if (cfg.color) {
      if (Array.isArray(cfg.color) && typeof cfg.color[0] === 'string') {
        p.colors = cfg.color;
        p.color = cfg.color[0];
      } else {
        p.colors = null;
        p.color = cfg.color;
      }
    } else {
      p.colors = null;
      p.color = '#ffffff';
    }

    const alphaStart = cfg.alpha != null ? resolve(cfg.alpha) : 1;
    p.alphaStart = alphaStart;
    if (cfg.alphaOverLife != null) {
      if (Array.isArray(cfg.alphaOverLife)) {
        p.alphaStart = resolve(cfg.alphaOverLife[0]);
        p.alphaEnd = resolve(cfg.alphaOverLife[1]);
      } else {
        p.alphaStart = alphaStart;
        p.alphaEnd = resolve(cfg.alphaOverLife);
      }
    } else {
      p.alphaEnd = 0;
    }
    p.alpha = p.alphaStart;

    p.rotation = resolve(cfg.rotation);
    p.rotationSpeed = resolve(cfg.rotationSpeed);
    p.shape = cfg.shape || 'circle';
    p.gravity = resolve(cfg.gravity);
    p.drag = cfg.drag != null ? resolve(cfg.drag) : 1;
    p.emitterBlend = this.blendMode;

    this._particles.push(p);
    return p;
  }

  /**
   * Trigger a burst of particles.
   * @param {number} [count] - Override burst count
   */
  burst(count) {
    const n = count || this.burstCount;
    for (let i = 0; i < n; i++) this._spawn();
  }

  /**
   * Update this emitter and its particles.
   * @param {number} dt - Delta time in seconds
   */
  update(dt) {
    if (!this._alive) return;

    this._elapsed += dt;
    if (this._elapsed >= this.duration) {
      this._alive = false;
    }

    // Emit new particles
    if (this._alive) {
      if (this.emitRate > 0) {
        this._emitAccum += this.emitRate * dt;
        while (this._emitAccum >= 1) {
          this._spawn();
          this._emitAccum -= 1;
        }
      } else if (!this._hasBurst) {
        this.burst();
        this._hasBurst = true;
      }
    }

    // Update existing particles
    for (let i = this._particles.length - 1; i >= 0; i--) {
      const p = this._particles[i];
      p.life += dt;
      if (p.life >= p.maxLife) {
        this._pool.release(p);
        this._particles[i] = this._particles[this._particles.length - 1];
        this._particles.pop();
        continue;
      }

      const t = p.life / p.maxLife;

      // Physics
      p.vy += p.gravity * dt;
      p.vx += p.ax * dt;
      p.vy += p.ay * dt;
      p.vx *= Math.pow(p.drag, dt * 60);
      p.vy *= Math.pow(p.drag, dt * 60);
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;

      // Interpolation
      p.size = lerp(p.startSize, p.endSize, t);
      p.alpha = lerp(p.alphaStart, p.alphaEnd, t);
    }
  }

  /**
   * Draw all particles for this emitter.
   * @param {CanvasRenderingContext2D} ctx
   */
  draw(ctx) {
    if (this._particles.length === 0) return;

    const prevComposite = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = this.blendMode;

    for (let i = 0; i < this._particles.length; i++) {
      const p = this._particles[i];
      if (p.size <= 0.1 || p.alpha <= 0.005) continue;

      const t = p.life / p.maxLife;
      let col;
      if (p.colors && p.colors.length > 1) {
        col = lerpColorArray(p.colors, t);
      } else {
        col = parseHex(typeof p.color === 'string' ? p.color : '#ffffff');
      }

      const rgba = toRGBA(col, clamp(p.alpha, 0, 1));
      ctx.globalAlpha = 1;

      ctx.save();
      ctx.translate(p.x, p.y);
      if (p.rotation) ctx.rotate(p.rotation);

      ctx.fillStyle = rgba;
      ctx.strokeStyle = rgba;

      const hs = p.size / 2;

      switch (p.shape) {
        case 'circle':
          ctx.beginPath();
          ctx.arc(0, 0, hs, 0, TWO_PI);
          ctx.fill();
          break;
        case 'rect':
          ctx.fillRect(-hs, -hs, p.size, p.size);
          break;
        case 'triangle':
          ctx.beginPath();
          ctx.moveTo(0, -hs);
          ctx.lineTo(-hs, hs);
          ctx.lineTo(hs, hs);
          ctx.closePath();
          ctx.fill();
          break;
        case 'line':
          ctx.lineWidth = Math.max(1, p.size * 0.3);
          ctx.beginPath();
          ctx.moveTo(0, -hs);
          ctx.lineTo(0, hs);
          ctx.stroke();
          break;
        case 'ring':
          ctx.lineWidth = Math.max(1, p.size * 0.2);
          ctx.beginPath();
          ctx.arc(0, 0, hs, 0, TWO_PI);
          ctx.stroke();
          break;
        case 'star': {
          const spikes = 5;
          const outerR = hs;
          const innerR = hs * 0.4;
          ctx.beginPath();
          for (let s = 0; s < spikes * 2; s++) {
            const r = s % 2 === 0 ? outerR : innerR;
            const a = (s / (spikes * 2)) * TWO_PI - Math.PI / 2;
            if (s === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
            else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          }
          ctx.closePath();
          ctx.fill();
          break;
        }
      }

      ctx.restore();
    }

    ctx.globalCompositeOperation = prevComposite;
    ctx.globalAlpha = 1;
  }

  /**
   * Destroy this emitter, releasing all its particles.
   */
  destroy() {
    this._alive = false;
    for (let i = 0; i < this._particles.length; i++) {
      this._pool.release(this._particles[i]);
    }
    this._particles.length = 0;
  }

  /** Number of active particles for this emitter. */
  get particleCount() { return this._particles.length; }
}

// ============================================================
// Trail
// ============================================================

/**
 * Trail renderer — ribbon or dot trail attached to a moving entity.
 */
class Trail {
  /**
   * @param {object} target - Entity with x, y properties
   * @param {object} config
   * @param {string} [config.type='ribbon'] - 'ribbon' or 'dot'
   * @param {string|string[]} [config.color='#ffffff'] - Single color or gradient array
   * @param {number} [config.width=8] - Max width (ribbon) or dot size
   * @param {number} [config.length=20] - Number of points/dots
   * @param {number} [config.fadeAlpha=0] - Min alpha at tail
   * @param {number} [config.minDistance=4] - Min px between recorded points
   * @param {string} [config.blendMode='source-over'] - Canvas composite operation
   */
  constructor(target, config = {}) {
    this.target = target;
    this.type = config.type || 'ribbon';
    this.color = config.color || '#ffffff';
    this.width = config.width || 8;
    this.length = config.length || 20;
    this.fadeAlpha = config.fadeAlpha != null ? config.fadeAlpha : 0;
    this.minDistance = config.minDistance != null ? config.minDistance : 4;
    this.blendMode = config.blendMode || 'source-over';

    this._points = [];
    this._alive = true;

    // For dot trail, we store fading dots
    this._dots = [];
  }

  /** Whether this trail is alive. */
  get alive() { return this._alive; }

  /**
   * Update the trail each frame.
   * @param {number} dt - Delta time in seconds
   */
  update(dt) {
    if (!this._alive || !this.target) return;

    const tx = this.target.x;
    const ty = this.target.y;

    if (this.type === 'ribbon') {
      const last = this._points.length > 0 ? this._points[0] : null;
      if (!last || this._dist(last.x, last.y, tx, ty) >= this.minDistance) {
        this._points.unshift({ x: tx, y: ty });
        if (this._points.length > this.length) this._points.pop();
      }
    } else {
      // Dot trail
      const last = this._dots.length > 0 ? this._dots[0] : null;
      if (!last || this._dist(last.x, last.y, tx, ty) >= this.minDistance) {
        this._dots.unshift({ x: tx, y: ty, alpha: 1 });
        if (this._dots.length > this.length) this._dots.pop();
      }
      // Fade dots
      const fadeRate = 2.0 / (this.length * 0.06 + 0.5);
      for (let i = this._dots.length - 1; i >= 0; i--) {
        this._dots[i].alpha -= fadeRate * dt;
        if (this._dots[i].alpha <= 0) {
          this._dots.splice(i, 1);
        }
      }
    }
  }

  /**
   * Draw the trail.
   * @param {CanvasRenderingContext2D} ctx
   */
  draw(ctx) {
    if (!this._alive) return;

    const prevComposite = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = this.blendMode;

    if (this.type === 'ribbon') {
      this._drawRibbon(ctx);
    } else {
      this._drawDots(ctx);
    }

    ctx.globalCompositeOperation = prevComposite;
    ctx.globalAlpha = 1;
  }

  /** @private */
  _drawRibbon(ctx) {
    const pts = this._points;
    if (pts.length < 2) return;

    const colors = Array.isArray(this.color) ? this.color : [this.color];

    for (let i = 0; i < pts.length - 1; i++) {
      const t = i / (pts.length - 1);
      const w = this.width * (1 - t);
      const alpha = lerp(1, this.fadeAlpha, t);
      const col = colors.length > 1 ? lerpColorArray(colors, t) : parseHex(colors[0]);

      ctx.strokeStyle = toRGBA(col, clamp(alpha, 0, 1));
      ctx.lineWidth = Math.max(0.5, w);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[i + 1].x, pts[i + 1].y);
      ctx.stroke();
    }
  }

  /** @private */
  _drawDots(ctx) {
    const colors = Array.isArray(this.color) ? this.color : [this.color];
    const baseCol = parseHex(colors[0]);

    for (let i = 0; i < this._dots.length; i++) {
      const d = this._dots[i];
      const t = i / Math.max(1, this._dots.length - 1);
      const col = colors.length > 1 ? lerpColorArray(colors, t) : baseCol;
      const alpha = d.alpha * lerp(1, this.fadeAlpha, t);
      const sz = this.width * (1 - t * 0.5);

      ctx.fillStyle = toRGBA(col, clamp(alpha, 0, 1));
      ctx.beginPath();
      ctx.arc(d.x, d.y, Math.max(0.5, sz / 2), 0, TWO_PI);
      ctx.fill();
    }
  }

  /** @private */
  _dist(x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    return Math.sqrt(dx * dx + dy * dy);
  }

  /** Destroy this trail. */
  destroy() {
    this._alive = false;
    this._points.length = 0;
    this._dots.length = 0;
  }
}

// ============================================================
// Shockwave
// ============================================================

class Shockwave {
  constructor(x, y, config = {}) {
    this.x = x;
    this.y = y;
    this.startRadius = config.startRadius || 5;
    this.endRadius = config.endRadius || 100;
    this.duration = config.duration || 0.4;
    this.color = config.color || '#ffffff';
    this.lineWidth = config.lineWidth || 3;
    this.alphaStart = config.alpha != null ? config.alpha : 1;
    this.blendMode = config.blendMode || 'source-over';

    this._elapsed = 0;
    this._alive = true;
  }

  get alive() { return this._alive; }

  update(dt) {
    this._elapsed += dt;
    if (this._elapsed >= this.duration) this._alive = false;
  }

  draw(ctx) {
    if (!this._alive) return;
    const t = clamp(this._elapsed / this.duration, 0, 1);
    const radius = lerp(this.startRadius, this.endRadius, t);
    const alpha = this.alphaStart * (1 - t);
    const lw = this.lineWidth * (1 - t * 0.5);

    const col = parseHex(this.color);
    const prevComposite = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = this.blendMode;
    ctx.strokeStyle = toRGBA(col, clamp(alpha, 0, 1));
    ctx.lineWidth = Math.max(0.5, lw);
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius, 0, TWO_PI);
    ctx.stroke();
    ctx.globalCompositeOperation = prevComposite;
  }
}

// ============================================================
// Screen Effects State
// ============================================================

class ScreenEffects {
  constructor() {
    // Shake
    this._shakes = [];
    this._shakeX = 0;
    this._shakeY = 0;

    // Rumbles
    this._rumbles = [];

    // Flash
    this._flashes = [];

    // HitStop
    this._hitStopTimer = 0;

    // SlowMotion
    this._slowScale = 1;
    this._slowTarget = 1;
    this._slowRecoveryRate = 0;
  }

  get shakeOffset() { return { x: this._shakeX, y: this._shakeY }; }

  get timeScale() {
    if (this._hitStopTimer > 0) return 0;
    return this._slowScale;
  }

  shake(intensity, duration, opts = {}) {
    this._shakes.push({
      intensity,
      duration,
      elapsed: 0,
      decay: opts.decay || 'exp',
      dirX: opts.directionX != null ? opts.directionX : 1,
      dirY: opts.directionY != null ? opts.directionY : 1,
    });
  }

  flash(color, duration) {
    this._flashes.push({ color, duration, elapsed: 0 });
  }

  hitStop(duration) {
    this._hitStopTimer = Math.max(this._hitStopTimer, duration);
  }

  slowMotion(scale, recoveryDuration) {
    this._slowScale = scale;
    this._slowTarget = 1;
    this._slowRecoveryRate = recoveryDuration > 0 ? (1 - scale) / recoveryDuration : 999;
  }

  rumble(intensity, duration) {
    this._rumbles.push({ intensity, duration, elapsed: 0 });
  }

  update(dt) {
    // Hit stop (uses real dt, not scaled)
    if (this._hitStopTimer > 0) {
      this._hitStopTimer -= dt;
      if (this._hitStopTimer < 0) this._hitStopTimer = 0;
    }

    // Slow motion recovery
    if (this._slowScale < this._slowTarget) {
      this._slowScale += this._slowRecoveryRate * dt;
      if (this._slowScale >= this._slowTarget) this._slowScale = this._slowTarget;
    }

    // Shakes
    this._shakeX = 0;
    this._shakeY = 0;
    for (let i = this._shakes.length - 1; i >= 0; i--) {
      const s = this._shakes[i];
      s.elapsed += dt;
      if (s.elapsed >= s.duration) {
        this._shakes.splice(i, 1);
        continue;
      }
      const t = s.elapsed / s.duration;
      let factor;
      if (s.decay === 'exp') factor = Math.pow(1 - t, 2);
      else factor = 1 - t;
      const inten = s.intensity * factor;
      this._shakeX += (Math.random() * 2 - 1) * inten * s.dirX;
      this._shakeY += (Math.random() * 2 - 1) * inten * s.dirY;
    }

    // Rumbles
    for (let i = this._rumbles.length - 1; i >= 0; i--) {
      const r = this._rumbles[i];
      r.elapsed += dt;
      if (r.elapsed >= r.duration) {
        this._rumbles.splice(i, 1);
        continue;
      }
      this._shakeX += (Math.random() * 2 - 1) * r.intensity;
      this._shakeY += (Math.random() * 2 - 1) * r.intensity;
    }

    // Flashes
    for (let i = this._flashes.length - 1; i >= 0; i--) {
      const f = this._flashes[i];
      f.elapsed += dt;
      if (f.elapsed >= f.duration) {
        this._flashes.splice(i, 1);
      }
    }
  }

  drawFlashes(ctx, width, height) {
    for (let i = 0; i < this._flashes.length; i++) {
      const f = this._flashes[i];
      const t = clamp(f.elapsed / f.duration, 0, 1);
      const alpha = 1 - t;
      const col = parseHex(f.color);
      ctx.fillStyle = toRGBA(col, clamp(alpha * 0.6, 0, 1));
      ctx.fillRect(0, 0, width, height);
    }
  }

  clear() {
    this._shakes.length = 0;
    this._rumbles.length = 0;
    this._flashes.length = 0;
    this._hitStopTimer = 0;
    this._slowScale = 1;
    this._slowTarget = 1;
    this._slowRecoveryRate = 0;
    this._shakeX = 0;
    this._shakeY = 0;
  }
}

// ============================================================
// Electric Arc (special drawable)
// ============================================================

class ElectricArcEffect {
  constructor(x1, y1, x2, y2, config = {}) {
    this.x1 = x1;
    this.y1 = y1;
    this.x2 = x2;
    this.y2 = y2;
    this.color = config.color || '#88ccff';
    this.segments = config.segments || 12;
    this.jitter = config.jitter || 20;
    this.duration = config.duration || 0.3;
    this.lineWidth = config.lineWidth || 2;
    this.blendMode = config.blendMode || 'lighter';

    this._elapsed = 0;
    this._alive = true;
    this._points = [];
    this._regenTimer = 0;
    this._regenerate();
  }

  get alive() { return this._alive; }

  _regenerate() {
    this._points = [{ x: this.x1, y: this.y1 }];
    const dx = this.x2 - this.x1;
    const dy = this.y2 - this.y1;
    for (let i = 1; i < this.segments; i++) {
      const t = i / this.segments;
      const mx = this.x1 + dx * t + (Math.random() * 2 - 1) * this.jitter;
      const my = this.y1 + dy * t + (Math.random() * 2 - 1) * this.jitter;
      this._points.push({ x: mx, y: my });
    }
    this._points.push({ x: this.x2, y: this.y2 });
  }

  update(dt) {
    this._elapsed += dt;
    if (this._elapsed >= this.duration) { this._alive = false; return; }
    this._regenTimer += dt;
    if (this._regenTimer > 0.03) {
      this._regenTimer = 0;
      this._regenerate();
    }
  }

  draw(ctx) {
    if (!this._alive || this._points.length < 2) return;
    const t = clamp(this._elapsed / this.duration, 0, 1);
    const alpha = 1 - t * t;
    const col = parseHex(this.color);
    const prev = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = this.blendMode;

    // Glow pass
    ctx.strokeStyle = toRGBA(col, alpha * 0.3);
    ctx.lineWidth = this.lineWidth * 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(this._points[0].x, this._points[0].y);
    for (let i = 1; i < this._points.length; i++) {
      ctx.lineTo(this._points[i].x, this._points[i].y);
    }
    ctx.stroke();

    // Core pass
    ctx.strokeStyle = toRGBA({ r: 255, g: 255, b: 255 }, alpha * 0.9);
    ctx.lineWidth = this.lineWidth;
    ctx.beginPath();
    ctx.moveTo(this._points[0].x, this._points[0].y);
    for (let i = 1; i < this._points.length; i++) {
      ctx.lineTo(this._points[i].x, this._points[i].y);
    }
    ctx.stroke();

    // Color pass
    ctx.strokeStyle = toRGBA(col, alpha * 0.7);
    ctx.lineWidth = this.lineWidth * 2;
    ctx.beginPath();
    ctx.moveTo(this._points[0].x, this._points[0].y);
    for (let i = 1; i < this._points.length; i++) {
      ctx.lineTo(this._points[i].x, this._points[i].y);
    }
    ctx.stroke();

    ctx.globalCompositeOperation = prev;
  }
}

// ============================================================
// Magic Circle (special drawable)
// ============================================================

class MagicCircleEffect {
  constructor(x, y, config = {}) {
    this.x = x;
    this.y = y;
    this.radius = config.radius || 60;
    this.color = config.color || '#aa66ff';
    this.duration = config.duration || 2;
    this.rotationSpeed = config.rotationSpeed || 2;
    this.blendMode = config.blendMode || 'lighter';
    this.particleCount = config.particleCount || 24;

    this._elapsed = 0;
    this._alive = true;
    this._rotation = 0;
  }

  get alive() { return this._alive; }

  update(dt) {
    this._elapsed += dt;
    this._rotation += this.rotationSpeed * dt;
    if (this._elapsed >= this.duration) this._alive = false;
  }

  draw(ctx) {
    if (!this._alive) return;
    const t = clamp(this._elapsed / this.duration, 0, 1);
    let alpha;
    if (t < 0.1) alpha = t / 0.1;
    else if (t > 0.7) alpha = (1 - t) / 0.3;
    else alpha = 1;

    const col = parseHex(this.color);
    const prev = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = this.blendMode;

    // Ring
    ctx.strokeStyle = toRGBA(col, alpha * 0.4);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, TWO_PI);
    ctx.stroke();

    // Inner ring
    ctx.strokeStyle = toRGBA(col, alpha * 0.2);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.6, 0, TWO_PI);
    ctx.stroke();

    // Particles orbiting
    const count = this.particleCount;
    for (let i = 0; i < count; i++) {
      const a = this._rotation + (i / count) * TWO_PI;
      const r = this.radius + Math.sin(this._elapsed * 4 + i * 1.3) * 5;
      const px = this.x + Math.cos(a) * r;
      const py = this.y + Math.sin(a) * r;
      const sz = 2 + Math.sin(this._elapsed * 6 + i) * 1;

      ctx.fillStyle = toRGBA({ r: 255, g: 255, b: 255 }, alpha * 0.8);
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, TWO_PI);
      ctx.fill();
    }

    // Rune-like cross lines
    for (let i = 0; i < 6; i++) {
      const a = this._rotation * 0.5 + (i / 6) * TWO_PI;
      const inner = this.radius * 0.15;
      const outer = this.radius * 0.55;
      ctx.strokeStyle = toRGBA(col, alpha * 0.3);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(this.x + Math.cos(a) * inner, this.y + Math.sin(a) * inner);
      ctx.lineTo(this.x + Math.cos(a) * outer, this.y + Math.sin(a) * outer);
      ctx.stroke();
    }

    ctx.globalCompositeOperation = prev;
  }
}

// ============================================================
// VFXManager
// ============================================================

/**
 * Main visual effects manager. Coordinates particles, trails, shockwaves,
 * and screen effects.
 */
class VFXManager {
  /**
   * @param {object} [config]
   * @param {number} [config.maxParticles=2000] - Particle pool size
   * @param {HTMLCanvasElement} [config.canvas] - Canvas for bounds info
   */
  constructor(config = {}) {
    this._pool = new ParticlePool(config.maxParticles || DEFAULT_MAX_PARTICLES);
    this._canvas = config.canvas || null;
    this._emitters = [];
    this._trails = [];
    this._shockwaves = [];
    this._specialEffects = []; // electric arcs, magic circles, etc.
    this._screen = new ScreenEffects();
  }

  // ----------------------------------------------------------
  // Screen effect getters
  // ----------------------------------------------------------

  /**
   * Current shake offset to apply to ctx.translate.
   * @returns {{x:number, y:number}}
   */
  get shakeOffset() { return this._screen.shakeOffset; }

  /**
   * Current time multiplier. Multiply your dt by this.
   * Returns 0 during hit-stop, <1 during slow-motion.
   * @returns {number}
   */
  get timeScale() { return this._screen.timeScale; }

  // ----------------------------------------------------------
  // Core lifecycle
  // ----------------------------------------------------------

  /**
   * Update all effects.
   * @param {number} dt - Delta time in seconds (real/unscaled)
   */
  update(dt) {
    this._screen.update(dt);

    // Emitters
    for (let i = this._emitters.length - 1; i >= 0; i--) {
      const e = this._emitters[i];
      e.update(dt);
      if (!e.alive && e.particleCount === 0) {
        this._emitters.splice(i, 1);
      }
    }

    // Trails
    for (let i = this._trails.length - 1; i >= 0; i--) {
      const t = this._trails[i];
      t.update(dt);
      if (!t.alive) {
        this._trails.splice(i, 1);
      }
    }

    // Shockwaves
    for (let i = this._shockwaves.length - 1; i >= 0; i--) {
      this._shockwaves[i].update(dt);
      if (!this._shockwaves[i].alive) {
        this._shockwaves.splice(i, 1);
      }
    }

    // Special effects
    for (let i = this._specialEffects.length - 1; i >= 0; i--) {
      this._specialEffects[i].update(dt);
      if (!this._specialEffects[i].alive) {
        this._specialEffects.splice(i, 1);
      }
    }
  }

  /**
   * Draw all effects.
   * @param {CanvasRenderingContext2D} ctx
   */
  draw(ctx) {
    // Shockwaves
    for (let i = 0; i < this._shockwaves.length; i++) {
      this._shockwaves[i].draw(ctx);
    }

    // Trails (behind particles)
    for (let i = 0; i < this._trails.length; i++) {
      this._trails[i].draw(ctx);
    }

    // Emitters / particles
    for (let i = 0; i < this._emitters.length; i++) {
      this._emitters[i].draw(ctx);
    }

    // Special effects (arcs, circles)
    for (let i = 0; i < this._specialEffects.length; i++) {
      this._specialEffects[i].draw(ctx);
    }

    // Flashes (screen overlay, draw last)
    const w = this._canvas ? this._canvas.width : ctx.canvas.width;
