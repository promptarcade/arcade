function Enemy(sx, sy, hp, speed, reward, color, radius, armor, type) {
  this.x = sx; this.y = sy; this.hp = hp; this.maxHp = hp;
  this.speed = speed; this.reward = reward; this.color = color;
  this.radius = radius || 0.35; this.armor = armor || 0;
  this.type = type || 'scout';
  this.alive = true; this.slowTimer = 0; this.slowAmt = 0;
}
Enemy.prototype.update = function(dt) {
  if (!this.alive) return;
  var spd = this.speed;
  if (this.slowTimer > 0) { spd *= (1 - this.slowAmt); this.slowTimer -= dt; }
  // Move toward castle center
  var dx = CX - this.x, dy = CY - this.y;
  var dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 0.5) { this.alive = false; this.reachedCastle = true; return; }
  this.x += (dx/dist) * spd * dt;
  this.y += (dy/dist) * spd * dt;
};

// ============================================================
// TOWERS
// ============================================================
function Tower(tx, ty, typeIdx) {
  this.tx = tx; this.ty = ty;
  this.x = tx + 0.5; this.y = ty + 0.5;
  var b = CFG.TOWERS[typeIdx];
  this.typeIdx = typeIdx; this.name = b.name;
  this.damage = b.damage; this.range = b.range; this.rate = b.rate;
  this.splash = b.splash || 0; this.slow = b.slow || 0; this.slowDur = b.slowDur || 0;
  this.chain = b.chain || 0;
  this.color = b.color; this.projColor = b.projColor;
  this.cooldown = 0; this.angle = 0; this.level = 1;
}
Tower.prototype.update = function(dt) {
  this.cooldown -= dt;
  if (this.cooldown > 0) return;
  // Find nearest enemy in range
  var best = null, bestD = Infinity;
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i]; if (!e.alive) continue;
    var d = Math.sqrt((e.x-this.x)*(e.x-this.x)+(e.y-this.y)*(e.y-this.y));
    if (d <= this.range && d < bestD) { bestD = d; best = e; }
  }
  if (!best) return;
  this.angle = Math.atan2(best.y - this.y, best.x - this.x);
  this.cooldown = this.rate;
  SFX.shoot();
  projectiles.push({ x:this.x, y:this.y, tx:best.x, ty:best.y, target:best,
    damage:this.damage, speed:8, color:this.projColor, splash:this.splash,
    slow:this.slow, slowDur:this.slowDur, chain:this.chain, alive:true });
};

// ============================================================
// PROJECTILES
// ============================================================
function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i]; if (!p.alive) { projectiles.splice(i,1); continue; }
    var dx = p.tx - p.x, dy = p.ty - p.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var move = p.speed * dt;
    if (move >= dist) {
      p.alive = false;
      // Hit
      if (p.target && p.target.alive) {
        var dmg = Math.max(1, p.damage - (p.target.armor||0));
        p.target.hp -= dmg;
        if (p.slow > 0) { p.target.slowAmt = Math.max(p.target.slowAmt, p.slow); p.target.slowTimer = Math.max(p.target.slowTimer, p.slowDur); }
        if (p.target.hp <= 0) { p.target.hp = 0; p.target.alive = false; onKill(p.target); }
        floats.push({ x:p.target.x, y:p.target.y-0.5, text:'-'+dmg, color:'#ff8844', life:0.6 });
      }
      // Splash
      if (p.splash > 0) {
        for (var j = 0; j < enemies.length; j++) {
          var e = enemies[j]; if (!e.alive || e === p.target) continue;
          var sd = Math.sqrt((e.x-p.tx)*(e.x-p.tx)+(e.y-p.ty)*(e.y-p.ty));
          if (sd <= p.splash) {
            var sdmg = Math.max(1, Math.round(p.damage*0.5) - (e.armor||0));
            e.hp -= sdmg; if (e.hp <= 0) { e.hp = 0; e.alive = false; onKill(e); }
          }
        }
      }
      // Chain lightning
      if (p.chain > 0 && p.target) {
        var ct = p.target;
        for (var c = 0; c < p.chain; c++) {
          var nearest = null, nd = Infinity;
          for (var j = 0; j < enemies.length; j++) {
            var e = enemies[j]; if (!e.alive || e === ct) continue;
            var cd = Math.sqrt((e.x-ct.x)*(e.x-ct.x)+(e.y-ct.y)*(e.y-ct.y));
            if (cd < 2.5 && cd < nd) { nd = cd; nearest = e; }
          }
          if (!nearest) break;
          var cdmg = Math.max(1, Math.round(p.damage*0.5));
          nearest.hp -= cdmg; if (nearest.hp <= 0) { nearest.hp = 0; nearest.alive = false; onKill(nearest); }
          floats.push({ x:nearest.x, y:nearest.y-0.5, text:'-'+cdmg, color:'#ffff44', life:0.5 });
          ct = nearest;
        }
      }
    } else {
      p.x += (dx/dist) * move;
      p.y += (dy/dist) * move;
    }
  }
}

function onKill(enemy) {
  SFX.kill();
  player.kills++;
  // Drop gold on ground where enemy died
  drops.push({ x:enemy.x, y:enemy.y, amount:enemy.reward, life:15 });
}

// ============================================================
// WAVES
// ============================================================
var wave = 0, waveTimer = 5, waveActive = false, waveSpawns = [], spawnTimer = 0;
var castleHp = CFG.CASTLE_HP, castleMaxHp = CFG.CASTLE_HP;

function startWave() {
  wave++;
  waveActive = true;
  SFX.wave();
  waveSpawns = [];
  var dirs = [{x:0,y:0},{x:MW-1,y:CY},{x:0,y:CY},{x:CX,y:0},{x:CX,y:MH-1}];
  var t = 0; // accumulated spawn delay

  // Designed for action TD: player must run to build, so fewer enemies, more gold, slower ramp
  // Wave 1-3: tutorial — learn to place towers on one path
  // Wave 4-6: second direction opens — need to expand
  // Wave 7-10: all directions, tougher enemies
  // Wave 11+: real challenge

  var scoutHp = 12 + wave * 3; // 15 at wave 1, 42 at wave 10
  var scoutSpeed = 0.8 + wave * 0.04; // 0.84 to 1.2
  var goldPerKill = 5 + wave * 2; // generous — player needs to build fast

  if (wave <= 3) {
    // Tutorial: 1-3 scouts from ONE direction, very slow, big rewards
    var count = wave;
    var d = dirs[1]; // always east
    for (var i = 0; i < count; i++) {
      waveSpawns.push({ delay:t, type:'scout', x:d.x+(Math.random()-0.5)*2, y:d.y+(Math.random()-0.5)*2, hp:scoutHp, speed:scoutSpeed, reward:goldPerKill, color:'#66dd66', radius:0.3 });
      t += 1.5;
    }
  } else if (wave <= 6) {
    // Two directions, growing numbers
    var count = 2 + wave;
    for (var i = 0; i < count; i++) {
      var d = dirs[1 + (i % 2)]; // east and west
      waveSpawns.push({ delay:t, type:'scout', x:d.x+(Math.random()-0.5)*2, y:d.y+(Math.random()-0.5)*2, hp:scoutHp, speed:scoutSpeed, reward:goldPerKill, color:'#66dd66', radius:0.3 });
      t += 1.0;
    }
    // First soldier at wave 6
    if (wave >= 6) {
      var d = dirs[1];
      waveSpawns.push({ delay:t, type:'soldier', x:d.x, y:d.y, hp:scoutHp*2.5, speed:scoutSpeed*0.7, reward:goldPerKill*2, color:'#ffcc44', radius:0.4 });
      t += 1.0;
    }
  } else if (wave <= 10) {
    // Three directions, soldiers mixed in
    var scoutCount = 4 + wave;
    for (var i = 0; i < scoutCount; i++) {
      var d = dirs[1 + (i % 3)];
      waveSpawns.push({ delay:t, type:'scout', x:d.x+(Math.random()-0.5)*2, y:d.y+(Math.random()-0.5)*2, hp:scoutHp, speed:scoutSpeed, reward:goldPerKill, color:'#66dd66', radius:0.3 });
      t += 0.7;
    }
    var soldierCount = Math.floor((wave-5)*0.8);
    for (var i = 0; i < soldierCount; i++) {
      var d = dirs[1 + (i % 3)];
      waveSpawns.push({ delay:t, type:'soldier', x:d.x+(Math.random()-0.5), y:d.y+(Math.random()-0.5), hp:scoutHp*2.5, speed:scoutSpeed*0.7, reward:goldPerKill*2, color:'#ffcc44', radius:0.4 });
      t += 0.8;
    }
  } else {
    // All 4 directions, full army, tanks
    var scoutCount = 6 + Math.floor(wave * 1.0);
    for (var i = 0; i < scoutCount; i++) {
      var d = dirs[1 + (i % 4)];
      waveSpawns.push({ delay:t, type:'scout', x:d.x+(Math.random()-0.5)*2, y:d.y+(Math.random()-0.5)*2, hp:scoutHp, speed:scoutSpeed, reward:goldPerKill, color:'#66dd66', radius:0.3 });
      t += 0.5;
    }
    var soldierCount = Math.floor(2 + (wave-10)*0.7);
    for (var i = 0; i < soldierCount; i++) {
      var d = dirs[1 + (i % 4)];
      waveSpawns.push({ delay:t, type:'soldier', x:d.x, y:d.y, hp:scoutHp*2.5, speed:scoutSpeed*0.7, reward:goldPerKill*2, color:'#ffcc44', radius:0.4 });
      t += 0.7;
    }
    // Tanks from wave 12
    if (wave >= 12) {
      var tc = Math.floor(1 + (wave-12)*0.3);
      for (var i = 0; i < tc; i++) {
        var d = dirs[1 + (i % 4)];
        waveSpawns.push({ delay:t, type:'tank', x:d.x, y:d.y, hp:scoutHp*5, speed:scoutSpeed*0.5, reward:goldPerKill*3, color:'#ff6666', radius:0.5, armor:1+Math.floor(wave/5) });
        t += 1.2;
      }
    }
  }

  // Boss every 5 waves starting at wave 10
  if (wave >= 10 && wave % 5 === 0) {
    waveSpawns.push({ delay:t+2, type:'boss', x:0, y:CY, hp:scoutHp*10, speed:scoutSpeed*0.4, reward:goldPerKill*5, color:'#cc44ff', radius:0.6, armor:2+Math.floor(wave/5) });
  }

  spawnTimer = 0;
}

// ============================================================
// GAME STATE
// ============================================================
var state = 'title'; // title, playing, gameover
var animTimer = 0;
var canvas = document.getElementById('gameCanvas');
var pipeline = new RenderPipeline(canvas, {
  layers:[{name:'ground',worldSpace:true},{name:'entities',worldSpace:true},{name:'fx',worldSpace:true},{name:'ui',worldSpace:false}],
  lighting:{enabled:true,ambient:{color:'#667766',intensity:0.85},applyAfterLayer:'fx'},
  postfx:{bloom:{enabled:false},vignette:{enabled:true,radius:0.7,softness:0.4,color:'#000',intensity:0.4},screenFlash:{enabled:true}},
});
pipeline.camera.x = CX * TS + TS/2;
pipeline.camera.y = CY * TS + TS/2;
var vfx = new VFXManager({canvas:canvas,maxParticles:500});

function shadeHex(hex, amt) {
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

function startGame() {
  state = 'playing';
  initMap();
  towers = []; enemies = []; projectiles = []; drops = []; floats = [];
  player.x = CX + 0.5; player.y = CY + 3.5; player.hp = CFG.START_HP; player.maxHp = CFG.START_HP;
  player.gold = CFG.START_GOLD; player.kills = 0; player.selectedTower = 0;
  player.hurtTimer = 0;
  wave = 0; waveTimer = 15; waveActive = false; castleHp = CFG.CASTLE_HP;
}

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', function(e) {
  if (state === 'title') { startGame(); return; }
  if (state === 'gameover') { state = 'title'; return; }
  if (e.key >= '1' && e.key <= '4') { player.selectedTower = parseInt(e.key) - 1; return; }
  if (e.key === ' ' || e.key === 'e' || e.key === 'E') {
    // Place tower at player position
    var tx = Math.floor(player.x), ty = Math.floor(player.y);
    if (canPlace(tx, ty) && player.gold >= CFG.TOWERS[player.selectedTower].cost) {
      player.gold -= CFG.TOWERS[player.selectedTower].cost;
      towers.push(new Tower(tx, ty, player.selectedTower));
      map[ty][tx] = 4; // tower placed
      SFX.place();
    }
    return;
  }
});
canvas.addEventListener('click', function() {
  if (state === 'title') startGame();
  else if (state === 'gameover') state = 'title';
});

// Touch controls (touch + pointer fallback for hybrid devices)
document.querySelectorAll('.dpad-btn').forEach(function(btn) {
  function down(e) { e.preventDefault(); keys[btn.dataset.key] = true; }
  function up(e) { keys[btn.dataset.key] = false; }
  btn.addEventListener('touchstart', down, {passive: false});
  btn.addEventListener('touchend', up);
  btn.addEventListener('touchcancel', up);
  btn.addEventListener('pointerdown', down);
  btn.addEventListener('pointerup', up);
  btn.addEventListener('pointerleave', up);
});
document.querySelectorAll('.ability-btn').forEach(function(btn) {
  function fire(e) {
    e.preventDefault();
    document.dispatchEvent(new KeyboardEvent('keydown', {key: btn.dataset.key}));
  }
  btn.addEventListener('touchstart', fire, {passive: false});
  btn.addEventListener('pointerdown', fire);
});
// Clear all keys on window blur (prevents stuck keys if tab-switching)
window.addEventListener('blur', function() { keys = {}; });

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  if (state !== 'playing') return;
  animTimer += dt;

  // Collision helpers
  var PR = 0.2; // player collision radius (fits within single tile)
  function isSolid(gx, gy) {
    if (gx < 0 || gx >= MW || gy < 0 || gy >= MH) return true;
    var t = map[gy][gx];
    return t === 2 || t === 1; // towers (4) are walkable
  }
  function wouldCollide(px, py) {
    var tiles = [
      [Math.floor(px-PR), Math.floor(py-PR)],
      [Math.floor(px+PR), Math.floor(py-PR)],
      [Math.floor(px-PR), Math.floor(py+PR)],
      [Math.floor(px+PR), Math.floor(py+PR)]
    ];
    for (var ti = 0; ti < 4; ti++) {
      if (isSolid(tiles[ti][0], tiles[ti][1])) return true;
    }
    return false;
  }

  // Player movement (real-time WASD) — disabled during knockback
  var dx = 0, dy = 0;
  if (player.hurtTimer <= 0) {
    if (keys['ArrowUp'] || keys['w']) dy = -1;
    if (keys['ArrowDown'] || keys['s']) dy = 1;
    if (keys['ArrowLeft'] || keys['a']) dx = -1;
    if (keys['ArrowRight'] || keys['d']) dx = 1;
  }
  if (dx !== 0 || dy !== 0) {
    var len = Math.sqrt(dx*dx+dy*dy);
    var nx = player.x + (dx/len) * CFG.PLAYER_SPEED * dt;
    var ny = player.y + (dy/len) * CFG.PLAYER_SPEED * dt;
    // Bounds
    nx = Math.max(0.3, Math.min(MW - 0.3, nx));
    ny = Math.max(0.3, Math.min(MH - 0.3, ny));
    // If already overlapping a solid (stuck), allow all movement to escape
    var alreadyStuck = wouldCollide(player.x, player.y);
    if (alreadyStuck) {
      // Only block if new position is ALSO stuck (don't let them go deeper)
      if (!wouldCollide(nx, ny)) { player.x = nx; player.y = ny; }
      else if (!wouldCollide(nx, player.y)) { player.x = nx; }
      else if (!wouldCollide(player.x, ny)) { player.y = ny; }
      // else: every direction is solid, just let them move to escape
      else { player.x = nx; player.y = ny; }
    } else {
      // Normal: try X and Y independently so sliding along walls works
      var canX = !wouldCollide(nx, player.y);
      var canY = !wouldCollide(player.x, ny);
      if (canX) player.x = nx;
      if (canY) player.y = ny;
    }
  }

  // Pick up gold drops
  for (var i = drops.length - 1; i >= 0; i--) {
    var dr = drops[i];
    dr.life -= dt;
    if (dr.life <= 0) { drops.splice(i, 1); continue; }
    var dd = Math.sqrt((dr.x-player.x)*(dr.x-player.x)+(dr.y-player.y)*(dr.y-player.y));
    if (dd < CFG.PICKUP_RANGE) {
      player.gold += dr.amount;
      floats.push({ x:dr.x, y:dr.y-0.3, text:'+'+dr.amount+'g', color:'#ffcc00', life:0.8 });
      drops.splice(i, 1);
    }
  }

  // Wave spawning
  if (!waveActive) {
    waveTimer -= dt;
    if (waveTimer <= 0) startWave();
  } else {
    spawnTimer += dt;
    var spawned = false;
    for (var i = 0; i < waveSpawns.length; i++) {
      var ws = waveSpawns[i];
      if (ws.spawned) continue;
      if (spawnTimer >= ws.delay) {
        enemies.push(new Enemy(ws.x, ws.y, ws.hp, ws.speed, ws.reward, ws.color, ws.radius, ws.armor||0, ws.type));
        ws.spawned = true; spawned = true;
      }
    }
    // Check wave complete
    var allSpawned = true;
    for (var i = 0; i < waveSpawns.length; i++) if (!waveSpawns[i].spawned) { allSpawned = false; break; }
    if (allSpawned && enemies.length === 0) {
      waveActive = false;
      waveTimer = CFG.WAVE_DELAY;
      // Bonus gold between waves
      var bonus = 5 + wave * 2;
      player.gold += bonus;
      floats.push({ x:player.x, y:player.y-0.5, text:'+'+bonus+'g bonus', color:'#ffcc00', life:1.2 });
    }
  }

  // Update enemies
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    e.update(dt);
    if (!e.alive && e.reachedCastle) {
      castleHp -= 10 + wave;
      SFX.hurt();
      floats.push({ x:CX, y:CY-1, text:'-'+(10+wave)+' Castle', color:'#ff4444', life:1.0 });
      if (castleHp <= 0) { castleHp = 0; state = 'gameover'; SFX.gameover(); submitScore('castle-run', player.kills + wave * 10); }
    }
    if (!e.alive) enemies.splice(i, 1);
  }

  // Player-enemy contact damage
  if (player.hurtTimer > 0) {
    player.hurtTimer -= dt;
  } else {
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (!e.alive) continue;
      var cdx = player.x - e.x, cdy = player.y - e.y;
      var cdist = Math.sqrt(cdx * cdx + cdy * cdy);
      if (cdist < e.radius + 0.3) {
        // Hit!
        player.hp -= CFG.CONTACT_DAMAGE;
        player.hurtTimer = CFG.HURT_COOLDOWN;
        SFX.hurt();
        floats.push({ x: player.x, y: player.y - 0.5, text: '-' + CFG.CONTACT_DAMAGE, color: '#ff4444', life: 0.8 });
        pipeline.flash('#ff0000', 0.3);
        // VFX burst at hit point
        vfx.createEmitter({
          position: { x: player.x * TS + TS / 2, y: player.y * TS + TS / 2 },
          burstCount: 8, duration: 0.01,
          particle: {
            speed: [40, 100], angle: [0, Math.PI * 2],
            life: [0.2, 0.4], size: [2, 4],
            color: '#ff4444'
          }
        });
        // Instant knockback — teleport player away from enemy
        var kbDist = CFG.KNOCKBACK_DIST;
        if (cdist > 0.01) {
          player.x += (cdx / cdist) * kbDist;
          player.y += (cdy / cdist) * kbDist;
        } else {
          player.y -= kbDist; // default: push north
        }
        player.x = Math.max(0.5, Math.min(MW - 0.5, player.x));
        player.y = Math.max(0.5, Math.min(MH - 0.5, player.y));
        if (player.hp <= 0) {
          player.hp = 0;
          state = 'gameover';
          SFX.gameover();
          submitScore('castle-run', player.kills + wave * 10);
        }
        break;
      }
    }
  }

  // Update towers
  for (var i = 0; i < towers.length; i++) towers[i].update(dt);

  // Update projectiles
  updateProjectiles(dt);

  // Floating text
  for (var i = floats.length - 1; i >= 0; i--) {
    floats[i].y -= 1.5 * dt;
    floats[i].life -= dt;
    if (floats[i].life <= 0) floats.splice(i, 1);
  }

  // Camera: fixed at map center (map fits on most screens)
  pipeline.camera.x = MW * TS / 2;
  pipeline.camera.y = MH * TS / 2;
}

// ============================================================
// DRAWING
// ============================================================
function draw() {
  pipeline.begin();

  if (state === 'title') {
    pipeline.setLayer('ui');
    var ctx = pipeline.getCtx();
    var w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#0a1008'; ctx.fillRect(0,0,w,h);
    ctx.fillStyle = '#44aa44'; ctx.font = 'bold '+Math.round(w*0.05)+'px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('CASTLE RUN', w/2, h*0.3);
    ctx.fillStyle = '#888'; ctx.font = Math.round(w*0.02)+'px Segoe UI';
    ctx.fillText('Run around placing towers to defend your castle', w/2, h*0.38);
    ctx.fillStyle = '#667'; ctx.font = Math.round(w*0.015)+'px Segoe UI';
    var cy = h*0.5;
    ctx.fillText('WASD / Arrows \u2014 Move', w/2, cy);
    ctx.fillText('1-4 \u2014 Select tower type', w/2, cy + w*0.025);
    ctx.fillText('Space / E \u2014 Place tower at your feet', w/2, cy + w*0.05);
    ctx.fillText('Run over gold drops to collect them', w/2, cy + w*0.075);
    ctx.fillStyle = '#aab'; ctx.font = 'bold '+Math.round(w*0.02)+'px Segoe UI';
    ctx.globalAlpha = 0.5 + Math.sin(animTimer*3)*0.3;
    ctx.fillText('Click or press any key to start', w/2, h*0.8);
    ctx.globalAlpha = 1;
    pipeline.end(); return;
  }

  var camX = player.x * TS + TS/2, camY = player.y * TS + TS/2;

  // Ground layer
  pipeline.setLayer('ground');
  var gctx = pipeline.getCtx();
  pipeline.camera.applyTransform(gctx);

  // Fill area outside map with dark earth
  gctx.fillStyle = '#1a1a10';
  gctx.fillRect(-500, -500, MW*TS+1000, MH*TS+1000);

  // Draw all tiles
  for (var ty = 0; ty < MH; ty++) {
    for (var tx = 0; tx < MW; tx++) {
      var sx = tx*TS, sy = ty*TS;
      var tile = map[ty][tx];
      var hash = ((tx*374761393+ty*668265263)>>>0);

      if (tile === 0) {
        // === GRASS — rich multi-layer with clumps, wildflowers, rocks, mushrooms ===
        var gv = Math.sin(tx*0.53+ty*0.79)*6 + Math.cos(tx*0.37+ty*1.1)*4;
        var baseG = Math.round(gv);
        // Base layer — 3 shades blended
        var gcols = ['#3a6a28','#3d7030','#426832'];
        gctx.fillStyle = gcols[hash%3];
        gctx.fillRect(sx,sy,TS,TS);
        // Darker sub-patch
        if ((hash%5)<2) {
          gctx.fillStyle = shadeHex('#3a6a28', baseG-6);
          gctx.fillRect(sx+3,sy+5,TS-6,TS-8);
        }
        // Lighter highlight patch
        if ((hash%9)===0) {
          gctx.fillStyle = '#5a8a40';
          gctx.fillRect(sx+8,sy+8,10,10);
        }
        // Grass clumps — small tapered triangles
        var nBlades = 3 + (hash%3);
        for (var bi = 0; bi < nBlades; bi++) {
          var bx2 = sx + ((hash>>(bi*4+2))%26)+3;
          var by2 = sy + ((hash>>(bi*4+6))%22)+5;
          var bh = 3 + (hash>>(bi*3))%4;
          var gbright = (bi%2===0) ? '#5a8840' : '#4a7838';
          gctx.fillStyle = gbright;
          gctx.beginPath();
          gctx.moveTo(bx2, by2);
          gctx.lineTo(bx2-2, by2+bh);
          gctx.lineTo(bx2+2, by2+bh);
          gctx.closePath(); gctx.fill();
        }
        // Wildflowers
        if ((hash%11)<3) {
          var fcolors = ['#ee6688','#eeee44','#8866ee','#ff7722','#44ddaa','#ff99bb'];
          var fc2 = fcolors[(hash>>3)%6];
          var fx2 = sx+((hash>>5)%20)+5, fy2 = sy+((hash>>7)%20)+5;
          // Stem
          gctx.fillStyle = '#3a6a28';
          gctx.fillRect(fx2, fy2+2, 1, 3);
          // Petals
          gctx.fillStyle = fc2;
          gctx.fillRect(fx2-1, fy2, 3, 2);
          gctx.fillRect(fx2, fy2-1, 1, 4);
          // Center
          gctx.fillStyle = '#ffee88';
          gctx.fillRect(fx2, fy2, 1, 1);
        }
        // Mushroom
        if ((hash%23)===0) {
          var mx2 = sx+((hash>>9)%18)+7, my2 = sy+((hash>>11)%14)+10;
          gctx.fillStyle = '#cc4422'; // cap
          gctx.beginPath(); gctx.arc(mx2, my2, 4, Math.PI, 0); gctx.fill();
          gctx.fillStyle = '#eecc99'; // stem
          gctx.fillRect(mx2-1, my2, 2, 3);
          gctx.fillStyle = '#ffffff'; // spots
          gctx.fillRect(mx2-2, my2-2, 1, 1);
          gctx.fillRect(mx2+1, my2-1, 1, 1);
        }
        // Small rocks
        if ((hash%17)===0) {
          var rx2 = sx+((hash>>6)%20)+5, ry2 = sy+((hash>>8)%18)+7;
          gctx.fillStyle = '#7a7a6a';
          gctx.beginPath(); gctx.ellipse(rx2, ry2, 3, 2, (hash%4)*0.4, 0, Math.PI*2); gctx.fill();
          gctx.fillStyle = '#9a9a8a';
          gctx.fillRect(rx2-1, ry2-1, 2, 1);
        }
        // Fallen leaf
        if ((hash%31)===0) {
          var lx2 = sx+((hash>>12)%22)+4, ly2 = sy+((hash>>14)%20)+5;
          var lcolors = ['#bb6622','#cc8833','#aa5511','#dd9944'];
          gctx.fillStyle = lcolors[(hash>>16)%4];
          gctx.beginPath(); gctx.ellipse(lx2, ly2, 3, 1.5, (hash%6)*0.5, 0, Math.PI*2); gctx.fill();
        }

      } else if (tile === 3) {
        // === PATH — cobblestone road with mortar, worn center, creeping grass ===
        // Base dirt/mortar fill
        var ptint2 = ((hash%7)-3)*2;
        gctx.fillStyle = '#5a5040';
        gctx.fillRect(sx,sy,TS,TS);
        // Draw individual cobblestones (5-7 per tile)
        var nStones = 5 + (hash%3);
        var stonePositions = [
          [2,2,12,11], [15,2,13,10], [2,14,11,12], [14,14,14,11],
          [6,8,10,9], [18,8,9,8], [1,24,14,7]
        ];
        for (var si = 0; si < nStones; si++) {
          var sp = stonePositions[si % 7];
          var scx = sx + sp[0], scy = sy + sp[1];
          var sw2 = sp[2] + ((hash>>(si*3))%3)-1;
          var sh2 = sp[3] + ((hash>>(si*2+1))%3)-1;
          // Stone color variation
          var sv = ((hash>>(si*5))%5)-2;
          gctx.fillStyle = shadeHex('#7a6e58', sv*4 + ptint2);
          // Rounded stone
          gctx.beginPath();
          gctx.roundRect(scx, scy, sw2, sh2, 2);
          gctx.fill();
          // Highlight edge
          gctx.fillStyle = shadeHex('#8a7e68', sv*4 + ptint2 + 8);
          gctx.fillRect(scx+1, scy+1, sw2-2, 2);
          // Shadow edge
          gctx.fillStyle = shadeHex('#4a4438', sv*4 + ptint2);
          gctx.fillRect(scx+1, scy+sh2-2, sw2-2, 1);
        }
        // Worn lighter center strip
        gctx.fillStyle = 'rgba(160,148,120,0.15)';
        gctx.fillRect(sx+7, sy+7, TS-14, TS-14);
        // Mortar crack lines
        gctx.strokeStyle = 'rgba(40,34,24,0.4)';
        gctx.lineWidth = 0.5;
        gctx.beginPath(); gctx.moveTo(sx+14,sy); gctx.lineTo(sx+14,sy+TS); gctx.stroke();
        gctx.beginPath(); gctx.moveTo(sx,sy+13); gctx.lineTo(sx+TS,sy+13); gctx.stroke();
        // Grass blades creeping in from edges
        gctx.fillStyle = '#4a7030';
        if ((hash%4)===0) {
          gctx.beginPath(); gctx.moveTo(sx+1,sy+4); gctx.lineTo(sx+3,sy); gctx.lineTo(sx+5,sy+4); gctx.fill();
          gctx.beginPath(); gctx.moveTo(sx+6,sy+5); gctx.lineTo(sx+8,sy+1); gctx.lineTo(sx+10,sy+5); gctx.fill();
        }
        if ((hash%4)===1) {
          gctx.beginPath(); gctx.moveTo(sx+TS-5,sy+TS-1); gctx.lineTo(sx+TS-3,sy+TS-5); gctx.lineTo(sx+TS-1,sy+TS-1); gctx.fill();
        }
        if ((hash%4)===2) {
          gctx.beginPath(); gctx.moveTo(sx+2,sy+TS-4); gctx.lineTo(sx+4,sy+TS); gctx.lineTo(sx+6,sy+TS-4); gctx.fill();
        }

      } else if (tile === 2) {
        // === CASTLE — stone blocks with individual bricks, turrets, flag, arrow slits, torches ===
        var isEdge2 = (tx===CX-1||tx===CX+1||ty===CY-1||ty===CY+1);
        var isCorner2 = (Math.abs(tx-CX)===1&&Math.abs(ty-CY)===1);
        var isCenter2 = (tx===CX&&ty===CY);
        // Base stone
        gctx.fillStyle = '#545464'; gctx.fillRect(sx,sy,TS,TS);
        // Brick rows (offset every other row)
        var brickH = 8, brickW = 14;
        for (var row = 0; row < 4; row++) {
          var rsy = sy + row*brickH;
          var offset = (row%2===0) ? 0 : brickW/2;
          for (var col = 0; col*brickW < TS+brickW; col++) {
            var brx = sx + col*brickW - offset;
            var bv2 = ((row*7+col*13+tx*3+ty*5)%7)-3;
            gctx.fillStyle = shadeHex('#5c5c72', bv2*3);
            gctx.fillRect(brx+1, rsy+1, brickW-2, brickH-2);
            // Brick top highlight
            gctx.fillStyle = 'rgba(255,255,255,0.08)';
            gctx.fillRect(brx+1, rsy+1, brickW-2, 2);
          }
        }
        // Mortar grid
        gctx.strokeStyle = 'rgba(20,18,28,0.5)'; gctx.lineWidth = 1;
        for (var row2 = 0; row2 <= 4; row2++) {
          gctx.beginPath(); gctx.moveTo(sx,sy+row2*brickH); gctx.lineTo(sx+TS,sy+row2*brickH); gctx.stroke();
        }

        if (isCorner2) {
          // Turret towers at corners — raised with crenellations
          gctx.fillStyle = '#6a6a80'; gctx.fillRect(sx,sy,TS,TS);
          // Raised lip
          gctx.fillStyle = '#7a7a90'; gctx.fillRect(sx+2,sy+2,TS-4,6);
          // Crenellations (merlons and gaps)
          var merlonW = 6, gapW = 4, crenX = sx;
          while (crenX < sx+TS) {
            gctx.fillStyle = '#7a7a90';
            gctx.fillRect(crenX, sy-4, merlonW, 6);
            // Merlon shadow
            gctx.fillStyle = 'rgba(0,0,0,0.3)';
            gctx.fillRect(crenX, sy+1, merlonW, 2);
            crenX += merlonW + gapW;
          }
          crenX = sx;
          while (crenX < sx+TS) {
            gctx.fillStyle = '#7a7a90';
            gctx.fillRect(crenX, sy+TS-2, merlonW, 6);
            crenX += merlonW + gapW;
          }
          // Corner orb detail
          gctx.fillStyle = '#8888aa';
          gctx.beginPath(); gctx.arc(sx+TS/2, sy+TS/2, 5, 0, Math.PI*2); gctx.fill();
          gctx.fillStyle = '#aaaacc';
          gctx.beginPath(); gctx.arc(sx+TS/2-1, sy+TS/2-1, 2, 0, Math.PI*2); gctx.fill();
        }

        if (isCenter2) {
          // Castle center — flag with pole
          gctx.fillStyle = '#6a6a7a'; gctx.fillRect(sx,sy,TS,TS);
          // Stone floor
          gctx.fillStyle = '#585870'; gctx.fillRect(sx+2,sy+2,TS-4,TS-4);
          // Flagpole
          gctx.fillStyle = '#c8b880';
          gctx.fillRect(sx+TS/2-1, sy+1, 2, TS-2);
          // Flag banner — waving
          var wave0 = Math.sin(animTimer*2.5)*1.2;
          var wave1 = Math.sin(animTimer*2.5+0.8)*1.5;
          var wave2 = Math.sin(animTimer*2.5+1.6)*1.0;
          gctx.fillStyle = '#cc2222';
          gctx.beginPath();
          gctx.moveTo(sx+TS/2+1, sy+4);
          gctx.lineTo(sx+TS/2+6,  sy+6+wave0);
          gctx.lineTo(sx+TS/2+10, sy+8+wave1);
          gctx.lineTo(sx+TS/2+6,  sy+10+wave2);
          gctx.lineTo(sx+TS/2+1,  sy+12);
          gctx.closePath(); gctx.fill();
          // Flag crease
          gctx.strokeStyle = '#aa1111'; gctx.lineWidth = 0.5;
          gctx.beginPath();
          gctx.moveTo(sx+TS/2+3, sy+5);
          gctx.lineTo(sx+TS/2+8, sy+8+wave1*0.5);
          gctx.lineTo(sx+TS/2+3, sy+11);
          gctx.stroke();
          // Gold finial
          gctx.fillStyle = '#ffcc44';
          gctx.beginPath(); gctx.arc(sx+TS/2, sy+2, 2.5, 0, Math.PI*2); gctx.fill();
        }

        if (isEdge2 && !isCorner2) {
          // Wall tiles — arrow slits with depth
          var slitX = sx+TS/2-2, slitY = sy+TS/2-5;
          // Outer dark recess
          gctx.fillStyle = '#1a1820';
          gctx.fillRect(slitX-1, slitY-1, 6, 12);
          // Slit shape
          gctx.fillStyle = '#0a0810';
          gctx.fillRect(slitX, slitY, 4, 4); // top cross
          gctx.fillRect(slitX+1, slitY+4, 2, 6); // vertical slot
          // Inner glow (torch light leaking)
          gctx.fillStyle = 'rgba(255,160,60,0.15)';
          gctx.fillRect(slitX, slitY, 4, 10);
          // Torch sconce on wall
          var torchX2 = sx + ((hash%2)===0 ? 4 : TS-8);
          var torchY2 = sy + 8;
          gctx.fillStyle = '#8a6a3a';
          gctx.fillRect(torchX2, torchY2, 4, 6);
          // Flame
          var flk = Math.sin(animTimer*8 + tx*1.7)*1.5;
          gctx.fillStyle = '#ff8822';
          gctx.beginPath(); gctx.arc(torchX2+2, torchY2-3+flk, 3, 0, Math.PI*2); gctx.fill();
          gctx.fillStyle = '#ffee44';
          gctx.beginPath(); gctx.arc(torchX2+2, torchY2-2+flk*0.5, 1.5, 0, Math.PI*2); gctx.fill();
          // Torch light
          pipeline.addLight(torchX2+2, torchY2, {color:'#ff8822', radius:TS*2, intensity:0.5, flicker:0.08, falloff:'quadratic'});
        }

      } else if (tile === 4) {
        // === TOWER BASE — circular stone platform with runes ===
        // Background fill
        gctx.fillStyle = '#383840'; gctx.fillRect(sx,sy,TS,TS);
        // Outer ring
        gctx.strokeStyle = '#555568'; gctx.lineWidth = 2;
        gctx.beginPath(); gctx.arc(sx+TS/2, sy+TS/2, TS/2-2, 0, Math.PI*2); gctx.stroke();
        // Middle ring
        gctx.strokeStyle = '#444455'; gctx.lineWidth = 1.5;
        gctx.beginPath(); gctx.arc(sx+TS/2, sy+TS/2, TS/2-6, 0, Math.PI*2); gctx.stroke();
        // Platform fill
        gctx.fillStyle = '#484858';
        gctx.beginPath(); gctx.arc(sx+TS/2, sy+TS/2, TS/2-3, 0, Math.PI*2); gctx.fill();
        // Raised edge highlight
        gctx.strokeStyle = 'rgba(255,255,255,0.12)'; gctx.lineWidth = 1;
        gctx.beginPath(); gctx.arc(sx+TS/2-1, sy+TS/2-1, TS/2-3, Math.PI*1.1, Math.PI*1.9); gctx.stroke();
        // Shadow beneath
        gctx.strokeStyle = 'rgba(0,0,0,0.4)'; gctx.lineWidth = 1;
        gctx.beginPath(); gctx.arc(sx+TS/2+1, sy+TS/2+1, TS/2-3, Math.PI*0.1, Math.PI*0.9); gctx.stroke();
        // Carved rune marks (4 points)
        gctx.fillStyle = '#5a5a70';
        for (var ri = 0; ri < 4; ri++) {
          var ra = ri*Math.PI/2 - Math.PI/4;
          var rpx = sx+TS/2+Math.cos(ra)*8, rpy = sy+TS/2+Math.sin(ra)*8;
          gctx.beginPath(); gctx.arc(rpx, rpy, 1.5, 0, Math.PI*2); gctx.fill();
        }
        // Center dot
        gctx.fillStyle = '#6a6a80';
        gctx.beginPath(); gctx.arc(sx+TS/2, sy+TS/2, 2.5, 0, Math.PI*2); gctx.fill();
      }
    }
  }

  // Entities layer
  pipeline.setLayer('entities');
  var ectx = pipeline.getCtx();
  pipeline.camera.applyTransform(ectx);

  // === GOLD DROPS — spinning coin effect with sparkles ===
  for (var i = 0; i < drops.length; i++) {
    var dr = drops[i];
    var bob = Math.sin(animTimer*3+i*1.3)*2;
    var coinX = dr.x*TS+TS/2, coinY = dr.y*TS+TS/2+bob;
    var spinW = Math.abs(Math.cos(animTimer*4+i*0.7))*5+1; // varies 1-6, looks like rotation
    // Drop shadow
    ectx.fillStyle = 'rgba(0,0,0,0.3)';
    ectx.beginPath(); ectx.ellipse(coinX, coinY+7, spinW*0.8, 1.5, 0, 0, Math.PI*2); ectx.fill();
    // Coin edge (dark gold ring)
    ectx.fillStyle = '#aa7700';
    ectx.beginPath(); ectx.ellipse(coinX, coinY, spinW+1, 6, 0, 0, Math.PI*2); ectx.fill();
    // Coin face
    ectx.fillStyle = '#ffcc00';
    ectx.beginPath(); ectx.ellipse(coinX, coinY, spinW, 5, 0, 0, Math.PI*2); ectx.fill();
    // Shine
    ectx.fillStyle = '#ffee88';
    ectx.beginPath(); ectx.ellipse(coinX-1, coinY-1, Math.max(1,spinW*0.5), 2, 0, 0, Math.PI*2); ectx.fill();
    // G symbol on coin (when wide enough)
    if (spinW > 3) {
      ectx.fillStyle = '#cc9900';
      ectx.font = 'bold 6px serif'; ectx.textAlign = 'center';
      ectx.fillText('G', coinX, coinY+2);
    }
    // Sparkle particles around coin
    for (var sp = 0; sp < 3; sp++) {
      var sangle = animTimer*3 + sp*Math.PI*2/3 + i;
      var sdist = 7+Math.sin(animTimer*5+sp)*2;
      var spx = coinX + Math.cos(sangle)*sdist;
      var spy = coinY + Math.sin(sangle)*sdist*0.5;
      var salpha = 0.4 + Math.sin(animTimer*6+sp)*0.3;
      ectx.globalAlpha = Math.max(0, salpha);
      ectx.fillStyle = '#ffee44';
      ectx.fillRect(spx-1, spy-1, 2, 2);
    }
    ectx.globalAlpha = 1;
  }

  // === TOWERS — detailed structures per type ===
  for (var i = 0; i < towers.length; i++) {
    var t = towers[i];
    var twx = t.x*TS, twy = t.y*TS;
    var tcx = twx + TS/2, tcy = twy + TS/2;
    ectx.save();
    ectx.translate(tcx, tcy);

    if (t.typeIdx === 0) {
      // === ARROW TOWER — tall wooden watchtower, warm brown ===
      // Shadow
      ectx.fillStyle = 'rgba(0,0,0,0.25)';
      ectx.beginPath(); ectx.ellipse(2, 13, 12, 4, 0, 0, Math.PI*2); ectx.fill();
      // Wooden post (thick, textured)
      ectx.fillStyle = '#8B6834';
      ectx.fillRect(-4, 0, 8, 14);
      ectx.fillStyle = '#7A5824';
      ectx.fillRect(-4, 0, 3, 14);
      // Cross-braces
      ectx.strokeStyle = '#6A4814'; ectx.lineWidth = 1;
      ectx.beginPath(); ectx.moveTo(-4,4); ectx.lineTo(4,10); ectx.stroke();
      ectx.beginPath(); ectx.moveTo(4,4); ectx.lineTo(-4,10); ectx.stroke();
      // Platform
      ectx.fillStyle = '#9A7844';
      ectx.fillRect(-10, -3, 20, 5);
      ectx.fillStyle = '#8A6834';
      ectx.fillRect(-10, 1, 20, 1);
      // Peaked red roof (tall, distinctive)
      ectx.fillStyle = '#AA3322';
      ectx.beginPath(); ectx.moveTo(0,-18); ectx.lineTo(-11,-3); ectx.lineTo(11,-3); ectx.closePath(); ectx.fill();
      ectx.fillStyle = '#CC4433';
      ectx.beginPath(); ectx.moveTo(0,-18); ectx.lineTo(-11,-3); ectx.lineTo(0,-3); ectx.closePath(); ectx.fill();
      // Rotating crossbow
      ectx.save(); ectx.rotate(t.angle);
      ectx.fillStyle = '#6A4814';
      ectx.fillRect(0, -1.5, 13, 3);
      ectx.fillStyle = '#FFD700'; // gold arrowhead
      ectx.beginPath(); ectx.moveTo(13,0); ectx.lineTo(10,-3); ectx.lineTo(10,3); ectx.closePath(); ectx.fill();
      ectx.restore();
      pipeline.addLight(tcx, tcy, {color:'#ffcc88', radius:TS*2, intensity:0.35, flicker:0.02});

    } else if (t.typeIdx === 1) {
      // === CANNON TOWER — squat dark fortress, wide and heavy ===
      // Shadow
      ectx.fillStyle = 'rgba(0,0,0,0.3)';
      ectx.beginPath(); ectx.ellipse(2, 14, 14, 5, 0, 0, Math.PI*2); ectx.fill();
      // Wide stone base
      ectx.fillStyle = '#4A4A55';
      ectx.fillRect(-12, -4, 24, 16);
      ectx.fillStyle = '#555565';
      ectx.fillRect(-12, -4, 24, 4);
      // Brick lines
      ectx.strokeStyle = '#333340'; ectx.lineWidth = 0.7;
      for (var bl = 0; bl < 4; bl++) { ectx.beginPath(); ectx.moveTo(-12,-2+bl*4); ectx.lineTo(12,-2+bl*4); ectx.stroke(); }
      // Crenellations (wide, flat top — VERY different from arrow tower's peak)
      ectx.fillStyle = '#555565';
      for (var cr = 0; cr < 5; cr++) { ectx.fillRect(-12+cr*6, -8, 4, 5); }
      // BIG rotating cannon barrel (orange/dark iron, much wider than crossbow)
      ectx.save(); ectx.rotate(t.angle);
      ectx.fillStyle = '#3A3A40';
      ectx.fillRect(-2, -4, 18, 8); // thick barrel
      ectx.fillStyle = '#FF6600'; // hot orange muzzle ring
      ectx.beginPath(); ectx.arc(16, 0, 4.5, 0, Math.PI*2); ectx.fill();
      ectx.fillStyle = '#2A2A30';
      ectx.beginPath(); ectx.arc(16, 0, 2.5, 0, Math.PI*2); ectx.fill(); // bore
      // Smoke puff
      var sp = Math.sin(animTimer*5);
      ectx.fillStyle = 'rgba(255,150,50,0.2)';
      ectx.beginPath(); ectx.arc(19+sp, -2, 3+sp, 0, Math.PI*2); ectx.fill();
      ectx.restore();
      pipeline.addLight(tcx, tcy, {color:'#ff6600', radius:TS*2.2, intensity:0.4, flicker:0.06});

    } else if (t.typeIdx === 2) {
      // === ICE TOWER — tall brilliant blue crystal, very distinct from brown/grey ===
      // Frost ground circle
      ectx.fillStyle = 'rgba(100,200,255,0.15)';
      ectx.beginPath(); ectx.arc(0, 8, 14, 0, Math.PI*2); ectx.fill();
      ectx.strokeStyle = 'rgba(150,230,255,0.3)'; ectx.lineWidth = 1;
      ectx.stroke();
      // Central tall crystal spire
      ectx.globalAlpha = 0.7;
      ectx.fillStyle = '#44BBFF';
      ectx.beginPath(); ectx.moveTo(0,-20); ectx.lineTo(-6,10); ectx.lineTo(6,10); ectx.closePath(); ectx.fill();
      ectx.fillStyle = '#77DDFF';
      ectx.beginPath(); ectx.moveTo(0,-20); ectx.lineTo(-6,10); ectx.lineTo(0,10); ectx.closePath(); ectx.fill();
      // Side crystals (smaller, angled out)
      ectx.fillStyle = '#55CCFF';
      ectx.beginPath(); ectx.moveTo(-8,-10); ectx.lineTo(-12,6); ectx.lineTo(-4,6); ectx.closePath(); ectx.fill();
      ectx.fillStyle = '#33AAEE';
      ectx.beginPath(); ectx.moveTo(8,-8); ectx.lineTo(4,8); ectx.lineTo(12,8); ectx.closePath(); ectx.fill();
      // Small crystal
      ectx.fillStyle = '#88EEFF';
      ectx.beginPath(); ectx.moveTo(-3,-5); ectx.lineTo(-9,5); ectx.lineTo(-1,5); ectx.closePath(); ectx.fill();
      ectx.globalAlpha = 1;
      // Bright white core
      ectx.fillStyle = '#EEFFFF';
      ectx.beginPath(); ectx.arc(0, -4, 3, 0, Math.PI*2); ectx.fill();
      ectx.fillStyle = '#FFFFFF';
      ectx.beginPath(); ectx.arc(-1, -5, 1.5, 0, Math.PI*2); ectx.fill();
      // Orbiting frost sparkles
      for (var fi = 0; fi < 6; fi++) {
        var fa = animTimer*2 + fi*Math.PI/3;
        var fd = 10 + Math.sin(animTimer*4+fi)*3;
        ectx.fillStyle = 'rgba(200,240,255,0.8)';
        ectx.fillRect(Math.cos(fa)*fd-1, Math.sin(fa)*fd-5-1, 2, 2);
      }
      pipeline.addLight(tcx, tcy, {color:'#44CCFF', radius:TS*2.5, intensity:0.5, flicker:0.02});

    } else {
      // === ZAP TOWER — tesla coil with electric arcs ===
      // Metal base platform
      ectx.fillStyle = '#5a5560';
      ectx.beginPath(); ectx.ellipse(0, 4, 10, 4, 0, 0, Math.PI*2); ectx.fill();
      // Column
      ectx.fillStyle = '#484450';
      ectx.fillRect(-5, -10, 10, 15);
      // Metal bands on column
      ectx.strokeStyle = '#6a6678'; ectx.lineWidth = 1.5;
      ectx.beginPath(); ectx.moveTo(-5,-6); ectx.lineTo(5,-6); ectx.stroke();
      ectx.beginPath(); ectx.moveTo(-5,-1); ectx.lineTo(5,-1); ectx.stroke();
      // Orb on top
      ectx.fillStyle = '#706880';
      ectx.beginPath(); ectx.arc(0, -12, 7, 0, Math.PI*2); ectx.fill();
      ectx.fillStyle = '#9088a0';
      ectx.beginPath(); ectx.arc(-2, -14, 3, 0, Math.PI*2); ectx.fill();
      // Purple glow around orb
      ectx.fillStyle = 'rgba(160,100,255,0.25)';
      ectx.beginPath(); ectx.arc(0, -12, 10, 0, Math.PI*2); ectx.fill();
      // Electric arcs (jagged lines)
      var arcSeed = Math.floor(animTimer*8);
      for (var ai = 0; ai < 3; ai++) {
        var astart = (arcSeed + ai*31)%360 * Math.PI/180;
        ectx.strokeStyle = (ai===0) ? '#ddddff' : 'rgba(180,140,255,0.7)';
        ectx.lineWidth = ai===0 ? 1.5 : 0.8;
        ectx.beginPath();
        ectx.moveTo(0, -12);
        var arcLen = 8 + (arcSeed*ai+7)%8;
        var ax0 = Math.cos(astart)*arcLen, ay0 = Math.sin(astart)*arcLen;
        // Jagged segments
        ectx.lineTo(ax0*0.3 + ((arcSeed*ai)%5)-2, ay0*0.3 + ((arcSeed+ai*7)%5)-2);
        ectx.lineTo(ax0*0.6 + ((arcSeed*ai*3)%5)-2, ay0*0.6 + ((arcSeed+ai*11)%5)-2);
        ectx.lineTo(ax0, ay0);
        ectx.stroke();
      }
      pipeline.addLight(tcx, tcy, {color:'#aa88ff', radius:TS*2.2, intensity:0.45, flicker:0.07});
    }

    ectx.restore();

    // Level stars beneath tower
    for (var l = 0; l < t.level; l++) {
      ectx.fillStyle = '#ffdd22';
      var starX = tcx - (t.level-1)*4 + l*8;
      ectx.beginPath(); ectx.arc(starX, twy+TS-4, 2.5, 0, Math.PI*2); ectx.fill();
      ectx.fillStyle = '#ffff88';
      ectx.beginPath(); ectx.arc(starX-0.5, twy+TS-4.5, 1, 0, Math.PI*2); ectx.fill();
    }
  }

  // === ENEMIES — detailed creature designs per type ===
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i]; if (!e.alive) continue;
    var ex = e.x*TS+TS/2, ey = e.y*TS+TS/2, er = e.radius*TS;
    var isMovingE = true;
    var walkCycle = Math.sin(animTimer*7 + i*0.8); // leg animation
    var bodyBob = Math.sin(animTimer*7 + i*0.8)*1.5;

    // Oval ground shadow
    ectx.fillStyle = 'rgba(0,0,0,0.35)';
    ectx.beginPath(); ectx.ellipse(ex+2, ey+er+3, er*1.1, er*0.35, 0, 0, Math.PI*2); ectx.fill();

    ectx.save();
    ectx.translate(ex, ey + bodyBob);

    if (e.type === 'scout') {
      // === GOBLIN SCOUT — small, green, pointed ears, red eyes, dagger ===
      var sr = er;
      // Legs (alternating) — dark brown, NOT green
      ectx.fillStyle = '#5A3322';
      ectx.fillRect(-sr*0.6, sr*0.3, sr*0.5, sr*0.7 + walkCycle*sr*0.3);
      ectx.fillRect(sr*0.1, sr*0.3, sr*0.5, sr*0.7 - walkCycle*sr*0.3);
      // Body — reddish-brown so it contrasts with green grass
      ectx.fillStyle = '#CC6633';
      ectx.beginPath(); ectx.ellipse(0, 0, sr*0.8, sr, 0, 0, Math.PI*2); ectx.fill();
      // Belly lighter
      ectx.fillStyle = '#DDAA66';
      ectx.beginPath(); ectx.ellipse(0, sr*0.2, sr*0.4, sr*0.5, 0, 0, Math.PI*2); ectx.fill();
      // Head
      ectx.fillStyle = '#CC6633';
      ectx.beginPath(); ectx.arc(0, -sr*0.9, sr*0.65, 0, Math.PI*2); ectx.fill();
      // Pointed ears
      ectx.fillStyle = '#AA5522';
      ectx.beginPath(); ectx.moveTo(-sr*0.55,-sr*0.9); ectx.lineTo(-sr*0.9,-sr*1.5); ectx.lineTo(-sr*0.2,-sr*0.9); ectx.closePath(); ectx.fill();
      ectx.beginPath(); ectx.moveTo(sr*0.55,-sr*0.9); ectx.lineTo(sr*0.9,-sr*1.5); ectx.lineTo(sr*0.2,-sr*0.9); ectx.closePath(); ectx.fill();
      // Red eyes
      ectx.fillStyle = '#cc1111';
      ectx.fillRect(-sr*0.35, -sr*1.05, sr*0.25, sr*0.2);
      ectx.fillRect(sr*0.1, -sr*1.05, sr*0.25, sr*0.2);
      // Eye shine
      ectx.fillStyle = '#ff4444';
      ectx.fillRect(-sr*0.28, -sr*1.08, sr*0.1, sr*0.08);
      // Nose
      ectx.fillStyle = '#884422';
      ectx.beginPath(); ectx.arc(0, -sr*0.82, sr*0.12, 0, Math.PI*2); ectx.fill();
      // Dagger in hand
      ectx.save(); ectx.translate(sr*0.7, -sr*0.1);
      ectx.rotate(Math.PI/4 + walkCycle*0.2);
      ectx.fillStyle = '#cccccc'; // blade
      ectx.fillRect(0, -sr*0.6, sr*0.12, sr*0.5);
      ectx.fillStyle = '#8a5a2a'; // handle
      ectx.fillRect(-sr*0.05, 0, sr*0.2, sr*0.25);
      ectx.restore();

    } else if (e.type === 'soldier') {
      // === ORC SOLDIER — armored, helmet with horns, shield, axe ===
      var sr2 = er;
      // Legs — dark iron
      ectx.fillStyle = '#4A3A3A';
      ectx.fillRect(-sr2*0.55, sr2*0.4, sr2*0.5, sr2*0.8 + walkCycle*sr2*0.25);
      ectx.fillRect(sr2*0.05, sr2*0.4, sr2*0.5, sr2*0.8 - walkCycle*sr2*0.25);
      // Body — armored
      ectx.fillStyle = '#7A6848';
      ectx.beginPath(); ectx.ellipse(0, 0, sr2*0.9, sr2*1.0, 0, 0, Math.PI*2); ectx.fill();
      // Armor plate
      ectx.fillStyle = '#8A7858';
      ectx.beginPath(); ectx.ellipse(0, -sr2*0.1, sr2*0.7, sr2*0.6, 0, 0, Math.PI*2); ectx.fill();
      ectx.strokeStyle = '#888898'; ectx.lineWidth = 0.8;
      ectx.beginPath(); ectx.moveTo(-sr2*0.5, -sr2*0.1); ectx.lineTo(sr2*0.5, -sr2*0.1); ectx.stroke();
      // Shield (left side)
      ectx.fillStyle = '#8a3a1a';
      ectx.beginPath(); ectx.roundRect(-sr2*1.2, -sr2*0.5, sr2*0.6, sr2*0.9, 3); ectx.fill();
      ectx.strokeStyle = '#cc6633'; ectx.lineWidth = 1;
      ectx.beginPath(); ectx.roundRect(-sr2*1.2, -sr2*0.5, sr2*0.6, sr2*0.9, 3); ectx.stroke();
      ectx.fillStyle = '#cc4422';
      ectx.beginPath(); ectx.arc(-sr2*0.9, -sr2*0.05, sr2*0.15, 0, Math.PI*2); ectx.fill();
      // Axe (right side, bobs)
      ectx.save(); ectx.translate(sr2*1.0, -sr2*0.3 - walkCycle*sr2*0.15);
      ectx.fillStyle = '#7a7a88'; // head
      ectx.beginPath(); ectx.moveTo(0,-sr2*0.5); ectx.lineTo(sr2*0.4,-sr2*0.1); ectx.lineTo(0,sr2*0.1); ectx.closePath(); ectx.fill();
      ectx.fillStyle = '#8a5a2a'; // handle
      ectx.fillRect(-sr2*0.08, -sr2*0.1, sr2*0.15, sr2*0.7);
      ectx.restore();
      // Head
      ectx.fillStyle = '#8A7050';
      ectx.beginPath(); ectx.arc(0, -sr2*1.05, sr2*0.6, 0, Math.PI*2); ectx.fill();
      // Helmet
      ectx.fillStyle = '#7A7080';
      ectx.beginPath(); ectx.arc(0, -sr2*1.05, sr2*0.65, Math.PI, 0); ectx.fill();
      ectx.fillRect(-sr2*0.65, -sr2*1.05, sr2*1.3, sr2*0.2); // rim
      // Horns
      ectx.fillStyle = '#c8a058';
      ectx.beginPath(); ectx.moveTo(-sr2*0.4,-sr2*1.3); ectx.lineTo(-sr2*0.7,-sr2*1.7); ectx.lineTo(-sr2*0.2,-sr2*1.3); ectx.closePath(); ectx.fill();
      ectx.beginPath(); ectx.moveTo(sr2*0.4,-sr2*1.3); ectx.lineTo(sr2*0.7,-sr2*1.7); ectx.lineTo(sr2*0.2,-sr2*1.3); ectx.closePath(); ectx.fill();
      // Red eyes
      ectx.fillStyle = '#ff2200';
      ectx.fillRect(-sr2*0.3, -sr2*1.12, sr2*0.22, sr2*0.15);
      ectx.fillRect(sr2*0.08, -sr2*1.12, sr2*0.22, sr2*0.15);

    } else if (e.type === 'tank') {
      // === OGRE/TROLL TANK — massive, rocky armor plates, huge club ===
      var sr3 = er;
      // Legs — dark purple-grey, thick
      ectx.fillStyle = '#4A3040';
      ectx.fillRect(-sr3*0.7, sr3*0.5, sr3*0.65, sr3*0.9 + walkCycle*sr3*0.2);
      ectx.fillRect(sr3*0.05, sr3*0.5, sr3*0.65, sr3*0.9 - walkCycle*sr3*0.2);
      // Rocky armor plates — dark purple body
      ectx.fillStyle = '#7A5566';
      ectx.beginPath(); ectx.ellipse(0, 0, sr3, sr3*1.1, 0, 0, Math.PI*2); ectx.fill();
      // Rock armor chunks
      var rockPositions = [[-sr3*0.7,-sr3*0.5],[sr3*0.5,-sr3*0.6],[-sr3*0.3,sr3*0.2],[sr3*0.6,sr3*0.1],[0,-sr3*0.7]];
      for (var ri2 = 0; ri2 < 5; ri2++) {
        var rp = rockPositions[ri2];
        ectx.fillStyle = shadeHex('#8A6677', (ri2%3-1)*10);
        ectx.beginPath(); ectx.roundRect(rp[0]-sr3*0.25, rp[1]-sr3*0.2, sr3*0.5, sr3*0.4, 2); ectx.fill();
        ectx.strokeStyle = '#334433'; ectx.lineWidth = 0.5; ectx.stroke();
      }
      // Arms
      ectx.fillStyle = '#6A4555';
      ectx.fillRect(-sr3*1.15, -sr3*0.3, sr3*0.4, sr3*0.7);
      ectx.fillRect(sr3*0.75, -sr3*0.3, sr3*0.4, sr3*0.7);
      // Club (right hand)
      ectx.save(); ectx.translate(sr3*1.15, -sr3*0.5 - walkCycle*sr3*0.2);
      ectx.fillStyle = '#6a4a2a';
      ectx.fillRect(-sr3*0.12, 0, sr3*0.22, sr3*0.8); // handle
      ectx.fillStyle = '#5a4020';
      ectx.beginPath(); ectx.ellipse(0, 0, sr3*0.28, sr3*0.35, 0, 0, Math.PI*2); ectx.fill(); // head
      ectx.strokeStyle = '#3a2a10'; ectx.lineWidth = 0.5; ectx.stroke();
      ectx.restore();
      // Small head (relative to body)
      ectx.fillStyle = '#3a5530';
      ectx.beginPath(); ectx.arc(0, -sr3*1.15, sr3*0.55, 0, Math.PI*2); ectx.fill();
      // Beady eyes
      ectx.fillStyle = '#ff3300';
      ectx.fillRect(-sr3*0.2, -sr3*1.25, sr3*0.18, sr3*0.15);
      ectx.fillRect(sr3*0.02, -sr3*1.25, sr3*0.18, sr3*0.15);
      // Tusk
      ectx.fillStyle = '#eedd88';
      ectx.beginPath(); ectx.moveTo(-sr3*0.1,-sr3*0.95); ectx.lineTo(-sr3*0.2,-sr3*0.75); ectx.lineTo(0,-sr3*0.95); ectx.closePath(); ectx.fill();
      // Dim red glow for large enemy
      pipeline.addLight(ex, ey-bodyBob, {color:'#551111', radius:TS*2, intensity:0.3, flicker:0.05});

    } else if (e.type === 'boss') {
      // === DEMON LORD — wings, horns, glowing eyes, dark particles ===
      var sr4 = er;
      // Bat wings (drawn as swept shapes)
      var wingFlap = Math.sin(animTimer*4)*0.3;
      for (var wi = 0; wi < 2; wi++) {
        var wside = (wi===0) ? -1 : 1;
        ectx.fillStyle = 'rgba(80,10,80,0.85)';
        ectx.beginPath();
        ectx.moveTo(wside*sr4*0.3, -sr4*0.5);
        ectx.lineTo(wside*sr4*2.2, -sr4*(1.5+wingFlap));
        ectx.lineTo(wside*sr4*2.5, -sr4*0.2);
        ectx.lineTo(wside*sr4*1.8, sr4*0.4);
        ectx.lineTo(wside*sr4*1.2, -sr4*0.1);
        ectx.lineTo(wside*sr4*0.8, sr4*0.5);
        ectx.closePath(); ectx.fill();
        // Wing membrane lines
        ectx.strokeStyle = 'rgba(120,40,120,0.6)'; ectx.lineWidth = 0.8;
        ectx.beginPath();
        ectx.moveTo(wside*sr4*0.3, -sr4*0.5);
        ectx.lineTo(wside*sr4*2.2, -sr4*(1.5+wingFlap));
        ectx.stroke();
        ectx.beginPath();
        ectx.moveTo(wside*sr4*0.3, -sr4*0.5);
        ectx.lineTo(wside*sr4*1.8, sr4*0.4);
        ectx.stroke();
      }
      // Body
      ectx.fillStyle = '#3a1050';
      ectx.beginPath(); ectx.ellipse(0, 0, sr4*0.85, sr4*1.05, 0, 0, Math.PI*2); ectx.fill();
      // Robe/armor detail
      ectx.fillStyle = '#22083a';
      ectx.beginPath(); ectx.ellipse(0, sr4*0.3, sr4*0.7, sr4*0.5, 0, Math.PI, 0); ectx.fill();
      // Chest symbol
      ectx.strokeStyle = '#cc44ff'; ectx.lineWidth = 0.8;
      ectx.beginPath(); ectx.moveTo(0,-sr4*0.4); ectx.lineTo(-sr4*0.3,sr4*0.1); ectx.lineTo(sr4*0.3,sr4*0.1); ectx.closePath(); ectx.stroke();
      // Clawed hands
      ectx.fillStyle = '#2a0838';
      ectx.fillRect(-sr4*1.05, -sr4*0.1, sr4*0.3, sr4*0.6);
      ectx.fillRect(sr4*0.75, -sr4*0.1, sr4*0.3, sr4*0.6);
      // Claws
      ectx.strokeStyle = '#cc88ff'; ectx.lineWidth = 0.8;
      for (var cl = 0; cl < 3; cl++) {
        var clx = -sr4*0.95 + cl*sr4*0.12;
        ectx.beginPath(); ectx.moveTo(clx, sr4*0.5); ectx.lineTo(clx-sr4*0.06, sr4*0.75); ectx.stroke();
        ectx.beginPath(); ectx.moveTo(sr4*0.8 + cl*sr4*0.12, sr4*0.5); ectx.lineTo(sr4*0.74+cl*sr4*0.12, sr4*0.75); ectx.stroke();
      }
      // Head
      ectx.fillStyle = '#3a1050';
      ectx.beginPath(); ectx.arc(0, -sr4*1.1, sr4*0.65, 0, Math.PI*2); ectx.fill();
      // Crown of horns (5 horns)
      ectx.fillStyle = '#1a0828';
      for (var hi2 = 0; hi2 < 5; hi2++) {
        var hangle = -Math.PI/2 + (hi2-2)*0.35;
        var hlen = (hi2===2) ? sr4*0.8 : sr4*0.55;
        ectx.beginPath();
        ectx.moveTo(Math.cos(hangle-0.15)*sr4*0.6, -sr4*1.1+Math.sin(hangle-0.15)*sr4*0.6);
        ectx.lineTo(Math.cos(hangle)*sr4*(1.4+hlen/er), -sr4*1.1+Math.sin(hangle)*sr4*(1.4+hlen/er));
        ectx.lineTo(Math.cos(hangle+0.15)*sr4*0.6, -sr4*1.1+Math.sin(hangle+0.15)*sr4*0.6);
        ectx.closePath(); ectx.fill();
      }
      // Glowing red eyes
      var eyeGlow = 0.6 + Math.sin(animTimer*3)*0.4;
      ectx.fillStyle = '#ff2200';
      ectx.globalAlpha = eyeGlow;
      ectx.beginPath(); ectx.arc(-sr4*0.25, -sr4*1.15, sr4*0.2, 0, Math.PI*2); ectx.fill();
      ectx.beginPath(); ectx.arc(sr4*0.25, -sr4*1.15, sr4*0.2, 0, Math.PI*2); ectx.fill();
      ectx.globalAlpha = 1;
      // Eye slit
      ectx.fillStyle = '#ff6600';
      ectx.fillRect(-sr4*0.32, -sr4*1.18, sr4*0.14, sr4*0.07);
      ectx.fillRect(sr4*0.18, -sr4*1.18, sr4*0.14, sr4*0.07);
      // Strong dark-red glow
      pipeline.addLight(ex, ey-bodyBob, {color:'#880022', radius:TS*3.5, intensity:0.5, flicker:0.1});
    }

    ectx.restore();

    // All enemies emit a faint glow
    if (e.type !== 'boss') {
      var eGlowColor = e.type === 'scout' ? '#44aa22' : e.type === 'soldier' ? '#aa6622' : '#884422';
      pipeline.addLight(ex, ey, {color:eGlowColor, radius:TS*1.5, intensity:0.2, flicker:0.02});
    }

    // HP bar (wider, with border)
    if (e.hp < e.maxHp) {
      var bw2 = er*2.4, bx2 = ex-bw2/2, by2 = ey-er - (e.type==='boss'?er*2.5:er*1.8);
      ectx.fillStyle = '#1a0808'; ectx.fillRect(bx2-1, by2-1, bw2+2, 6);
      ectx.fillStyle = '#400818'; ectx.fillRect(bx2, by2, bw2, 4);
      var hpRatio = e.hp/e.maxHp;
      ectx.fillStyle = hpRatio > 0.6 ? '#44ee44' : hpRatio > 0.3 ? '#ffcc00' : '#ff2200';
      ectx.fillRect(bx2, by2, bw2*hpRatio, 4);
      ectx.strokeStyle = 'rgba(255,255,255,0.2)'; ectx.lineWidth = 0.5;
      ectx.strokeRect(bx2, by2, bw2, 4);
    }
    // Slow ring
    if (e.slowTimer > 0) {
      ectx.strokeStyle = 'rgba(100,220,255,0.6)'; ectx.lineWidth = 2;
      ectx.setLineDash([4,3]);
      ectx.beginPath(); ectx.arc(ex, ey, er+4, 0, Math.PI*2); ectx.stroke();
      ectx.setLineDash([]);
    }
  }

  // === PROJECTILES — distinct per tower type ===
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i]; if (!p.alive) continue;
    var ppx = p.x*TS+TS/2, ppy = p.y*TS+TS/2;
    var pangle = Math.atan2(p.ty - p.y, p.tx - p.x);
    ectx.save();
    ectx.translate(ppx, ppy);
    ectx.rotate(pangle);

    if (p.color === CFG.TOWERS[0].projColor) {
      // Arrow — thin line with arrowhead and fletching
      ectx.strokeStyle = '#c8a050'; ectx.lineWidth = 1.5;
      ectx.beginPath(); ectx.moveTo(-8, 0); ectx.lineTo(6, 0); ectx.stroke();
      // Arrowhead
      ectx.fillStyle = '#aaaacc';
      ectx.beginPath(); ectx.moveTo(8,0); ectx.lineTo(4,-2); ectx.lineTo(4,2); ectx.closePath(); ectx.fill();
      // Fletching
      ectx.strokeStyle = '#ee4422'; ectx.lineWidth = 1;
      ectx.beginPath(); ectx.moveTo(-6,-1); ectx.lineTo(-9,-3); ectx.stroke();
      ectx.beginPath(); ectx.moveTo(-6,1); ectx.lineTo(-9,3); ectx.stroke();

    } else if (p.color === CFG.TOWERS[1].projColor) {
      // Cannonball — dark sphere with motion blur trail
      ectx.globalAlpha = 0.25;
      ectx.fillStyle = '#444';
      ectx.beginPath(); ectx.ellipse(-8, 0, 8, 3, 0, 0, Math.PI*2); ectx.fill();
      ectx.globalAlpha = 0.5;
      ectx.beginPath(); ectx.ellipse(-5, 0, 5, 3.5, 0, 0, Math.PI*2); ectx.fill();
      ectx.globalAlpha = 1;
      ectx.fillStyle = '#2a2a2a';
      ectx.beginPath(); ectx.arc(0, 0, 4, 0, Math.PI*2); ectx.fill();
      ectx.fillStyle = '#444448';
      ectx.beginPath(); ectx.arc(-1,-1, 2, 0, Math.PI*2); ectx.fill();

    } else if (p.color === CFG.TOWERS[2].projColor) {
      // Ice shard — translucent blue diamond
      ectx.globalAlpha = 0.85;
      ectx.fillStyle = '#88ddff';
      ectx.beginPath();
      ectx.moveTo(7,0); ectx.lineTo(1,-3); ectx.lineTo(-5,0); ectx.lineTo(1,3); ectx.closePath();
      ectx.fill();
      ectx.strokeStyle = '#ccf4ff'; ectx.lineWidth = 0.8; ectx.stroke();
      // Inner bright core
      ectx.fillStyle = '#eeffff';
      ectx.beginPath(); ectx.arc(1, 0, 1.5, 0, Math.PI*2); ectx.fill();
      ectx.globalAlpha = 1;
      // Sparkle
      ectx.fillStyle = 'rgba(180,240,255,0.7)';
      ectx.fillRect(-6, -1, 2, 2);

    } else {
      // Zap bolt — jagged yellow/white lightning
      ectx.strokeStyle = '#ffffaa'; ectx.lineWidth = 2;
      ectx.beginPath();
      ectx.moveTo(-8, 0);
      ectx.lineTo(-4, -2);
      ectx.lineTo(0, 1);
      ectx.lineTo(4, -2);
      ectx.lineTo(8, 0);
      ectx.stroke();
      // Bright core
      ectx.strokeStyle = '#ffffff'; ectx.lineWidth = 0.8;
      ectx.beginPath();
      ectx.moveTo(-8, 0); ectx.lineTo(-4, -1); ectx.lineTo(0, 0.5); ectx.lineTo(4, -1); ectx.lineTo(8, 0);
      ectx.stroke();
      // Glow
      ectx.globalAlpha = 0.3;
      ectx.strokeStyle = '#ffff44'; ectx.lineWidth = 5;
      ectx.beginPath(); ectx.moveTo(-8,0); ectx.lineTo(8,0); ectx.stroke();
      ectx.globalAlpha = 1;
    }
    ectx.restore();
  }

  // === PLACEMENT PREVIEW — dashed ring + ghost + label ===
  var ptx = Math.floor(player.x), pty = Math.floor(player.y);
  var selT = CFG.TOWERS[player.selectedTower];
  var canBuild = canPlace(ptx, pty) && player.gold >= selT.cost;
  var ghostX = ptx*TS, ghostY = pty*TS;
  var pulse = 0.3 + Math.sin(animTimer * 5) * 0.18;
  // Tile highlight
  ectx.fillStyle = canBuild ? 'rgba(80,220,80,'+pulse.toFixed(2)+')' : 'rgba(220,60,60,'+(pulse*0.6).toFixed(2)+')';
  ectx.fillRect(ghostX+1, ghostY+1, TS-2, TS-2);
  // Dashed border
  ectx.strokeStyle = canBuild ? 'rgba(120,255,120,0.7)' : 'rgba(255,80,80,0.6)';
  ectx.lineWidth = 1.5;
  ectx.setLineDash([4, 3]);
  ectx.strokeRect(ghostX+1, ghostY+1, TS-2, TS-2);
  ectx.setLineDash([]);
  // Ghost tower (semi-transparent)
  if (canBuild) {
    ectx.globalAlpha = 0.45;
    ectx.fillStyle = selT.color;
    ectx.beginPath(); ectx.arc(ghostX+TS/2, ghostY+TS/2, 7, 0, Math.PI*2); ectx.fill();
    ectx.globalAlpha = 1;
    // Range ring
    ectx.strokeStyle = 'rgba(200,255,200,0.2)'; ectx.lineWidth = 1;
    ectx.setLineDash([5,4]);
    ectx.beginPath(); ectx.arc(ghostX+TS/2, ghostY+TS/2, selT.range*TS, 0, Math.PI*2); ectx.stroke();
    ectx.setLineDash([]);
  }
  // Label with background pill
  var labelY = player.y*TS - 12;
  var labelX = player.x*TS+TS/2;
  var labelTxt = selT.name + ' (' + selT.cost + 'g)';
  ectx.font = 'bold 10px Segoe UI'; ectx.textAlign = 'center';
  var lw = ectx.measureText(labelTxt).width;
  ectx.fillStyle = 'rgba(0,0,0,0.65)';
  ectx.beginPath(); ectx.roundRect(labelX-lw/2-4, labelY-11, lw+8, 14, 4); ectx.fill();
  ectx.fillStyle = canBuild ? '#88ffaa' : '#ff8888';
  ectx.fillText(labelTxt, labelX, labelY);
  if (!canBuild) {
    var subTxt = player.gold < selT.cost ? ('Need '+(selT.cost-player.gold)+' more gold') : "Can't build here";
    ectx.font = '9px Segoe UI';
    var sw5 = ectx.measureText(subTxt).width;
    ectx.fillStyle = 'rgba(0,0,0,0.55)';
    ectx.beginPath(); ectx.roundRect(labelX-sw5/2-3, labelY-24, sw5+6, 12, 3); ectx.fill();
    ectx.fillStyle = '#ff7777';
    ectx.fillText(subTxt, labelX, labelY-14);
  }

  // === PLAYER — medieval knight with chainmail, tabard, sword, shield, cape, torch ===
  var playerHurt = player.hurtTimer > 0;
  if (playerHurt && Math.floor(animTimer * 12) % 2 === 0) {
    ectx.globalAlpha = 0.3;
  }
  var pcx = player.x*TS+TS/2, pcy = player.y*TS+TS/2;
  var isMoving = keys['ArrowUp']||keys['w']||keys['ArrowDown']||keys['s']||keys['ArrowLeft']||keys['a']||keys['ArrowRight']||keys['d'];
  var walkPhase = isMoving ? Math.sin(animTimer*8)*1 : 0;
  var bodyBobP = isMoving ? Math.abs(Math.sin(animTimer*8))*1.5 : 0;

  ectx.save();
  ectx.translate(pcx, pcy - bodyBobP);

  // Ground shadow
  ectx.fillStyle = 'rgba(0,0,0,0.35)';
  ectx.beginPath(); ectx.ellipse(0, 14, 9, 3, 0, 0, Math.PI*2); ectx.fill();

  // Cape (behind body, sways)
  var capeSwing = Math.sin(animTimer*6)*2;
  ectx.fillStyle = '#1144aa';
  ectx.beginPath();
  ectx.moveTo(-4, -6);
  ectx.lineTo(-8+capeSwing, 8);
  ectx.lineTo(3+capeSwing, 10);
  ectx.lineTo(4, -4);
  ectx.closePath(); ectx.fill();
  // Cape highlight
  ectx.fillStyle = '#2255cc';
  ectx.beginPath();
  ectx.moveTo(-2,-6); ectx.lineTo(-4+capeSwing*0.5, 4); ectx.lineTo(0+capeSwing*0.5, 5); ectx.lineTo(2,-5);
  ectx.closePath(); ectx.fill();

  // Boots/legs
  ectx.fillStyle = '#2a2a2a';
  ectx.fillRect(-6, 8, 5, 6 + walkPhase); // left leg
  ectx.fillRect(1, 8, 5, 6 - walkPhase);  // right leg
  // Boot tops
  ectx.fillStyle = '#333';
  ectx.fillRect(-7, 7, 6, 3);
  ectx.fillRect(1, 7, 6, 3);

  // Body — chainmail (grey crosshatch pattern)
  ectx.fillStyle = '#7a8090';
  ectx.fillRect(-6, -5, 12, 14);
  // Chainmail texture
  ectx.strokeStyle = 'rgba(60,65,75,0.5)'; ectx.lineWidth = 0.6;
  for (var cm = 0; cm < 3; cm++) {
    ectx.beginPath(); ectx.moveTo(-6, -3+cm*4); ectx.lineTo(6, -3+cm*4); ectx.stroke();
    ectx.beginPath(); ectx.moveTo(-4+cm*4, -5); ectx.lineTo(-4+cm*4, 9); ectx.stroke();
  }
  // Blue tabard over chainmail
  ectx.fillStyle = '#2255bb';
  ectx.fillRect(-4, -4, 8, 12);
  // Tabard vertical stripes
  ectx.fillStyle = '#1a44aa';
  ectx.fillRect(-2, -4, 2, 12);
  ectx.fillRect(2, -4, 2, 12);
  // Tabard border
  ectx.strokeStyle = '#aabb88'; ectx.lineWidth = 0.8;
  ectx.strokeRect(-4, -4, 8, 12);
  // Belt
  ectx.fillStyle = '#5a3a1a';
  ectx.fillRect(-6, 5, 12, 3);
  ectx.fillStyle = '#cc9922';
  ectx.beginPath(); ectx.arc(0, 6, 2, 0, Math.PI*2); ectx.fill(); // buckle

  // Shield (left arm)
  ectx.fillStyle = '#993322';
  ectx.beginPath(); ectx.roundRect(-12, -5, 7, 10, 2); ectx.fill();
  ectx.strokeStyle = '#cc6633'; ectx.lineWidth = 1; ectx.stroke();
  ectx.fillStyle = '#bb4422';
  ectx.beginPath(); ectx.arc(-8, 0, 2.5, 0, Math.PI*2); ectx.fill(); // boss
  ectx.fillStyle = '#ddaa44';
  ectx.beginPath(); ectx.arc(-8, 0, 1, 0, Math.PI*2); ectx.fill();

  // Sword (right arm, catches light)
  ectx.save(); ectx.translate(8, 0); ectx.rotate(walkPhase*0.15);
  // Blade
  ectx.fillStyle = '#ccccdd';
  ectx.fillRect(0, -14, 2, 12);
  // Blade edge highlight
  ectx.fillStyle = '#eeeeff';
  ectx.fillRect(0, -14, 1, 12);
  // Crossguard
  ectx.fillStyle = '#cc9922';
  ectx.fillRect(-4, -2, 10, 2);
  // Handle
  ectx.fillStyle = '#5a3020';
  ectx.fillRect(0, 0, 2, 5);
  ectx.restore();

  // Helmet
  ectx.fillStyle = '#8a8a9a';
  ectx.beginPath(); ectx.arc(0, -10, 7, 0, Math.PI*2); ectx.fill();
  // Visor plate
  ectx.fillStyle = '#7a7a8a';
  ectx.fillRect(-5, -13, 10, 7);
  // T-visor slit
  ectx.fillStyle = '#1a1a22';
  ectx.fillRect(-4, -12, 8, 2); // horizontal slit
  ectx.fillRect(-1, -12, 2, 5); // vertical slit
  // Helmet highlight
  ectx.fillStyle = 'rgba(255,255,255,0.2)';
  ectx.beginPath(); ectx.arc(-2, -12, 3, Math.PI*1.1, Math.PI*1.8); ectx.stroke();
  // Helmet plume
  ectx.fillStyle = '#cc3333';
  ectx.beginPath();
  ectx.moveTo(-2, -17); ectx.lineTo(0, -22+Math.sin(animTimer*5)*1); ectx.lineTo(2, -17);
  ectx.closePath(); ectx.fill();

  // Torch in left hand (off-hand, produces light)
  ectx.save(); ectx.translate(-10, -2);
  // Handle
  ectx.fillStyle = '#6a4a1a';
  ectx.fillRect(-1, 0, 2, 8);
  // Flame flicker
  var flameFlick = Math.sin(animTimer*10)*1.2;
  ectx.fillStyle = '#ff8822';
  ectx.beginPath(); ectx.arc(0, -3+flameFlick, 3, 0, Math.PI*2); ectx.fill();
  ectx.fillStyle = '#ffee44';
  ectx.beginPath(); ectx.arc(0, -4+flameFlick*0.5, 1.5, 0, Math.PI*2); ectx.fill();
  ectx.restore();

  ectx.restore(); // end player translate

  if (playerHurt) ectx.globalAlpha = 1;

  // Player HP bar above head
  if (player.hp < player.maxHp) {
    var hbw2 = 24, hbx2 = pcx-hbw2/2, hby2 = pcy - bodyBobP - 28;
    ectx.fillStyle = '#1a0808'; ectx.fillRect(hbx2-1, hby2-1, hbw2+2, 6);
    ectx.fillStyle = '#400'; ectx.fillRect(hbx2, hby2, hbw2, 4);
    var phpR = player.hp/player.maxHp;
    ectx.fillStyle = phpR>0.5?'#44ee44':phpR>0.25?'#ffcc00':'#ff2200';
    ectx.fillRect(hbx2, hby2, hbw2*phpR, 4);
    ectx.strokeStyle='rgba(255,255,255,0.2)'; ectx.lineWidth=0.5;
    ectx.strokeRect(hbx2, hby2, hbw2, 4);
  }

  // Player torch light (larger radius from torch)
  pipeline.addLight(pcx - 10, pcy - bodyBobP - 5, {color:'#ffcc88', radius:TS*7, intensity:0.85, flicker:0.05, falloff:'quadratic'});
  // Castle glow (warm golden)
  pipeline.addLight(CX*TS+TS/2, CY*TS+TS/2, {color:'#ffcc44', radius:TS*5, intensity:0.5, flicker:0.06});
  // Path lanterns — small warm lights along each path entry
  var lanternSpots = [
    {x:5*TS+TS/2, y:CY*TS+TS/2},
    {x:(MW-6)*TS+TS/2, y:CY*TS+TS/2},
    {x:CX*TS+TS/2, y:5*TS+TS/2},
    {x:CX*TS+TS/2, y:(MH-6)*TS+TS/2},
  ];
  for (var li = 0; li < lanternSpots.length; li++) {
    pipeline.addLight(lanternSpots[li].x, lanternSpots[li].y, {color:'#ffaa44', radius:TS*3, intensity:0.35, flicker:0.04});
  }

  // FX
  pipeline.setLayer('fx');
  var fctx = pipeline.getCtx();
  pipeline.camera.applyTransform(fctx);
  vfx.draw(fctx);
  // Floating text
  for (var i = 0; i < floats.length; i++) {
    var f = floats[i];
    fctx.globalAlpha = Math.max(0, f.life / 0.8);
    fctx.fillStyle = f.color;
    fctx.font = 'bold 11px Segoe UI';
    fctx.textAlign = 'center';
    fctx.fillText(f.text, f.x*TS+TS/2, f.y*TS+TS/2);
  }
  fctx.globalAlpha = 1;

  // === UI — styled panels with icons and bars ===
  pipeline.setLayer('ui');
  var uctx = pipeline.getCtx();
  var w = canvas.width, h = canvas.height;
  var fs = Math.max(12, Math.round(w*0.013));
  var panH = Math.round(fs*4.2);

  // Top panel background — dark semi-transparent with border
  uctx.fillStyle = 'rgba(8,6,16,0.82)';
  uctx.fillRect(0, 0, w, panH);
  uctx.strokeStyle = 'rgba(100,80,40,0.6)'; uctx.lineWidth = 1;
  uctx.beginPath(); uctx.moveTo(0, panH); uctx.lineTo(w, panH); uctx.stroke();
  // Subtle inner glow on panel top
  var pgrd = uctx.createLinearGradient(0, 0, 0, panH);
  pgrd.addColorStop(0, 'rgba(255,200,60,0.06)');
  pgrd.addColorStop(1, 'rgba(0,0,0,0)');
  uctx.fillStyle = pgrd;
  uctx.fillRect(0, 0, w, panH);

  // --- LEFT SIDE: Gold, HP, Castle HP ---
  var ly = 0, lpad = 12;

  // Gold icon (coin) + amount
  ly = Math.round(fs*1.3);
  // Coin icon
  uctx.fillStyle = '#cc9900';
  uctx.beginPath(); uctx.arc(lpad+7, ly-4, 6, 0, Math.PI*2); uctx.fill();
  uctx.fillStyle = '#ffdd22';
  uctx.beginPath(); uctx.arc(lpad+6, ly-5, 3, 0, Math.PI*2); uctx.fill();
  uctx.fillStyle = '#ffcc00'; uctx.font = 'bold '+fs+'px Segoe UI'; uctx.textAlign = 'left';
  uctx.fillText(player.gold, lpad+18, ly);

  // HP icon (heart) + bar
  ly = Math.round(fs*2.5);
  // Heart icon
  uctx.fillStyle = '#cc2222';
  uctx.beginPath();
  uctx.arc(lpad+5, ly-5, 4, Math.PI, 0);
  uctx.arc(lpad+13, ly-5, 4, Math.PI, 0);
  uctx.lineTo(lpad+9, ly+1);
  uctx.closePath(); uctx.fill();
  // HP bar background
  var hpBarW = Math.round(fs*5);
  uctx.fillStyle = '#300810'; uctx.fillRect(lpad+20, ly-fs*0.7, hpBarW, fs*0.6);
  var hpR = player.hp/player.maxHp;
  uctx.fillStyle = hpR>0.5 ? '#44ee44' : hpR>0.25 ? '#ffcc00' : '#ff2200';
  uctx.fillRect(lpad+20, ly-fs*0.7, hpBarW*hpR, fs*0.6);
  uctx.strokeStyle = 'rgba(255,255,255,0.2)'; uctx.lineWidth=0.5; uctx.strokeRect(lpad+20, ly-fs*0.7, hpBarW, fs*0.6);
  uctx.fillStyle = '#ccddcc'; uctx.font = fs*0.75+'px Segoe UI';
  uctx.fillText(player.hp+'/'+player.maxHp, lpad+20+hpBarW+5, ly);

  // Castle HP icon (castle icon — simple crenellation) + bar
  ly = Math.round(fs*3.8);
  uctx.fillStyle = '#7a7a8a';
  // Mini castle icon
  uctx.fillRect(lpad+2, ly-6, 12, 8);
  uctx.fillRect(lpad+1, ly-9, 3, 4); uctx.fillRect(lpad+6, ly-9, 3, 4); uctx.fillRect(lpad+11, ly-9, 3, 4);
  // Castle HP bar
  var cBarW = Math.round(fs*5);
  var chpR = castleHp/castleMaxHp;
  uctx.fillStyle = '#300'; uctx.fillRect(lpad+20, ly-fs*0.7, cBarW, fs*0.6);
  uctx.fillStyle = chpR>0.5 ? '#ee6622' : chpR>0.25 ? '#ffaa00' : '#ff2200';
  uctx.fillRect(lpad+20, ly-fs*0.7, cBarW*chpR, fs*0.6);
  uctx.strokeStyle='rgba(255,255,255,0.2)'; uctx.lineWidth=0.5; uctx.strokeRect(lpad+20, ly-fs*0.7, cBarW, fs*0.6);
  uctx.fillStyle = '#ccaa88'; uctx.font = fs*0.75+'px Segoe UI';
  uctx.fillText(castleHp+'/'+castleMaxHp, lpad+20+cBarW+5, ly);

  // --- CENTER: Wave info in decorative frame ---
  var waveTxt = waveActive ? ('Wave '+wave+' — In Progress!') : ('Wave '+(wave+1)+' in '+Math.ceil(waveTimer)+'s');
  uctx.font = 'bold '+Math.round(fs*1.05)+'px Segoe UI'; uctx.textAlign = 'center';
  var wtw = uctx.measureText(waveTxt).width;
  var wfx = w/2 - wtw/2 - 14, wfy = 4, wfw = wtw + 28, wfh = Math.round(fs*1.7);
  // Frame background
  uctx.fillStyle = 'rgba(20,15,35,0.85)';
  uctx.beginPath(); uctx.roundRect(wfx, wfy, wfw, wfh, 5); uctx.fill();
  // Frame border
  uctx.strokeStyle = waveActive ? 'rgba(255,100,50,0.7)' : 'rgba(100,150,255,0.5)';
  uctx.lineWidth = 1.5;
  uctx.beginPath(); uctx.roundRect(wfx, wfy, wfw, wfh, 5); uctx.stroke();
  // Decorative corners
  var decorLen = 6;
  uctx.strokeStyle = waveActive ? '#ff8855' : '#6699ff'; uctx.lineWidth = 1.5;
  [[wfx,wfy],[wfx+wfw,wfy],[wfx,wfy+wfh],[wfx+wfw,wfy+wfh]].forEach(function(pt, pi) {
    var sx6 = pi%2===0 ? 1 : -1, sy6 = pi<2 ? 1 : -1;
    uctx.beginPath(); uctx.moveTo(pt[0]+sx6*2, pt[1]); uctx.lineTo(pt[0]+sx6*(2+decorLen), pt[1]); uctx.stroke();
    uctx.beginPath(); uctx.moveTo(pt[0], pt[1]+sy6*2); uctx.lineTo(pt[0], pt[1]+sy6*(2+decorLen)); uctx.stroke();
  });
  uctx.fillStyle = waveActive ? '#ffaa66' : '#aaccff';
  uctx.fillText(waveTxt, w/2, wfy+wfh-5);

  // Kills (skull icon + count)
  var killTxt = '' + player.kills;
  uctx.font = 'bold '+Math.round(fs*0.9)+'px Segoe UI'; uctx.textAlign = 'center';
  var skullX = w/2, skullY = Math.round(fs*3.0);
  // Skull icon
  uctx.fillStyle = '#cccccc';
  uctx.beginPath(); uctx.arc(skullX-18, skullY-4, 5, 0, Math.PI*2); uctx.fill();
  uctx.fillStyle = '#8a8a8a';
  uctx.fillRect(skullX-23, skullY, 10, 4); // jaw
  uctx.fillStyle = '#0a0a10'; // eye sockets
  uctx.fillRect(skullX-21, skullY-7, 3, 3);
  uctx.fillRect(skullX-16, skullY-7, 3, 3);
  uctx.fillStyle = '#bbbbbb'; uctx.font = fs*0.85+'px Segoe UI';
  uctx.fillText(killTxt, skullX+2, skullY);

  // --- BOTTOM: Tower selection bar ---
  var barH = Math.round(fs*4.5);
  var barY2 = h - barH;
  uctx.fillStyle = 'rgba(8,6,16,0.85)';
  uctx.fillRect(0, barY2, w, barH);
  uctx.strokeStyle = 'rgba(100,80,40,0.5)'; uctx.lineWidth = 1;
  uctx.beginPath(); uctx.moveTo(0, barY2); uctx.lineTo(w, barY2); uctx.stroke();

  var towerColors = ['#44cc44','#ff8800','#44ccff','#ffff44'];
  var cardW = Math.round(fs*6.5), cardH = barH - 10;
  var totalCardsW = CFG.TOWERS.length * (cardW + 6) - 6;
  var cardsStartX = (w - totalCardsW) / 2;

  for (var i = 0; i < CFG.TOWERS.length; i++) {
    var t2 = CFG.TOWERS[i];
    var bx3 = Math.round(cardsStartX + i*(cardW+6));
    var by3 = barY2 + 5;
    var sel2 = player.selectedTower === i;
    var afford2 = player.gold >= t2.cost;
    // Card background
    uctx.fillStyle = sel2 ? 'rgba(40,60,40,0.95)' : afford2 ? 'rgba(20,20,35,0.88)' : 'rgba(15,15,25,0.6)';
    uctx.beginPath(); uctx.roundRect(bx3, by3, cardW, cardH, 4); uctx.fill();
    // Card border
    uctx.strokeStyle = sel2 ? towerColors[i] : afford2 ? 'rgba(120,110,80,0.5)' : 'rgba(60,60,70,0.4)';
    uctx.lineWidth = sel2 ? 2 : 1;
    uctx.beginPath(); uctx.roundRect(bx3, by3, cardW, cardH, 4); uctx.stroke();
    // Selection glow
    if (sel2) {
      uctx.strokeStyle = 'rgba('+[towerColors[i]].map(function(c){
        var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
        return r+','+g+','+b;
      })[0]+',0.3)';
      uctx.lineWidth = 5;
      uctx.beginPath(); uctx.roundRect(bx3, by3, cardW, cardH, 4); uctx.stroke();
    }
    // Color swatch / mini icon
    uctx.fillStyle = afford2 ? towerColors[i] : '#444444';
    uctx.beginPath(); uctx.arc(bx3+14, by3+cardH/2, 8, 0, Math.PI*2); uctx.fill();
    if (afford2) {
      uctx.fillStyle = 'rgba(255,255,255,0.3)';
      uctx.beginPath(); uctx.arc(bx3+12, by3+cardH/2-3, 3, 0, Math.PI*2); uctx.fill();
    }
    // Key hint
    uctx.fillStyle = sel2 ? '#ffffff' : '#888888';
    uctx.font = 'bold '+Math.round(fs*0.75)+'px Segoe UI'; uctx.textAlign = 'left';
    uctx.fillText('['+(i+1)+']', bx3+26, by3+fs*0.9);
    // Tower name
    uctx.fillStyle = afford2 ? (sel2 ? '#ffffff' : '#cccccc') : '#555555';
    uctx.font = 'bold '+Math.round(fs*0.85)+'px Segoe UI';
    uctx.fillText(t2.name, bx3+26, by3+fs*1.9);
    // Cost with coin icon
    uctx.fillStyle = afford2 ? '#ffcc22' : '#554422';
    uctx.font = Math.round(fs*0.78)+'px Segoe UI';
    uctx.fillText(t2.cost+'g', bx3+26, by3+cardH-7);
  }

  // --- GAME OVER overlay ---
  if (state === 'gameover') {
    // Dark red vignette overlay
    uctx.fillStyle = 'rgba(20,0,0,0.85)'; uctx.fillRect(0,0,w,h);
    // Panel
    var govW = Math.round(w*0.5), govH = Math.round(h*0.4);
    var govX = (w-govW)/2, govY = (h-govH)/2;
    uctx.fillStyle = 'rgba(12,4,4,0.95)';
    uctx.beginPath(); uctx.roundRect(govX, govY, govW, govH, 10); uctx.fill();
    uctx.strokeStyle = '#882222'; uctx.lineWidth = 2;
    uctx.beginPath(); uctx.roundRect(govX, govY, govW, govH, 10); uctx.stroke();
    // Title
    uctx.fillStyle = '#ff4444'; uctx.font = 'bold '+Math.round(w*0.048)+'px Segoe UI'; uctx.textAlign = 'center';
    uctx.fillText('CASTLE FALLEN', w/2, govY + govH*0.3);
    // Divider
    uctx.strokeStyle = 'rgba(136,34,34,0.5)'; uctx.lineWidth = 1;
    uctx.beginPath(); uctx.moveTo(govX+20, govY+govH*0.42); uctx.lineTo(govX+govW-20, govY+govH*0.42); uctx.stroke();
    // Stats
    uctx.fillStyle = '#ddbbbb'; uctx.font = Math.round(w*0.02)+'px Segoe UI';
    uctx.fillText('Survived '+wave+' waves  \u2022  '+player.kills+' enemies slain', w/2, govY+govH*0.58);
    // Prompt
    var blinkA = 0.5 + Math.sin(animTimer*3)*0.4;
    uctx.globalAlpha = blinkA;
    uctx.fillStyle = '#ffaa88'; uctx.font = Math.round(w*0.016)+'px Segoe UI';
    uctx.fillText('Click or press any key to play again', w/2, govY+govH*0.78);
    uctx.globalAlpha = 1;
  }

  pipeline.end();
}

// ============================================================
// GAME LOOP
// ============================================================
var lastTime = performance.now();
(function loop() {
  var now = performance.now();
  var dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  animTimer += dt;
  update(dt);
  vfx.update(dt);
  pipeline.update(dt);
  draw();
  requestAnimationFrame(loop);
})();

</script>

(function(){

  function hdr(){return{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'}}
  async function vh(){try{var d=navigator.userAgent+screen.width+screen.height+new Date().getTimezoneOffset();var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(d));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('').slice(0,32)}catch(e){return'anon-'+Math.random().toString(36).slice(2,10)}}

    try{var r=await fetch(SU+'/rest/v1/game_visits?game=eq.'+G+'&select=id',{headers:Object.assign(hdr(),{'Prefer':'count=exact'})});var c=r.headers.get('content-range');if(c){var n=c.split('/')[1];if(n&&n!=='*')document.getElementById('vc-count').textContent=Number(n).toLocaleString()}}catch(e){}
  }
  run();
})();
