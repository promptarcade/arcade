// ==================== SOUND EFFECTS ====================
var SFX = (function() {
  var ctx = null, muted = false;
  function getCtx() { if (!ctx) try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; } if (ctx.state === 'suspended') ctx.resume(); return ctx; }
  function play(fn) { if (muted) return; var c = getCtx(); if (c) fn(c); }
  return {
    get muted() { return muted; }, set muted(v) { muted = v; },
    click: function() { play(function(c) {
      var t = c.currentTime; var o = c.createOscillator(); var g = c.createGain();

    hit: function() { play(function(c) {

// Brick types
const BT = { NORMAL: 0, TOUGH: 1, HARD: 2, EXPLOSIVE: 3, INDESTRUCTIBLE: 4, MULTIBALL: 5 };

// Power-up types
const PT = { WIDE: 0, NARROW: 1, MULTI: 2, SLOW: 3, FAST: 4, LIFE: 5, LASER: 6 };

const ROW_COLORS = ['#ff1744','#ff9100','#ffea00','#00e676','#2979ff','#d500f9'];

// ==================== CANVAS ====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ==================== UTILITY ====================
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rnd(a, b) { return a + Math.random() * (b - a); }
function rndInt(a, b) { return Math.floor(rnd(a, b + 1)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function hexToRgb(h) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return {r,g,b};
}
function rgbStr(r,g,b,a) { return `rgba(${r|0},${g|0},${b|0},${a})`; }

// ==================== PARTICLE ====================
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = rnd(-200, 200);
    this.vy = rnd(-250, 50);
    this.life = CONFIG.PARTICLE_LIFE;
    this.maxLife = this.life;
    this.size = rnd(2, 5);
    this.color = color;
  }
  update(dt) {
    this.vy += 300 * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
    return this.life > 0;
  }
  draw(ctx) {
    const a = this.life / this.maxLife;
    const c = hexToRgb(this.color);
    ctx.fillStyle = rgbStr(c.r, c.g, c.b, a);
    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
  }
}

// ==================== FLOATING TEXT ====================
class FloatText {
  constructor(x, y, text, color) {
    this.x = x; this.y = y;
    this.text = text;
    this.color = color;
    this.life = 1.0;
    this.scale = 1.5;
  }
  update(dt) {
    this.y -= 60 * dt;
    this.life -= dt;
    this.scale = lerp(this.scale, 1, dt * 5);
    return this.life > 0;
  }
  draw(ctx) {
    const a = this.life;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = `bold ${14 * this.scale | 0}px 'Segoe UI', Arial`;
    ctx.fillStyle = this.color;
    ctx.textAlign = 'center';
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

// ==================== LASER ====================
class Laser {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = CONFIG.LASER_W;
    this.h = CONFIG.LASER_H;
    this.alive = true;
  }
  update(dt) {
    this.y -= CONFIG.LASER_SPEED * dt;
    if (this.y + this.h < 0) this.alive = false;
    return this.alive;
  }
  draw(ctx) {
    ctx.save();
    ctx.shadowColor = '#f44';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#f44';
    ctx.fillRect(this.x - this.w/2, this.y, this.w, this.h);
    ctx.fillStyle = '#faa';
    ctx.fillRect(this.x - 1, this.y, 2, this.h);
    ctx.restore();
  }
}

// ==================== POWERUP ====================
class PowerUp {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type;
    this.w = CONFIG.PU_W;
    this.h = CONFIG.PU_H;
    this.alive = true;
    this.time = 0;
  }
  static COLORS = ['#2979ff','#f44','#fff','#00e676','#ff9100','#ff69b4','#f44'];
  static LABELS = ['W','N','M','S','F','\u2665','L'];
  update(dt) {
    this.y += CONFIG.PU_SPEED * dt;
    this.time += dt;
    if (this.y > CONFIG.HEIGHT + 20) this.alive = false;
    return this.alive;
  }
  draw(ctx) {
    const c = PowerUp.COLORS[this.type];
    const pulse = 0.7 + 0.3 * Math.sin(this.time * 6);
    ctx.save();
    ctx.shadowColor = c;
    ctx.shadowBlur = 10 * pulse;
    ctx.fillStyle = c;
    const rx = 4;
    roundRect(ctx, this.x - this.w/2, this.y - this.h/2, this.w, this.h, rx);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(PowerUp.LABELS[this.type], this.x, this.y + 1);
    ctx.restore();
  }
}

// ==================== BRICK ====================
class Brick {
  constructor(col, row, type) {
    this.col = col; this.row = row;
    this.type = type;
    this.x = CONFIG.BRICK_OFFSET_X + col * (CONFIG.BRICK_W + CONFIG.BRICK_GAP);
    this.y = CONFIG.BRICK_OFFSET_Y + row * (CONFIG.BRICK_H + CONFIG.BRICK_GAP);
    this.w = CONFIG.BRICK_W;
    this.h = CONFIG.BRICK_H;
    this.alive = true;
    this.hp = type === BT.TOUGH ? 2 : type === BT.HARD ? 3 : type === BT.INDESTRUCTIBLE ? 999 : 1;
    this.maxHp = this.hp;
    this.flash = 0;
  }
  getColor() {
    switch(this.type) {
      case BT.NORMAL: return ROW_COLORS[this.row % ROW_COLORS.length];
      case BT.TOUGH: return '#b0bec5';
      case BT.HARD: return '#ffd740';
      case BT.EXPLOSIVE: return '#ff6d00';
      case BT.INDESTRUCTIBLE: return '#546e7a';
      case BT.MULTIBALL: return ROW_COLORS[(Date.now()/200|0) % ROW_COLORS.length];
    }
  }
  hit() {
    if (this.type === BT.INDESTRUCTIBLE) { this.flash = 0.15; return false; }
    this.hp--;
    this.flash = 0.15;
    if (this.hp <= 0) { this.alive = false; return true; }
    return false;
  }
  getScore() {
    switch(this.type) {
      case BT.NORMAL: return CONFIG.SCORE_NORMAL;
      case BT.TOUGH: return CONFIG.SCORE_TOUGH;
      case BT.HARD: return CONFIG.SCORE_HARD;
      case BT.EXPLOSIVE: return CONFIG.SCORE_EXPLOSIVE;
      case BT.MULTIBALL: return CONFIG.SCORE_MULTI;
      default: return 0;
    }
  }
  update(dt) { if (this.flash > 0) this.flash -= dt; }
  draw(ctx) {
    if (!this.alive) return;
    const c = this.getColor();
    const rgb = hexToRgb(c);
    ctx.save();
    ctx.shadowColor = c;
    ctx.shadowBlur = 6;
    // gradient fill
    const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.h);
    grad.addColorStop(0, rgbStr(Math.min(rgb.r+40,255), Math.min(rgb.g+40,255), Math.min(rgb.b+40,255), 1));
    grad.addColorStop(1, rgbStr(rgb.r*0.7, rgb.g*0.7, rgb.b*0.7, 1));
    ctx.fillStyle = grad;
    roundRect(ctx, this.x, this.y, this.w, this.h, 3);
    ctx.fill();
    // damage indication for tough/hard
    if (this.type === BT.TOUGH || this.type === BT.HARD) {
      const dmg = 1 - this.hp / this.maxHp;
      if (dmg > 0) {
        ctx.strokeStyle = rgbStr(40,40,40, dmg * 0.8);
        ctx.lineWidth = 2;
        ctx.beginPath();
        // crack lines
        const cx = this.x + this.w/2, cy = this.y + this.h/2;
        for (let i = 0; i < Math.ceil(dmg * 4); i++) {
          const a = (i * 1.7 + this.col) % 6;
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + Math.cos(a)*this.w*0.4, cy + Math.sin(a)*this.h*0.6);
        }
        ctx.stroke();
      }
    }
    // explosive hazard stripes
    if (this.type === BT.EXPLOSIVE) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      for (let sx = 0; sx < this.w; sx += 10) {
        ctx.fillRect(this.x + sx, this.y, 5, this.h);
      }
    }
    // indestructible bolts
    if (this.type === BT.INDESTRUCTIBLE) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.arc(this.x+6, this.y+6, 3, 0, Math.PI*2);
      ctx.arc(this.x+this.w-6, this.y+6, 3, 0, Math.PI*2);
      ctx.arc(this.x+6, this.y+this.h-6, 3, 0, Math.PI*2);
      ctx.arc(this.x+this.w-6, this.y+this.h-6, 3, 0, Math.PI*2);
      ctx.fill();
    }
    // multiball shimmer
    if (this.type === BT.MULTIBALL) {
      ctx.fillStyle = `rgba(255,255,255,${0.15 + 0.1 * Math.sin(Date.now()/100)})`;
      ctx.fillRect(this.x, this.y, this.w, this.h);
    }
    // flash on hit
    if (this.flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.flash * 5})`;
      ctx.fillRect(this.x, this.y, this.w, this.h);
    }
    // outline glow
    ctx.shadowBlur = 0;
    ctx.strokeStyle = c;
    ctx.lineWidth = 1;
    roundRect(ctx, this.x, this.y, this.w, this.h, 3);
    ctx.stroke();
    ctx.restore();
  }
}

// ==================== BALL ====================
class Ball {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.r = CONFIG.BALL_R;
    this.onPaddle = true;
    this.alive = true;
    this.trail = [];
    this.speed = CONFIG.BALL_SPEED;
  }
  launch(paddleX) {
    if (!this.onPaddle) return;
    this.onPaddle = false;
    const angle = -Math.PI/2 + rnd(-0.3, 0.3);
    this.vx = Math.cos(angle) * this.speed;
    this.vy = Math.sin(angle) * this.speed;
  }
  setSpeed(s) {
    if (this.onPaddle) { this.speed = s; return; }
    const mag = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    if (mag < 1) return;
    this.vx = (this.vx/mag) * s;
    this.vy = (this.vy/mag) * s;
    this.speed = s;
  }
  update(dt, paddleX, paddleW) {
    if (this.onPaddle) {
      this.x = paddleX;
      this.y = CONFIG.PADDLE_Y - this.r - CONFIG.PADDLE_H/2;
      this.trail = [];
      return;
    }
    this.trail.unshift({x: this.x, y: this.y});
    if (this.trail.length > CONFIG.BALL_TRAIL) this.trail.pop();

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Wall collisions
    if (this.x - this.r < 0) { this.x = this.r; this.vx = Math.abs(this.vx); }
    if (this.x + this.r > CONFIG.WIDTH) { this.x = CONFIG.WIDTH - this.r; this.vx = -Math.abs(this.vx); }
    if (this.y - this.r < 0) { this.y = this.r; this.vy = Math.abs(this.vy); }

    // Fell off bottom
    if (this.y - this.r > CONFIG.HEIGHT) { this.alive = false; }

    // Enforce minimum vertical velocity
    const mag = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    if (Math.abs(this.vy) < CONFIG.BALL_MIN_VY && mag > 0) {
      this.vy = this.vy >= 0 ? CONFIG.BALL_MIN_VY : -CONFIG.BALL_MIN_VY;
      const newMag = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      const scale = this.speed / newMag;
      this.vx *= scale;
      this.vy *= scale;
    }
  }
  draw(ctx) {
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const a = (1 - i / this.trail.length) * 0.4;
      const s = this.r * (1 - i / this.trail.length * 0.5);
      ctx.beginPath();
      ctx.arc(t.x, t.y, s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    }
    // Main ball
    ctx.save();
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(this.x - 2, this.y - 2, this.r * 0.35, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
    ctx.restore();
  }
}

// ==================== LEVELS ====================
function makeLevels() {
  const levels = [];
  // Helper: _ = empty, N = normal, T = tough, H = hard, E = explosive, I = indestructible, M = multiball
  const C = { _: -1, N: BT.NORMAL, T: BT.TOUGH, H: BT.HARD, E: BT.EXPLOSIVE, I: BT.INDESTRUCTIBLE, M: BT.MULTIBALL };

  function fromGrid(grid) {
    const bricks = [];
    for (let r = 0; r < grid.length; r++) {
      for (let c = 0; c < grid[r].length; c++) {
        if (grid[r][c] >= 0) bricks.push(new Brick(c, r, grid[r][c]));
      }
    }
    return bricks;
  }
  const _ = C._, N = C.N, T = C.T, H = C.H, E = C.E, I = C.I, M = C.M;

  // Level 1: 3 rows normal
  levels.push(() => fromGrid([
    [N,N,N,N,N,N,N,N,N,N],
    [N,N,N,N,N,N,N,N,N,N],
    [N,N,N,N,N,N,N,N,N,N],
  ]));

  // Level 2: 4 normal + 1 tough
  levels.push(() => fromGrid([
    [T,T,T,T,T,T,T,T,T,T],

  // Level 3: Pyramid
  levels.push(() => fromGrid([

  // Level 4: Checkerboard with explosives
  levels.push(() => fromGrid([

    [_,N,_,N,_,N,_,N,_,N],
    [N,_,E,_,N,_,E,_,N,_],

    [N,_,N,_,E,_,N,_,N,_],

  // Level 5: Diamond with tough border - BOSS
  levels.push(() => fromGrid([
    [_,_,_,_,T,T,_,_,_,_],
    [_,_,_,T,N,N,T,_,_,_],
    [_,_,T,N,N,N,N,T,_,_],
    [_,T,N,N,H,H,N,N,T,_],
    [T,N,N,H,M,M,H,N,N,T],

    [_,_,_,T,N,N,T,_,_,_],

  ]));

  // Level 6: Horizontal stripes with gaps
  levels.push(() => fromGrid([
    [N,N,N,_,_,_,_,N,N,N],
    [_,_,_,_,_,_,_,_,_,_],
    [T,T,T,T,T,T,T,T,T,T],
    [_,_,_,_,_,_,_,_,_,_],
    [N,N,N,_,_,_,_,N,N,N],
    [_,_,_,_,_,_,_,_,_,_],
    [E,N,N,N,N,N,N,N,N,E],
  ]));

  // Level 7: V shape with hard at point
  levels.push(() => fromGrid([
    [N,_,_,_,_,_,_,_,_,N],
    [N,N,_,_,_,_,_,_,N,N],
    [_,N,N,_,_,_,_,N,N,_],
    [_,_,N,N,_,_,N,N,_,_],
    [_,_,_,T,N,N,T,_,_,_],
    [_,_,_,_,T,T,_,_,_,_],
    [_,_,_,_,H,H,_,_,_,_],
  ]));

  // Level 8: Random with indestructible walls
  levels.push(() => fromGrid([
    [N,N,E,N,N,N,E,N,N,N],
    [N,_,_,N,_,_,N,_,_,N],
    [I,_,_,I,_,_,I,_,_,I],

    [I,_,_,I,_,_,I,_,_,I],
    [N,_,_,N,_,_,N,_,_,N],

  ]));

  // Level 9: Spiral
  levels.push(() => fromGrid([
    [N,N,N,N,N,N,N,N,N,N],
    [_,_,_,_,_,_,_,_,_,T],
    [N,T,T,T,T,T,T,T,_,T],
    [N,T,_,_,_,_,_,T,_,T],
    [N,T,_,H,H,M,_,T,_,T],
    [N,T,_,_,_,T,_,T,_,T],
    [N,T,_,T,T,T,_,T,_,T],
    [N,T,_,_,_,_,_,_,_,T],
    [N,T,T,T,T,T,T,T,T,T],
  ]));

  // Level 10: Full grid hard/tough - BOSS
  levels.push(() => fromGrid([
    [H,T,H,T,H,T,H,T,H,T],
    [T,H,T,H,T,H,T,H,T,H],
    [H,T,H,T,H,T,H,T,H,T],
    [T,H,T,H,T,H,T,H,T,H],
    [H,T,H,T,E,E,T,H,T,H],
    [T,H,T,H,T,H,T,H,T,H],
    [H,T,H,T,H,T,H,T,H,T],
  ]));

  // Level 11: "NEON" spelled out
  levels.push(() => {
    const g = [
      [N,_,N,_,N,N,N,_,N,N,N,_,N,_,N],
      [N,N,N,_,N,_,_,_,N,_,N,_,N,N,N],
      [N,N,N,_,N,N,_,_,N,_,N,_,N,N,N],
      [N,_,N,_,N,_,_,_,N,_,N,_,N,_,N],
      [N,_,N,_,N,N,N,_,N,N,N,_,N,_,N],
    ];
    // Map 15 cols onto 10 columns centered
    const bricks = [];
    for (let r = 0; r < g.length; r++) {
      for (let c = 0; c < g[r].length; c++) {
        if (g[r][c] >= 0) {
          // Scale: use smaller bricks or offset
          const bx = 38 + c * (CONFIG.BRICK_W/1.5 + CONFIG.BRICK_GAP);
          const by = CONFIG.BRICK_OFFSET_Y + r * (CONFIG.BRICK_H + CONFIG.BRICK_GAP);
          const b = new Brick(c, r, g[r][c]);
          b.x = bx; b.y = by;
          b.w = CONFIG.BRICK_W / 1.5;
          bricks.push(b);
        }
      }
    }
    return bricks;
  });

  // Level 12: Concentric rectangles
  levels.push(() => fromGrid([
    [T,T,T,T,T,T,T,T,T,T],
    [T,_,_,_,_,_,_,_,_,T],
    [T,_,N,N,N,N,N,N,_,T],
    [T,_,N,_,_,_,_,N,_,T],
    [T,_,N,_,H,H,_,N,_,T],

    [T,T,T,T,T,T,T,T,T,T],

  // Level 13: Diagonal lines with explosives
  levels.push(() => fromGrid([
    [N,_,_,_,_,_,_,_,_,E],
    [_,N,_,_,_,_,_,_,E,_],
    [_,_,T,_,_,_,_,E,_,_],
    [_,_,_,T,_,_,E,_,_,_],
    [_,_,_,_,H,E,_,_,_,_],
    [_,_,_,E,_,H,_,_,_,_],
    [_,_,E,_,_,_,T,_,_,_],
    [_,E,_,_,_,_,_,T,_,_],
    [E,_,_,_,_,_,_,_,N,_],
  ]));

  // Level 14: Fortress
  levels.push(() => fromGrid([
    [I,I,I,I,I,I,I,I,I,I],
    [I,N,N,N,N,N,N,N,N,I],
    [I,N,E,T,T,T,T,E,N,I],
    [I,N,T,H,H,H,H,T,N,I],
    [I,N,T,H,M,M,H,T,N,I],
    [I,N,T,H,H,H,H,T,N,I],
    [I,N,E,T,T,T,T,E,N,I],
    [I,N,N,N,N,N,N,N,N,I],
    [I,_,_,_,_,_,_,_,_,I],
  ]));

  // Level 15: FINAL BOSS
  levels.push(() => fromGrid([
    [H,T,H,T,E,E,T,H,T,H],
    [T,H,T,H,T,T,H,T,H,T],
    [H,T,M,T,H,H,T,M,T,H],
    [T,H,T,H,T,T,H,T,H,T],
    [I,T,H,T,E,E,T,H,T,I],
    [T,H,T,H,T,T,H,T,H,T],
    [H,T,M,T,H,H,T,M,T,H],
    [T,H,T,H,T,T,H,T,H,T],
    [H,T,H,T,E,E,T,H,T,H],
    [T,T,T,T,T,T,T,T,T,T],
  ]));

  return levels;
}

// ==================== HELPER DRAW ====================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ==================== GAME ====================
const LEVELS = makeLevels();

const STATE = {
  TITLE: 0, PLAYING: 1, LEVEL_TRANS: 2, GAMEOVER: 3, VICTORY: 4, PAUSED: 5
};

class Game {
  constructor() {
    this.state = STATE.TITLE;
    this.score = 0;
    this.lives = CONFIG.START_LIVES;
    this.level = 0;
    this.combo = 0;
    this.comboMax = 0;
    this.comboDisplay = 0;
    this.comboScale = 1;
    this.balls = [];
    this.bricks = [];
    this.powerUps = [];
    this.particles = [];
    this.floats = [];
    this.lasers = [];
    this.paddleX = CONFIG.WIDTH / 2;
    this.paddleW = CONFIG.PADDLE_W;
    this.mouseX = CONFIG.WIDTH / 2;
    this.shakeDur = 0;
    this.shakeX = 0;
    this.shakeY = 0;
    this.transTimer = 0;
    this.totalTime = 0;
    this.gridOffset = 0;

    // Power-up timers
    this.puTimers = {};
    this.laserTimer = 0;

    // Input
    canvas.addEventListener('mousemove', e => {
      this.mouseX = e.offsetX * (CONFIG.WIDTH / canvas.clientWidth);
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      this.mouseX = (e.touches[0].clientX - rect.left) / rect.width * CONFIG.WIDTH;
    }, { passive: false });
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      this.mouseX = (e.touches[0].clientX - rect.left) / rect.width * CONFIG.WIDTH;
      this.onClick();
    }, { passive: false });
    canvas.addEventListener('click', () => this.onClick());
    document.addEventListener('keydown', e => this.onKey(e));
  }

  onClick() {
    if (this.state === STATE.TITLE) {
      this.startGame();
    } else if (this.state === STATE.PLAYING) {
      for (const b of this.balls) b.launch(this.paddleX);
      SFX.shoot();
    } else if (this.state === STATE.GAMEOVER || this.state === STATE.VICTORY) {
      this.state = STATE.TITLE;
    }
  }

  onKey(e) {
    if (e.key === 'p' || e.key === 'P') {
      if (this.state === STATE.PLAYING) this.state = STATE.PAUSED;
      else if (this.state === STATE.PAUSED) this.state = STATE.PLAYING;
    }
    if (e.key === 'Escape' && this.state === STATE.PAUSED) {
      this.state = STATE.TITLE;
    }
  }

  startGame() {
    this.state = STATE.PLAYING;
    this.score = 0;
    this.lives = CONFIG.START_LIVES;
    this.level = 0;
    this.combo = 0;
    this.comboMax = 0;
    this.totalTime = 0;
    this.puTimers = {};
    this.loadLevel();
  }

  loadLevel() {
    this.bricks = LEVELS[this.level]();
    this.balls = [new Ball(this.paddleX, 0)];
    this.balls[0].speed = CONFIG.BALL_SPEED * Math.pow(1 + CONFIG.BALL_SPEED_INC, this.level);
    this.powerUps = [];
    this.lasers = [];
    this.particles = [];
    this.floats = [];
    this.paddleW = CONFIG.PADDLE_W;
    this.puTimers = {};
    this.laserTimer = 0;
    this.combo = 0;
    this.resetBall(this.balls[0]);
  }

  resetBall(ball) {
    ball.onPaddle = true;
    ball.alive = true;
    ball.speed = CONFIG.BALL_SPEED * Math.pow(1 + CONFIG.BALL_SPEED_INC, this.level);
    ball.trail = [];
  }

  levelClear() {
    SFX.levelUp();
    const bonus = CONFIG.LEVEL_BONUS + this.lives * 100 + this.comboMax * 50;
    this.score += bonus;
    this.floats.push(new FloatText(CONFIG.WIDTH/2, CONFIG.HEIGHT/2, `LEVEL BONUS: ${bonus}`, '#0ff'));
    this.level++;
    if (this.level >= LEVELS.length) {
      this.state = STATE.VICTORY;
    } else {
      this.state = STATE.LEVEL_TRANS;
      this.transTimer = CONFIG.LEVEL_DELAY;
    }
  }

  spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      this.particles.push(new Particle(x, y, color));
    }
  }

  trySpawnPowerUp(x, y) {
    if (Math.random() < CONFIG.PU_CHANCE) {
      const type = rndInt(0, 6);
      this.powerUps.push(new PowerUp(x, y, type));
    }
  }

  applyPowerUp(pu) {
    switch(pu.type) {
      case PT.WIDE:
        this.paddleW = CONFIG.PADDLE_WIDE;
        this.puTimers.wide = CONFIG.PU_WIDE_DUR;
        delete this.puTimers.narrow;
        break;
      case PT.NARROW:
        this.paddleW = CONFIG.PADDLE_NARROW;
        this.puTimers.narrow = CONFIG.PU_NARROW_DUR;
        delete this.puTimers.wide;
        break;
      case PT.MULTI:
        this.spawnExtraBalls(2);
        break;
      case PT.SLOW: {
        const factor = 0.7;
        this.puTimers.slow = CONFIG.PU_SLOW_DUR;
        delete this.puTimers.fast;
        for (const b of this.balls) if (!b.onPaddle) b.setSpeed(CONFIG.BALL_SPEED * Math.pow(1+CONFIG.BALL_SPEED_INC, this.level) * factor);
        break;
      }
      case PT.FAST: {
        const factor = 1.4;
        this.puTimers.fast = CONFIG.PU_FAST_DUR;
        delete this.puTimers.slow;
        for (const b of this.balls) if (!b.onPaddle) b.setSpeed(CONFIG.BALL_SPEED * Math.pow(1+CONFIG.BALL_SPEED_INC, this.level) * factor);
        break;
      }
      case PT.LIFE:
        this.lives = Math.min(this.lives + 1, CONFIG.MAX_LIVES);
        break;
      case PT.LASER:
        this.puTimers.laser = CONFIG.PU_LASER_DUR;
        this.laserTimer = 0;
        break;
    }
  }

  spawnExtraBalls(count) {
    const active = this.balls.filter(b => b.alive && !b.onPaddle);
    const source = active.length > 0 ? active[0] : this.balls[0];
    for (let i = 0; i < count; i++) {
      const nb = new Ball(source.x, source.y);
      nb.onPaddle = false;
      nb.speed = source.speed;
      const angle = rnd(-Math.PI * 0.8, -Math.PI * 0.2);
      nb.vx = Math.cos(angle) * nb.speed;
      nb.vy = Math.sin(angle) * nb.speed;
      this.balls.push(nb);
    }
  }

  ballPaddleCollision(ball) {
    if (ball.onPaddle || ball.vy < 0) return;
    const px = this.paddleX - this.paddleW/2;
    const py = CONFIG.PADDLE_Y - CONFIG.PADDLE_H/2;
    const pw = this.paddleW;
    const ph = CONFIG.PADDLE_H;

    if (ball.x + ball.r > px && ball.x - ball.r < px + pw &&
        ball.y + ball.r > py && ball.y - ball.r < py + ph) {
      // Where on paddle (0 to 1)
      const hit = (ball.x - px) / pw;
      // Angle from -60 to -120 degrees
      const angle = lerp(-2.356, -0.785, hit); // -135 to -45 deg
      ball.vx = Math.cos(angle) * ball.speed;
      ball.vy = Math.sin(angle) * ball.speed;
      ball.y = py - ball.r;
      this.combo = 0;
      SFX.click();
    }
  }

  ballBrickCollision(ball) {
    for (const brick of this.bricks) {
      if (!brick.alive) continue;
      // AABB collision
      const bx = ball.x, by = ball.y, br = ball.r;
      if (bx + br <= brick.x || bx - br >= brick.x + brick.w ||
          by + br <= brick.y || by - br >= brick.y + brick.h) continue;

      // Determine collision face
      const overlapLeft = (bx + br) - brick.x;
      const overlapRight = (brick.x + brick.w) - (bx - br);
      const overlapTop = (by + br) - brick.y;
      const overlapBottom = (brick.y + brick.h) - (by - br);

      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

      if (minOverlap === overlapLeft) { ball.vx = -Math.abs(ball.vx); ball.x = brick.x - br; }
      else if (minOverlap === overlapRight) { ball.vx = Math.abs(ball.vx); ball.x = brick.x + brick.w + br; }
      else if (minOverlap === overlapTop) { ball.vy = -Math.abs(ball.vy); ball.y = brick.y - br; }
      else { ball.vy = Math.abs(ball.vy); ball.y = brick.y + brick.h + br; }

      this.hitBrick(brick);
      return; // One brick per frame per ball
    }
  }

  laserBrickCollision(laser) {
    for (const brick of this.bricks) {
      if (!brick.alive) continue;
      if (laser.x + laser.w/2 > brick.x && laser.x - laser.w/2 < brick.x + brick.w &&
          laser.y < brick.y + brick.h && laser.y + laser.h > brick.y) {
        laser.alive = false;
        this.hitBrick(brick);
        return;
      }
    }
  }

  hitBrick(brick) {
    const destroyed = brick.hit();
    if (!destroyed) SFX.click();
    if (destroyed) {
      SFX.hit();
      this.combo++;
      if (this.combo > this.comboMax) this.comboMax = this.combo;
      this.comboDisplay = this.combo;
      this.comboScale = 2;
      const mult = Math.min(this.combo, 10);
      const pts = brick.getScore() * mult;
      this.score += pts;
      const cx = brick.x + brick.w/2, cy = brick.y + brick.h/2;
      this.spawnParticles(cx, cy, brick.getColor(), CONFIG.PARTICLE_COUNT);
      this.floats.push(new FloatText(cx, cy, `${pts}`, brick.getColor()));
      if (mult > 1) {
        this.floats.push(new FloatText(cx, cy - 15, `x${mult}`, '#ff0'));
      }
      this.trySpawnPowerUp(cx, cy);

      // Special brick effects
      if (brick.type === BT.EXPLOSIVE) {
        this.explodeAdjacent(brick);
      }
      if (brick.type === BT.MULTIBALL) {
        this.spawnExtraBalls(2);
      }
    }
  }

  explodeAdjacent(brick) {
    const cx = brick.x + brick.w/2, cy = brick.y + brick.h/2;
    this.spawnParticles(cx, cy, '#ff6d00', 20);
    for (const other of this.bricks) {
      if (!other.alive || other === brick) continue;
      const ox = other.x + other.w/2, oy = other.y + other.h/2;
      const dx = cx - ox, dy = cy - oy;
      if (Math.abs(dx) < CONFIG.BRICK_W * 1.5 && Math.abs(dy) < CONFIG.BRICK_H * 1.5) {
        if (other.type !== BT.INDESTRUCTIBLE) {
          other.alive = false;
          this.score += CONFIG.SCORE_CHAIN;
          this.spawnParticles(ox, oy, other.getColor(), 6);
          if (other.type === BT.EXPLOSIVE) this.explodeAdjacent(other);
        }
      }
    }
  }

  isLevelClear() {
    return this.bricks.every(b => !b.alive || b.type === BT.INDESTRUCTIBLE);
  }

  update(dt) {
    this.gridOffset = (this.gridOffset + dt * 30) % 40;

    if (this.state === STATE.TITLE || this.state === STATE.GAMEOVER || this.state === STATE.VICTORY) return;

    if (this.state === STATE.LEVEL_TRANS) {
      this.transTimer -= dt;
      if (this.transTimer <= 0) {
        this.state = STATE.PLAYING;
        this.loadLevel();
      }
      return;
    }

    if (this.state === STATE.PAUSED) return;

    // Playing
    this.totalTime += dt;

    // Paddle
    this.paddleX = clamp(this.mouseX, this.paddleW/2, CONFIG.WIDTH - this.paddleW/2);

    // Power-up timers
    for (const key of Object.keys(this.puTimers)) {
      this.puTimers[key] -= dt;
      if (this.puTimers[key] <= 0) {
        delete this.puTimers[key];
        if (key === 'wide' || key === 'narrow') this.paddleW = CONFIG.PADDLE_W;
        if (key === 'slow' || key === 'fast') {
          const spd = CONFIG.BALL_SPEED * Math.pow(1+CONFIG.BALL_SPEED_INC, this.level);
          for (const b of this.balls) if (!b.onPaddle) b.setSpeed(spd);
        }
      }
    }

    // Laser
    if (this.puTimers.laser > 0) {
      this.laserTimer -= dt;
      if (this.laserTimer <= 0) {
        this.laserTimer = CONFIG.PU_LASER_INTERVAL;
        this.lasers.push(new Laser(this.paddleX - 15, CONFIG.PADDLE_Y - CONFIG.PADDLE_H));
        this.lasers.push(new Laser(this.paddleX + 15, CONFIG.PADDLE_Y - CONFIG.PADDLE_H));
      }
    }

    // Lasers
    this.lasers = this.lasers.filter(l => { l.update(dt); this.laserBrickCollision(l); return l.alive; });

    // Balls
    for (const ball of this.balls) {
      ball.update(dt, this.paddleX, this.paddleW);
      this.ballPaddleCollision(ball);
      this.ballBrickCollision(ball);
    }
    this.balls = this.balls.filter(b => b.alive);

    // All balls lost
    if (this.balls.length === 0) {
      this.lives--;
      this.shakeDur = 0.3;
      if (this.lives <= 0) {
        SFX.gameOver();
        this.state = STATE.GAMEOVER;
        if (this.score > 0) submitScore('neon-breaker', this.score);
      } else {
        SFX.lifeLost();
        const nb = new Ball(this.paddleX, 0);
        nb.speed = CONFIG.BALL_SPEED * Math.pow(1+CONFIG.BALL_SPEED_INC, this.level);
        this.resetBall(nb);
        this.balls = [nb];
        this.combo = 0;
        this.paddleW = CONFIG.PADDLE_W;
        this.puTimers = {};
      }
    }

    // Power-ups
    const px1 = this.paddleX - this.paddleW/2;
    const py1 = CONFIG.PADDLE_Y - CONFIG.PADDLE_H/2;
    this.powerUps = this.powerUps.filter(pu => {
      pu.update(dt);
      // Catch by paddle
      if (pu.x + pu.w/2 > px1 && pu.x - pu.w/2 < px1 + this.paddleW &&
          pu.y + pu.h/2 > py1 && pu.y - pu.h/2 < py1 + CONFIG.PADDLE_H) {
        this.applyPowerUp(pu);
        SFX.powerUp();
        return false;
      }
      return pu.alive;
    });

    // Bricks
    for (const b of this.bricks) b.update(dt);

    // Particles
    this.particles = this.particles.filter(p => p.update(dt));
    this.floats = this.floats.filter(f => f.update(dt));

    // Combo display
    this.comboScale = lerp(this.comboScale, 1, dt * 8);

    // Shake
    if (this.shakeDur > 0) {
      this.shakeDur -= dt;
      this.shakeX = rnd(-4, 4);
      this.shakeY = rnd(-4, 4);
    } else {
      this.shakeX = 0; this.shakeY = 0;
    }

    // Level clear check
    if (this.isLevelClear()) {
      this.levelClear();
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.shakeX, this.shakeY);

    // Background
    ctx.fillStyle = CONFIG.BG;
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // Synthwave grid
    this.drawGrid();

    if (this.state === STATE.TITLE) {
      this.drawTitle();
    } else if (this.state === STATE.LEVEL_TRANS) {
      this.drawLevelTrans();
    } else if (this.state === STATE.GAMEOVER) {
      this.drawGameOver();
    } else if (this.state === STATE.VICTORY) {
      this.drawVictory();
    } else {
      // Playing or paused
      // Bricks
      for (const b of this.bricks) b.draw(ctx);
      // Power-ups
      for (const pu of this.powerUps) pu.draw(ctx);
      // Lasers
      for (const l of this.lasers) l.draw(ctx);
      // Balls
      for (const b of this.balls) b.draw(ctx);
      // Paddle
      this.drawPaddle();
      // Particles & floats
      for (const p of this.particles) p.draw(ctx);
      for (const f of this.floats) f.draw(ctx);
      // HUD
      this.drawHUD();
      // Combo
      if (this.comboDisplay > 1 && this.combo > 1) {
        ctx.save();
        ctx.font = `bold ${24 * this.comboScale | 0}px 'Segoe UI', Arial`;
        ctx.fillStyle = '#ff0';
        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 12;
        ctx.textAlign = 'center';
        ctx.fillText(`COMBO x${this.combo}`, CONFIG.WIDTH/2, CONFIG.HEIGHT/2 + 80);
        ctx.restore();
      }
      // Active power-up timers display
      this.drawPUTimers();

      if (this.state === STATE.PAUSED) {
        this.drawPause();
      }
    }

    ctx.restore();
  }

  drawGrid() {
    ctx.strokeStyle = 'rgba(50, 20, 80, 0.2)';
    ctx.lineWidth = 1;
    const spacing = 40;
    const off = this.gridOffset;
    for (let y = off; y < CONFIG.HEIGHT; y += spacing) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CONFIG.WIDTH, y); ctx.stroke();
    }
    for (let x = 0; x < CONFIG.WIDTH; x += spacing) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CONFIG.HEIGHT); ctx.stroke();
    }
    // Horizon glow
    const grad = ctx.createLinearGradient(0, CONFIG.HEIGHT - 100, 0, CONFIG.HEIGHT);
    grad.addColorStop(0, 'rgba(120, 0, 255, 0)');
    grad.addColorStop(1, 'rgba(120, 0, 255, 0.05)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, CONFIG.HEIGHT - 100, CONFIG.WIDTH, 100);
  }

  drawPaddle() {
    const px = this.paddleX - this.paddleW/2;
    const py = CONFIG.PADDLE_Y - CONFIG.PADDLE_H/2;
    ctx.save();
    ctx.shadowColor = CONFIG.PADDLE_COLOR;
    ctx.shadowBlur = 15 + 3 * Math.sin(Date.now()/200);
    ctx.fillStyle = CONFIG.PADDLE_COLOR;
    roundRect(ctx, px, py, this.paddleW, CONFIG.PADDLE_H, 6);
    ctx.fill();
    // Highlight
    ctx.shadowBlur = 0;
    const hg = ctx.createLinearGradient(px, py, px, py + CONFIG.PADDLE_H);
    hg.addColorStop(0, 'rgba(255,255,255,0.3)');
    hg.addColorStop(0.5, 'rgba(255,255,255,0)');
    roundRect(ctx, px, py, this.paddleW, CONFIG.PADDLE_H, 6);
    ctx.fillStyle = hg;
    ctx.fill();
    // Laser indicator
    if (this.puTimers.laser > 0) {
      ctx.fillStyle = '#f44';
      ctx.shadowColor = '#f44';
      ctx.shadowBlur = 6;
      ctx.fillRect(this.paddleX - 17, py - 4, 4, 4);
      ctx.fillRect(this.paddleX + 13, py - 4, 4, 4);
    }
    ctx.restore();
  }

  drawHUD() {
    ctx.save();
    // Background bar
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, CONFIG.WIDTH, 36);
    ctx.strokeStyle = 'rgba(0,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 36); ctx.lineTo(CONFIG.WIDTH, 36); ctx.stroke();

    // Score
    ctx.font = 'bold 16px "Segoe UI", Arial';
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 4;
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${this.score}`, 15, 24);

    // Level
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#ff0';
    ctx.fillText(`LEVEL ${this.level + 1}`, CONFIG.WIDTH/2, 24);

    // Lives
    ctx.textAlign = 'right';
    ctx.shadowBlur = 0;
    for (let i = 0; i < this.lives; i++) {
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(CONFIG.WIDTH - 20 - i * 22, 18, 6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  drawPUTimers() {
    ctx.save();
    let y = 50;
    ctx.font = '12px Arial';
    ctx.textAlign = 'right';
    const entries = Object.entries(this.puTimers);
    for (const [key, val] of entries) {
      const names = { wide: 'WIDE', narrow: 'NARROW', slow: 'SLOW', fast: 'FAST', laser: 'LASER' };
      const colors = { wide: '#2979ff', narrow: '#f44', slow: '#0e6', fast: '#f90', laser: '#f44' };
      if (names[key]) {
        ctx.fillStyle = colors[key];
        ctx.shadowColor = colors[key];
        ctx.shadowBlur = 4;
        ctx.fillText(`${names[key]}: ${val.toFixed(1)}s`, CONFIG.WIDTH - 10, y);
        y += 16;
      }
    }
    ctx.restore();
  }

  drawTitle() {
    ctx.save();
    const W = CONFIG.WIDTH, H = CONFIG.HEIGHT;
    const titleFs = Math.max(28, Math.round(Math.min(W, H) * 0.09));
    const subFs = Math.max(12, Math.round(titleFs * 0.3));
    const ctrlFs = Math.max(10, Math.round(titleFs * 0.2));
    const cy = H * 0.35;
    const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 300);
    ctx.textAlign = 'center';

    ctx.font = `bold ${titleFs}px "Segoe UI", Arial`;
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 30 * pulse;
    ctx.fillStyle = '#0ff';
    ctx.fillText('NEON', W/2, cy);

    ctx.shadowColor = '#f0f';
    ctx.shadowBlur = 30 * pulse;
    ctx.fillStyle = '#f0f';
    ctx.fillText('BREAKER', W/2, cy + titleFs * 1.1);

    ctx.shadowBlur = 0;
    ctx.font = `${subFs}px "Segoe UI", Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('An Arkanoid-Style Game', W/2, cy + titleFs * 1.7);

    const blink = Math.sin(Date.now() / 400) > 0;
    if (blink) {
      ctx.font = `bold ${subFs + 4}px "Segoe UI", Arial`;
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fillText('CLICK OR TAP TO START', W/2, H * 0.7);
    }

    ctx.shadowBlur = 0;
    ctx.font = `${ctrlFs}px "Segoe UI", Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('Mouse/Touch: Move Paddle | Click/Tap: Launch Ball', W/2, H * 0.82);
    ctx.fillText('P: Pause | Esc: Quit to Title', W/2, H * 0.82 + ctrlFs + 4);

    ctx.restore();
  }

  drawLevelTrans() {
    ctx.save();
    ctx.textAlign = 'center';
    const scale = 1 + 0.3 * Math.sin(this.transTimer * 5);
    ctx.font = `bold ${48 * scale | 0}px "Segoe UI", Arial`;
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 20;
    ctx.fillText(`LEVEL ${this.level + 1}`, CONFIG.WIDTH/2, CONFIG.HEIGHT/2);

    if (this.level === 4 || this.level === 9 || this.level === 14) {
      ctx.font = 'bold 28px "Segoe UI", Arial';
      ctx.fillStyle = '#f44';
      ctx.shadowColor = '#f44';
      ctx.fillText('BOSS WAVE', CONFIG.WIDTH/2, CONFIG.HEIGHT/2 + 50);
    }
    ctx.restore();
  }

  drawPause() {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    ctx.textAlign = 'center';
    ctx.font = 'bold 48px "Segoe UI", Arial';
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 20;
    ctx.fillText('PAUSED', CONFIG.WIDTH/2, CONFIG.HEIGHT/2 - 20);
    ctx.shadowBlur = 0;
    ctx.font = '18px "Segoe UI", Arial';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('Press P to Resume  |  Esc to Quit', CONFIG.WIDTH/2, CONFIG.HEIGHT/2 + 30);
    ctx.restore();
  }

  drawGameOver() {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 56px "Segoe UI", Arial';
    ctx.fillStyle = '#f44';
    ctx.shadowColor = '#f44';
    ctx.shadowBlur = 25;
    ctx.fillText('GAME OVER', CONFIG.WIDTH/2, 220);

    ctx.shadowBlur = 0;
    ctx.font = '22px "Segoe UI", Arial';
    ctx.fillStyle = '#fff';
    ctx.fillText(`Final Score: ${this.score}`, CONFIG.WIDTH/2, 290);
    ctx.fillText(`Reached Level: ${this.level + 1}`, CONFIG.WIDTH/2, 325);
    ctx.fillText(`Best Combo: x${this.comboMax}`, CONFIG.WIDTH/2, 360);

    const blink = Math.sin(Date.now() / 400) > 0;
    if (blink) {
      ctx.font = 'bold 20px "Segoe UI", Arial';
      ctx.fillStyle = '#0ff';
      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 10;
      ctx.fillText('CLICK TO RETRY', CONFIG.WIDTH/2, 430);
    }
    ctx.restore();
  }

  drawVictory() {
    ctx.save();
    ctx.textAlign = 'center';

    const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 200);
    ctx.font = 'bold 48px "Segoe UI", Arial';
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 25 * pulse;
    ctx.fillText('CONGRATULATIONS!', CONFIG.WIDTH/2, 180);

    ctx.font = 'bold 28px "Segoe UI", Arial';
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 15;
    ctx.fillText('You beat Neon Breaker!', CONFIG.WIDTH/2, 240);

    ctx.shadowBlur = 0;
    ctx.font = '22px "Segoe UI", Arial';
    ctx.fillStyle = '#fff';
    ctx.fillText(`Final Score: ${this.score}`, CONFIG.WIDTH/2, 310);
    ctx.fillText(`Total Time: ${this.totalTime.toFixed(1)}s`, CONFIG.WIDTH/2, 345);
    ctx.fillText(`Best Combo: x${this.comboMax}`, CONFIG.WIDTH/2, 380);

    const blink = Math.sin(Date.now() / 400) > 0;
    if (blink) {
      ctx.font = 'bold 20px "Segoe UI", Arial';
      ctx.fillStyle = '#0ff';
      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 10;
      ctx.fillText('CLICK TO PLAY AGAIN', CONFIG.WIDTH/2, 460);
    }
    ctx.restore();
  }
}

// ==================== MAIN LOOP ====================
const game = new Game();
let lastTime = 0;

function loop(time) {
  requestAnimationFrame(loop);
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  game.update(dt);
  game.draw();
}
requestAnimationFrame(loop);

</script>
