<script>
'use strict';
// ═══════════════════════════════════════════════════════
// KONG CLIMB — Game & Watch "Donkey Kong" Multi Screen (1982)
//
// Two stacked LCD screens. DK top-left throws barrels.
// Mario climbs girders via ladders, jumping over barrels.
// Reach the crane hook to cut a wire. Cut all 4 = defeat DK.
// D-pad + jump button. 1pt per barrel jump (2pts upper girders).
// ═══════════════════════════════════════════════════════

var _SU='https://ivhpqkqnfqcgrfrsvszf.supabase.co',_SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2aHBxa3FuZnFjZ3JmcnN2c3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTg1NjYsImV4cCI6MjA4OTM5NDU2Nn0.x3X_0dbhw3Qz7sgQAgpSoSu382ckB2uYxCJGe7_vDCM';
async function submitScore(g,s){var n=prompt('Score: '+s+'! Enter initials (max 5):');if(!n)return;n=n.trim().slice(0,5).toUpperCase();if(!n)return;try{await fetch(_SU+'/rest/v1/high_scores',{method:'POST',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json'},body:JSON.stringify({game:g,initials:n,score:s})})}catch(e){}}

var canvas=document.getElementById('C'),ctx=canvas.getContext('2d');

// ── AUDIO ──
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function beep(f,d,v){if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.value=f;g.gain.value=v||0.1;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sfxStep(){beep(180,0.04,0.06)}
function sfxJump(){beep(400,0.06,0.1);setTimeout(function(){beep(500,0.05,0.08)},40)}
function sfxBarrel(){beep(80,0.03,0.05)}
function sfxCutWire(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){beep(f,0.12,0.14)},i*100)})}
function sfxHit(){beep(120,0.2,0.18);setTimeout(function(){beep(80,0.25,0.15)},100)}
function sfxGameOver(){[300,250,200,150,100].forEach(function(f,i){setTimeout(function(){beep(f,0.2,0.12)},i*180)})}

var LCD_BG='#9aad86',LCD_GHOST='#889a75',LCD_ON='#1a2a12',LCD_STRUCT='#708060';

// ── LAYOUT ──
var D={},TS={},BS={}; // device, top screen, bottom screen
var dpadRect,jumpRect;
function calcLayout(){
  var vw=window.innerWidth,vh=window.innerHeight;
  canvas.width=vw;canvas.height=vh;
  // Portrait device — ratio ~0.55:1
  var asp=0.55;
  D.h=vh*0.94;D.w=D.h*asp;
  if(D.w>vw*0.94){D.w=vw*0.94;D.h=D.w/asp}
  D.x=(vw-D.w)/2;D.y=(vh-D.h)/2;
  // Two screens stacked
  var scrW=D.w*0.82,scrH=D.h*0.28;
  var margin=(D.w-scrW)/2;
  TS.w=scrW;TS.h=scrH;TS.x=D.x+margin;TS.y=D.y+D.h*0.08;
  BS.w=scrW;BS.h=scrH;BS.x=D.x+margin;BS.y=TS.y+scrH+D.h*0.025;
}

// ── STATE ──
// 4 girders: 0=bottom of bottom screen, 1=top of bottom screen,
//            2=bottom of top screen, 3=top of top screen
// Each girder has 5 positions (0=left, 4=right)
// Ladders: girder 0→1 at pos 4 (right), girder 1→2 at pos 0 (left), girder 2→3 at pos 4 (right)
var score,hiScore,lives,marioGirder,marioPos,marioJumping,marioJumpTick;
var marioOnLadder,marioLadderDir; // 1=climbing up
var barrels; // [{girder,pos}]
var wiresCut,tickRate,accumulator,barrelSpawnTimer;
var dkFrame,state,scoreSubmitted;

function loadHi(){try{hiScore=parseInt(localStorage.getItem('kong_hi'))||0}catch(e){hiScore=0}}
function saveHi(){try{localStorage.setItem('kong_hi',score)}catch(e){}}

function initGame(){
  score=0;lives=3;marioGirder=0;marioPos=0;
  marioJumping=false;marioJumpTick=0;
  marioOnLadder=false;marioLadderDir=0;
  barrels=[];wiresCut=0;tickRate=600;accumulator=0;
  barrelSpawnTimer=0;dkFrame=0;
  state='title';scoreSubmitted=false;
}
function startGame(){initGame();state='play';lives=3}

function resetAfterWire(){
  marioGirder=0;marioPos=0;marioJumping=false;marioOnLadder=false;
  barrels=[];barrelSpawnTimer=0;
  tickRate=Math.max(300,600-wiresCut*60);
}

// Barrel direction on each girder (alternating)
// DK at top-left throws RIGHT. Barrels alternate each girder.
// Girder 3=right, 2=left, 1=right, 0=left
function barrelDir(g){return(g%2===1)?1:-1}

// ── GAME LOGIC ──
function gameTick(){
  if(state!=='play')return;
  dkFrame=1-dkFrame;

  if(marioOnLadder){
    // Auto-climb takes a few ticks
    marioOnLadder=false; // instant for LCD feel
    if(marioLadderDir>0){
      // Climb up
      marioGirder++;
      if(marioGirder===1)marioPos=4; // arrive at top of ladder (right side)
      else if(marioGirder===2)marioPos=0; // left side
      else if(marioGirder===3)marioPos=4; // right side
    }
    sfxStep();
    return;
  }

  if(marioJumping){
    marioJumpTick++;
    if(marioJumpTick>=2){
      marioJumping=false;marioJumpTick=0;
    }
    // DON'T return — barrels must keep moving while Mario jumps!
  }

  // Move barrels
  for(var i=barrels.length-1;i>=0;i--){
    var b=barrels[i];
    b.pos+=barrelDir(b.girder);
    // Check if barrel falls to next girder
    // Barrel falls when it reaches the end of a girder
    // G3 rolls RIGHT → falls at pos>4 to G2 (starts right, pos 4)
    if(b.girder===3&&b.pos>4){b.girder=2;b.pos=4;continue}
    // G2 rolls LEFT → falls at pos<0 to G1 (starts left, pos 0)
    if(b.girder===2&&b.pos<0){b.girder=1;b.pos=0;continue}
    // G1 rolls RIGHT → falls at pos>4 to G0 (starts right, pos 4)
    if(b.girder===1&&b.pos>4){b.girder=0;b.pos=4;continue}
    // G0 rolls LEFT → off screen at pos<0
    if(b.girder===0&&b.pos<0){barrels.splice(i,1);continue}
  }

  // DK spawns barrel on girder 3
  barrelSpawnTimer++;
  var spawnRate=Math.max(3,6-wiresCut);
  if(barrelSpawnTimer>=spawnRate){
    barrelSpawnTimer=0;
    barrels.push({girder:3,pos:1}); // DK pushes barrel rightward from pos 0
    sfxBarrel();
  }

  // Check collision: barrel at same girder and pos as Mario
  // Safe if: jumping, on ladder, or at a ladder position (overhang shelter)
  var atLadder=(marioGirder===0&&marioPos===4)||(marioGirder===1&&marioPos===0)||(marioGirder===2&&marioPos===4);
  if(!marioJumping&&!marioOnLadder&&!atLadder){
    for(var j=0;j<barrels.length;j++){
      if(barrels[j].girder===marioGirder&&barrels[j].pos===marioPos){
        // Hit!
        lives--;sfxHit();
        marioGirder=0;marioPos=0;barrels=[];barrelSpawnTimer=0;
        if(lives<=0){
          state='over';
          if(score>hiScore){hiScore=score;saveHi()}
          if(score>0&&!scoreSubmitted){scoreSubmitted=true;submitScore('kong-climb',score)}
          sfxGameOver();
        }
        return;
      }
    }
  } else {
    // Jumping over a barrel — score!
    for(var k=0;k<barrels.length;k++){
      if(barrels[k].girder===marioGirder&&barrels[k].pos===marioPos){
        score+=(marioGirder>=2)?2:1; // 2pts on upper girders
        sfxJump();
      }
    }
  }

  // Check if Mario reached the crane/hook (girder 3, pos 4)
  if(marioGirder===3&&marioPos>=4){
    wiresCut++;
    if(wiresCut>=4){
      score+=20;
      wiresCut=0;
      sfxCutWire();
    } else {
      score+=5;
      sfxCutWire();
    }
    resetAfterWire();
  }
}

// ── INPUT ──
function pressLeft(){
  if(state!=='play'||marioOnLadder||marioJumping)return;
  if(marioPos>0){marioPos--;sfxStep()}
}
function pressRight(){
  if(state!=='play'||marioOnLadder||marioJumping)return;
  if(marioPos<4){marioPos++;sfxStep()}
}
function pressUp(){
  if(state!=='play'||marioOnLadder||marioJumping)return;
  // Check for ladder: girder 0 pos 4, girder 1 pos 0, girder 2 pos 4
  if(marioGirder===0&&marioPos===4){marioOnLadder=true;marioLadderDir=1;return}
  if(marioGirder===1&&marioPos===0){marioOnLadder=true;marioLadderDir=1;return}
  if(marioGirder===2&&marioPos===4){marioOnLadder=true;marioLadderDir=1;return}
}
function pressJump(){
  if(state!=='play'||marioOnLadder||marioJumping)return;
  marioJumping=true;marioJumpTick=0;sfxJump();
}
function doStart(){initAudio();if(state!=='play')startGame()}

window.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();pressLeft()}
  if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();pressRight()}
  if(e.key==='ArrowUp'||e.key==='w'){e.preventDefault();pressUp()}
  if(e.key===' '||e.key==='x'){e.preventDefault();if(state==='play')pressJump();else doStart()}
  if(e.key==='Enter'){e.preventDefault();doStart()}
});
function hitTest(x,y){
  if(state!=='play'){doStart();return}
  if(dpadRect){
    var dcx=dpadRect.x+dpadRect.w/2,dcy=dpadRect.y+dpadRect.h/2;
    var dx=x-dcx,dy=y-dcy;
    if(Math.abs(dx)<dpadRect.w*0.6&&Math.abs(dy)<dpadRect.h*0.6){
      if(Math.abs(dx)>Math.abs(dy)){if(dx<0)pressLeft();else pressRight()}
      else{if(dy<0)pressUp();}
      return;
    }
  }
  if(jumpRect&&x>=jumpRect.x&&x<=jumpRect.x+jumpRect.w&&y>=jumpRect.y&&y<=jumpRect.y+jumpRect.h){pressJump();return}
  // Fallback quadrants
  if(y<canvas.height*0.5)pressUp();
  else if(x<canvas.width*0.4)pressLeft();
  else if(x>canvas.width*0.6)pressRight();
  else pressJump();
}
canvas.addEventListener('mousedown',function(e){hitTest(e.clientX,e.clientY)});
canvas.addEventListener('touchstart',function(e){e.preventDefault();for(var i=0;i<e.touches.length;i++)hitTest(e.touches[i].clientX,e.touches[i].clientY)},{passive:false});

// ═══════════════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════════════

var SEGS=[0x7E,0x30,0x6D,0x79,0x33,0x5B,0x5F,0x70,0x7F,0x7B];
function draw7Seg(cx,cy,h,val,col){var w=h*0.55,t=h*0.09,g=h*0.04;ctx.fillStyle=col;var s=SEGS[val]||0;if(s&0x40)ctx.fillRect(cx-w/2+g,cy-h/2,w-g*2,t);if(s&0x20)ctx.fillRect(cx+w/2-t,cy-h/2+g,t,h/2-g*2);if(s&0x10)ctx.fillRect(cx+w/2-t,cy+g,t,h/2-g*2);if(s&0x08)ctx.fillRect(cx-w/2+g,cy+h/2-t,w-g*2,t);if(s&0x04)ctx.fillRect(cx-w/2,cy+g,t,h/2-g*2);if(s&0x02)ctx.fillRect(cx-w/2,cy-h/2+g,t,h/2-g*2);if(s&0x01)ctx.fillRect(cx-w/2+g,cy-t/2,w-g*2,t)}
function drawScoreVal(x,y,h,val){var ds=[Math.floor(val/100)%10,Math.floor(val/10)%10,val%10],dw=h*0.7;for(var i=0;i<3;i++){draw7Seg(x+i*dw,y,h,8,LCD_GHOST);draw7Seg(x+i*dw,y,h,ds[i],LCD_ON)}}

// ── Position on screen for girder/pos ──
function girderScreenY(scr,girderInScreen){
  // Each screen has 2 girders. girderInScreen 0=bottom, 1=top
  var s=girderInScreen===0?scr.y+scr.h*0.75:scr.y+scr.h*0.3;
  return s;
}
function posX(scr,pos){return scr.x+scr.w*(0.1+pos*0.2)} // 5 positions: 0.1, 0.3, 0.5, 0.7, 0.9

// ── MARIO silhouette ──
function drawMario(cx,cy,w,h,col,jumping){
  ctx.fillStyle=col;
  // Cap
  ctx.fillRect(cx-w*0.15,cy-h*0.48,w*0.35,h*0.08);
  ctx.fillRect(cx-w*0.1,cy-h*0.52,w*0.25,h*0.06);
  // Head
  ctx.beginPath();ctx.arc(cx,cy-h*0.32,w*0.12,0,Math.PI*2);ctx.fill();
  // Body
  ctx.fillRect(cx-w*0.12,cy-h*0.18,w*0.24,h*0.22);
  // Overall straps (cutout)
  ctx.fillStyle=LCD_BG;
  ctx.fillRect(cx-w*0.04,cy-h*0.18,w*0.08,h*0.03);
  ctx.fillStyle=col;
  if(jumping){
    // Arms and legs spread
    ctx.fillRect(cx-w*0.3,cy-h*0.12,w*0.18,h*0.06);
    ctx.fillRect(cx+w*0.12,cy-h*0.12,w*0.18,h*0.06);
    // Legs spread wide
    ctx.beginPath();
    ctx.moveTo(cx-w*0.1,cy+h*0.04);ctx.lineTo(cx-w*0.25,cy+h*0.3);
    ctx.lineTo(cx-w*0.15,cy+h*0.32);ctx.lineTo(cx-w*0.02,cy+h*0.08);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx+w*0.1,cy+h*0.04);ctx.lineTo(cx+w*0.25,cy+h*0.3);
    ctx.lineTo(cx+w*0.15,cy+h*0.32);ctx.lineTo(cx+w*0.02,cy+h*0.08);ctx.fill();
  } else {
    // Arms at sides
    ctx.fillRect(cx-w*0.22,cy-h*0.1,w*0.1,h*0.16);
    ctx.fillRect(cx+w*0.12,cy-h*0.1,w*0.1,h*0.16);
    // Legs
    ctx.fillRect(cx-w*0.1,cy+h*0.04,w*0.08,h*0.2);
    ctx.fillRect(cx+w*0.02,cy+h*0.04,w*0.08,h*0.2);
    // Shoes
    ctx.fillRect(cx-w*0.14,cy+h*0.22,w*0.12,h*0.06);
    ctx.fillRect(cx+w*0.02,cy+h*0.22,w*0.12,h*0.06);
  }
}

// ── DK silhouette — gorilla with barrel ──
function drawDK(cx,cy,w,h,col,frame){
  ctx.fillStyle=col;
  // Head
  ctx.beginPath();
  ctx.moveTo(cx-w*0.2,cy-h*0.05);
  ctx.quadraticCurveTo(cx-w*0.25,cy-h*0.35,cx,cy-h*0.38);
  ctx.quadraticCurveTo(cx+w*0.25,cy-h*0.35,cx+w*0.2,cy-h*0.05);
  ctx.fill();
  // Brow ridge
  ctx.fillRect(cx-w*0.18,cy-h*0.18,w*0.36,h*0.06);
  // Snout
  ctx.fillRect(cx-w*0.1,cy-h*0.1,w*0.2,h*0.12);
  // Eye cutouts
  ctx.fillStyle=LCD_BG;
  ctx.fillRect(cx-w*0.12,cy-h*0.25,w*0.08,h*0.05);
  ctx.fillRect(cx+w*0.04,cy-h*0.25,w*0.08,h*0.05);
  // Mouth cutout
  ctx.fillRect(cx-w*0.06,cy-h*0.02,w*0.12,h*0.04);
  ctx.fillStyle=col;
  // Massive body
  ctx.fillRect(cx-w*0.28,cy+h*0.02,w*0.56,h*0.3);
  // Arms (one holds/pushes barrel)
  if(frame===0){
    ctx.fillRect(cx-w*0.42,cy+h*0.02,w*0.14,h*0.2);
    ctx.fillRect(cx+w*0.28,cy+h*0.05,w*0.14,h*0.2);
  } else {
    ctx.fillRect(cx-w*0.42,cy+h*0.08,w*0.14,h*0.2);
    ctx.fillRect(cx+w*0.28,cy-h*0.02,w*0.14,h*0.2);
  }
  // Legs
  ctx.fillRect(cx-w*0.22,cy+h*0.32,w*0.14,h*0.14);
  ctx.fillRect(cx+w*0.08,cy+h*0.32,w*0.14,h*0.14);
}

// ── BARREL ──
function drawBarrel(cx,cy,r,col){
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  // Band
  ctx.fillStyle=LCD_BG;
  ctx.fillRect(cx-r,cy-r*0.15,r*2,r*0.3);
  ctx.fillStyle=col;
}

// ── CRANE/HOOK ──
function drawCrane(cx,cy,w,h,col,wiresLeft){
  ctx.fillStyle=col;
  // Crane arm
  ctx.fillRect(cx-w*0.4,cy,w*0.8,h*0.08);
  // Hook
  ctx.beginPath();
  ctx.moveTo(cx,cy+h*0.08);
  ctx.lineTo(cx-w*0.08,cy+h*0.3);
  ctx.quadraticCurveTo(cx,cy+h*0.4,cx+w*0.08,cy+h*0.3);
  ctx.lineTo(cx,cy+h*0.08);
  ctx.fill();
  // Wires (4 total, cut ones are gone)
  for(var i=0;i<4;i++){
    if(i<4-wiresLeft){
      ctx.fillStyle=LCD_GHOST; // cut wire (faint)
    } else {
      ctx.fillStyle=col;
    }
    ctx.fillRect(cx-w*0.3+i*w*0.18,cy-h*0.2,w*0.04,h*0.2);
  }
}

// ── GIRDER (platform line) ──
function drawGirder(scr,y){
  ctx.fillStyle=LCD_STRUCT;
  ctx.fillRect(scr.x+scr.w*0.05,y,scr.w*0.9,Math.max(2,scr.h*0.02));
}

// ── LADDER ──
function drawLadder(x,y1,y2,col){
  ctx.fillStyle=col;
  var w=Math.max(6,Math.abs(y2-y1)*0.15);
  ctx.fillRect(x-w/2,Math.min(y1,y2),w*0.15,Math.abs(y2-y1));
  ctx.fillRect(x+w/2-w*0.15,Math.min(y1,y2),w*0.15,Math.abs(y2-y1));
  var h=Math.abs(y2-y1);
  for(var r=0;r<4;r++){
    ctx.fillRect(x-w/2,Math.min(y1,y2)+r*h*0.25+h*0.1,w,h*0.04);
  }
}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(){
  var vw=canvas.width,vh=canvas.height;
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,vw,vh);

  // Device — red/maroon portrait
  var grad=ctx.createLinearGradient(D.x,D.y,D.x,D.y+D.h);
  grad.addColorStop(0,'#a83030');grad.addColorStop(0.4,'#8a2020');grad.addColorStop(1,'#6a1818');
  ctx.fillStyle=grad;roundRect(D.x,D.y,D.w,D.h,D.w*0.04);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.08)';roundRect(D.x,D.y,D.w,D.h*0.012,D.w*0.04);ctx.fill();
  // Screws
  var sr=D.w*0.015,si=D.w*0.05;
  [[D.x+si,D.y+si],[D.x+D.w-si,D.y+si],[D.x+si,D.y+D.h-si],[D.x+D.w-si,D.y+D.h-si]].forEach(function(p){
    ctx.fillStyle='#601818';ctx.beginPath();ctx.arc(p[0],p[1],sr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#401010';ctx.fillRect(p[0]-sr*0.6,p[1]-sr*0.15,sr*1.2,sr*0.3);
  });
  ctx.fillStyle='#f0c0b0';ctx.font='bold '+(D.w*0.06)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('KONG CLIMB',D.x+D.w/2,D.y+D.h*0.055);

  // ── TOP SCREEN ──
  ctx.fillStyle='#1a0808';roundRect(TS.x-3,TS.y-3,TS.w+6,TS.h+6,2);ctx.fill();
  ctx.fillStyle=LCD_BG;ctx.fillRect(TS.x,TS.y,TS.w,TS.h);

  // ── BOTTOM SCREEN ──
  ctx.fillStyle='#1a0808';roundRect(BS.x-3,BS.y-3,BS.w+6,BS.h+6,2);ctx.fill();
  ctx.fillStyle=LCD_BG;ctx.fillRect(BS.x,BS.y,BS.w,BS.h);

  // Hinge between screens
  ctx.fillStyle='#501818';ctx.fillRect(D.x+D.w*0.1,TS.y+TS.h,D.w*0.8,BS.y-TS.y-TS.h);

  // ── STRUCTURAL ELEMENTS ──
  // Girders
  var g0y=girderScreenY(BS,0),g1y=girderScreenY(BS,1);
  var g2y=girderScreenY(TS,0),g3y=girderScreenY(TS,1);
  drawGirder(BS,g0y);drawGirder(BS,g1y);
  drawGirder(TS,g2y);drawGirder(TS,g3y);

  // Ladders
  drawLadder(posX(BS,4),g1y,g0y,LCD_STRUCT); // right side, girder 0→1
  drawLadder(posX(BS,0),g1y,TS.y+TS.h,LCD_STRUCT); // left side, girder 1→2 (crosses screens)
  drawLadder(posX(TS,0),TS.y+TS.h,g2y,LCD_STRUCT); // continuation on top screen
  drawLadder(posX(TS,4),g3y,g2y,LCD_STRUCT); // right side, girder 2→3

  // Overhangs — visible shelter platforms at ladder bases
  // These extend from the upper girder, showing where Mario can duck under barrels
  ctx.fillStyle=LCD_STRUCT;
  var ovW=BS.w*0.08,ovH=Math.max(3,BS.h*0.08);
  // Overhang at girder 1, pos 4 (above ladder from g0→g1, shelter from g1 barrels)
  ctx.fillRect(posX(BS,4)-ovW/2,g1y,ovW,ovH);
  ctx.fillRect(posX(BS,4)-ovW*0.7,g1y,ovW*1.4,Math.max(2,ovH*0.3));
  // Overhang at girder 2, pos 0 (above ladder from g1→g2, shelter from g2 barrels)
  ctx.fillRect(posX(TS,0)-ovW/2,g2y,ovW,ovH);
  ctx.fillRect(posX(TS,0)-ovW*0.7,g2y,ovW*1.4,Math.max(2,ovH*0.3));
  // Overhang at girder 3, pos 4 (above ladder from g2→g3, shelter from g3 barrels)
  ctx.fillRect(posX(TS,4)-ovW/2,g3y,ovW,ovH);
  ctx.fillRect(posX(TS,4)-ovW*0.7,g3y,ovW*1.4,Math.max(2,ovH*0.3));

  // Crane/hook top-right of top screen
  drawCrane(posX(TS,4),TS.y+TS.h*0.05,TS.w*0.15,TS.h*0.2,LCD_STRUCT,4-wiresCut);

  // DK top-left of top screen (structural, always visible)
  var dkX=posX(TS,0),dkY=g3y-TS.h*0.05;
  var dkW=TS.w*0.12,dkH=TS.h*0.3;

  // Score on top screen
  drawScoreVal(TS.x+TS.w*0.35,TS.y+TS.h*0.08,TS.h*0.12,score);

  // Lives on bottom screen
  for(var li=0;li<3;li++){
    ctx.fillStyle=(li<lives&&state!=='title')?LCD_ON:LCD_GHOST;
    ctx.beginPath();ctx.arc(BS.x+BS.w*(0.15+li*0.08),BS.y+BS.h*0.1,BS.h*0.025,0,Math.PI*2);ctx.fill();
  }

  // ── GHOST SEGMENTS ──
  var marioW=TS.w*0.06,marioH=TS.h*0.2;
  var barrelR=Math.max(3,TS.h*0.04);
  // Mario ghosts at all positions on all girders
  for(var gg=0;gg<4;gg++){
    var scr=gg<2?BS:TS;
    var gy=gg<2?girderScreenY(BS,gg):girderScreenY(TS,gg-2);
    for(var gp=0;gp<5;gp++){
      drawMario(posX(scr,gp),gy-marioH*0.3,marioW,marioH,LCD_GHOST,false);
    }
  }
  // Barrel ghosts
  for(var bg=0;bg<4;bg++){
    var bscr=bg<2?BS:TS;
    var bgy=bg<2?girderScreenY(BS,bg):girderScreenY(TS,bg-2);
    for(var bp=0;bp<5;bp++){
      drawBarrel(posX(bscr,bp),bgy-barrelR*1.2,barrelR,LCD_GHOST);
    }
  }

  // ── ACTIVE ELEMENTS ──
  if(state==='play'||state==='over'){
    // DK
    drawDK(dkX,dkY,dkW,dkH,LCD_ON,dkFrame);

    // Active barrels
    for(var bi=0;bi<barrels.length;bi++){
      var bb=barrels[bi];
      var bscr2=bb.girder<2?BS:TS;
      var bgy2=bb.girder<2?girderScreenY(BS,bb.girder):girderScreenY(TS,bb.girder-2);
      drawBarrel(posX(bscr2,bb.pos),bgy2-barrelR*1.2,barrelR,LCD_ON);
    }

    // Active Mario
    var mscr=marioGirder<2?BS:TS;
    var mgy=marioGirder<2?girderScreenY(BS,marioGirder):girderScreenY(TS,marioGirder-2);
    var jumpOff=marioJumping?-marioH*0.4:0;
    drawMario(posX(mscr,marioPos),mgy-marioH*0.3+jumpOff,marioW,marioH,LCD_ON,marioJumping);
  }

  // ── BUTTONS ──
  var btnArea=D.y+D.h-(BS.y+BS.h)-D.h*0.02;
  var btnBaseY=BS.y+BS.h+D.h*0.02;
  // D-pad on left
  var dpadSz=Math.min(D.w*0.2,btnArea*0.7);
  var dpadCX=D.x+D.w*0.28,dpadCY=btnBaseY+btnArea*0.5;
  dpadRect={x:dpadCX-dpadSz,y:dpadCY-dpadSz,w:dpadSz*2,h:dpadSz*2};
  // D-pad cross
  ctx.fillStyle='#401818';
  ctx.fillRect(dpadCX-dpadSz*0.3,dpadCY-dpadSz,dpadSz*0.6,dpadSz*2);
  ctx.fillRect(dpadCX-dpadSz,dpadCY-dpadSz*0.3,dpadSz*2,dpadSz*0.6);
  ctx.fillStyle='#581818';
  ctx.fillRect(dpadCX-dpadSz*0.25,dpadCY-dpadSz*0.95,dpadSz*0.5,dpadSz*1.9);
  ctx.fillRect(dpadCX-dpadSz*0.95,dpadCY-dpadSz*0.25,dpadSz*1.9,dpadSz*0.5);
  // Arrows
  ctx.fillStyle='#c08080';ctx.font=(dpadSz*0.4)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('▲',dpadCX,dpadCY-dpadSz*0.55);
  ctx.fillText('◀',dpadCX-dpadSz*0.6,dpadCY+dpadSz*0.12);
  ctx.fillText('▶',dpadCX+dpadSz*0.6,dpadCY+dpadSz*0.12);

  // Jump button on right
  var jmpR=Math.min(D.w*0.1,btnArea*0.3);
  var jmpCX=D.x+D.w*0.75,jmpCY=dpadCY;
  jumpRect={x:jmpCX-jmpR,y:jmpCY-jmpR,w:jmpR*2,h:jmpR*2};
  ctx.fillStyle='#401818';ctx.beginPath();ctx.arc(jmpCX,jmpCY,jmpR+2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c83030';ctx.beginPath();ctx.arc(jmpCX,jmpCY,jmpR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(jmpCX-jmpR*0.2,jmpCY-jmpR*0.2,jmpR*0.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0c0b0';ctx.font='bold '+(jmpR*0.6)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('JUMP',jmpCX,jmpCY+jmpR*0.2);

  // ── TITLE / GAME OVER ──
  if(state==='title'){
    // Draw on bottom screen
    ctx.fillStyle=LCD_ON;ctx.font='bold '+(BS.h*0.12)+'px sans-serif';ctx.textAlign='center';
    ctx.fillText('KONG CLIMB',BS.x+BS.w/2,BS.y+BS.h*0.35);
    ctx.font=(BS.h*0.06)+'px sans-serif';
    ctx.fillText('← → to move, ↑ to climb',BS.x+BS.w/2,BS.y+BS.h*0.52);
    ctx.fillText('JUMP over barrels!',BS.x+BS.w/2,BS.y+BS.h*0.62);
    ctx.fillText('Reach the hook to cut wires',BS.x+BS.w/2,BS.y+BS.h*0.72);
    ctx.fillText('Tap or SPACE to start',BS.x+BS.w/2,BS.y+BS.h*0.85);
    // Hi score on top screen
    ctx.fillText('Hi Score: '+hiScore,TS.x+TS.w/2,TS.y+TS.h*0.5);
  }
  if(state==='over'){
    ctx.fillStyle='rgba(154,173,134,0.88)';ctx.fillRect(BS.x+BS.w*0.1,BS.y+BS.h*0.15,BS.w*0.8,BS.h*0.7);
    ctx.fillStyle=LCD_ON;ctx.font='bold '+(BS.h*0.1)+'px sans-serif';ctx.textAlign='center';
    ctx.fillText('GAME OVER',BS.x+BS.w/2,BS.y+BS.h*0.4);
    ctx.font=(BS.h*0.07)+'px sans-serif';
    ctx.fillText('Score: '+score,BS.x+BS.w/2,BS.y+BS.h*0.55);
    if(score>=hiScore&&score>0)ctx.fillText('NEW HIGH SCORE!',BS.x+BS.w/2,BS.y+BS.h*0.67);
    ctx.font=(BS.h*0.05)+'px sans-serif';
    ctx.fillText('Tap or SPACE to restart',BS.x+BS.w/2,BS.y+BS.h*0.8);
  }
}

// ── MAIN LOOP ──
var lastTime=0;
function loop(now){
  if(!lastTime)lastTime=now;
  var dt=now-lastTime;lastTime=now;
  if(state==='play'){accumulator+=dt;while(accumulator>=tickRate){accumulator-=tickRate;gameTick()}}
  render();requestAnimationFrame(loop);
}

loadHi();initGame();calcLayout();
window.addEventListener('resize',calcLayout);
requestAnimationFrame(loop);
</script>
