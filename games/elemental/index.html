<!DOCTYPE html>
<html lang="en">

<title>Elemental</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#1a1a2e;color:#e0d6c8;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* Header */
#header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#16213e;border-bottom:1px solid #2a3a5e;flex-shrink:0;z-index:10}
#header h1{font-size:20px;font-weight:600;letter-spacing:1px;color:#e8d5b5}
#counter{font-size:14px;color:#8899aa;font-weight:400}
#counter span{color:#e8d5b5;font-weight:600}

/* Workspace */
#workspace{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}
#slots{display:flex;align-items:center;gap:20px;margin-bottom:20px}
.slot{width:80px;height:80px;border:2px dashed #2a3a5e;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:all 0.3s}
.slot.filled{border-color:#4a5a7e;background:rgba(30,40,70,0.6)}
.slot .tile-icon{font-size:32px}
.slot .tile-label{font-size:10px;margin-top:2px;color:#8899aa}
#combine-symbol{font-size:28px;color:#4a5a7e;font-weight:700}
#result-area{height:100px;display:flex;align-items:center;justify-content:center}
#result-msg{font-size:14px;color:#667788;font-style:italic;min-height:20px;text-align:center}

/* Discovery animation */
.discovery-burst{position:absolute;pointer-events:none;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:20}
.discovery-burst .tile-big{width:80px;height:80px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;transform:scale(0)}
.discovery-burst .burst-name{font-size:16px;font-weight:600;margin-top:8px;animation:fadeUp 0.8s 0.3s forwards;opacity:0;color:#e8d5b5}
@keyframes popIn{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0)}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
.burst-ring{position:absolute;width:80px;height:80px;border-radius:50%;border:3px solid;animation:ringExpand 0.8s forwards;opacity:0.7}
@keyframes ringExpand{0%{transform:scale(0.5);opacity:0.8}100%{transform:scale(3);opacity:0}}

/* Palette */
#palette-wrap{background:#16213e;border-top:1px solid #2a3a5e;flex-shrink:0;z-index:10}
#palette-tabs{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid #2a3a5e;scrollbar-width:none;-ms-overflow-style:none}
#palette-tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;font-size:11px;color:#667788;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{color:#e8d5b5;border-bottom-color:#e8d5b5}
.tab:hover{color:#aabbcc}
#palette{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;max-height:180px;overflow-y:auto;justify-content:flex-start;scrollbar-width:thin;scrollbar-color:#2a3a5e #16213e}
#palette::-webkit-scrollbar{width:6px}
#palette::-webkit-scrollbar-thumb{background:#2a3a5e;border-radius:3px}

/* Tiles */
.tile{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;transition:all 0.15s;border:2px solid transparent;position:relative}
.tile:hover{transform:scale(1.08);border-color:rgba(255,255,255,0.2)}
.tile.selected{border-color:#fff;transform:scale(1.1);box-shadow:0 0 12px rgba(255,255,255,0.3)}
.tile .tile-icon{font-size:22px;line-height:1}
.tile .tile-label{font-size:8px;margin-top:1px;color:rgba(255,255,255,0.7);text-align:center;line-height:1.1;max-width:52px;overflow:hidden}
.tile.hint-glow{animation:hintPulse 2s infinite}
@keyframes hintPulse{0%,100%{box-shadow:0 0 4px rgba(255,220,100,0.2)}50%{box-shadow:0 0 16px rgba(255,220,100,0.6)}}
.tile.fresh{animation:freshPop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes freshPop{0%{transform:scale(0)}100%{transform:scale(1)}}

/* Controls */
#controls{display:flex;justify-content:center;gap:12px;padding:6px;background:#16213e;border-top:1px solid #2a3a5e;flex-shrink:0}
#controls button{background:#1e2d4d;border:1px solid #2a3a5e;color:#8899aa;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s}
#controls button:hover{background:#2a3d5d;color:#c0d0e0}
#controls button.active{color:#ffcc44;border-color:#ffcc44}

/* Search */
#search-wrap{padding:4px 12px 0}
#search{width:100%;background:#1e2d4d;border:1px solid #2a3a5e;color:#e0d6c8;padding:5px 10px;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
#search:focus{border-color:#4a6a9e}
#search::placeholder{color:#4a5a6e}

/* Shake */
.shake{animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* Mobile */
@media(max-width:600px){
  .tile{width:48px;height:48px;border-radius:10px}
  .tile .tile-icon{font-size:18px}
  .tile .tile-label{font-size:7px}
  .slot{width:64px;height:64px}
  .slot .tile-icon{font-size:26px}
  #header h1{font-size:16px}
}
@media(max-width:400px){
  .tile{width:42px;height:42px}
  #palette{gap:4px;padding:6px 8px}
}
</style>

var TOTAL = Object.keys(ELEMENTS).length;

// ========================================
// STATE
// ========================================
var discovered = {};
var selected1 = null;
var selected2 = null;
var hintsOn = false;
var hintTimer = null;
var lastDiscoveryTime = Date.now();
var soundOn = true;
var activeTab = 'All';

// Audio context
var audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playChime(tier){
  if(!soundOn) return;
  try{
    var ctx = getAudio();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    var freq = 440 + tier * 60;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.6);
    // Second harmonic
    var osc2 = ctx.createOscillator();
    var gain2 = ctx.createGain();
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.frequency.setValueAtTime(freq * 1.5, ctx.currentTime + 0.1);
    osc2.type = 'sine';
    gain2.gain.setValueAtTime(0.08, ctx.currentTime + 0.1);
    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc2.start(ctx.currentTime + 0.1);
    osc2.stop(ctx.currentTime + 0.8);
  }catch(e){}
}

function playThud(){
  if(!soundOn) return;
  try{
    var ctx = getAudio();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(80, ctx.currentTime);
    osc.type = 'triangle';
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
  }catch(e){}
}

// ========================================
// SAVE / LOAD
// ========================================
function save(){
  try{
    localStorage.setItem('elemental-save', JSON.stringify({
      discovered: Object.keys(discovered),
      soundOn: soundOn,
      hintsOn: hintsOn
    }));
  }catch(e){}
}

function load(){
  try{
    var raw = localStorage.getItem('elemental-save');
    if(!raw) return false;
    var d = JSON.parse(raw);
    if(d.discovered){
      d.discovered.forEach(function(id){ discovered[id] = true; });
    }
    if(typeof d.soundOn === 'boolean') soundOn = d.soundOn;
    if(typeof d.hintsOn === 'boolean') hintsOn = d.hintsOn;
    return d.discovered && d.discovered.length > 4;
  }catch(e){ return false; }
}

// ========================================
// HINT SYSTEM
// ========================================
function getHintElements(){
  // Return element IDs that still have undiscovered combinations
  var hintable = {};
  for(var key in RECIPES){
    var result = RECIPES[key];
    if(discovered[result]) continue;
    var parts = key.split('+');
    if(discovered[parts[0]] && discovered[parts[1]]){
      hintable[parts[0]] = true;
      hintable[parts[1]] = true;
    }
  }
  return hintable;
}

function updateHints(){
  if(!hintsOn) return;
  var now = Date.now();
  if(now - lastDiscoveryTime < 30000) return; // 30s cooldown
  var hintable = getHintElements();
  document.querySelectorAll('#palette .tile').forEach(function(el){
    var id = el.getAttribute('data-id');
    if(hintable[id]) el.classList.add('hint-glow');
    else el.classList.remove('hint-glow');
  });
}

function clearHints(){
  document.querySelectorAll('.hint-glow').forEach(function(el){
    el.classList.remove('hint-glow');
  });
}

// ========================================
// UI RENDERING
// ========================================
function getCategories(){
  var cats = {};
  for(var id in discovered){
    var el = ELEMENTS[id];
    if(el) cats[el.category] = true;
  }
  return ['All'].concat(Object.keys(cats).sort());
}

function renderTabs(){
  var tabs = document.getElementById('palette-tabs');
  var cats = getCategories();
  tabs.innerHTML = '';
  cats.forEach(function(cat){
    var t = document.createElement('div');
    t.className = 'tab' + (cat === activeTab ? ' active' : '');
    t.textContent = cat;
    t.onclick = function(){ activeTab = cat; renderTabs(); renderPalette(); };
    tabs.appendChild(t);
  });
}

function renderPalette(){
  var palette = document.getElementById('palette');
  palette.innerHTML = '';
  var search = document.getElementById('search').value.toLowerCase();

  // Sort discovered elements by tier then name
  var ids = Object.keys(discovered).filter(function(id){ return ELEMENTS[id]; });
  ids.sort(function(a,b){
    var ta = ELEMENTS[a].tier, tb = ELEMENTS[b].tier;
    if(ta !== tb) return ta - tb;
    return ELEMENTS[a].name.localeCompare(ELEMENTS[b].name);
  });

  ids.forEach(function(id){
    var el = ELEMENTS[id];
    if(activeTab !== 'All' && el.category !== activeTab) return;
    if(search && el.name.toLowerCase().indexOf(search) === -1) return;

    var tile = document.createElement('div');
    tile.className = 'tile';
    if(selected1 === id || selected2 === id) tile.classList.add('selected');
    tile.setAttribute('data-id', id);
    tile.style.background = el.color + '33';
    tile.style.borderColor = (selected1 === id || selected2 === id) ? '#fff' : el.color + '66';
    tile.innerHTML = '<span class="tile-icon">' + el.icon + '</span><span class="tile-label">' + el.name + '</span>';
    tile.onclick = function(){ selectElement(id); };
    palette.appendChild(tile);
  });

  updateHints();
}

function renderSlots(){
  var s1 = document.getElementById('slot1');
  var s2 = document.getElementById('slot2');

  if(selected1){
    var e1 = ELEMENTS[selected1];
    s1.className = 'slot filled';
    s1.style.background = e1.color + '33';
    s1.style.borderColor = e1.color;
    s1.innerHTML = '<span class="tile-icon">' + e1.icon + '</span><span class="tile-label">' + e1.name + '</span>';
    s1.onclick = function(){ selected1 = null; renderSlots(); renderPalette(); };
  } else {
    s1.className = 'slot';
    s1.style.background = '';
    s1.style.borderColor = '';
    s1.innerHTML = '';
    s1.onclick = null;
  }

  if(selected2){
    var e2 = ELEMENTS[selected2];
    s2.className = 'slot filled';
    s2.style.background = e2.color + '33';
    s2.style.borderColor = e2.color;
    s2.innerHTML = '<span class="tile-icon">' + e2.icon + '</span><span class="tile-label">' + e2.name + '</span>';
    s2.onclick = function(){ selected2 = null; renderSlots(); renderPalette(); };
  } else {
    s2.className = 'slot';
    s2.style.background = '';
    s2.style.borderColor = '';
    s2.innerHTML = '';
    s2.onclick = null;
  }
}

function updateCounter(){
  document.getElementById('discovered-count').textContent = Object.keys(discovered).length;
  document.getElementById('total-count').textContent = TOTAL;
}

// ========================================
// COMBINATION LOGIC
// ========================================
function selectElement(id){
  if(!selected1){
    selected1 = id;
    renderSlots();
    renderPalette();
    setResult('');
    return;
  }
  if(!selected2 && id !== selected1){
    selected2 = id;
    renderSlots();
    renderPalette();
    // Attempt combine after brief delay
    setTimeout(tryCombine, 300);
    return;
  }
  // Allow same element for self-combos
  if(!selected2 && id === selected1){
    selected2 = id;
    renderSlots();
    renderPalette();
    setTimeout(tryCombine, 300);
    return;
  }
  // If both slots full, replace first
  selected1 = id;
  selected2 = null;
  renderSlots();
  renderPalette();
  setResult('');
}

function tryCombine(){
  if(!selected1 || !selected2) return;

  var key = [selected1, selected2].sort().join('+');
  var result = RECIPES[key];

  if(!result){
    // No recipe
    playThud();
    setResult('nothing happens...');
    shakeSlots();
    setTimeout(function(){
      selected1 = null;
      selected2 = null;
      renderSlots();
      renderPalette();
    }, 600);
    return;
  }

  if(discovered[result]){
    // Already discovered
    var el = ELEMENTS[result];
    setResult(el.name + ' — already discovered');
    setTimeout(function(){
      selected1 = null;
      selected2 = null;
      renderSlots();
      renderPalette();
    }, 800);
    return;
  }

  // New discovery!
  discovered[result] = true;
  lastDiscoveryTime = Date.now();
  clearHints();

  var el = ELEMENTS[result];
  playChime(el.tier);
  showDiscovery(el);
  setResult('');

  setTimeout(function(){
    selected1 = null;
    selected2 = null;
    renderSlots();
    renderTabs();
    renderPalette();
    updateCounter();
    save();
  }, 1200);
}

function showDiscovery(el){
  var area = document.getElementById('result-area');
  var burst = document.createElement('div');
  burst.className = 'discovery-burst';

  var ring = document.createElement('div');
  ring.className = 'burst-ring';
  ring.style.borderColor = el.color;
  burst.appendChild(ring);

  var tile = document.createElement('div');
  tile.className = 'tile-big';
  tile.style.background = el.color + '44';
  tile.style.border = '2px solid ' + el.color;
  tile.innerHTML = '<span style="font-size:36px">' + el.icon + '</span>';
  burst.appendChild(tile);

  var name = document.createElement('div');
  name.className = 'burst-name';
  name.textContent = el.name;
  burst.appendChild(name);

  area.innerHTML = '';
  area.appendChild(burst);

  setTimeout(function(){
    area.innerHTML = '<div id="result-msg"></div>';
  }, 1800);
}

function shakeSlots(){
  var slots = document.getElementById('slots');
  slots.classList.add('shake');
  setTimeout(function(){ slots.classList.remove('shake'); }, 400);
}

function setResult(text){
  var el = document.getElementById('result-msg');
  if(el) el.textContent = text;
}

// ========================================
// CONTROLS
// ========================================
function initControls(){
  document.getElementById('btn-clear').onclick = function(){
    selected1 = null;
    selected2 = null;
    renderSlots();
    renderPalette();
    setResult('');
  };

  document.getElementById('btn-hints').onclick = function(){
    hintsOn = !hintsOn;
    this.classList.toggle('active', hintsOn);
    if(hintsOn){
      lastDiscoveryTime = 0; // Show hints immediately
      updateHints();
    } else {
      clearHints();
    }
    save();
  };

  document.getElementById('btn-mute').onclick = function(){
    soundOn = !soundOn;
    this.classList.toggle('active', soundOn);
    this.textContent = soundOn ? 'Sound' : 'Muted';
    save();
  };

  document.getElementById('btn-reset').onclick = function(){
    if(confirm('Reset all progress? This cannot be undone.')){
      discovered = {};
      ['water','fire','earth','air'].forEach(function(id){ discovered[id] = true; });
      selected1 = null;
      selected2 = null;
      activeTab = 'All';
      save();
      renderTabs();
      renderPalette();
      renderSlots();
      updateCounter();
      setResult('combine two elements to discover new ones');
    }
  };

  // Search
  document.getElementById('search').addEventListener('input', function(){
    renderPalette();
  });

  // Initial button states
  document.getElementById('btn-mute').classList.toggle('active', soundOn);
  document.getElementById('btn-hints').classList.toggle('active', hintsOn);
}

// ========================================
// INIT
// ========================================
function init(){
  var loaded = load();

  // Always ensure base elements
  ['water','fire','earth','air'].forEach(function(id){ discovered[id] = true; });

  if(hintsOn){
    hintTimer = setInterval(updateHints, 5000);
  }

  // Watch for hint toggle to start/stop timer
  var origHintsClick = document.getElementById('btn-hints').onclick;
  document.getElementById('btn-hints').addEventListener('click', function(){
    if(hintTimer) clearInterval(hintTimer);
    if(hintsOn) hintTimer = setInterval(updateHints, 5000);
  });

  renderTabs();
  renderPalette();
  renderSlots();
  updateCounter();
  initControls();

  if(!loaded){
    setResult('combine two elements to discover new ones');
  }
}

init();

})();
