  { name: 'Spilled Juice',  icon: drawSpill,       time: 1.5, room: 'Kitchen',  penalty: 2, col: '#cc44aa' },
  { name: 'Scattered Toys', icon: drawToys,        time: 2.0, room: 'Lounge',   penalty: 2, col: '#44aacc' },
  { name: 'Dusty Surface',  icon: drawDust,        time: 2.0, room: 'Lounge',   penalty: 1, col: '#aaa' },
  { name: 'Unmade Bed',     icon: drawMessyBed,    time: 3.0, room: 'Bedroom',  penalty: 2, col: '#8866aa' },
  { name: 'Dirty Laundry',  icon: drawLaundry,     time: 2.5, room: 'Bedroom',  penalty: 3, col: '#66aa44' },
  { name: 'Messy Bathroom', icon: drawMessyBath,   time: 3.0, room: 'Bathroom', penalty: 3, col: '#44aabb' },
  { name: 'Wet Floor',      icon: drawWetFloor,    time: 1.5, room: 'Bathroom', penalty: 2, col: '#4488cc' },
];

// ============================================================
// CHORE ICON DRAWING FUNCTIONS (pixel art style)
// ============================================================
function drawDishes(ctx, x, y, sz) {
  // Stack of plates with food smears
  ctx.fillStyle = '#ddd';
  ctx.fillRect(x-sz*0.35, y-sz*0.1, sz*0.7, sz*0.12);
  ctx.fillRect(x-sz*0.3, y-sz*0.24, sz*0.6, sz*0.12);
  ctx.fillRect(x-sz*0.25, y-sz*0.38, sz*0.5, sz*0.12);
  ctx.fillStyle = '#cc8844';
  ctx.fillRect(x-sz*0.15, y-sz*0.34, sz*0.12, sz*0.06);
  ctx.fillRect(x+sz*0.05, y-sz*0.2, sz*0.1, sz*0.06);
  // Cup
  ctx.fillStyle = '#88bbdd';
  ctx.fillRect(x+sz*0.2, y-sz*0.35, sz*0.18, sz*0.25);
  ctx.fillStyle = '#664422';
  ctx.fillRect(x+sz*0.22, y-sz*0.32, sz*0.14, sz*0.08);
}

function drawSpill(ctx, x, y, sz) {
  // Purple juice puddle
  ctx.fillStyle = '#cc44aa';
  ctx.beginPath();
  ctx.ellipse(x, y-sz*0.1, sz*0.35, sz*0.2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#dd66bb';
  ctx.beginPath();
  ctx.ellipse(x-sz*0.08, y-sz*0.15, sz*0.15, sz*0.08, -0.3, 0, Math.PI*2);
  ctx.fill();
  // Tipped cup
  ctx.save();
  ctx.translate(x+sz*0.2, y-sz*0.2);
  ctx.rotate(1.2);
  ctx.fillStyle = '#88bbdd';
  ctx.fillRect(-sz*0.08, -sz*0.15, sz*0.16, sz*0.22);
  ctx.restore();
}

function drawToys(ctx, x, y, sz) {
  // Scattered blocks and a ball
  ctx.fillStyle = '#ee4444';
  ctx.fillRect(x-sz*0.3, y-sz*0.15, sz*0.18, sz*0.18);
  ctx.fillStyle = '#44aa44';
  ctx.fillRect(x+sz*0.05, y-sz*0.25, sz*0.15, sz*0.15);
  ctx.fillStyle = '#4444ee';
  ctx.fillRect(x-sz*0.1, y+sz*0.05, sz*0.2, sz*0.12);
  // Ball
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath();
  ctx.arc(x+sz*0.25, y, sz*0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.arc(x+sz*0.22, y-sz*0.03, sz*0.04, 0, Math.PI*2);
  ctx.fill();
}

function drawDust(ctx, x, y, sz) {
  // Dust motes
  ctx.fillStyle = 'rgba(160,150,130,0.6)';
  for (var i = 0; i < 8; i++) {
    var dx = (Math.sin(i*2.3)*0.3 + Math.cos(i*1.7)*0.15) * sz;
    var dy = (Math.cos(i*1.9)*0.25 + Math.sin(i*3.1)*0.1) * sz;
    ctx.beginPath();
    ctx.arc(x+dx, y+dy-sz*0.1, sz*0.04+i*0.5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle = 'rgba(140,130,110,0.4)';
  ctx.beginPath();
  ctx.ellipse(x, y, sz*0.3, sz*0.15, 0.2, 0, Math.PI*2);
  ctx.fill();
}

function drawMessyBed(ctx, x, y, sz) {
  // Crumpled blanket
  ctx.fillStyle = '#9988cc';
  ctx.fillRect(x-sz*0.35, y-sz*0.25, sz*0.7, sz*0.45);
  ctx.fillStyle = '#bbaadd';
  ctx.fillRect(x-sz*0.3, y-sz*0.2, sz*0.25, sz*0.15);
  ctx.fillRect(x+sz*0.05, y-sz*0.1, sz*0.2, sz*0.2);
  // Pillow
  ctx.fillStyle = '#eeddee';
  ctx.fillRect(x-sz*0.25, y-sz*0.35, sz*0.3, sz*0.12);
  ctx.fillStyle = '#ddd';
  ctx.fillRect(x+sz*0.1, y+sz*0.1, sz*0.2, sz*0.1);
}

function drawLaundry(ctx, x, y, sz) {
  // Pile of clothes
  ctx.fillStyle = '#4466aa';
  ctx.fillRect(x-sz*0.25, y-sz*0.1, sz*0.22, sz*0.18);
  ctx.fillStyle = '#cc4444';
  ctx.fillRect(x-sz*0.1, y-sz*0.25, sz*0.3, sz*0.15);
  ctx.fillStyle = '#44aa66';
  ctx.fillRect(x+sz*0.05, y-sz*0.05, sz*0.2, sz*0.2);
  ctx.fillStyle = '#eecc44';
  ctx.fillRect(x-sz*0.2, y+sz*0.05, sz*0.18, sz*0.12);
  // Sock
  ctx.fillStyle = '#fff';
  ctx.fillRect(x+sz*0.2, y-sz*0.15, sz*0.08, sz*0.15);
  ctx.fillRect(x+sz*0.2, y, sz*0.12, sz*0.06);
}

function drawMessyBath(ctx, x, y, sz) {
  // Scattered toiletries
  ctx.fillStyle = '#44bbbb';
  ctx.fillRect(x-sz*0.15, y-sz*0.3, sz*0.1, sz*0.25);
  ctx.fillStyle = '#ff88aa';
  ctx.fillRect(x+sz*0.1, y-sz*0.2, sz*0.08, sz*0.2);
  // Towel on floor
  ctx.fillStyle = '#88aaff';
  ctx.fillRect(x-sz*0.3, y, sz*0.4, sz*0.12);
  ctx.fillRect(x-sz*0.25, y+sz*0.1, sz*0.3, sz*0.08);
  // Soap
  ctx.fillStyle = '#ffddee';
  ctx.beginPath();
  ctx.ellipse(x+sz*0.2, y+sz*0.1, sz*0.08, sz*0.05, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawWetFloor(ctx, x, y, sz) {
  // Water puddles
  ctx.fillStyle = 'rgba(100,180,220,0.5)';
  ctx.beginPath();
  ctx.ellipse(x, y-sz*0.05, sz*0.35, sz*0.2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(130,200,240,0.4)';
  ctx.beginPath();
  ctx.ellipse(x+sz*0.15, y+sz*0.1, sz*0.15, sz*0.1, 0.5, 0, Math.PI*2);
  ctx.fill();
  // Water drops
  ctx.fillStyle = 'rgba(150,210,250,0.6)';
  ctx.beginPath(); ctx.arc(x-sz*0.2, y-sz*0.2, sz*0.04, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+sz*0.3, y-sz*0.1, sz*0.03, 0, Math.PI*2); ctx.fill();
  // Highlight
  ctx.fillStyle = 'rgba(200,240,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(x-sz*0.1, y-sz*0.12, sz*0.08, sz*0.04, -0.3, 0, Math.PI*2);
  ctx.fill();
}

// ============================================================
// GAME INIT
// ============================================================
var showTutorial = true; // show delegation hint at start

function initGame() {
  recalc();
  initHouse();

  parent.x = W / 2;
  parent.y = H / 2;
  parent.doing = null;
  parent.doTimer = 0;
  parent.speed = Math.max(1.5, TILE * 0.06);
  parent.facing = 1;

  // Randomize kid appearances each game
  var kidDefs = randomizeKids();
  KID_TYPES = kidDefs.map(function(def, i) {
    return { ...KID_STATS[i], ...def };
  });

  kids = KID_TYPES.map((type, i) => ({
    ...type,
    x: rooms[i % rooms.length].x + rooms[i % rooms.length].w / 2 + TILE,
    y: rooms[i % rooms.length].y + rooms[i % rooms.length].h / 2 + TILE,
    task: null, taskTimer: 0,
    state: 'idle', stateTimer: 0,
    moveTarget: null,
    speed: type.speed * TILE * 0.035,
    distractTimer: 0,
    thoughtBubble: '',
    facing: 1,
  }));

  chores = [];
  particles = [];
  floatTexts = [];
  dayTime = 0;
  cleanliness = 100;
  choreSpawnTimer = 0;
  selectedKid = null;
  moveTarget = null;
}

function startDay() {
  chores = [];
  dayTime = 0;
  choreSpawnTimer = 2;
  cleanliness = Math.min(100, cleanliness);
  kids.forEach(k => { k.task = null; k.state = 'idle'; k.thoughtBubble = ''; k.distractTimer = 0; });
  parent.doing = null;
  parent.doTimer = 0;
  moveTarget = null;
  selectedKid = null;
  score = 0;
  for (var i = 0; i < Math.min(3 + day, 8); i++) spawnChore();
}

function spawnChore() {
  if (chores.length >= 12) return;
  var type = CHORE_TYPES[Math.floor(Math.random() * CHORE_TYPES.length)];
  var room = rooms.find(r => r.name === type.room) || rooms[0];
  var margin = TILE * 1.8;
  var cx = room.x + margin + Math.random() * Math.max(1, room.w - margin * 2);
  var cy = room.y + margin + Math.random() * Math.max(1, room.h - margin * 2);
  // Avoid overlap with existing chores
  if (chores.some(c => Math.abs(c.x - cx) < TILE && Math.abs(c.y - cy) < TILE)) return;
  // Avoid furniture
  if (furnitureList.some(f => cx > f.x - TILE*0.3 && cx < f.x + f.w + TILE*0.3 && cy > f.y - TILE*0.3 && cy < f.y + f.h + TILE*0.3)) return;

  chores.push({
    x: cx, y: cy,
    type: type, progress: 0, total: type.time,
    assignedTo: null, age: 0,
  });
}

// ============================================================
// INPUT
// ============================================================
var keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === 'menu') { state = 'playing'; initGame(); startDay(); SFX.click(); }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function getPointerPos(e) {
  var r = canvas.getBoundingClientRect();
  var t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) * (canvas.width / r.width), y: (t.clientY - r.top) * (canvas.height / r.height) };
}

function dist(a, b) { return Math.sqrt((a.x-b.x)*(a.x-b.x) + (a.y-b.y)*(a.y-b.y)); }

function handleTap(px, py) {
  // Mute check
  if (px >= W - 44 && px <= W - 8 && py >= 8 && py <= 44) {
    SFX.muted = !SFX.muted;
    return;
  }

  if (state === 'menu') { state = 'playing'; initGame(); startDay(); SFX.click(); return; }
  if (state === 'dayEnd') { day++; startDay(); state = 'playing'; SFX.click(); return; }
  if (state === 'gameOver') { submitScore('home-hustle', totalScore); day = 1; totalScore = 0; score = 0; cleanliness = 100; state = 'playing'; initGame(); startDay(); SFX.click(); return; }
  if (state !== 'playing') return;

  var hitR = TILE * 1.0;

  // Check kid tap — test against sprite center, not feet
  for (var i = 0; i < kids.length; i++) {
    var k = kids[i];
    var kidCenterY = k.y - TILE * 0.5; // sprite visual center
    if (dist({x:px,y:py}, {x:k.x,y:kidCenterY}) < hitR) {
      // If kid is distracted or complaining, tap to nudge them back to work
      if (k.task && (k.state === 'distracted' || k.state === 'complaining')) {
        k.state = 'working';
        k.thoughtBubble = '!';
        k.distractTimer = 0;
        k.stateTimer = 0;
        addFloatText('Get to work!', k.x, k.y - TILE, '#ffcc44');
        SFX.assign();
        return;
      }
      if (selectedKid === k) { selectedKid = null; SFX.click(); return; }
      selectedKid = k;
      showTutorial = false;
      SFX.pickup();
      return;
    }
  }

  // If kid selected, tap chore to assign
  if (selectedKid) {
    for (var i = 0; i < chores.length; i++) {
      var c = chores[i];
      if (dist({x:px,y:py}, c) < hitR && !c.assignedTo) {
        c.assignedTo = selectedKid;
        selectedKid.task = c;
        selectedKid.state = 'moving';
        selectedKid.moveTarget = { x: c.x, y: c.y };
        selectedKid.thoughtBubble = '!';
        SFX.assign();
        selectedKid = null;
        return;
      }
    }
    selectedKid = null;
    SFX.click();
    return;
  }

  // Set parent move target
  moveTarget = { x: px, y: py };
}

canvas.addEventListener('mousedown', e => { var p = getPointerPos(e); handleTap(p.x, p.y); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); var p = getPointerPos(e); handleTap(p.x, p.y); }, { passive: false });

// ============================================================
// UPDATE
// ============================================================
var lastTime = 0;

function update(dt) {
  if (state !== 'playing') return;

  dayTime += dt;

  // Spawn chores
  var spawnRate = Math.max(2, 7 - day * 0.4);
  choreSpawnTimer -= dt;
  if (choreSpawnTimer <= 0) {
    spawnChore();
    choreSpawnTimer = spawnRate + Math.random() * 3;
  }

  // Cleanliness decays based on mess
  var messLevel = chores.length * (0.6 + day * 0.15);
  cleanliness -= messLevel * dt * 0.25;
  cleanliness = Math.max(0, Math.min(100, cleanliness));

  // Move parent (keyboard)
  var dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;

  if (dx !== 0 || dy !== 0) {
    moveTarget = null;
    var len = Math.sqrt(dx*dx + dy*dy);
    parent.x += (dx/len) * parent.speed * dt * 60;
    parent.y += (dy/len) * parent.speed * dt * 60;
    parent.doing = null;
    parent.doTimer = 0;
    if (dx !== 0) parent.facing = dx > 0 ? 1 : -1;
  }

  // Move parent (tap)
  if (moveTarget) {
    var d = dist(parent, moveTarget);
    if (d > parent.speed) {
      var mx = (moveTarget.x - parent.x) / d;
      var my = (moveTarget.y - parent.y) / d;
      parent.x += mx * parent.speed * dt * 60;
      parent.y += my * parent.speed * dt * 60;
      if (Math.abs(mx) > 0.1) parent.facing = mx > 0 ? 1 : -1;
      parent.doing = null;
      parent.doTimer = 0;
    } else {
      moveTarget = null;
    }
  }

  // Constrain to house
  constrainToHouse(parent);

  // Parent auto-works nearby chores when stopped
  var isMoving = moveTarget || dx !== 0 || dy !== 0;
  if (!isMoving) {
    var nearC = null, nearD = TILE * 1.3;
    for (var i = 0; i < chores.length; i++) {
      var d = dist(parent, chores[i]);
      if (d < nearD) { nearD = d; nearC = chores[i]; }
    }
    if (nearC) {
      parent.doing = nearC;
      parent.doTimer += dt;
      nearC.progress += dt;
      if (nearC.progress >= nearC.total) completeChore(nearC, 'You');
    } else {
      parent.doing = null;
      parent.doTimer = 0;
    }
  }

  // Update sprite animations
  if (sprites.parent) {
    var pAnim = isMoving ? 'walk' : 'idle';
    if (sprites.parent.animator.currentAnimation !== pAnim) sprites.parent.animator.play(pAnim);
    sprites.parent.animator.update(dt);
  }

  // Update kids
  kids.forEach((k, i) => {
    updateKid(k, dt);
    var sp = sprites[k.sprite];
    if (sp) {
      var kMoving = k.state === 'moving' || (k.state === 'idle' && k.moveTarget);
      var kAnim = kMoving ? 'walk' : 'idle';
      if (sp.animator.currentAnimation !== kAnim) sp.animator.play(kAnim);
      sp.animator.update(dt);
    }
  });

  // Update chore ages
  chores.forEach(c => { c.age += dt; });

  // Particles
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 40 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Float texts
  for (var i = floatTexts.length - 1; i >= 0; i--) {
    var ft = floatTexts[i];
    ft.y -= 30 * dt; ft.life -= dt;
    if (ft.life <= 0) floatTexts.splice(i, 1);
  }

  if (dayTime >= dayLength) endDay();
  if (cleanliness <= 0) { state = 'gameOver'; totalScore += score; SFX.gameOver(); }
}

function constrainToHouse(ent, oldX, oldY) {
  if (rooms.length === 0) return;
  var pad = TILE * 0.4;
  var hL = rooms[0].x + pad, hR = rooms[1].x + rooms[1].w - pad;
  var hT = rooms[0].y + pad, hB = rooms[2].y + rooms[2].h - pad;
  ent.x = Math.max(hL, Math.min(hR, ent.x));
  ent.y = Math.max(hT, Math.min(hB, ent.y));

  // Wall collision — push out of solid walls (not door gaps)
  var r = pad * 0.5;
  for (var i = 0; i < walls.length; i++) {
    var w = walls[i];
    // Expand wall rect by entity radius
    var wl = w.x - r, wr = w.x + w.w + r;
    var wt = w.y - r, wb = w.y + w.h + r;
    if (ent.x > wl && ent.x < wr && ent.y > wt && ent.y < wb) {
      // Inside wall — push out along shortest axis
      var dLeft = ent.x - wl, dRight = wr - ent.x;
      var dTop = ent.y - wt, dBot = wb - ent.y;
      var minD = Math.min(dLeft, dRight, dTop, dBot);
      if (minD === dLeft) ent.x = wl;
      else if (minD === dRight) ent.x = wr;
      else if (minD === dTop) ent.y = wt;
      else ent.y = wb;
    }
  }
}

function updateKid(k, dt) {
  if (!k.task) {
    k.state = 'idle';
    k.stateTimer += dt;
    if (k.stateTimer > 3 + Math.random() * 4) {
      k.stateTimer = 0;
      var room = rooms[Math.floor(Math.random() * rooms.length)];
      k.moveTarget = {
        x: room.x + TILE * 1.8 + Math.random() * Math.max(1, room.w - TILE * 3.6),
        y: room.y + TILE * 1.8 + Math.random() * Math.max(1, room.h - TILE * 3.6),
      };
    }
    if (k.moveTarget) {
      var d = dist(k, k.moveTarget);
      if (d > 2) {
        var mx = (k.moveTarget.x - k.x) / d;
        k.x += mx * k.speed * 0.4 * dt * 60;
        k.y += ((k.moveTarget.y - k.y) / d) * k.speed * 0.4 * dt * 60;
        if (Math.abs(mx) > 0.1) k.facing = mx > 0 ? 1 : -1;
      } else { k.moveTarget = null; }
    }
    k.thoughtBubble = '';
    constrainToHouse(k);
    return;
  }

  var c = k.task;
  if (chores.indexOf(c) === -1) { k.task = null; k.state = 'idle'; k.thoughtBubble = ''; return; }

  if (k.state === 'moving') {
    var d = dist(k, c);
    if (d > TILE * 0.5) {
      var mx = (c.x - k.x) / d;
      k.x += mx * k.speed * dt * 60;
      k.y += ((c.y - k.y) / d) * k.speed * dt * 60;
      if (Math.abs(mx) > 0.1) k.facing = mx > 0 ? 1 : -1;
    } else {
      if (k.name === 'Jo' && Math.random() < 0.4) {
        k.state = 'complaining'; k.stateTimer = 2 + Math.random(); k.thoughtBubble = 'UGH';
        SFX.nag();
      } else { k.state = 'working'; k.thoughtBubble = '~'; }
    }
  } else if (k.state === 'complaining') {
    k.stateTimer -= dt;
    if (k.stateTimer <= 0) { k.state = 'working'; k.thoughtBubble = '~'; }
  } else if (k.state === 'working') {
    k.distractTimer += dt;
    if (k.distractTimer > 1.5 && Math.random() < (1 - k.reliability) * dt * 2) {
      k.state = 'distracted'; k.stateTimer = 2 + Math.random() * 2;
      k.thoughtBubble = ['...', '?!', 'hmm'][Math.floor(Math.random() * 3)];
      k.distractTimer = 0;
      return;
    }
    c.progress += dt * k.workSpeed;
    k.thoughtBubble = '~';
    if (c.progress >= c.total) {
      completeChore(c, k.name);
      k.task = null; k.state = 'idle'; k.distractTimer = 0;
    }
  } else if (k.state === 'distracted') {
    k.stateTimer -= dt;
    if (k.stateTimer <= 0) { k.state = 'working'; k.thoughtBubble = '~'; k.distractTimer = 0; }
  }
  constrainToHouse(k);
}

function completeChore(chore, by) {
  var idx = chores.indexOf(chore);
  if (idx === -1) return;
  chores.splice(idx, 1);
  var pts = Math.ceil(chore.type.penalty * 10);
  if (by !== 'You') pts = Math.ceil(pts * 0.7);
  score += pts;
  cleanliness = Math.min(100, cleanliness + chore.type.penalty * 2);
  SFX.complete();
  addFloatText('+' + pts, chore.x, chore.y - TILE * 0.5, '#88ff88');
  addFloatText(by === 'You' ? 'Done!' : by + ' did it!', chore.x, chore.y - TILE, '#ffdd44');
  // Sparkles
  for (var i = 0; i < 12; i++) {
    var angle = (i / 12) * Math.PI * 2;
    var spd = 40 + Math.random() * 40;
    particles.push({
      x: chore.x, y: chore.y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 20,
      life: 0.5 + Math.random() * 0.3,
      col: ['#ffdd44', '#44ff88', '#ff88cc', '#88ddff'][i % 4],
      size: 2 + Math.random() * 3,
    });
  }
}

function addFloatText(text, x, y, col) {
  floatTexts.push({ text, x, y, col, life: 1.2 });
}

function endDay() {
  var bonus = Math.floor(cleanliness * day);
  score += bonus;
  totalScore += score;
  state = 'dayEnd';
  SFX.dayEnd();
}

// ============================================================
// DRAW
// ============================================================
function draw() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  if (state === 'menu') { drawMenu(); return; }
  if (state === 'gameOver') { drawGameOver(); return; }

  drawHouse();
  drawFurniture();
  drawChoresOnMap();
  drawKidsOnMap();
  drawParentOnMap();
  drawParticlesOnMap();
  if (showTutorial && dayTime < 8) drawTutorialHint();
  drawFloatTexts();
  drawHUD();
  if (state === 'dayEnd') drawDayEnd();
}

function drawMenu() {
  // Draw house in background (dimmed)
  initHouse();
  ctx.globalAlpha = 0.3;
  drawHouse();
  drawFurniture();
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  // Title
  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold ' + Math.floor(TILE * 2.2) + 'px "Segoe UI", Arial';
  ctx.fillText('Home Hustle', W/2, H * 0.22);

  ctx.fillStyle = '#bbb';
  ctx.font = Math.floor(TILE * 0.65) + 'px "Segoe UI", Arial';
  ctx.fillText('Keep the house clean before bedtime!', W/2, H * 0.3);

  var y = H * 0.4;
  var lh = TILE * 1.0;

  ctx.fillStyle = '#ddd';
  ctx.font = Math.floor(TILE * 0.5) + 'px "Segoe UI", Arial';
  ctx.fillText('Move: WASD / Arrows / Tap anywhere', W/2, y); y += lh;
  ctx.fillText('Walk near a mess to clean it yourself', W/2, y); y += lh * 1.3;

  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold ' + Math.floor(TILE * 0.5) + 'px "Segoe UI", Arial';
  ctx.fillText('DELEGATE: Tap a kid, then tap a mess', W/2, y); y += lh * 1.3;

  ctx.fillStyle = '#aaa';
  ctx.font = Math.floor(TILE * 0.4) + 'px "Segoe UI", Arial';
  ctx.fillText('Each kid has a unique personality!', W/2, y);

  y += lh * 0.8;
  ctx.fillStyle = '#88ff88';
  ctx.font = 'bold ' + Math.floor(TILE * 0.65) + 'px "Segoe UI", Arial';
  var pulse = 0.8 + Math.sin(Date.now() * 0.004) * 0.2;
  ctx.globalAlpha = pulse;
  ctx.fillText('TAP OR PRESS ANY KEY TO START', W/2, y);
  ctx.globalAlpha = 1;
}

function drawHouse() {
  rooms.forEach(r => {
    // Main floor
    ctx.fillStyle = r.col;
    ctx.fillRect(r.x, r.y, r.w, r.h);
    // Floor tile pattern
    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 1;
    var tileSize = TILE * 0.8;
    for (var x = r.x; x < r.x + r.w; x += tileSize) {
      for (var y = r.y; y < r.y + r.h; y += tileSize) {
        ctx.strokeRect(x, y, tileSize, tileSize);
      }
    }
    // Room name
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.font = 'bold ' + Math.floor(TILE * 0.55) + 'px "Segoe UI", Arial';
    ctx.textAlign = 'center';
    ctx.fillText(r.name, r.x + r.w/2, r.y + r.h - TILE * 0.3);
  });

  // Walls with 3D effect
  walls.forEach(w => {
    // Wall shadow
    ctx.fillStyle = '#5a4530';
    ctx.fillRect(w.x + 2, w.y + 2, w.w, w.h);
    // Wall body
    ctx.fillStyle = '#8b7355';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    // Wall highlight
    ctx.fillStyle = '#a08868';
    if (w.h <= w.w) {
      ctx.fillRect(w.x, w.y, w.w, Math.max(2, w.h * 0.35));
    } else {
      ctx.fillRect(w.x, w.y, Math.max(2, w.w * 0.35), w.h);
    }
  });
}

function drawFurniture() {
  furnitureList.forEach(f => {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    roundRect(ctx, f.x + 3, f.y + 3, f.w, f.h, 3);
    ctx.fill();

    // Type-specific pixel art
    switch (f.type) {
      case 'fridge': drawFridgeArt(f); break;
      case 'counter': drawCounterArt(f); break;
      case 'table': drawTableArt(f); break;
      case 'sofa': drawSofaArt(f); break;
      case 'tv': drawTVArt(f); break;
      case 'shelf': drawShelfArt(f); break;
      case 'bed': drawBedArt(f); break;
      case 'dresser': drawDresserArt(f); break;
      case 'tub': drawTubArt(f); break;
      case 'toilet': drawToiletArt(f); break;
      case 'sink': drawSinkArt(f); break;
      default:
        ctx.fillStyle = f.col;
        roundRect(ctx, f.x, f.y, f.w, f.h, 3); ctx.fill();
    }
  });
}

function drawFridgeArt(f) {
  // White/silver body
  ctx.fillStyle = '#dde0e4';
  roundRect(ctx, f.x, f.y, f.w, f.h, 3); ctx.fill();
  // Freezer door (top third)
  ctx.fillStyle = '#c8ccd0';
  ctx.fillRect(f.x + 2, f.y + 2, f.w - 4, f.h * 0.3);
  // Door line
  ctx.strokeStyle = '#aab0b8';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(f.x + 2, f.y + f.h * 0.33); ctx.lineTo(f.x + f.w - 2, f.y + f.h * 0.33); ctx.stroke();
  // Handles
  ctx.fillStyle = '#889';
  ctx.fillRect(f.x + f.w - 6, f.y + f.h * 0.12, 3, f.h * 0.12);
  ctx.fillRect(f.x + f.w - 6, f.y + f.h * 0.45, 3, f.h * 0.2);
  // Magnets (colored dots)
  ctx.fillStyle = '#ee4444'; ctx.fillRect(f.x + 4, f.y + 5, 4, 4);
  ctx.fillStyle = '#44aa44'; ctx.fillRect(f.x + 10, f.y + 7, 3, 3);
  ctx.fillStyle = '#4488ee'; ctx.fillRect(f.x + 5, f.y + 12, 4, 3);
}

function drawCounterArt(f) {
  // Wood counter with granite top
  ctx.fillStyle = '#8b7355';
  roundRect(ctx, f.x, f.y, f.w, f.h, 2); ctx.fill();
  // Granite top
  ctx.fillStyle = '#666';
  ctx.fillRect(f.x, f.y, f.w, f.h * 0.3);
  ctx.fillStyle = '#777';
  for (var i = 0; i < 8; i++) {
    ctx.fillRect(f.x + (i * f.w/8) + 2, f.y + 2, 3, 2);
  }
  // Cabinet lines
  ctx.strokeStyle = '#6a5a42';
  ctx.lineWidth = 1;
  var cabW = f.w / 4;
  for (var i = 1; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(f.x + cabW * i, f.y + f.h * 0.35); ctx.lineTo(f.x + cabW * i, f.y + f.h); ctx.stroke();
  }
  // Knobs
  ctx.fillStyle = '#aa9';
  for (var i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.arc(f.x + cabW * i + cabW/2, f.y + f.h * 0.6, 2, 0, Math.PI*2); ctx.fill();
  }
}

function drawTableArt(f) {
  // Wooden table top
  ctx.fillStyle = '#a08060';
  roundRect(ctx, f.x, f.y, f.w, f.h, 3); ctx.fill();
  // Wood grain
  ctx.strokeStyle = '#907050';
  ctx.lineWidth = 1;
  for (var i = 1; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(f.x + 3, f.y + f.h * i/4); ctx.lineTo(f.x + f.w - 3, f.y + f.h * i/4); ctx.stroke();
  }
  // Highlight edge
  ctx.fillStyle = '#b89878';
  ctx.fillRect(f.x + 1, f.y + 1, f.w - 2, 2);
}

function drawSofaArt(f) {
  // Sofa body
  ctx.fillStyle = '#5577aa';
  roundRect(ctx, f.x, f.y, f.w, f.h, 4); ctx.fill();
  // Back rest (darker)
  ctx.fillStyle = '#446688';
  ctx.fillRect(f.x + 2, f.y, f.w - 4, f.h * 0.3);
  // Cushions (3 sections)
  var cw = (f.w - 8) / 3;
  for (var i = 0; i < 3; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#6688bb' : '#7799cc';
    roundRect(ctx, f.x + 4 + i * cw, f.y + f.h * 0.32, cw - 2, f.h * 0.55, 3); ctx.fill();
  }
  // Armrests
  ctx.fillStyle = '#446688';
  roundRect(ctx, f.x, f.y + f.h * 0.2, 5, f.h * 0.7, 2); ctx.fill();
  roundRect(ctx, f.x + f.w - 5, f.y + f.h * 0.2, 5, f.h * 0.7, 2); ctx.fill();
  // Pillow
  ctx.fillStyle = '#ddaa66';
  roundRect(ctx, f.x + 6, f.y + f.h * 0.35, cw * 0.6, f.h * 0.4, 3); ctx.fill();
}

function drawTVArt(f) {
  // TV frame (black)
  ctx.fillStyle = '#111';
  roundRect(ctx, f.x, f.y, f.w, f.h, 2); ctx.fill();
  // Screen (dark blue/gray — off)
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(f.x + 2, f.y + 2, f.w - 4, f.h - 6);
  // Screen glare
  ctx.fillStyle = 'rgba(100,150,200,0.15)';
  ctx.fillRect(f.x + 3, f.y + 3, (f.w - 6) * 0.4, f.h - 8);
  // Stand
  ctx.fillStyle = '#333';
  ctx.fillRect(f.x + f.w/2 - 4, f.y + f.h - 3, 8, 3);
  // Power LED
  ctx.fillStyle = '#44ff44';
  ctx.fillRect(f.x + f.w - 5, f.y + f.h - 4, 2, 2);
}

function drawShelfArt(f) {
  // Bookshelf frame
  ctx.fillStyle = '#886644';
  roundRect(ctx, f.x, f.y, f.w, f.h, 2); ctx.fill();
  // Shelves (3 rows)
  var rowH = (f.h - 4) / 3;
  for (var row = 0; row < 3; row++) {
    var sy = f.y + 2 + row * rowH;
    // Shelf board
    ctx.fillStyle = '#997755';
    ctx.fillRect(f.x + 2, sy + rowH - 2, f.w - 4, 2);
    // Books (colored rectangles)
    var bx = f.x + 3;
    var colors = ['#cc4444','#4488cc','#44aa44','#ddaa33','#8844aa','#dd6633','#4488aa','#aa4466'];
    for (var b = 0; b < 5 + row; b++) {
      var bw = 2 + Math.floor(Math.random() * 2);
      var bh = rowH - 5 - Math.floor(Math.random() * 3);
      if (bx + bw > f.x + f.w - 3) break;
      ctx.fillStyle = colors[(row * 5 + b) % colors.length];
      ctx.fillRect(bx, sy + rowH - 2 - bh, bw, bh);
      bx += bw + 1;
    }
  }
}

function drawBedArt(f) {
  // Bed frame
  ctx.fillStyle = '#6a5a40';
  roundRect(ctx, f.x, f.y, f.w, f.h, 3); ctx.fill();
  // Mattress
  ctx.fillStyle = '#eee8dd';
  ctx.fillRect(f.x + 3, f.y + 3, f.w - 6, f.h - 6);
  // Blanket (covering lower 2/3)
  ctx.fillStyle = '#7766aa';
  roundRect(ctx, f.x + 3, f.y + f.h * 0.35, f.w - 6, f.h * 0.6, 2); ctx.fill();
  // Blanket fold line
  ctx.strokeStyle = '#6655aa';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(f.x + 5, f.y + f.h * 0.38); ctx.lineTo(f.x + f.w - 5, f.y + f.h * 0.38); ctx.stroke();
  // Pillow(s)
  ctx.fillStyle = '#fff';
  roundRect(ctx, f.x + 5, f.y + 5, f.w * 0.3, f.h * 0.25, 3); ctx.fill();
  roundRect(ctx, f.x + 5 + f.w * 0.32, f.y + 5, f.w * 0.3, f.h * 0.25, 3); ctx.fill();
  // Pillow shadow
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(f.x + 5, f.y + 5 + f.h * 0.18, f.w * 0.64, f.h * 0.07);
}

function drawDresserArt(f) {
  // Wooden dresser
  ctx.fillStyle = '#a08866';
  roundRect(ctx, f.x, f.y, f.w, f.h, 2); ctx.fill();
  // Top surface
  ctx.fillStyle = '#b89878';
  ctx.fillRect(f.x + 1, f.y + 1, f.w - 2, 3);
  // 3 drawers
  var dh = (f.h - 8) / 3;
  for (var i = 0; i < 3; i++) {
    var dy = f.y + 5 + i * dh;
    ctx.fillStyle = '#997755';
    ctx.fillRect(f.x + 3, dy, f.w - 6, dh - 2);
    // Knob
    ctx.fillStyle = '#cc9';
    ctx.beginPath(); ctx.arc(f.x + f.w/2, dy + dh/2 - 1, 2, 0, Math.PI*2); ctx.fill();
  }
  // Mirror on top (small oval)
  ctx.strokeStyle = '#aa9';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(f.x + f.w/2, f.y - 3, f.w * 0.3, 4, 0, 0, Math.PI * 2);
  ctx.stroke();
}

function drawTubArt(f) {
  // White bathtub
  ctx.fillStyle = '#eef0f2';
  roundRect(ctx, f.x, f.y, f.w, f.h, 5); ctx.fill();
  // Inner basin
  ctx.fillStyle = '#dde4e8';
  roundRect(ctx, f.x + 4, f.y + 4, f.w - 8, f.h - 8, 4); ctx.fill();
  // Water hint
  ctx.fillStyle = 'rgba(100,180,220,0.2)';
  roundRect(ctx, f.x + 5, f.y + f.h * 0.3, f.w - 10, f.h * 0.5, 3); ctx.fill();
  // Taps (two circles at one end)
  ctx.fillStyle = '#bbb';
  ctx.beginPath(); ctx.arc(f.x + f.w - 10, f.y + 8, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#88aadd';
  ctx.beginPath(); ctx.arc(f.x + f.w - 10, f.y + 16, 3, 0, Math.PI*2); ctx.fill();
  // Rim highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  roundRect(ctx, f.x + 1, f.y + 1, f.w - 2, f.h - 2, 5); ctx.stroke();
}

function drawToiletArt(f) {
  // Bowl (oval)
  ctx.fillStyle = '#f0f0f0';
  roundRect(ctx, f.x, f.y + f.h * 0.3, f.w, f.h * 0.7, 4); ctx.fill();
  // Tank
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(f.x + 2, f.y, f.w - 4, f.h * 0.35);
  // Seat
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(f.x + f.w/2, f.y + f.h * 0.65, f.w * 0.35, f.h * 0.25, 0, 0, Math.PI * 2);
  ctx.stroke();
  // Flush button
  ctx.fillStyle = '#bbb';
  ctx.beginPath(); ctx.arc(f.x + f.w/2, f.y + f.h * 0.15, 3, 0, Math.PI*2); ctx.fill();
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(f.x + 3, f.y + f.h * 0.35, f.w * 0.3, 2);
}

function drawSinkArt(f) {
  // Basin
  ctx.fillStyle = '#e8e8ea';
  roundRect(ctx, f.x, f.y, f.w, f.h, 3); ctx.fill();
  // Bowl indent
  ctx.fillStyle = '#d0d4d8';
  ctx.beginPath();
  ctx.ellipse(f.x + f.w/2, f.y + f.h * 0.55, f.w * 0.35, f.h * 0.3, 0, 0, Math.PI*2);
  ctx.fill();
  // Tap
  ctx.fillStyle = '#aab';
  ctx.fillRect(f.x + f.w/2 - 2, f.y, 4, f.h * 0.3);
  ctx.fillStyle = '#99a';
  ctx.beginPath(); ctx.arc(f.x + f.w/2, f.y + 2, 3, 0, Math.PI*2); ctx.fill();
  // Drain
  ctx.fillStyle = '#888';
  ctx.beginPath(); ctx.arc(f.x + f.w/2, f.y + f.h * 0.6, 2, 0, Math.PI*2); ctx.fill();
}

function drawChoresOnMap() {
  chores.forEach(c => {
    var sz = TILE * 0.9;
    var pulse = Math.sin(c.age * 3) * 0.08 + 1;
    var drawSz = sz * pulse;

    // Warning aura for old chores
    if (c.age > 8) {
      var urgency = Math.min(1, (c.age - 8) / 10);
      ctx.fillStyle = 'rgba(255,50,50,' + (0.08 + Math.sin(c.age * 5) * 0.06) * urgency + ')';
      ctx.beginPath();
      ctx.arc(c.x, c.y, drawSz * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Background circle
    var bgCol = c.assignedTo ? 'rgba(80,80,200,0.25)' : 'rgba(200,80,80,0.25)';
    ctx.fillStyle = bgCol;
    ctx.beginPath();
    ctx.arc(c.x, c.y, drawSz * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = c.assignedTo ? 'rgba(80,80,200,0.5)' : 'rgba(200,80,80,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Draw chore icon
    ctx.save();
    c.type.icon(ctx, c.x, c.y, drawSz);
    ctx.restore();

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = Math.floor(TILE * 0.24) + 'px "Segoe UI", Arial';
    ctx.textAlign = 'center';
    ctx.fillText(c.type.name, c.x, c.y + drawSz * 0.65);

    // Progress bar
    if (c.progress > 0) {
      var barW = drawSz * 1.2, barH = Math.max(3, TILE * 0.08);
      var barX = c.x - barW/2, barY = c.y + drawSz * 0.75;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      roundRect(ctx, barX, barY, barW, barH, 2); ctx.fill();
      ctx.fillStyle = '#44ee44';
      roundRect(ctx, barX, barY, barW * Math.min(1, c.progress / c.total), barH, 2); ctx.fill();
    }
  });
}

function drawParentOnMap() {
  var px = parent.x, py = parent.y;
  // Parent uses 'tall' style: 32x48. Scale so sprite is about 1.5 tiles tall.
  var scale = (TILE * 1.5) / 48;
  var drawW = 32 * scale, drawH = 48 * scale;

  // Shadow at feet
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(px, py, drawW * 0.35, drawW * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();

  // Draw SpriteForge character — feet at (px, py)
  if (sprites.parent) {
    var flipX = parent.facing < 0;
    sprites.parent.animator.draw(ctx, px - drawW/2, py - drawH, { scale: scale, flipX: flipX });
  } else {
    ctx.fillStyle = '#4488cc';
    ctx.beginPath(); ctx.arc(px, py - TILE * 0.4, TILE * 0.35, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd5a0';
    ctx.beginPath(); ctx.arc(px, py - TILE * 0.7, TILE * 0.2, 0, Math.PI * 2); ctx.fill();
  }

  // Working indicator
  if (parent.doing) {
    var wobble = Math.sin(parent.doTimer * 10) * 3;
    ctx.fillStyle = '#ffdd44';
    ctx.font = Math.floor(TILE * 0.5) + 'px Arial';
    ctx.textAlign = 'center';
    ctx.save();
    ctx.translate(px + drawW * 0.4 + wobble, py - drawH * 0.6);
    ctx.rotate(Math.sin(parent.doTimer * 8) * 0.3);
    ctx.fillText('*', 0, 0);
    ctx.restore();
  }

  // When a kid is selected, show prominent "NOW TAP A MESS" prompt
  if (selectedKid) {
    var pulse = 0.5 + Math.sin(Date.now() * 0.006) * 0.3;
    ctx.fillStyle = 'rgba(255,200,50,' + pulse * 0.15 + ')';
    ctx.fillRect(0, TILE * 1.5, W, TILE * 0.8);
    ctx.fillStyle = 'rgba(255,220,80,' + (0.7 + pulse * 0.3) + ')';
    ctx.font = 'bold ' + Math.floor(TILE * 0.42) + 'px "Segoe UI", Arial';
    ctx.textAlign = 'center';
    ctx.fillText(selectedKid.name + ' selected! Now tap a mess to send them.', W/2, TILE * 2.05);
  }
}

function drawKidsOnMap() {
  kids.forEach((k, i) => {
    var kx = k.x, ky = k.y;
    var scale = TILE / 40;
    var drawW = 32 * scale, drawH = 40 * scale;

    // Draw connection line from kid to their assigned chore
    if (k.task && chores.indexOf(k.task) !== -1) {
      var lineCol = k.state === 'working' ? 'rgba(80,220,80,0.4)' :
                    k.state === 'distracted' ? 'rgba(255,100,50,0.4)' :
                    k.state === 'complaining' ? 'rgba(255,200,50,0.4)' :
                    'rgba(100,150,255,0.4)';
      ctx.strokeStyle = lineCol;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(kx, ky);
      ctx.lineTo(k.task.x, k.task.y);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Shadow at feet
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(kx, ky, drawW * 0.3, drawW * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    // Draw SpriteForge character
    var sp = sprites[k.sprite];
    if (sp) {
      var flipX = k.facing < 0;
      sp.animator.draw(ctx, kx - drawW/2, ky - drawH, { scale: scale, flipX: flipX });
    } else {
      ctx.fillStyle = k.shirtCol || '#888';
      ctx.beginPath(); ctx.arc(kx, ky - TILE*0.3, TILE * 0.25, 0, Math.PI * 2); ctx.fill();
    }

    // Name + status below feet
    ctx.font = 'bold ' + Math.floor(TILE * 0.28) + 'px "Segoe UI", Arial';
    ctx.textAlign = 'center';
    if (k.task) {
      var stateCol = k.state === 'working' ? '#44dd44' :
                     k.state === 'distracted' ? '#ff6644' :
                     k.state === 'complaining' ? '#ffaa22' :
                     k.state === 'moving' ? '#88bbff' : '#fff';
      var stateText = k.state === 'working' ? 'Cleaning...' :
                      k.state === 'distracted' ? 'DISTRACTED' :
                      k.state === 'complaining' ? 'COMPLAINING' :
                      k.state === 'moving' ? 'On my way' : '';
      ctx.fillStyle = '#fff';
      ctx.fillText(k.name, kx, ky + TILE * 0.22);
      ctx.fillStyle = stateCol;
      ctx.font = Math.floor(TILE * 0.22) + 'px "Segoe UI", Arial';
      ctx.fillText(stateText, kx, ky + TILE * 0.45);
    } else {
      ctx.fillStyle = '#fff';
      ctx.fillText(k.name, kx, ky + TILE * 0.25);
    }

    if (selectedKid === k) {
      var pulse = 0.6 + Math.sin(Date.now() * 0.008) * 0.4;
      ctx.strokeStyle = 'rgba(255,204,68,' + pulse + ')';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(kx, ky - drawH * 0.4, drawW * 0.6, 0, Math.PI * 2);
      ctx.stroke();
    } else if (!k.task && !selectedKid) {
      // Idle — pulsing "tap me" indicator
      var idlePulse = 0.2 + Math.sin(Date.now() * 0.003 + i * 2) * 0.15;
      ctx.strokeStyle = 'rgba(255,255,255,' + idlePulse + ')';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(kx, ky - drawH * 0.4, drawW * 0.55, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      var arrowY = ky - drawH - TILE * 0.15 + Math.sin(Date.now() * 0.005 + i) * 3;
      ctx.fillStyle = 'rgba(255,255,255,' + (idlePulse + 0.1) + ')';
      ctx.beginPath();
      ctx.moveTo(kx - 4, arrowY - 4);
      ctx.lineTo(kx + 4, arrowY - 4);
      ctx.lineTo(kx, arrowY + 2);
      ctx.closePath();
      ctx.fill();
    } else if (k.state === 'distracted' || k.state === 'complaining') {
      // Pulsing red/yellow ring — tap to nudge
      var warnPulse = 0.5 + Math.sin(Date.now() * 0.008) * 0.5;
      var warnCol = k.state === 'distracted' ? 'rgba(255,80,40,' : 'rgba(255,180,30,';
      ctx.strokeStyle = warnCol + warnPulse + ')';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(kx, ky - drawH * 0.4, drawW * 0.6, 0, Math.PI * 2);
      ctx.stroke();
      // "TAP" hint
      ctx.fillStyle = warnCol + '0.8)';
      ctx.font = 'bold ' + Math.floor(TILE * 0.22) + 'px "Segoe UI", Arial';
      ctx.textAlign = 'center';
      ctx.fillText('TAP!', kx, ky - drawH - TILE * 0.12);
    }

    // Working animation — wobble effect
    if (k.state === 'working') {
      var wobble = Math.sin(Date.now() * 0.01) * 2;
      ctx.fillStyle = 'rgba(80,220,80,0.6)';
      var sparkX = kx + wobble + (Math.random()-0.5) * drawW * 0.3;
      var sparkY = ky - drawH * 0.5 + (Math.random()-0.5) * drawH * 0.3;
      ctx.beginPath(); ctx.arc(sparkX, sparkY, 1.5, 0, Math.PI * 2); ctx.fill();
    }

    // Distracted — floating Z's
    if (k.state === 'distracted') {
      var t = Date.now() * 0.003;
      ctx.fillStyle = 'rgba(255,150,50,0.6)';
      ctx.beginPath(); ctx.arc(kx - drawW*0.4, ky - drawH*0.6 + Math.sin(t)*3, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(kx + drawW*0.3, ky - drawH*0.7 - Math.cos(t*1.3)*3, 2.5, 0, Math.PI*2); ctx.fill();
    }
  });
}

function drawParticlesOnMap() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life * 1.5);
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawFloatTexts() {
  floatTexts.forEach(ft => {
    ctx.globalAlpha = Math.max(0, ft.life);
    ctx.fillStyle = ft.col;
    ctx.font = 'bold ' + Math.floor(TILE * 0.4) + 'px "Segoe UI", Arial';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  var barH = TILE * 1.5;

  // Top bar background
  ctx.fillStyle = 'rgba(10,10,20,0.75)';
  ctx.fillRect(0, 0, W, barH);

  var pad = TILE * 0.5;
  ctx.textAlign = 'left';

  // Day
  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold ' + Math.floor(TILE * 0.5) + 'px "Segoe UI", Arial';
  ctx.fillText('Day ' + day, pad, TILE * 0.55);

  // Time
  var timeLeft = Math.max(0, dayLength - dayTime);
  var mins = Math.floor(timeLeft / 60);
  var secs = Math.floor(timeLeft % 60);
  ctx.fillStyle = timeLeft < 15 ? '#ff4444' : '#ddd';
  ctx.textAlign = 'center';
  ctx.font = 'bold ' + Math.floor(TILE * 0.5) + 'px "Segoe UI", Arial';
  ctx.fillText(mins + ':' + (secs < 10 ? '0' : '') + secs, W/2, TILE * 0.55);

  // Score
  ctx.fillStyle = '#88ff88';
  ctx.textAlign = 'right';
  ctx.fillText('Score: ' + score, W - pad * 2 - 40, TILE * 0.55);

  // Cleanliness bar
  var cleanW = Math.min(W * 0.4, 300);
  var cleanH = TILE * 0.28;
  var cleanX = (W - cleanW) / 2;
  var cleanY = TILE * 0.8;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(ctx, cleanX, cleanY, cleanW, cleanH, 3); ctx.fill();
  var pct = cleanliness / 100;
  ctx.fillStyle = pct > 0.5 ? '#44cc44' : pct > 0.25 ? '#cccc44' : '#cc4444';
  roundRect(ctx, cleanX, cleanY, cleanW * pct, cleanH, 3); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  roundRect(ctx, cleanX, cleanY, cleanW, cleanH, 3); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = Math.floor(TILE * 0.22) + 'px "Segoe UI", Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Cleanliness ' + Math.floor(cleanliness) + '%', W/2, cleanY + cleanH + TILE * 0.22);

  // Bottom kid status bar
  var botH = TILE * 1.3;
  ctx.fillStyle = 'rgba(10,10,20,0.7)';
  ctx.fillRect(0, H - botH, W, botH);

  var kidW = W / kids.length;
  kids.forEach((k, i) => {
    var kx = kidW * i + kidW / 2;
    var ky = H - botH / 2;
    var dotR = TILE * 0.15;

    // Color indicator (use kid's shirt color)
    ctx.fillStyle = k.shirtCol || '#aaa';
    ctx.beginPath(); ctx.arc(kx - kidW * 0.32, ky - TILE * 0.05, dotR, 0, Math.PI * 2); ctx.fill();

    // Name
    ctx.fillStyle = '#ddd';
    ctx.font = 'bold ' + Math.floor(TILE * 0.32) + 'px "Segoe UI", Arial';
    ctx.textAlign = 'left';
    ctx.fillText(k.name, kx - kidW * 0.22, ky - TILE * 0.08);

    // State
    var stTxt = k.state === 'idle' ? 'Idle' :
                k.state === 'moving' ? 'On my way...' :
                k.state === 'working' ? 'Cleaning!' :
                k.state === 'distracted' ? 'Distracted!' :
                k.state === 'complaining' ? 'Ugh, fine...' : '';
    var stCol = k.state === 'working' ? '#88ff88' :
                k.state === 'distracted' ? '#ff8844' :
                k.state === 'complaining' ? '#ffcc44' : '#777';
    ctx.fillStyle = stCol;
    ctx.font = Math.floor(TILE * 0.26) + 'px "Segoe UI", Arial';
    ctx.fillText(stTxt, kx - kidW * 0.22, ky + TILE * 0.22);
  });

  // Mute
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(ctx, W - 42, 10, 32, 32, 4); ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(SFX.muted ? 'X' : '♪', W - 26, 31);

  // Screen-edge warning when cleanliness is low
  if (cleanliness < 30) {
    var flash = Math.sin(Date.now() * 0.006) * 0.15 + 0.15;
    ctx.fillStyle = 'rgba(255,30,30,' + flash * (1 - cleanliness/30) + ')';
    ctx.fillRect(0, 0, W, 4);
    ctx.fillRect(0, H-4, W, 4);
    ctx.fillRect(0, 0, 4, H);
    ctx.fillRect(W-4, 0, 4, H);
  }
}

function drawTutorialHint() {
  // Floating hint at top of play area, fades out over 8 seconds
  var alpha = Math.max(0, 1 - dayTime / 8);
  if (alpha <= 0) return;
  ctx.globalAlpha = alpha * 0.9;
  var hintY = TILE * 2.2;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, W/2 - TILE * 5, hintY - TILE * 0.4, TILE * 10, TILE * 1.1, 6);
  ctx.fill();
  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold ' + Math.floor(TILE * 0.4) + 'px "Segoe UI", Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Tap a KID to select, then tap a MESS to send them!', W/2, hintY + TILE * 0.15);
  ctx.globalAlpha = 1;
}

function drawDayEnd() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold ' + Math.floor(TILE * 1.8) + 'px "Segoe UI", Arial';
  ctx.fillText('Bedtime!', W/2, H * 0.25);

  ctx.fillStyle = '#ccc';
  ctx.font = Math.floor(TILE * 0.55) + 'px "Segoe UI", Arial';
  var y = H * 0.37;
  var lh = TILE * 1.0;
  ctx.fillText('Day ' + day + ' Complete', W/2, y); y += lh * 1.3;

  var choreScore = score - Math.floor(cleanliness * day);
  var bonus = Math.floor(cleanliness * day);
  ctx.fillStyle = '#88ff88';
  ctx.fillText('Chores Score: ' + choreScore, W/2, y); y += lh;
  ctx.fillText('Cleanliness Bonus: +' + bonus, W/2, y); y += lh * 1.3;

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold ' + Math.floor(TILE * 0.65) + 'px "Segoe UI", Arial';
  ctx.fillText('Day Total: ' + score, W/2, y); y += lh;
  ctx.fillText('Grand Total: ' + totalScore, W/2, y); y += lh * 1.5;

  ctx.fillStyle = '#88ff88';
  ctx.font = Math.floor(TILE * 0.5) + 'px "Segoe UI", Arial';
  var p2 = 0.7 + Math.sin(Date.now() * 0.004) * 0.3;
  ctx.globalAlpha = p2;
  ctx.fillText('Tap to start Day ' + (day + 1), W/2, y);
  ctx.globalAlpha = 1;

  score = 0;
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold ' + Math.floor(TILE * 1.8) + 'px "Segoe UI", Arial';
  ctx.fillText('Total Mess!', W/2, H * 0.28);

  ctx.fillStyle = '#ccc';
  ctx.font = Math.floor(TILE * 0.6) + 'px "Segoe UI", Arial';
  ctx.fillText('The house got too messy to live in!', W/2, H * 0.4);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold ' + Math.floor(TILE * 0.75) + 'px "Segoe UI", Arial';
  ctx.fillText('Survived ' + day + ' day' + (day > 1 ? 's' : ''), W/2, H * 0.52);
  ctx.fillText('Final Score: ' + totalScore, W/2, H * 0.62);

  ctx.fillStyle = '#88ff88';
  ctx.font = Math.floor(TILE * 0.45) + 'px "Segoe UI", Arial';
  ctx.fillText('Tap to Submit Score & Play Again', W/2, H * 0.76);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(ts) {
  var dt = Math.min(0.05, (ts - lastTime) / 1000);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// Build sprites then start
try { buildSprites(); } catch(e) { console.warn('SpriteForge not loaded, using fallback:', e); }
initGame();
requestAnimationFrame(ts => { lastTime = ts; gameLoop(ts); });

</script>
