// ============================================================
// DUNGEON GENERATOR
// ============================================================
function generateDungeon(floor) {
  const w = CONFIG.MAP_W, h = CONFIG.MAP_H;
  const map = Array.from({ length: h }, () => new Array(w).fill(T.VOID));
  const rooms = [];
  const revealed = Array.from({ length: h }, () => new Array(w).fill(false));

  // Place rooms
  for (let attempt = 0; attempt < CONFIG.ROOM_ATTEMPTS + floor * 5; attempt++) {
    const rw = CONFIG.ROOM_MIN + Math.floor(Math.random() * (CONFIG.ROOM_MAX - CONFIG.ROOM_MIN));
    const rh = CONFIG.ROOM_MIN + Math.floor(Math.random() * (CONFIG.ROOM_MAX - CONFIG.ROOM_MIN));
    const rx = 1 + Math.floor(Math.random() * (w - rw - 2));
    const ry = 1 + Math.floor(Math.random() * (h - rh - 2));

    // Check overlap
    let overlap = false;
    for (const r of rooms) {
      if (rx - 1 < r.x + r.w && rx + rw + 1 > r.x && ry - 1 < r.y + r.h && ry + rh + 1 > r.y) {
        overlap = true; break;
      }
    }
    if (overlap) continue;

    rooms.push({ x: rx, y: ry, w: rw, h: rh });
    for (let y = ry; y < ry + rh; y++) {
      for (let x = rx; x < rx + rw; x++) {
        map[y][x] = T.FLOOR;
      }
    }
    // Walls around room
    for (let y = ry - 1; y <= ry + rh; y++) {
      for (let x = rx - 1; x <= rx + rw; x++) {
        if (y >= 0 && y < h && x >= 0 && x < w && map[y][x] === T.VOID) {
          map[y][x] = T.WALL;
        }
      }
    }
  }

  // Connect rooms with corridors
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i - 1], b = rooms[i];
    const ax = Math.floor(a.x + a.w / 2), ay = Math.floor(a.y + a.h / 2);
    const bx = Math.floor(b.x + b.w / 2), by = Math.floor(b.y + b.h / 2);

    let cx = ax, cy = ay;
    while (cx !== bx) {
      if (cy >= 0 && cy < h && cx >= 0 && cx < w) {
        if (map[cy][cx] === T.VOID || map[cy][cx] === T.WALL) map[cy][cx] = T.CORRIDOR;
        // Walls beside corridor
        for (let d = -1; d <= 1; d++) {
          const ny = cy + d;
          if (ny >= 0 && ny < h && map[ny][cx] === T.VOID) map[ny][cx] = T.WALL;
        }
      }
      cx += cx < bx ? 1 : -1;
    }
    while (cy !== by) {
      if (cy >= 0 && cy < h && cx >= 0 && cx < w) {
        if (map[cy][cx] === T.VOID || map[cy][cx] === T.WALL) map[cy][cx] = T.CORRIDOR;
        for (let d = -1; d <= 1; d++) {
          const nx = cx + d;
          if (nx >= 0 && nx < w && map[cy][nx] === T.VOID) map[cy][nx] = T.WALL;
        }
      }
      cy += cy < by ? 1 : -1;
    }
  }

  // Place doors at room entrances (where corridor meets room edge)
  for (const room of rooms) {
    for (let x = room.x; x < room.x + room.w; x++) {
      if (room.y > 0 && map[room.y - 1][x] === T.CORRIDOR) map[room.y][x] = T.DOOR;
      if (room.y + room.h < h && map[room.y + room.h][x] === T.CORRIDOR) map[room.y + room.h - 1][x] = T.DOOR;
    }
    for (let y = room.y; y < room.y + room.h; y++) {
      if (room.x > 0 && map[y][room.x - 1] === T.CORRIDOR) map[y][room.x] = T.DOOR;
      if (room.x + room.w < w && map[y][room.x + room.w] === T.CORRIDOR) map[y][room.x + room.w - 1] = T.DOOR;
    }
  }

  // Place stairs in the last room
  const lastRoom = rooms[rooms.length - 1];
  const sx = Math.floor(lastRoom.x + lastRoom.w / 2);
  const sy = Math.floor(lastRoom.y + lastRoom.h / 2);
  map[sy][sx] = T.STAIRS;

  // Place items in random rooms (not first or last)
  for (let i = 1; i < rooms.length - 1; i++) {
    const r = rooms[i];
    const fx = r.x + 1 + Math.floor(Math.random() * (r.w - 2));
    const fy = r.y + 1 + Math.floor(Math.random() * (r.h - 2));
    if (map[fy][fx] !== T.FLOOR) continue;

    const roll = Math.random();
    if (roll < 0.25) map[fy][fx] = T.CHEST;
    else if (roll < 0.4) map[fy][fx] = T.POTION;
    else if (roll < 0.48) map[fy][fx] = T.WEAPON;
    else if (roll < 0.55) map[fy][fx] = T.ARMOR;
    else if (roll < 0.65) map[fy][fx] = T.TRAP;
    else if (roll < 0.72) map[fy][fx] = T.TORCH_ITEM;
  }

  // Spawn point in first room
  const firstRoom = rooms[0];
  const spawnX = Math.floor(firstRoom.x + firstRoom.w / 2);
  const spawnY = Math.floor(firstRoom.y + firstRoom.h / 2);

  return { map, rooms, revealed, spawnX, spawnY, stairsX: sx, stairsY: sy };
}

// ============================================================
// ENEMY DEFINITIONS
// ============================================================
const ENEMY_TYPES = [
  { name: 'Rat',       hp: 8,  atk: 3, def: 0, xp: 5,  color: '#886644', symbol: 'r' },
  { name: 'Bat',       hp: 6,  atk: 4, def: 0, xp: 6,  color: '#8866aa', symbol: 'b' },
  { name: 'Skeleton',  hp: 15, atk: 5, def: 2, xp: 12, color: '#ccccbb', symbol: 'S' },
  { name: 'Goblin',    hp: 12, atk: 6, def: 1, xp: 10, color: '#44aa44', symbol: 'g' },
  { name: 'Orc',       hp: 25, atk: 8, def: 3, xp: 20, color: '#668833', symbol: 'O' },
  { name: 'Wraith',    hp: 18, atk: 10, def: 1, xp: 25, color: '#6666cc', symbol: 'W' },
  { name: 'Troll',     hp: 40, atk: 7, def: 5, xp: 30, color: '#557744', symbol: 'T' },
  { name: 'Demon',     hp: 35, atk: 12, def: 4, xp: 40, color: '#cc3333', symbol: 'D' },
];

class Enemy {
  constructor(x, y, floor) {
    this.x = x; this.y = y;
    // Pick type based on floor
    const maxType = Math.min(ENEMY_TYPES.length - 1, Math.floor(floor * 1.5));
    const typeIdx = Math.floor(Math.random() * (maxType + 1));
    const base = ENEMY_TYPES[typeIdx];
    this.name = base.name;
    this.symbol = base.symbol;
    this.color = base.color;
    const s = Math.pow(CONFIG.ENEMY_HP_SCALE, floor);
    const sa = Math.pow(CONFIG.ENEMY_ATK_SCALE, floor);
    this.maxHp = Math.round(base.hp * s);
    this.hp = this.maxHp;
    this.atk = Math.round(base.atk * sa);
    this.def = base.def + floor;
    this.xp = Math.round(base.xp * s);
    this.alive = true;
    this.hitFlash = 0;
    this.moved = false;
  }
  takeDamage(dmg) {
    const effective = Math.max(1, dmg - this.def);
    this.hp -= effective;
    this.hitFlash = 0.2;
    if (this.hp <= 0) { this.hp = 0; this.alive = false; }
    return effective;
  }
}

// ============================================================
// PLAYER
// ============================================================
class Player {
  constructor() {
    this.x = 0; this.y = 0;
    this.hp = CONFIG.START_HP;
    this.maxHp = CONFIG.START_HP;
    this.atk = CONFIG.START_ATK;
    this.def = CONFIG.START_DEF;
    this.level = 1;
    this.xp = 0;
    this.xpToNext = CONFIG.XP_BASE;
    this.gold = 0;
    this.torchRadius = CONFIG.FOG_RADIUS;
    this.torchTimer = 0;
    this.weapon = null;
    this.armor = null;
    this.potions = 1;
    this.hitFlash = 0;
    this.floor = 0;
  }
  reset() {
    this.hp = CONFIG.START_HP;
    this.maxHp = CONFIG.START_HP;
    this.atk = CONFIG.START_ATK;
    this.def = CONFIG.START_DEF;
    this.level = 1;
    this.xp = 0;
    this.xpToNext = CONFIG.XP_BASE;
    this.gold = 0;
    this.torchRadius = CONFIG.FOG_RADIUS;
    this.torchTimer = 0;
    this.weapon = null;
    this.armor = null;
    this.potions = 1;
    this.hitFlash = 0;
    this.floor = 0;
  }
  get totalAtk() { return this.atk + (this.weapon ? this.weapon.bonus : 0); }
  get totalDef() { return this.def + (this.armor ? this.armor.bonus : 0); }
  addXp(amount) {
    this.xp += amount;
    let leveled = false;
    while (this.xp >= this.xpToNext) {
      this.xp -= this.xpToNext;
      this.level++;
      this.maxHp += CONFIG.LEVEL_HP;
      this.hp = Math.min(this.hp + CONFIG.LEVEL_HP, this.maxHp);
      this.atk += CONFIG.LEVEL_ATK;
      this.def += CONFIG.LEVEL_DEF;
      this.xpToNext = Math.round(CONFIG.XP_BASE * Math.pow(CONFIG.XP_SCALE, this.level - 1));
      leveled = true;
    }
    return leveled;
  }
  drinkPotion() {
    if (this.potions <= 0 || this.hp >= this.maxHp) return false;
    this.potions--;
    const heal = Math.round(this.maxHp * 0.4);
    this.hp = Math.min(this.hp + heal, this.maxHp);
    return heal;
  }
}

// ============================================================
// GAME
// ============================================================
class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.pipeline = new RenderPipeline(this.canvas, {
      layers: [
        { name: 'dungeon', worldSpace: true },
        { name: 'entities', worldSpace: true },
        { name: 'fx', worldSpace: true },
        { name: 'ui', worldSpace: false },
      ],
      lighting: {
        enabled: true,
        ambient: { color: '#0a0818', intensity: 0.25 },
        applyAfterLayer: 'fx',
      },
      postfx: {
        bloom: { enabled: true, threshold: 0.35, intensity: 0.5, radius: 10 },
        vignette: { enabled: true, radius: 0.65, softness: 0.5, color: '#000000', intensity: 0.5 },
        screenFlash: { enabled: true },
      },
    });
    this.pipeline.camera.x = CONFIG.WIDTH / 2;
    this.pipeline.camera.y = CONFIG.HEIGHT / 2;
    this.vfx = new VFXManager({ canvas: this.canvas, maxParticles: 1500 });

    this.terrainSprites = {
      floor: SpriteForge.terrain({ type: 'stone', tileSize: CONFIG.TILE, variation: 3 }),
      corridor: SpriteForge.terrain({ type: 'dirt', tileSize: CONFIG.TILE, variation: 3 }),
    };

    this.state = 'title'; // title, playing, shop, dead, victory
    this.shopItems = []; // populated when entering shop
    this.player = new Player();
    this.dungeon = null;
    this.enemies = [];
    this.log = [];
    this.floatingTexts = [];
    this.animTimer = 0;
    this.turnReady = true;
    this.turnCooldown = 0;

    this.setupInput();
    this.lastTime = performance.now();
    this.loop();
  }

  setupInput() {
    document.addEventListener('keydown', e => {
      if (this.state === 'title') { this.startGame(); return; }
      if (this.state === 'dead' || this.state === 'victory') { this.state = 'title'; return; }
      if (this.state === 'shop') { this.handleShopKey(e); return; }
      if (this.state !== 'playing' || !this.turnReady) return;

      let dx = 0, dy = 0;
      if (e.key === 'ArrowUp' || e.key === 'w') dy = -1;
      else if (e.key === 'ArrowDown' || e.key === 's') dy = 1;
      else if (e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
      else if (e.key === 'ArrowRight' || e.key === 'd') dx = 1;
      else if (e.key === 'p' || e.key === 'P') {
        const heal = this.player.drinkPotion();
        if (heal) {
          SFX.powerUp();
          this.addLog(`Drank potion, healed ${heal} HP`, '#44ff88');
          this.addFloating(this.player.x, this.player.y, `+${heal}`, '#44ff88');
          this.vfx.heal(this.player.x * CONFIG.TILE + CONFIG.TILE / 2, this.player.y * CONFIG.TILE + CONFIG.TILE / 2, { color: '#44ff88' });
          this.doEnemyTurns();
        }
        return;
      }
      else if (e.key === '5' || e.key === '.') {
        // Wait turn
        this.doEnemyTurns();
        return;
      }
      else return;

      e.preventDefault();
      this.doPlayerMove(dx, dy);
    });
    this.canvas.addEventListener('click', (e) => {
      if (this.state === 'title') this.startGame();
      if (this.state === 'dead' || this.state === 'victory') this.state = 'title';
      if (this.state === 'shop') this.handleShopClick(e);
    });
  }

  startGame() {
    this.state = 'playing';
    this.player.reset();
    this.log = [];
    this.floatingTexts = [];
    this.vfx.clear();
    this.addLog('You descend into the crypt...', '#aaa');
    this.generateFloor();
  }

  generateFloor() {
    this.player.floor++;
    this.dungeon = generateDungeon(this.player.floor);
    this.player.x = this.dungeon.spawnX;
    this.player.y = this.dungeon.spawnY;
    this.enemies = [];

    // Spawn enemies in rooms (not first)
    for (let i = 1; i < this.dungeon.rooms.length; i++) {
      const r = this.dungeon.rooms[i];
      const count = 1 + Math.floor(Math.random() * (1 + this.player.floor * 0.5));
      for (let j = 0; j < count; j++) {
        const ex = r.x + 1 + Math.floor(Math.random() * (r.w - 2));
        const ey = r.y + 1 + Math.floor(Math.random() * (r.h - 2));
        const tile = this.dungeon.map[ey][ex];
        if (tile === T.FLOOR && !(ex === this.dungeon.stairsX && ey === this.dungeon.stairsY)) {
          this.enemies.push(new Enemy(ex, ey, this.player.floor));
        }
      }
    }

    this.revealAround(this.player.x, this.player.y, this.player.torchRadius);
    this.addLog(`Floor ${this.player.floor}`, '#ffcc44');
  }

  isPassable(x, y) {
    if (x < 0 || x >= CONFIG.MAP_W || y < 0 || y >= CONFIG.MAP_H) return false;
    const t = this.dungeon.map[y][x];
    return t === T.FLOOR || t === T.CORRIDOR || t === T.DOOR || t === T.STAIRS ||
           t === T.CHEST || t === T.POTION || t === T.WEAPON || t === T.ARMOR ||
           t === T.TRAP || t === T.TORCH_ITEM;
  }

  revealAround(cx, cy, radius) {
    for (let dy = -radius; dy <= radius; dy++) {
      for (let dx = -radius; dx <= radius; dx++) {
        if (dx * dx + dy * dy <= radius * radius) {
          const nx = cx + dx, ny = cy + dy;
          if (nx >= 0 && nx < CONFIG.MAP_W && ny >= 0 && ny < CONFIG.MAP_H) {
            this.dungeon.revealed[ny][nx] = true;
          }
        }
      }
    }
  }

  isVisible(tx, ty) {
    const dx = tx - this.player.x, dy = ty - this.player.y;
    return dx * dx + dy * dy <= this.player.torchRadius * this.player.torchRadius;
  }

  doPlayerMove(dx, dy) {
    const nx = this.player.x + dx, ny = this.player.y + dy;

    // Check for enemy at target
    const enemy = this.enemies.find(e => e.alive && e.x === nx && e.y === ny);
    if (enemy) {
      this.attackEnemy(enemy);
      this.doEnemyTurns();
      return;
    }

    if (!this.isPassable(nx, ny)) return;

    this.player.x = nx;
    this.player.y = ny;
    this.revealAround(nx, ny, this.player.torchRadius);

    // Check tile interactions
    const tile = this.dungeon.map[ny][nx];
    this.handleTile(nx, ny, tile);

    // Torch decay
    if (this.player.torchTimer > 0) {
      this.player.torchTimer -= 1;
      if (this.player.torchTimer <= 0) {
        this.player.torchRadius = CONFIG.FOG_RADIUS;
        this.addLog('Your torch burns out.', '#886644');
      }
    }

    this.doEnemyTurns();
  }

  handleTile(x, y, tile) {
    if (tile === T.STAIRS) {
      SFX.click();
      if (this.player.floor >= CONFIG.FLOORS_TO_WIN) {
        this.state = 'victory';
        this.addLog('You escaped the crypt! Victory!', '#ffcc44');
        this.pipeline.flash('#ffcc44', 0.5);
        return;
      }
      this.addLog('A merchant appears before you descend...', '#ffcc44');
      this.pipeline.flash('#000000', 0.3);
      this.openShop();
      return;
    }
    if (tile === T.CHEST) {
      SFX.pickup();
      const gold = 10 + Math.floor(Math.random() * 20 * this.player.floor);
      this.player.gold += gold;
      this.addLog(`Found ${gold} gold in a chest!`, '#ffd700');
      this.addFloating(x, y, `+${gold}g`, '#ffd700');
      this.dungeon.map[y][x] = T.FLOOR;
      this.vfx.createEmitter({
        position: { x: x * CONFIG.TILE + CONFIG.TILE / 2, y: y * CONFIG.TILE + CONFIG.TILE / 2 },
        emitRate: 0, burstCount: 10,
        particle: { life: [0.3, 0.6], speed: [40, 100], angle: [0, Math.PI * 2], size: [2, 4], sizeOverLife: [4, 0], color: ['#ffd700', '#ffffff'], alpha: 1, alphaOverLife: [1, 0], shape: 'star' },
        blendMode: 'lighter',
      });
    }
    if (tile === T.POTION) {
      SFX.pickup();
      this.player.potions++;
      this.addLog('Found a potion!', '#44ff88');
      this.addFloating(x, y, '+1 Potion', '#44ff88');
      this.dungeon.map[y][x] = T.FLOOR;
    }
    if (tile === T.WEAPON) {
      SFX.pickup();
      const bonus = 2 + Math.floor(Math.random() * 3) + this.player.floor;
      const old = this.player.weapon;
      this.player.weapon = { name: `Blade +${bonus}`, bonus };
      this.addLog(`Found ${this.player.weapon.name}!${old ? ' (replaced ' + old.name + ')' : ''}`, '#ff8844');
      this.addFloating(x, y, this.player.weapon.name, '#ff8844');
      this.dungeon.map[y][x] = T.FLOOR;
    }
    if (tile === T.ARMOR) {
      SFX.pickup();
      const bonus = 1 + Math.floor(Math.random() * 2) + this.player.floor;
      const old = this.player.armor;
      this.player.armor = { name: `Shield +${bonus}`, bonus };
      this.addLog(`Found ${this.player.armor.name}!${old ? ' (replaced ' + old.name + ')' : ''}`, '#4488ff');
      this.addFloating(x, y, this.player.armor.name, '#4488ff');
      this.dungeon.map[y][x] = T.FLOOR;
    }
    if (tile === T.TRAP) {
      const dmg = 3 + Math.floor(Math.random() * 5) + this.player.floor * 2;
      this.player.hp -= dmg;
      this.player.hitFlash = 0.2;
      this.addLog(`Stepped on a trap! -${dmg} HP`, '#ff4444');
      this.addFloating(x, y, `-${dmg}`, '#ff4444');
      this.pipeline.camera.shake(5, 0.2);
      this.pipeline.flash('#ff0000', 0.1);
      this.dungeon.map[y][x] = T.FLOOR;
      if (this.player.hp <= 0) {
        this.player.hp = 0;
        this.die();
      }
    }
    if (tile === T.TORCH_ITEM) {
      this.player.torchRadius = CONFIG.TORCH_RADIUS;
      this.player.torchTimer = 40;
      this.addLog('Picked up a torch! Vision expanded.', '#ff8844');
      this.addFloating(x, y, 'TORCH', '#ff8844');
      this.dungeon.map[y][x] = T.FLOOR;
    }
  }

  attackEnemy(enemy) {
    SFX.hit();
    const dmg = enemy.takeDamage(this.player.totalAtk);
    this.addLog(`You hit ${enemy.name} for ${dmg}`, '#ff8844');
    this.addFloating(enemy.x, enemy.y, `-${dmg}`, '#ff8844');
    const px = enemy.x * CONFIG.TILE + CONFIG.TILE / 2;
    const py = enemy.y * CONFIG.TILE + CONFIG.TILE / 2;
    this.vfx.sparks(px, py, { color: ['#ff8844', '#ffcc00'], count: 6, direction: Math.PI, spread: 1 });
    this.pipeline.camera.shake(3, 0.1);

    if (!enemy.alive) {
      SFX.explosion();
      this.addLog(`${enemy.name} defeated! +${enemy.xp} XP`, '#ffcc44');
      this.addFloating(enemy.x, enemy.y, `+${enemy.xp}xp`, '#ffcc44');
      this.vfx.explosion(px, py, { color: [enemy.color, '#ffffff'], count: 12, speed: 80 });
      const leveled = this.player.addXp(enemy.xp);
      if (leveled) {
        SFX.levelUp();
        this.addLog(`LEVEL UP! You are now level ${this.player.level}`, '#ff0');
        this.addFloating(this.player.x, this.player.y, 'LEVEL UP!', '#ff0');
        this.vfx.heal(this.player.x * CONFIG.TILE + CONFIG.TILE / 2, this.player.y * CONFIG.TILE + CONFIG.TILE / 2, { color: '#ffff44' });
        this.pipeline.flash('#ffff44', 0.15);
      }
    }
  }

  doEnemyTurns() {
    this.turnReady = false;
    this.turnCooldown = 0.08;

    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      enemy.moved = false;

      const dx = this.player.x - enemy.x;
      const dy = this.player.y - enemy.y;
      const dist = Math.abs(dx) + Math.abs(dy);

      // Only act if within detection range
      if (dist > this.player.torchRadius + 2) continue;

      // Adjacent? Attack
      if (dist === 1) {
        const dmg = Math.max(1, enemy.atk - this.player.totalDef);
        this.player.hp -= dmg;
        this.player.hitFlash = 0.15;
        SFX.lifeLost();
        this.addLog(`${enemy.name} hits you for ${dmg}`, '#ff4444');
        this.addFloating(this.player.x, this.player.y, `-${dmg}`, '#ff4444');
        this.pipeline.camera.shake(2, 0.08);
        if (this.player.hp <= 0) {
          this.player.hp = 0;
          this.die();
          return;
        }
        continue;
      }

      // Move toward player
      const moveX = dx !== 0 ? Math.sign(dx) : 0;
      const moveY = dy !== 0 ? Math.sign(dy) : 0;
      // Try horizontal first, then vertical
      const tries = Math.abs(dx) >= Math.abs(dy)
        ? [{ x: moveX, y: 0 }, { x: 0, y: moveY }]
        : [{ x: 0, y: moveY }, { x: moveX, y: 0 }];

      for (const t of tries) {
        if (t.x === 0 && t.y === 0) continue;
        const nx = enemy.x + t.x, ny = enemy.y + t.y;
        if (this.isPassable(nx, ny) && !(nx === this.player.x && ny === this.player.y) &&
            !this.enemies.some(e => e.alive && e !== enemy && e.x === nx && e.y === ny)) {
          enemy.x = nx;
          enemy.y = ny;
          enemy.moved = true;
          break;
        }
      }
    }

    this.enemies = this.enemies.filter(e => e.alive);
  }

  die() {
    SFX.gameOver();
    this.state = 'dead';
    if (this.player.gold > 0) submitScore('crypt-crawler', this.player.gold);
    this.addLog('You have perished in the crypt.', '#ff4444');
    this.pipeline.camera.shake(10, 0.6);
    this.pipeline.flash('#ff0000', 0.4);
    this.pipeline.chromaticAberration(5, 0.5);
    this.vfx.explosion(
      this.player.x * CONFIG.TILE + CONFIG.TILE / 2,
      this.player.y * CONFIG.TILE + CONFIG.TILE / 2,
      { color: ['#ff4444', '#ffcc00'], count: 25, speed: 120 }
    );
  }

  addLog(text, color = '#ccc') {
    this.log.push({ text, color });
    if (this.log.length > 6) this.log.shift();
  }

  addFloating(tx, ty, text, color) {
    this.floatingTexts.push({
      x: tx * CONFIG.TILE + CONFIG.TILE / 2,
      y: ty * CONFIG.TILE,
      text, color, life: 1.0
    });
  }

  update(dt) {
    this.animTimer += dt;
    if (this.turnCooldown > 0) {
      this.turnCooldown -= dt;
      if (this.turnCooldown <= 0) this.turnReady = true;
    }
    for (const e of this.enemies) {
      if (e.hitFlash > 0) e.hitFlash -= dt;
    }
    if (this.player.hitFlash > 0) this.player.hitFlash -= dt;
    for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
      const ft = this.floatingTexts[i];
      ft.y -= 40 * dt;
      ft.life -= dt;
      if (ft.life <= 0) this.floatingTexts.splice(i, 1);
    }
  }

  draw() {
    const pipeline = this.pipeline;
    pipeline.begin();

    if (this.state === 'title') {
      pipeline.setLayer('ui');
      this.drawTitle(pipeline.getCtx());
      pipeline.end();
      return;
    }

    // Camera follow player
    const camX = this.player.x * CONFIG.TILE + CONFIG.TILE / 2;
    const camY = this.player.y * CONFIG.TILE + CONFIG.TILE / 2;
    pipeline.camera.x = camX;
    pipeline.camera.y = camY;

    // Dungeon tiles — apply camera transform since we use getCtx() directly
    pipeline.setLayer('dungeon');
    const dctx = pipeline.getCtx();
    pipeline.camera.applyTransform(dctx);
    this.drawDungeon(dctx);

    // Entities
    pipeline.setLayer('entities');
    const ectx = pipeline.getCtx();
    pipeline.camera.applyTransform(ectx);
    this.drawEntities(ectx);

    // Player torch light
    pipeline.addLight(camX, camY, {
      color: '#ff9944',
      radius: this.player.torchRadius * CONFIG.TILE,
      intensity: this.player.torchTimer > 0 ? 0.9 : 0.6,
      flicker: 0.08,
      falloff: 'quadratic',
    });

    // FX
    pipeline.setLayer('fx');
    const fctx = pipeline.getCtx();
    pipeline.camera.applyTransform(fctx);
    this.vfx.draw(fctx);
    // Floating texts
    for (const ft of this.floatingTexts) {
      fctx.globalAlpha = Math.max(0, ft.life);
      fctx.font = 'bold 13px Segoe UI';
      fctx.fillStyle = ft.color;
      fctx.textAlign = 'center';
      fctx.fillText(ft.text, ft.x, ft.y);
      fctx.globalAlpha = 1;
    }

    // UI
    pipeline.setLayer('ui');
    const uctx = pipeline.getCtx();
    this.drawHUD(uctx);
    if (this.state === 'shop') this.drawShop(uctx);
    if (this.state === 'dead') this.drawDeathOverlay(uctx);
    if (this.state === 'victory') this.drawVictoryOverlay(uctx);

    pipeline.end();
  }

  drawDungeon(ctx) {
    const ts = CONFIG.TILE;
    const px = this.player.x, py = this.player.y;
    const halfW = Math.ceil(CONFIG.VIEW_W / 2) + 1;
    const halfH = Math.ceil(CONFIG.VIEW_H / 2) + 1;

    for (let dy = -halfH; dy <= halfH; dy++) {
      for (let dx = -halfW; dx <= halfW; dx++) {
        const tx = px + dx, ty = py + dy;
        if (tx < 0 || tx >= CONFIG.MAP_W || ty < 0 || ty >= CONFIG.MAP_H) continue;
        if (!this.dungeon.revealed[ty][tx]) continue;

        const tile = this.dungeon.map[ty][tx];
        const sx = tx * ts, sy = ty * ts;
        const visible = this.isVisible(tx, ty);
        const dim = visible ? 1 : 0.3;

        ctx.globalAlpha = dim;

        // Draw tile
        if (tile === T.WALL) {
          // Solid dark wall — clearly distinct from floor
          const shade = 30 + ((tx * 7 + ty * 13) % 12);
          ctx.fillStyle = `rgb(${shade},${shade + 3},${shade + 8})`;
          ctx.fillRect(sx, sy, ts, ts);
          // Brick pattern
          ctx.strokeStyle = `rgba(255,255,255,0.08)`;
          ctx.lineWidth = 0.5;
          const brickH = ts / 3;
          for (let i = 0; i < 3; i++) {
            const by = sy + i * brickH;
            ctx.strokeRect(sx, by, ts, brickH);
            const offset = (i % 2) * (ts / 2);
            ctx.beginPath();
            ctx.moveTo(sx + ts / 2 + offset, by);
            ctx.lineTo(sx + ts / 2 + offset, by + brickH);
            ctx.stroke();
          }
        } else if (tile === T.FLOOR || tile === T.DOOR || tile === T.CHEST || tile === T.POTION ||
                   tile === T.WEAPON || tile === T.ARMOR || tile === T.TRAP || tile === T.TORCH_ITEM || tile === T.STAIRS) {
          const frame = this.terrainSprites.floor.sheet.getFrame(((tx * 3 + ty * 11) & 0xff) % 3);
          ctx.drawImage(frame.canvas, frame.x, frame.y, frame.w, frame.h, sx, sy, ts, ts);
        } else if (tile === T.CORRIDOR) {
          const frame = this.terrainSprites.corridor.sheet.getFrame(((tx * 5 + ty * 9) & 0xff) % 3);
          ctx.drawImage(frame.canvas, frame.x, frame.y, frame.w, frame.h, sx, sy, ts, ts);
        }

        // Draw items on tiles
        if (visible) {
          ctx.globalAlpha = 1;
          const ifs = Math.max(12, Math.round(ts * 0.6));
          const ifsB = Math.max(14, Math.round(ts * 0.7));
          ctx.textAlign = 'center';
          if (tile === T.STAIRS) {
            ctx.fillStyle = '#ffcc44';
            ctx.font = `bold ${ifsB}px Segoe UI`;
            ctx.fillText('>', sx + ts / 2, sy + ts / 2 + ifs * 0.25);
          }
          if (tile === T.CHEST) {
            ctx.fillStyle = '#ffd700';
            ctx.font = `${ifs}px Segoe UI`;
            ctx.fillText('\u2302', sx + ts / 2, sy + ts / 2 + ifs * 0.25);
          }
          if (tile === T.POTION) {
            ctx.fillStyle = '#44ff88';
            ctx.font = `bold ${ifs}px Segoe UI`;
            ctx.fillText('!', sx + ts / 2, sy + ts / 2 + ifs * 0.25);
          }
          if (tile === T.WEAPON) {
            ctx.fillStyle = '#ff8844';
            ctx.font = `bold ${ifs}px Segoe UI`;
            ctx.fillText('/', sx + ts / 2, sy + ts / 2 + ifs * 0.25);
          }
          if (tile === T.ARMOR) {
            ctx.fillStyle = '#4488ff';
            ctx.font = `bold ${ifs}px Segoe UI`;
            ctx.fillText('[', sx + ts / 2, sy + ts / 2 + ifs * 0.25);
          }
          if (tile === T.TRAP) {
            ctx.fillStyle = '#ff4444';
            ctx.font = `bold ${ifs}px Segoe UI`;
            ctx.fillText('^', sx + ts / 2, sy + ts / 2 + ifs * 0.2);
          }
          if (tile === T.TORCH_ITEM) {
            ctx.fillStyle = '#ff8844';
            ctx.font = `bold ${ifs}px Segoe UI`;
            ctx.fillText('*', sx + ts / 2, sy + ts / 2 + ifs * 0.25);
          }
          if (tile === T.DOOR) {
            ctx.fillStyle = '#8b5a2b';
            ctx.fillRect(sx + ts * 0.1, sy + ts * 0.05, ts * 0.8, ts * 0.9);
            ctx.strokeStyle = '#c89060';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(sx + ts * 0.1, sy + ts * 0.05, ts * 0.8, ts * 0.9);
            ctx.fillStyle = '#aa7744';
            ctx.fillRect(sx + ts * 0.6, sy + ts * 0.45, 3, 3);
          }
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  drawEntities(ctx) {
    const ts = CONFIG.TILE;

    // Enemies
    for (const e of this.enemies) {
      if (!e.alive) continue;
      if (!this.isVisible(e.x, e.y)) continue;
      const sx = e.x * ts, sy = e.y * ts;

      if (e.hitFlash > 0) {
        ctx.fillStyle = '#fff';
      } else {
        ctx.fillStyle = e.color;
      }
      // Enemy body — bright outline for contrast
      ctx.beginPath();
      ctx.arc(sx + ts / 2, sy + ts / 2, ts * 0.38, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Symbol
      ctx.fillStyle = '#000';
      const efs = Math.max(12, Math.round(ts * 0.55));
      ctx.font = `bold ${efs}px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.fillText(e.symbol, sx + ts / 2, sy + ts / 2 + efs * 0.2);
      // HP bar
      if (e.hp < e.maxHp) {
        const barW = ts * 0.8;
        const frac = e.hp / e.maxHp;
        ctx.fillStyle = '#300';
        ctx.fillRect(sx + (ts - barW) / 2, sy - 3, barW, 4);
        ctx.fillStyle = frac > 0.5 ? '#0f0' : frac > 0.25 ? '#fc0' : '#f00';
        ctx.fillRect(sx + (ts - barW) / 2, sy - 3, barW * frac, 4);
      }
    }

    // Player
    const px = this.player.x * ts, py = this.player.y * ts;
    if (this.player.hitFlash > 0) {
      ctx.fillStyle = '#ff4444';
    } else {
      ctx.fillStyle = '#44aaff';
    }
    ctx.beginPath();
    ctx.arc(px + ts / 2, py + ts / 2, ts * 0.38, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    const pfs = Math.max(14, Math.round(ts * 0.6));
    ctx.font = `bold ${pfs}px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.fillText('@', px + ts / 2, py + ts / 2 + pfs * 0.2);
  }

  drawHUD(ctx) {
    const p = this.player;
    const H = CONFIG.HEIGHT;
    const W = CONFIG.WIDTH;
    const fs = Math.max(9, Math.min(12, Math.floor(W / 60)));
    const barH = Math.max(40, Math.min(55, Math.floor(H * 0.08)));

    // Background bar
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, H - barH, W, barH);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H - barH); ctx.lineTo(W, H - barH); ctx.stroke();

    const y1 = H - barH + fs + 4;
    const y2 = y1 + fs + 4;
    const y3 = y2 + fs + 2;
    const hpBarW = Math.min(120, Math.floor(W * 0.2));
    const col2 = hpBarW + 50;
    const col3 = Math.floor(W * 0.55);

    ctx.font = `${fs}px Segoe UI`;
    ctx.textAlign = 'left';

    // Row 1: HP bar + Level + Floor
    ctx.fillStyle = '#aaa';
    ctx.fillText('HP', 8, y1);
    ctx.fillStyle = '#300';
    ctx.fillRect(26, y1 - fs + 2, hpBarW, fs);
    const hpFrac = p.hp / p.maxHp;
    ctx.fillStyle = hpFrac > 0.5 ? '#22aa44' : hpFrac > 0.25 ? '#ccaa22' : '#cc2222';
    ctx.fillRect(26, y1 - fs + 2, hpBarW * hpFrac, fs);
    ctx.fillStyle = '#fff';
    ctx.font = `${fs - 2}px Segoe UI`;
    ctx.fillText(`${Math.ceil(p.hp)}/${p.maxHp}`, 30, y1 - 1);
    ctx.font = `${fs}px Segoe UI`;
    ctx.fillStyle = '#ccc';
    ctx.fillText(`Lv${p.level}  ATK:${p.totalAtk}  DEF:${p.totalDef}`, col2, y1);
    ctx.fillStyle = '#ffcc44';
    ctx.fillText(`F${p.floor}/${CONFIG.FLOORS_TO_WIN}`, col3, y1);

    // Row 2: XP bar + Gold + Potions + Equipment
    ctx.fillStyle = '#aaa';
    ctx.fillText('XP', 8, y2);
    ctx.fillStyle = '#003';
    ctx.fillRect(26, y2 - fs + 2, hpBarW, fs - 2);
    ctx.fillStyle = '#4466cc';
    ctx.fillRect(26, y2 - fs + 2, hpBarW * (p.xp / p.xpToNext), fs - 2);
    ctx.fillStyle = '#888';
    ctx.fillText(`Gold:${p.gold}  Pot:${p.potions}`, col2, y2);
    if (p.weapon) { ctx.fillStyle = '#ff8844'; ctx.fillText(p.weapon.name, col3, y2); }
    if (p.armor) { ctx.fillStyle = '#4488ff'; ctx.fillText(p.armor.name, col3 + Math.floor(W * 0.18), y2); }

    // Last log entry (single line)
    if (this.log.length > 0) {
      const last = this.log[this.log.length - 1];
      ctx.fillStyle = last.color;
      ctx.globalAlpha = 0.8;
      ctx.font = `${fs - 1}px Segoe UI`;
      ctx.fillText(last.text, 8, y3);
      ctx.globalAlpha = 1;
    }

    // Minimap
    this.drawMinimap(ctx);
  }

  drawMinimap(ctx) {
    const mmSize = Math.min(100, Math.floor(Math.min(CONFIG.WIDTH, CONFIG.HEIGHT) * 0.18));
    const mmX = CONFIG.WIDTH - mmSize - 6;
    const mmY = 6;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(mmX, mmY, mmSize, mmSize);
    ctx.strokeStyle = '#333';
    ctx.strokeRect(mmX, mmY, mmSize, mmSize);
    const scale = mmSize / CONFIG.MAP_W;
    for (let y = 0; y < CONFIG.MAP_H; y++) {
      for (let x = 0; x < CONFIG.MAP_W; x++) {
        if (!this.dungeon.revealed[y][x]) continue;
        const t = this.dungeon.map[y][x];
        if (t === T.VOID) continue;
        if (t === T.WALL) ctx.fillStyle = '#333';
        else if (t === T.STAIRS) ctx.fillStyle = '#ffcc44';
        else ctx.fillStyle = '#555';
        ctx.fillRect(mmX + x * scale, mmY + y * scale, Math.max(1, scale), Math.max(1, scale));
      }
    }
    // Player dot
    ctx.fillStyle = '#44aaff';
    ctx.fillRect(mmX + this.player.x * scale - 1, mmY + this.player.y * scale - 1, 3, 3);
    // Enemy dots
    for (const e of this.enemies) {
      if (!e.alive || !this.isVisible(e.x, e.y)) continue;
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(mmX + e.x * scale, mmY + e.y * scale, 2, 2);
    }
  }

  drawTitle(ctx) {
    ctx.fillStyle = '#040410';
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    ctx.save();
    ctx.textAlign = 'center';
    const pulse = 0.8 + 0.2 * Math.sin(performance.now() / 300);
    ctx.font = 'bold 52px Segoe UI';
    ctx.shadowColor = '#ff8844';
    ctx.shadowBlur = 20 * pulse;
    ctx.fillStyle = '#ff8844';
    ctx.fillText('CRYPT', CONFIG.WIDTH / 2, 210);
    ctx.shadowColor = '#44aaff';
    ctx.fillStyle = '#44aaff';
    ctx.fillText('CRAWLER', CONFIG.WIDTH / 2, 270);
    ctx.shadowBlur = 0;
    ctx.font = '16px Segoe UI';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('A roguelike dungeon crawler', CONFIG.WIDTH / 2, 310);
    ctx.font = '14px Segoe UI';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('WASD / Arrow keys to move & attack', CONFIG.WIDTH / 2, 365);
    ctx.fillText('Walk into enemies to fight them', CONFIG.WIDTH / 2, 390);
    ctx.fillText('P: drink potion | .: wait a turn', CONFIG.WIDTH / 2, 415);
    ctx.fillText(`Descend ${CONFIG.FLOORS_TO_WIN} floors to escape the crypt!`, CONFIG.WIDTH / 2, 440);
    ctx.fillText('Find weapons, armor, potions, gold, and torches', CONFIG.WIDTH / 2, 465);
    ctx.fillText('Beware of traps!', CONFIG.WIDTH / 2, 490);
    const blink = Math.sin(performance.now() / 400) > 0;
    if (blink) {
      ctx.font = 'bold 22px Segoe UI';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 10;
      ctx.fillText('Click or Press Any Key', CONFIG.WIDTH / 2, 555);
    }
    ctx.restore();
  }

  openShop() {
    const f = this.player.floor;
    this.shopItems = [
      { key: '1', name: 'Heal 40%', cost: 10 + f * 5, effect: 'Restore 40% HP', disabled: () => this.player.hp >= this.player.maxHp },
      { key: '2', name: 'Potion', cost: 15 + f * 5, effect: '+1 Potion' },
      { key: '3', name: '+2 ATK', cost: 25 + f * 10, effect: 'Attack +2' },
      { key: '4', name: '+1 DEF', cost: 20 + f * 8, effect: 'Defense +1' },
      { key: '5', name: 'Torch', cost: 10, effect: '40 turns light', disabled: () => this.player.torchTimer > 0 },
      { key: '6', name: '+5 Max HP', cost: 30 + f * 10, effect: '+5 Max HP & heal 5' },
    ];
    this._shopButtonRects = [];
    this.state = 'shop';
  }

  buyShopItem(index) {
    const item = this.shopItems[index];
    if (!item) return;
    if (item.disabled && item.disabled()) return;
    if (this.player.gold < item.cost) return;
    this.player.gold -= item.cost;
    const p = this.player;
    switch (index) {
      case 0: { const heal = Math.round(p.maxHp * 0.4); p.hp = Math.min(p.hp + heal, p.maxHp); this.addLog(`Healed ${heal} HP`, '#44ff88'); break; }
      case 1: { p.potions++; this.addLog('Bought a potion!', '#44ff88'); break; }
      case 2: { p.atk += 2; this.addLog('Attack increased by 2!', '#ff8844'); break; }
      case 3: { p.def += 1; this.addLog('Defense increased by 1!', '#4488ff'); break; }
      case 4: { p.torchRadius = CONFIG.TORCH_RADIUS; p.torchTimer = 40; this.addLog('Bought a torch!', '#ff8844'); break; }
      case 5: { p.maxHp += 5; p.hp = Math.min(p.hp + 5, p.maxHp); this.addLog('Max HP increased by 5!', '#ff88ff'); break; }
    }
  }

  handleShopKey(e) {
    const k = e.key;
    if (k >= '1' && k <= '6') {
      e.preventDefault();
      this.buyShopItem(parseInt(k) - 1);
      return;
    }
    if (k === 'Enter' || k === ' ') {
      e.preventDefault();
      this.generateFloor();
      this.state = 'playing';
    }
  }

  handleShopClick(e) {
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = CONFIG.WIDTH / rect.width;
    const scaleY = CONFIG.HEIGHT / rect.height;
    const cx = (e.clientX - rect.left) * scaleX;
    const cy = (e.clientY - rect.top) * scaleY;

    // Check item buttons
    if (this._shopButtonRects) {
      for (let i = 0; i < this._shopButtonRects.length; i++) {
        const r = this._shopButtonRects[i];
        if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
          this.buyShopItem(i);
          return;
        }
      }
    }
    // Check continue button
    if (this._shopContinueRect) {
      const r = this._shopContinueRect;
      if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
        this.generateFloor();
        this.state = 'playing';
      }
    }
  }

  drawShop(ctx) {
    const W = CONFIG.WIDTH;
    const H = CONFIG.HEIGHT;
    const fs = Math.max(10, Math.floor(W / 50)); // base font scale

    ctx.save();
    // Darken background
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    // Title
    const titleFs = Math.floor(fs * 2.4);
    ctx.font = `bold ${titleFs}px Segoe UI`;
    ctx.fillStyle = '#ffcc44';
    ctx.shadowColor = '#ffcc44';
    ctx.shadowBlur = 15;
    ctx.fillText('SHOP', W / 2, H * 0.09);
    ctx.shadowBlur = 0;

    // Player stats bar
    const p = this.player;
    const statFs = Math.floor(fs * 0.95);
    ctx.font = `${statFs}px Segoe UI`;
    ctx.fillStyle = '#ffd700';
    const statsY = H * 0.14;
    ctx.fillText(`Gold: ${p.gold}   |   HP: ${p.hp}/${p.maxHp}   |   ATK: ${p.totalAtk}   |   DEF: ${p.totalDef}   |   Potions: ${p.potions}   |   Floor: ${p.floor}`, W / 2, statsY);

    // Item cards
    const items = this.shopItems;
    const cols = 3;
    const rows = 2;
    const cardW = Math.floor(W * 0.27);
    const cardH = Math.floor(H * 0.22);
    const gapX = Math.floor(W * 0.03);
    const gapY = Math.floor(H * 0.03);
    const totalW = cols * cardW + (cols - 1) * gapX;
    const startX = (W - totalW) / 2;
    const startY = H * 0.19;

    this._shopButtonRects = [];

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = startX + col * (cardW + gapX);
      const y = startY + row * (cardH + gapY);

      this._shopButtonRects.push({ x, y, w: cardW, h: cardH });

      const cantAfford = p.gold < item.cost;
      const isDisabled = item.disabled && item.disabled();
      const greyed = cantAfford || isDisabled;

      // Card background
      ctx.fillStyle = greyed ? 'rgba(40,40,50,0.85)' : 'rgba(50,45,70,0.9)';
      ctx.strokeStyle = greyed ? '#444' : '#ffcc44';
      ctx.lineWidth = greyed ? 1 : 2;
      const radius = 8;
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + cardW - radius, y);
      ctx.quadraticCurveTo(x + cardW, y, x + cardW, y + radius);
      ctx.lineTo(x + cardW, y + cardH - radius);
      ctx.quadraticCurveTo(x + cardW, y + cardH, x + cardW - radius, y + cardH);
      ctx.lineTo(x + radius, y + cardH);
      ctx.quadraticCurveTo(x, y + cardH, x, y + cardH - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      const cx = x + cardW / 2;

      // Key number
      const keyFs = Math.floor(fs * 1.1);
      ctx.font = `bold ${keyFs}px Segoe UI`;
      ctx.fillStyle = greyed ? '#555' : '#ffcc44';
      ctx.fillText(`[${item.key}]`, cx, y + cardH * 0.2);

      // Name
      const nameFs = Math.floor(fs * 1.2);
      ctx.font = `bold ${nameFs}px Segoe UI`;
      ctx.fillStyle = greyed ? '#666' : '#fff';
      ctx.fillText(item.name, cx, y + cardH * 0.45);

      // Effect
      const effectFs = Math.floor(fs * 0.85);
      ctx.font = `${effectFs}px Segoe UI`;
      ctx.fillStyle = greyed ? '#555' : '#aaa';
      ctx.fillText(item.effect, cx, y + cardH * 0.65);

      // Cost
      const costFs = Math.floor(fs * 1.0);
      ctx.font = `bold ${costFs}px Segoe UI`;
      if (isDisabled) {
        ctx.fillStyle = '#666';
        ctx.fillText(isDisabled ? (i === 0 ? 'Full HP' : 'Active') : `${item.cost}g`, cx, y + cardH * 0.85);
      } else {
        ctx.fillStyle = cantAfford ? '#ff4444' : '#ffd700';
        ctx.fillText(`${item.cost}g`, cx, y + cardH * 0.85);
      }
    }

    // Continue button
    const btnW = Math.floor(W * 0.3);
    const btnH = Math.floor(H * 0.065);
    const btnX = (W - btnW) / 2;
    const btnY = startY + rows * (cardH + gapY) + gapY;
    this._shopContinueRect = { x: btnX, y: btnY, w: btnW, h: btnH };

    const blink = Math.sin(performance.now() / 400) > 0;
    ctx.fillStyle = blink ? 'rgba(255,204,68,0.15)' : 'rgba(255,204,68,0.08)';
    ctx.strokeStyle = '#ffcc44';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 6);
    ctx.fill();
    ctx.stroke();

    const contFs = Math.floor(fs * 1.1);
    ctx.font = `bold ${contFs}px Segoe UI`;
    ctx.fillStyle = '#ffcc44';
    ctx.fillText('Continue [Enter]', W / 2, btnY + btnH * 0.65);

    ctx.restore();
  }

  drawDeathOverlay(ctx) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    ctx.textAlign = 'center';
    ctx.font = 'bold 48px Segoe UI';
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 15;
    ctx.fillText('YOU DIED', CONFIG.WIDTH / 2, 230);
    ctx.shadowBlur = 0;
    ctx.font = '20px Segoe UI';
    ctx.fillStyle = '#ccc';
    ctx.fillText(`Floor ${this.player.floor} | Level ${this.player.level} | Gold: ${this.player.gold}`, CONFIG.WIDTH / 2, 280);
    const blink = Math.sin(performance.now() / 400) > 0;
    if (blink) {
      ctx.font = 'bold 18px Segoe UI';
      ctx.fillStyle = '#aaa';
      ctx.fillText('Click or Press Any Key', CONFIG.WIDTH / 2, 340);
    }
    ctx.restore();
  }

  drawVictoryOverlay(ctx) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    ctx.textAlign = 'center';
    ctx.font = 'bold 48px Segoe UI';
    ctx.fillStyle = '#ffcc44';
    ctx.shadowColor = '#ffcc44';
    ctx.shadowBlur = 20;
    ctx.fillText('ESCAPED!', CONFIG.WIDTH / 2, 220);
    ctx.shadowBlur = 0;
    ctx.font = '22px Segoe UI';
    ctx.fillStyle = '#ccc';
    ctx.fillText('You escaped the crypt alive!', CONFIG.WIDTH / 2, 270);
    ctx.fillText(`Level ${this.player.level} | Gold: ${this.player.gold}`, CONFIG.WIDTH / 2, 305);
    if (this.player.weapon) ctx.fillText(`Weapon: ${this.player.weapon.name}`, CONFIG.WIDTH / 2, 335);
    if (this.player.armor) ctx.fillText(`Armor: ${this.player.armor.name}`, CONFIG.WIDTH / 2, 365);
    const blink = Math.sin(performance.now() / 400) > 0;
    if (blink) {
      ctx.font = 'bold 18px Segoe UI';
      ctx.fillStyle = '#aaa';
      ctx.fillText('Click or Press Any Key', CONFIG.WIDTH / 2, 420);
    }
    ctx.restore();
  }

  loop() {
    const now = performance.now();
    let dt = Math.min((now - this.lastTime) / 1000, 0.05);
    this.lastTime = now;
    this.pipeline.update(dt);
    this.vfx.update(dt);
    this.update(dt);
    this.draw();
    requestAnimationFrame(() => this.loop());
  }
}

});
