happy:function(){p(function(c){for(var i=0;i<3;i++){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=600+i*150;g.gain.value=.06;g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.08+.12);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.08);o.stop(c.currentTime+i*.08+.15)}})},

function getUnlockedAccessories(){
  if(!pet)return[];
  return ACCESSORIES.filter(function(a){
    if(a.unlock==='stage1')return pet.stage>=1;
    if(a.unlock==='stage2')return pet.stage>=2;
    if(a.unlock==='stage3')return pet.stage>=3;
    if(a.unlock==='stage4')return pet.stage>=4;
    if(a.unlock==='xp100')return pet.xp>=100;
    if(a.unlock==='xp300')return pet.xp>=300;
    return false;
  });
}
function getPetAccessories(){
  if(!pet||!pet.traits||!pet.traits.accessories)return[];
  return pet.traits.accessories;
}
function toggleAccessory(id){
  if(!pet)return;
  if(!pet.traits)pet.traits={};
  if(!pet.traits.accessories)pet.traits.accessories=[];
  var idx=pet.traits.accessories.indexOf(id);
  if(idx>=0)pet.traits.accessories.splice(idx,1);
  else pet.traits.accessories.push(id);
  savePetTraits();
}
async function savePetTraits(){
  if(!pet)return;
  await supa('pets?id=eq.'+pet.id,{method:'PATCH',body:{traits:pet.traits}});
}

// ============================================================
// PET DRAWING
// ============================================================
function drawPet(x,y,size,species,c1,c2,pattern,stage,mood){
  var sp=SPECIES.find(function(s){return s.name===species})||SPECIES[0];
  var s=size;
  var bob=Math.sin(anim.bobTimer*2)*s*0.03;
  var blink=anim.blinkTimer<0.15;
  ctx.save();
  ctx.translate(x,y+bob);

  if(stage===0){
    // Egg
    ctx.fillStyle=c1;
    ctx.beginPath();ctx.ellipse(0,0,s*.3,s*.4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c2;
    ctx.beginPath();ctx.ellipse(0,s*.1,s*.25,s*.2,0,0,Math.PI);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(0,0,s*.3,s*.4,0,0,Math.PI*2);ctx.stroke();
    // Crack lines if close to hatching
    if(pet&&pet.xp>30){ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-s*.05,-s*.1);ctx.lineTo(s*.05,-s*.2);ctx.lineTo(-s*.03,-s*.3);ctx.stroke()}
    ctx.restore();return;
  }

  var bodyScale=stage===1?.6:stage===2?.8:stage===3?1:1.1;
  var bs=s*bodyScale;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.1)';
  ctx.beginPath();ctx.ellipse(0,bs*.45,bs*.35,bs*.08,0,0,Math.PI*2);ctx.fill();

  // Body
  if(sp.body==='blob'){ctx.beginPath();ctx.ellipse(0,0,bs*.35,bs*.3,0,0,Math.PI*2)}
  else if(sp.body==='shell'){ctx.beginPath();ctx.ellipse(0,bs*.05,bs*.35,bs*.25,0,0,Math.PI*2)}
  else if(sp.body==='tiny'){ctx.beginPath();ctx.ellipse(0,0,bs*.25,bs*.25,0,0,Math.PI*2)}
  else if(sp.body==='sleek'){ctx.beginPath();ctx.ellipse(0,0,bs*.28,bs*.35,0,0,Math.PI*2)}
  else{ctx.beginPath();ctx.ellipse(0,0,bs*.32,bs*.3,0,0,Math.PI*2)}
  ctx.fillStyle=c1;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1.5;ctx.stroke();

  // Pattern
  if(pattern==='spots'){ctx.fillStyle=c2;for(var i=0;i<5;i++){var a=i*1.3+.5,r=bs*.15;ctx.beginPath();ctx.arc(Math.cos(a)*bs*.18,Math.sin(a)*bs*.15,bs*.05,0,Math.PI*2);ctx.fill()}}
  if(pattern==='stripes'){ctx.strokeStyle=c2;ctx.lineWidth=bs*.04;for(var i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*bs*.1,-bs*.25);ctx.lineTo(i*bs*.1,bs*.25);ctx.stroke()}}

  // Belly highlight
  ctx.fillStyle=c2;ctx.globalAlpha=.4;
  ctx.beginPath();ctx.ellipse(0,bs*.05,bs*.2,bs*.18,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // Ears
  if(sp.ears==='pointed'){ctx.fillStyle=c1;ctx.beginPath();ctx.moveTo(-bs*.2,-bs*.28);ctx.lineTo(-bs*.1,-bs*.45);ctx.lineTo(0,-bs*.28);ctx.fill();ctx.beginPath();ctx.moveTo(0,-bs*.28);ctx.lineTo(bs*.1,-bs*.45);ctx.lineTo(bs*.2,-bs*.28);ctx.fill();ctx.fillStyle=c2;ctx.beginPath();ctx.moveTo(-bs*.15,-bs*.3);ctx.lineTo(-bs*.1,-bs*.4);ctx.lineTo(-bs*.05,-bs*.3);ctx.fill();ctx.beginPath();ctx.moveTo(bs*.05,-bs*.3);ctx.lineTo(bs*.1,-bs*.4);ctx.lineTo(bs*.15,-bs*.3);ctx.fill()}
  if(sp.ears==='floppy'){ctx.fillStyle=c1;ctx.beginPath();ctx.ellipse(-bs*.28,-bs*.12,bs*.1,bs*.2,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(bs*.28,-bs*.12,bs*.1,bs*.2,.3,0,Math.PI*2);ctx.fill()}
  if(sp.ears==='long'){ctx.fillStyle=c1;ctx.beginPath();ctx.ellipse(-bs*.1,-bs*.45,bs*.06,bs*.2,-.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(bs*.1,-bs*.45,bs*.06,bs*.2,.1,0,Math.PI*2);ctx.fill();ctx.fillStyle=c2;ctx.beginPath();ctx.ellipse(-bs*.1,-bs*.43,bs*.035,bs*.15,-.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(bs*.1,-bs*.43,bs*.035,bs*.15,.1,0,Math.PI*2);ctx.fill()}
  if(sp.ears==='round'){ctx.fillStyle=c1;ctx.beginPath();ctx.arc(-bs*.22,-bs*.25,bs*.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bs*.22,-bs*.25,bs*.1,0,Math.PI*2);ctx.fill()}
  if(sp.ears==='horns'){ctx.fillStyle=c2;ctx.beginPath();ctx.moveTo(-bs*.15,-bs*.28);ctx.lineTo(-bs*.2,-bs*.5);ctx.lineTo(-bs*.08,-bs*.3);ctx.fill();ctx.beginPath();ctx.moveTo(bs*.15,-bs*.28);ctx.lineTo(bs*.2,-bs*.5);ctx.lineTo(bs*.08,-bs*.3);ctx.fill()}
  if(sp.ears==='frills'){ctx.fillStyle=c2;for(var i=-2;i<=2;i++){ctx.beginPath();ctx.arc(i*bs*.08,-bs*.32,bs*.06,0,Math.PI*2);ctx.fill()}}
  if(sp.ears==='crest'){ctx.fillStyle=c2;ctx.beginPath();ctx.moveTo(0,-bs*.28);ctx.lineTo(bs*.05,-bs*.5);ctx.lineTo(bs*.1,-bs*.35);ctx.lineTo(bs*.15,-bs*.48);ctx.lineTo(bs*.12,-bs*.28);ctx.fill()}
  if(sp.ears==='tufts'){ctx.fillStyle=c1;ctx.beginPath();ctx.moveTo(-bs*.2,-bs*.25);ctx.lineTo(-bs*.25,-bs*.42);ctx.lineTo(-bs*.12,-bs*.35);ctx.fill();ctx.beginPath();ctx.moveTo(bs*.2,-bs*.25);ctx.lineTo(bs*.25,-bs*.42);ctx.lineTo(bs*.12,-bs*.35);ctx.fill()}

  // Eyes
  var eyeY=-bs*.08;
  if(blink){ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-bs*.12,eyeY);ctx.lineTo(-bs*.06,eyeY);ctx.stroke();ctx.beginPath();ctx.moveTo(bs*.06,eyeY);ctx.lineTo(bs*.12,eyeY);ctx.stroke()}
  else{ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-bs*.09,eyeY,bs*.04,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bs*.09,eyeY,bs*.04,0,Math.PI*2);ctx.fill();
    // Eye highlights
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-bs*.08,eyeY-bs*.015,bs*.015,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(bs*.1,eyeY-bs*.015,bs*.015,0,Math.PI*2);ctx.fill()}

  // Mouth
  if(mood==='happy'){ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,bs*.02,bs*.06,0.1,Math.PI-.1);ctx.stroke()}
  else if(mood==='sad'){ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,bs*.1,bs*.06,Math.PI+.1,-.1);ctx.stroke()}
  else{ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,bs*.04,bs*.03,bs*.015,0,0,Math.PI*2);ctx.fill()}

  // Cheeks
  ctx.fillStyle='rgba(255,150,150,.25)';
  ctx.beginPath();ctx.ellipse(-bs*.18,bs*.02,bs*.06,bs*.04,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bs*.18,bs*.02,bs*.06,bs*.04,0,0,Math.PI*2);ctx.fill();

  // Tail
  if(sp.tail==='curved'){ctx.strokeStyle=c1;ctx.lineWidth=bs*.06;ctx.beginPath();ctx.moveTo(bs*.3,bs*.1);ctx.quadraticCurveTo(bs*.45,0,bs*.4,-bs*.15);ctx.stroke()}
  if(sp.tail==='bushy'){ctx.fillStyle=c1;ctx.beginPath();ctx.ellipse(bs*.35,bs*.05,bs*.12,bs*.1,.3,0,Math.PI*2);ctx.fill();ctx.fillStyle=c2;ctx.beginPath();ctx.ellipse(bs*.38,bs*.03,bs*.06,bs*.05,.3,0,Math.PI*2);ctx.fill()}
  if(sp.tail==='spiked'){ctx.fillStyle=c1;ctx.beginPath();ctx.moveTo(bs*.28,bs*.15);ctx.lineTo(bs*.45,bs*.05);ctx.lineTo(bs*.42,bs*.15);ctx.lineTo(bs*.5,bs*.1);ctx.lineTo(bs*.3,bs*.2);ctx.fill()}
  if(sp.tail==='flame'){ctx.fillStyle='#ff4400';ctx.beginPath();ctx.moveTo(bs*.28,bs*.1);ctx.quadraticCurveTo(bs*.5,0,bs*.35,-bs*.15);ctx.quadraticCurveTo(bs*.55,-bs*.05,bs*.45,bs*.1);ctx.fill();ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.moveTo(bs*.3,bs*.08);ctx.quadraticCurveTo(bs*.42,0,bs*.35,-bs*.05);ctx.fill()}
  if(sp.tail==='flowing'){ctx.strokeStyle=c2;ctx.lineWidth=bs*.04;ctx.beginPath();ctx.moveTo(bs*.28,bs*.1);ctx.bezierCurveTo(bs*.4,0,bs*.35,-bs*.2,bs*.5,-bs*.15);ctx.stroke()}
  if(sp.tail==='puff'){ctx.fillStyle=c2;ctx.beginPath();ctx.arc(bs*.32,bs*.15,bs*.06,0,Math.PI*2);ctx.fill()}
  if(sp.tail==='multi'){for(var i=0;i<3;i++){ctx.strokeStyle=c1;ctx.lineWidth=bs*.03;ctx.beginPath();ctx.moveTo(bs*.28,bs*.1);ctx.quadraticCurveTo(bs*.45,bs*(.05-i*.1),bs*.5,bs*(-.05-i*.08));ctx.stroke()}}

  // Stage decorations
  if(stage>=3){
    // Crown/accessory for adults
    ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.moveTo(-bs*.08,-bs*.32);ctx.lineTo(-bs*.05,-bs*.42);ctx.lineTo(0,-bs*.35);ctx.lineTo(bs*.05,-bs*.42);ctx.lineTo(bs*.08,-bs*.32);ctx.fill();
  }
  if(stage>=4){
    // Sparkle for elders
    ctx.fillStyle='rgba(255,255,200,.5)';
    for(var i=0;i<4;i++){var a=anim.sparkleTimer+i*1.5,r=bs*.45;ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r-bs*.1,bs*.02,0,Math.PI*2);ctx.fill()}
  }

  // Feet
  ctx.fillStyle=c1;
  ctx.beginPath();ctx.ellipse(-bs*.15,bs*.3,bs*.08,bs*.04,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bs*.15,bs*.3,bs*.08,bs*.04,0,0,Math.PI*2);ctx.fill();

  // ACCESSORIES (drawn on pet)
  if(pet&&pet.traits&&pet.traits.accessories&&stage>0){
    var acc=pet.traits.accessories;
    var headY=-bs*.32;
    // Bow
    if(acc.indexOf('bow')>=0){ctx.font=Math.round(bs*.2)+'px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🎀',-bs*.15,headY-bs*.12)}
    // Top Hat
    if(acc.indexOf('tophat')>=0){ctx.font=Math.round(bs*.25)+'px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🎩',0,headY-bs*.15)}
    // Crown (replaces stage decoration)
    if(acc.indexOf('crown')>=0){ctx.font=Math.round(bs*.22)+'px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👑',0,headY-bs*.12)}
    // Sunglasses
    if(acc.indexOf('sunglasses')>=0){ctx.font=Math.round(bs*.18)+'px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🕶️',0,-bs*.08)}
    // Scarf
    if(acc.indexOf('scarf')>=0){ctx.font=Math.round(bs*.18)+'px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🧣',0,bs*.18)}
    // Sparkle Aura
    if(acc.indexOf('sparkle')>=0){
      ctx.fillStyle='rgba(255,220,80,.6)';
      for(var si=0;si<8;si++){var sa=anim.sparkleTimer*1.5+si*Math.PI*.25,sr=bs*.5;ctx.beginPath();ctx.arc(Math.cos(sa)*sr,Math.sin(sa)*sr-bs*.05,bs*.025,0,Math.PI*2);ctx.fill()}
    }
  }

  ctx.restore();

  // Emotion particles
  if(mood==='happy'&&anim.heartTimer>0){
    ctx.fillStyle='#ff6688';ctx.font=Math.round(s*.15)+'px Segoe UI';ctx.textAlign='center';
    ctx.globalAlpha=anim.heartTimer;ctx.fillText('♥',x,y-s*.5-anim.heartTimer*20);ctx.globalAlpha=1;
  }

    ctx.fillText('z',x+s*.2,y-s*.4);ctx.fillText('Z',x+s*.3,y-s*.5);ctx.globalAlpha=1;
  }
}

function getMood(){
  if(!pet)return'neutral';
  if(pet.happiness>70&&pet.hunger>50)return'happy';
  if(pet.energy<20)return'sleepy';
  if(pet.happiness<30||pet.hunger<20)return'sad';

}

function drawBar(x,y,w,h,val,max,color){

function makeBtn(label,x,y,w,h,color,cb){buttons.push({label:label,x:x,y:y,w:w,h:h,color:color,cb:cb})}

    ctx.fillStyle='#fff';ctx.font='bold '+Math.round(b.h*.4)+'px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';

async function adoptPet(speciesIdx,colorIdx){
  screen='loading';
  var sp=SPECIES[speciesIdx];
  var hash=await getHash();
  var code=await supaRpc('gen_pet_code',{});
  var name=prompt('Name your '+sp.name+':');
  if(!name)name=sp.name;
  name=name.trim().slice(0,12);
  var pattern=PATTERNS[Math.floor(Math.random()*PATTERNS.length)];
  var trait1=TRAITS[Math.floor(Math.random()*TRAITS.length)];
  var trait2=TRAITS[Math.floor(Math.random()*TRAITS.length)];
  var data={pet_code:code,owner_hash:hash,name:name,species:sp.name,variant:colorIdx,
    color1:sp.colors[colorIdx][0],color2:sp.colors[colorIdx][1],pattern:pattern,
    stage:0,xp:0,happiness:100,hunger:100,energy:100,traits:{t1:trait1,t2:trait2}};
  var result=await supa('pets',{method:'POST',prefer:'return=representation',body:data});
  if(result&&result.length>0){pet=result[0];localStorage.setItem('pet_code',pet.pet_code);screen='pet';SFX.happy()}
  else{alert('Error creating pet. Try again.');screen='menu'}
}

async function loadPetByCode(code){
  screen='loading';
  var data=await supa('pets?pet_code=eq.'+encodeURIComponent(code)+'&limit=1');
  if(data&&data.length>0){pet=data[0];localStorage.setItem('pet_code',pet.pet_code);processOfflineTime();screen='pet';SFX.happy()}
  else{alert('Pet not found. Check your code.');screen='menu'}
}

function processOfflineTime(){
  if(!pet)return;
  var now=new Date();var last=new Date(pet.last_checked);
  var hours=Math.max(0,(now-last)/3600000);
  if(hours<0.01)return;
  // Hunger decays ~10 per hour, happiness ~5 per hour, energy recovers ~20 per hour
  pet.hunger=Math.max(0,pet.hunger-Math.round(hours*10));
  pet.happiness=Math.max(0,pet.happiness-Math.round(hours*5));
  pet.energy=Math.min(100,pet.energy+Math.round(hours*20));
  // XP from just existing (1 per hour)
  pet.xp+=Math.round(hours);
  checkEvolution();
  anim.actionMsg='You were away '+Math.round(hours)+'h';anim.actionTimer=3;
  savePet();
}

function checkEvolution(){
  if(!pet)return;
  var newStage=0;
  for(var i=STAGE_XP.length-1;i>=0;i--){if(pet.xp>=STAGE_XP[i]){newStage=i;break}}
  if(newStage>pet.stage){pet.stage=newStage;anim.actionMsg=pet.name+' evolved to '+STAGE_NAMES[newStage]+'!';anim.actionTimer=4;SFX.evolve()}
}

async function savePet(){
  if(!pet)return;
  await supa('pets?id=eq.'+pet.id,{method:'PATCH',body:{
    happiness:pet.happiness,hunger:pet.hunger,energy:pet.energy,xp:pet.xp,stage:pet.stage,
    traits:pet.traits,last_checked:new Date().toISOString()}});
}

function doAction(action){
  if(!pet||pet.stage===0&&action!=='wait')return;
  if(action==='feed'){
    if(pet.hunger>=100){anim.actionMsg='Not hungry!';anim.actionTimer=1.5;return}
    startMinigame('feed');
  }else if(action==='play'){
    if(pet.energy<10){anim.actionMsg='Too tired!';anim.actionTimer=1.5;SFX.sad();return}
    startMinigame('play');
  }else if(action==='train'){
    if(pet.energy<20){anim.actionMsg='Too tired!';anim.actionTimer=1.5;SFX.sad();return}
    startMinigame('train');
  }else if(action==='sleep'){
    startMinigame('sleep');
  }else if(action==='wait'){
    if(pet.stage===0&&pet.xp>=STAGE_XP[1]){pet.stage=1;anim.actionMsg=pet.name+' hatched!';anim.actionTimer=3;SFX.evolve()}
    else{pet.xp+=5;anim.actionMsg='Warming the egg...';anim.actionTimer=1.5;SFX.click()}
    checkEvolution();savePet();
  }
}

function startMinigame(type){
  mg.active=true;mg.type=type;mg.timer=10;mg.score=0;mg.done=false;
  if(type==='feed'){mg.foods=[];mg.misses=0;mg.spawnTimer=0}
  if(type==='play'){mg.bubbles=[];mg.bubbleId=0;mg.popScore=0;mg.popXp=0}
  if(type==='train'){
    mg.simonRound=0;mg.simonLen=3;mg.simonSeq=[];mg.simonInput=[];mg.simonPhase='show';mg.simonShowIdx=0;mg.simonShowTimer=0;mg.simonFlash=-1;
    generateSimonSeq(3);
  }
  if(type==='sleep'){mg.sleepTimer=3;mg.timer=3}
  screen='minigame';
}

function generateSimonSeq(len){
  mg.simonSeq=[];for(var i=0;i<len;i++)mg.simonSeq.push(Math.floor(Math.random()*5));
  mg.simonInput=[];mg.simonPhase='show';mg.simonShowIdx=0;mg.simonShowTimer=0;mg.simonFlash=-1;
}

function endMinigame(){
  mg.active=false;mg.done=true;
  if(mg.type==='feed'){
    pet.hunger=Math.min(100,pet.hunger+mg.score*5);
    pet.happiness=Math.min(100,pet.happiness+mg.score*2);
    pet.xp+=Math.max(3,mg.score);
    anim.actionMsg='Caught '+mg.score+' foods!';anim.actionTimer=2;SFX.eat();
  }else if(mg.type==='play'){
    pet.happiness=Math.min(100,pet.happiness+mg.popScore);
    pet.xp+=mg.popXp;
    pet.energy=Math.max(0,pet.energy-15);pet.hunger=Math.max(0,pet.hunger-10);
    anim.actionMsg='Popped '+mg.score+' bubbles!';anim.actionTimer=2;SFX.happy();anim.heartTimer=1;
  }else if(mg.type==='train'){
    var xpGain=mg.simonRound*20;
    var hapGain=mg.simonRound*5;
    pet.xp+=xpGain;pet.happiness=Math.min(100,pet.happiness+hapGain);
    pet.energy=Math.max(0,pet.energy-25);pet.hunger=Math.max(0,pet.hunger-15);
    anim.actionMsg='Completed '+mg.simonRound+' rounds! +'+xpGain+' XP';anim.actionTimer=2;SFX.happy();
  }else if(mg.type==='sleep'){
    pet.energy=Math.min(100,pet.energy+40);pet.xp+=3;
    anim.actionMsg='Feeling refreshed!';anim.actionTimer=2;SFX.click();
  }
  checkEvolution();savePet();screen='pet';
}

function updateMinigame(dt){
  if(!mg.active)return;
  mg.timer-=dt;
  if(mg.timer<=0){endMinigame();return}

  if(mg.type==='feed'){
    mg.spawnTimer-=dt;
    if(mg.spawnTimer<=0){
      mg.spawnTimer=0.6+Math.random()*0.6;
      mg.foods.push({x:CW*.1+Math.random()*CW*.8,y:-30,emoji:mg.foodEmojis[Math.floor(Math.random()*5)],alive:true});
    }
    for(var i=mg.foods.length-1;i>=0;i--){
      mg.foods[i].y+=dt*220;
      if(mg.foods[i].y>CH*.85&&mg.foods[i].alive){mg.foods[i].alive=false;mg.misses++;if(mg.misses>=3){endMinigame();return}}
    }
    mg.foods=mg.foods.filter(function(f){return f.y<CH});
  }

  if(mg.type==='play'){
    // Spawn bubbles
    if(Math.random()<dt*2.5){
      mg.bubbleId++;
      mg.bubbles.push({id:mg.bubbleId,x:CW*.1+Math.random()*CW*.8,y:CH*.15+Math.random()*CH*.55,r:20+Math.random()*25,life:2,color:'hsl('+Math.floor(Math.random()*360)+',70%,60%)'});
    }
    for(var i=mg.bubbles.length-1;i>=0;i--){
      mg.bubbles[i].life-=dt;
      if(mg.bubbles[i].life<=0)mg.bubbles.splice(i,1);
    }
  }

  if(mg.type==='train'){
    if(mg.simonPhase==='show'){
      mg.simonShowTimer+=dt;
      if(mg.simonShowTimer>=0.6){
        mg.simonShowTimer=0;mg.simonShowIdx++;
        if(mg.simonShowIdx>mg.simonSeq.length){mg.simonPhase='input';mg.simonFlash=-1}
      }
    }
    if(mg.simonFlash>=0){mg.simonShowTimer+=dt;if(mg.simonShowTimer>.2){mg.simonFlash=-1}}
  }

  if(mg.type==='sleep'){
    if(mg.timer<=0)endMinigame();
  }
}

function drawMinigame(){
  buttons=[];
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,CW,CH);

      // Shine
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(b.x-b.r*.25,b.y-b.r*.25,b.r*.3,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  }

  if(mg.type==='train'){
    ctx.font='bold '+fs+'px Segoe UI';ctx.textAlign='center';ctx.fillStyle='#fff';
    ctx.fillText('Simon Says!',CW/2,CH*.1);
    ctx.font=Math.round(fs*.5)+'px Segoe UI';ctx.fillStyle='#aaa';
    ctx.fillText('Round '+(mg.simonRound+1)+'/3  '+((mg.simonPhase==='show')?'Watch...':'Your turn!'),CW/2,CH*.15);
    // Draw 5 colored squares
    var sqSize=CW*.13,sqGap=CW*.03;
    var totalW=5*sqSize+4*sqGap;
    var sqStartX=(CW-totalW)/2;

      ctx.fillRect(sx,sqY,sqSize,sqSize);
      ctx.strokeStyle=mg.simonColors[i];ctx.lineWidth=2;ctx.strokeRect(sx,sqY,sqSize,sqSize);
      // Make clickable in input phase
      if(mg.simonPhase==='input'){
        (function(idx,bx,by,bsz){
          makeBtn('',bx,by,bsz,bsz,'transparent',function(){handleSimonTap(idx)});
        })(i,sx,sqY,sqSize);

      ctx.fillText(mg.simonInput.length+'/'+mg.simonSeq.length,CW/2,sqY+sqSize+CH*.06);
    }

  if(mg.type==='sleep'){

      ctx.fillText('Z',CW/2+40+i*20,zy);

  // Cancel button (except sleep)
  if(mg.type!=='sleep'){
    makeBtn('✕ Cancel',CW/2-CW*.1,CH*.92,CW*.2,CH*.05,'#664444',function(){mg.active=false;screen='pet'});
  }

function handleMinigameClick(mx,my){
  if(!mg.active)return false;

  if(mg.type==='feed'){
    for(var i=mg.foods.length-1;i>=0;i--){
      var f=mg.foods[i];
      if(f.alive&&Math.abs(mx-f.x)<30&&Math.abs(my-f.y)<30){
        f.alive=false;mg.score++;SFX.eat();return true;
      }
    }
    return true;
  }

  if(mg.type==='play'){
    for(var i=mg.bubbles.length-1;i>=0;i--){
      var b=mg.bubbles[i];
      var dx=mx-b.x,dy=my-b.y;
      if(dx*dx+dy*dy<b.r*b.r){
        mg.bubbles.splice(i,1);mg.score++;mg.popScore+=3;mg.popXp+=5;SFX.happy();return true;
      }
    }
    return true;
  }

  // Train clicks handled by buttons
  return false;
}

function handleSimonTap(idx){
  if(mg.simonPhase!=='input')return;
  mg.simonFlash=idx;mg.simonShowTimer=0;SFX.click();
  mg.simonInput.push(idx);
  // Check
  var ci=mg.simonInput.length-1;
  if(mg.simonInput[ci]!==mg.simonSeq[ci]){
    // Wrong - restart same sequence
    mg.simonInput=[];mg.simonPhase='show';mg.simonShowIdx=0;mg.simonShowTimer=0;mg.simonFlash=-1;
    SFX.sad();return;
  }
  if(mg.simonInput.length===mg.simonSeq.length){
    // Completed round
    mg.simonRound++;SFX.happy();
    if(mg.simonRound>=3){endMinigame();return}
    mg.simonLen=3+mg.simonRound;
    generateSimonSeq(mg.simonLen);
  }
}

  // Draw pet
  var mood=getMood();
  drawPet(CW/2,CH*.35,CW*.5,pet.species,pet.color1,pet.color2,pet.pattern,pet.stage,mood);
  // Action message
  if(anim.actionTimer>0){ctx.font='bold '+Math.round(fs*.6)+'px Segoe UI';ctx.textAlign='center';ctx.fillStyle='#ffcc44';ctx.globalAlpha=Math.min(1,anim.actionTimer*2);ctx.fillText(anim.actionMsg,CW/2,CH*.52);ctx.globalAlpha=1}
  // Stats
  var barW=CW*.35,barH=CH*.02,barX=CW/2-barW/2,barY=CH*.56;
  ctx.font=Math.round(fs*.35)+'px Segoe UI';ctx.textAlign='right';ctx.fillStyle='#ccc';
  ctx.fillText('Hunger',barX-5,barY+barH);drawBar(barX,barY,barW,barH,pet.hunger,100,'#44aa44');barY+=CH*.04;
  ctx.fillText('Happy',barX-5,barY+barH);drawBar(barX,barY,barW,barH,pet.happiness,100,'#ffaa44');barY+=CH*.04;
  ctx.fillText('Energy',barX-5,barY+barH);drawBar(barX,barY,barW,barH,pet.energy,100,'#4488ff');barY+=CH*.04;
  // XP bar
  var nextXp=STAGE_XP[Math.min(pet.stage+1,STAGE_XP.length-1)];var prevXp=STAGE_XP[pet.stage];
  var xpPct=nextXp>prevXp?(pet.xp-prevXp)/(nextXp-prevXp):1;
  ctx.fillText('XP',barX-5,barY+barH);drawBar(barX,barY,barW,barH,xpPct,1,'#aa44ff');
  ctx.textAlign='left';ctx.fillStyle='#888';ctx.fillText(pet.xp+'/'+nextXp,barX+barW+5,barY+barH);
  // Action buttons
  var bw=CW*.2,bh=CH*.06,by=CH*.78,gap=CW*.03;
  if(pet.stage===0){
    makeBtn('🥚 Warm Egg',CW/2-bw/2,by,bw,bh,'#886644',function(){doAction('wait')});
  }else{
    var startX=CW/2-((bw*4+gap*3)/2);
    makeBtn('🍖 Feed',startX,by,bw,bh,'#448844',function(){doAction('feed')});
    makeBtn('🎾 Play',startX+bw+gap,by,bw,bh,'#886644',function(){doAction('play')});
    makeBtn('💪 Train',startX+(bw+gap)*2,by,bw,bh,'#664488',function(){doAction('train')});
    makeBtn('💤 Sleep',startX+(bw+gap)*3,by,bw,bh,'#446688',function(){doAction('sleep')});
  }
  if(pet.stage>0){makeBtn('🎁 Dress Up',CW/2-CW*.25,CH*.88,CW*.2,bh*.7,'#885588',function(){screen='dressup'})}
  makeBtn('🏠 Menu',CW/2+CW*.05,CH*.88,CW*.2,bh*.7,'#444',function(){screen='menu'});
  ctx.font=Math.round(fs*.25)+'px Segoe UI';ctx.textAlign='center';ctx.fillStyle='#555';
  ctx.fillText('M: mute',CW/2,CH*.96);
  drawButtons();
}

function drawDressUpScreen(){
  buttons=[];
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,CW,CH);
  if(!pet)return;
  var fs=Math.round(CW*.05);
  ctx.font='bold '+fs+'px Segoe UI';ctx.textAlign='center';ctx.fillStyle='#ffaa44';
  ctx.fillText('Dress Up '+pet.name,CW/2,CH*.07);
  // Draw pet with current accessories
  var mood=getMood();
  drawPet(CW/2,CH*.28,CW*.45,pet.species,pet.color1,pet.color2,pet.pattern,pet.stage,mood);
  // Accessory list
  var unlocked=getUnlockedAccessories();
  var equipped=getPetAccessories();
  var ay=CH*.48;var ah=CH*.055;var aw=CW*.7;
  ctx.font=Math.round(fs*.4)+'px Segoe UI';ctx.textAlign='center';ctx.fillStyle='#888';
  ctx.fillText('Tap to equip/unequip',CW/2,ay-10);
  for(var i=0;i<ACCESSORIES.length;i++){
    var a=ACCESSORIES[i];
    var isUnlocked=unlocked.indexOf(a)>=0;
    var isEquipped=equipped.indexOf(a.id)>=0;
    var bx=CW/2-aw/2,by=ay+i*(ah+6);
    if(isUnlocked){
      var col=isEquipped?'#446644':'#444455';
      makeBtn((isEquipped?'✓ ':'')+a.name,bx,by,aw,ah,col,function(aid){return function(){toggleAccessory(aid);SFX.click()}}(a.id));
    }else{
      ctx.fillStyle='#333';ctx.fillRect(bx,by,aw,ah);
      ctx.font=Math.round(ah*.4)+'px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#666';
      var req=a.unlock.replace('stage','Stage ').replace('xp','XP: ');
      ctx.fillText('🔒 '+a.name+' ('+req+')',bx+aw/2,by+ah/2);
    }
  }
  var bh=CH*.06;
  makeBtn('← Back',CW/2-CW*.15,CH*.92,CW*.3,bh*.7,'#555',function(){screen='pet'});
  drawButtons();
}

// ============================================================
// INPUT
// ============================================================
canvas.addEventListener('click',function(e){
  var rect=canvas.getBoundingClientRect();
  var mx=(e.clientX-rect.left)*(CW/rect.width);
  var my=(e.clientY-rect.top)*(CH/rect.height);
  // Route to minigame click handler first
  if(screen==='minigame'&&mg.active){
    // Check buttons first (for simon + cancel)
    for(var i=0;i<buttons.length;i++){var b=buttons[i];if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){b.cb();return}}
    if(handleMinigameClick(mx,my))return;
  }
  for(var i=0;i<buttons.length;i++){var b=buttons[i];if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){b.cb();return}}
});
document.addEventListener('keydown',function(e){if(e.key==='m'||e.key==='M')SFX.muted=!SFX.muted});

// ============================================================
// INIT — check for saved pet
// ============================================================
(async function(){
  var saved=localStorage.getItem('pet_code');
  if(saved){await loadPetByCode(saved)}
  else{screen='menu'}
})();

// ============================================================
// GAME LOOP
// ============================================================
var _lt=performance.now();
function loop(){
  var now=performance.now(),dt=Math.min((now-_lt)/1000,.05);_lt=now;
  anim.bobTimer+=dt;anim.sparkleTimer+=dt;anim.zzTimer+=dt;
  anim.blinkTimer+=dt;if(anim.blinkTimer>3)anim.blinkTimer=0;
  if(anim.heartTimer>0)anim.heartTimer-=dt;
  if(anim.actionTimer>0)anim.actionTimer-=dt;
  if(screen==='minigame')updateMinigame(dt);
  if(screen==='loading'){ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,CW,CH);ctx.font='20px Segoe UI';ctx.textAlign='center';ctx.fillStyle='#aaa';ctx.fillText('Loading...',CW/2,CH/2)}
  else if(screen==='menu')drawMenuScreen();
  else if(screen==='choose')drawChooseScreen();
  else if(screen==='pet')drawPetScreen();
  else if(screen==='minigame')drawMinigame();
  else if(screen==='dressup')drawDressUpScreen();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

</script>
