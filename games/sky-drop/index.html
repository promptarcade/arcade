<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sky Drop — LCD Classic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;touch-action:none;background:#1a1a2e;width:100%;height:100%}
body{display:flex;justify-content:center;align-items:center;font-family:'Courier New',monospace}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="C"></canvas>
<script>
'use strict';
// ═══════════════════════════════════════════════════════
// SKY DROP — Game & Watch "Parachute" LCD Recreation
// ═══════════════════════════════════════════════════════

// Supabase
var _SU='https://ivhpqkqnfqcgrfrsvszf.supabase.co',_SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2aHBxa3FuZnFjZ3JmcnN2c3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTg1NjYsImV4cCI6MjA4OTM5NDU2Nn0.x3X_0dbhw3Qz7sgQAgpSoSu382ckB2uYxCJGe7_vDCM';
async function submitScore(g,s){var n=prompt('Score: '+s+'! Enter initials (max 5):');if(!n)return;n=n.trim().slice(0,5).toUpperCase();if(!n)return;try{await fetch(_SU+'/rest/v1/high_scores',{method:'POST',headers:{'apikey':_SK,'Authorization':'Bearer '+_SK,'Content-Type':'application/json'},body:JSON.stringify({game:g,initials:n,score:s})})}catch(e){}}

var canvas = document.getElementById('C');
var ctx = canvas.getContext('2d');

// ── AUDIO ──
var audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function beep(freq, dur, vol) {
  if (!audioCtx) return;
  var o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'square'; o.frequency.value = freq;
  g.gain.value = vol || 0.1;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxTick()  { beep(120, 0.03, 0.06); }
function sfxCatch() { beep(880, 0.08, 0.12); setTimeout(function(){beep(1100,0.06,0.1);},60); }
function sfxSplash(){ beep(100, 0.2, 0.15); setTimeout(function(){beep(60,0.3,0.12);},100); }
function sfxGameOver() {
  [300,250,200,150,100].forEach(function(f,i){
    setTimeout(function(){ beep(f, 0.2, 0.12); }, i*180);
  });
}

// ── COLOURS ──
var LCD_BG    = '#9aad86';
var LCD_GHOST = '#889a75';
var LCD_ON    = '#1a2a12';
var LCD_STRUCT= '#708060';

// ── LAYOUT ──
var D = {}, S = {}; // device & screen bounds
var btnLeftRect, btnRightRect;

function calcLayout() {
  var vw = window.innerWidth, vh = window.innerHeight;
  canvas.width = vw; canvas.height = vh;
  // Landscape device, 5:3 ratio
  var aspect = 5/3;
  D.w = vw * 0.94; D.h = D.w / aspect;
  if (D.h > vh * 0.94) { D.h = vh * 0.94; D.w = D.h * aspect; }
  D.x = (vw - D.w) / 2; D.y = (vh - D.h) / 2;
  // Screen: big — 85% wide, 68% tall
  S.w = D.w * 0.85; S.h = D.h * 0.68;
  S.x = D.x + (D.w - S.w) / 2; S.y = D.y + D.h * 0.08;
}

// ── GAME STATE ──
var score, hiScore, misses, boatPos;
var troopers, splashes;
var tickRate, accumulator, spawnTimer, spawnInterval, maxActive;
var rotorFrame, sharkFrame;
var state, scoreSubmitted;

function loadHi() { try { hiScore = parseInt(localStorage.getItem('skydrop_hi')) || 0; } catch(e) { hiScore = 0; } }
function saveHi() { try { localStorage.setItem('skydrop_hi', score); } catch(e) {} }

function initGame() {
  score = 0; misses = 0; boatPos = 1;
  troopers = []; splashes = [];
  tickRate = 700; accumulator = 0;
  spawnTimer = 0; spawnInterval = 3; maxActive = 1;
  rotorFrame = 0; sharkFrame = 0;
  state = 'title'; scoreSubmitted = false;
}

function startGame() { initGame(); state = 'play'; }

// ── GAME LOGIC ──
function gameTick() {
  if (state !== 'play') return;
  rotorFrame = 1 - rotorFrame;
  sharkFrame = 1 - sharkFrame;

  // Advance troopers
  for (var i = troopers.length - 1; i >= 0; i--) {
    troopers[i].row++;
    if (troopers[i].row > 3) {
      if (boatPos === troopers[i].col) {
        score++; sfxCatch(); troopers.splice(i, 1); updateDifficulty();
      } else {
        misses++; splashes.push({ col: troopers[i].col, timer: 3 });
        troopers.splice(i, 1); sfxSplash();
        if (misses >= 3) {
          state = 'over';
          if (score > hiScore) { hiScore = score; saveHi(); }
          if (score > 0 && !scoreSubmitted) { scoreSubmitted = true; submitScore('sky-drop', score); }
          sfxGameOver(); return;
        }
      }
    }
  }

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval && troopers.length < maxActive) {
    spawnTimer = 0;
    var col = Math.floor(Math.random() * 3);
    var att = 0;
    while (att < 5 && troopers.some(function(t){ return t.col === col && t.row <= 0; })) { col = Math.floor(Math.random()*3); att++; }
    troopers.push({ col: col, row: 0 }); sfxTick();
  }

  // Decay splashes
  for (var j = splashes.length - 1; j >= 0; j--) {
    splashes[j].timer--;
    if (splashes[j].timer <= 0) splashes.splice(j, 1);
  }
}

function updateDifficulty() {
  if      (score >= 40) { tickRate = 250; maxActive = 3; spawnInterval = 1; }
  else if (score >= 25) { tickRate = 320; maxActive = 3; spawnInterval = 2; }
  else if (score >= 15) { tickRate = 400; maxActive = 2; spawnInterval = 2; }
  else if (score >= 8)  { tickRate = 500; maxActive = 2; spawnInterval = 2; }
  else if (score >= 4)  { tickRate = 600; maxActive = 1; spawnInterval = 2; }
}

// ── INPUT ──
function moveLeft()  { if (state === 'play' && boatPos > 0) boatPos--; }
function moveRight() { if (state === 'play' && boatPos < 2) boatPos++; }
function doStart()   { initAudio(); if (state !== 'play') startGame(); }

window.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault(); moveLeft(); }
  if (e.key === 'ArrowRight'|| e.key === 'd') { e.preventDefault(); moveRight(); }
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); doStart(); }
});

function hitTest(x, y) {
  if (state !== 'play') { doStart(); return; }
  if (btnLeftRect && x >= btnLeftRect.x && x <= btnLeftRect.x+btnLeftRect.w &&
      y >= btnLeftRect.y && y <= btnLeftRect.y+btnLeftRect.h) { moveLeft(); return; }
  if (btnRightRect && x >= btnRightRect.x && x <= btnRightRect.x+btnRightRect.w &&
      y >= btnRightRect.y && y <= btnRightRect.y+btnRightRect.h) { moveRight(); return; }
  if (x < canvas.width / 2) moveLeft(); else moveRight();
}
canvas.addEventListener('mousedown', function(e) { hitTest(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.touches.length; i++) hitTest(e.touches[i].clientX, e.touches[i].clientY);
}, { passive: false });

// ═══════════════════════════════════════════════════════
// DRAWING — filled LCD silhouettes, no stroked lines
// ═══════════════════════════════════════════════════════

// 7-segment digit
var SEGS = [0x7E,0x30,0x6D,0x79,0x33,0x5B,0x5F,0x70,0x7F,0x7B];
function draw7Seg(cx, cy, h, val, col) {
  var w = h*0.55, t = h*0.09, g = h*0.04;
  ctx.fillStyle = col;
  var s = SEGS[val] || 0;
  if(s&0x40) ctx.fillRect(cx-w/2+g, cy-h/2, w-g*2, t);
  if(s&0x20) ctx.fillRect(cx+w/2-t, cy-h/2+g, t, h/2-g*2);
  if(s&0x10) ctx.fillRect(cx+w/2-t, cy+g, t, h/2-g*2);
  if(s&0x08) ctx.fillRect(cx-w/2+g, cy+h/2-t, w-g*2, t);
  if(s&0x04) ctx.fillRect(cx-w/2, cy+g, t, h/2-g*2);
  if(s&0x02) ctx.fillRect(cx-w/2, cy-h/2+g, t, h/2-g*2);
  if(s&0x01) ctx.fillRect(cx-w/2+g, cy-t/2, w-g*2, t);
}

function drawScore(x, y, h, val) {
  var ds = [Math.floor(val/100)%10, Math.floor(val/10)%10, val%10], dw = h*0.7;
  for (var i = 0; i < 3; i++) {
    draw7Seg(x+i*dw, y, h, 8, LCD_GHOST);
    draw7Seg(x+i*dw, y, h, ds[i], LCD_ON);
  }
}

function drawMissMarks(x, y, sz) {
  for (var i = 0; i < 3; i++) {
    var mx = x + i * sz * 1.5;
    var col = (i < misses && state !== 'title') ? LCD_ON : LCD_GHOST;
    ctx.fillStyle = col;
    ctx.save(); ctx.translate(mx, y); ctx.rotate(Math.PI/4);
    ctx.fillRect(-sz*0.4, -sz*0.08, sz*0.8, sz*0.16); ctx.restore();
    ctx.save(); ctx.translate(mx, y); ctx.rotate(-Math.PI/4);
    ctx.fillRect(-sz*0.4, -sz*0.08, sz*0.8, sz*0.16); ctx.restore();
  }
}

// ── HELICOPTER ──
function drawHelicopter(cx, cy, w, h, frame) {
  ctx.fillStyle = LCD_STRUCT;
  // Cabin
  ctx.beginPath();
  ctx.moveTo(cx-w*0.3, cy);
  ctx.quadraticCurveTo(cx-w*0.35, cy-h*0.5, cx-w*0.05, cy-h*0.55);
  ctx.quadraticCurveTo(cx+w*0.2, cy-h*0.55, cx+w*0.22, cy-h*0.2);
  ctx.lineTo(cx+w*0.22, cy+h*0.05);
  ctx.quadraticCurveTo(cx+w*0.1, cy+h*0.3, cx-w*0.15, cy+h*0.25);
  ctx.quadraticCurveTo(cx-w*0.3, cy+h*0.15, cx-w*0.3, cy);
  ctx.fill();
  // Tail boom
  ctx.fillRect(cx+w*0.22, cy-h*0.12, w*0.28, h*0.1);
  // Tail fin
  ctx.beginPath();
  ctx.moveTo(cx+w*0.47, cy-h*0.12);
  ctx.lineTo(cx+w*0.5, cy-h*0.45);
  ctx.lineTo(cx+w*0.52, cy-h*0.12);
  ctx.fill();
  // Skids
  ctx.fillRect(cx-w*0.22, cy+h*0.25, w*0.45, h*0.05);
  ctx.fillRect(cx-w*0.15, cy+h*0.15, h*0.04, h*0.12);
  ctx.fillRect(cx+w*0.1, cy+h*0.15, h*0.04, h*0.12);
  // Window cutout
  ctx.fillStyle = LCD_BG;
  ctx.beginPath(); ctx.arc(cx-w*0.05, cy-h*0.12, w*0.07, 0, Math.PI*2); ctx.fill();
  // Rotor
  ctx.fillStyle = LCD_STRUCT;
  ctx.fillRect(cx-w*0.02, cy-h*0.55, w*0.04, h*0.12);
  if (frame===0) ctx.fillRect(cx-w*0.45, cy-h*0.6, w*0.9, h*0.06);
  else ctx.fillRect(cx-w*0.3, cy-h*0.6, w*0.6, h*0.06);
}

// ── PARATROOPER — filled silhouette with dome chute ──
function drawTrooper(cx, cy, w, h, col) {
  ctx.fillStyle = col;
  // Canopy dome
  ctx.beginPath();
  ctx.moveTo(cx-w*0.48, cy+h*0.02);
  ctx.quadraticCurveTo(cx-w*0.48, cy-h*0.5, cx, cy-h*0.52);
  ctx.quadraticCurveTo(cx+w*0.48, cy-h*0.5, cx+w*0.48, cy+h*0.02);
  // Inner curve to show canopy thickness
  ctx.quadraticCurveTo(cx, cy-h*0.18, cx-w*0.48, cy+h*0.02);
  ctx.fill();
  // Suspension lines (4 thin filled strips)
  var lw = Math.max(1, w*0.025);
  for (var i = -1.5; i <= 1.5; i++) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(cx+i*w*0.22-lw/2, cy+h*0.02);
    ctx.lineTo(cx+i*w*0.06-lw/2, cy+h*0.22);
    ctx.lineTo(cx+i*w*0.06+lw/2, cy+h*0.22);
    ctx.lineTo(cx+i*w*0.22+lw/2, cy+h*0.02);
    ctx.fill();
  }
  // Person body
  ctx.fillStyle = col;
  // Head
  ctx.beginPath(); ctx.arc(cx, cy+h*0.27, w*0.08, 0, Math.PI*2); ctx.fill();
  // Torso
  ctx.beginPath();
  ctx.moveTo(cx-w*0.1, cy+h*0.33);
  ctx.lineTo(cx-w*0.12, cy+h*0.5);
  ctx.lineTo(cx+w*0.12, cy+h*0.5);
  ctx.lineTo(cx+w*0.1, cy+h*0.33);
  ctx.fill();
  // Arms out to sides
  ctx.fillRect(cx-w*0.24, cy+h*0.34, w*0.14, h*0.05);
  ctx.fillRect(cx+w*0.1, cy+h*0.34, w*0.14, h*0.05);
  // Legs dangling
  ctx.fillRect(cx-w*0.1, cy+h*0.5, w*0.07, h*0.12);
  ctx.fillRect(cx+w*0.03, cy+h*0.5, w*0.07, h*0.12);
}

// ── BOAT with person ──
function drawBoat(cx, cy, w, h, col) {
  ctx.fillStyle = col;
  // Hull
  ctx.beginPath();
  ctx.moveTo(cx-w*0.48, cy-h*0.05);
  ctx.lineTo(cx-w*0.5, cy+h*0.2);
  ctx.quadraticCurveTo(cx, cy+h*0.45, cx+w*0.5, cy+h*0.2);
  ctx.lineTo(cx+w*0.48, cy-h*0.05);
  ctx.fill();
  // Person in boat
  ctx.beginPath(); ctx.arc(cx, cy-h*0.28, w*0.09, 0, Math.PI*2); ctx.fill();
  // Body
  ctx.fillRect(cx-w*0.08, cy-h*0.18, w*0.16, h*0.2);
  // Arms raised
  ctx.beginPath();
  ctx.moveTo(cx-w*0.08, cy-h*0.12);
  ctx.lineTo(cx-w*0.25, cy-h*0.38);
  ctx.lineTo(cx-w*0.19, cy-h*0.42);
  ctx.lineTo(cx-w*0.04, cy-h*0.18);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx+w*0.08, cy-h*0.12);
  ctx.lineTo(cx+w*0.25, cy-h*0.38);
  ctx.lineTo(cx+w*0.19, cy-h*0.42);
  ctx.lineTo(cx+w*0.04, cy-h*0.18);
  ctx.fill();
}

// ── SHARK ──
function drawShark(cx, cy, w, h, col, frame) {
  ctx.fillStyle = col;
  ctx.beginPath();
  var ox = frame ? w*0.05 : 0;
  ctx.moveTo(cx-w*0.3+ox, cy+h*0.3);
  ctx.quadraticCurveTo(cx-w*0.05+ox, cy-h*0.55, cx+w*0.1+ox, cy-h*0.5);
  ctx.quadraticCurveTo(cx+w*0.25+ox, cy-h*0.3, cx+w*0.35+ox, cy+h*0.3);
  ctx.fill();
}

// ── SPLASH ──
function drawSplash(cx, cy, w, h, col) {
  ctx.fillStyle = col;
  for (var i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.ellipse(cx+i*w*0.18, cy-h*0.15-Math.abs(i)*h*0.12, w*0.04, h*0.1, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.beginPath(); ctx.ellipse(cx, cy+h*0.05, w*0.35, h*0.08, 0, 0, Math.PI*2); ctx.fill();
}

// ── HELPERS ──
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawButton(r, label) {
  ctx.fillStyle = '#104048';
  roundRect(r.x, r.y+2, r.w, r.h, r.h*0.3); ctx.fill();
  ctx.fillStyle = '#185860';
  roundRect(r.x, r.y, r.w, r.h, r.h*0.3); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roundRect(r.x+r.w*0.1, r.y+1, r.w*0.8, r.h*0.35, r.h*0.2); ctx.fill();
  ctx.fillStyle = '#90c8d0';
  ctx.font = 'bold '+(r.h*0.5)+'px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(label, r.x+r.w/2, r.y+r.h*0.65);
}

// ═══════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════
function render() {
  var vw = canvas.width, vh = canvas.height;
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, vw, vh);

  // Device casing
  var grad = ctx.createLinearGradient(D.x, D.y, D.x, D.y+D.h);
  grad.addColorStop(0, '#2888a8'); grad.addColorStop(0.4, '#207888'); grad.addColorStop(1, '#186068');
  ctx.fillStyle = grad;
  roundRect(D.x, D.y, D.w, D.h, D.w*0.025); ctx.fill();
  // Top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(D.x, D.y, D.w, D.h*0.015, D.w*0.025); ctx.fill();
  // Screws
  var sr = D.w*0.01, si = D.w*0.035;
  [[D.x+si,D.y+si],[D.x+D.w-si,D.y+si],[D.x+si,D.y+D.h-si],[D.x+D.w-si,D.y+D.h-si]].forEach(function(p){
    ctx.fillStyle='#104850'; ctx.beginPath(); ctx.arc(p[0],p[1],sr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0a3038'; ctx.fillRect(p[0]-sr*0.6,p[1]-sr*0.15,sr*1.2,sr*0.3);
  });
  // Labels
  ctx.fillStyle='#d0f0f0'; ctx.font='bold '+(D.w*0.03)+'px sans-serif'; ctx.textAlign='center';
  ctx.fillText('SKY DROP', D.x+D.w/2, D.y+D.h*0.055);

  // Screen bezel
  ctx.fillStyle = '#0a2028';
  roundRect(S.x-4, S.y-4, S.w+8, S.h+8, 3); ctx.fill();
  // LCD screen
  ctx.fillStyle = LCD_BG; ctx.fillRect(S.x, S.y, S.w, S.h);

  // ── Screen positions ──
  var colX = [S.x+S.w*0.2, S.x+S.w*0.5, S.x+S.w*0.8];
  var rowY = [S.y+S.h*0.22, S.y+S.h*0.38, S.y+S.h*0.54, S.y+S.h*0.68];
  var tw = S.w*0.14, th = S.h*0.17;
  var bw = S.w*0.16, bh = S.h*0.15;
  var boatBaseY = S.y+S.h*0.84;
  var waterY = S.y+S.h*0.88;

  // Score
  var sh = S.h*0.1;
  drawScore(S.x+S.w*0.05, S.y+sh*0.8, sh, score);
  // Misses
  drawMissMarks(S.x+S.w*0.78, S.y+sh*0.8, sh*0.4);

  // Helicopter
  drawHelicopter(S.x+S.w*0.5, S.y+S.h*0.1, S.w*0.22, S.h*0.15, rotorFrame);

  // ── GHOST SEGMENTS ──
  for (var gc=0; gc<3; gc++)
    for (var gr=0; gr<4; gr++)
      drawTrooper(colX[gc], rowY[gr], tw, th, LCD_GHOST);
  for (var gb=0; gb<3; gb++)
    drawBoat(colX[gb], boatBaseY, bw, bh, LCD_GHOST);

  // Water
  ctx.fillStyle = LCD_STRUCT;
  ctx.fillRect(S.x+S.w*0.03, waterY, S.w*0.94, Math.max(1,S.h*0.008));
  for (var wx=0; wx<15; wx++)
    ctx.fillRect(S.x+S.w*0.05+wx*S.w*0.06, waterY+S.h*0.015, S.w*0.03, Math.max(1,S.h*0.005));

  // Shark
  drawShark(S.x+S.w*0.5, waterY+S.h*0.035, S.w*0.06, S.h*0.08, LCD_STRUCT, sharkFrame);

  // ── ACTIVE ELEMENTS ──
  if (state === 'play' || state === 'over') {
    for (var i=0; i<troopers.length; i++)
      drawTrooper(colX[troopers[i].col], rowY[troopers[i].row], tw, th, LCD_ON);
    drawBoat(colX[boatPos], boatBaseY, bw, bh, LCD_ON);
    for (var si2=0; si2<splashes.length; si2++)
      drawSplash(colX[splashes[si2].col], waterY, S.w*0.1, S.h*0.1, LCD_ON);
  }

  // ── BUTTONS ──
  var btnW = D.w*0.12, btnH2 = D.h*0.12;
  var btnCY = S.y+S.h+D.h*0.04+btnH2*0.4;
  btnLeftRect  = { x: D.x+D.w*0.22-btnW/2, y: btnCY-btnH2*0.3, w: btnW, h: btnH2*0.6 };
  btnRightRect = { x: D.x+D.w*0.78-btnW/2, y: btnCY-btnH2*0.3, w: btnW, h: btnH2*0.6 };
  drawButton(btnLeftRect, '◀');
  drawButton(btnRightRect, '▶');

  // ── TITLE / GAME OVER ──
  if (state === 'title') {
    ctx.fillStyle = LCD_ON;
    ctx.font = 'bold '+(S.h*0.08)+'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('SKY DROP', S.x+S.w/2, S.y+S.h*0.38);
    ctx.font = (S.h*0.04)+'px sans-serif';
    ctx.fillText('← → to move boat', S.x+S.w/2, S.y+S.h*0.5);
    ctx.fillText('Catch the paratroopers!', S.x+S.w/2, S.y+S.h*0.56);
    ctx.fillText('Tap or press SPACE to start', S.x+S.w/2, S.y+S.h*0.66);
    if (hiScore > 0) ctx.fillText('Hi Score: '+hiScore, S.x+S.w/2, S.y+S.h*0.76);
  }
  if (state === 'over') {
    ctx.fillStyle = 'rgba(154,173,134,0.88)';
    ctx.fillRect(S.x+S.w*0.15, S.y+S.h*0.28, S.w*0.7, S.h*0.44);
    ctx.fillStyle = LCD_ON;
    ctx.font = 'bold '+(S.h*0.07)+'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', S.x+S.w/2, S.y+S.h*0.43);
    ctx.font = (S.h*0.05)+'px sans-serif';
    ctx.fillText('Score: '+score, S.x+S.w/2, S.y+S.h*0.54);
    if (score >= hiScore && score > 0) ctx.fillText('NEW HIGH SCORE!', S.x+S.w/2, S.y+S.h*0.62);
    ctx.font = (S.h*0.035)+'px sans-serif';
    ctx.fillText('Tap or SPACE to restart', S.x+S.w/2, S.y+S.h*0.7);
  }
}

// ── MAIN LOOP ──
var lastTime = 0;
function loop(now) {
  if (!lastTime) lastTime = now;
  var dt = now - lastTime; lastTime = now;
  if (state === 'play') {
    accumulator += dt;
    while (accumulator >= tickRate) { accumulator -= tickRate; gameTick(); }
  }
  render();
  requestAnimationFrame(loop);
}

loadHi(); initGame(); calcLayout();
window.addEventListener('resize', calcLayout);
requestAnimationFrame(loop);
</script>
